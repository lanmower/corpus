deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
notes:
  - guid: "1a2b3c4d5e6f7g8h"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Define: birth defect"
      Back: "Abnormality of structure or function present from birth; diagnosed clinically at birth or later in life; often presents as abnormal appearance or failure to grow/develop normally"
    tags: ["definition", "birth-defects", "subject:paediatrics-neonatal"]
  - guid: "2b3c4d5e6f7g8h9i"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Define: malformations (in context of birth defects)"
      Back: "Commonest form of birth defect; congenital malformations develop in 1st trimester from failure of embryo to develop normally; result in birth defects affecting ≥1 organs"
    tags: ["definition", "malformations", "subject:paediatrics-neonatal"]
  - guid: "3c4d5e6f7g8h9i0j"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Define: birth prevalence"
      Back: "Measure of how common a birth defect is among newborns; expressed as number of affected infants per 1000 live births"
    tags: ["definition", "epidemiology", "subject:paediatrics-neonatal"]
  - guid: "4d5e6f7g8h9i0j1k"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Define: population prevalence (in birth defects)"
      Back: "Measure of how common a birth defect is in general population; expressed as number of affected individuals per 1000/10,000/100,000 people"
    tags: ["definition", "epidemiology", "subject:paediatrics-neonatal"]
  - guid: "5e6f7g8h9i0j1k2l"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "What % of infants have ≥1 congenital abnormality?"
      Back: "2-5%"
    tags: ["epidemiology", "prevalence", "subject:paediatrics-neonatal"]
  - guid: "6f7g8h9i0j1k2l3m"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "What % of infants have chromosome abnormality or single gene disorder?"
      Back: "1-2%"
    tags: ["epidemiology", "prevalence", "subject:paediatrics-neonatal"]
  - guid: "7g8h9i0j1k2l3m4n"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "What % of adults have genetic disorder?"
      Back: "5-10%"
    tags: ["epidemiology", "prevalence", "subject:paediatrics-neonatal"]
  - guid: "8h9i0j1k2l3m4n5o"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Breakdown of birth defect etiology: genetic vs non-genetic vs unknown"
      Back: "40% preconceptual genetic (chromosomal, single gene, multifactorial); 10% post-conception non-genetic (teratogens, constraint); 50% unknown"
    tags: ["etiology", "epidemiology", "subject:paediatrics-neonatal"]
  - guid: "9i0j1k2l3m4n5o6p"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Define: cell nucleus"
      Back: "Location where chromosomes live"
    tags: ["definition", "genetics", "subject:paediatrics-neonatal"]
  - guid: "0j1k2l3m4n5o6p7q"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Define: chromosomes (in genetics)"
      Back: "Contain all genetic material of a cell"
    tags: ["definition", "genetics", "subject:paediatrics-neonatal"]
  - guid: "1k2l3m4n5o6p7q8r"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Define: DNA"
      Back: "Material from which chromosomes are constructed"
    tags: ["definition", "genetics", "subject:paediatrics-neonatal"]
  - guid: "2l3m4n5o6p7q8r9s"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Define: gene"
      Back: "Segment of a chromosome made up of DNA; codes for inherited biochemical product (enzyme/protein) or physical feature"
    tags: ["definition", "genetics", "subject:paediatrics-neonatal"]
  - guid: "3m4n5o6p7q8r9s0t"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Define: diploid number (in humans)"
      Back: "46 chromosomes"
    tags: ["definition", "genetics", "subject:paediatrics-neonatal"]
  - guid: "4n5o6p7q8r9s0t1u"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Define: haploid number (in humans)"
      Back: "23 chromosomes"
    tags: ["definition", "genetics", "subject:paediatrics-neonatal"]
  - guid: "5o6p7q8r9s0t1u2v"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Define: meiosis"
      Back: "Cell division in which gametes are formed and number of chromosomes is halved"
    tags: ["definition", "genetics", "subject:paediatrics-neonatal"]
  - guid: "6p7q8r9s0t1u2v3w"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "What chromosomes/genetic material does ovum contain post-meiosis?"
      Back: "22 autosomes + 1 X chromosome"
    tags: ["meiosis", "gametes", "subject:paediatrics-neonatal"]
  - guid: "7q8r9s0t1u2v3w4x"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "What chromosomes/genetic material does sperm contain post-meiosis?"
      Back: "22 autosomes + either Y or X chromosome"
    tags: ["meiosis", "gametes", "subject:paediatrics-neonatal"]
  - guid: "8r9s0t1u2v3w4x5y"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "How many chromosomes do humans have total?"
      Back: "46 chromosomes: 22 autosomes + 1 pair of sex chromosomes"
    tags: ["chromosomes", "genetics", "subject:paediatrics-neonatal"]
  - guid: "9s0t1u2v3w4x5y6z"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Female human karyotype"
      Back: "46,XX"
    tags: ["karyotype", "genetics", "subject:paediatrics-neonatal"]
  - guid: "0t1u2v3w4x5y6z7a"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Male human karyotype"
      Back: "46,XY"
    tags: ["karyotype", "genetics", "subject:paediatrics-neonatal"]
  - guid: "1u2v3w4x5y6z7a8b"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "How is chromosome inheritance determined (which parent contributes which)?"
      Back: "For each chromosome pair: 1 chromosome inherited from mother, 1 from father"
    tags: ["inheritance", "genetics", "subject:paediatrics-neonatal"]
  - guid: "2v3w4x5y6z7a8b9c"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Define: non-disjunction"
      Back: "During gamete formation, pair of parent chromosomes splits abnormally → 1 gamete with 24 chromosomes, 1 gamete with 22 chromosomes"
    tags: ["definition", "chromosomal-abnormalities", "subject:paediatrics-neonatal"]
  - guid: "3w4x5y6z7a8b9c0d"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Define: trisomy"
      Back: "Presence of 47 chromosomes (extra chromosome); results from abnormal gamete with 24 chromosomes + normal gamete with 23 chromosomes"
    tags: ["definition", "chromosomal-abnormalities", "subject:paediatrics-neonatal"]
  - guid: "4x5y6z7a8b9c0d1e"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Define: monosomy"
      Back: "Presence of 45 chromosomes (missing chromosome); results from abnormal gamete with 22 chromosomes + normal gamete with 23 chromosomes"
    tags: ["definition", "chromosomal-abnormalities", "subject:paediatrics-neonatal"]
  - guid: "5y6z7a8b9c0d1e2f"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "List 3 common trisomies"
      Back: "Trisomy 13, Trisomy 18, Trisomy 21"
    tags: ["trisomy", "chromosomal-abnormalities", "subject:paediatrics-neonatal"]
  - guid: "6z7a8b9c0d1e2f3g"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Which monosomy is compatible with life?"
      Back: "Turner syndrome (45,X) - only monosomy compatible with life"
    tags: ["monosomy", "turner-syndrome", "subject:paediatrics-neonatal"]
  - guid: "7a8b9c0d1e2f3g4h"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Turner syndrome karyotype"
      Back: "45,X"
    tags: ["turner-syndrome", "karyotype", "subject:paediatrics-neonatal"]
  - guid: "8b9c0d1e2f3g4h5i"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Define: mosaicism"
      Back: "Presence of 2 different cell lines of same genetic origin in same person; occurs when monosomy cell usually dies and trisomy cell continues dividing"
    tags: ["definition", "chromosomal-abnormalities", "subject:paediatrics-neonatal"]
  - guid: "9c0d1e2f3g4h5i6j"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Define: translocation (chromosomal)"
      Back: "Piece of chromosome breaks off and joins another chromosome"
    tags: ["definition", "chromosomal-abnormalities", "subject:paediatrics-neonatal"]
  - guid: "0d1e2f3g4h5i6j7k"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Define: balanced translocation"
      Back: "Piece of chromosome breaks off and joins another with NO genetic material lost or gained; person clinically normal but at risk of passing unbalanced translocations to offspring; can cause recurrent miscarriages"
    tags: ["definition", "translocation", "subject:paediatrics-neonatal"]
  - guid: "1e2f3g4h5i6j7k8l"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Define: unbalanced translocation"
      Back: "Translocation with genetic material lost or gained"
    tags: ["definition", "translocation", "subject:paediatrics-neonatal"]
  - guid: "2f3g4h5i6j7k8l9m"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Define: deletion (chromosomal)"
      Back: "Piece of chromosome of variable length is missing"
    tags: ["definition", "chromosomal-abnormalities", "subject:paediatrics-neonatal"]
  - guid: "3g4h5i6j7k8l9m0n"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "What deletion syndrome is associated with chromosome 15?"
      Back: "Prader-Willi syndrome and Angelman syndrome"
    tags: ["deletion-syndromes", "chromosome-15", "subject:paediatrics-neonatal"]
  - guid: "4h5i6j7k8l9m0n1o"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "What deletion syndrome is associated with a specific piece of chromosome 22?"
      Back: "Deletion 22"
    tags: ["deletion-syndromes", "chromosome-22", "subject:paediatrics-neonatal"]
  - guid: "5i6j7k8l9m0n1o2p"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "What deletion syndrome is associated with small arm of chromosome 5?"
      Back: "Cri du chat"
    tags: ["deletion-syndromes", "chromosome-5", "subject:paediatrics-neonatal"]
  - guid: "6j7k8l9m0n1o2p3q"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Define: chromosomal duplication"
      Back: "Piece of chromosome copies itself; resultant chromosome has 2 identical pieces of same chromosome; example: Cat Eye Syndrome"
    tags: ["definition", "chromosomal-abnormalities", "subject:paediatrics-neonatal"]
  - guid: "7k8l9m0n1o2p3q4r"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Define: ring chromosome"
      Back: "One end of chromosome breaks off; broken end sticks to other end making ring shape"
    tags: ["definition", "chromosomal-abnormalities", "subject:paediatrics-neonatal"]
  - guid: "8l9m0n1o2p3q4r5s"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "How many gene copies (alleles) does each person have for any given gene?"
      Back: "2 alleles; can be: 2 normally functioning, OR 1 normal + 1 abnormal, OR 2 abnormal functioning"
    tags: ["alleles", "genetics", "subject:paediatrics-neonatal"]
  - guid: "9m0n1o2p3q4r5s6t"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Define: dominant disorder"
      Back: "Disorder in which only 1 abnormal gene copy is required for expression of phenotype"
    tags: ["definition", "inheritance-patterns", "subject:paediatrics-neonatal"]
  - guid: "0n1o2p3q4r5s6t7u"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Define: recessive disorder"
      Back: "Disorder in which both gene copies must be abnormal for expression of phenotype (homozygous state)"
    tags: ["definition", "inheritance-patterns", "subject:paediatrics-neonatal"]
  - guid: "1o2p3q4r5s6t7u8v"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Define: gene mutation"
      Back: "Abnormality in a gene that can occur spontaneously or from environmental factors"
    tags: ["definition", "genetics", "subject:paediatrics-neonatal"]
  - guid: "2p3q4r5s6t7u8v9w"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "List characteristics of autosomal dominant (AD) inheritance"
      Back: "1. Affects males and females equally; 2. Evidence of transmission across generations; 3. Transmission between all sexes possible (male-male, female-female, male-female, female-male); 4. Affected individual × normal = 50% affected children per pregnancy"
    tags: ["autosomal-dominant", "inheritance-patterns", "subject:paediatrics-neonatal"]
  - guid: "3q4r5s6t7u8v9w0x"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "What is the recurrence risk for affected parent (AD) × normal parent?"
      Back: "50% chance of affected children with each pregnancy"
    tags: ["autosomal-dominant", "recurrence-risk", "subject:paediatrics-neonatal"]
  - guid: "4r5s6t7u8v9w0x1y"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Waardenburg syndrome origin: what % from affected parent vs de novo?"
      Back: "2/3 from affected parent; 1/3 de novo mutation (associated with advanced paternal age)"
    tags: ["waardenburg-syndrome", "origin", "subject:paediatrics-neonatal"]
  - guid: "5s6t7u8v9w0x1y2z"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Waardenburg syndrome prevalence"
      Back: "1 in 30,000"
    tags: ["waardenburg-syndrome", "prevalence", "subject:paediatrics-neonatal"]
  - guid: "6t7u8v9w0x1y2z3a"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "List clinical features of Waardenburg syndrome (5)"
      Back: "1. Heterochromia iridis (different colored irises); 2. Abnormal tear ducts; 3. Sensorineural deafness; 4. White forelock; 5. Early greying of hair and eyebrows; 6. Partial albinism"
    tags: ["waardenburg-syndrome", "clinical-features", "subject:paediatrics-neonatal"]
  - guid: "7u8v9w0x1y2z3a4b"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "List complications of Waardenburg syndrome"
      Back: "1. Deafness → lack of speech/communication, schooling problems, social stigma; 2. Recurrent eye infections from abnormal tear ducts; 3. Normal intelligence but may present with developmental delay due to lack of speech and communication inability"
    tags: ["waardenburg-syndrome", "complications", "subject:paediatrics-neonatal"]
  - guid: "8v9w0x1y2z3a4b5c"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "List management/care strategies for Waardenburg syndrome"
      Back: "1. Early diagnosis and intervention for deafness; 2. Audiology (hearing aids); 3. Speech therapy; 4. Schools for hearing impaired; 5. Treat recurrent eye infections; 6. Genetic counselling; 7. Psychosocial support"
    tags: ["waardenburg-syndrome", "management", "subject:paediatrics-neonatal"]
  - guid: "9w0x1y2z3a4b5c6d"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "List major clinical features of Marfan syndrome (4 domains)"
      Back: "1. Skeletal: tall stature, arachnodactyly (long slender digits), long thin feet, pectus excavatum, scoliosis, lumbar lordosis; 2. Ocular: lens dislocation (ectopia lentis); 3. Cardiovascular: aortic dilatation, aortic aneurysm; 4. General: arm span exceeding height"
    tags: ["marfan-syndrome", "clinical-features", "subject:paediatrics-neonatal"]
  - guid: "0x1y2z3a4b5c6d7e"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Define: arachnodactyly"
      Back: "Abnormally long, slender fingers and toes"
    tags: ["definition", "dysmorphology", "subject:paediatrics-neonatal"]
  - guid: "1y2z3a4b5c6d7e8f"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "What is Walker-Murdoch wrist sign in Marfan syndrome?"
      Back: "Thumb crosses palm with distal phalanx extending well beyond ulnar border; positive sign indicates arachnodactyly"
    tags: ["marfan-syndrome", "clinical-signs", "subject:paediatrics-neonatal"]
  - guid: "2z3a4b5c6d7e8f9g"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "What is Steinberg thumb sign in Marfan syndrome?"
      Back: "Thumb opposed across palm extending beyond ulnar border when closed fist; positive sign indicates arachnodactyly"
    tags: ["marfan-syndrome", "clinical-signs", "subject:paediatrics-neonatal"]
  - guid: "3a4b5c6d7e8f9g0h"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "What is ectopia lentis?"
      Back: "Subluxation (dislocation) of the lens; seen in Marfan syndrome; lens edge visible at pupillary border"
    tags: ["definition", "marfan-syndrome", "subject:paediatrics-neonatal"]
  - guid: "4b5c6d7e8f9g0h1i"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "List clinical features of myotonic dystrophy (autosomal dominant)"
      Back: "1. Frontal balding; 2. Hatchet facies from temporalis muscle atrophy; 3. Cataracts; 4. Ptosis and drooping mouth from facial muscle weakness; 5. Sternocleidomastoid wasting; 6. Gynecomastia"
    tags: ["myotonic-dystrophy", "clinical-features", "subject:paediatrics-neonatal"]
  - guid: "5c6d7e8f9g0h1i2j"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "What is anticipation in myotonic dystrophy?"
      Back: "Pattern of inheritance in myotonic dystrophy showing earlier age of onset and increased severity in successive generations; autosomal dominant pattern with anticipation"
    tags: ["myotonic-dystrophy", "inheritance", "subject:paediatrics-neonatal"]
  - guid: "6d7e8f9g0h1i2j3k"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "List clinical features of achondroplasia"
      Back: "1. Relative macrocephaly (large head relative to body); 2. Frontal bossing; 3. Short proximal (rhizomelic) limbs; 4. Short trident hands; 5. Lumbar lordosis; 6. Short stature; 7. Short-limbed dwarfism"
    tags: ["achondroplasia", "clinical-features", "subject:paediatrics-neonatal"]
  - guid: "7e8f9g0h1i2j3k4l"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "List major clinical features of neurofibromatosis (NF-1)"
      Back: "1. Skin: café-au-lait spots, neurofibromas of varying sizes; 2. Ophthalmologic: visual impairment/blindness, optic glioma, Lisch nodules; 3. Skeletal: scoliosis, bone deformities, pseudarthrosis; 4. CNS: seizures, headaches, brain tumors, macrocephaly, learning disabilities, mental retardation; 5. Vascular: high BP, brain blood vessel defects; 6. Other: speech impairments, digestive symptoms, freckling in skin folds (armpits, groin), early/delayed puberty, short stature, cancer risk"
    tags: ["neurofibromatosis", "clinical-features", "subject:paediatrics-neonatal"]
  - guid: "8f9g0h1i2j3k4l5m"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Define: café-au-lait spots"
      Back: "Light-brown macules on skin; characteristic feature of neurofibromatosis; usually well-circumscribed"
    tags: ["definition", "dysmorphology", "subject:paediatrics-neonatal"]
  - guid: "9g0h1i2j3k4l5m6n"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "What are Lisch nodules?"
      Back: "Tan/orange pigmented nodules on iris surface; pathognomonic of neurofibromatosis type 1 (NF-1)"
    tags: ["definition", "neurofibromatosis", "subject:paediatrics-neonatal"]
  - guid: "0h1i2j3k4l5m6n7o"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "What is Crowe's sign (axillary freckling)?"
      Back: "Dense small brown freckles in axillae (armpits); pathognomonic of neurofibromatosis type 1 (NF-1)"
    tags: ["definition", "neurofibromatosis", "subject:paediatrics-neonatal"]
  - guid: "1i2j3k4l5m6n7o8p"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "List clinical features of osteogenesis imperfecta"
      Back: "1. Skeletal fractures; 2. Brittle bones; 3. Blue sclerae"
    tags: ["osteogenesis-imperfecta", "clinical-features", "subject:paediatrics-neonatal"]
  - guid: "2j3k4l5m6n7o8p9q"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "List clinical features of ectodermal dysplasia"
      Back: "1. Hypohidrosis (decreased sweating); 2. Transparent/translucent skin; 3. Abnormal and absent teeth; 4. Hypodontia (missing teeth); 5. Abnormal abdomen"
    tags: ["ectodermal-dysplasia", "clinical-features", "subject:paediatrics-neonatal"]
  - guid: "3k4l5m6n7o8p9q0r"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "List characteristics of autosomal recessive (AR) inheritance"
      Back: "1. Affects males and females equally; 2. Trait manifest only when homozygous (2 abnormal alleles); 3. Heterozygotes perfectly healthy; 4. 2 heterozygous parents → 25% affected offspring per pregnancy; 5. Consanguinity often involved; 6. Affected individuals usually in single generation"
    tags: ["autosomal-recessive", "inheritance-patterns", "subject:paediatrics-neonatal"]
  - guid: "4l5m6n7o8p9q0r1s"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "What is recurrence risk for 2 heterozygous parents (AR)?"
      Back: "25% affected offspring with each pregnancy (1 normal:2 carriers:1 affected ratio)"
    tags: ["autosomal-recessive", "recurrence-risk", "subject:paediatrics-neonatal"]
  - guid: "5m6n7o8p9q0r1s2t"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Define: oculocutaneous albinism"
      Back: "Lack of melanin in skin, hair, and eyes; autosomal recessive inheritance"
    tags: ["definition", "albinism", "subject:paediatrics-neonatal"]
  - guid: "6n7o8p9q0r1s2t3u"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Oculocutaneous albinism prevalence"
      Back: "1/4000 in black population; higher in communities with consanguinity"
    tags: ["albinism", "prevalence", "subject:paediatrics-neonatal"]
  - guid: "7o8p9q0r1s2t3u4v"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "List skin features of oculocutaneous albinism"
      Back: "1. Pale, corn-colored hair; 2. Lighter than normal skin"
    tags: ["albinism", "clinical-features", "subject:paediatrics-neonatal"]
  - guid: "8p9q0r1s2t3u4v5w"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "List ocular features of oculocutaneous albinism"
      Back: "1. Lighter than normal eyes; 2. Photophobia (light sensitivity); 3. Nystagmus; 4. Poor vision; 5. Astigmatism; 6. No binocular vision"
    tags: ["albinism", "clinical-features", "subject:paediatrics-neonatal"]
  - guid: "9q0r1s2t3u4v5w6x"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "List skin complications of oculocutaneous albinism"
      Back: "1. Sunburn; 2. Rapid aging of skin; 3. Skin cancer risk"
    tags: ["albinism", "complications", "subject:paediatrics-neonatal"]
  - guid: "0r1s2t3u4v5w6x7y"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "List ocular complications of oculocutaneous albinism"
      Back: "1. Sun-induced damage to eyes; 2. Abnormal eyesight; 3. Poor school performance from visual disability"
    tags: ["albinism", "complications", "subject:paediatrics-neonatal"]
  - guid: "1s2t3u4v5w6x7y8z"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "List social/cultural complications of oculocutaneous albinism"
      Back: "Social stigmatism from African myths regarding albinism"
    tags: ["albinism", "complications", "subject:paediatrics-neonatal"]
  - guid: "2t3u4v5w6x7y8z9a"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "List management/care strategies for oculocutaneous albinism"
      Back: "1. Skin care: sunscreen, clothes to cover skin, umbrellas, hats; 2. Eye care: sunglasses, regular ophthalmic reviews; 3. NDT therapy for severe visual disability; 4. Genetic counselling; 5. Psychosocial support"
    tags: ["albinism", "management", "subject:paediatrics-neonatal"]
  - guid: "3u4v5w6x7y8z9a0b"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "List clinical features of cystic fibrosis"
      Back: "1. Malabsorption; 2. Failure to thrive; 3. Recurrent chest infections; 4. Protuberant abdomen; 5. Wasted limbs"
    tags: ["cystic-fibrosis", "clinical-features", "subject:paediatrics-neonatal"]
  - guid: "4v5w6x7y8z9a0b1c"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "List clinical features of spinal muscular atrophy (SMA) type 1 (Werdnig-Hoffmann)"
      Back: "1. Frog-legged posture (abducted hips); 2. Hypotonia (low muscle tone); 3. Flaccid lying position; 4. Paradoxical breathing pattern"
    tags: ["spinal-muscular-atrophy", "clinical-features", "subject:paediatrics-neonatal"]
  - guid: "5w6x7y8z9a0b1c2d"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "List common autosomal recessive disorders"
      Back: "1. Adrenogenital syndrome; 2. Oculocutaneous albinism; 3. Cystic fibrosis; 4. Deafness (some types); 5. Galactosaemia; 6. Mucopolysaccharidoses; 7. Phenylketonuria (PKU); 8. Retinitis pigmentosa (some); 9. Sickle cell anemia; 10. Spinal muscular atrophy; 11. Tay-Sachs disease; 12. Thalassemia"
    tags: ["autosomal-recessive", "syndromes", "subject:paediatrics-neonatal"]
  - guid: "6x7y8z9a0b1c2d3e"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Define: X-linked (sex-linked) inheritance"
      Back: "Genes carried on the X chromosome; inheritance pattern where genes are located on sex chromosomes"
    tags: ["definition", "x-linked-inheritance", "subject:paediatrics-neonatal"]
  - guid: "7y8z9a0b1c2d3e4f"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Define: hemizygous"
      Back: "Male with abnormal allele on single X chromosome; genotype has only one copy of X-linked gene"
    tags: ["definition", "x-linked-inheritance", "subject:paediatrics-neonatal"]
  - guid: "8z9a0b1c2d3e4f5g"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "How is X-linked recessive expressed in males?"
      Back: "ALWAYS manifest; male has no normal allele on X to counteract abnormal allele (hemizygous state)"
    tags: ["x-linked-inheritance", "males", "subject:paediatrics-neonatal"]
  - guid: "9a0b1c2d3e4f5g6h"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "How is X-linked recessive expressed in females?"
      Back: "Manifest only when homozygous (2 abnormal alleles on both X chromosomes)"
    tags: ["x-linked-inheritance", "females", "subject:paediatrics-neonatal"]
  - guid: "0b1c2d3e4f5g6h7i"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "What is recurrence risk for carrier mother × unaffected father (X-linked recessive like haemophilia)?"
      Back: "Sons: 50% affected; Daughters: 50% carriers"
    tags: ["x-linked-inheritance", "recurrence-risk", "subject:paediatrics-neonatal"]
  - guid: "1c2d3e4f5g6h7i8j"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "What is recurrence risk for affected father × unaffected mother (X-linked recessive like haemophilia)?"
      Back: "Sons: 0% affected (receive Y from father); Daughters: 100% carriers (receive X from father)"
    tags: ["x-linked-inheritance", "recurrence-risk", "subject:paediatrics-neonatal"]
  - guid: "2d3e4f5g6h7i8j9k"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "What is male-to-male transmission in X-linked inheritance?"
      Back: "ABSENT; males cannot transmit X-linked disorders to sons (sons receive Y from father); characteristic feature of X-linked recessive pedigrees"
    tags: ["x-linked-inheritance", "pedigree", "subject:paediatrics-neonatal"]
  - guid: "3e4f5g6h7i8j9k0l"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Define: haemophilia"
      Back: "Inherited bleeding disorder affecting mainly males; X-linked inheritance; gene defects on chromosome X"
    tags: ["definition", "haemophilia", "subject:paediatrics-neonatal"]
  - guid: "4f5g6h7i8j9k0l1m"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Haemophilia A: which clotting factor is deficient?"
      Back: "Factor 8 (Factor VIII)"
    tags: ["haemophilia", "clotting-factors", "subject:paediatrics-neonatal"]
  - guid: "5g6h7i8j9k0l1m2n"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Haemophilia B: which clotting factor is deficient?"
      Back: "Factor 9 (Factor IX / Christmas factor)"
    tags: ["haemophilia", "clotting-factors", "subject:paediatrics-neonatal"]
  - guid: "6h7i8j9k0l1m2n3o"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "What % of female carriers of haemophilia have signs of mild haemophilia?"
      Back: "10%"
    tags: ["haemophilia", "females", "subject:paediatrics-neonatal"]
  - guid: "7i8j9k0l1m2n3o4p"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Haemophilia A prevalence in white males"
      Back: "1 in 5000"
    tags: ["haemophilia", "prevalence", "subject:paediatrics-neonatal"]
  - guid: "8j9k0l1m2n3o4p5q"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Haemophilia A prevalence in black males"
      Back: "1 in 20,000 (though poor registration may affect accuracy)"
    tags: ["haemophilia", "prevalence", "subject:paediatrics-neonatal"]
  - guid: "9k0l1m2n3o4p5q6r"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "List sites of bleeding in haemophilia"
      Back: "1. Skin; 2. Mucosa; 3. Muscles; 4. Joints (haemarthrosis); 5. Internal organs; 6. Brain"
    tags: ["haemophilia", "clinical-features", "subject:paediatrics-neonatal"]
  - guid: "0l1m2n3o4p5q6r7s"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "What determines severity of haemophilia?"
      Back: "Concentration of clotting factors; higher concentration = milder disease"
    tags: ["haemophilia", "severity", "subject:paediatrics-neonatal"]
  - guid: "1m2n3o4p5q6r7s8t"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "What diagnostic test is abnormal in haemophilia?"
      Back: "PTT (Partial Thromboplastin Time) is prolonged; clotting factor levels are low; gene/DNA testing available but expensive"
    tags: ["haemophilia", "diagnosis", "subject:paediatrics-neonatal"]
  - guid: "2n3o4p5q6r7s8t9u"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "List complications of haemophilia"
      Back: "1. Haemarthrosis (joint bleeding); 2. Soft tissue bleeding; 3. Internal bleeding; 4. Intracranial bleeding → headache, vomiting, lethargy"
    tags: ["haemophilia", "complications", "subject:paediatrics-neonatal"]
  - guid: "3o4p5q6r7s8t9u0v"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "List clinical clues suggesting haemophilia in newborns/children"
      Back: "1. Large cephalhaematoma in newborn; 2. Excess bleeding from circumcision; 3. Prolonged/repeated nosebleeds; 4. Early and excessive bleeding after minor trauma; 5. Deep muscle haematoma; 6. Haemarthrosis (joint bleeding)"
    tags: ["haemophilia", "diagnosis", "subject:paediatrics-neonatal"]
  - guid: "4p5q6r7s8t9u0v1w"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "List signs suggesting female carrier of haemophilia"
      Back: "1. Close relative with haemophilia; 2. Menorrhagia (heavy periods); 3. Easy bruising; 4. Bleeding post-trauma; 5. Bleeding post-surgery; 6. Bleeding at childbirth"
    tags: ["haemophilia", "females", "subject:paediatrics-neonatal"]
  - guid: "5q6r7s8t9u0v1w2x"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "What is treatment of haemophilia?"
      Back: "Factor replacement therapy"
    tags: ["haemophilia", "treatment", "subject:paediatrics-neonatal"]
  - guid: "6r7s8t9u0v1w2x3y"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "What are management strategies for haemarthrosis and soft tissue haematomata in haemophilia?"
      Back: "1. Ice packs on affected area; 2. Physiotherapy and OT to prevent contractures; 3. Factor replacement for major bleeding"
    tags: ["haemophilia", "management", "subject:paediatrics-neonatal"]
  - guid: "7s8t9u0v1w2x3y4z"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "What is the inheritance pattern in haemophilia?"
      Back: "80% from carrier mothers; 10% of carrier mothers have mild signs/symptoms of haemophilia; 20% de novo mutations"
    tags: ["haemophilia", "inheritance", "subject:paediatrics-neonatal"]
  - guid: "8t9u0v1w2x3y4z5a"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "What is important to confirm/exclude before pregnancy in female carrier of haemophilia?"
      Back: "Diagnosis must be confirmed or excluded; if carrier confirmed, risk of heavy bleeding during vaginal delivery or cesarean section; male fetus has 1-2% risk of intracranial bleed"
    tags: ["haemophilia", "pregnancy-planning", "subject:paediatrics-neonatal"]
  - guid: "9u0v1w2x3y4z5a6b"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "What precautions should be taken in haemophilia infants regarding vaccinations?"
      Back: "NO circumcision; NO IM (intramuscular) injections; SC (subcutaneous) immunization only"
    tags: ["haemophilia", "infant-care", "subject:paediatrics-neonatal"]
  - guid: "0v1w2x3y4z5a6b7c"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "What is emergency treatment for neck swelling/bleeding in haemophilia?"
      Back: "EMERGENCY situation (risk of airway compromise); treat with MAJOR dose of clotting factor"
    tags: ["haemophilia", "emergency", "subject:paediatrics-neonatal"]
  - guid: "1w2x3y4z5a6b7c8d"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "What is management of soft tissue bleeds and bruising in haemophilia?"
      Back: "No functional impairment; tenderness but no severe pain; NO factor replacement needed"
    tags: ["haemophilia", "management", "subject:paediatrics-neonatal"]
  - guid: "2x3y4z5a6b7c8d9e"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "What is management of deltoid/forearm bleeds in haemophilia?"
      Back: "Routine factor dose; MAJOR factor dose if compartment syndrome suspected"
    tags: ["haemophilia", "management", "subject:paediatrics-neonatal"]
  - guid: "3y4z5a6b7c8d9e0f"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "What is presentation and management of iliopsoas bleed in haemophilia?"
      Back: "Presentation: flexed hip, pain, inability to extend leg on affected side; Management: MAJOR dose of factor replacement"
    tags: ["haemophilia", "management", "subject:paediatrics-neonatal"]
  - guid: "4z5a6b7c8d9e0f1g"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "What is presentation and management of buttock bleed in haemophilia?"
      Back: "Presentation: pain ± swelling; Management: routine factor dose; MAJOR factor dose if leg tingling/swelling on affected side"
    tags: ["haemophilia", "management", "subject:paediatrics-neonatal"]
  - guid: "5a6b7c8d9e0f1g2h"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "What is presentation and management of thigh/calf bleed in haemophilia?"
      Back: "Presentation: pain ± swelling, impaired mobility; Management: routine factor dose; MAJOR factor dose if compartment syndrome suspected"
    tags: ["haemophilia", "management", "subject:paediatrics-neonatal"]
  - guid: "6b7c8d9e0f1g2h3i"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "What is Gower's manoeuvre in Duchenne muscular dystrophy?"
      Back: "Characteristic sign of proximal muscle weakness; patient uses hands to push body up from floor due to weak hip and thigh muscles"
    tags: ["duchenne-dystrophy", "clinical-signs", "subject:paediatrics-neonatal"]
  - guid: "7c8d9e0f1g2h3i4j"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "What is calf hypertrophy in Duchenne muscular dystrophy?"
      Back: "Bilateral calf muscle pseudohypertrophy (false hypertrophy from fat/fibrous tissue replacement of muscle); classic sign of Duchenne dystrophy"
    tags: ["duchenne-dystrophy", "clinical-signs", "subject:paediatrics-neonatal"]
  - guid: "8d9e0f1g2h3i4j5k"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Define: fetal alcohol syndrome (FAS)"
      Back: "Alcohol-related birth defects and neurodevelopmental disorders resulting from prenatal alcohol exposure"
    tags: ["definition", "fetal-alcohol-syndrome", "subject:paediatrics-neonatal"]
  - guid: "9e0f1g2h3i4j5k6l"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "List discriminating facial features of FAS (5)"
      Back: "1. Short palpebral fissures (shortened eye openings); 2. Flat midface; 3. Short nose; 4. Indistinct philtrum; 5. Thin upper lip"
    tags: ["fetal-alcohol-syndrome", "facial-features", "subject:paediatrics-neonatal"]
  - guid: "0f1g2h3i4j5k6l7m"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "List associated facial features of FAS (4)"
      Back: "1. Epicanthal folds; 2. Low nasal bridge; 3. Minor ear anomalies; 4. Micrognathia (small jaw)"
    tags: ["fetal-alcohol-syndrome", "facial-features", "subject:paediatrics-neonatal"]
  - guid: "1g2h3i4j5k6l7m8n"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Define: palpebral fissures"
      Back: "Opening between eyelids; short palpebral fissures means horizontally shortened eye openings"
    tags: ["definition", "dysmorphology", "subject:paediatrics-neonatal"]
  - guid: "2h3i4j5k6l7m8n9o"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Define: philtrum"
      Back: "Groove/indentation between nose and upper lip"
    tags: ["definition", "dysmorphology", "subject:paediatrics-neonatal"]
  - guid: "3i4j5k6l7m8n9o0p"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "List systemic features of FAS"
      Back: "1. Microcephaly; 2. Low birth weight; 3. Delayed growth/development; 4. Intellectual disability; 5. Behavior problems"
    tags: ["fetal-alcohol-syndrome", "systemic-features", "subject:paediatrics-neonatal"]
  - guid: "4j5k6l7m8n9o0p1q"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "What congenital malformations can result from prenatal alcohol exposure?"
      Back: "Cleft lip and palate"
    tags: ["fetal-alcohol-syndrome", "malformations", "subject:paediatrics-neonatal"]
  - guid: "5k6l7m8n9o0p1q2r"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "FAS prevalence in Western Cape (South Africa)"
      Back: "50 per 1000 population"
    tags: ["fetal-alcohol-syndrome", "prevalence", "subject:paediatrics-neonatal"]
  - guid: "6l7m8n9o0p1q2r3s"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "FAS prevalence in Soweto (South Africa)"
      Back: "20 per 1000 population"
    tags: ["fetal-alcohol-syndrome", "prevalence", "subject:paediatrics-neonatal"]
  - guid: "7m8n9o0p1q2r3s4t"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "List management/rehabilitation strategies for FAS"
      Back: "1. Neurodevelopmental therapy; 2. Community-based rehabilitation; 3. Physiotherapy for slow motor milestones; 4. OT for fine motor coordination and social development; 5. Audiology and speech therapy; 6. Psychosocial counselling and intervention"
    tags: ["fetal-alcohol-syndrome", "management", "subject:paediatrics-neonatal"]
  - guid: "8n9o0p1q2r3s4t5u"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "What maternal cardiac condition causes teratogenic risk?"
      Back: "Maternal cardiac disease on Warfarin → Warfarin Embryopathy risk"
    tags: ["teratogens", "maternal-conditions", "subject:paediatrics-neonatal"]
  - guid: "9o0p1q2r3s4t5u6v"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "What maternal metabolic condition causes teratogenic risk?"
      Back: "Poorly controlled diabetes (high HbA1c) → Diabetic Embryopathy"
    tags: ["teratogens", "maternal-conditions", "subject:paediatrics-neonatal"]
  - guid: "0p1q2r3s4t5u6v7w"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "What psychiatric drug causes teratogenic risk?"
      Back: "Lithium (mood stabilizer) → MHC-related embryopathy risk"
    tags: ["teratogens", "maternal-conditions", "subject:paediatrics-neonatal"]
  - guid: "1q2r3s4t5u6v7w8x"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "What antiepileptic drug causes teratogenic risk?"
      Back: "Valproate (valproic acid) → Valproate Embryopathy risk"
    tags: ["teratogens", "maternal-conditions", "subject:paediatrics-neonatal"]
  - guid: "2r3s4t5u6v7w8x9y"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "What dermatologic drug causes teratogenic risk?"
      Back: "Retinoic acid (retinoid) → Retinoic acid Embryopathy risk"
    tags: ["teratogens", "maternal-conditions", "subject:paediatrics-neonatal"]
  - guid: "3s4t5u6v7w8x9y0z"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "What chemotherapy causes teratogenic risk?"
      Back: "Maternal chemotherapy → associated embryopathy risk"
    tags: ["teratogens", "maternal-conditions", "subject:paediatrics-neonatal"]
  - guid: "4t5u6v7w8x9y0z1a"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Define: multifactorial inheritance"
      Back: "Multiple genes interact with one another and with environmental factors to cause phenotype; GENE-GENE + GENE-ENVIRONMENT interactions"
    tags: ["definition", "multifactorial-inheritance", "subject:paediatrics-neonatal"]
  - guid: "5u6v7w8x9y0z1a2b"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "In multifactorial inheritance, how does risk compare in relatives vs general population?"
      Back: "Higher risk in relatives than in general population"
    tags: ["multifactorial-inheritance", "genetics", "subject:paediatrics-neonatal"]
  - guid: "6v7w8x9y0z1a2b3c"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "What is recurrence risk for multifactorial traits in future pregnancies?"
      Back: "3-5% recurrence risk in future pregnancies"
    tags: ["multifactorial-inheritance", "recurrence-risk", "subject:paediatrics-neonatal"]
  - guid: "7w8x9y0z1a2b3c4d"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "List examples of multifactorial congenital malformations"
      Back: "1. Cleft lip and palate; 2. Neural tube defects (anencephaly, myelomeningocele)"
    tags: ["multifactorial-inheritance", "examples", "subject:paediatrics-neonatal"]
  - guid: "8x9y0z1a2b3c4d5e"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Define: neural tube defects (NTD)"
      Back: "Congenital malformations from failure of neural tube (which develops into skull, brain, spinal cord, nerves) to close at end of 4th week post-conception"
    tags: ["definition", "neural-tube-defects", "subject:paediatrics-neonatal"]
  - guid: "9y0z1a2b3c4d5e6f"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Define: anencephaly"
      Back: "Neural tube defect with absent brain; sometimes called SB (spina bifida) or END (exencephaly with no development); incompatible with life"
    tags: ["definition", "anencephaly", "subject:paediatrics-neonatal"]
  - guid: "0z1a2b3c4d5e6f7g"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Define: encephalocele"
      Back: "Failure of midline skull closure between eyes and occiput; meninges with or without brain tissue protrude through skull defect"
    tags: ["definition", "encephalocele", "subject:paediatrics-neonatal"]
  - guid: "1a2b3c4d5e6f7g8h"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Define: spina bifida"
      Back: "Opening in spinal column from failure of closure of bony vertebral arches"
    tags: ["definition", "spina-bifida", "subject:paediatrics-neonatal"]
  - guid: "2b3c4d5e6f7g8h9i"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "List 3 forms of spina bifida"
      Back: "1. Meningomyelocele (meninges and spinal cord protrude); 2. Meningocoele (meninges only protrude); 3. Spina bifida occulta (hidden defect, no protrusion)"
    tags: ["spina-bifida", "types", "subject:paediatrics-neonatal"]
  - guid: "3c4d5e6f7g8h9i0j"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "What role does folic acid play in neural tube closure?"
      Back: "Folic acid is necessary (NB = nota bene/important) for proper closure of the neural tube during 4th week post-conception"
    tags: ["neural-tube-defects", "folic-acid", "subject:paediatrics-neonatal"]
  - guid: "4d5e6f7g8h9i0j1k"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "List genetic/chromosomal causes of neural tube defects"
      Back: "1. Chromosomal abnormalities; 2. Single gene defects; 3. Multifactorial conditions (genes + environmental factors)"
    tags: ["neural-tube-defects", "etiology", "subject:paediatrics-neonatal"]
  - guid: "5e6f7g8h9i0j1k2l"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "How do epilepsy drugs affect neural tube closure?"
      Back: "Epilepsy drugs (anticonvulsants like valproate) antagonize/work against the protective effect of folic acid on neural tube closure"
    tags: ["neural-tube-defects", "teratogens", "subject:paediatrics-neonatal"]
  - guid: "6f7g8h9i0j1k2l3m"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "List environmental factors affecting neural tube development"
      Back: "1. Viral infections; 2. Dietary deficiencies; 3. Toxic exposures; 4. Radiation"
    tags: ["neural-tube-defects", "environmental-factors", "subject:paediatrics-neonatal"]
  - guid: "7g8h9i0j1k2l3m4n"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "What is recurrence risk for neural tube defects in future pregnancies?"
      Back: "3-5% (higher than general population)"
    tags: ["neural-tube-defects", "recurrence-risk", "subject:paediatrics-neonatal"]
  - guid: "8h9i0j1k2l3m4n5o"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "List medical management strategies for neural tube defects"
      Back: "1. Antibiotics for meningitis/UTI prevention; 2. Anticonvulsants for epilepsy and encephalocele-related seizures; 3. Urinary catheterization for neurogenic bladder"
    tags: ["neural-tube-defects", "management", "subject:paediatrics-neonatal"]
  - guid: "9i0j1k2l3m4n5o6p"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "List surgical management of neural tube defects"
      Back: "1. Neurosurgery to close the defect; 2. VP (ventriculoperitoneal) shunt placement for associated hydrocephalus"
    tags: ["neural-tube-defects", "surgery", "subject:paediatrics-neonatal"]
  - guid: "0j1k2l3m4n5o6p7q"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "List rehabilitation for neural tube defects"
      Back: "NDT (Neurorehabilitation/Neurodevelopmental) therapy including: physiotherapy, occupational therapy, speech therapy, audiology"
    tags: ["neural-tube-defects", "rehabilitation", "subject:paediatrics-neonatal"]
  - guid: "1k2l3m4n5o6p7q8r"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "List prevention strategies for neural tube defects"
      Back: "1. Periconceptual folic acid supplementation; 2. Genetic screening and counselling; 3. Food fortification with folic acid; 4. Dietary supplements"
    tags: ["neural-tube-defects", "prevention", "subject:paediatrics-neonatal"]
  - guid: "2l3m4n5o6p7q8r9s"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "List screening methods for neural tube defects during pregnancy"
      Back: "1. Maternal serum screening (FP = first pass screen); 2. Ultrasound screening (18-23 weeks); 3. If AFP elevated but US normal → amniocentesis showing elevated AFP + acetylcholinesterase"
    tags: ["neural-tube-defects", "prenatal-screening", "subject:paediatrics-neonatal"]
  - guid: "3m4n5o6p7q8r9s0t"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Down syndrome karyotype"
      Back: "47,XX or 47,XY,+21 (trisomy 21; three copies of chromosome 21)"
    tags: ["down-syndrome", "karyotype", "subject:paediatrics-neonatal"]
  - guid: "4n5o6p7q8r9s0t1u"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "List general approach to diagnosing birth defects (3 steps)"
      Back: "1. FULL history: birth history, PMHx, social history, FmHx (3-generation pedigree); 2. Assess dysmorphic features; 3. Investigations: karyotyping, gene testing; THEN offer genetic counselling + psychosocial support"
    tags: ["diagnosis", "approach", "subject:paediatrics-neonatal"]
  - guid: "5o6p7q8r9s0t1u2v"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "List treatment modalities for birth defects"
      Back: "1. Medical management; 2. Surgical intervention; 3. Neurorehabilitation/NDT; 4. Genetic counselling and psychosocial support"
    tags: ["treatment", "management", "subject:paediatrics-neonatal"]
  - guid: "6p7q8r9s0t1u2v3w"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "List primary prevention strategies for birth defects"
      Back: "1. Basic reproductive health approaches; 2. Family planning (awareness of advanced maternal age); 3. Periconception care; 4. Improve diet of women of childbearing age; 5. Community education on teratogens; 6. Avoid/treat maternal infections; immunize girls (e.g., rubella); 7. Treat maternal health problems (e.g., diabetes); 8. Avoid teratogenic drugs (warfarin, lithium, anticonvulsants)"
    tags: ["prevention", "strategies", "subject:paediatrics-neonatal"]
  - guid: "7q8r9s0t1u2v3w4x"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Define: genetic screening"
      Back: "Process to identify pregnant women at increased risk of having babies with birth defects; also screens for carrier states"
    tags: ["definition", "genetic-screening", "subject:paediatrics-neonatal"]
  - guid: "8r9s0t1u2v3w4x5y"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "What is periconception screening in genetic counselling?"
      Back: "Screening before pregnancy that allows reproductive choices (e.g., contraception, IVF with PGD, adoption, acceptance of risk)"
    tags: ["genetic-screening", "periconception", "subject:paediatrics-neonatal"]
  - guid: "9s0t1u2v3w4x5y6z"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "What is prenatal screening in genetic counselling?"
      Back: "Screening during pregnancy that allows genetic counselling, diagnosis, and option of termination of pregnancy (TOP) if abnormality detected"
    tags: ["genetic-screening", "prenatal", "subject:paediatrics-neonatal"]
  - guid: "0t1u2v3w4x5y6z7a"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "List prenatal screening methods for birth defects"
      Back: "1. Ultrasound screening; 2. Maternal serum screening; 3. Rhesus blood group screening"
    tags: ["genetic-screening", "prenatal", "subject:paediatrics-neonatal"]
  - guid: "1u2v3w4x5y6z7a8b"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "What is postnatal newborn screening?"
      Back: "Screening of newborns after birth for birth defects (e.g., Down syndrome) and metabolic disorders (e.g., congenital hypothyroidism)"
    tags: ["genetic-screening", "postnatal", "subject:paediatrics-neonatal"]
  - guid: "2v3w4x5y6z7a8b9c"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "List indications for genetic counselling (9 categories)"
      Back: "1. People with birth defect; 2. Parents of fetus/baby/child with birth defect; 3. Unexplained IUD, neonatal or infant death; 4. Family history of birth defect in those planning pregnancy; 5. Consanguinity (related parents); 6. Carriers or at-risk of carrier status; 7. Diagnosis of abnormal fetus on ultrasound; 8. Recurrent miscarriages or bad obstetric history (BOH); 9. Maternal disease (e.g., diabetes); 10. Advanced maternal age (AMA), advanced paternal age (APA), abnormal US screening, positive maternal serum testing"
    tags: ["genetic-counselling", "indications", "subject:paediatrics-neonatal"]
  - guid: "3w4x5y6z7a8b9c0d"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Why is early identification of birth defects important?"
      Back: "Early identification allows best response from treatment, early genetic counselling, and early psychosocial support for family"
    tags: ["diagnosis", "early-identification", "subject:paediatrics-neonatal"]
  - guid: "4x5y6z7a8b9c0d1e"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "When a definite diagnosis cannot be made, what should be provided?"
      Back: "Recognition of disabilities and provision of appropriate treatment; genetic counselling; psychosocial support"
    tags: ["diagnosis", "management", "subject:paediatrics-neonatal"]
  - guid: "5y6z7a8b9c0d1e2f"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "List what genetic history should include (4 components)"
      Back: "1. Birth history; 2. Past medical history (PMHx); 3. Social history; 4. Family history (FmHx) - 3 generations/pedigree"
    tags: ["diagnosis", "history", "subject:paediatrics-neonatal"]
  - guid: "6z7a8b9c0d1e2f3g"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "What are dysmorphic features?"
      Back: "Abnormal physical features or characteristics that may indicate genetic syndrome or birth defect; assessed as part of clinical examination"
    tags: ["definition", "dysmorphology", "subject:paediatrics-neonatal"]
