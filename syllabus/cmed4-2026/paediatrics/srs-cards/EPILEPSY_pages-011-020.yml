    deck: "Corpus::Paediatrics::EPILEPSY"
    fields:
      Front: "What is Carbamazepine indicated for?"
      Back: "1st line for focal seizures and for some generalized epilepsy."
    tags: ["epilepsy", "antiepileptic-drugs", "carbamazepine", "subject:paediatrics"]

