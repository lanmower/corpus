- front: "What is the preferred fibrinolytic agent for STEMI, and why?"
  back: "Tenectoplase is preferred (most effective), followed by alteplase, then streptokinase. However, any fibrinolytic agent given timely is better than nothing. Tenectoplase is most expensive and not always available."
  tags: ["STEMI", "fibrinolytic agents", "treatment"]

- front: "What dual anti-platelet therapy is used in STEMI?"
  back: "Aspirin (chewed tablet for rapid absorption, then 100mg indefinitely) and clopidogrel loading dose 300mg followed by 75mg daily. Dual therapy continues for 1 year; then clopidogrel is stopped but aspirin continues for life."
  tags: ["STEMI", "antiplatelet therapy", "medication"]

- front: "What anti-thrombin agent is preferred in STEMI and why?"
  back: "Enoxaparin is preferred over heparin because it is given subcutaneously (easier administration). Heparin requires continuous IV infusion and needs monitoring, making it more cumbersome."
  tags: ["STEMI", "anticoagulation", "enoxaparin"]

- front: "What is the minimum number of antithrombotic agents given in STEMI?"
  back: "A minimum of 4 antithrombotic agents: fibrinolytic agent + 2 antiplatelet agents (aspirin + clopidogrel) + 1 anticoagulant (enoxaparin or heparin)."
  tags: ["STEMI", "antithrombotic therapy"]

- front: "What is the success rate of primary angioplasty vs fibrinolytic therapy in STEMI?"
  back: "Primary angioplasty leads to 95% vessel opening in skilled hands. Fibrinolytic therapy achieves approximately 64% vessel patency."
  tags: ["STEMI", "angioplasty", "fibrinolysis"]

- front: "What is the timeline for endothelial incorporation of a metal stent?"
  back: "A metal stent is typically incorporated into the vessel wall by the endothelium over 1-3 months."
  tags: ["stent", "vascular biology"]

- front: "What are the main adjunctive therapies in acute STEMI management?"
  back: "Pain relief (morphine or nitrates), high-dose statins (80mg atorvastatin vs 20mg chronically), ACE inhibitors (if EF <40%), beta blockers (if no heart block/bradycardia), oxygen (if saturation <90%), and treatment of comorbidities."
  tags: ["STEMI", "adjunctive therapy"]

- front: "What is a contraindication to fibrinolytic therapy in STEMI?"
  back: "Absolute contraindications include: hemorrhagic or recent stroke (<6 months), brain tumor, recent severe head trauma, major trauma/surgery within 2 weeks, active internal bleeding (peptic ulcer), aortic dissection, pregnancy, or prolonged CPR."
  tags: ["fibrinolysis", "contraindications", "STEMI"]

- front: "What is the impact of uncontrolled hypertension on fibrinolytic eligibility?"
  back: "Severe uncontrolled hypertension is technically a contraindication, but it can be managed by starting IV nitrate infusion to lower BP below 150 systolic, after which fibrinolytic therapy can be safely given."
  tags: ["hypertension", "fibrinolysis"]

- front: "What are the early complications of STEMI related to arrhythmias?"
  back: "Ventricular tachycardia (VT) or ventricular fibrillation (VF) can occur immediately when the vessel occludes and myocytes begin to die. If not treated immediately, this leads to sudden cardiac death."
  tags: ["STEMI", "arrhythmias", "complications"]

- front: "What heart block complications can occur with STEMI?"
  back: "Right coronary or multiple vessel occlusion can cause high-degree heart block (Type 2) or complete heart block, requiring emergency temporary pacemaker insertion."
  tags: ["STEMI", "heart block", "complications"]

- front: "What percentage of left ventricular involvement leads to cardiogenic shock in STEMI?"
  back: "If >40% of the left ventricle is infarcted, left ventricular failure, pulmonary edema, or cardiogenic shock can occur."
  tags: ["STEMI", "cardiogenic shock", "complications"]

- front: "What mechanical complications can occur after STEMI?"
  back: "Acute mitral regurgitation (due to papillary muscle infarction), ventricular septal defect (from full-thickness septal rupture), and cardiac rupture (full-thickness wall rupture)."
  tags: ["STEMI", "mechanical complications"]

- front: "What is the 30-day mortality in untreated STEMI?"
  back: "Untreated STEMI has 30-day mortality of approximately 40%. Fibrinolytic therapy reduces this to ~9%. Early intervention within 1 hour of occlusion reduces mortality to ~1%."
  tags: ["STEMI", "mortality", "prognosis"]

- front: "What is the key difference between non-STEMI and unstable angina regarding myocardial necrosis?"
  back: "In non-STEMI, ischemia is severe enough to cause myocardial necrosis (elevated troponin or creatinine kinase). In unstable angina, there is no biochemical evidence of myocyte necrosis (troponins and CK are negative)."
  tags: ["non-STEMI", "unstable angina", "troponin"]

- front: "What biomarker has most improved the management of coronary artery disease?"
  back: "Troponin is the go-to biomarker that has really altered CAD management. It has replaced creatinine kinase and is more sensitive for detecting myocardial necrosis."
  tags: ["biomarker", "troponin", "diagnosis"]

- front: "How is unstable angina defined in terms of symptom pattern change?"
  back: "Unstable angina means the pattern of angina has changed in the last 60 days: angina becoming more frequent, occurring with less effort (e.g., walking 50m on flat instead of climbing 2 flights of stairs), OR new-onset angina developing for the first time."
  tags: ["unstable angina", "definition"]

- front: "What is the pathophysiology of unstable angina and non-STEMI?"
  back: "Yellow plaque with non-occlusive thrombus; bits of thrombus break off and occlude downstream vessels. The goal is to prevent the non-occlusive thrombus from becoming occlusive and causing infarction."
  tags: ["pathophysiology", "unstable angina", "non-STEMI"]

- front: "What are the three risk categories for non-STEMI?"
  back: "Non-STEMI patients are risk-stratified into high, intermediate, and low risk based on symptoms, physical signs, ECG, and biomarkers. Higher risk correlates with poorer prognosis."
  tags: ["non-STEMI", "risk stratification"]

- front: "What defines high-risk non-STEMI?"
  back: "High-risk non-STEMI includes: angina at rest in preceding 48 hours, hemodynamic instability (tachycardia >100, bradycardia <40, systolic BP <90), evidence of LV dysfunction (third heart sound, crackles, EF <40%), advanced elderly (>75 years), previous MI/angioplasty/bypass, other vascular disease (stroke, peripheral vascular disease), or positive troponins."
  tags: ["non-STEMI", "high-risk"]

- front: "What ECG findings are typically seen in non-STEMI and unstable angina?"
  back: "ECG may be completely normal in both conditions (>30% of patients). When abnormal: ST segment depression, transient ST elevation, bundle branch block, or T-wave inversion may be seen."
  tags: ["ECG", "non-STEMI", "unstable angina"]

- front: "What is the significance of ST segment depression in non-STEMI?"
  back: "ST segment depression strengthens diagnostic confidence for non-STEMI. It indicates ischemia and suggests higher risk, especially when more pronounced."
  tags: ["ECG", "ST depression", "non-STEMI"]

- front: "How is low-risk unstable angina managed?"
  back: "Low-risk unstable angina (nausea pain, normal exam, normal ECG, normal troponins) is not admitted. Patient is treated with aspirin, statin, blood pressure/diabetes management. Risk is reassessed with symptoms and stress testing; additional imaging (angiogram) is decided based on results."
  tags: ["unstable angina", "low-risk", "management"]

- front: "What anti-ischemic therapy is used in high-risk non-STEMI?"
  back: "Nitrates (5-200 mcg depending on pain severity, if systolic BP >100, increased every 3-5 min until symptom relief or BP <100), morphine (1-5mg IV titration), and beta blockers to maintain HR <60 (if no heart block)."
  tags: ["non-STEMI", "anti-ischemic therapy"]

- front: "What dual anti-platelet therapy is used in non-STEMI?"
  back: "Aspirin (whole tablet chewed, then 100mg daily indefinitely) and clopidogrel for minimum 12 months. At 12 months, clopidogrel is stopped but aspirin continues for life."
  tags: ["non-STEMI", "antiplatelet therapy"]

- front: "What is glycoprotein 2B3A receptor antagonist used for in non-STEMI?"
  back: "Glycoprotein 2B3A receptor antagonist is a potent intravenous antiplatelet drug used selectively in the CCU or as bailout during angioplasty/stenting in non-STEMI patients."
  tags: ["non-STEMI", "antiplatelet therapy", "GP IIb/IIIa"]

- front: "What is the troponin timeline in non-STEMI?"
  back: "Troponin levels are checked at admission (may be normal early), then repeated at 3 hours and 6 hours after first patient contact. If non-STEMI, troponin levels rise over time."
  tags: ["non-STEMI", "troponin", "diagnosis"]

- front: "What determines high-risk status in non-STEMI regarding troponins?"
  back: "Positive troponin elevation is a marker of high risk in non-STEMI. These patients proceed to angiography for revascularization."
  tags: ["non-STEMI", "troponin", "risk"]

- front: "How long should serial troponins be checked in low-risk non-STEMI?"
  back: "Serial troponins (3-4 measurements) should all be normal with no further pain or ECG changes to confirm low-risk status. Then stress testing is performed to decide on further imaging or drug therapy."
  tags: ["non-STEMI", "low-risk", "troponin"]

- front: "What is the spectrum of presentation from low to high risk based on chest pain location?"
  back: "Low-risk: very localized anterior chest pain or back/interscapular pain. Higher risk: central chest pain or epigastric pain. Highest risk: anterior chest pain radiating to both arms, epigastrium, throat, jaw, or resuscitated cardiac arrest/cardiogenic shock."
  tags: ["presentation", "symptomatology", "risk"]

- front: "What does troponin negativity at multiple timepoints suggest?"
  back: "Negative troponins at initial check, 3 hours, and 6 hours rules out acute myocardial infarction and may suggest a non-cardiac cause of chest pain."
  tags: ["troponin", "diagnosis", "non-cardiac"]

- front: "What is the management approach when ST elevation is detected on ECG?"
  back: "When ST elevation is detected, it indicates STEMI and is an emergency. Do not wait for troponin levels. Proceed immediately with primary PCI or fibrinolytic therapy with dual antiplatelet therapy."
  tags: ["STEMI", "ST elevation", "emergency"]

- front: "What discharge medications are given to all patients with acute coronary syndrome?"
  back: "All ACS patients receive dual antiplatelet therapy for 1 year (aspirin indefinitely), lipid-lowering therapy, ACE inhibitors if EF <40%, and aggressive risk factor management."
  tags: ["ACS", "discharge", "medications"]
