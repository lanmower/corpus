    deck: "Corpus::Paediatrics::2024 CYANOSIS"
    fields:
      Front: "What are haemoglobinopathies that cause cyanosis?"
      Back: |
        1. Methaemoglobinaemia: congenital or secondary to toxin exposure
        2. Sulphaemoglobaemia: secondary to toxin
    tags: ["haemoglobinopathy", "cyanosis-causes", "subject:paediatrics"]

  - guid: "g8f4d3c0b6e2a1h7"
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 CYANOSIS"
    fields:
      Front: "What is methaemoglobinaemia?"
      Back: |
        An abnormal haemoglobin derivative that causes cyanosis.
        Can be either congenital or secondary to toxin exposure.
    tags: ["methaemoglobinaemia", "haemoglobinopathy", "subject:paediatrics"]

  - guid: "h9g5e4d1c7f3b2i8"
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 CYANOSIS"
    fields:
      Front: "What is sulphaemoglobaemia?"
      Back: |
        An abnormal haemoglobin derivative that causes cyanosis.
        It occurs secondary to toxin exposure.
    tags: ["sulphaemoglobaemia", "haemoglobinopathy", "subject:paediatrics"]

  - guid: "i0h6f5e2d8a4c3j9"
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 CYANOSIS"
    fields:
      Front: "What does the COLD mnemonic represent for causes of peripheral cyanosis?"
      Back: |
        C - Cold
        O - Obstruction
        L - LVF and shock
        D - Decreased cardiac output
    tags: ["cold-mnemonic", "peripheral-cyanosis", "causes", "subject:paediatrics"]

  - guid: "j1i7a6f3e9b5d4k0"
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 CYANOSIS"
    fields:
      Front: "What are the causes of peripheral cyanosis?"
      Back: |
        C - Cold (peripheral vasoconstriction)
        O - Obstruction (to blood flow)
        L - LVF (Left ventricular failure) and shock
        D - Decreased cardiac output
    tags: ["peripheral-cyanosis", "causes", "subject:paediatrics"]

  - guid: "k2j8b7a4f0c6e5l1"
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 CYANOSIS"
    fields:
      Front: "How does haemoglobin concentration affect the detection of cyanosis?"
      Back: |
        Cyanosis from haemoglobin concentration is more apparent at high levels of saturation (high haemoglobin levels make cyanosis easier to detect).
    tags: ["haemoglobin", "detection-factors", "subject:paediatrics"]

  - guid: "l3k9c8b5a1d7f6m2"
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 CYANOSIS"
    fields:
      Front: "How does fetal haemoglobin affect the detection of cyanosis?"
      Back: |
        Cyanosis related to fetal haemoglobin is more apparent at low levels of saturation.
    tags: ["fetal-haemoglobin", "detection-factors", "subject:paediatrics"]

  - guid: "m4l0d9c6b2e8a7n3"
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 CYANOSIS"
    fields:
      Front: "How does skin pigmentation affect the detection of cyanosis?"
      Back: |
        Cyanosis is less apparent in patients with darker pigmentation, making detection more difficult in darker-skinned individuals.
    tags: ["skin-pigmentation", "detection-factors", "subject:paediatrics"]

  - guid: "n5m1e0d7c3f9b8o4"
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 CYANOSIS"
    fields:
      Front: "List all factors affecting the detection of cyanosis"
      Back: |
        1. Haemoglobin concentration: more apparent at high levels of saturation
        2. Fetal haemoglobin: more apparent at low levels of saturation
        3. Skin pigmentation: less apparent in patients with darker pigmentation
    tags: ["detection-factors", "cyanosis", "subject:paediatrics"]

  - guid: "o6n2f1e8d4a0c9p5"
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 CYANOSIS"
    fields:
      Front: "What investigations should be performed in a cyanotic patient?"
      Back: |
        1. Saturation monitor
        2. Hemoglobin or hematocrit
        3. Arterial blood gas
        4. Hyperoxia test
        5. Septic screen
        6. Electrocardiogram (ECG)
        7. Echocardiography
        8. Haemoglobin electrophoresis
    tags: ["investigations", "diagnostic-workup", "subject:paediatrics"]

  - guid: "p7o3a2f9e5b1d0q6"
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 CYANOSIS"
    fields:
      Front: "What does a saturation monitor measure?"
      Back: |
        A saturation monitor measures oxygen saturation (SO₂) - the percentage of haemoglobin that is oxygenated.
        Used to assess the presence and degree of hypoxemia in cyanotic patients.
    tags: ["saturation-monitor", "investigation", "subject:paediatrics"]

  - guid: "q8p4b3a0f6e7c1r7"
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 CYANOSIS"
    fields:
      Front: "What does haemoglobin or hematocrit measurement assess?"
      Back: |
        Measures the total haemoglobin concentration and red blood cell volume.
        Important because higher haemoglobin concentrations increase the likelihood of detecting cyanosis.
    tags: ["haemoglobin", "hematocrit", "investigation", "subject:paediatrics"]

  - guid: "r9q5c4b1a7f8d2s8"
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 CYANOSIS"
    fields:
      Front: "What is an arterial blood gas (ABG) test?"
      Back: |
        Measures:
        - Partial pressure of oxygen (PaO₂)
        - Partial pressure of carbon dioxide (PaCO₂)
        - pH
        - Oxygen saturation (SaO₂)
        - Bicarbonate levels
        Essential for determining the cause of cyanosis (respiratory vs. cardiac vs. other).
    tags: ["arterial-blood-gas", "investigation", "subject:paediatrics"]

  - guid: "s0r6d5c2b8a9e3t9"
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 CYANOSIS"
    fields:
      Front: "What is the hyperoxia test?"
      Back: |
        A test that helps differentiate between cardiac and pulmonary causes of cyanosis.
        Patient is given high-concentration oxygen.
        If oxygen saturation improves significantly, the cause is likely pulmonary; if not, cardiac cause is likely.
    tags: ["hyperoxia-test", "investigation", "differential-diagnosis", "subject:paediatrics"]

  - guid: "t1s7e6d3c9b0f4u0"
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 CYANOSIS"
    fields:
      Front: "What is a septic screen?"
      Back: |
        Investigations to rule out infection as a cause of cyanosis.
        Includes blood cultures, complete blood count, and other tests to detect systemic infection.
    tags: ["septic-screen", "investigation", "infection", "subject:paediatrics"]

  - guid: "u2t8f7e4a0c1b5v1"
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 CYANOSIS"
    fields:
      Front: "What does electrocardiography (ECG) assess in cyanotic patients?"
      Back: |
        Assesses:
        - Cardiac rhythm
        - Electrical conduction
        - Evidence of chamber enlargement or ischemia
        - Helps identify cardiac causes of cyanosis
    tags: ["electrocardiogram", "ecg", "cardiac-assessment", "subject:paediatrics"]

  - guid: "v3u9a8f5b1d2c6w2"
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 CYANOSIS"
    fields:
      Front: "What does echocardiography assess?"
      Back: |
        An ultrasound examination of the heart that visualizes:
        - Heart structure
        - Valve function
        - Blood flow patterns
        - Chamber size and function
        - Helps identify structural cardiac causes of cyanosis
    tags: ["echocardiography", "cardiac-imaging", "subject:paediatrics"]

  - guid: "w4v0b9a6c2e3d7x3"
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 CYANOSIS"
    fields:
      Front: "What does haemoglobin electrophoresis detect?"
      Back: |
        Separates and identifies different types of haemoglobin.
        Used to diagnose haemoglobinopathies such as:
        - Methaemoglobinaemia
        - Sulphaemoglobinaemia
        - Other abnormal haemoglobin variants
    tags: ["haemoglobin-electrophoresis", "investigation", "haemoglobinopathy", "subject:paediatrics"]

  - guid: "x5w1c0b7d3f4e8y4"
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 CYANOSIS"
    fields:
      Front: "What is the management of cyanosis?"
      Back: |
        1. Treat the underlying cause (address the primary condition)
        2. Optimize oxygenation (supplemental oxygen, ventilation if needed)
        3. Symptomatic management (supportive care)
    tags: ["management", "treatment", "subject:paediatrics"]

  - guid: "y6x2d1c8e4a5f9z5"
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 CYANOSIS"
    fields:
      Front: "What is the primary approach to treating cyanosis?"
      Back: |
        Treat the underlying cause - address the specific pathology causing the cyanosis (whether pulmonary, cardiac, or haemoglobinopathy).
    tags: ["management", "underlying-cause", "subject:paediatrics"]

