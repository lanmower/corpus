- id: card-01
  front: "What do the INR and albumin indicate about liver function?"
  back: |
    INR and albumin indicate the synthetic function of the liver. These are better markers of liver function than transaminases (ALT, AST) or alkaline phosphatase, which indicate where injury may be located (hepatic vs cholestatic) rather than overall function.

- id: card-02
  front: "How do you interpret liver function tests (LFT)?"
  back: |
    When interpreting LFT, classify the pattern into three groups: hepatitic (predominant ALT/AST elevation indicating cellular destruction), cholestatic (alkaline phosphatase elevation), or mixed. Use the degree of enzyme elevation to distinguish between these patterns.

- id: card-03
  front: "What is the R-value and what is its primary use?"
  back: |
    The R-value is a formula used to classify patients into cholestatic vs hepatitic patterns of LFT. Originally developed primarily for drug-induced liver injury research, but is increasingly being used clinically for various etiologies.

- id: card-04
  front: "What imaging modalities are available for evaluating jaundice?"
  back: |
    Transabdominal ultrasound is the standard starting point. Additional modalities include CT scan, endoscopic ultrasound (EUS), magnetic resonance cholangiopancreatogram (MRCP), ERCP (performed with therapeutic intent), and sometimes liver biopsy for specific diagnoses like autoimmune hepatitis.

- id: card-05
  front: "Why is ERCP only performed with therapeutic intent?"
  back: |
    ERCP carries significant risks including acute pancreatitis, bowel injury, and hemorrhage. It is not routinely used for diagnosis alone but rather when intervention is needed, such as stent placement for strictures or stone extraction.

- id: card-06
  front: "What is fibroscan and what techniques does it use?"
  back: |
    Fibroscan is an ultrasound-based technique that assesses organ stiffness to determine if a patient is progressing toward cirrhosis. Uses vibration-controlled elastography or shear wave elastography. Increasingly standard in liver disease management.

- id: card-07
  front: "What does cholestasis mean in terms of lab findings?"
  back: |
    Cholestasis means an increase in alkaline phosphatase and gamma-glutamyl transferase, with or without an increase in bilirubin. Cholestasis can exist without jaundice if bilirubin is not elevated.

- id: card-08
  front: "What is the key distinction between intrahepatic and extrahepatic cholestasis?"
  back: |
    Intrahepatic cholestasis: obstruction at the level of the liver parenchyma, not visible on imaging (ultrasound/CT). Extrahepatic cholestasis: obstruction in the bile duct system outside the liver, typically shows bile duct dilatation on imaging.

- id: card-09
  front: "What are causes of acute hepatic jaundice?"
  back: |
    Causes include viral hepatitis, drug-induced liver injury, alcohol, autoimmune hepatitis, aminita (death cap mushroom), Wilson's disease (copper overload from ATP-7B gene mutation), and hemolytic causes.

- id: card-10
  front: "Why are Wilson's disease and hereditary hemochromatosis important to diagnose?"
  back: |
    These are among the few etiologies of jaundice that are reversible or can be stabilized with treatment if diagnosed early. Wilson's disease involves copper overload; hemochromatosis involves iron overload.

- id: card-11
  front: "What causes of chronic hepatic jaundice should be considered?"
  back: |
    Cirrhosis from various etiologies, non-alcoholic fatty liver disease (NAFLD, now called steatotic liver disease), alpha-1 antitrypsin deficiency, large tumor burden in liver, hepatic ischemia from hepatic vein or IVC occlusion (Budd-Chiari syndrome).

- id: card-12
  front: "What are causes of intrahepatic cholestasis?"
  back: |
    Include primary sclerosing cholangitis (PSC), AIDS-cholangiopathy, drug-induced liver injury, progressive familial intrahepatic cholestasis, benign recurrent intrahepatic cholestasis, infiltrative etiologies (granulomas, sarcoid, tumors), and primary biliary cholangitis.

- id: card-13
  front: "What infiltrative etiologies can cause intrahepatic cholestasis?"
  back: |
    Granulomas from tuberculosis or sarcoidosis, and tumors (either primary hepatic tumors or secondary spread from lymphoma, colorectal cancer). These cause cholestasis by infiltrating the liver parenchyma with focal lesions.

- id: card-14
  front: "What are causes of extrahepatic cholestasis?"
  back: |
    Include strictures (benign or malignant), PSC strictures, pancreatic cancer, chronic pancreatitis, choledocholithiasis (bile duct stones), lymph nodes obstructing bile ducts, ascaris worms (rare), and iatrogenic bile duct injury during gallbladder surgery.

- id: card-15
  front: "What imaging findings indicate extrahepatic cholestasis?"
  back: |
    Bile duct dilatation is the classic sign. Specific lesions include stones (hyperechoic with acoustic shadowing on ultrasound), strictures, and masses. Absence of dilatation does not exclude obstruction, especially with small lesions or early/shifting stones.

- id: card-16
  front: "What are the features of primary sclerosing cholangitis (PSC) on imaging?"
  back: |
    Characteristic "onion skin" ring fibrosis pattern on histology. Imaging shows irregular stricturing of intrahepatic bile ducts. Can affect intrahepatic and/or extrahepatic bile ducts. Multiple irregular areas of stricturing with focal dilation (beaded appearance).

- id: card-17
  front: "Why is MRCP sufficient for PSC diagnosis?"
  back: |
    MRCP provides excellent visualization of the bile duct anatomy and is sufficient for PSC diagnosis. ERCP is reserved for therapeutic interventions like stricture ballooning, as it adds unnecessary procedural risk without additional diagnostic benefit.

- id: card-18
  front: "What systemic signs can accompany primary biliary cholangitis and PSC?"
  back: |
    Xanthomas and xanthelasmas can be seen in patients with long-standing cholestasis. Malabsorption of fat-soluble vitamins may occur due to impaired bile flow.

- id: card-19
  front: "What scoring systems assess hepatic function and cirrhosis severity?"
  back: |
    Child-Pugh score assesses liver synthetic function and includes INR, albumin, and bilirubin. MELD score (Model for End-stage Liver Disease) is more commonly used to stratify patients for transplant listing and assess severity of hepatic dysfunction.

- id: card-20
  front: "What is the systematic approach to a patient with jaundice?"
  back: |
    Collection: gather history, examination findings, and appropriate investigations. Analysis: reflect on data, consider anatomy, physiology, and likely pathology. Synthesis: determine the most likely cause (clinical assessment). Action: proceed with definitive investigation (MRCP, biopsy) or treatment as indicated.
