    fields:
      Front: "Why are children not dosed as small adults in paediatric prescribing?"
      Back: |
        Children differ due to: immaturity of liver and kidney (low clearance, less efficient drug metabolism), higher percentage body water (larger apparent volume of distribution), low level of water-soluble drugs
    tags: ["prescribing", "paediatric-physiology", "subject:paediatrics"]
