    deck: "Corpus::Paediatrics::2022 Neonatal infections"
    fields:
      Front: "What is the first-line antimicrobial therapy for suspected neonatal sepsis?"
      Back: "Penicillin with or without aminoglycoside"
    tags: ["antimicrobial", "management", "subject:paediatrics"]
