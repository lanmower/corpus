deck: "Corpus::Paediatrics-Neonatal::Assess feeding and Counselling"
notes:
  - guid: "attach-signs-4-good"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Assess feeding and Counselling"
    fields:
      Front: "List the four signs of good attachment at the breast"
      Back: "1. Mouth covers areola (not just nipple)\n2. Lips are flanged/everted outward\n3. Chin touching the breast\n4. Cheeks are full and rounded (not drawn in)"
    tags: ["attachment", "latch", "breastfeeding-technique", "subject:paediatrics-neonatal", "supplement"]
  - guid: "suckle-signs-effect"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Assess feeding and Counselling"
    fields:
      Front: "List the signs of effective suckling/milk transfer"
      Back: "1. Audible swallows (1-2 per suck)\n2. Milk visible at corners of mouth\n3. Slow, deep sucks with jaw movement\n4. Regular breathing pattern (not gasping)\n5. Baby relaxed at end of feed"
    tags: ["suckling", "milk-transfer", "breastfeeding-technique", "subject:paediatrics-neonatal", "supplement"]
  - guid: "feed-volumes-days-1"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Assess feeding and Counselling"
    fields:
      Front: "What are the recommended milk volumes for neonates from day 1 to day 5?"
      Back: "Day 1: 10 ml per feed\nDay 2: 20 ml per feed\nDay 3: 30 ml per feed\nDay 4: 40 ml per feed\nDay 5+: 60-80 ml per feed (or 150-200 ml/kg/day total)"
    tags: ["feed-volumes", "replacement-feeding", "subject:paediatrics-neonatal", "supplement"]
  - guid: "growth-chart-how"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Assess feeding and Counselling"
    fields:
      Front: "How should growth charts be interpreted in neonates?"
      Back: "Plot daily or weekly weight. Look for:\n1. Weight loss >10% = inadequate intake\n2. Weight loss <10% = normal, expected recovery in 7-14 days\n3. After regaining birth weight: minimum gain 10 g/kg/day (preterm) or 20 g/kg/day (term)\n4. Crossing percentiles downward = faltering growth, investigate cause"
    tags: ["growth-chart", "weight-gain", "assessment", "subject:paediatrics-neonatal", "supplement"]
  - guid: "counsel-apac-framework"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Assess feeding and Counselling"
    fields:
      Front: "What does the APAC counselling framework stand for?"
      Back: "A - ASK (listen to mother's concerns, understand her perspective)\nP - PRAISE (acknowledge her efforts and strengths)\nA - ADVISE (provide information and recommendations)\nC - CHECK (confirm understanding and plan together)"
    tags: ["counselling", "communication", "subject:paediatrics-neonatal", "supplement"]
  - guid: "engorgement-manage"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Assess feeding and Counselling"
    fields:
      Front: "How should breast engorgement be managed?"
      Back: "1. Frequent feeding (8+ times daily)\n2. Warm compresses before feed to improve milk flow\n3. Hand expression or gentle massage to soften areola\n4. Cold compresses between feeds to reduce swelling\n5. Proper positioning and attachment to ensure complete emptying\n6. Analgesics if needed"
    tags: ["breastfeeding-problems", "engorgement", "subject:paediatrics-neonatal", "supplement"]
  - guid: "mastitis-manage"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Assess feeding and Counselling"
    fields:
      Front: "How should mastitis (breast infection) be managed?"
      Back: "1. Continue breastfeeding on affected breast (safe for baby)\n2. Frequent feeds to empty breast completely\n3. Warm compresses and gentle massage before feeds\n4. Antibiotics (appropriate to breastfeeding: flucloxacillin, cephalexin)\n5. Analgesics (paracetamol or ibuprofen)\n6. Bed rest, adequate hydration\n7. Ensure correct positioning and attachment to prevent recurrence"
    tags: ["breastfeeding-problems", "mastitis", "infection", "subject:paediatrics-neonatal", "supplement"]
  - guid: "nipple-inverted-flat"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Assess feeding and Counselling"
    fields:
      Front: "How should inverted or flat nipples be managed during breastfeeding?"
      Back: "1. Nipple shields (temporary aid to enable direct breastfeeding)\n2. Hand expression to draw out the nipple before attachment\n3. Use breast pump briefly before feed to evert nipple\n4. Frequent feeding to maintain milk supply\n5. Positional techniques (baby may attach better in football hold)\n6. Ensure good attachment despite nipple shape\n7. Consider expressing and feeding expressed milk if breastfeeding impossible"
    tags: ["breastfeeding-problems", "nipple-issues", "subject:paediatrics-neonatal", "supplement"]
  - guid: "cracked-sore-nipp"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Assess feeding and Counselling"
    fields:
      Front: "How should cracked or sore nipples be managed?"
      Back: "1. Correct attachment (main cause is poor latch)\n2. Vary feeding position (different pressure points)\n3. Express milk manually to soften areola before feed\n4. Lanolin or expressed breast milk to nipples after feed\n5. Air drying between feeds\n6. Breast shells to prevent clothing friction\n7. Continue breastfeeding (pain reduces as healing occurs)\n8. If too painful: express and cup-feed until healed"
    tags: ["breastfeeding-problems", "nipple-damage", "subject:paediatrics-neonatal", "supplement"]
  - guid: "low-supply-manage"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Assess feeding and Counselling"
    fields:
      Front: "How should insufficient milk supply be managed?"
      Back: "1. Increase feeding frequency to 8-12 times daily\n2. Ensure correct attachment and milk transfer\n3. Drain breasts completely at each feed\n4. Alternate breasts multiple times per feed\n5. Hand expression after feeds to improve emptying\n6. Assess for tongue tie in baby\n7. Check for underlying health issues (maternal infection, thyroid, stress)\n8. Consider galactagogues (fenugreek, blessed thistle) with support\n9. Maintain maternal nutrition and hydration"
    tags: ["breastfeeding-problems", "low-milk-supply", "subject:paediatrics-neonatal", "supplement"]
  - guid: "tongue-tie-manage"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Assess feeding and Counselling"
    fields:
      Front: "How should tongue tie in a baby be managed during breastfeeding?"
      Back: "1. Diagnose: assess if frenulum restricts tongue movement\n2. Positioning: use football hold or other positions to improve latch\n3. Hand expression: provide milk to baby if breastfeeding ineffective\n4. Refer for frenulotomy (frenotomy) if:\n   - Breastfeeding unsuccessful despite support\n   - Baby unable to feed effectively\n   - Mother experiencing pain/damage\n5. After frenulotomy: reassess latch and continue breastfeeding\n6. May see immediate improvement or need repositioning support"
    tags: ["breastfeeding-problems", "tongue-tie", "anatomical", "subject:paediatrics-neonatal", "supplement"]
  - guid: "hand-express-technique"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Assess feeding and Counselling"
    fields:
      Front: "Describe the correct technique for hand expression of breast milk"
      Back: "1. Wash hands thoroughly\n2. Warm compress or shower to stimulate letdown\n3. Cup breast in hand, fingers below, thumb above at edge of areola\n4. Press breast tissue gently against chest wall\n5. Roll thumb and fingers forward (compress and express simultaneously)\n6. Release, then repeat in rhythmic pattern\n7. Rotate position around breast to empty all quadrants\n8. Express for 5-10 minutes or until flow slows\n9. Collect milk in sterile cup/bottle"
    tags: ["expressing", "milk-collection", "subject:paediatrics-neonatal", "supplement"]
  - guid: "positioning-criteria"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Assess feeding and Counselling"
    fields:
      Front: "What are the key positioning criteria for successful breastfeeding?"
      Back: "1. Baby's head and body in straight line (not twisted)\n2. Baby's face close to breast (nose level with nipple)\n3. Mother's back supported\n4. Baby's whole body supported (not just head)\n5. Mother and baby skin-to-skin contact if possible\n6. Baby's mouth brought to breast (not breast to baby)\n7. Baby's body turned toward mother (chest-to-chest)\n8. Comfortable for mother (no pain, no tension)"
    tags: ["positioning", "breastfeeding-technique", "subject:paediatrics-neonatal", "supplement"]
