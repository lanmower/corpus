  - guid: "c3d4e5f6g7h8i9j0"
    noteType: Basic
    deck: "Corpus::Paediatrics::2021 AIRWAY AND BREATHING"
    fields:
      Front: "What are the three components of assessing if a child is breathing (Look-Listen-Feel)?"
      Back: "LOOK - Look to see if the chest is moving or if the child is active, talking or crying\nLISTEN - Listen for any breath sounds\nFEEL - Feel for breath at the nose or mouth"
    tags: ["breathing-assessment", "look-listen-feel", "airway", "subject:paediatrics"]
  - guid: "d4e5f6g7h8i9j0k1"
    noteType: Basic
    deck: "Corpus::Paediatrics::2021 AIRWAY AND BREATHING"
    fields:
      Front: "What are the three airway obstruction sounds and what do they indicate?"
      Back: "Gurgling - Pooled secretions or blood in airway\nSnoring (Stertor) - Soft palate obstruction\nStridor - Harsh sound indicating upper airway obstruction from airway narrowing"
    tags: ["airway-obstruction", "breath-sounds", "assessment", "subject:paediatrics"]
  - guid: "e5f6g7h8i9j0k1l2"
    noteType: Basic
    deck: "Corpus::Paediatrics::2021 AIRWAY AND BREATHING"
    fields:
      Front: "What are the signs of respiratory distress in a child?"
      Back: "Increased work of breathing\nChild tired and distressed\nFast breathing (respiratory rate measured in breaths per minute)\nDifficulty talking, eating, or breastfeeding\nSevere chest wall indrawing\nShort grunting noise on breathing\nHead nodding with every respiration"
    tags: ["respiratory-distress", "breathing-assessment", "emergency-signs", "subject:paediatrics"]
  - guid: "f6g7h8i9j0k1l2m3"
    noteType: Basic
    deck: "Corpus::Paediatrics::2021 AIRWAY AND BREATHING"
    fields:
      Front: "What is central cyanosis and how is it assessed?"
      Back: "Abnormally low level of oxygen in the blood causing bluish/purplish discoloration of the tongue, inside mouth, and skin. Can occur with severe anaemia. Assessed by looking at the mouth and tongue. O2 saturation <92% indicates low oxygen and emergency."
    tags: ["cyanosis", "oxygenation", "assessment", "subject:paediatrics"]
  - guid: "g7h8i9j0k1l2m3n4"
    noteType: Basic
    deck: "Corpus::Paediatrics::2021 AIRWAY AND BREATHING"
    fields:
      Front: "What is the critical difference in head positioning for airway opening between infants and older children?"
      Back: "INFANTS: Upper airways easily obstructed due to small diameter and soft windpipe. Head should be in neutral position with nose up. Do NOT use excessive backward head tilt as it can compress and narrow the windpipe.\n\nOLDER CHILDREN: Can use head tilt like adults. Place hand on forehead and apply light pressure for slight tilt.\n\nBOTH: Always check for trauma first before tilting or moving head."
    tags: ["airway-management", "head-positioning", "infant-care", "subject:paediatrics"]
  - guid: "h8i9j0k1l2m3n4o5"
    noteType: Basic
    deck: "Corpus::Paediatrics::2021 AIRWAY AND BREATHING"
    fields:
      Front: "Why are infants' airways particularly vulnerable to obstruction?"
      Back: "Infants have small diameter airways and the windpipe is soft and can be compressed and narrowed if excessive backward head tilt is applied. This makes them prone to obstruction compared to older children."
    tags: ["infant-anatomy", "airway-obstruction-risk", "developmental", "subject:paediatrics"]
  - guid: "i9j0k1l2m3n4o5p6"
    noteType: Basic
    deck: "Corpus::Paediatrics::2021 AIRWAY AND BREATHING"
    fields:
      Front: "What is croup and what sounds does it cause?"
      Back: "Croup is a common infectious cause of upper airway obstruction. It produces stridor - a harsh sound on breathing that indicates upper airway obstruction from airway narrowing."
    tags: ["croup", "upper-airway-obstruction", "infectious-disease", "subject:paediatrics"]
  - guid: "j0k1l2m3n4o5p6q7"
    noteType: Basic
    deck: "Corpus::Paediatrics::2021 AIRWAY AND BREATHING"
    fields:
      Front: "What common foreign bodies can lodge in the upper airway and what history should be taken?"
      Back: "Coins and peanuts are common foreign bodies that can lodge in the upper airway. A good history should be taken to assess for aspiration risk. Foreign body aspiration is an emergency and expects respiratory failure - may be obstructive type, central type, or tiredness with pneumonia."
    tags: ["foreign-body", "airway-obstruction", "emergency", "subject:paediatrics"]
