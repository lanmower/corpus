      Back: "Poor feeding"
    tags: ["hyponatraemia", "clinical-signs", "subject:paediatrics-neonatal"]
  - guid: "hyponatrem007abc"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::NEONATAL JAUNDICE"
    fields:
