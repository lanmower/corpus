notes:
  - guid: 2a5f9c1e7b3d4a8c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What is the role of CD4 Th cells in TB infection?"
      Back: "CD4 Th cells secrete interferon gamma, causing activation of macrophages into true killer cells, formation of reactive nitrogen intermediates, and epithelioid granuloma formation in clearance of mycobacterium."
    tags: ["immunity", "cellular-immunity", "subject:paediatrics"]
  - guid: 7c4a1f9e5b2d3a8c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What is the role of CD8+ T suppressor cells in TB granuloma formation?"
      Back: "CD8+ T suppressor cells kill macrophages that are infected, leading to caseating granuloma formation (delayed hypersensitivity reaction)."
    tags: ["immunity", "cellular-immunity", "subject:paediatrics"]
  - guid: 3e8b2c1a9f5d4a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "Why can granulomas be paradoxical in TB control?"
      Back: "While granulomas are acidic, anaerobic, extracellular environments that inhibit MTB growth, they can also cause tissue damage if they fail to contain the disease, leading to spread and further tissue destruction."
    tags: ["pathophysiology", "granuloma", "subject:paediatrics"]
  - guid: 1a7f4d5c2e9b3a8c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What X-ray finding indicates controlled primary TB infection?"
      Back: "Calcified scar in the lung parenchyma and/or hilar lymph nodes (Ghon focus/complex) indicating controlled and retained non-proliferating Mycobacterium."
    tags: ["imaging", "primary-infection", "subject:paediatrics"]
  - guid: 8d2a5e1c9f3b4a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What is the TST (Tuberculin Skin Test) reading timeframe?"
      Back: "The TST is read after 48-72 hours."
    tags: ["diagnosis", "tst", "interpretation", "subject:paediatrics"]
  - guid: 4c9b1f3e7a5d2a8c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What does a positive TST indicate?"
      Back: "A positive TST indicates TB infection (not necessarily TB disease). It measures hypersensitivity to tuberculin purified protein derivative (PPD)."
    tags: ["diagnosis", "tst", "interpretation", "subject:paediatrics"]
  - guid: 2f8a4c1b9e5d3a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What does a positive TST signify in children <5 years or HIV-infected children?"
      Back: "In children <5 years or HIV-infected children, a positive TST indicates recent infection and is a risk factor for progression to active TB disease."
    tags: ["diagnosis", "tst", "risk-factors", "subject:paediatrics"]
  - guid: 5a1e7c3f9b2d4a8c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What conditions can cause a false negative TST?"
      Back: "HIV infection, malnutrition, severe viral infections (measles, chicken pox), cancer, immunosuppressive drugs (steroids), severe disseminated TB, and recent TB exposure (2-3 months conversion window period)."
    tags: ["diagnosis", "tst", "false-negative", "subject:paediatrics"]
  - guid: 9c3b2a5f7e1d4a8c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "How should a positive TST be interpreted in endemic countries after BCG vaccine?"
      Back: "In endemic countries, a positive TST post BCG vaccine should be interpreted as indicative of TB infection, especially in very young and immunocompromised children."
    tags: ["diagnosis", "tst", "bcg", "interpretation", "subject:paediatrics"]
  - guid: 6d5a1e9f7c2b4a3c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What is BCG vaccine derived from?"
      Back: "BCG vaccine is a live attenuated vaccine derived from Mycobacterium bovis."
    tags: ["immunization", "bcg", "vaccine-types", "subject:paediatrics"]
  - guid: 3f1c8a5b9e2d4a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "When is BCG vaccine given and to whom?"
      Back: "BCG vaccine is given to all neonates at birth via intradermal injection, except to symptomatic HIV-exposed neonates."
    tags: ["immunization", "bcg", "administration", "subject:paediatrics"]
  - guid: 7a9f3c1b5e2d4a8c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What protection does BCG provide in TB-endemic countries?"
      Back: "BCG provides children with a degree of protection against disseminated and severe forms of TB (TB meningitis and miliary TB)."
    tags: ["immunization", "bcg", "protection", "subject:paediatrics"]
  - guid: 1e4c9a2f8b5d3a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "Should asymptomatic HIV-exposed babies receive BCG vaccine?"
      Back: "Yes. Due to high TB burden, it is recommended that routine BCG vaccination be given at birth to asymptomatic HIV-exposed babies, but they must be monitored closely for BCG-related adverse events."
    tags: ["immunization", "bcg", "hiv", "subject:paediatrics"]
  - guid: 4b7d2c1f9a5e3a8c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "List the danger signs requiring urgent hospital referral for TB."
      Back: "Severe respiratory distress (TB pneumonia), severe wheezing not responding to bronchodilators (severe airway compression), signs/symptoms of meningism and seizures (TBM), hepatosplenomegaly (disseminated TB), breathlessness and peripheral edema (pericardial effusion), severe pulmonary disease and malnutrition, distended abdomen with/without ascites (TB abdomen), and angulation of the spine gibbous (TB spine)."
    tags: ["emergency", "danger-signs", "complications", "subject:paediatrics"]
  - guid: 8a1f5c3e9b2d4a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "Why is TB diagnosis more complex in HIV-infected children?"
      Back: "TB disease diagnosis is indistinguishable from other HIV-related lung diseases, symptoms such as chronic cough, weight loss, and persistent fever are common to both, and TST is frequently negative."
    tags: ["hiv-coinfection", "diagnosis", "subject:paediatrics"]
  - guid: 2c8e3a1f9b5d4a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "List the differential diagnoses of pulmonary TB in HIV-infected children."
      Back: "Bacterial pneumonia, viral pneumonia, fungal lung disease, pneumocystis jiroveci pneumonia, pulmonary lymphoma, Kaposi's sarcoma, and lymphoid interstitial pneumonia (LIP)."
    tags: ["hiv-coinfection", "diagnosis", "differential-diagnosis", "subject:paediatrics"]
  - guid: 5f1a9c3b7e2d4a8c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What are the distinctive features of LIP (lymphoid interstitial pneumonia)?"
      Back: "LIP is distinguished by clubbing, parotid enlargement, and generalized lymphadenopathy."
    tags: ["hiv-coinfection", "lung-disease", "subject:paediatrics"]
  - guid: 7e2d4a1f9c5b3a8c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "In what scenarios can children be clinically diagnosed with TB without bacteriological confirmation?"
      Back: "Chest X-ray abnormalities consistent with active TB, clinical picture only (empiric treatment), histological and biochemical tests suggestive of TB, or a combination of the above due to paucibacillary nature of TB in children."
    tags: ["diagnosis", "clinical-diagnosis", "subject:paediatrics"]
  - guid: 3a5f8c1e9b2d4a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What is the most common radiological finding of TB in children?"
      Back: "An enlarged hilar region (lateral CXR is useful to detect hilar adenopathy, doughnut sign)."
    tags: ["imaging", "chest-xray", "subject:paediatrics"]
  - guid: 9c1e5a3f8b2d4a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What radiological findings indicate airway compression by enlarged lymph glands?"
      Back: "Ball valve effect (segmental/lobar hyperinflation) or complete airway obstruction (lobar collapse)."
    tags: ["imaging", "chest-xray", "complications", "subject:paediatrics"]
  - guid: 4d2b7a1f9e5c3a8c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What radiological appearance indicates miliary TB?"
      Back: "Acute dissemination causes widespread fine millet-sized (1-2 mm) lesions with a 'millet seed' appearance."
    tags: ["imaging", "chest-xray", "miliary-tb", "subject:paediatrics"]
  - guid: 1f9a4c3e8b5d2a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "In what age group do pleural effusions occur in TB?"
      Back: "Pleural effusions may occur in children older than 6 years."
    tags: ["imaging", "chest-xray", "pleural-tb", "subject:paediatrics"]
  - guid: 6a2f8c1e5b9d3a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What radiological finding should not be misinterpreted as widened mediastinum in children?"
      Back: "Widened mediastinum secondary to thymus (sail sign) should not be misinterpreted as mediastinal widening due to TB lymph nodes."
    tags: ["imaging", "chest-xray", "normal-variants", "subject:paediatrics"]
  - guid: 8e3a1f5c9b2d4a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "Why is sputum collection challenging in young children with TB?"
      Back: "In children <8 years, sputum is usually smear negative (paucibacillary), lung cavities are rare, and adequate sputum sample collection is difficult."
    tags: ["diagnosis", "bacteriology", "sputum", "subject:paediatrics"]
  - guid: 2c7b4a1f9e5d3a8c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "How many sputum samples should be collected for optimal TB diagnosis?"
      Back: "At least 2 sputum samples on 2 consecutive days should be collected, as the probability of a positive sputum increases with >1 sputum sample collection."
    tags: ["diagnosis", "bacteriology", "sputum", "subject:paediatrics"]
  - guid: 5a1e9f3c8b2d4a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What specimens should be sent for GXP and TB culture in extrapulmonary TB?"
      Back: "Tissue specimens, site-specific fluids/secretions should be sent for GXP and TB culture."
    tags: ["diagnosis", "bacteriology", "extrapulmonary-tb", "subject:paediatrics"]
