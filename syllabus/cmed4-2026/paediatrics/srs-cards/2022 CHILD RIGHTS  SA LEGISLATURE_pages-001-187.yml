    fields:
      Front: "What is the legal definition of a child?"
      Back: "A person below the age of 18 years"
    tags: ["child-rights", "definitions", "legislation", "subject:paediatrics"]
  - guid: b2e5d3f9c6a8e1b4
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 CHILD RIGHTS SA LEGISLATURE"
    fields:
      Front: "What are the key characteristics that define childhood?"
      Back: "Childhood is characterized by growth, development, vulnerability, and dependency, influenced by inherent ability, family setting, and broader social context"
    tags: ["child-rights", "childhood-development", "subject:paediatrics"]
  - guid: c3f6e4a7d0b9c2f5
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 CHILD RIGHTS SA LEGISLATURE"
    fields:
      Front: "List the basic child needs according to the lecture"
      Back: "Food, Water, Shelter, Protection from harm, Health care services, Family environment, Love, Stimulation, Not to be involved in armed conflict"
    tags: ["child-rights", "child-needs", "subject:paediatrics"]
  - guid: d4a7f5b8e1c0d3e6
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 CHILD RIGHTS SA LEGISLATURE"
    fields:
      Front: "What is the UN Convention on the Rights of the Child (CRC)? When was it developed and implemented?"
      Back: "Developed in 1989, Implemented in 1990. It recognizes unique status, needs & rights of children, with the preamble stating children need special care & protection, and defines a child as any person under 18 years of age"
    tags: ["child-rights", "un-convention", "legislation", "subject:paediatrics"]
  - guid: e5b8a6c9f2d1e4f7
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 CHILD RIGHTS SA LEGISLATURE"
    fields:
      Front: "When did RSA ratify the UN Convention on the Rights of the Child?"
      Back: "1995"
    tags: ["child-rights", "un-convention", "legislation", "rsa-law", "subject:paediatrics"]
  - guid: f6c9b7d0a3e2f5b8
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 CHILD RIGHTS SA LEGISLATURE"
    fields:
      Front: "List the general principles of the UN Convention on the Rights of the Child"
      Back: "Right to survival & development, Right to equality & non-discrimination, Duty to promote the best interests of children, Right to be listened to & taken seriously / Participation"
    tags: ["child-rights", "un-convention", "general-principles", "subject:paediatrics"]
  - guid: a7d0c8e1f3b2a5c6
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 CHILD RIGHTS SA LEGISLATURE"
    fields:
      Front: "What are civil and political rights as they relate to children?"
      Back: "Right to life, survival & development; Right to equality and non-discrimination; Right to dignity; Right to birth registration, name and nationality; Right to participation; Right to information; Right to freedom of expression; Right to privacy and confidentiality; Right to physical and psychological integrity; Right to access courts; Right to protection from abuse and exploitation"
    tags: ["child-rights", "civil-political-rights", "legislation", "subject:paediatrics"]
  - guid: b8e1d9f2a4c3b6d7
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 CHILD RIGHTS SA LEGISLATURE"
    fields:
      Front: "What are socio-economic rights as they relate to children?"
      Back: "Right to life, survival and development; Right to an adequate standard of living; Right to health and healthcare services; Right to social security incl social assistance; Right to education; Right to water and sanitation; Right to housing and shelter; Right to food and nutrition; Right to a clean unpolluted environment; Right to protection from neglect"
    tags: ["child-rights", "socio-economic-rights", "legislation", "subject:paediatrics"]
  - guid: c9f2e0a3b5d4c7e8
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 CHILD RIGHTS SA LEGISLATURE"
    fields:
      Front: "What rights are specific to children only?"
      Back: "Right to rest, leisure and play; Right to family, parental or alternative care; Right to special protection within criminal justice system; Right to special protection for unaccompanied foreign children; Right to survival and development; Right to protection from abuse, neglect, maltreatment and exploitation; Right to have their best interests of paramount importance; Right to be heard and taken seriously; Right to guidance in manner respecting evolving capacities; Right not to be used in armed conflict"
    tags: ["child-rights", "rights-specific-children", "subject:paediatrics"]
