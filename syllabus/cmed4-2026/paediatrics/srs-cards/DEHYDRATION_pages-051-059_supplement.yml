notes:
  - guid: 1a8f47b3e052c9d6
    noteType: Basic
    deck: "Corpus::Paediatrics::DEHYDRATION"
    fields:
      Front: "Where in the ETAT sequence does severe dehydration assessment occur?"
      Back: "Severe dehydration assessment occurs AFTER Circulation/Coma/Convulsions evaluation — it is not the initial screening step."
    tags: ["dehydration", "etat", "assessment-sequence", "subject:paediatrics"]
  - guid: 2b9e58c4f163da70
    noteType: Basic
    deck: "Corpus::Paediatrics::DEHYDRATION"
    fields:
      Front: "What additional samples should be collected when establishing IV/IO access in a shocked child?"
      Back: "Collect DEFG cultures (Don't Ever Forget Glucose plus septic workup samples) at the same time as IV/IO access."
    tags: ["dehydration", "shock", "investigations", "defg", "subject:paediatrics"]
  - guid: 3c0d69b5a274eb81
    noteType: Basic
    deck: "Corpus::Paediatrics::DEHYDRATION"
    fields:
      Front: "What cardiac complication must be monitored for during and after fluid bolus administration?"
      Back: "Congestive cardiac failure (CCF) — monitor during and after every bolus."
    tags: ["dehydration", "shock", "ccf", "monitoring", "subject:paediatrics"]
  - guid: 4d1e7ac6b385fc92
    noteType: Basic
    deck: "Corpus::Paediatrics::DEHYDRATION"
    fields:
      Front: "Why can't severely malnourished children be rehydrated the same way as well-nourished children?"
      Back: "They have precarious metabolic and circulatory status; standard fluid rates can precipitate cardiac failure. Use slower, lower-volume regimens."
    tags: ["dehydration", "malnutrition", "fluid-therapy", "subject:paediatrics"]
  - guid: 5e2f8bd7c496ada3
    noteType: Basic
    deck: "Corpus::Paediatrics::DEHYDRATION"
    fields:
      Front: "What two findings define severe malnutrition for fluid-management purposes?"
      Back: "Visible severe wasting AND bilateral pitting oedema of both feet."
    tags: ["dehydration", "malnutrition", "assessment", "subject:paediatrics"]
  - guid: 6f309ce8d5a7beb4
    noteType: Basic
    deck: "Corpus::Paediatrics::DEHYDRATION"
    fields:
      Front: "If a child is improving after 2 hours of oral rehydration, what is the next step?"
      Back: "Continue oral rehydration for another 2 hours (total 4 hours) before considering IV therapy."
    tags: ["dehydration", "oral-rehydration", "plan-a", "subject:paediatrics"]
  - guid: 70419df9e6b8cfc5
    noteType: Basic
    deck: "Corpus::Paediatrics::DEHYDRATION"
    fields:
      Front: "How should IV-to-oral transition be managed as dehydration resolves?"
      Back: "Gradually slow the IV rate while increasing oral fluids — overlapping the two rather than abruptly stopping IV."
    tags: ["dehydration", "iv-fluids", "transition", "subject:paediatrics"]
  - guid: 81520ea0f7c9d0d6
    noteType: Basic
    deck: "Corpus::Paediatrics::DEHYDRATION"
    fields:
      Front: "How is ORS administered during initial rehydration — single bolus or divided dosing?"
      Back: "Divided dosing: continuous infusion OR 5 mL/kg every 15 minutes. NOT a single 20 mL/kg bolus per hour."
    tags: ["dehydration", "ors", "dosing", "subject:paediatrics"]
  - guid: 9263180b08d0e1e7
    noteType: Basic
    deck: "Corpus::Paediatrics::DEHYDRATION"
    fields:
      Front: "How should NG fluids be delivered — continuous or bolus?"
      Back: "Continuous infusion is preferred over intermittent bolus dosing for better tolerance."
    tags: ["dehydration", "nasogastric", "administration", "subject:paediatrics"]
  - guid: a374291c19e1f2f8
    noteType: Basic
    deck: "Corpus::Paediatrics::DEHYDRATION"
    fields:
      Front: "What concentration of dextrose is used to treat hypoglycaemia during shock, and what dose?"
      Back: "10% dextrose at 5 mL/kg IV (not other concentrations)."
    tags: ["dehydration", "shock", "hypoglycaemia", "dextrose", "subject:paediatrics"]
  - guid: b485302d2af20309
    noteType: Basic
    deck: "Corpus::Paediatrics::DEHYDRATION"
    fields:
      Front: "Why are electronic infusion pumps preferred over manual roller controllers?"
      Back: "Electronic pumps prevent catastrophic overdose because the set rate is delivered regardless of drip height, limb position, or vascular resistance."
    tags: ["dehydration", "equipment", "safety", "infusion-pump", "subject:paediatrics"]
  - guid: c5964139b3030410
    noteType: Basic
    deck: "Corpus::Paediatrics::DEHYDRATION"
    fields:
      Front: "How does the height of the drip bag affect flow rate with a manual controller?"
      Back: "Higher bag → higher hydrostatic pressure → faster flow than set; lower bag → slower flow. Position changes alter actual delivered rate."
    tags: ["dehydration", "equipment", "manual-drip", "subject:paediatrics"]
  - guid: d6a7521c4d141521
    noteType: Basic
    deck: "Corpus::Paediatrics::DEHYDRATION"
    fields:
      Front: "How do limb position and vascular resistance affect manual drip rate?"
      Back: "Occlusion or increased vascular resistance at the cannula site slows actual flow below set rate; relaxation/movement may speed it up."
    tags: ["dehydration", "equipment", "manual-drip", "subject:paediatrics"]
  - guid: e7b8632d5e252632
    noteType: Basic
    deck: "Corpus::Paediatrics::DEHYDRATION"
    fields:
      Front: "What is the preventive ORS dose AFTER rehydration is complete (Plan A maintenance)?"
      Back: "10 mL/kg PO after each stool — not on a fixed schedule."
    tags: ["dehydration", "plan-a", "maintenance", "ors", "subject:paediatrics"]
  - guid: f8c9743e6f363743
    noteType: Basic
    deck: "Corpus::Paediatrics::DEHYDRATION"
    fields:
      Front: "For how long should a child be observed after completing rehydration to ensure maintenance?"
      Back: "6 hours of observation post-hydration."
    tags: ["dehydration", "observation", "maintenance", "subject:paediatrics"]
  - guid: 0904854f70474854
    noteType: Basic
    deck: "Corpus::Paediatrics::DEHYDRATION"
    fields:
      Front: "What is weight banding in paediatric fluid calculation?"
      Back: "A practical shortcut: use the child's estimated weight band rather than an exact weight to look up volumes/doses, reducing calculation errors at the bedside."
    tags: ["dehydration", "calculation", "weight-banding", "subject:paediatrics"]
