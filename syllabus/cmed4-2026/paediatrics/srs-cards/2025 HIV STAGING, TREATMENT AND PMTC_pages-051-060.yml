    fields:
      Front: "What are common early toxicities of HAART therapy?"
      Back: |
        Common early toxicities of HAART include: gastrointestinal intolerance, anemia, sleep disturbances, hyperbilirubinemia.
    tags: ["haart-toxicity", "early-side-effects", "adverse-reactions", "subject:paediatrics"]
  - guid: "f6g7h8i9j0k1l2m7"
    noteType: Basic
