notes:
  - guid: a7f3e9c2b1d54f8a
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 CIRCULATION"
    fields:
      Front: "What are the three clinical signs used to assess circulation in a child?"
      Back: "1. Cold hands\n2. Capillary refill time (CRT) ≥3 seconds\n3. Weak and fast pulse"
    tags: ["circulation-assessment", "shock-signs", "subject:paediatrics"]
  - guid: b2d8f4a9c6e1h3j7
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 CIRCULATION"
    fields:
      Front: "Define shock in a paediatric patient based on circulatory signs."
      Back: "All three signs present: cold hands AND capillary refill time ≥3 seconds AND weak fast pulse = SHOCK (Emergency)"
    tags: ["shock-definition", "emergency", "subject:paediatrics"]
  - guid: c5e1h9j2k8m3p6r1
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 CIRCULATION"
    fields:
      Front: "What is impaired circulation and how many circulatory signs must be present?"
      Back: "1 or 2 of the three signs present (cold hands, CRT ≥3 sec, weak fast pulse) = Impaired circulation (Priority)"
    tags: ["impaired-circulation", "priority", "subject:paediatrics"]
  - guid: d9f3k7m2n5p1q8s4
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 CIRCULATION"
    fields:
      Front: "What is the critical capillary refill time cutoff for assessing shock?"
      Back: "Capillary refill time ≥3 seconds (3 seconds or more)"
    tags: ["capillary-refill", "crt-cutoff", "subject:paediatrics"]
  - guid: e2g7j4m9n1o6p3r5
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 CIRCULATION"
    fields:
      Front: "List the four main causes of shock in the paediatric setting."
      Back: "1. Diarrhoea (fluid loss from circulation)\n2. Blood loss (trauma, bleeding)\n3. Capillary leak into the body\n4. Septic shock"
    tags: ["shock-causes", "aetiology", "subject:paediatrics"]
  - guid: f6h2k8n3o7p4q1s9
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 CIRCULATION"
    fields:
      Front: "What are the initial management steps for all shocked children?"
      Back: "1. Stop bleeding\n2. Give oxygen\n3. Keep warm\n4. IV or IO access (take blood and DEFG)\n5. Consider antibiotics for suspected sepsis"
    tags: ["shock-management", "initial-treatment", "subject:paediatrics"]
  - guid: g1h5j9m4n2o8p6r3
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 CIRCULATION"
    fields:
      Front: "What is the fluid bolus volume and infusion time for a child WITHOUT severe acute malnutrition in shock?"
      Back: "10 ml/kg bolus fast over 15 minutes using Balanced crystalloid (Ringers lactate OR Normal saline)"
    tags: ["fluid-bolus", "no-malnutrition", "shock-treatment", "subject:paediatrics"]
  - guid: h3k1m6n7o4p9q2s5
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 CIRCULATION"
    fields:
      Front: "What is the fluid bolus volume and infusion time for a child WITH severe acute malnutrition in shock?"
      Back: "10 ml/kg bolus over 30 minutes (cautious infusion) using Normal saline OR Ringers Lactate"
    tags: ["fluid-bolus", "severe-malnutrition", "shock-treatment", "subject:paediatrics"]
  - guid: i7m2o5p3q8r1s6t4
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 CIRCULATION"
    fields:
      Front: "Why is fluid administration cautious in children with severe acute malnutrition?"
      Back: "Reduced cardiac and renal reserve"
    tags: ["malnutrition", "cardiac-reserve", "renal-reserve", "subject:paediatrics"]
  - guid: j4n8p1q5r2s7t3u9
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 CIRCULATION"
    fields:
      Front: "What fluids are appropriate for shock treatment in a paediatric patient?"
      Back: "Balanced crystalloid solutions: Ringers lactate OR Normal saline"
    tags: ["iv-fluids", "resuscitation", "shock-treatment", "subject:paediatrics"]
  - guid: k6o3p7q2r8s4t1u5
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 CIRCULATION"
    fields:
      Front: "What should be done during reassessment after fluid bolus administration?"
      Back: "Check for:\n1. Signs of shock (cold hands, CRT, weak fast pulse)\n2. Signs of heart failure (increasing pulse, tachypnoea, enlarged liver, gallop rhythm, crepitations)\n3. Consciousness level and lethargy"
    tags: ["reassessment", "monitoring", "shock-management", "subject:paediatrics"]
  - guid: l5p2q9r3s6t8u1v4
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 CIRCULATION"
    fields:
      Front: "When should glucose be checked in a shocked child and what is the treatment threshold?"
      Back: "Check for hypoglycaemia while bolus being given. Treat with 5 ml/kg 10% Dextrose if glucose <3 mmol/L"
    tags: ["hypoglycaemia", "defg", "glucose-management", "subject:paediatrics"]
  - guid: m8q1r4s9t2u6v3w7
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 CIRCULATION"
    fields:
      Front: "What is the dosing for treating hypoglycaemia in a paediatric patient?"
      Back: "5 ml/kg of 10% Dextrose intravenously"
    tags: ["hypoglycaemia-treatment", "dextrose-dose", "subject:paediatrics"]
  - guid: n2r6s3t7u4v8w1x5
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 CIRCULATION"
    fields:
      Front: "What are the three possible outcomes after giving the first fluid bolus to a shocked child?"
      Back: "1. Better (improved circulation)\n2. No improvement (still shocked) - proceed to 2nd bolus\n3. Worse (developing heart failure) - stop bolus"
    tags: ["bolus-outcomes", "reassessment", "shock-management", "subject:paediatrics"]
  - guid: o4s8t1u5v2w6x3y9
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 CIRCULATION"
    fields:
      Front: "What is the concern after administering a third fluid bolus and what is the next step?"
      Back: "Concern: Replaced half circulation volume. Actions: Seek help, give glucose and antibiotics, consider intubation/ventilation/inotropes"
    tags: ["third-bolus-alert", "beware-threshold", "escalation", "subject:paediatrics"]
  - guid: p7t3u9v4w2x7y1z6
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 CIRCULATION"
    fields:
      Front: "What volume of circulation is replaced after three fluid boluses of 10 ml/kg each?"
      Back: "Approximately half the circulation volume (3 × 10 ml/kg = 30% of total body weight, approximately 50% of circulating volume)"
    tags: ["third-bolus", "volume-calculation", "subject:paediatrics"]
  - guid: q1u7v5w8x3y6z2a4
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 CIRCULATION"
    fields:
      Front: "What is the fluid management plan for a child whose circulation improved after bolus therapy?"
      Back: "1. Stop bolus administration\n2. If dehydration present: calculate % deficit × 10 × weight\n3. If no dehydration: IV ½ DD @ 4 ml/kg/hr\n4. Change to oral feeds/breast asap (when no shock)"
    tags: ["improved-shock", "post-bolus-fluids", "maintenance", "subject:paediatrics"]
  - guid: r3v9w2x8y4z1a5b7
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 CIRCULATION"
    fields:
      Front: "What is the maintenance IV fluid rate for a child without dehydration post-shock?"
      Back: "½ DD (half daily dextrose/dextrose-saline) @ 4 ml/kg/hr"
    tags: ["maintenance-fluids", "post-shock", "iv-rate", "subject:paediatrics"]
  - guid: s6w1x6y2z8a3b5c9
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 CIRCULATION"
    fields:
      Front: "How should dehydration correction fluid volume be calculated?"
      Back: "% deficit × 10 × weight (in kg)"
    tags: ["dehydration-calculation", "rehydration", "fluid-deficit", "subject:paediatrics"]
  - guid: t2x4y7z3a6b1c8d5
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 CIRCULATION"
    fields:
      Front: "What does the acronym DEFG stand for in the context of emergency management?"
      Back: "D = Dextrose (glucose)\nE = [specific to context]\nF = [specific to context]\nG = [specific to context]\n(Checked during shock fluid bolus administration)"
    tags: ["defg-acronym", "emergency-investigation", "subject:paediatrics"]
