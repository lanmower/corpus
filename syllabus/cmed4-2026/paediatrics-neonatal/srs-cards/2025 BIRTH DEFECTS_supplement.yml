deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
notes:
  - guid: "a1b2c3d4e5f6g7h8"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Trisomy 21 (Down syndrome) karyotype"
      Back: "47,XX,+21 or 47,XY,+21"
    tags: ["trisomy-21", "karyotype", "subject:paediatrics-neonatal", "supplement"]
  - guid: "b2c3d4e5f6g7h8i9"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "List clinical features of Down syndrome (Trisomy 21)"
      Back: "1. Intellectual disability; 2. Hypotonia; 3. Flat facial profile; 4. Upslanting palpebral fissures; 5. Low nasal bridge; 6. Single palmar crease; 7. Cardiac defects (AV canal, VSD); 8. Short stature; 9. Increased risk of leukemia; 10. Thyroid disease"
    tags: ["trisomy-21", "clinical-features", "subject:paediatrics-neonatal", "supplement"]
  - guid: "c3d4e5f6g7h8i9j0"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Down syndrome (Trisomy 21) prevalence"
      Back: "Approximately 1 in 700 live births (varies by maternal age)"
    tags: ["trisomy-21", "prevalence", "subject:paediatrics-neonatal", "supplement"]
  - guid: "d4e5f6g7h8i9j0k1"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Trisomy 18 (Edward syndrome) karyotype"
      Back: "47,XX,+18 or 47,XY,+18"
    tags: ["trisomy-18", "karyotype", "subject:paediatrics-neonatal", "supplement"]
  - guid: "e5f6g7h8i9j0k1l2"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "List clinical features of Edward syndrome (Trisomy 18)"
      Back: "1. Severe growth restriction; 2. Intellectual disability; 3. Distinctive clenched fists (overlapping fingers); 4. Rocker bottom feet; 5. Microcephaly; 6. Micrognathia; 7. Low-set ears; 8. Congenital heart defects (VSD, PDA, ASD); 9. Renal anomalies; 10. Cleft lip/palate; 11. Short lifespan (most die within first year)"
    tags: ["trisomy-18", "clinical-features", "subject:paediatrics-neonatal", "supplement"]
  - guid: "f6g7h8i9j0k1l2m3"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Edward syndrome (Trisomy 18) prevalence"
      Back: "Approximately 1 in 6000 live births"
    tags: ["trisomy-18", "prevalence", "subject:paediatrics-neonatal", "supplement"]
  - guid: "g7h8i9j0k1l2m3n4"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Trisomy 13 (Patau syndrome) karyotype"
      Back: "47,XX,+13 or 47,XY,+13"
    tags: ["trisomy-13", "karyotype", "subject:paediatrics-neonatal", "supplement"]
  - guid: "h8i9j0k1l2m3n4o5"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "List clinical features of Patau syndrome (Trisomy 13)"
      Back: "1. Severe growth restriction; 2. Intellectual disability; 3. Holoprosencephaly; 4. Cleft lip/palate; 5. Polydactyly (postaxial); 6. Rocker bottom feet; 7. Microcephaly/abnormal head shape; 8. Micrognathia; 9. Congenital heart defects; 10. Renal anomalies; 11. Cryptorchidism; 12. Scalp defects; 13. Short lifespan (most die within first year)"
    tags: ["trisomy-13", "clinical-features", "subject:paediatrics-neonatal", "supplement"]
  - guid: "i9j0k1l2m3n4o5p6"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Patau syndrome (Trisomy 13) prevalence"
      Back: "Approximately 1 in 10,000 live births"
    tags: ["trisomy-13", "prevalence", "subject:paediatrics-neonatal", "supplement"]
  - guid: "j0k1l2m3n4o5p6q7"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Klinefelter syndrome karyotype"
      Back: "47,XXY"
    tags: ["klinefelter-syndrome", "karyotype", "subject:paediatrics-neonatal", "supplement"]
  - guid: "k1l2m3n4o5p6q7r8"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "List clinical features of Klinefelter syndrome (47,XXY)"
      Back: "1. Tall stature with long legs; 2. Infertility/hypogonadism; 3. Reduced testosterone levels; 4. Gynecomastia (breast tissue development); 5. Reduced facial/body hair; 6. Increased risk of developmental delay; 7. Small/soft testes; 8. Often asymptomatic (late diagnosis)"
    tags: ["klinefelter-syndrome", "clinical-features", "subject:paediatrics-neonatal", "supplement"]
  - guid: "l2m3n4o5p6q7r8s9"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Klinefelter syndrome prevalence"
      Back: "Approximately 1 in 500 to 1 in 1000 males; many cases undiagnosed"
    tags: ["klinefelter-syndrome", "prevalence", "subject:paediatrics-neonatal", "supplement"]
  - guid: "m3n4o5p6q7r8s9t0"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Turner syndrome (45,X) - List clinical features"
      Back: "1. Short stature; 2. Ovarian dysgenesis/infertility; 3. Characteristic facial features (broad flat face, micrognathia, low-set ears); 4. Webbed neck; 5. Shield chest; 6. Cardiac defects (bicuspid aortic valve, aortic stenosis, coarctation); 7. Renal anomalies; 8. Normal intelligence usually (learning difficulties possible); 9. Lymphoedema; 10. Hearing loss"
    tags: ["turner-syndrome", "clinical-features", "subject:paediatrics-neonatal", "supplement"]
  - guid: "n4o5p6q7r8s9t0u1"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Turner syndrome prevalence"
      Back: "Approximately 1 in 2500 live female births"
    tags: ["turner-syndrome", "prevalence", "subject:paediatrics-neonatal", "supplement"]
  - guid: "o5p6q7r8s9t0u1v2"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Marfan syndrome inheritance pattern and prevalence"
      Back: "Autosomal dominant inheritance (caused by FBN1 gene mutation on chromosome 15); prevalence approximately 1 in 5000 live births"
    tags: ["marfan-syndrome", "inheritance", "prevalence", "subject:paediatrics-neonatal", "supplement"]
  - guid: "p6q7r8s9t0u1v2w3"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Define: frontal bossing (dysmorphology)"
      Back: "Prominent protrusion of forehead; common in achondroplasia, Down syndrome, congenital hydrocephalus"
    tags: ["definition", "dysmorphology", "subject:paediatrics-neonatal", "supplement"]
  - guid: "q7r8s9t0u1v2w3x4"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Define: macrocephaly (dysmorphology)"
      Back: "Abnormally large head; can result from hydrocephalus, neurofibromatosis, or overgrowth syndromes"
    tags: ["definition", "dysmorphology", "subject:paediatrics-neonatal", "supplement"]
  - guid: "r8s9t0u1v2w3x4y5"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Define: microcephaly (dysmorphology)"
      Back: "Abnormally small head with reduced brain volume; associated with intellectual disability, congenital infections, NTDs"
    tags: ["definition", "dysmorphology", "subject:paediatrics-neonatal", "supplement"]
  - guid: "s9t0u1v2w3x4y5z6"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Define: syndactyly (dysmorphology)"
      Back: "Webbing or fusion of digits (fingers or toes); can be simple (skin only) or complex (bone fusion); seen in Apert syndrome"
    tags: ["definition", "dysmorphology", "subject:paediatrics-neonatal", "supplement"]
  - guid: "t0u1v2w3x4y5z6a7"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Define: polydactyly (dysmorphology)"
      Back: "Extra digits (fingers or toes); can be preaxial (thumb/great toe side) or postaxial (pinky/little toe side); seen in Trisomy 13"
    tags: ["definition", "dysmorphology", "subject:paediatrics-neonatal", "supplement"]
  - guid: "u1v2w3x4y5z6a7b8"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Define: micrognathia (dysmorphology)"
      Back: "Abnormally small chin/jaw; seen in Trisomy 18, Pierre Robin sequence"
    tags: ["definition", "dysmorphology", "subject:paediatrics-neonatal", "supplement"]
  - guid: "v2w3x4y5z6a7b8c9"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Define: holoprosencephaly (dysmorphology)"
      Back: "Failure of the forebrain to divide into two hemispheres; associated with facial midline defects and intellectual disability; seen in Trisomy 13"
    tags: ["definition", "dysmorphology", "subject:paediatrics-neonatal", "supplement"]
  - guid: "w3x4y5z6a7b8c9d0"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Folic acid prophylaxis for neural tube defect prevention - recommended periconceptual dose"
      Back: "5 mg daily (high-dose) or standard 400 mcg daily; started before conception and continued through first trimester"
    tags: ["folic-acid", "prevention", "subject:paediatrics-neonatal", "supplement"]
  - guid: "x4y5z6a7b8c9d0e1"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Fetal alcohol spectrum disorder (FASD) - at what gestational age is alcohol teratogenic?"
      Back: "All trimesters carry risk; first trimester has highest risk for CNS and facial features; third trimester for growth restriction; no safe threshold established"
    tags: ["fas", "teratogen", "subject:paediatrics-neonatal", "supplement"]
  - guid: "y5z6a7b8c9d0e1f2"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Valproate (Depakote) embryopathy - what birth defects?"
      Back: "1. Neural tube defects (spina bifida) - 1-2% risk; 2. Cardiac defects; 3. Craniofacial abnormalities; 4. Digital anomalies; 5. Growth restriction; 6. Developmental delay"
    tags: ["valproate", "teratogen", "subject:paediatrics-neonatal", "supplement"]
  - guid: "z6a7b8c9d0e1f2g3"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Lithium teratogenic effects - what cardiac defect?"
      Back: "Ebstein anomaly (displacement of tricuspid valve); also associated with cardiac arrhythmias if used in third trimester; teratogenic window first trimester"
    tags: ["lithium", "teratogen", "cardiac-defect", "subject:paediatrics-neonatal", "supplement"]
  - guid: "a7b8c9d0e1f2g3h4"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Warfarin embryopathy - what birth defects?"
      Back: "1. Fetal warfarin syndrome: nasal hypoplasia, skeletal abnormalities (stippled epiphyses); 2. CNS abnormalities: microcephaly, hydrocephalus, agenesis of corpus callosum; 3. Eye abnormalities; 4. Growth restriction; teratogenic window first trimester"
    tags: ["warfarin", "teratogen", "subject:paediatrics-neonatal", "supplement"]
  - guid: "b8c9d0e1f2g3h4i5"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Retinoic acid (retinoids/Accutane) embryopathy - what birth defects?"
      Back: "Highly teratogenic - 1st trimester exposure causes: 1. CNS malformations (hydrocephalus, microcephaly, cleft palate); 2. Cardiac defects; 3. Facial clefting; 4. Thymic hypoplasia; 5. Growth restriction; 6. Intellectual disability"
    tags: ["retinoic-acid", "teratogen", "subject:paediatrics-neonatal", "supplement"]
  - guid: "c9d0e1f2g3h4i5j6"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "ACE inhibitors teratogenic effects - critical window and defects"
      Back: "Second and third trimester exposure: renal dysgenesis, oligohydramnios, intrauterine growth restriction, fetal/neonatal renal failure, oliguria, hypotension, and fetal death; first trimester use generally considered safe"
    tags: ["ace-inhibitor", "teratogen", "subject:paediatrics-neonatal", "supplement"]
  - guid: "d0e1f2g3h4i5j6k7"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Apert syndrome - define and list key features"
      Back: "Autosomal dominant disorder caused by FGFR2 mutation; characterized by: 1. Craniosynostosis (fused skull sutures); 2. Symmetric syndactyly of hands and feet; 3. Distinctive midfacial hypoplasia; 4. High-arched palate; 5. Hearing loss; 6. Cardiac defects (20%); 7. Normal or mildly reduced intelligence"
    tags: ["apert-syndrome", "clinical-features", "subject:paediatrics-neonatal", "supplement"]
  - guid: "e1f2g3h4i5j6k7l8"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Cat Eye Syndrome (Ocular Coloboma Syndrome) - etiology and key features"
      Back: "Result of chromosomal duplication (usually partial trisomy 22); characterized by: 1. Ocular colobomas (iris cleft); 2. Preauricular pits/tags; 3. Conductive hearing loss; 4. Cardiac defects; 5. Cleft palate; 6. Anal atresia; 7. Renal anomalies; 8. Usually normal intelligence"
    tags: ["cat-eye-syndrome", "clinical-features", "subject:paediatrics-neonatal", "supplement"]
  - guid: "f2g3h4i5j6k7l8m9"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Prader-Willi syndrome vs Angelman syndrome - compare (chromosome, inheritance, features)"
      Back: "Both involve chromosome 15 deletion (same region): PRADER-WILLI: paternal deletion/maternal imprinting inactivation → hypotonia, failure to thrive, short stature, hypogonadism, intellectual disability, hyperphagia (food-seeking), obesity. ANGELMAN: maternal deletion/paternal imprinting inactivation → intellectual disability, movement disorder (ataxia, tremor), happy demeanor, seizures, inappropriate laughter, no hyperphagia"
    tags: ["prader-willi", "angelman", "imprinting", "subject:paediatrics-neonatal", "supplement"]
  - guid: "g3h4i5j6k7l8m9n0"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Cystic fibrosis (AR) - prevalence and key inheritance/diagnostic features"
      Back: "Prevalence: 1 in 2500-3500 live births (varies by ethnicity; higher in Caucasians); Autosomal recessive (CFTR gene mutations); Sweat chloride test diagnostic (>60 mmol/L); Pancreatic insufficiency, recurrent respiratory infections, failure to thrive typical"
    tags: ["cystic-fibrosis", "prevalence", "inheritance", "subject:paediatrics-neonatal", "supplement"]
  - guid: "h4i5j6k7l8m9n0o1"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "SMA Type 1 (Werdnig-Hoffmann disease) - inheritance, features, and prevalence"
      Back: "Autosomal recessive (SMN1 gene); prevalence 1 in 10,000 births; onset before 6 months; features: profound hypotonia, frog-legged posture, paradoxical breathing, absent deep tendon reflexes, tongue fasciculations, feeding/respiratory difficulties; most severe form; median survival without intervention <2 years"
    tags: ["sma-type1", "inheritance", "clinical-features", "prevalence", "subject:paediatrics-neonatal", "supplement"]
  - guid: "i5j6k7l8m9n0o1p2"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Duchenne muscular dystrophy (X-linked) - karyotype, prevalence, and inheritance"
      Back: "X-linked recessive disorder (DMD gene on Xp21); prevalence 1 in 3500 males; karyotype normal (46,XY) but gene mutation present; mothers are carriers; affected males show symptoms by age 3-5 years; progressive weakness; wheelchair bound by teens; cardiac involvement common"
    tags: ["duchenne-md", "inheritance", "karyotype", "prevalence", "subject:paediatrics-neonatal", "supplement"]
  - guid: "j6k7l8m9n0o1p2q3"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Hemophilia A (Factor VIII deficiency) - inheritance pattern"
      Back: "X-linked recessive inheritance; males affected (46,XY with hemophilia A allele); females are carriers (heterozygous usually unaffected); ~10% carrier females show mild symptoms (Turner syndrome, extreme lyonization, or homozygous rare); 80% inherited from carrier mothers; 20% de novo mutations"
    tags: ["hemophilia-a", "inheritance", "x-linked", "subject:paediatrics-neonatal", "supplement"]
  - guid: "k7l8m9n0o1p2q3r4"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Hemophilia B (Factor IX deficiency) - inheritance pattern and prevalence vs Hemophilia A"
      Back: "X-linked recessive inheritance (identical to Hemophilia A); prevalence 1 in 25,000-30,000 males (less common than Hemophilia A which is ~1 in 5000); males affected; females carriers; bleeding manifestations identical to Hemophilia A"
    tags: ["hemophilia-b", "inheritance", "x-linked", "prevalence", "subject:paediatrics-neonatal", "supplement"]
  - guid: "l8m9n0o1p2q3r4s5"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Define: holoprosencephaly - classification"
      Back: "Failure of embryonic forebrain to divide into two hemispheres; three forms: 1. ALOBAR (most severe): single ventricle, complete fusion; 2. SEMILOBAR (intermediate): partial division; 3. LOBAR (least severe): nearly complete separation with abnormal olfactory bulbs/tracts; associated with severe facial midline defects (cyclopia to hypotelorism)"
    tags: ["holoprosencephaly", "definition", "subject:paediatrics-neonatal", "supplement"]
  - guid: "m9n0o1p2q3r4s5t6"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Define: cryptorchidism (dysmorphology/clinical)"
      Back: "Failure of testes to descend into scrotum; can be unilateral or bilateral; risk factors include prematurity, low birth weight, and genetic syndromes (Trisomy 13, Klinefelter); increased cancer risk if not corrected; usually corrects by 1 year; surgical intervention after 6 months if not descended"
    tags: ["definition", "cryptorchidism", "subject:paediatrics-neonatal", "supplement"]
  - guid: "n0o1p2q3r4s5t6u7"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Define: meningomyelocele (spina bifida type)"
      Back: "Spinal cord and meninges protrude through unfused vertebral arches; most common and most severe form of spina bifida; results in neurologic deficit (paraplegia, bowel/bladder dysfunction); requires emergency surgical closure"
    tags: ["definition", "neural-tube-defect", "subject:paediatrics-neonatal", "supplement"]
  - guid: "o1p2q3r4s5t6u7v8"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Define: meningocoele (spina bifida type)"
      Back: "Meninges alone protrude through spinal defect; spinal cord remains in normal position; results in minimal or no neurologic deficit; generally better prognosis than meningomyelocele"
    tags: ["definition", "neural-tube-defect", "subject:paediatrics-neonatal", "supplement"]
  - guid: "p2q3r4s5t6u7v8w9"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Define: spina bifida occulta (spina bifida type)"
      Back: "Mildest form of spina bifida; vertebral arches fail to fuse but spinal cord and meninges remain within spinal canal; often asymptomatic; discovered incidentally on imaging; may have skin dimple or tuft of hair over site"
    tags: ["definition", "neural-tube-defect", "subject:paediatrics-neonatal", "supplement"]
  - guid: "q3r4s5t6u7v8w9x0"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Encephalocoele - definition and clinical significance"
      Back: "Protrusion of meninges ± brain tissue through skull defect (usually midline between eyes or occiput); results from failure of neural tube closure in 4th week gestation; associated with hydrocephalus, seizures, developmental delay; requires neurosurgical repair"
    tags: ["encephalocoele", "neural-tube-defect", "definition", "subject:paediatrics-neonatal", "supplement"]
  - guid: "r4s5t6u7v8w9x0y1"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Anencephaly - definition and prognosis"
      Back: "Complete absence of cerebral hemispheres and scalp due to failure of neural tube closure; incompatible with life; diagnosed prenatally by elevated AFP and ultrasound; results in stillbirth or early neonatal death; detected on US as absence of skull vault"
    tags: ["anencephaly", "neural-tube-defect", "definition", "subject:paediatrics-neonatal", "supplement"]
  - guid: "s5t6u7v8w9x0y1z2"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Define: amniotic banding syndrome (congenital constraint)"
      Back: "Congenital anomalies from mechanical constraint; fibrous bands entangle fetal parts causing constriction rings, amputation of digits/limbs, cleft lip/palate, club foot; non-genetic; recurrence risk low (<1%)"
    tags: ["definition", "congenital-constraint", "subject:paediatrics-neonatal", "supplement"]
  - guid: "t6u7v8w9x0y1z2a3"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Ventricular septal defect (VSD) - most common congenital heart defect; timing of symptoms"
      Back: "Most common CHD (~25-30% of all CHD); small VSDs often asymptomatic and close spontaneously; large VSDs present with signs of heart failure (feeding difficulty, poor growth, tachypnea) by 2-8 weeks of life as pulmonary vascular resistance drops; cyanosis minimal unless Eisenmenger complex develops"
    tags: ["vsd", "cardiac-defect", "clinical-features", "subject:paediatrics-neonatal", "supplement"]
  - guid: "u7v8w9x0y1z2a3b4"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Atrial septal defect (ASD) - timing of clinical presentation"
      Back: "Often asymptomatic in childhood; diagnosis often delayed until adolescence/adulthood when symptoms appear (dyspnea, fatigue from left-to-right shunt); risk of arrhythmias and right heart failure in adulthood; surgical repair indicated for large defects (Qp:Qs >1.5:1)"
    tags: ["asd", "cardiac-defect", "clinical-features", "subject:paediatrics-neonatal", "supplement"]
  - guid: "v8w9x0y1z2a3b4c5"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Patent ductus arteriosus (PDA) - risk factors and timing of symptoms"
      Back: "Ductus arteriosus fails to close after birth; risk increased by prematurity, maternal rubella, hypoxia; presents within first week of life with wide pulse pressure, bounding pulses, continuous machinery murmur; symptoms include feeding intolerance, poor growth, respiratory distress; more common in premature infants"
    tags: ["pda", "cardiac-defect", "clinical-features", "subject:paediatrics-neonatal", "supplement"]
  - guid: "w9x0y1z2a3b4c5d6"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Tetralogy of Fallot (TOF) - four components"
      Back: "1. Ventricular septal defect (VSD); 2. Right ventricular hypertrophy; 3. Right ventricular outflow tract obstruction (pulmonary stenosis); 4. Overriding aorta (receives blood from RV); presents with cyanosis, 'tet spells' (acute hypercyanotic episodes with hyperpnea), clubbing of digits"
    tags: ["tof", "cardiac-defect", "anatomy", "subject:paediatrics-neonatal", "supplement"]
  - guid: "x0y1z2a3b4c5d6e7"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Transposition of the great arteries (TGA) - definition and presentation"
      Back: "Aorta arises from right ventricle; pulmonary artery from left ventricle (reverse of normal); incompatible with life unless PDA/ASD/VSD present for mixing; presents with severe cyanosis within first hours/days of life; blue baby syndrome; requires emergency balloon atrial septostomy (Rashkind procedure) or surgical repair"
    tags: ["tga", "cardiac-defect", "clinical-features", "subject:paediatrics-neonatal", "supplement"]
  - guid: "y1z2a3b4c5d6e7f8"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Atrioventricular canal defect (AVCD/Endocardial cushion defect) - association and anatomy"
      Back: "Ostium primum ASD + inlet VSD + cleft mitral/tricuspid valves; strongly associated with Down syndrome (Trisomy 21) and other chromosomal abnormalities; presents with cyanosis, heart failure; requires surgical repair"
    tags: ["avcd", "cardiac-defect", "clinical-features", "subject:paediatrics-neonatal", "supplement"]
  - guid: "z2a3b4c5d6e7f8g9"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Coarctation of aorta - presentation and associations"
      Back: "Narrowing of descending aorta (usually just distal to left subclavian artery); presents with hypertension in upper extremities, weak/delayed femoral pulses, lower blood pressure in legs; associated with Turner syndrome, Bicuspid aortic valve; diagnosed by echocardiography or CT; may present with heart failure or incidentally on BP screening"
    tags: ["coarctation-aorta", "cardiac-defect", "clinical-features", "subject:paediatrics-neonatal", "supplement"]
  - guid: "a3b4c5d6e7f8g9h0"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Ebstein anomaly - definition and association"
      Back: "Tricuspid valve displacement apically into right ventricle with tricuspid regurgitation and atrialization of RV; presents with cyanosis from right-to-left shunt through ASD/PFO; associated with maternal lithium exposure in first trimester; arrhythmias common"
    tags: ["ebstein-anomaly", "cardiac-defect", "teratogen", "subject:paediatrics-neonatal", "supplement"]
  - guid: "b4c5d6e7f8g9h0i1"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Surgical timing for patent ductus arteriosus (PDA)"
      Back: "Indomethacin or ibuprofen tried first (inhibit prostaglandins, promote ductal closure); if medical management fails or contraindicated, surgical ligation indicated; typically performed at 3-6 weeks of age if symptomatic; earlier closure in symptomatic infants"
    tags: ["pda", "surgical-management", "subject:paediatrics-neonatal", "supplement"]
  - guid: "c5d6e7f8g9h0i1j2"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Surgical timing for ventricular septal defect (VSD)"
      Back: "Small VSDs: follow expectantly (many close spontaneously by age 2-5 years); Large VSDs with heart failure: surgical closure indicated, typically at 3-6 months of age; emergency surgery for VSD with severe heart failure, pulmonary edema"
    tags: ["vsd", "surgical-management", "subject:paediatrics-neonatal", "supplement"]
  - guid: "d6e7f8g9h0i1j2k3"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Surgical timing for atrial septal defect (ASD)"
      Back: "Elective surgical closure recommended for secundum ASD if significant left-to-right shunt (Qp:Qs >1.5:1); timing: 3-4 years old (allows normal growth); earlier if significant symptoms; device closure alternative for some ASDs (catheter-based)"
    tags: ["asd", "surgical-management", "subject:paediatrics-neonatal", "supplement"]
  - guid: "e7f8g9h0i1j2k3l4"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Surgical timing for Tetralogy of Fallot (TOF)"
      Back: "Early surgical repair recommended in infancy (typically 3-6 months of age) to prevent complications; prostaglandin E1 to keep ductus arteriosus open pre-operatively; survival significantly improved with early surgery vs historical use of palliative procedures (Blalock-Taussig shunt)"
    tags: ["tof", "surgical-management", "subject:paediatrics-neonatal", "supplement"]
  - guid: "f8g9h0i1j2k3l4m5"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Surgical timing for transposition of great arteries (TGA)"
      Back: "Emergency intervention required within first hours-days of life; balloon atrial septostomy (Rashkind procedure) creates ASD for mixing; definitive corrective surgery (arterial switch/Jatene operation) within first weeks of life; prostaglandin E1 to keep PDA patent pre-operatively"
    tags: ["tga", "surgical-management", "subject:paediatrics-neonatal", "supplement"]
  - guid: "g9h0i1j2k3l4m5n6"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Surgical timing for coarctation of aorta"
      Back: "Surgical or catheter-based intervention indicated if significant gradient (>20 mmHg); timing: 3-6 months of age for symptomatic infants; can be delayed to 3-4 years in asymptomatic children with good collateral flow; resection with end-to-end anastomosis or graft placement standard surgical approach"
    tags: ["coarctation-aorta", "surgical-management", "subject:paediatrics-neonatal", "supplement"]
  - guid: "h0i1j2k3l4m5n6o7"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Surgical timing for atrioventricular canal defect (AVCD)"
      Back: "Surgical repair indicated for all complete AVCDs; timing: 3-6 months of age (before irreversible pulmonary vascular disease develops); partial AVCD may be managed longer if asymptomatic; repair involves septation of atria/ventricles and valve reconstruction"
    tags: ["avcd", "surgical-management", "subject:paediatrics-neonatal", "supplement"]
  - guid: "i1j2k3l4m5n6o7p8"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Surgical timing for spina bifida (meningomyelocele)"
      Back: "Emergency surgical closure indicated within first 24-48 hours of birth to prevent infection/further neurologic deterioration; closure performed to prevent CSF leakage and prevent meningitis; VP shunt often required simultaneously if associated hydrocephalus present"
    tags: ["spina-bifida", "surgical-management", "subject:paediatrics-neonatal", "supplement"]
  - guid: "j2k3l4m5n6o7p8q9"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Surgical timing for encephalocoele"
      Back: "Surgical repair indicated to close skull defect; timing: early infancy (weeks to months of life) depending on size and content; earlier closure if small and symptomatic; VP shunt may be required if hydrocephalus present"
    tags: ["encephalocoele", "surgical-management", "subject:paediatrics-neonatal", "supplement"]
  - guid: "k3l4m5n6o7p8q9r0"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Define: hemizygous (genetics)"
      Back: "Condition in males with single X chromosome who carry one allele of an X-linked gene; males are hemizygous for all X-linked genes; mutant allele on X chromosome is always expressed (no second allele to mask the effect)"
    tags: ["definition", "genetics", "x-linked", "subject:paediatrics-neonatal", "supplement"]
  - guid: "l4m5n6o7p8q9r0s1"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Define: consanguinity (genetics)"
      Back: "Marriage or reproduction between blood relatives; increases homozygosity and risk of autosomal recessive disorders; parents share more DNA than unrelated individuals"
    tags: ["definition", "genetics", "inheritance-patterns", "subject:paediatrics-neonatal", "supplement"]
  - guid: "m5n6o7p8q9r0s1t2"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Define: advanced maternal age (AMA) - definition and risk"
      Back: "Maternal age ≥35 years at delivery; increases risk of chromosomal abnormalities (Down syndrome, Trisomy 18, Trisomy 13); risk increases with increasing maternal age (e.g., 1/250 at age 35; 1/30 at age 45)"
    tags: ["definition", "epidemiology", "subject:paediatrics-neonatal", "supplement"]
  - guid: "n6o7p8q9r0s1t2u3"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Define: advanced paternal age (APA) - definition and risk"
      Back: "Paternal age ≥40-50 years at conception; increases risk of de novo mutations (e.g., autosomal dominant conditions like achondroplasia, Waardenburg); associated with 1/3 of Waardenburg syndrome cases"
    tags: ["definition", "epidemiology", "subject:paediatrics-neonatal", "supplement"]
  - guid: "o7p8q9r0s1t2u3v4"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Define: de novo mutation"
      Back: "New genetic mutation arising spontaneously in a gamete or early zygote; not inherited from either parent; first manifestation of genetic disorder in a family; risk of recurrence to siblings low but risk to offspring depends on whether mutation is germline or somatic"
    tags: ["definition", "genetics", "inheritance-patterns", "subject:paediatrics-neonatal", "supplement"]
  - guid: "p8q9r0s1t2u3v4w5"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Define: anticipation (genetics)"
      Back: "Phenomenon where genetic disorder shows progressively earlier age of onset and/or increased severity in successive generations; seen in trinucleotide repeat disorders like myotonic dystrophy and Huntington disease"
    tags: ["definition", "genetics", "inheritance-patterns", "subject:paediatrics-neonatal", "supplement"]
  - guid: "q9r0s1t2u3v4w5x6"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Define: imprinting (genetics) - example with Prader-Willi"
      Back: "Selective silencing of one parental allele by DNA methylation; in Prader-Willi syndrome, paternal chromosome 15 inherited normally but maternal chromosome 15 is imprinted (silenced); if paternal chromosome 15 deleted, Prader-Willi results; if maternal chromosome deleted, Angelman syndrome results"
    tags: ["definition", "genetics", "imprinting", "subject:paediatrics-neonatal", "supplement"]
  - guid: "r0s1t2u3v4w5x6y7"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Recurrence risk: 2 affected AR parents × 1 affected child"
      Back: "100% - all offspring will be affected (homozygous for recessive allele); each parent contributes recessive allele with 100% certainty"
    tags: ["recurrence-risk", "autosomal-recessive", "subject:paediatrics-neonatal", "supplement"]
  - guid: "s1t2u3v4w5x6y7z8"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Recurrence risk: 1 affected + 1 carrier (AR condition)"
      Back: "50% affected offspring, 50% carrier offspring; affected parent is homozygous (contributes recessive allele with 100% certainty); carrier parent is heterozygous (contributes recessive or normal allele 50% each)"
    tags: ["recurrence-risk", "autosomal-recessive", "subject:paediatrics-neonatal", "supplement"]
  - guid: "t2u3v4w5x6y7z8a9"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Recurrence risk: X-linked recessive condition, affected male × normal female"
      Back: "0% affected sons; 100% carrier daughters; affected male (XaY) contributes Y to sons (normal) and Xa to daughters (carriers)"
    tags: ["recurrence-risk", "x-linked-recessive", "subject:paediatrics-neonatal", "supplement"]
  - guid: "u3v4w5x6y7z8a9b0"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Recurrence risk: X-linked recessive condition, carrier female × normal male"
      Back: "50% affected sons; 50% normal sons; 50% carrier daughters; 50% normal daughters; carrier mother (XAXa) has 50% chance of passing Xa (disease allele)"
    tags: ["recurrence-risk", "x-linked-recessive", "subject:paediatrics-neonatal", "supplement"]
  - guid: "v4w5x6y7z8a9b0c1"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Recurrence risk: X-linked recessive condition, affected female × affected male"
      Back: "100% affected sons; 100% affected daughters; rare scenario; both parents contribute disease allele to all offspring"
    tags: ["recurrence-risk", "x-linked-recessive", "subject:paediatrics-neonatal", "supplement"]
  - guid: "w5x6y7z8a9b0c1d2"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Recurrence risk: multifactorial inheritance (e.g., NTD, cleft palate)"
      Back: "3-5% for first-degree relatives (siblings, offspring) of affected individual; increases if multiple family members affected; higher if parent is affected female (higher recurrence than affected male for NTD)"
    tags: ["recurrence-risk", "multifactorial", "subject:paediatrics-neonatal", "supplement"]
  - guid: "x6y7z8a9b0c1d2e3"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Neural tube defect screening - prenatal detection methods"
      Back: "1. Maternal serum: alpha-fetoprotein (AFP) elevated in NTD; abnormal at 15-20 weeks; 2. Ultrasound: direct visualization of defect at 18-23 weeks; 3. Amniocentesis: if AFP elevated but US normal → check amniotic fluid AFP and acetylcholinesterase (confirmatory)"
    tags: ["ntd", "screening", "prenatal", "subject:paediatrics-neonatal", "supplement"]
  - guid: "y7z8a9b0c1d2e3f4"
    noteType: "Basic"
    deck: "Corpus::Paediatrics-Neonatal::2025 BIRTH DEFECTS"
    fields:
      Front: "Define: acetylcholinesterase (in context of NTD screening)"
      Back: "Enzyme present in CSF and amniotic fluid when there is exposure of spinal cord/brain (as in NTD); acetylcholinesterase in amniotic fluid is specific marker for NTD when combined with elevated AFP; used to confirm diagnosis in amniocentesis"
    tags: ["definition", "ntd-screening", "subject:paediatrics-neonatal", "supplement"]
