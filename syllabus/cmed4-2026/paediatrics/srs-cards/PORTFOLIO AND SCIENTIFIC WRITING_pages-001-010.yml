    fields:
      Front: "What is the purpose of integrating bedside learning with book learning in the paediatric portfolio?"
      Back: "To focus learning on specific questions relating to real clinical problems"
    tags: ["portfolio-objectives", "subject:paediatrics", "learning-integration"]

  - guid: "b2e4f3c6a9d8b5f2"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::PORTFOLIO AND SCIENTIFIC WRITING"
    fields:
      Front: "Name 4 principal learning objectives of the paediatric portfolio."
      Back: |
        1. Integrate bedside learning with book learning by focusing on specific questions relating to real clinical problems
        2. Improve the quality of clinical interviewing and examination skills
        3. Develop clinical reasoning skills for appropriate investigation, treatment and follow-up plans
        4. Reflection on the dimensions of the illness of the patient
    tags: ["portfolio-objectives", "subject:paediatrics", "learning-outcomes"]

