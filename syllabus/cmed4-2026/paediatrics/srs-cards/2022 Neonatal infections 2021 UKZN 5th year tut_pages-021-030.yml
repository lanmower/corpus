    fields:
      Front: "What is the clinical presentation of HIV-exposed neonates in the nursery?"
      Back: "Mostly asymptomatic neonates; may have other neonatal problems such as prematurity, meconium aspiration syndrome, or hypoxic-ischemic encephalopathy"
    tags: ["hiv", "clinical-presentation", "subject:paediatrics"]
  - guid: faedcfe0e00ff53d
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2022 Neonatal infections"
    fields:
      Front: "What is the clinical presentation of syphilis in the nursery?"
      Back: "Can be asymptomatic and missed if maternal status not checked; may become symptomatic later as late congenital syphilis"
    tags: ["syphilis", "clinical-presentation", "subject:paediatrics"]
  - guid: abedcff1f11ff54e
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2022 Neonatal infections"
    fields:
      Front: "What are the earliest clinical manifestations of early congenital syphilis?"
      Back: "Pneumonia (respiratory distress), rash, and hepatomegaly; often one or more features present - must look for others including long bone X-ray findings"
    tags: ["syphilis", "early-congenital", "subject:paediatrics"]
  - guid: bcedf002g22ff55f
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2022 Neonatal infections"
    fields:
      Front: "What is late congenital syphilis?"
      Back: "Presentation up to 5 years of age, represents a tragic lost opportunity, includes earlier features with permanent morbidity and difficult treatment"
    tags: ["syphilis", "late-congenital", "subject:paediatrics"]
