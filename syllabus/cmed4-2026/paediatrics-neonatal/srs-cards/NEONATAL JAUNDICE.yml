deck: "Corpus::Paediatrics-Neonatal::NEONATAL JAUNDICE"
notes:
  - guid: "jaundvis001abc"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::NEONATAL JAUNDICE"
    fields:
      Front: "At what serum bilirubin level is jaundice clinically visible?"
      Back: "85–120 µmol/ℓ"
    tags: ["jaundice-definition", "bilirubin", "subject:paediatrics-neonatal"]
  - guid: "jaundtype002abc"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::NEONATAL JAUNDICE"
    fields:
      Front: "What do UBR and CBR stand for in bilirubin classification?"
      Back: "UBR = unconjugated bilirubin (fat soluble); CBR = conjugated bilirubin (water soluble)"
    tags: ["jaundice-definition", "bilirubin", "subject:paediatrics-neonatal"]
  - guid: "jaundpath001abc"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::NEONATAL JAUNDICE"
    fields:
      Front: "Jaundice is pathological if it occurs within the first 24 hours. What is the bilirubin threshold for term infants?"
      Back: ">220 µmol/ℓ (term) or >204 µmol/ℓ (preterm)"
    tags: ["jaundice-pathology", "bilirubin-threshold", "subject:paediatrics-neonatal"]
  - guid: "jaundpath002abc"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::NEONATAL JAUNDICE"
    fields:
      Front: "What rate of bilirubin rise per day is considered pathological?"
      Back: ">85 µmol/ℓ per day"
    tags: ["jaundice-pathology", "bilirubin-threshold", "subject:paediatrics-neonatal"]
  - guid: "jaundpath003abc"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::NEONATAL JAUNDICE"
    fields:
      Front: "What serum direct bilirubin level is pathological?"
      Back: ">34 µmol/ℓ"
    tags: ["jaundice-pathology", "bilirubin-threshold", "subject:paediatrics-neonatal"]
  - guid: "jaundpath004abc"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::NEONATAL JAUNDICE"
    fields:
      Front: "For how long is jaundice considered pathological if it persists?"
      Back: "1 week (term infants) or 2 weeks (preterm infants)"
    tags: ["jaundice-pathology", "duration", "subject:paediatrics-neonatal"]
  - guid: "bilpath001abc"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::NEONATAL JAUNDICE"
    fields:
      Front: "First step in bilirubin synthesis from hemoglobin?"
      Back: "Hb → Globin + Heme"
    tags: ["bilirubin-metabolism", "biochemistry", "subject:paediatrics-neonatal"]
  - guid: "bilpath002abc"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::NEONATAL JAUNDICE"
    fields:
      Front: "What enzyme converts heme to biliverdin, and what does it release?"
      Back: "Heme Oxygenase (inhibited by metalloporphyrins); releases CO"
    tags: ["bilirubin-metabolism", "biochemistry", "subject:paediatrics-neonatal"]
  - guid: "bilpath003abc"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::NEONATAL JAUNDICE"
    fields:
      Front: "What enzyme converts biliverdin to bilirubin?"
      Back: "Biliverdin Reductase"
    tags: ["bilirubin-metabolism", "biochemistry", "subject:paediatrics-neonatal"]
  - guid: "bilmet001abc"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::NEONATAL JAUNDICE"
    fields:
      Front: "By what mechanism is unconjugated bilirubin taken up by the hepatocyte?"
      Back: "Via ligandin protein"
    tags: ["bilirubin-metabolism", "liver", "subject:paediatrics-neonatal"]
  - guid: "bilmet002abc"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::NEONATAL JAUNDICE"
    fields:
      Front: "With what molecule is bilirubin conjugated in the liver?"
      Back: "Glucuronic acid"
    tags: ["bilirubin-metabolism", "liver", "subject:paediatrics-neonatal"]
  - guid: "bilmet003abc"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::NEONATAL JAUNDICE"
    fields:
      Front: "Describe the route of conjugated bilirubin after hepatic conjugation"
      Back: "Excreted into bile → gallbladder → intestines"
    tags: ["bilirubin-metabolism", "liver", "subject:paediatrics-neonatal"]
  - guid: "bilmet004abc"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::NEONATAL JAUNDICE"
    fields:
      Front: "What are the two products of bilirubin deconjugation in the intestine?"
      Back: "Urobilinogen (urinary excretion) and stercobilin (faecal excretion)"
    tags: ["bilirubin-metabolism", "intestine", "subject:paediatrics-neonatal"]
  - guid: "bilmet005abc"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::NEONATAL JAUNDICE"
    fields:
      Front: "What is the name of the pathway by which unconjugated bilirubin is reabsorbed back to the liver?"
      Back: "Enterohepatic circulation"
    tags: ["bilirubin-metabolism", "intestine", "subject:paediatrics-neonatal"]
  - guid: "danger001abc"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::NEONATAL JAUNDICE"
    fields:
      Front: "Danger sign in jaundiced infants (1): family history"
      Back: "Family history of significant haemolytic disease"
    tags: ["danger-signs", "jaundice", "subject:paediatrics-neonatal"]
  - guid: "danger002abc"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::NEONATAL JAUNDICE"
    fields:
      Front: "Danger sign in jaundiced infants (2): timing"
      Back: "Onset in first 24 hours"
    tags: ["danger-signs", "jaundice", "subject:paediatrics-neonatal"]
  - guid: "danger003abc"
    noteType: Basic
