# Geriatric - Frailty - CMED4IIM1 - 2026 (Pages 001-003)
# SRS Cards extracted from audio transcript

- id: frailty-01
  front: "What physiological change occurs from birth until age 35?"
  back: "All body systems and organs develop and reach peak function at age 35. Peak function depends on lifestyle factors like exercise and smoking status."

- id: frailty-02
  front: "What happens to physiological function after age 35?"
  back: "There is a decline in physiological function after age 35. The rate of decline depends on the peak function achieved - those with higher peaks decline less severely than those with lower peaks."

- id: frailty-03
  front: "Define frailty."
  back: "Frailty is defined as the loss of a patient's ability to extend minor environmental stresses because of reduced reserve in the physiological function of several organ systems."

- id: frailty-04
  front: "What is a physiological reserve line in frailty?"
  back: "The physiological reserve line is the level below which patients cannot function normally. When physiological decline passes this reserve line, patients are deemed frail and have high risk of disability."

- id: frailty-05
  front: "How do robust individuals respond to stressors?"
  back: "Robust individuals (without frailty) experience a dip in physiological function when exposed to stressors (infection, fall, trauma, surgery), but recover back to their baseline."

- id: frailty-06
  front: "How do pre-frail individuals respond to stressors?"
  back: "Pre-frail individuals experience a dip in physiological function when exposed to stressors, but do not fully recover back to their baseline after recovery."

- id: frailty-07
  front: "How do frail individuals respond to stressors?"
  back: "Frail individuals hardly recover back to their baseline after exposure to stressors and typically become dependent, often unable to return home after hospitalization and requiring institutional care."

- id: frailty-08
  front: "What is sarcopenia and its relationship to frailty?"
  back: "Sarcopenia is reduced muscle strength and is a key feature of frailty. Frailty is associated with poor health outcomes."

- id: frailty-09
  front: "What are the five components of the Cardiovascular Health Study (CHS) frailty phenotype?"
  back: "The five components are: (1) unintentional weight loss >5% in previous year, (2) weakness measured by hand grip strength, (3) self-reported exhaustion or poor endurance, (4) slowness (timed 3-meter walk), and (5) low physical activity (self-reported)."

- id: frailty-10
  front: "How is frailty classified using the CHS frailty phenotype?"
  back: "Patients meeting 3 or more of the 5 CHS criteria are regarded as frail. Patients with 1-2 criteria are classified as pre-frail."

- id: frailty-11
  front: "What are the criteria for the Osteoporotic Fracture (OF) Frailty Index?"
  back: "The OF Frailty Index assesses: (1) weight loss >5% over two-year period (regardless of intent), (2) inability to rise from a chair 5 times without using arms, and (3) reduced energy levels. Patients with 2 or more criteria are regarded as frail."

- id: frailty-12
  front: "What is the Frailty Index or Deficit Accumulation method?"
  back: "The Frailty Index involves selecting 30 health deficits (symptoms, signs, diseases, disabilities, abnormal labs/imaging/ECGs) and counting how many the patient has. The score is calculated by dividing the number of deficits present by 30. A score ≥0.25 indicates frailty."

- id: frailty-13
  front: "What is the Frailty Scale classification system?"
  back: "The Frailty Scale classifies patients by functional ability: 1 = very fit; 5 = mild frail (need help with instrumental ADLs like transport, household chores, medication, finances); 9 = terminally ill (life expectancy <6 months)."

- id: frailty-14
  front: "What are the two main pathways to frailty?"
  back: "Primary frailty: genetic factors, atrocities, chronic inflammation, low exercise, malnutrition. Secondary frailty: chronic inflammation, genetic factors, low exercise leading to clinical disease, which then causes frailty and disability."

- id: frailty-15
  front: "What is the relationship between frailty and chronic disease?"
  back: "Patients with primary frailty are at higher risk of developing chronic diseases, which can lead to secondary frailty - creating a vicious cycle. Patients with secondary frailty may also develop primary frailty characteristics."

- id: frailty-16
  front: "What preventive measures can reduce frailty?"
  back: "Prevention includes: regular exercise, balanced diet, smoking cessation, alcohol reduction, disease management (e.g., diabetes control), and lifestyle modifications. Prevention is possible before reaching irreversible frailty stages."

- id: frailty-17
  front: "What happens once a patient reaches irreversible frailty?"
  back: "Once a patient reaches an irreversible stage of frailty, treatment shifts from prevention/rehabilitation to palliation (comfort care and symptom management)."

- id: frailty-18
  front: "What are the main risk factors for frailty?"
  back: "Risk factors include: age >80 years, female gender, smoking, depression, chronic diseases, and being underweight."

- id: frailty-19
  front: "What are the major consequences of frailty?"
  back: "Consequences include: falls, loss of ability to perform activities of daily living, disability, increased hospitalization risk with infections, malnutrition, cognitive impairment, osteoporosis, orthostatic hypertension, and increased mortality risk."

- id: frailty-20
  front: "What rehabilitation options are available for frail patients?"
  back: "Rehabilitation options include: exercise programs, disease management (even though genetics and age cannot be changed), lifestyle modifications, and activity enhancement. These can improve outcomes even in advanced frailty."
