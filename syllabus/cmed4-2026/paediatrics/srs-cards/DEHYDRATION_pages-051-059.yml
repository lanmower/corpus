    fields:
      Front: "Case 4: Child 3.1 kg with severe dehydration, no malnutrition, vomiting everything. What is the IV dose and drip rates?"
      Back: "Plan B: 20 ml/kg/hr x 4 hours = 20 x 3.1 = 62 ml/hr (round to 60 ml/hr). Using 60 drops/ml dropper: 62-60 drops per minute. Using 15 drops/ml dropper: 15 drops per minute. WARNING: ensure no more than 100 ml can run through suddenly."
    tags: ["dehydration", "iv-fluids", "drip-rate", "calculation", "case-study", "subject:paediatrics"]
  - guid: y5z6a7b8c9d0e1f2
