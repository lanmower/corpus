    fields:
      Front: "Practice Scenario 2 (Answers): A 4-year old convulsed 1 hour ago, fast breathing, no cyanosis, very hot, responds quickly. Why is this Priority?"
      Back: "Recent seizure with fever (likely febrile convulsion) and elevated temperature are priority signs, but maintained alertness and normal oxygenation prevent emergency classification."
