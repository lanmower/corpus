    fields:
      Front: "What are the CNS side effects of efavirenz (EFV)?"
      Back: |
        Efavirenz CNS side effects include: drowsiness, insomnia, abnormal dreams, hallucinations, nightmares, poor concentration. Bedtime dosing is recommended to minimize these effects.
    tags: ["efavirenz", "nnrti-drug", "cns-toxicity", "subject:paediatrics"]
