  - guid: "9db45318617947a4"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2024 NON ACCIDENTAL INJURIES"
    fields:
      Front: "What is the J88 form in the context of child sexual abuse?"
      Back: "The J88 is a medico-legal examination form completed by healthcare providers documenting: relevant history of sexual offence, details of medico-legal examination, clinical findings, gynaecological examination findings and conclusions, and diagrams of findings."
    tags: ["sexual-abuse", "legal-documentation", "j88-form", "subject:paediatrics"]
  - guid: "239c626f413a4bf0"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2024 NON ACCIDENTAL INJURIES"
    fields:
      Front: "What is the Adams Classification?"
      Back: "The Adams Classification describes the pattern of injuries in child sexual abuse, specifically genital findings, to standardize documentation and interpretation of examination findings."
    tags: ["sexual-abuse", "adams-classification", "genital-findings", "subject:paediatrics"]
  - guid: "b42eb011652d4308"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2024 NON ACCIDENTAL INJURIES"
    fields:
      Front: "What are the differential diagnoses to consider in suspected child sexual abuse?"
      Back: "Differential diagnoses: Bleeding disorders, Straddle injuries, Anaesthesia (causing anal dilatation), Conscious sedation, Vulvovaginitis (from worm infestation, poor hygiene, yeast infection, prolapsed anus from acute gastroenteritis, dermatological conditions like lichen sclerosus et atrophicus or eczema, harsh soaps, allergies, chlorine from swimming pool)."
    tags: ["sexual-abuse", "differential-diagnosis", "mimics", "subject:paediatrics"]
  - guid: "2486edb9e75d4c32"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2024 NON ACCIDENTAL INJURIES"
    fields:
      Front: "What is the key principle in evaluating straddle injuries as differential diagnosis?"
      Back: "There must be consistency between the history and the injury in straddle injuries. Ask: How did the injury occur? Common mechanisms include bicycle seat, palisade fence, concrete wall, car handbrake, shopping trolley, or broom handle."
    tags: ["sexual-abuse", "differential-diagnosis", "straddle-injury", "subject:paediatrics"]
