    fields:
      Front: "What is the recommended format for writing the Antenatal History section?"
      Back: "Concise format listing key points. Example: Mother - Hypertension on treatment, HIV infected on ARV's (not verbose sentences)"
    tags: ["history-antenatal", "subject:paediatrics", "writing-style"]

