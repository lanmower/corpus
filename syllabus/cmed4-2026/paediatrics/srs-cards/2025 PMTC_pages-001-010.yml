    noteType: "Basic"
    deck: "Corpus::Paediatrics::2025 PMTC"
    fields:
      Front: "List obscure clinical presentations of pediatric HIV infection."
      Back: |
        - Thrombocytopenia
        - Encephalopathy
        - Nephrotic syndrome
