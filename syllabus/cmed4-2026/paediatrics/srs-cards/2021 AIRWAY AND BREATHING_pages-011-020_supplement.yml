    fields:
      Front: "When should an oropharyngeal (OP) airway be removed?"
      Back: "Remove the oropharyngeal airway immediately if the child appears to have a gag reflex and begins to retch. A gag reflex indicates the child is regaining consciousness and the airway may no longer be tolerated."
