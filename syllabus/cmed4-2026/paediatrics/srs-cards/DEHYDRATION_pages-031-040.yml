    fields:
      Front: "What are the clinical signs of severe dehydration used for assessment?"
      Back: "Three key signs: (1) Lethargy or altered consciousness, (2) Sunken eyes, (3) Skin pinch goes back very slowly (longer than 2 seconds). If diarrhea + 2 of these signs present (but child not shocked), classify as severe dehydration."
    tags: ["dehydration", "clinical-signs", "assessment", "subject:paediatrics"]
  - guid: k1l2m3n4o5p6q7r8
    noteType: Basic
    deck: "Corpus::Paediatrics::DEHYDRATION"
    fields:
      Front: "What are additional assessment criteria for severe dehydration?"
      Back: "In addition to the 3 main signs, also assess for: (1) Severe malnutrition (visible severe wasting and/or oedema both feet), (2) Need to check and treat glucose levels if severe malnutrition present"
    tags: ["dehydration", "malnutrition", "assessment", "subject:paediatrics"]
  - guid: l2m3n4o5p6q7r8s9
