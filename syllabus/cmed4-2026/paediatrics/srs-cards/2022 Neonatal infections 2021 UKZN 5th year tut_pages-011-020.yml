  - guid: e3f4a5b6c79eff46
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2022 Neonatal infections"
    fields:
      Front: "What are prevention strategies for congenital infections?"
      Back: "Improved antenatal care, syphilis testing with documentation during pregnancy and treatment if needed, PMTCT (Prevention of Mother-To-Child Transmission) with ARV fast-tracking, TB screening, education about respiratory and viral pathogen exposure"
    tags: ["prevention", "congenital-infection", "subject:paediatrics"]
  - guid: f4a5b6c7d8aeff47
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2022 Neonatal infections"
    fields:
      Front: "What are prevention strategies for acquired and nosocomial neonatal infections?"
      Back: "Early skin-to-skin contact with mother (Kangaroo Mother Care), exclusive breastfeeding, strict hand washing, aseptic technique during procedures, limit duration of ventilation with active weaning"
    tags: ["prevention", "nosocomial-infection", "subject:paediatrics"]
  - guid: a5b6c7d8e9beff48
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2022 Neonatal infections"
    fields:
      Front: "What is the significance of congenital infections in South African maternal and child health?"
      Back: "Impact is significant; HIV is 3rd leading cause of maternal mortality in SA"
    tags: ["epidemiology", "south-africa", "subject:paediatrics"]
  - guid: b6c7d8e9faccff49
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2022 Neonatal infections"
    fields:
      Front: "Which congenital infections are prioritized in South African neonatal care?"
      Back: "HIV/PMTCT, Syphilis (commonest), TB, Hepatitis B, Malaria, Listeria monocytogenes, COVID-19"
    tags: ["epidemiology", "south-africa", "subject:paediatrics"]
  - guid: c7d8e9fadbdff50a
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2022 Neonatal infections"
    fields:
      Front: "What are the consequences of congenital tuberculosis in neonates?"
      Back: "Congenital TB: 43.48% (range 33.9-52.6%) mortality"
    tags: ["tuberculosis", "congenital-infection", "subject:paediatrics"]
  - guid: d8e9fadceceff51b
