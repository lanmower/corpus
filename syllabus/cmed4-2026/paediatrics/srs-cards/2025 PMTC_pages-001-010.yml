    noteType: "Basic"
    deck: "Corpus::Paediatrics::2025 PMTC"
    fields:
      Front: "What is the life expectancy in perinatal HIV infection post-HAART?"
      Back: ">95% living at 16 years"
    tags: ["hiv", "prognosis", "haart", "subject:paediatrics"]
  - guid: "w9c3a5e8b1f2d7h4"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2025 PMTC"
    fields:
      Front: "List the laboratory tests for HIV infection diagnosis and monitoring."
      Back: |
        - HIV antibody (ELISA, Western Blot)
        - HIV DNA by PCR (for diagnosis in neonates)
        - HIV RNA quantitation (viral load)
        - Genotype (mutations in resistant strains)
        - Phenotype (in vitro sensitivity)
        - Therapeutic drug monitoring
    tags: ["hiv", "testing", "laboratory", "subject:paediatrics"]
