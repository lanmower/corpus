    fields:
      Front: "What is the PMTCT 2020 treatment strategy for HIV in pregnancy?"
      Back: "Treat with Option B+ 2015: Start all HIV-positive pregnant women on ART as soon as possible; in labour if tested positive give TDF, 3TC, DLG (FDC) stat and continue lifelong next day with ART counselling and CHW referral"
    tags: ["hiv", "pmtct", "treatment", "subject:paediatrics"]
