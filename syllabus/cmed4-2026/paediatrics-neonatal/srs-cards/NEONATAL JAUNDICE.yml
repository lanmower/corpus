      Back: "Lower serum sodium over 24–48 hours to prevent cerebral oedema"
    tags: ["hypernatraemia-management", "treatment", "subject:paediatrics-neonatal"]
  - guid: "hyponatrem001abc"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::NEONATAL JAUNDICE"
