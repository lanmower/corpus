    deck: "Corpus::Paediatrics::RESP EXAM BY DR HLOPHE"
    fields:
      Front: "What is the correct hand position for percussion?"
      Back: "Place non-dominant hand on chest wall with middle finger firmly pressed against it. Strike the middle phalanx with dominant hand's middle finger using a wrist swing."
    tags:
      - "percussion"
      - "examination-technique"
      - "subject:paediatrics"
