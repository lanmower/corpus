deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
notes:
  - guid: 6f7e9a2c1b5d4e3f
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What is the WHO End TB strategy timeframe and its main goals?"
      Back: "2016 to 2035. Goals: 90% reduction in TB deaths and 80% reduction in TB incidence."
    tags: ["epidemiology", "who-strategy", "subject:paediatrics"]
  - guid: 4a2b8c1f7e9d3a5c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What is the TB incidence in children compared to adults?"
      Back: "TB incidence in children is approximately half that in adults."
    tags: ["epidemiology", "incidence-rates", "subject:paediatrics"]
  - guid: 1e5f3a9b2c7d4e8a
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What proportion of infants (<12 months) progress to active TB disease after primary TB infection?"
      Back: "50% of infants progress to active TB disease after primary TB infection."
    tags: ["epidemiology", "infants", "progression-risk", "subject:paediatrics"]
  - guid: 7c3b1a5f9e2d4b8c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What percentage of infants develop complicated TB (miliary TB and/or TB meningitis)?"
      Back: "10-20% of infants develop complicated TB (miliary TB and/or TB meningitis)."
    tags: ["epidemiology", "complications", "infants", "subject:paediatrics"]
  - guid: 2d9e7a1c5b3f4e8a
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "Define adherence in TB management."
      Back: "The extent to which a person's behaviour corresponds with agreed recommendations from a healthcare worker for taking medication, following a diet and/or making lifestyle changes."
    tags: ["definitions", "adherence", "subject:paediatrics"]
  - guid: 8f1c4a7b2e5d3a9c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What is the WHO definition of adolescent?"
      Back: "A person aged 15 to 19 years."
    tags: ["definitions", "age-groups", "subject:paediatrics"]
  - guid: 3a5e1b9f2c7d4a8e
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "At what weight can children typically be treated with adult doses of TB medications?"
      Back: "Children weighing >25kg (typically eight to ten years of age) can be treated with adult doses of TB medications."
    tags: ["definitions", "dosing", "weight-based", "subject:paediatrics"]
  - guid: 9c2f8a3b1e5d7c4a
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "Define index patient in TB context."
      Back: "A person with infectious pulmonary TB who is newly diagnosed."
    tags: ["definitions", "tb-cases", "subject:paediatrics"]
  - guid: 4e7a2c1f9b5d3a8c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "Define latent TB infection."
      Back: "A state of immune response to stimulation by Mycobacterium tuberculosis antigens, indicated by a positive tuberculin skin test (TST) or interferon-gamma release assay (IGRA) test, with no evidence of active TB disease."
    tags: ["definitions", "latent-tb", "subject:paediatrics"]
  - guid: 1f8b4d5c2a7e9a3c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "Define recent TB exposure."
      Back: "Contact with a person diagnosed with pulmonary TB in the last 12 months. The person may be from the same household, or be a close contact outside of the household setting, e.g., a care provider, colleague, teacher, family member or friend."
    tags: ["definitions", "exposure", "contact-tracing", "subject:paediatrics"]
  - guid: 5c9a1e7b3f2d4a8c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "Define significant TB exposure."
      Back: "Known exposure to a person (adult or adolescent) with pulmonary TB who shared the same enclosed space for one or more nights or for frequent or extended daytime periods during the three months before the index patient starting their TB treatment."
    tags: ["definitions", "exposure", "contact-criteria", "subject:paediatrics"]
  - guid: 8a2c7f1b5e3d9a4c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "Define TB contact."
      Back: "All people (family members and other individuals; regardless of age and HIV status) who have had a 'significant TB exposure' – shared the same enclosed space with a TB index patient for one or more nights or for frequent or extended daytime periods during three months before the start of current treatment."
    tags: ["definitions", "contacts", "subject:paediatrics"]
  - guid: 3d1a9c4f7e2b5a8c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "Define TB disease."
      Back: "Disease caused by Mycobacterium tuberculosis. TB can either be bacteriologically confirmed or clinically diagnosed."
    tags: ["definitions", "tb-disease", "subject:paediatrics"]
  - guid: 7b5a2e1c9f3d4a8c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "Define TB exposed infants."
      Back: "Infants born to mothers who were diagnosed with TB before or after the baby was born, or other documented close TB exposure in the infant (e.g. another caregiver, family member, day care provider)."
    tags: ["definitions", "congenital-tb", "subject:paediatrics"]
  - guid: 2f8c4a1e7b5d3a9c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What does 3HP regimen stand for?"
      Back: "Three months of weekly isoniazid plus rifapentine."
    tags: ["regimens", "preventive-therapy", "tpt", "subject:paediatrics"]
  - guid: 9e3a5c1b7f2d4a8c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What does 3RH regimen stand for?"
      Back: "Three months of daily rifampicin plus isoniazid."
    tags: ["regimens", "preventive-therapy", "tpt", "subject:paediatrics"]
  - guid: 4c1f8a5b2e7d3a9c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What does 6H regimen stand for?"
      Back: "Six months of daily isoniazid monotherapy."
    tags: ["regimens", "preventive-therapy", "tpt", "subject:paediatrics"]
  - guid: 1a7d3c5b9f2e4a8c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What does 12H regimen stand for?"
      Back: "12 months of daily isoniazid monotherapy."
    tags: ["regimens", "preventive-therapy", "tpt", "subject:paediatrics"]
  - guid: 8f2a4e1c5b7d3a9c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "Define contact-tracing in TB management."
      Back: "The strategy by which individuals in contact with a case of confirmed or suspected pulmonary TB are screened for the presence of TB infection or disease, with the aim of offering either anti-tuberculosis preventive therapy or anti-tuberculosis chemotherapy."
    tags: ["contact-tracing", "screening", "subject:paediatrics"]
  - guid: 5e9a1c3f7b2d4a8c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "Define reverse contact-tracing."
      Back: "The strategy adopted when a child is the index case with active TB, and the potential source case (usually an adult or older child in the index case's home environment) is sought by symptom screening and/or chest radiography of household contacts."
    tags: ["contact-tracing", "reverse-tracing", "subject:paediatrics"]
  - guid: 3a8f1b5e9c2d4a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What are the key factors determining TB disease progression in children?"
      Back: "Age of the child (<5 years of age), time since exposure/infection (±1 year), and immune status of the child."
    tags: ["pathogenesis", "risk-factors", "subject:paediatrics"]
  - guid: 7c4a2f1e9b5d3a8c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What is the typical size range of MTB bacilli?"
      Back: "MTB bacilli range in length from 1-10 μm (micrometers)."
    tags: ["microbiology", "mtb-characteristics", "subject:paediatrics"]
  - guid: 2e5b8a1f7c3d4a9c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "Why are children <10 years of age less likely to transmit TB?"
      Back: "Children <10 years of age rarely develop lung cavities, and therefore are less likely to transmit the TB organism."
    tags: ["transmission", "pathogenesis", "subject:paediatrics"]
  - guid: 9a1c5f3b7e2d4a8c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What major pathogenic components does MTB have in its cell wall?"
      Back: "Heat shock proteins (highly immunogenic), cord factor (glycolipid that induces granuloma), and LAM (lipoarabinomannan)."
    tags: ["pathogenesis", "cell-wall", "immunology", "subject:paediatrics"]
  - guid: 4d7e2a1f9b5c3a8c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What percentage of bacterial mass does LAM represent?"
      Back: "LAM (lipoarabinomannan) represents 15% of the bacterial mass."
    tags: ["pathogenesis", "lam", "immunology", "subject:paediatrics"]
  - guid: 1f9a4c3b7e2d5a8c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What are the effects of LAM on immune response?"
      Back: "LAM inhibits macrophage activation by interferon gamma, and induces macrophage to secrete IL-10 (suppresses TB-induced T cell proliferation) and TNF alpha (causing fever, weight loss and tissue damage)."
    tags: ["pathogenesis", "lam", "immunology", "subject:paediatrics"]
  - guid: 5c2f8b1a9e3d4a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What is the Ghon focus and when does it develop?"
      Back: "The Ghon focus is the initial inflammatory reaction site in the lung parenchyma where TB organism deposits. It develops within 2-3 weeks of infection and may resolve and calcify."
    tags: ["pathophysiology", "ghon-complex", "subject:paediatrics"]
  - guid: 8e1a5d3c7f2b4a9c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What is the Ghon complex?"
      Back: "The Ghon complex includes the Ghon focus in the lung parenchyma together with enlarged regional hilar lymph nodes. It represents a controlled and retained non-proliferating Mycobacterium."
    tags: ["pathophysiology", "ghon-complex", "latent-tb", "subject:paediatrics"]
  - guid: 3a9f1c5e8b2d7a4c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What are the three possible outcomes of TB infection in the primary phase?"
      Back: "1) Can be cleared by host immunity (primary infection). 2) Suppressed into inactive form (latent TB) with calcified scar visible on X-ray. 3) Spread (active TB)."
    tags: ["pathophysiology", "primary-infection", "subject:paediatrics"]
  - guid: 7d2c4f1b9a5e3a8c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What is fibrocaseous TB?"
      Back: "TB in which hydrolytic enzymes dissolve MTB in larger lesions surrounded by fibrous capsule. Fibrocaseous nodules contain viable mycobacterium and pose lifelong risk for reactivation."
    tags: ["pathophysiology", "active-tb", "subject:paediatrics"]
  - guid: 9f3a1e5b7c2d4a8c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What is proliferative TB granuloma?"
      Back: "Granuloma with effective killing of Mycobacterium due to proliferating lymphocytes, plasma cells, outer rim of fibrosis, and low bacillary load."
    tags: ["pathophysiology", "granuloma", "subject:paediatrics"]
  - guid: 2e8c4a1f5b9d3a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What is exudative TB granuloma?"
      Back: "Granuloma with higher bacillary load, caseating necrosis, and progression of infection if not treated. Also called caseating granuloma/fibrocaseous."
    tags: ["pathophysiology", "granuloma", "active-disease", "subject:paediatrics"]
  - guid: 4a7f2d1c9e5b3a8c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "List the constitutional symptoms of TB infection."
      Back: "Fever and night sweats, weight loss and failure to thrive, fatigue and anorexia."
    tags: ["symptoms", "clinical-presentation", "subject:paediatrics"]
  - guid: 1c9b5a3e8f2d4a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What number of symptom criteria is highly suggestive of TB diagnosis?"
      Back: "2 or more of the TB symptom criteria are highly suggestive of TB diagnosis."
    tags: ["symptoms", "diagnosis", "subject:paediatrics"]
  - guid: 6a2f8c1e5b9d3a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What is the symptom criterion for persistent cough in TB screening?"
      Back: "Persistent or non-remitting cough/wheeze >2 weeks (unresponsive to appropriate antibiotics for community-acquired pneumonia)."
    tags: ["symptoms", "respiratory", "screening", "subject:paediatrics"]
  - guid: 3e7a1f5b8c2d4a9c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What is the symptom criterion for weight loss in TB screening?"
      Back: "Documented low weight or failure to thrive (FTT) for the past 3 months (especially if not responding to intervention)."
    tags: ["symptoms", "growth", "screening", "subject:paediatrics"]
  - guid: 8f1c4a5b9e2d7a3c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What are the clinical hypersensitivity phenomena occurring 4-12 weeks after primary TB infection?"
      Back: "1) TST conversion. 2) Erythema nodosum (raised red, painful macules on anterior lower legs). 3) Phlyctenular conjunctivitis (raised red nodule on limbus with conjunctival injection). 4) Poncet's polyarthritis."
    tags: ["hypersensitivity", "clinical-signs", "subject:paediatrics"]
  - guid: 5d8b2e1f9c5a3a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What is the clinical presentation of TB pulmonary disease with airway involvement?"
      Back: "Atelectasis of the involved segment/lung, cough, enlarged regional nodes, and large airway (monophonic) wheezing that responds poorly to bronchodilators."
    tags: ["pulmonary-tb", "clinical-presentation", "subject:paediatrics"]
