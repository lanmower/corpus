    noteType: "Basic"
    deck: "Corpus::Paediatrics::PORTFOLIO AND SCIENTIFIC WRITING"
    fields:
      Front: "What should the Examination section include?"
      Back: "Anthropometry & nutritional assessment with interpretation, General observations with interpretation, General exam (relevance), Systems examination"
    tags: ["examination-section", "subject:paediatrics", "clinical-assessment"]

  - guid: "c3f5a4d7b0e1c6f4"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::PORTFOLIO AND SCIENTIFIC WRITING"
    fields:
      Front: "What is the sequence for systems examination in the portfolio case?"
      Back: "Examine the relevant system first, then all other systems"
    tags: ["examination-section", "subject:paediatrics", "clinical-method"]

  - guid: "d4a6b5e8c1f2d7g5"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::PORTFOLIO AND SCIENTIFIC WRITING"
    fields:
      Front: "What must be documented regarding examination findings?"
      Back: "Note important positive and negative findings. Signs must be those found at the time of examining the patient. Do not quote signs found 3 weeks ago."
    tags: ["examination-section", "subject:paediatrics", "documentation"]

