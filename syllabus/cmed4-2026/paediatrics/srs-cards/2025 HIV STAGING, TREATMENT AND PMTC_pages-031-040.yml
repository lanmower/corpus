    fields:
      Front: "What is paediatric dolutegravir (pDTG) formulation and dosing?"
      Back: |
        Paediatric dolutegravir 10 mg dispersable scored tablets for standard first-line use in children >4 weeks to <10 years in weight band 3-20 kg. Benefits include increased clinical efficacy, better side effect profile, ease of administration, and improved palatability.
