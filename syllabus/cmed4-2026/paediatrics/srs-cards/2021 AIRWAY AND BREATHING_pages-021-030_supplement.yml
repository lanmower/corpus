    deck: "Corpus::Paediatrics::2021 AIRWAY AND BREATHING"
    fields:
      Front: "What is the oxygen concentration delivered by a non-rebreather (reservoir bag) mask?"
      Back: "A non-rebreather mask with reservoir bag delivers the highest concentration of oxygen available, typically >80% when properly sealed. It is the preferred method for emergency oxygen delivery requiring maximum concentration."
    tags: ["non-rebreather-mask", "oxygen-concentration-percentage", "oxygen-delivery", "subject:paediatrics"]
  - guid: "d9z8y7x6w5v4u3t5"
    noteType: Basic
    deck: "Corpus::Paediatrics::2021 AIRWAY AND BREATHING"
    fields:
      Front: "What oxygen concentrations are available from different Venturi face mask fittings?"
      Back: "Venturi face masks deliver 28-60% oxygen concentrations depending on the colour code of the Venturi fitting used. Check the bottom of the Venturi fitting to identify which oxygen percentage it will deliver. The actual percentage delivered depends on correct flow rate of 100% oxygen to the fitting."
    tags: ["venturi-mask", "oxygen-concentration-percentage", "oxygen-delivery", "subject:paediatrics"]
  - guid: "e9z8y7x6w5v4u3t6"
    noteType: Basic
    deck: "Corpus::Paediatrics::2021 AIRWAY AND BREATHING"
    fields:
      Front: "What oxygen concentrations can be achieved with nasal prongs at different flow rates?"
      Back: "Using 100% oxygen at flow rates of 1 L/min in infants and 1-2 L/min in older children, nasal prongs deliver 30-35% oxygen concentration in the inspired air. Keep nose clear of mucus to prevent obstruction of oxygen flow."
    tags: ["nasal-prongs", "oxygen-concentration-percentage", "oxygen-delivery", "subject:paediatrics"]
  - guid: "f9z8y7x6w5v4u3t7"
    noteType: Basic
    deck: "Corpus::Paediatrics::2021 AIRWAY AND BREATHING"
    fields:
      Front: "What oxygen concentrations can be achieved with a nasal catheter?"
      Back: "Using 100% oxygen at flow rates of 0.5 L/min in infants and 1 L/min in older children, a nasal catheter delivers 35-40% oxygen concentration in the inspired air. Tip of catheter should not be visible below the uvula."
    tags: ["nasal-catheter", "oxygen-concentration-percentage", "oxygen-delivery", "subject:paediatrics"]
  - guid: "g9z8y7x6w5v4u3t8"
    noteType: Basic
    deck: "Corpus::Paediatrics::2021 AIRWAY AND BREATHING"
    fields:
      Front: "What is the typical output of an oxygen concentrator and what is its best use?"
      Back: "An oxygen concentrator produces about 5 L/min of oxygen by pumping room air through a zeolite canister to remove nitrogen. This is best used with nasal prongs or catheters which do not require high flow rates to achieve adequate oxygen concentration."
    tags: ["oxygen-concentrator", "oxygen-output", "oxygen-sources", "subject:paediatrics"]
