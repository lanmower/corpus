notes:
  - guid: 2f8a1c3e9b5d4a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "List all major TB drugs used in paediatric regimens."
      Back: "Isoniazid (H), rifampicin (R), rifapentine, pyrazinamide (Z), and ethambutol (E)."
    tags: ["treatment", "drugs", "subject:paediatrics"]
  - guid: 5c3f1a9e8b2d4a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What are the standard pediatric TB treatment regimens?"
      Back: "TPT regimens: 3HP (3 months isoniazid + rifapentine weekly), 3RH (3 months rifampicin + isoniazid daily), 6H (6 months isoniazid daily), 12H (12 months isoniazid daily). TB disease treatment per regimen type (uncomplicated, complicated, miliary, or meningitis)."
    tags: ["treatment", "regimens", "subject:paediatrics"]
  - guid: 9a4b2f1c8e5d3a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What is Regimen 3A for TB disease treatment?"
      Back: "Regimen 3A is used for children <8 years with uncomplicated and congenital TB disease (specific dosages and durations per national guidelines)."
    tags: ["treatment", "regimens", "age-specific", "subject:paediatrics"]
  - guid: 3e7c4a1f9d5b2a8c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What weight threshold determines adult TB drug dosing in children?"
      Back: "Children weighing >25 kg (typically 8-10 years) can be treated with adult doses of TB medications."
    tags: ["treatment", "dosing", "weight-based", "subject:paediatrics"]
  - guid: 7a1f3c5b9e2d4a8c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What is the standard duration of TB preventive therapy (TPT) regimens?"
      Back: "3HP: 3 months weekly. 3RH: 3 months daily. 6H: 6 months daily. 12H: 12 months daily."
    tags: ["treatment", "tpt", "duration", "subject:paediatrics"]
  - guid: 1c8a9f3e5b2d4a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What is the dosing frequency for 3HP regimen?"
      Back: "3HP (three months of weekly isoniazid plus rifapentine) is administered weekly for 3 months."
    tags: ["treatment", "tpt", "3hp", "dosing", "subject:paediatrics"]
  - guid: 4f2b1a3c9e5d2a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What is the dosing frequency for 3RH and 6H regimens?"
      Back: "Both 3RH (3 months) and 6H (6 months) are administered daily."
    tags: ["treatment", "tpt", "3rh", "6h", "dosing", "subject:paediatrics"]
  - guid: 8d3f2c1a9b5e4a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "When is TB preventive therapy (TPT) indicated?"
      Back: "TPT is indicated for TB contacts, TB-exposed infants, and children with latent TB infection to prevent progression to active TB disease."
    tags: ["treatment", "tpt", "indications", "subject:paediatrics"]
  - guid: 2a5c1f3e9d5b4a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What are the TST cutoff values for TB diagnosis in different child populations?"
      Back: "TST ≥5 mm in children <5 years, HIV-infected children, or those with evidence of TB exposure. TST ≥10 mm in children ≥5 years without risk factors. TST ≥15 mm in non-BCG vaccinated children without TB risk."
    tags: ["diagnosis", "tst", "cutoff-values", "subject:paediatrics"]
  - guid: 5e7a2c1f9b3d4a8c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What baseline investigations are needed before starting TB treatment?"
      Back: "HIV testing, assess for ART eligibility in co-infected children, nutritional assessment, psychosocial evaluation, chest X-ray, and TB Register completion."
    tags: ["management", "baseline-investigations", "subject:paediatrics"]
  - guid: 9c1a4f3e8b5d2a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What are adverse effects monitoring parameters during TB treatment?"
      Back: "Monitor liver function tests, peripheral neuropathy, visual acuity (if on ethambutol), ototoxicity (if on streptomycin), and hypersensitivity reactions."
    tags: ["treatment", "monitoring", "adverse-effects", "subject:paediatrics"]
  - guid: 3f8b2a1e9c5d4a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "How is treatment adherence assessed in pediatric TB?"
      Back: "Regular clinic visits, pill counts, clinical response monitoring (appetite, weight gain, symptom resolution), and radiological improvement on follow-up chest X-ray."
    tags: ["treatment", "adherence", "monitoring", "subject:paediatrics"]
  - guid: 7c2f4a1e9a5d3b8c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What is the treatment outcome definition for cured TB?"
      Back: "Cured: Completed treatment with evidence of clinical and radiological improvement (no relapse for at least 12 months after treatment completion)."
    tags: ["treatment", "outcomes", "subject:paediatrics"]
  - guid: 1a9e3c5b8f2d4a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What is treatment failure in pediatric TB?"
      Back: "Treatment failure: Lack of clinical improvement or radiological deterioration despite adequate treatment and adherence for at least 4 months."
    tags: ["treatment", "outcomes", "failure", "subject:paediatrics"]
  - guid: 4e2c1a3f9d5b8a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What is default in TB treatment?"
      Back: "Default: Loss to follow-up/interruption of treatment for more than 2 consecutive months after the start of treatment."
    tags: ["treatment", "outcomes", "default", "subject:paediatrics"]
  - guid: 8a3f1c5e9b2d4a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What characterizes the intensive phase of TB treatment?"
      Back: "Intensive phase: First 2 months of anti-TB drugs with maximum bactericidal activity to eliminate the majority of viable TB organisms."
    tags: ["treatment", "intensive-phase", "subject:paediatrics"]
  - guid: 2f7b4a1e9c5d3a8c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What characterizes the continuation phase of TB treatment?"
      Back: "Continuation phase: Remaining treatment duration to prevent relapse and eliminate remaining bacilli. Duration varies (2-4 months typically) based on TB type and response."
    tags: ["treatment", "continuation-phase", "subject:paediatrics"]
  - guid: 5c1f9a3e8d5b2a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What is the typical total duration of uncomplicated pulmonary TB treatment in children?"
      Back: "Typically 6 months total: 2 months intensive phase + 4 months continuation phase."
    tags: ["treatment", "duration", "uncomplicated-ptb", "subject:paediatrics"]
  - guid: 9a4b1f3c8e5d2a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What is the treatment duration for complicated pulmonary TB?"
      Back: "Complicated pulmonary TB typically requires 8 months treatment: 2 months intensive + 6 months continuation phase."
    tags: ["treatment", "duration", "complicated-ptb", "subject:paediatrics"]
  - guid: 3e9c2a1f8b5d4a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What is the treatment duration for miliary TB?"
      Back: "Miliary TB typically requires 8 months treatment with potential for 2 months initial phase with 4 drugs depending on severity."
    tags: ["treatment", "duration", "miliary-tb", "subject:paediatrics"]
  - guid: 7d2a4f1e9c5b3a8c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What is the standard treatment duration for TB meningitis?"
      Back: "TB meningitis typically requires 9-12 months treatment due to poor drug penetration into CSF and severity of disease."
    tags: ["treatment", "duration", "tb-meningitis", "subject:paediatrics"]
  - guid: 1f8a3c5e9b2d4a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "Are corticosteroids used in TB meningitis treatment?"
      Back: "Yes. Corticosteroids (typically dexamethasone or prednisone) are used as adjunctive therapy in TB meningitis to reduce inflammation and prevent complications."
    tags: ["treatment", "corticosteroids", "tb-meningitis", "subject:paediatrics"]
  - guid: 4c3f1a9e8d5b2a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What is the role of nutritional support in TB treatment?"
      Back: "Nutritional support is essential as TB is associated with malnutrition, which impairs immune function and treatment response. Adequate nutrition promotes weight gain and recovery."
    tags: ["treatment", "nutrition", "support", "subject:paediatrics"]
  - guid: 8e1b2f3c9a5d4a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What supplementation is recommended alongside TB drugs?"
      Back: "Pyridoxine (vitamin B6) is recommended to all children on TB and/or ARV treatment to prevent peripheral neuropathy from isoniazid toxicity."
    tags: ["treatment", "supplementation", "subject:paediatrics"]
  - guid: 2a7c4b1f8e3d5a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What drug interactions occur between TB drugs and ART?"
      Back: "Rifampicin induces hepatic enzymes, reducing ART levels. Lopinavir/ritonavir levels are affected, requiring dose adjustments. Isoniazid may accumulate with certain PIs."
    tags: ["treatment", "drug-interactions", "hiv-coinfection", "subject:paediatrics"]
  - guid: 5f2a1c3e9b5d4a8c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What is the impact of TB treatment on TB transmission?"
      Back: "Appropriate TB treatment renders a child non-infectious within 2 weeks of starting effective therapy, reducing transmission risk significantly."
    tags: ["treatment", "transmission", "infection-control", "subject:paediatrics"]
  - guid: 9c3e1a5f8b2d4a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What infection control measures should be implemented during TB treatment?"
      Back: "Respiratory isolation for symptomatic patients (first 2 weeks), good ventilation, use of masks for close contacts, and adherence to treatment for rapid infectivity reduction."
    tags: ["treatment", "infection-control", "subject:paediatrics"]
  - guid: 3a6f2c1e9d5b4a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "How should treatment failures be managed?"
      Back: "Treatment failures require: 1) Assess adherence 2) Investigate for drug malabsorption 3) Re-evaluate diagnosis 4) Perform drug susceptibility testing 5) Consider resistance and modify regimen accordingly."
    tags: ["treatment", "management", "failure", "subject:paediatrics"]
  - guid: 7b4a2f1e9c5d3a8c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What are the key components of TB contact screening?"
      Back: "Clinical assessment for TB symptoms, tuberculin skin test (TST) or IGRA, chest X-ray if symptomatic, and TB preventive therapy for eligible contacts."
    tags: ["contact-tracing", "screening", "subject:paediatrics"]
  - guid: 1e9c3f5a8b2d4a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "When should TB preventive therapy be started in contacts?"
      Back: "TPT should be started after active TB disease has been excluded through clinical assessment, symptom screening, and radiography in TB contacts."
    tags: ["contact-tracing", "tpt", "subject:paediatrics"]
  - guid: 4d7a1f3c9e5b8a2c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What documents provide the updated guidance for pediatric TB management?"
      Back: "WHO 2014 guidance for national TB programmes, National Guidelines on Treatment of TB infection 2023, and Southern African society for pediatric infectious diseases guidelines."
    tags: ["guidelines", "references", "subject:paediatrics"]
