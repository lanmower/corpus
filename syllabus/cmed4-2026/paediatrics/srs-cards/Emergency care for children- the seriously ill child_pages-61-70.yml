  - guid: "x9a2e5d1g7c4f3b8"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::Emergency care - the seriously ill child"
    fields:
      Front: "What is the key clinical difference between Emergency (E) and Priority (P) triage categories?"
      Back: "Emergency: Child has signs of ABCC-C-D (airway, breathing, circulation, coma, convulsion, dehydration) or other life-threatening conditions requiring immediate treatment. Priority: Child has concerning signs (3TPR-MOB) that require early assessment but not immediate emergency intervention."
    tags: ["triage-differentiation", "emergency", "priority", "subject:paediatrics"]

  - guid: "y3c6b4f9a1h2d7e5"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::Emergency care - the seriously ill child"
    fields:
      Front: "What vital sign changes suggest a child is moving into shock (circulatory compromise)?"
      Back: "Cold hands, capillary refill >2 seconds, weak or absent pulses, weak and fast pulse (weak at wrist, fast rate), and altered consciousness."
    tags: ["shock", "circulation", "vital-signs", "subject:paediatrics"]

  - guid: "z1f3a7e2b9c4d5g6"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::Emergency care - the seriously ill child"
    fields:
      Front: "What are the assessment priorities in order when evaluating a seriously ill child?"
      Back: "1. Airway - Is it open and clear?\n2. Breathing - Is the child breathing effectively?\n3. Circulation - Are there signs of adequate perfusion?\n4. Consciousness - What is the AVPU level?\n5. Convulsions - Is the child fitting?\n6. Dehydration - What is the fluid status?"
    tags: ["assessment", "priorities", "abcd", "subject:paediatrics"]
