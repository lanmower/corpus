    deck: "Corpus::Pulmonology::Lung-Cancer-pages-011-013"
    fields:
      Front: "What is syndrome of inappropriate antidiuretic hormone (SIADH) in lung cancer?"
      Back: "A paraneoplastic syndrome seen in around 10% of patients with small cell lung cancer, presenting with hyponatremia symptoms and potentially cerebral edema."
    tags: ["subject:pulmonology"]
  - guid: 17c4efa1eaf3690b
    noteType: Basic
    deck: "Corpus::Pulmonology::Lung-Cancer-pages-011-013"
    fields:
      Front: "What causes Cushing syndrome in lung cancer and its clinical features?"
      Back: "Caused by glucocorticoids from lung cancer or ectopic ACTH. Features include hypertension, hypoglycemia, moon facies, muscle weakness, purple striae, and buffalo hump."
    tags: ["subject:pulmonology"]
  - guid: ab9c7611fdb8c49a
    noteType: Basic
    deck: "Corpus::Pulmonology::Lung-Cancer-pages-011-013"
    fields:
      Front: "What is hypertrophic osteoarthropathy in lung cancer?"
      Back: "Syndrome with clubbing and wrist bone swelling, featuring symmetrical painful arthropathy of distal joints, wrists, and ankles."
    tags: ["subject:pulmonology"]
  - guid: 45148935c27eef47
    noteType: Basic
    deck: "Corpus::Pulmonology::Lung-Cancer-pages-011-013"
    fields:
      Front: "What aspects of history should be taken in suspected lung cancer?"
      Back: "Presenting complaint duration, alleviating/aggravating factors, associated symptoms, medical history, comorbidities, risk factors (asbestos, smoking), family history, and environmental exposures."
    tags: ["subject:pulmonology"]
  - guid: d8389007ea6fcbd9
    noteType: Basic
    deck: "Corpus::Pulmonology::Lung-Cancer-pages-011-013"
    fields:
      Front: "What physical examination findings suggest lung cancer?"
      Back: "Weight loss, finger clubbing (especially in smokers), dullness to percussion from tumor or collapse, tracheal deviation, and pleural effusion signs."
    tags: ["subject:pulmonology"]
  - guid: 2957eb81d2a02894
    noteType: Basic
    deck: "Corpus::Pulmonology::Lung-Cancer-pages-011-013"
    fields:
      Front: "What symptoms and signs indicate possible lung cancer?"
      Back: "Cough, hemoptysis, shortness of breath, wheezing, pain, pleural effusion, superior vena cava obstruction (Pemberton sign), hoarseness, elevated hemidiaphragm on X-ray, dysphagia, and metastatic symptoms."
    tags: ["subject:pulmonology"]
  - guid: bf42f576887fd14e
    noteType: Basic
    deck: "Corpus::Pulmonology::Lung-Cancer-pages-011-013"
    fields:
      Front: "What chest X-ray findings suggest lung cancer?"
      Back: "Single or multiple masses, pleural effusion, lung collapse, hilar lymph node enlargement, and cavitating masses. Normal CXR does not rule out small tumors."
    tags: ["subject:pulmonology"]
  - guid: 5972094dac4b994b
    noteType: Basic
    deck: "Corpus::Pulmonology::Lung-Cancer-pages-011-013"
    fields:
      Front: "How does CT compare to chest X-ray for lung cancer detection?"
      Back: "CT has sensitivity around 85% and specificity around 100% versus chest X-ray. Small tumors missed on CXR should prompt high-resolution CT if clinical suspicion is high."
    tags: ["subject:pulmonology"]
  - guid: 572007afaf2af05d
    noteType: Basic
    deck: "Corpus::Pulmonology::Lung-Cancer-pages-011-013"
    fields:
      Front: "What information does CT provide for lung cancer staging?"
      Back: "Tumor size, separate nodules, lung collapse, obstructive pneumonia, invasion of adjacent structures, proximal tumor extent, and involvement sites for biopsy selection."
    tags: ["subject:pulmonology"]
  - guid: fa97c35f02653156
    noteType: Basic
    deck: "Corpus::Pulmonology::Lung-Cancer-pages-011-013"
    fields:
      Front: "What imaging modalities stage metastases in lung cancer?"
      Back: "CT of chest/abdomen/pelvis is standard. PET-CT using fluorodeoxyglucose detects metabolic activity and mediastinal lymph node involvement. MRI brain assesses brain metastases."
    tags: ["subject:pulmonology"]
  - guid: 6f32cbf03e576fab
    noteType: Basic
    deck: "Corpus::Pulmonology::Lung-Cancer-pages-011-013"
    fields:
      Front: "What methods obtain tissue diagnosis in lung cancer?"
      Back: "Sputum cytology, pleural fluid cytology, bronchoscopy with biopsy, thoracoscopy, thoracotomy, mediastinoscopy, and percutaneous fine needle aspiration."
    tags: ["subject:pulmonology"]
  - guid: 44a5c4cf13d60cda
    noteType: Basic
    deck: "Corpus::Pulmonology::Lung-Cancer-pages-011-013"
    fields:
      Front: "What does TNM staging classify in lung cancer?"
      Back: "T: tumor size, airway relationship, structure invasion, nodule multiplicity. N: lymph node location (N1 ipsilateral, N2 mediastinal, N3 higher). M: metastases presence (M1 = stage 4)."
    tags: ["subject:pulmonology"]
  - guid: 6d8da3b998a40346
    noteType: Basic
    deck: "Corpus::Pulmonology::Lung-Cancer-pages-011-013"
    fields:
      Front: "How is small cell lung cancer classified and staged?"
      Back: "Limited: single-sided disease, one radiation field. Extensive: bilateral, pleural effusion, or distant metastases. Limited 15-25% five-year survival; extensive 20% two-year survival."
    tags: ["subject:pulmonology"]
  - guid: e7d1d76af3724a89
    noteType: Basic
    deck: "Corpus::Pulmonology::Lung-Cancer-pages-011-013"
    fields:
      Front: "What are three main treatment modalities for lung cancer?"
      Back: "Surgery, radiation therapy, and systemic therapies (chemotherapy, immunotherapy, targeted therapy). Choice depends on stage and patient fitness."
    tags: ["subject:pulmonology"]
  - guid: ff8878b280492126
    noteType: Basic
    deck: "Corpus::Pulmonology::Lung-Cancer-pages-011-013"
    fields:
      Front: "What criteria determine surgical resection candidacy?"
      Back: "Tumor completely resectable in one lung, tumor small enough for lobe or lung resection, limited spread to ipsilateral lymph nodes, and patient fit for surgery."
    tags: ["subject:pulmonology"]
  - guid: d96e515e0c0e5131
    noteType: Basic
    deck: "Corpus::Pulmonology::Lung-Cancer-pages-011-013"
    fields:
      Front: "How does radiotherapy work in lung cancer?"
      Back: "Direct DNA damage; normal cells repair faster than rapidly dividing cancer cells. Used after surgery, palliative stage 3B/4, endobronchially, and for brain/bone metastases."
    tags: ["subject:pulmonology"]
  - guid: 730988da394c5e48
    noteType: Basic
    deck: "Corpus::Pulmonology::Lung-Cancer-pages-011-013"
    fields:
      Front: "What are chemotherapy applications in lung cancer?"
      Back: "Shrinks tumor pre-surgery/radiation (neoadjuvant), kills residual cells post-surgery, primary treatment for unresectable tumors. Selected stage 1-3 NSCLC get chemotherapy after resection; stage 3B/4 get chemoradiation or chemotherapy alone."
    tags: ["subject:pulmonology"]
  - guid: 90d4d9095cc151fc
    noteType: Basic
    deck: "Corpus::Pulmonology::Lung-Cancer-pages-011-013"
    fields:
      Front: "What are targeted therapies in advanced NSCLC?"
      Back: "Drugs targeting specific mutations (EGFR, ALK inhibitors) to stop growth/spread. For stage 3/4 with nodal involvement. Prolong progression-free survival and improve response versus chemotherapy alone."
    tags: ["subject:pulmonology"]
  - guid: 8c9311b03b57c2ec
    noteType: Basic
    deck: "Corpus::Pulmonology::Lung-Cancer-pages-011-013"
    fields:
      Front: "How do immune checkpoint inhibitors work in lung cancer?"
      Back: "Target overexpressed inhibitory receptors/ligands on cancer cells that evade immune detection. Used for advanced metastatic NSCLC resistant to chemotherapy or combined with chemotherapy."
    tags: ["subject:pulmonology"]
  - guid: aa7b7e2969b15546
    noteType: Basic
    deck: "Corpus::Pulmonology::Lung-Cancer-pages-011-013"
    fields:
      Front: "What factors influence lung cancer prognosis?"
      Back: "Stage (most important), metastases presence/location, targetable mutations, performance status, sex (females better with NSCLC), weight loss, pre-existing lung disease, elevated LDH/ALP, hyponatremia. Overall five-year survival ~20%."
    tags: ["subject:pulmonology"]
