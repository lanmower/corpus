    fields:
      Front: "What should NOT be done for epistaxis?"
      Back: "Put the head between the knees, Make the child lie down, Stuff gauze into the nose, Let the child blow the nose once bleeding stops, Panic (60% of population have nosebleed at least once in lifetime)"
    tags: ["epistaxis", "management", "don't", "subject:paediatrics"]
  - guid: k1n2o3p4q5r6k1n2
    noteType: Basic
    deck: "Corpus::Paediatrics::Bleeding child"
    fields:
      Front: "What SHOULD be done for epistaxis?"
      Back: "Remain calm and keep patient calm, Make the child sit up, Lean the head forward, Pinch the soft part of the nostril firmly, Press toward the face for 15 min, Repeat if necessary"
    tags: ["epistaxis", "management", "first-aid", "subject:paediatrics"]
