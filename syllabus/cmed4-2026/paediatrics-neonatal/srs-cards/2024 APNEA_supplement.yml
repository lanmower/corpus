# Supplement — paediatrics / 2024 APNEA
deck: "Corpus::Paediatrics-Neonatal::2024 APNEA"
notes:
  - guid: "apnea090irritant"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 APNEA"
    fields:
      Front: "What are irritant receptors and where are they located?"
      Back: "Irritant receptors located in airways that respond to irritants."
    tags: ["physiology", "receptor", "subject:paediatrics-neonatal", "supplement"]

  - guid: "apnea091medullacon"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 APNEA"
    fields:
      Front: "What is the relationship between increased CO2 and H+ ion production in the medulla?"
      Back: "Increased CO2 leads to production of H⁺ ions from H₂CO₃ (carbonic acid), decreasing pH at central chemoreceptors."
    tags: ["physiology", "chemoreceptor", "mechanism", "subject:paediatrics-neonatal", "supplement"]

  - guid: "apnea092phrenicseg"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 APNEA"
    fields:
      Front: "Which spinal segments comprise the phrenic nerve?"
      Back: "C3, C4, and C5 spinal nerve roots (mnemonic: 'C3, 4, 5 keeps the diaphragm alive')."
    tags: ["physiology", "nerve-anatomy", "subject:paediatrics-neonatal", "supplement"]

  - guid: "apnea093pathogenlaryngeal"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 APNEA"
    fields:
      Front: "Describe the laryngeal chemical reflex mechanism in apnoea pathogenesis."
      Back: "Laryngeal chemical reflex depresses breathing during feeding, contributing to reflex apnoea in preterm infants."
    tags: ["pathogenesis", "mechanism", "subject:paediatrics-neonatal", "supplement"]

  - guid: "apnea094muscfatigue"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 APNEA"
    fields:
      Front: "Why are neonatal respiratory muscles and chest wall prone to fatigue in apnoea?"
      Back: "Respiratory muscles and chest wall are more easily fatigable. Thoracic wall is more pliable, leading to increased work of breathing."
    tags: ["pathogenesis", "muscle-physiology", "subject:paediatrics-neonatal", "supplement"]

  - guid: "apnea095shortterm01"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 APNEA"
    fields:
      Front: "What are the short-term consequences of apnoea on cerebral perfusion?"
      Back: "Apnoea causes decreased cerebral perfusion followed by reflex hyperperfusion."
    tags: ["outcome", "consequence", "cerebral", "subject:paediatrics-neonatal", "supplement"]

  - guid: "apnea096ivhseizure"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 APNEA"
    fields:
      Front: "How do CNS lesions contribute to central apnoea in preterm infants?"
      Back: "CNS lesions (IVH, seizures, meningitis) disrupt respiratory control centres, leading to central apnoea."
    tags: ["causes", "central-apnea", "cns-pathology", "subject:paediatrics-neonatal", "supplement"]

  - guid: "apnea097nectrigger"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 APNEA"
    fields:
      Front: "Why does NEC (necrotising enterocolitis) trigger central apnoea?"
      Back: "NEC is a serious gastrointestinal condition that contributes to systemic disturbance, triggering central apnoea in preterm infants."
    tags: ["causes", "central-apnea", "gi-pathology", "subject:paediatrics-neonatal", "supplement"]

  - guid: "apnea098pdatrigger"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 APNEA"
    fields:
      Front: "How do cardiac abnormalities like PDA cause apnoea?"
      Back: "Patent ductus arteriosus (PDA) and heart failure lead to impaired cardiac output and perfusion, triggering central apnoea."
    tags: ["causes", "central-apnea", "cardiac", "subject:paediatrics-neonatal", "supplement"]

  - guid: "apnea099drugapnea"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 APNEA"
    fields:
      Front: "Which drugs are known to cause central apnoea in preterm infants?"
      Back: "Phenobarbitone (phenobarb) and sedatives depress respiratory drive, causing central apnoea."
    tags: ["causes", "central-apnea", "drugs", "subject:paediatrics-neonatal", "supplement"]

  - guid: "apnea100choanal"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 APNEA"
    fields:
      Front: "Why is choanal atresia or stenosis significant in neonatal obstructive apnoea?"
      Back: "Neonates are obligatory nose breathers; choanal atresia/stenosis blocks nasal airway, directly causing obstructive apnoea."
    tags: ["causes", "obstructive-apnea", "congenital", "subject:paediatrics-neonatal", "supplement"]

  - guid: "apnea101macroglossia"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 APNEA"
    fields:
      Front: "How does macroglossia cause obstructive apnoea in neonates?"
      Back: "Enlarged tongue (macroglossia) physically obstructs the nasopharynx, preventing adequate airflow and causing obstructive apnoea."
    tags: ["causes", "obstructive-apnea", "congenital", "subject:paediatrics-neonatal", "supplement"]

  - guid: "apnea102micrognathia"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 APNEA"
    fields:
      Front: "How does micrognathia contribute to obstructive apnoea?"
      Back: "Small mandible (micrognathia) reduces oral airway space and allows posterior tongue displacement, obstructing airflow."
    tags: ["causes", "obstructive-apnea", "congenital", "subject:paediatrics-neonatal", "supplement"]

  - guid: "apnea103neckposition"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 APNEA"
    fields:
      Front: "How does neck position affect neonatal airway patency?"
      Back: "Excessive neck flexion or extension compresses the nasopharynx or airway structures, precipitating obstructive apnoea in obligatory nose breathers."
    tags: ["causes", "obstructive-apnea", "positioning", "subject:paediatrics-neonatal", "supplement"]

  - guid: "apnea104gord"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 APNEA"
    fields:
      Front: "How does GORD (gastro-oesophageal reflux disease) trigger reflex apnoea?"
      Back: "GORD causes acid aspiration and irritation of laryngeal chemoreceptors, triggering vagally mediated reflex apnoea."
    tags: ["causes", "reflex-apnea", "gi-pathology", "subject:paediatrics-neonatal", "supplement"]

  - guid: "apnea105suction"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 APNEA"
    fields:
      Front: "Why does deep suctioning trigger reflex apnoea in preterm infants?"
      Back: "Deep suctioning irritates laryngeal chemoreceptors and vagal afferents, triggering a protective laryngeal chemoreflex that depresses breathing."
    tags: ["causes", "reflex-apnea", "procedure", "subject:paediatrics-neonatal", "supplement"]

  - guid: "apnea106intubation"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 APNEA"
    fields:
      Front: "How does intubation trigger reflex apnoea?"
      Back: "Intubation irritates the larynx and upper airway, activating vagal reflexes that can suppress spontaneous breathing in preterm infants."
    tags: ["causes", "reflex-apnea", "procedure", "subject:paediatrics-neonatal", "supplement"]

  - guid: "apnea107overfeeding"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 APNEA"
    fields:
      Front: "How does overfeeding trigger reflex apnoea in preterm infants?"
      Back: "Overfeeding causes gastric distension and oesophageal irritation, activating laryngeal chemoreflex and vagal pathways that depress breathing."
    tags: ["causes", "reflex-apnea", "feeding", "subject:paediatrics-neonatal", "supplement"]

  - guid: "apnea108hypoxiareceptr"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 APNEA"
    fields:
      Front: "How does hypoxia cause apnoea in preterm infants?"
      Back: "In foetal/neonatal transition physiology, hypoxia activates peripheral chemoreceptors which paradoxically suppress breathing (receptor response), causing apnoea."
    tags: ["pathogenesis", "receptor-response", "subject:paediatrics-neonatal", "supplement"]

  - guid: "apnea109hypercapnia"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 APNEA"
    fields:
      Front: "How does hypercapnoea cause apnoea in preterm infants?"
      Back: "In foetal/neonatal transition physiology, hypercapnoea can paradoxically trigger a protective apneic response rather than increasing respiratory drive."
    tags: ["pathogenesis", "receptor-response", "subject:paediatrics-neonatal", "supplement"]

  - guid: "apnea110acidosis"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 APNEA"
    fields:
      Front: "How does acidosis contribute to central apnoea?"
      Back: "Acidosis depresses the central respiratory control centre in the brainstem, reducing respiratory drive and precipitating central apnoea."
    tags: ["causes", "central-apnea", "metabolic", "subject:paediatrics-neonatal", "supplement"]

  - guid: "apnea111metabolic"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 APNEA"
    fields:
      Front: "What metabolic derangements trigger central apnoea in preterm infants?"
      Back: "Glucose abnormalities (hypoglycaemia) and electrolyte abnormalities (hypokalaemia, hyponatraemia) depress respiratory centres, causing central apnoea."
    tags: ["causes", "central-apnea", "metabolic", "subject:paediatrics-neonatal", "supplement"]

  - guid: "apnea112anaemia"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 APNEA"
    fields:
      Front: "How does anaemia contribute to central apnoea?"
      Back: "Anaemia reduces oxygen-carrying capacity and tissue oxygenation, increasing chemoreceptor sensitivity and triggering central apnoea episodes."
    tags: ["causes", "central-apnea", "hematologic", "subject:paediatrics-neonatal", "supplement"]

  - guid: "apnea113pain"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 APNEA"
    fields:
      Front: "How does pain and excessive handling cause central apnoea?"
      Back: "Pain and excessive handling stress preterm infants and increase metabolic demands, destabilising already immature respiratory control."
    tags: ["causes", "central-apnea", "environmental", "subject:paediatrics-neonatal", "supplement"]

  - guid: "apnea114tempfluc"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 APNEA"
    fields:
      Front: "Why do ambient temperature fluctuations trigger central apnoea in preterm infants?"
      Back: "Temperature fluctuations stress immature thermoregulatory systems and increase metabolic demands, destabilising respiratory control."
    tags: ["causes", "central-apnea", "environmental", "subject:paediatrics-neonatal", "supplement"]

  - guid: "apnea115capatrail"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 APNEA"
    fields:
      Front: "What was the CAP trial and what did it study?"
      Back: "Caffeine Therapy for Apnea of Prematurity (Schmidt B et al., NEJM 2006;354:2112-21) demonstrated efficacy of caffeine in reducing apnea episodes."
    tags: ["management", "trial", "evidence", "subject:paediatrics-neonatal", "supplement"]

  - guid: "apnea116caffeine"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 APNEA"
    fields:
      Front: "What are the two formulations of caffeine used for apnoea of prematurity?"
      Back: "Caffeine citrate and caffeine base."
    tags: ["management", "methylxanthine", "formulation", "subject:paediatrics-neonatal", "supplement"]

  - guid: "apnea117adenosine"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 APNEA"
    fields:
      Front: "What is the adenosine pathway blocked by methylxanthines?"
      Back: "Methylxanthines block Adenosine₂ₐ (A2a) receptors on GABA-ergic neurons, preventing GABA-mediated respiratory depression."
    tags: ["mechanism", "methylxanthine", "pharmacology", "subject:paediatrics-neonatal", "supplement"]

  - guid: "apnea118atpprotect"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 APNEA"
    fields:
      Front: "Why is ATP preservation by methylxanthines protective during hypoxia-ischaemia?"
      Back: "Preserving brain ATP levels maintains cellular energy homeostasis, protecting neurons from hypoxic and ischaemic injury during apnoea episodes."
    tags: ["mechanism", "methylxanthine", "neuroprotection", "subject:paediatrics-neonatal", "supplement"]

  - guid: "apnea119chemoresp"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 APNEA"
    fields:
      Front: "How do methylxanthines enhance chemoreceptor responsiveness?"
      Back: "Methylxanthines increase the sensitivity of central and peripheral chemoreceptors to CO₂ and O₂ changes, improving respiratory control."
    tags: ["mechanism", "methylxanthine", "chemoreceptor", "subject:paediatrics-neonatal", "supplement"]

  - guid: "apnea120growth"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 APNEA"
    fields:
      Front: "What is the mechanism by which methylxanthines may decrease growth?"
      Back: "Methylxanthines increase energy expenditure and oxygen consumption, potentially reducing calories available for growth."
    tags: ["management", "side-effect", "growth", "subject:paediatrics-neonatal", "supplement"]

  - guid: "apnea121behaviour"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 APNEA"
    fields:
      Front: "What potential long-term neurobehavioural effect of neonatal caffeine therapy remains controversial?"
      Back: "Behavioural problems in later childhood may occur with neonatal caffeine therapy, though evidence is uncertain."
    tags: ["management", "side-effect", "behaviour", "subject:paediatrics-neonatal", "supplement"]

  - guid: "apnea122theo"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 APNEA"
    fields:
      Front: "Why is theophylline NOT used for apnoea of prematurity despite being a methylxanthine?"
      Back: "Theophylline is not used due to unfavourable pharmacokinetics, unpredictable metabolism, and narrow therapeutic window in preterm infants."
    tags: ["management", "methylxanthine", "choice", "subject:paediatrics-neonatal", "supplement"]

  - guid: "apnea123hfnc"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 APNEA"
    fields:
      Front: "Why is warm, humidified HFNC used as respiratory support in apnoea?"
      Back: "Warm, humidified high-flow nasal cannula (HFNC) maintains airway patency, reduces airway resistance, and provides gentle PEEP without intubation."
    tags: ["management", "respiratory-support", "vent-mode", "subject:paediatrics-neonatal", "supplement"]

  - guid: "apnea124ncpap"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 APNEA"
    fields:
      Front: "What does NCPAP provide in the management of apnoea?"
      Back: "NCPAP (nasal continuous positive airway pressure) and SIPAP (synchronized intermittent positive airway pressure) provide positive end-expiratory pressure to prevent airway collapse."
    tags: ["management", "respiratory-support", "vent-mode", "subject:paediatrics-neonatal", "supplement"]

  - guid: "apnea125obstruct_peep"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 APNEA"
    fields:
      Front: "How does PEEP from non-invasive support prevent obstructive apnoea?"
      Back: "PEEP maintains positive pressure throughout the airway, preventing pharyngeal collapse and obstruction during inspiration."
    tags: ["management", "respiratory-support", "mechanism", "subject:paediatrics-neonatal", "supplement"]

  - guid: "apnea126monit_false"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 APNEA"
    fields:
      Front: "What is the main limitation of SpO2 monitoring alone for apnoea detection?"
      Back: "SpO2 monitoring shows movement-related false alarms; newer pulse oximetry models are more resistant to motion artefact but remain imperfect."
    tags: ["monitoring", "limitation", "SpO2", "subject:paediatrics-neonatal", "supplement"]

  - guid: "apnea127transthor_limit"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 APNEA"
    fields:
      Front: "What is the key limitation of transthoracic impedance pneumography?"
      Back: "Transthoracic impedance pneumography cannot reliably identify obstructive apnoea because it measures electrical impedance changes, not airflow."
    tags: ["monitoring", "limitation", "impedance", "subject:paediatrics-neonatal", "supplement"]

  - guid: "apnea128thermistry_mech"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 APNEA"
    fields:
      Front: "How does nasal thermistry detect apnoea?"
      Back: "Nasal thermistry detects airflow by measuring temperature changes at the nostrils; cessation of airflow abolishes temperature changes."
    tags: ["monitoring", "mechanism", "thermistry", "subject:paediatrics-neonatal", "supplement"]

  - guid: "apnea129rip_tidal"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 APNEA"
    fields:
      Front: "What additional information does respiratory inductance plethysmography provide?"
      Back: "Respiratory inductance plethysmography can estimate tidal volume in addition to detecting breathing effort."
    tags: ["monitoring", "method", "RIP", "subject:paediatrics-neonatal", "supplement"]

  - guid: "apnea130sids_peak"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 APNEA"
    fields:
      Front: "Why is the 2-4 month age range the peak risk period for SIDS?"
      Back: "Peak SIDS risk occurs at 2-4 months when protective arousal reflexes are immature and respiratory control is transitioning."
    tags: ["sids", "pathophysiology", "age-specific", "subject:paediatrics-neonatal", "supplement"]

  - guid: "apnea131sids_blanket"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 APNEA"
    fields:
      Front: "Why should blankets and pillows be avoided to reduce SIDS risk?"
      Back: "Blankets and pillows can obstruct the nose and mouth, reducing airway patency and increasing risk of suffocation and CO₂ rebreathing."
    tags: ["sids", "prevention", "environment", "subject:paediatrics-neonatal", "supplement"]

  - guid: "apnea132sids_firm"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 APNEA"
    fields:
      Front: "Why is a firm mattress recommended for SIDS prevention?"
      Back: "Firm mattress prevents infant from sinking into soft surfaces, maintaining airway patency and reducing rebreathing risk."
    tags: ["sids", "prevention", "environment", "subject:paediatrics-neonatal", "supplement"]

  - guid: "apnea133sids_smoke"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 APNEA"
    fields:
      Front: "How does parental smoking increase SIDS risk?"
      Back: "Tobacco smoke exposure impairs respiratory chemoreceptor function and arousal responses, and may increase airway inflammation and obstruction."
    tags: ["sids", "prevention", "risk-factor", "subject:paediatrics-neonatal", "supplement"]

  - guid: "apnea134sids_overheat"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 APNEA"
    fields:
      Front: "Why should overheating be avoided in SIDS prevention?"
      Back: "Overheating reduces arousal responses and impairs thermoregulatory responses, increasing risk of fatal apnoea."
    tags: ["sids", "prevention", "risk-factor", "subject:paediatrics-neonatal", "supplement"]

  - guid: "apnea135sids_cosleep"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 APNEA"
    fields:
      Front: "Why is bed-sharing a SIDS risk factor?"
      Back: "Co-sleeping increases risk of accidental suffocation, entrapment, and reduced infant arousal due to shared warmth and parent movement."
    tags: ["sids", "prevention", "risk-factor", "subject:paediatrics-neonatal", "supplement"]

  - guid: "apnea136sids_breast"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 APNEA"
    fields:
      Front: "How does breastfeeding reduce SIDS risk?"
      Back: "Breastfeeding improves infant arousal responses, enhances immune function, reduces respiratory infections, and may improve chemoreceptor sensitivity."
    tags: ["sids", "prevention", "protective", "subject:paediatrics-neonatal", "supplement"]

  - guid: "apnea137sids_pacifier"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 APNEA"
    fields:
      Front: "What is the mechanism by which pacifier use reduces SIDS risk?"
      Back: "Pacifiers enhance arousal responses, maintain oral airway patency, and may improve protective airway reflexes during sleep."
    tags: ["sids", "prevention", "protective", "subject:paediatrics-neonatal", "supplement"]

  - guid: "apnea138sids_preterm"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 APNEA"
    fields:
      Front: "Why do infants born before 32 weeks gestation have three-times-higher SIDS risk?"
      Back: "Very preterm infants have immature arousal reflexes, chemoreceptor dysfunction, and altered sleep architecture, all predisposing to SIDS."
    tags: ["sids", "epidemiology", "preterm-specific", "subject:paediatrics-neonatal", "supplement"]

  - guid: "apnea139perio_age"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 APNEA"
    fields:
      Front: "Why does periodic breathing predominantly occur at 2-4 weeks of age?"
      Back: "At 2-4 weeks, neonatal respiratory control centres are immature and transitioning from foetal patterns, causing cyclic breathing instability."
    tags: ["periodic-breathing", "pathophysiology", "subject:paediatrics-neonatal", "supplement"]

  - guid: "apnea140brainstop"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 APNEA"
    fields:
      Front: "What does the pons control that the medulla does not?"
      Back: "The pons controls the RATE of involuntary respiration via apneustic and pneumotaxic centres, while medulla controls basic rhythm."
    tags: ["physiology", "brainstem", "pons-specific", "subject:paediatrics-neonatal", "supplement"]

  - guid: "apnea141npreferences"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 APNEA"
    fields:
      Front: "What is the significance of obligatory nasal breathing in neonates?"
      Back: "Obligatory nasal breathing means neonates cannot switch to mouth breathing; any nasal obstruction directly causes upper airway obstruction and apnoea."
    tags: ["physiology", "airway", "neonatal-specific", "subject:paediatrics-neonatal", "supplement"]
