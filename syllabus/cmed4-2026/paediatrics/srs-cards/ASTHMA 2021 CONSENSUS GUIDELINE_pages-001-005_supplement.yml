    fields:
      Front: "Pragmatic therapeutic trial with ICS: what does it confirm?"
      Back: "A pragmatic therapeutic trial with correctly administered low-dose inhaled corticosteroid will confirm the presence of corticosteroid-responsive airway inflammation, supporting an asthma diagnosis."
    tags: ["asthma", "diagnosis", "ics", "therapeutic-trial", "inflammation", "subject:paediatrics"]
