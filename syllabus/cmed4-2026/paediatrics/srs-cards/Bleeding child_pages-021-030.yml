    noteType: Basic
    deck: "Corpus::Paediatrics::Bleeding child"
    fields:
      Front: "Define hypersplenism as a cause of platelet sequestration."
      Back: "Sequestration of platelets in enlarged spleen due to infection, congestion, red cell disorders (hemolytic anemias), or infiltrative disorders"
