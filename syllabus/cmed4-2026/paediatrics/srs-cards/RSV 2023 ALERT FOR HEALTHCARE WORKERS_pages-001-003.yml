    deck: "Corpus::Paediatrics::RSV 2023 ALERT FOR HEALTHCARE WORKERS"
    fields:
      Front: "What is RSV the most common cause of in young children?"
      Back: "RSV is the most common cause of bronchiolitis and lower respiratory tract infection (LRTI) among young children."
    tags: ["rsv-epidemiology", "bronchiolitis", "lrti", "paediatric-infection", "subject:paediatrics"]

  - guid: "b8e3a9d2c5f6a0b3"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::RSV 2023 ALERT FOR HEALTHCARE WORKERS"
    fields:
      Front: "How is RSV transmitted?"
      Back: "RSV is highly contagious with transmission mainly by respiratory droplets."
    tags: ["rsv-transmission", "droplet-precaution", "infection-control", "subject:paediatrics"]

  - guid: "c9f4b0e3d6a7b1c4"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::RSV 2023 ALERT FOR HEALTHCARE WORKERS"
    fields:
      Front: "What is the typical timing of RSV season onset in the southern hemisphere?"
      Back: "RSV season typically precedes influenza season with average onset at end of February (range: early February to mid-March) based on 10-year data excluding 2020-2021."
    tags: ["rsv-seasonality", "epidemiology", "temporal-pattern", "subject:paediatrics"]

  - guid: "d0a5c1f4e7b8c2d5"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::RSV 2023 ALERT FOR HEALTHCARE WORKERS"
    fields:
      Front: "When did the RSV season start in 2023?"
      Back: "The RSV season started in week 6 of 2023, which was the week starting 6 February 2023."
    tags: ["rsv-2023-season", "timing", "epidemiologic-week", "subject:paediatrics"]

  - guid: "e1b6d2a5f8c9d3e6"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::RSV 2023 ALERT FOR HEALTHCARE WORKERS"
    fields:
      Front: "What was the RSV detection pattern in children <5 years in early 2023?"
      Back: "Among children aged <5 years, RSV detection rate was at moderate levels and continued to rise steeply during the 2023 season."
    tags: ["rsv-detection-rate", "pediatric-surveillance", "2023-trends", "subject:paediatrics"]

  - guid: "f2c7e3b6a9d0e4f7"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::RSV 2023 ALERT FOR HEALTHCARE WORKERS"
    fields:
      Front: "How did the 2023 RSV detection rate compare to historical baseline?"
      Back: "The 2023 RSV detection rate was rising more sharply than the mean circulation between 2014-2019, although within the historical range of what had been seen in the past."
    tags: ["rsv-trends", "historical-comparison", "epidemiology", "subject:paediatrics"]

  - guid: "a3d8f4c7b0e1f5a8"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::RSV 2023 ALERT FOR HEALTHCARE WORKERS"
    fields:
      Front: "What was the timing of the northern hemisphere RSV 2022-2023 season with increased severe disease?"
      Back: "The northern hemisphere RSV 2022-2023 season occurred from November to February with reports of increased severe RSV-associated illness and hospitalisation, including children >1 year of age."
    tags: ["rsv-northern-hemisphere", "severe-disease", "2022-2023-season", "subject:paediatrics"]

  - guid: "b4e9a5d8c1f2a6b9"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::RSV 2023 ALERT FOR HEALTHCARE WORKERS"
    fields:
      Front: "Which age group is at highest risk for severe RSV disease requiring hospitalisation?"
      Back: "Infants aged <6 months are at risk of severe RSV disease, which may include hypoxia, severe respiratory distress (tachypnoea, nasal flaring or lower chest retractions), inability to feed, or apnoea requiring hospitalisation."
    tags: ["rsv-severe-disease", "infant-risk", "age-dependent", "hospitalisation", "subject:paediatrics"]

  - guid: "c5f0b6e9d2a3f7c0"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::RSV 2023 ALERT FOR HEALTHCARE WORKERS"
    fields:
      Front: "What are the signs of severe respiratory distress in RSV-infected infants?"
      Back: "Signs of severe respiratory distress include tachypnoea, nasal flaring, and lower chest retractions."
    tags: ["rsv-clinical-signs", "respiratory-distress", "physical-examination", "subject:paediatrics"]

  - guid: "d6a1c7f0e3b4a8d1"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::RSV 2023 ALERT FOR HEALTHCARE WORKERS"
    fields:
      Front: "How may very young infants present with RSV infection?"
      Back: "In very young infants, RSV may present with only irritability, decreased activity, and breathing difficulties as the primary symptoms."
    tags: ["rsv-atypical-presentation", "neonatal-infant", "clinical-features", "subject:paediatrics"]

  - guid: "e7b2d8a1f4c5b9e2"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::RSV 2023 ALERT FOR HEALTHCARE WORKERS"
    fields:
      Front: "List the risk factors for severe RSV-associated disease."
      Back: "Risk factors for severe RSV-associated disease include: prematurity, congenital heart disease, chronic lung disease of prematurity, neurological disease, infants <6 months, immunodeficiency, and lack of breastfeeding."
    tags: ["rsv-risk-factors", "vulnerable-populations", "clinical-assessment", "subject:paediatrics"]

  - guid: "f8c3e9b2a5d6c0f3"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::RSV 2023 ALERT FOR HEALTHCARE WORKERS"
    fields:
      Front: "What is the rationale for isolating children with influenza-like symptoms during RSV season?"
      Back: "Isolation of children with influenza-like symptoms (not attending crèches or schools for a few days) prevents RSV transmission, as RSV is highly contagious via respiratory droplets."
    tags: ["rsv-prevention", "infection-control", "isolation-protocol", "subject:paediatrics"]

  - guid: "a9d4f0c3b7e8d1f4"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::RSV 2023 ALERT FOR HEALTHCARE WORKERS"
    fields:
      Front: "What hygiene measures are recommended to prevent RSV transmission?"
      Back: "Teaching children and adults looking after infants to practice sneeze and cough hygiene is a recommended prevention measure for RSV."
    tags: ["rsv-prevention", "hygiene-measures", "infection-control", "subject:paediatrics"]

  - guid: "b0e5a1d4f8c9e2f5"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::RSV 2023 ALERT FOR HEALTHCARE WORKERS"
    fields:
      Front: "Is prophylactic antibiotic use recommended for children with upper respiratory tract infections?"
      Back: "No, prophylactic antibiotics for children with upper respiratory tract infections are not recommended."
    tags: ["rsv-treatment", "antibiotic-stewardship", "clinical-guideline", "subject:paediatrics"]

  - guid: "c1f6b2e5a9d0f3c6"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::RSV 2023 ALERT FOR HEALTHCARE WORKERS"
    fields:
      Front: "What is palivizumab and how is it used in RSV prevention?"
      Back: "Palivizumab is a monoclonal antibody administered monthly throughout the RSV season to infants and children at high risk of severe RSV disease."
    tags: ["palivizumab", "monoclonal-antibody", "rsv-prevention", "high-risk-infants", "subject:paediatrics"]

  - guid: "d2a7c3f6b0e1a4d7"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::RSV 2023 ALERT FOR HEALTHCARE WORKERS"
    fields:
      Front: "What evidence supports the use of palivizumab in RSV prevention?"
      Back: "Palivizumab has been shown to be effective for prevention of severe RSV disease in high-risk infants and children."
    tags: ["palivizumab", "evidence-based", "rsv-prevention", "subject:paediatrics"]

  - guid: "e3b8d4a7c1f2b5e8"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::RSV 2023 ALERT FOR HEALTHCARE WORKERS"
    fields:
      Front: "What are the limitations of palivizumab use?"
      Back: "The limitations of palivizumab are high costs and the need for monthly intramuscular injections throughout the RSV season."
    tags: ["palivizumab", "cost-limitation", "administration-barrier", "rsv-prevention", "subject:paediatrics"]

  - guid: "f4c9e5b8a2d3c6f9"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::RSV 2023 ALERT FOR HEALTHCARE WORKERS"
    fields:
      Front: "What should clinicians do to prepare for the 2023 RSV season?"
      Back: "Clinicians and paediatric hospitals/intensive care units should anticipate an increase in paediatric admissions during the 2023 RSV season and prepare and allocate adequate resources to respond to the surge in RSV cases."
    tags: ["rsv-preparedness", "resource-allocation", "healthcare-planning", "subject:paediatrics"]

  - guid: "a5d0f1c4b9e2a7d8"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::RSV 2023 ALERT FOR HEALTHCARE WORKERS"
    fields:
      Front: "What percentage of RSV-infected infants require hospitalisation?"
      Back: "The majority of infants with RSV-associated bronchiolitis do not require hospitalisation, but certain children (particularly those with risk factors) are at risk of severe disease requiring hospitalisation."
    tags: ["rsv-hospitalisation", "bronchiolitis-outcome", "disease-severity", "subject:paediatrics"]

  - guid: "b6e1a2d5f0c3b8e9"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::RSV 2023 ALERT FOR HEALTHCARE WORKERS"
    fields:
      Front: "What is the Moving Epidemic Method (MEM) and how is it applied to RSV surveillance?"
      Back: "The Moving Epidemic Method (MEM) is a sequential analysis using the R Language to calculate the duration, start and end of the annual epidemic based on data from the previous 5 years. For RSV 2023, thresholds were based on 2015-2019 data."
    tags: ["mem-surveillance", "epidemiologic-method", "rsv-detection", "statistical-analysis", "subject:paediatrics"]

  - guid: "c7f2b3e6a0d1f4c9"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::RSV 2023 ALERT FOR HEALTHCARE WORKERS"
    fields:
      Front: "What does the clinical diagnosis algorithm recommend for suspected RSV in severe respiratory illness?"
      Back: "Clinicians should consider RSV in the differential diagnosis for severe respiratory illness, especially in young children, and evaluate for risk factors and signs of severe disease such as hypoxia and respiratory distress."
    tags: ["rsv-diagnosis", "differential-diagnosis", "clinical-assessment", "subject:paediatrics"]

  - guid: "d8a3c4f7b1e2a5d0"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::RSV 2023 ALERT FOR HEALTHCARE WORKERS"
    fields:
      Front: "What data are used to track RSV circulation in South Africa?"
      Back: "Weekly reports documenting RSV circulation are available from pneumonia surveillance data, with weekly respiratory pathogen surveillance reports published by NICD."
    tags: ["rsv-surveillance", "data-sources", "south-africa", "subject:paediatrics"]

  - guid: "e9b4d5a8c2f3b6e1"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::RSV 2023 ALERT FOR HEALTHCARE WORKERS"
    fields:
      Front: "Why does RSV season precede influenza season?"
      Back: "RSV and influenza have distinct seasonal patterns, with RSV typically circulating first (average onset end of February) and influenza season following later."
    tags: ["rsv-seasonality", "influenza-comparison", "temporal-epidemiology", "subject:paediatrics"]
