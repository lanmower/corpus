    noteType: "Basic"
    deck: "Corpus::Paediatrics::RESP EXAM BY DR HLOPHE"
    fields:
      Front: "Which areas should be percussed during chest examination?"
      Back: "Supraclavicular region (lung apices), infraclavicular region, chest wall (3-4 locations bilaterally), and axilla. Always compare side to side."
    tags:
