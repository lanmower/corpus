    deck: "Corpus::Paediatrics::2025 HIV STAGING, TREATMENT AND PMTC"
    fields:
      Front: "When does acute HIV infection generally develop after infection?"
      Back: |
        Acute HIV infection generally develops within 2 to 4 weeks after a person is infected, with many people experiencing flu-like symptoms such as fever, headache, and rash.
    tags: ["acute-hiv", "early-infection", "symptom-timeline", "subject:paediatrics"]
  - guid: "b2c3d4e5f6g7h8i9"
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 HIV STAGING, TREATMENT AND PMTC"
    fields:
      Front: "What is the primary target of HIV during acute infection?"
      Back: |
        During acute HIV infection, the virus attacks and destroys the infection-fighting CD4 cells of the immune system.
    tags: ["hiv-pathophysiology", "cd4-destruction", "acute-phase", "subject:paediatrics"]
  - guid: "c3d4e5f6g7h8i9j0"
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 HIV STAGING, TREATMENT AND PMTC"
    fields:
      Front: "When is HIV transmission risk highest?"
      Back: |
        HIV transmission risk is greatest during acute HIV infection, although HIV can be transmitted during any stage of infection.
    tags: ["hiv-transmission", "infectivity", "acute-infection", "subject:paediatrics"]
  - guid: "d4e5f6g7h8i9j0k1"
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 HIV STAGING, TREATMENT AND PMTC"
    fields:
      Front: "What is chronic HIV infection also called?"
      Back: |
        Chronic HIV infection is also called asymptomatic HIV infection or clinical latency, representing the second stage of HIV infection.
    tags: ["chronic-hiv", "asymptomatic-infection", "clinical-latency", "subject:paediatrics"]
  - guid: "e5f6g7h8i9j0k1l2"
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 HIV STAGING, TREATMENT AND PMTC"
    fields:
      Front: "What happens during chronic HIV infection in the body?"
      Back: |
        During chronic HIV infection, HIV continues to multiply in the body but at very low levels. People may have no HIV-related symptoms but can still transmit HIV to others.
    tags: ["chronic-hiv", "viral-replication", "asymptomatic", "subject:paediatrics"]
  - guid: "f6g7h8i9j0k1l2m3"
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 HIV STAGING, TREATMENT AND PMTC"
    fields:
      Front: "How long does chronic HIV infection usually progress to AIDS without treatment?"
      Back: |
        Without treatment with HIV medicines, chronic HIV infection usually advances to AIDS in 10 to 12 years.
    tags: ["disease-progression", "untreated-hiv", "timeline-to-aids", "subject:paediatrics"]
  - guid: "g7h8i9j0k1l2m3n4"
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 HIV STAGING, TREATMENT AND PMTC"
    fields:
      Front: "What is AIDS and how is it defined?"
      Back: |
        AIDS is the final stage of HIV infection, diagnosed when a person with HIV has a CD4 count of less than 200 cells/mm3 and/or one or more opportunistic infections. HIV has destroyed the immune system and the body cannot fight off opportunistic infections and cancer.
    tags: ["aids-diagnosis", "cd4-threshold", "immune-failure", "subject:paediatrics"]
  - guid: "h8i9j0k1l2m3n4o5"
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 HIV STAGING, TREATMENT AND PMTC"
    fields:
      Front: "What is the typical survival time for people with AIDS without treatment?"
      Back: |
        Without treatment, people with AIDS typically survive about 3 years.
    tags: ["aids-prognosis", "untreated-aids", "survival-time", "subject:paediatrics"]
  - guid: "i9j0k1l2m3n4o5p6"
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 HIV STAGING, TREATMENT AND PMTC"
    fields:
      Front: "What is the CD4 threshold for AIDS diagnosis?"
      Back: |
        AIDS is diagnosed when a person with HIV has a CD4 count of less than 200 cells/mm3 (200 cells per cubic millimetre) and/or one or more opportunistic infections.
    tags: ["cd4-threshold", "aids-definition", "diagnostic-criteria", "subject:paediatrics"]
