deck: "Corpus::Diabetes::Lipid Disorders  The Metabolic Syndrome"
notes:
  - guid: 238f3448bf5a40f9
    noteType: Basic
    deck: "Corpus::Diabetes::Lipid Disorders  The Metabolic Syndrome"
    fields:
      Front: "What are apolipoprotein proteins and why are they necessary?"
      Back: "Apolipoprotein proteins are surface proteins that coat lipids to make them water-soluble for circulation in blood."
    tags: ["subject:diabetes"]
  - guid: 270a4ac2724dfd68
    noteType: Basic
    deck: "Corpus::Diabetes::Lipid Disorders  The Metabolic Syndrome"
    fields:
      Front: "List the major types of lipoproteins by size"
      Back: "Large to small: Chylomicrons (triglyceride-rich), VLDL (triglyceride and cholesterol-rich), IDL, LDL, HDL (predominantly cholesterol-rich)"
    tags: ["subject:diabetes"]
  - guid: 0095e291a11dafff
    noteType: Basic
    deck: "Corpus::Diabetes::Lipid Disorders  The Metabolic Syndrome"
    fields:
      Front: "What are the two main pathways of lipid metabolism?"
      Back: "Exogenous: ingestion of dietary fat → absorption as chylomicrons → VLDL formation. Endogenous: cholesterol synthesis via HMG-CoA reductase pathway."
    tags: ["subject:diabetes"]
  - guid: 128456b63d153fea
    noteType: Basic
    deck: "Corpus::Diabetes::Lipid Disorders  The Metabolic Syndrome"
    fields:
      Front: "What is the role of lipoprotein lipase in lipid metabolism?"
      Back: "Lipoprotein lipase breaks down chylomicrons and VLDL, releasing free fatty acids for peripheral cell uptake and triglyceride conversion."
    tags: ["subject:diabetes"]
  - guid: 233bdaf3256f5def
    noteType: Basic
    deck: "Corpus::Diabetes::Lipid Disorders  The Metabolic Syndrome"
    fields:
      Front: "Why is HMG-CoA reductase clinically important?"
      Back: "It is the rate-limiting enzyme of cholesterol synthesis and is the target of statin drugs, making it crucial for lipid-lowering therapy."
    tags: ["subject:diabetes"]
  - guid: 018dedbbbaa10d11
    noteType: Basic
    deck: "Corpus::Diabetes::Lipid Disorders  The Metabolic Syndrome"
    fields:
      Front: "What are the major risk factors for cardiovascular disease?"
      Back: "Dyslipidemia, increased body weight, hypertension, cigarette smoking, and diabetes mellitus. Dyslipidemia is a primary risk factor."
    tags: ["subject:diabetes"]
  - guid: 50f29fd665e45cc0
    noteType: Basic
    deck: "Corpus::Diabetes::Lipid Disorders  The Metabolic Syndrome"
    fields:
      Front: "What happens during plaque formation in coronary arteries?"
      Back: "Lipids deposit in endothelium and form stable plaque that narrows arterial lumen. Acute coronary events occur when plaque ruptures, exposing thrombogenic particles and causing clot formation."
    tags: ["subject:diabetes"]
  - guid: 2f0a09487114d028
    noteType: Basic
    deck: "Corpus::Diabetes::Lipid Disorders  The Metabolic Syndrome"
    fields:
      Front: "What equation is used to estimate LDL cholesterol and when is it invalid?"
      Back: "The Friedewald equation is used but becomes invalid with significant triglyceride elevation; direct LDL measurement is then required."
    tags: ["subject:diabetes"]
  - guid: 6676db047dd84b77
    noteType: Basic
    deck: "Corpus::Diabetes::Lipid Disorders  The Metabolic Syndrome"
    fields:
      Front: "Distinguish between primary and secondary lipid disorders"
      Back: "Primary: due to genetic disorder. Secondary: caused by other conditions like obesity, diabetes, chronic kidney disease, thyroid disease, alcoholism, HIV, or certain drugs."
    tags: ["subject:diabetes"]
  - guid: 142c2e98a3aed0f3
    noteType: Basic
    deck: "Corpus::Diabetes::Lipid Disorders  The Metabolic Syndrome"
    fields:
      Front: "What is familial hypercholesterolemia and why is it important in South Africa?"
      Back: "Autosomal co-dominant disorder with genetic abnormalities in LDL receptor, apoB, or PCSK9. Has high prevalence in South Africa; heterozygous form occurs in 1 in 200-600 individuals."
    tags: ["subject:diabetes"]
  - guid: e8d29fa54860048f
    noteType: Basic
    deck: "Corpus::Diabetes::Lipid Disorders  The Metabolic Syndrome"
    fields:
      Front: "What are physical signs of familial hypercholesterolemia?"
      Back: "Xanthomas (tendon and eruptive), xanthelasma (eyelid deposits), corneal arcus, aortic valve stenosis, and premature cardiovascular disease."
    tags: ["subject:diabetes"]
  - guid: 493a1758f7cb9c9a
    noteType: Basic
    deck: "Corpus::Diabetes::Lipid Disorders  The Metabolic Syndrome"
    fields:
      Front: "What is lipemia retinalis and what causes it?"
      Back: "Retinal vessel lipemia caused by high triglyceride levels; appears as milky appearance to retinal vessels. Important physical sign of hypertriglyceridemia."
    tags: ["subject:diabetes"]
  - guid: 3c11fc64b73331e9
    noteType: Basic
    deck: "Corpus::Diabetes::Lipid Disorders  The Metabolic Syndrome"
    fields:
      Front: "When should lipid screening begin and for whom?"
      Back: "Start early if family history of primary lipid disorder or premature vascular disease (father <55 or mother <65). Any adult >40 should have lipids measured; if risk factors present, screen by age 20."
    tags: ["subject:diabetes"]
  - guid: 492abb5786c67fc9
    noteType: Basic
    deck: "Corpus::Diabetes::Lipid Disorders  The Metabolic Syndrome"
    fields:
      Front: "What is the Framingham risk score and what variables does it include?"
      Back: "Scoring system to estimate 10-year vascular disease risk using: age, gender, total cholesterol, HDL cholesterol, blood pressure, and smoking status. Invalid for patients with very high vascular risk."
    tags: ["subject:diabetes"]
  - guid: 94ab746f3240f783
    noteType: Basic
    deck: "Corpus::Diabetes::Lipid Disorders  The Metabolic Syndrome"
    fields:
      Front: "Who are considered to have very high vascular risk (Framingham invalid)?"
      Back: "Patients with cardiovascular disease, type 2 diabetes with additional risk factor, type 2 diabetes >40 years, type 1 diabetes with albuminuria, genetic dyslipidemia, or chronic kidney disease."
    tags: ["subject:diabetes"]
  - guid: 1462d769101626aa
    noteType: Basic
    deck: "Corpus::Diabetes::Lipid Disorders  The Metabolic Syndrome"
    fields:
      Front: "What is the management approach based on Framingham risk score?"
      Back: "Score <3% = low risk (lifestyle only). Score >30% = high risk (immediate drug therapy). Intermediate scores = combination of lifestyle intervention and drug therapy."
    tags: ["subject:diabetes"]
  - guid: 94cc4cd0cecf31f2
    noteType: Basic
    deck: "Corpus::Diabetes::Lipid Disorders  The Metabolic Syndrome"
    fields:
      Front: "What are the general lifestyle measures for dyslipidemia management?"
      Back: "Optimal body weight, healthy diet low in saturated fat and animal protein, regular physical exercise, complete smoking cessation, and limited or no alcohol intake."
    tags: ["subject:diabetes"]
  - guid: 6e28718a412bc77a
    noteType: Basic
    deck: "Corpus::Diabetes::Lipid Disorders  The Metabolic Syndrome"
    fields:
      Front: "How do statins work to lower cholesterol?"
      Back: "Statins inhibit HMG-CoA reductase, reducing hepatic cholesterol synthesis. This causes hepatocytes to increase LDL receptor expression, removing more LDL from circulation."
    tags: ["subject:diabetes"]
  - guid: 8109f660fb6725a4
    noteType: Basic
    deck: "Corpus::Diabetes::Lipid Disorders  The Metabolic Syndrome"
    fields:
      Front: "What is the clinical benefit of statins in terms of mortality reduction?"
      Back: "Each 1 mmol/L reduction in LDL cholesterol lowers: all-cause mortality by 10%, cardiovascular death by 20%, coronary events by 23%, and stroke by 17%."
    tags: ["subject:diabetes"]
  - guid: c9f3682a05ca03b3
    noteType: Basic
    deck: "Corpus::Diabetes::Lipid Disorders  The Metabolic Syndrome"
    fields:
      Front: "What are adverse effects of statins?"
      Back: "Muscle pain (myalgia), severe muscle injury (rhabdomyolysis), elevated liver enzymes, and slightly increased diabetes risk. Rare but serious; monitor creatine kinase if symptoms develop."
    tags: ["subject:diabetes"]
  - guid: 36774c9e8f701c6c
    noteType: Basic
    deck: "Corpus::Diabetes::Lipid Disorders  The Metabolic Syndrome"
    fields:
      Front: "What statin drug interaction should patients avoid?"
      Back: "Grapefruit and grapefruit juice should be avoided as they interact with statin metabolism and increase adverse effect risk."
    tags: ["subject:diabetes"]
  - guid: f9ba35bf6106f439
    noteType: Basic
    deck: "Corpus::Diabetes::Lipid Disorders  The Metabolic Syndrome"
    fields:
      Front: "How does ezetimibe lower cholesterol?"
      Back: "Ezetimibe inhibits cholesterol absorption from the gut by binding to a specific receptor, leading to LDL receptor upregulation similar to statins but achieving only ~20% LDL reduction."
    tags: ["subject:diabetes"]
  - guid: 003fdf4b013ae6d4
    noteType: Basic
    deck: "Corpus::Diabetes::Lipid Disorders  The Metabolic Syndrome"
    fields:
      Front: "What are PCSK9 inhibitors and how do they work?"
      Back: "Injectable monoclonal antibodies that bind to LDL receptors, preventing their degradation and increasing LDL clearance. Can achieve up to 70% reduction in circulating LDL cholesterol."
    tags: ["subject:diabetes"]
  - guid: 3e1809ff922a78b8
    noteType: Basic
    deck: "Corpus::Diabetes::Lipid Disorders  The Metabolic Syndrome"
    fields:
      Front: "What does PCSK9 stand for?"
      Back: "PCSK9 = Pro protein Convertase Subtilisin/Kexin type 9"
    tags: ["subject:diabetes"]
  - guid: 6e700b0a027f1e2d
    noteType: Basic
    deck: "Corpus::Diabetes::Lipid Disorders  The Metabolic Syndrome"
    fields:
      Front: "What is the clinical efficacy of PCSK9 inhibitors?"
      Back: "Demonstrated impressive reductions in all-cause mortality, cardiovascular mortality, and myocardial infarction. Generally well-tolerated with most common side effect being injection site reactions."
    tags: ["subject:diabetes"]
  - guid: 27aaec6502424b08
    noteType: Basic
    deck: "Corpus::Diabetes::Lipid Disorders  The Metabolic Syndrome"
    fields:
      Front: "How do fibrates work and what do they treat?"
      Back: "Fibrates stimulate PPAR-alpha receptors, regulating genes in triglyceride and HDL metabolism. Used primarily for hypertriglyceridemia; can lower triglycerides up to 50%."
    tags: ["subject:diabetes"]
  - guid: d119abd504fb208f
    noteType: Basic
    deck: "Corpus::Diabetes::Lipid Disorders  The Metabolic Syndrome"
    fields:
      Front: "What are adverse effects of fibrates?"
      Back: "Liver enzyme elevation, increased creatinine and homocysteine, lower muscle pain risk than statins, but can cause arrhythmias and venous thrombosis. Risk of muscle injury increased if combined with statins (especially gemfibrozil)."
    tags: ["subject:diabetes"]
  - guid: 7503ec7fdcb7e565
    noteType: Basic
    deck: "Corpus::Diabetes::Lipid Disorders  The Metabolic Syndrome"
    fields:
      Front: "What do bile acid sequestrants do and what is their limitation?"
      Back: "Lower cholesterol by interfering with enterohepatic circulation. Limited efficacy but paradoxically elevate serum triglycerides. Example: cholestyramine."
    tags: ["subject:diabetes"]
  - guid: b0c52d4b4169b40d
    noteType: Basic
    deck: "Corpus::Diabetes::Lipid Disorders  The Metabolic Syndrome"
    fields:
      Front: "How does niacin work and what are its limitations?"
      Back: "Lowers cholesterol in liver and is effective for both triglycerides and cholesterol. Limited by side effects of flushing and liver injury."
    tags: ["subject:diabetes"]
  - guid: ab5353de15fc8c57
    noteType: Basic
    deck: "Corpus::Diabetes::Lipid Disorders  The Metabolic Syndrome"
    fields:
      Front: "What is the stepwise management approach for hypercholesterolemia?"
      Back: "Start: lifestyle measures (diet, exercise). Then: statin at maximal tolerated dose. If ineffective: add ezetimibe. If still ineffective: add PCSK9 inhibitor or cholestyramine."
    tags: ["subject:diabetes"]
  - guid: 68ef04cb5da7fc5e
    noteType: Basic
    deck: "Corpus::Diabetes::Lipid Disorders  The Metabolic Syndrome"
    fields:
      Front: "What is the treatment goal for familial hypercholesterolemia?"
      Back: "Lower LDL cholesterol by >50%. Requires high-intensity statins plus ezetimibe, often with PCSK9 inhibitors. May need lipoprotein apheresis or liver transplantation if refractory."
    tags: ["subject:diabetes"]
  - guid: 6984ad12276349ca
    noteType: Basic
    deck: "Corpus::Diabetes::Lipid Disorders  The Metabolic Syndrome"
    fields:
      Front: "What is lipoprotein apheresis?"
      Back: "Physical removal of lipids from blood used in refractory familial hypercholesterolemia when pharmacotherapy is insufficient."
    tags: ["subject:diabetes"]
  - guid: 5739965d936cda6b
    noteType: Basic
    deck: "Corpus::Diabetes::Lipid Disorders  The Metabolic Syndrome"
    fields:
      Front: "What causes secondary hypertriglyceridemia?"
      Back: "Primary gene disorder (less common) or secondary to obesity, diabetes, alcohol excess, and certain drugs. Manifests with eruptive/tuberous xanthomas."
    tags: ["subject:diabetes"]
  - guid: dfec939462455e9f
    noteType: Basic
    deck: "Corpus::Diabetes::Lipid Disorders  The Metabolic Syndrome"
    fields:
      Front: "What is the pancreatitis risk threshold for hypertriglyceridemia?"
      Back: "Pancreatitis risk increases significantly when triglycerides exceed 10 mmol/L."
    tags: ["subject:diabetes"]
  - guid: b974f5274a9cfd00
    noteType: Basic
    deck: "Corpus::Diabetes::Lipid Disorders  The Metabolic Syndrome"
    fields:
      Front: "What is the cornerstone of treatment for hypertriglyceridemia?"
      Back: "Dietary fat restriction. Omega-3 fatty acids help by lowering VLDL secretion. Fibrates, niacin useful. If associated with hyperglycemia, insulin therapy is effective."
    tags: ["subject:diabetes"]
  - guid: 9558b034e065b929
    noteType: Basic
    deck: "Corpus::Diabetes::Lipid Disorders  The Metabolic Syndrome"
    fields:
      Front: "What is the metabolic syndrome and what is it not?"
      Back: "Not a single disease entity but a clustering of cardiovascular risk factors: insulin resistance, abnormal glucose metabolism, obesity, atherogenic dyslipidemia, and hypertension."
    tags: ["subject:diabetes"]
  - guid: 20269aef6f01e26e
    noteType: Basic
    deck: "Corpus::Diabetes::Lipid Disorders  The Metabolic Syndrome"
    fields:
      Front: "What are the harmonized diagnostic criteria for metabolic syndrome?"
      Back: "Requires 3 of 5: increased waist circumference, elevated serum triglycerides or hypertriglyceridemia treatment, low HDL cholesterol, hyperglycemia, or hypertension."
    tags: ["subject:diabetes"]
  - guid: b8cb58cb2277212a
    noteType: Basic
    deck: "Corpus::Diabetes::Lipid Disorders  The Metabolic Syndrome"
    fields:
      Front: "What are the typical lipid abnormalities in metabolic syndrome?"
      Back: "Hypertriglyceridemia with low HDL cholesterol and atherogenic small dense LDL cholesterol (central obesity component)."
    tags: ["subject:diabetes"]
  - guid: a1db27d4bf3048c0
    noteType: Basic
    deck: "Corpus::Diabetes::Lipid Disorders  The Metabolic Syndrome"
    fields:
      Front: "What are the dominant pathophysiological features of metabolic syndrome?"
      Back: "Visceral adiposity, upregulation of renin-angiotensin system, inflammatory mediators from visceral fat, neurohormonal activation, chronic inflammation, and insulin resistance."
    tags: ["subject:diabetes"]
  - guid: 569488234abbc001
    noteType: Basic
    deck: "Corpus::Diabetes::Lipid Disorders  The Metabolic Syndrome"
    fields:
      Front: "What microbiome abnormality may contribute to metabolic syndrome?"
      Back: "Abnormalities of the gut microbiome (colony of bacteria in intestines) may contribute to endothelial dysfunction and metabolic syndrome pathogenesis."
    tags: ["subject:diabetes"]
  - guid: f6c41739d7dd71ec
    noteType: Basic
    deck: "Corpus::Diabetes::Lipid Disorders  The Metabolic Syndrome"
    fields:
      Front: "What is the management approach for metabolic syndrome?"
      Back: "Focus on individual components: optimal weight management, dyslipidemia treatment, hyperglycemia control, hypertension management, plus lifestyle (diet, exercise, smoking cessation, limited alcohol)."
    tags: ["subject:diabetes"]
