    deck: "Corpus::Paediatrics::2025 HIV STAGING, TREATMENT AND PMTC"
    fields:
      Front: "What is the recommendation for immunization in HIV-infected children?"
      Back: |
        HIV-infected and HIV-exposed children should be immunized according to the routine national immunization schedule. Routine immunizations are vital as HIV-infected children are more susceptible to infections due to weakened immune systems.
    tags: ["immunization", "vaccination", "immune-protection", "subject:paediatrics"]
  - guid: "b2c3d4e5f6g7h8i4"
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 HIV STAGING, TREATMENT AND PMTC"
    fields:
      Front: "Is BCG vaccine recommended for asymptomatic or symptomatic HIV-infected children?"
      Back: |
        BCG vaccine is recommended for asymptomatic HIV-infected children only, NOT for symptomatic HIV infection. Optimal timing is at birth.
    tags: ["bcg-vaccine", "immunization-schedule", "asymptomatic-hiv", "subject:paediatrics"]
