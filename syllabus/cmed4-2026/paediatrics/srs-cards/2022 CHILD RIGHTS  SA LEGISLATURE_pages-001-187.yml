    noteType: Basic
    deck: "Corpus::Paediatrics::2022 CHILD RIGHTS SA LEGISLATURE"
    fields:
      Front: "What are the requirements for HIV testing for children below 12 years?"
      Back: "Sufficient maturity but not capacity; pre- and post test counselling for all ages"
    tags: ["legislation", "rsa-law", "medical-consent", "hiv-testing", "subject:paediatrics"]
  - guid: b2e5d3f8a9c1b4d5
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 CHILD RIGHTS SA LEGISLATURE"
    fields:
      Front: "What is the minimum age for male circumcision and what is the requirement?"
      Back: "Above 16 years; regardless of maturity or capacity; every male child can refuse circumcision"
    tags: ["legislation", "rsa-law", "medical-consent", "male-circumcision", "subject:paediatrics"]
  - guid: c3f6e4a7d0b9c2f6
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 CHILD RIGHTS SA LEGISLATURE"
    fields:
      Front: "What is required for general medical consent for children above 18 years?"
      Back: "Consent of parent PLUS consent (assent) of minor"
    tags: ["legislation", "rsa-law", "medical-consent", "parental-consent", "subject:paediatrics"]
  - guid: d4a7f5b8e1c0d3e7
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 CHILD RIGHTS SA LEGISLATURE"
    fields:
      Front: "What is required for general medical consent for children below 18 years?"
      Back: "Sufficient maturity but not capacity; need to advise minor to consult parent"
    tags: ["legislation", "rsa-law", "medical-consent", "subject:paediatrics"]
  - guid: e5b8a6c9f2d1e4f8
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 CHILD RIGHTS SA LEGISLATURE"
    fields:
      Front: "What are the key principles for child rights in health settings?"
      Back: "Recognise vulnerability (newborns, children & adults); Encourage holistic health care (play & stimulation); Ensure appropriate support; Create child friendly environment; Foster participation (information, assent, consent); Facilitate access to suitable services (vital registration, grants)"
    tags: ["child-rights", "health-care", "health-professionals", "subject:paediatrics"]
  - guid: f6c9b7d0a3e2f5b9
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 CHILD RIGHTS SA LEGISLATURE"
    fields:
      Front: "What is the Social Assistance Act in South Africa?"
      Back: "Controls grants, Targets the poor; Therefore most grants have a means test"
    tags: ["legislation", "rsa-law", "social-support", "grants", "subject:paediatrics"]
