    fields:
      Front: "What other conditions can cause upper airway obstruction besides croup?"
      Back: "Upper airway obstruction can be caused by: croup (most common infectious cause), foreign body aspiration, epiglottitis, and anatomical obstruction (pooled secretions, blood, tongue position). Always take a good history to assess for foreign body aspiration risk, especially with coins and peanuts."
