- id: chronic-pancreatitis-01
  front: "What is chronic pancreatitis and what does it result in?"
  back: |
    Chronic pancreatitis involves progressing inflammatory changes in the pancreas that result in permanent structural damage, leading to impairment of both exocrine and endocrine function.
- id: chronic-pancreatitis-02
  front: "How does the pathogenesis of chronic pancreatitis differ from acute pancreatitis?"
  back: |
    Chronic pancreatitis results from recurrent episodes of acute pancreatitis over a period of time, whereas acute pancreatitis is usually a single, painful episode. Chronic pancreatitis may be asymptomatic for long periods.
- id: chronic-pancreatitis-03
  front: "What is a key distinguishing feature of chronic vs acute pancreatitis in terms of symptoms?"
  back: |
    Acute pancreatitis is almost always painful in its acute presentation, while chronic pancreatitis may be asymptomatic over long periods, or present with pancreatic insufficiency symptoms initially without pain.
- id: chronic-pancreatitis-04
  front: "What is the distribution pattern of chronic pancreatitis?"
  back: |
    Chronic pancreatitis usually involves a diffuse, large portion of the entire pancreas rather than being localized or focal disease.
- id: chronic-pancreatitis-05
  front: "What are the pancreatic enzyme levels in chronic vs acute pancreatitis?"
  back: |
    Pancreatic enzymes such as amylase and lipase are usually normal in the chronic phase but are almost always elevated in acute pancreatitis.
- id: chronic-pancreatitis-06
  front: "What is the most common etiology of chronic pancreatitis?"
  back: |
    Alcohol is the most common etiology of chronic pancreatitis.
- id: chronic-pancreatitis-07
  front: "List the genetic causes of chronic pancreatitis mentioned."
  back: |
    Genetic causes include mutations in the cystic fibrosis gene and allergic pancreatitis.
- id: chronic-pancreatitis-08
  front: "What other etiologies of chronic pancreatitis are mentioned?"
  back: |
    Other etiologies include: autoimmune pancreatitis, ductal obstruction, tumors, pancreatic divisum, recurrent stone disease, tropical pancreatitis, and involvement in systemic diseases such as systemic lupus erythematosus.
- id: chronic-pancreatitis-09
  front: "What systemic diseases can involve the pancreas leading to chronic pancreatitis?"
  back: |
    Systemic lupus erythematosus and hyperparathyroidism are examples of systemic diseases that can involve the pancreas.
- id: chronic-pancreatitis-10
  front: "What is the relationship between alcohol consumption and chronic pancreatitis development?"
  back: |
    Only 5-10% of alcoholics develop chronic pancreatitis, yet alcohol accounts for 45% of all cases. There is individual variation in sensitivity to alcohol toxicity.
- id: chronic-pancreatitis-11
  front: "What is the role of cigarette smoking in chronic pancreatitis?"
  back: |
    Cigarette smoking is an independent risk factor for chronic pancreatitis development. When combined with alcohol use, it increases the risk further.
- id: chronic-pancreatitis-12
  front: "Describe the typical abdominal pain in chronic pancreatitis."
  back: |
    Pain is usually epigastric, radiating to the back with nausea and vomiting. Patients lean upright or slightly forward. Pain typically worsens 15-30 minutes after eating and can progress from discrete attacks to continuous pain throughout the day.
- id: chronic-pancreatitis-13
  front: "What percentage of pancreatic function must be lost before clinically significant pancreatic insufficiency occurs?"
  back: |
    Clinically significant protein and fat deficiencies do not occur until more than 90% of pancreatic function is lost.
- id: chronic-pancreatitis-14
  front: "What is steatorrhea and how does it present?"
  back: |
    Steatorrhea is fat malabsorption, clinically presenting as loose, greasy bowel stools that are difficult to flush away.
- id: chronic-pancreatitis-15
  front: "Which fat-soluble vitamins may be malabsorbed in chronic pancreatitis?"
  back: |
    Fat-soluble vitamins A, D, E, K, and B12 may be malabsorbed, leading to vitamin deficiency symptoms.
- id: chronic-pancreatitis-16
  front: "What is pancreatic diabetes and when does it typically develop?"
  back: |
    Pancreatic diabetes is glucose intolerance resulting from destruction of pancreatic endocrine tissue. Diabetes mellitus usually occurs quite late in the disease course and requires insulin therapy.
- id: chronic-pancreatitis-17
  front: "Why is managing diabetes in chronic pancreatitis patients challenging?"
  back: |
    Patients have absolute reduction in both insulin and glucagon secretion, creating a very narrow therapeutic window. They have increased risk of hypoglycemia and standard hypoglycemic agents often do not work.
- id: chronic-pancreatitis-18
  front: "What is the diagnostic challenge in chronic pancreatitis?"
  back: |
    Diagnosis is challenging because no single laboratory or imaging study is 100% diagnostic. All tests can be normal even in patients with clinical features of chronic pancreatitis.
- id: chronic-pancreatitis-19
  front: "What are the classic diagnostic findings of advanced chronic pancreatitis?"
  back: |
    The classic triad includes: pancreatic calcifications, steatorrhea, and development of diabetes mellitus. However, these findings are only seen very late and in advanced disease.
- id: chronic-pancreatitis-20
  front: "What are the two categories of tests for pancreatic function?"
  back: |
    Direct tests stimulate the pancreas (e.g., secretin or cholecystokinin stimulation test) and measure pancreatic secretions. Indirect tests measure pancreatic products in serum or feces (e.g., 72-hour fecal fat, fecal chymotrypsin, serum trypsinogen).
- id: chronic-pancreatitis-21
  front: "Why is the direct secretin stimulation test not commonly used clinically?"
  back: |
    The direct secretin stimulation test is time-consuming and is only performed in specific research settings, not in routine clinical practice.
- id: chronic-pancreatitis-22
  front: "What is the clinical status of the 72-hour fecal fat test?"
  back: |
    The 72-hour fecal fat test is no longer performed in clinical practice, though laboratory fasting is needed before samples are collected.
- id: chronic-pancreatitis-23
  front: "What imaging findings are characteristic of chronic pancreatitis?"
  back: |
    Imaging shows pancreatic ductal dilation across the entire length to the tail, multiple calculi in a dilated main pancreatic duct, and distortion of pancreatic tissue architecture.
- id: chronic-pancreatitis-24
  front: "What diagnostic findings on ERCP/pancreatography are typical of chronic pancreatitis?"
  back: |
    An abnormal pancreatogram showing dilatation of the main pancreatic duct with stricturing of the side branches is typically diagnostic on ERCP.
- id: chronic-pancreatitis-25
  front: "What are the main treatment approaches for chronic pancreatitis pain?"
  back: |
    Pain management is the mainstay of treatment using analgesic therapy. Patients must be counseled on alcohol cessation, smoking cessation, and consumption of small meals. Pancreatic enzyme supplements are usually required.
- id: chronic-pancreatitis-26
  front: "What advanced pain management options are available for refractory pain?"
  back: |
    Antioxidant therapy can be considered in patients not responding to conventional analgesia. Selective nerve blocks can be offered. Endoscopic therapy includes pancreatic lithotripsy or pancreatic duct sphincterotomy.
- id: chronic-pancreatitis-27
  front: "What surgical options exist for chronic pancreatitis?"
  back: |
    Surgery may be offered for decompression, distal gland resection, or denervation procedures, though these are rarely used in current clinical practice.
- id: chronic-pancreatitis-28
  front: "How is steatorrhea managed in chronic pancreatitis?"
  back: |
    Management includes dietary modification, pancreatic enzyme replacement (which usually resolves steatorrhea), vitamin supplementation, and use of medium-chain triglycerides or MCT oil to avoid chylomicron absorption issues.
- id: chronic-pancreatitis-29
  front: "Why are medium-chain triglycerides used in chronic pancreatitis management?"
  back: |
    Medium-chain triglycerides bypass the need for normal fat absorption and are absorbed directly from the intestinal lumen, avoiding the chylomicron absorption pathway that is impaired in pancreatic insufficiency.
- id: chronic-pancreatitis-30
  front: "What is the treatment of diabetes mellitus in chronic pancreatitis?"
  back: |
    Insulin therapy is the mainstay of treatment. Hypoglycemic agents provide no benefit in these patients due to the absolute reduction in both insulin and glucagon.
- id: chronic-pancreatitis-31
  front: "What complications can pseudocysts undergo in chronic pancreatitis?"
  back: |
    Pseudocysts can become infected, rupture, or hemorrhage internally. If infection develops, it can lead to sepsis and complicated pancreatitis.
- id: chronic-pancreatitis-32
  front: "What compression-related complications can occur with chronic pancreatitis?"
  back: |
    The inflammatory mass or pseudocysts can cause compression of the duodenum, biliary system, and stomach lumen, potentially requiring intervention.
- id: chronic-pancreatitis-33
  front: "What vascular complications can occur in chronic pancreatitis?"
  back: |
    Pancreatic fistulas, splenic venous thrombosis, and splenic artery aneurysms can occur. Splenic vein thrombosis runs across the pancreas and may cause esophageal varices.
- id: chronic-pancreatitis-34
  front: "What is the relationship between chronic pancreatitis and pancreatic cancer?"
  back: |
    Chronic pancreatitis is associated with an increased risk of developing pancreatic cancer, particularly in patients with a smoking history. However, it can be difficult to differentiate chronic pancreatitis from pancreatic adenocarcinoma.
- id: chronic-pancreatitis-35
  front: "What other acute complications can occur in chronic pancreatitis?"
  back: |
    Patients can present with recurrent episodes of acute pancreatitis, which is usually due to the underlying chronic pancreatitis condition.
