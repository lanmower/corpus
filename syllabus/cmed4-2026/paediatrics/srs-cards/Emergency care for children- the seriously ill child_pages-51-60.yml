    fields:
      Front: "Practice Scenario 3 (Answers): A 1-year old with recurrent seizures, now unconscious, wet breathing, drooling, blue. Why is this Emergency?"
      Back: "Multiple emergency signs present: coma (unresponsive), airway obstruction signs (wet breathing, drooling), cyanosis, and recurrent convulsions all require immediate emergency intervention."
