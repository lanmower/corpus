    deck: "Corpus::Paediatrics::Emergency care - the seriously ill child"
    fields:
      Front: "What does the Priority Signs mnemonic 3TPR-MOB stand for?"
      Back: "3T: Tiny baby, Temperature, Trauma\nP: Pallor, Poisoning, Pain (severe)\nR: Respiratory, Restless, Referral (urgent)\nMOB: Malnutrition, Oedema, Burns"
    tags: ["priority-signs", "3tpr-mob", "triage", "subject:paediatrics"]

