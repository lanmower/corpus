  - guid: a3d7f1k9m5p2r8s4
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 CIRCULATION"
    fields:
      Front: "What is the sequential bolus volume for the first shock bolus in a child without severe malnutrition?"
      Back: "10 ml/kg administered rapidly over 15 minutes"
    tags: ["first-bolus", "no-malnutrition", "shock-treatment", "subject:paediatrics"]
  - guid: b5e2g8j4n1p6q3t7
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 CIRCULATION"
    fields:
      Front: "What is done after the first rapid bolus if the child is still shocked?"
      Back: "Reassess for signs of shock. If still shocked, administer second rapid bolus of 10 ml/kg over 15 minutes"
    tags: ["second-bolus", "reassessment", "shock-treatment", "subject:paediatrics"]
  - guid: c1f9h3k7m2o5p8r4
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 CIRCULATION"
    fields:
      Front: "What is done after the second rapid bolus if the child is still shocked?"
      Back: "Reassess for signs of shock. If still shocked, administer third rapid bolus of 10 ml/kg over 15 minutes. Beware - seek help"
    tags: ["third-bolus", "beware-alert", "escalation", "subject:paediatrics"]
  - guid: d4g6j2m8n5o1p7q3
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 CIRCULATION"
    fields:
      Front: "What is the sequence and timing of fluid boluses for a child WITH severe acute malnutrition?"
      Back: "1st bolus: 10 ml/kg over 30 minutes - reassess if still shocked\n2nd bolus: 10 ml/kg over 30 minutes - reassess if still shocked\n3rd bolus: 10 ml/kg over 60 minutes - Beware (mark with asterisk)"
    tags: ["malnutrition-bolus-sequence", "severe-malnutrition", "shock-treatment", "subject:paediatrics"]
  - guid: e7h4k1m9n3o6p2q5
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 CIRCULATION"
    fields:
      Front: "What is the infusion time difference between the second and third bolus in a malnourished child?"
      Back: "Second bolus: 30 minutes\nThird bolus: 60 minutes (double the time)"
    tags: ["malnutrition-bolus", "infusion-time", "subject:paediatrics"]
  - guid: f2j8m3n7o4p9q1r6
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 CIRCULATION"
    fields:
      Front: "Which crystalloid fluids are used for rapid bolus administration in shock?"
      Back: "Normal saline OR Ringers lactate (balanced crystalloid solutions)"
    tags: ["crystalloid-fluids", "resuscitation-fluids", "subject:paediatrics"]
