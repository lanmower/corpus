  - guid: "y5z6a7b8c9d0e1f2"
    noteType: Basic
    deck: "Corpus::Paediatrics::2021 AIRWAY AND BREATHING"
    fields:
      Front: "What are the abnormal respiratory sounds that indicate obstruction?"
      Back: "Stridor - Upper airway obstruction due to airway narrowing; high-pitched squeaky noise when baby breathes in (both inspiratory and expiratory parts of cycle)\nGrunting - Generally means low oxygenation\nWheeze - Indicates obstruction"
    tags: ["abnormal-breath-sounds", "respiratory-assessment", "obstruction-signs", "subject:paediatrics"]
  - guid: "z6a7b8c9d0e1f2g3"
    noteType: Basic
    deck: "Corpus::Paediatrics::2021 AIRWAY AND BREATHING"
    fields:
      Front: "What causes stridor and how is it distinguished from other obstruction sounds?"
      Back: "Stridor is caused by upper airway obstruction and airway narrowing. Common causes: croup, foreign body (croup more common), epiglottitis. Produces a high-pitched squeaky noise heard during both inspiratory and expiratory parts of breathing. Distinguish from stertor (obstruction of the oropharynx and tongue)."
    tags: ["stridor", "upper-airway-obstruction", "differential-diagnosis", "subject:paediatrics"]
  - guid: "a7b8c9d0e1f2g3h4"
    noteType: Basic
    deck: "Corpus::Paediatrics::2021 AIRWAY AND BREATHING"
    fields:
      Front: "What does grunting indicate in a child's breathing?"
      Back: "Grunting sound (short noise on breathing) generally means low oxygenation in the child. It is a sign of respiratory distress that requires assessment and intervention."
    tags: ["grunting", "respiratory-distress", "oxygenation-sign", "subject:paediatrics"]
  - guid: "b8c9d0e1f2g3h4i5"
    noteType: Basic
    deck: "Corpus::Paediatrics::2021 AIRWAY AND BREATHING"
    fields:
      Front: "What is the threshold for oxygen saturation that indicates low oxygen and emergency?"
      Back: "O2 saturation <92% in room air indicates low oxygen levels and is an emergency requiring immediate intervention."
    tags: ["oxygen-saturation", "emergency-threshold", "oxygenation-assessment", "subject:paediatrics"]
  - guid: "c9d0e1f2g3h4i5j6"
    noteType: Basic
    deck: "Corpus::Paediatrics::2021 AIRWAY AND BREATHING"
    fields:
      Front: "What are the three main steps in managing breathing problems?"
      Back: "1. Manage the airway\n2. Give oxygen\n3. Keep warm"
    tags: ["breathing-management", "emergency-protocol", "subject:paediatrics"]
  - guid: "d0e1f2g3h4i5j6k7"
    noteType: Basic
    deck: "Corpus::Paediatrics::2021 AIRWAY AND BREATHING"
    fields:
      Front: "When giving oxygen during resuscitation for respiratory or airway problems, what concentration should be used?"
      Back: "Always give the highest concentration of oxygen possible during resuscitation for respiratory or airway problems until satisfied with the breathing and oxygenation of the child."
    tags: ["oxygen-delivery", "high-concentration", "resuscitation", "subject:paediatrics"]
  - guid: "e1f2g3h4i5j6k7l8"
    noteType: Basic
    deck: "Corpus::Paediatrics::2021 AIRWAY AND BREATHING"
    fields:
      Front: "What are the two main sources of oxygen in emergency settings?"
      Back: "1. Oxygen cylinders - Easy to use, requires flow meter and tubing, operates without electricity, but relatively expensive and maintaining constant supply is difficult.\n2. Oxygen concentrators - Pump room air through zeolite canister to remove nitrogen and concentrate oxygen. Moderate cost, requires little maintenance, produces oxygen continuously at low cost. Requires continuous electrical supply. Gives about 5 L/min - best used with nasal prongs/catheters."
    tags: ["oxygen-sources", "equipment", "oxygen-delivery", "subject:paediatrics"]
  - guid: "f2g3h4i5j6k7l8m9"
    noteType: Basic
    deck: "Corpus::Paediatrics::2021 AIRWAY AND BREATHING"
    fields:
      Front: "What are the four recommended methods for oxygen delivery in emergency settings?"
      Back: "1. Face mask with reservoir bag (non-rebreather mask)\n2. Venturi face mask\n3. Nasal prongs\n4. Nasal catheter"
    tags: ["oxygen-delivery-methods", "equipment", "oxygen-administration", "subject:paediatrics"]
  - guid: "g3h4i5j6k7l8m9n0"
    noteType: Basic
    deck: "Corpus::Paediatrics::2021 AIRWAY AND BREATHING"
    fields:
      Front: "What type of oxygen delivery gives the highest concentration and is used in emergency?"
      Back: "Face mask with non-rebreather reservoir bag (non-rebreather mask) delivers the highest concentration of oxygen and should be used in emergency when highest concentration is needed. Exhaled air is directed through one-way valve in the mask, preventing inhalation of room air and re-inhalation of exhaled air. The valve with sufficient seal around nose and mouth allows for higher concentrations of oxygen."
    tags: ["non-rebreather-mask", "high-concentration-oxygen", "oxygen-delivery", "subject:paediatrics"]
  - guid: "h4i5j6k7l8m9n0o1"
    noteType: Basic
    deck: "Corpus::Paediatrics::2021 AIRWAY AND BREATHING"
    fields:
      Front: "How do Venturi face masks work and what oxygen concentrations can they deliver?"
      Back: "Venturi face mask - tube-shaped reservoir with Venturi fitting at the end that delivers different oxygen concentrations from 28-60% according to the colour of each Venturi fitting. Check the bottom of the Venturi fitting to see which oxygen percentage will be delivered. The percentage depends on having the correct flow rate of 100% oxygen to the oxygen tube fitting."
    tags: ["venturi-mask", "oxygen-concentration", "oxygen-delivery", "subject:paediatrics"]
  - guid: "i5j6k7l8m9n0o1p2"
    noteType: Basic
    deck: "Corpus::Paediatrics::2021 AIRWAY AND BREATHING"
    fields:
      Front: "What are the flow rate requirements for nasal prongs in infants and children?"
      Back: "Nasal prongs - short tubes inserted into nostrils. Right size, right way up, right fixation. Keep nose clear of mucus which can block flow of oxygen. Using 100% oxygen: Flow rate 1 L/min in infants and 1-2 L/min in older children to deliver 30-35% oxygen concentration in the inspired air."
    tags: ["nasal-prongs", "oxygen-flow-rate", "oxygen-delivery", "subject:paediatrics"]
  - guid: "j6k7l8m9n0o1p2q3"
    noteType: Basic
    deck: "Corpus::Paediatrics::2021 AIRWAY AND BREATHING"
    fields:
      Front: "What is a nasal catheter, what sizes are used, and what are the flow rates?"
      Back: "Nasal catheter - made from nasogastric tube (NGT) or suction catheter size 6 or 8 Gauge (FG 8 if using catheter). Insert into either nostril and secure, connected to oxygen. Tip of catheter should not be visible below the uvula. Right size, right way up, right fixation. Flow rate: 0.5 L/min in infants and 1 L/min in children delivers 35-40% O2 concentration in inspired air if 100% oxygen is used."
    tags: ["nasal-catheter", "oxygen-flow-rate", "oxygen-delivery", "subject:paediatrics"]
