    noteType: Basic
    deck: "Corpus::Paediatrics::Bleeding child"
    fields:
      Front: "Define thrombocytopenia."
      Back: "Platelet count < 150 x 10⁹/L"
    tags: ["thrombocytopenia", "platelet-count", "definition", "subject:paediatrics"]
