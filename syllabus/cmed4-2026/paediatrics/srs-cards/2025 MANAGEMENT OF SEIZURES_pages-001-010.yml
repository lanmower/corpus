    noteType: Basic
    deck: "Corpus::Paediatrics::2025 MANAGEMENT OF SEIZURES"
    fields:
      Front: "When was the first modern seizure classification proposed?"
      Back: "1964 by Gastaut et al. (Gastaut et al., 1964)"
    tags: ["subject:paediatrics", "seizures", "classification-history"]
  - guid: d0g6k9l8f7h1i3j2
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 MANAGEMENT OF SEIZURES"
    fields:
      Front: "When was international use of the modern seizure classification popularized?"
      Back: "1970 by Gastaut (Gastaut, 1970)"
    tags: ["subject:paediatrics", "seizures", "classification-history"]
  - guid: e1h7l0m9g8i2j4k3
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 MANAGEMENT OF SEIZURES"
    fields:
      Front: "What major event prompted the first update to seizure classification in 1981?"
      Back: "The widespread use of video electroencephalography (EEG), which had impacted clinical practice and allowed for better seizure characterization."
    tags: ["subject:paediatrics", "seizures", "classification-history", "eeg"]
