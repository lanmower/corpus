notes:
  - guid: 3f8a1c5b9e2d4a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What are the modes of TB transmission from mother to baby?"
      Back: "Transplacental spread through umbilical vein to fetal liver (in utero), aspiration or ingestion of infected amniotic fluid (in utero/intrapartum), and inhalation of droplet nuclei from close contacts - mother or other family members (postpartum)."
    tags: ["congenital-tb", "vertical-transmission", "subject:paediatrics"]
  - guid: 7c2e4a1f9b5d3a8c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What are the risk factors for vertical TB transmission from mother to infant?"
      Back: "HIV infection or TB in mother, lack of prenatal care, non-adherence to anti-TB treatment, infectiousness of the mother, and mother having multi-drug resistant TB."
    tags: ["congenital-tb", "risk-factors", "vertical-transmission", "subject:paediatrics"]
  - guid: 1a9f3e5c8b2d4a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What proportion of babies born to mothers with active TB develop TB disease in the first year without TPT or BCG?"
      Back: "50% of babies born to mothers with active TB disease will develop TB disease in the first year if no TB preventive therapy (TPT) or BCG vaccination is given."
    tags: ["congenital-tb", "progression-risk", "prevention", "subject:paediatrics"]
  - guid: 4e1b7a3f9c5d2a8c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "Can TB be transmitted through breast milk?"
      Back: "No. Breast milk does not transmit TB."
    tags: ["congenital-tb", "breastfeeding", "transmission", "subject:paediatrics"]
  - guid: 8d5f2c1a9e5b3a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What is the clinical presentation of congenital TB?"
      Back: "Low birth weight (LBW), poor feeding, poor weight gain, hepatosplenomegaly (HSM), abdominal distension, rashes, lethargy, and respiratory symptoms."
    tags: ["congenital-tb", "clinical-presentation", "subject:paediatrics"]
  - guid: 2a7e1f3c9b5d4a8c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "How is TB infection determined in congenital TB?"
      Back: "TB infection is determined by TST (tuberculin skin test)."
    tags: ["congenital-tb", "diagnosis", "tst", "subject:paediatrics"]
  - guid: 5c3a8f1e9b2d4a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "When can active congenital TB disease become apparent?"
      Back: "Active disease can become present at 2-4 weeks of age."
    tags: ["congenital-tb", "timing", "subject:paediatrics"]
  - guid: 9a4c2f1e8d5b3a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What specimens should be collected to investigate congenital TB?"
      Back: "Gastric washings for Xpert (Gene Xpert), microscopy and culture, and placenta for histopathology."
    tags: ["congenital-tb", "investigation", "specimens", "subject:paediatrics"]
  - guid: 3f2a1c8e9b5d4a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "When should TB treatment be commenced in congenital TB?"
      Back: "TB treatment should be commenced while awaiting bacteriological confirmation as the disease progresses rapidly."
    tags: ["congenital-tb", "treatment", "subject:paediatrics"]
  - guid: 7e1f4a3c9b5d2a8c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What TB treatment regimen is used for congenital TB?"
      Back: "Treatment is the same as for all children <8 years (Regimen 3A)."
    tags: ["congenital-tb", "treatment", "regimens", "subject:paediatrics"]
  - guid: 1c9a3b5f8e2d4a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "How is response to TB treatment indicated in congenital TB?"
      Back: "Response to treatment is indicated by increased appetite, weight gain, and radiological resolution."
    tags: ["congenital-tb", "treatment-response", "subject:paediatrics"]
  - guid: 4a8f2c1e9d5b3a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "Is breastfeeding recommended for infants with TB exposure from the mother?"
      Back: "Yes. Breastfeeding is recommended to infants irrespective of the TB status of the mother, as the risk of transmission through breast milk is negligible."
    tags: ["congenital-tb", "breastfeeding", "subject:paediatrics"]
  - guid: 8b3e1a9f5c2d4a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "Should BCG vaccine be given to neonates exposed to TB while screening for active disease?"
      Back: "No. BCG should not be given to neonates exposed to TB while screening for active disease. Maternal infectiousness and drug susceptibility status should be carried out first."
    tags: ["congenital-tb", "bcg", "immunization", "subject:paediatrics"]
  - guid: 2f7c4a1e9a5d3b8c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What investigations must be done before starting TB treatment in a child?"
      Back: "Exclude HIV infection and assess all co-infected children for ART eligibility (antiretroviral therapy)."
    tags: ["management", "pre-treatment", "hiv-testing", "subject:paediatrics"]
  - guid: 5a1e9f3c8b2d4a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What psychosocial support should be provided when a child is diagnosed with TB?"
      Back: "Psychosocial support should be provided to both the child and the parents/guardians."
    tags: ["management", "psychosocial-support", "subject:paediatrics"]
  - guid: 9c2a5b1f8e3d4a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "Should referral for nutritional support be considered in TB management?"
      Back: "Yes. Referral for nutritional support should be considered in children diagnosed with TB."
    tags: ["management", "nutrition", "subject:paediatrics"]
  - guid: 3e8d4f1c9a5b2a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What administrative steps should be taken when a child is diagnosed with TB?"
      Back: "Complete the TB Register and make a note in the Road to Health Card."
    tags: ["management", "documentation", "subject:paediatrics"]
  - guid: 7a2f1c3e9d5b4a8c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What contact investigation should be done when a child is diagnosed with TB?"
      Back: "Ask about other children or adults in the household and screen them for TB."
    tags: ["management", "contact-tracing", "subject:paediatrics"]
  - guid: 1f5a3e8c9b2d4a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What are the four categories of paediatric TB management covered in APPENDIX I?"
      Back: "A) Uncomplicated pulmonary tuberculosis. B) Complicated pulmonary tuberculosis. C) Disseminated (miliary) tuberculosis. D) Tuberculous meningitis (TBM)."
    tags: ["management", "treatment-categories", "subject:paediatrics"]
  - guid: 4c9b1a3f8e5d2a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What documents were updated for TB management in children?"
      Back: "Primary Healthcare STGs and EML 2020 edition (Section 17.4: Pulmonary tuberculosis) and Paediatric Hospital Level STGs and EML, 2017 edition (Chapter 10: Tuberculosis)."
    tags: ["management", "guidelines", "subject:paediatrics"]
  - guid: 8a3f2c1e9b5d4a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What does development of TB in a child on ART indicate?"
      Back: "It could indicate immune reconstitution (if within first 6 months of ART initiation), failure of the ART regimen, or new TB infection depending on exposure."
    tags: ["hiv-coinfection", "art-and-tb", "subject:paediatrics"]
  - guid: 2e7a4f1c9d5b3a8c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "How should TB be managed in a child developing TB while on ART?"
      Back: "TB treatment should be started without delay and ART continued. The ART regimen should be reviewed and may need to be changed."
    tags: ["hiv-coinfection", "art-and-tb", "management", "subject:paediatrics"]
  - guid: 5c1f8a3e9b2d4a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What vitamin should be given to all children on both TB and ARV treatment?"
      Back: "Pyridoxine (vitamin B6) should be given to all children on TB and ARV treatment due to shared toxicities of the regimens."
    tags: ["hiv-coinfection", "art-and-tb", "supplementation", "subject:paediatrics"]
  - guid: 9a4e1f3c8d5b2a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "How is Ritonavir dosing adjusted when a child is on Lopinavir/Ritonavir?"
      Back: "For each mL of lopinavir/ritonavir 80/20 mg/mL solution, add 0.75 mL of ritonavir 80 mg/mL solution. Ritonavir should be added at a dose of 0.75 times the volume of the lopinavir/ritonavir dose."
    tags: ["hiv-coinfection", "art-and-tb", "drug-interactions", "subject:paediatrics"]
  - guid: 3f2b9c1a8e5d4a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What is Immune Reconstitution Inflammatory Syndrome (IRIS)?"
      Back: "IRIS is observed in patients on TB treatment who start ART, characterized by worsening of disease after initial clinical improvement."
    tags: ["iris", "hiv-coinfection", "art-and-tb", "subject:paediatrics"]
  - guid: 7d3a2f1e9c5b4a8c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "When does IRIS typically occur and how long does it last?"
      Back: "IRIS may occur during the first three months of ART, is generally self-limiting, and lasts 10-40 days."
    tags: ["iris", "hiv-coinfection", "timing", "subject:paediatrics"]
  - guid: 1a8c4b3f9e5d2a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What are the clinical manifestations of IRIS in TB patients?"
      Back: "Worsening disease after initial improvement, fever, increased size of lymph nodes, tuberculomas, and exacerbation of symptoms, signs, or X-ray manifestations."
    tags: ["iris", "hiv-coinfection", "clinical-signs", "subject:paediatrics"]
  - guid: 4c9a1f3e8d5b2a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "How should IRIS be managed in TB patients starting ART?"
      Back: "TB treatment and ART should be continued. In some cases, the addition of corticosteroids might be useful."
    tags: ["iris", "hiv-coinfection", "management", "subject:paediatrics"]
  - guid: 8e2f4a1c9b5d3a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "Can patients already on ART experience exacerbations when starting TB therapy?"
      Back: "Yes. Patients already on ART may experience temporary exacerbations of symptoms, signs, or X-ray manifestations after beginning TB therapy."
    tags: ["iris", "hiv-coinfection", "art-and-tb", "subject:paediatrics"]
