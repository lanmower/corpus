# Pulmonology Triage Scenarios
# Extracted from 6 SRS cards: CAP, Lung Cancer (2 cards), Antibiotics (2 cards), Suppurative Lung Disease
# Generated: 2026-05-04
# Total atoms: 26 discrete clinical atoms
# Scenarios: Parameter-driven triage decision trees

# ============================================================================
# ATOM GROUP 1: CAP SEVERITY ASSESSMENT (CURB-65 & PSI)
# ============================================================================

atoms:
  - id: cap-severity-curb65-001
    card_source: "Community-Acquired Pneumonia - CMED4IIM1 - 2026_pages-001-010"
    atom: "CURB-65 severity scoring system"
    definition: |
      5-component scoring system (1 point each):
      C = Confusion (altered mental status)
      U = Urea >7 mmol/L (renal function marker)
      R = Respiratory rate ≥30/min
      B = Blood pressure (SBP <90 or DBP ≤60)
      Age ≥65 years
      Score determines site of care and mortality risk
    clinical_relevance: "Validated severity predictor since 2003"

  - id: cap-severity-psi-002
    card_source: "Community-Acquired Pneumonia - CMED4IIM1 - 2026_pages-001-010"
    atom: "Pneumonia Severity Index (PSI) alternative"
    definition: |
      Alternative severity assessment tool incorporating:
      - Demographics (age, sex)
      - Comorbidities (COPD, asthma, cardiac disease)
      - Vital signs (RR, BP, temperature)
      - Laboratory values
      - Imaging findings
    clinical_relevance: "Predicts mortality risk; guides admission decisions"

  - id: cap-severity-risk-factors-003
    card_source: "Community-Acquired Pneumonia - CMED4IIM1 - 2026_pages-001-010"
    atom: "CAP risk factor stratification"
    definition: |
      Major risk factors for severe CAP:
      - Older age (>65 years)
      - Comorbidities: COPD, asthma, cardiac disease
      - Immunosuppression: diabetes, HIV, malnutrition
      - Recent viral infection (influenza, RSV)
      - Substance abuse (alcohol, IV drugs)
      - Poverty/overcrowding/pollution exposure
    clinical_relevance: "Risk assessment guides empiric antibiotic strategy"

  - id: cap-mortality-stratification-004
    card_source: "Community-Acquired Pneumonia - CMED4IIM1 - 2026_pages-001-010"
    atom: "CAP mortality stratification by clinical context"
    definition: |
      Overall ~5% mortality; varies by setting:
      - Outpatient: lower mortality
      - Hospitalized: ~12% mortality
      - ICU-requiring: >40% mortality
      Case fatality rate influenced by access to antibiotics, comorbidities
    clinical_relevance: "Mortality risk guides treatment intensity"

# ============================================================================
# ATOM GROUP 2: CAP DIAGNOSTIC MARKERS & BIOMARKERS
# ============================================================================

  - id: cap-diagnosis-cxr-005
    card_source: "Community-Acquired Pneumonia - CMED4IIM1 - 2026_pages-001-010"
    atom: "Chest radiography as gold standard for CAP diagnosis"
    definition: |
      CXR is the gold standard diagnostic modality:
      - Typical patterns: lower infiltrates, interstitial infiltrates
      - Key sign: air bronchogram (consolidation marker)
      - Normal CXR can exclude pneumonia EXCEPT in specific settings:
        * Elderly (immunosenescence)
        * Immunocompromised hosts
        * Hypovolemic patients
        * Early clinical-radiological dissociation (repeat at 24-48h)
      - Clinical exam alone correctly identifies pneumonia only 50% of cases
    clinical_relevance: "Essential diagnostic tool; normal CXR does not rule out CAP in vulnerable groups"

  - id: cap-biomarker-crp-006
    card_source: "Community-Acquired Pneumonia - CMED4IIM1 - 2026_pages-001-010"
    atom: "C-reactive protein (CRP) role in CAP management"
    definition: |
      CRP utility:
      - Does NOT improve diagnosis when clinical eval + CXR available
      - CRP <100 mg/L has strong negative predictive value for 30-day mortality
      - CRP failure to halve by 3-4 days identifies treatment failure risk
      - Use only where radiographs unavailable
    clinical_relevance: "Prognostic marker; not diagnostic; helps identify treatment failure"

  - id: cap-biomarker-procalcitonin-007
    card_source: "Community-Acquired Pneumonia - CMED4IIM1 - 2026_pages-001-010"
    atom: "Procalcitonin in pneumonia management"
    definition: |
      Procalcitonin (PCT) role:
      - Makes NO additional contribution to diagnosis
      - May support NOT initiating antibiotics decision
      - May guide discontinuation at 90% reduction from baseline
      - NOT recommended for routine clinical use
    clinical_relevance: "Limited role; not standard in CAP diagnosis/management"

  - id: cap-sputum-culture-008
    card_source: "Community-Acquired Pneumonia - CMED4IIM1 - 2026_pages-001-010"
    atom: "Sputum culture diagnostic yield and indications"
    definition: |
      Sputum culture yield: ~15%
      - Only minority produce adequate samples
      - Recommended indications:
        * Patients with specific risk factors
        * All hospitalized patients with CURB-65 ≥2
      - Limited clinical impact due to low yield
    clinical_relevance: "Low yield but helps identify resistant organisms in severe cases"

  - id: cap-blood-culture-009
    card_source: "Community-Acquired Pneumonia - CMED4IIM1 - 2026_pages-001-010"
    atom: "Blood culture diagnostic yield in pneumonia"
    definition: |
      Blood culture utility: as low as 5%
      - Rarely impacts clinical decisions except for Staph aureus
      - Recommended indications:
        * CURB score ≥2
        * Prior antibiotic exposure
        * NOT in outpatient settings
    clinical_relevance: "Very low yield; selective use in severe/hospitalized CAP"

  - id: cap-urine-antigen-010
    card_source: "Community-Acquired Pneumonia - CMED4IIM1 - 2026_pages-001-010"
    atom: "Urine antigen testing for pneumococcal pneumonia"
    definition: |
      Urine antigen findings:
      - Identifies additional 11% of pneumococcal cases
      - Does NOT influence antibiotic choices
      - Empiric regimens always include pneumococcal coverage
    clinical_relevance: "Epidemiological tool; no impact on treatment decisions"

  - id: cap-viral-testing-011
    card_source: "Community-Acquired Pneumonia - CMED4IIM1 - 2026_pages-001-010"
    atom: "Molecular testing for viral pathogens in pneumonia"
    definition: |
      Molecular viral testing limitations:
      - Positive results do NOT imply causality
      - Positive in asymptomatic individuals (lack specificity)
      - Few effective treatments for viral causes
      - Does NOT exclude polymicrobial infection
    clinical_relevance: "Limited clinical utility; does not change empiric antibiotic strategy"

# ============================================================================
# ATOM GROUP 3: TB DETECTION & HIV-ASSOCIATED PNEUMONIA
# ============================================================================

  - id: cap-tb-prevalence-sa-012
    card_source: "Community-Acquired Pneumonia - CMED4IIM1 - 2026_pages-001-010"
    atom: "TB as major cause of pneumonia in South Africa"
    definition: |
      South African epidemiology:
      - TB identified in ~40% of hospitalized pneumonia cases (Durban data)
      - TB outranks Streptococcus pneumoniae as leading cause
      - Occurs in both HIV-positive AND HIV-negative populations
      - 70% of hospitalized CAP patients are HIV-positive
      - Peak age 25-44 years in HIV+ patients
    clinical_relevance: "TB must be considered in all pneumonia cases in high-burden settings"

  - id: cap-genexpert-tb-diagnosis-013
    card_source: "Community-Acquired Pneumonia - CMED4IIM1 - 2026_pages-001-010"
    atom: "Gene Xpert assay for TB diagnosis"
    definition: |
      Gene Xpert MTB/RIF:
      - Cartridge-based nucleic acid amplification test
      - Replaced sputum smear microscopy standard
      - Excellent diagnostic characteristics
      - Surpassed only by sputum culture in sensitivity
      - Particularly useful in pneumonia workup
    clinical_relevance: "Rapid TB diagnosis; enables early TB treatment initiation"

  - id: cap-urine-lam-test-014
    card_source: "Community-Acquired Pneumonia - CMED4IIM1 - 2026_pages-001-010"
    atom: "Urine LAM test for TB in immunosuppressed"
    definition: |
      Urine-based LAM test:
      - Useful in HIV-positive patients unable to produce sputum
      - Sensitivity increases with advancing immunosuppression
      - Approaches 85% sensitivity in CD4 <50 cells/µL
      - Alternative diagnostic tool when sputum unavailable
    clinical_relevance: "Useful in advanced HIV with low CD4; enables diagnosis without sputum"

  - id: cap-hiv-pneumonia-pathogens-015
    card_source: "Community-Acquired Pneumonia - CMED4IIM1 - 2026_pages-001-010"
    atom: "Major etiological agents in HIV-associated pneumonia"
    definition: |
      Top 3 pathogens in HIV pneumonia:
      1. Mycobacterium tuberculosis
      2. Streptococcus pneumoniae (pneumococcal pneumonia)
      3. Pneumocystis jirovecii (PCP) - unique to hyperendemicity settings
      - Different pathogen prevalence by CD4 count
      - PCP more common in advanced immunosuppression
    clinical_relevance: "TB and PCP must be excluded in all HIV+ pneumonia cases"

  - id: cap-pcp-diagnosis-016
    card_source: "Community-Acquired Pneumonia - CMED4IIM1 - 2026_pages-001-010"
    atom: "Pneumocystis pneumonia (PCP) diagnostic challenges"
    definition: |
      PCP diagnostic challenges:
      - Requires organism identification on bronchoalveolar lavage (BAL)
      - Immunofluorescence identifies at most 60% of cases
      - PCR tests have high false positive rates
      - Diagnosis requires bronchoscopy in many cases
    clinical_relevance: "Difficult diagnosis; high index of suspicion needed in CD4 <200"

# ============================================================================
# ATOM GROUP 4: ANTIBIOTIC PHARMACODYNAMICS & SELECTION
# ============================================================================

  - id: antibiotic-time-vs-concentration-017
    card_source: "Optimal Use Of Antibiotics - Antibiotic Stewardship - CMED4IIM1 - 2026_pages-011-015"
    atom: "Time-dependent vs concentration-dependent antibiotics"
    definition: |
      Pharmacodynamic classification:

      Time-dependent (effectiveness depends on duration above MIC):
      - Penicillins, cephalosporins, vancomycin, lincosamides
      - Dosing: frequent intervals (every 4-6 hours)
      - Goal: maintain drug levels above MIC throughout interval

      Concentration-dependent (effectiveness depends on peak/MIC ratio):
      - Aminoglycosides, fluoroquinolones, macrolides
      - Dosing: high dose once or twice daily
      - Goal: maximize peak concentration for optimal kill effect
    clinical_relevance: "Dosing strategy must match antibiotic pharmacodynamics"

  - id: antibiotic-empiric-vs-targeted-018
    card_source: "Optimal Use Of Antibiotics - Antibiotic Stewardship - CMED4IIM1 - 2026_pages-001-010"
    atom: "Empiric vs targeted antibiotic therapy"
    definition: |
      Three antibiotic strategies:

      1. Empirical therapy: antibiotics based on clinical/laboratory guess
         before culture identification and susceptibility results

      2. Targeted therapy: antibiotics based on identified pathogen
         from culture and susceptibility testing (directed)

      3. Prophylaxis: prevention of infections (e.g., pre-operative)
    clinical_relevance: "Empiric at presentation; targeted at 48-72 hours when cultures return"

  - id: antibiotic-combination-indications-019
    card_source: "Optimal Use Of Antibiotics - Antibiotic Stewardship - CMED4IIM1 - 2026_pages-001-010"
    atom: "Indications for combination antibiotic therapy"
    definition: |
      Combination therapy rationale:
      1. Increase spectrum of coverage
      2. Achieve synergistic effect
      3. Reduce resistance emergence likelihood
      4. Reduce dosage of potentially toxic agents (e.g., aminoglycosides)
      5. Treat polymicrobial infections

      Preferred for: intra-abdominal infections, TB (resistance prevention),
      endocarditis (synergy), severe infections needing broader coverage
    clinical_relevance: "Use combination judiciously; single agent preferred when adequate"

  - id: antibiotic-resistance-mechanisms-020
    card_source: "Optimal Use Of Antibiotics - Antibiotic Stewardship - CMED4IIM1 - 2026_pages-011-015"
    atom: "Major bacterial antibiotic resistance mechanisms"
    definition: |
      Five main resistance mechanisms:
      1. Enzyme production (β-lactamase, AmpC, carbapenemase)
      2. Altered target sites (penicillin-binding proteins)
      3. Decreased permeability (gram-negative outer membrane)
      4. Active efflux pumps (drug removal)
      5. Biochemical modification of antibiotic molecule
    clinical_relevance: "Understanding resistance guides empiric therapy for resistant pathogens"

  - id: antibiotic-gram-stain-coverage-021
    card_source: "Optimal Use Of Antibiotics - Antibiotic Stewardship - CMED4IIM1 - 2026_pages-011-015"
    atom: "Antibiotic coverage by gram stain classification"
    definition: |
      Coverage patterns:

      Gram-positive coverage:
      - Penicillins, cephalosporins, vancomycin, macrolides

      Gram-negative coverage:
      - Fluoroquinolones, aminoglycosides, certain β-lactams

      Anaerobic coverage:
      - Specific agents required (β-lactam combinations, clindamycin, metronidazole)
    clinical_relevance: "Empiric choice must cover likely gram-stain pattern until culture results"

# ============================================================================
# ATOM GROUP 5: ANTIBIOTIC STEWARDSHIP & MANAGEMENT
# ============================================================================

  - id: antibiotic-stewardship-definition-022
    card_source: "Optimal Use Of Antibiotics - Antibiotic Stewardship - CMED4IIM1 - 2026_pages-011-015"
    atom: "Antimicrobial stewardship core principles"
    definition: |
      Definition: Prudent antibiotic use to achieve best outcomes while:
      - Minimizing antibiotic selective pressure
      - Reducing drug resistance development
      - Avoiding excessive adverse effects

      Core components:
      1. Confirm infection vs non-infection
      2. Collect appropriate samples before treatment
      3. Initiate empirical therapy post-specimen collection
      4. Monitor time-to-administration (rapid initiation)
      5. Re-evaluate at 48-72 hours (D2-D3) with culture results
      6. De-escalate, escalate, or tailor therapy
      7. Assess clinical stability; adjust accordingly
    clinical_relevance: "Structured approach reduces resistance and improves outcomes"

  - id: antibiotic-de-escalation-protocol-023
    card_source: "Optimal Use Of Antibiotics - Antibiotic Stewardship - CMED4IIM1 - 2026_pages-011-015"
    atom: "De-escalation protocol at 48-72 hours"
    definition: |
      D2-D3 culture and sensitivity review:
      - If organism sensitive to initial choice: continue same agent
      - If resistance found: step up to more potent agent
      - If organism narrower spectrum: de-escalate to narrower agent
      - Switch IV to oral when: clinically improving, tolerating PO intake,
        appropriate oral agent available, site allows oral drug penetration
    clinical_relevance: "Structured review reduces unnecessary broad-spectrum use"

  - id: antibiotic-failure-assessment-024
    card_source: "Optimal Use Of Antibiotics - Antibiotic Stewardship - CMED4IIM1 - 2026_pages-011-015"
    atom: "Clinical assessment of antibiotic treatment failure"
    definition: |
      Reasons for failure after initiation:
      1. Incorrect diagnosis (not actually infection)
      2. Wrong antibiotic agent
      3. Inadequate dose
      4. Incorrect frequency of administration
      5. Poor drug distribution to infection site
      6. Inadequate host nutrition
      7. Inappropriate combination therapy
      8. Emergence of resistance
      9. Abscess formation, foreign body, immune system issues
    clinical_relevance: "Structured assessment guides therapy adjustment decisions"

  - id: antibiotic-adverse-effects-025
    card_source: "Optimal Use Of Antibiotics - Antibiotic Stewardship - CMED4IIM1 - 2026_pages-011-015"
    atom: "Adverse effects and complications of antimicrobial agents"
    definition: |
      Major adverse effect categories:
      1. Direct toxicity: hypersensitivity, encephalitis, rash, fever, blood disorders
      2. Effects on normal flora: superinfection (Candida, C. difficile)
      3. Masking of severe infection (abscess masking)
      4. Drug tolerability issues
      5. Selection and proliferation of resistant organisms
    clinical_relevance: "Monitor for complications; balance benefits vs risks"

# ============================================================================
# ATOM GROUP 6: SUPPURATIVE LUNG DISEASE (BRONCHIECTASIS, ABSCESS, EMPYEMA)
# ============================================================================

  - id: suppurative-bronchiectasis-definition-026
    card_source: "Suppurative Lung Syndromes - CMED4IIM1 - 2026_pages-001-008"
    atom: "Bronchiectasis definition and pathophysiology"
    definition: |
      Definition: Abnormal, permanent dilatation of medium and small bronchial
      trees (focal or diffuse) from transmural inflammation and destruction

      Pathophysiology:
      - Transmural inflammation and destruction of bronchial walls
      - Mucosal edema and cartilage/muscle/elastic tissue replacement with fibrous tissue
      - Mucus gland hyperplasia with impaired mucociliary clearance
      - Recurrent bacterial infections → destructive cycle
      - Increased bronchial wall vascularity (neovascularization)
      - Hemoptysis risk from friable mucosa or hypertrophied bronchial arteries
    clinical_relevance: "Progressive disease; early recognition and treatment critical"

# ============================================================================
# ATOM GROUP 7: LUNG CANCER RISK & STAGING
# ============================================================================

  - id: lung-cancer-smoking-risk-027
    card_source: "Lung Cancer - CMED4IIM1 - 2026_pages-001-010"
    atom: "Cigarette smoking as primary lung cancer risk factor"
    definition: |
      Smoking epidemiology:
      - Most important modifiable risk factor
      - Associated with causation in up to 90% of cases
      - Carcinogens in each cigarette: >300 chemicals, 60+ known carcinogens
      - Risk factors: duration > intensity; younger start age > older start
      - Current smokers: 16-fold elevated risk (32-fold if started <16 years)
      - Persistent smokers: highest risk
      - Post-smoking: risk declines gradually to ~2-fold at 30 years
    clinical_relevance: "Smoking history essential in all CAP/chronic cough evaluation"

  - id: lung-cancer-advanced-stage-028
    card_source: "Lung Cancer - CMED4IIM1 - 2026_pages-001-010"
    atom: "Advanced-stage diagnosis and prognostic factors"
    definition: |
      Stage distribution at diagnosis:
      - 20% localized (stage 1-2)
      - 25% regional metastases (stage 3)
      - 55% distant metastases (stage 4) - MAJORITY

      Negative prognostic factors:
      - Advanced stage (most important)
      - Presence of metastases (especially brain, liver, bone, adrenal)
      - Poor performance status
      - Elevated LDH/ALP
      - Hyponatremia (SIADH sign)
      - Significant weight loss
      - Pre-existing lung disease
      - No targetable mutations

      Overall 5-year survival: ~20%
    clinical_relevance: "Most patients present with advanced disease; affects treatment intensity"

  - id: lung-cancer-tnm-staging-029
    card_source: "Lung-Cancer-CMED4IIM1-2026-pages-011-013.yaml"
    atom: "TNM staging classification for NSCLC"
    definition: |
      TNM Components:

      T (Tumor): size, airway relationship, structure invasion, nodule multiplicity

      N (Lymph nodes):
      - N0: no nodal involvement
      - N1: ipsilateral hilar/peribronchial nodes
      - N2: mediastinal/subcarinal nodes
      - N3: contralateral or scalene/supraclavicular nodes

      M (Metastases):
      - M0: no metastases
      - M1: distant metastases present (= stage 4)
    clinical_relevance: "Stage determines treatment: surgery vs chemoradiation vs supportive"

# ============================================================================
# SCENARIOS: CLINICAL DECISION TREES WITH PARAMETERIZATION
# ============================================================================

scenarios:

  - scenario_id: "triage-scenario-001"
    title: "Community-Acquired Pneumonia Severity Assessment"
    card_source: "Community-Acquired Pneumonia - CMED4IIM1 - 2026_pages-001-010"
    atoms_invoked: ["cap-severity-curb65-001", "cap-severity-risk-factors-003", "cap-mortality-stratification-004"]
    description: |
      Patient presents with cough, sputum production, dyspnea, and CXR infiltrates.
      Apply CURB-65 scoring to determine severity and site of care.

    decision_tree:
      step_1: "Collect vital signs and clinical data"
      step_2: "Calculate CURB-65 score (0-5 points)"
      step_3: "Assess risk factors and comorbidities"
      step_4: "Determine mortality risk stratum"
      step_5: "Guide admission and treatment intensity"

    parameters:
      - param_name: "age"
        param_type: "integer"
        unit: "years"
        variance_rule: "18-100; typically 25-80"
        critical_threshold: 65

      - param_name: "respiratory_rate"
        param_type: "integer"
        unit: "breaths/min"
        variance_rule: "10-40; normal 12-20"
        critical_threshold: 30

      - param_name: "systolic_bp"
        param_type: "integer"
        unit: "mmHg"
        variance_rule: "60-180; normal >90"
        critical_threshold: 90

      - param_name: "diastolic_bp"
        param_type: "integer"
        unit: "mmHg"
        variance_rule: "30-100; normal >60"
        critical_threshold: 60

      - param_name: "urea"
        param_type: "float"
        unit: "mmol/L"
        variance_rule: "2.5-20; normal 2.5-7.1"
        critical_threshold: 7.0

      - param_name: "mental_status"
        param_type: "categorical"
        variance_rule: ["normal", "confusion", "altered_sensorium"]

      - param_name: "crp"
        param_type: "float"
        unit: "mg/L"
        variance_rule: "5-500; normal <10"
        critical_threshold: 100

      - param_name: "curb65_score"
        param_type: "integer"
        unit: "points"
        variance_rule: "0-5"
        guidance: |
          0-1: Low risk, outpatient treatment
          2: Intermediate risk, admission consideration
          ≥3: High risk, ICU consideration

    example_case_1:
      context: "Elderly patient with multiple comorbidities"
      age: 78
      respiratory_rate: 32
      systolic_bp: 85
      diastolic_bp: 55
      urea: 9.2
      mental_status: "confusion"
      crp: 180
      curb65_score: 5
      mortality_risk: "Very high (>40% if ICU needed)"
      recommendation: "ICU admission, intensive antibiotics, consider sepsis protocol"

    example_case_2:
      context: "Young adult with no significant comorbidities"
      age: 35
      respiratory_rate: 24
      systolic_bp: 125
      diastolic_bp: 78
      urea: 5.5
      mental_status: "normal"
      crp: 65
      curb65_score: 0
      mortality_risk: "Low (~5%)"
      recommendation: "Outpatient oral antibiotics; close follow-up"

  - scenario_id: "triage-scenario-002"
    title: "CAP Diagnostic Approach: CXR and Biomarkers"
    card_source: "Community-Acquired Pneumonia - CMED4IIM1 - 2026_pages-001-010"
    atoms_invoked: ["cap-diagnosis-cxr-005", "cap-biomarker-crp-006", "cap-sputum-culture-008"]
    description: |
      Symptomatic patient: fever, cough, dyspnea.
      Integrate CXR findings with biomarker results to confirm pneumonia
      and guide culture ordering.

    parameters:
      - param_name: "cxr_findings"
        param_type: "categorical"
        variance_rule: ["normal", "lower_infiltrate", "interstitial", "consolidation", "pleural_effusion"]
        guidance: "Normal CXR in elderly/immunocompromised requires repeat imaging"

      - param_name: "air_bronchogram"
        param_type: "boolean"
        variance_rule: "yes/no; yes indicates consolidation"

      - param_name: "crp_absolute"
        param_type: "float"
        unit: "mg/L"
        variance_rule: "5-500"
        interpretation: "<100: strong negative predictive value for mortality"

      - param_name: "clinical_impression"
        param_type: "categorical"
        variance_rule: ["definite_pneumonia", "probable_pneumonia", "possible_pneumonia", "non_infectious"]

      - param_name: "sputum_adequacy"
        param_type: "categorical"
        variance_rule: ["adequate", "inadequate", "not_produced"]

      - param_name: "hospitalization_status"
        param_type: "categorical"
        variance_rule: ["outpatient", "hospitalized"]

    decision_logic:
      confirmed_pneumonia: "CXR infiltrate + clinical symptoms + fever/elevated WBC"
      culture_indicated: "Hospitalized OR CURB-65 ≥2 OR immunocompromised"
      repeat_imaging: "Normal CXR + high clinical suspicion + elderly/immunocompromised"

    example_case_3:
      context: "Outpatient with cough, fever; normal CXR"
      cxr_findings: "normal"
      air_bronchogram: false
      crp_absolute: 45
      clinical_impression: "non_infectious"
      hospitalization_status: "outpatient"
      sputum_adequacy: "not_produced"
      recommendation: "Treat empirically or repeat CXR at 24-48h if high clinical suspicion"

  - scenario_id: "triage-scenario-003"
    title: "TB Detection in High-Burden Setting (South African CAP)"
    card_source: "Community-Acquired Pneumonia - CMED4IIM1 - 2026_pages-001-010"
    atoms_invoked: ["cap-tb-prevalence-sa-012", "cap-genexpert-tb-diagnosis-013", "cap-hiv-pneumonia-pathogens-015"]
    description: |
      Patient in TB hyperendemic area presents with pneumonia.
      TB must be excluded in all cases; Gene Xpert enables rapid diagnosis.
      Special considerations for HIV-positive patients.

    parameters:
      - param_name: "epidemiologic_region"
        param_type: "categorical"
        variance_rule: ["high_tb_burden", "low_tb_burden"]
        guidance: "South Africa is high burden (~400k cases/100k population)"

      - param_name: "hiv_status"
        param_type: "categorical"
        variance_rule: ["hiv_positive", "hiv_negative", "hiv_unknown"]

      - param_name: "cd4_count"
        param_type: "integer"
        unit: "cells/µL"
        variance_rule: "0-1500; guideline thresholds: <200, <50"
        applicable_when: "hiv_status = hiv_positive"

      - param_name: "sputum_production"
        param_type: "boolean"
        variance_rule: "yes/no"

      - param_name: "genexpert_result"
        param_type: "categorical"
        variance_rule: ["positive", "negative", "not_performed"]
        unit: "TB status"

      - param_name: "cxr_pattern"
        param_type: "categorical"
        variance_rule: ["typical_tb", "atypical_infiltrate", "lower_lobe_infiltrate", "diffuse_infiltrate"]
        guidance: "TB typical: apical/posterior segments; but can mimic pneumonia"

    decision_logic:
      genexpert_indicated: "High TB prevalence setting + respiratory symptoms + sputum production"
      urine_lam_indicated: "HIV+ with CD4 <200 + unable to produce sputum"
      repeat_testing: "High clinical suspicion + initial negative + symptoms persist"

    example_case_4:
      context: "South African patient, HIV+, CD4=120"
      epidemiologic_region: "high_tb_burden"
      hiv_status: "hiv_positive"
      cd4_count: 120
      sputum_production: false
      urine_lam_result: "positive"
      cxr_pattern: "diffuse_infiltrate"
      recommendation: "Diagnose TB on LAM result; initiate TB treatment; investigate for other opportunistic infections (PCP)"

  - scenario_id: "triage-scenario-004"
    title: "Antibiotic Selection: Empiric vs Targeted"
    card_source: "Optimal Use Of Antibiotics - Antibiotic Stewardship - CMED4IIM1 - 2026_pages-001-010"
    atoms_invoked: ["antibiotic-empiric-vs-targeted-018", "antibiotic-time-vs-concentration-017", "antibiotic-gram-stain-coverage-021"]
    description: |
      Patient with confirmed/probable CAP requires empiric antibiotics.
      Choice of agent depends on risk factors, local resistance patterns,
      and pharmacodynamic properties. De-escalation at 48-72h when cultures return.

    parameters:
      - param_name: "pneumonia_severity"
        param_type: "categorical"
        variance_rule: ["mild_outpatient", "moderate_hospitalized", "severe_icu"]

      - param_name: "risk_factors"
        param_type: "array"
        variance_rule: ["copd", "asthma", "cardiac_disease", "diabetes", "hiv", "recent_antibiotics", "healthcare_exposure"]

      - param_name: "local_resistance_pattern"
        param_type: "categorical"
        variance_rule: ["low", "moderate", "high"]
        guidance: "Varies by region; hospital surveillance data essential"

      - param_name: "gram_stain_result"
        param_type: "categorical"
        variance_rule: ["gram_positive_cocci", "gram_negative_rods", "mixed", "not_available"]
        available_at: "same-day if sputum adequate"

      - param_name: "empiric_antibiotic_choice"
        param_type: "categorical"
        variance_rule: ["amoxicillin_clavulanate", "ceftriaxone", "fluoroquinolone", "carbapenem", "combination"]
        depends_on: ["pneumonia_severity", "local_resistance_pattern", "gram_stain_result"]

      - param_name: "culture_sensitivity_result"
        param_type: "categorical"
        variance_rule: ["sensitive_to_empiric", "resistant_needs_escalation", "no_organism_isolated"]
        available_at: "48-72 hours (D2-D3)"

      - param_name: "clinical_response_day3"
        param_type: "categorical"
        variance_rule: ["improving", "stable", "worsening"]
        triggers_de_escalation: "improving + organism sensitive"
        triggers_escalation: "worsening OR organism resistant"

    decision_logic:
      empiric_therapy: "Initiate after specimen collection; do not delay for cultures"
      re_evaluation_timing: "48-72 hours (D2-D3) with culture/sensitivity results"
      de_escalation: "Change to narrower spectrum if organism more sensitive"
      escalation: "Change to broader spectrum if organism resistant"

    example_case_5:
      context: "Moderate CAP hospitalized patient, no COPD, good renal function"
      pneumonia_severity: "moderate_hospitalized"
      risk_factors: ["none"]
      local_resistance_pattern: "moderate"
      gram_stain_result: "gram_positive_cocci"
      empiric_antibiotic_choice: "ceftriaxone (covers pneumococcus, typical CAP pathogens)"
      day3_culture_result: "Streptococcus pneumoniae, sensitive to ceftriaxone"
      clinical_response_day3: "improving"
      recommendation: "Continue ceftriaxone; do not change; re-evaluate at day 5-7"

  - scenario_id: "triage-scenario-005"
    title: "Antibiotic Resistance Pattern Recognition"
    card_source: "Optimal Use Of Antibiotics - Antibiotic Stewardship - CMED4IIM1 - 2026_pages-001-010"
    atoms_invoked: ["antibiotic-resistance-mechanisms-020", "antibiotic-combination-indications-019"]
    description: |
      Healthcare-associated or community-resistant pathogen detected.
      Empiric regimen must account for resistance mechanisms
      and may require combination therapy or escalation to carbapenems.

    parameters:
      - param_name: "pathogen_detected"
        param_type: "categorical"
        variance_rule: ["mrsa", "pseudomonas_aeruginosa", "esbl_klebsiella", "acinetobacter", "anaerobes", "polymicrobial"]

      - param_name: "resistance_mechanism"
        param_type: "categorical"
        variance_rule: ["beta_lactamase", "ampc_enzyme", "carbapenemase", "altered_target", "efflux_pump", "decreased_permeability"]
        determines_coverage: true

      - param_name: "infection_type"
        param_type: "categorical"
        variance_rule: ["community_acquired", "healthcare_associated", "hospital_acquired"]
        timing: "hospital_acquired = onset >48h after admission"

      - param_name: "combination_therapy_indicated"
        param_type: "boolean"
        variance_rule: "yes/no"
        triggers: ["polymicrobial_infection", "synergy_needed", "severe_infection"]

      - param_name: "recommended_coverage"
        param_type: "categorical"
        variance_rule: ["vancomycin_monotherapy", "carbapenem_monotherapy", "combination_broad_spectrum", "fluoroquinolone"]
        based_on: ["pathogen_detected", "resistance_mechanism", "infection_type"]

    example_case_6:
      context: "Hospital-acquired pneumonia, day 5 of admission"
      pathogen_detected: "pseudomonas_aeruginosa"
      resistance_mechanism: "beta_lactamase"
      infection_type: "hospital_acquired"
      combination_therapy_indicated: true
      recommended_coverage: "combination_broad_spectrum (e.g., piperacillin-tazobactam + fluoroquinolone or carbapenem)"
      recommendation: "Combination therapy for enhanced coverage; de-escalate when susceptibilities confirm"

  - scenario_id: "triage-scenario-006"
    title: "Lung Abscess vs Empyema Differential Diagnosis"
    card_source: "Suppurative Lung Syndromes - CMED4IIM1 - 2026_pages-001-008"
    atoms_invoked: ["suppurative-bronchiectasis-definition-026"]
    description: |
      Suppurative lung disease with cavitary finding on imaging.
      Differentiate between lung abscess (parenchymal) and empyema (pleural).
      Treatment differs significantly (antibiotics vs drainage).

    parameters:
      - param_name: "imaging_finding"
        param_type: "categorical"
        variance_rule: ["parenchymal_cavity", "pleural_fluid", "air_fluid_level", "loculation"]

      - param_name: "cavity_location"
        param_type: "categorical"
        variance_rule: ["lung_parenchyma", "pleural_space"]
        determines_diagnosis: true

      - param_name: "aspiration_risk"
        param_type: "boolean"
        variance_rule: "yes/no"
        associated_conditions: ["seizures", "coma", "neurological_disease", "dysphagia"]

      - param_name: "antibiotic_response"
        param_type: "categorical"
        variance_rule: ["responding_improving", "stable_no_change", "worsening_treatment_failure"]
        timing: "assess at day 5-7"

      - param_name: "drainage_requirement"
        param_type: "categorical"
        variance_rule: ["antibiotics_only", "bronchoscopic_drainage", "percutaneous_drainage", "surgical_drainage"]
        decision_factor: "abscess antibiotics; empyema needs drainage"

    example_case_7:
      context: "Patient with aspiration risk, cavitary finding, fever >7 days"
      imaging_finding: "parenchymal_cavity"
      cavity_location: "lung_parenchyma"
      aspiration_risk: true
      cultures: "anaerobic_organisms"
      antibiotic_response: "improving_clinically"
      drainage_requirement: "antibiotics_only (lung abscess responsive to anaerobic coverage)"
      recommendation: "Continue IV clindamycin or metronidazole; repeat imaging at 2 weeks; surgery only if large/symptomatic"

  - scenario_id: "triage-scenario-007"
    title: "Lung Cancer Risk Stratification and Screening"
    card_source: "Lung Cancer - CMED4IIM1 - 2026_pages-001-010"
    atoms_invoked: ["lung-cancer-smoking-risk-027", "lung-cancer-advanced-stage-028"]
    description: |
      Patient with smoking history presents with chronic cough or incidental finding.
      Assess lung cancer risk based on smoking pack-years and comorbidities.
      Guide imaging strategy (CXR vs low-dose CT) based on risk.

    parameters:
      - param_name: "smoking_status"
        param_type: "categorical"
        variance_rule: ["never_smoker", "former_smoker", "current_smoker"]

      - param_name: "pack_years"
        param_type: "float"
        unit: "pack-years"
        variance_rule: "0-200"
        screening_threshold: "≥30 pack-years in NLST trial (ages 55-74)"
        formula: "(cigarettes_per_day / 20) × years_smoking"

      - param_name: "age"
        param_type: "integer"
        unit: "years"
        variance_rule: "40-85"
        screening_eligible: "55-74 with ≥30 pack-years"

      - param_name: "smoking_duration"
        param_type: "integer"
        unit: "years"
        variance_rule: "0-70"
        risk_factor: "longer_duration_higher_risk_than_intensity"

      - param_name: "age_at_smoking_start"
        param_type: "integer"
        unit: "years"
        variance_rule: "10-30"
        risk_amplification: "started <16 years = 2x risk"

      - param_name: "years_since_cessation"
        param_type: "integer"
        unit: "years"
        variance_rule: "0-50"
        applicable_when: "smoking_status = former_smoker"
        risk_trajectory: "declines gradually, ~2-fold at 30 years"

      - param_name: "occupational_exposure"
        param_type: "categorical"
        variance_rule: ["none", "asbestos", "radon", "metals", "silica"]
        risk_amplification: "asbestos_synergistic_with_smoking (80-90x risk)"

      - param_name: "family_history_lung_cancer"
        param_type: "boolean"
        variance_rule: "yes/no"
        risk_amplification: "2-fold elevated risk"

      - param_name: "imaging_recommendation"
        param_type: "categorical"
        variance_rule: ["chest_xray", "low_dose_ct", "no_screening", "high_resolution_ct_if_suspicious"]
        based_on: ["age", "pack_years", "smoking_status", "symptoms"]

    example_case_8:
      context: "Current smoker with 45 pack-years, age 62, chronic cough"
      smoking_status: "current_smoker"
      pack_years: 45
      age: 62
      age_at_smoking_start: 17
      years_since_cessation: null
      occupational_exposure: "none"
      family_history_lung_cancer: true
      symptoms: "chronic_cough_2_months"
      imaging_recommendation: "low_dose_ct (high-risk candidate for NLST-type screening)"
      recommendation: "Initiate low-dose CT screening; discuss smoking cessation; assess fitness for potential resection if nodule found"

  - scenario_id: "triage-scenario-008"
    title: "TNM Staging and Treatment Planning for NSCLC"
    card_source: "Lung-Cancer-CMED4IIM1-2026-pages-011-013.yaml"
    atoms_invoked: ["lung-cancer-tnm-staging-029", "lung-cancer-advanced-stage-028"]
    description: |
      Confirmed NSCLC diagnosis; imaging and staging studies completed.
      TNM classification determines treatment modality: surgery vs chemoradiation vs supportive.
      Metastatic disease (M1) generally receives systemic therapy or palliative care.

    parameters:
      - param_name: "t_stage"
        param_type: "categorical"
        variance_rule: ["t1", "t2", "t3", "t4"]
        definition: "Tumor size, airway involvement, structure invasion"

      - param_name: "n_stage"
        param_type: "categorical"
        variance_rule: ["n0", "n1", "n2", "n3"]
        definition: "Lymph node extent (ipsilateral/mediastinal/supraclavicular)"

      - param_name: "m_stage"
        param_type: "categorical"
        variance_rule: ["m0", "m1"]
        definition: "M1 = distant metastases (liver, bone, brain, adrenal)"

      - param_name: "overall_stage"
        param_type: "categorical"
        variance_rule: ["stage_1a", "stage_1b", "stage_2a", "stage_2b", "stage_3a", "stage_3b", "stage_4"]
        derived_from: ["t_stage", "n_stage", "m_stage"]

      - param_name: "performance_status"
        param_type: "integer"
        unit: "ECOG scale"
        variance_rule: "0-4"
        interpretation: "0=fully active, 1=light activity, 2=50% time in bed, 3=mostly bedbound, 4=completely bedbound"

      - param_name: "targetable_mutation"
        param_type: "categorical"
        variance_rule: ["egfr_mutation", "alk_rearrangement", "ros1_rearrangement", "no_mutation_detected"]
        guides_systemic_therapy: "targeted inhibitors vs chemotherapy"

      - param_name: "treatment_modality"
        param_type: "categorical"
        variance_rule: ["surgery", "radiotherapy", "chemotherapy", "targeted_therapy", "immunotherapy", "chemoradiation", "supportive_care"]
        determined_by: ["overall_stage", "performance_status", "targetable_mutation", "patient_preference"]

    example_case_9:
      context: "NSCLC patient diagnosed, imaging complete"
      t_stage: "t2"
      n_stage: "n1"
      m_stage: "m1"
      overall_stage: "stage_4"
