  deck: |-
    Corpus::Paediatrics::2025 PALLIATIVE
  fields:
    Front: What is the IAHPC definition of palliative care?
    Back: Palliative care is the active holistic care of individuals across all ages
      with serious health-related suffering due to severe illness, and especially
      of those near the end of life. It aims to improve the quality of life of patients,
      their families and their caregivers.
  tags:
  - definition
  - palliative-care
  - |-
    subject:paediatrics
- guid: d0540b1ecea4eeee
  noteType: Basic
  deck: |-
    Corpus::Paediatrics::2025 PALLIATIVE
  fields:
    Front: Define paediatric palliative care.
    Back: Palliative care for children is the active total care of the child's body,
      mind and spirit, and also involves giving support to the family.
  tags:
  - definition
  - paediatric-palliative-care
  - |-
    subject:paediatrics
- guid: c5efffe69682e092
  noteType: Basic
  deck: |-
    Corpus::Paediatrics::2025 PALLIATIVE
  fields:
    Front: When does paediatric palliative care begin?
    Back: It begins when illness is diagnosed, and continues regardless of whether
      or not a child receives treatment directed at the disease.
  tags:
  - timing
  - palliative-care
  - |-
    subject:paediatrics
