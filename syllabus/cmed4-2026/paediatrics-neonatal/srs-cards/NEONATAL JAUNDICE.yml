      Back: "Calcium Gluconate or Lactate 1–3 g po daily"
    tags: ["hypocalcaemia-management", "treatment", "subject:paediatrics-neonatal"]
  - guid: "hypoca016abc"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::NEONATAL JAUNDICE"
    fields:
      Front: "Hypocalcaemia treatment (3): intravenous direct"
      Back: "Calcium Gluconate 10% 2 ml/kg IV diluted, given slowly"
    tags: ["hypocalcaemia-management", "treatment", "subject:paediatrics-neonatal"]
  - guid: "hypomagn001abc"
    noteType: Basic
