    fields:
      Front: "What is the epidemiology of child sexual abuse regarding gender and age?"
      Back: "Prevalence: 1:3 females, 1:5 males affected. Age peak in females: < 6 years and early teens. Age peak in males: late in first decade. Affects all social classes, races, and religions."
    tags: ["sexual-abuse", "epidemiology", "gender", "age-patterns", "subject:paediatrics"]
  - guid: "7084d05497d74816"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2024 NON ACCIDENTAL INJURIES"
    fields:
      Front: "What are the characteristics of perpetrators of child sexual abuse?"
      Back: "Over 80% of children are abused by someone known to them (2/3 are family members, often the primary caregiver). Perpetrators are typically: financially or otherwise stressed, with drug or alcohol abuse, underachievers with low self-esteem, jealous/manipulative personality (more than frank mental disorders), history of abuse themselves. Males represent > 95% of perpetrators, often as series of groomers and abusers."
    tags: ["sexual-abuse", "perpetrators", "risk-factors", "subject:paediatrics"]
