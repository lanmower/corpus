    noteType: Basic
    deck: "Corpus::Paediatrics::2022 CHILD RIGHTS SA LEGISLATURE"
    fields:
      Front: "What are the requirements for HIV testing for children above 12 years?"
      Back: "Sufficient maturity and capacity; pre- and post test counselling for all ages"
    tags: ["legislation", "rsa-law", "medical-consent", "hiv-testing", "subject:paediatrics"]
