# Parathyroid Disorders - SRS Cards
# Extracted from: Parathyroid Disorders - CMED4IIM1 - 2026_pages-001-007.txt
# Generated: 2026-05-04
# Total cards: 53

cards:
  - id: parathyroid-1
    front: What are the three hormones involved in calcium homeostasis?
    back: PTH (parathyroid hormone), vitamin D, and calcitonin
    category: physiology
    difficulty: medium

  - id: parathyroid-2
    front: What are the three main organs involved in calcium homeostasis?
    back: Bone, gut (GI tract), and kidneys
    category: physiology
    difficulty: medium

  - id: parathyroid-3
    front: Describe the action of PTH on calcium and phosphate
    back: PTH acts on bone and kidney, resulting in increased calcium and decreased phosphate
    category: physiology
    difficulty: medium

  - id: parathyroid-4
    front: Describe the action of vitamin D on calcium and phosphate
    back: Vitamin D acts on bone and GI tract, increasing both calcium and phosphate
    category: physiology
    difficulty: medium

  - id: parathyroid-5
    front: What is the net effect of calcitonin on serum calcium and phosphate?
    back: Calcitonin causes decreased calcium and decreased phosphate
    category: physiology
    difficulty: medium

  - id: parathyroid-6
    front: Which form of calcium is physiologically important?
    back: Free or ionized calcium (not bound to albumin)
    category: physiology
    difficulty: medium

  - id: parathyroid-7
    front: How is corrected serum calcium calculated?
    back: "(40 - serum albumin) × 0.02 + measured serum calcium"
    category: investigation
    difficulty: medium

  - id: parathyroid-8
    front: What defines primary hyperparathyroidism?
    back: "Autonomous/excessive PTH secretion with elevated calcium and elevated PTH"
    category: pathophysiology
    difficulty: medium

  - id: parathyroid-9
    front: What are the causes of primary hyperparathyroidism?
    back: "Adenoma (solitary or multiple), hyperplasia, rarely carcinoma. May be part of MEN 1 or MEN 2"
    category: etiology
    difficulty: medium

  - id: parathyroid-10
    front: What defines secondary hyperparathyroidism?
    back: "Compensatory increase in PTH due to low calcium. Causes: chronic renal disease, malabsorption, rickets"
    category: pathophysiology
    difficulty: medium

  - id: parathyroid-11
    front: What is tertiary hyperparathyroidism?
    back: "Autonomous PTH secretion developing after prolonged secondary hyperparathyroidism. Elevated PTH with elevated calcium"
    category: pathophysiology
    difficulty: medium

  - id: parathyroid-12
    front: What is ectopic hyperparathyroidism?
    back: "PTH-related protein secretion from malignancy. High calcium with low or absent measurable PTH"
    category: pathophysiology
    difficulty: medium

  - id: parathyroid-13
    front: What are the renal manifestations of primary hyperparathyroidism?
    back: "Nephrolithiasis, nephrocalcinosis, hypertension, polyuria, polydipsia, renal tubular acidosis, Fanconi syndrome"
    category: clinical
    difficulty: medium

  - id: parathyroid-14
    front: What is the relationship between nephrocalcinosis and hypercalcemia?
    back: "Hypercalcemia causes inability to concentrate urine (nephrogenic diabetes insipidus) and renal tubular dysfunction"
    category: clinical
    difficulty: medium

  - id: parathyroid-15
    front: What are the bone manifestations of primary hyperparathyroidism?
    back: "Osteitis fibrosa cystica, brown tumors, pathological fractures, subperiosteal reabsorption"
    category: clinical
    difficulty: medium

  - id: parathyroid-16
    front: Which bones are classically affected by osteitis fibrosa cystica?
    back: "Mandible, humerus, femur, clavicle. Subperiosteal reabsorption typically on right middle finger (radial aspect)"
    category: clinical
    difficulty: medium

  - id: parathyroid-17
    front: What GI manifestations can hypercalcemia cause?
    back: "Anorexia, nausea, weight loss, dyspepsia, peptic ulcer, abdominal colic, obstipation (obstinate constipation), pancreatitis"
    category: clinical
    difficulty: medium

  - id: parathyroid-18
    front: What is the relationship between hypercalcemia and pancreatitis?
    back: "Bidirectional: pancreatitis causes low calcium, while hyperparathyroidism can cause pancreatitis"
    category: clinical
    difficulty: medium

  - id: parathyroid-19
    front: What mental manifestations can hypercalcemia cause?
    back: "Anxiety, irritability, depression - often first to resolve after successful parathyroidectomy"
    category: clinical
    difficulty: medium

  - id: parathyroid-20
    front: What ophthalmologic findings occur in hyperparathyroidism?
    back: "Band keratopathy (corneal calcium deposits), pseudogout/chondrocalcinosis in joints"
    category: clinical
    difficulty: medium

  - id: parathyroid-21
    front: What is acute hypercalcemia?
    back: "Medical emergency: serum calcium ≥3.5-3.7 mmol/L with shock-like state, oliguria, dehydration, pyrexia, coma"
    category: clinical
    difficulty: medium

  - id: parathyroid-22
    front: What are key laboratory findings in primary hyperparathyroidism?
    back: "Elevated serum calcium, low phosphate, increased urinary calcium, elevated PTH, elevated alkaline phosphatase"
    category: investigation
    difficulty: medium

  - id: parathyroid-23
    front: What acid-base abnormality occurs in primary hyperparathyroidism?
    back: "Hypochloremic alkalosis (high bicarb, low chloride)"
    category: investigation
    difficulty: medium

  - id: parathyroid-24
    front: What radiological features are seen in primary hyperparathyroidism?
    back: "Subperiosteal reabsorption, salt-and-pepper skull appearance, cysts in bones, brown tumors, vertebral sclerosis"
    category: investigation
    difficulty: medium

  - id: parathyroid-25
    front: How does PTH affect cortical vs cancellous bone in hyperparathyroidism?
    back: "Cortical bone (distal radius) affected MORE than cancellous bone (spine)"
    category: investigation
    difficulty: medium

  - id: parathyroid-26
    front: What is sestamibi scan used for?
    back: "Radionuclide imaging to localize parathyroid adenomas"
    category: investigation
    difficulty: medium

  - id: parathyroid-27
    front: What ECG finding is seen in hyperparathyroidism?
    back: "Shortened corrected QT interval (normal 0.35-0.40 seconds)"
    category: investigation
    difficulty: medium

  - id: parathyroid-28
    front: What intraoperative test confirms successful parathyroidectomy?
    back: "Dramatic reduction in PTH levels after adenoma resection"
    category: investigation
    difficulty: medium

  - id: parathyroid-29
    front: What is the treatment of choice for primary hyperparathyroidism?
    back: "Surgical treatment with PTH monitoring. For adenoma: resect adenoma. For hyperplasia: remove 3.5 glands"
    category: management
    difficulty: medium

  - id: parathyroid-30
    front: What medical therapy is used for primary hyperparathyroidism when surgery not possible?
    back: "Calcimimetic agents (cinacalcet) targeting calcium sensing receptors to suppress PTH"
    category: management
    difficulty: medium

  - id: parathyroid-31
    front: How is secondary hyperparathyroidism treated?
    back: "If malabsorption: vitamin D. If renal disease: vitamin D or alpha-calcidiol"
    category: management
    difficulty: medium

  - id: parathyroid-32
    front: What is the acute management of severe hypercalcemia?
    back: "Rehydration with normal saline, bisphosphonates (alendronate or ibandronate), steroids for myeloma"
    category: management
    difficulty: medium

  - id: parathyroid-33
    front: How is hypoparathyroidism defined?
    back: "Inadequate PTH secretion or resistance to PTH, causing low calcium and high phosphate"
    category: pathophysiology
    difficulty: medium

  - id: parathyroid-34
    front: What are the causes of hypoparathyroidism?
    back: "Hereditary (idiopathic, polyglandular autoimmune, Albright syndrome), acquired (surgical, radiation), infiltration (TB, amyloid, sarcoid), hypermagnesemia"
    category: etiology
    difficulty: medium

  - id: parathyroid-35
    front: What are the neuromuscular manifestations of hypoparathyroidism?
    back: "Tetany, paresthesias, muscle cramps, Trousseau sign (carpopedal spasm), Chvostek sign (facial twitch), brisk reflexes, convulsions"
    category: clinical
    difficulty: medium

  - id: parathyroid-36
    front: What is Trousseau sign?
    back: "Blood pressure cuff inflated above systolic for 3 minutes causes carpopedal spasm - indicates latent tetany"
    category: clinical
    difficulty: medium

  - id: parathyroid-37
    front: What is Chvostek sign and its significance?
    back: "Tapping facial nerve over parotid induces facial contraction. Present in ~5% of normal population so NOT specific"
    category: clinical
    difficulty: medium

  - id: parathyroid-38
    front: What CNS complications occur in hypoparathyroidism?
    back: "Cataracts, benign intracranial hypertension (bilateral papilledema), epilepsy, basal ganglia calcification"
    category: clinical
    difficulty: medium

  - id: parathyroid-39
    front: What is FAHR syndrome?
    back: "Familial Hypoparathyroidism with basal ganglia calcification and Extrapyramidal symptoms"
    category: clinical
    difficulty: medium

  - id: parathyroid-40
    front: What dermatological findings are seen in hypoparathyroidism?
    back: "Dry scaly skin, eczema, alopecia, brittle deformed nails prone to paronychia/candida, malformed teeth if early onset"
    category: clinical
    difficulty: medium

  - id: parathyroid-41
    front: What are the laboratory findings in hypoparathyroidism?
    back: "Low serum calcium, high phosphate, low/absent PTH, decreased urinary calcium and phosphate, possible low magnesium"
    category: investigation
    difficulty: medium

  - id: parathyroid-42
    front: What ECG finding is seen in hypoparathyroidism?
    back: "Prolonged corrected QT interval (opposite of hyperparathyroidism)"
    category: investigation
    difficulty: medium

  - id: parathyroid-43
    front: How is transient hypoparathyroidism treated?
    back: "Oral calcium carbonate, or intravenous calcium gluconate if severe"
    category: management
    difficulty: medium

  - id: parathyroid-44
    front: How is chronic hypoparathyroidism treated?
    back: "Vitamin D analogs (1-alpha, alpha-calcidiol), calcitriol, teriparatide (PTH) if available. Treat hypomagnesemia"
    category: management
    difficulty: medium

  - id: parathyroid-45
    front: What is the prognosis of hypoparathyroidism?
    back: "Post-operative transient: good. Early detection: good. Late detection: worse"
    category: management
    difficulty: medium

  - id: parathyroid-46
    front: What is pseudohypoparathyroidism (PHP)?
    back: "Normal/hypoplastic parathyroid glands but target organs (kidney, bone) resist PTH. Biochemistry of hypoparathyroidism"
    category: pathophysiology
    difficulty: medium

  - id: parathyroid-47
    front: What causes pseudohypoparathyroidism?
    back: "Deficiency of alpha subunit of G protein (Gα), causing end-organ PTH resistance"
    category: etiology
    difficulty: medium

  - id: parathyroid-48
    front: What is Albright hereditary osteodystrophy?
    back: "PHP phenotype: short stature, skeletal abnormalities, round face with frontal bossing, short metacarpals/phalanges"
    category: clinical
    difficulty: medium

  - id: parathyroid-49
    front: What skeletal features characterize PHP?
    back: "Short 4th and 5th metacarpals, short phalanges, short stubby hands, heterotopic ossifications, basal ganglia calcification"
    category: clinical
    difficulty: medium

  - id: parathyroid-50
    front: What neurological features can PHP have?
    back: "Mental deficiency, epilepsy, tetany, basal ganglia calcification (like hypoparathyroidism)"
    category: clinical
    difficulty: medium

  - id: parathyroid-51
    front: How is short 4th metacarpal detected clinically?
    back: "Patient makes a fist - normally all metacarpal heads level. In PHP, 4th metacarpal pushed down and not visible"
    category: clinical
    difficulty: medium

  - id: parathyroid-52
    front: What laboratory findings distinguish PHP from hypoparathyroidism?
    back: "Both have low calcium and high phosphate, BUT PHP has elevated PTH (not low) - the key difference"
    category: investigation
    difficulty: medium

  - id: parathyroid-53
    front: What is the Ellsworth-Howard test?
    back: "Measures urinary cAMP and phosphate to differentiate hypoparathyroidism from PHP and its subtypes"
    category: investigation
    difficulty: medium
