    noteType: "Basic"
    deck: "Corpus::Paediatrics::2024 NON ACCIDENTAL INJURIES"
    fields:
      Front: "What are the suspicious circumstances that raise concern for sexual abuse?"
      Back: "Suspicious circumstances include: Unexplained injuries, Discrepant histories, Delay in seeking health care, Alleged self-inflicted injuries, Alleged third party inflicted injuries, Repeated injuries, Sexualised behaviour, Sexually transmitted infection."
