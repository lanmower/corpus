- id: 1
  front: "What is the definition of diarrhea?"
  back: "Abnormally liquid or unformed stools at increased frequency (>3 stools/day OR >200 mL/day or any combination of these)"

- id: 2
  front: "How is acute diarrhea classified by duration?"
  back: "Acute: <2 weeks; Persistent: 14-30 days; Chronic: >4 weeks (also stated as >30 days)"

- id: 3
  front: "What is the basic pathophysiology of diarrhea?"
  back: "Imbalance between secretion and absorption. Total daily intake ~9.3L (saliva 1L, ingested 2.3L, gastric juice 2L, bile/pancreatic 1L, etc.) vs absorption (small intestine 8.3L, colon 0.9L)"

- id: 4
  front: "What are the main complications of acute vs chronic diarrhea?"
  back: "Acute: dehydration and electrolyte abnormalities; Chronic: malnutrition and impaired quality of life"

- id: 5
  front: "What percentage of acute diarrhea cases are infectious?"
  back: "More than 90% of acute diarrhea cases are caused by infectious pathogens"

- id: 6
  front: "What percentage of chronic diarrhea cases are infectious?"
  back: "More than 90% of chronic diarrhea cases are NOT infectious (>90% are non-infectious)"

- id: 7
  front: "Describe small bowel vs large bowel diarrhea characteristics"
  back: "Small bowel: watery, large volumes, cramping/bloating/gas, fever, blood/inflammatory cells; Large bowel: frequent, small volume, painful, bloody/mucoid stools, RBCs, less cramping"

- id: 8
  front: "Which patient populations are at high risk for severe acute diarrhea?"
  back: "Immunosuppressed, HIV+, elderly, young children, pregnant women, those with dysentery, inability to drink/eat, severe vomiting"

- id: 9
  front: "What are warning signs requiring admission for acute diarrhea?"
  back: "Fever >38.5°C, frank blood in stool (dysentery), severe vomiting leading to dehydration, obvious dehydration, severe abdominal pain/tenderness"

- id: 10
  front: "What is the difference between secretory and osmotic diarrhea?"
  back: "Secretory: stimulation of channels to secrete electrolytes (persists with fasting); Osmotic: nonabsorbed material pulls water (ceases with fasting)"

- id: 11
  front: "What is stool osmolal gap and how is it interpreted?"
  back: "Calculated as 290 - 2(Na + K). Secretory: <50 (normal); Indeterminate: 50-125; Osmotic: >125"

- id: 12
  front: "How is fecal elastase used diagnostically?"
  back: "<50 fecal elastase is diagnostic of steatorrhea; <200 supports pancreatic insufficiency (normal >200)"

- id: 13
  front: "What are the features of malabsorption/steatorrhea diarrhea?"
  back: "Significant weight loss, greasy/oily stools, floating stools, fat droplets visible in toilet water"

- id: 14
  front: "What investigations should be done for acute diarrhea?"
  back: "U&E (electrolytes), FBC (WCC, CRP), blood cultures, stool microscopy/culture/sensitivity, stool O&P, C.diff toxin, viral antigens"

- id: 15
  front: "What is the first-line management for acute diarrhea with oral intake capability?"
  back: "Oral rehydration solution (ORS); IV fluids if severely dehydrated; antibiotics if suspected infectious pathogen or high-risk"

- id: 16
  front: "Why are antidiarrheals not recommended in acute diarrhea?"
  back: "High risk of toxic megacolon and perforation; not recommended in acute setting"

- id: 17
  front: "What are the causes of inflammatory diarrhea?"
  back: "IBD (ulcerative colitis, Crohn's), lymphocytic/collagenous colitis, immune-mediated (primary/secondary immunodeficiency, food allergy, eosinophilic gastroenteritis, graft-versus-host disease)"

- id: 18
  front: "What is the difference between IBS and functional diarrhea?"
  back: "IBS: recurrent abdominal pain related to defecation with change in stool form/frequency; Functional diarrhea: recurrent loose/watery stools WITHOUT abdominal pain"

- id: 19
  front: "What are common iatrogenic causes of diarrhea?"
  back: "Protease inhibitors, antibiotics, aminosalicylates (IBD treatment), proton pump inhibitors; surgery (blind loop, short bowel syndrome, post-gastrectomy)"

- id: 20
  front: "What is fictitious diarrhea?"
  back: "Intentional injection of substance causing diarrhea or mixing stool sample with water/urine to exaggerate volume"

- id: 21
  front: "When does HIV-associated diarrhea occur relative to HIV progression?"
  back: "During seroconversion (0-6 weeks), due to ART side effects (especially protease inhibitors), and with advanced disease/low CD4 (<200) with opportunistic infections"

- id: 22
  front: "What CD4 count threshold is important for opportunistic infections in HIV diarrhea?"
  back: "CD4 <200 cells/μL: increased risk for CMV, microsporidia, GI malignancies, strongyloides; TB can occur at any CD4 count"

- id: 23
  front: "What are the main causes of HIV-associated diarrhea?"
  back: "Opportunistic infections (CMV, cryptosporidium, microsporidia, MAC), malignancies (lymphoma, AIDS-related), drug side effects (ARVs, antibiotics), SIBO, and pathogen-negative AIDS enteropathy"

- id: 24
  front: "What investigations are first-line for HIV-related diarrhea?"
  back: "3x stool samples for microscopy/O&P, TB screening, C.diff screen; assess CD4 count and viral load; consider PCR for suspected organisms"

- id: 25
  front: "What is the management flow for HIV-related diarrhea if stool samples are negative?"
  back: "Optimize/start ART; minimize drug side effects; if pathogen-negative, proceed to flexible sigmoidoscopy (biopsy for histology, TB, CMV), then colonoscopy if needed, then cross-sectional imaging (CT)"

