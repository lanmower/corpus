    fields:
      Front: "What does 'A-B-C' stand for in post-seizure assessment?"
      Back: "A = Airway, B = Breathing, C = Circulation (recheck vital parameters)"
    tags: ["post-seizure-assessment", "vital-signs", "subject:paediatrics"]
