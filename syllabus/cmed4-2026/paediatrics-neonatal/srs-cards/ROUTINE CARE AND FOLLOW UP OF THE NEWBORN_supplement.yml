deck: "Corpus::Paediatrics-Neonatal::ROUTINE CARE AND FOLLOW UP OF THE NEWBORN"
notes:
  - guid: "z1a2b3c4d5e6f7g8"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::ROUTINE CARE AND FOLLOW UP OF THE NEWBORN"
    fields:
      Front: "What is the cutoff weight for babies at risk of apnoea who require respiratory stimulant treatment?"
      Back: "Babies with birth weight <1.5 kg or gestational age <35 weeks"
    tags: ["apnoea", "respiratory-stimulant", "weight-cutoff", "supplement", "subject:paediatrics-neonatal"]
  - guid: "h9i8j7k6l5m4n3o2"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::ROUTINE CARE AND FOLLOW UP OF THE NEWBORN"
    fields:
      Front: "What is the weight threshold for stopping apnoea treatment, and what is the time-based alternative?"
      Back: "Stop when baby reaches 1.8 kg OR has been apnoea-free for at least 7 days (whichever comes first)"
    tags: ["apnoea", "discharge", "weight-threshold", "supplement", "subject:paediatrics-neonatal"]
  - guid: "p1q2r3s4t5u6v7w8"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::ROUTINE CARE AND FOLLOW UP OF THE NEWBORN"
    fields:
      Front: "What is the weight cutoff that determines which babies are kept NIL by mouth for the first 24 hours?"
      Back: "Babies under 1.5 kg (and all sick babies)"
    tags: ["feeding", "weight-cutoff", "noenl", "supplement", "subject:paediatrics-neonatal"]
  - guid: "x9y8z7a6b5c4d3e2"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::ROUTINE CARE AND FOLLOW UP OF THE NEWBORN"
    fields:
      Front: "What happens to CRP management in babies given prophylactic antibiotics for UPTL or PROM?"
      Back: "Check CRP after 48 hours; if normal and baby is well, stop antibiotics. If infection is confirmed, continue for 5 days total"
    tags: ["antibiotics", "crp", "prophylaxis", "supplement", "subject:paediatrics-neonatal"]
  - guid: "f1g2h3i4j5k6l7m8"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::ROUTINE CARE AND FOLLOW UP OF THE NEWBORN"
    fields:
      Front: "When should multivitamin drops be started and what is the requirement for vitamin D content?"
      Back: "Start 0.6 ml daily from day 5 if feeding well established. Must contain 400 IU vitamin D daily"
    tags: ["supplements", "vitamins", "timing", "supplement", "subject:paediatrics-neonatal"]
  - guid: "n7o6p5q4r3s2t1u0"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::ROUTINE CARE AND FOLLOW UP OF THE NEWBORN"
    fields:
      Front: "Which low birth weight babies need additional vitamin D supplementation beyond the multivitamin preparation?"
      Back: "Babies <1.5 kg receive vitamin D 400 IU daily separately"
    tags: ["supplements", "vitamin-d", "lbw", "supplement", "subject:paediatrics-neonatal"]
  - guid: "v5w4x3y2z1a0b9c8"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::ROUTINE CARE AND FOLLOW UP OF THE NEWBORN"
    fields:
      Front: "When should iron supplementation (Ferrodrops) begin and what is the dosage?"
      Back: "0.6 ml ferrous lactate (Ferrodrops) daily from day 14, if the baby is feeding"
    tags: ["supplements", "iron", "ferrodrops", "timing", "supplement", "subject:paediatrics-neonatal"]
  - guid: "d3e2f1g0h9i8j7k6"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::ROUTINE CARE AND FOLLOW UP OF THE NEWBORN"
    fields:
      Front: "What are the exact weight loss and weight gain targets for safe discharge of small or sick babies?"
      Back: "Weight loss <10% of birth weight AND weight gain ≥10 g/kg/day"
    tags: ["growth", "discharge-criteria", "targets", "supplement", "subject:paediatrics-neonatal"]
  - guid: "l5m4n3o2p1q0r9s8"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::ROUTINE CARE AND FOLLOW UP OF THE NEWBORN"
    fields:
      Front: "List all babies who require routine follow-up visits after discharge"
      Back: "1. Birth weight <2 kg\n2. Sepsis, NEC, or meningitis\n3. Encephalopathy\n4. Severe jaundice\n5. Congenital abnormalities\n6. Hypoglycaemia\n7. IPPV or CPAP use during admission"
    tags: ["follow-up", "high-risk", "discharge", "supplement", "subject:paediatrics-neonatal"]
  - guid: "t9u8v7w6x5y4z3a2"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::ROUTINE CARE AND FOLLOW UP OF THE NEWBORN"
    fields:
      Front: "What must be included in the assessment of a baby during a routine follow-up visit?"
      Back: "1. Growth parameters\n2. Neurodevelopmental assessment and milestones\n3. Feeding history\n4. Social and care dependency grants\n5. Assessment for new problems and parental concerns\n6. Follow-up of outstanding investigations\n7. ROP and audiology screening/follow-up\n8. Referrals as needed (physiotherapy, OT, speech therapy, dietician)\n9. Repeat HIV PCR for exposed infants"
    tags: ["follow-up", "assessment", "visit-content", "supplement", "subject:paediatrics-neonatal"]
  - guid: "b1c0d9e8f7g6h5i4"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::ROUTINE CARE AND FOLLOW UP OF THE NEWBORN"
    fields:
      Front: "What are the clinical indications for a baby to be brought to PHC clinic (not hospital)?"
      Back: "1. Discharge from eyes\n2. Umbilical sepsis (pus draining, red skin around umbilicus)\n3. Septic skin lesions (pustules)\n4. Jaundice"
    tags: ["follow-up", "phc-clinic", "triggers", "supplement", "subject:paediatrics-neonatal"]
  - guid: "j3k2l1m0n9o8p7q6"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::ROUTINE CARE AND FOLLOW UP OF THE NEWBORN"
    fields:
      Front: "What are the clinical indications for a baby to be brought to hospital (not PHC)?"
      Back: "1. Poor feeding or poor suckling (early sign of severe illness)\n2. Convulsions\n3. Rapid breathing\n4. Diarrhoea\n5. Bleeding"
    tags: ["follow-up", "hospital-referral", "triggers", "supplement", "subject:paediatrics-neonatal"]
  - guid: "r7s6t5u4v3w2x1y0"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::ROUTINE CARE AND FOLLOW UP OF THE NEWBORN"
    fields:
      Front: "What is the relationship between penicillin and gentamicin dosing in newborn antibiotic therapy?"
      Back: "Penicillin: 100,000 U/kg/dose twice daily (BD) AND Gentamicin: 5 mg/kg/day daily (administered together)"
    tags: ["antibiotics", "dosing", "combination", "supplement", "subject:paediatrics-neonatal"]
