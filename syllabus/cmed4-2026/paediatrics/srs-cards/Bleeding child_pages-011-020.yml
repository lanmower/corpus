    deck: "Corpus::Paediatrics::Bleeding child"
    fields:
      Front: "List the history components to assess in a bleeding child."
      Back: "Age/neonate, sex, single site/multiple sites, mucocutaneous/soft tissue, ill child/well child, family history, medication, immunisations/recent viral infections"
    tags: ["history", "assessment", "bleeding-child", "subject:paediatrics"]
  - guid: b2c3d4e5f6g7b2c3
    noteType: Basic
    deck: "Corpus::Paediatrics::Bleeding child"
    fields:
      Front: "What physical examination findings should be assessed in a bleeding child?"
      Back: "Ill child/well child, single site/multiple sites, mucocutaneous/soft tissue/joints, splenomegaly/organomegaly, lymphadenopathy, dysmorphism/skeletal abnormalities"
    tags: ["physical-examination", "assessment", "bleeding-child", "subject:paediatrics"]
  - guid: c3d4e5f6g7h8c3d4
    noteType: Basic
    deck: "Corpus::Paediatrics::Bleeding child"
    fields:
      Front: "What physical findings indicate platelet disorders?"
      Back: "Petechiae (wet vs dry), superficial ecchymosis, mucosal indicate quantitative or qualitative platelet disorders"
    tags: ["platelets", "physical-finding", "petechiae", "subject:paediatrics"]
  - guid: d4e5f6g7h8i9d4e5
    noteType: Basic
    deck: "Corpus::Paediatrics::Bleeding child"
    fields:
      Front: "What physical finding indicates vascular disorder?"
      Back: "Palpable purpura indicates blood vessel disorder (vasculitis, scurvy, hypersensitivity)"
    tags: ["vasculitis", "vascular", "physical-finding", "subject:paediatrics"]
  - guid: e5f6g7h8i9j0e5f6
    noteType: Basic
    deck: "Corpus::Paediatrics::Bleeding child"
    fields:
      Front: "What physical findings indicate coagulation factor deficiency (Haemophilia A and B)?"
      Back: "Haemarthrosis, Deep ecchymosis ± Mucous membranes indicate Coagulation factors (VIII, IX) deficiency"
    tags: ["haemophilia", "haemarthrosis", "coagulation", "subject:paediatrics"]
