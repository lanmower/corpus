    fields:
      Front: "What is the exact location for 2-finger chest thrusts in an infant with choking?"
      Back: "For 2-finger chest thrusts in choking infant: locate 1 finger breadth ABOVE the xiphisternum (lower end of sternum). Compression depth should be 1/3 of the chest diameter, hard enough to cause a compression wave in the airway."
    tags: ["infant-choking", "chest-thrust", "anatomy-landmarks", "subject:paediatrics"]
  - guid: "i9z8y7x6w5v4u3ta"
    noteType: Basic
    deck: "Corpus::Paediatrics::2021 AIRWAY AND BREATHING"
    fields:
      Front: "What is the sequence and frequency of chest thrusts for a choking infant?"
      Back: "Perform 5 chest thrusts with 2-finger compression technique. After 5 compressions, reassess and recycle. Keep the infant's head in a head-down position during chest thrusts to aid expulsion of the foreign body. Continue the cycle of 5 compressions until the foreign body is expelled or clinical status changes."
    tags: ["infant-choking", "chest-thrust", "technique-sequence", "subject:paediatrics"]
  - guid: "j9z8y7x6w5v4u3tb"
    noteType: Basic
    deck: "Corpus::Paediatrics::2021 AIRWAY AND BREATHING"
    fields:
      Front: "What is the head position during choking maneuvers for an infant?"
      Back: "Keep the infant's head DOWN during choking maneuvers (back blows and chest thrusts). This head-down position aids in the expulsion of the foreign body by gravity and helps maintain airway positioning."
    tags: ["infant-choking", "positioning", "choking-technique", "subject:paediatrics"]
  - guid: "k9z8y7x6w5v4u3tc"
    noteType: Basic
    deck: "Corpus::Paediatrics::2021 AIRWAY AND BREATHING"
    fields:
      Front: "What is the sequence and frequency of back blows for a choking older child?"
      Back: "Perform 5 back blows directed to the back of the child to force the diaphragm up and create a compression wave in the airway. After 5 back blows, reassess the child's condition. If the obstruction persists, continue with the next maneuver (chest thrusts or abdominal thrusts depending on age) and recycle."
    tags: ["choking-child", "back-blow", "technique-sequence", "subject:paediatrics"]
  - guid: "l9z8y7x6w5v4u3td"
    noteType: Basic
    deck: "Corpus::Paediatrics::2021 AIRWAY AND BREATHING"
    fields:
      Front: "What is the sequence and frequency of abdominal thrusts (Heimlich maneuver) for a choking child?"
      Back: "Perform 5 abdominal thrusts (Heimlich maneuver) by pulling the fist up and back with force to elevate the diaphragm and create a compression wave. After 5 thrusts, reassess. The direction of pull is upward into the abdomen. Recycle through the maneuver sequence if obstruction persists. This maneuver is used in older children, NOT infants."
    tags: ["choking-child", "heimlich-maneuver", "technique-sequence", "subject:paediatrics"]
  - guid: "m9z8y7x6w5v4u3te"
    noteType: Basic
    deck: "Corpus::Paediatrics::2021 AIRWAY AND BREATHING"
    fields:
      Front: "What is the complete cycling sequence for managing an older child with choking and ineffective cough?"
      Back: "Perform: 5 back blows, reassess → 5 chest/abdominal thrusts, reassess → repeat cycle. Continue this iterative cycle until the foreign body is expelled, the child can cough effectively, or the child loses consciousness (then begin resuscitation with high-flow oxygen bag and mask plus CPR if needed)."
    tags: ["choking-child", "ineffective-cough", "management-algorithm", "subject:paediatrics"]
