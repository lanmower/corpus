    deck: "Corpus::Paediatrics::2024 NON ACCIDENTAL INJURIES"
    fields:
      Front: "What is post-exposure prophylaxis and when is it indicated in child sexual abuse?"
      Back: "Post-exposure prophylaxis includes: Antibiotics (for STI prevention), Pregnancy prevention measures (when indicated by age and menstrual status), Treatment of injuries evident on presentation."
    tags: ["sexual-abuse", "treatment", "post-exposure-prophylaxis", "subject:paediatrics"]
  - guid: "9013ede357e045de"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2024 NON ACCIDENTAL INJURIES"
    fields:
      Front: "Why must siblings be assessed when child abuse is identified?"
      Back: "20% of siblings will also be involved in abuse at some stage. All children in homes and places of safety must be included. They should be referred as soon as possible for assessment and intervention."
    tags: ["siblings", "assessment", "secondary-victims", "subject:paediatrics"]
  - guid: "ddb2d82db758456d"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2024 NON ACCIDENTAL INJURIES"
    fields:
      Front: "Which professional groups are at risk of not recognizing abuse in their own children and why?"
      Back: "High-risk professionals include: Nurses, Doctors, Social workers, Lawyers, Police officers, Soldiers. These professionals work long hours, spend long periods away from families, and do not easily recognize signs of abuse in their own children."
    tags: ["professional-awareness", "bias", "blind-spots", "subject:paediatrics"]
  - guid: "453a9687fc234a9f"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2024 NON ACCIDENTAL INJURIES"
    fields:
      Front: "What are the long-term complications of child sexual abuse?"
      Back: "Long-term complications include: Mood disorders, Personality disorders, Depression, Anxiety disorders. The prognosis in survivors with underlying mental illness and a history of childhood sexual assault is guarded."
    tags: ["sexual-abuse", "complications", "prognosis", "mental-health", "subject:paediatrics"]
  - guid: "e4ad2ae7f7204a1e"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2024 NON ACCIDENTAL INJURIES"
    fields:
      Front: "What are the major challenges in managing child sexual abuse cases?"
      Back: "Challenges include: Fragmented management and lack of private units managing sexual assault cases, overloaded public sector hospitals, lack of skilled healthcare workers and training, lack of support for families, high default rate, lack of places of safety for children, long waiting times between patient contact and court appearances, safety concerns for doctors/caregivers/children, burnout and lack of support for staff (feeling outnumbered and outgunned), lack of adherence to guidelines."
    tags: ["sexual-abuse", "management-challenges", "system-barriers", "subject:paediatrics"]
  - guid: "9ac213c4ef9746c0"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2024 NON ACCIDENTAL INJURIES"
    fields:
      Front: "What are the key conclusions about child abuse management?"
      Back: "Child abuse is very common. All healthcare workers must be adept and confident at recognizing and managing cases. Management must be holistic. The aim of effective management is to prevent secondary trauma to survivors and their families."
    tags: ["child-abuse", "management-principles", "conclusion", "subject:paediatrics"]