  - guid: "a1f3d8c2e7b5h9a4"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2025 PMTC"
    fields:
      Front: "What time period does EMTCT services cover?"
      Back: "From preconception to 18 months of age or 6 weeks post cessation of breast feeding if continued beyond 18 months"
    tags: ["hiv", "pmtct", "emtct", "subject:paediatrics"]
  - guid: "b7a4h2f6c1e9d3b8"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2025 PMTC"
    fields:
      Front: "When should EMTCT services be provided?"
      Back: |
        - Family planning visits
        - Antenatal Care visits
        - Delivery
        - Post-Natal Care visits
        - EPI visits
        - IMCI visits
    tags: ["hiv", "pmtct", "emtct", "subject:paediatrics"]
  - guid: "c5e1b3h8a6d2f9c4"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2025 PMTC"
    fields:
      Front: "How many times should HIV testing be done in the mother during antenatal care?"
      Back: "At first visit and each routine basic antenatal care plus visit (8 visits in all)"
    tags: ["hiv", "pmtct", "testing", "mother", "subject:paediatrics"]
  - guid: "d3f7a9c2h5e1b8d6"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2025 PMTC"
    fields:
      Front: "Since when is ART initiation guidance on adherence recommended?"
      Back: "Since 2019"
    tags: ["hiv", "pmtct", "art", "adherence", "subject:paediatrics"]
  - guid: "e8d4c6f1h3a2b9e7"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2025 PMTC"
    fields:
      Front: "When should maternal viral load testing be done?"
      Back: |
        - At delivery
        - 6 months postpartum
        - 6 monthly if breastfeeding
    tags: ["hiv", "pmtct", "viral-load", "mother", "subject:paediatrics"]
  - guid: "f2b9a5d7e1c4h8f3"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2025 PMTC"
    fields:
      Front: "What is the high risk viral load threshold in the mother?"
      Back: "VL > 50 Copies/ml"
    tags: ["hiv", "pmtct", "viral-load", "high-risk", "subject:paediatrics"]
  - guid: "g4h1f8a3d9c5e2b6"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2025 PMTC"
    fields:
      Front: "In infant HIV testing 2015 protocol, when should HIV PCR be done?"
      Back: |
        - At birth
        - 10 weeks
        - 14 weeks PCR for high risk infants
        - 6 weeks post cessation of breastfeeding
        - 18 months rapid with second rapid for confirmation
    tags: ["hiv", "pmtct", "testing", "infant", "2015-protocol", "subject:paediatrics"]
  - guid: "h6c3e5b2a8d1f9h4"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2025 PMTC"
    fields:
      Front: "In infant HIV testing 2019 protocol, what changed from 2015?"
      Back: |
        - HIV PCR at birth, 10 weeks
        - NO 14 WEEK TEST
        - 6 month PCR for all exposed infants
        - Appropriate test 6 weeks post cessation of breastfeeding
        - Universal HIV testing at 18 months if exposed uninfected
        - PCR used as confirmatory test up to 2 years of age
    tags: ["hiv", "pmtct", "testing", "infant", "2019-protocol", "subject:paediatrics"]
  - guid: "i9a7d2c4h1f3e8b5"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2025 PMTC"
    fields:
      Front: "In 2015 PMTCT protocol, what defined a high-risk infant at birth?"
      Back: |
        - Maternal VL > 1000 c/ml
        - Maternal ART < 4 weeks prior to delivery
    tags: ["hiv", "pmtct", "high-risk", "2015-protocol", "subject:paediatrics"]
  - guid: "j1f6e4a9b3d8c2h7"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2025 PMTC"
    fields:
      Front: "In 2019 PMTCT protocol, what defined a high-risk infant at birth?"
      Back: |
        - Mother VL > 1000 c/ml at delivery (or most recent viral load in last 12 weeks of ANC)
        - Mother with no VL in the last 12 weeks of ANC
    tags: ["hiv", "pmtct", "high-risk", "2019-protocol", "subject:paediatrics"]
  - guid: "k5h2a8d1f6c3e9b4"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2025 PMTC"
    fields:
      Front: "In 2022 PMTCT protocol, what defines a high-risk infant?"
      Back: |
        - Maternal VL < 50
        - No Known VL at birth
    tags: ["hiv", "pmtct", "high-risk", "2022-protocol", "subject:paediatrics"]
  - guid: "l3e9c5b2d8a1h4f6"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2025 PMTC"
    fields:
      Front: "In 2015 PMTCT protocol, what was the infant post-exposure prophylaxis regimen?"
      Back: "High risk infants: AZT for 6 weeks and NVP for 12 weeks"
    tags: ["hiv", "pmtct", "prophylaxis", "2015-protocol", "subject:paediatrics"]
  - guid: "m8d3f1h7c2a9e5b4"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2025 PMTC"
    fields:
      Front: "In 2019 PMTCT protocol, what was the infant post-exposure prophylaxis regimen?"
      Back: |
        - High risk: AZT for 6 weeks and NVP for a minimum of 12 weeks
        - Stop NVP if mother VL < 1000 c/ml or until 1 week after she stops breastfeeding
    tags: ["hiv", "pmtct", "prophylaxis", "2019-protocol", "subject:paediatrics"]
  - guid: "n4a6f9c1h3d8e2b5"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2025 PMTC"
    fields:
      Front: "What is the recommended breastfeeding context for PMTCT?"
      Back: "In context of ART recommended for 24 months or longer, in line with recommendation for general population"
    tags: ["hiv", "pmtct", "breastfeeding", "art", "subject:paediatrics"]
  - guid: "o7b2d5e8a1f4c9h3"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2025 PMTC"
    fields:
      Front: "For patients <2 years with positive PCR or positive rapid test, what is the confirmatory procedure?"
      Back: "CONFIRM with a HIV PCR test on a new sample. Do not wait for confirmatory result to initiate therapy"
    tags: ["hiv", "testing", "confirmation", "subject:paediatrics"]
  - guid: "p1c8h4a2f7d3e9b5"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2025 PMTC"
    fields:
      Front: "What is the screening and confirmation test algorithm for <18 months?"
      Back: |
        Screening test: PCR
        Confirmation test: PCR
    tags: ["hiv", "testing", "confirmation", "infant", "subject:paediatrics"]
  - guid: "q6f3d9e1b8a5c2h7"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2025 PMTC"
    fields:
      Front: "What is the screening and confirmation test algorithm for 18 months - 2 years?"
      Back: |
        Screening test: Rapid
        Confirmation test: PCR
    tags: ["hiv", "testing", "confirmation", "toddler", "subject:paediatrics"]
  - guid: "r5a7c2h9f4d1e8b3"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2025 PMTC"
    fields:
      Front: "What is the screening and confirmation test algorithm for >2 years?"
      Back: |
        Screening test: Rapid
        Confirmation test: Rapid
    tags: ["hiv", "testing", "confirmation", "child", "subject:paediatrics"]
  - guid: "s2e5b9d3a1f6c8h4"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2025 PMTC"
    fields:
      Front: "If mother's viral load elevates, what should be done for the exposed infant?"
      Back: "Restart high risk prophylaxis for infant with AZT 12-hourly (6 weeks) and NVP daily (minimum 12 weeks), adjusting dosages according to weight"
    tags: ["hiv", "pmtct", "prophylaxis", "viral-load", "subject:paediatrics"]
  - guid: "t9h1a4c6e2d7f3b8"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2025 PMTC"
    fields:
      Front: "When should the mother's viral load be checked during infant care?"
      Back: "At every visit check results of mother's most recent viral load"
    tags: ["hiv", "pmtct", "viral-load", "monitoring", "subject:paediatrics"]
  - guid: "u3d8f5c1h2a9b6e4"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2025 PMTC"
    fields:
      Front: "When should Nevirapine (NVP) first dose be given to the infant?"
      Back: "As soon as possible after birth"
    tags: ["hiv", "pmtct", "nvp", "nevirapine", "subject:paediatrics"]
  - guid: "v7c4a1f9e3d2h5b8"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2025 PMTC"
    fields:
      Front: "What should ideally be done before NVP administration in infants?"
      Back: "The birth PCR test should be done before administration of infant NVP, but any delay in testing should not delay the NVP administration"
    tags: ["hiv", "pmtct", "nvp", "testing", "subject:paediatrics"]
  - guid: "w1f7d3b8h4c2a6e9"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2025 PMTC"
    fields:
      Front: "What is the frequency of NVP dosing in infants on PMTCT?"
      Back: "Only one dose per 24-hour period; repeat dose once only if baby vomits"
    tags: ["hiv", "pmtct", "nvp", "dosing", "subject:paediatrics"]
  - guid: "x5a2e9h6d4f1c3b8"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2025 PMTC"
    fields:
      Front: "What should be done if infant HIV PCR is positive while on NVP?"
      Back: |
        - Stop NVP
        - Confirm with second HIV PCR test
        - Initiate ART while awaiting the second PCR test result
        - Continue breastfeeding
    tags: ["hiv", "pmtct", "nvp", "positive-pcr", "subject:paediatrics"]
