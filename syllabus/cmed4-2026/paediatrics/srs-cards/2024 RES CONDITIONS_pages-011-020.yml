    fields:
      Front: "What are the stages of tonsillar inflammation?"
      Back: |
        1) Parenchymatous stage - uniformly inflamed, hyperaemic tonsils; 2) Follicular stage - yellow exudate in tonsillar crypts; 3) Membranous stage - exudate coalesces to form membrane
    tags:
