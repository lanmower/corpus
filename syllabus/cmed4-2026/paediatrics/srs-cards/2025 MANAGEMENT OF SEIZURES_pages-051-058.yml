    deck: "Corpus::Paediatrics::2025 MANAGEMENT OF SEIZURES"
    fields:
      Front: "Define: Narrow-spectrum anti-seizure medications."
      Back: "Anti-seizure medications with more limited efficacy, typically effective for specific seizure types or syndromes."
    tags: ["subject:paediatrics", "seizures", "medications", "classification"]
  - guid: k5n1r4s3o2q6t8u9
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 MANAGEMENT OF SEIZURES"
    fields:
      Front: "List narrow-spectrum anti-seizure medications."
      Back: "Lacosamide, pregabalin, gabapentin, carbamazepine, oxcarbazepine, ezogabine, phenytoin, and vigabatrin."
    tags: ["subject:paediatrics", "seizures", "medications", "narrow-spectrum"]
