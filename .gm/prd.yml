- id: generate-concise-script
  subject: Create Node.js script to generate concise study guides
  status: completed
  description: Build a script (generate_concise_notes.js) that aggregates all audio transcripts and book sections for each subject into comprehensive markdown study guides
  effort: medium
  category: feature
  route_family: execution
  load: 0.75
  failure_modes: ["File read errors on malformed transcripts", "Missing subject directories", "Empty or sparse subjects"]
  route_fit: examined
  authorization: witnessed
  blocking: []
  blockedBy: []
  acceptance:
    - Script reads all audio-transcripts and book-texts for each subject
    - Generates markdown files in concise/ folder
    - Each guide has: title, content sections, key concepts framework, study tips
    - Handles subjects with 0-N content sources gracefully
  edge_cases:
    - Subjects with no transcripts or books
    - Very long content (truncate or summarize)
    - Special characters in filenames
    - Empty or whitespace-only files

