# Geriatric - Urinary Incontinence - CMED4IIM1 - 2026 (Pages 001-003)
# SRS Cards extracted from audio transcript

- id: urinary-incontinence-01
  front: "What is the prevalence of urinary incontinence in community-dwelling women above age 60?"
  back: "Urinary incontinence affects 30% of community-dwelling women above age 60. Of these, 5-10% have severe urinary incontinence."

- id: urinary-incontinence-02
  front: "What is the prevalence of urinary incontinence in community-dwelling men above age 60?"
  back: "Urinary incontinence affects 6% of community-dwelling men above age 60."

- id: urinary-incontinence-03
  front: "What is the prevalence of urinary incontinence in frail and cognitively impaired community-dwellers?"
  back: "Urinary incontinence affects 30-50% of frail and cognitively impaired community-dwellers."

- id: urinary-incontinence-04
  front: "What is the prevalence of urinary incontinence in individuals living in nursing homes?"
  back: "Urinary incontinence affects 50-70% of individuals in nursing homes, with many having severe incontinence."

- id: urinary-incontinence-05
  front: "What age-related change occurs in the detrusor muscle?"
  back: "As one ages, there is an increased number of involuntary detrusor contractions. The detrusor muscle becomes overactive with age."

- id: urinary-incontinence-06
  front: "What is post-void residual volume and how does it change with age?"
  back: "Post-void residual volume is the urine that remains in the bladder after urination. It increases with age, affecting up to 200mL in males."

- id: urinary-incontinence-07
  front: "What is the relationship between nocturnal ADH secretion and incontinence in the elderly?"
  back: "There is increased nocturnal fluid resorption as one ages due to low nocturnal antidiuretic hormone (ADH) secretion, contributing to nocturnal incontinence."

- id: urinary-incontinence-08
  front: "How does natriuretic peptide contribute to nocturnal incontinence in the elderly?"
  back: "Inappropriate nocturnal production of arterial natriuretic peptide in the elderly contributes to increased nocturnal fluid resorption and nocturnal incontinence."

- id: urinary-incontinence-09
  front: "How does prostate enlargement affect the risk of incontinence in aging men?"
  back: "There is increased prostate volume in men as they age, which can lead to urethral obstruction in approximately 50% of cases."

- id: urinary-incontinence-10
  front: "How does bladder capacity change with age?"
  back: "Bladder capacity decreases with age, reducing the amount of urine the bladder can hold."

- id: urinary-incontinence-11
  front: "What happens to detrusor contractility with age?"
  back: "Detrusor contractility decreases with age. The detrusor muscle cannot sustain adequate tension during urination, leading to incomplete bladder emptying and increased post-void residual volume."

- id: urinary-incontinence-12
  front: "What is the ability to postpone micturition and how does it change with age?"
  back: "The ability to postpone urination (to delay going to the bathroom) decreases with age. Younger individuals can hold urine longer, but this ability reduces in the elderly."

- id: urinary-incontinence-13
  front: "How does urethral closing ability change in aging women?"
  back: "There is decreased urethral closing ability in women as they age, especially in menopausal women, due to estrogen deficiency."

- id: urinary-incontinence-14
  front: "What are the six types of urinary incontinence?"
  back: "The six types are: (1) stress, (2) urge, (3) overflow, (4) reflex, (5) functional, and (6) mixed incontinence."

- id: urinary-incontinence-15
  front: "Define stress urinary incontinence and its mechanism."
  back: "Stress urinary incontinence occurs due to weakening of the pelvic floor muscles. When intra-abdominal pressure increases (coughing, laughing, sneezing), urine leaks."

- id: urinary-incontinence-16
  front: "Define urge incontinence and its mechanism."
  back: "Urge incontinence is characterized by an overwhelming urge to urinate frequently, driven by an overactive bladder (detrusor overactivity)."

- id: urinary-incontinence-17
  front: "Define overflow incontinence and its mechanism."
  back: "Overflow incontinence occurs when something blocks urinary flow. The bladder becomes distended and eventually stretches the urethra, causing urine to leak."

- id: urinary-incontinence-18
  front: "Define reflex incontinence and its mechanism."
  back: "Reflex incontinence occurs due to damage in the neural connections between the urinary system and the brain. The person loses the ability to sense the need to urinate, and urine leaks involuntarily."

- id: urinary-incontinence-19
  front: "Define functional incontinence and its mechanism."
  back: "Functional incontinence occurs when there is no underlying problem with the urogenital system itself, but something prevents the patient from reaching the bathroom in time, such as severe illness, fractures, or cognitive impairment."

- id: urinary-incontinence-20
  front: "Define mixed incontinence."
  back: "Mixed incontinence is usually a combination of stress and urge incontinence."

- id: urinary-incontinence-21
  front: "What is the DRIP mnemonic for reversible causes of acute urinary incontinence?"
  back: "DRIP stands for: D=Delirium, R=Restricted mobility, I=Infection/Inflammation, P=imperfection/Polyuria/Pills. These are reversible conditions causing acute incontinence."

- id: urinary-incontinence-22
  front: "What does the letter D stand for in the DRIP mnemonic?"
  back: "D = Delirium, a reversible cause of acute urinary incontinence."

- id: urinary-incontinence-23
  front: "What does the first R stand for in the DRIP mnemonic?"
  back: "R = Restricted mobility. Patients with pain, osteoarthritis, rheumatoid arthritis, fractures, or postoperative status cannot get to the toilet in time."

- id: urinary-incontinence-24
  front: "What does I stand for in the DRIP mnemonic and what are examples?"
  back: "I = Infection and Inflammation. Examples include urinary tract infections and atrophic urethritis or vaginitis in postmenopausal women."

- id: urinary-incontinence-25
  front: "What does the second R stand for in the DRIP mnemonic?"
  back: "R = Retention, which can result from anticholinergic drugs, fecal impaction, or bladder outflow obstruction."

- id: urinary-incontinence-26
  front: "What does P stand for in the DRIP mnemonic (first meaning)?"
  back: "P = imperfection (fecal impaction), a reversible cause of acute urinary incontinence."

- id: urinary-incontinence-27
  front: "What does P stand for in the DRIP mnemonic (second meaning)?"
  back: "P = Polyuria. Causes include glycosuria (glucose in urine), hypercalcemia, and excessive intake of caffeine or alcohol."

- id: urinary-incontinence-28
  front: "What does P stand for in the DRIP mnemonic (third meaning)?"
  back: "P = Pills (medications) that cause incontinence, including diuretics, anticholinergic drugs, alpha blockers, alcohol, and calcium channel blockers."

- id: urinary-incontinence-29
  front: "What is nocturnal polyuria and what causes it?"
  back: "Nocturnal polyuria is excessive urination at night. It can be caused by conditions like cardiac failure."

- id: urinary-incontinence-30
  front: "What are the chronic risk factors for urinary incontinence related to childbirth?"
  back: "Vaginal childbirth, especially with neuromuscular damage during delivery, is a risk factor for chronic urinary incontinence."

- id: urinary-incontinence-31
  front: "What is pelvic floor prolapse and its relationship to incontinence?"
  back: "Pelvic floor prolapse is a risk factor for chronic urinary incontinence in women."

- id: urinary-incontinence-32
  front: "How does prostate surgery increase the risk of incontinence?"
  back: "Post-transurethral resection of the prostate (TURP), a surgical procedure for prostate cancer, is a risk factor for chronic urinary incontinence."

- id: urinary-incontinence-33
  front: "How does obesity increase the risk of urinary incontinence?"
  back: "Obesity increases the risk of incontinence due to increased intra-abdominal pressure, which puts stress on the pelvic floor and bladder."

- id: urinary-incontinence-34
  front: "How does smoking increase the risk of urinary incontinence?"
  back: "Smoking is a chronic risk factor for developing urinary incontinence."

- id: urinary-incontinence-35
  front: "How does cognitive decline increase the risk of urinary incontinence?"
  back: "Cognitive decline is a chronic risk factor for urinary incontinence, as patients may not recognize the need to urinate or be able to reach the bathroom."

- id: urinary-incontinence-36
  front: "Is diabetes mellitus a risk factor for urinary incontinence?"
  back: "Yes, diabetes mellitus is an independent risk factor for urinary incontinence."

- id: urinary-incontinence-37
  front: "Is cerebral vascular accident a risk factor for urinary incontinence?"
  back: "Yes, patients who have had cerebral vascular accidents are at increased risk of urinary incontinence."

- id: urinary-incontinence-38
  front: "What are the non-pharmacological management strategies for urinary incontinence?"
  back: "Non-pharmacological management includes: (1) prevention (avoiding caffeine and alcohol), (2) Kegel exercises (pelvic floor exercises), (3) prompted voiding or timed toileting, and (4) bladder training exercises."

- id: urinary-incontinence-39
  front: "What is prompted timed voiding?"
  back: "Prompted timed voiding (also called scheduled voiding) involves having the patient go to the bathroom at specific scheduled times without waiting for the urge to urinate."

- id: urinary-incontinence-40
  front: "What pharmacological treatment is used for stress/urge incontinence in women?"
  back: "Anticholinergic medications are used to treat stress and urge incontinence in women, though there are concerns about their adverse effects as discussed in the iatrogenesis lecture."

- id: urinary-incontinence-41
  front: "What pharmacological treatment is used for overactive bladder/urge incontinence in men?"
  back: "Alpha blockers are used to treat overactive bladder or urge incontinence in men."

- id: urinary-incontinence-42
  front: "What are the indications for chronic indwelling urinary catheterization?"
  back: "Indications include: (1) urinary retention causing persistent overflow incontinence, UTIs, or renal failure that cannot be corrected by treatment or surgery, (2) inability to perform intermittent catheterization, (3) contamination concerns (e.g., pressure ulcers or perineal wounds), and (4) terminal illness or patient/caregiver preference."

- id: urinary-incontinence-43
  front: "When is catheterization indicated for urinary retention?"
  back: "Catheterization is indicated when urinary retention cannot be corrected by other treatments or surgery, and when the patient cannot perform intermittent self-catheterization."

- id: urinary-incontinence-44
  front: "What complications of urinary retention warrant catheterization?"
  back: "Chronic catheterization is considered when urinary retention causes recurrent urinary tract infections, renal failure, or persistent overflow incontinence."

- id: urinary-incontinence-45
  front: "When is catheterization indicated due to contamination concerns?"
  back: "Catheterization is indicated in patients with pressure ulcers or wounds in the perineal area that need to be kept clean and dry to heal."

