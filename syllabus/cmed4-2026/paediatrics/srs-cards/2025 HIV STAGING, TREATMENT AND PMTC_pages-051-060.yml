    fields:
      Front: "What is lamivudine (3TC)?"
      Back: |
        Lamivudine (3TC) is a well-tolerated NRTI drug available as an easy-to-take syrup and scored tablets. It is a safe drug.
    tags: ["lamivudine", "nrti-drug", "pediatric-formulation", "subject:paediatrics"]
  - guid: "b2c3d4e5f6g7h8i3"
    noteType: Basic
