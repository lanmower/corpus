- id: aki_1
  front: |
    What is the definition of Acute Kidney Injury (AKI)?
  back: |
    A syndrome characterized by rapid fall of GFR (generally within hours to days), retention of nitrogenous and non-nitrogenous waste products, and disordered electrolytes, acid-base, and fluid homeostasis.
  topics:
    - definition
    - pathophysiology
    - AKI

- id: aki_2
  front: |
    What is the epidemiology of AKI?
  back: |
    AKI is responsible for 5-10% of general hospital admissions, 20-25% of sepsis patients develop AKI, 50% with septic shock develop AKI, and 50% of ICU admissions develop AKI. Mortality ranges from 20-60% in ICU.
  topics:
    - epidemiology
    - statistics
    - AKI

- id: aki_3
  front: |
    What are the three stages of AKI classification?
  back: |
    Stage 1: Serum creatinine increases >26 μmol/L within 48h or 1.5-1.9x baseline, or urine output <0.5 mL/kg/hr for >6h. Stage 2: Serum creatinine 2-3x baseline or urine output <0.5 mL/kg/hr for >12h. Stage 3: Serum creatinine >3x baseline or >354 μmol/L, or urine output <0.3 mL/kg/hr for >24h.
  topics:
    - classification
    - staging
    - creatinine
    - urine output

- id: aki_4
  front: |
    What are the three main classifications of AKI?
  back: |
    Pre-renal AKI (reduced kidney blood flow), Intrinsic AKI (kidney parenchymal damage to vasculature, glomeruli, or tubules), and Post-renal AKI (obstruction of urinary flow).
  topics:
    - classification
    - pathophysiology

- id: aki_5
  front: |
    What causes Pre-renal AKI?
  back: |
    Acute hemorrhage, volume depletion, low cardiac output, sepsis, chronic congestive cardiac failure, cirrhosis, and vasomotor drugs (NSAIDs, ACE inhibitors, ARBs).
  topics:
    - pre-renal
    - causes
    - etiology

- id: aki_6
  front: |
    What causes Intrinsic AKI?
  back: |
    Acute Tubular Necrosis (ATN) from ischemic or nephrotoxic injury (hemoglobin, myoglobin, myeloma casts, nephrotoxic drugs, contrast), tubulointerstitial nephritis, acute glomerulonephritis, and vascular causes (vasculitis, thrombosis, severe hypertension).
  topics:
    - intrinsic
    - causes
    - ATN

- id: aki_7
  front: |
    What causes Post-renal AKI?
  back: |
    Obstruction of urinary flow at any level - bladder outflow obstruction or ureteral obstruction. If untreated, leads to permanent structural and functional kidney damage.
  topics:
    - post-renal
    - obstruction
    - causes

- id: aki_8
  front: |
    What are the risk factors for developing AKI?
  back: |
    Increasing age, pre-existing chronic kidney disease, recent surgery, diabetes, volume depletion (vomiting, diarrhea, burns), RV dysfunction, cirrhosis, drugs causing vasomotor changes (NSAIDs, ACE inhibitors, ARBs), and systemic conditions (multiple myeloma).
  topics:
    - risk factors
    - prevention

- id: aki_9
  front: |
    What nephrotoxic agents cause AKI?
  back: |
    NSAIDs, diuretics, ACE inhibitors, ARBs (especially in volume-depleted patients), aminoglycosides, vancomycin, amphotericin B, chemotherapy agents (cisplatin), and IV contrast.
  topics:
    - nephrotoxins
    - drugs
    - causes

- id: aki_10
  front: |
    How can perioperative AKI risk be reduced?
  back: |
    Adequate hydration, remove nephrotoxic drugs, review volume status and kidney function, optimize volume status preoperatively, monitor daily weights and intake/output, control glucose in diabetics, optimize nutrition, screen for obstruction, avoid surgery immediately after contrast, and reduce antihypertensives in early postoperative period.
  topics:
    - prevention
    - perioperative
    - management

- id: aki_11
  front: |
    What are the presenting features of acute kidney injury?
  back: |
    Rise in serum urea and creatinine, reduced urine output (earliest change, precedes urea/creatinine rise), volume depletion or overload, pulmonary edema, hyperkalemia (risk for arrhythmia/cardiac arrest), and nonspecific illness.
  topics:
    - clinical features
    - presentation

- id: aki_12
  front: |
    What clinical findings help diagnose AKI?
  back: |
    Falling urine output and urea, persistent nausea/vomiting, dizziness, impaired consciousness, signs of systemic sepsis, evidence of severe hypertension or hypotension, pulmonary edema (crackles), peripheral edema, and metabolic acidosis.
  topics:
    - diagnosis
    - clinical signs

- id: aki_13
  front: |
    How do you distinguish AKI from Chronic Kidney Disease?
  back: |
    Review previous kidney function tests. On ultrasound, chronic kidney disease shows shrunken kidneys (<9-10 cm), while AKI shows normal-sized kidneys. Exception: diabetics have normal kidney size even with reduced function. Laboratory findings (anemia, calcium-phosphate abnormalities) are often unhelpful.
  topics:
    - diagnosis
    - differentiation

- id: aki_14
  front: |
    What are the priorities in managing AKI?
  back: |
    Make the patient safe (airway, breathing, circulation), manage hyperkalemia urgently, assess volume status, perform urine dipstick analysis, look for reversible causes, assess hemodynamic status, check for post-renal obstruction with ultrasound, and review drug charts to stop nephrotoxic agents.
  topics:
    - management
    - priorities

- id: aki_15
  front: |
    What clinical clues suggest Pre-renal AKI?
  back: |
    History of reduced intravascular volume (dehydration), heart failure, or sepsis. Clinical signs: abnormal blood pressure, elevated heart rate, poor peripheral perfusion, abnormal jugular venous pressure, peripheral and pulmonary edema, and reduced urine output.
  topics:
    - pre-renal
    - clinical clues
    - diagnosis

- id: aki_16
  front: |
    What clinical clues suggest Intrinsic kidney AKI?
  back: |
    History of cardiovascular disease, hypertension, diabetes, hypercholesterolemia, peripheral vascular disease, stroke, ischemic heart disease, recent invasive/endovascular procedures, stem cell therapy, or surgery. Signs: signs of atherosclerosis, missing pulses, large heart, glaucoma, pediatric aneurysms, or ischemic toes.
  topics:
    - intrinsic
    - clinical clues
    - diagnosis

- id: aki_17
  front: |
    What investigations help identify intrinsic glomerular AKI?
  back: |
    History of throat/skin infections, fever, night sweats, systemic features. Examination: rash, elevated blood pressure, evidence of systemic involvement (uveitis, ulcers, connective tissue disease). Investigations: blood or protein in urine.
  topics:
    - glomerular
    - investigations
    - diagnosis

- id: aki_18
  front: |
    What investigations help identify tubulointerstitial AKI?
  back: |
    History of drug use or systemic infections/diseases (sarcoid). Examination: secondary features (fever, rash, bruising). Typical clue: eosinophilia on urine microscopy or peripheral smear or in blood.
  topics:
    - tubulointerstitial
    - investigations
    - diagnosis

- id: aki_19
  front: |
    What clinical clues suggest Post-renal AKI?
  back: |
    Lower urinary tract symptoms, evidence of prostatic disease in elderly males, presence of cancers, and hematuria. Essential investigation: early ultrasound to exclude obstruction.
  topics:
    - post-renal
    - clinical clues
    - diagnosis

- id: aki_20
  front: |
    What findings on urine analysis help in AKI diagnosis?
  back: |
    Presence of blood, protein, or red blood cells suggests glomerular or intrinsic kidney disease. Positive urine culture indicates UTI which can cause severe dysfunction. Urine electrolytes and specific gravity are generally not helpful in AKI assessment.
  topics:
    - urine analysis
    - investigations

- id: aki_21
  front: |
    What blood test findings are important in AKI?
  back: |
    Reduced hemoglobin (hemolysis or bleeding), elevated white cell count (infection), eosinophilia (systemic arthritis), reduced white cell count (sepsis), reduced platelets (DIC or thrombotic microangiopathy). Peripheral smear shows fragmented RBCs in microangiopathy.
  topics:
    - blood tests
    - hematology

- id: aki_22
  front: |
    What biochemical findings are important in AKI?
  back: |
    Elevated potassium (hyperkalemia), reduced sodium (volume overload or excessive diuretics), reduced bicarbonate (metabolic acidosis). Urine and electrolytes are key for assessing AKI severity.
  topics:
    - biochemistry
    - electrolytes

- id: aki_23
  front: |
    What imaging findings help in AKI diagnosis?
  back: |
    Chest X-ray: excludes pulmonary edema, respiratory infections, assesses cardiac size, presence of lymph nodes, or cystic lesions. Kidney ultrasound: excludes obstruction (urgent if obstruction suspected). Kidney size <9 cm suggests chronic kidney disease; normal size suggests acute kidney injury.
  topics:
    - imaging
    - investigations

- id: aki_24
  front: |
    What is the role of volume replacement in Pre-renal AKI?
  back: |
    Prompt volume replacement early in pre-renal AKI improves outcomes. Must ensure patient not overloaded to avoid pulmonary edema. Fluids: crystalloid saline or crystalloids, with sodium bicarbonate. Assess adequacy by tachycardia, central venous pressure, and urine output.
  topics:
    - management
    - fluid therapy

- id: aki_25
  front: |
    What are the ECG changes in hyperkalemia?
  back: |
    Progressive changes: peaked T waves, flattened P waves, prolonged PR interval, widened QRS complex, and sine wave (terminal event leading to ventricular fibrillation or asystolic cardiac arrest). Potassium >6 mmol/L requires close cardiac monitoring and ECG.
  topics:
    - hyperkalemia
    - ECG
    - management

- id: aki_26
  front: |
    How is hyperkalemia managed?
  back: |
    Calcium carbonate 10% solution over 2-5 minutes, insulin-glucose (monitor sugars after), sodium bicarbonate (15-60 minutes) if volume-depleted. If unresponsive to these three measures, consider dialysis, especially if kidney function not improving and potassium continues to rise.
  topics:
    - hyperkalemia
    - management
    - treatment

- id: aki_27
  front: |
    How is pulmonary edema managed in AKI?
  back: |
    Stop IV fluids, give oxygen, use diuretics, give opiates or morphine for mild relief, prop patient up. If unresponsive to diuretics, consider dialysis and ventilation.
  topics:
    - pulmonary edema
    - management

- id: aki_28
  front: |
    How is hyperphosphatemia managed in AKI?
  back: |
    Dietary phosphate restriction, oral phosphate binders, and dialysis if severe.
  topics:
    - hyperphosphatemia
    - management

- id: aki_29
  front: |
    How is hypocalcemia managed in AKI?
  back: |
    Oral replacement of vitamin D and calcium supplementation.
  topics:
    - hypocalcemia
    - management

- id: aki_30
  front: |
    What is the relationship between hypomagnesemia and hypocalcemia?
  back: |
    Hypomagnesemia is associated with both hypercalcemia and hypocalcemia. Unless magnesium is corrected, calcium will not correct. Therefore, magnesium correction is necessary for successful calcium management.
  topics:
    - electrolytes
    - magnesium
    - management

- id: aki_31
  front: |
    How is metabolic acidosis managed in severe AKI?
  back: |
    High-dose metabolic acidosis in AKI; if severe, consider dialysis. Consider other causes: lactic acidosis, salicylate poisoning, methanol, ethylene glycol poisoning. Dialysis is indicated if pH drops to 7.1 or less.
  topics:
    - metabolic acidosis
    - management

- id: aki_32
  front: |
    What are the general management strategies for AKI?
  back: |
    Treat anemia (consider bleeding or hemolysis as cause), treat infection, maintain adequate nutrition (patients are hypercatabolic), consider specific energy and protein requirements.
  topics:
    - general management
    - supportive care

- id: aki_33
  front: |
    What are the indications for kidney replacement therapy (dialysis) in AKI?
  back: |
    Persistent hyperkalemia, pulmonary edema refractory to diuretics, intractable acidosis, oliguria with high urea, uremic pericarditis, or uremic encephalopathy.
  topics:
    - dialysis
    - indications
    - kidney replacement

- id: aki_34
  front: |
    What are the types of kidney replacement therapy available?
  back: |
    Hemodialysis and peritoneal dialysis are the main forms of acute kidney replacement therapy.
  topics:
    - dialysis
    - kidney replacement
    - types

