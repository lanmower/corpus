notes:
  - guid: 02e1cd29690669af
    noteType: Basic
    deck: "Corpus::Diabetes::Treatment Of Diabetes Mellitus"
    fields:
      Front: "What is the primary diagnostic step when encountering a patient with probable diabetes mellitus?"
      Back: "Confirm the diagnosis using glucose tolerance tests, hemoglobin A1c, and random glucose parameters. Then classify using WHO Classification Scheme."
    tags: ["diabetes", "treatment", "management", "Type1", "Type2", "pharmacology", "insulin", "difficulty:medium", "source:Treatment_Of_Diabetes_Mellitus_-_CMED4IIM1_-_2026_pages-001-010", "subject:diabetes"]
  - guid: e75b1e7435e114d5
    noteType: Basic
    deck: "Corpus::Diabetes::Treatment Of Diabetes Mellitus"
    fields:
      Front: "What are the four commonly measured beta-cell autoantibodies in Type 1 diabetes?"
      Back: "1) Anti-insulin antibody, 2) Anti-glutamic acid decarboxylase (GAD), 3) Anti-islet antigen 2 (IA-2), 4) Anti-zinc transporter 8 (ZnT8)"
    tags: ["diabetes", "treatment", "management", "Type1", "Type2", "pharmacology", "insulin", "difficulty:medium", "source:Treatment_Of_Diabetes_Mellitus_-_CMED4IIM1_-_2026_pages-001-010", "subject:diabetes"]
  - guid: b292a54277fb9cbe
    noteType: Basic
    deck: "Corpus::Diabetes::Treatment Of Diabetes Mellitus"
    fields:
      Front: "What is the normal hemoglobin A1c range in people without diabetes?"
      Back: "Between 5-6% (or 20-42 millimoles per mole with newer absolute concentration units)"
    tags: ["diabetes", "treatment", "management", "Type1", "Type2", "pharmacology", "insulin", "difficulty:medium", "source:Treatment_Of_Diabetes_Mellitus_-_CMED4IIM1_-_2026_pages-001-010", "subject:diabetes"]
  - guid: 4ef22be20a68bb56
    noteType: Basic
    deck: "Corpus::Diabetes::Treatment Of Diabetes Mellitus"
    fields:
      Front: "What is the standard hemoglobin A1c treatment target for most people with diabetes?"
      Back: "Less than or equal to 7% (or 53 millimoles per mole). This is based on the exponential relationship between HbA1c and risk of complications, with inflection point around 7%."
    tags: ["diabetes", "treatment", "management", "Type1", "Type2", "pharmacology", "insulin", "difficulty:medium", "source:Treatment_Of_Diabetes_Mellitus_-_CMED4IIM1_-_2026_pages-001-010", "subject:diabetes"]
  - guid: 9c622f1cd535c5cc
    noteType: Basic
    deck: "Corpus::Diabetes::Treatment Of Diabetes Mellitus"
    fields:
      Front: "What does hemoglobin A1c reflect and over what time period?"
      Back: "It reflects average blood glucose over 4-6 weeks prior to testing. It is the global standard for monitoring glycemic control."
    tags: ["diabetes", "treatment", "management", "Type1", "Type2", "pharmacology", "insulin", "difficulty:medium", "source:Treatment_Of_Diabetes_Mellitus_-_CMED4IIM1_-_2026_pages-001-010", "subject:diabetes"]
  - guid: bc2f5b2bd01a15d7
    noteType: Basic
    deck: "Corpus::Diabetes::Treatment Of Diabetes Mellitus"
    fields:
      Front: "What is the 'legacy effect' in diabetes control?"
      Back: "Optimal glucose control from around time of diagnosis yields better long-term outcomes for microvascular and macrovascular complications than poor early control with better control later. Poor control early confers permanent risk."
    tags: ["diabetes", "treatment", "management", "Type1", "Type2", "pharmacology", "insulin", "difficulty:medium", "source:Treatment_Of_Diabetes_Mellitus_-_CMED4IIM1_-_2026_pages-001-010", "subject:diabetes"]
  - guid: 61e269bb4df5e108
    noteType: Basic
    deck: "Corpus::Diabetes::Treatment Of Diabetes Mellitus"
    fields:
      Front: "How much physical exercise is recommended for diabetes management?"
      Back: "At least 150 minutes per week with heart rate between 50-70% of maximum heart rate, plus resistance training several times per week."
    tags: ["diabetes", "treatment", "management", "Type1", "Type2", "pharmacology", "insulin", "difficulty:medium", "source:Treatment_Of_Diabetes_Mellitus_-_CMED4IIM1_-_2026_pages-001-010", "subject:diabetes"]
  - guid: e8983603a9677947
    noteType: Basic
    deck: "Corpus::Diabetes::Treatment Of Diabetes Mellitus"
    fields:
      Front: "What is the primary mechanism of action of metformin?"
      Back: "Reduces hepatic glucose output by inhibiting gluconeogenesis. Secondary effect: improves insulin sensitivity in muscle and fat peripherally. Does not stimulate insulin secretion, so hypoglycemia does not occur with monotherapy."
    tags: ["diabetes", "treatment", "management", "Type1", "Type2", "pharmacology", "insulin", "difficulty:medium", "source:Treatment_Of_Diabetes_Mellitus_-_CMED4IIM1_-_2026_pages-001-010", "subject:diabetes"]
  - guid: bc8b3cdd9ba38035
    noteType: Basic
    deck: "Corpus::Diabetes::Treatment Of Diabetes Mellitus"
    fields:
      Front: "What is the typical hemoglobin A1c reduction with metformin monotherapy?"
      Back: "Around 1%. Common side effects are gastrointestinal (usually mild and improve with use). Lactic acidosis is rare but serious with ~80% case fatality. Avoid in abnormal kidney function and elderly."
    tags: ["diabetes", "treatment", "management", "Type1", "Type2", "pharmacology", "insulin", "difficulty:medium", "source:Treatment_Of_Diabetes_Mellitus_-_CMED4IIM1_-_2026_pages-001-010", "subject:diabetes"]
  - guid: f05babcb84c53bad
    noteType: Basic
    deck: "Corpus::Diabetes::Treatment Of Diabetes Mellitus"
    fields:
      Front: "What are the renal function-based dose adjustments for metformin?"
      Back: "If eGFR 30-45 mL/min: max dose 1000mg/day. If eGFR <30 mL/min: stop completely. Drug is excreted by kidneys, not metabolized."
    tags: ["diabetes", "treatment", "management", "Type1", "Type2", "pharmacology", "insulin", "difficulty:medium", "source:Treatment_Of_Diabetes_Mellitus_-_CMED4IIM1_-_2026_pages-001-010", "subject:diabetes"]
  - guid: 8dce8d22b1200645
    noteType: Basic
    deck: "Corpus::Diabetes::Treatment Of Diabetes Mellitus"
    fields:
      Front: "How do sulfonylureas work in Type 2 diabetes treatment?"
      Back: "They bind to a receptor on beta cells, close potassium channels, open voltage-gated calcium channels, and trigger extrusion of preformed insulin. Hypoglycemia is a potential side effect."
    tags: ["diabetes", "treatment", "management", "Type1", "Type2", "pharmacology", "insulin", "difficulty:medium", "source:Treatment_Of_Diabetes_Mellitus_-_CMED4IIM1_-_2026_pages-001-010", "subject:diabetes"]
  - guid: 3638ec9ef40ed9ad
    noteType: Basic
    deck: "Corpus::Diabetes::Treatment Of Diabetes Mellitus"
    fields:
      Front: "What hemoglobin A1c reduction is achieved with sulfonylurea therapy?"
      Back: "1-1.5% reduction. Risk of hypoglycemia highest with longer-acting agents (like glibenclamide) and in elderly or those with abnormal renal function."
    tags: ["diabetes", "treatment", "management", "Type1", "Type2", "pharmacology", "insulin", "difficulty:medium", "source:Treatment_Of_Diabetes_Mellitus_-_CMED4IIM1_-_2026_pages-001-010", "subject:diabetes"]
  - guid: 05b1c7fc525b9e2c
    noteType: Basic
    deck: "Corpus::Diabetes::Treatment Of Diabetes Mellitus"
    fields:
      Front: "What is pioglitazone's mechanism of action?"
      Back: "It is an agonist of peroxisome proliferator-activated receptor gamma (PPAR-γ). When bound, it regulates genes involved in glucose metabolism, improving insulin sensitivity. Does not stimulate insulin secretion, so hypoglycemia does not occur."
    tags: ["diabetes", "treatment", "management", "Type1", "Type2", "pharmacology", "insulin", "difficulty:medium", "source:Treatment_Of_Diabetes_Mellitus_-_CMED4IIM1_-_2026_pages-001-010", "subject:diabetes"]
  - guid: 5b0d72e74e67eb3a
    noteType: Basic
    deck: "Corpus::Diabetes::Treatment Of Diabetes Mellitus"
    fields:
      Front: "What are the contraindications to pioglitazone use?"
      Back: "Should not be used in: heart failure (causes fluid retention), bladder lesions (increased bladder cancer risk), osteoporosis, liver disease, or patients taking high-dose insulin."
    tags: ["diabetes", "treatment", "management", "Type1", "Type2", "pharmacology", "insulin", "difficulty:medium", "source:Treatment_Of_Diabetes_Mellitus_-_CMED4IIM1_-_2026_pages-001-010", "subject:diabetes"]
  - guid: a6de19f620f82b0e
    noteType: Basic
    deck: "Corpus::Diabetes::Treatment Of Diabetes Mellitus"
    fields:
      Front: "How do SGLT2 inhibitors work?"
      Back: "They inhibit glucose reabsorption in renal tubules by binding to SGLT2 channels in the proximal tubule. This leads to glycosuria and osmotic diuresis. Do not stimulate insulin secretion."
    tags: ["diabetes", "treatment", "management", "Type1", "Type2", "pharmacology", "insulin", "difficulty:medium", "source:Treatment_Of_Diabetes_Mellitus_-_CMED4IIM1_-_2026_pages-001-010", "subject:diabetes"]
  - guid: 893f8f2c16851060
    noteType: Basic
    deck: "Corpus::Diabetes::Treatment Of Diabetes Mellitus"
    fields:
      Front: "What are the major benefits of SGLT2 inhibitors beyond glucose control?"
      Back: "Reduced macrovascular disease, reduced mortality (especially empagliflozin), reduced heart failure risk, reduced renal disease risk, and some weight loss. Useful in high-risk macrovascular disease, heart failure, or renal disease patients."
    tags: ["diabetes", "treatment", "management", "Type1", "Type2", "pharmacology", "insulin", "difficulty:medium", "source:Treatment_Of_Diabetes_Mellitus_-_CMED4IIM1_-_2026_pages-001-010", "subject:diabetes"]
  - guid: 9f3edb53e0f0f65f
    noteType: Basic
    deck: "Corpus::Diabetes::Treatment Of Diabetes Mellitus"
    fields:
      Front: "What are the major adverse effects of SGLT2 inhibitors?"
      Back: "Euglycemic ketoacidosis risk, increased mycotic genital infections due to high glycosuria, and rare acute kidney injury."
    tags: ["diabetes", "treatment", "management", "Type1", "Type2", "pharmacology", "insulin", "difficulty:medium", "source:Treatment_Of_Diabetes_Mellitus_-_CMED4IIM1_-_2026_pages-001-010", "subject:diabetes"]
  - guid: 36c84195dbc748ee
    noteType: Basic
    deck: "Corpus::Diabetes::Treatment Of Diabetes Mellitus"
    fields:
      Front: "What is the incretin effect and why is it reduced in Type 2 diabetes?"
      Back: "The incretin effect is the greater insulin response to oral vs. intravenous glucose loading. It is mediated by gut-derived peptides released by food ingestion. The effect is normally inactivated by DPP-4 enzyme. In Type 2 diabetes, this effect is reduced."
    tags: ["diabetes", "treatment", "management", "Type1", "Type2", "pharmacology", "insulin", "difficulty:medium", "source:Treatment_Of_Diabetes_Mellitus_-_CMED4IIM1_-_2026_pages-001-010", "subject:diabetes"]
  - guid: fe2fa62531d16503
    noteType: Basic
    deck: "Corpus::Diabetes::Treatment Of Diabetes Mellitus"
    fields:
      Front: "What are the two classes of incretin-based therapies?"
      Back: "1) GLP-1 receptor agonists (injectables): analogs resistant to DPP-4 breakdown (e.g., liraglutide, semaglutide, dulaglutide). 2) DPP-4 inhibitors (oral): inhibit the enzyme that degrades endogenous GLP-1 (e.g., vildagliptin, sitagliptin)."
    tags: ["diabetes", "treatment", "management", "Type1", "Type2", "pharmacology", "insulin", "difficulty:medium", "source:Treatment_Of_Diabetes_Mellitus_-_CMED4IIM1_-_2026_pages-001-010", "subject:diabetes"]
  - guid: f0cf8b39ef7ff167
    noteType: Basic
    deck: "Corpus::Diabetes::Treatment Of Diabetes Mellitus"
    fields:
      Front: "What is the efficacy of DPP-4 inhibitors?"
      Back: "Fairly weak with hemoglobin A1c reduction usually under 1%. Have neutral effect on weight and cardiovascular disease risk (except saxagliptin which increases heart failure risk). No risk of hypoglycemia. Well tolerated, especially in older individuals."
    tags: ["diabetes", "treatment", "management", "Type1", "Type2", "pharmacology", "insulin", "difficulty:medium", "source:Treatment_Of_Diabetes_Mellitus_-_CMED4IIM1_-_2026_pages-001-010", "subject:diabetes"]
  - guid: 0a57cc676534bd2e
    noteType: Basic
    deck: "Corpus::Diabetes::Treatment Of Diabetes Mellitus"
    fields:
      Front: "What are the benefits of GLP-1 receptor agonists?"
      Back: "Associated with significant weight loss (even in non-diabetics), reduced cardiovascular risk, reduced mortality, reduced renal disease, and reduced stroke risk (semaglutide). Weight loss benefit more significant than DPP-4 inhibitors."
    tags: ["diabetes", "treatment", "management", "Type1", "Type2", "pharmacology", "insulin", "difficulty:medium", "source:Treatment_Of_Diabetes_Mellitus_-_CMED4IIM1_-_2026_pages-001-010", "subject:diabetes"]
  - guid: 79e289960793c393
    noteType: Basic
    deck: "Corpus::Diabetes::Treatment Of Diabetes Mellitus"
    fields:
      Front: "What are contraindications to GLP-1 agonist use?"
      Back: "Should not be used in: pregnancy, Type 1 diabetes, medullary carcinoma of thyroid, patients with pancreatitis history or risk, and pancreatic carcinoma."
    tags: ["diabetes", "treatment", "management", "Type1", "Type2", "pharmacology", "insulin", "difficulty:medium", "source:Treatment_Of_Diabetes_Mellitus_-_CMED4IIM1_-_2026_pages-001-010", "subject:diabetes"]
  - guid: c5e50f6b31d79456
    noteType: Basic
    deck: "Corpus::Diabetes::Treatment Of Diabetes Mellitus"
    fields:
      Front: "What are the main side effects of GLP-1 agonists and how are they managed?"
      Back: "Usually gastrointestinal (nausea, vomiting). Managed by starting with low doses and slow dose increments to mitigate adverse effects."
    tags: ["diabetes", "treatment", "management", "Type1", "Type2", "pharmacology", "insulin", "difficulty:medium", "source:Treatment_Of_Diabetes_Mellitus_-_CMED4IIM1_-_2026_pages-001-010", "subject:diabetes"]
  - guid: 320f36b305f7e346
    noteType: Basic
    deck: "Corpus::Diabetes::Treatment Of Diabetes Mellitus"
    fields:
      Front: "What are the two phases of insulin secretion in response to blood glucose elevation?"
      Back: "First phase: rapid release of preformed insulin. Second phase: more delayed and prolonged release with continuous glucose exposure."
    tags: ["diabetes", "treatment", "management", "Type1", "Type2", "pharmacology", "insulin", "difficulty:medium", "source:Treatment_Of_Diabetes_Mellitus_-_CMED4IIM1_-_2026_pages-001-010", "subject:diabetes"]
  - guid: a7dee54dc19eea2d
    noteType: Basic
    deck: "Corpus::Diabetes::Treatment Of Diabetes Mellitus"
    fields:
      Front: "What are the three rapid-acting insulin analogs?"
      Back: "1) Humalog (insulin lispro), 2) Novolog (insulin aspart), 3) Apidra (insulin glulisine)"
    tags: ["diabetes", "treatment", "management", "Type1", "Type2", "pharmacology", "insulin", "difficulty:medium", "source:Treatment_Of_Diabetes_Mellitus_-_CMED4IIM1_-_2026_pages-001-010", "subject:diabetes"]
  - guid: c38c63362b6ebef1
    noteType: Basic
    deck: "Corpus::Diabetes::Treatment Of Diabetes Mellitus"
    fields:
      Front: "What is the difference between intermediate and long-acting insulin analogs?"
      Back: "Intermediate-acting: Protophane/NPH (insulin isophane). Long-acting: Lantus (insulin glargine), Levemir (insulin detemir), Tresiba (insulin degludec)."
    tags: ["diabetes", "treatment", "management", "Type1", "Type2", "pharmacology", "insulin", "difficulty:medium", "source:Treatment_Of_Diabetes_Mellitus_-_CMED4IIM1_-_2026_pages-001-010", "subject:diabetes"]
  - guid: a2df7164120d78fe
    noteType: Basic
    deck: "Corpus::Diabetes::Treatment Of Diabetes Mellitus"
    fields:
      Front: "What is the composition of Atrophane, a common premix insulin?"
      Back: "30% soluble human insulin and 70% intermediate-acting human insulin (NPH)"
    tags: ["diabetes", "treatment", "management", "Type1", "Type2", "pharmacology", "insulin", "difficulty:medium", "source:Treatment_Of_Diabetes_Mellitus_-_CMED4IIM1_-_2026_pages-001-010", "subject:diabetes"]
  - guid: ed3664371afea754
    noteType: Basic
    deck: "Corpus::Diabetes::Treatment Of Diabetes Mellitus"
    fields:
      Front: "What is insulin replacement best accomplished with in Type 1 diabetes?"
      Back: "Basal-bolus regimen (1-2 long-acting injections plus rapid-acting at meals) or continuous subcutaneous insulin infusion (CSII) using an automated pump device."
    tags: ["diabetes", "treatment", "management", "Type1", "Type2", "pharmacology", "insulin", "difficulty:medium", "source:Treatment_Of_Diabetes_Mellitus_-_CMED4IIM1_-_2026_pages-001-010", "subject:diabetes"]
  - guid: dbca450055c19670
    noteType: Basic
    deck: "Corpus::Diabetes::Treatment Of Diabetes Mellitus"
    fields:
      Front: "What is the initial total daily insulin dose for newly-diagnosed Type 1 diabetes after stabilization?"
      Back: "0.6 units per kilogram body weight, typically divided 50% basal and 50% bolus, then modified according to glucose levels and responses."
    tags: ["diabetes", "treatment", "management", "Type1", "Type2", "pharmacology", "insulin", "difficulty:medium", "source:Treatment_Of_Diabetes_Mellitus_-_CMED4IIM1_-_2026_pages-001-010", "subject:diabetes"]
  - guid: 1741c89b1cfce44f
    noteType: Basic
    deck: "Corpus::Diabetes::Treatment Of Diabetes Mellitus"
    fields:
      Front: "What is the common insulin regimen added to oral therapy in Type 2 diabetes?"
      Back: "A single basal (long-acting) injection added to existing oral therapy. This limits overnight hepatic glucose output to control fasting glucose while oral agents manage daytime glucose loads."
    tags: ["diabetes", "treatment", "management", "Type1", "Type2", "pharmacology", "insulin", "difficulty:medium", "source:Treatment_Of_Diabetes_Mellitus_-_CMED4IIM1_-_2026_pages-001-010", "subject:diabetes"]
  - guid: ffc6e591c8615e33
    noteType: Basic
    deck: "Corpus::Diabetes::Treatment Of Diabetes Mellitus"
    fields:
      Front: "What is the hypoglycemia risk time with basal insulin added to oral therapy in Type 2 diabetes?"
      Back: "Around 2-3 AM in the morning, due to the long-acting basal insulin effect overnight."
    tags: ["diabetes", "treatment", "management", "Type1", "Type2", "pharmacology", "insulin", "difficulty:medium", "source:Treatment_Of_Diabetes_Mellitus_-_CMED4IIM1_-_2026_pages-001-010", "subject:diabetes"]
  - guid: 2d95d86f6d3e4396
    noteType: Basic
    deck: "Corpus::Diabetes::Treatment Of Diabetes Mellitus"
    fields:
      Front: "What are the aims of therapy in diabetes management?"
      Back: "1) Lifestyle changes, 2) Prevent acute complications, 3) Prevent chronic complications, 4) Avoid iatrogenic hypoglycemia, 5) Control lipids and blood pressure, 6) Improve general well-being"
    tags: ["diabetes", "treatment", "management", "Type1", "Type2", "pharmacology", "insulin", "difficulty:medium", "source:Treatment_Of_Diabetes_Mellitus_-_CMED4IIM1_-_2026_pages-001-010", "subject:diabetes"]
  - guid: 71fbf32319f8c150
    noteType: Basic
    deck: "Corpus::Diabetes::Treatment Of Diabetes Mellitus"
    fields:
      Front: "What are the limitations of self-monitoring of blood glucose (SMBG)?"
      Back: "Limited efficacy if patient is only on oral therapy. Self-monitoring with insulin allows autonomy and self-titration of doses. Goal: >70% of readings within target range."
    tags: ["diabetes", "treatment", "management", "Type1", "Type2", "pharmacology", "insulin", "difficulty:medium", "source:Treatment_Of_Diabetes_Mellitus_-_CMED4IIM1_-_2026_pages-001-010", "subject:diabetes"]
  - guid: 24eb022d9c1e6300
    noteType: Basic
    deck: "Corpus::Diabetes::Treatment Of Diabetes Mellitus"
    fields:
      Front: "What is the fasting and post-meal glucose target in diabetes guidelines?"
      Back: "Fasting/pre-meal: 4.7 millimoles per liter. Post-meal: under 10 millimoles per liter."
    tags: ["diabetes", "treatment", "management", "Type1", "Type2", "pharmacology", "insulin", "difficulty:medium", "source:Treatment_Of_Diabetes_Mellitus_-_CMED4IIM1_-_2026_pages-001-010", "subject:diabetes"]
  - guid: 85cba569775a0824
    noteType: Basic
    deck: "Corpus::Diabetes::Treatment Of Diabetes Mellitus"
    fields:
      Front: "Why is hemoglobin A1c not usable in certain patient populations?"
      Back: "Cannot use in: abnormal hemoglobin (thalassemia, hemoglobin S disease), chronic renal failure, anemia. In these cases, fructose amine may be used instead."
    tags: ["diabetes", "treatment", "management", "Type1", "Type2", "pharmacology", "insulin", "difficulty:medium", "source:Treatment_Of_Diabetes_Mellitus_-_CMED4IIM1_-_2026_pages-001-010", "subject:diabetes"]
  - guid: cfdd356c92725796
    noteType: Basic
    deck: "Corpus::Diabetes::Treatment Of Diabetes Mellitus"
    fields:
      Front: "What does fructose amine measure and what is its timeframe?"
      Back: "It is a glycated protein reflecting average blood glucose over 2-3 weeks (shorter timeframe than HbA1c). Useful when HbA1c cannot be used."
    tags: ["diabetes", "treatment", "management", "Type1", "Type2", "pharmacology", "insulin", "difficulty:medium", "source:Treatment_Of_Diabetes_Mellitus_-_CMED4IIM1_-_2026_pages-001-010", "subject:diabetes"]
  - guid: 49de39cb461ddb8f
    noteType: Basic
    deck: "Corpus::Diabetes::Treatment Of Diabetes Mellitus"
    fields:
      Front: "What pathophysiology makes insulin essential for Type 1 diabetes?"
      Back: "Type 1 is an organ-specific autoimmune disease with targeted selective destruction of pancreatic beta cells mediated by both humoral and cellular immunity. All pancreatic capacity to produce and release insulin is destroyed."
    tags: ["diabetes", "treatment", "management", "Type1", "Type2", "pharmacology", "insulin", "difficulty:medium", "source:Treatment_Of_Diabetes_Mellitus_-_CMED4IIM1_-_2026_pages-001-010", "subject:diabetes"]
  - guid: 07ee9558117b613f
    noteType: Basic
    deck: "Corpus::Diabetes::Treatment Of Diabetes Mellitus"
    fields:
      Front: "What is the fundamental difference between Type 1 and Type 2 diabetes pathophysiology?"
      Back: "Type 1: complete beta cell destruction via autoimmunity. Type 2: combination of insulin resistance and beta cell dysfunction (present to different degrees in different patients) plus associated metabolic abnormalities (reduced incretin effect, abnormal renal glucose metabolism, increased hepatic glucose output, glucagon secretion abnormalities)."
    tags: ["diabetes", "treatment", "management", "Type1", "Type2", "pharmacology", "insulin", "difficulty:medium", "source:Treatment_Of_Diabetes_Mellitus_-_CMED4IIM1_-_2026_pages-001-010", "subject:diabetes"]
  - guid: 1f57c950db48681d
    noteType: Basic
    deck: "Corpus::Diabetes::Treatment Of Diabetes Mellitus"
    fields:
      Front: "What oral drug classes are available for Type 2 diabetes treatment?"
      Back: "Biguanides (metformin), sulfonylureas, thiazolidine diones (pioglitazone), alpha-glucosidase inhibitors, DPP-4 inhibitors, SGLT2 inhibitors."
    tags: ["diabetes", "treatment", "management", "Type1", "Type2", "pharmacology", "insulin", "difficulty:medium", "source:Treatment_Of_Diabetes_Mellitus_-_CMED4IIM1_-_2026_pages-001-010", "subject:diabetes"]
  - guid: b5c14a5b115ddd20
    noteType: Basic
    deck: "Corpus::Diabetes::Treatment Of Diabetes Mellitus"
    fields:
      Front: "When should metformin not be used?"
      Back: "Perioperative period, acute illnesses, severe liver disease, elderly individuals, and abnormal kidney function (eGFR <30 mL/min)"
    tags: ["diabetes", "treatment", "management", "Type1", "Type2", "pharmacology", "insulin", "difficulty:medium", "source:Treatment_Of_Diabetes_Mellitus_-_CMED4IIM1_-_2026_pages-001-010", "subject:diabetes"]
  - guid: 777de2bf8d1fae46
    noteType: Basic
    deck: "Corpus::Diabetes::Treatment Of Diabetes Mellitus"
    fields:
      Front: "What is the step-wise treatment approach for Type 2 diabetes?"
      Back: "1st line: Metformin + lifestyle management, 2nd: Add sulfonylurea/DPP-4/SGLT2/pioglitazone, 3rd: Add third oral agent, 4th: Add injectables (basal insulin or GLP-1), 5th: Intensive basal-bolus insulin if needed."
    tags: ["diabetes", "treatment", "management", "Type1", "Type2", "pharmacology", "insulin", "difficulty:medium", "source:Treatment_Of_Diabetes_Mellitus_-_CMED4IIM1_-_2026_pages-001-010", "subject:diabetes"]
  - guid: e199925c76ad0865
    noteType: Basic
    deck: "Corpus::Diabetes::Treatment Of Diabetes Mellitus"
    fields:
      Front: "What parameters beyond glucose control need management in Type 2 diabetes?"
      Back: "Lipid levels, blood pressure, body weight, smoking cessation, limitation of alcohol intake. Aspirin no longer recommended for primary prevention but required if patient has had macrovascular event."
    tags: ["diabetes", "treatment", "management", "Type1", "Type2", "pharmacology", "insulin", "difficulty:medium", "source:Treatment_Of_Diabetes_Mellitus_-_CMED4IIM1_-_2026_pages-001-010", "subject:diabetes"]
