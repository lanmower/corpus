    fields:
      Front: "What are the main side effects of dolutegravir (DTG/TLD)?"
      Back: |
        DTG side effects are usually mild and self-limiting, including: insomnia, headache, CNS effects, gastrointestinal effects. Weight gain has emerged as a side effect.
