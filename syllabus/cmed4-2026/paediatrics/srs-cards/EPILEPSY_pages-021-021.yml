      Front: "Why is Phenobarbitone the drug of choice in children under 2 years with Status Epilepticus?"
      Back: "Phenobarbitone is the drug of choice in children <2 years old for Status Epilepticus management."
    tags: ["epilepsy", "status-epilepticus", "phenobarbitone", "pediatric-dosing", "subject:paediatrics"]

  - guid: r0s1t2u3v4w5x6y7
