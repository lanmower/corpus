    deck: "Corpus::Paediatrics::2024 NON ACCIDENTAL INJURIES"
    fields:
      Front: "What was the clinical presentation and outcome in the case of the 12-year-old male with perinatal asphyxia?"
      Back: "Background: ex-premature infant with perinatal asphyxia (APGAR 4-6/10), ventilated in NICU for 2 weeks, neonatal jaundice (phototherapy), feeding problems, seizures (phenobarbitone), repeated grades 4-5. No vision or hearing assessment, no SIAS form. Context: professional nurse mother and deputy director father. Outcome: parents disclosed physically abusing the child. Management: medical management and referral to educational psychologist after counselling."
