  - guid: 93a4bd250092471c
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2024 RES CONDITIONS"
    fields:
      Front: "What are the causes of wheezing in children?"
      Back: |
        Reactive airway disease (asthma), bronchial oedema (bronchiolitis), foreign body/aspiration, eosinophilia pneumonia, cardiac failure, cystic fibrosis, bronchiectasis
    tags:
      - "wheeze"
      - "etiology"
      - "subject:paediatrics"
  - guid: 427d668f3b6649bf
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2024 RES CONDITIONS"
    fields:
      Front: "What are chronic or recurrent causes of wheeze?"
      Back: |
        Hypersensitivity reactions (Aspergillosis/CF), dynamic airway collapse (bronchomalacia), airway compression (vascular ring/lymph nodes), aspiration (GORD/TOF), failure to clear secretions (CF), intrinsic airway lesions (tumours/tracheal stenosis), congestive heart failure, parasites (Loeffler's Syndrome)
    tags:
