deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
notes:
  - guid: "hypx0001defyxm"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "Define: Hypoxia"
      Back: "Reduction in oxygen delivery to the tissue"
    tags: ["definitions", "pathophysiology", "subject:paediatrics-neonatal"]
  - guid: "hypx0002defsch"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "Define: Ischemia"
      Back: "Reduction in blood flow to the tissue"
    tags: ["definitions", "pathophysiology", "subject:paediatrics-neonatal"]
  - guid: "hypx0003defasp"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "Define: Asphyxia"
      Back: "Progressive hypoxia, hypercarbia and acidosis"
    tags: ["definitions", "pathophysiology", "subject:paediatrics-neonatal"]
  - guid: "hypx0004neonenc"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "Define: Neonatal Encephalopathy"
      Back: "Clinically defined syndrome characterised by disturbed neurological function (altered level of consciousness, tone disturbance with or without seizures). Does not imply a specific cause nor irreversible neurological damage"
    tags: ["definitions", "encephalopathy", "subject:paediatrics-neonatal"]
  - guid: "hypx0005neocaus"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "List causes of neonatal encephalopathy"
      Back: "HIE, meningitis, cerebral malformations, intracranial bleeds, perinatal stroke, metabolic conditions (hypoglycaemia, electrolyte disturbance), IEMs, neonatal abstinence syndrome, drugs"
    tags: ["aetiology", "encephalopathy", "subject:paediatrics-neonatal"]
  - guid: "hypx0006defhie"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "Define: Hypoxic Ischaemic Encephalopathy (HIE)"
      Back: "Abnormal neurobehavioural state consisting of altered level of consciousness, tone disturbance, with or without seizures, with objective evidence to support a hypoxic ischaemic insult during the peri-partum period"
    tags: ["definitions", "encephalopathy", "subject:paediatrics-neonatal"]
  - guid: "hypx0007diagcrit"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "What are the diagnostic criteria for perinatal asphyxia severe enough to result in acute neurological injury?"
      Back: "All of the following must be present: (1) Metabolic or mixed acidaemia (pH <7.2) in umbilical artery blood sample with BE >15, (2) Apgar score <7 at 5 minutes, (3) Neonatal neurologic disturbance (seizures, coma, hypotonia), (4) Multiple organ involvement (kidney, lungs, liver, heart, intestines)"
    tags: ["diagnosis", "diagnostic-criteria", "subject:paediatrics-neonatal"]
  - guid: "hypx0008phasepri"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "Describe the Primary/Acute Phase of HIE pathophysiology"
      Back: "Occurs within minutes of hypoxic insult: Depletion of energy metabolites → anaerobic metabolism; Rapid progressive depolarisation of cells; Cytotoxic oedema; Increased intracellular Ca²⁺; Increased Na⁺ overload; Increased extracellular glutamate; Progressive acidosis → Cell injury +/− necrosis"
    tags: ["pathophysiology", "mechanism", "subject:paediatrics-neonatal"]
  - guid: "hypx0009phasewin"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "What is the therapeutic window in HIE?"
      Back: "Within 6 hours of hypoxic insult. Window of opportunity for optimal intervention (hypothermia or other strategies) to reduce neurologic injury. Cerebral blood flow (CBF) reperfusion occurs; slow recovery of cerebral oxidative metabolism and acidosis resolution"
    tags: ["pathophysiology", "treatment-window", "subject:paediatrics-neonatal"]
  - guid: "hypx0010phasesec"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "Describe the Secondary/Latent Phase of HIE pathophysiology"
      Back: "Occurs several hours to days after hypoxic insult: Secondary cytotoxic oedema → increased cell death; Inflammatory response increases IL-1, IL-6, TNFα; Cerebral oedema/seizures; Increased free radical release; Increased Ca²⁺ overload; Accumulation of excitatory amino acids (EAA) with increased uptake → Neuronal cell death + Apoptosis"
    tags: ["pathophysiology", "mechanism", "subject:paediatrics-neonatal"]
  - guid: "hypx0011immatbr"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "Why is the immature brain more resistant to hypoxic-ischaemic events?"
      Back: "Three factors: (1) Lower cerebral metabolic rate, (2) Immaturity in development of balance of neurotransmitters, (3) Plasticity of immature CNS"
    tags: ["pathophysiology", "age-related", "subject:paediatrics-neonatal"]
  - guid: "hypx0012galessence"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "How does gestational age affect CNS susceptibility to hypoxic-ischaemic insult?"
      Back: "Less than 20 weeks: neuronal heterotopia or polymicrogyria. 26–36 weeks: white matter damage, periventricular leukomalacia. Term: primarily grey matter affected"
    tags: ["pathophysiology", "age-related", "gestational-age", "subject:paediatrics-neonatal"]
  - guid: "hypx0013aetmat1"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "List maternal aetiologies of HIE"
      Back: "Cardiac arrest, asphyxiation, severe anaphylaxis, status epilepticus, hypovolaemic shock"
    tags: ["aetiology", "maternal", "subject:paediatrics-neonatal"]
  - guid: "hypx0014aetupl"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "List uteroplacental aetiologies of HIE"
      Back: "Placental abruption, cord prolapse, uterine rupture, hyperstimulation with oxytocic agents"
    tags: ["aetiology", "uteroplacental", "subject:paediatrics-neonatal"]
  - guid: "hypx0015aetfet"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "List fetal aetiologies of HIE"
      Back: "Fetomaternal haemorrhage, twin-to-twin transfusion, severe isoimmune haemolytic disease, cardiac arrhythmia"
    tags: ["aetiology", "fetal", "subject:paediatrics-neonatal"]
  - guid: "hypx0016thomtone"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "Thompson's Score: Tone scoring (0, 1, 2, 3)"
      Back: "0 = Normal, 1 = Hypertonia, 2 = Hypotonia, 3 = Flaccid"
    tags: ["thompson-score", "clinical-scoring", "subject:paediatrics-neonatal"]
  - guid: "hypx0017thomloc"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "Thompson's Score: Level of Consciousness scoring (0, 1, 2, 3)"
      Back: "0 = Normal, 1 = Hyperalert/stare, 2 = Lethargic, 3 = Comatose"
    tags: ["thompson-score", "clinical-scoring", "subject:paediatrics-neonatal"]
  - guid: "hypx0018thomfit"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "Thompson's Score: Fits scoring (0, 1, 2)"
      Back: "0 = None, 1 = Less than 3 per day, 2 = Greater than or equal to 2 per day"
    tags: ["thompson-score", "clinical-scoring", "subject:paediatrics-neonatal"]
  - guid: "hypx0019thompost"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "Thompson's Score: Posture scoring (0, 1, 2, 3)"
      Back: "0 = Normal, 1 = Fisting, cycling, 2 = Strong distal flexion, 3 = Decerebrate"
    tags: ["thompson-score", "clinical-scoring", "subject:paediatrics-neonatal"]
  - guid: "hypx0020thommoro"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "Thompson's Score: Moro reflex scoring (0, 1, 2)"
      Back: "0 = Normal, 1 = Partial, 2 = Absent"
    tags: ["thompson-score", "clinical-scoring", "subject:paediatrics-neonatal"]
  - guid: "hypx0021thomgras"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "Thompson's Score: Grasp reflex scoring (0, 1, 2)"
      Back: "0 = Normal, 1 = Poor, 2 = Absent"
    tags: ["thompson-score", "clinical-scoring", "subject:paediatrics-neonatal"]
  - guid: "hypx0022thomsuck"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "Thompson's Score: Suck reflex scoring (0, 1, 2)"
      Back: "0 = Normal, 1 = Poor, 2 = Absent/bites"
    tags: ["thompson-score", "clinical-scoring", "subject:paediatrics-neonatal"]
  - guid: "hypx0023thomresp"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "Thompson's Score: Respiration scoring (0, 1, 2, 3)"
      Back: "0 = Normal, 1 = Hyperventilation, 2 = Brief apnoea, 3 = IPPV (apnoea)"
    tags: ["thompson-score", "clinical-scoring", "subject:paediatrics-neonatal"]
  - guid: "hypx0024thomfont"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "Thompson's Score: Fontanel scoring (0, 1, 2)"
      Back: "0 = Normal, 1 = Full not tense, 2 = Tense"
    tags: ["thompson-score", "clinical-scoring", "subject:paediatrics-neonatal"]
  - guid: "hypx0025sarnmild"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "Sarnat Stage 1 (Mild) HIE: clinical features and outcomes"
      Back: "Mental status: Hyperalert. Ventilator: No. Feeding problems: Mild. Tone: Jittery. Seizures: No. Probability of severe handicap or death: Less than 1%"
    tags: ["sarnat-staging", "clinical-assessment", "outcomes", "subject:paediatrics-neonatal"]
  - guid: "hypx0026sarnmod"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "Sarnat Stage 2 (Moderate) HIE: clinical features and outcomes"
      Back: "Mental status: Lethargy. Ventilator: No. Feeding problems: Moderate. Tone: High (hypertonic). Seizures: Yes. Probability of severe handicap or death: 25%"
    tags: ["sarnat-staging", "clinical-assessment", "outcomes", "subject:paediatrics-neonatal"]
  - guid: "hypx0027sarnmodsev"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "Sarnat Stage 2–3 (Moderate-to-Severe) HIE: clinical features and outcomes"
      Back: "Mental status: Lethargy. Ventilator: Yes. Feeding problems: Moderate. Tone: High (hypertonic). Seizures: Yes. Probability of severe handicap: ~50%. Suggested for infants requiring respiratory assistance but not flaccid and definitely comatose"
    tags: ["sarnat-staging", "clinical-assessment", "outcomes", "subject:paediatrics-neonatal"]
  - guid: "hypx0028sarnsev"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "Sarnat Stage 3 (Severe) HIE: clinical features and outcomes"
      Back: "Mental status: Coma. Ventilator: Yes (IPPV). Feeding problems: Severe. Tone: Flaccid. Seizures: Yes (early). Probability of severe handicap or death: 75%"
    tags: ["sarnat-staging", "clinical-assessment", "outcomes", "subject:paediatrics-neonatal"]
  - guid: "hypx0029outmild"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "Long-term outcome of term infants with mild perinatal HIE"
      Back: "Death: 0%. Disability: 0%"
    tags: ["outcomes", "prognosis", "subject:paediatrics-neonatal"]
  - guid: "hypx0030outmod"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "Long-term outcome of term infants with moderate perinatal HIE"
      Back: "Death: 6%. Disability: 30%"
    tags: ["outcomes", "prognosis", "subject:paediatrics-neonatal"]
  - guid: "hypx0031outsev"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "Long-term outcome of term infants with severe perinatal HIE"
      Back: "Death: 60%. Disability: 100%"
    tags: ["outcomes", "prognosis", "subject:paediatrics-neonatal"]
  - guid: "hypx0032diagapp"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "How is HIE diagnosed? Are there specific confirmatory tests?"
      Back: "No specific tests confirm or exclude HIE. Diagnosis is based on history, physical examination, neurological examination, and laboratory evidence"
    tags: ["diagnosis", "diagnostic-approach", "subject:paediatrics-neonatal"]
  - guid: "hypx0033labeles"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "Laboratory: Serum electrolytes in HIE"
      Back: "Markedly low serum sodium, potassium, and chloride levels in presence of reduced urine flow and excessive weight gain may indicate acute tubular damage or SIADH secretion, particularly during initial 2–3 days of life"
    tags: ["diagnosis", "laboratory", "subject:paediatrics-neonatal"]
  - guid: "hypx0034labrenal"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "Laboratory: Renal function assessment in HIE"
      Back: "Check serum creatinine levels, creatinine clearance, and BUN levels"
    tags: ["diagnosis", "laboratory", "subject:paediatrics-neonatal"]
  - guid: "hypx0035labcard"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "Laboratory: Cardiac and liver enzymes in HIE"
      Back: "Assess the degree of hypoxic-ischaemic injury to other organs"
    tags: ["diagnosis", "laboratory", "subject:paediatrics-neonatal"]
  - guid: "hypx0036labcoag"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "Laboratory: Coagulation system assessment in HIE"
      Back: "Check prothrombin time (PT), partial thromboplastin time (PTT), and fibrinogen levels"
    tags: ["diagnosis", "laboratory", "subject:paediatrics-neonatal"]
  - guid: "hypx0037lababg"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "Laboratory: Arterial Blood Gas (ABG) in HIE"
      Back: "Assess acid-base status and to avoid hyperoxia and hypoxia as well as hypercapnia and hypocapnia"
    tags: ["diagnosis", "laboratory", "subject:paediatrics-neonatal"]
  - guid: "hypx0038seizfirst"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "What is the first-line anticonvulsant for HIE seizures?"
      Back: "Phenobarbitone (phenobarbital)"
    tags: ["seizures", "anticonvulsant-therapy", "subject:paediatrics-neonatal"]
  - guid: "hypx0039seiz1st"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "Initial dose of phenobarbitone for HIE seizures"
      Back: "20 mg/kg intravenously slowly over 20 minutes"
    tags: ["seizures", "anticonvulsant-dosing", "subject:paediatrics-neonatal"]
  - guid: "hypx0040seiz2nd"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "If phenobarbitone initial dose ineffective, what are repeat doses?"
      Back: "Two additional doses of 10 mg/kg can be given intravenously, each given 15 minutes apart"
    tags: ["seizures", "anticonvulsant-dosing", "subject:paediatrics-neonatal"]
  - guid: "hypx0041seizphyt"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "If convulsions persist after phenobarbitone, what second-line agent is used?"
      Back: "Phenytoin: 20 mg/kg intravenously slowly over 20 minutes"
    tags: ["seizures", "anticonvulsant-dosing", "subject:paediatrics-neonatal"]
  - guid: "hypx0042seizmon"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "What must be monitored during anticonvulsant therapy in HIE?"
      Back: "Levels of antiepileptic drugs need to be monitored"
    tags: ["seizures", "anticonvulsant-therapy", "subject:paediatrics-neonatal"]
  - guid: "hypx0043seizlor"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "Lorazepam dosing in HIE seizure management"
      Back: "0.05 to 0.10 mg/kg/dose intravenously, may be given transiently"
    tags: ["seizures", "anticonvulsant-dosing", "subject:paediatrics-neonatal"]
  - guid: "hypx0044seizmid"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "When is midazolam infusion used in HIE seizure management?"
      Back: "If in status epilepticus and not responding to phenobarbitone and phenytoin"
    tags: ["seizures", "anticonvulsant-therapy", "subject:paediatrics-neonatal"]
  - guid: "hypx0045hypometh"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "What cooling methods are available for hypothermia therapy in HIE?"
      Back: "Whole-body cooling and head-cooling"
    tags: ["hypothermia", "neuroprotection", "subject:paediatrics-neonatal"]
  - guid: "hypx0046hypotemp"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "What is the target core (rectal) temperature and duration for hypothermia therapy in HIE?"
      Back: "33–35°C for 72 hours"
    tags: ["hypothermia", "neuroprotection", "subject:paediatrics-neonatal"]
  - guid: "hypx0047hypobas"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "What is the rationale for hypothermia therapy in HIE?"
      Back: "Based on Cool Cap and NICHD Neonatal Research Network trials showing neuroprotection"
    tags: ["hypothermia", "neuroprotection", "evidence", "subject:paediatrics-neonatal"]
  - guid: "hypx0048hypomec1"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "Mechanism: How does hypothermia reduce cerebral metabolism and prevent brain oedema?"
      Back: "Reduces cerebral metabolism, prevents oedema; decreases energy utilisation"
    tags: ["hypothermia", "mechanism", "subject:paediatrics-neonatal"]
  - guid: "hypx0049hypomec2"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "Mechanism: How does hypothermia affect excitatory amino acids in HIE?"
      Back: "Reduces/suppresses cytotoxic amino acid accumulation and nitric oxide"
    tags: ["hypothermia", "mechanism", "subject:paediatrics-neonatal"]
  - guid: "hypx0050hypomec3"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "Mechanism: How does hypothermia affect inflammation in HIE?"
      Back: "Inhibits platelet-activating factor and inflammatory cascade"
    tags: ["hypothermia", "mechanism", "subject:paediatrics-neonatal"]
  - guid: "hypx0051hypomec4"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "Mechanism: How does hypothermia affect oxidative stress in HIE?"
      Back: "Suppresses free radical activity"
    tags: ["hypothermia", "mechanism", "subject:paediatrics-neonatal"]
  - guid: "hypx0052hypomec5"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "Mechanism: How does hypothermia affect neuronal cell death in HIE?"
      Back: "Attenuates secondary neuronal damage and inhibits cell death"
    tags: ["hypothermia", "mechanism", "subject:paediatrics-neonatal"]
  - guid: "hypx0053hypoeff"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "What is the clinical outcome benefit of hypothermia in HIE?"
      Back: "Death or severe disability at 18 months of age is significantly reduced"
    tags: ["hypothermia", "outcomes", "subject:paediatrics-neonatal"]
  - guid: "hypx0054followup"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "Which neonates with asphyxia should be followed in High Risk Clinic?"
      Back: "Neonates with moderate and severe asphyxia, especially those with Sarnat stage II and III HIE"
    tags: ["follow-up", "management", "subject:paediatrics-neonatal"]
  - guid: "hypx0055followass"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "What is required during follow-up of neonates with moderate-severe HIE?"
      Back: "Complete neurological assessment and intervention if needed"
    tags: ["follow-up", "management", "subject:paediatrics-neonatal"]
  - guid: "hypx0056followdev"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "When should formal psychometric assessment be performed in neonates with moderate-severe HIE?"
      Back: "At 18 months of age"
    tags: ["follow-up", "developmental-assessment", "subject:paediatrics-neonatal"]
