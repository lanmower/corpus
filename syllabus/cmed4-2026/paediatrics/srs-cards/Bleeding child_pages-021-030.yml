  - guid: k1m2n3o4p5q6k1m2
    noteType: Basic
    deck: "Corpus::Paediatrics::Bleeding child"
    fields:
      Front: "How does ITP typically present in children?"
      Back: "Sudden onset of petechiae/bruising/mucosal bleed in previously healthy child with absent abnormal physical findings; often preceded by viral infection or recent immunisation"
    tags: ["ITP", "presentation", "clinical-features", "subject:paediatrics"]
  - guid: l2n3o4p5q6r7l2n3
    noteType: Basic
    deck: "Corpus::Paediatrics::Bleeding child"
    fields:
      Front: "What is the pathogenesis of ITP?"
      Back: "Antiplatelet antibody (autoantibody) binds to platelet surface with destruction enhanced by Fc-receptor mediated phagocytosis in the spleen and liver"
    tags: ["ITP", "pathogenesis", "autoantibody", "subject:paediatrics"]
