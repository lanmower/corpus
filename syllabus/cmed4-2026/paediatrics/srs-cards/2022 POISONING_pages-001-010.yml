    fields:
      Front: "What is the goal of secondary prevention in poisoning?"
      Back: |
        Secondary prevention aims to prevent injury or illness once poisoning has occurred, using poisoning centres and methods of decontamination.
    tags: ["prevention", "secondary", "poisoning", "subject:paediatrics"]

