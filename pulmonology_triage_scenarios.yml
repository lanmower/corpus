      treatment_modality: "targeted_therapy (EGFR inhibitor)"
      prognosis: "Improved with targeted therapy vs chemotherapy alone"
      recommendation: "Initiate EGFR inhibitor; monitor for resistance mutations at progression; consider second-line options (T790M testing)"

