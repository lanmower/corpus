    deck: "Corpus::Paediatrics::2021 AIRWAY AND BREATHING"
    fields:
      Front: "After performing head tilt-chin lift or jaw thrust, what must you check?"
      Back: "Check that the maneuver has been effective. Do not just do it once. Check again by using Look-Listen-Feel assessment - look for chest movement, listen for breath sounds, feel for breath at nose or mouth."
    tags: ["airway-management", "procedure-verification", "assessment", "subject:paediatrics"]
  - guid: "l2m3n4o5p6q7r8s9"
    noteType: Basic
    deck: "Corpus::Paediatrics::2021 AIRWAY AND BREATHING"
    fields:
      Front: "What is a Yankaer suction and what are its advantages?"
      Back: "Yankaer suction is a firm plastic suction tip with a large opening surrounded by a bulbous head. Advantages: allows effective suction without damaging surrounding tissue, provides more control when suctioning (rigid vs softer flexible suction catheter), longer and effective at removing secretions from the airway, prevents plugging."
    tags: ["airway-clearing", "suction-technique", "equipment", "subject:paediatrics"]
  - guid: "m3n4o5p6q7r8s9t0"
    noteType: Basic
    deck: "Corpus::Paediatrics::2021 AIRWAY AND BREATHING"
    fields:
      Front: "What should be checked before opening the airway in a trauma patient?"
      Back: "Always check for head and neck trauma. Ask if child could have had any trauma to head/neck or a fall which could have damaged the cervical spine (c-spine). Look for bruises or other signs of trauma. Stabilize neck first if trauma is suspected."
    tags: ["trauma-assessment", "c-spine-injury", "airway-management", "subject:paediatrics"]
  - guid: "n4o5p6q7r8s9t0u1"
    noteType: Basic
    deck: "Corpus::Paediatrics::2021 AIRWAY AND BREATHING"
    fields:
      Front: "What is the jaw thrust maneuver and when is it used?"
      Back: "Jaw thrust without head tilt is the safe airway opening technique when c-spine injury is possible. Method: place thumbs on the forehead and 2-3 fingers under the angle of the jaw on both sides and lift jaw upwards. Thumbs are used to keep the head in place to ensure neck is not moved during the process. Safe to use in all ages."
    tags: ["jaw-thrust", "c-spine-injury", "airway-management", "subject:paediatrics"]
  - guid: "o5p6q7r8s9t0u1v2"
    noteType: Basic
    deck: "Corpus::Paediatrics::2021 AIRWAY AND BREATHING"
    fields:
      Front: "What are the methods for neck immobilization in suspected c-spine injury?"
      Back: "Three methods: By Hand - manually support and stabilize; Blocks - head blocks to prevent movement; Log Rolls - careful rolling technique for children with c-spine injury. Apply correct size rigid neck collar with child lying on back. Prevent neck from moving by supporting head with blocks, sandbags, rolled towels, or litre bags of IV fluids on each side. Do NOT tape child's head to bed/trolley (risk of vomiting/aspiration)."
    tags: ["c-spine-immobilization", "neck-stabilization", "trauma-management", "subject:paediatrics"]
  - guid: "p6q7r8s9t0u1v2w3"
    noteType: Basic
    deck: "Corpus::Paediatrics::2021 AIRWAY AND BREATHING"
    fields:
      Front: "What is the log roll technique and how is it performed?"
      Back: "Log roll is a technique for carefully moving a child with c-spine injury without rotating, flexing, or extending the neck. Procedure: Senior person assumes responsibility and stands at top end of child. Hold child's head to keep neck straight and in line with body by placing fingers under angle of mandible with palms over parietal region. 2-3 assistants needed to roll child's body in line with head and neck upon senior's clear instruction. Further person examines back for injuries. NO per rectal exam in children."
    tags: ["log-roll", "c-spine-injury", "trauma-management", "subject:paediatrics"]
  - guid: "q7r8s9t0u1v2w3x4"
    noteType: Basic
    deck: "Corpus::Paediatrics::2021 AIRWAY AND BREATHING"
    fields:
      Front: "What is an oropharyngeal (OP) airway and what does it do?"
      Back: "An oropharyngeal airway moves the tongue away from the back of the throat and opens the upper airway. It is curved to fit the throat and must be long enough to reach the airways leading to the lungs. Would usually only be tolerated in a child with low level of consciousness. Beware - may provoke vomiting."
    tags: ["oropharyngeal-airway", "artificial-airway", "equipment", "subject:paediatrics"]
  - guid: "r8s9t0u1v2w3x4y5"
    noteType: Basic
    deck: "Corpus::Paediatrics::2021 AIRWAY AND BREATHING"
    fields:
      Front: "What is the Guedel airway and what sizes are available?"
      Back: "Guedel airway is an oropharyngeal airway device. Available sizes: 000, 00, 0, 1, 2, 3, 4 - each with a different colour for each size. Sizing measured from midpoint of incisors to angle of mandible. Oversized airway could obstruct the airway by depressing the epiglottis. Undersized airway allows tongue to obstruct."
    tags: ["guedel-airway", "airway-sizing", "equipment", "subject:paediatrics"]
  - guid: "s9t0u1v2w3x4y5z6"
    noteType: Basic
    deck: "Corpus::Paediatrics::2021 AIRWAY AND BREATHING"
    fields:
      Front: "How is the Guedel airway inserted in infants versus older children?"
      Back: "INFANTS: Put in right way up with tongue depressor to avoid obstruction by tongue.\n\nOLDER CHILDREN: Can insert like anaesthetists do but with care. Curved tip points upwards (without being obstructed by tongue) then rotated 180 degrees and passes under hard palate.\n\nALL CHILDREN: If child appears to have a gag reflex and begins to retch, remove the oropharyngeal airway immediately."
    tags: ["guedel-airway", "insertion-technique", "procedure", "subject:paediatrics"]
  - guid: "t0u1v2w3x4y5z6a7"
    noteType: Basic
    deck: "Corpus::Paediatrics::2021 AIRWAY AND BREATHING"
    fields:
      Front: "What are the five checks for an Ambu bag (manual ventilation device)?"
      Back: "Is it connected to O2? Does it have a blow-off valve? Does it fit properly? Does it leak? How fast is ventilation rate - 2 seconds per breath?"
    tags: ["ambu-bag", "manual-ventilation", "equipment-check", "subject:paediatrics"]
  - guid: "u1v2w3x4y5z6a7b8"
    noteType: Basic
    deck: "Corpus::Paediatrics::2021 AIRWAY AND BREATHING"
    fields:
      Front: "What is an Ambu bag and how does it function?"
      Back: "Ambu bag is a hand-held device that delivers positive pressure ventilation. Function: squeezable bag with one-way valve and face mask. Compress the bag (opens the valve, forces air through mask/artificial airway into lungs). Release the bag (closes valve, exhalation occurs passively through exhalation port). With exhalation, bag fills with oxygen or room air."
    tags: ["ambu-bag", "manual-ventilation", "equipment", "subject:paediatrics"]
  - guid: "v2w3x4y5z6a7b8c9"
    noteType: Basic
    deck: "Corpus::Paediatrics::2021 AIRWAY AND BREATHING"
    fields:
      Front: "What are the causes of chest not rising when using an Ambu bag?"
      Back: "Inappropriate head or jaw position\nMouth closed\nInsufficient pressure applied\nMucus or blood obstructing airway\nForeign body present\nPoor seal between mask and face"
    tags: ["ambu-bag", "troubleshooting", "manual-ventilation", "subject:paediatrics"]
  - guid: "w3x4y5z6a7b8c9d0"
    noteType: Basic
    deck: "Corpus::Paediatrics::2021 AIRWAY AND BREATHING"
    fields:
      Front: "What is the C-grip and when is it used?"
      Back: "The C-grip is the appropriate technique for holding a mask in place during manual ventilation with an Ambu bag. Different mask types may be used, but must be used appropriately regardless of mask type. Proper mask fit is essential for effective ventilation."
    tags: ["ambu-bag", "mask-technique", "manual-ventilation", "subject:paediatrics"]
  - guid: "x4y5z6a7b8c9d0e1"
    noteType: Basic
    deck: "Corpus::Paediatrics::2021 AIRWAY AND BREATHING"
    fields:
      Front: "What common error can occur during manual ventilation with Ambu bag that prevents effective ventilation?"
      Back: "Soft tissue compression under the chin. This can occur even when head position is OK, reservoir is present, oxygen is attached, and mask fits well. Must be avoided by proper hand positioning and technique."
    tags: ["ambu-bag", "ventilation-errors", "manual-ventilation", "subject:paediatrics"]
