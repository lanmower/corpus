    noteType: "Basic"
    deck: "Corpus::Paediatrics::Emergency care - the seriously ill child"
    fields:
      Front: "Define triage in the context of paediatric emergency care."
      Back: "Triage is a sorting process that aims to find life-threatening problems. It is NOT about making a diagnosis."
    tags: ["triage", "definition", "assessment", "subject:paediatrics"]

  - guid: "c3a8f5b2e1d4g9h7"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::Emergency care - the seriously ill child"
    fields:
      Front: "What does ETAT stand for and who developed it?"
      Back: "ETAT = E: Emergency, T: Triage, A: Assessment, T: Treatment. Developed by the World Health Organisation (WHO)."
    tags: ["triage", "etat", "system", "subject:paediatrics"]

  - guid: "d5g1h3c9a2f7e6b4"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::Emergency care - the seriously ill child"
    fields:
      Front: "What does the ABCC-C-D framework assess in a seriously ill child?"
      Back: "A = Airway, B = Breathing, C = Circulation, C = Coma, C = Convulsion, D = Dehydration. This framework identifies life-threatening problems."
    tags: ["abcd", "emergency", "assessment", "subject:paediatrics"]

