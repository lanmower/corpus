deck: "Corpus::Paediatrics-Neonatal::2022 NEONATAL RESUS"
notes:
  - guid: "neoresus00000001"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2022 NEONATAL RESUS"
    fields:
      Front: "What maternal factors should be assessed when anticipating a neonatal resuscitation?"
      Back: "Age, gestation and parity, comorbidities/pre-existing illnesses"
    tags: ["anticipation", "maternal-history", "subject:paediatrics-neonatal"]
  - guid: "neoresus00000002"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2022 NEONATAL RESUS"
    fields:
      Front: "What fetal factors should be assessed when anticipating a neonatal resuscitation?"
      Back: "Congenital anomalies, singleton vs multiple pregnancy, weight"
    tags: ["anticipation", "fetal-history", "subject:paediatrics-neonatal"]
  - guid: "neoresus00000003"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2022 NEONATAL RESUS"
    fields:
      Front: "What equipment should be checked before neonatal resuscitation?"
      Back: "All equipment available for resuscitation must be checked"
    tags: ["preparation", "equipment", "subject:paediatrics-neonatal"]
  - guid: "neoresus00000004"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2022 NEONATAL RESUS"
    fields:
      Front: "Why must a newborn be kept warm after delivery?"
      Back: "The fetus has been in amniotic fluid which provides a warm environment, so post-delivery temperature control is essential"
    tags: ["preparation", "thermoregulation", "subject:paediatrics-neonatal"]
  - guid: "neoresus00000005"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2022 NEONATAL RESUS"
    fields:
      Front: "What equipment can be used to maintain a newborn's temperature?"
      Back: "Servicrib with heater, clean dry towels"
    tags: ["preparation", "thermoregulation", "subject:paediatrics-neonatal"]
  - guid: "neoresus00000006"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2022 NEONATAL RESUS"
    fields:
      Front: "What is the important precaution when using towels to keep a newborn warm?"
      Back: "Remove wet towels from under baby after use, as they cool the infant"
    tags: ["preparation", "thermoregulation", "subject:paediatrics-neonatal"]
  - guid: "neoresus00000007"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2022 NEONATAL RESUS"
    fields:
      Front: "What are the three key questions to ask when assessing a newborn for resuscitation?"
      Back: "1) Is the baby breathing adequately? 2) Is the heart rate above 100 bpm? 3) Is the baby centrally pink?"
    tags: ["assessment", "vital-signs", "subject:paediatrics-neonatal"]
  - guid: "neoresus00000008"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2022 NEONATAL RESUS"
    fields:
      Front: "If a baby answers 'yes' to all three assessment questions, what does this indicate?"
      Back: "Baby does not need resuscitation"
    tags: ["assessment", "vital-signs", "subject:paediatrics-neonatal"]
  - guid: "neoresus00000009"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2022 NEONATAL RESUS"
    fields:
      Front: "What is the critical first action when resuscitation is required?"
      Back: "CALL FOR HELP — resuscitation is a team effort"
    tags: ["resuscitation-initiation", "teamwork", "subject:paediatrics-neonatal"]
  - guid: "neoresus0000000a"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2022 NEONATAL RESUS"
    fields:
      Front: "Define the anatomical extent of the airway in a neonate."
      Back: "The airway starts from the nose and ends in lung tissue"
    tags: ["airway", "anatomy", "subject:paediatrics-neonatal"]
  - guid: "neoresus0000000b"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2022 NEONATAL RESUS"
    fields:
      Front: "What is the correct head position for a neonate's airway?"
      Back: "Head in neutral position"
    tags: ["airway", "positioning", "subject:paediatrics-neonatal"]
  - guid: "neoresus0000000c"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2022 NEONATAL RESUS"
    fields:
      Front: "When should suction be applied to a neonate's airway?"
      Back: "Only if obvious secretions (such as meconium) are blocking the nostrils or mouth"
    tags: ["airway", "suction", "subject:paediatrics-neonatal"]
  - guid: "neoresus0000000d"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2022 NEONATAL RESUS"
    fields:
      Front: "What is the ILCOR 2015 guideline regarding routine suctioning of neonates with meconium exposure?"
      Back: "Do NOT routinely suction neonates below the vocal cords with meconium exposure, even if the neonate is not vigorous. Intubate if needed to provide oxygenation as soon as possible"
    tags: ["airway", "meconium", "ilcor-guideline", "subject:paediatrics-neonatal"]
  - guid: "neoresus0000000e"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2022 NEONATAL RESUS"
    fields:
      Front: "What congenital abnormality can cause upper airway obstruction in neonates?"
      Back: "Choanal atresia"
    tags: ["airway", "congenital-anomalies", "subject:paediatrics-neonatal"]
  - guid: "neoresus0000000f"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2022 NEONATAL RESUS"
    fields:
      Front: "What airway intervention may be life-saving in a neonate with choanal atresia?"
      Back: "Oropharyngeal airway"
    tags: ["airway", "congenital-anomalies", "subject:paediatrics-neonatal"]
  - guid: "neoresus00000010"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2022 NEONATAL RESUS"
    fields:
      Front: "What is the appropriate management for a peripherally cyanosed neonate with spontaneous breathing and heart rate >100?"
      Back: "Provide supplemental oxygen only"
    tags: ["breathing", "oxygenation", "subject:paediatrics-neonatal"]
  - guid: "neoresus00000011"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2022 NEONATAL RESUS"
    fields:
      Front: "What is the normal respiratory rate in a neonate?"
      Back: "40 to 60 breaths per minute"
    tags: ["breathing", "vital-signs", "subject:paediatrics-neonatal"]
  - guid: "neoresus00000012"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2022 NEONATAL RESUS"
    fields:
      Front: "What interventions are indicated for a cyanotic neonate with heart rate <100 or apnoea?"
      Back: "Provide breaths using bag-mask ventilation or neopuff for 30 seconds before reassessing"
    tags: ["breathing", "ventilation", "subject:paediatrics-neonatal"]
  - guid: "neoresus00000013"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2022 NEONATAL RESUS"
    fields:
      Front: "If a neonate is still not breathing after initial intervention, what should be done?"
      Back: "Continue to assist ventilation manually"
    tags: ["breathing", "ventilation", "subject:paediatrics-neonatal"]
  - guid: "neoresus00000014"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2022 NEONATAL RESUS"
    fields:
      Front: "What is the critical consideration when providing breaths during neonatal resuscitation?"
      Back: "Provide an adequate number of breaths — do not hyper or hypoventilate. Use counting rhythm like 'breath and 2 and 3 and breathe and 2 and 3 and breathe'"
    tags: ["breathing", "ventilation", "subject:paediatrics-neonatal"]
  - guid: "neoresus00000015"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2022 NEONATAL RESUS"
    fields:
      Front: "What ventilation method is effective in most neonates?"
      Back: "Bag-mask ventilation"
    tags: ["breathing", "ventilation", "subject:paediatrics-neonatal"]
  - guid: "neoresus00000016"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2022 NEONATAL RESUS"
    fields:
      Front: "What is the important precaution when using an ambu-bag for neonatal ventilation?"
      Back: "Do NOT hold down the pop-up valve, as increased pressures lead to higher risk of air leak syndromes"
    tags: ["breathing", "ventilation", "subject:paediatrics-neonatal"]
  - guid: "neoresus00000017"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2022 NEONATAL RESUS"
    fields:
      Front: "When may intubation be considered during neonatal resuscitation?"
      Back: "If ongoing resuscitation is necessary"
    tags: ["breathing", "intubation", "subject:paediatrics-neonatal"]
  - guid: "neoresus00000018"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2022 NEONATAL RESUS"
    fields:
      Front: "What is the normal heart rate range in a neonate?"
      Back: "120–160 beats per minute"
    tags: ["circulation", "vital-signs", "subject:paediatrics-neonatal"]
  - guid: "neoresus00000019"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2022 NEONATAL RESUS"
    fields:
      Front: "How should the heart rate be assessed during neonatal resuscitation?"
      Back: "By palpating either the brachial or femoral pulse"
    tags: ["circulation", "assessment", "subject:paediatrics-neonatal"]
  - guid: "neoresus0000001a"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2022 NEONATAL RESUS"
    fields:
      Front: "At what heart rate threshold should chest compressions be initiated in a neonate?"
      Back: "Heart rate less than 60 bpm"
    tags: ["circulation", "chest-compressions", "subject:paediatrics-neonatal"]
  - guid: "neoresus0000001b"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2022 NEONATAL RESUS"
    fields:
      Front: "Describe the hand technique for neonatal chest compressions."
      Back: "2 hands encircling the chest with thumbs in front"
    tags: ["circulation", "chest-compressions", "technique", "subject:paediatrics-neonatal"]
  - guid: "neoresus0000001c"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2022 NEONATAL RESUS"
    fields:
      Front: "Where should the thumbs be positioned during neonatal chest compressions?"
      Back: "On the sternum in the midline along the nipple line"
    tags: ["circulation", "chest-compressions", "technique", "subject:paediatrics-neonatal"]
  - guid: "neoresus0000001d"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2022 NEONATAL RESUS"
    fields:
      Front: "What is the correct depth for neonatal chest compressions?"
      Back: "At least 1/3 of the chest circumference"
    tags: ["circulation", "chest-compressions", "technique", "subject:paediatrics-neonatal"]
  - guid: "neoresus0000001e"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2022 NEONATAL RESUS"
    fields:
      Front: "What is the compression-to-breath ratio for neonatal chest compressions?"
      Back: "3:1 — 3 chest compressions to 1 breath"
    tags: ["circulation", "chest-compressions", "ratio", "subject:paediatrics-neonatal"]
  - guid: "neoresus0000001f"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2022 NEONATAL RESUS"
    fields:
      Front: "How should the rate of chest compressions be determined?"
      Back: "Match the normal heart rate as closely as possible, with compressions coordinated with breaths"
    tags: ["circulation", "chest-compressions", "rate", "subject:paediatrics-neonatal"]
  - guid: "neoresus00000020"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2022 NEONATAL RESUS"
    fields:
      Front: "When should the heart rate be reassessed during neonatal resuscitation?"
      Back: "After 30 seconds"
    tags: ["circulation", "chest-compressions", "reassessment", "subject:paediatrics-neonatal"]
  - guid: "neoresus00000021"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2022 NEONATAL RESUS"
    fields:
      Front: "If heart rate remains <60 bpm after 30 seconds of chest compressions, what is the next step?"
      Back: "Give necessary drugs (adrenaline)"
    tags: ["circulation", "medication", "subject:paediatrics-neonatal"]
  - guid: "neoresus00000022"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2022 NEONATAL RESUS"
    fields:
      Front: "Why is intravenous access essential during neonatal resuscitation?"
      Back: "For fluid administration and medication delivery"
    tags: ["circulation", "vascular-access", "subject:paediatrics-neonatal"]
  - guid: "neoresus00000023"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2022 NEONATAL RESUS"
    fields:
      Front: "What is the alternative to peripheral IV access if not easily available?"
      Back: "Insert an umbilical venous catheter"
    tags: ["circulation", "vascular-access", "subject:paediatrics-neonatal"]
  - guid: "neoresus00000024"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2022 NEONATAL RESUS"
    fields:
      Front: "When is adrenaline indicated during neonatal resuscitation?"
      Back: "If baby remains bradycardic after 30 seconds of chest compressions"
    tags: ["medication", "adrenaline", "subject:paediatrics-neonatal"]
  - guid: "neoresus00000025"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2022 NEONATAL RESUS"
    fields:
      Front: "What is the concentration of adrenaline used in neonatal resuscitation?"
      Back: "1:10 000 solution"
    tags: ["medication", "adrenaline", "concentration", "subject:paediatrics-neonatal"]
  - guid: "neoresus00000026"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2022 NEONATAL RESUS"
    fields:
      Front: "How is adrenaline 1:10 000 prepared for neonatal resuscitation?"
      Back: "Mix 1 ml adrenaline with 9 ml saline"
    tags: ["medication", "adrenaline", "preparation", "subject:paediatrics-neonatal"]
  - guid: "neoresus00000027"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2022 NEONATAL RESUS"
    fields:
      Front: "What is the dose of adrenaline for neonatal resuscitation?"
      Back: "0.01 mg/kg intravenously"
    tags: ["medication", "adrenaline", "dose", "subject:paediatrics-neonatal"]
  - guid: "neoresus00000028"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2022 NEONATAL RESUS"
    fields:
      Front: "What is the dosing interval for adrenaline in neonatal resuscitation?"
      Back: "May be repeated every 3 to 5 minutes"
    tags: ["medication", "adrenaline", "dosing-interval", "subject:paediatrics-neonatal"]
  - guid: "neoresus00000029"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2022 NEONATAL RESUS"
    fields:
      Front: "When should dextrose be given during neonatal resuscitation?"
      Back: "If the baby is hypoglycaemic — correct the hypoglycaemia"
    tags: ["medication", "dextrose", "hypoglycaemia", "subject:paediatrics-neonatal"]
  - guid: "neoresus0000002a"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2022 NEONATAL RESUS"
    fields:
      Front: "Is sodium bicarbonate routinely used in neonatal resuscitation?"
      Back: "No, sodium bicarbonate is NOT used routinely in the resuscitation of a newborn"
    tags: ["medication", "sodium-bicarbonate", "contraindication", "subject:paediatrics-neonatal"]
  - guid: "neoresus0000002b"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2022 NEONATAL RESUS"
    fields:
      Front: "If a neonate responds well at any stage during resuscitation, what is the next step?"
      Back: "Baby will still need admission for observations for at least 24 hours"
    tags: ["outcomes", "post-resuscitation-care", "subject:paediatrics-neonatal"]
  - guid: "neoresus0000002c"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2022 NEONATAL RESUS"
    fields:
      Front: "What is the likely outcome if a neonate shows some response with signs of life?"
      Back: "May need admission into ICU/high care for ongoing support — intubation and ventilation, inotropes"
    tags: ["outcomes", "post-resuscitation-care", "subject:paediatrics-neonatal"]
  - guid: "neoresus0000002d"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2022 NEONATAL RESUS"
    fields:
      Front: "What is the outcome if a neonate shows no response during resuscitation?"
      Back: "Death"
    tags: ["outcomes", "subject:paediatrics-neonatal"]
  - guid: "neoresus0000002e"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2022 NEONATAL RESUS"
    fields:
      Front: "Who should be consulted before stopping neonatal resuscitation?"
      Back: "A senior clinician — discussion with senior before stopping any resus"
    tags: ["outcomes", "discontinuation", "teamwork", "subject:paediatrics-neonatal"]
  - guid: "neoresus0000002f"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2022 NEONATAL RESUS"
    fields:
      Front: "After how long without a heart rate should resuscitation be stopped?"
      Back: "After 10 minutes if no heart rate is present"
    tags: ["outcomes", "discontinuation", "timepoint", "subject:paediatrics-neonatal"]
  - guid: "neoresus00000030"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2022 NEONATAL RESUS"
    fields:
      Front: "After how long without spontaneous breathing should resuscitation be stopped?"
      Back: "After 20 minutes with no spontaneous breathing"
    tags: ["outcomes", "discontinuation", "timepoint", "subject:paediatrics-neonatal"]
  - guid: "neoresus00000031"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2022 NEONATAL RESUS"
    fields:
      Front: "How should gasping be differentiated from breathing during neonatal resuscitation?"
      Back: "Gasping is usually a terminal sign and should be differentiated from actual breathing"
    tags: ["outcomes", "assessment", "breathing-patterns", "subject:paediatrics-neonatal"]
