# SRS Cards: Diagnosis & Classification Of Diabetes Mellitus - Pages 11-14
# Topic: Diabetic Nephropathy, Retinopathy, and Neuropathy
# Source: CMED4IIM1 - 2026

cards:
  - id: diabetes-comp-001
    front: "What are the causes of renal involvement in diabetes besides diabetic nephropathy?"
    back: "Infections (pyelonephritis), atherosclerosis causing renal vascular disease, nephrotoxic drugs (amikacin), and radio contrast injury"
  - id: diabetes-comp-002
    front: "What is the percentage of diabetic patients who may develop proteinuria unrelated to diabetes?"
    back: "3 to 8% of diabetic patients may develop proteinuria that is not related to diabetes"
  - id: diabetes-comp-003
    front: "What clinical findings indicate the need for renal biopsy in a diabetic patient?"
    back: "Microscopic hematuria, sudden onset of proteinuria or nephrotic syndrome, red cell casts in urine, rapid decline in renal function, short duration type 1 diabetes (<5 years), or absence of retinopathy"
  - id: diabetes-comp-004
    front: "Define established diabetic nephropathy in terms of proteinuria quantification"
    back: "Persistent proteinuria where urine protein excretion is dipstick detectable (>500 mg or 0.5g per day) or urine albumin excretion >300 mg/day, or >200 micrograms/minute on timed specimen"
  - id: diabetes-comp-005
    front: "What is microalbuminuria and what is its definition in diabetic nephropathy?"
    back: "Also called incipient diabetic nephropathy; albumin excretion rate between 30-300 mg/day over 24 hours, or 20-200 micrograms/minute on timed sample (e.g., 12-hour overnight)"
  - id: diabetes-comp-006
    front: "What percentage of type 1 diabetics develop glomerulosclerosis after 10 years, and what percentage develop diabetic nephropathy clinically?"
    back: "Glomerulosclerosis develops in >90% of type 1 diabetes after 10 years, but diabetic nephropathy (with persistent proteinuria, renal decline, hypertension, retinopathy) only develops in 35-40%"
  - id: diabetes-comp-007
    front: "Name the 5 stages of diabetic nephropathy and their timeframes"
    back: "Stage 1: Glomerular hyperfiltration (onset, 2-3 years); Stage 2: Silent stage; Stage 3: Incipient nephropathy/microalbuminuria (>5 years); Stage 4: Established/overt nephropathy; Stage 5: End-stage renal failure (20+ years)"
  - id: diabetes-comp-008
    front: "At which stage of diabetic nephropathy does urine albumin excretion become abnormal?"
    back: "Only at stage 3 (incipient nephropathy); persistent proteinuria appears from stage 4 onward"
  - id: diabetes-comp-009
    front: "Describe the pattern of GFR changes across the 5 stages of diabetic nephropathy"
    back: "GFR is increased in stages 1-3 (hyperfiltration through incipient stage), starts decreasing at onset of persistent proteinuria (stage 4), and continues declining with serum creatinine rising in stage 5"
  - id: diabetes-comp-010
    front: "When does hypertension typically manifest in diabetic nephropathy?"
    back: "Blood pressure is still normal in stage 3; hypertension develops only when overt nephropathy appears (stage 4) and persists into stage 5"
  - id: diabetes-comp-011
    front: "When does retinopathy appear in diabetic nephropathy?"
    back: "Retinopathy starts developing only after the onset of established nephropathy (stage 4); nothing appears up to stage 3"
  - id: diabetes-comp-012
    front: "What is the rate of decline of GFR once established nephropathy develops?"
    back: "GFR declines at approximately 1 mL/min per month (12 mL/min per year); untreated patients progress to end-stage renal disease in about 7 years from onset"
  - id: diabetes-comp-013
    front: "What is the clinical importance of early detection of incipient nephropathy?"
    back: "Early treatment of incipient nephropathy prevents and delays the onset of overt nephropathy and end-stage renal failure; treatment after overt nephropathy develops prevents or decreases progression to ESRD"
  - id: diabetes-comp-014
    front: "List the methods for detecting diabetic nephropathy clinically"
    back: "Blood pressure elevation (especially in type 1), urine albumin excretion (micro vs. persistent), GFR measurement (eGFR, creatinine clearance, isotope), serum/urine creatinine, diminishing insulin requirements, recurrent hypoglycemia in insulin-treated patients"
  - id: diabetes-comp-015
    front: "What are the CKD stages based on GFR according to the transcript?"
    back: "Stage 1: GFR >90; Stage 2: 60-89; Stage 3: 45-59; Stage 3b: 30-44; Stage 4: 15-29 (severely diminished); Stage 5: <15 or dialysis-requiring (kidney failure)"
  - id: diabetes-comp-016
    front: "What are the management goals for diabetic nephropathy?"
    back: "Prevent or delay renal disease progression, improve clinical outcomes, prolong survival, decrease mortality, delay time to dialysis or renal transplant"
  - id: diabetes-comp-017
    front: "Which factor is more important for preventing progression to ESRD in established nephropathy: glycemic control or hypertension control?"
    back: "Hypertension control is more important than glycemic control for preventing progression to ESRD once overt nephropathy develops"
  - id: diabetes-comp-018
    front: "What dietary protein restriction is recommended in diabetic nephropathy management?"
    back: "0.8 to 1.0 g/kg body weight per day"
  - id: diabetes-comp-019
    front: "What serum creatinine level triggers assessment for chronic renal program?"
    back: "Serum creatinine ≥500 micromoles/L (or at lower levels like 250 micromoles/L in some settings); GFR <20 mL/min also triggers referral"
  - id: diabetes-comp-020
    front: "Which antidiabetic agents are contraindicated in renal impairment?"
    back: "Metformin is contraindicated if GFR <70 mL/min; sulfonylureas (long-acting like glibenclamide) are contraindicated, but short-acting agents like gliclazide can be used until GFR <30 mL/min when all oral agents stop"
  - id: diabetes-comp-021
    front: "What drugs are first-line for hypertension and proteinuria in diabetic nephropathy?"
    back: "ACE inhibitors or, if side effects (cough), angiotensin receptor blockers (ARBs); can also use calcium antagonists, loop diuretics, alpha blockers, or beta blockers"
  - id: diabetes-comp-022
    front: "At what level of renal dysfunction are ACE inhibitors/ARBs used?"
    back: "For persistent albuminuria (micro or overt), whether normal, elevated, or reduced kidney function; even when creatinine >133 micromoles/L"
  - id: diabetes-comp-023
    front: "Describe the eye involvement in diabetes beyond retinopathy"
    back: "Cataracts (posterior subcapsular or snowflake), neuropathies (optic neuropathy, papillopathy, ocular nerve palsies of CN III, IV, VI, VII), autonomic pupillary dysfunction, and other retino-vascular diseases (arterial/venous occlusions), vitreous disease (hemorrhage, asteroidosis)"
  - id: diabetes-comp-024
    front: "What are the 3 categories of diabetic retinopathy classification?"
    back: "Background retinopathy, pre-proliferative retinopathy, and proliferative retinopathy"
  - id: diabetes-comp-025
    front: "What are the hallmark lesions of background diabetic retinopathy?"
    back: "Microaneurysms, dot and blot hemorrhages, hard exudates"
  - id: diabetes-comp-026
    front: "What are the features of pre-proliferative retinopathy?"
    back: "Venous anomalies (beading, looping, duplication), intraretinal microvascular abnormalities (IRMAs), cotton wool spots (>5), deep round hemorrhages"
  - id: diabetes-comp-027
    front: "What characterizes proliferative diabetic retinopathy?"
    back: "New vessel formation/neovascularization at the disc (NVD) or elsewhere (NVE); these fragile vessels hemorrhage leading to preretinal/subhyaloid hemorrhages, vitreous hemorrhage, fibrosis, retinal detachment, or iris involvement causing rubeosis iridis and glaucoma"
  - id: diabetes-comp-028
    front: "What is maculopathy and how is it identified clinically?"
    back: "Macular edema and hard exudates at the macula; identified by asking patient to look directly into ophthalmoscope (reaches macula) or by dilating eye and looking lateral to disc; presents as macular edema or macular star pattern"
  - id: diabetes-comp-029
    front: "What are the management options for diabetic retinopathy?"
    back: "Glycemic control, blood pressure control, lipid control; specific treatments include laser photocoagulation for high-risk proliferative retinopathy or severe nonproliferative retinopathy with macular edema; vitrectomy and cataract extraction for complicated cases"
  - id: diabetes-comp-030
    front: "What are the 3 types of diabetic neuropathy?"
    back: "Hypoglycemic neuropathy (reversible), symmetrical polyneuropathy (acute painful or chronic sensory/motor/autonomic), focal and multifocal neuropathies (cranial nerve palsies, carpal tunnel, proximal motor neuropathy/diabetic amyotrophy, thoracoabdominal)"
  - id: diabetes-comp-031
    front: "What is hypoglycemic neuropathy and is it reversible?"
    back: "Reversible reduction in nerve conduction with transient sensory symptoms occurring with hypoglycemic episodes"
  - id: diabetes-comp-032
    front: "Describe acute symmetrical polyneuropathy in diabetes"
    back: "Painful neuropathy often presenting with burning feet, especially at night; reversible with glycemic control"
  - id: diabetes-comp-033
    front: "What is chronic symmetrical polyneuropathy in diabetes?"
    back: "Can be purely sensory, sensorimotor, or autonomic; typically irreversible"
  - id: diabetes-comp-034
    front: "List the focal and multifocal neuropathies in diabetes"
    back: "Entrapment neuropathies (carpal tunnel), cranial nerve palsies (CN III, IV, VI, VII), proximal motor neuropathy (diabetic amyotrophy), thoracoabdominal neuropathy"
  - id: diabetes-comp-035
    front: "What are the common symptoms of peripheral diabetic neuropathy?"
    back: "Paresthesias, pain, sensory loss, burning feet; first sensation lost is vibration sense"
  - id: diabetes-comp-036
    front: "What are the symptoms of autonomic diabetic neuropathy?"
    back: "Gastroparesis, hyperhidrosis, anhidrosis, nocturnal diarrhea, erectile dysfunction, postural hypotension, GI bloating, hypoglycemia unawareness, cardiac/vascular effects, bladder problems"
  - id: diabetes-comp-037
    front: "How is peripheral diabetic neuropathy examined clinically?"
    back: "Testing touch with monofilament and reflexes; documenting vibration sense loss (first to be involved); for autonomic neuropathy, test postural hypotension and fixed tachycardia"
  - id: diabetes-comp-038
    front: "What special tests are used to diagnose diabetic neuropathy?"
    back: "Biothesiometer, cardiovascular reflex response, nerve conduction studies, nerve biopsy"
  - id: diabetes-comp-039
    front: "What tests assess autonomic neuropathy in diabetes?"
    back: "Heart rate variation during deep breathing, heart rate increase on standing, change during Valsalva maneuver, postural fall in systolic blood pressure"
  - id: diabetes-comp-040
    front: "What pharmacological agents are used for painful diabetic neuropathy?"
    back: "Tricyclic antidepressants (amitriptyline, imipramine), anticonvulsants (gabapentin, carbamazepine, pregabalin), duloxetine (serotonin-norepinephrine reuptake inhibitor), capsaicin (substance P inhibitor)"
  - id: diabetes-comp-041
    front: "How is gastroparesis managed in diabetic autonomic neuropathy?"
    back: "Dietary changes and prokinetics such as metoclopramide or domperidone"
  - id: diabetes-comp-042
    front: "What are the treatment options for erectile dysfunction in diabetic neuropathy?"
    back: "Phosphodiesterase type 5 inhibitors (sildenafil/Viagra), prostaglandins (intracorporeal or urethral), vacuum devices, penile prosthesis"
  - id: diabetes-comp-043
    front: "How is gastric hyperhidrosis managed in diabetic autonomic neuropathy?"
    back: "Glycopyrrolate or topical aluminum preparations"
  - id: diabetes-comp-044
    front: "What is the recommended follow-up schedule for diabetic complications screening?"
    back: "At each visit: assess symptoms, measure weight/waist, BMI, blood pressure, urine dipstick for protein, self-monitoring blood glucose; every 3 months (or 6 if difficult); annual review for chronic complications; more frequently if problems arise"
  - id: diabetes-comp-045
    front: "What vital parameters and measurements should be recorded at each diabetes visit?"
    back: "Weight, waist circumference, BMI, blood pressure, urine protein on dipstick, self-monitored blood glucose"
