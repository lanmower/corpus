  - guid: a1f7c3d2e5b8a4f9
    noteType: Basic
    deck: "Corpus::Paediatrics::Medical Professionalism"
    fields:
      Front: "What is medical professionalism according to the World Medical Association?"
      Back: "Medical professionalism describes the skills, attitudes, values and behaviours common to those undertaking the practice of medicine. It includes concepts such as the maintenance of competence for a unique body of knowledge and skill set, personal integrity, altruism, adherence to ethical codes of conduct, accountability, a dedication to self-regulation, and the exercise of discretionary judgment."
    tags: ["professionalism", "ethics", "definition", "subject:paediatrics"]

  - guid: 7e2b4f8c9a6d1e3b
    noteType: Basic
    deck: "Corpus::Paediatrics::Medical Professionalism"
    fields:
      Front: "What is the social contract between medicine and society?"
      Back: "Professionalism is the moral understanding among medical practitioners that gives reality to the social contract between medicine and society. This contract grants the medical profession a monopoly over the use of its knowledge base, the right to considerable autonomy in practice and the privilege of self-regulation."
    tags: ["professionalism", "ethics", "social-contract", "subject:paediatrics"]

  - guid: 5c8a2e7b9f1d4a6c
    noteType: Basic
    deck: "Corpus::Paediatrics::Medical Professionalism"
    fields:
      Front: "What is HPCSA requirement (a) for health practitioners?"
      Back: "A practitioner shall at all times act in the best interests of his or her patients."
    tags: ["hpcsa", "ethics", "patient-care", "subject:paediatrics"]

  - guid: 9d3f6e2a7c5b8e1f
    noteType: Basic
    deck: "Corpus::Paediatrics::Medical Professionalism"
    fields:
      Front: "What is HPCSA requirement (b) for health practitioners?"
      Back: "A practitioner shall respect patient confidentiality, privacy, choices and dignity."
    tags: ["hpcsa", "ethics", "confidentiality", "subject:paediatrics"]

  - guid: b2e9a1f5c8d4g7k3
    noteType: Basic
    deck: "Corpus::Paediatrics::Medical Professionalism"
    fields:
      Front: "What is HPCSA requirement (c) for health practitioners?"
      Back: "A practitioner shall maintain the highest standards of personal conduct and integrity."
    tags: ["hpcsa", "ethics", "integrity", "subject:paediatrics"]

  - guid: 4f7c2e9b5a8d1f3h
    noteType: Basic
    deck: "Corpus::Paediatrics::Medical Professionalism"
    fields:
      Front: "What is HPCSA requirement (d) for health practitioners?"
      Back: "A practitioner shall provide adequate information about the patient's diagnosis, treatment options and alternatives, costs associated with each such alternative and any other pertinent information to enable the patient to exercise a choice in terms of treatment and informed decision-making pertaining to his or her health and that of others."
    tags: ["hpcsa", "ethics", "informed-consent", "subject:paediatrics"]

  - guid: e6a1d8c3f5b2g9k4
    noteType: Basic
    deck: "Corpus::Paediatrics::Medical Professionalism"
    fields:
      Front: "What is HPCSA requirement (e) for health practitioners?"
      Back: "A practitioner shall keep his or her professional knowledge and skills up to date."
    tags: ["hpcsa", "ethics", "continuing-education", "subject:paediatrics"]

  - guid: 8b3f4c7a2e9d5f1g
    noteType: Basic
    deck: "Corpus::Paediatrics::Medical Professionalism"
    fields:
      Front: "What is HPCSA requirement (f) for health practitioners?"
      Back: "A practitioner shall maintain proper and effective communication with his or her patients and other professionals."
    tags: ["hpcsa", "ethics", "communication", "subject:paediatrics"]

  - guid: 2d5e8a1c6f9b7g3h
    noteType: Basic
    deck: "Corpus::Paediatrics::Medical Professionalism"
    fields:
      Front: "What is HPCSA requirement (g) for health practitioners?"
      Back: "Except in an emergency, a practitioner shall obtain informed consent from a patient or, in the event that the patient is unable to provide consent for treatment, from his or her next of kin."
    tags: ["hpcsa", "ethics", "informed-consent", "subject:paediatrics"]

