      Front: "Define hyponatraemia"
      Back: "Serum sodium <125 mmol/ℓ"
    tags: ["hyponatraemia", "sodium", "subject:paediatrics-neonatal"]
  - guid: "hyponatrem002abc"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::NEONATAL JAUNDICE"
    fields:
      Front: "Explain the pathophysiology of hyponatraemia"
      Back: "Water is drawn into brain cells → central nervous system injury"
    tags: ["hyponatraemia", "pathophysiology", "subject:paediatrics-neonatal"]
  - guid: "hyponatrem003abc"
