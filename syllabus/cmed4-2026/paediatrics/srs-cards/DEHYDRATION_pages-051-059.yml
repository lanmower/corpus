    deck: "Corpus::Paediatrics::DEHYDRATION"
    fields:
      Front: "What is the summary of management for severe dehydration?"
      Back: "Treat shock if present. Give oral fluids and if ineffective proceed to IV fluids. Once severe dehydration has been corrected, give maintenance fluids by oral route if possible, or IV if not tolerated. Check glucose in a child with severe malnutrition."
    tags: ["dehydration", "summary", "management", "subject:paediatrics"]
  - guid: u1v2w3x4y5z6a7b8
    noteType: Basic
    deck: "Corpus::Paediatrics::DEHYDRATION"
    fields:
      Front: "Case 1: Child 7.3 kg with severe dehydration, no malnutrition, needs ORS via NG/oral every 15 minutes. What is the dose?"
      Back: "Plan A: 5 ml/kg per 15 minutes = 5 x 7.3 = 36.5 ml per 15 minutes (use weight band = 40 ml/15 min). Reassess in 1-2 hours for improvement."
    tags: ["dehydration", "dosing", "calculation", "case-study", "subject:paediatrics"]
  - guid: v2w3x4y5z6a7b8c9
    noteType: Basic
    deck: "Corpus::Paediatrics::DEHYDRATION"
    fields:
      Front: "Case 2: Child 7.3 kg with severe dehydration, no malnutrition, oral rehydration fails. What is the IV dose and drip rates?"
      Back: "Plan B: 20 ml/kg/hour x 4 hours = 20 x 7.3 = 146 ml/hr (weight band 160 ml/hr). Using 60 drops/ml dropper: 146-160 drops per minute. Using 15 drops/ml dropper: 34-40 drops per minute."
    tags: ["dehydration", "iv-fluids", "drip-rate", "calculation", "case-study", "subject:paediatrics"]
  - guid: w3x4y5z6a7b8c9d0
