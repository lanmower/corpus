notes:
  - guid: 52d823f11d41a990
    noteType: Basic
    deck: "Corpus::Nephrology::Kidney Replacement Therapy"
    fields:
      Front: "What is the annual cost of teaching a dialysis patient in the country?"
      Back: "Approximately half a million per patient per year"
    tags: ["subject:nephrology"]
  - guid: 26e133bdc10819ff
    noteType: Basic
    deck: "Corpus::Nephrology::Kidney Replacement Therapy"
    fields:
      Front: "How many patients in the case study require dialysis every year?"
      Back: "Approximately 5,000 to 10,000 patients per year, with potential to double by end of decade"
    tags: ["subject:nephrology"]
  - guid: b156ae18344b6ec4
    noteType: Basic
    deck: "Corpus::Nephrology::Kidney Replacement Therapy"
    fields:
      Front: "What are the three types of kidney replacement therapies?"
      Back: "Hemodialysis (machine-based), peritoneal dialysis (patient self-managed), and kidney transplantation"
    tags: ["subject:nephrology"]
  - guid: 685d599eaae3f696
    noteType: Basic
    deck: "Corpus::Nephrology::Kidney Replacement Therapy"
    fields:
      Front: "What is the principle of dialysis in hemodialysis machines?"
      Back: "Blood flows through a dialyzer with dialysis fluid running counter-current. Uremic toxins move across a membrane from blood to dialysate, while high potassium and phosphate move out and excessive water is removed"
    tags: ["subject:nephrology"]
  - guid: d25e9d89948990e3
    noteType: Basic
    deck: "Corpus::Nephrology::Kidney Replacement Therapy"
    fields:
      Front: "How does diffusion rate relate to solution temperature and molecular viscosity?"
      Back: "Diffusion is proportional to solution temperature and inversely proportional to viscosity and size of the molecule being dialyzed"
    tags: ["subject:nephrology"]
  - guid: 62b3685598395909
    noteType: Basic
    deck: "Corpus::Nephrology::Kidney Replacement Therapy"
    fields:
      Front: "What type of solutes are dialyzed - protein-bound or free?"
      Back: "Only the free fraction is dialyzed; protein-bound solids in blood are not dialyzed"
    tags: ["subject:nephrology"]
  - guid: 1f0af73aaff7aa95
    noteType: Basic
    deck: "Corpus::Nephrology::Kidney Replacement Therapy"
    fields:
      Front: "What are indications for dialysis in acute kidney injury?"
      Back: "Acute fluid overload with pulmonary edema, refractory metabolic acidosis (bicarb <10), severe hyperkalemia (>6.5), uremic encephalopathy with seizures/confusion, uremic pericarditis, or need to remove toxins like methanol/ethylene glycol"
    tags: ["subject:nephrology"]
  - guid: 8342f64a8759923a
    noteType: Basic
    deck: "Corpus::Nephrology::Kidney Replacement Therapy"
    fields:
      Front: "What are indications for dialysis in chronic kidney disease?"
      Back: "Similar to acute indications, plus long-standing malaise, nausea, vomiting, weight loss, malnutrition, and GFR persistently <15"
    tags: ["subject:nephrology"]
  - guid: 716134556f4c14b7
    noteType: Basic
    deck: "Corpus::Nephrology::Kidney Replacement Therapy"
    fields:
      Front: "How long does a hemodialysis session last and what percentage of kidney function does it replace?"
      Back: "Each session lasts about 4 hours and provides about 5% of normal kidney function (GFR approximately 5 mL/min)"
    tags: ["subject:nephrology"]
  - guid: 4be3a1bf0869deb7
    noteType: Basic
    deck: "Corpus::Nephrology::Kidney Replacement Therapy"
    fields:
      Front: "What types of vascular access can be used for hemodialysis?"
      Back: "Hemodialysis catheter, permanent tunneled catheter, venous fistulas, and synthetic grafts - all inserted into large veins"
    tags: ["subject:nephrology"]
  - guid: 3e121d64f1d15e57
    noteType: Basic
    deck: "Corpus::Nephrology::Kidney Replacement Therapy"
    fields:
      Front: "What is the procedure for peritoneal dialysis?"
      Back: "High glucose concentration solutions are infused through a catheter into the abdomen. After 4-6 hours, effluent drains through gravity into a bag. Patient performs approximately 4 exchanges daily continuously"
    tags: ["subject:nephrology"]
  - guid: f76cee3d93435227
    noteType: Basic
    deck: "Corpus::Nephrology::Kidney Replacement Therapy"
    fields:
      Front: "What are the principles underlying peritoneal dialysis?"
      Back: "Diffusion of high concentration solutes across peritoneal membrane, osmosis, and ultrafiltration - all occurring at a slower rate than hemodialysis"
    tags: ["subject:nephrology"]
  - guid: e9abc7910f82518c
    noteType: Basic
    deck: "Corpus::Nephrology::Kidney Replacement Therapy"
    fields:
      Front: "What are the advantages of peritoneal dialysis?"
      Back: "Residual kidney function preserved longer than hemodialysis, ability to pass urine maintained, more readily available, not limited by machine availability, patients spend less time in hospital, greater patient empowerment"
    tags: ["subject:nephrology"]
  - guid: 66af7a1525dab963
    noteType: Basic
    deck: "Corpus::Nephrology::Kidney Replacement Therapy"
    fields:
      Front: "When was the first kidney transplant performed and by whom?"
      Back: "First performed in 1954 by Joseph Murray and colleagues; they won the Nobel Prize for it in 1990"
    tags: ["subject:nephrology"]
  - guid: 7c2f6fead30754ae
    noteType: Basic
    deck: "Corpus::Nephrology::Kidney Replacement Therapy"
    fields:
      Front: "What is the five-year survival rate for kidney transplants in the UK?"
      Back: "Approximately 87%"
    tags: ["subject:nephrology"]
  - guid: ef1d5fd038710a5b
    noteType: Basic
    deck: "Corpus::Nephrology::Kidney Replacement Therapy"
    fields:
      Front: "What are the sources of donor kidneys for transplantation?"
      Back: "Live-related donor (primary relative), live unrelated donor (friend or acquaintance), or cadaveric donor (brain dead with organs harvested)"
    tags: ["subject:nephrology"]
  - guid: 95b9df991bad9c4e
    noteType: Basic
    deck: "Corpus::Nephrology::Kidney Replacement Therapy"
    fields:
      Front: "What are the benefits of kidney transplantation compared to dialysis?"
      Back: "Better patient survival, prevents metabolic consequences of CKD (uremia, vitamin D disorders, immunometabolism changes), significantly improves quality of life for patient and family, and is far cheaper after the first year"
    tags: ["subject:nephrology"]
  - guid: 96839d5eac51c0e9
    noteType: Basic
    deck: "Corpus::Nephrology::Kidney Replacement Therapy"
    fields:
      Front: "What assessments are required before kidney transplantation?"
      Back: "Clinical suitability evaluation, cross-matching with donor and recipient, assessment of viral status, planning for immunosuppression post-transplant, and monitoring for infections and linked diseases"
    tags: ["subject:nephrology"]
  - guid: 4d509a2c972fc3bb
    noteType: Basic
    deck: "Corpus::Nephrology::Kidney Replacement Therapy"
    fields:
      Front: "How is a kidney positioned after transplantation?"
      Back: "The kidney is placed in extraperitoneal position with blood vessels and ureter attached to native kidneys allowing urine to drain into the bladder"
    tags: ["subject:nephrology"]
  - guid: b565424a4fc3ee4c
    noteType: Basic
    deck: "Corpus::Nephrology::Kidney Replacement Therapy"
    fields:
      Front: "How many dialysis and transplantation centers exist in South Africa according to 2017 data?"
      Back: "Approximately 278 centers total, with only 30 in the public sector"
    tags: ["subject:nephrology"]
  - guid: bb8086a25addf466
    noteType: Basic
    deck: "Corpus::Nephrology::Kidney Replacement Therapy"
    fields:
      Front: "What is the number of patients on kidney replacement therapy in South Africa and the per-million population ratio?"
      Back: "Just over 10,000 patients on kidney replacement therapy with a per-million population ratio of 190 (very low)"
    tags: ["subject:nephrology"]
  - guid: e957c1cbfb99e664
    noteType: Basic
    deck: "Corpus::Nephrology::Kidney Replacement Therapy"
    fields:
      Front: "What percentage of South African kidney replacement therapy patients are on hemodialysis?"
      Back: "71% of patients are on hemodialysis"
    tags: ["subject:nephrology"]
  - guid: 6a7bd6271407cf04
    noteType: Basic
    deck: "Corpus::Nephrology::Kidney Replacement Therapy"
    fields:
      Front: "How many kidney transplants were performed in South Africa in 2017?"
      Back: "Approximately 260 kidney transplants, majority performed in the private sector"
    tags: ["subject:nephrology"]
  - guid: 4d4c6d014e594dc3
    noteType: Basic
    deck: "Corpus::Nephrology::Kidney Replacement Therapy"
    fields:
      Front: "What is the most effective way to prevent the need for renal replacement therapy?"
      Back: "Prevent patients from developing end-stage kidney disease by managing risk factors, recognizing causes (diabetes, hypertension, infections), treating them adequately, and recognizing congenital diseases"
    tags: ["subject:nephrology"]
  - guid: 6e2393fe591089de
    noteType: Basic
    deck: "Corpus::Nephrology::Kidney Replacement Therapy"
    fields:
      Front: "What is palliative supportive care for end-stage kidney disease?"
      Back: "Management for patients who cannot benefit from dialysis or transplantation due to exclusion criteria: managing blood pressure, treating anemia, correcting hypocalcemia, providing symptom control, and referring to palliative care structures"
    tags: ["subject:nephrology"]
  - guid: ae18ad6e63a81d9a
    noteType: Basic
    deck: "Corpus::Nephrology::Kidney Replacement Therapy"
    fields:
      Front: "Can patients on palliative supportive care for end-stage kidney disease live longer than those on dialysis?"
      Back: "Yes, in many instances patients on supportive care live longer than those initiated on dialysis"
    tags: ["subject:nephrology"]
