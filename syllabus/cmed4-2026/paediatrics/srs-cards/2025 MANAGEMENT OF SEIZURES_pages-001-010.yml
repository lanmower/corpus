    deck: "Corpus::Paediatrics::2025 MANAGEMENT OF SEIZURES"
    fields:
      Front: "List the four seizure classification terms promulgated in the 1981 ILAE classification."
      Back: "Simple partial, complex partial, generalized, and unclassifiable (ILAE, 1981)"
    tags: ["subject:paediatrics", "seizures", "classification-history", "ilae-1981"]
  - guid: g3j9n2o1i0k4l6m5
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 MANAGEMENT OF SEIZURES"
    fields:
      Front: "What was the ILAE decision in 2010 regarding seizure classification?"
      Back: "The ILAE decided to maintain the 1981 classification of seizures with minor changes, following extensive discussions at the beginning of the 21st century (Berg and Scheffer, 2011; Engel, 2001, 2006)."
    tags: ["subject:paediatrics", "seizures", "classification-history", "ilae-2010"]
  - guid: h4k0o3p2j1l5m7n6
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 MANAGEMENT OF SEIZURES"
    fields:
      Front: "When were epilepsy classifications partially updated and what years?"
      Back: "Partially updated in 1985/1989 (ILAE, 1985, 1989), and then again in 2010 (Berg et al., 2010; Berg and Scheffer, 2011), with the 2010 revision being an intermediate stage aiming towards a final accepted epilepsy classification."
    tags: ["subject:paediatrics", "seizures", "classification-history", "epilepsy-classification"]
