    fields:
      Front: "List all post-seizure management steps."
      Back: "1. Recheck A-B-C (Airway, Breathing, Circulation); 2. Monitor for further seizures; 3. Treat for infection; 4. Recheck blood glucose; 5. Provide after-care"
    tags: ["post-seizure-management", "seizure-follow-up", "subject:paediatrics"]
