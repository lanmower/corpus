    fields:
      Front: "Well controlled asthma criteria?"
      Back: "Well controlled asthma: none of these in past week: daytime asthma symptoms more than twice per week, night-time awakening due to asthma, reliever (SABA) use more than twice per week, limitation of activity."
    tags: ["asthma", "control", "well-controlled", "subject:paediatrics"]
  - guid: "z2e3d4c5b6a7a8e9"
    noteType: Basic
    deck: "Corpus::Paediatrics::ASTHMA 2021 CONSENSUS GUIDELINE"
    fields:
      Front: "Partly controlled asthma criteria?"
      Back: "Partly controlled asthma: 1-2 of these in past week: daytime asthma symptoms more than twice per week, night-time awakening due to asthma, reliever (SABA) use more than twice per week, limitation of activity."
    tags: ["asthma", "control", "partly-controlled", "subject:paediatrics"]
  - guid: "a3f4e5d6c7b8a9e0"
    noteType: Basic
    deck: "Corpus::Paediatrics::ASTHMA 2021 CONSENSUS GUIDELINE"
    fields:
      Front: "Uncontrolled asthma criteria?"
      Back: "Uncontrolled asthma: 3-4 of these in past week: daytime asthma symptoms more than twice per week, night-time awakening due to asthma, reliever (SABA) use more than twice per week, limitation of activity."
    tags: ["asthma", "control", "uncontrolled", "subject:paediatrics"]
  - guid: "b4g5f6e7d8c9a0e1"
    noteType: Basic
    deck: "Corpus::Paediatrics::ASTHMA 2021 CONSENSUS GUIDELINE"
    fields:
      Front: "What is metered-dose inhaler with spacer?"
      Back: "MDI with spacer is the most common asthma pump. Spacers are simple holding chambers with or without a valve. Medication is suspended within the spacer and then breathed in, enhancing lung deposition."
    tags: ["asthma", "device", "mdi", "spacer", "subject:paediatrics"]
  - guid: "c5h6g7f8e9d0a1e2"
    noteType: Basic
    deck: "Corpus::Paediatrics::ASTHMA 2021 CONSENSUS GUIDELINE"
    fields:
      Front: "Simple spacer construction recommendation?"
      Back: "A very effective spacer device can be constructed out of a 500 mL plastic cold-drink bottle. A hole large enough to take the mouthpiece of an MDI is cut (or burnt) in the bottom end of the bottle to form a simple low-cost non-valved spacer."
    tags: ["asthma", "device", "spacer", "construction", "subject:paediatrics"]
  - guid: "d6i7h8g9f0e1a2e3"
    noteType: Basic
    deck: "Corpus::Paediatrics::ASTHMA 2021 CONSENSUS GUIDELINE"
    fields:
      Front: "Spacer use recommendation?"
      Back: "A spacer is recommended for all children and adults with difficult-to-control asthma."
    tags: ["asthma", "device", "spacer", "recommendation", "subject:paediatrics"]
  - guid: "e7j8i9h0g1f2a3e4"
    noteType: Basic
    deck: "Corpus::Paediatrics::ASTHMA 2021 CONSENSUS GUIDELINE"
    fields:
      Front: "Home nebulisers recommendation?"
      Back: "Home nebulisers are not recommended for asthma management."
    tags: ["asthma", "device", "nebuliser", "subject:paediatrics"]
  - guid: "f8k9j0i1h2g3a4e5"
    noteType: Basic
    deck: "Corpus::Paediatrics::ASTHMA 2021 CONSENSUS GUIDELINE"
    fields:
      Front: "Dry-powder inhalers suitability?"
      Back: "Dry-powder inhalers (DPIs) are easy to use, but are only suitable for older children and adults because of the inspiratory flow required for their actuation. Measurements of peak inspiratory flow can be done with appropriate devices to assess suitability of DPIs."
    tags: ["asthma", "device", "dpi", "subject:paediatrics"]
  - guid: "g9l0k1j2i3h4a5e6"
    noteType: Basic
    deck: "Corpus::Paediatrics::ASTHMA 2021 CONSENSUS GUIDELINE"
    fields:
      Front: "Asthma control definition?"
      Back: "Asthma control is the extent to which the effects of asthma can be seen in a patient or have been reduced or removed by treatment. Evaluation includes symptom control (frequency of symptoms, reliever medication use, activity limitation over past week and month) and future risk (exacerbations, medication side-effects, lung function loss)."
    tags: ["asthma", "control", "definition", "subject:paediatrics"]
  - guid: "h0m1l2k3j4i5a6e7"
    noteType: Basic
    deck: "Corpus::Paediatrics::ASTHMA 2021 CONSENSUS GUIDELINE"
    fields:
      Front: "Asthma control assessment interval?"
      Back: "After initiation of treatment, it is essential to assess asthma control at every follow-up visit, no less than 6-monthly, and to adjust treatment accordingly."
    tags: ["asthma", "control", "assessment", "frequency", "subject:paediatrics"]
  - guid: "i1n2m3l4k5j6a7e8"
    noteType: Basic
    deck: "Corpus::Paediatrics::ASTHMA 2021 CONSENSUS GUIDELINE"
    fields:
      Front: "Viral infection prevention distance?"
      Back: "Keep a distance from others (social distancing, approximately 1 metre)."
    tags: ["asthma", "prevention", "viral", "distance", "subject:paediatrics"]
  - guid: "j2o3n4m5l6k7a8e9"
    noteType: Basic
    deck: "Corpus::Paediatrics::ASTHMA 2021 CONSENSUS GUIDELINE"
    fields:
      Front: "Hand washing duration for infection prevention?"
      Back: "Wash your hands often for 20-30 seconds, always after coughing or sneezing."
    tags: ["asthma", "prevention", "hand-washing", "subject:paediatrics"]
  - guid: "k3p4o5n6m7l8a9e0"
    noteType: Basic
    deck: "Corpus::Paediatrics::ASTHMA 2021 CONSENSUS GUIDELINE"
    fields:
      Front: "Mask wearing for asthma patients?"
      Back: "Mask-wearing to protect people from coronavirus in public spaces is recommended by the World Health Organization (WHO) and endorsed for asthma patients. There is no evidence to suggest that mask-wearing is deleterious to people with asthma."
    tags: ["asthma", "prevention", "mask", "subject:paediatrics"]
  - guid: "l4q5p6o7n8m9a0e1"
    noteType: Basic
    deck: "Corpus::Paediatrics::ASTHMA 2021 CONSENSUS GUIDELINE"
    fields:
      Front: "ICS adherence in children percentage?"
      Back: "Treatment adherence to asthma treatment in the paediatric population is poor, with studies reporting only one-third of children using ICS therapy appropriately."
    tags: ["asthma", "adherence", "ics", "subject:paediatrics"]
  - guid: "m5r6q7p8o9n0a1e2"
    noteType: Basic
    deck: "Corpus::Paediatrics::ASTHMA 2021 CONSENSUS GUIDELINE"
    fields:
      Front: "Adherence barrier types?"
      Back: "Barriers to adherence may be intentional (driven by illness perceptions or medication beliefs, leading to patients and caregivers deliberately choosing not to follow treatment recommendations) or unintentional (related to family routines and socioeconomic factors)."
    tags: ["asthma", "adherence", "barriers", "subject:paediatrics"]
  - guid: "n6s7r8q9p0o1a2e3"
    noteType: Basic
    deck: "Corpus::Paediatrics::ASTHMA 2021 CONSENSUS GUIDELINE"
    fields:
      Front: "Asthma comorbidities improving control?"
      Back: "Identification and treatment of associated comorbidities may improve asthma control: rhinitis or sinusitis, obesity, gastro-oesophageal reflux disease (GORD), allergic bronchopulmonary aspergillosis (ABPA)."
    tags: ["asthma", "comorbidities", "control", "subject:paediatrics"]
  - guid: "o7t8s9r0q1p2a3e4"
    noteType: Basic
    deck: "Corpus::Paediatrics::ASTHMA 2021 CONSENSUS GUIDELINE"
    fields:
      Front: "Treatment review after initiation?"
      Back: "Review asthma control in 4-6 weeks after starting treatment. Assess asthma control and step up or step down treatment, depending on level of control."
    tags: ["asthma", "treatment", "review", "timing", "subject:paediatrics"]
  - guid: "p8u9t0s1r2q3a4e5"
    noteType: Basic
    deck: "Corpus::Paediatrics::ASTHMA 2021 CONSENSUS GUIDELINE"
    fields:
      Front: "ICS-formoterol 2021 guideline change?"
      Back: "In children aged ≥6 years with moderate to severe persistent asthma, ICS-formoterol in a single inhaler is recommended as daily controller and reliever therapy compared with either higher-dose ICS as daily controller therapy and SABA for quick-relief or same-dose ICS-LABA as daily controller therapy and SABA for quick-relief therapy."
    tags: ["asthma", "guideline-change", "2021", "ics-formoterol", "subject:paediatrics"]
  - guid: "q9v0u1t2s3r4a5e6"
    noteType: Basic
    deck: "Corpus::Paediatrics::ASTHMA 2021 CONSENSUS GUIDELINE"
    fields:
      Front: "ICS course during RTI children <6?"
      Back: "In children <6 years of age with recurrent wheezing triggered by respiratory tract infections and no wheezing between infections, start a short course (7-10 days) of daily ICS at the onset of a respiratory tract infection with an as-needed short-acting beta-2 agonist (SABA)."
    tags: ["asthma", "guideline-change", "2021", "rti", "under-6-years", "subject:paediatrics"]
  - guid: "r0w1v2u3t4s5a6e7"
    noteType: Basic
    deck: "Corpus::Paediatrics::ASTHMA 2021 CONSENSUS GUIDELINE"
    fields:
      Front: "ICS treatment 6-11 years guideline?"
      Back: "In children 6-11 years of age, recommend as-needed SABA and a short course (7-10 days) of ICS at the start of an upper-respiratory tract infection or daily low-dose ICS."
    tags: ["asthma", "guideline-change", "2021", "ics", "6-11-years", "subject:paediatrics"]
