  - guid: k3l4m5n6o7p8q9r0
    noteType: "Basic"
    deck: "Corpus::Paediatrics::EPILEPSY"
    fields:
      Front: "Describe STEP 3 in Status Epilepticus management."
      Back: "BENZODIAZEPINE REPEAT: If seizures do not stop after another 10 minutes, or if they reappear within 1 hour, repeat the benzodiazepine as given in STEP 2."
    tags: ["epilepsy", "status-epilepticus", "step-3", "benzodiazepine-repeat", "subject:paediatrics"]

  - guid: l4m5n6o7p8q9r0s1
    noteType: "Basic"
    deck: "Corpus::Paediatrics::EPILEPSY"
    fields:
      Front: "What is STEP 4a in Status Epilepticus management?"
      Back: "PHENYTOIN: Give PHENYTOIN 20 mg/kg in 5 ml/kg of normal saline over 30 minutes if seizures continue after 10 minutes and patient is not already on oral phenytoin. Monitor for cardiac arrhythmias, hypotension, and bradycardia; stop infusion and contact PICU if these occur."
    tags: ["epilepsy", "status-epilepticus", "step-4a", "phenytoin", "subject:paediatrics"]

  - guid: m5n6o7p8q9r0s1t2
    noteType: "Basic"
    deck: "Corpus::Paediatrics::EPILEPSY"
    fields:
      Front: "What dose of Phenytoin is used in Status Epilepticus?"
      Back: "20 mg/kg in 5 ml/kg of normal saline, given intravenously over 30 minutes."
    tags: ["epilepsy", "status-epilepticus", "phenytoin", "dosing", "subject:paediatrics"]

  - guid: n6o7p8q9r0s1t2u3
    noteType: "Basic"
    deck: "Corpus::Paediatrics::EPILEPSY"
    fields:
      Front: "What monitoring is required during Phenytoin infusion in Status Epilepticus?"
      Back: "Monitor for cardiac arrhythmias, hypotension, and bradycardia. If these occur, stop the infusion and contact PICU."
    tags: ["epilepsy", "status-epilepticus", "phenytoin", "monitoring", "subject:paediatrics"]

  - guid: o7p8q9r0s1t2u3v4
    noteType: "Basic"
    deck: "Corpus::Paediatrics::EPILEPSY"
    fields:
      Front: "What is the next step if a child is already on oral phenytoin when Status Epilepticus occurs?"
      Back: "Omit phenytoin and move to phenobarbitone (STEP 4b)."
    tags: ["epilepsy", "status-epilepticus", "phenytoin", "phenobarbitone", "subject:paediatrics"]

  - guid: p8q9r0s1t2u3v4w5
    noteType: "Basic"
    deck: "Corpus::Paediatrics::EPILEPSY"
    fields:
      Front: "Describe STEP 4b in Status Epilepticus management."
      Back: "PHENOBARBITONE IV/IO: Drug of choice in children <2 years and in patients already on phenytoin. If seizures do not stop after 10 minutes, give PHENOBARBITONE 20 mg/kg IV/IO over 5-10 minutes."
    tags: ["epilepsy", "status-epilepticus", "step-4b", "phenobarbitone", "subject:paediatrics"]

  - guid: q9r0s1t2u3v4w5x6
