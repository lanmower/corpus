  - guid: a8e2c7f1b5d9g3h6
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 POISONING"
    fields:
      Front: "What is the ABC approach to organophosphate poisoning management?"
      Back: |
        ABC refers to the initial management of organophosphate poisoning: Airway management, Breathing support, and Circulation control. Bradycardia, bronchorrhea, and bronchospasm are treated with atropine.
    tags: ["organophosphates", "management", "treatment", "subject:paediatrics"]

  - guid: b9f3d8g2c6e0h4i7
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 POISONING"
    fields:
      Front: "What are the three respiratory symptoms of organophosphate poisoning that require atropine?"
      Back: |
        Bradycardia, bronchorrhea (excessive bronchial secretions), and bronchospasm are the three respiratory symptoms of organophosphate poisoning requiring atropine treatment.
    tags: ["organophosphates", "signs", "atropine", "subject:paediatrics"]

  - guid: c0g4e9h3d7f1i5j8
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 POISONING"
    fields:
      Front: "How should atropine be administered in organophosphate poisoning?"
      Back: |
        Atropine is given as a test dose, followed by repeat doses. Thereafter, follow up with continuous infusion.
    tags: ["organophosphates", "atropine", "dosing", "subject:paediatrics"]

  - guid: d1h5f0i4e8g2j6k9
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 POISONING"
    fields:
      Front: "Why should atropine never be stopped abruptly in organophosphate poisoning?"
      Back: |
        Atropine should never be stopped abruptly because symptoms will recur. Instead, wean atropine gradually over 24 hours.
    tags: ["organophosphates", "atropine", "discontinuation", "subject:paediatrics"]

  - guid: e2i6g1j5f9h3k7l0
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 POISONING"
    fields:
      Front: "What complication should be watched for during atropine treatment of organophosphate poisoning?"
      Back: |
        Seizures should be watched for during atropine treatment of organophosphate poisoning and treated accordingly.
    tags: ["organophosphates", "atropine", "complications", "subject:paediatrics"]

  - guid: f3j7h2k6g0i4l8m1
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 POISONING"
    fields:
      Front: "What is the main limitation of atropine in organophosphate poisoning treatment?"
      Back: |
        Atropine has no effect on the paralysis caused by organophosphate poisoning.
    tags: ["organophosphates", "atropine", "limitations", "subject:paediatrics"]

  - guid: g4k8i3l7h1j5m9n2
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 POISONING"
    fields:
      Front: "What is pralidoxime and how does it work in organophosphate poisoning?"
      Back: |
        Pralidoxime is a cholinesterase reactivator used in organophosphate poisoning. It must be given within 48 hours of exposure to be effective.
    tags: ["organophosphates", "pralidoxime", "treatment", "subject:paediatrics"]

  - guid: h5l9j4m8i2k6n0o3
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 POISONING"
    fields:
      Front: "What is salicylate poisoning?"
      Back: |
        Salicylate poisoning results from aspirin (acetylsalicylic acid) or other salicylate-containing compound overdose.
    tags: ["salicylate", "aspirin", "poisoning", "subject:paediatrics"]

  - guid: i6m0k5n9j3l7o1p4
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 POISONING"
    fields:
      Front: "Describe Phase 1 of salicylate poisoning."
      Back: |
        Phase 1 of salicylate poisoning is characterized by hyperventilation due to direct stimulation of the respiratory centre, causing respiratory alkalosis with compensatory alkaluria (potassium and bicarbonate are lost). Phase 1 lasts as long as 12 hours.
    tags: ["salicylate", "phases", "pathophysiology", "subject:paediatrics"]

  - guid: j7n1l6o0k4m8p2q5
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 POISONING"
    fields:
      Front: "Describe Phase 2 of salicylate poisoning."
      Back: |
        Phase 2 of salicylate poisoning is characterized by paradoxic aciduria when sufficient potassium is lost. Phase 2 occurs hours to 24 hours after ingestion.
    tags: ["salicylate", "phases", "pathophysiology", "subject:paediatrics"]

  - guid: k8o2m7p1l5n9q3r6
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 POISONING"
    fields:
      Front: "Describe Phase 3 of salicylate poisoning."
      Back: |
        Phase 3 of salicylate poisoning is characterized by dehydration, hypokalaemia, and high anion gap metabolic acidosis. Phase 3 occurs 4–6 hours after ingestion in children.
    tags: ["salicylate", "phases", "pathophysiology", "subject:paediatrics"]

  - guid: l9p3n8q2m6o0r4s7
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 POISONING"
    fields:
      Front: "What are the neurological symptoms as salicylate toxicity progresses?"
      Back: |
        As salicylate toxicity progresses, neurological symptoms include agitation, delirium, hallucinations, convulsions, lethargy, and stupor.
    tags: ["salicylate", "symptoms", "toxicity", "subject:paediatrics"]

  - guid: m0q4o9r3n7p1s5t8
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 POISONING"
    fields:
      Front: "What is hyperthermia in severe salicylate poisoning?"
      Back: |
        Hyperthermia (elevated body temperature) occurs in severe salicylate toxicity.
    tags: ["salicylate", "symptoms", "toxicity", "subject:paediatrics"]

  - guid: n1r5p0s4o8q2t6u9
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 POISONING"
    fields:
      Front: "What metabolic complication occurs in salicylate poisoning?"
      Back: |
        Hypoglycaemia (low blood glucose) can occur as a metabolic complication in salicylate poisoning.
    tags: ["salicylate", "complications", "metabolism", "subject:paediatrics"]

  - guid: o2s6q1t5p9r3u7v0
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 POISONING"
    fields:
      Front: "How is dehydration involved in salicylate poisoning?"
      Back: |
        Dehydration occurs as part of the progression of salicylate poisoning, particularly in Phase 3.
    tags: ["salicylate", "complications", "fluid-balance", "subject:paediatrics"]

  - guid: p3t7r2u6q0s4v8w1
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 POISONING"
    fields:
      Front: "What does multiple organ involvement in salicylate poisoning refer to?"
      Back: |
        Multiple organ involvement in salicylate poisoning refers to systemic effects affecting multiple body systems including respiratory, CNS, renal, and metabolic systems as toxicity progresses.
    tags: ["salicylate", "complications", "systemic", "subject:paediatrics"]

  - guid: q4u8s3v7r1t5w9x2
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 POISONING"
    fields:
      Front: "What is iron poisoning?"
      Back: |
        Iron poisoning results from overdose of iron supplements or iron-containing products, causing toxicity to multiple organ systems.
    tags: ["iron", "poisoning", "introduction", "subject:paediatrics"]
