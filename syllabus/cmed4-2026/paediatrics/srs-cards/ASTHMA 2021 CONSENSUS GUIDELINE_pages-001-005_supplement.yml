    fields:
      Front: "What environmental factors should asthmatic children avoid?"
      Back: "Asthmatic children should avoid environmental tobacco smoke and other indoor air pollutants, and exposure should be controlled for indoor allergens such as house-dust mites, pets, cockroach, and mould."
    tags: ["asthma", "trigger-avoidance", "environment", "subject:paediatrics"]
