  - guid: c1b08d7451120cdf
    noteType: Basic
    deck: "Corpus::Gastroenterology::An Approach To Ascites"
    fields:
      Front: "What is ascites?"
      Back: "Ascites is defined as the pathologic accumulation of fluid within the peritoneal cavity. It is important to distinguish ascites from other causes of abdominal swelling, which can be remembered by the acronym 'six ifs': fluid, fat, flatus, fetus, feces, and fatal growth."
    tags: ["ascites", "definition", "diagnosis", "subject:gastroenterology"]
  - guid: daeefd0890b5f959
    noteType: Basic
    deck: "Corpus::Gastroenterology::An Approach To Ascites"
    fields:
      Front: "What is the most common cause of ascites?"
      Back: "Portal hypertension related to liver cirrhosis is the most common cause of ascites, accounting for 75-80% of cases. The mechanism is increased hydrostatic pressure or venous hypertension."
    tags: ["ascites", "etiology", "portal-hypertension", "subject:gastroenterology"]
  - guid: 63c1f6fbe12b2365
    noteType: Basic
    deck: "Corpus::Gastroenterology::An Approach To Ascites"
    fields:
      Front: "What are the major pathophysiologic mechanisms for ascites formation?"
      Back: "Four main mechanisms: (1) Increased hydrostatic pressure from portal hypertension (cirrhosis, hepatic vein thrombosis, IVC obstruction, constrictive pericarditis, congestive heart failure); (2) Decreased colloidal osmotic pressure (nephrotic syndrome, malnutrition, protein-losing enteropathy); (3) Increased permeability from peritoneal disease (tuberculosis peritonitis, bacterial peritonitis, malignancy metastases); (4) Leakage of fluid from organs (biliary leak, pancreatic ascites, chylous ascites, urinary ascites)."
    tags: ["ascites", "pathophysiology", "mechanisms", "subject:gastroenterology"]
  - guid: aa6acc534d857e8e
    noteType: Basic
    deck: "Corpus::Gastroenterology::An Approach To Ascites"
    fields:
      Front: "How is ascites graded by severity?"
      Back: "Ascites is graded as: Grade 1 - detectable only by ultrasound examination; Grade 2 - moderate symmetrical distension of the abdomen manifested clinically; Grade 3 - marked abdominal distension with large volume of gross ascites."
    tags: ["ascites", "classification", "severity", "subject:gastroenterology"]
  - guid: 7ee867227a4d7c42
    noteType: Basic
    deck: "Corpus::Gastroenterology::An Approach To Ascites"
    fields:
      Front: "What is the difference between complicated and uncomplicated ascites?"
      Back: "Uncomplicated ascites is fluid in the abdomen that is not infected and not associated with complications like hepatorenal syndrome. Refractory ascites is ascites that does not disappear even after satisfactory medical treatment and large volume paracentesis. Diuretic-resistant ascites means the patient has no response to intensive diuretic therapy or develops intolerable side effects."
    tags: ["ascites", "classification", "complications", "subject:gastroenterology"]
  - guid: f149a25fcc804ebe
    noteType: Basic
    deck: "Corpus::Gastroenterology::An Approach To Ascites"
    fields:
      Front: "What are the clinical symptoms of ascites?"
      Back: "Patients with small amounts of fluid (Grade 1) are usually asymptomatic. As ascites progresses, patients develop abdominal distension, discomfort, anorexia, nausea, and heartburn. Tension ascites can cause respiratory symptoms due to compression on the diaphragm and lungs, presenting as dyspnea and respiratory distress. Early satiety occurs due to pressure effects from increasing fluid."
    tags: ["ascites", "symptoms", "presentation", "subject:gastroenterology"]
  - guid: c415bb217a9d61ad
    noteType: Basic
    deck: "Corpus::Gastroenterology::An Approach To Ascites"
    fields:
      Front: "What are the clinical signs of ascites?"
      Back: "Specific signs of ascites include: inverted umbilicus, bulging of the flanks, shifting dullness, and fluid thrill on percussion. Note: absence of dullness does not exclude ascites in early cases. Associated signs depend on etiology - cirrhosis signs include jaundice, gynecomastia, clubbing, pedal edema, palmar erythema with spider telangiectasia, and splenic enlargement."
    tags: ["ascites", "physical-examination", "signs", "subject:gastroenterology"]
  - guid: 0cd6b5e3aa77d81c
    noteType: Basic
    deck: "Corpus::Gastroenterology::An Approach To Ascites"
    fields:
      Front: "What complications of ascites should be examined for?"
      Back: "Complications include umbilical hernia due to pressure effects and weakening of abdominal muscles, and hepatic hydrothorax where fluid tracks into the lungs, causing plural effusion (usually on the right side) with profound dyspnea."
    tags: ["ascites", "complications", "examination", "subject:gastroenterology"]
  - guid: f9492f94c6285922
    noteType: Basic
    deck: "Corpus::Gastroenterology::An Approach To Ascites"
    fields:
      Front: "What imaging modality is preferred to confirm ascites?"
      Back: "Ultrasound is the imaging modality of choice to confirm the presence of ascites. It is cost-effective, can provide information about possible etiology, assess the liver, evaluate the portal venous system, and is essential for guiding paracentesis safely. Chest radiographs are useful when complications like hepatic hydrothorax are suspected."
    tags: ["ascites", "investigation", "ultrasound", "subject:gastroenterology"]
  - guid: 9c0f28d726f64b5c
    noteType: Basic
    deck: "Corpus::Gastroenterology::An Approach To Ascites"
    fields:
      Front: "Why is paracentesis important in ascites evaluation?"
      Back: "Abdominal paracentesis is of paramount importance because it provides both therapeutic benefit (especially for tense ascites or refractory ascites) and diagnostic information. Samples should be sent for macroscopic appearance, cell count, microscopy, culture, albumin levels, and serum ascitic albumin gradient (SAG) calculation. At bedside, if bacterial peritonitis is suspected, 10 mL of fluid should be inoculated into both aerobic and anaerobic blood culture bottles before antibiotics are given."
    tags: ["ascites", "paracentesis", "diagnostic-procedure", "subject:gastroenterology"]
  - guid: cedcf09aa4f271a9
    noteType: Basic
    deck: "Corpus::Gastroenterology::An Approach To Ascites"
    fields:
      Front: "What does the macroscopic appearance of ascitic fluid indicate?"
      Back: "Clear fluid indicates uncomplicated ascites. Turbid/cloudy fluid may indicate spontaneous bacterial peritonitis (SBP). Milky fluid indicates chylous ascites (from lymphatic vessel damage with elevated triglycerides). Bloody fluid may indicate traumatic tap or malignancy. Brown fluid may indicate bile leak from biliary tree perforation. Black fluid is rare and seen with malignant melanoma."
    tags: ["ascites", "paracentesis", "fluid-analysis", "subject:gastroenterology"]
  - guid: 49822418e185e638
    noteType: Basic
    deck: "Corpus::Gastroenterology::An Approach To Ascites"
    fields:
      Front: "What is the serum ascitic albumin gradient (SAG) and how is it calculated?"
      Back: "The SAG is calculated by subtracting ascitic albumin from serum albumin. SAG is the most useful test to distinguish causes of ascites. A high SAG (≥1.1 g/dL or ≥11 g/L) indicates portal hypertension in most cases. A low SAG (<1.1 g/dL or <11 g/L) suggests other causes like tuberculosis, serositis, nephrotic syndrome, or peritoneal metastases. The SAG should always be ordered when ascitic fluid is obtained."
    tags: ["ascites", "serum-gradient", "diagnostic-test", "subject:gastroenterology"]
  - guid: 50730c9dd7ce46ae
    noteType: Basic
    deck: "Corpus::Gastroenterology::An Approach To Ascites"
    fields:
      Front: "What is spontaneous bacterial peritonitis (SBP) and how is it diagnosed?"
      Back: "SBP is a complication of ascites, usually in cirrhosis patients, caused by translocation of gut bacteria into the peritoneal space. Patients present with pain and worsening ascites. Diagnosis requires: neutrophil cell count >250 cells/mm³ on fluid analysis. Cultures may grow E. coli, Klebsiella, or Streptococcus (common gastrointestinal bacteria). Fluid should be inoculated into blood culture bottles at bedside before antibiotics are administered."
    tags: ["ascites", "spontaneous-bacterial-peritonitis", "complications", "subject:gastroenterology"]
  - guid: ae5038246ffd0a17
    noteType: Basic
    deck: "Corpus::Gastroenterology::An Approach To Ascites"
    fields:
      Front: "What does lymphocyte-predominant ascitic fluid indicate?"
      Back: "Lymphocyte-predominant fluid may indicate tuberculosis peritonitis or peritoneal carcinomatosis from metastatic cancer. The adenosine deaminase (ADA) level is a useful test - if ADA is elevated above 10 (typically >30 in TB), it has >90% sensitivity for TB peritonitis and helps distinguish between TB and other causes of low-gradient ascites with lymphocyte predominance."
    tags: ["ascites", "cell-count", "tuberculosis", "subject:gastroenterology"]
  - guid: 18a9593e811f2a30
    noteType: Basic
    deck: "Corpus::Gastroenterology::An Approach To Ascites"
    fields:
      Front: "What is the pathophysiology of ascites in cirrhosis and portal hypertension?"
      Back: "In cirrhosis, hepatic architecture is distorted with increased hepatic vascular tone, causing portal hypertension. This activates vasodilation mechanisms mediated by nitric oxide overproduction, which dilates splanchnic and peripheral vessels. This causes underfilling of the systemic arterial space and triggers baroreceptor activation, increasing renin-angiotensin-aldosterone system (RAAS) and antidiuretic hormone (ADH) release. Sodium and water retention develops, leading to ascites. Simultaneously, splanchnic vasodilation increases lymph production, which exceeds transport capacity and leaks into the peritoneal cavity."
    tags: ["ascites", "pathophysiology", "cirrhosis", "subject:gastroenterology"]
  - guid: e059be13ece39d2e
    noteType: Basic
    deck: "Corpus::Gastroenterology::An Approach To Ascites"
    fields:
      Front: "What is the first step in managing ascites?"
      Back: "The first step is to diagnose the underlying cause of ascites, as treatment should target the etiology. For TB peritonitis, TB treatment is needed. For malignancy, chemotherapy may help. For heart failure, diuretics are required. For portal hypertension from cirrhosis, treatment aims to minimize ascites formation since cirrhosis cannot be reversed."
    tags: ["ascites", "management", "etiology", "subject:gastroenterology"]
  - guid: 57e4605de920214d
    noteType: Basic
    deck: "Corpus::Gastroenterology::An Approach To Ascites"
    fields:
      Front: "What dietary modifications are used in ascites management?"
      Back: "Sodium restriction is the cornerstone of dietary management for ascites due to portal hypertension. Patients should be restricted to approximately 2 grams of sodium per day. This requires patient counseling and dietitian involvement, as sodium is found in table salt, processed foods, and various food additives."
    tags: ["ascites", "management", "diet", "subject:gastroenterology"]
  - guid: 9a19c32b47b45f8d
    noteType: Basic
    deck: "Corpus::Gastroenterology::An Approach To Ascites"
    fields:
      Front: "What is spironolactone and why is it used in ascites?"
      Back: "Spironolactone is an aldosterone antagonist used as first-line diuretic therapy for ascites. It blocks the renin-angiotensin-aldosterone system by inhibiting sodium reabsorption in the renal collecting duct, thus promoting sodium and water excretion. Starting dose is 100 mg daily, titrated up to a maximum of 400 mg daily. Side effects include fluctuations in potassium, sodium, and creatinine (requiring electrolyte/renal function monitoring), muscle cramps, and gynecomatia (even with early/long-term use)."
    tags: ["ascites", "management", "spironolactone", "subject:gastroenterology"]
  - guid: fe105ff1d96e5361
    noteType: Basic
    deck: "Corpus::Gastroenterology::An Approach To Ascites"
    fields:
      Front: "What is furosemide and how is it used in ascites management?"
      Back: "Furosemide is a loop diuretic used as second-line or adjunct therapy for ascites. Starting dose is approximately 40 mg daily, titrated up to a maximum of 160 mg daily. It must be used cautiously as high doses can cause significant electrolyte abnormalities. Close monitoring of electrolytes is essential."
    tags: ["ascites", "management", "furosemide", "subject:gastroenterology"]
  - guid: 4b3147738fd7626b
    noteType: Basic
    deck: "Corpus::Gastroenterology::An Approach To Ascites"
    fields:
      Front: "What are the principles of diuretic dose adjustment in ascites?"
      Back: "Once ascites mobilizes and clinically improves (no longer apparent), diuretic doses should be titrated down to the maximum tolerated dose that maintains symptom control. Patients should not be kept on high doses for prolonged periods once improved. Daily weight monitoring helps assess treatment response. Aim for 0.5 kg weight loss per day if ascites alone is present, or up to 1 kg per day if peripheral edema is also present."
    tags: ["ascites", "management", "monitoring", "subject:gastroenterology"]
  - guid: 41718807f160b6a7
    noteType: Basic
    deck: "Corpus::Gastroenterology::An Approach To Ascites"
    fields:
      Front: "When is large volume paracentesis indicated?"
      Back: "Large volume paracentesis is indicated for: (1) Tense ascites causing respiratory compromise - to relieve dyspnea and respiratory distress; (2) Refractory ascites that fails to respond to medical management. Large volume paracentesis becomes part of the treatment strategy for refractory ascites."
    tags: ["ascites", "paracentesis", "indications", "subject:gastroenterology"]
  - guid: 782235f801b73e95
    noteType: Basic
    deck: "Corpus::Gastroenterology::An Approach To Ascites"
    fields:
      Front: "What precautions must be taken during large volume paracentesis?"
      Back: "To prevent hemodynamic disturbances and renal impairment during fluid removal, intravenous albumin infusion should be administered to provide intravascular volume replacement. Specifically, 8 grams of albumin should be given for each liter of fluid drained, especially when removing fluid volumes exceeding 5 liters."
    tags: ["ascites", "paracentesis", "albumin-replacement", "subject:gastroenterology"]
  - guid: 915d69c3c25497f0
    noteType: Basic
    deck: "Corpus::Gastroenterology::An Approach To Ascites"
    fields:
      Front: "What is TIPS and how does it work in refractory ascites?"
      Back: "TIPS (Transjugular Intrahepatic Portosystemic Shunt) is an intervention for refractory ascites when patients fail medical therapy including large volume paracentesis. A shunt is placed between the portal vein and hepatic vein, providing an escape route for fluid from the portal system into the venous system, thereby reducing portal pressures and complications including ascites. A concern is precipitation of hepatic encephalopathy, though newer covered stents have reduced this complication compared to older stents."
    tags: ["ascites", "refractory-ascites", "TIPS", "subject:gastroenterology"]
  - guid: 1041cd5ccc57343f
    noteType: Basic
    deck: "Corpus::Gastroenterology::An Approach To Ascites"
    fields:
      Front: "What is the role of liver transplantation in ascites management?"
      Back: "Liver transplantation should always be considered in patients with cirrhosis failing to respond to ascites management. Such patients should be referred to the appropriate liver transplant center."
    tags: ["ascites", "refractory-ascites", "transplantation", "subject:gastroenterology"]
  - guid: 7ef1c9fd0b93dbed
    noteType: Basic
    deck: "Corpus::Gastroenterology::An Approach To Ascites"
    fields:
      Front: "What are the key points to remember about ascites classification?"
      Back: "The terms 'exudate' and 'transudate' are not used for ascitic fluid analysis (unlike pleural fluid analysis). Instead, ascites is classified based on the serum ascitic albumin gradient to determine etiology. Understanding the grading system (Grade 1, 2, 3) and classification (complicated vs uncomplicated) is important for clinical management."
    tags: ["ascites", "classification", "terminology", "subject:gastroenterology"]
  - guid: 9e39d19233012487
    noteType: Basic
    deck: "Corpus::Gastroenterology::An Approach To Ascites"
    fields:
      Front: "What is the take-home message about ascites epidemiology and management?"
      Back: "Remember: (1) 75-80% of ascites is due to portal hypertension; (2) The initial diagnostic test is the serum ascitic albumin gradient; (3) High SAG indicates portal hypertension; (4) Multiple treatment options exist ranging from sodium restriction and diuretics to large volume paracentesis and TIPS in refractory cases; (5) Always consider the underlying etiology when managing ascites."
    tags: ["ascites", "epidemiology", "management-summary", "subject:gastroenterology"]
