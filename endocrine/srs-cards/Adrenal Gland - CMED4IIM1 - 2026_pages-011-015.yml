deck: "Corpus::Endocrine::Adrenal Gland"
notes:
  - guid: b62b6ed1fe10d7a9
    noteType: Basic
    deck: "Corpus::Endocrine::Adrenal Gland"
    fields:
      Front: "What is the diagnostic approach using the overnight low-dose dexamethasone suppression test?"
      Back: "Give 1 mg dexamethasone at night and measure serum cortisol the next morning. Normal suppression is >50% of baseline cortisol."
    tags: ["subject:endocrine"]
  - guid: 1b462e0824ef10dc
    noteType: Basic
    deck: "Corpus::Endocrine::Adrenal Gland"
    fields:
      Front: "How does the high-dose overnight dexamethasone test work?"
      Back: "Give 8 mg dexamethasone at night and measure serum cortisol the next day. >68% suppression indicates pituitary cause; <68% suggests ectopic ACTH."
    tags: ["subject:endocrine"]
  - guid: e356dd4699d522e7
    noteType: Basic
    deck: "Corpus::Endocrine::Adrenal Gland"
    fields:
      Front: "What is the purpose of the ACTH and cortisol response to CRF or DDAVP?"
      Back: "Distinguish pituitary from ectopic ACTH. Pituitary: 50% increase in ACTH, 20% increase in cortisol. Ectopic: minimal or no response."
    tags: ["subject:endocrine"]
  - guid: cfb678615b309596
    noteType: Basic
    deck: "Corpus::Endocrine::Adrenal Gland"
    fields:
      Front: "What is inferior petrosal sinus sampling and when is it used?"
      Back: "Invasive test to distinguish pituitary from ectopic ACTH. Measures central (petrosal sinus) vs peripheral ACTH. Marked gradient favors pituitary; no difference suggests ectopic."
    tags: ["subject:endocrine"]
  - guid: ab48d4741c21af3d
    noteType: Basic
    deck: "Corpus::Endocrine::Adrenal Gland"
    fields:
      Front: "How does the Metyrapone test help in Cushing's syndrome diagnosis?"
      Back: "Blocks 11-beta-hydroxylase. Pituitary cause: increased precursors and cortisol precursors. Ectopic: no reduction in cortisol or precursor increase."
    tags: ["subject:endocrine"]
  - guid: 11e30815b4834be3
    noteType: Basic
    deck: "Corpus::Endocrine::Adrenal Gland"
    fields:
      Front: "What are the treatment options for pituitary Cushing's syndrome?"
      Back: "Surgery, radiotherapy, bromocriptine, or cabergoline. If these fail, bilateral adrenalectomy may be needed but carries risk of secondary adrenal insufficiency."
    tags: ["subject:endocrine"]
  - guid: 127ec024fc67bad5
    noteType: Basic
    deck: "Corpus::Endocrine::Adrenal Gland"
    fields:
      Front: "How is adrenal Cushing's syndrome managed?"
      Back: "If adenoma: surgery. If carcinoma: surgery (if resectable), radiotherapy, mitotane, OPDDD, or enzyme blockers like aminoglutethimide."
    tags: ["subject:endocrine"]
  - guid: f9fb4bee8e5badb2
    noteType: Basic
    deck: "Corpus::Endocrine::Adrenal Gland"
    fields:
      Front: "What is medical adrenalectomy and when is it used?"
      Back: "Ketoconazole, used for ectopic ACTH Cushing's when the tumor cannot be located or is aggressive. Blocks cortisol synthesis."
    tags: ["subject:endocrine"]
  - guid: 23e08705d4eba259
    noteType: Basic
    deck: "Corpus::Endocrine::Adrenal Gland"
    fields:
      Front: "What is mifepristone and its role in Cushing's syndrome?"
      Back: "Glucocorticoid receptor blocker used for severe cortisol-induced symptoms. Not widely available."
    tags: ["subject:endocrine"]
  - guid: 934c76af2187bf45
    noteType: Basic
    deck: "Corpus::Endocrine::Adrenal Gland"
    fields:
      Front: "What is Nelson syndrome and how does it develop?"
      Back: "Enlargement of pituitary tumor with increased ACTH after bilateral adrenalectomy. Occurs when pituitary is the primary cause but was masked by high cortisol, causing hyperpigmentation and visual/cranial nerve symptoms."
    tags: ["subject:endocrine"]
  - guid: 682d654f62ccad10
    noteType: Basic
    deck: "Corpus::Endocrine::Adrenal Gland"
    fields:
      Front: "How is Nelson syndrome treated?"
      Back: "Surgery to remove the enlarged pituitary tumor or dopamine agonists (bromocriptine, analogs, pasireotide)."
    tags: ["subject:endocrine"]
  - guid: 3ed49132ad69c386
    noteType: Basic
    deck: "Corpus::Endocrine::Adrenal Gland"
    fields:
      Front: "What is the prognosis of untreated Cushing's syndrome?"
      Back: "Fatal within 5 years if untreated. Death results from cardiovascular disease, diabetes, hypertension complications, or infection."
    tags: ["subject:endocrine"]
  - guid: 4d4ba08e8d5a24c6
    noteType: Basic
    deck: "Corpus::Endocrine::Adrenal Gland"
    fields:
      Front: "What are the cure rates for treated Cushing's syndrome by cause?"
      Back: "Primary adrenal adenoma: 100% cure rate. Primary adrenal carcinoma: poor prognosis. Pituitary (Cushing's disease): 95% cure rate."
    tags: ["subject:endocrine"]
  - guid: ca93998e59834e34
    noteType: Basic
    deck: "Corpus::Endocrine::Adrenal Gland"
    fields:
      Front: "What indicates successful surgical treatment of Cushing's syndrome?"
      Back: "Serum cortisol becomes normal or low within 24 hours of successful intervention."
    tags: ["subject:endocrine"]
  - guid: d8b3d659eaab9b32
    noteType: Basic
    deck: "Corpus::Endocrine::Adrenal Gland"
    fields:
      Front: "What is primary hyperaldosteroneism?"
      Back: "Autonomous hypersecretion of aldosterone by the adrenal gland (zona glomerulosa) causing hypertension, hypokalemia, and metabolic alkalosis."
    tags: ["subject:endocrine"]
  - guid: 6eeacc5f5ab0fda3
    noteType: Basic
    deck: "Corpus::Endocrine::Adrenal Gland"
    fields:
      Front: "What are the major causes of primary hyperaldosteroneism?"
      Back: "Aldosterone-producing adenoma (Conn's syndrome): 99% of cases, usually unilateral. Idiopathic hyperaldosteroneism (bilateral adrenal hyperplasia). Rarely carcinoma or glucocorticoid-remediable hyperaldosteroneism."
    tags: ["subject:endocrine"]
  - guid: 572e5b2f2a21f42c
    noteType: Basic
    deck: "Corpus::Endocrine::Adrenal Gland"
    fields:
      Front: "Who is most commonly affected by primary hyperaldosteroneism?"
      Back: "More common in women than men. Typically age 30-50 years."
    tags: ["subject:endocrine"]
  - guid: 6e00fa9e522b9f5b
    noteType: Basic
    deck: "Corpus::Endocrine::Adrenal Gland"
    fields:
      Front: "What are the key clinical features of primary hyperaldosteroneism?"
      Back: "Hypertension (mild to severe), hypokalemia effects (muscle weakness, myopathy, tetany), polyuria, polydipsia, NO edema (escape phenomenon), nocturia."
    tags: ["subject:endocrine"]
  - guid: b3d1218ba53e5bd0
    noteType: Basic
    deck: "Corpus::Endocrine::Adrenal Gland"
    fields:
      Front: "What is the significance of finding tetany with hypertension?"
      Back: "Tetany + hypertension in untreated patient is characteristic of Conn's syndrome (primary hyperaldosteroneism), indicating severe hypokalemia."
    tags: ["subject:endocrine"]
  - guid: 98f21220a3e7250c
    noteType: Basic
    deck: "Corpus::Endocrine::Adrenal Gland"
    fields:
      Front: "Why is there no edema in primary hyperaldosteroneism?"
      Back: "Escape phenomenon occurs: initial sodium retention triggers volume expansion, which suppresses aldosterone, and natriuretic peptide is released to prevent edema."
    tags: ["subject:endocrine"]
  - guid: 58ed38eed5e3dfe2
    noteType: Basic
    deck: "Corpus::Endocrine::Adrenal Gland"
    fields:
      Front: "What renal effects occur from mineralocorticoid excess?"
      Back: "Nephrogenic diabetes insipidus (inability to concentrate urine causing polyuria/polydipsia), vacuolar nephropathy, recurrent pyelonephritis, and possible kidney damage from hypertension."
    tags: ["subject:endocrine"]
  - guid: b7db980a31495b01
    noteType: Basic
    deck: "Corpus::Endocrine::Adrenal Gland"
    fields:
      Front: "What are the basal biochemical tests for primary hyperaldosteroneism?"
      Back: "Urine electrolytes (show hypokalemic alkalosis), plasma renin (decreased), plasma aldosterone (increased, measured as concentration or activity)."
    tags: ["subject:endocrine"]
  - guid: ecd53dff53922f5c
    noteType: Basic
    deck: "Corpus::Endocrine::Adrenal Gland"
    fields:
      Front: "What provocative tests establish aldosterone non-suppressibility?"
      Back: "Saline infusion test or captopril test to confirm that aldosterone cannot be suppressed despite attempted suppression."
    tags: ["subject:endocrine"]
  - guid: 4debe5df5d609466
    noteType: Basic
    deck: "Corpus::Endocrine::Adrenal Gland"
    fields:
      Front: "What radiological investigations are used?"
      Back: "CT of adrenal glands to determine if unilateral (adenoma) or bilateral (hyperplasia). Adrenal vein sampling may also be used."
    tags: ["subject:endocrine"]
  - guid: 56b6890705f13406
    noteType: Basic
    deck: "Corpus::Endocrine::Adrenal Gland"
    fields:
      Front: "What aldosterone-to-renin ratio indicates primary hyperaldosteroneism?"
      Back: "If measuring plasma renin activity: ratio >50 with aldosterone >555 pmol/L. If measuring renin concentration: ratio >90."
    tags: ["subject:endocrine"]
  - guid: 42ba0d0242b8e83e
    noteType: Basic
    deck: "Corpus::Endocrine::Adrenal Gland"
    fields:
      Front: "How is primary hyperaldosteroneism managed?"
      Back: "Adenoma: surgical removal. Idiopathic hyperaldosteroneism (bilateral hyperplasia): poorly responsive to surgery; use mineralocorticoid antagonists (spironolactone non-selective or eplerenone selective)."
    tags: ["subject:endocrine"]
  - guid: a7a429a16becc7e9
    noteType: Basic
    deck: "Corpus::Endocrine::Adrenal Gland"
    fields:
      Front: "How do you differentiate primary from secondary hyperaldosteroneism?"
      Back: "Primary: low renin + high aldosterone + non-suppressible. Secondary (renal disease, liver, cardiac failure): both renin and aldosterone increased. Other causes: low renin + low aldosterone."
    tags: ["subject:endocrine"]
  - guid: 89145af8179b8ff7
    noteType: Basic
    deck: "Corpus::Endocrine::Adrenal Gland"
    fields:
      Front: "What is pheochromocytoma?"
      Back: "Benign or malignant tumor of chromaffin cells (adrenal medulla = pheochromocytoma; extra-adrenal sympathetic ganglia = paraganglioma) causing excessive catecholamine secretion."
    tags: ["subject:endocrine"]
  - guid: 315ccb8f4bf65110
    noteType: Basic
    deck: "Corpus::Endocrine::Adrenal Gland"
    fields:
      Front: "What percentage of secondary hypertension is caused by pheochromocytoma?"
      Back: "About 1% of secondary hypertension cases."
    tags: ["subject:endocrine"]
  - guid: 3f397f469a0f476e
    noteType: Basic
    deck: "Corpus::Endocrine::Adrenal Gland"
    fields:
      Front: "What is the difference between pheochromocytoma and paraganglioma?"
      Back: "Pheochromocytoma: adrenal medulla origin. Paraganglioma: extra-adrenal chromaffin cell origin (sympathetic ganglia). Both can be called pheochromocytoma broadly."
    tags: ["subject:endocrine"]
  - guid: 573ce33ea6223f95
    noteType: Basic
    deck: "Corpus::Endocrine::Adrenal Gland"
    fields:
      Front: "What percentage of pheochromocytomas are sporadic vs familial?"
      Back: "95% sporadic, <5% familial. Familial ones are often bilateral and associated with MEN 2A or 2B syndromes."
    tags: ["subject:endocrine"]
  - guid: 934ecc2e26716919
    noteType: Basic
    deck: "Corpus::Endocrine::Adrenal Gland"
    fields:
      Front: "What is the rule of 10s for pheochromocytoma?"
      Back: "10% extra-adrenal, 10% malignant, 10% bilateral (especially in children), 10% occur in children. Note: this rule doesn't hold universally."
    tags: ["subject:endocrine"]
  - guid: 38b635b293835a86
    noteType: Basic
    deck: "Corpus::Endocrine::Adrenal Gland"
    fields:
      Front: "What is the most common site of extra-adrenal pheochromocytoma?"
      Back: "Organs of Zuckerkandl (celiac and superior mesenteric ganglia), which lie between the inferior and superior mesenteric arteries. Other sites: thorax, bladder (~1% each), neck (<1%)."
    tags: ["subject:endocrine"]
  - guid: db29759e4cba507d
    noteType: Basic
    deck: "Corpus::Endocrine::Adrenal Gland"
    fields:
      Front: "Which genes are associated with familial pheochromocytoma?"
      Back: "RET gene (MEN 2), NF1 gene (neurofibromatosis type 1), succinate dehydrogenase (SDH) mutations, and VHL gene."
    tags: ["subject:endocrine"]
  - guid: df62aa6163cc09a2
    noteType: Basic
    deck: "Corpus::Endocrine::Adrenal Gland"
    fields:
      Front: "What are the classic symptoms of pheochromocytoma?"
      Back: "Headache, sweating, palpitations. Now called the 5 Ps: Pressure (hypertension), Pain (headache), Perspiration (sweating), Palpitations, Pallor."
    tags: ["subject:endocrine"]
  - guid: e385edecb2f4eed6
    noteType: Basic
    deck: "Corpus::Endocrine::Adrenal Gland"
    fields:
      Front: "How is hypertension characterized in pheochromocytoma?"
      Back: "60% sustained, 40% paroxysmal. Often severe or malignant. Resistant to standard therapy (requires >5 agents). Half of sustained HTN patients also have paroxysms."
    tags: ["subject:endocrine"]
  - guid: 2f6ed768b0177f43
    noteType: Basic
    deck: "Corpus::Endocrine::Adrenal Gland"
    fields:
      Front: "What precipitates paroxysmal crises in abdominal pheochromocytoma?"
      Back: "Any factor displacing abdominal contents: palpation of abdomen, exertion, or physical manipulation. Crises last 10-15 minutes to several hours."
    tags: ["subject:endocrine"]
  - guid: 108b9d8bc6b6a142
    noteType: Basic
    deck: "Corpus::Endocrine::Adrenal Gland"
    fields:
      Front: "What symptoms occur during pheochromocytoma crises?"
      Back: "Headache, sweating, palpitations, pallor, apprehension, nausea, vomiting, abdominal pain, tachycardia, angina, dyspnea. 1/3 have glycosuria only during attack; 1/3 have HTN only during attack."
    tags: ["subject:endocrine"]
  - guid: 6690badeafda3b43
    noteType: Basic
    deck: "Corpus::Endocrine::Adrenal Gland"
    fields:
      Front: "Why can pheochromocytoma cause postural hypotension?"
      Back: "Occurs with predominantly epinephrine-secreting tumors. Due to decreased plasma volume and blunted sympathetic response."
    tags: ["subject:endocrine"]
  - guid: 79a3042112ec77b3
    noteType: Basic
    deck: "Corpus::Endocrine::Adrenal Gland"
    fields:
      Front: "What other complications can pheochromocytoma cause?"
      Back: "Weight loss, hyperpigmentation, cardiac failure (from prolonged hypertension or catecholamine-induced cardiomyopathy), rhabdomyolysis from severe vasoconstriction causing muscle ischemia."
    tags: ["subject:endocrine"]
  - guid: 2d334ceb92101bd3
    noteType: Basic
    deck: "Corpus::Endocrine::Adrenal Gland"
    fields:
      Front: "What hematological findings occur in pheochromocytoma?"
      Back: "Increased hematocrit and erythrocytosis (from erythropoietin production), increased ESR and fever (from IL-6 production), hypercalcemia."
    tags: ["subject:endocrine"]
  - guid: 28467e9ee12e802e
    noteType: Basic
    deck: "Corpus::Endocrine::Adrenal Gland"
    fields:
      Front: "What urinary finding occurs with bladder pheochromocytoma?"
      Back: "Hematuria (from bladder irritation). Paroxysms can be triggered by micturition."
    tags: ["subject:endocrine"]
  - guid: 78efad1380313031
    noteType: Basic
    deck: "Corpus::Endocrine::Adrenal Gland"
    fields:
      Front: "What biochemical test is the gold standard for pheochromocytoma?"
      Back: "Plasma free metanephrine (gold standard, most sensitive). Alternative: 24-hour urine metanephrine."
    tags: ["subject:endocrine"]
  - guid: cc3cc215dd7c15c4
    noteType: Basic
    deck: "Corpus::Endocrine::Adrenal Gland"
    fields:
      Front: "What other biochemical tests help diagnose pheochromocytoma?"
      Back: "24-hour urine catecholamines (epinephrine, norepinephrine, dopamine), serum chromogranin A (elevated)."
    tags: ["subject:endocrine"]
  - guid: ec6456297f33ecf4
    noteType: Basic
    deck: "Corpus::Endocrine::Adrenal Gland"
    fields:
      Front: "Why is ensuring medication compliance important before pheochromocytoma testing?"
      Back: "Dietary agents and drugs can interfere with catecholamine and metanephrine measurements, causing false positives."
    tags: ["subject:endocrine"]
  - guid: 4f2ef4860fe869b3
    noteType: Basic
    deck: "Corpus::Endocrine::Adrenal Gland"
    fields:
      Front: "What imaging studies localize pheochromocytoma?"
      Back: "CT or MRI of abdomen (first-line for adrenal). MIBG scan and PET scan (fluorodopamine, dotatate) are increasingly used. Ultrasound, chest/abdominal X-ray, selective venous sampling, and aortography are less commonly used now."
    tags: ["subject:endocrine"]
  - guid: 447c3acca372dc25
    noteType: Basic
    deck: "Corpus::Endocrine::Adrenal Gland"
    fields:
      Front: "Why is MIBG scan useful for pheochromocytoma?"
      Back: "Localizes tumors AND can be used therapeutically for malignant pheochromocytoma."
    tags: ["subject:endocrine"]
  - guid: f560cf2c77125ec6
    noteType: Basic
    deck: "Corpus::Endocrine::Adrenal Gland"
    fields:
      Front: "What is the most important principle of preoperative preparation for pheochromocytoma surgery?"
      Back: "Avoid unopposed alpha or beta adrenergic activity. Give alpha-blockade FIRST, then beta-blockers if needed for tachycardia control."
    tags: ["subject:endocrine"]
  - guid: fb499304fc5744c3
    noteType: Basic
    deck: "Corpus::Endocrine::Adrenal Gland"
    fields:
      Front: "What alpha-blockers are used for pheochromocytoma preparation?"
      Back: "Phenoxybenzamine (non-selective), or selective agents: prazosin, doxazosin, terazosin."
    tags: ["subject:endocrine"]
  - guid: 7c47a305bba04288
    noteType: Basic
    deck: "Corpus::Endocrine::Adrenal Gland"
    fields:
      Front: "Why must beta-blockers never be started before alpha-blockade?"
      Back: "Without alpha-blockade, beta-blockers allow unopposed alpha-adrenergic activity, causing disastrous hypertension."
    tags: ["subject:endocrine"]
  - guid: b0166b27d4951920
    noteType: Basic
    deck: "Corpus::Endocrine::Adrenal Gland"
    fields:
      Front: "What is alpha-methyltyrosine and when is it used?"
      Back: "Rate-limiting enzyme inhibitor for catecholamine synthesis. Used for patients with malignant pheochromocytoma who cannot have surgery or refuse it."
    tags: ["subject:endocrine"]
  - guid: 1a205d263f48ce5a
    noteType: Basic
    deck: "Corpus::Endocrine::Adrenal Gland"
    fields:
      Front: "What medical therapy is used for inoperable or malignant pheochromocytoma?"
      Back: "Alpha-adrenergic blockade, alpha-methyltyrosine, and MIBG therapy (which can be therapeutic for malignancy). Avoid beta-blockers without prior alpha-blockade."
    tags: ["subject:endocrine"]
  - guid: 4e56c4f3f0c667a4
    noteType: Basic
    deck: "Corpus::Endocrine::Adrenal Gland"
    fields:
      Front: "What is the 5-year survival rate for benign pheochromocytoma?"
      Back: ">95% five-year survival. Recurrence rate <10%. Catecholamines return to normal within a week of surgery."
    tags: ["subject:endocrine"]
  - guid: e7d7c23cb19541d4
    noteType: Basic
    deck: "Corpus::Endocrine::Adrenal Gland"
    fields:
      Front: "What is the 5-year survival rate for malignant pheochromocytoma?"
      Back: "<50% five-year survival."
    tags: ["subject:endocrine"]
  - guid: 039e106333692439
    noteType: Basic
    deck: "Corpus::Endocrine::Adrenal Gland"
    fields:
      Front: "When does hypertension persist after pheochromocytoma surgery?"
      Back: "Either the pheochromocytoma wasn't completely removed, or the patient has concomitant essential hypertension."
    tags: ["subject:endocrine"]
  - guid: f00da844c1ce3797
    noteType: Basic
    deck: "Corpus::Endocrine::Adrenal Gland"
    fields:
      Front: "What is the long-term follow-up strategy for pheochromocytoma?"
      Back: "Lifelong follow-up. Assess catecholamine levels periodically for several years in asymptomatic patients, then continue lifetime surveillance."
    tags: ["subject:endocrine"]
