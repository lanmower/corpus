    noteType: Basic
    deck: "Corpus::Paediatrics::Medical Professionalism"
    fields:
      Front: "What is HPCSA requirement (h) for health practitioners?"
      Back: "A practitioner shall keep accurate patient records."
    tags: ["hpcsa", "ethics", "documentation", "subject:paediatrics"]

  - guid: a4f7e2c9b6d1g8m3
    noteType: Basic
    deck: "Corpus::Paediatrics::Medical Professionalism"
    fields:
      Front: "What is the CanMEDS definition of professional competence?"
      Back: "Professional competence is the habitual and judicious use of communication, knowledge, technical skills, clinical reasoning, emotions, values, and reflection in daily practice for the benefit of the individual and community being served."
    tags: ["canmeds", "professionalism", "competence", "subject:paediatrics"]

  - guid: 6e3a8f2b9c5d7g1h
    noteType: Basic
    deck: "Corpus::Paediatrics::Medical Professionalism"
    fields:
      Front: "What does the Professional role in CanMEDS entail?"
      Back: "As Professionals, physicians are committed to the health and well-being of individual patients and society through ethical practice, high personal standards of behaviour, commitment to the profession, profession-led regulation, and maintenance of personal health."
    tags: ["canmeds", "professional-role", "ethics", "subject:paediatrics"]

  - guid: 1f8c4d6a9e2b5g7k
    noteType: Basic
    deck: "Corpus::Paediatrics::Medical Professionalism"
    fields:
      Front: "What are the key elements of the Professional role according to CanMEDS?"
      Back: "The Professional Role is grounded in a professional identity and is guided by codes of ethics and a commitment to clinical competence, ongoing professional development, integrity, honesty, altruism, respect for diversity, the adoption of appropriate attitudes and behaviours, and promotion of the public good."
    tags: ["canmeds", "professional-role", "ethics", "subject:paediatrics"]

  - guid: 5b2g7f1e9c8d4a3h
    noteType: Basic
    deck: "Corpus::Paediatrics::Medical Professionalism"
    fields:
      Front: "What is the basis of the social contract in the Professional role?"
      Back: "The commitments and elements of the Professional role form the basis of the social contract between a physician and society. In return, society grants physicians the privilege of profession-led regulation, with the understanding that they are accountable to those served, to society, and to the profession itself."
    tags: ["canmeds", "social-contract", "accountability", "subject:paediatrics"]

  - guid: 3g8e5a1f7c2d9b4k
    noteType: Basic
    deck: "Corpus::Paediatrics::Medical Professionalism"
    fields:
      Front: "What are CanMEDS Commitment to Patients competencies?"
      Back: "Altruism, Bioethical principles and theories, Commitment to excellence in clinical practice and mastery of the discipline, Compassion and caring, Confidentiality and its limits, Integrity and honesty, Moral and ethical behaviour, Professional boundaries, Respect for diversity."
    tags: ["canmeds", "commitment-patients", "ethics", "subject:paediatrics"]

  - guid: 9a4c8f6d2e1b7g5h
    noteType: Basic
    deck: "Corpus::Paediatrics::Medical Professionalism"
    fields:
      Front: "What are CanMEDS Commitment to Society competencies?"
      Back: "Commitment to the promotion of the public good in health care, Social accountability, Social contract in health care."
    tags: ["canmeds", "commitment-society", "ethics", "subject:paediatrics"]

  - guid: 4f1d6g9a3e2c8b5k
    noteType: Basic
    deck: "Corpus::Paediatrics::Medical Professionalism"
    fields:
      Front: "What are CanMEDS Commitment to Profession competencies?"
      Back: "Accountability to professional regulatory authorities, Codes of ethics, Commitment to patient safety and quality improvement, Commitment to professional standards, Conflicts of interest (personal, financial, administrative), Medico-legal frameworks governing practice, Responsibility to the profession including obligations of peer assessment, mentorship, collegiality, and support."
    tags: ["canmeds", "commitment-profession", "ethics", "subject:paediatrics"]

  - guid: 7d2g5b8e1f4a9c6h
    noteType: Basic
    deck: "Corpus::Paediatrics::Medical Professionalism"
    fields:
      Front: "What are CanMEDS Commitment to Self competencies?"
      Back: "Applied capacity for self-regulation including the assessment and monitoring of one's thoughts, behaviours, emotions and attention for optimal performance and well-being. Commitment to disclosure of error and/or adverse events and their impact. Mindful and reflective approach to practice. Professional identity, career development and transitions. Resilience for sustainable practice. Responsibility to self including personal care in order to serve others."
    tags: ["canmeds", "commitment-self", "ethics", "subject:paediatrics"]

  - guid: 2e7c9f3a6d8b1g4k
    noteType: Basic
    deck: "Corpus::Paediatrics::Medical Professionalism"
    fields:
      Front: "What is professionalism according to the University of Ottawa definition?"
      Back: "Professionalism embodies the relationship between medicine and society as it forms the basis of patient-physician trust. It attempts to make tangible certain attitudes, behaviours, and characteristics that are desirable among the medical profession."
    tags: ["professionalism", "definition", "ethics", "subject:paediatrics"]

  - guid: 6a3f8d1e5b9c2g7h
    noteType: Basic
    deck: "Corpus::Paediatrics::Medical Professionalism"
    fields:
      Front: "What is calling in the context of professionalism?"
      Back: "Calling is a set of values, behaviours, and relationships that underpins the trust the public has in doctors."
    tags: ["professionalism", "calling", "ethics", "subject:paediatrics"]

  - guid: 8b5e2g9a4f1c7d3k
    noteType: Basic
    deck: "Corpus::Paediatrics::Medical Professionalism"
    fields:
      Front: "What are examples of unprofessional behaviour related to patient care?"
      Back: "Criminal behaviour or conviction. Behaviour that suggests a disregard for wellbeing of patients or members of the public and/or their dignity and rights. Failing to honour clinical commitments. Treating patients when not fit to do so. Agreeing to undertake a procedure for which the person lacks the necessary training, expertise or competence."
    tags: ["professionalism", "unprofessional-behaviour", "ethics", "subject:paediatrics"]

  - guid: 1c8g3d7f2a9b5e6h
    noteType: Basic
    deck: "Corpus::Paediatrics::Medical Professionalism"
    fields:
      Front: "What are examples of unprofessional interpersonal behaviour?"
      Back: "Being rude, abusive or disrespectful. Showing a disregard for the time and effort of those relying on them (e.g. consistently bad timekeeping). Gratuitous criticism of colleagues or others. Inappropriate relationships with patients or employees."
    tags: ["professionalism", "unprofessional-behaviour", "ethics", "subject:paediatrics"]

  - guid: 5f9a2e8c1d4b7g3k
    noteType: Basic
    deck: "Corpus::Paediatrics::Medical Professionalism"
    fields:
      Front: "What are examples of unprofessional behaviour related to standards and conduct?"
      Back: "Accepting unsatisfactory clinical standards. An irresponsible or apathetic attitude. Laziness, sloppiness or a lack of attention to detail. Being resistant to feedback or failing to maintain continuing professional development. Dishonest business/financial dealings."
    tags: ["professionalism", "unprofessional-behaviour", "ethics", "subject:paediatrics"]

  - guid: 3g7c5a9d2f8e1b4h
    noteType: Basic
    deck: "Corpus::Paediatrics::Medical Professionalism"
    fields:
      Front: "What are examples of unprofessional behaviour related to public trust?"
      Back: "Selfishness: putting one's own financial or personal interests above all other considerations. Any abuse of the doctor-patient relationship. Anything that undermines public confidence in the profession. Anything that undermines the reputation or standing of the profession."
    tags: ["professionalism", "unprofessional-behaviour", "ethics", "subject:paediatrics"]

  - guid: 6d4f1g8b3e9a5c2k
    noteType: Basic
    deck: "Corpus::Paediatrics::Medical Professionalism"
    fields:
      Front: "What areas require consideration for professionalism in practice?"
      Back: "Social media presence and online persona. Photographs and online content. Student learning and clerking of patients. Interaction with pharmaceutical companies. Evidence-based medicine. Rules, regulations and laws. Business and self-interest. Costs of medical care. Conflict resolution. Personal life boundaries."
    tags: ["professionalism", "practice-areas", "ethics", "subject:paediatrics"]

