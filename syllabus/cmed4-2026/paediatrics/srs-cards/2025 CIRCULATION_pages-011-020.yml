    noteType: Basic
    deck: "Corpus::Paediatrics::2025 CIRCULATION"
    fields:
      Front: "What immediate action should be taken after shock improvement?"
      Back: "Stop bolus administration"
    tags: ["post-bolus-management", "shock-improvement", "subject:paediatrics"]
  - guid: s6b2c7d1e9f4g3h8
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 CIRCULATION"
    fields:
      Front: "When can oral feeds or breastfeeding be resumed after shock treatment?"
      Back: "As soon as possible after shock has resolved (when child is no longer shocked)"
