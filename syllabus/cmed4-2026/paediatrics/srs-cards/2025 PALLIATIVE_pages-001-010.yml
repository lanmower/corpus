  noteType: Basic
  deck: |-
    Corpus::Paediatrics::2025 PALLIATIVE
  fields:
    Front: What must health providers evaluate and alleviate in palliative care?
    Back: A child's physical, psychological and social distress.
  tags:
  - provider-role
  - palliative-care
  - |-
    subject:paediatrics
- guid: c3af50b8ce858fc7
  noteType: Basic
  deck: |-
    Corpus::Paediatrics::2025 PALLIATIVE
  fields:
    Front: What broad approach is required for effective paediatric palliative care?
    Back: A broad multidisciplinary approach that includes the family and makes use
      of available community resources; it can be successfully implemented even if
      resources are limited.
  tags:
  - approach
  - multidisciplinary
  - |-
    subject:paediatrics
- guid: 61d4f69d9b25105a
  noteType: Basic
  deck: |-
    Corpus::Paediatrics::2025 PALLIATIVE
  fields:
    Front: Where can paediatric palliative care be provided?
    Back: In tertiary care facilities, in community health centres, and even in the
      child's own home.
  tags:
  - settings
  - palliative-care
  - |-
    subject:paediatrics
- guid: eedbb4ceec98e4d3
  noteType: Basic
  deck: |-
    Corpus::Paediatrics::2025 PALLIATIVE
  fields:
    Front: Define a life-limiting condition in children.
    Back: A condition for which there is no reasonable hope of cure and from which
      children will die.
  tags:
  - classification
  - life-limiting
  - |-
    subject:paediatrics
- guid: 6f0cfa2ff9184b0e
  noteType: Basic
  deck: |-
    Corpus::Paediatrics::2025 PALLIATIVE
  fields:
    Front: Define a life-threatening condition in children.
    Back: A condition for which curative treatment may be feasible but can fail.
  tags:
  - classification
  - life-threatening
  - |-
    subject:paediatrics
- guid: 61dd56fda33c1b3c
  noteType: Basic
  deck: |-
    Corpus::Paediatrics::2025 PALLIATIVE
  fields:
    Front: What is ACT Category 1?
    Back: |-
      Life threatening conditions where curative treatment may be possible. Examples: Acute lymphoblastic leukaemia, other curable cancers, pulmonary TB, organ failure when transplant is available.
  tags:
  - act-classification
  - category-1
  - |-
    subject:paediatrics
- guid: 687f16758877dd86
  noteType: Basic
  deck: |-
    Corpus::Paediatrics::2025 PALLIATIVE
  fields:
    Front: What is ACT Category 2?
    Back: |-
      Conditions where premature death is inevitable, but children have long periods of wellness because of treatments. Examples: Cystic fibrosis, Duchenne's muscular dystrophy, HIV/AIDS on HAART, renal failure where dialysis is available.
  tags:
  - act-classification
  - category-2
  - |-
    subject:paediatrics
- guid: e30c49c8c020763a
  noteType: Basic
  deck: |-
    Corpus::Paediatrics::2025 PALLIATIVE
  fields:
    Front: What is ACT Category 3?
    Back: |-
      Progressive conditions where treatment is exclusively palliative. Examples: Batten disease, Spinal Muscular Atrophy (SMA), Mucopolysaccharidoses, inoperable heart disease, organ failure without transplant, Adrenoleukodystrophy (ALD), Trisomy 13 and 18, renal failure without dialysis, HIV without HAART.
  tags:
  - act-classification
  - category-3
  - |-
    subject:paediatrics
- guid: 7fd54852cf16b96f
  noteType: Basic
  deck: |-
    Corpus::Paediatrics::2025 PALLIATIVE
  fields:
    Front: What is ACT Category 4?
    Back: |-
      Irreversible but non-progressive conditions with high risk of unpredictable life-threatening events. Examples: Multiple disabilities following brain or spinal cord injury, complex healthcare needs, severe cerebral palsy, Foetal Alcohol Syndrome, birth asphyxia, Down's Syndrome, Sickle Cell Anaemia.
  tags:
  - act-classification
  - category-4
  - |-
    subject:paediatrics
