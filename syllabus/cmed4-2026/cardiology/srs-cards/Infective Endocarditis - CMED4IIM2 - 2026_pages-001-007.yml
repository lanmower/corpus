deck: "Corpus::Cardiology::Infective Endocarditis"
notes:
  - guid: 9699c04c495eea01
    noteType: Basic
    deck: "Corpus::Cardiology::Infective Endocarditis"
    fields:
      Front: "What is infective endocarditis?"
      Back: "Infection of the endocardial surface, typically with vegetations on the endocardium. The heart valves are most commonly affected. It is virtually always fatal if untreated."
    tags: ["definition", "endocarditis", "subject:cardiology"]
  - guid: 6f70d27eed8bb4a9
    noteType: Basic
    deck: "Corpus::Cardiology::Infective Endocarditis"
    fields:
      Front: "How is infective endocarditis classified?"
      Back: "Four categories: 1) Native valve endocarditis 2) Prosthetic valve endocarditis 3) IV drug abuse-related endocarditis 4) Nosocomial endocarditis. Also classified as acute or subacute."
    tags: ["classification", "endocarditis", "subject:cardiology"]
  - guid: f31be20f45bae2d5
    noteType: Basic
    deck: "Corpus::Cardiology::Infective Endocarditis"
    fields:
      Front: "What is the difference between acute and subacute infective endocarditis?"
      Back: "Acute: marked toxicity, progresses over days to weeks, causes valvular destruction and metastatic infection. Usually caused by Staphylococcus aureus. Fatal in <6 weeks if untreated. Subacute: evolves over weeks to months with modest toxicity. Usually caused by Streptococcus viridans. Takes longer than 6 weeks to be fatal if untreated."
    tags: ["acute", "subacute", "endocarditis", "prognosis", "subject:cardiology"]
  - guid: f95d0f98cd2e1678
    noteType: Basic
    deck: "Corpus::Cardiology::Infective Endocarditis"
    fields:
      Front: "What is the annual incidence and epidemiology of infective endocarditis?"
      Back: "Annual incidence: 15-20,000 cases per year. Fourth leading cause of life-threatening infectious disease. Slight predilection for males (ratio 1.7:1). Mitral valve affected in up to 45% of cases, aortic valve in 36%."
    tags: ["epidemiology", "endocarditis", "incidence", "subject:cardiology"]
  - guid: de50ca8228d22560
    noteType: Basic
    deck: "Corpus::Cardiology::Infective Endocarditis"
    fields:
      Front: "What are the most common etiological agents of infective endocarditis?"
      Back: "Streptococcus group: up to 80% of cases. Staphylococcus: 20-35%. Gram-negative aerobic bacilli: up to 13%. Other bacteria and fungi. Culture-negative endocarditis: up to 24% of cases."
    tags: ["microbiology", "endocarditis", "organisms", "subject:cardiology"]
  - guid: 1775260d8b4b854b
    noteType: Basic
    deck: "Corpus::Cardiology::Infective Endocarditis"
    fields:
      Front: "What are the main predisposing factors for infective endocarditis?"
      Back: "Structural heart disease: Rheumatic heart disease (76%), congenital heart disease, degenerative cardiac lesions, prosthetic valves. IV drug use (highest risk in patients <40 years). Approximately 75% of patients have pre-existing structural cardiac abnormality."
    tags: ["risk_factors", "predisposing_factors", "endocarditis", "subject:cardiology"]
  - guid: cf20c5b76bae7407
    noteType: Basic
    deck: "Corpus::Cardiology::Infective Endocarditis"
    fields:
      Front: "What is the pathogenesis of infective endocarditis?"
      Back: "The valve surface is altered to produce a suitable site for bacterial attachment. Platelets and fibrin deposit, forming sterile vegetation (NBTE). When bacteria reach the site, they colonize and are covered with platelets and fibrin, leading to bacterial multiplication and vegetation growth."
    tags: ["pathophysiology", "pathogenesis", "endocarditis", "subject:cardiology"]
  - guid: aebd60a0124ab3f0
    noteType: Basic
    deck: "Corpus::Cardiology::Infective Endocarditis"
    fields:
      Front: "What is the rate of prosthetic valve infection after implantation?"
      Back: "More than 100,000 heart valves implanted annually in the US. Infective endocarditis develops in 1-4% of valve recipients during the first year post-surgery and in approximately 1% per year thereafter."
    tags: ["prosthetic_valve", "epidemiology", "endocarditis", "subject:cardiology"]
  - guid: ef95453613f82200
    noteType: Basic
    deck: "Corpus::Cardiology::Infective Endocarditis"
    fields:
      Front: "What is the recurrence rate of endocarditis?"
      Back: "Recurrent endocarditis occurs in approximately 4.5% of patients. Other studies report rates ranging from 2.5% to 9%."
    tags: ["prognosis", "recurrence", "endocarditis", "subject:cardiology"]
  - guid: c00c4d2643756ed3
    noteType: Basic
    deck: "Corpus::Cardiology::Infective Endocarditis"
    fields:
      Front: "What are the most common congenital heart lesions associated with endocarditis risk?"
      Back: "Bicuspid aortic valves, patent ductus arteriosus (PDA), ventricular septal defect (VSD), coarctation of the aorta, and tetralogy of Fallot."
    tags: ["congenital_heart_disease", "risk_factors", "endocarditis", "subject:cardiology"]
  - guid: c47e298080fe0a1d
    noteType: Basic
    deck: "Corpus::Cardiology::Infective Endocarditis"
    fields:
      Front: "What is the increased risk of endocarditis in mitral valve prolapse with regurgitation?"
      Back: "The risk is estimated to be 5-8 times higher than in the normal population."
    tags: ["mitral_valve_prolapse", "risk_factors", "endocarditis", "subject:cardiology"]
  - guid: ebfdb3b9dd28550c
    noteType: Basic
    deck: "Corpus::Cardiology::Infective Endocarditis"
    fields:
      Front: "In what percentage of cases is aortic valve disease present in endocarditis?"
      Back: "Aortic valve stenosis and regurgitation is present in 12-30% of cases of infective endocarditis."
    tags: ["aortic_valve", "epidemiology", "endocarditis", "subject:cardiology"]
  - guid: eaabd9934604d9d6
    noteType: Basic
    deck: "Corpus::Cardiology::Infective Endocarditis"
    fields:
      Front: "What is the clinical presentation of infective endocarditis?"
      Back: "Fever (>95% of cases), weakness, weight loss, night sweats, audible murmurs (>85%), Osler nodes, Janeway lesions, splinter hemorrhages, Roth spots (less common), clubbing (20%), splenomegaly, musculoskeletal manifestations, and major embolic episodes."
    tags: ["clinical_presentation", "signs", "symptoms", "endocarditis", "subject:cardiology"]
  - guid: 5f8a7260ecc4621f
    noteType: Basic
    deck: "Corpus::Cardiology::Infective Endocarditis"
    fields:
      Front: "What are the laboratory findings in infective endocarditis?"
      Back: "Normocytic anemia, low serum iron and iron-binding capacity, thrombocytopenia (up to 15%), leukocytosis, elevated ESR, hypergammaglobulinemia, proteinuria, microscopic hematuria, red cell casts, positive rheumatoid factor (50%), circulating immune complexes, positive ANA, elevated serum globulins, cryoglobulins, hypocomplementemia."
    tags: ["laboratory_findings", "diagnosis", "endocarditis", "subject:cardiology"]
  - guid: 01b03bfccfe942b7
    noteType: Basic
    deck: "Corpus::Cardiology::Infective Endocarditis"
    fields:
      Front: "Why is blood culture the most important laboratory test in endocarditis?"
      Back: "Positive cultures are seen in up to 97% of cases. A minimum of three blood cultures should be obtained over a time period based on severity of illness. Blood culture is crucial for organism identification and antibiotic sensitivity."
    tags: ["blood_culture", "diagnosis", "microbiology", "endocarditis", "subject:cardiology"]
  - guid: bf6e230f71318b4c
    noteType: Basic
    deck: "Corpus::Cardiology::Infective Endocarditis"
    fields:
      Front: "What is the specificity and sensitivity of echocardiography in endocarditis?"
      Back: "Transthoracic echo: high specificity of 98%. Transesophageal echo: higher ultrasonic frequencies improve spatial resolution with high specificity and even higher sensitivity."
    tags: ["echocardiography", "diagnosis", "endocarditis", "subject:cardiology"]
  - guid: d872cb2fc7c17a28
    noteType: Basic
    deck: "Corpus::Cardiology::Infective Endocarditis"
    fields:
      Front: "What are the indications for transesophageal echocardiography in suspected endocarditis?"
      Back: "1) Patient has prosthetic valve or intracardiac device 2) Poor quality transthoracic echo 3) Negative transthoracic echo but high clinical suspicion for endocarditis. If transthoracic is negative and clinical suspicion is low, TE is not needed."
    tags: ["transesophageal_echo", "echocardiography", "endocarditis", "subject:cardiology"]
  - guid: 405a167a445ef7fd
    noteType: Basic
    deck: "Corpus::Cardiology::Infective Endocarditis"
    fields:
      Front: "What are the major criteria for Duke criteria diagnosis of endocarditis?"
      Back: "1) Positive blood culture for typical organisms from 2 separate cultures or persistent positive culture or single positive culture for HACEK group/C. burnetti/S. bovis/S. aureus without primary focus 2) Evidence of endocardial involvement: oscillating intracardiac mass on valve, abscess, new partial dehiscence of prosthetic valve, or new valvular regurgitation."
    tags: ["Duke_criteria", "diagnosis", "endocarditis", "subject:cardiology"]
  - guid: 1a41119e52b2858d
    noteType: Basic
    deck: "Corpus::Cardiology::Infective Endocarditis"
    fields:
      Front: "What are the minor criteria for Duke criteria diagnosis of endocarditis?"
      Back: "1) Predisposing heart condition or IV drug use 2) Fever >38°C 3) Vascular phenomena or immunological phenomena (glomerulonephritis, Osler nodes) 4) Echo findings consistent with endocarditis but not meeting major criteria 5) Microbiological evidence not meeting major criteria or serological evidence of active infection."
    tags: ["Duke_criteria", "diagnosis", "endocarditis", "subject:cardiology"]
  - guid: 75843cd399d79008
    noteType: Basic
    deck: "Corpus::Cardiology::Infective Endocarditis"
    fields:
      Front: "What criteria are required for definite diagnosis of infective endocarditis?"
      Back: "Either 2 major criteria OR 1 major and 3 minor criteria OR 5 minor criteria. For possible diagnosis: 1 major and 1 minor OR 3 minor criteria."
    tags: ["Duke_criteria", "diagnosis", "endocarditis", "subject:cardiology"]
  - guid: 1b22170c5be1273b
    noteType: Basic
    deck: "Corpus::Cardiology::Infective Endocarditis"
    fields:
      Front: "What is the recommended approach when blood cultures are negative at 48 hours?"
      Back: "If clinical or echo evidence of endocarditis persists, consult with microbiology team and consider extended culture or alternative organisms. If no clinical evidence, consider alternative diagnosis."
    tags: ["diagnosis", "culture-negative", "endocarditis", "subject:cardiology"]
  - guid: 96434d3fed8bfbcb
    noteType: Basic
    deck: "Corpus::Cardiology::Infective Endocarditis"
    fields:
      Front: "What defines an infected mass in endocarditis at surgery vs on echo?"
      Back: "At surgery: infected mass attached to endocardial structure or implanted intracardiac device. On echo: oscillating or non-oscillating intracardiac mass on valve."
    tags: ["diagnosis", "echocardiography", "endocarditis", "subject:cardiology"]
  - guid: 193cfd17ed12086c
    noteType: Basic
    deck: "Corpus::Cardiology::Infective Endocarditis"
    fields:
      Front: "What is an abscess in infective endocarditis?"
      Back: "At surgery/necropsy: perivolvular cavity with necrosis and perivolvular material. On echo: thick and non-homogenous perivolvular area with echo-dense or echo-lucent appearance."
    tags: ["complications", "diagnosis", "endocarditis", "subject:cardiology"]
  - guid: d70b12cfc3be9a10
    noteType: Basic
    deck: "Corpus::Cardiology::Infective Endocarditis"
    fields:
      Front: "What is a fistula in endocarditis?"
      Back: "Communication between two neighboring cavities. Identified on echo using color Doppler as communication between two cavities through perforation."
    tags: ["complications", "diagnosis", "endocarditis", "subject:cardiology"]
  - guid: 0cbaab08183720f9
    noteType: Basic
    deck: "Corpus::Cardiology::Infective Endocarditis"
    fields:
      Front: "What are valvular aneurysms in endocarditis?"
      Back: "Outpouching or bulging of valvular tissue. Seen in prosthetic valve endocarditis where there may be dehiscence of the prosthesis, identified on echo as rocking motion of the prosthesis."
    tags: ["complications", "diagnosis", "endocarditis", "subject:cardiology"]
  - guid: 565e632bbde14ffc
    noteType: Basic
    deck: "Corpus::Cardiology::Infective Endocarditis"
    fields:
      Front: "What are poor prognostic signs in infective endocarditis?"
      Back: "Staphylococcus aureus infection, fungal infections, previous endocarditis, cyanotic congenital heart disease, congestive cardiac failure, embolic phenomena, rupture of mycotic aneurysm, lack of response to antibiotics, prosthetic valve endocarditis, periannular extension of infection."
    tags: ["prognosis", "poor_outcomes", "endocarditis", "subject:cardiology"]
  - guid: 4865f6732ae75b11
    noteType: Basic
    deck: "Corpus::Cardiology::Infective Endocarditis"
    fields:
      Front: "What are the poor prognostic patient characteristics in endocarditis?"
      Back: "Elderly patients, prosthetic valve, insulin-dependent diabetic patients, patients with multiple comorbidities."
    tags: ["prognosis", "patient_factors", "endocarditis", "subject:cardiology"]
  - guid: 9267635c315d9e0a
    noteType: Basic
    deck: "Corpus::Cardiology::Infective Endocarditis"
    fields:
      Front: "What are the echo features suggestive of severe endocarditis?"
      Back: "Severe left-sided valve regurgitations, very low ejection fraction, pulmonary hypertension, large vegetations, severe prosthetic valve dysfunction."
    tags: ["complications", "echocardiography", "endocarditis", "subject:cardiology"]
  - guid: 8cb4115f4db7c029
    noteType: Basic
    deck: "Corpus::Cardiology::Infective Endocarditis"
    fields:
      Front: "What is the empirical antibiotic therapy for native valve endocarditis?"
      Back: "Penicillin-based antibiotic (ampicillin or amoxicillin-clavulanic acid) plus gentamicin. In penicillin-allergic patients: vancomycin plus gentamicin with ciprofloxacin."
    tags: ["treatment", "antibiotics", "endocarditis", "subject:cardiology"]
  - guid: ef2170a185540173
    noteType: Basic
    deck: "Corpus::Cardiology::Infective Endocarditis"
    fields:
      Front: "What is the antibiotic therapy for early prosthetic valve endocarditis (<1 year post-surgery)?"
      Back: "Vancomycin with gentamicin and rifampin at specified doses."
    tags: ["treatment", "antibiotics", "prosthetic_valve", "endocarditis", "subject:cardiology"]
  - guid: 452d620c73b5dbb3
    noteType: Basic
    deck: "Corpus::Cardiology::Infective Endocarditis"
    fields:
      Front: "What is the antibiotic therapy for late prosthetic valve endocarditis (>1 year post-surgery)?"
      Back: "Same as native valve endocarditis (penicillin-based antibiotic with gentamicin or vancomycin-based regimen in allergic patients)."
    tags: ["treatment", "antibiotics", "prosthetic_valve", "endocarditis", "subject:cardiology"]
  - guid: 19fefd997b8362d6
    noteType: Basic
    deck: "Corpus::Cardiology::Infective Endocarditis"
    fields:
      Front: "What are the absolute indications for surgical therapy in endocarditis?"
      Back: "1) Refractory heart failure related to valve dysfunction 2) Physiologically significant valve dysfunction on echo 3) More than two serious systemic embolic episodes with large vegetations 4) Persistent/uncontrolled infection despite antibiotics."
    tags: ["surgery", "indications", "endocarditis", "subject:cardiology"]
  - guid: 4295a1d0a583b4a2
    noteType: Basic
    deck: "Corpus::Cardiology::Infective Endocarditis"
    fields:
      Front: "What are the local complications requiring surgery in endocarditis?"
      Back: "Perivolvular myocardial abscesses, mycotic aneurysms, periannular extension of infection."
    tags: ["surgery", "complications", "endocarditis", "subject:cardiology"]
  - guid: 08a26a999ed197fd
    noteType: Basic
    deck: "Corpus::Cardiology::Infective Endocarditis"
    fields:
      Front: "What are the relative indications for surgery in endocarditis?"
      Back: "Evidence of perivolvular infection (intracardiac abscess or fistula), rupture of sinus of Valsalva aneurysm, fungal endocarditis, highly resistant microorganism, relapse after adequate antibiotics (especially prosthetic valve), culture-negative endocarditis with fever >10 days after empiric therapy."
    tags: ["surgery", "indications", "endocarditis", "subject:cardiology"]
  - guid: 0bcabc4e9e3c826d
    noteType: Basic
    deck: "Corpus::Cardiology::Infective Endocarditis"
    fields:
      Front: "What echo features are indications for surgical treatment?"
      Back: "Persistent vegetation after major embolic episode, vegetation >1cm in diameter, increased vegetation size despite 4 weeks of antibiotics, acute mitral insufficiency, valve perforation or rupture, any peri-annular extension of infection."
    tags: ["surgery", "echocardiography", "indications", "endocarditis", "subject:cardiology"]
  - guid: 397908ca399464d8
    noteType: Basic
    deck: "Corpus::Cardiology::Infective Endocarditis"
    fields:
      Front: "What is the mortality rate for surgical treatment of active endocarditis?"
      Back: "In a study of 138 patients who underwent surgery with active infection, early mortality was 11.5%. Risk factors for early mortality: NYHA class 4, septic shock, advanced age, pre-operative acute renal failure, staphylococcal infection."
    tags: ["surgery", "prognosis", "outcomes", "endocarditis", "subject:cardiology"]
  - guid: 86a665bce912918b
    noteType: Basic
    deck: "Corpus::Cardiology::Infective Endocarditis"
    fields:
      Front: "What are the neurological complications of endocarditis?"
      Back: "Embolic phenomena resulting in intracranial hemorrhage, coma, stroke. Patients with heart failure, uncontrolled infection, and absence of high embolic risk should be managed conservatively. Otherwise, surgery must be considered."
    tags: ["complications", "neurological", "endocarditis", "subject:cardiology"]
  - guid: 7575ffbcc0bd4712
    noteType: Basic
    deck: "Corpus::Cardiology::Infective Endocarditis"
    fields:
      Front: "What is the rationale for endocarditis prophylaxis?"
      Back: "Endocarditis usually follows bacteremia. Although risk of endocarditis is small and there is no proof of efficacy of preventative therapy, prophylaxis is recommended for patients with predisposing cardiac lesions undergoing procedures known to cause bacteremia."
    tags: ["prophylaxis", "prevention", "endocarditis", "subject:cardiology"]
  - guid: 2553896ba5e72d64
    noteType: Basic
    deck: "Corpus::Cardiology::Infective Endocarditis"
    fields:
      Front: "Which patients are candidates for antibiotic prophylaxis?"
      Back: "Patients with valvular heart disease, congenital heart disease, intracardiac prosthesis, or previous history of endocarditis who are undergoing procedures at highest risk for bacteremia."
    tags: ["prophylaxis", "prevention", "endocarditis", "subject:cardiology"]
  - guid: 3bb7e46c06867163
    noteType: Basic
    deck: "Corpus::Cardiology::Infective Endocarditis"
    fields:
      Front: "Which procedures require antibiotic prophylaxis for endocarditis prevention?"
      Back: "High-risk dental procedures. Prophylaxis is NOT recommended for respiratory tract procedures, GI procedures, or skin and soft tissue procedures. Good dental hygiene and regular dental review are more important than prophylaxis."
    tags: ["prophylaxis", "prevention", "procedures", "endocarditis", "subject:cardiology"]
  - guid: 1728ed7b295b179c
    noteType: Basic
    deck: "Corpus::Cardiology::Infective Endocarditis"
    fields:
      Front: "What is the recommended antibiotic prophylaxis for dental procedures in non-allergic patients?"
      Back: "Amoxicillin or ampicillin 2 grams oral or IV in adults. In children 50 mg/kg oral or IV."
    tags: ["prophylaxis", "antibiotics", "dental", "endocarditis", "subject:cardiology"]
  - guid: f6df94e9c5ef2994
    noteType: Basic
    deck: "Corpus::Cardiology::Infective Endocarditis"
    fields:
      Front: "What is the recommended antibiotic prophylaxis for dental procedures in penicillin-allergic patients?"
      Back: "Clindamycin 2 grams oral or IV in adults. In children 20 mg/kg oral or IV."
    tags: ["prophylaxis", "antibiotics", "dental", "allergy", "endocarditis", "subject:cardiology"]
  - guid: 39c0b6473a5951e5
    noteType: Basic
    deck: "Corpus::Cardiology::Infective Endocarditis"
    fields:
      Front: "Why are aseptic measures during venous catheterization important?"
      Back: "Aseptic measures during venous catheterization and invasive procedures are mandatory to prevent bacteremia and subsequent development of nosocomial endocarditis."
    tags: ["prophylaxis", "prevention", "procedures", "endocarditis", "subject:cardiology"]
