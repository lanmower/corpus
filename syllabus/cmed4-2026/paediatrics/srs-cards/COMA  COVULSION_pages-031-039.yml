    noteType: Basic
    deck: "Corpus::Paediatrics::COMA COVULSION"
    fields:
      Front: "What is the alternative if IV Phenobarbitone is not available?"
      Back: "Phenytoin (but MUST be given as an infusion over 30 minutes)"
    tags: ["alternative-anticonvulsant", "infusion-protocol", "subject:paediatrics"]
  - guid: 5d7ff0aed2b10b22
    noteType: Basic
    deck: "Corpus::Paediatrics::COMA COVULSION"
    fields:
      Front: "How should Phenytoin be administered?"
      Back: "As an infusion over 30 minutes (minimum infusion time)"
    tags: ["phenytoin-administration", "infusion-rate", "subject:paediatrics"]
  - guid: 51de6555b9bc744a
    noteType: Basic
    deck: "Corpus::Paediatrics::COMA COVULSION"
    fields:
      Front: "What cardiac complications require stopping Phenytoin infusion?"
      Back: "If any arrhythmia, bradycardia, or hypotension occurs — STOP Phenytoin"
    tags: ["phenytoin-safety", "cardiac-monitoring", "subject:paediatrics"]
  - guid: caabb088ff7d7c94
    noteType: Basic
    deck: "Corpus::Paediatrics::COMA COVULSION"
    fields:
      Front: "What is the management if bradycardia or hypotension occurs during Phenytoin infusion?"
      Back: "Stop Phenytoin immediately; once cardiac status settles, resume infusion over 1 hour (slower rate)"
    tags: ["phenytoin-complications", "cardiac-management", "subject:paediatrics"]
