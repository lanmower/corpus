# Spaced Repetition Cards - Diagnosis and Classification of Diabetes Mellitus
# Source: CMED4IIM1 - 2026 Pages 001-010
# Generated: 2026-05-03T22:31:49.097Z

cards:
  - id: card-001
    front: |
      What is diabetes mellitus in terms of metabolic state?
    back: |
      Diabetes is a state of chronic hyperglycemia associated with metabolic problems other than glucose metabolism, due to either a defect or abnormality of insulin secretion and/or action.
    difficulty: medium
    category: diabetes-diagnosis-classification

  - id: card-002
    front: |
      What is the mortality increase in type 1 and type 2 diabetes compared to general population?
    back: |
      Type 1 diabetes: 4-7 fold increased mortality. Type 2 diabetes: 2-3 fold increased mortality.
    difficulty: medium
    category: diabetes-diagnosis-classification

  - id: card-003
    front: |
      Name the three main microvascular complications of diabetes.
    back: |
      1) Retinopathy (damage to blood vessels in the retina)
      2) Nephropathy (kidney disease)
      3) Neuropathy (nerve damage)
    difficulty: medium
    category: diabetes-diagnosis-classification

  - id: card-004
    front: |
      What is the management objective for diabetes control?
    back: |
      Achieve normal or near-normal glycemia with adequate control of blood pressure, lipids, and obesity using diet, exercise, oral anti-diabetic agents, insulin, and other newer injectables.
    difficulty: medium
    category: diabetes-diagnosis-classification

  - id: card-005
    front: |
      What are the clinical stages of glycemia?
    back: |
      1) Normal glycemia (normal glucose regulation)
      2) Hyperglycemia (impaired glucose tolerance or impaired glucose regulation/pre-diabetes)
      3) Diabetes (not insulin requiring, insulin requiring for control, or insulin requiring for survival)
    difficulty: medium
    category: diabetes-diagnosis-classification

  - id: card-006
    front: |
      What percentage of diabetes is type 1 vs type 2?
    back: |
      Type 1: 5-10% of all diabetes. Type 2: Over 90% of all diabetes.
    difficulty: medium
    category: diabetes-diagnosis-classification

  - id: card-007
    front: |
      What is the typical pathogenesis of type 2 diabetes?
    back: |
      Starts with insulin resistance. Fasting hyperglycemia only becomes manifest when there is insulin secretory defect.
    difficulty: medium
    category: diabetes-diagnosis-classification

  - id: card-008
    front: |
      List the etiological types of diabetes recognized by 2019 WHO classification.
    back: |
      1) Type 1 (autoimmune or idiopathic)
      2) Type 2
      3) Other specific types
      4) Hybrid form (LADA and ketosis-prone type 2)
      5) Unclassified
      6) Hyperglycemia during pregnancy
    difficulty: medium
    category: diabetes-diagnosis-classification

  - id: card-009
    front: |
      What is LADA?
    back: |
      LADA (Latent Autoimmune Diabetes in Adults) - a slowly evolving immune-mediated diabetes of adults; a hybrid form that presents as type 2 phenotype but has autoimmune features.
    difficulty: medium
    category: diabetes-diagnosis-classification

  - id: card-010
    front: |
      Compare age of onset between type 1 and type 2 diabetes.
    back: |
      Type 1: Occurs in younger individuals, typically before age 35. Type 2: Occurs in older individuals, typically after age 35.
    difficulty: medium
    category: diabetes-diagnosis-classification

  - id: card-011
    front: |
      How does body composition differ between type 1 and type 2 diabetes?
    back: |
      Type 1: Lean (due to lack of insulin for fat deposition). Type 2: Overweight (due to high insulin and insulin resistance, usually induced by overweight).
    difficulty: medium
    category: diabetes-diagnosis-classification

  - id: card-012
    front: |
      What is the HLA association in type 1 diabetes?
    back: |
      Type 1 diabetes is associated with HLA-DQA0-DQB (HLA-DR3-04). Type 2 diabetes has no HLA link.
    difficulty: medium
    category: diabetes-diagnosis-classification

  - id: card-013
    front: |
      What is the concordance rate for type 1 and type 2 diabetes in monozygotic twins?
    back: |
      Type 1: 30-35% concordance. Type 2: 90% concordance.
    difficulty: medium
    category: diabetes-diagnosis-classification

  - id: card-014
    front: |
      Name the autoimmune markers present in type 1 diabetes.
    back: |
      1) Glutamic acid decarboxylase antibody (anti-GAD)
      2) ICA (islet cell antigen)
      3) IA2 antibody
      4) Insulin antibody
    difficulty: medium
    category: diabetes-diagnosis-classification

  - id: card-015
    front: |
      What is the acute crisis presentation for untreated type 1 vs type 2 diabetes?
    back: |
      Type 1: Rapidly progresses to diabetic ketoacidosis. Type 2: Usually presents as hyperosmolar hyperglycemic crisis (previously called hyperosmolar non-ketotic hyperglycemia).
    difficulty: medium
    category: diabetes-diagnosis-classification

  - id: card-016
    front: |
      Describe the normal fasting plasma glucose and 2-hour glucose on GTT according to WHO criteria.
    back: |
      Normal: Fasting plasma glucose < 6.1 mmol/L AND 2-hour plasma glucose < 7.8 mmol/L on GTT.
    difficulty: medium
    category: diabetes-diagnosis-classification

  - id: card-017
    front: |
      What defines impaired fasting glucose (IFG) according to WHO?
    back: |
      Fasting plasma glucose 6.1-7 mmol/L AND 2-hour plasma glucose < 7.8 mmol/L on GTT (only fasting glucose is abnormal).
    difficulty: medium
    category: diabetes-diagnosis-classification

  - id: card-018
    front: |
      What defines impaired glucose tolerance (IGT) according to WHO?
    back: |
      Fasting plasma glucose < 7 mmol/L AND 2-hour plasma glucose 7.8-11.1 mmol/L on GTT.
    difficulty: medium
    category: diabetes-diagnosis-classification

  - id: card-019
    front: |
      What are the ADA diagnostic criteria for diabetes using fasting plasma glucose?
    back: |
      ADA normal: < 5.6 mmol/L. Impaired fasting glucose: 5.6-6.9 mmol/L. Diabetes: ≥ 7 mmol/L.
    difficulty: medium
    category: diabetes-diagnosis-classification

  - id: card-020
    front: |
      What is the diagnostic threshold for diabetes on 2-hour glucose during GTT?
    back: |
      Diabetes is diagnosed if 2-hour plasma glucose ≥ 11.1 mmol/L on GTT (both WHO and ADA).
    difficulty: medium
    category: diabetes-diagnosis-classification

  - id: card-021
    front: |
      What are the four diagnostic tests for diabetes according to ADA 2010-current?
    back: |
      1) Fasting plasma glucose ≥ 7 mmol/L
      2) 2-hour plasma glucose ≥ 11.1 mmol/L on GTT
      3) HbA1c ≥ 6.5%
      4) Random plasma glucose ≥ 11.1 mmol/L with classic symptoms or hypoglycemic crisis
    difficulty: medium
    category: diabetes-diagnosis-classification

  - id: card-022
    front: |
      When must a diagnosis of diabetes be confirmed?
    back: |
      The diagnosis of diabetes must be confirmed by a repeat test on another day (can be same test or different test) in the absence of unequivocal hyperglycemia.
    difficulty: medium
    category: diabetes-diagnosis-classification

  - id: card-023
    front: |
      What is the procedure for performing an oral glucose tolerance test (GTT)?
    back: |
      No caloric intake for 8 hours (fasting). Then 75 grams of anhydrous glucose dissolved in water (or 250 moles of glucose) is given orally. Blood glucose is measured at fasting and 2 hours.
    difficulty: medium
    category: diabetes-diagnosis-classification

  - id: card-024
    front: |
      What standardization is required for HbA1c testing?
    back: |
      HbA1c must be done in a lab with a method certified by the National Glycohemoglobin Certification Program and standardized to the DCCT (Diabetes Control and Complications Trial) assay.
    difficulty: medium
    category: diabetes-diagnosis-classification

  - id: card-025
    front: |
      What does ADA 2010 define as 'increased risk for diabetes'?
    back: |
      Impaired fasting glucose: 5.6-6.1 mmol/L, OR IGT (2-hour: 7.8-11 mmol/L), OR intermediate HbA1c: 5.7-6.4%
    difficulty: medium
    category: diabetes-diagnosis-classification

  - id: card-026
    front: |
      What are the screening recommendations for type 2 diabetes by age?
    back: |
      Age ≥ 45: All should be screened with any method, especially if BMI ≥ 25. Age < 45: Screen if overweight (BMI ≥ 25) PLUS one other risk factor.
    difficulty: medium
    category: diabetes-diagnosis-classification

  - id: card-027
    front: |
      List risk factors for screening type 2 diabetes in people under 45.
    back: |
      Physical inactivity, family history in first-degree relative, high-risk ethnicity (Pima Indians, Pacific Islanders, migrant Asian Indians), gestational diabetes, big babies (>4kg), IFG/IGT, hypertension, dyslipidemia, PCOS, vascular disease.
    difficulty: medium
    category: diabetes-diagnosis-classification

  - id: card-028
    front: |
      What is the global burden of diabetes as of 2021 (10th edition IDF)?
    back: |
      537 million people worldwide with diabetes in 2021, projected to increase 46% to 783 million by 2045. Greatest increase in Africa (134% from 24M to 55M).
    difficulty: medium
    category: diabetes-diagnosis-classification

  - id: card-029
    front: |
      How does the burden of diabetes compare to other major diseases?
    back: |
      More people have diabetes than HIV, tuberculosis, and malaria combined.
    difficulty: medium
    category: diabetes-diagnosis-classification

  - id: card-030
    front: |
      What are the acute complications of diabetes?
    back: |
      Metabolic: hyper/hypoglycemia, diabetic ketoacidosis. Infections: acute (pneumonia, arthritis, UTI) or chronic (tuberculosis).
    difficulty: medium
    category: diabetes-diagnosis-classification

  - id: card-031
    front: |
      Name the major microvascular complications of diabetes.
    back: |
      1) Retinopathy (90% of type 1, 20-90% of type 2)
      2) Nephropathy (⅓ of type 1, 3-15% of type 2)
      3) Neuropathy (10-100% of type 1 and 2)
    difficulty: medium
    category: diabetes-diagnosis-classification

  - id: card-032
    front: |
      Name the major macrovascular (atherosclerotic) complications of diabetes.
    back: |
      1) Coronary artery disease/cardiovascular disease (2-4 fold increased risk)
      2) Cerebrovascular disease/stroke (2-fold increased risk)
      3) Peripheral vascular disease
    difficulty: medium
    category: diabetes-diagnosis-classification

  - id: card-033
    front: |
      What other chronic complications of diabetes exist beyond micro/macrovascular?
    back: |
      Diabetic foot (combination of vascular, neuropathy, infection), cataracts, skin and connective tissue diseases, rheumatological disease.
    difficulty: medium
    category: diabetes-diagnosis-classification

  - id: card-034
    front: |
      What is the relationship between hyperglycemia and microvascular complications?
    back: |
      Microvascular complications are specific to diabetes and related to the duration and degree of hyperglycemia. Hyperglycemia is important for both initiation and progression of complications. Other factors (metabolic, genetic, vascular, environmental) contribute but hyperglycemia is the major determinant.
    difficulty: medium
    category: diabetes-diagnosis-classification

  - id: card-035
    front: |
      At what time do chronic complications develop in type 1 diabetes?
    back: |
      Chronic complications occur years after diagnosis of type 1 diabetes (diagnosed usually via DKA presentation).
    difficulty: medium
    category: diabetes-diagnosis-classification

  - id: card-036
    front: |
      At what time do chronic complications develop in type 2 diabetes?
    back: |
      Chronic complications may occur years after diagnosis, but in many cases complications may be the mode of presentation (found at first detection of diabetes).
    difficulty: medium
    category: diabetes-diagnosis-classification

  - id: card-037
    front: |
      Define diabetic nephropathy.
    back: |
      Diabetic nephropathy is characterized by: 1) Persistent proteinuria, 2) Progressive decline in renal function (GFR), 3) Arterial hypertension, 4) Associated retinopathy
    difficulty: medium
    category: diabetes-diagnosis-classification

  - id: card-038
    front: |
      What is the prevalence of diabetic nephropathy in type 1 vs type 2?
    back: |
      Type 1: ⅓ (approximately 33%). Type 2: 15%.
    difficulty: medium
    category: diabetes-diagnosis-classification

  - id: card-039
    front: |
      What is the most important factor for development of diabetic nephropathy?
    back: |
      Duration of diabetes is the most important factor. In type 1, incidence peaks at about 15 years. In type 2, it can peak earlier.
    difficulty: medium
    category: diabetes-diagnosis-classification

