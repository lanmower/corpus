      Front: "Practice Scenario 11 (Answers): A 1-year old (6.5kg) 2-day diarrhoea/vomiting, restless irritable, warm hands, AVPU=V, skin pinch 4s, sunken eyes, skin and bones. Why is this Priority?"
      Back: "Severe malnutrition (skin and bones appearance) is a priority sign (MOB: Malnutrition). Also moderate-severe dehydration (sunken eyes, slow skin turgor) with altered consciousness requires priority assessment."
