    fields:
      Front: "What are the main modes of inflicting blunt trauma in physical abuse?"
      Back: "Blunt object trauma may be inflicted using: fist, bat, elbow, wooden spoon. Clinical presentation: haematoma, swelling, bruising, subconjunctival haemorrhage."
