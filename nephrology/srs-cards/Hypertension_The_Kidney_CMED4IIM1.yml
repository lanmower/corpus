- id: 1
  front: What is blood pressure determined by?
  back: Blood pressure is the product of cardiac output and systemic vascular resistance.
  topic: Hypertension Basics

- id: 2
  front: What causes increased cardiac output?
  back: Increased cardiac output can result from hypervolemia in kidney diseases, endocrine diseases, stress, sympathetic activation, or endocrine neoplasias.
  topic: Hypertension Pathophysiology

- id: 3
  front: What causes increased systemic vascular resistance?
  back: Increased systemic vascular resistance results from sympathetic activation, atherosclerosis/blockages in arteries, adrenal artery disease, endocrine properties, and cerebral ischemia.
  topic: Hypertension Pathophysiology

- id: 4
  front: What is hypertensive nephropathy?
  back: Hypertensive nephropathy involves arterial sclerosis of renal vessels, sclerosis of glomeruli, and interstitial fibrosis, leading to progressive kidney destruction if blood pressure is not controlled.
  topic: Hypertensive Nephropathy

- id: 5
  front: What are the epidemiological features of hypertension globally?
  back: More than 1 billion adults have hypertension. At least 40% of people over 25 have hypertension. It is a silent, invisible, progressive disease.
  topic: Hypertension Epidemiology

- id: 6
  front: What are the epidemiological features of hypertension in South Africa?
  back: In South Africa, about 8.2 million adults in the public sector have hypertension with female predominance. More than one-third of kidney replacement therapy patients have hypertension as the primary cause.
  topic: Hypertension Epidemiology

- id: 7
  front: What features suggest hypertensive nephropathy?
  back: Patients tend to have long hypertension history, left ventricular hypertrophy on ECG, relatively normal urinary sediment, kidney shrinkage on ultrasound, slowly progressive kidney function loss, and non-nephrotic proteinuria.
  topic: Hypertensive Nephropathy

- id: 8
  front: What is the blood pressure classification for Stage 1 hypertension?
  back: Stage 1 hypertension - systolic BP 140-159 mmHg and diastolic BP 90-99 mmHg.
  topic: Hypertension Classification

- id: 9
  front: What is the blood pressure classification for Stage 2 hypertension?
  back: Stage 2 hypertension - systolic BP >160 mmHg and diastolic BP >100 mmHg.
  topic: Hypertension Classification

- id: 10
  front: What is the blood pressure classification for normal and pre-hypertension?
  back: Normal - <120 systolic and <80 diastolic. Pre-hypertension - 120-139 systolic and 80-89 diastolic.
  topic: Hypertension Classification

- id: 11
  front: What are the correct patient positioning requirements for BP measurement?
  back: Patient should sit with back supported, feet flat on floor, arms bare and resting on table. No talking between measurements. Patient should be in a quiet room and not smoke or consume coffee 30 minutes before measurement.
  topic: Blood Pressure Measurement

- id: 12
  front: How should BP be measured for diagnosis?
  back: BP should be measured on both arms separated by at least 1-2 minutes. Take average of two readings on more than two occasions. Bladder should be empty.
  topic: Blood Pressure Measurement

- id: 13
  front: What are major cardiovascular risk factors?
  back: Risk factors include tobacco use, elevated LDL or total cholesterol, diabetes, obesity (BMI >30), age >55 for men or >65 for women, GFR <60 mL/min, proteinuria, family history of premature CVD, and lack of exercise.
  topic: Cardiovascular Risk Assessment

- id: 14
  front: What are potential secondary causes of hypertension to exclude?
  back: Secondary causes include renal artery stenosis, obstructive sleep apnea, glomerulonephritis, chronic kidney disease, polycystic kidney disease, endocrine causes, gestational hypertension, SIADH, and aortic coarctation.
  topic: Hypertension Etiology

- id: 15
  front: What medications can cause hypertension?
  back: Over-the-counter medications, herbal medications, anti-appetite medications, oral contraceptives, alcohol, illicit drugs, NSAIDs, corticosteroids, and licorice can all cause hypertension.
  topic: Secondary Hypertension

- id: 16
  front: What are the features of acute hypertensive retinopathy?
  back: Features include arteriovenous nicking, vessel wall changes, copper or silver wire appearances, hard exudates, flame hemorrhages, and papilledema (late sign).
  topic: Hypertensive Complications

- id: 17
  front: What lifestyle measures help reduce blood pressure?
  back: Key measures include salt reduction (aim for <6g/day), weight loss for BMI >30, DASH diet adherence, exercise (5x/week, 30+ minutes at moderate intensity), alcohol reduction (≤2 drinks/day), caffeine reduction, and stress management.
  topic: Hypertension Management

- id: 18
  front: What are the effects of exercise on blood pressure?
  back: Exercise alone can reduce blood pressure by up to 10 mmHg. Patients should exercise 5 times per week at moderate intensity for at least 30-minute intervals with aerobic exercise.
  topic: Hypertension Management

- id: 19
  front: What is the impact of salt reduction on hypertension?
  back: Reducing salt reduces blood pressure in both normotensive and hypertensive populations. It enhances effectiveness of ACE inhibitors and ARBs. Normal range is 8-12 g/day; aim for <6 g/day.
  topic: Hypertension Management

- id: 20
  front: What is the impact of weight loss on hypertension and metabolic factors?
  back: Weight reduction reduces blood pressure, has beneficial influence on insulin resistance, improves cholesterol profile, improves left ventricular hypertrophy, and improves diabetic control.
  topic: Hypertension Management

- id: 21
  front: What is the target blood pressure for hypertensive patients?
  back: Target systolic BP is <120 mmHg. This target reduces progression in both diabetic and non-diabetic patients. However, targets must be individualized based on comorbidities and age.
  topic: Hypertension Management

- id: 22
  front: What are the major drug classes used to treat hypertension?
  back: Major classes include diuretics, ACE inhibitors, angiotensin receptor blockers (ARBs), calcium channel blockers, beta blockers, vasodilators, alpha agonists, and potassium-sparing agents.
  topic: Antihypertensive Medications

- id: 23
  front: Why are ACE inhibitors and ARBs preferred in hypertension management?
  back: ACE inhibitors and ARBs are preferred because they help with chronic kidney disease and prevent or slow the progression of kidney disease.
  topic: Antihypertensive Medications

- id: 24
  front: When should aspirin and statins be used in hypertensive patients?
  back: Aspirin and statin therapy should be considered to reduce cardiovascular risk profile in hypertensive patients.
  topic: Hypertension Management

- id: 25
  front: What are the indications to refer hypertensive patients for specialist care?
  back: Refer for specialist care if - accelerated hypertension, BP >220/120 persistently, evidence of encephalopathy or cardiogenic shock, aortic dissection, impending complications (left ventricular failure, TIA), suspected secondary hypertension, resistant to >3 drugs, multiple drug intolerances/contraindications, non-compliance, or hypertension in pregnancy.
  topic: Hypertension Management

- id: 26
  front: What symptoms can occur with hypertensive urgency?
  back: Symptoms may include headache, lightheadedness, shortness of breath, nausea, heart palpitations, epistaxis, anxiety, blurred vision, and reduced concentration. However, most hypertensives are asymptomatic.
  topic: Hypertension Presentation

- id: 27
  front: What are signs of target organ damage from chronic hypertension on examination?
  back: Signs include displaced and sustained apex beat, presence of S4 gallop, loud A2 with aortic root dilatation, absent or weak pulses (femoral), bruits over carotid arteries, and bruits over renal arteries.
  topic: Hypertensive Complications

- id: 28
  front: What are the key history elements when evaluating a hypertensive patient?
  back: Key elements include - previous hypertension documentation on separate occasions, evidence of end-organ damage (heart, brain, kidney, eyes), cardiovascular risk factors, history of cardiac events (angina, MI, revascularization, heart failure), cerebrovascular events (stroke, TIA, dementia), chronic kidney disease, peripheral artery disease, retinopathy.
  topic: Hypertension Assessment

- id: 29
  front: What investigations are needed for hypertensive patients?
  back: Investigations include hemoglobin (anemia detection), urinalysis and dipstick (proteinuria, primary/secondary causes), serum potassium and creatinine (kidney function, endocrine causes), blood glucose (diabetes), lipid profile, and ECG for left ventricular hypertrophy.
  topic: Hypertension Investigation

- id: 30
  front: How is diagnosis of hypertensive nephropathy made?
  back: Diagnosis is inferred from clinical characteristics and exclusion of other causes - long hypertension history, left ventricular hypertrophy on ECG, normal urinary sediment, kidney shrinkage on ultrasound, slowly progressive kidney function, and non-nephrotic proteinuria. Hypertension typically precedes proteinuria development.
  topic: Hypertensive Nephropathy

- id: 31
  front: How does hypertensive nephropathy differ from nephrotic syndrome?
  back: Nephrotic syndrome has moderate-heavy proteinuria and edema with primary disease symptoms, while hypertensive nephropathy has mild-to-moderate proteinuria without nephrotic features. Hypertensive patients often have hematuria.
  topic: Hypertensive Nephropathy

- id: 32
  front: What is the first-line approach to hypertension treatment?
  back: Lifestyle modifications are the first and most important approach. Lifestyle measures decrease blood pressure, reduce drug requirements, improve cardiovascular risk profile, and work synergistically with antihypertensive agents.
  topic: Hypertension Management

- id: 33
  front: What effect does caffeine have on blood pressure?
  back: Consuming more than 5 cups of coffee per day increases blood pressure by at least 10-15 mmHg. Caffeine exposure should be reduced.
  topic: Hypertension Risk Factors

- id: 34
  front: What is the salt content recommendation for hypertensive patients?
  back: Daily salt intake should be 8-12 g normally but reduced to at least 6 g/day or less. This is equivalent to no more than one teaspoon of salt total per day. Most salt is hidden in breads, stock cubes, ready meals, breakfast cereals, and sauces.
  topic: Hypertension Management

- id: 35
  front: What is the DASH diet and when is it recommended?
  back: DASH (Dietary Approaches to Stop Hypertension) is a recommended eating pattern for hypertensive patients. Patients should be referred to a dietician for guidance on DASH diet adherence to help reduce salt and maintain healthy eating.
  topic: Hypertension Management
