    fields:
      Front: "List the clinical signs of a child actively convulsing."
      Back: "1. Sudden loss of consciousness; 2. Uncontrolled jerky movements of the limbs and/or face; 3. Stiffening of the arms and legs; 4. Uncontrolled movements of the arms and legs; 5. Twitching of the face, hands or feet; 6. Abnormal movements of the eyes; 7. Brief apnoeas"
    tags: ["convulsion-signs", "seizure-recognition", "subject:paediatrics"]
