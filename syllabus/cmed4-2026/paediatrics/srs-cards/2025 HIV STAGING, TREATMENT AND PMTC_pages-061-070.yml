    deck: "Corpus::Paediatrics::2025 HIV STAGING, TREATMENT AND PMTC"
    fields:
      Front: "When should measles vaccine be given to HIV-infected children?"
      Back: |
        Measles vaccine is recommended for both asymptomatic and symptomatic HIV-infected children at 6 and 9 months of age.
    tags: ["measles-vaccine", "immunization-schedule", "timing", "subject:paediatrics"]
