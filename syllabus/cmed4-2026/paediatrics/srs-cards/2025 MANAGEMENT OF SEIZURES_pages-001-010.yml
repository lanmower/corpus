    deck: "Corpus::Paediatrics::2025 MANAGEMENT OF SEIZURES"
    fields:
      Front: "Define: Seizure"
      Back: "A seizure is an abnormal, excessive, or synchronous discharges of neurons that result in sudden, transient alterations in neurological function, manifested by clinical or EEG changes."
    tags: ["subject:paediatrics", "seizures", "definitions"]
  - guid: b2e7f1a3d4c5e6f8
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 MANAGEMENT OF SEIZURES"
    fields:
      Front: "Define: Epilepsy"
      Back: "Epilepsy is a tendency to have recurrent seizures; a disorder characterized by a predisposition to generate epileptic seizures and by the neurobiological, cognitive, psychological, and social consequences of this condition."
    tags: ["subject:paediatrics", "seizures", "definitions"]
  - guid: c3f9d2a1e5b4c6f7
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 MANAGEMENT OF SEIZURES"
    fields:
      Front: "Define: Epilepsy syndrome"
      Back: "An epilepsy syndrome is a complex of signs and symptoms that define a unique epilepsy condition, typically with specific etiology, age of onset, seizure types, EEG pattern, prognosis, and response to treatment."
    tags: ["subject:paediatrics", "seizures", "definitions", "epilepsy-syndromes"]
  - guid: d4a0e3f2c1b5d7f6
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 MANAGEMENT OF SEIZURES"
    fields:
      Front: "Define: Convulsion"
      Back: "A convulsion is involuntary muscular contractions and relaxations; a violent uncontrollable contraction of muscles, typically used synonymously with generalized seizure."
    tags: ["subject:paediatrics", "seizures", "definitions", "terminology"]
  - guid: e5b1f4g3a2c6d8f7
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 MANAGEMENT OF SEIZURES"
    fields:
      Front: "Define: Fit"
      Back: "A fit is colloquial term for seizure; represents a sudden attack or paroxysmal event of neurological dysfunction."
    tags: ["subject:paediatrics", "seizures", "definitions", "terminology"]
  - guid: f6c2g5h4b3d7e9f8
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 MANAGEMENT OF SEIZURES"
    fields:
      Front: "Define: Status Epilepticus"
      Back: "Status epilepticus is a state of prolonged seizure activity or a series of seizures without full recovery of consciousness between attacks; defined as seizure activity lasting more than 30 minutes or two or more seizures without regaining consciousness."
    tags: ["subject:paediatrics", "seizures", "definitions", "status-epilepticus"]
  - guid: a7d3h6i5c4e8f0g9
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 MANAGEMENT OF SEIZURES"
    fields:
      Front: "Define: Convulsive Status Epilepticus"
      Back: "Convulsive status epilepticus is prolonged or recurrent generalized tonic-clonic seizures with persistent alteration of consciousness; characterized by visible muscle contractions."
    tags: ["subject:paediatrics", "seizures", "definitions", "status-epilepticus"]
  - guid: b8e4i7j6d5f9g1h0
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 MANAGEMENT OF SEIZURES"
    fields:
      Front: "Define: Non-Convulsive Status Epilepticus"
      Back: "Non-convulsive status epilepticus is a state of mental alteration without visible muscle contractions; characterized by absence or minimal motor signs despite ongoing epileptic activity on EEG."
    tags: ["subject:paediatrics", "seizures", "definitions", "status-epilepticus"]
