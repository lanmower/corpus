  - guid: a1f7c4d8b3e56921
    noteType: Basic
    deck: "Corpus::Paediatrics::ETAT - Coma and Convulsions"
    fields:
      Front: "What is the first step in treating a child with convulsions?"
      Back: "Manage the airway and breathing - position the child, suction gently, give oxygen via face mask"
    tags: ["convulsion-treatment", "airway", "etat", "subject:paediatrics"]
  - guid: d5b2f9a7c1e34678
    noteType: Basic
    deck: "Corpus::Paediatrics::ETAT - Coma and Convulsions"
    fields:
      Front: "What should you NOT do during a child's convulsion?"
      Back: "Do not place anything into the mouth - this prevents aspiration and airway obstruction"
    tags: ["convulsion-safety", "airway", "etat", "subject:paediatrics"]
  - guid: e3a6f1d9b8c27451
    noteType: Basic
    deck: "Corpus::Paediatrics::ETAT - Coma and Convulsions"
    fields:
      Front: "What is status epilepticus?"
      Back: "A seizure that lasts for > 5 minutes"
    tags: ["status-epilepticus", "convulsion", "etat", "subject:paediatrics"]
  - guid: c7d4a2f5b9e16832
    noteType: Basic
    deck: "Corpus::Paediatrics::ETAT - Coma and Convulsions"
    fields:
      Front: "What are the complications of convulsions in children?"
      Back: "Status epilepticus (seizure > 5 min), brain swelling, brain damage after cell death, choking and aspiration of vomitus, death"
    tags: ["complications", "convulsion", "etat", "subject:paediatrics"]
  - guid: b1e8f3c6a4d59721
    noteType: Basic
    deck: "Corpus::Paediatrics::ETAT - Coma and Convulsions"
    fields:
      Front: "What is the second step in treating convulsions after airway management?"
      Back: "Check blood glucose and give IV glucose if hypoglycaemic (< 3 mmol/l) with 5 ml/kg of 10% glucose solution"
    tags: ["convulsion-treatment", "glucose", "etat", "subject:paediatrics"]
  - guid: f6a3d7c1b8e42950
    noteType: Basic
    deck: "Corpus::Paediatrics::ETAT - Coma and Convulsions"
    fields:
      Front: "What is the third step in treating convulsions?"
      Back: "Stop the seizure by giving an anticonvulsant medication"
    tags: ["convulsion-treatment", "anticonvulsant", "etat", "subject:paediatrics"]
  - guid: a9c2f5d8b1e76341
    noteType: Basic
    deck: "Corpus::Paediatrics::ETAT - Coma and Convulsions"
    fields:
      Front: "What is the first choice anticonvulsant in children with convulsions?"
      Back: "A short-acting benzodiazepine, first choice is Lorazepam given by IV route"
    tags: ["anticonvulsant", "benzodiazepine", "etat", "subject:paediatrics"]
  - guid: d3b7f2a9c6e41852
    noteType: Basic
    deck: "Corpus::Paediatrics::ETAT - Coma and Convulsions"
    fields:
      Front: "What is the second choice anticonvulsant if Lorazepam is unavailable?"
      Back: "Midazolam - can be given by IV, IM, or buccal route"
    tags: ["anticonvulsant", "midazolam", "etat", "subject:paediatrics"]
  - guid: e1f4a6d2c8b39751
    noteType: Basic
    deck: "Corpus::Paediatrics::ETAT - Coma and Convulsions"
    fields:
      Front: "What is the last choice anticonvulsant if Lorazepam and Midazolam are unavailable?"
      Back: "Diazepam - given by IV or rectal (PR) route only, NOT by IM or buccal route"
    tags: ["anticonvulsant", "diazepam", "etat", "subject:paediatrics"]
  - guid: c5a8f3d1b9e27461
    noteType: Basic
    deck: "Corpus::Paediatrics::ETAT - Coma and Convulsions"
    fields:
      Front: "What routes can be used for Midazolam in convulsions when IV access is unavailable?"
      Back: "IM (intramuscular) or buccal routes"
    tags: ["midazolam", "routes", "anticonvulsant", "etat", "subject:paediatrics"]
  - guid: b2d6f7a3c1e89532
    noteType: Basic
    deck: "Corpus::Paediatrics::ETAT - Coma and Convulsions"
    fields:
      Front: "What route can be used for Lorazepam if IV access is unavailable in convulsions?"
      Back: "IM (intramuscular) or buccal routes"
    tags: ["lorazepam", "routes", "anticonvulsant", "etat", "subject:paediatrics"]
  - guid: f9c1a4d5b8e23671
    noteType: Basic
    deck: "Corpus::Paediatrics::ETAT - Coma and Convulsions"
    fields:
      Front: "What route must be used for Diazepam in convulsions if IV access is unavailable?"
      Back: "Rectal (PR) route only - cannot be given IM or buccal"
    tags: ["diazepam", "routes", "anticonvulsant", "etat", "subject:paediatrics"]
  - guid: a7e3f6d2b9c14785
    noteType: Basic
    deck: "Corpus::Paediatrics::ETAT - Coma and Convulsions"
    fields:
      Front: "What should be done if a child continues to convulse after initial anticonvulsant therapy?"
      Back: "An intraosseous (IO) line should be placed if IV access is not already achieved"
    tags: ["convulsion-management", "io-line", "etat", "subject:paediatrics"]
  - guid: d4b1f8a6c3e79521
    noteType: Basic
    deck: "Corpus::Paediatrics::ETAT - Coma and Convulsions"
    fields:
      Front: "Why is IV line insertion important in coma and convulsion management?"
      Back: "To draw blood for emergency laboratory investigations and to administer IV glucose and anticonvulsant medications"
    tags: ["iv-line", "emergency-procedure", "etat", "subject:paediatrics"]
  - guid: c2e7f1a9d5b36841
    noteType: Basic
    deck: "Corpus::Paediatrics::ETAT - Coma and Convulsions"
    fields:
      Front: "What is the blood glucose threshold for hypoglycaemia in convulsion management?"
      Back: "< 3 mmol/litre (55 mg/dl)"
    tags: ["hypoglycaemia", "glucose-threshold", "etat", "subject:paediatrics"]
  - guid: e6a5f3d1c8b24792
    noteType: Basic
    deck: "Corpus::Paediatrics::ETAT - Coma and Convulsions"
    fields:
      Front: "What glucose dose should be given IV for hypoglycaemia in a convulsing child?"
      Back: "5 ml/kg of 10% glucose solution given rapidly by IV injection"
    tags: ["glucose-dose", "hypoglycaemia", "etat", "subject:paediatrics"]
