- id: ra-pages-011-018-01
  front: "What are the extra-articular manifestations of rheumatoid arthritis?"
  back: "Extra-articular manifestations include pulmonary involvement (nodules, small airway disease), Felty syndrome (splenomegaly), digital ulcers, scleritis, and skin manifestations. Nodules can be found on joint surfaces, lungs, and heart."
  tags:
    - extra-articular
    - manifestations
    - complications

- id: ra-pages-011-018-02
  front: "How are rheumatoid arthritis classification criteria scored?"
  back: "Classification criteria score based on: number of joints involved (higher score for more smaller joints), serology (positive RF/anti-CCP = higher points), and symptom duration (≥6 weeks = higher points). A score of 6 or more is consistent with definite RA."
  tags:
    - classification
    - criteria
    - scoring
    - diagnosis

- id: ra-pages-011-018-03
  front: "What is the difference between seronegative and seropositive RA?"
  back: "Seropositive RA (positive RF or anti-CCP) has higher risk of progression and development of extra-articular manifestations compared to seronegative RA. Seronegative means absence of these markers but does not exclude RA diagnosis."
  tags:
    - serology
    - diagnosis
    - prognosis

- id: ra-pages-011-018-04
  front: "What investigations should be performed to diagnose RA?"
  back: "Investigations include rheumatoid factor and anti-CCP antibodies (serology), ESR and CRP (inflammatory markers), ANA to exclude SLE in young patients (15-45 years), and plain radiographs looking for erosions and joint space narrowing."
  tags:
    - investigation
    - diagnosis
    - inflammatory-markers

- id: ra-pages-011-018-05
  front: "Describe the radiological findings in RA progression"
  back: "Early findings include soft tissue swelling. Progressive findings include joint space narrowing, erosions (particularly at MCP and PIP joints), and symmetrical distribution. Late findings include significant erosions, joint space loss, ankylosis, and deformities like ulnar deviation."
  tags:
    - radiology
    - erosions
    - progression

- id: ra-pages-011-018-06
  front: "What is the DAS28 score used for?"
  back: "DAS28 (Disease Activity Score 28) is used to assess disease activity in RA by evaluating 28 specific joints: 10 on each hand (MCPs and PIPs), 2 wrists, 2 shoulders, 2 elbows, and 2 knees. It combines joint counts with ESR/CRP and patient/physician global assessment."
  tags:
    - disease-activity
    - monitoring
    - DAS28

- id: ra-pages-011-018-07
  front: "What DAS28 scores indicate different levels of RA disease activity?"
  back: "Remission: score <2.6; Low disease activity: 2.6-3.2; Moderate: 3.2-5.1; High: >5.1. The goal of treatment is to achieve remission or low disease activity."
  tags:
    - disease-activity
    - DAS28
    - remission

- id: ra-pages-011-018-08
  front: "What are the consequences of untreated RA?"
  back: "Consequences include premature mortality, increased morbidity, significant impairment of quality of life due to pain and fatigue, depression, work disability (25 percent within 2 years), and reduction in income."
  tags:
    - consequences
    - mortality
    - morbidity
    - disability

- id: ra-pages-011-018-09
  front: "What are the goals of RA treatment?"
  back: "Goals are to relieve pain and inflammation, prevent reversible joint damage, preserve/improve function, improve quality of life, and alter the natural history of disease. Treat to target with goal of remission."
  tags:
    - treatment-goals
    - management

- id: ra-pages-011-018-10
  front: "Describe the multidisciplinary team approach to RA management"
  back: "RA management includes rheumatologist, nurse, physiotherapist, social worker, occupational therapist, general practitioner, and surgeons. Team approach ensures continuity of care and patient education on disease management, behavioral modification, and coping with chronic disease."
  tags:
    - team-approach
    - management
    - multidisciplinary

- id: ra-pages-011-018-11
  front: "What is the relationship between obesity and RA?"
  back: "There is a strong association between obesity and RA. Obesity is associated with low pain threshold, disability, elevated inflammatory markers (CRP), increased risk of comorbidities (osteoarthritis, depression, diabetes), and reduced treatment efficacy."
  tags:
    - obesity
    - risk-factor
    - comorbidity

- id: ra-pages-011-018-12
  front: "What role does physical therapy play in RA management?"
  back: "Physical therapy aims to relieve pain, control inflammation, preserve/improve function, and prevent deformities. Includes exercise advice for pain, stiffness, range of motion and muscle strength, joint protection techniques, assistive devices, splints, and home modifications."
  tags:
    - physical-therapy
    - non-pharmacological
    - management

- id: ra-pages-011-018-13
  front: "What pharmacological treatments are available for RA?"
  back: "Treatments include NSAIDs (symptomatic), corticosteroids (short-term inflammation control), conventional synthetic DMARDs (methotrexate, sulphasalazine), and biologics (TNF inhibitors, JAK inhibitors, IL-6 inhibitors). All RA patients should be on disease-modifying therapy."
  tags:
    - pharmacotherapy
    - DMARDs
    - biologics

- id: ra-pages-011-018-14
  front: "What are the important considerations with NSAID use in RA?"
  back: "NSAIDs can cause kidney-related and gastrointestinal side effects. Caution needed in elderly patients. Should use lowest effective dose. Side effects include nausea, drowsiness, constipation, headache, dizziness, and indigestion."
  tags:
    - NSAIDs
    - side-effects
    - safety

- id: ra-pages-011-018-15
  front: "What is the role of corticosteroids in RA treatment?"
  back: "Corticosteroids are used for short-term symptom management and inflammation control but do not alter disease course. Should use lowest possible dose for shortest duration. Require osteoporosis protection with vitamin D and calcium. Can be used as intra-articular injections."
  tags:
    - corticosteroids
    - disease-modifying
    - short-term

- id: ra-pages-011-018-16
  front: "What special considerations apply to RA treatment in pregnancy?"
  back: "In pregnancy: most medications may need to be stopped; safety profiles differ between drugs; disease may flare in 7-10 percent of patients during or after pregnancy. Patients planning pregnancy need medication adjustment 3-6 months before conception. Breastfeeding status affects drug choice."
  tags:
    - pregnancy
    - breastfeeding
    - teratogenicity

- id: ra-pages-011-018-17
  front: "What is the relationship between RA and cardiovascular disease?"
  back: "RA patients have significantly elevated cardiovascular risk: 2x more likely to have MI, 1.7x more likely to have stroke, 25x increased risk of infection, and 17 percent higher mortality. Early treatment and disease control can reduce these risks."
  tags:
    - cardiovascular
    - comorbidity
    - mortality-risk

- id: ra-pages-011-018-18
  front: "Why is early diagnosis and intervention important in RA?"
  back: "Early diagnosis and treatment within 6 weeks-3 months of symptom onset is ideal. Earlier intervention prevents disease progression, reduces disability, and improves outcomes. Delays increase likelihood of progression and poorer long-term function."
  tags:
    - early-intervention
    - diagnosis
    - prognosis

- id: ra-pages-011-018-19
  front: "What are the target outcomes for RA treatment?"
  back: "Treatment should aim for remission (DAS28 <2.6) or low disease activity. Requires regular monitoring and treatment adjustment at 1-3 month intervals based on clinical response and DAS28 score until target is achieved. 'Treat to target' strategy improves outcomes."
  tags:
    - treat-to-target
    - remission
    - monitoring

- id: ra-pages-011-018-20
  front: "What considerations apply when prescribing NSAIDs in elderly RA patients?"
  back: "Elderly patients require careful consideration due to increased risk of kidney-related and gastrointestinal side effects. Should think twice before prescribing NSAIDs in this population; alternative therapies or lower doses may be necessary."
  tags:
    - elderly
    - NSAIDs
    - safety
    - age-consideration
