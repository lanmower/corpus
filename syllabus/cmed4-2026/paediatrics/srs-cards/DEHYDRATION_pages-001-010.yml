    fields:
      Front: "What is DEHYDRATION in paediatric emergency care?"
      Back: "A state of fluid loss from body tissues requiring assessment and fluid replacement in children with diarrhea and other causes of fluid loss. Initial assessment screens for shock vs non-shock dehydration."
    tags: ["dehydration", "paediatrics", "fluids", "subject:paediatrics"]
