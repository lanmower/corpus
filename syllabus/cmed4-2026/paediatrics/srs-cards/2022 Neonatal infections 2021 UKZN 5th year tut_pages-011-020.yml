  - guid: a9b0c1d2e35eff42
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2022 Neonatal infections"
    fields:
      Front: "What are the management considerations for neonatal sepsis?"
      Back: "Local versus systemic infection, congenital versus nosocomial, supportive care (fluid, electrolyte, glucose correction, respiratory support, cardiovascular support), and antimicrobial therapy"
    tags: ["management", "sepsis", "subject:paediatrics"]
