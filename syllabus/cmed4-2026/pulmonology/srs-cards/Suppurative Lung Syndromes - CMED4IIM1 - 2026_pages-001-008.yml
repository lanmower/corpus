deck: "Corpus::Pulmonology::Suppurative Lung Syndromes"
notes:
  - guid: 4906d61d61071d54
    noteType: Basic
    deck: "Corpus::Pulmonology::Suppurative Lung Syndromes"
    fields:
      Front: "What is bronchiectasis?"
      Back: "Bronchiectasis is the abnormal, permanent dilatation of medium and small bronchial trees. It may be focal or diffuse, resulting from transmural inflammation and destruction of the bronchial walls."
    tags: ["bronchiectasis", "definition", "lung-pathology", "subject:pulmonology"]
  - guid: 80839cacea0694c9
    noteType: Basic
    deck: "Corpus::Pulmonology::Suppurative Lung Syndromes"
    fields:
      Front: "What is the pathology of bronchiectasis?"
      Back: "Transmural inflammation and destruction predominantly affects the walls of medium-sized bronchi. This leads to: mucosal edema, replacement of cartilage/muscle/elastic tissue with fibrous tissue, mucus gland hyperplasia with impaired mucociliary clearance, recurrent bacterial infections, increased bronchial wall vascularity (neovascularization), and risk of hemoptysis."
    tags: ["bronchiectasis", "pathology", "mechanisms", "subject:pulmonology"]
  - guid: 0e88a7edd91b09c5
    noteType: Basic
    deck: "Corpus::Pulmonology::Suppurative Lung Syndromes"
    fields:
      Front: "What are the main mechanisms leading to bronchiectasis development?"
      Back: "Four main factors: 1) Repeated infective insults 2) Airway obstruction (foreign body or lymph node) 3) Reduced clearance of mucus/materials in airways 4) Defects in host immune defense system. These lead to bacterial toxins, immune response with mediators and oxygen free radicals, progressive destruction, airway colonization, and ongoing destructive changes."
    tags: ["bronchiectasis", "etiology", "mechanisms", "subject:pulmonology"]
  - guid: 202f841c5e0fb5b3
    noteType: Basic
    deck: "Corpus::Pulmonology::Suppurative Lung Syndromes"
    fields:
      Front: "What are the main etiological categories of bronchiectasis?"
      Back: "1) Airway obstructive causes (innate: bronchomegaly, tracheobranchomegaly; acquired: foreign body aspiration, lymphadenopathy) 2) Defects in host defense (immunoglobulin deficiencies - IgA, IgG; HIV; chronic malnutrition) 3) Impaired drainage (cystic fibrosis, Kartagener syndrome) 4) Secondary to connective tissue disease, alpha-1 antitrypsin deficiency, chronic childhood infections"
    tags: ["bronchiectasis", "etiology", "causes", "subject:pulmonology"]
  - guid: 7abada6458f12b2b
    noteType: Basic
    deck: "Corpus::Pulmonology::Suppurative Lung Syndromes"
    fields:
      Front: "What is Kartagener syndrome and what is the classic triad?"
      Back: "Kartagener syndrome is a ciliary dysfunction disorder. The classic triad consists of: 1) Situs inversus totalis (complete mirror-image reversal of thoracic and abdominal organs) 2) Chronic sinusitis 3) Bronchiectasis."
    tags: ["bronchiectasis", "kartagener-syndrome", "etiology", "subject:pulmonology"]
  - guid: 267ca797c91ba133
    noteType: Basic
    deck: "Corpus::Pulmonology::Suppurative Lung Syndromes"
    fields:
      Front: "Which etiologies of bronchiectasis are associated with TB?"
      Back: "TB causes bronchiectasis through: 1) Necrotizing effect on lung parenchyma and airways 2) Airway obstruction by fibrosis or lymph node enlargement. Apical or posterior segment abscesses should raise suspicion for TB."
    tags: ["bronchiectasis", "tuberculosis", "etiology", "subject:pulmonology"]
  - guid: ee351cc893c5624d
    noteType: Basic
    deck: "Corpus::Pulmonology::Suppurative Lung Syndromes"
    fields:
      Front: "What are the typical clinical features of bronchiectasis?"
      Back: "1) Productive cough with profuse, purulent, foul-smelling sputum 2) Hemoptysis (occurs in majority of patients, due to friable mucosa or hypertrophied bronchial arteries) 3) Dyspnea 4) Wheeze (from associated bronchoconstriction) 5) Clubbing on examination 6) Coarse crackles/crepitations (from surrounding fibrosis and airway secretions)"
    tags: ["bronchiectasis", "clinical-presentation", "symptoms", "subject:pulmonology"]
  - guid: c7821eb9ed658397
    noteType: Basic
    deck: "Corpus::Pulmonology::Suppurative Lung Syndromes"
    fields:
      Front: "What are the major complications of bronchiectasis?"
      Back: "1) Hemoptysis 2) Septicemia or septic shock 3) Amyloidosis 4) Lung abscess 5) Empyema 6) Cor pulmonale with heart failure"
    tags: ["bronchiectasis", "complications", "subject:pulmonology"]
  - guid: 7c4a23a681407e92
    noteType: Basic
    deck: "Corpus::Pulmonology::Suppurative Lung Syndromes"
    fields:
      Front: "What are the three main goals of diagnostic evaluation in bronchiectasis?"
      Back: "1) Radiographic confirmation of disease 2) Identify if there is a potentially treatable underlying cause 3) Functional assessment of the patient"
    tags: ["bronchiectasis", "diagnosis", "evaluation", "subject:pulmonology"]
  - guid: 64a23353a293b2d6
    noteType: Basic
    deck: "Corpus::Pulmonology::Suppurative Lung Syndromes"
    fields:
      Front: "What baseline laboratory tests are performed in bronchiectasis?"
      Back: "1) Full blood count 2) Inflammatory markers (to rule out infection) 3) Sputum microscopy, culture and sensitivity (to exclude TB and identify bacterial pathogens) 4) TB culture and Gene Xpert 5) Immunoglobulins (to assess for immunodeficiency) 6) HIV testing 7) Autoimmune screens"
    tags: ["bronchiectasis", "diagnosis", "laboratory", "subject:pulmonology"]
  - guid: c1b2d58fd8e09980
    noteType: Basic
    deck: "Corpus::Pulmonology::Suppurative Lung Syndromes"
    fields:
      Front: "What is the classic chest X-ray finding in bronchiectasis?"
      Back: "Honeycomb appearance, which can be unilateral or bilateral, representing dilated airways and bronchial wall thickening."
    tags: ["bronchiectasis", "imaging", "chest-xray", "subject:pulmonology"]
  - guid: f3eb82425942e8d6
    noteType: Basic
    deck: "Corpus::Pulmonology::Suppurative Lung Syndromes"
    fields:
      Front: "What are the key CT findings in bronchiectasis?"
      Back: "1) Airway dilatation with lack of airway tapering toward the periphery 2) Bronchial wall thickening 3) Cystic bronchiectasis (cystic-like appearance at the end of bronchus) 4) Signet ring sign (bronchus larger than accompanying artery) 5) Tram-track sign (elongated, dilated airways appearing parallel)"
    tags: ["bronchiectasis", "imaging", "ct-scan", "subject:pulmonology"]
  - guid: 8af777ad5f41000d
    noteType: Basic
    deck: "Corpus::Pulmonology::Suppurative Lung Syndromes"
    fields:
      Front: "What do pulmonary function tests show in bronchiectasis?"
      Back: "Obstructive pattern: reduced FEV1, reduced FEV1/FVC ratio, and usually normal forced vital capacity. In advanced disease with extensive lung destruction and fibrosis, a very low FVC may be present."
    tags: ["bronchiectasis", "diagnosis", "pulmonary-function", "subject:pulmonology"]
  - guid: 79184ee6b94afb72
    noteType: Basic
    deck: "Corpus::Pulmonology::Suppurative Lung Syndromes"
    fields:
      Front: "When is an echocardiogram indicated in bronchiectasis?"
      Back: "To assess for right heart involvement due to chronic hypoxemia, including evaluation for right heart dilatation and pulmonary hypertension."
    tags: ["bronchiectasis", "diagnosis", "echocardiography", "subject:pulmonology"]
  - guid: 34379887d5f324a1
    noteType: Basic
    deck: "Corpus::Pulmonology::Suppurative Lung Syndromes"
    fields:
      Front: "What are the main goals of treatment in bronchiectasis?"
      Back: "1) Treat infections early, especially during exacerbations 2) Improve airway clearance 3) Reduce inflammation 4) Treat any identifiable underlying cause"
    tags: ["bronchiectasis", "treatment", "management", "subject:pulmonology"]
  - guid: b6ef7dc612dccbe3
    noteType: Basic
    deck: "Corpus::Pulmonology::Suppurative Lung Syndromes"
    fields:
      Front: "How are antibiotic infections managed in bronchiectasis?"
      Back: "Antibiotics are used only during acute exacerbations and should be: 1) Early identified 2) Treated aggressively 3) Directed by culture and sensitivity results when available 4) Empirically started with augmentin (amoxicillin-clavulanate) combined with azithromycin. Note: Pseudomonas infection is particularly concerning as it's associated with greater lung function deterioration."
    tags: ["bronchiectasis", "treatment", "antibiotics", "subject:pulmonology"]
  - guid: 05a7a7ff0f0fff62
    noteType: Basic
    deck: "Corpus::Pulmonology::Suppurative Lung Syndromes"
    fields:
      Front: "What are the mechanical and physiotherapy approaches to airway clearance in bronchiectasis?"
      Back: "1) Oscillatory devices to loosen mucus and aid drainage/expulsion 2) Physiotherapy training on effective drainage techniques 3) Use of mucolytics (though controversial) 4) Bronchodilators to improve obstruction and aid secretion clearance. These methods help facilitate appropriate sputum drainage."
    tags: ["bronchiectasis", "treatment", "airway-clearance", "subject:pulmonology"]
  - guid: 1ae9a59be4399fa0
    noteType: Basic
    deck: "Corpus::Pulmonology::Suppurative Lung Syndromes"
    fields:
      Front: "When is surgery indicated in bronchiectasis?"
      Back: "1) Localized disease with poor response to medical treatment 2) Bronchiectasis with approximate airway obstruction requiring relief 3) Massive hemoptysis (may require bronchial artery embolization) 4) Selected cases for disease control"
    tags: ["bronchiectasis", "treatment", "surgery", "subject:pulmonology"]
  - guid: 681c3ef80df96e3e
    noteType: Basic
    deck: "Corpus::Pulmonology::Suppurative Lung Syndromes"
    fields:
      Front: "What general preventive measures are recommended for bronchiectasis?"
      Back: "1) Smoking cessation (if applicable) 2) Pneumococcal vaccination 3) Annual flu vaccine 4) COVID-19 vaccination 5) Supplemental oxygen therapy if hypoxemia is present"
    tags: ["bronchiectasis", "treatment", "prevention", "subject:pulmonology"]
  - guid: 4ef09a53ef75bfee
    noteType: Basic
    deck: "Corpus::Pulmonology::Suppurative Lung Syndromes"
    fields:
      Front: "What is cystic fibrosis and what is the genetic basis?"
      Back: "Cystic fibrosis is an autosomal recessive disease caused by a mutation in the cystic fibrosis transmembrane regulator (CFTR) gene on chromosome 7. The mutation affects chloride channels, resulting in viscid thick secretions that promote bacterial binding, proliferation, and recurrent infections."
    tags: ["cystic-fibrosis", "genetics", "pathophysiology", "subject:pulmonology"]
  - guid: 9e9b0c0577eca9c9
    noteType: Basic
    deck: "Corpus::Pulmonology::Suppurative Lung Syndromes"
    fields:
      Front: "What are the multisystem manifestations of cystic fibrosis?"
      Back: "1) Lungs: bronchiectasis 2) Upper respiratory: chronic sinusitis with nasal polyposis 3) Reproductive: male infertility (reduced sperm motility/immobility) 4) Pancreas (exocrine): pancreatic insufficiency with protein and fat malabsorption 5) Pancreas (endocrine): diabetes 6) Liver: cirrhosis"
    tags: ["cystic-fibrosis", "systemic-manifestations", "multisystem", "subject:pulmonology"]
  - guid: e40890c3d40772ff
    noteType: Basic
    deck: "Corpus::Pulmonology::Suppurative Lung Syndromes"
    fields:
      Front: "What is a lung abscess?"
      Back: "A lung abscess is an infection of the lung parenchyma consisting of one or more necrotic inflammatory cavities that contain fibrino-purulent exudates. It typically presents as a cavity with an air-fluid level on imaging."
    tags: ["lung-abscess", "definition", "subject:pulmonology"]
  - guid: 55f324dfba28e2a7
    noteType: Basic
    deck: "Corpus::Pulmonology::Suppurative Lung Syndromes"
    fields:
      Front: "What are the main causes of lung abscess?"
      Back: "1) Aspiration pneumonia (highest risk): seizures, coma, neurological disease (pseudobulbar palsy, bulbar weakness) 2) Bronchial obstruction from malignancy 3) Septic emboli from infected endocarditis or prosthesis 4) Direct spread from subphrenic or hepatic abscess 5) Complications of pneumonia (Staph aureus, Klebsiella, Pseudomonas)"
    tags: ["lung-abscess", "etiology", "causes", "subject:pulmonology"]
  - guid: 29cb577cdeb9306c
    noteType: Basic
    deck: "Corpus::Pulmonology::Suppurative Lung Syndromes"
    fields:
      Front: "What is the relationship between patient positioning and aspiration pneumonia location?"
      Back: "Patient positioning determines the location of aspirated material: 1) Supine (face up) → superior segment of lower lobe 2) Prone or lateral position → posterior segment (abdomen). This is because gravity and airway anatomy direct aspirated contents to different lung areas based on position."
    tags: ["lung-abscess", "aspiration", "anatomy", "subject:pulmonology"]
  - guid: da71f4b2e69dc0fb
    noteType: Basic
    deck: "Corpus::Pulmonology::Suppurative Lung Syndromes"
    fields:
      Front: "What organisms should be looked for in lung abscess workup?"
      Back: "1) Oral anaerobes (due to aspiration risk) 2) Staph aureus 3) Streptococcus pneumoniae 4) Aerobic gram-negative organisms 5) Anaerobic gram-negative organisms 6) Tuberculosis (especially if apical location). Sputum analysis is critical for organism identification."
    tags: ["lung-abscess", "diagnosis", "microbiology", "subject:pulmonology"]
  - guid: 2acc6a0b34eea33c
    noteType: Basic
    deck: "Corpus::Pulmonology::Suppurative Lung Syndromes"
    fields:
      Front: "What imaging findings suggest lung abscess?"
      Back: "1) Chest X-ray: cavity with air-fluid level 2) CT: multiple cavitary lesions with air-fluid levels. The presence of an air-fluid level is highly suggestive of lung abscess."
    tags: ["lung-abscess", "diagnosis", "imaging", "subject:pulmonology"]
  - guid: 22e22c48acb8242a
    noteType: Basic
    deck: "Corpus::Pulmonology::Suppurative Lung Syndromes"
    fields:
      Front: "What are the antibiotic principles in lung abscess treatment?"
      Back: "Drugs are directed toward anaerobic coverage using: 1) Metronidazole 2) Clindamycin 3) Combinations of such agents 4) Carbapenems. Treatment should continue for appropriate duration until clinical improvement and imaging demonstrates resolution."
    tags: ["lung-abscess", "treatment", "antibiotics", "subject:pulmonology"]
  - guid: 0c8a10ee0547bd03
    noteType: Basic
    deck: "Corpus::Pulmonology::Suppurative Lung Syndromes"
    fields:
      Front: "What factors should be assessed when antibiotics fail in lung abscess?"
      Back: "1) Is the bacteriological diagnosis correct? 2) Was the drug and dosage correct? 3) Has the abscess further complicated (empyema, bronchopleural fistula)? 4) Is there surrounding atelectasis/poorly ventilated lobule? 5) Does the host have poor immunity? 6) Is the treatment duration too short?"
    tags: ["lung-abscess", "treatment", "failure-assessment", "subject:pulmonology"]
  - guid: 87502a5fe779eb88
    noteType: Basic
    deck: "Corpus::Pulmonology::Suppurative Lung Syndromes"
    fields:
      Front: "When is intervention (beyond oral antibiotics) needed for lung abscess?"
      Back: "If not responding well to oral antibiotic treatment, the abscess requires: 1) Postural drainage 2) Bronchoscopic drainage 3) Supportive care with analgesia. General measures include pain relief and antibiotics."
    tags: ["lung-abscess", "treatment", "intervention", "subject:pulmonology"]
  - guid: 9608541ed37d1f2d
    noteType: Basic
    deck: "Corpus::Pulmonology::Suppurative Lung Syndromes"
    fields:
      Front: "When is surgery indicated in lung abscess?"
      Back: "Surgical indications include: 1) Massive hemoptysis (medical treatment refractory) 2) Very large cavity with thick walls 3) Complicated by malignancy 4) Complications like empyema 5) Recurrent chronic lung abscess 6) Remaining residual cavity after treatment completion"
    tags: ["lung-abscess", "treatment", "surgery", "subject:pulmonology"]
  - guid: 024551aa0d6a4a35
    noteType: Basic
    deck: "Corpus::Pulmonology::Suppurative Lung Syndromes"
    fields:
      Front: "What are the major complications of lung abscess?"
      Back: "1) Empyema (with or without bronchopleural fistula) 2) Spillover/rupture from large abscess 3) Systemic septicemia or spread to other sites 4) Development of brain or other metastatic abscesses 5) Severe hemorrhage/hemoptysis 6) Chronic sequelae: chronic bronchitis, localized emphysema, bronchiectasis 7) Amyloidosis"
    tags: ["lung-abscess", "complications", "subject:pulmonology"]
  - guid: 1fb4f167c0a12156
    noteType: Basic
    deck: "Corpus::Pulmonology::Suppurative Lung Syndromes"
    fields:
      Front: "What is empyema?"
      Back: "Empyema is a purulent exudative pleural effusion secondary to pneumonia, lung abscess, or bronchiectasis. It represents bacterial invasion into the pleural space with accumulation of pus."
    tags: ["empyema", "definition", "subject:pulmonology"]
  - guid: c6a41177afd416f9
    noteType: Basic
    deck: "Corpus::Pulmonology::Suppurative Lung Syndromes"
    fields:
      Front: "What are the risk factors for empyema?"
      Back: "1) Advanced age 2) Recurrent pneumonias 3) Alcohol or drug abuse history 4) Diabetes 5) Poorly controlled GERD (gastroesophageal reflux disease) 6) Poor oral hygiene 7) Immunosuppression 8) Previous pleural intervention"
    tags: ["empyema", "risk-factors", "subject:pulmonology"]
  - guid: b95714c605b43c21
    noteType: Basic
    deck: "Corpus::Pulmonology::Suppurative Lung Syndromes"
    fields:
      Front: "What are the clinical presentations of empyema?"
      Back: "Patients present as ill, toxic-looking individuals with: 1) Fever 2) Parrotic chest pain 3) Increased sputum production 4) History of bronchiectasis, previous lung abscess, recurrent pneumonias, or pulmonary TB"
    tags: ["empyema", "clinical-presentation", "subject:pulmonology"]
  - guid: 9d3191f365bc4a2b
    noteType: Basic
    deck: "Corpus::Pulmonology::Suppurative Lung Syndromes"
    fields:
      Front: "What are the physical examination findings in empyema?"
      Back: "1) Medial spine shift 2) Tracheal deviation to the contralateral side (away from empyema) 3) Stony dullness to percussion 4) Reduced breath sounds"
    tags: ["empyema", "physical-examination", "subject:pulmonology"]
  - guid: f0a720e7ac475270
    noteType: Basic
    deck: "Corpus::Pulmonology::Suppurative Lung Syndromes"
    fields:
      Front: "What are the three stages of empyema and their typical durations?"
      Back: "1) Exudative stage (perineumonic effusion): ~2 weeks - normal pH, normal glucose, negative culture, reversible if treated early 2) Fibropurulent stage: 1-6 weeks - bacterial invasion, leukocytosis, low glucose, low pH, lactic acid accumulation 3) Organizing stage: ~2 weeks - fibrin deposit, formation of inelastic membrane, plural thickening, fibrosis"
    tags: ["empyema", "pathophysiology", "stages", "subject:pulmonology"]
  - guid: 3e38082d38d24c77
    noteType: Basic
    deck: "Corpus::Pulmonology::Suppurative Lung Syndromes"
    fields:
      Front: "What characterizes the exudative stage of empyema?"
      Back: "The exudative stage (perineumonic effusion) involves: 1) Bacterial invasion into lung parenchyma causing pneumonia 2) Inflammation leads to reduced visceral pleural membrane permeability 3) Leakage of interstitial fluid into pleural space 4) High level of endogenous fibrinolytic enzymes 5) Laboratory findings: normal pH, normal glucose, negative culture. Early recognition and treatment prevents progression to fibropurulent stage."
    tags: ["empyema", "pathophysiology", "exudative-stage", "subject:pulmonology"]
  - guid: 3cf8383602eda4db
    noteType: Basic
    deck: "Corpus::Pulmonology::Suppurative Lung Syndromes"
    fields:
      Front: "What characterizes the fibropurulent stage of empyema?"
      Back: "The fibropurulent stage involves: 1) Bacterial transcendence into pleural membrane 2) Progressive leukocytosis and thrombocyte accumulation at pleural surfaces 3) Progressive tendency toward loculation 4) Bacterial and neutrophil phagocytic activity using up glucose, producing lactate 5) LDH rises in the effusion 6) Release of polymorphs and polynuclear cells 7) Laboratory findings: low pH, low glucose. This stage is more difficult to treat than exudative stage."
    tags: ["empyema", "pathophysiology", "fibropurulent-stage", "subject:pulmonology"]
  - guid: f95d30d007a53dfa
    noteType: Basic
    deck: "Corpus::Pulmonology::Suppurative Lung Syndromes"
    fields:
      Front: "What characterizes the organizing stage of empyema?"
      Back: "The organizing stage involves: 1) Fibroblasts grow into pleural space forming inelastic membrane 2) PDGF (platelet-derived growth factor) and TGF-beta (transforming growth factor beta) lead to pleural fibrosis 3) Plural thickening develops 4) Thickening inhibits bacterial penetration, preventing antibiotic effectiveness 5) Microbiome biofilm formation reduces antibiotic effectiveness 6) Collagen deposition reduces fibrinolysis effectiveness 7) Surgery becomes essential and inevitable at this stage"
    tags: ["empyema", "pathophysiology", "organizing-stage", "subject:pulmonology"]
  - guid: d75b8a6be6c8a87c
    noteType: Basic
    deck: "Corpus::Pulmonology::Suppurative Lung Syndromes"
    fields:
      Front: "What imaging findings are seen in empyema?"
      Back: "Chest X-ray shows significant fluid accumulation or complete 'whiteout' of the affected lung with tracheal deviation toward the contralateral side."
    tags: ["empyema", "diagnosis", "imaging", "subject:pulmonology"]
  - guid: 772ce8c9c76d24ce
    noteType: Basic
    deck: "Corpus::Pulmonology::Suppurative Lung Syndromes"
    fields:
      Front: "What are Light's criteria and how are they applied to empyema?"
      Back: "Light's criteria identify empyema as an exudative effusion. Key findings in empyema: 1) Exudative fusion (elevated LDH, high protein) 2) Low glucose (characteristic finding) 3) Low pH (<7.2) - diagnostic of empyema 4) Predominant cell type: neutrophil-predominant (except in TB empyema which is lymphocyte-predominant)"
    tags: ["empyema", "diagnosis", "lights-criteria", "subject:pulmonology"]
  - guid: baa94c841e43cd20
    noteType: Basic
    deck: "Corpus::Pulmonology::Suppurative Lung Syndromes"
    fields:
      Front: "What does a lymphocyte-predominant empyema suggest?"
      Back: "Lymphocyte-predominant empyema suggests TB empyema rather than bacterial empyema, which typically shows neutrophil predominance."
    tags: ["empyema", "diagnosis", "tuberculosis", "subject:pulmonology"]
  - guid: c906f5d2d2981cf3
    noteType: Basic
    deck: "Corpus::Pulmonology::Suppurative Lung Syndromes"
    fields:
      Front: "What are the aims of empyema treatment?"
      Back: "1) Control the infection 2) Allow re-expansion of the lung"
    tags: ["empyema", "treatment", "goals", "subject:pulmonology"]
  - guid: 97d32471590d4706
    noteType: Basic
    deck: "Corpus::Pulmonology::Suppurative Lung Syndromes"
    fields:
      Front: "What antibiotics are used for empyema?"
      Back: "1) Clindamycin (often given) 2) Combined with metronidazole or ceftriaxone with metronidazole 3) Treatment duration: prolonged (2-6 weeks) 4) Directed therapy if organism cultured"
    tags: ["empyema", "treatment", "antibiotics", "subject:pulmonology"]
  - guid: d4ed932ceafc1aa1
    noteType: Basic
    deck: "Corpus::Pulmonology::Suppurative Lung Syndromes"
    fields:
      Front: "Why is intercostal chest drain the treatment of choice for empyema?"
      Back: "Intercostal drainage is the treatment modality of choice because pus accumulates in the pleural space. Drainage via normal pleural aspiration alone will not adequately drain the thick purulent fluid. Without proper drainage, the fluid will loculate, making treatment very difficult. If neglected, loculation occurs and becomes increasingly refractory to medical management."
    tags: ["empyema", "treatment", "drainage", "subject:pulmonology"]
  - guid: 50e9a7fcaa776745
    noteType: Basic
    deck: "Corpus::Pulmonology::Suppurative Lung Syndromes"
    fields:
      Front: "What is intrapleural thrombolytic therapy and when is it used?"
      Back: "Intrapleural thrombolytic therapy is administered (via cardiothoracic consultation) to dissolve fibrin and prevent loculation and adhesions. It is used when empyema becomes complicated and standard drainage is insufficient."
    tags: ["empyema", "treatment", "thrombolytic", "subject:pulmonology"]
  - guid: 4948e212b1ca1f36
    noteType: Basic
    deck: "Corpus::Pulmonology::Suppurative Lung Syndromes"
    fields:
      Front: "When is decortication indicated in empyema?"
      Back: "Decortication is an option when calcification has occurred within the pleural space, making the fibrotic pleural membrane restrict lung expansion despite drainage."
    tags: ["empyema", "treatment", "surgery", "subject:pulmonology"]
  - guid: 584a0088d32631f9
    noteType: Basic
    deck: "Corpus::Pulmonology::Suppurative Lung Syndromes"
    fields:
      Front: "What are the late complications of empyema?"
      Back: "1) Destruction of lung tissue 2) Development of bronchopleural fistula 3) Pyopneumothorax (pus and air in pleural space) 4) Empyema necessitans (spontaneous entry into chest wall) 5) Rupture into abdominal cavity leading to overwhelming sepsis"
    tags: ["empyema", "complications", "subject:pulmonology"]
