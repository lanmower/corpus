  - guid: 24d5c4737a2e69cd
    noteType: Basic
    deck: "Corpus::Cardiology::Coronary Artery Disease (CAD)"
    fields:
      Front: "What is Coronary Artery Disease (CAD)?"
      Back: "Coronary Artery Disease, also known as ischemic heart disease, is a condition where plaque builds up in the coronary arteries, restricting blood flow to the heart. It is the leading cause of death globally, accounting for 16% of total deaths."
    tags: ["CAD", "definition", "epidemiology", "subject:cardiology"]
  - guid: 24f0666135d1785c
    noteType: Basic
    deck: "Corpus::Cardiology::Coronary Artery Disease (CAD)"
    fields:
      Front: "What are the global mortality statistics for cardiovascular disease?"
      Back: "According to WHO 2019 statistics, cardiovascular disease is the commonest cause of mortality accounting for 18.5 million deaths annually, far exceeding cancer (10 million) and respiratory diseases (under 4 million)."
    tags: ["epidemiology", "mortality", "global-health", "subject:cardiology"]
  - guid: 6dd3e8f3d2499c0c
    noteType: Basic
    deck: "Corpus::Cardiology::Coronary Artery Disease (CAD)"
    fields:
      Front: "What is the double burden of disease in South Africa and low/middle-income countries?"
      Back: "The double burden refers to the simultaneous high prevalence of both infectious diseases (tuberculosis, AIDS) and non-communicable diseases (lifestyle-related conditions like CAD, hypertension, diabetes)."
    tags: ["epidemiology", "public-health", "disease-burden", "subject:cardiology"]
  - guid: df45cad8b30a1d61
    noteType: Basic
    deck: "Corpus::Cardiology::Coronary Artery Disease (CAD)"
    fields:
      Front: "What is the most lethal manifestation of Coronary Artery Disease?"
      Back: "Myocardial infarction (heart attack) is the most lethal and dangerous manifestation of CAD. It is a medical emergency caused by complete or near-complete blockage of a coronary artery."
    tags: ["CAD", "complications", "myocardial-infarction", "subject:cardiology"]
  - guid: afb3d400e878cbdd
    noteType: Basic
    deck: "Corpus::Cardiology::Coronary Artery Disease (CAD)"
    fields:
      Front: "What is the key message about CAD prevention and modification?"
      Back: "CAD is a disease of lifestyle that can be modified through choices about diet and physical activity. It can also be managed with pharmacological therapies and mechanical interventions (angioplasty, stenting, bypass surgery). Leading a judicious lifestyle can delay or prevent CAD onset."
    tags: ["CAD", "prevention", "management", "subject:cardiology"]
  - guid: 21a30b799e85d200
    noteType: Basic
    deck: "Corpus::Cardiology::Coronary Artery Disease (CAD)"
    fields:
      Front: "What are the main clinical manifestations of CAD?"
      Back: "The main manifestations are: (1) Stable/Chronic coronary syndrome (stable angina), (2) Acute coronary syndrome including ST-elevation MI and non-ST elevation MI, (3) Unstable angina, (4) Silent ischemia, and (5) Sudden cardiac death."
    tags: ["CAD", "clinical-manifestations", "presentation", "subject:cardiology"]
  - guid: 9f7169b16f6612c1
    noteType: Basic
    deck: "Corpus::Cardiology::Coronary Artery Disease (CAD)"
    fields:
      Front: "Why is CAD now called Chronic Coronary Syndrome?"
      Back: "CAD is called chronic coronary syndrome because the disease starts early (in teen years or even earlier) but remains clinically silent for many years. Evidence of disease appears as fatty streaks in arteries from childhood, becoming manifest typically after age 35, most commonly between ages 50-80."
    tags: ["CAD", "pathophysiology", "disease-progression", "subject:cardiology"]
  - guid: f077bfe46b10983b
    noteType: Basic
    deck: "Corpus::Cardiology::Coronary Artery Disease (CAD)"
    fields:
      Front: "What is the difference between ST-elevation MI (STEMI) and non-ST elevation MI?"
      Back: "In STEMI, the thrombus causes total occlusion of the coronary vessel, making it a medical emergency with rapid myocardial death. In non-STEMI, the thrombus is not completely occlusive, allowing some blood flow; it is less time-dependent but still requires urgent treatment."
    tags: ["acute-coronary-syndrome", "myocardial-infarction", "STEMI", "subject:cardiology"]
  - guid: 891dac470a8f61d4
    noteType: Basic
    deck: "Corpus::Cardiology::Coronary Artery Disease (CAD)"
    fields:
      Front: "What are non-modifiable risk factors for CAD?"
      Back: "Non-modifiable risk factors are: (1) Age - prevalence increases after age 35; (2) Male gender - higher lifetime risk; (3) Family history of early CAD (father/brother <55 years or mother/sister <65 years); (4) Certain ethnicities including Indian, Afrikaans, Ashkenazi Jewish, and Scottish populations."
    tags: ["risk-factors", "non-modifiable", "epidemiology", "subject:cardiology"]
  - guid: e3b20df1a09b27a1
    noteType: Basic
    deck: "Corpus::Cardiology::Coronary Artery Disease (CAD)"
    fields:
      Front: "What are the lifetime risks for CAD development by gender after age 40?"
      Back: "Men have a 49% lifetime risk of developing CAD after age 40 years, while women have a 32% lifetime risk. After menopause, the prevalence becomes equivalent between genders."
    tags: ["risk-factors", "gender", "epidemiology", "subject:cardiology"]
  - guid: 3198b300b9501713
    noteType: Basic
    deck: "Corpus::Cardiology::Coronary Artery Disease (CAD)"
    fields:
      Front: "What is the relationship between family history and CAD risk?"
      Back: "Family history of CAD below age 50 years indicates increased risk. Specifically: if father or brother diagnosed before 55 years, or mother or sister diagnosed before 65 years of age, these individuals are at additional risk."
    tags: ["risk-factors", "family-history", "genetics", "subject:cardiology"]
  - guid: df10e1d8fda1607a
    noteType: Basic
    deck: "Corpus::Cardiology::Coronary Artery Disease (CAD)"
    fields:
      Front: "What is the most prevalent modifiable risk factor for CAD?"
      Back: "Hypertension is the most prevalent modifiable risk factor, with approximately one out of every three individuals globally having hypertension."
    tags: ["risk-factors", "modifiable", "hypertension", "subject:cardiology"]
  - guid: eec8f074bcb7d602
    noteType: Basic
    deck: "Corpus::Cardiology::Coronary Artery Disease (CAD)"
    fields:
      Front: "How does diabetes affect CAD risk and outcomes?"
      Back: "Diabetes mellitus (both Type 1 and Type 2) increases the rate of CAD by more than 2.5 times compared to non-diabetics. Although hypertension and hyperlipidemia are more common, diabetes is a more severe condition, leading to greater disease burden and poorer outcomes in CAD patients."
    tags: ["risk-factors", "diabetes", "CAD-outcomes", "subject:cardiology"]
  - guid: 8646ded1b911752f
    noteType: Basic
    deck: "Corpus::Cardiology::Coronary Artery Disease (CAD)"
    fields:
      Front: "What is the CAD risk increase from secondhand smoke exposure?"
      Back: "Non-smokers exposed to secondhand smoking have a 25-30% increased risk of CAD compared to those never exposed to cigarette smoke. This is why smoking is banned in public areas - not to protect smokers, but to protect non-smokers."
    tags: ["risk-factors", "smoking", "secondhand-smoke", "subject:cardiology"]
  - guid: 6b1e6a9d0cc514ae
    noteType: Basic
    deck: "Corpus::Cardiology::Coronary Artery Disease (CAD)"
    fields:
      Front: "What dietary factors increase CAD risk?"
      Back: "Dietary risk factors include: (1) Added sugars in soft drinks and sweetened beverages - associated with >20% higher MI risk; (2) Saturated and trans fats; (3) Excess red meat and processed meats (sausages, cured meats); (4) Overall poor diet quality."
    tags: ["risk-factors", "diet", "nutrition", "subject:cardiology"]
  - guid: 9e31ffd6af394aac
    noteType: Basic
    deck: "Corpus::Cardiology::Coronary Artery Disease (CAD)"
    fields:
      Front: "What is the relationship between obesity and CAD?"
      Back: "Obesity is an independent risk factor for CAD and also increases the risk of developing other risk factors like hypertension, hyperlipidemia, and Type 2 diabetes. This effect is particularly pronounced with abdominal obesity."
    tags: ["risk-factors", "obesity", "metabolic", "subject:cardiology"]
  - guid: 013ee4525d42addc
    noteType: Basic
    deck: "Corpus::Cardiology::Coronary Artery Disease (CAD)"
    fields:
      Front: "What are less recognized risk factors for CAD?"
      Back: "Less recognized risk factors include: (1) Non-alcoholic fatty liver disease (NAFLD) - now the commonest cause of cirrhosis; (2) Chronic kidney disease - increases CAD incidence and mortality; (3) Inflammatory conditions (lupus, rheumatoid arthritis, inflammatory bowel disease); (4) HIV infection."
    tags: ["risk-factors", "comorbidities", "inflammatory", "subject:cardiology"]
  - guid: fb6fc0f5e4e93028
    noteType: Basic
    deck: "Corpus::Cardiology::Coronary Artery Disease (CAD)"
    fields:
      Front: "What is the Framingham Risk Score and what are its components?"
      Back: "The Framingham Risk Score is one of the oldest risk assessment tools. It considers: age, total cholesterol, HDL cholesterol, systolic blood pressure (treated or untreated), and smoking status. It provides a 10-year likelihood of developing cardiovascular disease including CAD, stroke, and peripheral artery disease."
    tags: ["risk-assessment", "Framingham", "tools", "subject:cardiology"]
  - guid: 6a5f5991e678e96e
    noteType: Basic
    deck: "Corpus::Cardiology::Coronary Artery Disease (CAD)"
    fields:
      Front: "Why is the Framingham Risk Score not useful in certain populations?"
      Back: "The Framingham Risk Score is not useful in diabetics or those with familial hyperlipidemia because these individuals are already at higher risk simply by virtue of having these conditions. Risk scoring is unnecessary when baseline risk is already elevated."
    tags: ["risk-assessment", "limitations", "diabetes", "subject:cardiology"]
  - guid: 15d62fc01f190b9f
    noteType: Basic
    deck: "Corpus::Cardiology::Coronary Artery Disease (CAD)"
    fields:
      Front: "What are the Framingham Risk Score categories and their implications?"
      Back: "Risk score categories: (1) Score <3 = Low risk; (2) Score 3-15 = Moderate risk; (3) Score >15, especially >30 = High risk requiring pharmacotherapy in addition to lifestyle measures. Scores >30 require aggressive risk factor control to minimize MI and death risk."
    tags: ["risk-assessment", "stratification", "management", "subject:cardiology"]
  - guid: c53b8f56342b6939
    noteType: Basic
    deck: "Corpus::Cardiology::Coronary Artery Disease (CAD)"
    fields:
      Front: "Who are considered very high-risk for cardiovascular events without needing risk scoring?"
      Back: "Individuals at very high risk who do NOT require risk scoring include: (1) Those with established atherosclerotic disease in any vascular territory; (2) Type 2 diabetes with other risk factors; (3) Type 1 diabetes with proteinuria; (4) Familial/genetic hyperlipidemia; (5) Severe chronic kidney disease (stages 4-5); (6) Asymptomatic individuals with evidence of atherosclerotic plaques on imaging."
    tags: ["risk-assessment", "high-risk", "very-high-risk", "subject:cardiology"]
  - guid: 256d61c513b5ff94
    noteType: Basic
    deck: "Corpus::Cardiology::Coronary Artery Disease (CAD)"
    fields:
      Front: "What is the significance of atherosclerotic disease in multiple vascular territories?"
      Back: "If atherosclerotic disease is established in one vascular territory (coronary, cerebrovascular, peripheral arterial), the likelihood of having it in other vascular beds is high. This is why individuals with established atherosclerosis in any location automatically have very high overall cardiovascular risk."
    tags: ["atherosclerosis", "disease-progression", "risk-stratification", "subject:cardiology"]
  - guid: 2f2d486831358803
    noteType: Basic
    deck: "Corpus::Cardiology::Coronary Artery Disease (CAD)"
    fields:
      Front: "What defines familial/genetic hyperlipidemia risk?"
      Back: "Severe familial hyperlipidemia automatically places individuals at high CAD risk. It is defined by: total cholesterol >7.5 mmol/L or LDL cholesterol >5 mmol/L (LDL is 'bad cholesterol'). This population is particularly common among people of Dutch descent in South Africa, with approximately 300,000 severely affected individuals."
    tags: ["hyperlipidemia", "genetics", "familial", "subject:cardiology"]
  - guid: ede7fa5e22fe5eb7
    noteType: Basic
    deck: "Corpus::Cardiology::Coronary Artery Disease (CAD)"
    fields:
      Front: "What is the pathophysiology of chronic coronary syndrome?"
      Back: "In chronic coronary syndrome, a plaque composed of lipid, inflammatory cells, and smooth muscle cells causes >50-70% lumen stenosis in a coronary artery. This narrowing limits blood flow downstream, manifesting as ischemic chest pain (angina) only when the vessel is narrowed >70%."
    tags: ["pathophysiology", "chronic-syndrome", "stenosis", "subject:cardiology"]
  - guid: b8628a713ce65a8a
    noteType: Basic
    deck: "Corpus::Cardiology::Coronary Artery Disease (CAD)"
    fields:
      Front: "What is the pathophysiology of acute coronary syndrome in STEMI?"
      Back: "In STEMI, a plaque ruptures and a large thrombus forms on the rupture site, causing complete occlusion of the coronary vessel. This is a true emergency because there is no blood flow downstream and myocytes rapidly begin to die (myocardial infarction)."
    tags: ["pathophysiology", "acute-syndrome", "STEMI", "thrombus", "subject:cardiology"]
  - guid: baf20a09394cfbc2
    noteType: Basic
    deck: "Corpus::Cardiology::Coronary Artery Disease (CAD)"
    fields:
      Front: "What is the pathophysiology of acute coronary syndrome in non-STEMI?"
      Back: "In non-STEMI, a long-standing plaque fissures or ruptures and a thrombus forms, but the thrombus is not completely occlusive. Stenosis increases from 50-70% to ~90%, but some blood flow remains. Infarction occurs when bits of the clot break off and block smaller downstream vessels."
    tags: ["pathophysiology", "acute-syndrome", "non-STEMI", "subject:cardiology"]
  - guid: 7b6b569c12ae220e
    noteType: Basic
    deck: "Corpus::Cardiology::Coronary Artery Disease (CAD)"
    fields:
      Front: "What is stable angina and how is it defined?"
      Back: "Stable angina is now called Chronic Coronary Syndrome. It is defined as angina where the symptom characteristics have remained unchanged for the preceding 60 days. This distinction is important to differentiate it from unstable angina, where symptoms are changing or new."
    tags: ["stable-angina", "chronic-syndrome", "definition", "subject:cardiology"]
  - guid: cf97b28686f0f99f
    noteType: Basic
    deck: "Corpus::Cardiology::Coronary Artery Disease (CAD)"
    fields:
      Front: "How is angina diagnosed?"
      Back: "Angina is diagnosed by history and history alone. The diagnosis is made based on the patient's description of symptoms, not on any investigation or test. ECG, stress testing, or imaging can support the diagnosis but are not required for diagnosis."
    tags: ["diagnosis", "angina", "clinical", "subject:cardiology"]
  - guid: 15a4a656ff373d2d
    noteType: Basic
    deck: "Corpus::Cardiology::Coronary Artery Disease (CAD)"
    fields:
      Front: "What are the three criteria for typical angina?"
      Back: "Typical angina must satisfy all three criteria: (1) Chest discomfort described as constriction in the front of chest, radiating to neck, jaw, shoulder, or arm(s); (2) Provoked by physical exertion or emotional stress; (3) Rapidly relieved by rest or nitrates within 5 minutes."
    tags: ["angina", "typical", "criteria", "subject:cardiology"]
  - guid: e5a079adfba9a172
    noteType: Basic
    deck: "Corpus::Cardiology::Coronary Artery Disease (CAD)"
    fields:
      Front: "What is atypical angina?"
      Back: "Atypical angina (probable angina) occurs when a patient meets only two of the three typical angina criteria."
    tags: ["angina", "atypical", "classification", "subject:cardiology"]
  - guid: 12361e64b3a34e56
    noteType: Basic
    deck: "Corpus::Cardiology::Coronary Artery Disease (CAD)"
    fields:
      Front: "What is non-anginal chest pain?"
      Back: "Non-anginal chest pain is when only one of the three typical angina criteria is satisfied."
    tags: ["chest-pain", "non-anginal", "classification", "subject:cardiology"]
  - guid: 5e4d1eb62eace0b4
    noteType: Basic
    deck: "Corpus::Cardiology::Coronary Artery Disease (CAD)"
    fields:
      Front: "What is the Canadian Cardiovascular Society Classification of Angina?"
      Back: "The CCS Classification grades angina severity: (1) Class I - Angina only with very strenuous exertion; (2) Class II - Angina with moderate exertion; (3) Class III - Angina with mild exertion; (4) Class IV - Angina at rest. This is used to convey angina severity universally."
    tags: ["angina", "classification", "severity", "subject:cardiology"]
  - guid: 67db3acf9c6cdefe
    noteType: Basic
    deck: "Corpus::Cardiology::Coronary Artery Disease (CAD)"
    fields:
      Front: "What is the significance of the age 35 in CAD?"
      Back: "Age 35 is significant because CAD prevalence increases after this age. While the disease begins in early teen years with fatty streaks, clinical manifestations typically appear after age 35, with peak incidence between ages 50-80."
    tags: ["epidemiology", "age", "disease-progression", "subject:cardiology"]
  - guid: 5f6c189f9d4c2c8e
    noteType: Basic
    deck: "Corpus::Cardiology::Coronary Artery Disease (CAD)"
    fields:
      Front: "What evidence shows that CAD begins in childhood?"
      Back: "Post-mortem examinations of young individuals (aged 19-20) who died during wartime already showed early markings of atherosclerotic disease in the form of fatty streaks in coronary arteries, proving the disease starts very early in life."
    tags: ["pathophysiology", "disease-progression", "early-onset", "subject:cardiology"]
  - guid: 1202852d4aafd535
    noteType: Basic
    deck: "Corpus::Cardiology::Coronary Artery Disease (CAD)"
    fields:
      Front: "Why is treatment of CAD lifelong?"
      Back: "Treatment is lifelong because CAD is a chronic disease process that continues throughout life. Even if a plaque rupture is managed and the vessel is reopened (by treatment or healing), the vessel remains abnormal. The underlying atherosclerotic disease persists and requires ongoing management."
    tags: ["management", "treatment", "chronic-disease", "subject:cardiology"]
  - guid: cd40741379f237a9
    noteType: Basic
    deck: "Corpus::Cardiology::Coronary Artery Disease (CAD)"
    fields:
      Front: "What percentage of patients with CAD present with angina?"
      Back: "Approximately 50% of patients with CAD present with angina (stable or unstable), making it the most common initial manifestation of the disease."
    tags: ["presentation", "epidemiology", "angina", "subject:cardiology"]
  - guid: 658c6eb64da8ab1d
    noteType: Basic
    deck: "Corpus::Cardiology::Coronary Artery Disease (CAD)"
    fields:
      Front: "At what percentage stenosis does a coronary artery begin to restrict blood flow?"
      Back: "A coronary artery must be narrowed (stenosed) by more than 50-70% to meaningfully restrict blood flow downstream and cause clinical manifestations like angina."
    tags: ["pathophysiology", "stenosis", "hemodynamics", "subject:cardiology"]
  - guid: fa9d96672f216941
    noteType: Basic
    deck: "Corpus::Cardiology::Coronary Artery Disease (CAD)"
    fields:
      Front: "What percentage stenosis is clinically symptomatic in typical CAD?"
      Back: "Clinical manifestation of ischemic heart disease typically occurs once a coronary vessel is 70% or more narrowed. At this level of narrowing, blood flow is sufficiently restricted to cause ischemia and symptoms."
    tags: ["pathophysiology", "stenosis", "symptoms", "subject:cardiology"]
  - guid: 1ebb44465f2e06fc
    noteType: Basic
    deck: "Corpus::Cardiology::Coronary Artery Disease (CAD)"
    fields:
      Front: "What is the role of inflammation in CAD pathophysiology?"
      Back: "CAD is fundamentally an inflammatory process. The atherosclerotic plaque contains inflammatory cells along with lipids and smooth muscle cells. This inflammatory nature explains why inflammatory conditions (lupus, rheumatoid arthritis, IBD) increase CAD risk."
    tags: ["pathophysiology", "inflammation", "atherosclerosis", "subject:cardiology"]
  - guid: 1b20086f594f6a64
    noteType: Basic
    deck: "Corpus::Cardiology::Coronary Artery Disease (CAD)"
    fields:
      Front: "What diagnostic modalities are used for CAD diagnosis?"
      Back: "Diagnostic modalities include: (1) ECG - may show previous MI or changes with stress; (2) Stress testing - treadmill, pharmacological (dobutamine), or nuclear stress tests; (3) CT coronary angiography - visualizes plaque burden, quantifies stenosis percentage, and demonstrates coronary calcification."
    tags: ["diagnosis", "testing", "investigation", "subject:cardiology"]
  - guid: c0292119e429558d
    noteType: Basic
    deck: "Corpus::Cardiology::Coronary Artery Disease (CAD)"
    fields:
      Front: "What is the relationship between radiation pattern and angina severity?"
      Back: "The radiation pattern of chest pain (to neck, jaw, shoulder, or arm) is part of typical angina description. This characteristic radiation helps distinguish angina from other causes of chest pain and is one of the three diagnostic criteria."
    tags: ["angina", "clinical-features", "diagnosis", "subject:cardiology"]
