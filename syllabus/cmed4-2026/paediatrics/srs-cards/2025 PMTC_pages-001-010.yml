    noteType: "Basic"
    deck: "Corpus::Paediatrics::2025 PMTC"
    fields:
      Front: "What are examples of slow progression clinical signs of pediatric HIV infection?"
      Back: |
        - Oral thrush
        - Diffuse lymphadenopathy
        - Hepatomegaly
        - Splenomegaly
        - Recurrent diarrhea
    tags: ["hiv", "clinical", "pediatric", "subject:paediatrics"]
