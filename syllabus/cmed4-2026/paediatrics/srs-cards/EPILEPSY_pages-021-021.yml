    noteType: "Basic"
    deck: "Corpus::Paediatrics::EPILEPSY"
    fields:
      Front: "What is the cardinal principle in managing Status Epilepticus?"
      Back: "STOP THE SEIZURE EARLY. The longer it lasts, the more difficult it is to control."
    tags: ["epilepsy", "status-epilepticus", "management-principle", "subject:paediatrics"]

  - guid: b4c5d6e7f8g9h0i1
    noteType: "Basic"
    deck: "Corpus::Paediatrics::EPILEPSY"
    fields:
      Front: "Describe STEP 1 in Status Epilepticus management."
      Back: "Ensure a patent airway. Give 100% oxygen by non-rebreather face mask and monitor O2 saturation. Assess cardiovascular status, attach monitors, obtain IV access. Check blood glucose; if low, give 5 ml/kg of 10% dextrose and start infusion (5% dextrose with 0.9% saline)."
    tags: ["epilepsy", "status-epilepticus", "step-1", "management", "subject:paediatrics"]

  - guid: c5d6e7f8g9h0i1j2
    noteType: "Basic"
    deck: "Corpus::Paediatrics::EPILEPSY"
    fields:
      Front: "What is STEP 2 in Status Epilepticus management and when is it performed?"
      Back: "ABORT THE SEIZURE (if not spontaneously aborted in 5 minutes). Give benzodiazepines: LORAZEPAM 0.1 mg/kg IV/IO over a few minutes (max 4 mg), OR MIDAZOLAM 0.2-0.3 mg/kg over a few minutes (max 7.5 mg), OR DIAZEPAM 0.3 mg/kg IV/IO over a few minutes (max 10 mg)."
    tags: ["epilepsy", "status-epilepticus", "step-2", "benzodiazepines", "subject:paediatrics"]

  - guid: d6e7f8g9h0i1j2k3
    noteType: "Basic"
    deck: "Corpus::Paediatrics::EPILEPSY"
    fields:
      Front: "What is the dose of Lorazepam in Status Epilepticus?"
      Back: "0.1 mg/kg IV/IO over a few minutes, maximum dose 4 mg."
    tags: ["epilepsy", "status-epilepticus", "lorazepam", "dosing", "subject:paediatrics"]

