deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
notes:
  - guid: "nHypoGluc2025_001"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "What is the most widely used definition of neonatal hypoglycemia?"
      Back: "Whole blood glucose concentration of <2.6 mmol/ℓ"
    tags: ["definition", "hypoglycemia-threshold", "subject:paediatrics-neonatal"]
  - guid: "nHypoGluc2025_002"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "What defines severe neonatal hypoglycemia?"
      Back: "Whole blood glucose ≤1.7 mmol/ℓ OR any symptomatic baby with low blood glucose level"
    tags: ["definition", "severe-hypoglycemia", "subject:paediatrics-neonatal"]
  - guid: "nHypoGluc2025_003"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "How much lower is whole blood glucose compared to serum glucose?"
      Back: "Usually 15% (approximately 0.5 mmol/ℓ) lower than serum glucose"
    tags: ["measurement", "lab-values", "subject:paediatrics-neonatal"]
  - guid: "nHypoGluc2025_004"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "What immediate action should be taken for abnormal whole blood glucose measurements?"
      Back: "Act immediately and do not wait for laboratory sample results, even if persistent hypoglycemia needs to be confirmed later"
    tags: ["management", "clinical-action", "subject:paediatrics-neonatal"]
  - guid: "nHypoGluc2025_005"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "What instruments measure whole blood glucose in neonates?"
      Back: "Blood glucometers with reagent strips and blood gas analyzers"
    tags: ["measurement", "diagnostics", "subject:paediatrics-neonatal"]
  - guid: "nHypoGluc2025_006"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "List the 6 main goals of managing neonatal hypoglycemia."
      Back: "1. Prevent and correct symptomatic hypoglycemia in at-risk babies with feeds/fluids within first hour depending on GA\n2. Avoid hypothermia\n3. Avoid unnecessary treatment of transitional low blood glucose\n4. Identify infants with underlying hypoglycemic disorders\n5. Prevent long-term neurologic sequelae\n6. Use stepwise treatment approach"
    tags: ["management-goals", "principles", "subject:paediatrics-neonatal"]
  - guid: "nHypoGluc2025_007"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "What is the glucose requirement for term babies?"
      Back: "6–8 mg/kg/min"
    tags: ["glucose-requirements", "term-infants", "subject:paediatrics-neonatal"]
  - guid: "nHypoGluc2025_008"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "What is the glucose requirement for preterm babies?"
      Back: "4–6 mg/kg/min"
    tags: ["glucose-requirements", "preterm-infants", "subject:paediatrics-neonatal"]
  - guid: "nHypoGluc2025_009"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "List all risk factors requiring blood glucose monitoring in the first 24 hours of life."
      Back: "1. Prematurity\n2. Post-maturity\n3. Small or large for gestational age\n4. Intrauterine growth restriction\n5. Infants of diabetic mothers\n6. Perinatal stress (intrapartum hypoxia, meconium aspiration, haemolytic disease, hypothermia, fluid restriction, polycythaemia)\n7. Family history of genetic hypoglycemia cause\n8. Syndromes (Beckwith-Wiedemann) or midline brain abnormalities causing hypopituitarism"
    tags: ["risk-factors", "screening", "subject:paediatrics-neonatal"]
  - guid: "nHypoGluc2025_010"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "When should blood glucose monitoring be performed in at-risk babies?"
      Back: "After first feed, then before subsequent feeds or every 6–8 hours if not being fed"
    tags: ["screening", "monitoring-frequency", "subject:paediatrics-neonatal"]
  - guid: "nHypoGluc2025_011"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "Which healthy newborns do NOT require blood glucose monitoring?"
      Back: "Healthy term infants without risk factors who are breast feeding or formula feeding normally"
    tags: ["screening", "exclusion-criteria", "subject:paediatrics-neonatal"]
  - guid: "nHypoGluc2025_012"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "List all clinical features of neonatal hypoglycemia."
      Back: "1. Jitteriness\n2. Sweating\n3. Tachypnoea\n4. Tachycardia\n5. Pallor\n6. Cyanosis\n7. Poor suck/feeding\n8. Weak or high-pitched cry/irritability\n9. Decreased level of consciousness\n10. Seizures\n11. Hypotonia\n12. Apnoeas\nNote: Babies are frequently asymptomatic; signs are non-specific"
    tags: ["clinical-signs", "symptoms", "subject:paediatrics-neonatal"]
  - guid: "nHypoGluc2025_013"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "What occurs after birth regarding blood glucose levels?"
      Back: "There is a transient physiological drop in blood glucose levels"
    tags: ["physiology", "neonatal-adaptation", "subject:paediatrics-neonatal"]
  - guid: "nHypoGluc2025_014"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "Describe the first-line management for asymptomatic well babies with blood glucose 1.8–2.5 mmol/ℓ."
      Back: "1. Give milk feed immediately or start IV fluids if contraindicated\n2. Keep baby warm, ensure normothermia\n3. Re-check blood glucose in 30 minutes"
    tags: ["management-algorithm", "asymptomatic-hypoglycemia", "subject:paediatrics-neonatal"]
  - guid: "nHypoGluc2025_015"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "What is the next step if re-checked glucose is ≥2.6 mmol/ℓ in an asymptomatic baby?"
      Back: "Continue monitoring hourly for 3 hours, then 3-hourly for 24 hours"
    tags: ["management-algorithm", "monitoring-schedule", "subject:paediatrics-neonatal"]
  - guid: "nHypoGluc2025_016"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "If glucose still <2.6 mmol/ℓ but increasing in asymptomatic baby, what is the next action?"
      Back: "Re-check blood glucose in 30 minutes"
    tags: ["management-algorithm", "asymptomatic-hypoglycemia", "subject:paediatrics-neonatal"]
  - guid: "nHypoGluc2025_017"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "If glucose is not increasing but not decreasing in asymptomatic baby, what adjustments are made?"
      Back: "Increase frequency of feeds to 2-hourly and increase daily volume of feeds by 20–30 ml/kg/day. Re-check blood glucose in 30 minutes"
    tags: ["management-algorithm", "feed-adjustment", "subject:paediatrics-neonatal"]
  - guid: "nHypoGluc2025_018"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "What triggers transition to severe hypoglycemia management in asymptomatic babies?"
      Back: "Glucose decreasing OR glucose still <2.6 mmol/ℓ despite interventions"
    tags: ["management-algorithm", "escalation-criteria", "subject:paediatrics-neonatal"]
  - guid: "nHypoGluc2025_019"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "What is the first intervention for symptomatic or severe hypoglycemia (≤1.7 mmol/ℓ)?"
      Back: "Give milk by nasogastric tube if not fed within previous 2 hours, whilst preparing to insert an intravenous line"
    tags: ["management-algorithm", "severe-hypoglycemia", "subject:paediatrics-neonatal"]
  - guid: "nHypoGluc2025_020"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "What is the IV dextrose bolus dose for severe neonatal hypoglycemia?"
      Back: "2–5 ml/kg of 10% dextrose water IV as a bolus"
    tags: ["medication-dosing", "severe-hypoglycemia", "subject:paediatrics-neonatal"]
  - guid: "nHypoGluc2025_021"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "What emergency medication is used if IV access cannot be established for >30 minutes in severe hypoglycemia?"
      Back: "Glucagon 0.2 mg/kg/dose IM, can repeat after 20 min, max 1 mg. Discuss with referral centre"
    tags: ["medication-dosing", "emergency-treatment", "subject:paediatrics-neonatal"]
  - guid: "nHypoGluc2025_022"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "What alternative is used if peripheral IV access cannot be established in severe hypoglycemia?"
      Back: "Insert an emergency umbilical venous catheter (UVC)"
    tags: ["procedure", "vascular-access", "subject:paediatrics-neonatal"]
  - guid: "nHypoGluc2025_023"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "What medication is used for hypoglycemia not responding to maximum IV glucose (awaiting critical sample)?"
      Back: "Hydrocortisone 1–2 mg/kg/dose IV or PO 6-hourly"
    tags: ["medication-dosing", "refractory-hypoglycemia", "subject:paediatrics-neonatal"]
  - guid: "nHypoGluc2025_024"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "What is the starting IV dextrose infusion rate once glucose >2.5 mmol/ℓ?"
      Back: "10% dextrose at 60–120 ml/kg/24 h depending on gestational age and day of life; beware of fluid volumes >120 ml/kg/day on day 1"
    tags: ["medication-dosing", "infusion-rates", "subject:paediatrics-neonatal"]
  - guid: "nHypoGluc2025_025"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "How should dextrose concentration be escalated if hypoglycemia persists?"
      Back: "Increase sequentially to 12.5%, 15%, and 20%"
    tags: ["medication-dosing", "dextrose-concentrations", "subject:paediatrics-neonatal"]
  - guid: "nHypoGluc2025_026"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "Which dextrose concentrations require a central line for infusion?"
      Back: ">12.5% dextrose requires a central line; emergency UVC may be used for short-term control during transfer"
    tags: ["medication-administration", "vascular-access", "subject:paediatrics-neonatal"]
  - guid: "nHypoGluc2025_027"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "Why should 50% glucose never be given IV or orally in neonates?"
      Back: "Due to its hypertonicity"
    tags: ["contraindication", "medication-safety", "subject:paediatrics-neonatal"]
  - guid: "nHypoGluc2025_028"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "What is the blood glucose monitoring frequency after intervention until normal?"
      Back: "Every 30 minutes after the intervention until normal, then 2-hourly and/or before feeds until normal (≥2.6 mmol/ℓ) for two consecutive readings"
    tags: ["monitoring-frequency", "management-protocol", "subject:paediatrics-neonatal"]
  - guid: "nHypoGluc2025_029"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "When should milk feeds be added once glucose is normal?"
      Back: "Once glucose is normal and there are no clinical contraindications; gradually build up feeds while decreasing IV fluids provided BG remains ≥2.6 mmol/ℓ"
    tags: ["feeding-protocol", "transition-to-feeds", "subject:paediatrics-neonatal"]
  - guid: "nHypoGluc2025_030"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "When should dextrose-containing IV fluids be stopped?"
      Back: "Do not stop until feeds are well established"
    tags: ["management-protocol", "fluid-discontinuation", "subject:paediatrics-neonatal"]
  - guid: "nHypoGluc2025_031"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "What is the formula for calculating dextrose delivery rate?"
      Back: "Dextrose Delivery Rate (mg/kg/min) = (ml/kg/24 h) × (% dextrose) × 0.007"
    tags: ["calculation", "dextrose-dosing", "subject:paediatrics-neonatal"]
  - guid: "nHypoGluc2025_032"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "Define persistent neonatal hypoglycemia."
      Back: "Persistently low blood glucose concentrations beyond the first 48 hours of life OR requirement of parenteral glucose infusions to treat hypoglycemia beyond 48 hours of life"
    tags: ["definition", "persistent-hypoglycemia", "subject:paediatrics-neonatal"]
  - guid: "nHypoGluc2025_033"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "What warrants investigation in persistent neonatal hypoglycemia?"
      Back: "Need to determine the underlying cause and discuss all babies with referral centre for advice and admission if unable to be managed at place of birth or presentation"
    tags: ["persistent-hypoglycemia", "investigation-referral", "subject:paediatrics-neonatal"]
  - guid: "nHypoGluc2025_034"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "List investigations for persistent neonatal hypoglycemia."
      Back: "1. Consider sepsis: blood culture and start broad spectrum antibiotics\n2. Critical sample: blood at time of hypoglycemia for serum glucose, insulin, and cortisol\n3. Always confirm hypoglycemia with laboratory sample\n4. Further investigation discussed with paediatrician/neonatologist or paediatric endocrinologist"
    tags: ["persistent-hypoglycemia", "investigations", "subject:paediatrics-neonatal"]
  - guid: "nHypoGluc2025_035"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "What is the commonest cause of persistent neonatal hypoglycemia?"
      Back: "Hyperinsulinism (elevated insulin despite hypoglycemia)"
    tags: ["persistent-hypoglycemia", "etiology", "subject:paediatrics-neonatal"]
  - guid: "nHypoGluc2025_036"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "In which conditions does hyperinsulinism occur?"
      Back: "Infants of diabetic mothers (IDM), intrauterine growth restriction (IUGR), and intrapartum stress"
    tags: ["hyperinsulinism", "associated-conditions", "subject:paediatrics-neonatal"]
  - guid: "nHypoGluc2025_037"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "What is the typical course of hyperinsulinism in neonates?"
      Back: "Usually transient, resolves in first few weeks of life; persistent hyperinsulinism requires specialist referral"
    tags: ["hyperinsulinism", "prognosis", "subject:paediatrics-neonatal"]
  - guid: "nHypoGluc2025_038"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "What medication is used for low cortisol in persistent hypoglycemia?"
      Back: "Hydrocortisone 1–2 mg/kg/dose IV or PO 6-hourly"
    tags: ["medication-dosing", "cortisol-replacement", "subject:paediatrics-neonatal"]
  - guid: "nHypoGluc2025_039"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "What medications are used for hyperinsulinism in persistent hypoglycemia?"
      Back: "1. Diazoxide 2–6 mg/kg/day IV/PO 8-hourly\n2. Hydrochlorothiazide 1–3 mg/kg/dose PO 6–12 hourly\nRequires specialist guidance"
    tags: ["medication-dosing", "hyperinsulinism-treatment", "subject:paediatrics-neonatal"]
  - guid: "nHypoGluc2025_040"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "What are the discharge criteria for babies with hypoglycemia?"
      Back: "Two normal pre-prandial blood glucose readings consecutively on full 8-hourly feeds"
    tags: ["discharge-criteria", "feeding-schedule", "subject:paediatrics-neonatal"]
  - guid: "nHypoGluc2025_041"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "What follow-up is required for all babies with severe hypoglycemia?"
      Back: "Neurodevelopmental follow-up at 20 weeks corrected gestational age; consider brain MRI"
    tags: ["follow-up", "neurodevelopment", "subject:paediatrics-neonatal"]
  - guid: "nHypoGluc2025_042"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "What defines neonatal hyperglycemia?"
      Back: "Whole blood glucose >7.0 mmol/ℓ or plasma >8.3 mmol/ℓ"
    tags: ["definition", "hyperglycemia-threshold", "subject:paediatrics-neonatal"]
  - guid: "nHypoGluc2025_043"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "Is hyperglycemia in extreme preterms always pathological?"
      Back: "No, frequent in extreme preterms but not always requires intervention"
    tags: ["hyperglycemia", "clinical-significance", "subject:paediatrics-neonatal"]
  - guid: "nHypoGluc2025_044"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "What physiological consequence occurs when plasma glucose >11 mmol/ℓ?"
      Back: "Osmotic diuresis and polyuria"
    tags: ["hyperglycemia", "physiology", "subject:paediatrics-neonatal"]
  - guid: "nHypoGluc2025_045"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "Why is glycosuria not a good marker for hyperglycemia in neonates?"
      Back: "Because it correlates with plasma glucose >11 mmol/ℓ, not lower hyperglycemia thresholds"
    tags: ["hyperglycemia", "diagnostics", "subject:paediatrics-neonatal"]
  - guid: "nHypoGluc2025_046"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "What is the monitoring frequency for hyperglycemia in the first 24–48 hours?"
      Back: "Every 6–8 hours in first 24–48 hours in babies on IV glucose, ELBW, septic, intubated, with IVH, or on inotropes/steroids/insulin"
    tags: ["hyperglycemia", "monitoring-frequency", "subject:paediatrics-neonatal"]
  - guid: "nHypoGluc2025_047"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "List all causes of neonatal hyperglycemia."
      Back: "1. IV glucose\n2. ELBW/VLBW\n3. Stress response\n4. Drugs (steroids, inotropes)\n5. Neonatal diabetes mellitus (rare)"
    tags: ["hyperglycemia", "etiology", "subject:paediatrics-neonatal"]
  - guid: "nHypoGluc2025_048"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "At what glucose threshold should treatment of hyperglycemia be considered?"
      Back: "Stepwise approach in babies with hyperglycemia >10 mmol/ℓ"
    tags: ["hyperglycemia", "treatment-threshold", "subject:paediatrics-neonatal"]
  - guid: "nHypoGluc2025_049"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "What is the first-line approach to reducing glucose in hyperglycemic neonates?"
      Back: "Decrease parenteral glucose to 4–6 mg/kg/min by reducing dextrose concentration from 10% to 5% (not below 5%) and/or reducing volume"
    tags: ["hyperglycemia-treatment", "management-algorithm", "subject:paediatrics-neonatal"]
  - guid: "nHypoGluc2025_050"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "When should insulin therapy be considered for hyperglycemia?"
      Back: "If persistent ≥12 mmol/ℓ despite reduction in dextrose, with specialist guidance; confirm with lab/blood gas before starting"
    tags: ["hyperglycemia-treatment", "insulin-indication", "subject:paediatrics-neonatal"]
  - guid: "nHypoGluc2025_051"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "Why should insulin never be bolused in neonates?"
      Back: "Bolus insulin is contraindicated in neonatal management"
    tags: ["insulin-safety", "contraindication", "subject:paediatrics-neonatal"]
  - guid: "nHypoGluc2025_052"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "What investigations are needed for persistent hyperglycemia?"
      Back: "1. Septic screen and antibiotics\n2. Cranial ultrasound for intraventricular hemorrhage (IVH)\n3. Endocrinology if neonatal diabetes is considered"
    tags: ["hyperglycemia-investigation", "workup", "subject:paediatrics-neonatal"]
  - guid: "nHypoGluc2025_053"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "Why must plastic tubing be primed with insulin before insulin infusion?"
      Back: "Because insulin binds to tubing"
    tags: ["insulin-administration", "procedure", "subject:paediatrics-neonatal"]
  - guid: "nHypoGluc2025_054"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "What is the insulin dose range for neonatal hyperglycemia?"
      Back: "0.02–0.5 units/kg/hour"
    tags: ["insulin-dosing", "medication", "subject:paediatrics-neonatal"]
  - guid: "nHypoGluc2025_055"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "Describe the insulin infusion preparation for neonatal use."
      Back: "Add 2 ml (100 units) Actrapid to 10 ml normal saline. Then add 1 ml/kg (=10 units/kg) to 0.9% NS to final volume 50 ml. Then 0.1 ml/hour = 0.02 units/kg/hour"
    tags: ["insulin-preparation", "infusion-protocol", "subject:paediatrics-neonatal"]
  - guid: "nHypoGluc2025_056"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "What is the monitoring frequency during neonatal insulin infusion?"
      Back: "Hourly blood glucose"
    tags: ["insulin-monitoring", "management-protocol", "subject:paediatrics-neonatal"]
  - guid: "nHypoGluc2025_057"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "At what blood glucose level should insulin infusion be stopped?"
      Back: "When blood glucose <8 mmol/ℓ"
    tags: ["insulin-cessation", "management-protocol", "subject:paediatrics-neonatal"]
  - guid: "nHypoGluc2025_058"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "What is the insulin infusion rate when blood glucose >25 mmol/ℓ?"
      Back: "1 ml/hour"
    tags: ["insulin-infusion-rate", "hyperglycemia-management", "subject:paediatrics-neonatal"]
  - guid: "nHypoGluc2025_059"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "What is the insulin infusion rate when blood glucose 20–25 mmol/ℓ?"
      Back: "0.5 ml/hour"
