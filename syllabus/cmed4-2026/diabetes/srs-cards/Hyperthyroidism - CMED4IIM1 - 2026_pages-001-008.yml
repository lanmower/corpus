deck: "Corpus::Diabetes::Hyperthyroidism"
notes:
  - guid: 75c509ac69eea3d7
    noteType: Basic
    deck: "Corpus::Diabetes::Hyperthyroidism"
    fields:
      Front: "What is the basic feedback loop of the pituitary-thyroid axis?"
      Back: "Hypothalamus releases TRH → stimulates pituitary to release TSH → TSH binds to thyroid receptor → production of T4 and T3 → T4 and T3 feed back to suppress hypothalamus and pituitary."
    tags: ["physiology", "endocrine", "thyroid-axis", "subject:diabetes"]
  - guid: 9c662be347a16789
    noteType: Basic
    deck: "Corpus::Diabetes::Hyperthyroidism"
    fields:
      Front: "What are the functional units of the thyroid gland where hormone synthesis occurs?"
      Back: "Thyroid follicles are the functional units where thyroid hormone synthesis occurs. The colloid is the site where preformed thyroid hormone is stored."
    tags: ["anatomy", "thyroid", "physiology", "subject:diabetes"]
  - guid: c678d50f9421ef95
    noteType: Basic
    deck: "Corpus::Diabetes::Hyperthyroidism"
    fields:
      Front: "How is thyroid hormone synthesized at the cellular level?"
      Back: "Iodide is actively pumped from circulation into thyroid epithelial cells. Thyroid peroxidase enzyme organifies iodine, which binds to tyrosine to form T4 (thyroxine). T4 binds to thyroglobulin for storage in colloid."
    tags: ["synthesis", "biochemistry", "thyroid", "subject:diabetes"]
  - guid: 53c41e3270c98401
    noteType: Basic
    deck: "Corpus::Diabetes::Hyperthyroidism"
    fields:
      Front: "What is the difference between hyperthyroidism and thyrotoxicosis?"
      Back: "Hyperthyroidism: excess thyroid hormone synthesized and secreted by the thyroid gland. Thyrotoxicosis: excess preformed thyroid hormones released, such as in inflammatory disorders."
    tags: ["definitions", "pathophysiology", "subject:diabetes"]
  - guid: bc2ba0b320ea59e0
    noteType: Basic
    deck: "Corpus::Diabetes::Hyperthyroidism"
    fields:
      Front: "What are the three most common causes of thyrotoxicosis?"
      Back: "1. Graves disease (most common) 2. Toxic multinodular goiter 3. Toxic adenoma. Other causes include thyroiditis and factitious hormone use."
    tags: ["etiology", "differential-diagnosis", "subject:diabetes"]
  - guid: 3e5d9cadb901da74
    noteType: Basic
    deck: "Corpus::Diabetes::Hyperthyroidism"
    fields:
      Front: "List the common symptoms of thyrotoxicosis."
      Back: "Weight loss despite increased appetite, tremor, anxiety, insomnia, palpitations, dyspnea, increased GI function, diaphoresis, heat intolerance. Graves disease patients may have specific eye signs."
    tags: ["clinical-presentation", "symptoms", "subject:diabetes"]
  - guid: 82dcdd45ad980f1f
    noteType: Basic
    deck: "Corpus::Diabetes::Hyperthyroidism"
    fields:
      Front: "What are the three specific eye-related manifestations of Graves disease?"
      Back: "1. Acropachy (clubbing-like appearance) 2. Dermopathy (infiltration of skin with ground substance, raised orange-skin lesions) 3. Graves orbitopathy (swelling and proptosis of eyes)."
    tags: ["graves-disease", "ophthalmology", "subject:diabetes"]
  - guid: f6ccc55b8126931d
    noteType: Basic
    deck: "Corpus::Diabetes::Hyperthyroidism"
    fields:
      Front: "What is Pemberton sign and what does it indicate?"
      Back: "Pemberton sign: patient elevates arms and external jugular vein becomes engorged. Indicates retrosternal extension of thyroid goiter."
    tags: ["clinical-examination", "diagnosis", "subject:diabetes"]
  - guid: 8612c6a2d0666702
    noteType: Basic
    deck: "Corpus::Diabetes::Hyperthyroidism"
    fields:
      Front: "What thyroid hormone measurement pattern indicates thyroid toxicosis?"
      Back: "TSH is suppressed (first indicator), T4 is elevated, T3 is elevated. Rare exception: TSH elevated with elevated T4/T3 suggests TSH-secreting pituitary adenoma."
    tags: ["laboratory", "investigation", "subject:diabetes"]
  - guid: 5795cdef34bb9c9c
    noteType: Basic
    deck: "Corpus::Diabetes::Hyperthyroidism"
    fields:
      Front: "What is the difference between anti-TSH receptor antibody and anti-thyroid peroxidase/globulin antibodies?"
      Back: "Anti-TSH receptor antibody: pathognomonic of Graves disease, NOT found in other thyroid diseases, crosses placenta in pregnancy. Anti-TPO/anti-thyroglobulin: occur in autoimmune thyroiditis, found in normal people, do NOT cross placenta."
    tags: ["antibodies", "immunology", "diagnosis", "subject:diabetes"]
  - guid: 923b86d714168677
    noteType: Basic
    deck: "Corpus::Diabetes::Hyperthyroidism"
    fields:
      Front: "What is the TIRADS grading system used for?"
      Back: "Used in thyroid ultrasound to categorize nodules and help determine the need for needle aspiration biopsy."
    tags: ["investigation", "ultrasound", "subject:diabetes"]
  - guid: 7083119d8494c563
    noteType: Basic
    deck: "Corpus::Diabetes::Hyperthyroidism"
    fields:
      Front: "What are the patterns of isotope uptake in different thyrotoxic states?"
      Back: "Graves: uniform, symmetrical uptake. Toxic multinodular goiter: irregular, patchy uptake. Toxic adenoma: single area of uptake, rest suppressed. Inflammatory disease: diminished or absent uptake."
    tags: ["investigation", "isotope-scan", "subject:diabetes"]
  - guid: a5cc3e769d0b7f28
    noteType: Basic
    deck: "Corpus::Diabetes::Hyperthyroidism"
    fields:
      Front: "What is the typical age and gender distribution of Graves disease?"
      Back: "Typically affects young women between 30-60 years old with strong female-to-male predominance. Has genetic associations encoded in HLA and other genes with familiar clustering."
    tags: ["epidemiology", "graves-disease", "subject:diabetes"]
  - guid: 4c9e422cbd3d2978
    noteType: Basic
    deck: "Corpus::Diabetes::Hyperthyroidism"
    fields:
      Front: "How does toxic multinodular goiter (Plummer disease) differ from Graves disease?"
      Back: "Affects older persons, no female predominance, develops slowly in pre-existing nodular goiter. One or more nodules become autonomous and secrete thyroid hormone unregulated. Less severe disease, nodular on palpation, antibodies not detectable."
    tags: ["differential-diagnosis", "etiology", "subject:diabetes"]
  - guid: f50ed866e5c51c06
    noteType: Basic
    deck: "Corpus::Diabetes::Hyperthyroidism"
    fields:
      Front: "What are the two main categories of inflammatory thyroid disease?"
      Back: "1. Immune-mediated: Hashimoto's thyroiditis or drug-induced (interferon, immune checkpoint inhibitors). 2. Non-immune: De Quervain's thyroiditis (post-infectious), often follows viral infection."
    tags: ["thyroiditis", "inflammation", "subject:diabetes"]
  - guid: 8394c8031431db1e
    noteType: Basic
    deck: "Corpus::Diabetes::Hyperthyroidism"
    fields:
      Front: "What is the clinical presentation of inflammatory thyroid disease?"
      Back: "Mild thyroid toxicosis, pain over thyroid often referred to jaw, fever, systemic illness. Isotope uptake absent. Antibodies very high in immune-mediated, absent in non-immune. Self-limiting with spontaneous resolution."
    tags: ["thyroiditis", "clinical-presentation", "subject:diabetes"]
  - guid: fbc7a61099c52204
    noteType: Basic
    deck: "Corpus::Diabetes::Hyperthyroidism"
    fields:
      Front: "What are the three main treatment categories for thyroid toxicosis?"
      Back: "1. Symptomatic therapy: beta-blockers for heart rate, tremor control, and reducing T4 to T3 conversion. 2. Specific therapy: anti-thyroid drugs, thyroidectomy, radioactive iodine. 3. Duration and choice depends on etiology and circumstances."
    tags: ["treatment", "management", "subject:diabetes"]
  - guid: 13ac89ec7fe28e57
    noteType: Basic
    deck: "Corpus::Diabetes::Hyperthyroidism"
    fields:
      Front: "What is carbimazole and what is its mechanism of action?"
      Back: "Anti-thyroid drug available in South Africa (trade name Neomerkazole). Inhibits thyroid hormone synthesis by inhibiting thyroid peroxidase enzyme activity. Used for ~75 years, highly effective, generally well-tolerated."
    tags: ["pharmacology", "antithyroid-drugs", "subject:diabetes"]
  - guid: d8978b6362401b9d
    noteType: Basic
    deck: "Corpus::Diabetes::Hyperthyroidism"
    fields:
      Front: "What are the adverse effects of anti-thyroid drugs?"
      Back: "Primary adverse effect: bone marrow toxicity (agranulocytosis). Relative risk of pancreatitis. Long-term use may be associated with vasculitis."
    tags: ["pharmacology", "adverse-effects", "subject:diabetes"]
  - guid: 671114e9906ed4bb
    noteType: Basic
    deck: "Corpus::Diabetes::Hyperthyroidism"
    fields:
      Front: "How does radioactive iodine work and what are its considerations?"
      Back: "Radioactive iodine (technetium 99) concentrates in thyroid, emits radiation destroying thyroid tissue. Teratogenic, may worsen Graves orbitopathy. Has slow onset; anti-thyroid drugs used meanwhile. Dose may need repetition after 6 months."
    tags: ["treatment", "radioactive-iodine", "subject:diabetes"]
  - guid: 76f90176bf7bbe37
    noteType: Basic
    deck: "Corpus::Diabetes::Hyperthyroidism"
    fields:
      Front: "When is total thyroidectomy indicated for thyroid toxicosis?"
      Back: "Reserved for: very large goiter with mediastinal compression, patient preference, mid-trimester pregnancy, inadequate response to medical therapy. Patient must be rendered euthyroid first with anti-thyroid drugs, Lugol's iodine, and beta-blockers."
    tags: ["surgery", "thyroidectomy", "subject:diabetes"]
  - guid: 0dbf11acd554a040
    noteType: Basic
    deck: "Corpus::Diabetes::Hyperthyroidism"
    fields:
      Front: "What are the complications of thyroidectomy?"
      Back: "Patient becomes hypothyroid (expected). Rare: hypoparathyroidism, recurrent laryngeal nerve injury. Total thyroidectomy is now preferred over subtotal for Graves disease."
    tags: ["surgery", "complications", "subject:diabetes"]
  - guid: ab54472c140abebe
    noteType: Basic
    deck: "Corpus::Diabetes::Hyperthyroidism"
    fields:
      Front: "What is the GREAT score and what does it predict?"
      Back: "Clinical tool for estimating risk of relapse in Graves disease patients treated medically. Includes: age, thyroid hormone level, TSH receptor antibody level, goiter size (WHO classification). Helps determine likelihood of response to medical therapy."
    tags: ["scoring-system", "prognosis", "graves-disease", "subject:diabetes"]
  - guid: 479b51edbc3f9fae
    noteType: Basic
    deck: "Corpus::Diabetes::Hyperthyroidism"
    fields:
      Front: "What is the management algorithm for Graves disease based on relapse risk?"
      Back: "Low relapse risk: medical management with carbimazole ~18 months; many undergo spontaneous remission. High relapse risk/low response chance: radioactive iodine (if small goiter, patient preference) or surgery (if large goiter, suspicious nodules, patient preference, orbitopathy)."
    tags: ["management", "graves-disease", "subject:diabetes"]
  - guid: 37175a7ff9589bf4
    noteType: Basic
    deck: "Corpus::Diabetes::Hyperthyroidism"
    fields:
      Front: "How is toxic multinodular goiter managed differently from Graves disease?"
      Back: "Medical treatment (carbimazole) controls but does not cure disease. Definitive therapy requires radioactive iodine or thyroidectomy. Choice depends on individual circumstances, patient preference, and indications like large goiter or compressive symptoms."
    tags: ["management", "nodular-goiter", "subject:diabetes"]
  - guid: 280debd7ce948ace
    noteType: Basic
    deck: "Corpus::Diabetes::Hyperthyroidism"
    fields:
      Front: "Why are anti-thyroid drugs and radioactive iodine ineffective in inflammatory thyroid disease?"
      Back: "Inflammatory diseases have no thyroid autonomy; the inflammation itself causes hormone release. Anti-thyroid drugs (which block synthesis) and radioactive iodine (which destroys autonomous tissue) cannot address the inflammatory process."
    tags: ["thyroiditis", "treatment", "subject:diabetes"]
  - guid: ded094ae458ae726
    noteType: Basic
    deck: "Corpus::Diabetes::Hyperthyroidism"
    fields:
      Front: "What is Graves orbitopathy and what are the risk factors for development?"
      Back: "Inflammatory eye disease in Graves disease related to cross-reactivity of immune responses to thyroid and orbital antigens. Risk factors: cigarette smoking, severe hyperthyroidism, radioactive iodine, untreated/uncontrolled hypothyroidism."
    tags: ["orbitopathy", "graves-disease", "subject:diabetes"]
  - guid: 1669464d79834ab6
    noteType: Basic
    deck: "Corpus::Diabetes::Hyperthyroidism"
    fields:
      Front: "How is activity of Graves eye disease assessed?"
      Back: "Grading system identifies if 3+ components present = active disease. Severity assessed as mild, moderate, or severe. Severity criteria: degree of lid retraction, exophthalmos, corneal dryness, presence/absence of diplopia."
    tags: ["orbitopathy", "assessment", "subject:diabetes"]
  - guid: 5a604203b056ef10
    noteType: Basic
    deck: "Corpus::Diabetes::Hyperthyroidism"
    fields:
      Front: "What is sight-threatening Graves orbitopathy and how does it present?"
      Back: "Optic nerve compression or corneal breakdown risk, leading to significant visual impairment. Requires urgent therapy with surgical decompression and powerful immunosuppressive agents."
    tags: ["orbitopathy", "emergency", "subject:diabetes"]
  - guid: 2077409df19b0d31
    noteType: Basic
    deck: "Corpus::Diabetes::Hyperthyroidism"
    fields:
      Front: "What is the stepped treatment approach for Graves orbitopathy by severity?"
      Back: "Mild: smoking cessation, normal thyroid function, topical lubricating gels/drops, oral selenium 6 months. Moderate: add IV methylprednisolone. Severe/site-threatening: IV methylprednisolone (12 weeks), surgical decompression, orbital radiation, immunosuppressive agents."
    tags: ["orbitopathy", "treatment", "subject:diabetes"]
  - guid: 2d4f1c78f30dffb4
    noteType: Basic
    deck: "Corpus::Diabetes::Hyperthyroidism"
    fields:
      Front: "What is thyroid crisis (thyroid storm) and how is it treated?"
      Back: "Medical emergency with very high thyroid hormone levels. Diagnosis usually clinical. Treated in ICU/high-care with: high-dose carbimazole, Lugol's iodine, high-dose beta-blockers, IV hydrocortisone, treatment of atrial fibrillation. Alternatives if no response: lithium, potassium perchlorate, cholestyramine, plasma pheresis."
    tags: ["emergency", "thyroid-crisis", "subject:diabetes"]
