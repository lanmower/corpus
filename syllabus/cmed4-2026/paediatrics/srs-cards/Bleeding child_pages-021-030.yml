    noteType: Basic
    deck: "Corpus::Paediatrics::Bleeding child"
    fields:
      Front: "What is the most common cause of thrombocytopenia in children?"
      Back: "ITP (Idiopathic thrombocytopenic purpura)"
    tags: ["ITP", "most-common", "thrombocytopenia", "subject:paediatrics"]
  - guid: c3e4f5g6h7i8c3e4
    noteType: Basic
    deck: "Corpus::Paediatrics::Bleeding child"
    fields:
      Front: "List non-immune causes of increased platelet destruction."
      Back: "Disseminated Intravascular Coagulation (DIC), Hemolytic-uremic syndrome (HUS), Thrombotic thrombocytopenic Purpura (TTP), Sepsis"
    tags: ["DIC", "HUS", "TTP", "subject:paediatrics"]
  - guid: d4f5g6h7i8j9d4f5
    noteType: Basic
    deck: "Corpus::Paediatrics::Bleeding child"
    fields:
      Front: "What bone marrow conditions cause thrombocytopenia through decreased platelet production?"
      Back: "Primary malignancy (e.g. leukemia), Bone marrow failure (e.g. aplastic anemia - acquired/genetic disorder like Fanconi's anemia), Bone marrow infiltration (e.g. neuroblastoma, storage disorders, infections), Infections (e.g. HIV, Parvo, CMV, TB), Cytotoxic drugs, radiation"
    tags: ["pancytopenia", "bone-marrow-failure", "leukemia", "subject:paediatrics"]
