    noteType: Basic
    deck: "Corpus::Paediatrics::2022 CHILD RIGHTS SA LEGISLATURE"
    fields:
      Front: "What is the purpose of the Child Support Grant?"
      Back: "Poverty alleviation"
    tags: ["legislation", "rsa-law", "grants", "child-support-grant", "subject:paediatrics"]
  - guid: c9f2e0a3b5d4c7e9
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 CHILD RIGHTS SA LEGISLATURE"
    fields:
      Front: "What are the eligibility criteria for the Child Support Grant?"
      Back: "Child < 18 years of age; Caregiver > 18 years of age"
    tags: ["legislation", "rsa-law", "grants", "child-support-grant", "eligibility", "subject:paediatrics"]
  - guid: d0a3f1b4c6e5d8fa
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 CHILD RIGHTS SA LEGISLATURE"
    fields:
      Front: "What are the income limits for the Child Support Grant?"
      Back: "Single parent < R 48,000 pa; Married couple < R 96,000 pa"
    tags: ["legislation", "rsa-law", "grants", "child-support-grant", "income-limits", "subject:paediatrics"]
