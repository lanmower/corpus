    fields:
      Front: "What are the risks of perinatal HIV transmission without preventative interventions?"
      Back: |
        Cumulative: 13 to 39%
        Intrauterine: 5%
        Peripartum: 13 to 18%
        Breastfeeding: 5 to 28%
    tags: ["hiv", "pmtct", "transmission-risk", "subject:paediatrics"]
