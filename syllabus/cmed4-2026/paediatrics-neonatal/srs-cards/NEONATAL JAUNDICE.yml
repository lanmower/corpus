      Back: "3 antigens: C, D, E"
    tags: ["rh-disease", "immunology", "subject:paediatrics-neonatal"]
  - guid: "rhdis002abc"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::NEONATAL JAUNDICE"
    fields:
      Front: "What defines Rh negative blood type?"
      Back: "Absence of D antigen (denoted d)"
    tags: ["rh-disease", "immunology", "subject:paediatrics-neonatal"]
  - guid: "rhdis003abc"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::NEONATAL JAUNDICE"
    fields:
      Front: "First step in Rh disease pathogenesis"
      Back: "Fetal D+ cells cross placenta into Rh- mother circulation"
    tags: ["rh-disease", "pathogenesis", "subject:paediatrics-neonatal"]
  - guid: "rhdis004abc"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::NEONATAL JAUNDICE"
    fields:
      Front: "What does the Rh- mother's blood do when exposed to D antigen?"
      Back: "Produces antibodies to the D antigen"
    tags: ["rh-disease", "pathogenesis", "subject:paediatrics-neonatal"]
  - guid: "rhdis005abc"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::NEONATAL JAUNDICE"
    fields:
      Front: "What happens when maternal Rh antibodies cross back to the fetus?"
      Back: "Haemolysis of fetal red blood cells"
    tags: ["rh-disease", "pathogenesis", "subject:paediatrics-neonatal"]
  - guid: "rhdis006abc"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::NEONATAL JAUNDICE"
    fields:
