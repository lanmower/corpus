    fields:
      Front: "When should yellow fever vaccine be given to HIV-infected children?"
      Back: |
        Yellow fever vaccine is recommended for asymptomatic HIV-infected children only, NOT for symptomatic HIV infection. Optimal timing is at 9 months.
