# Anki canonical export — endocrine / endocrine
# Generated by scripts/anki_migrate.js
deck: "Corpus::Endocrine::endocrine"
notes:
  - guid: ddc3e4e7e55441c5
    noteType: Basic
    deck: "Corpus::Endocrine::endocrine"
    fields:
      Front: "Which specific zone of the adrenal cortex is responsible for the production of mineralocorticoids like aldosterone?"
      Back: "Zona glomerulosa"
    tags: ["subject:endocrine"]
  - guid: 333c00b9bce0159d
    noteType: Basic
    deck: "Corpus::Endocrine::endocrine"
    fields:
      Front: "What is the primary androgen produced by the adrenal reticularis?"
      Back: "Dehydroepiandrosterone (DHEA)"
    tags: ["subject:endocrine"]
  - guid: 49b459781f0bcc66
    noteType: Basic
    deck: "Corpus::Endocrine::endocrine"
    fields:
      Front: "In primary adrenal insufficiency (Addison's disease), why does hyperpigmentation occur?"
      Back: "Increased ACTH production is accompanied by $\\beta$-MSH (melanocyte-stimulating hormone) production."
    tags: ["subject:endocrine"]
  - guid: bf4d6e1ae0474c50
    noteType: Basic
    deck: "Corpus::Endocrine::endocrine"
    fields:
      Front: "Which clinical sign in the nails is specifically associated with Addison's disease?"
      Back: "Brown nails"
    tags: ["subject:endocrine"]
  - guid: 20f05b4e39e3473f
    noteType: Basic
    deck: "Corpus::Endocrine::endocrine"
    fields:
      Front: "What cardiovascular finding is typically seen on a chest X-ray of a patient with Addison's disease?"
      Back: "A small heart"
    tags: ["subject:endocrine"]
  - guid: 2036cfbf5cbc5e13
    noteType: Basic
    deck: "Corpus::Endocrine::endocrine"
    fields:
      Front: "In the context of adrenal hypofunction, what is the 'Waterhouse-Friderichsen syndrome'?"
      Back: "Adrenal hemorrhage resulting from meningococcal septicemia, typically in children."
    tags: ["subject:endocrine"]
  - guid: 9a047c31facbf03b
    noteType: Basic
    deck: "Corpus::Endocrine::endocrine"
    fields:
      Front: "Why must one be cautious when using Prednisone as maintenance therapy for adrenal insufficiency compared to Hydrocortisone?"
      Back: "Prednisone use prevents the accurate measurement of the serum cortisol response."
    tags: ["subject:endocrine"]
  - guid: 9f6af982fe144091
    noteType: Basic
    deck: "Corpus::Endocrine::endocrine"
    fields:
      Front: "What is the gold standard provocative test used to confirm a diagnosis of hypocortisolism?"
      Back: "Synacthen (ACTH) stimulation test"
    tags: ["subject:endocrine"]
  - guid: 9507e4d5029fabd4
    noteType: Basic
    deck: "Corpus::Endocrine::endocrine"
    fields:
      Front: "During a short Synacthen test, a normal individual's cortisol should rise to at least what level?"
      Back: "$550\\ nmol/L$"
    tags: ["subject:endocrine"]
  - guid: 80a5bc0688384387
    noteType: Basic
    deck: "Corpus::Endocrine::endocrine"
    fields:
      Front: "What is the physiological rationale for the 'long' (4-day) Synacthen test?"
      Back: "Continual ACTH stimulation will eventually 'kickstart' the adrenal glands in secondary (pituitary) insufficiency, but not in primary disease."
    tags: ["subject:endocrine"]
  - guid: 3a39a0d456211969
    noteType: Basic
    deck: "Corpus::Endocrine::endocrine"
    fields:
      Front: "What is the immediate emergency treatment for an Addisonian crisis?"
      Back: "IV fluids (Normal or Dextrose Saline) and $100\\ mg$ of Hydrocortisone IV stat."
    tags: ["subject:endocrine"]
  - guid: b2f1003450a6ce89
    noteType: Basic
    deck: "Corpus::Endocrine::endocrine"
    fields:
      Front: "How is 'Cushing's disease' specifically defined compared to 'Cushing's syndrome'?"
      Back: "It is hypercortisolism caused specifically by a pituitary microadenoma secreting excess ACTH."
    tags: ["subject:endocrine"]
  - guid: 70f071d75a522921
    noteType: Basic
    deck: "Corpus::Endocrine::endocrine"
    fields:
      Front: "Which malignancy is the most common cause of ectopic ACTH secretion leading to Cushing's syndrome?"
      Back: "Small cell carcinoma of the bronchus"
    tags: ["subject:endocrine"]
  - guid: eed21cdd45738d5d
    noteType: Basic
    deck: "Corpus::Endocrine::endocrine"
    fields:
      Front: "In Cushing's syndrome, what width must abdominal striae generally exceed to be considered 'vivid' or 'purple' striae?"
      Back: "$1\\ cm$"
    tags: ["subject:endocrine"]
  - guid: 49a858ce04ab99f8
    noteType: Basic
    deck: "Corpus::Endocrine::endocrine"
    fields:
      Front: "What is the characteristic electrolyte abnormality found in severe Cushing's syndrome or ectopic ACTH cases?"
      Back: "Hypokalemic alkalosis"
    tags: ["subject:endocrine"]
  - guid: 719ee512da20001b
    noteType: Basic
    deck: "Corpus::Endocrine::endocrine"
    fields:
      Front: "What diagnostic test is used to establish the loss of diurnal rhythm in cortisol secretion?"
      Back: "Midnight serum or salivary cortisol measurement"
    tags: ["subject:endocrine"]
  - guid: fca28ce06fca7e25
    noteType: Basic
    deck: "Corpus::Endocrine::endocrine"
    fields:
      Front: "In a high-dose ($8\\ mg$) Dexamethasone suppression test, what percentage of cortisol suppression suggests a pituitary source (Cushing's disease)?"
      Back: "Greater than $68\\%$ suppression"
    tags: ["subject:endocrine"]
  - guid: 38ee383b38a7ad24
    noteType: Basic
    deck: "Corpus::Endocrine::endocrine"
    fields:
      Front: "What is the purpose of Inferior Petrosal Sinus Sampling (IPSS) in the workup of Cushing's syndrome?"
      Back: "To distinguish between a pituitary (central) source and an ectopic (peripheral) source of ACTH."
    tags: ["subject:endocrine"]
  - guid: ea2643908957b436
    noteType: Basic
    deck: "Corpus::Endocrine::endocrine"
    fields:
      Front: "What is Nelson's syndrome?"
      Back: "The autonomous enlargement of a pituitary tumor following bilateral adrenalectomy due to the loss of cortisol feedback."
    tags: ["subject:endocrine"]
  - guid: 433440d2d4d35858
    noteType: Basic
    deck: "Corpus::Endocrine::endocrine"
    fields:
      Front: "Which zone of the adrenal cortex is involved in primary hyperaldosteronism (Conn's syndrome)?"
      Back: "Zona glomerulosa"
    tags: ["subject:endocrine"]
  - guid: 71f08229dec3299c
    noteType: Basic
    deck: "Corpus::Endocrine::endocrine"
    fields:
      Front: "Why is edema typically absent in patients with primary hyperaldosteronism?"
      Back: "The 'escape phenomenon' triggered by the release of atrial natriuretic peptide (ANP)."
    tags: ["subject:endocrine"]
  - guid: 4aade45f13722982
    noteType: Basic
    deck: "Corpus::Endocrine::endocrine"
    fields:
      Front: "In the investigation of hypertension and hypokalemia, what Aldosterone-Renin Ratio (ARR) value suggests primary hyperaldosteronism?"
      Back: "Equal to or greater than $50$ (when using renin activity) or $90$ (when using concentration)."
    tags: ["subject:endocrine"]
  - guid: 939862c24b6e394b
    noteType: Basic
    deck: "Corpus::Endocrine::endocrine"
    fields:
      Front: "What are 'paragangliomas'?"
      Back: "Catecholamine-secreting tumors arising from chromaffin cells in the sympathetic ganglia outside the adrenal medulla."
    tags: ["subject:endocrine"]
  - guid: b76e670758be44aa
    noteType: Basic
    deck: "Corpus::Endocrine::endocrine"
    fields:
      Front: "List the 'Five Ps' associated with the clinical presentation of Pheochromocytoma."
      Back: "Pressure (BP), Pain (Headache), Perspiration, Palpitations, and Pallor."
    tags: ["subject:endocrine"]
  - guid: fb27ff8ad29f50fd
    noteType: Basic
    deck: "Corpus::Endocrine::endocrine"
    fields:
      Front: "Why might a patient with an adrenaline-secreting pheochromocytoma paradoxically present with postural hypotension?"
      Back: "Decreased plasma volume and a blunted sympathetic response."
    tags: ["subject:endocrine"]
  - guid: d70c71c59957e10d
    noteType: Basic
    deck: "Corpus::Endocrine::endocrine"
    fields:
      Front: "What is the gold standard biochemical test for diagnosing Pheochromocytoma?"
      Back: "$24$-hour urine metanephrines"
    tags: ["subject:endocrine"]
  - guid: 76afb0004f16b3d1
    noteType: Basic
    deck: "Corpus::Endocrine::endocrine"
    fields:
      Front: "In the preoperative management of Pheochromocytoma, what is the critical sequence of adrenergic blockade?"
      Back: "Alpha-adrenergic blockade must be established before starting beta-blockers."
    tags: ["subject:endocrine"]
  - guid: 75ba107b4d2c184a
    noteType: Basic
    deck: "Corpus::Endocrine::endocrine"
    fields:
      Front: "What is the WHO diagnostic threshold for fasting plasma glucose in Diabetes Mellitus?"
      Back: "Equal to or greater than $7.0\\ mmol/L$"
    tags: ["subject:endocrine"]
  - guid: ab7b08d3c7819d39
    noteType: Basic
    deck: "Corpus::Endocrine::endocrine"
    fields:
      Front: "According to the ADA, what HbA1c level is diagnostic for Diabetes Mellitus?"
      Back: "Equal to or greater than $6.5\\%$"
    tags: ["subject:endocrine"]
  - guid: f1eb76baa25379c6
    noteType: Basic
    deck: "Corpus::Endocrine::endocrine"
    fields:
      Front: "How is Impaired Glucose Tolerance (IGT) defined based on a $2$-hour post-glucose load test?"
      Back: "Plasma glucose between $7.8\\ mmol/L$ and $11.0\\ mmol/L$."
    tags: ["subject:endocrine"]
  - guid: 908f936b5e57f62f
    noteType: Basic
    deck: "Corpus::Endocrine::endocrine"
    fields:
      Front: "What is the primary pathogenic distinction between Type 1 and Type 2 Diabetes Mellitus?"
      Back: "Type 1 is characterized by absolute insulin deficiency (autoimmune), while Type 2 involves insulin resistance and relative deficiency."
    tags: ["subject:endocrine"]
  - guid: 8a0a82ca05e2cdcb
    noteType: Basic
    deck: "Corpus::Endocrine::endocrine"
    fields:
      Front: "What biochemical test can distinguish Type 1 from Type 2 Diabetes by measuring endogenous insulin production?"
      Back: "C-peptide (basal or glucagon-stimulated)"
    tags: ["subject:endocrine"]
  - guid: deafcf032ceebb05
    noteType: Basic
    deck: "Corpus::Endocrine::endocrine"
    fields:
      Front: "What does the ADA category of 'increased risk for diabetes' (pre-diabetes) define for HbA1c?"
      Back: "$5.7\\%$ to $6.4\\%$"
    tags: ["subject:endocrine"]
  - guid: 2e65bf8e9a978e24
    noteType: Basic
    deck: "Corpus::Endocrine::endocrine"
    fields:
      Front: "What are the three specific microvascular complications of Diabetes Mellitus?"
      Back: "Retinopathy, nephropathy, and neuropathy."
    tags: ["subject:endocrine"]
  - guid: 77f3d76a7fd39139
    noteType: Basic
    deck: "Corpus::Endocrine::endocrine"
    fields:
      Front: "The characteristic histological lesion of diabetic nephropathy is known as _____."
      Back: "Kimmelstiel-Wilson nodules (glomerulosclerosis)"
    tags: ["subject:endocrine"]
  - guid: 4585c80ee7fd8286
    noteType: Basic
    deck: "Corpus::Endocrine::endocrine"
    fields:
      Front: "How is 'microalbuminuria' (incipient nephropathy) defined in a $24$-hour urine collection?"
      Back: "$30$ to $300\\ mg/day$"
    tags: ["subject:endocrine"]
  - guid: a090116175c07881
    noteType: Basic
    deck: "Corpus::Endocrine::endocrine"
    fields:
      Front: "Which class of antihypertensive drugs is first-line for treating diabetic nephropathy due to its renoprotective effects?"
      Back: "ACE inhibitors (or ARBs)"
    tags: ["subject:endocrine"]
  - guid: 52d12dc66844fac0
    noteType: Basic
    deck: "Corpus::Endocrine::endocrine"
    fields:
      Front: "At what GFR level is Metformin typically contraindicated in diabetic patients?"
      Back: "Less than $30\\ ml/min$ (or sometimes stopped at $45\\ ml/min$ depending on local guidelines)."
    tags: ["subject:endocrine"]
  - guid: bf6db261c8335259
    noteType: Basic
    deck: "Corpus::Endocrine::endocrine"
    fields:
      Front: "What ocular finding characterizes the transition from non-proliferative to proliferative diabetic retinopathy?"
      Back: "New vessel formation (neovascularization) at the disc or elsewhere."
    tags: ["subject:endocrine"]
  - guid: ec33787af47fdb70
    noteType: Basic
    deck: "Corpus::Endocrine::endocrine"
    fields:
      Front: "What is the commonest symptom of autonomic neuropathy in the gastrointestinal tract for diabetic patients?"
      Back: "Gastroparesis (manifesting as bloating, nausea, or vomiting)."
    tags: ["subject:endocrine"]
  - guid: 10e7a4f96866d814
    noteType: Basic
    deck: "Corpus::Endocrine::endocrine"
    fields:
      Front: "Which sensory modality is typically the first to be lost in diabetic peripheral neuropathy?"
      Back: "Vibration sense"
    tags: ["subject:endocrine"]
  - guid: 26c6698b59d59e20
    noteType: Basic
    deck: "Corpus::Endocrine::endocrine"
    fields:
      Front: "What defines a 'macro adenoma' of the pituitary gland?"
      Back: "A tumor with a diameter greater than $10\\ mm$."
    tags: ["subject:endocrine"]
  - guid: 913d671512e0ad3b
    noteType: Basic
    deck: "Corpus::Endocrine::endocrine"
    fields:
      Front: "What is the visual field defect typically caused by a pituitary tumor pressing on the optic chiasm?"
      Back: "Bitemporal hemianopia"
    tags: ["subject:endocrine"]
  - guid: a33ed236b54fcfb7
    noteType: Basic
    deck: "Corpus::Endocrine::endocrine"
    fields:
      Front: "What facial feature describes the forward protrusion of the lower jaw in acromegaly?"
      Back: "Prognathism"
    tags: ["subject:endocrine"]
  - guid: b058feb584a3b47a
    noteType: Basic
    deck: "Corpus::Endocrine::endocrine"
    fields:
      Front: "Which screening test is most sensitive for diagnosing acromegaly due to its stable levels throughout the day?"
      Back: "Serum IGF-1 (Insulin-like Growth Factor 1)"
    tags: ["subject:endocrine"]
  - guid: 3ff06f12dfa2de0b
    noteType: Basic
    deck: "Corpus::Endocrine::endocrine"
    fields:
      Front: "How is the Oral Glucose Tolerance Test (OGTT) used to diagnose acromegaly?"
      Back: "A failure of growth hormone (GH) to suppress to basal levels following a glucose load."
    tags: ["subject:endocrine"]
  - guid: 782d39241fece67d
    noteType: Basic
    deck: "Corpus::Endocrine::endocrine"
    fields:
      Front: "What is the first-line treatment for most functioning pituitary tumors, except for prolactinomas?"
      Back: "Transphenoidal surgery"
    tags: ["subject:endocrine"]
  - guid: 9f1fc7793345910f
    noteType: Basic
    deck: "Corpus::Endocrine::endocrine"
    fields:
      Front: "What is the medical treatment of choice for a prolactinoma?"
      Back: "Dopamine agonists (e.g., Bromocriptine or Cabergoline)."
    tags: ["subject:endocrine"]
  - guid: 77d5e529b5742b52
    noteType: Basic
    deck: "Corpus::Endocrine::endocrine"
    fields:
      Front: "Define 'Sheehan's syndrome'."
      Back: "Postpartum necrosis of the pituitary gland following severe obstetric hemorrhage and hypotension."
    tags: ["subject:endocrine"]
  - guid: 3dd84788fb9ddb7f
    noteType: Basic
    deck: "Corpus::Endocrine::endocrine"
    fields:
      Front: "What is the usual sequence of hormone loss in progressive pan-hypopituitarism?"
      Back: "Growth Hormone $\\rightarrow$ Prolactin $\\rightarrow$ Gonadotropins $\\rightarrow$ TSH $\\rightarrow$ ACTH."
    tags: ["subject:endocrine"]
  - guid: 207d09e41f6c7077
    noteType: Basic
    deck: "Corpus::Endocrine::endocrine"
    fields:
      Front: "In the management of pan-hypopituitarism, why must Hydrocortisone be replaced before Levothyroxine?"
      Back: "Thyroxine can accelerate cortisol degradation and precipitate an adrenal crisis in an untreated hypo-adrenal patient."
    tags: ["subject:endocrine"]
  - guid: 37ea09e2fc440544
    noteType: Basic
    deck: "Corpus::Endocrine::endocrine"
    fields:
      Front: "What is the hallmark clinical presentation of cranial diabetes insipidus (Arginine Vasopressin Deficiency)?"
      Back: "Polyuria ($4$ to $20\\ L/day$) and polydipsia with dilute urine."
    tags: ["subject:endocrine"]
  - guid: 569e0b8914a5960c
    noteType: Basic
    deck: "Corpus::Endocrine::endocrine"
    fields:
      Front: "How does the Water Deprivation Test distinguish between cranial and nephrogenic diabetes insipidus?"
      Back: "Urine osmolality increases after exogenous desmopressin (DDAVP) in cranial DI, but fails to increase in nephrogenic DI."
    tags: ["subject:endocrine"]
  - guid: a1a2ba7990d6c898
    noteType: Basic
    deck: "Corpus::Endocrine::endocrine"
    fields:
      Front: "What is the primary treatment for Arginine Vasopressin Deficiency (cranial DI)?"
      Back: "Desmopressin (DDAVP)"
    tags: ["subject:endocrine"]
  - guid: 226c807a6e4fbb40
    noteType: Basic
    deck: "Corpus::Endocrine::endocrine"
    fields:
      Front: "SIADH is characterized by what type of hyponatremia?"
      Back: "Euvolemic hyponatremia"
    tags: ["subject:endocrine"]
  - guid: 72b562a896e8bead
    noteType: Basic
    deck: "Corpus::Endocrine::endocrine"
    fields:
      Front: "What is the most dangerous complication of correcting chronic hyponatremia too rapidly?"
      Back: "Central Pontine Myelinolysis"
    tags: ["subject:endocrine"]
  - guid: a81e7e89da169212
    noteType: Basic
    deck: "Corpus::Endocrine::endocrine"
    fields:
      Front: "What is the recommended maximum rate of sodium correction in SIADH over 24 hours?"
      Back: "$12\\ mmol/L$"
    tags: ["subject:endocrine"]
  - guid: 382781bd4e6cb8e9
    noteType: Basic
    deck: "Corpus::Endocrine::endocrine"
    fields:
      Front: "How is the 'corrected calcium' calculated for patients with low albumin?"
      Back: "$Corrected\\ Ca^{2+} = Measured\\ Ca^{2+} + [0.02 \\times (40 - Albumin)]$"
    tags: ["subject:endocrine"]
  - guid: 1d75fdfab85ae490
    noteType: Basic
    deck: "Corpus::Endocrine::endocrine"
    fields:
      Front: "List the classic quartet of symptoms associated with primary hyperparathyroidism."
      Back: "Bones (osteitis fibrosa cystica), Stones (renal calculi), Abdominal groans (constipation/ulcers), and Psychic moans (depression)."
    tags: ["subject:endocrine"]
  - guid: afd17792d9427c17
    noteType: Basic
    deck: "Corpus::Endocrine::endocrine"
    fields:
      Front: "What radiologic appearance of the skull is characteristic of hyperparathyroidism?"
      Back: "Salt and pepper (or pepper pot) appearance."
    tags: ["subject:endocrine"]
  - guid: 9286fff3c6feef3d
    noteType: Basic
    deck: "Corpus::Endocrine::endocrine"
    fields:
      Front: "What is 'osteitis fibrosa cystica'?"
      Back: "Bone cysts and subperiosteal resorption caused by excessive PTH activity."
    tags: ["subject:endocrine"]
  - guid: 05beb5ccadd5eed0
    noteType: Basic
    deck: "Corpus::Endocrine::endocrine"
    fields:
      Front: "Define 'Secondary Hyperparathyroidism'."
      Back: "Compensatory PTH elevation in response to chronic hypocalcemia (e.g., in renal failure or Vitamin D deficiency)."
    tags: ["subject:endocrine"]
  - guid: f3e12c8b898d8df0
    noteType: Basic
    deck: "Corpus::Endocrine::endocrine"
    fields:
      Front: "Define 'Tertiary Hyperparathyroidism'."
      Back: "Autonomous PTH secretion following prolonged secondary hyperparathyroidism, leading to hypercalcemia."
    tags: ["subject:endocrine"]
  - guid: 95e8801dfa0e84c1
    noteType: Basic
    deck: "Corpus::Endocrine::endocrine"
    fields:
      Front: "What imaging study is most specific for localizing a parathyroid adenoma?"
      Back: "Sestamibi scan"
    tags: ["subject:endocrine"]
  - guid: 7f34ed7db648c248
    noteType: Basic
    deck: "Corpus::Endocrine::endocrine"
    fields:
      Front: "What ECG change is typically seen in patients with hypercalcemia?"
      Back: "Shortening of the QT interval."
    tags: ["subject:endocrine"]
  - guid: 165830a617b2ea1c
    noteType: Basic
    deck: "Corpus::Endocrine::endocrine"
    fields:
      Front: "What is 'Chvostek’s sign'?"
      Back: "Tapping the facial nerve induces facial muscle contraction, indicating latent tetany/hypocalcemia."
    tags: ["subject:endocrine"]
  - guid: 944bdd011665e4c6
    noteType: Basic
    deck: "Corpus::Endocrine::endocrine"
    fields:
      Front: "What is 'Trousseau’s sign'?"
      Back: "Inducing carpal spasm by inflating a blood pressure cuff above systolic pressure for three minutes."
    tags: ["subject:endocrine"]
  - guid: f9b92677c4418f5e
    noteType: Basic
    deck: "Corpus::Endocrine::endocrine"
    fields:
      Front: "What is 'Pseudo-hypoparathyroidism'?"
      Back: "A genetic condition characterized by end-organ resistance to PTH, resulting in high PTH levels but low serum calcium."
    tags: ["subject:endocrine"]
  - guid: 4f6901747b260713
    noteType: Basic
    deck: "Corpus::Endocrine::endocrine"
    fields:
      Front: "Which physical finding in the hand is classic for Albright’s hereditary osteodystrophy (Pseudo-hypoparathyroidism)?"
      Back: "A short fourth metacarpal (manifests as a 'missing' knuckle when making a fist)."
    tags: ["subject:endocrine"]
  - guid: 9a15e75dd8bafe6d
    noteType: Basic
    deck: "Corpus::Endocrine::endocrine"
    fields:
      Front: "What ECG change is characteristic of hypocalcemia?"
      Back: "Prolongation of the corrected QT (QTc) interval."
    tags: ["subject:endocrine"]
  - guid: d9970dd843cc5948
    noteType: Basic
    deck: "Corpus::Endocrine::endocrine"
    fields:
      Front: "What is the commonest cause of acquired hypoparathyroidism?"
      Back: "Accidental surgical removal or damage during thyroidectomy."
    tags: ["subject:endocrine"]
  - guid: 64c0319d2d0aa0fd
    noteType: Basic
    deck: "Corpus::Endocrine::endocrine"
    fields:
      Front: "In patients with diabetic neuropathy, what is the 'monofilament' test used to assess?"
      Back: "Pressure perception/touch sensation to identify risk for foot ulceration."
    tags: ["subject:endocrine"]
  - guid: ca6e71a9add58885
    noteType: Basic
    deck: "Corpus::Endocrine::endocrine"
    fields:
      Front: "Which clinical scenario describes 'hyperglycemic crisis' in Type 2 Diabetes?"
      Back: "Hyperosmolar Hyperglycemic State (HHS), previously known as HONK."
    tags: ["subject:endocrine"]
  - guid: 5d6351aa2fe863a7
    noteType: Basic
    deck: "Corpus::Endocrine::endocrine"
    fields:
      Front: "What is the definitive treatment for symptomatic primary hyperparathyroidism?"
      Back: "Surgical removal of the parathyroid adenoma."
    tags: ["subject:endocrine"]
  - guid: 86950e79ca94f27f
    noteType: Basic
    deck: "Corpus::Endocrine::endocrine"
    fields:
      Front: "Which biochemical markers are elevated in the diagnosis of SIADH?"
      Back: "Urine sodium and urine osmolality (in the presence of low serum osmolality)."
    tags: ["subject:endocrine"]
  - guid: cc542f901b62a994
    noteType: Basic
    deck: "Corpus::Endocrine::endocrine"
    fields:
      Front: "A patient with $24$-hour urine albumin of $450\\ mg$ has reached which stage of diabetic nephropathy?"
      Back: "Stage 4 (Established or Overt Nephropathy)."
    tags: ["subject:endocrine"]
  - guid: 14f73405be6c436f
    noteType: Basic
    deck: "Corpus::Endocrine::endocrine"
    fields:
      Front: "Which 'P' of the pheochromocytoma clinical presentation involves intense headache?"
      Back: "Pain"
    tags: ["subject:endocrine"]
  - guid: 49e354b0f2448cf8
    noteType: Basic
    deck: "Corpus::Endocrine::endocrine"
    fields:
      Front: "What is the medical management for 'painful' diabetic neuropathy?"
      Back: "Tricyclic antidepressants (Amitriptyline), anticonvulsants (Gabapentin/Pregabalin), or SNRIs (Duloxetine)."
    tags: ["subject:endocrine"]
