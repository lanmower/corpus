deck: "Corpus::Diabetes::Hypothyroidism"
notes:
  - guid: e0bc9e57de1b9717
    noteType: Basic
    deck: "Corpus::Diabetes::Hypothyroidism"
    fields:
      Front: "What is hypothyroidism?"
      Back: "A clinical syndrome resulting from inadequate tissue exposure to thyroid hormones, characterized by mental and physical lethargy, developing slowly."
    tags: ["definition", "pathophysiology", "subject:diabetes"]
  - guid: f7603379da11a923
    noteType: Basic
    deck: "Corpus::Diabetes::Hypothyroidism"
    fields:
      Front: "What is primary hypothyroidism?"
      Back: "Hypothyroidism due to disease of the thyroid gland itself (most common cause of hypothyroidism)."
    tags: ["classification", "etiology", "subject:diabetes"]
  - guid: 55e1a56318a20c16
    noteType: Basic
    deck: "Corpus::Diabetes::Hypothyroidism"
    fields:
      Front: "What is secondary hypothyroidism?"
      Back: "Hypothyroidism due to disease of the pituitary gland."
    tags: ["classification", "etiology", "subject:diabetes"]
  - guid: 752bbc4440b9cb88
    noteType: Basic
    deck: "Corpus::Diabetes::Hypothyroidism"
    fields:
      Front: "What is tertiary hypothyroidism?"
      Back: "Hypothyroidism due to disease of the hypothalamus."
    tags: ["classification", "etiology", "subject:diabetes"]
  - guid: 80004999fbc2cb2d
    noteType: Basic
    deck: "Corpus::Diabetes::Hypothyroidism"
    fields:
      Front: "Name common causes of primary hypothyroidism related to thyroid disease."
      Back: "Autoimmune thyroiditis, post-infectious thyroiditis, thyroidectomy, radioactive iodine therapy, iodine deficiency or excess, infiltrative diseases, infections (tuberculosis), certain drugs."
    tags: ["etiology", "primary-hypothyroidism", "subject:diabetes"]
  - guid: b239ac71a3aabdd7
    noteType: Basic
    deck: "Corpus::Diabetes::Hypothyroidism"
    fields:
      Front: "What are common causes of secondary and tertiary hypothyroidism?"
      Back: "Pituitary tumors, treatment complications (surgery and radiotherapy), pituitary infections, trauma, certain drugs, genetic disorders."
    tags: ["etiology", "secondary-tertiary", "subject:diabetes"]
  - guid: c80afc965f35c147
    noteType: Basic
    deck: "Corpus::Diabetes::Hypothyroidism"
    fields:
      Front: "List the clinical features of hypothyroidism."
      Back: "Weakness, dry skin, slow speech, peri-orbital puffiness, cold intolerance, macroglossia with obstructive sleep apnea, muscle cramps, deafness, menorrhagia, loss of scalp hair, poor memory, constipation, weight gain, hoarseness, snoring."
    tags: ["clinical-features", "symptoms", "subject:diabetes"]
  - guid: c8c5bd368d5872fd
    noteType: Basic
    deck: "Corpus::Diabetes::Hypothyroidism"
    fields:
      Front: "What physical examination signs are seen in hypothyroidism?"
      Back: "Dry, cool, wrinkled skin; brittle nails; coarse hair; thick tongue; pale appearance; peri-orbital puffiness (myxedema); keratinemia (yellowish discoloration of palms); alopecia; loss of lateral eyebrows."
    tags: ["clinical-features", "physical-signs", "subject:diabetes"]
  - guid: b5ed84e977c596b8
    noteType: Basic
    deck: "Corpus::Diabetes::Hypothyroidism"
    fields:
      Front: "What cardiovascular manifestations are associated with hypothyroidism?"
      Back: "Regular sinus bradycardia, hypertension, narrow pulse pressure, poor cardiac function, heart failure with cardiomyopathy, and rarely pericardial effusion."
    tags: ["cardiovascular", "complications", "subject:diabetes"]
  - guid: f931c1987a02eb32
    noteType: Basic
    deck: "Corpus::Diabetes::Hypothyroidism"
    fields:
      Front: "What neuromuscular signs occur in hypothyroidism?"
      Back: "Dementia with reduced intellectual function, overall weakness, slow coarse speech, carpal tunnel syndrome, delayed tendon reflex relaxation, rarely cerebellar ataxia and nerve deafness."
    tags: ["neuromuscular", "neurologic", "subject:diabetes"]
  - guid: 4c99336487810765
    noteType: Basic
    deck: "Corpus::Diabetes::Hypothyroidism"
    fields:
      Front: "How is hypothyroidism diagnosed?"
      Back: "Measurement of peripheral thyroid hormones (T4, T3), TSH level, measurement of antibodies (especially anti-thyroid peroxidase), and ultrasound. Isotope scan is usually not helpful."
    tags: ["diagnosis", "investigations", "subject:diabetes"]
  - guid: 47328d1819195cb4
    noteType: Basic
    deck: "Corpus::Diabetes::Hypothyroidism"
    fields:
      Front: "What are typical laboratory findings in primary hypothyroidism?"
      Back: "High TSH and low T4. Thyroid peroxidase (TPO) antibodies may be elevated if autoimmune etiology."
    tags: ["diagnosis", "laboratory", "subject:diabetes"]
  - guid: 30a639520171b4a5
    noteType: Basic
    deck: "Corpus::Diabetes::Hypothyroidism"
    fields:
      Front: "What laboratory finding suggests secondary or tertiary hypothyroidism?"
      Back: "Low TSH with low T4 (or occasionally low TSH with high T4, which is rare)."
    tags: ["diagnosis", "laboratory", "subject:diabetes"]
  - guid: 96055536816929ec
    noteType: Basic
    deck: "Corpus::Diabetes::Hypothyroidism"
    fields:
      Front: "What other laboratory abnormalities may occur in hypothyroidism?"
      Back: "Hyponatremia (from SIADH), hypercholesterolemia, anemia (normalcytic, microcytic, or macrocytic), elevated muscle enzymes in severe cases. Glucose metabolism usually unaffected."
    tags: ["laboratory", "complications", "subject:diabetes"]
  - guid: 7ebf845eab94901b
    noteType: Basic
    deck: "Corpus::Diabetes::Hypothyroidism"
    fields:
      Front: "What is the standard treatment for hypothyroidism?"
      Back: "Levothyroxine (T4) replacement therapy. Typically formulated as sodium salt to enhance absorption."
    tags: ["treatment", "management", "subject:diabetes"]
  - guid: e3c14e87bdeffd5e
    noteType: Basic
    deck: "Corpus::Diabetes::Hypothyroidism"
    fields:
      Front: "What is the optimal timing and conditions for levothyroxine absorption?"
      Back: "Absorption is best in the fasting state. Should not be taken with meals or other medications as these interfere with absorption and lead to erratic thyroid hormone levels."
    tags: ["treatment", "pharmacology", "subject:diabetes"]
  - guid: d0202ae6049a0a0d
    noteType: Basic
    deck: "Corpus::Diabetes::Hypothyroidism"
    fields:
      Front: "What diseases interfere with levothyroxine absorption?"
      Back: "H. pylori infection and celiac disease interfere with intestinal absorption of levothyroxine."
    tags: ["treatment", "drug-interactions", "subject:diabetes"]
  - guid: 2882e3651637db42
    noteType: Basic
    deck: "Corpus::Diabetes::Hypothyroidism"
    fields:
      Front: "What is the standard starting dose of levothyroxine?"
      Back: "Typically 50-100 micrograms daily or approximately 1.6 microgram per kilogram per day. Lower doses used in elderly and those with coronary artery disease, then slowly increased based on clinical and laboratory response."
    tags: ["treatment", "dosing", "subject:diabetes"]
  - guid: 10df2c886a2bdb2a
    noteType: Basic
    deck: "Corpus::Diabetes::Hypothyroidism"
    fields:
      Front: "How often should TSH be monitored during initial levothyroxine therapy?"
      Back: "Every 6 to 8 weeks, as this is the time needed for TSH to reach a new steady state."
    tags: ["treatment", "monitoring", "subject:diabetes"]
  - guid: 5b5f6147fda62d7a
    noteType: Basic
    deck: "Corpus::Diabetes::Hypothyroidism"
    fields:
      Front: "What is the goal of levothyroxine treatment?"
      Back: "To normalize TSH and restore patient well-being."
    tags: ["treatment", "goals", "subject:diabetes"]
  - guid: 9d1e2365658cca8c
    noteType: Basic
    deck: "Corpus::Diabetes::Hypothyroidism"
    fields:
      Front: "What is the duration of levothyroxine therapy?"
      Back: "Lifelong treatment. Once on a stable dose, TSH may be checked every 6 to 12 months."
    tags: ["treatment", "duration", "subject:diabetes"]
  - guid: 45e153c1b024ca10
    noteType: Basic
    deck: "Corpus::Diabetes::Hypothyroidism"
    fields:
      Front: "Is combined T4 and T3 therapy beneficial in hypothyroidism?"
      Back: "No, studies show no added benefit to using T3 in patients with usual hypothyroidism. T3 may be used in thyroid hormone resistance syndrome."
    tags: ["treatment", "pharmacology", "subject:diabetes"]
  - guid: e08d7c43cb498237
    noteType: Basic
    deck: "Corpus::Diabetes::Hypothyroidism"
    fields:
      Front: "How is hypothyroidism managed in the setting of pituitary or hypothalamic disease?"
      Back: "TSH cannot be used for monitoring. Instead, T4 and T3 levels are used along with clinical status to guide therapy."
    tags: ["treatment", "secondary-tertiary", "subject:diabetes"]
  - guid: da166d346bf6cb88
    noteType: Basic
    deck: "Corpus::Diabetes::Hypothyroidism"
    fields:
      Front: "What are the special considerations for hypothyroidism treatment in pregnancy?"
      Back: "Higher doses of levothyroxine are usually required. TSH targets are slightly lower in pregnancy due to hCG effects on the TSH receptor. Optimal thyroid replacement is crucial for fetal well-being."
    tags: ["treatment", "pregnancy", "subject:diabetes"]
  - guid: f6114fa2037da114
    noteType: Basic
    deck: "Corpus::Diabetes::Hypothyroidism"
    fields:
      Front: "What is subclinical hypothyroidism?"
      Back: "A condition with elevated TSH but normal T4 and T3 levels, often seen in autoimmune thyroid disease. It represents a continuum toward overt hypothyroidism."
    tags: ["classification", "subclinical", "subject:diabetes"]
  - guid: 9c2960205054c9b5
    noteType: Basic
    deck: "Corpus::Diabetes::Hypothyroidism"
    fields:
      Front: "Should subclinical hypothyroidism be treated?"
      Back: "Treatment is indicated if TSH >10 mIU/L or if there are strongly positive peroxidase antibodies, goiter, high cholesterol, pregnancy, or infertility."
    tags: ["treatment", "subclinical", "subject:diabetes"]
  - guid: ff830115a14c9483
    noteType: Basic
    deck: "Corpus::Diabetes::Hypothyroidism"
    fields:
      Front: "What is myxedema coma?"
      Back: "A severe acute exacerbation of hypothyroidism with altered mental status, hypothermia, and hypotension. It is a medical emergency requiring prompt recognition and treatment."
    tags: ["emergency", "complications", "subject:diabetes"]
  - guid: 5d30f88db6ee329b
    noteType: Basic
    deck: "Corpus::Diabetes::Hypothyroidism"
    fields:
      Front: "What are precipitating factors for myxedema coma?"
      Back: "Myocardial infarction, infection, sedative drugs, surgery, and cold exposure."
    tags: ["emergency", "risk-factors", "subject:diabetes"]
  - guid: 1201603cf8507cba
    noteType: Basic
    deck: "Corpus::Diabetes::Hypothyroidism"
    fields:
      Front: "What are the clinical features of myxedema coma?"
      Back: "Altered mental status, possible psychosis, confusion, hypothermia, hypotension, diminished ventilation, hypoglycemia, and hyponatremia."
    tags: ["emergency", "clinical-features", "subject:diabetes"]
  - guid: 0424f9756ca84c7d
    noteType: Basic
    deck: "Corpus::Diabetes::Hypothyroidism"
    fields:
      Front: "How is myxedema coma managed?"
      Back: "Intensive care admission, IV fluids, calories, rewarming, ventilatory support, IV corticosteroids, and high-dose nasogastric thyroxine."
    tags: ["emergency", "treatment", "subject:diabetes"]
  - guid: 445d0a4ec45e13f9
    noteType: Basic
    deck: "Corpus::Diabetes::Hypothyroidism"
    fields:
      Front: "What is non-thyroidal illness?"
      Back: "A condition where non-thyroidal disease causes abnormal thyroid function tests (low-normal TSH, low-normal T4, low T3). This is an adaptive response that does not require treatment and recovers as the underlying illness resolves."
    tags: ["diagnosis", "euthyroid-sick", "subject:diabetes"]
