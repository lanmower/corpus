    noteType: Basic
    deck: "Corpus::Paediatrics::2025 MANAGEMENT OF SEIZURES"
    fields:
      Front: "List the three main diagnostic tools used in the new seizure classification."
      Back: "Semiology, EEG, and occasionally supplementary information from imaging."
    tags: ["subject:paediatrics", "seizures", "classification-methods", "diagnostics"]
  - guid: j6m2q5r4l3n7o9p8
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 MANAGEMENT OF SEIZURES"
    fields:
      Front: "What additional investigations are used in the classification of epilepsy type and epilepsy syndrome?"
      Back: "Genetics, lab findings, and neuro-imaging findings, while maintaining a major focus on etiology throughout the diagnostic process."
