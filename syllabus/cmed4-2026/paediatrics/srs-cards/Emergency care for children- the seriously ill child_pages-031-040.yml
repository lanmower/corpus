    noteType: "Basic"
    deck: "Corpus::Paediatrics::Emergency care - the seriously ill child"
    fields:
      Front: "Scenario 1: A three-year old girl is in the queue. Airway and breathing OK. Hot but cold hands. Capillary refill 1.5 seconds. Alert. Had diarrhoea (4 loose stools/day). Skin pinch takes 3 seconds. Triage as E/P/Q."
      Back: "P (Priority) - Signs of moderate dehydration (cold hands, abnormal capillary refill, slow skin pinch) warrant priority placement but not emergency treatment."
    tags: ["scenario", "triage", "dehydration", "subject:paediatrics"]

