deck: "Corpus::Gastroenterology::gastroenterology"
notes:
  - guid: e07089762a997d9b
    noteType: Basic
    deck: "Corpus::Gastroenterology::gastroenterology"
    fields:
      Front: "According to the Atlanta classification, how many of the three diagnostic criteria are required for a diagnosis of acute pancreatitis?"
      Back: "Two"
    tags: ["subject:gastroenterology"]
  - guid: 75cbff5ffd2854c5
    noteType: Basic
    deck: "Corpus::Gastroenterology::gastroenterology"
    fields:
      Front: "What are the two broad morphological categories of acute pancreatitis?"
      Back: "Oedematous (mild) and necrotizing (severe)"
    tags: ["subject:gastroenterology"]
  - guid: c4592dd2348b1d36
    noteType: Basic
    deck: "Corpus::Gastroenterology::gastroenterology"
    fields:
      Front: "In adults, what two etiologies account for more than $98\\%$ of all cases of acute pancreatitis?"
      Back: "Gallstones and alcoholism"
    tags: ["subject:gastroenterology"]
  - guid: e51f403e83c76f97
    noteType: Basic
    deck: "Corpus::Gastroenterology::gastroenterology"
    fields:
      Front: "How long does the pain of biliary colic typically last compared to acute pancreatitis?"
      Back: "Biliary colic usually lasts 6 to 8 hours, whereas pancreatitis pain lasts for days."
    tags: ["subject:gastroenterology"]
  - guid: 50c25a53e82798f0
    noteType: Basic
    deck: "Corpus::Gastroenterology::gastroenterology"
    fields:
      Front: "What is the typical timeframe for the onset of alcoholic pancreatitis after the cessation of drinking?"
      Back: "Up to 72 hours"
    tags: ["subject:gastroenterology"]
  - guid: becbf8e710b387e8
    noteType: Basic
    deck: "Corpus::Gastroenterology::gastroenterology"
    fields:
      Front: "What percentage of acute pancreatitis patients experience 'painless' disease?"
      Back: "$5\\%$ to $10\\%$"
    tags: ["subject:gastroenterology"]
  - guid: a01dacafbf4c37a3
    noteType: Basic
    deck: "Corpus::Gastroenterology::gastroenterology"
    fields:
      Front: "Which physical sign is characterized by ecchymotic discoloration in the flank during severe pancreatitis?"
      Back: "Grey Turner's sign"
    tags: ["subject:gastroenterology"]
  - guid: 0c37fb23de034ba7
    noteType: Basic
    deck: "Corpus::Gastroenterology::gastroenterology"
    fields:
      Front: "Which physical sign is characterized by periumbilical ecchymosis in acute pancreatitis?"
      Back: "Cullen's sign"
    tags: ["subject:gastroenterology"]
  - guid: 29e3dd56391ba2ab
    noteType: Basic
    deck: "Corpus::Gastroenterology::gastroenterology"
    fields:
      Front: "Within what timeframe does serum amylase typically rise following the onset of acute pancreatitis?"
      Back: "6 to 12 hours"
    tags: ["subject:gastroenterology"]
  - guid: b892085a06f95b37
    noteType: Basic
    deck: "Corpus::Gastroenterology::gastroenterology"
    fields:
      Front: "What is the approximate half-life of amylase in the blood?"
      Back: "10 hours"
    tags: ["subject:gastroenterology"]
  - guid: 33f745e2c6aa778a
    noteType: Basic
    deck: "Corpus::Gastroenterology::gastroenterology"
    fields:
      Front: "What level of serum amylase increase is generally considered suggestive of pancreatic injury?"
      Back: "More than 3 times the upper limit of normal"
    tags: ["subject:gastroenterology"]
  - guid: 185db023842d1d39
    noteType: Basic
    deck: "Corpus::Gastroenterology::gastroenterology"
    fields:
      Front: "How does the diagnostic accuracy of serum lipase compare to serum amylase in acute pancreatitis?"
      Back: "Lipase is more specific and accurate on both day 1 and day 3."
    tags: ["subject:gastroenterology"]
  - guid: 0f138be51f6f4898
    noteType: Basic
    deck: "Corpus::Gastroenterology::gastroenterology"
    fields:
      Front: "What C-reactive protein (CRP) threshold at 48 hours discriminates severe from mild acute pancreatitis?"
      Back: "More than 150 mg/dL"
    tags: ["subject:gastroenterology"]
  - guid: a27280fd1654210b
    noteType: Basic
    deck: "Corpus::Gastroenterology::gastroenterology"
    fields:
      Front: "What radiological sign describes a localized ileus of a small intestine segment seen in acute pancreatitis?"
      Back: "Sentinel loop"
    tags: ["subject:gastroenterology"]
  - guid: 09c317c969617211
    noteType: Basic
    deck: "Corpus::Gastroenterology::gastroenterology"
    fields:
      Front: "What is the most important radiological test for diagnosing acute pancreatitis and its complications?"
      Back: "CT Angiography (CTA) of the pancreas"
    tags: ["subject:gastroenterology"]
  - guid: 7050fd48dbcdb2bd
    noteType: Basic
    deck: "Corpus::Gastroenterology::gastroenterology"
    fields:
      Front: "Why is it mandatory to plan a cholecystectomy for patients with acute gallstone pancreatitis upon discharge?"
      Back: "To prevent recurrent attacks, which occur in up to $50\\%$ of patients if the gallbladder is not removed."
    tags: ["subject:gastroenterology"]
  - guid: 7cdc921313122c48
    noteType: Basic
    deck: "Corpus::Gastroenterology::gastroenterology"
    fields:
      Front: "The _____ prognostic criteria use parameters at admission and 48 hours to predict 28-day mortality in pancreatitis."
      Back: "Ranson"
    tags: ["subject:gastroenterology"]
  - guid: c26c374332de9862
    noteType: Basic
    deck: "Corpus::Gastroenterology::gastroenterology"
    fields:
      Front: "What defines a pancreatic pseudocyst?"
      Back: "A localized collection of amylase-rich fluid."
    tags: ["subject:gastroenterology"]
  - guid: 87af80751ef702b8
    noteType: Basic
    deck: "Corpus::Gastroenterology::gastroenterology"
    fields:
      Front: "When is surgical or percutaneous drainage indicated for a pancreatic pseudocyst?"
      Back: "Only if complications occur (e.g., infection, rupture, hemorrhage, or pressure effects)."
    tags: ["subject:gastroenterology"]
  - guid: ade6fe9bbe76c230
    noteType: Basic
    deck: "Corpus::Gastroenterology::gastroenterology"
    fields:
      Front: "What is the reported mortality rate for severe necrotizing pancreatitis?"
      Back: "Close to $85\\%$"
    tags: ["subject:gastroenterology"]
  - guid: 6d6a09515a22c275
    noteType: Basic
    deck: "Corpus::Gastroenterology::gastroenterology"
    fields:
      Front: "What is the stool volume threshold used to define diarrhea?"
      Back: "More than 200 mL per day"
    tags: ["subject:gastroenterology"]
  - guid: 2e10ca7ea79a9601
    noteType: Basic
    deck: "Corpus::Gastroenterology::gastroenterology"
    fields:
      Front: "Diarrhea is classified as chronic when symptoms persist for more than _____ days."
      Back: "30"
    tags: ["subject:gastroenterology"]
  - guid: 7447949982488d41
    noteType: Basic
    deck: "Corpus::Gastroenterology::gastroenterology"
    fields:
      Front: "What percentage of acute diarrhea cases are infectious in origin?"
      Back: "$90\\%$"
    tags: ["subject:gastroenterology"]
  - guid: 6be02e007d297e4c
    noteType: Basic
    deck: "Corpus::Gastroenterology::gastroenterology"
    fields:
      Front: "Which part of the bowel is likely involved if a patient presents with large-volume watery diarrhea and bloating?"
      Back: "Small bowel"
    tags: ["subject:gastroenterology"]
  - guid: ff1fd188a1df7064
    noteType: Basic
    deck: "Corpus::Gastroenterology::gastroenterology"
    fields:
      Front: "Which part of the bowel is likely involved if a patient presents with frequent small-volume stools and painful defecation?"
      Back: "Large bowel"
    tags: ["subject:gastroenterology"]
  - guid: 237b98b012f5acc0
    noteType: Basic
    deck: "Corpus::Gastroenterology::gastroenterology"
    fields:
      Front: "Why are antidiarrheals like loperamide contraindicated in acute infectious diarrhea?"
      Back: "High risk of causing toxic megacolon"
    tags: ["subject:gastroenterology"]
  - guid: e7976db058b0ddc3
    noteType: Basic
    deck: "Corpus::Gastroenterology::gastroenterology"
    fields:
      Front: "How does osmotic diarrhea respond to fasting compared to secretory diarrhea?"
      Back: "Osmotic diarrhea ceases with fasting, while secretory diarrhea persists."
    tags: ["subject:gastroenterology"]
  - guid: 2f7eed27c0ff24ae
    noteType: Basic
    deck: "Corpus::Gastroenterology::gastroenterology"
    fields:
      Front: "What is the formula for calculating the fecal osmolar gap?"
      Back: "$290 - 2 \\times (\\text{fecal } Na^{+} + \\text{fecal } K^{+})$"
    tags: ["subject:gastroenterology"]
  - guid: 4429e7acaa1ce27e
    noteType: Basic
    deck: "Corpus::Gastroenterology::gastroenterology"
    fields:
      Front: "An osmolar gap of more than _____ mOsm/L is characteristic of osmotic diarrhea."
      Back: "100"
    tags: ["subject:gastroenterology"]
  - guid: 19234ec6dbf6e07c
    noteType: Basic
    deck: "Corpus::Gastroenterology::gastroenterology"
    fields:
      Front: "A fecal osmolar gap of less than _____ mOsm/L is characteristic of secretory diarrhea."
      Back: "50"
    tags: ["subject:gastroenterology"]
  - guid: f5f461253c9ef602
    noteType: Basic
    deck: "Corpus::Gastroenterology::gastroenterology"
    fields:
      Front: "Which pancreatic function test result is considered diagnostic for steatorrhea?"
      Back: "Fecal elastase less than 50 $\\mu$g/g"
    tags: ["subject:gastroenterology"]
  - guid: 4c63cb6ddc3083c0
    noteType: Basic
    deck: "Corpus::Gastroenterology::gastroenterology"
    fields:
      Front: "What is the gold standard test for fat malabsorption, despite being rarely used clinically?"
      Back: "72-hour fecal fat collection (more than 100g on Western diet)"
    tags: ["subject:gastroenterology"]
  - guid: dc83ae8dfc590b54
    noteType: Basic
    deck: "Corpus::Gastroenterology::gastroenterology"
    fields:
      Front: "Which inflammatory markers in the stool are used to screen for conditions like IBD?"
      Back: "Calprotectin or Lactoferrin"
    tags: ["subject:gastroenterology"]
  - guid: d0036a687711ce59
    noteType: Basic
    deck: "Corpus::Gastroenterology::gastroenterology"
    fields:
      Front: "How does hyperthyroidism affect bowel motility?"
      Back: "It causes accelerated gastrointestinal transit, leading to diarrhea."
    tags: ["subject:gastroenterology"]
  - guid: dcd5263ef583ec69
    noteType: Basic
    deck: "Corpus::Gastroenterology::gastroenterology"
    fields:
      Front: "What defines functional diarrhea according to the provided material?"
      Back: "Recurrent passage of loose stools without abdominal pain or an organic cause."
    tags: ["subject:gastroenterology"]
  - guid: 99d106caa640699c
    noteType: Basic
    deck: "Corpus::Gastroenterology::gastroenterology"
    fields:
      Front: "In HIV patients, what CD4 count threshold is associated with opportunistic diarrheal infections like CMV or Microsporidia?"
      Back: "Less than 200 cells/mm³"
    tags: ["subject:gastroenterology"]
  - guid: bcb5972ad1f52ac8
    noteType: Basic
    deck: "Corpus::Gastroenterology::gastroenterology"
    fields:
      Front: "What is the most common cause of ascites, accounting for $75\\%$ to $80\\%$ of cases?"
      Back: "Portal hypertension related to liver cirrhosis"
    tags: ["subject:gastroenterology"]
  - guid: adc87169a0a1e759
    noteType: Basic
    deck: "Corpus::Gastroenterology::gastroenterology"
    fields:
      Front: "What are the '6 Fs' of abdominal swelling?"
      Back: "Fluid, Fat, Flatus, Fetus, Feces, and Fatal growth"
    tags: ["subject:gastroenterology"]
  - guid: 8b99febd125b252b
    noteType: Basic
    deck: "Corpus::Gastroenterology::gastroenterology"
    fields:
      Front: "What defines Grade 1 ascites?"
      Back: "Fluid detectable only by ultrasound examination."
    tags: ["subject:gastroenterology"]
  - guid: a88b52e90bff20b3
    noteType: Basic
    deck: "Corpus::Gastroenterology::gastroenterology"
    fields:
      Front: "What defines refractory ascites?"
      Back: "Ascites that does not disappear despite satisfactory medical treatment and large volume paracentesis."
    tags: ["subject:gastroenterology"]
  - guid: 672e4b0e0332988e
    noteType: Basic
    deck: "Corpus::Gastroenterology::gastroenterology"
    fields:
      Front: "What is 'hepatic hydrothorax'?"
      Back: "A complication where ascitic fluid moves into the pleural space, usually on the right side."
    tags: ["subject:gastroenterology"]
  - guid: 1db6321b0cf70afe
    noteType: Basic
    deck: "Corpus::Gastroenterology::gastroenterology"
    fields:
      Front: "What is the formula for the Serum-Ascites Albumin Gradient (SAAG)?"
      Back: "Serum Albumin - Ascites Albumin"
    tags: ["subject:gastroenterology"]
  - guid: 36b564968058b2e9
    noteType: Basic
    deck: "Corpus::Gastroenterology::gastroenterology"
    fields:
      Front: "A SAAG value $\\ge 11$ g/L (or 1.1 g/dL) indicates that the ascites is caused by _____."
      Back: "Portal hypertension"
    tags: ["subject:gastroenterology"]
  - guid: 9646c1f3654bbd3d
    noteType: Basic
    deck: "Corpus::Gastroenterology::gastroenterology"
    fields:
      Front: "List three causes of low-gradient ascites (SAAG < 11 g/L)."
      Back: "TB, Nephrotic syndrome, and Peritoneal metastases"
    tags: ["subject:gastroenterology"]
  - guid: e09410929d97b3ae
    noteType: Basic
    deck: "Corpus::Gastroenterology::gastroenterology"
    fields:
      Front: "What macroscopic appearance of ascitic fluid suggests chylous ascites?"
      Back: "Milky fluid"
    tags: ["subject:gastroenterology"]
  - guid: 491f5b5ac0ee70eb
    noteType: Basic
    deck: "Corpus::Gastroenterology::gastroenterology"
    fields:
      Front: "What neutrophil count in ascitic fluid is diagnostic for Spontaneous Bacterial Peritonitis (SBP)?"
      Back: "Greater than 250 cells/mm³"
    tags: ["subject:gastroenterology"]
  - guid: 6d44d819b955109f
    noteType: Basic
    deck: "Corpus::Gastroenterology::gastroenterology"
    fields:
      Front: "What is the primary vasodilator mediator involved in the development of ascites in cirrhosis?"
      Back: "Nitric oxide"
    tags: ["subject:gastroenterology"]
  - guid: 5ec388e1b20c47d1
    noteType: Basic
    deck: "Corpus::Gastroenterology::gastroenterology"
    fields:
      Front: "What is the recommended daily sodium restriction for patients with portal hypertensive ascites?"
      Back: "2 grams per day"
    tags: ["subject:gastroenterology"]
  - guid: 64a81822304b4332
    noteType: Basic
    deck: "Corpus::Gastroenterology::gastroenterology"
    fields:
      Front: "Which diuretic is the first-line therapy for cirrhotic ascites because it targets the RAAS system?"
      Back: "Spironolactone"
    tags: ["subject:gastroenterology"]
  - guid: 028bb0d865a825cb
    noteType: Basic
    deck: "Corpus::Gastroenterology::gastroenterology"
    fields:
      Front: "What is the maximum daily dose for Spironolactone in the treatment of ascites?"
      Back: "400 mg"
    tags: ["subject:gastroenterology"]
  - guid: afa33928510b8940
    noteType: Basic
    deck: "Corpus::Gastroenterology::gastroenterology"
    fields:
      Front: "When performing large-volume paracentesis, how much albumin should be replaced per liter of fluid drained?"
      Back: "8 grams per liter (for drains > 5 liters)"
    tags: ["subject:gastroenterology"]
  - guid: 04ce54d58325269c
    noteType: Basic
    deck: "Corpus::Gastroenterology::gastroenterology"
    fields:
      Front: "What does the 'TIPS' procedure stand for in the context of refractory ascites?"
      Back: "Transjugular Intrahepatic Portosystemic Shunt"
    tags: ["subject:gastroenterology"]
  - guid: 4b8ceda6020b54b6
    noteType: Basic
    deck: "Corpus::Gastroenterology::gastroenterology"
    fields:
      Front: "How does chronic pancreatitis differ from acute pancreatitis regarding pancreatic enzyme levels?"
      Back: "Amylase and lipase are usually normal in chronic pancreatitis but elevated in acute pancreatitis."
    tags: ["subject:gastroenterology"]
  - guid: 1d9a887ab24d9455
    noteType: Basic
    deck: "Corpus::Gastroenterology::gastroenterology"
    fields:
      Front: "What percentage of pancreatic function must be lost before clinically significant malabsorption occurs?"
      Back: "More than $90\\%$"
    tags: ["subject:gastroenterology"]
  - guid: f38910199e2a2ee9
    noteType: Basic
    deck: "Corpus::Gastroenterology::gastroenterology"
    fields:
      Front: "What is the classic diagnostic triad for advanced chronic pancreatitis?"
      Back: "Pancreatic calcifications, steatorrhea, and diabetes mellitus"
    tags: ["subject:gastroenterology"]
  - guid: 114bdac6012d6664
    noteType: Basic
    deck: "Corpus::Gastroenterology::gastroenterology"
    fields:
      Front: "Which vitamin deficiencies are common in chronic pancreatitis due to fat malabsorption?"
      Back: "Vitamins A, D, E, K, and B12"
    tags: ["subject:gastroenterology"]
  - guid: cc166ba4712eb8d1
    noteType: Basic
    deck: "Corpus::Gastroenterology::gastroenterology"
    fields:
      Front: "What is the primary histological definition of cirrhosis?"
      Back: "Disordered architecture, fibrosis, and regenerative nodules"
    tags: ["subject:gastroenterology"]
  - guid: f098cc19ca6e73dd
    noteType: Basic
    deck: "Corpus::Gastroenterology::gastroenterology"
    fields:
      Front: "What is the new overarching term for fatty liver disease as of 2023?"
      Back: "Steatotic Liver Disease (SLD)"
    tags: ["subject:gastroenterology"]
  - guid: 175a10cdd65bb961
    noteType: Basic
    deck: "Corpus::Gastroenterology::gastroenterology"
    fields:
      Front: "How does Schistosomiasis cause portal hypertension differently than cirrhosis?"
      Back: "It causes peri-portal fibrosis but preserves synthetic liver function (normal INR/Albumin)."
    tags: ["subject:gastroenterology"]
  - guid: 968ff73bea6632ba
    noteType: Basic
    deck: "Corpus::Gastroenterology::gastroenterology"
    fields:
      Front: "What is 'Caput Medusae'?"
      Back: "Distended veins radiating from the umbilicus, a sign of portal hypertension."
    tags: ["subject:gastroenterology"]
  - guid: aa1e0509345ffee0
    noteType: Basic
    deck: "Corpus::Gastroenterology::gastroenterology"
    fields:
      Front: "Which non-selective beta-blocker is now preferred over propranolol for preventing variceal bleeding?"
      Back: "Carvedilol"
    tags: ["subject:gastroenterology"]
  - guid: f8631640972b4fd8
    noteType: Basic
    deck: "Corpus::Gastroenterology::gastroenterology"
    fields:
      Front: "Why is it important to check blood glucose in a cirrhotic patient with encephalopathy?"
      Back: "Cirrhotic patients are prone to severe hypoglycemia."
    tags: ["subject:gastroenterology"]
  - guid: 7942a5d59f0c4b4e
    noteType: Basic
    deck: "Corpus::Gastroenterology::gastroenterology"
    fields:
      Front: "Which virus is directly oncogenic and can cause Hepatocellular Carcinoma (HCC) even in the absence of cirrhosis?"
      Back: "Hepatitis B"
    tags: ["subject:gastroenterology"]
  - guid: df4ecad0cf66214e
    noteType: Basic
    deck: "Corpus::Gastroenterology::gastroenterology"
    fields:
      Front: "According to the Montreal definition, when does GERD shift from a physiological process to a disease?"
      Back: "When the reflux of gastric contents causes 'troublesome' symptoms or complications."
    tags: ["subject:gastroenterology"]
  - guid: 26e3a6942245dc1b
    noteType: Basic
    deck: "Corpus::Gastroenterology::gastroenterology"
    fields:
      Front: "What histological change defines Barrett's Esophagus?"
      Back: "Metaplasia from normal squamous epithelium to columnar-type epithelium."
    tags: ["subject:gastroenterology"]
  - guid: 3538040459f93032
    noteType: Basic
    deck: "Corpus::Gastroenterology::gastroenterology"
    fields:
      Front: "What type of cancer does Barrett's Esophagus predispose a patient to?"
      Back: "Oesophageal adenocarcinoma"
    tags: ["subject:gastroenterology"]
  - guid: 6970f73d00ab74c1
    noteType: Basic
    deck: "Corpus::Gastroenterology::gastroenterology"
    fields:
      Front: "When should a PPI be taken for maximum effectiveness in GERD?"
      Back: "30 to 60 minutes before the first meal of the day"
    tags: ["subject:gastroenterology"]
  - guid: f566bb59296b8427
    noteType: Basic
    deck: "Corpus::Gastroenterology::gastroenterology"
    fields:
      Front: "List four 'alarm symptoms' that warrant urgent endoscopy in suspected GERD."
      Back: "Dysphagia, unintentional weight loss, GI bleeding/anemia, and age > 45 years"
    tags: ["subject:gastroenterology"]
  - guid: aa9f88e1e23b9c50
    noteType: Basic
    deck: "Corpus::Gastroenterology::gastroenterology"
    fields:
      Front: "What is the 'Gold Standard' for confirming acid reflux when endoscopy is normal?"
      Back: "Esophageal 24-hour pH studies"
    tags: ["subject:gastroenterology"]
  - guid: 40310a814dcf0cfa
    noteType: Basic
    deck: "Corpus::Gastroenterology::gastroenterology"
    fields:
      Front: "What is the surgical gold standard for correcting the pathophysiology of GERD?"
      Back: "$360^{\\circ}$ Nissen Fundoplication"
    tags: ["subject:gastroenterology"]
  - guid: fb5bf58437af100f
    noteType: Basic
    deck: "Corpus::Gastroenterology::gastroenterology"
    fields:
      Front: "What anatomical landmark must a peptic ulcer extend into to be distinguished from a superficial erosion?"
      Back: "Muscularis propria"
    tags: ["subject:gastroenterology"]
  - guid: 72ad349b5281094f
    noteType: Basic
    deck: "Corpus::Gastroenterology::gastroenterology"
    fields:
      Front: "Which bacterial enzyme allows H. pylori to survive in the acidic stomach by creating an alkaline microenvironment?"
      Back: "Urease"
    tags: ["subject:gastroenterology"]
  - guid: f21d4b2c48fc67cc
    noteType: Basic
    deck: "Corpus::Gastroenterology::gastroenterology"
    fields:
      Front: "Why should gastric ulcers always be biopsied, unlike duodenal ulcers?"
      Back: "To rule out gastric malignancy (adenocarcinoma)."
    tags: ["subject:gastroenterology"]
  - guid: 509a2845fa07c84c
    noteType: Basic
    deck: "Corpus::Gastroenterology::gastroenterology"
    fields:
      Front: "In the context of bleeding ulcers, what does a 'visible vessel' signify on endoscopy?"
      Back: "A high-risk lesion with a high probability of re-bleeding."
    tags: ["subject:gastroenterology"]
  - guid: 62573fffee91e060
    noteType: Basic
    deck: "Corpus::Gastroenterology::gastroenterology"
    fields:
      Front: "What is the standard first-line treatment duration for H. pylori eradication?"
      Back: "14 days"
    tags: ["subject:gastroenterology"]
  - guid: cceaf52d1afe516d
    noteType: Basic
    deck: "Corpus::Gastroenterology::gastroenterology"
    fields:
      Front: "Jaundice is clinically apparent when serum bilirubin levels exceed _____ $\\mu$mol/L."
      Back: "35-40"
    tags: ["subject:gastroenterology"]
  - guid: ae435b773af01ee6
    noteType: Basic
    deck: "Corpus::Gastroenterology::gastroenterology"
    fields:
      Front: "What condition is characterized by a benign deficiency in bilirubin transport, often manifesting as mild jaundice during stress?"
      Back: "Gilbert's (Jailbears) syndrome"
    tags: ["subject:gastroenterology"]
  - guid: 7802d408677b25cf
    noteType: Basic
    deck: "Corpus::Gastroenterology::gastroenterology"
    fields:
      Front: "What is the 'R-value' in the context of liver function tests?"
      Back: "A formula used to classify liver injury as hepatitic, cholestatic, or mixed."
    tags: ["subject:gastroenterology"]
  - guid: ff3d61b053e59afd
    noteType: Basic
    deck: "Corpus::Gastroenterology::gastroenterology"
    fields:
      Front: "Which imaging modality is the initial step for visualizing biliary dilatation in a jaundiced patient?"
      Back: "Transabdominal ultrasound"
    tags: ["subject:gastroenterology"]
  - guid: cfaa55e78bde4c57
    noteType: Basic
    deck: "Corpus::Gastroenterology::gastroenterology"
    fields:
      Front: "What is the classic 'onion skin' fibrosis on histology indicative of?"
      Back: "Primary Sclerosing Cholangitis (PSC)"
    tags: ["subject:gastroenterology"]
  - guid: 79f536a395bf64c5
    noteType: Basic
    deck: "Corpus::Gastroenterology::gastroenterology"
    fields:
      Front: "Name the genetic disorder caused by copper overload in the liver and brain."
      Back: "Wilson's disease"
    tags: ["subject:gastroenterology"]
  - guid: cfe777aa24ce99fb
    noteType: Basic
    deck: "Corpus::Gastroenterology::gastroenterology"
    fields:
      Front: "What is the diagnostic value of a 'flapping tremor' (asterixis) in a jaundiced patient?"
      Back: "It indicates Hepatic Encephalopathy (liver failure)."
    tags: ["subject:gastroenterology"]
