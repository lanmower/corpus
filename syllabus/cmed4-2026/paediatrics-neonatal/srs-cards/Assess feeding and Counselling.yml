deck: "Corpus::Paediatrics-Neonatal::Assess feeding and Counselling"
notes:
  - guid: "ask-breastfeed-101"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Assess feeding and Counselling"
    fields:
      Front: "What are the four key questions to ask during first assessment of a breastfed baby?"
      Back: "1. How is breastfeeding going?\n2. Number of feeds in 24 hours?\n3. Other supplemental feeds?\n4. Has baby fed in last hour?"
    tags: ["history-taking", "breastfeeding", "assessment", "subject:paediatrics-neonatal"]
  - guid: "normal-weight-loss1"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Assess feeding and Counselling"
    fields:
      Front: "What is the normal weight loss range after birth in a newborn?"
      Back: "Less than 10% weight loss after birth is normal"
    tags: ["weight-gain", "normal-growth", "subject:paediatrics-neonatal"]
  - guid: "normal-weight-gainn"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Assess feeding and Counselling"
    fields:
      Front: "What is the minimum expected weight gain per day in a newborn?"
      Back: "At least 10 g/kg/day"
    tags: ["weight-gain", "normal-growth", "subject:paediatrics-neonatal"]
  - guid: "assess-feeding-look"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Assess feeding and Counselling"
    fields:
      Front: "Name the four components of LOOK, LISTEN, FEEL assessment for feeding problems"
      Back: "1. Attachment\n2. Positioning\n3. Sucking\n4. Problems (e.g. blocked nose, oral thrush, mouth ulcers)"
    tags: ["clinical-assessment", "feeding-problems", "subject:paediatrics-neonatal"]
  - guid: "correct-latch-signs"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Assess feeding and Counselling"
    fields:
      Front: "What are the two signs of correct infant latch-on position?"
      Back: "1. Mouth covers areola\n2. Lips are flanged out"
    tags: ["latch", "breastfeeding-technique", "subject:paediatrics-neonatal"]
  - guid: "breastfeeding-holds-4"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Assess feeding and Counselling"
    fields:
      Front: "Name the four correct positions for breastfeeding"
      Back: "1. Cradle hold\n2. Cross-cradle hold\n3. Football hold\n4. Side-lying position"
    tags: ["positioning", "breastfeeding-technique", "subject:paediatrics-neonatal"]
  - guid: "danger-signs-feeding"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Assess feeding and Counselling"
    fields:
      Front: "List the three danger signs indicating a baby is NOT ABLE TO FEED"
      Back: "1. Not feeding\n2. Not attaching\n3. Not sucking"
    tags: ["danger-signs", "red-flags", "subject:paediatrics-neonatal"]
  - guid: "not-feeding-infect"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Assess feeding and Counselling"
    fields:
      Front: "What is the immediate management for a baby with danger signs for feeding in the context of infection?"
      Back: "Investigate and treat for INFECTION"
    tags: ["management", "infection", "subject:paediatrics-neonatal"]
  - guid: "not-feeding-enceph"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Assess feeding and Counselling"
    fields:
      Front: "For a baby <3 days old with danger signs for feeding and no risk factors for infection, what condition should be treated?"
      Back: "ENCEPHALOPATHY"
    tags: ["management", "asphyxia", "subject:paediatrics-neonatal"]
  - guid: "dr-red-mnemonic"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Assess feeding and Counselling"
    fields:
      Front: "What does the DR RED mnemonic stand for?"
      Back: "O - Observations\nO - Oxygen\nS - Sugar\nH - HypoThermia\nI - Infection"
    tags: ["mnemonic", "red-flags", "subject:paediatrics-neonatal"]
  - guid: "feeding-problem-mgmt"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Assess feeding and Counselling"
    fields:
      Front: "List the four management steps for a baby with a feeding problem due to incorrect latch-on"
      Back: "1. Position (correct)\n2. Assess for breast problems\n3. Feed on demand or 8 times a day\n4. Counsel on exclusive breastfeeding"
    tags: ["management", "feeding-problems", "breastfeeding", "subject:paediatrics-neonatal"]
  - guid: "poor-growth-manage"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Assess feeding and Counselling"
    fields:
      Front: "What are the three management steps for poor weight gain/poor growth in a breastfed baby?"
      Back: "1. Encourage exclusive breastfeeding on demand\n2. Exclude sepsis (note: check for UTI)\n3. Keep warm"
    tags: ["management", "poor-growth", "subject:paediatrics-neonatal"]
  - guid: "good-growth-breastf"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Assess feeding and Counselling"
    fields:
      Front: "What is the management for a breastfed baby with good weight gain?"
      Back: "Encourage mom to breastfeed on demand"
    tags: ["management", "normal-growth", "subject:paediatrics-neonatal"]
  - guid: "replacement-feeding"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Assess feeding and Counselling"
    fields:
      Front: "When is replacement feeding advised in HIV-positive mothers?"
      Back: "Only if the mother is HIV-positive AND requests replacement feeds"
    tags: ["hiv", "feeding-options", "subject:paediatrics-neonatal"]
  - guid: "afass-criteria-5"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Assess feeding and Counselling"
    fields:
      Front: "What does AFASS stand for in the context of replacement feeding?"
      Back: "A - Accessible\nF - Feasible\nA - Affordable\nS - Safe\nS - Sustainable"
    tags: ["criteria", "hiv", "replacement-feeding", "subject:paediatrics-neonatal"]
  - guid: "hiv-transmission-rate"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Assess feeding and Counselling"
    fields:
      Front: "What is the transmission rate of HIV through breastfeeding?"
      Back: "5–15% depending on multiple factors"
    tags: ["hiv", "transmission", "subject:paediatrics-neonatal"]
  - guid: "hiv-factors-transmit"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Assess feeding and Counselling"
    fields:
      Front: "List the six factors affecting HIV transmission rate in breastfeeding"
      Back: "1. Mother's viral load\n2. Recent new HIV infection\n3. Length of breastfeeding\n4. Condition of breasts\n5. Condition of baby's mouth\n6. Exclusive or mixed feeding"
    tags: ["hiv", "transmission", "subject:paediatrics-neonatal"]
  - guid: "hiv-reduce-transmit1"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Assess feeding and Counselling"
    fields:
      Front: "When should HAART be initiated in an HIV-positive breastfeeding mother?"
      Back: "If CD4 is <350 (reduces transmission rate to 1–2%)"
    tags: ["hiv", "haart", "subject:paediatrics-neonatal"]
  - guid: "hiv-reduce-transmit2"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Assess feeding and Counselling"
    fields:
      Front: "What ARV should be given to a baby whose HIV-positive mother is breastfeeding?"
      Back: "ARV to baby for the entire duration of breastfeeding"
    tags: ["hiv", "arv-prophylaxis", "subject:paediatrics-neonatal"]
  - guid: "hiv-reduce-transmit3"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Assess feeding and Counselling"
    fields:
      Front: "How long should an HIV-positive mother breastfeed exclusively to reduce transmission?"
      Back: "Exclusively for 6 months"
    tags: ["hiv", "breastfeeding-duration", "subject:paediatrics-neonatal"]
  - guid: "hiv-reduce-transmit4"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Assess feeding and Counselling"
    fields:
      Front: "What is the recommended milk handling method for HIV-positive mothers to reduce transmission?"
      Back: "Expressing and heat treating all breast milk"
    tags: ["hiv", "milk-handling", "subject:paediatrics-neonatal"]
  - guid: "replacement-milk-risk"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Assess feeding and Counselling"
    fields:
      Front: "What is the main infectious risk of replacement milk compared to breast milk?"
      Back: "No risk of HIV transmission"
    tags: ["replacement-feeding", "hiv", "subject:paediatrics-neonatal"]
  - guid: "replacement-milk-diar"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Assess feeding and Counselling"
    fields:
      Front: "What gastrointestinal complications occur with replacement milk feeding?"
      Back: "1. Increased frequency and severity of diarrhoea and respiratory infections\n2. Increased risk of persistent diarrhoea\n3. Increased risk of malnutrition"
    tags: ["replacement-feeding", "complications", "subject:paediatrics-neonatal"]
  - guid: "assess-replacement-q"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Assess feeding and Counselling"
    fields:
      Front: "Name the six key questions to ask when assessing feeding in babies receiving replacement milk"
      Back: "1. How is feeding going?\n2. How many feeds given during day and night?\n3. How are you preparing milk?\n4. Are you giving any breast milk?\n5. How is the milk given?\n6. How are the bottles/utensils washed and cleaned?"
    tags: ["history-taking", "replacement-feeding", "subject:paediatrics-neonatal"]
  - guid: "replacement-assess-l"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Assess feeding and Counselling"
    fields:
      Front: "What two main things should be assessed in LOOK, LISTEN, FEEL for replacement-fed babies?"
      Back: "1. Assess for possible feeding problem (thrush/mouth ulcers, blocked nose)\n2. Assess for weight growth"
    tags: ["clinical-assessment", "replacement-feeding", "subject:paediatrics-neonatal"]
  - guid: "replacement-danger-si"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Assess feeding and Counselling"
    fields:
      Front: "What is the danger sign for a replacement-fed baby that requires immediate action?"
      Back: "NOT ABLE TO SUCK/FEED"
    tags: ["danger-signs", "replacement-feeding", "subject:paediatrics-neonatal"]
  - guid: "replacement-danger-ac"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Assess feeding and Counselling"
    fields:
      Front: "For a replacement-fed baby <3 days old who cannot feed and has no risk of infection, what should be treated?"
      Back: "Treat as asphyxia"
    tags: ["management", "asphyxia", "subject:paediatrics-neonatal"]
  - guid: "feeding-problem-repla"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Assess feeding and Counselling"
    fields:
      Front: "List five causes of feeding problems in replacement-fed babies"
      Back: "1. Milk incorrectly or unhygienically prepared\n2. Inappropriate replacement milk\n3. Insufficient amounts of milk\n4. Mixing breast and replacement milk\n5. Thrush"
    tags: ["feeding-problems", "replacement-feeding", "subject:paediatrics-neonatal"]
  - guid: "poor-growth-replacement"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Assess feeding and Counselling"
    fields:
      Front: "List four management steps for poor weight gain in a replacement-fed baby"
      Back: "1. Check volumes\n2. Feed correctly prepared\n3. Check for infection\n4. KMC (Kangaroo Mother Care)"
    tags: ["management", "poor-growth", "subject:paediatrics-neonatal"]
  - guid: "good-growth-replacement"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Assess feeding and Counselling"
    fields:
      Front: "What is the management for good weight gain in a replacement-fed baby?"
      Back: "Encourage mom to continue feeding"
    tags: ["management", "normal-growth", "subject:paediatrics-neonatal"]
  - guid: "lbw-assess-weight-3"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Assess feeding and Counselling"
    fields:
      Front: "List three components of weight assessment in LBW (low birth weight) babies"
      Back: "1. Weigh daily and record weight\n2. Plot daily weight on graph\n3. Calculate daily/weekly weight gain"
    tags: ["lbw", "weight-gain", "subject:paediatrics-neonatal"]
  - guid: "expected-weight-loss"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Assess feeding and Counselling"
    fields:
      Front: "What is the expected weight loss in the first week of life?"
      Back: "Up to 10% of birth weight"
    tags: ["weight-loss", "normal-growth", "subject:paediatrics-neonatal"]
  - guid: "regain-birth-weight"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Assess feeding and Counselling"
    fields:
      Front: "By when should a newborn regain its birth weight after initial loss?"
      Back: "In 7–14 days (i.e. back to birth weight)"
    tags: ["weight-gain", "normal-growth", "subject:paediatrics-neonatal"]
  - guid: "min-weight-gain-pret"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Assess feeding and Counselling"
    fields:
      Front: "What is the minimum expected weight gain per day in a preterm baby after initial loss?"
      Back: "10 g/kg/day"
    tags: ["weight-gain", "preterm", "subject:paediatrics-neonatal"]
  - guid: "min-weight-gain-term"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Assess feeding and Counselling"
    fields:
      Front: "What is the minimum expected weight gain per day in a term baby after initial loss?"
      Back: "20 g/kg/day"
    tags: ["weight-gain", "term-baby", "subject:paediatrics-neonatal"]
  - guid: "inadequate-weight-los"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Assess feeding and Counselling"
    fields:
      Front: "When is weight loss considered inadequate in a newborn?"
      Back: "When weight loss exceeds 10% of birth weight"
    tags: ["weight-loss", "inadequate-gain", "subject:paediatrics-neonatal"]
  - guid: "adequate-weight-loss1"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Assess feeding and Counselling"
    fields:
      Front: "What is the management for adequate weight loss (<10%) in a newborn?"
      Back: "Continue feeding and start breastfeeding when baby is able to suckle"
    tags: ["management", "weight-loss", "subject:paediatrics-neonatal"]
  - guid: "inadequate-gain-5-i"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Assess feeding and Counselling"
    fields:
      Front: "List the five 'i's to consider when investigating inadequate weight gain"
      Back: "1. Illness\n2. Insufficient feeds\n3. Inadequate temperature control\n4. Incorrect feeding method\n5. Idiot (examiner's note: likely 'education deficit')"
    tags: ["differential-diagnosis", "inadequate-gain", "subject:paediatrics-neonatal"]
  - guid: "counselling-skills-3"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Assess feeding and Counselling"
    fields:
      Front: "Name the three main counselling skills"
      Back: "1. Communication skills\n2. Listening and learning skills\n3. Confidence building skills"
    tags: ["counselling", "communication", "subject:paediatrics-neonatal"]
  - guid: "counselling-not-instr"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Assess feeding and Counselling"
    fields:
      Front: "What is counselling NOT about?"
      Back: "Counselling is NOT about giving instructions. The critical issue is to reach an appropriate decision based on understanding, together with the mother or family."
    tags: ["counselling", "principles", "subject:paediatrics-neonatal"]
  - guid: "return-phc-signs-4"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Assess feeding and Counselling"
    fields:
      Front: "List four signs requiring immediate return to PHC clinic"
      Back: "1. Discharging eyes\n2. Umbilical sepsis\n3. Septic skin lesions\n4. Jaundice"
    tags: ["red-flags", "follow-up", "subject:paediatrics-neonatal"]
  - guid: "return-hospital-sign5"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Assess feeding and Counselling"
    fields:
      Front: "List five signs requiring immediate return to hospital"
      Back: "1. Not feeding/suckling well\n2. Convulsions\n3. Rapid breathing\n4. Diarrhoea\n5. Bleeding"
    tags: ["red-flags", "follow-up", "subject:paediatrics-neonatal"]
  - guid: "follow-up-all-babies"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Assess feeding and Counselling"
    fields:
      Front: "What are the follow-up timepoints for all babies?"
      Back: "3 days, 6 weeks, and normal routine"
    tags: ["follow-up", "scheduling", "subject:paediatrics-neonatal"]
  - guid: "follow-up-hiv-exposed"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Assess feeding and Counselling"
    fields:
      Front: "What are the follow-up timepoints for HIV-exposed babies?"
      Back: "6 weeks, then monthly for first year"
    tags: ["follow-up", "hiv", "subject:paediatrics-neonatal"]
  - guid: "follow-up-lbw-2kg"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Assess feeding and Counselling"
    fields:
      Front: "What are the follow-up timepoints for babies <2 kg?"
      Back: "3 days, weekly until 2.5 kg, then 6 weeks"
    tags: ["follow-up", "lbw", "subject:paediatrics-neonatal"]
  - guid: "follow-up-high-risk"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Assess feeding and Counselling"
    fields:
      Front: "What are the follow-up timepoints for high-risk babies?"
      Back: "3 days, weekly until 2.5 kg, 6 weeks, 4 months, 9 months"
    tags: ["follow-up", "high-risk", "subject:paediatrics-neonatal"]
