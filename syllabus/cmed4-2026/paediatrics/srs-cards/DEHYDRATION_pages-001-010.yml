    fields:
      Front: "What are the Priority Signs 3TPR-MOB in ETAT assessment?"
      Back: "Tiny baby, Temperature, Trauma, Pallor, Poisoning, Pain (severe), Respiratory, Restless, Referral (urgent), Malnutrition, Oedema, Burns"
