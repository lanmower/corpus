    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::NEONATAL JAUNDICE"
    fields:
      Front: "Explain the pathophysiology of hypernatraemia"
      Back: "Shift of water from brain tissue → brain cell shrinkage, pressure differences → capillary dilatation and rupture, cerebral venous thrombosis and haemorrhage"
    tags: ["hypernatraemia", "pathophysiology", "subject:paediatrics-neonatal"]
  - guid: "hyperna003abc"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::NEONATAL JAUNDICE"
