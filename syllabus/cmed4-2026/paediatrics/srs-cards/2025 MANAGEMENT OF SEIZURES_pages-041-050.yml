  - guid: p4s0w3x2r1t5u7v8
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 MANAGEMENT OF SEIZURES"
    fields:
      Front: "Define: Simple Febrile Seizure"
      Back: "A short generalized seizure, of a duration of less than 15 minutes, not recurring within 24 hours, occurring during a febrile episode not caused by an acute disease of the nervous system, in a child aged 6 months to 5 years with no neurologic deficits (i.e., with no pre-, peri-, or postnatal brain damage, with normal psychomotor development, and no previous afebrile seizures). Fever may not be detected before the seizure, but it must be present at least in the immediate post-acute period and be the symptom of a pediatric disease."
    tags: ["subject:paediatrics", "seizures", "febrile-seizures", "definitions"]
  - guid: q5t1x4y3s2u6v8w9
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 MANAGEMENT OF SEIZURES"
    fields:
      Front: "Define: Complex Febrile Seizure"
      Back: "A focal, or generalized and prolonged seizure, of a duration of greater than 15 minutes, recurring more than once in 24 hours, associated with post-ictal neurologic abnormalities (more frequently post-ictal palsy/Todd's palsy), or with previous neurologic deficits. If duration is greater than 30 minutes or there is no regaining of loss of consciousness, this is febrile status epilepticus."
    tags: ["subject:paediatrics", "seizures", "febrile-seizures", "definitions"]
  - guid: r6u2y5z4t3v7w9x0
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 MANAGEMENT OF SEIZURES"
    fields:
      Front: "When should a child with a simple febrile seizure be admitted to hospital?"
      Back: "Admission is indicated for the first episode or for known diagnosis of simple febrile seizures when without reliable familiar context."
    tags: ["subject:paediatrics", "seizures", "febrile-seizures", "admission-criteria"]
  - guid: s7v3z6a5u4w8x0y1
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 MANAGEMENT OF SEIZURES"
    fields:
      Front: "When should a child with complex febrile seizures be admitted?"
      Back: "Admission is indicated for complex febrile seizures or febrile seizure without a reliable familiar context."
    tags: ["subject:paediatrics", "seizures", "febrile-seizures", "admission-criteria"]
  - guid: t8w4a7b6v5x9y1z2
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 MANAGEMENT OF SEIZURES"
    fields:
      Front: "In simple febrile seizures, are routine laboratory tests, EEG, or neuro-imaging recommended?"
      Back: "No, routine laboratory, EEG, and neuro-imaging are not recommended for simple febrile seizures."
    tags: ["subject:paediatrics", "seizures", "febrile-seizures", "diagnostics"]
  - guid: u9x5b8c7w6y0z2a3
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 MANAGEMENT OF SEIZURES"
    fields:
      Front: "When is lumbar puncture indicated in simple febrile seizures?"
      Back: "Lumbar puncture is indicated with meningeal signs, should be done before antibiotic treatment, is useful in children less than 18 months old, and in children greater than 18 months should not be done routinely but based on the clinical assessment of the patient."
    tags: ["subject:paediatrics", "seizures", "febrile-seizures", "diagnostics", "lumbar-puncture"]
  - guid: v0y6c9d8x7z1a3b4
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 MANAGEMENT OF SEIZURES"
    fields:
      Front: "What investigations are recommended for complex febrile seizures?"
      Back: "Search for aetiology using bloods, EEG recommended (particularly for viral encephalitis), neuro-imaging recommended, and lumbar puncture necessary for all patients with suspected CNS infections."
    tags: ["subject:paediatrics", "seizures", "febrile-seizures", "diagnostics"]
  - guid: w1z7d0e9y8a2b4c5
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 MANAGEMENT OF SEIZURES"
    fields:
      Front: "What is the treatment approach for simple febrile seizures lasting 2-3 minutes?"
      Back: "No treatment is required for simple febrile seizures lasting 2-3 minutes."
    tags: ["subject:paediatrics", "seizures", "febrile-seizures", "treatment"]
  - guid: x2a8e1f0z9b3c5d6
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 MANAGEMENT OF SEIZURES"
    fields:
      Front: "What is the treatment approach for prolonged febrile seizures?"
      Back: "Prolonged febrile seizures require management in a hospital setting or home setting, with focus on prevention and management of recurrence risk."
    tags: ["subject:paediatrics", "seizures", "febrile-seizures", "treatment"]
  - guid: y3b9f2g1a0c4d6e7
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 MANAGEMENT OF SEIZURES"
    fields:
      Front: "What characterizes the treatment approach for complex febrile seizures?"
      Back: "Treatment for complex febrile seizures is variable, depending on aetiology, semiology, and prognosis; must be tailored to the specific underlying cause."
    tags: ["subject:paediatrics", "seizures", "febrile-seizures", "treatment"]
  - guid: z4c0g3h2b1d5e7f8
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 MANAGEMENT OF SEIZURES"
    fields:
      Front: "What is the modern definition of Status Epilepticus in terms of duration?"
      Back: "Status epilepticus is defined as seizure activity lasting more than 30 minutes or two or more seizures without regaining consciousness between episodes."
    tags: ["subject:paediatrics", "seizures", "status-epilepticus", "definitions"]
