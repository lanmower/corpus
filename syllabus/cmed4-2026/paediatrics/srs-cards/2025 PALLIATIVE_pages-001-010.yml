    Corpus::Paediatrics::2025 PALLIATIVE
  fields:
    Front: What are the main symptoms requiring control in paediatric palliative care?
    Back: Pain, dyspnoea, cough, nausea and vomiting, thirst, and fatigue.
  tags:
  - symptom-control
