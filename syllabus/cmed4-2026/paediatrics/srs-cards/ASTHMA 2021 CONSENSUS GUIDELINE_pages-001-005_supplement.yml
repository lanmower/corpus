    fields:
      Front: "Diagnostic red flags in wheezing: asymmetric findings?"
      Back: "Clinical findings that suggest an alternative reason to wheeze (rather than asthma) include digital clubbing, growth faltering, and asymmetric wheeze."
    tags: ["asthma", "differential-diagnosis", "red-flags", "examination", "subject:paediatrics"]
