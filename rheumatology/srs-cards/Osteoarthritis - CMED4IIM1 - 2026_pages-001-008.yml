deck: "Corpus::Rheumatology::Osteoarthritis"
notes:
  - guid: 1e05f7fd35ae08bb
    noteType: Basic
    deck: "Corpus::Rheumatology::Osteoarthritis"
    fields:
      Front: "What is the primary characteristic of osteoarthritis pathology?"
      Back: "Focal softening and disintegration of articular cartilage accompanied by proliferation of new bone (osteophyte formation on joint margins)."
    tags: ["subject:rheumatology"]
  - guid: bee43461ce81318d
    noteType: Basic
    deck: "Corpus::Rheumatology::Osteoarthritis"
    fields:
      Front: "What are the three main x-ray findings in osteoarthritis?"
      Back: "1) Joint space narrowing, 2) Subchondral sclerosis, 3) Marginal osteophyte formation."
    tags: ["subject:rheumatology"]
  - guid: 4c4a31fdb1c9b334
    noteType: Basic
    deck: "Corpus::Rheumatology::Osteoarthritis"
    fields:
      Front: "What is the role of the collagen network in cartilage?"
      Back: "The collagen network maintains cartilage strength and integrity while preserving water content and hydration of the cartilage."
    tags: ["subject:rheumatology"]
  - guid: c8650d6a86046d32
    noteType: Basic
    deck: "Corpus::Rheumatology::Osteoarthritis"
    fields:
      Front: "What happens when the collagen network is disrupted?"
      Back: "Cartilage integrity is compromised, leading to erosion, damage, dehydration, and microfractures in the subchondral bone."
    tags: ["subject:rheumatology"]
  - guid: 994da80700b2f6d8
    noteType: Basic
    deck: "Corpus::Rheumatology::Osteoarthritis"
    fields:
      Front: "What is the blood supply source for cartilage nutrients?"
      Back: "Cartilage is avascular (non-vascular) and receives nutrients from the vascular supply of the subchondral bone."
    tags: ["subject:rheumatology"]
  - guid: 9ae60fbb6c713f08
    noteType: Basic
    deck: "Corpus::Rheumatology::Osteoarthritis"
    fields:
      Front: "What stimuli trigger the pathogenic cascade in osteoarthritis?"
      Back: "Trauma, mechanical injury, or metabolic factors that stress the cartilage and affect chondrocytes."
    tags: ["subject:rheumatology"]
  - guid: 06f08bab030b5bde
    noteType: Basic
    deck: "Corpus::Rheumatology::Osteoarthritis"
    fields:
      Front: "What do damaged chondrocytes produce?"
      Back: "Enzymes that break down cartilage and collagen network, plus alkaline phosphatases that further damage cartilage integrity."
    tags: ["subject:rheumatology"]
  - guid: c4bf8e63c3e4d92c
    noteType: Basic
    deck: "Corpus::Rheumatology::Osteoarthritis"
    fields:
      Front: "What is the primary function of cartilage in joints?"
      Back: "To act as a shock absorber, with synovial fluid lining the joint to prevent excessive stress and redistribute forces."
    tags: ["subject:rheumatology"]
  - guid: 1dfa6a036b608f28
    noteType: Basic
    deck: "Corpus::Rheumatology::Osteoarthritis"
    fields:
      Front: "What structures are involved in osteoarthritic joint damage?"
      Back: "Joint capsule (thickening), cartilage (fibrillation), synovium (hypertrophy), and subchondral bone (sclerosis, cyst formation)."
    tags: ["subject:rheumatology"]
  - guid: 44609a457c4274b5
    noteType: Basic
    deck: "Corpus::Rheumatology::Osteoarthritis"
    fields:
      Front: "What causes synovial hypertrophy in osteoarthritis?"
      Back: "Inflammatory infiltrate within the synovium and fluid buildup, leading to stretching of the joint capsule."
    tags: ["subject:rheumatology"]
  - guid: ab04d0db6ef467eb
    noteType: Basic
    deck: "Corpus::Rheumatology::Osteoarthritis"
    fields:
      Front: "What is the prevalence of symptomatic knee osteoarthritis in UK population over 55?"
      Back: "9.5% of population aged over 55 have symptomatic knee osteoarthritis (Framingham study)."
    tags: ["subject:rheumatology"]
  - guid: 7c4ee465b838bf6f
    noteType: Basic
    deck: "Corpus::Rheumatology::Osteoarthritis"
    fields:
      Front: "What is radiographic osteoarthritis?"
      Back: "Incidental x-ray findings of osteoarthritis in asymptomatic patients showing features like joint space narrowing and osteophytes."
    tags: ["subject:rheumatology"]
  - guid: 07aff98ab116cb95
    noteType: Basic
    deck: "Corpus::Rheumatology::Osteoarthritis"
    fields:
      Front: "What percentage of adults in the US have radiographic hand OA?"
      Back: "32.5% of adults in the US have radiographic hand osteoarthritis."
    tags: ["subject:rheumatology"]
  - guid: 29942ddecc2fc835
    noteType: Basic
    deck: "Corpus::Rheumatology::Osteoarthritis"
    fields:
      Front: "Who is more commonly affected by osteoarthritis?"
      Back: "Women more than men, particularly postmenopausal women; peak onset between ages 50-60 years."
    tags: ["subject:rheumatology"]
  - guid: 43b1fa5a68114d56
    noteType: Basic
    deck: "Corpus::Rheumatology::Osteoarthritis"
    fields:
      Front: "What is the difference between primary and secondary osteoarthritis?"
      Back: "Primary OA has idiopathic cause; secondary OA has a known preceding cause (trauma, surgery, inflammatory conditions, etc.)."
    tags: ["subject:rheumatology"]
  - guid: 79dbe79349f48c5e
    noteType: Basic
    deck: "Corpus::Rheumatology::Osteoarthritis"
    fields:
      Front: "What is the distinction between localized and generalized osteoarthritis?"
      Back: "Localized OA involves less than 3 joint areas; generalized OA involves 3 or more joint areas."
    tags: ["subject:rheumatology"]
  - guid: c4cebf6c5b01d115
    noteType: Basic
    deck: "Corpus::Rheumatology::Osteoarthritis"
    fields:
      Front: "What is nodal osteoarthritis?"
      Back: "Bony swelling of small hand joints, particularly proximal and distal interphalangeal joints and first carpometacarpal joint, associated with collagen 2A gene abnormalities."
    tags: ["subject:rheumatology"]
  - guid: 2723fb76cfc10bee
    noteType: Basic
    deck: "Corpus::Rheumatology::Osteoarthritis"
    fields:
      Front: "What is the typical duration of morning stiffness in osteoarthritis?"
      Back: "Usually less than 30 minutes, occurring after inactivity (unlike inflammatory arthritis which lasts >30 minutes to 1 hour)."
    tags: ["subject:rheumatology"]
  - guid: 5773ab5556118a6f
    noteType: Basic
    deck: "Corpus::Rheumatology::Osteoarthritis"
    fields:
      Front: "How does pain in osteoarthritis differ from inflammatory arthritis pain?"
      Back: "OA pain is non-inflammatory, worse with movement and activity, and improves with rest (unlike inflammatory pain which improves with movement)."
    tags: ["subject:rheumatology"]
  - guid: e5aaec820614b5d5
    noteType: Basic
    deck: "Corpus::Rheumatology::Osteoarthritis"
    fields:
      Front: "What causes pain in osteoarthritis?"
      Back: "Multiple mechanisms: synovial inflammation, increased pressure in subchondral bone, osteophyte formation, and stretching of joint capsule/ligaments."
    tags: ["subject:rheumatology"]
  - guid: 54819a9692be84b9
    noteType: Basic
    deck: "Corpus::Rheumatology::Osteoarthritis"
    fields:
      Front: "What is crepitus in osteoarthritis?"
      Back: "Cracking sensation felt when passively flexing and extending the knee joint, commonly present in knee osteoarthritis."
    tags: ["subject:rheumatology"]
  - guid: 4cf4bdc83bacd9a1
    noteType: Basic
    deck: "Corpus::Rheumatology::Osteoarthritis"
    fields:
      Front: "What percentage chance does a person under 45 have of osteoarthritis?"
      Back: "2% chance of having osteoarthritis in patients less than 45 years old."
    tags: ["subject:rheumatology"]
  - guid: f10c9e2dcd54c2b0
    noteType: Basic
    deck: "Corpus::Rheumatology::Osteoarthritis"
    fields:
      Front: "What is the chance of osteoarthritis in patients over 65 years?"
      Back: "68% chance of osteoarthritis in patients older than 65 years."
    tags: ["subject:rheumatology"]
  - guid: 360c81232cdd9d95
    noteType: Basic
    deck: "Corpus::Rheumatology::Osteoarthritis"
    fields:
      Front: "Which joints are most commonly affected in women?"
      Back: "DIP joints, first carpometacarpal joint, and knee joints, often related to occupational hand use and increased body mass index."
    tags: ["subject:rheumatology"]
  - guid: 4e70d314a62e7bbf
    noteType: Basic
    deck: "Corpus::Rheumatology::Osteoarthritis"
    fields:
      Front: "Which joints are most commonly affected in men?"
      Back: "Hip joint osteoarthritis, possibly related to activity, sporting activities, and occupations."
    tags: ["subject:rheumatology"]
  - guid: d1ad5cedf5c273cd
    noteType: Basic
    deck: "Corpus::Rheumatology::Osteoarthritis"
    fields:
      Front: "What is the effect of hormone replacement therapy on osteoarthritis?"
      Back: "Reduction in risk of knee and hip OA noted with hormone replacement therapy; effect stronger with longer duration and more severe/bilateral OA."
    tags: ["subject:rheumatology"]
  - guid: 4f6aaa51b61ad585
    noteType: Basic
    deck: "Corpus::Rheumatology::Osteoarthritis"
    fields:
      Front: "What is the relationship between obesity and osteoarthritis risk?"
      Back: "BMI greater than 30 increases osteoarthritis risk by 4 fold; losing 5 kg can reduce knee OA risk by up to 50% in those with BMI greater than 25."
    tags: ["subject:rheumatology"]
  - guid: 5ccb1b35559bf2e2
    noteType: Basic
    deck: "Corpus::Rheumatology::Osteoarthritis"
    fields:
      Front: "What genetic factor predisposes to nodal osteoarthritis?"
      Back: "Abnormality in collagen 2A genes; there is strong familial tendency for nodal osteoarthritis in families with premature OA."
    tags: ["subject:rheumatology"]
  - guid: 8cd1d17344bc2e24
    noteType: Basic
    deck: "Corpus::Rheumatology::Osteoarthritis"
    fields:
      Front: "What role do vitamins C and E play in osteoarthritis?"
      Back: "They have antioxidant properties; deficiencies may contribute to development of osteoarthritis and increased radiographic progression."
    tags: ["subject:rheumatology"]
  - guid: b778c79325f4d608
    noteType: Basic
    deck: "Corpus::Rheumatology::Osteoarthritis"
    fields:
      Front: "What is the relationship between vitamin D deficiency and osteoarthritis?"
      Back: "Higher rate of radiographic progression in patients with 25-hydroxy vitamin D deficiency."
    tags: ["subject:rheumatology"]
  - guid: 8281ed9098df0b29
    noteType: Basic
    deck: "Corpus::Rheumatology::Osteoarthritis"
    fields:
      Front: "What is the relationship between osteoporosis and osteoarthritis?"
      Back: "Strong inverse relationship: if a patient has osteoarthritis, they are less likely to have osteoporosis and vice versa."
    tags: ["subject:rheumatology"]
  - guid: fdfc378ccb5ff331
    noteType: Basic
    deck: "Corpus::Rheumatology::Osteoarthritis"
    fields:
      Front: "What occupational factors increase risk of hand osteoarthritis?"
      Back: "Occupations involving manual labor, textile workers, and quaternal workers have higher risk of hand osteoarthritis."
    tags: ["subject:rheumatology"]
  - guid: 6a71e3fc9a8b505b
    noteType: Basic
    deck: "Corpus::Rheumatology::Osteoarthritis"
    fields:
      Front: "What occupational factors increase risk of knee osteoarthritis?"
      Back: "Occupations involving regular bending and carrying heavy loads increase risk of knee osteoarthritis."
    tags: ["subject:rheumatology"]
  - guid: 02be32ffd4d0ac4a
    noteType: Basic
    deck: "Corpus::Rheumatology::Osteoarthritis"
    fields:
      Front: "What occupational factors increase risk of hip osteoarthritis?"
      Back: "Farmers and agricultural workers have increased risk of hip osteoarthritis."
    tags: ["subject:rheumatology"]
  - guid: 7c4d0dfafebfd83b
    noteType: Basic
    deck: "Corpus::Rheumatology::Osteoarthritis"
    fields:
      Front: "What anatomical factors predispose to osteoarthritis?"
      Back: "Perthes disease, congenital dislocation of hip, slipped capital femoral epiphysis, and abnormal joint shape cause abnormal stress distribution."
    tags: ["subject:rheumatology"]
  - guid: 0e85282b6123d0ee
    noteType: Basic
    deck: "Corpus::Rheumatology::Osteoarthritis"
    fields:
      Front: "What are the three levels of osteoarthritis prevention?"
      Back: "Primary (healthy individuals), secondary (early asymptomatic/radiographic OA), tertiary (established disease to prevent disability)."
    tags: ["subject:rheumatology"]
  - guid: fd2f2cf1c336fe07
    noteType: Basic
    deck: "Corpus::Rheumatology::Osteoarthritis"
    fields:
      Front: "What are the primary prevention strategies for osteoarthritis?"
      Back: "Weight loss, joint protection, occupation change if at high risk, preventing sports training errors, muscle strengthening (quadriceps, shoulder/hip girdle), hormone replacement therapy, and nutritional supplements (calcium, vitamin D, C, E)."
    tags: ["subject:rheumatology"]
  - guid: 6d12990dfd8112f1
    noteType: Basic
    deck: "Corpus::Rheumatology::Osteoarthritis"
    fields:
      Front: "What are the management aims in osteoarthritis?"
      Back: "1) Educate patient on preventive strategies, 2) Relieve pain, 3) Optimize function and quality of life, 4) Minimize disease progression."
    tags: ["subject:rheumatology"]
  - guid: 36616542fab2aaf9
    noteType: Basic
    deck: "Corpus::Rheumatology::Osteoarthritis"
    fields:
      Front: "What pharmacological agents are used for osteoarthritis pain?"
      Back: "Analgesics (paracetamol), opioids (tramadol), NSAIDs for inflammation, intra-articular corticosteroids, viscous supplementation, and glucosamine sulfate."
    tags: ["subject:rheumatology"]
  - guid: 0bbd4b90e5232c19
    noteType: Basic
    deck: "Corpus::Rheumatology::Osteoarthritis"
    fields:
      Front: "What precautions should be taken with NSAIDs in osteoarthritis?"
      Back: "Use cautiously in patients over 65 years, those with peptic ulcer disease, impaired renal function, poorly compensated heart failure, hepatic dysfunction, or on anticoagulants (warfarin, aspirin)."
    tags: ["subject:rheumatology"]
  - guid: 01b9d7cd3931d6b7
    noteType: Basic
    deck: "Corpus::Rheumatology::Osteoarthritis"
    fields:
      Front: "What surgical options are available for osteoarthritis?"
      Back: "Arthroscopy (joint wash-out, debris removal), osteotomy (rarely done now), joint replacement (for significant pain/disability/reduced quality of life), and arthrodesis (rarely performed now)."
    tags: ["subject:rheumatology"]
