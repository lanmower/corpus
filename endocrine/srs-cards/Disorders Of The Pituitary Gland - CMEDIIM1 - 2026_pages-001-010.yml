- id: pituitary-1
  front: "What are the two main parts of the pituitary gland?"
  back: "The anterior pituitary and posterior pituitary."

- id: pituitary-2
  front: "What is the typical weight of the pituitary gland?"
  back: "0.4 to 0.8 grams. Despite its small size, it has the highest blood flow of any organ in the body."

- id: pituitary-3
  front: "What are the main presentations of pituitary disorders?"
  back: "Hypersecretion of hormones, visual disorders, enlargement of the sella turcica (space-occupying lesions), and hypopituitarism."

- id: pituitary-4
  front: "What broad categories of investigation are used for pituitary disorders?"
  back: "Radiology, endocrine/biochemical tests, and neuro-ophthalmic (visual field) evaluation."

- id: acromegaly-1
  front: "What is the difference between gigantism and acromegaly?"
  back: "Gigantism occurs when excess growth hormone develops before closure of the epiphyses (growth plates) in bones; acromegaly occurs after epiphyseal closure."

- id: acromegaly-2
  front: "What percentage of acromegaly cases present as macroadenomas at diagnosis?"
  back: "75% of individuals have macroadenomas (>10 mm) at the time of diagnosis."

- id: acromegaly-3
  front: "List the facial features characteristic of acromegaly."
  back: "Coarse features, prominent supraorbital ridges (from enlarged frontal sinuses), prognathism (forward protrusion of lower jaw), reversal of bite, separation of teeth, thickened lips and nose, and macroglossia."

- id: acromegaly-4
  front: "What are the main skeletal manifestations of acromegaly in the hands and feet?"
  back: "Hands: enlargement (spade-like), compression of nerves. Feet: large feet with proximal myopathy, osteoarthritis, and carpal/tarsal tunnel syndrome."

- id: acromegaly-5
  front: "What visual disturbance is characteristic of acromegaly?"
  back: "Bitemporal hemianopia due to pressure on the optic chiasm from the expanding tumor."

- id: acromegaly-6
  front: "What organ enlargements occur in acromegaly due to IGF-1 stimulation?"
  back: "Cardiomegaly, goiter (thyroid), splenomegaly, enlarged liver and kidneys, and laryngeal hypertrophy. This can lead to secondary hypertension and increased risk of carcinoma of the colon."

- id: acromegaly-7
  front: "What metabolic abnormalities are seen in acromegaly?"
  back: "Hypertension (develops in 20-40%), glucose intolerance/pre-diabetes, and diabetes (13-20%)."

- id: acromegaly-8
  front: "What skin changes occur in acromegaly?"
  back: "Oily skin, hirsutism, acanthosis nigricans, hypertricosis, and skin tags. >3 skin tags are associated with colonic polyps or carcinoma."

- id: acromegaly-9
  front: "What complications can result from laryngeal hypertrophy in acromegaly?"
  back: "Obstructive sleep apnea, which may cause somnolence and reduce life expectancy."

- id: acromegaly-10
  front: "What causes shortened lifespan in untreated acromegaly?"
  back: "Death may result from cardiovascular disease, cerebrovascular disease, respiratory disease, or associated malignancy (colon cancer)."

- id: acromegaly-investigation-1
  front: "What radiological investigations are performed for acromegaly?"
  back: "Plain X-rays of skull (showing enlarged pituitary fossa, erosion of clinoid processes, enlarged frontal sinuses), hands (tufting of terminal phalanges, widened joint spaces), feet (increased heel pad thickness), and MRI of the pituitary."

- id: acromegaly-investigation-2
  front: "What does the plain X-ray of the feet show in acromegaly?"
  back: "Increased heel pad thickness (beyond normal limits for sex), widening of joint spaces, and osteoarthritis."

- id: acromegaly-investigation-3
  front: "What is the purpose of the MRI of the pituitary in acromegaly?"
  back: "To determine tumor location (intrasellar vs. suprasellar extension), size (microadenoma vs. macroadenoma), and extent of extension, which guides treatment decisions."

- id: acromegaly-biochemistry-1
  front: "What are the basal biochemical tests for acromegaly?"
  back: "Elevated serum growth hormone, elevated IGF-1, elevated prolactin (if co-secreting tumor), elevated serum phosphate, hyperglycemia/dysglycemia, and elevated serum calcium."

- id: acromegaly-biochemistry-2
  front: "What is the gold standard provocative test for acromegaly?"
  back: "Oral glucose tolerance test (OGTT). In normal individuals, glucose rises and growth hormone falls. In acromegaly, baseline growth hormone is high and fails to decrease with rising glucose levels."

- id: acromegaly-biochemistry-3
  front: "How is pituitary reserve assessed in acromegaly?"
  back: "Insulin tolerance test (gold standard) to assess cortisol response, TRH test for TSH response, GNRH test for LH/FSH response, or synacthen test (1 microgram IV) and glucagon test for cortisol."

- id: acromegaly-biochemistry-4
  front: "How is posterior pituitary function assessed in acromegaly?"
  back: "Basal test: serum and urine osmolality. Provocative test: water deprivation test. This evaluates for cranial diabetes insipidus or arginine vasopressin deficiency."

- id: acromegaly-management-1
  front: "What are the objectives of acromegaly management?"
  back: "Reduce growth hormone and IGF-1 to normal levels, decrease tumor size, and preserve anterior and posterior pituitary function."

- id: acromegaly-management-2
  front: "What is the first-line treatment for acromegaly?"
  back: "Surgery: transphenoidal pituitary/adenoma resection, usually via the nose. Either targeted or total resection depending on suprasellar extension."

- id: acromegaly-management-3
  front: "When is radiotherapy indicated for acromegaly?"
  back: "When the patient refuses surgery, is a poor surgical risk, or when surgery fails. Includes external irradiation and stereotactic radiotherapy."

- id: acromegaly-management-4
  front: "What medical therapies are used for acromegaly?"
  back: "Dopamine agonists (bromocriptine, cabergoline); somatostatin analogs (octreotide, pasireotide); growth hormone receptor antagonists (pegvisomant). Used if surgery refused/failed, or as adjunct to radiotherapy."

- id: acromegaly-management-5
  front: "What is the bromocriptine dosing for acromegaly?"
  back: "2.5 mg three times daily, up to 60 mg per day."

- id: acromegaly-cure-rates
  front: "What are the cure rates for acromegaly after transphenoidal surgery?"
  back: "80% with microadenoma; 50% with macroadenoma (>10 mm). All patients require long-term follow-up for recurrence."

- id: prolactinoma-1
  front: "Why is prolactinoma the most common functioning pituitary tumor?"
  back: "It secretes prolactin, and occurs in both micro- and macroadenomas. Microadenomas are more common in females (70%), while macroadenomas are more common in males (60%)."

- id: prolactinoma-2
  front: "What are the clinical features of prolactinoma?"
  back: "Mass-related (headache, cranial nerve palsies, visual field defects) and hormone-related: galactorrhea (~80% of hyperprolactinemia), amenorrhea/infertility (women), gynecomastia/decreased libido/impotence (men), acne, hirsutism, and osteoporosis (both)."

- id: prolactinoma-investigation-1
  front: "What is the diagnostic approach for prolactinoma?"
  back: "Radiological: MRI of pituitary. Biochemical: basal serum prolactin (no provocative tests needed). If basal prolactin is >4× upper limit of normal, prolactinoma is the likely cause of hyperprolactinemia."

- id: prolactinoma-management-1
  front: "What is the first-line management of prolactinoma?"
  back: "Medical therapy with dopamine agonists (bromocriptine or analogs like cabergoline or quinagolide). These result in tumor involution."

- id: prolactinoma-management-2
  front: "When is surgery indicated for prolactinoma?"
  back: "Surgery is rarely indicated. Microadenomas respond well to medical therapy and rarely present. Macroadenomas respond poorly to surgery but may be required for sudden, massive deterioration of vision."

- id: hypopituitarism-1
  front: "What is the difference between isolated hypopituitarism and pan-hypopituitarism?"
  back: "Isolated hypopituitarism: only one hormone deficiency (e.g., ACTH, gonadotropins, TSH, or growth hormone deficiency). Pan-hypopituitarism: deficiency of multiple pituitary hormones."

