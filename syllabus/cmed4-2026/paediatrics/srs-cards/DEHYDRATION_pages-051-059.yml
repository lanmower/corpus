    fields:
      Front: "Case 3: Child 11 kg with severe dehydration, severe malnutrition, drip fails. What is the IV dose and drip rates?"
      Back: "Plan: 10 ml/kg/hour x 8 hours = 10 x 11 = 110 ml/hr (weight band 80 ml/hr). Using 60 drops/ml dropper: 80 drops per minute. Using 15 drops/ml dropper: 20 drops per minute. Duration is 8 hours (not 4 hours due to malnutrition)."
    tags: ["dehydration", "malnutrition", "iv-fluids", "drip-rate", "calculation", "case-study", "subject:paediatrics"]
