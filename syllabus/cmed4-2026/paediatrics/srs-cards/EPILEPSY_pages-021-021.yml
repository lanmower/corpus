  - guid: s1t2u3v4w5x6y7z8
    noteType: "Basic"
    deck: "Corpus::Paediatrics::EPILEPSY"
    fields:
      Front: "Describe STEP 5 in Status Epilepticus management."
      Back: "PHENOBARBITONE REPEAT: If still convulsing 30 minutes after starting phenobarbitone or phenytoin, repeat phenobarbitone at 10 mg/kg IV/IO over 5-10 minutes. If still convulsing after a further 10 minutes, repeat PHENOBARBITONE 10 mg/kg IV/IO over 5-10 minutes."
    tags: ["epilepsy", "status-epilepticus", "step-5", "phenobarbitone-repeat", "subject:paediatrics"]

  - guid: t2u3v4w5x6y7z8a9
    noteType: "Basic"
    deck: "Corpus::Paediatrics::EPILEPSY"
    fields:
      Front: "When is the first phenobarbitone repeat given in STEP 5?"
      Back: "If still convulsing 30 minutes after starting phenobarbitone or phenytoin, repeat at reduced dose 10 mg/kg IV/IO over 5-10 minutes."
    tags: ["epilepsy", "status-epilepticus", "phenobarbitone", "step-5", "dosing", "subject:paediatrics"]

  - guid: u3v4w5x6y7z8a9b0
    noteType: "Basic"
    deck: "Corpus::Paediatrics::EPILEPSY"
    fields:
      Front: "What is the second phenobarbitone repeat dose in STEP 5?"
      Back: "10 mg/kg IV/IO over 5-10 minutes, if still convulsing after a further 10 minutes from the first repeat."
    tags: ["epilepsy", "status-epilepticus", "phenobarbitone", "step-5", "dosing", "subject:paediatrics"]

  - guid: v4w5x6y7z8a9b0c1
    noteType: "Basic"
    deck: "Corpus::Paediatrics::EPILEPSY"
    fields:
      Front: "What is the final action after STEP 5 in Status Epilepticus management?"
      Back: "Telephone a PICU (Pediatric Intensive Care Unit) for further management."
