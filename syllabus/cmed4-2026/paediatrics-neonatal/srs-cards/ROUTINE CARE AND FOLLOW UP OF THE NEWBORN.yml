deck: "Corpus::Paediatrics-Neonatal::ROUTINE CARE AND FOLLOW UP OF THE NEWBORN"
notes:
  - guid: "1KDRy7mJpQxW2z9a"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::ROUTINE CARE AND FOLLOW UP OF THE NEWBORN"
    fields:
      Front: "Initial care after birth: what is the first action for any newborn?"
      Back: "Dry the baby with a warm towel"
    tags: ["immediate-care", "post-birth", "subject:paediatrics-neonatal"]
  - guid: "2aBcDeFgHiJkLmNo"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::ROUTINE CARE AND FOLLOW UP OF THE NEWBORN"
    fields:
      Front: "What three assessment questions must be asked after birth to classify the baby?"
      Back: "1. Is the baby breathing spontaneously?\n2. Is the heart rate more than 100 bpm?\n3. Is the baby active and moving?"
    tags: ["assess-classify", "post-birth", "subject:paediatrics-neonatal"]
  - guid: "3PqRsT9uVwXyZaBc"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::ROUTINE CARE AND FOLLOW UP OF THE NEWBORN"
    fields:
      Front: "When does a baby need resuscitation after birth?"
      Back: "If the answer to any of the three assessment questions is 'no'"
    tags: ["resuscitation", "post-birth", "subject:paediatrics-neonatal"]
  - guid: "4DeFgHiJkLmNoPqR"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::ROUTINE CARE AND FOLLOW UP OF THE NEWBORN"
    fields:
      Front: "At what times is the Apgar score assessed?"
      Back: "At 1 minute and 5 minutes after birth"
    tags: ["apgar-score", "assessment", "subject:paediatrics-neonatal"]
  - guid: "5StUvWxYzAbCdEfG"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::ROUTINE CARE AND FOLLOW UP OF THE NEWBORN"
    fields:
      Front: "What does the 1-minute Apgar score indicate?"
      Back: "Whether or not the baby needs resuscitation"
    tags: ["apgar-score", "resuscitation", "subject:paediatrics-neonatal"]
  - guid: "6HiJkLmNoPqRsT1u"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::ROUTINE CARE AND FOLLOW UP OF THE NEWBORN"
    fields:
      Front: "What does the 5-minute Apgar score indicate?"
      Back: "Whether or not the resuscitation has been successful"
    tags: ["apgar-score", "resuscitation", "subject:paediatrics-neonatal"]
  - guid: "7VwXyZaBcDeFgHiJ"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::ROUTINE CARE AND FOLLOW UP OF THE NEWBORN"
    fields:
      Front: "What immediate care does every newborn require? (list 7 items)"
      Back: "1. Cord clamping\n2. Vitamin K\n3. Dry and warm\n4. NVP +/- AZT if HIV exposed\n5. Immunizations\n6. Maternal and birth history\n7. Give to mother and put to breast if well"
    tags: ["immediate-care", "routine-care", "subject:paediatrics-neonatal"]
  - guid: "8KlMnOpQrStuVwXy"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::ROUTINE CARE AND FOLLOW UP OF THE NEWBORN"
    fields:
      Front: "List the high-risk baby categories that require special attention"
      Back: "1. Prem, LBW <2 kg\n2. Maternal diabetes\n3. Maternal TB\n4. Other maternal illness (e.g., cardiac with warfarin exposure)\n5. RPR positive mother\n6. Rh negative mothers\n7. Congenital abnormalities"
    tags: ["high-risk", "risk-factors", "subject:paediatrics-neonatal"]
  - guid: "9ZaBcDeFgHiJkLm"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::ROUTINE CARE AND FOLLOW UP OF THE NEWBORN"
    fields:
      Front: "Where should ELBW (Extremely Low Birth Weight) babies be admitted?"
      Back: "All ELBW babies must be admitted to the High care area"
    tags: ["admission-criteria", "elbw", "subject:paediatrics-neonatal"]
  - guid: "aNoP1qRsT2uVwXyZ"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::ROUTINE CARE AND FOLLOW UP OF THE NEWBORN"
    fields:
      Front: "Where should VLBW (Very Low Birth Weight) babies be admitted?"
      Back: "Admit to high care area for initial observation"
    tags: ["admission-criteria", "vlbw", "subject:paediatrics-neonatal"]
  - guid: "bAbCdEfG3hIjKlMn"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::ROUTINE CARE AND FOLLOW UP OF THE NEWBORN"
    fields:
      Front: "Where should LBW (<2 kg) babies be admitted?"
      Back: "Admit to neonatal unit for observation. Once well and stable and coping with intermittent KMC can be sent to KMC"
    tags: ["admission-criteria", "lbw", "subject:paediatrics-neonatal"]
  - guid: "cOpQrS4tUvWxYzAb"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::ROUTINE CARE AND FOLLOW UP OF THE NEWBORN"
    fields:
      Front: "Where should babies >2 kg who are ill or high-risk be admitted?"
      Back: "High care"
    tags: ["admission-criteria", "high-risk", "subject:paediatrics-neonatal"]
  - guid: "dCdEfG5hIjKlMnOp"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::ROUTINE CARE AND FOLLOW UP OF THE NEWBORN"
    fields:
      Front: "What warmth provision is indicated for ELBW babies?"
      Back: "Servo controlled incubator and wrap in plastic"
    tags: ["warmth", "elbw", "subject:paediatrics-neonatal"]
  - guid: "eQrS6tUvWxYzAbCd"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::ROUTINE CARE AND FOLLOW UP OF THE NEWBORN"
    fields:
      Front: "What warmth provision is indicated for VLBW babies?"
      Back: "Servo controlled incubator if ill; standard incubator if well; once well intermittent KMC"
    tags: ["warmth", "vlbw", "subject:paediatrics-neonatal"]
  - guid: "fEfG7hIjKlMnOpQr"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::ROUTINE CARE AND FOLLOW UP OF THE NEWBORN"
    fields:
      Front: "What warmth provision is indicated for LBW (<2 kg) babies?"
      Back: "Standard incubator; once well intermittent KMC"
    tags: ["warmth", "lbw", "subject:paediatrics-neonatal"]
  - guid: "gStU8vWxYzAbCdEf"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::ROUTINE CARE AND FOLLOW UP OF THE NEWBORN"
    fields:
      Front: "What warmth provision is indicated for LBW (>2 kg) babies?"
      Back: "KMC (Kangaroo Mother Care)"
    tags: ["warmth", "lbw", "kmc", "subject:paediatrics-neonatal"]
  - guid: "hGhI9jKlMnOpQrSt"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::ROUTINE CARE AND FOLLOW UP OF THE NEWBORN"
    fields:
      Front: "Which babies are kept NIL by mouth for at least 24 hours?"
      Back: "Babies under 1.5 kg and sick babies"
    tags: ["feeding", "neonatal-feeding", "subject:paediatrics-neonatal"]
  - guid: "iUvW0xYzAbCdEfGh"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::ROUTINE CARE AND FOLLOW UP OF THE NEWBORN"
    fields:
      Front: "What feeding method is used for sick babies once condition stabilizes?"
      Back: "Nasogastric tube (NGT) feeding"
    tags: ["feeding", "neonatal-feeding", "subject:paediatrics-neonatal"]
  - guid: "jIjK1lMnOpQrStuV"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::ROUTINE CARE AND FOLLOW UP OF THE NEWBORN"
    fields:
      Front: "When can a baby transition from oxygen support to cup feeding?"
      Back: "Once the baby is no longer receiving head box oxygen"
    tags: ["feeding", "oxygen-therapy", "subject:paediatrics-neonatal"]
  - guid: "kWxY2zAbCdEfGhIj"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::ROUTINE CARE AND FOLLOW UP OF THE NEWBORN"
    fields:
      Front: "When can a baby transition from cup feeding to breastfeeding?"
      Back: "Once the baby can suckle"
    tags: ["feeding", "breastfeeding", "subject:paediatrics-neonatal"]
  - guid: "lKlM3nOpQrStuVwX"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::ROUTINE CARE AND FOLLOW UP OF THE NEWBORN"
    fields:
      Front: "How frequently should blood glucose be checked in newborns?"
      Back: "3 hourly for the first 24 hours"
    tags: ["observations", "glucose-monitoring", "subject:paediatrics-neonatal"]
  - guid: "mYzA4bCdEfGhIjKl"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::ROUTINE CARE AND FOLLOW UP OF THE NEWBORN"
    fields:
      Front: "How should oxygen saturation be monitored in babies receiving oxygen?"
      Back: "Continuously until optimal saturation is achieved"
    tags: ["observations", "oxygen-therapy", "subject:paediatrics-neonatal"]
  - guid: "nMnO5pQrStuVwXyZ"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::ROUTINE CARE AND FOLLOW UP OF THE NEWBORN"
    fields:
      Front: "What vital parameters should be observed and recorded in newborns?"
      Back: "Heart rate, respiratory rate, temperature, colour and activity according to their classification"
    tags: ["observations", "vital-signs", "subject:paediatrics-neonatal"]
  - guid: "oAbC6dEfGhIjKlMn"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::ROUTINE CARE AND FOLLOW UP OF THE NEWBORN"
    fields:
      Front: "Which babies are prone to apnoea and require monitoring?"
      Back: "Babies with birth weight <1.5 kg or gestational age <35 weeks"
    tags: ["apnoea", "respiratory", "subject:paediatrics-neonatal"]
  - guid: "pOpQ7rStuVwXyZaB"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::ROUTINE CARE AND FOLLOW UP OF THE NEWBORN"
    fields:
      Front: "What respiratory stimulants are used for apnoea in newborns?"
      Back: "IV aminophylline, oral theophylline, or caffeine"
    tags: ["apnoea", "respiratory", "medications", "subject:paediatrics-neonatal"]
  - guid: "qCdE8fGhIjKlMnOp"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::ROUTINE CARE AND FOLLOW UP OF THE NEWBORN"
    fields:
      Front: "How long should apnoea stimulant treatment continue?"
      Back: "Until the baby is 1.8 kg or has been apnoea-free for at least 7 days"
    tags: ["apnoea", "respiratory", "subject:paediatrics-neonatal"]
  - guid: "rQrS9tUvWxYzAbCd"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::ROUTINE CARE AND FOLLOW UP OF THE NEWBORN"
    fields:
      Front: "When can a baby with apnoea history be safely discharged?"
      Back: "Only after being apnoea-free for more than 7 days"
    tags: ["apnoea", "discharge-criteria", "subject:paediatrics-neonatal"]
  - guid: "sEfG0hIjKlMnOpQr"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::ROUTINE CARE AND FOLLOW UP OF THE NEWBORN"
    fields:
      Front: "What is the respiratory rate cutoff for indicating oxygen therapy?"
      Back: "Respiratory rate >80"
    tags: ["oxygen-therapy", "respiratory", "subject:paediatrics-neonatal"]
  - guid: "tStU1vWxYzAbCdEf"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::ROUTINE CARE AND FOLLOW UP OF THE NEWBORN"
    fields:
      Front: "What is the oxygen saturation cutoff for indicating oxygen therapy?"
      Back: "Blood oxygen saturation less than 88%"
    tags: ["oxygen-therapy", "respiratory", "subject:paediatrics-neonatal"]
  - guid: "uGhI2jKlMnOpQrSt"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::ROUTINE CARE AND FOLLOW UP OF THE NEWBORN"
    fields:
      Front: "List all indications for oxygen therapy in newborns"
      Back: "1. Respiratory rate >80\n2. Severe chest indrawing\n3. Grunting\n4. Blood oxygen saturation <88%"
    tags: ["oxygen-therapy", "respiratory", "subject:paediatrics-neonatal"]
  - guid: "vUvW3xYzAbCdEfGh"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::ROUTINE CARE AND FOLLOW UP OF THE NEWBORN"
    fields:
      Front: "Which babies should receive antibiotics prophylactically?"
      Back: "1. Babies with UPTL (unknown prolonged rupture of membranes)\n2. Babies with PROM (premature rupture of membranes)\n3. Babies with obvious signs of infection"
    tags: ["antibiotics", "infection-prevention", "subject:paediatrics-neonatal"]
  - guid: "wIjK4lMnOpQrStuV"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::ROUTINE CARE AND FOLLOW UP OF THE NEWBORN"
    fields:
      Front: "What is the standard penicillin dosage for newborn antibiotics?"
      Back: "IV penicillin 100,000 U/kg/dose twice daily"
    tags: ["antibiotics", "medications", "dosing", "subject:paediatrics-neonatal"]
  - guid: "xWxY5zAbCdEfGhIj"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::ROUTINE CARE AND FOLLOW UP OF THE NEWBORN"
    fields:
      Front: "What is the standard gentamycin dosage for newborn antibiotics?"
      Back: "Gentamycin 5 mg/day daily"
    tags: ["antibiotics", "medications", "dosing", "subject:paediatrics-neonatal"]
  - guid: "yKlM6nOpQrStuVwX"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::ROUTINE CARE AND FOLLOW UP OF THE NEWBORN"
    fields:
      Front: "When should CRP be checked in babies receiving prophylactic antibiotics?"
      Back: "After 48 hours of prophylactic treatment"
    tags: ["antibiotics", "infection-prevention", "subject:paediatrics-neonatal"]
  - guid: "zYzA7bCdEfGhIjKl"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::ROUTINE CARE AND FOLLOW UP OF THE NEWBORN"
    fields:
      Front: "When should prophylactic antibiotics be stopped?"
      Back: "If CRP is normal and the baby is well"
    tags: ["antibiotics", "infection-prevention", "subject:paediatrics-neonatal"]
  - guid: "aMnO8pQrStuVwXyZ"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::ROUTINE CARE AND FOLLOW UP OF THE NEWBORN"
    fields:
      Front: "How long should antibiotics be given if infection is confirmed?"
      Back: "For 5 days"
    tags: ["antibiotics", "infection-treatment", "subject:paediatrics-neonatal"]
  - guid: "bAbC9dEfGhIjKlMn"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::ROUTINE CARE AND FOLLOW UP OF THE NEWBORN"
    fields:
      Front: "What is the dosage of multivitamin drops and when should it start?"
      Back: "0.6 ml daily from 5 days if feeding is well established"
    tags: ["supplements", "vitamins", "dosing", "subject:paediatrics-neonatal"]
  - guid: "cOpQ0rStuVwXyZaB"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::ROUTINE CARE AND FOLLOW UP OF THE NEWBORN"
    fields:
      Front: "What vitamin D content must be in multivitamin preparations for newborns?"
      Back: "400 IU vitamin D daily"
    tags: ["supplements", "vitamins", "dosing", "subject:paediatrics-neonatal"]
  - guid: "dCdE1fGhIjKlMnOp"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::ROUTINE CARE AND FOLLOW UP OF THE NEWBORN"
    fields:
      Front: "Which babies require separate vitamin D supplementation?"
      Back: "Babies <1.5 kg should receive vitamin D 400 IU daily"
    tags: ["supplements", "vitamins", "dosing", "lbw", "subject:paediatrics-neonatal"]
  - guid: "eQrS2tUvWxYzAbCd"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::ROUTINE CARE AND FOLLOW UP OF THE NEWBORN"
    fields:
      Front: "What is the dosage of ferrous lactate (Ferrodrops) and when should it start?"
      Back: "0.6 ml ferrous lactate daily from 14 days if the baby is feeding"
    tags: ["supplements", "iron", "dosing", "subject:paediatrics-neonatal"]
  - guid: "fEfG3hIjKlMnOpQr"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::ROUTINE CARE AND FOLLOW UP OF THE NEWBORN"
    fields:
      Front: "What measurements should be charted daily on the baby record?"
      Back: "Daily weight"
    tags: ["monitoring", "growth", "subject:paediatrics-neonatal"]
  - guid: "gStU4vWxYzAbCdEf"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::ROUTINE CARE AND FOLLOW UP OF THE NEWBORN"
    fields:
      Front: "What measurements should be charted weekly on the baby record?"
      Back: "Head circumference and haemoglobin (Hb)"
    tags: ["monitoring", "growth", "subject:paediatrics-neonatal"]
  - guid: "hGhI5jKlMnOpQrSt"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::ROUTINE CARE AND FOLLOW UP OF THE NEWBORN"
    fields:
      Front: "What administrative checks are required prior to discharge?"
      Back: "1. Immunizations need to be given\n2. Details about birth and post-natal period recorded (Road to Health card and discharge summary)\n3. Dates for routine follow-up visits recorded\n4. Mother counselled on emergency signs and when to return"
    tags: ["discharge", "administrative", "subject:paediatrics-neonatal"]
  - guid: "iUvW6xYzAbCdEfGh"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::ROUTINE CARE AND FOLLOW UP OF THE NEWBORN"
    fields:
      Front: "What is the minimum weight requirement for discharge?"
      Back: "Weight 1.8 kg or more"
    tags: ["discharge", "criteria", "subject:paediatrics-neonatal"]
  - guid: "jIjK7lMnOpQrStuV"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::ROUTINE CARE AND FOLLOW UP OF THE NEWBORN"
    fields:
      Front: "What KMC score is required for discharge in breastfeeding babies?"
      Back: "KMC score >19"
    tags: ["discharge", "criteria", "kmc", "subject:paediatrics-neonatal"]
  - guid: "kWxY8zAbCdEfGhIj"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::ROUTINE CARE AND FOLLOW UP OF THE NEWBORN"
    fields:
      Front: "What is the apnoea requirement for discharge?"
      Back: "No apnoea for at least 7 days and no longer on theophylline"
    tags: ["discharge", "apnoea", "subject:paediatrics-neonatal"]
  - guid: "lKlM9nOpQrStuVwX"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::ROUTINE CARE AND FOLLOW UP OF THE NEWBORN"
    fields:
      Front: "What feeding criteria must be met prior to discharge?"
      Back: "Adequate weight gain and appropriate feeding"
    tags: ["discharge", "feeding", "subject:paediatrics-neonatal"]
  - guid: "mYzA0bCdEfGhIjKl"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::ROUTINE CARE AND FOLLOW UP OF THE NEWBORN"
    fields:
      Front: "What HIV-related requirement must be met before discharge?"
      Back: "HIV status must be known and, if positive, antiretrovirals must be prescribed"
    tags: ["discharge", "hiv", "subject:paediatrics-neonatal"]
  - guid: "nMnO1pQrStuVwXyZ"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::ROUTINE CARE AND FOLLOW UP OF THE NEWBORN"
    fields:
      Front: "What supplement requirement must be met before discharge?"
      Back: "Iron and multivitamin supplements must be prescribed"
    tags: ["discharge", "supplements", "subject:paediatrics-neonatal"]
  - guid: "oAbC2dEfGhIjKlMn"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::ROUTINE CARE AND FOLLOW UP OF THE NEWBORN"
    fields:
      Front: "List discharge criteria for a normal, well term baby"
      Back: "1. Mother is well\n2. Mother is coping well with baby\n3. Baby is well\n4. Baby is feeding well (preferably breastfeeding)\n5. If birth weight <2.5 kg, mother practising KMC"
    tags: ["discharge", "criteria", "term-baby", "subject:paediatrics-neonatal"]
  - guid: "pOpQ3rStuVwXyZaB"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::ROUTINE CARE AND FOLLOW UP OF THE NEWBORN"
    fields:
      Front: "List discharge criteria for a small or sick baby"
      Back: "1. Baby is no longer sick\n2. Baby has been growing well (weight loss <10% of birth weight, weight gain ≥10 g/kg/day)\n3. Baby is feeding well\n4. Mother is well\n5. Mother is coping well with baby and feeding\n6. Mother is practising KMC\n7. KMC score is adequate"
    tags: ["discharge", "criteria", "small-sick-baby", "subject:paediatrics-neonatal"]
  - guid: "qCdE4fGhIjKlMnOp"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::ROUTINE CARE AND FOLLOW UP OF THE NEWBORN"
    fields:
      Front: "Which conditions warrant a PHC clinic visit?"
      Back: "1. Discharge from eyes\n2. Umbilical sepsis (especially with pus draining and red skin around umbilicus)\n3. Septic skin lesions (usually pustules)\n4. Jaundice"
    tags: ["follow-up", "phc-clinic", "subject:paediatrics-neonatal"]
  - guid: "rQrS5tUvWxYzAbCd"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::ROUTINE CARE AND FOLLOW UP OF THE NEWBORN"
    fields:
      Front: "Which conditions warrant a hospital visit?"
      Back: "1. Baby not taking feeds well or not suckling well\n2. Convulsions\n3. Rapid breathing\n4. Diarrhoea\n5. Bleeding"
    tags: ["follow-up", "hospital-referral", "subject:paediatrics-neonatal"]
  - guid: "sEfG6hIjKlMnOpQr"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::ROUTINE CARE AND FOLLOW UP OF THE NEWBORN"
    fields:
      Front: "Which babies require routine follow-up after discharge?"
      Back: "1. Less than 2 kg\n2. Sepsis, NEC or meningitis\n3. Encephalopathy\n4. Severe jaundice\n5. Congenital abnormalities\n6. Hypoglycaemia\n7. IPPV or CPAP"
    tags: ["follow-up", "high-risk", "subject:paediatrics-neonatal"]
  - guid: "tStU7vWxYzAbCdEf"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::ROUTINE CARE AND FOLLOW UP OF THE NEWBORN"
    fields:
      Front: "What components are assessed during follow-up visits?"
      Back: "1. Growth parameters\n2. Neurodevelopment and milestones\n3. Feeding history\n4. Social grants and care dependency grants\n5. New problems and parental concerns\n6. Outstanding investigations\n7. ROP and audiology screening/follow-up\n8. Referral to physiotherapy, OT, speech, or dietician\n9. HIV - repeated PCR"
    tags: ["follow-up", "assessment", "subject:paediatrics-neonatal"]
  - guid: "uGhI8jKlMnOpQrSt"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::ROUTINE CARE AND FOLLOW UP OF THE NEWBORN"
    fields:
      Front: "Why is early poor feeding considered significant in sick newborns?"
      Back: "Poor feeding is often an early sign of severe illness"
    tags: ["clinical-signs", "feeding", "subject:paediatrics-neonatal"]
  - guid: "vUvW9xYzAbCdEfGh"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::ROUTINE CARE AND FOLLOW UP OF THE NEWBORN"
    fields:
      Front: "What is the target acceptable weight loss in small/sick babies?"
      Back: "Less than 10% of birth weight"
    tags: ["growth", "discharge-criteria", "subject:paediatrics-neonatal"]
  - guid: "wIjK0lMnOpQrStuV"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::ROUTINE CARE AND FOLLOW UP OF THE NEWBORN"
    fields:
      Front: "What is the target weight gain rate for small/sick babies?"
      Back: "At least 10 g/kg/day"
    tags: ["growth", "discharge-criteria", "subject:paediatrics-neonatal"]
