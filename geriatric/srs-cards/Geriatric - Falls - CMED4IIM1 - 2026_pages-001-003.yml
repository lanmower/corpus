- id: falls-prevalence-65
  front: What is the prevalence of falls in adults aged 65+ in the previous year?
  back: Over 30% of adults age 65 years and above report to have fallen in the previous year.
- id: falls-prevalence-75
  front: What percentage of adults aged 75+ report falls in the previous two years?
  back: Up to 75% of adults will report to have fallen in the previous two years.
- id: falls-nursing-home
  front: What is the annual fall rate in old age homes?
  back: 50% per year, with half of these having recurrent falls (more than one fall per year).
- id: falls-acute-illness
  front: What percentage of falls are associated with acute illness?
  back: 10% of falls are capturing an acute illness.
- id: falls-serious-injury
  front: What percentage of falls result in serious injuries or fractures?
  back: 10% of falls are associated with serious injuries, with fractures occurring in 5% of individuals who have fallen.
- id: falls-fear
  front: What proportion of patients who fall report fear of falling?
  back: Over one third of patients who have fallen report fear of falling, regardless of whether they had an injury.
- id: falls-factors
  front: What are the three categories of factors that cause falls in older people?
  back: Extrinsic (environmental), intrinsic (physiological), and situational factors.
- id: posture-control-components
  front: What are the main components needed to maintain postural control?
  back: Motor coordination (frontal lobe, motor cortex, basal ganglia, cerebellar integration), sensory inputs (visual, vestibular, proprioception), biomechanics (skeletal integrity, joint stability, muscle strength).
- id: vision-falls
  front: How does vision contribute to fall prevention?
  back: Vision allows individuals to see where they are going. Blindness or deterioration in vision increases fall risk.
- id: vestibular-balance
  front: What is the role of the vestibular system in fall prevention?
  back: The vestibular system is necessary for balance. Vestibular dysfunction increases fall risk.
- id: postural-hypotension
  front: How does postural hypotension relate to falls in elderly patients?
  back: Patients with postural hypotension tend to fall, especially if they experience dizziness or syncope.
- id: cardiac-syncope-falls
  front: What is the relationship between cardiac syncope and falls?
  back: Dizziness or syncope from cardiac causes increases fall risk in elderly patients.
- id: musculoskeletal-falls
  front: How do musculoskeletal problems contribute to falls?
  back: Pain, deformity, or loss of function in joints, bones, and feet increase fall risk.
- id: cns-dementia-falls
  front: Why do patients with dementia and delirium have increased fall risk?
  back: Central nervous system dysfunction in dementia and delirium impairs cognitive and motor control, leading to falls.
- id: drugs-falls
  front: How do medications increase fall risk?
  back: Drugs can cause sedation, dizziness, confusion, affecting the central nervous system and balance.
- id: stroke-falls
  front: How does stroke increase fall risk?
  back: Stroke can cause hemiplegia or hemiparesis, which impairs motor control and balance.
- id: neurological-falls
  front: What neurological conditions increase fall risk?
  back: Seizures, pyramidal symptoms, cerebral dysfunction, spasticity, paraplegia, paraparesis, and sensory abnormalities.
- id: muscle-weakness-falls
  front: How does muscle weakness increase fall risk?
  back: Myopathies and peripheral neuropathy cause muscle weakness, impairing balance and strength needed for safe movement.
- id: fall-assessment-history
  front: What is the importance of detailed history in fall assessment?
  back: A detailed history helps identify exact circumstances of the fall, previous falls, use of assistive devices, and associated symptoms.
- id: assistive-devices-assessment
  front: What assistive devices should be assessed during fall evaluation?
  back: Walking frames, walking sticks, glasses, and hearing aids - checking if they are being used properly.
- id: systemic-inquiry-falls
  front: What systems should be reviewed during detailed history of falls?
  back: Nervous system (confusion, seizures, weakness, hallucinations), cardiovascular system (chest pain, orthostatic symptoms), musculoskeletal (joint pain), and vision.
- id: medication-review-falls
  front: What should medication review include in fall assessment?
  back: Prescribed medications, over-the-counter medications, medications from others, self-made medications, and supplements.
- id: environmental-assessment-falls
  front: What does environmental assessment involve in fall prevention?
  back: 'Assessment by physiotherapist of home hazards: loose rugs, cords, baby toys, pets, and identification of environmental modifications like rails and mats.'
- id: timed-up-go-test
  front: What is the Timed Up and Go test and what does it measure?
  back: Patient sits, stands without holding on, walks 3 meters, turns, and sits down. Assesses proximal muscle strength, gait, arm swing, turning ability, and walking speed.
- id: tug-timing-risk
  front: What Timed Up and Go test times indicate fall risk?
  back: Less than 10 seconds indicates freely mobile with lower fall risk. More than 30 seconds indicates impaired mobility and higher fall risk.
- id: turning-steps-falls
  front: What is the significance of steps taken during turning in fall assessment?
  back: Less than 3 steps to turn indicates lower fall risk. More than 3 steps indicates higher risk of falling.
- id: fall-prevention-exercise
  front: What types of exercise are beneficial for fall prevention?
  back: Tai Chi and Yoga (likely referred to as "Rekhae") improve muscle strength and postural reflexes.
- id: fall-prevention-general
  front: What are the main prevention strategies for falls in older adults?
  back: Improvement of postural reflexes and muscle strength through exercise, walking aids, proper footwear, foot care, prevention and treatment of osteoporosis.
- id: high-risk-fall-patients
  front: Who are considered high-risk fall patients requiring comprehensive geriatric assessment?
  back: Patients with falls and injury, recurrent falls in the previous year, or a single fall with abnormal gait.
- id: multidisciplinary-fall-team
  front: What professionals are needed in a multidisciplinary fall management team?
  back: Physiotherapist, medical team, occupational therapist, and other allied health professionals depending on patient need.
- id: physiotherapist-falls-role
  front: What is the role of physiotherapist in fall management?
  back: Strength and balance training, assessment of assistive device needs, addressing fear of falling, and behavioral modification.
- id: medical-team-falls-role
  front: What is the role of the medical team in fall management?
  back: Manage contributory medical problems, conduct medication review, and stop medications that increase fall risk.
- id: occupational-therapist-falls
  front: What is the role of occupational therapist in fall management?
  back: Modify the environment to minimize risk, educate patient on home safety, and address situational factors.
- id: alcohol-falls-management
  front: How should alcohol use be addressed in fall management?
  back: Alcohol history should be documented and addressed as a situational factor in comprehensive fall management.
