- id: kidney-replacement-1
  front: "What is the annual cost of treating a patient with kidney failure requiring dialysis?"
  back: "Approximately half a million per year per patient."
  topic:
    - Kidney Replacement Therapy
    - Cost

- id: kidney-replacement-2
  front: "What is the estimated number of patients requiring dialysis annually in a single province?"
  back: "5,000 to 10,000 patients per year, with potential to double by the end of the decade."
  topic:
    - Epidemiology
    - Kidney Replacement Therapy

- id: kidney-replacement-3
  front: "What is the key differentiating feature for patients eligible for dialysis under the national chronic renal dialysis program?"
  back: "They must be transplantable within a state center."
  topic:
    - Kidney Replacement Therapy
    - Transplantation

- id: kidney-replacement-4
  front: "What are the three main types of kidney replacement therapy?"
  back: "1) Hemodialysis (machine-based), 2) Peritoneal dialysis (patient self-managed), 3) Kidney transplantation."
  topic:
    - Kidney Replacement Therapy

- id: kidney-replacement-5
  front: "How does dialysis work? Describe the principle of dialysis."
  back: "Blood containing uremic toxins, high potassium, and phosphate flows through a dialyzer in counter-current fashion to dialysis fluid. A membrane allows uremic toxins and electrolytes to move across while proteins remain. Excess water is removed by ultrafiltration."
  topic:
    - Hemodialysis
    - Mechanism

- id: kidney-replacement-6
  front: "What factors affect the rate of diffusion in dialysis?"
  back: "Temperature of solution (proportional) and viscosity/molecular size (inversely proportional). Membrane characteristics with larger pores have faster diffusion rates."
  topic:
    - Hemodialysis
    - Physiology

- id: kidney-replacement-7
  front: "What is dialyzed versus not dialyzed in blood?"
  back: "Only the free fraction of solutes is dialyzed. Protein-bound solutes are not dialyzed."
  topic:
    - Hemodialysis
    - Physiology

- id: kidney-replacement-8
  front: "What are the indications for acute hemodialysis?"
  back: "Acute kidney injury with: acute fluid overload (especially with pulmonary edema), severe metabolic acidosis (HCO3 <10), severe hyperkalemia (>6.5), uremic encephalopathy with seizures/confusion, uremic pericarditis, or need to remove toxins (methanol, ethylene glycol)."
  topic:
    - Hemodialysis
    - Indications

- id: kidney-replacement-9
  front: "What are the indications for chronic hemodialysis?"
  back: "Chronic kidney disease with: long-standing malaise, nausea, weight loss, malnutrition, hypertension, or GFR persistently less than 15 mL/min."
  topic:
    - Hemodialysis
    - Indications

- id: kidney-replacement-10
  front: "Describe the process of hemodialysis step by step."
  back: "Blood leaves through an access site, enters a blood pump, flows through a filter with dialysate in counter-current direction, allowing diffusion of solutes and removal of uremic toxins, electrolytes, and water. Filtered blood is returned to the body."
  topic:
    - Hemodialysis
    - Procedure

- id: kidney-replacement-11
  front: "How long is a typical hemodialysis session and what percentage of normal kidney function does it provide?"
  back: "Each session lasts approximately 4 hours and provides about 5% of the kidney function normally expected. GFR after hemodialysis is about 5 mL/min."
  topic:
    - Hemodialysis
    - Effectiveness

- id: kidney-replacement-12
  front: "What are the different types of hemodialysis access?"
  back: "Temporary: hemodialysis catheter. Permanent: tunneled hemodialysis catheter, venous fistulas (native vein-to-vein), or synthetic grafts."
  topic:
    - Hemodialysis
    - Vascular Access

- id: kidney-replacement-13
  front: "How does peritoneal dialysis work?"
  back: "High concentration glucose solution is infused into the peritoneal cavity via a catheter. After 4-6 hours, effluent drains by gravity into a collection bag. Patients perform approximately 4 exchanges daily continuously throughout the week."
  topic:
    - Peritoneal Dialysis
    - Procedure

- id: kidney-replacement-14
  front: "What physiologic processes occur in peritoneal dialysis?"
  back: "Diffusion (high to low concentration), osmosis, and ultrafiltration occur across the peritoneal membrane at a slower rate than hemodialysis."
  topic:
    - Peritoneal Dialysis
    - Physiology

- id: kidney-replacement-15
  front: "What are the advantages of peritoneal dialysis compared to hemodialysis?"
  back: "Residual kidney function is preserved longer, ability to pass urine is maintained, more readily available (not limited by machine availability), less hospital time, and patients become more empowered and aware of treatment. However, more upfront training is required."
  topic:
    - Peritoneal Dialysis
    - Advantages

- id: kidney-replacement-16
  front: "What types of catheters are used for peritoneal dialysis?"
  back: "Temporary: stink catheter for acute peritoneal dialysis. Permanent: permanent tank catheter for continuous ambulatory peritoneal dialysis (CAPD)."
  topic:
    - Peritoneal Dialysis
    - Access

- id: kidney-replacement-17
  front: "When was kidney transplantation first performed and by whom?"
  back: "1954 by Joseph Murray and colleagues, who won the Nobel Prize in 1990 for this achievement."
  topic:
    - Kidney Transplantation
    - History

- id: kidney-replacement-18
  front: "What is the five-year survival rate for kidney transplants in countries like the UK?"
  back: "Approximately 87%."
  topic:
    - Kidney Transplantation
    - Outcomes

- id: kidney-replacement-19
  front: "What are the sources of donor kidneys for transplantation?"
  back: "Live-related donor (primary relative), live-unrelated donor (friend), or cadaveric donor (brain-dead individual)."
  topic:
    - Kidney Transplantation
    - Donor Types

- id: kidney-replacement-20
  front: "What are the benefits of kidney transplantation?"
  back: "1) Improved patient survival compared to dialysis, 2) Prevents metabolic consequences of CKD (uremia, vitamin D, immunometabolism), 3) Significantly improves quality of life for patient and family, 4) More cost-effective than dialysis after the first year."
  topic:
    - Kidney Transplantation
    - Benefits

- id: kidney-replacement-21
  front: "What are the requirements and considerations for kidney transplantation?"
  back: "Extensive clinical suitability assessment, cross-matching between donor and recipient, assessment of viral status, post-transplant immunosuppression management, and monitoring for infections and chronic graft disease."
  topic:
    - Kidney Transplantation
    - Requirements

- id: kidney-replacement-22
  front: "Where is the transplanted kidney placed anatomically?"
  back: "In an extraperitoneal position. The blood vessels and ureter are attached to the native kidneys and the ureter drains into the bladder."
  topic:
    - Kidney Transplantation
    - Surgical Technique

- id: kidney-replacement-23
  front: "What are the statistics for kidney replacement therapy in South Africa (2017)?"
  back: "278 dialysis and transplantation centers total, only 30 in the public sector. Approximately 10,000 patients on kidney replacement therapy. Per million population ratio of 190. 71% of patients on hemodialysis. 260 kidney transplants performed in 2017, mostly in private sector."
  topic:
    - Kidney Replacement Therapy
    - Epidemiology
    - South Africa

- id: kidney-replacement-24
  front: "What is the most effective way to prevent the need for renal replacement therapy?"
  back: "Prevent patients from developing end-stage kidney disease by managing risk factors and causes, recognizing and treating conditions like diabetes, hypertension, infections, obstructions, and congenital diseases."
  topic:
    - Kidney Disease Prevention

- id: kidney-replacement-25
  front: "What is conservative or palliative care for end-stage kidney disease patients?"
  back: "Care for patients who cannot benefit from dialysis or transplantation. Management includes blood pressure control, anemia treatment, hypocalcemia treatment, symptom control, and referral to palliative care structures. These patients may sometimes live longer than those on dialysis."
  topic:
    - Conservative Management
    - Palliative Care
    - End-stage Kidney Disease
