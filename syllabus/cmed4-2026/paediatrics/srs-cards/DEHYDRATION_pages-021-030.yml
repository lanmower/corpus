    deck: "Corpus::Paediatrics::DEHYDRATION"
    fields:
      Front: "What are the key considerations in severe malnutrition and fluid management?"
      Back: "Children with severe malnutrition have precarious metabolic and circulatory status far more than other children. Fluid and sodium handling differs: slower rehydration rates are safer (10ml/kg/hr over 8 hours vs standard 10ml/kg/hr over 4 hours). Glucose status must be monitored and managed as hypoglycemia is a major risk."
    tags: ["dehydration", "malnutrition", "fluids", "subject:paediatrics"]
  - guid: h8i9j0k1l2m3n4o5
    noteType: Basic
    deck: "Corpus::Paediatrics::DEHYDRATION"
    fields:
      Front: "When is shock assessment required in dehydration management?"
      Back: "Assess for shock (ETAT criteria) before initiating rehydration plans. Look for cold hands, capillary refill time 3 seconds or more, and weak/fast pulse. Shock requires fluid bolus therapy before continuing standard rehydration."
    tags: ["dehydration", "shock", "assessment", "subject:paediatrics"]
  - guid: i9j0k1l2m3n4o5p6
    noteType: Basic
    deck: "Corpus::Paediatrics::DEHYDRATION"
    fields:
      Front: "What special monitoring is needed during fluid bolus administration?"
      Back: "While fluid bolus is being administered: treat hypoglycemia with 5 ml/kg 10% dextrose if glucose less than 3 mmol/L; give IV antibiotics if not already given; measure pulse and breathing rate frequently; observe for signs of congestive cardiac failure."
    tags: ["dehydration", "shock", "monitoring", "subject:paediatrics"]
