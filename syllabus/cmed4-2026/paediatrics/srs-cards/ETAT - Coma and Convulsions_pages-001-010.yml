      Front: "What are the clinical features of a child who is convulsing?"
      Back: "Sudden loss of consciousness + uncontrolled jerky movements of limbs and/or face, stiffening of arms and legs, uncontrolled movements, twitching of face/hands/feet, abnormal eye movements, brief apnoeas"
