    deck: "Corpus::Paediatrics::Emergency care - the seriously ill child"
    fields:
      Front: "What is triage according to the lecture definition?"
      Back: "Triage is a sorting process. It aims to be quick and find life-threatening problems. Triage is NOT making a diagnosis."
    tags: ["triage", "definition", "emergency", "subject:paediatrics"]

  - guid: "n5g2h7a3c9b1f4e8"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::Emergency care - the seriously ill child"
    fields:
      Front: "What does ETAT stand for?"
      Back: "E = Emergency, T = Triage, A = Assessment, T = Treatment"
    tags: ["triage", "etat", "system", "subject:paediatrics"]

  - guid: "o7d4b1e6a2f9c3h5"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::Emergency care - the seriously ill child"
    fields:
      Front: "What is the ETAT system equivalent abbreviated as for triage assessment?"
      Back: "ABCC-C-D: A = Airway, B = Breathing, C = Circulation, C = Coma, C = Convulsion, D = Dehydration"
    tags: ["abcd", "etat", "assessment", "subject:paediatrics"]

  - guid: "p9e1a4f7d2c6b8g3"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::Emergency care - the seriously ill child"
    fields:
      Front: "How do you assess if a child's airway is patent?"
      Back: "Check: Is the child breathing? Is there noisy breathing (secretions, stridor, snoring, grunting)? Is the child blue?"
    tags: ["airway", "assessment", "abcd", "subject:paediatrics"]

  - guid: "q3h6c5b9a1g7f2e4"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::Emergency care - the seriously ill child"
    fields:
      Front: "What are signs of severe respiratory distress in children?"
      Back: "Fast breathing, severe chest-indrawing, grunting, difficulty feeding, and signs the child is getting tired"
    tags: ["breathing", "respiratory-distress", "assessment", "subject:paediatrics"]

  - guid: "r4f2e8a3d5g9c1b6"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::Emergency care - the seriously ill child"
    fields:
      Front: "What are the key assessment questions for airway and breathing?"
      Back: "1. Is the child breathing?\n2. Is the airway obstructed?\n3. Is the child blue?\n4. Does the child have severe respiratory distress?"
    tags: ["airway", "breathing", "assessment", "subject:paediatrics"]

  - guid: "s6b4a7f1c8h3e9d2"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::Emergency care - the seriously ill child"
    fields:
      Front: "How do you assess circulation in a seriously ill child?"
      Back: "Check: Does the child have warm hands? If not, is capillary refill >2 seconds? Is the pulse weak and fast?"
    tags: ["circulation", "assessment", "abcd", "subject:paediatrics"]

  - guid: "t8c1d9g5a6b2f4e3"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::Emergency care - the seriously ill child"
    fields:
      Front: "What is the AVPU scale for assessing consciousness?"
      Back: "A = Alert, V = responds to Voice, P = responds to Pain, U = Unresponsive. Responds only to Pain or Unresponsive = 'coma'"
    tags: ["consciousness", "coma", "assessment", "subject:paediatrics"]

  - guid: "u2e7h3f5b9a1c6d4"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::Emergency care - the seriously ill child"
    fields:
      Front: "What are subtle signs of convulsion in neonates that may not be obvious?"
      Back: "Eye flickering or deviation, hand or foot movements, mouth movements, repetitive movements, apnoea"
    tags: ["convulsion", "seizure", "neonatal", "subject:paediatrics"]

  - guid: "v5a3g1f8d4c9b2e6"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::Emergency care - the seriously ill child"
    fields:
      Front: "How do you assess severe dehydration in a child with diarrhoea?"
      Back: "Check: Is the child lethargic or unconscious? Does the child have sunken eyes? Does the skin pinch go back very slowly?"
    tags: ["dehydration", "fluid-loss", "assessment", "subject:paediatrics"]

