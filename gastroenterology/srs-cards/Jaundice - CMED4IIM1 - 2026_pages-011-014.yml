deck: "Corpus::Gastroenterology::Jaundice"
notes:
  - guid: d244a593cb9de5d6
    noteType: Basic
    deck: "Corpus::Gastroenterology::Jaundice"
    fields:
      Front: "What do the INR and albumin indicate about liver function?"
      Back: "INR and albumin indicate the synthetic function of the liver. These are better markers of liver function than transaminases (ALT, AST) or alkaline phosphatase, which indicate where injury may be located (hepatic vs cholestatic) rather than overall function."
    tags: ["subject:gastroenterology"]
  - guid: 901cd767a8cf559c
    noteType: Basic
    deck: "Corpus::Gastroenterology::Jaundice"
    fields:
      Front: "How do you interpret liver function tests (LFT)?"
      Back: "When interpreting LFT, classify the pattern into three groups: hepatitic (predominant ALT/AST elevation indicating cellular destruction), cholestatic (alkaline phosphatase elevation), or mixed. Use the degree of enzyme elevation to distinguish between these patterns."
    tags: ["subject:gastroenterology"]
  - guid: c272982adf0310eb
    noteType: Basic
    deck: "Corpus::Gastroenterology::Jaundice"
    fields:
      Front: "What is the R-value and what is its primary use?"
      Back: "The R-value is a formula used to classify patients into cholestatic vs hepatitic patterns of LFT. Originally developed primarily for drug-induced liver injury research, but is increasingly being used clinically for various etiologies."
    tags: ["subject:gastroenterology"]
  - guid: 6754c301d4628efc
    noteType: Basic
    deck: "Corpus::Gastroenterology::Jaundice"
    fields:
      Front: "What imaging modalities are available for evaluating jaundice?"
      Back: "Transabdominal ultrasound is the standard starting point. Additional modalities include CT scan, endoscopic ultrasound (EUS), magnetic resonance cholangiopancreatogram (MRCP), ERCP (performed with therapeutic intent), and sometimes liver biopsy for specific diagnoses like autoimmune hepatitis."
    tags: ["subject:gastroenterology"]
  - guid: f1bb9613cd87eca8
    noteType: Basic
    deck: "Corpus::Gastroenterology::Jaundice"
    fields:
      Front: "Why is ERCP only performed with therapeutic intent?"
      Back: "ERCP carries significant risks including acute pancreatitis, bowel injury, and hemorrhage. It is not routinely used for diagnosis alone but rather when intervention is needed, such as stent placement for strictures or stone extraction."
    tags: ["subject:gastroenterology"]
  - guid: 8f43057394e3884d
    noteType: Basic
    deck: "Corpus::Gastroenterology::Jaundice"
    fields:
      Front: "What is fibroscan and what techniques does it use?"
      Back: "Fibroscan is an ultrasound-based technique that assesses organ stiffness to determine if a patient is progressing toward cirrhosis. Uses vibration-controlled elastography or shear wave elastography. Increasingly standard in liver disease management."
    tags: ["subject:gastroenterology"]
  - guid: 924c584e7ec43857
    noteType: Basic
    deck: "Corpus::Gastroenterology::Jaundice"
    fields:
      Front: "What does cholestasis mean in terms of lab findings?"
      Back: "Cholestasis means an increase in alkaline phosphatase and gamma-glutamyl transferase, with or without an increase in bilirubin. Cholestasis can exist without jaundice if bilirubin is not elevated."
    tags: ["subject:gastroenterology"]
  - guid: 8c3abdd14d1cc10a
    noteType: Basic
    deck: "Corpus::Gastroenterology::Jaundice"
    fields:
      Front: "What is the key distinction between intrahepatic and extrahepatic cholestasis?"
      Back: "Intrahepatic cholestasis: obstruction at the level of the liver parenchyma, not visible on imaging (ultrasound/CT). Extrahepatic cholestasis: obstruction in the bile duct system outside the liver, typically shows bile duct dilatation on imaging."
    tags: ["subject:gastroenterology"]
  - guid: 256817b62b8f3d60
    noteType: Basic
    deck: "Corpus::Gastroenterology::Jaundice"
    fields:
      Front: "What are causes of acute hepatic jaundice?"
      Back: "Causes include viral hepatitis, drug-induced liver injury, alcohol, autoimmune hepatitis, aminita (death cap mushroom), Wilson's disease (copper overload from ATP-7B gene mutation), and hemolytic causes."
    tags: ["subject:gastroenterology"]
  - guid: f13e678a256b999d
    noteType: Basic
    deck: "Corpus::Gastroenterology::Jaundice"
    fields:
      Front: "Why are Wilson's disease and hereditary hemochromatosis important to diagnose?"
      Back: "These are among the few etiologies of jaundice that are reversible or can be stabilized with treatment if diagnosed early. Wilson's disease involves copper overload; hemochromatosis involves iron overload."
    tags: ["subject:gastroenterology"]
  - guid: 9e66b15cb5ce7d8d
    noteType: Basic
    deck: "Corpus::Gastroenterology::Jaundice"
    fields:
      Front: "What causes of chronic hepatic jaundice should be considered?"
      Back: "Cirrhosis from various etiologies, non-alcoholic fatty liver disease (NAFLD, now called steatotic liver disease), alpha-1 antitrypsin deficiency, large tumor burden in liver, hepatic ischemia from hepatic vein or IVC occlusion (Budd-Chiari syndrome)."
    tags: ["subject:gastroenterology"]
  - guid: a90251da3cea635e
    noteType: Basic
    deck: "Corpus::Gastroenterology::Jaundice"
    fields:
      Front: "What are causes of intrahepatic cholestasis?"
      Back: "Include primary sclerosing cholangitis (PSC), AIDS-cholangiopathy, drug-induced liver injury, progressive familial intrahepatic cholestasis, benign recurrent intrahepatic cholestasis, infiltrative etiologies (granulomas, sarcoid, tumors), and primary biliary cholangitis."
    tags: ["subject:gastroenterology"]
  - guid: c1a4f6d086983fe5
    noteType: Basic
    deck: "Corpus::Gastroenterology::Jaundice"
    fields:
      Front: "What infiltrative etiologies can cause intrahepatic cholestasis?"
      Back: "Granulomas from tuberculosis or sarcoidosis, and tumors (either primary hepatic tumors or secondary spread from lymphoma, colorectal cancer). These cause cholestasis by infiltrating the liver parenchyma with focal lesions."
    tags: ["subject:gastroenterology"]
  - guid: cd0e20be81a3178f
    noteType: Basic
    deck: "Corpus::Gastroenterology::Jaundice"
    fields:
      Front: "What are causes of extrahepatic cholestasis?"
      Back: "Include strictures (benign or malignant), PSC strictures, pancreatic cancer, chronic pancreatitis, choledocholithiasis (bile duct stones), lymph nodes obstructing bile ducts, ascaris worms (rare), and iatrogenic bile duct injury during gallbladder surgery."
    tags: ["subject:gastroenterology"]
  - guid: 57e8f284b5aca7b1
    noteType: Basic
    deck: "Corpus::Gastroenterology::Jaundice"
    fields:
      Front: "What imaging findings indicate extrahepatic cholestasis?"
      Back: "Bile duct dilatation is the classic sign. Specific lesions include stones (hyperechoic with acoustic shadowing on ultrasound), strictures, and masses. Absence of dilatation does not exclude obstruction, especially with small lesions or early/shifting stones."
    tags: ["subject:gastroenterology"]
  - guid: b61d24c765f8227e
    noteType: Basic
    deck: "Corpus::Gastroenterology::Jaundice"
    fields:
      Front: "What are the features of primary sclerosing cholangitis (PSC) on imaging?"
      Back: "Characteristic \"onion skin\" ring fibrosis pattern on histology. Imaging shows irregular stricturing of intrahepatic bile ducts. Can affect intrahepatic and/or extrahepatic bile ducts. Multiple irregular areas of stricturing with focal dilation (beaded appearance)."
    tags: ["subject:gastroenterology"]
  - guid: 87a84c177e2410f3
    noteType: Basic
    deck: "Corpus::Gastroenterology::Jaundice"
    fields:
      Front: "Why is MRCP sufficient for PSC diagnosis?"
      Back: "MRCP provides excellent visualization of the bile duct anatomy and is sufficient for PSC diagnosis. ERCP is reserved for therapeutic interventions like stricture ballooning, as it adds unnecessary procedural risk without additional diagnostic benefit."
    tags: ["subject:gastroenterology"]
  - guid: 00faf84b79fedd49
    noteType: Basic
    deck: "Corpus::Gastroenterology::Jaundice"
    fields:
      Front: "What systemic signs can accompany primary biliary cholangitis and PSC?"
      Back: "Xanthomas and xanthelasmas can be seen in patients with long-standing cholestasis. Malabsorption of fat-soluble vitamins may occur due to impaired bile flow."
    tags: ["subject:gastroenterology"]
  - guid: 9f7487d37af1df06
    noteType: Basic
    deck: "Corpus::Gastroenterology::Jaundice"
    fields:
      Front: "What scoring systems assess hepatic function and cirrhosis severity?"
      Back: "Child-Pugh score assesses liver synthetic function and includes INR, albumin, and bilirubin. MELD score (Model for End-stage Liver Disease) is more commonly used to stratify patients for transplant listing and assess severity of hepatic dysfunction."
    tags: ["subject:gastroenterology"]
  - guid: 0482872ab925f681
    noteType: Basic
    deck: "Corpus::Gastroenterology::Jaundice"
    fields:
      Front: "What is the systematic approach to a patient with jaundice?"
      Back: "Collection: gather history, examination findings, and appropriate investigations. Analysis: reflect on data, consider anatomy, physiology, and likely pathology. Synthesis: determine the most likely cause (clinical assessment). Action: proceed with definitive investigation (MRCP, biopsy) or treatment as indicated."
    tags: ["subject:gastroenterology"]
