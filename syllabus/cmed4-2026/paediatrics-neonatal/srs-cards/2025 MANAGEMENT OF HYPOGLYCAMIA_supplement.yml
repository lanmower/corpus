deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
notes:
  - guid: "nHypoGluc2025S_001"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "What is the specific blood glucose range for the asymptomatic well baby algorithm?"
      Back: "1.8–2.5 mmol/ℓ"
    tags: ["asymptomatic-hypoglycemia", "algorithm-threshold", "subject:paediatrics-neonatal", "supplement"]
  - guid: "nHypoGluc2025S_002"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "Why is it important to differentiate normal transitional glucose response from pathological hypoglycemia?"
      Back: "To avoid over-treatment of normal physiological drop in blood glucose after birth"
    tags: ["pathophysiology", "clinical-reasoning", "subject:paediatrics-neonatal", "supplement"]
  - guid: "nHypoGluc2025S_003"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "What statement is made about the exact blood glucose level and duration that causes brain injury in neonates?"
      Back: "Exact blood glucose levels and/or duration causing brain injury has not been established"
    tags: ["pathophysiology", "evidence-gaps", "subject:paediatrics-neonatal", "supplement"]
  - guid: "nHypoGluc2025S_004"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "How often should feeds be increased if glucose is not increasing but not decreasing in asymptomatic babies?"
      Back: "2-hourly feed frequency with daily volume increased by 20–30 ml/kg/day"
    tags: ["feed-adjustment", "management-algorithm", "subject:paediatrics-neonatal", "supplement"]
  - guid: "nHypoGluc2025S_005"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "What is the time limit for recent feeding before nasogastric tube milk can be given in severe hypoglycemia?"
      Back: "If not been fed within the previous 2 hours"
    tags: ["severe-hypoglycemia", "feeding-protocol", "subject:paediatrics-neonatal", "supplement"]
  - guid: "nHypoGluc2025S_006"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "What is the time threshold for considering glucagon if IV access cannot be established in severe hypoglycemia?"
      Back: "Delay beyond 30 minutes"
    tags: ["emergency-treatment", "time-critical", "subject:paediatrics-neonatal", "supplement"]
  - guid: "nHypoGluc2025S_007"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "What is the repeat interval for glucagon IM in severe hypoglycemia?"
      Back: "Can repeat after 20 minutes, maximum 1 mg total"
    tags: ["medication-dosing", "emergency-treatment", "subject:paediatrics-neonatal", "supplement"]
  - guid: "nHypoGluc2025S_008"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "What is the specific monitoring schedule after glucose reaches ≥2.6 mmol/ℓ in asymptomatic babies?"
      Back: "Hourly for 3 hours, then 3-hourly for 24 hours"
    tags: ["monitoring-frequency", "management-protocol", "subject:paediatrics-neonatal", "supplement"]
  - guid: "nHypoGluc2025S_009"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "What is the minimum dextrose concentration that should not be gone below when reducing parenteral glucose?"
      Back: "5% dextrose (do not reduce below 5%)"
    tags: ["hyperglycemia-treatment", "dextrose-limits", "subject:paediatrics-neonatal", "supplement"]
  - guid: "nHypoGluc2025S_010"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "What is the target parenteral glucose delivery rate when reducing from higher levels in hyperglycemia?"
      Back: "4–6 mg/kg/min"
    tags: ["hyperglycemia-treatment", "glucose-delivery", "subject:paediatrics-neonatal", "supplement"]
  - guid: "nHypoGluc2025S_011"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "What is the threshold for osmotic diuresis and polyuria in hyperglycemic neonates?"
      Back: "Plasma glucose >11 mmol/ℓ"
    tags: ["hyperglycemia", "physiology-threshold", "subject:paediatrics-neonatal", "supplement"]
  - guid: "nHypoGluc2025S_012"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "What persistent hyperglycemia level warrants specialist insulin consideration after dextrose reduction?"
      Back: "Persistent ≥12 mmol/ℓ despite reduction in dextrose concentration and/or volume"
    tags: ["hyperglycemia-treatment", "insulin-threshold", "subject:paediatrics-neonatal", "supplement"]
  - guid: "nHypoGluc2025S_013"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "What must be confirmed before starting insulin in neonatal hyperglycemia?"
      Back: "Confirm hyperglycemia with laboratory blood gas or lab measurement before starting insulin"
    tags: ["insulin-safety", "verification-protocol", "subject:paediatrics-neonatal", "supplement"]
  - guid: "nHypoGluc2025S_014"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "What criterion determines when neonatal diabetes should be referred for endocrinology?"
      Back: "When neonatal diabetes mellitus is considered as the underlying cause of persistent hyperglycemia"
    tags: ["hyperglycemia-investigation", "referral-criteria", "subject:paediatrics-neonatal", "supplement"]
  - guid: "nHypoGluc2025S_015"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "What specific corrective action must always be taken for symptomatic hypoglycemia?"
      Back: "Hypoglycemia should always be corrected in symptomatic babies"
    tags: ["principles", "symptomatic-treatment", "subject:paediatrics-neonatal", "supplement"]
  - guid: "nHypoGluc2025S_016"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "What is the clinical significance of persistent and prolonged hypoglycemia?"
      Back: "Persistent and prolonged hypoglycemia is pathological and may cause brain injury"
    tags: ["pathophysiology", "complications", "subject:paediatrics-neonatal", "supplement"]
  - guid: "nHypoGluc2025S_017"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "What is the primary concern with fluid volumes on day 1 of IV dextrose therapy?"
      Back: "Beware of fluid volumes >120 ml/kg/day on day 1"
    tags: ["fluid-management", "safety-parameter", "subject:paediatrics-neonatal", "supplement"]
  - guid: "nHypoGluc2025S_018"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "When should the cause of persistent hypoglycemia be identified?"
      Back: "After initial stabilization when hypoglycemia extends beyond 48 hours or requires parenteral glucose beyond 48 hours"
    tags: ["persistent-hypoglycemia", "etiology-timing", "subject:paediatrics-neonatal", "supplement"]
  - guid: "nHypoGluc2025S_019"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "What is the diagnostic criterion for sepsis evaluation in persistent hypoglycemia?"
      Back: "Blood culture and start broad spectrum antibiotics to consider sepsis"
    tags: ["persistent-hypoglycemia", "sepsis-workup", "subject:paediatrics-neonatal", "supplement"]
  - guid: "nHypoGluc2025S_020"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "What is the timing for obtaining critical samples in persistent hypoglycemia?"
      Back: "Blood obtained at the time the baby is hypoglycemic for serum glucose, insulin, and cortisol"
    tags: ["persistent-hypoglycemia", "critical-sampling", "subject:paediatrics-neonatal", "supplement"]
  - guid: "nHypoGluc2025S_021"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "When is a referral centre discussion mandatory in persistent hypoglycemia?"
      Back: "Discuss all babies with referral centre for advice and admission if unable to be managed at place of birth or presentation"
    tags: ["persistent-hypoglycemia", "referral-requirement", "subject:paediatrics-neonatal", "supplement"]
  - guid: "nHypoGluc2025S_022"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "What is the timeline for hyperinsulinism resolution in transient cases?"
      Back: "Usually transient, resolves in first few weeks of life"
    tags: ["hyperinsulinism", "prognosis-timeline", "subject:paediatrics-neonatal", "supplement"]
  - guid: "nHypoGluc2025S_023"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "What diagnostic feature characterizes hyperinsulinism?"
      Back: "Elevated insulin despite hypoglycemia"
    tags: ["hyperinsulinism", "diagnostic-criterion", "subject:paediatrics-neonatal", "supplement"]
  - guid: "nHypoGluc2025S_024"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "What is the route and frequency for diazoxide in hyperinsulinism?"
      Back: "Diazoxide 2–6 mg/kg/day IV or PO 8-hourly, requires specialist guidance"
    tags: ["medication-dosing", "hyperinsulinism-treatment", "subject:paediatrics-neonatal", "supplement"]
  - guid: "nHypoGluc2025S_025"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "What is the route and frequency for hydrochlorothiazide in hyperinsulinism?"
      Back: "Hydrochlorothiazide 1–3 mg/kg/dose PO 6–12 hourly, requires specialist guidance"
    tags: ["medication-dosing", "hyperinsulinism-treatment", "subject:paediatrics-neonatal", "supplement"]
  - guid: "nHypoGluc2025S_026"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "What is the requirement for discharge readiness in neonatal hypoglycemia?"
      Back: "Two normal pre-prandial blood glucose readings consecutively on full 8-hourly feeds"
    tags: ["discharge-criteria", "feeding-schedule", "subject:paediatrics-neonatal", "supplement"]
  - guid: "nHypoGluc2025S_027"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "What neurological investigation is recommended for severe hypoglycemia follow-up?"
      Back: "Brain MRI should be considered alongside neurodevelopmental follow-up at 20 weeks corrected gestational age"
    tags: ["follow-up", "neuroimaging", "subject:paediatrics-neonatal", "supplement"]
  - guid: "nHypoGluc2025S_028"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "What is the definition of extreme prematurity in the context of hyperglycemia discussion?"
      Back: "ELBW (extremely low birth weight) and VLBW (very low birth weight) infants who commonly develop hyperglycemia without always requiring intervention"
    tags: ["hyperglycemia", "preterm-population", "subject:paediatrics-neonatal", "supplement"]
  - guid: "nHypoGluc2025S_029"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "List clinical scenarios requiring hyperglycemia monitoring at 6–8 hourly intervals."
      Back: "Babies on IV glucose, ELBW infants, septic babies, intubated infants, those with intraventricular hemorrhage (IVH), or those on inotropes, steroids, or insulin"
    tags: ["hyperglycemia", "monitoring-indications", "subject:paediatrics-neonatal", "supplement"]
  - guid: "nHypoGluc2025S_030"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2025 MANAGEMENT OF HYPOGLYCAMIA"
    fields:
      Front: "What is the stepwise threshold for treating neonatal hyperglycemia?"
      Back: "Stepwise approach in babies with hyperglycemia >10 mmol/ℓ"
    tags: ["hyperglycemia", "treatment-initiation", "subject:paediatrics-neonatal", "supplement"]
