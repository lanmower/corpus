- front: "What are the two main categories of acute diabetes emergencies?"
  back: "Hyperglycemic emergencies (ketoacidosis and hyperosmolar hyperglycemic state) and hypoglycemic disorders."
  tags: ["diabetes", "acute-complications", "emergencies"]

- front: "List common precipitants of diabetic ketoacidosis in patients with established diabetes."
  back: "Omission of insulin and underlying illnesses (infections, myocardial infarction, vascular events)."
  tags: ["DKA", "precipitants", "etiology"]

- front: "What are the two major metabolic abnormalities in ketoacidosis pathogenesis?"
  back: "Insulin deficiency and glucagon excess."
  tags: ["DKA", "pathophysiology", "metabolism"]

- front: "What are the metabolic consequences of insulin deficiency?"
  back: "Reduced peripheral glucose uptake, increased hepatic gluconeogenesis, glycogen breakdown, hyperglycemia, osmotic diuresis, dehydration, and fat tissue breakdown (lipolysis)."
  tags: ["insulin", "deficiency", "consequences"]

- front: "How does glucagon excess drive ketone body formation?"
  back: "Glucagon activates fatty acid oxidation in liver mitochondria, leading to ketone body formation."
  tags: ["glucagon", "ketogenesis", "mechanism"]

- front: "Why does the hyperosmolar hyperglycemic state not involve ketogenesis?"
  back: "Residual insulin secretion is sufficient to suppress lipolysis, preventing ketogenesis. This typically occurs in type 2 diabetes."
  tags: ["HHS", "pathophysiology", "type-2-diabetes"]

- front: "What are the typical symptoms of acute metabolic emergencies in diabetes?"
  back: "Abdominal pain, nausea, vomiting, polyuria, polydipsia, dyspnea (asymptotic breathing), and progressing to confusion and coma."
  tags: ["DKA", "symptoms", "clinical-presentation"]

- front: "What clinical signs indicate metabolic emergency in diabetes?"
  back: "Dehydration, asymptotic/cosmo breathing, tender abdomen, confusion, and coma as disease progresses."
  tags: ["DKA", "signs", "clinical-presentation"]

- front: "What are the cornerstones of therapy for diabetic ketoacidosis?"
  back: "Intravenous fluid rehydration and glucose control with insulin infusion, along with correction of electrolyte abnormalities and treatment of associated illnesses."
  tags: ["DKA", "management", "treatment"]

- front: "What type of intravenous fluid is used for rehydration in DKA, and when is an alternative used?"
  back: "Normal saline or isotonic saline is used initially; half normal saline is used if hyponatremia is present."
  tags: ["DKA", "management", "fluids"]

- front: "What is the target rate for glucose reduction in DKA management?"
  back: "Between 3-4 millimoles per liter per hour."
  tags: ["DKA", "management", "glucose-control"]

- front: "What happens to insulin infusion when glucose drops below 15 mmol/L?"
  back: "The insulin infusion rate may be slightly reduced, and fluids may include dextrose water or dextrose saline. However, insulin must not be stopped until full resolution of ketonemia."
  tags: ["DKA", "management", "insulin-therapy"]

- front: "Why is potassium monitoring critical in DKA treatment?"
  back: "Potassium is initially high at diagnosis but drops rapidly with insulin and glucose infusions, requiring vigorous replacement to prevent hypokalemia."
  tags: ["DKA", "management", "electrolytes"]

- front: "When is bicarbonate indicated in DKA management?"
  back: "Bicarbonate is usually not needed and should be avoided unless there is critical acidosis."
  tags: ["DKA", "management", "bicarbonate"]

- front: "What is the purpose of monitoring in DKA management?"
  back: "To ensure steady progression and improvement in biochemical and clinical condition, done at least hourly."
  tags: ["DKA", "management", "monitoring"]

- front: "What tool has recently become useful for monitoring ketonemia resolution in DKA?"
  back: "Finger prick blood ketone meters are widely available and useful for monitoring improvement and resolution of ketonemia."
  tags: ["DKA", "monitoring", "ketones"]

- front: "What are potential complications of ketoacidosis?"
  back: "Cerebral edema (in severe forms), adult respiratory distress syndrome, and venous thromboembolism."
  tags: ["DKA", "complications"]

- front: "Which complication is more common in hyperosmolar hyperglycemic state?"
  back: "Venous thromboembolism; prophylactic anticoagulation may be considered in older patients with severe hyperglycemia."
  tags: ["HHS", "complications", "thromboembolism"]

- front: "How is hypoglycemia classified in diabetes?"
  back: "By glucose level: <3.9 mmol/L is glucose alert (Level 1), <3 mmol/L is clinically significant (Level 2), and any glucose associated with cognitive impairment is severe hypoglycemia."
  tags: ["hypoglycemia", "classification", "diagnosis"]

- front: "What physiologic responses protect against hypoglycemia in non-diabetic individuals?"
  back: "Cessation of insulin secretion (at ~4 mmol/L glucose), release of counter-regulatory hormones (glucagon and catecholamines first, then cortisol and growth hormone), and neuroglycopenic responses."
  tags: ["hypoglycemia", "physiology", "counter-regulation"]

- front: "Why is counter-regulatory response to hypoglycemia impaired in people with diabetes?"
  back: "Due to injection of insulin prior to the episode or therapies (like sulfonylureas) that release endogenous insulin."
  tags: ["hypoglycemia", "diabetes", "pathophysiology"]

- front: "What are adrenergic symptoms of hypoglycemia?"
  back: "Tremor, pallor, sweating, palpitations, and tachycardia."
  tags: ["hypoglycemia", "symptoms", "adrenergic"]

- front: "What are neuroglycopenic symptoms of hypoglycemia?"
  back: "Cognitive dysfunction, which may progress to seizure and coma."
  tags: ["hypoglycemia", "symptoms", "neuroglycopenic"]

- front: "What should be evaluated after a hypoglycemic episode in a patient with diabetes?"
  back: "The precipitating cause and measures to prevent recurrence should be determined."
  tags: ["hypoglycemia", "management", "evaluation"]

- front: "List treatment-related causes of hypoglycemia in diabetes patients."
  back: "Too much insulin, inappropriately high sulfonylurea dosage, and long-acting sulfonylureas given to patients with renal dysfunction."
  tags: ["hypoglycemia", "causes", "treatment-related"]

- front: "What non-treatment factors can cause hypoglycemia in diabetes?"
  back: "Missed meals, planned exercise, alcohol, drugs, and renal insufficiency."
  tags: ["hypoglycemia", "causes", "non-treatment"]

- front: "How is level 1 and 2 hypoglycemia managed?"
  back: "By administration of oral carbohydrate (10-15 grams initially, such as 100ml fruit juice, honey, sugar, or sweets)."
  tags: ["hypoglycemia", "management", "treatment"]

- front: "What additional measure is needed for hypoglycemia occurring at night or before a long period to next meal?"
  back: "Additional nutrient containing protein or fat is required to provide gluconeogenic substrate."
  tags: ["hypoglycemia", "management", "nocturnal"]

- front: "What is severe hypoglycemia and how is it treated?"
  back: "Severe hypoglycemia is an emergency requiring intravenous glucose or glucagon administration. Glucagon (1mg) can be given by intramuscular or subcutaneous injection."
  tags: ["hypoglycemia", "severe", "emergency-treatment"]

- front: "Why must care be taken when administering intravenous glucose for severe hypoglycemia?"
  back: "To avoid extravasation of dextrose into subcutaneous tissues, which can cause tissue breakdown."
  tags: ["hypoglycemia", "management", "IV-glucose"]

- front: "What must occur after glucagon administration for hypoglycemia?"
  back: "The patient needs to eat something to replenish the utilized liver glycogen."
  tags: ["hypoglycemia", "management", "glucagon"]

- front: "What preventive measures should be taken for patients at risk of hypoglycemia?"
  back: "Plan ahead to ingest carbohydrate in situations where hypoglycemia may occur (unplanned exercise), intensify glucose monitoring when insulin doses change, and modify lifestyle to avoid hypoglycemia."
  tags: ["hypoglycemia", "prevention", "management"]
