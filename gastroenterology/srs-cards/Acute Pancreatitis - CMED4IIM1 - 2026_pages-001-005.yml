deck: "Corpus::Gastroenterology::Acute Pancreatitis"
notes:
  - guid: 841d3597fe6d8b91
    noteType: Basic
    deck: "Corpus::Gastroenterology::Acute Pancreatitis"
    fields:
      Front: "What is acute pancreatitis?"
      Back: "An acute inflammatory process of the pancreas associated with severe upper abdominal pain, elevated blood levels of pancreatic enzymes. Divided into two categories: mild acute pancreatitis and necrotizing pancreatitis."
    tags: ["subject:gastroenterology"]
  - guid: a53a3c23048f2972
    noteType: Basic
    deck: "Corpus::Gastroenterology::Acute Pancreatitis"
    fields:
      Front: "What diagnostic evidence is required for acute pancreatitis?"
      Back: "A combination of biochemical, radiological, and sometimes histological evidence. No single finding alone is diagnostic."
    tags: ["subject:gastroenterology"]
  - guid: 5f5913789ad2880c
    noteType: Basic
    deck: "Corpus::Gastroenterology::Acute Pancreatitis"
    fields:
      Front: "What happens to endocrine and exocrine function during acute pancreatitis?"
      Back: "There is transient endocrine and exocrine pancreatic dysfunction. Severity resolution is dependent on the severity of pancreatitis."
    tags: ["subject:gastroenterology"]
  - guid: 54b57155d8fed653
    noteType: Basic
    deck: "Corpus::Gastroenterology::Acute Pancreatitis"
    fields:
      Front: "What is the typical recovery timeline for acute pancreatitis?"
      Back: "Usually complete recovery occurs within six months, but it may progress to chronic pancreatitis after repeated episodes."
    tags: ["subject:gastroenterology"]
  - guid: c7c30b2e1dcff1be
    noteType: Basic
    deck: "Corpus::Gastroenterology::Acute Pancreatitis"
    fields:
      Front: "Why is diagnosis of acute pancreatitis difficult based on clinical presentation?"
      Back: "Disease varies in severity and diagnosis is often missed at the extreme end of spectrum. Patients can have severe pancreatitis with only abdominal pain as the sole symptom."
    tags: ["subject:gastroenterology"]
  - guid: 2221f52f3d8400a9
    noteType: Basic
    deck: "Corpus::Gastroenterology::Acute Pancreatitis"
    fields:
      Front: "What are the main etiologies of acute pancreatitis?"
      Back: "Gallstones and alcohol account for more than 98% of causes in adults. Other causes include hypertriglyceridemia, hypercalcemia, genetic mutations, drugs, toxins, autoimmune, trauma, and idiopathic."
    tags: ["subject:gastroenterology"]
  - guid: f3a389e04cee1660
    noteType: Basic
    deck: "Corpus::Gastroenterology::Acute Pancreatitis"
    fields:
      Front: "What is the gender difference in acute pancreatitis etiology?"
      Back: "Acute gallstone pancreatitis occurs more in women, while alcoholic pancreatitis occurs more in men."
    tags: ["subject:gastroenterology"]
  - guid: 4be9c920332adb05
    noteType: Basic
    deck: "Corpus::Gastroenterology::Acute Pancreatitis"
    fields:
      Front: "What age presentation suggests a hereditary cause of acute pancreatitis?"
      Back: "Onset in the first decade (before age 10) suggests a hereditary cause. Unusual causes to investigate include hyperlipidemia, hereditary chronic pancreatitis, and genetic mutations."
    tags: ["subject:gastroenterology"]
  - guid: ebecd843be80683c
    noteType: Basic
    deck: "Corpus::Gastroenterology::Acute Pancreatitis"
    fields:
      Front: "What is the cardinal symptom of acute pancreatitis?"
      Back: "Severe upper abdominal pain that is usually steady and located in the mid-epigastrium. Can radiate to the right upper quadrant or diffuse across abdomen."
    tags: ["subject:gastroenterology"]
  - guid: f1d09a37146e62e3
    noteType: Basic
    deck: "Corpus::Gastroenterology::Acute Pancreatitis"
    fields:
      Front: "What is the typical timeline of pain in alcoholic pancreatitis?"
      Back: "Usually occurs about 72 hours after finish or cessation of drinking. Pain lasts for days, unlike biliary colic which is short-lived (6-8 hours)."
    tags: ["subject:gastroenterology"]
  - guid: 45b657fb4db53b8a
    noteType: Basic
    deck: "Corpus::Gastroenterology::Acute Pancreatitis"
    fields:
      Front: "How quickly does pain reach maximum intensity in acute pancreatitis?"
      Back: "Maximum intensity usually reached within 10-20 minutes to one hour, with radiation to the back."
    tags: ["subject:gastroenterology"]
  - guid: dc7be4515ff4b62e
    noteType: Basic
    deck: "Corpus::Gastroenterology::Acute Pancreatitis"
    fields:
      Front: "What percentage of acute pancreatitis presents without pain?"
      Back: "Painless disease is uncommon but occurs in 5-10% of patients. Sometimes diagnosis is only made at post-mortem examination."
    tags: ["subject:gastroenterology"]
  - guid: 94810004317ba7cf
    noteType: Basic
    deck: "Corpus::Gastroenterology::Acute Pancreatitis"
    fields:
      Front: "What are associated symptoms with acute pancreatitis pain?"
      Back: "Nausea and vomiting. Patients are restless, agitated, and relief comes from bending forward. Severe cases may present with shock or coma."
    tags: ["subject:gastroenterology"]
  - guid: 6dc3dde1580d75ee
    noteType: Basic
    deck: "Corpus::Gastroenterology::Acute Pancreatitis"
    fields:
      Front: "What physical examination findings are present in mild acute pancreatitis?"
      Back: "Epigastrium may be minimally tender. Respiration is usually shallow due to irritation of diaphragm from inflammatory process."
    tags: ["subject:gastroenterology"]
  - guid: 54a7fe553648e985
    noteType: Basic
    deck: "Corpus::Gastroenterology::Acute Pancreatitis"
    fields:
      Front: "What physical examination findings are present in severe acute pancreatitis?"
      Back: "Abdominal distension, abdominal guarding, and potential ischemic discoloration in flanks (Cullen's sign) or around navel (Grey Turner's sign) - occur in ~1% of patients."
    tags: ["subject:gastroenterology"]
  - guid: 89cd333b0e8702f1
    noteType: Basic
    deck: "Corpus::Gastroenterology::Acute Pancreatitis"
    fields:
      Front: "What laboratory marker rises first in acute pancreatitis?"
      Back: "Amylase rises within 6-12 hours of onset of acute pancreatitis and is cleared fairly rapidly with a half-life of approximately 10 hours."
    tags: ["subject:gastroenterology"]
  - guid: a832b0ffb09a18c1
    noteType: Basic
    deck: "Corpus::Gastroenterology::Acute Pancreatitis"
    fields:
      Front: "How long is serum amylase typically elevated in uncomplicated acute pancreatitis?"
      Back: "Usually elevated for about 3-5 days, then starts declining."
    tags: ["subject:gastroenterology"]
  - guid: becc1a98747eeafb
    noteType: Basic
    deck: "Corpus::Gastroenterology::Acute Pancreatitis"
    fields:
      Front: "What is the diagnostic threshold for serum amylase in acute pancreatitis?"
      Back: "An increase of more than 3 times the upper limit of normal suggests pancreatic injury."
    tags: ["subject:gastroenterology"]
  - guid: 764b96795f239ba3
    noteType: Basic
    deck: "Corpus::Gastroenterology::Acute Pancreatitis"
    fields:
      Front: "Why is serum amylase non-specific for acute pancreatitis?"
      Back: "Can be elevated in many conditions: cholecystitis, bowel obstruction, renal failure, diabetic ketoacidosis, pancreatitis, salpingitis."
    tags: ["subject:gastroenterology"]
  - guid: bfa0c49af5f7f9ef
    noteType: Basic
    deck: "Corpus::Gastroenterology::Acute Pancreatitis"
    fields:
      Front: "What is the amylase-creatinine clearance ratio in acute pancreatitis?"
      Back: "Normally 3% of amylase is excreted in urine. In acute pancreatitis, this increases to about 10%, but does not add prognostic value over serum or urine amylase alone."
    tags: ["subject:gastroenterology"]
  - guid: 6c5607b122ec176d
    noteType: Basic
    deck: "Corpus::Gastroenterology::Acute Pancreatitis"
    fields:
      Front: "How does lipase compare to amylase for diagnosing acute pancreatitis?"
      Back: "Lipase is slightly more specific than serum amylase with better diagnostic accuracy on both day 1 and day 3."
    tags: ["subject:gastroenterology"]
  - guid: bc1d9b605b8f797f
    noteType: Basic
    deck: "Corpus::Gastroenterology::Acute Pancreatitis"
    fields:
      Front: "Does the level of pancreatic enzyme elevation correlate with disease severity?"
      Back: "No. Enzyme levels do not correlate with severity. A patient with low lipase may have severe disease, while high enzyme levels are less predictive of severity."
    tags: ["subject:gastroenterology"]
  - guid: ca554101c5ed8f21
    noteType: Basic
    deck: "Corpus::Gastroenterology::Acute Pancreatitis"
    fields:
      Front: "What inflammatory markers predict acute pancreatitis severity?"
      Back: "C-reactive protein (CRP) of >150 mg/dL at 48 hours can discriminate severe from mild disease. Other markers include IL-6, IL-8, IL-10, TNF, neutrophil elastase."
    tags: ["subject:gastroenterology"]
  - guid: 331b153413e7f422
    noteType: Basic
    deck: "Corpus::Gastroenterology::Acute Pancreatitis"
    fields:
      Front: "What are the radiological findings on chest X-ray in acute pancreatitis?"
      Back: "Elevation of hemidiaphragm, pleural effusions, atelectasis, pulmonary infiltrates, ARDS features, and left/right/bilateral pleural effusions (usually indicate complications)."
    tags: ["subject:gastroenterology"]
  - guid: 1000864e90d5b755
    noteType: Basic
    deck: "Corpus::Gastroenterology::Acute Pancreatitis"
    fields:
      Front: "What ultrasound findings are typical in acute pancreatitis?"
      Back: "Pancreatic gland enlargement - diffusely enlarged gland with hypoechoic appearance. May also identify gallstones or dilated ducts suggesting etiology."
    tags: ["subject:gastroenterology"]
  - guid: a612da6f32ed3475
    noteType: Basic
    deck: "Corpus::Gastroenterology::Acute Pancreatitis"
    fields:
      Front: "Why is CT angiography most important for acute pancreatitis diagnosis?"
      Back: "CTA is the most important test for diagnosis of acute pancreatitis and intra-abdominal complications. Assesses severity and if no improvement after conservative therapy, suggests complications or alternative diagnosis."
    tags: ["subject:gastroenterology"]
  - guid: af6a054fa3ccc8e3
    noteType: Basic
    deck: "Corpus::Gastroenterology::Acute Pancreatitis"
    fields:
      Front: "What do the Ranson prognostic criteria assess?"
      Back: "Ranson is the most widely used severity score. Criteria at admission: WBC >16, glucose >200 mg/L, age >55, AST >250. A second score at 48 hours gives good prediction of 28-day mortality."
    tags: ["subject:gastroenterology"]
  - guid: b9001d8c2e2733bd
    noteType: Basic
    deck: "Corpus::Gastroenterology::Acute Pancreatitis"
    fields:
      Front: "What other severity scores are used in acute pancreatitis?"
      Back: "APACHE II, Marshall score, and PII subscores have all been validated for clinical practice to assess severity and guide ICU admission."
    tags: ["subject:gastroenterology"]
  - guid: 92d1a90c3f217601
    noteType: Basic
    deck: "Corpus::Gastroenterology::Acute Pancreatitis"
    fields:
      Front: "What is a pseudocyst in acute pancreatitis?"
      Back: "Localized amylase-rich fluid collection within or around the pancreas. Can be single or multiple, varying in size."
    tags: ["subject:gastroenterology"]
  - guid: e60a1214948e82aa
    noteType: Basic
    deck: "Corpus::Gastroenterology::Acute Pancreatitis"
    fields:
      Front: "What complications can occur with pancreatic pseudocysts?"
      Back: "Hemorrhage into the cyst, infection, rupture, or pressure effects on adjacent structures like duodenal obstruction."
    tags: ["subject:gastroenterology"]
  - guid: 11a0a68e0f4a9a54
    noteType: Basic
    deck: "Corpus::Gastroenterology::Acute Pancreatitis"
    fields:
      Front: "What treatments are available for pancreatic pseudocysts?"
      Back: "Percutaneous drainage, endoscopic drainage, or open surgical drainage. Only needed if complications present. Uncomplicated cysts can be observed for resolution."
    tags: ["subject:gastroenterology"]
  - guid: 7d67932c20f61cba
    noteType: Basic
    deck: "Corpus::Gastroenterology::Acute Pancreatitis"
    fields:
      Front: "What local complications can occur in acute pancreatitis?"
      Back: "Pseudocyst formation, necrotizing pancreatitis, abscess formation. Can have GI bleeding, bowel compression, fistula within bowel."
    tags: ["subject:gastroenterology"]
  - guid: 59744ab904520759
    noteType: Basic
    deck: "Corpus::Gastroenterology::Acute Pancreatitis"
    fields:
      Front: "What is the mortality rate of severe necrotizing pancreatitis?"
      Back: "High mortality rate approaching 85%."
    tags: ["subject:gastroenterology"]
  - guid: 55837799e158e8ff
    noteType: Basic
    deck: "Corpus::Gastroenterology::Acute Pancreatitis"
    fields:
      Front: "What is the typical recovery timeline for mild acute pancreatitis?"
      Back: "Most attacks are mild with recovery occurring within 5-7 days."
    tags: ["subject:gastroenterology"]
  - guid: 0791b681ed3e71f9
    noteType: Basic
    deck: "Corpus::Gastroenterology::Acute Pancreatitis"
    fields:
      Front: "What is the primary treatment approach for acute pancreatitis?"
      Back: "Predominantly supportive care: pain control, intravenous fluids, correction of electrolyte abnormalities."
    tags: ["subject:gastroenterology"]
  - guid: f15770244bb7ab26
    noteType: Basic
    deck: "Corpus::Gastroenterology::Acute Pancreatitis"
    fields:
      Front: "What pain management approach is used in acute pancreatitis?"
      Back: "Initial IV cure is sufficient. Once pain is settled, transition to oral therapies can be advised. Pain management is essential as abdominal pain is often dominant symptom."
    tags: ["subject:gastroenterology"]
  - guid: 3976c79eb881780d
    noteType: Basic
    deck: "Corpus::Gastroenterology::Acute Pancreatitis"
    fields:
      Front: "Why is nutrition important in acute pancreatitis management?"
      Back: "Enteral nutrition or parenteral nutrition might be required depending on patient's mental state due to ongoing inflammatory process and auto-digestion."
    tags: ["subject:gastroenterology"]
  - guid: 7fb0b9b5aafded38
    noteType: Basic
    deck: "Corpus::Gastroenterology::Acute Pancreatitis"
    fields:
      Front: "Why should antibiotics be initiated early in acute pancreatitis?"
      Back: "Infection is a dire consequence of acute pancreatitis. Systemic antibiotics initiated early reduce mortality."
    tags: ["subject:gastroenterology"]
  - guid: 8a87dfdb3d184d80
    noteType: Basic
    deck: "Corpus::Gastroenterology::Acute Pancreatitis"
    fields:
      Front: "What investigations are needed for severe acute pancreatitis?"
      Back: "Patients should be assessed for need for percutaneous CT-guided aspiration or drainage of the gland."
    tags: ["subject:gastroenterology"]
  - guid: e3f5770cc6b3f50f
    noteType: Basic
    deck: "Corpus::Gastroenterology::Acute Pancreatitis"
    fields:
      Front: "What is the importance of identifying the etiology of acute pancreatitis?"
      Back: "Different etiologies require different therapeutic measures. Once the cause is eliminated, you can prevent further attacks or reduce morbidity."
    tags: ["subject:gastroenterology"]
  - guid: d41a488fd24be204
    noteType: Basic
    deck: "Corpus::Gastroenterology::Acute Pancreatitis"
    fields:
      Front: "What happens to recurrent acute pancreatitis from gallstones if untreated?"
      Back: "Up to 50% of acute gallstone pancreatitis without cholecystectomy will have recurrent attacks. Cholecystectomy at discharge is preventative."
    tags: ["subject:gastroenterology"]
