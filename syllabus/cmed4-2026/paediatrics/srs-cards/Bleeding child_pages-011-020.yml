    noteType: Basic
    deck: "Corpus::Paediatrics::Bleeding child"
    fields:
      Front: "Describe platelet development pathway."
      Back: "Hematopoietic stem cell differentiates to megakaryoblast → megakaryocyte (bone marrow) under influence of Thrombopoietin"
    tags: ["megakaryocyte", "thrombopoietin", "platelet-development", "subject:paediatrics"]
