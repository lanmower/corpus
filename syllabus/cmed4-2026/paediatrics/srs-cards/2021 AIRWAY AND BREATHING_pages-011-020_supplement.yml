    fields:
      Front: "What is the ideal ventilation rate when manually ventilating a child with an Ambu bag?"
      Back: "The ventilation rate should be 2 seconds per breath when manually ventilating with an Ambu bag. This allows adequate time for chest inflation and exhalation."
