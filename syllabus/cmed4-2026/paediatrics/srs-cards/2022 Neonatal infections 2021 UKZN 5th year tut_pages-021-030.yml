    deck: "Corpus::Paediatrics::2022 Neonatal infections"
    fields:
      Front: "How should syphilis in pregnancy be managed in the postnatal period?"
      Back: "As a notifiable condition requiring appropriate follow-up and treatment"
    tags: ["syphilis", "management", "south-africa", "subject:paediatrics"]
  - guid: b22i668m88ff565
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2022 Neonatal infections"
    fields:
      Front: "What is the significance of maternal HIV testing frequency in PMTCT?"
      Back: "Testing at first antenatal visit and ideally at every BANC (Basic Antenatal Care) visit, with ideal target of 8 visits for optimal screening"
