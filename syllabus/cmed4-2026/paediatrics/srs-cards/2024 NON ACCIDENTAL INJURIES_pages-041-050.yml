    deck: "Corpus::Paediatrics::2024 NON ACCIDENTAL INJURIES"
    fields:
      Front: "What key elements must be included when taking a history of suspected non-accidental injury?"
      Back: "Essential elements: How injury happened (informants, dates, times, place, sequence of events, people present), interview child separately without leading questions, ask about the abuse and perpetrator(s), document child's psychological state (crying, calm, distressed, withdrawn), Mental status examination for PTSD."
    tags: ["assessment", "history-taking", "non-accidental-injury", "subject:paediatrics"]
  - guid: "86c11c130bc2432e"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2024 NON ACCIDENTAL INJURIES"
    fields:
      Front: "What additional history must be obtained when evaluating for non-accidental injury?"
      Back: "Birth history and pregnancy, Growth, Development, Immunisations, Systemic enquiry, Family and social history, School information (creche, preschool, grades passed/failed/condoned), Teacher reports (Conner's, request for assistance forms)."
    tags: ["assessment", "history-taking", "developmental-history", "subject:paediatrics"]
  - guid: "12a8e93e3e1b4fb4"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2024 NON ACCIDENTAL INJURIES"
    fields:
      Front: "What key aspects must be documented during examination for non-accidental injury?"
      Back: "For bruises: size, shape, position, colour and age must be recorded. Examine the whole child including oral cavity and genitals. For acute cases < 72 hours: consider EUA (examination under anaesthesia) if uncooperative or perineal injury present."
    tags: ["examination", "physical-findings", "non-accidental-injury", "subject:paediatrics"]
  - guid: "9da0a29f67a24a26"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2024 NON ACCIDENTAL INJURIES"
    fields:
      Front: "What are the key procedural requirements for examining a child with suspected sexual abuse?"
      Back: "Requirements: Privacy must be maintained. Examination by skilled medical officer. Third person must be present. Procedure must be explained to child. All samples and photographs taken BEFORE patient is cleaned. Full general examination performed. Small children examined on parent's lap; older children supine in lithotomy position."
    tags: ["examination", "sexual-abuse", "procedure", "subject:paediatrics"]
  - guid: "83a59dd2f2444390"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2024 NON ACCIDENTAL INJURIES"
    fields:
      Front: "What are the key findings and documentation principles for vaginal examination in suspected sexual abuse?"
      Back: "Key principles: Lack of evidence does not mean abuse has not taken place. Normal crescentic hymen is the most common finding in prepubertal girls. Total absence of hymen is extremely rare as a normal variant. Tears of hymen may leave clefts or bumps when they heal. Document findings using the hands of a clock as reference."
    tags: ["examination", "vaginal-findings", "sexual-abuse", "subject:paediatrics"]
  - guid: "dc00c34c2e4e4689"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2024 NON ACCIDENTAL INJURIES"
    fields:
      Front: "What is the assessment triad for sexual abuse evaluation?"
      Back: "The triad consists of: Hear (listen for disparity between history and injury, delay in seeking help), See (observe behavioural changes and recurrent injuries), Find (identify a pattern of injuries)."
    tags: ["sexual-abuse", "assessment-framework", "diagnostic-approach", "subject:paediatrics"]
  - guid: "fb5941da73904aae"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2024 NON ACCIDENTAL INJURIES"
    fields:
      Front: "What findings on anal examination require careful interpretation in suspected sexual abuse?"
      Back: "Anal dilatation can result from: childhood sexual abuse, stool in rectum, constipation, Crohn's disease, recurrent rectal prolapse, anaesthesia, or sedatives. Anal fissures may indicate: constipation or abuse (look for fresh and/or multiple tears). Anal skin tags are the result of healed anal fissures. Document mucocutaneous changes and complete dilatation. Perform examination in lateral decubitus position and note stage of sexual development."
    tags: ["examination", "anal-findings", "sexual-abuse", "subject:paediatrics"]
  - guid: "f6b5604dabb541bc"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2024 NON ACCIDENTAL INJURIES"
    fields:
      Front: "What imaging is required in suspected physical abuse?"
      Back: "Every physically abused child < 5 years old requires imaging. Skeletal survey includes: AP skull, AP chest, AP spine, AP arms/legs. CT-scan is indicated for: suspected head injury, medico-legal purposes, screening for previous injuries. Ophthalmology consultation for retinoscopy to assess for flame-shaped retinal haemorrhages."
    tags: ["physical-abuse", "imaging", "skeletal-survey", "subject:paediatrics"]
  - guid: "482a0ac87ce24474"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2024 NON ACCIDENTAL INJURIES"
    fields:
      Front: "When should photographs be taken in child abuse cases?"
      Back: "Photographs are indicated in severe sexual abuse cases to document physical signs. Digital photography is acceptable; prints must be made immediately."
    tags: ["documentation", "photography", "sexual-abuse", "legal-evidence", "subject:paediatrics"]