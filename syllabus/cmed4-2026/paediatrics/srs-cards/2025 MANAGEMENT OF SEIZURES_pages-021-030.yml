    fields:
      Front: "Define: Automatisms"
      Back: "Automatisms are involuntary, coordinated motor behaviours occurring during altered consciousness in seizures; examples include lip smacking, chewing, picking at clothes, or mumbling."
    tags: ["subject:paediatrics", "seizures", "seizure-types", "semiology"]
  - guid: p2s8w1x0r9t3u5v6
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 MANAGEMENT OF SEIZURES"
    fields:
      Front: "Define: Epileptic Spasms"
      Back: "Epileptic spasms are sudden, brief flexor or extensor contractions of muscles (infantile spasms); typically occur in clusters and are often associated with developmental regression, particularly seen in West syndrome."
    tags: ["subject:paediatrics", "seizures", "seizure-types", "infantile-spasms"]
  - guid: q3t9x2y1s0u4v6w7
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 MANAGEMENT OF SEIZURES"
    fields:
      Front: "Define: Tonic Seizures"
      Back: "Tonic seizures are characterized by sustained muscle rigidity or contraction lasting seconds to minutes, with increased tone throughout the body; may be focal or generalized."
    tags: ["subject:paediatrics", "seizures", "seizure-types", "generalized"]
  - guid: r4u0y3z2t1v5w7x8
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 MANAGEMENT OF SEIZURES"
    fields:
      Front: "Define: Absence Seizures"
      Back: "Absence seizures are brief episodes of altered consciousness lasting 5-10 seconds, typically occurring multiple times daily; characterized by sudden onset and offset without postictal confusion, often with subtle automatisms or myoclonic jerks."
    tags: ["subject:paediatrics", "seizures", "seizure-types", "generalized"]
