deck: "Corpus::Paediatrics-Neonatal::KINC 5th Year Presentation"
notes:
  - guid: "kinc-what-is-kinc"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::KINC 5th Year Presentation"
    fields:
      Front: "What is KINC and why was it developed?"
      Back: |
        KINC (KZN Initiative on Newborn Care) is an important initiative developed by the KZN Department of Health for resource-limited settings. It can be used in district and regional hospital settings for the routine care of neonates and is especially important in managing sick or small newborns.
    tags: ["kinc-overview", "initiative", "supplement", "subject:paediatrics-neonatal"]

  - guid: "kinc-hbb-golden-minute"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::KINC 5th Year Presentation"
    fields:
      Front: "What are Helping Babies Breathe (HBB) and the Golden Minute in delivery room preparation?"
      Back: |
        Helping Babies Breathe (HBB) and the Golden Minute are resuscitation protocols that should be part of equipment preparation in the delivery room to ensure the newborn can be promptly resuscitated if required at birth.
    tags: ["resuscitation", "delivery-room", "equipment", "supplement", "subject:paediatrics-neonatal"]

  - guid: "kinc-resuscitation-equipment-method"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::KINC 5th Year Presentation"
    fields:
      Front: "What equipment and method should be used for neonatal resuscitation?"
      Back: |
        Resuscitation should be performed using a neopuff or bag and mask. The method allows for controlled oxygen delivery and ventilation to the newborn during resuscitation.
    tags: ["resuscitation", "equipment", "method", "supplement", "subject:paediatrics-neonatal"]

  - guid: "kinc-sats-importance"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::KINC 5th Year Presentation"
    fields:
      Front: "Why is SpO2 monitoring at birth and 6 hours post-delivery most important in the full assessment?"
      Back: |
        SpO2 (oxygen saturation) at birth and 6 hours post-delivery is the most important vital sign measurement in the full newborn assessment because it indicates the baby's oxygenation status and guides oxygen therapy decisions.
    tags: ["observation", "assessment", "oxygen", "saturation", "supplement", "subject:paediatrics-neonatal"]

  - guid: "kinc-persistent-hypoglycaemia-investigation"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::KINC 5th Year Presentation"
    fields:
      Front: "What should be investigated if a baby has persistent or recurrent hypoglycaemia?"
      Back: |
        If a baby has persistent or recurrent hypoglycaemia, check whether:
        1. The baby is in a thermoneutral environment
        2. The baby is receiving adequate feeds
        3. The baby does not have sepsis
    tags: ["glucose", "hypoglycaemia", "investigation", "supplement", "subject:paediatrics-neonatal"]

  - guid: "kinc-severe-hypoglycaemia-definition"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::KINC 5th Year Presentation"
    fields:
      Front: "What defines severe hypoglycaemia in neonates?"
      Back: "Blood glucose <1.4 mmol/l is considered severe hypoglycaemia and requires urgent IV dextrose bolus therapy."
    tags: ["glucose", "hypoglycaemia", "severe", "definition", "supplement", "subject:paediatrics-neonatal"]

  - guid: "kinc-rds-severity-criteria"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::KINC 5th Year Presentation"
    fields:
      Front: "What are the diagnostic criteria for severe Respiratory Distress Syndrome (RDS)?"
      Back: |
        Severe RDS is characterized by:
        1. Respiratory rate >80 bpm
        2. Severe chest indrawing or grunting
        3. Oxygen saturation <90%
        4. Central cyanosis
    tags: ["rds", "respiratory-distress", "severity-criteria", "supplement", "subject:paediatrics-neonatal"]

  - guid: "kinc-oxygen-continuous-monitoring-weaning"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::KINC 5th Year Presentation"
    fields:
      Front: "What approach should be taken to oxygen therapy monitoring and adjustment?"
      Back: |
        Continuous monitoring of oxygen saturation must be done in babies requiring oxygen therapy. Oxygen should be weaned (reduced) as the baby improves and SpO2 reaches target ranges to minimize oxygen exposure.
    tags: ["oxygen", "monitoring", "weaning", "protocol", "supplement", "subject:paediatrics-neonatal"]

  - guid: "kinc-ipc-equipment-cleaning"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::KINC 5th Year Presentation"
    fields:
      Front: "What role does equipment cleaning play in infection prevention and control?"
      Back: |
        Equipment cleaning is a critical component of infection prevention and control (IPC) in the neonatal unit. All equipment must be properly cleaned and decontaminated between patients to prevent cross-infection.
    tags: ["infection-prevention", "equipment", "cleaning", "supplement", "subject:paediatrics-neonatal"]

  - guid: "kinc-hypoglycaemia-prevention-ptb"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::KINC 5th Year Presentation"
    fields:
      Front: "What is the immediate feeding recommendation for preterm babies to prevent hypoglycaemia?"
      Back: "Pre-term babies should be fed immediately after birth to prevent hypoglycaemia."
    tags: ["glucose", "hypoglycaemia", "prevention", "feeding", "preterm", "supplement", "subject:paediatrics-neonatal"]

  - guid: "kinc-ngl-npo-use"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::KINC 5th Year Presentation"
    fields:
      Front: "When and how should a neonatal nasogastric line (NNL) be used for babies who are NPO?"
      Back: |
        If a baby cannot take oral feeds (NPO – nothing by mouth), a neonatal nasogastric line (NNL) should be used immediately to provide nutrition and prevent hypoglycaemia. This is critical for maintaining glucose homeostasis.
    tags: ["glucose", "feeding", "ngl", "npo", "supplement", "subject:paediatrics-neonatal"]

  - guid: "kinc-oxygen-therapeutic-principle"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::KINC 5th Year Presentation"
    fields:
      Front: "What is the fundamental therapeutic principle regarding oxygen use in neonatal care?"
      Back: |
        Oxygen is a drug and too much is not a good thing. This principle emphasizes that oxygen therapy must be carefully titrated and monitored, with the goal of maintaining appropriate oxygen saturation while minimizing oxygen exposure to reduce complications.
    tags: ["oxygen", "principles", "therapeutic", "supplement", "subject:paediatrics-neonatal"]

  - guid: "kinc-antibiotic-empiric-combination"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::KINC 5th Year Presentation"
    fields:
      Front: "When might gentamycin be added to penicillin/ampicillin in empiric neonatal infection therapy?"
      Back: |
        Gentamycin is added as needed (+/−) based on clinical judgment when penicillin or ampicillin is used as first-line empiric therapy for neonatal infection, particularly in cases where gram-negative coverage is necessary.
    tags: ["infection", "antibiotics", "empiric", "gentamycin", "supplement", "subject:paediatrics-neonatal"]
