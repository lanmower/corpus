notes:
  - guid: a1b2c3d4e5f6g7h8
    noteType: "Basic"
    deck: "Corpus::Paediatrics::EPILEPSY"
    fields:
      Front: "Define a seizure or convulsion."
      Back: "A seizure or convulsion is a paroxysmal, time-limited change in motor activity and/or behavior that results from abnormal electrical activity in the brain."
    tags: ["epilepsy", "definition", "subject:paediatrics"]

  - guid: b2c3d4e5f6g7h8i9
    noteType: "Basic"
    deck: "Corpus::Paediatrics::EPILEPSY"
    fields:
      Front: "Define epilepsy."
      Back: "Epilepsy is a chronic brain disorder with an increased predisposition to seizures with neurobiologic, cognitive, psychological and social consequences."
    tags: ["epilepsy", "definition", "subject:paediatrics"]

  - guid: c3d4e5f6g7h8i9j0
    noteType: "Basic"
    deck: "Corpus::Paediatrics::EPILEPSY"
    fields:
      Front: "When is epilepsy considered to be present?"
      Back: "Epilepsy is considered to be present when two or more unprovoked seizures occur at an interval greater than 24 hours apart."
    tags: ["epilepsy", "definition", "diagnosis", "subject:paediatrics"]

  - guid: d4e5f6g7h8i9j0k1
    noteType: "Basic"
    deck: "Corpus::Paediatrics::EPILEPSY"
    fields:
      Front: "What is the prevalence of seizures in children?"
      Back: "Seizures occur in approximately 10% of children in the pediatric age group."
    tags: ["epilepsy", "epidemiology", "subject:paediatrics"]

  - guid: e5f6g7h8i9j0k1l2
    noteType: "Basic"
    deck: "Corpus::Paediatrics::EPILEPSY"
    fields:
      Front: "What proportion of seizures in children are caused by epilepsy?"
      Back: "Less than one-third of seizures in children are caused by epilepsy."
    tags: ["epilepsy", "epidemiology", "subject:paediatrics"]

  - guid: f6g7h8i9j0k1l2m3
    noteType: "Basic"
    deck: "Corpus::Paediatrics::EPILEPSY"
    fields:
      Front: "List the provoking factors for seizures."
      Back: "High fever, infection, syncope, head trauma, hypoxia, toxin, cardiac arrhythmia, metabolic abnormalities."
    tags: ["epilepsy", "provoking-factors", "subject:paediatrics"]

  - guid: g7h8i9j0k1l2m3n4
    noteType: "Basic"
    deck: "Corpus::Paediatrics::EPILEPSY"
    fields:
      Front: "List the causes of seizures in children."
      Back: "Infection, developmental/structural abnormalities, trauma, intracranial hemorrhage, hypoxia, metabolic abnormalities (hypocalcaemia, hypomagnesaemia, hypoglycemia, hyper/hyponatremia, kernicterus, amino acid or organic acid disorders), drug withdrawal."
    tags: ["epilepsy", "etiology", "subject:paediatrics"]

  - guid: h8i9j0k1l2m3n4o5
    noteType: "Basic"
    deck: "Corpus::Paediatrics::EPILEPSY"
    fields:
      Front: "Classify partial seizures with consciousness retained."
      Back: "Simple partial seizures: consciousness retained with motor, sensory, autonomic, or psychic manifestations."
    tags: ["epilepsy", "classification", "partial-seizures", "subject:paediatrics"]

  - guid: i9j0k1l2m3n4o5p6
    noteType: "Basic"
    deck: "Corpus::Paediatrics::EPILEPSY"
    fields:
      Front: "Classify complex partial seizures."
      Back: "Complex partial seizures: consciousness impaired. May present as simple partial followed by impaired consciousness, or consciousness impaired at onset."
    tags: ["epilepsy", "classification", "partial-seizures", "subject:paediatrics"]

  - guid: j0k1l2m3n4o5p6q7
    noteType: "Basic"
    deck: "Corpus::Paediatrics::EPILEPSY"
    fields:
      Front: "What is partial seizure with secondary generalization?"
      Back: "A partial seizure that progresses to become a generalized seizure."
    tags: ["epilepsy", "classification", "partial-seizures", "subject:paediatrics"]

  - guid: k1l2m3n4o5p6q7r8
    noteType: "Basic"
    deck: "Corpus::Paediatrics::EPILEPSY"
    fields:
      Front: "Classify generalized seizure types."
      Back: "Generalized seizures include: absences (typical/atypical), generalized tonic-clonic, tonic, clonic, myoclonic, and atonic seizures."
    tags: ["epilepsy", "classification", "generalized-seizures", "subject:paediatrics"]

  - guid: l2m3n4o5p6q7r8s9
    noteType: "Basic"
    deck: "Corpus::Paediatrics::EPILEPSY"
    fields:
      Front: "Describe seizure manifestations in newborns."
      Back: "In newborns, seizures may take subtle forms due to relatively undeveloped cortex: facial grimacing, nystagmus, intermittent apnoeic episodes, myoclonus, sudden loss of muscle tone, eye blinking, chewing, lip smacking."
    tags: ["epilepsy", "newborn-seizures", "clinical-manifestations", "subject:paediatrics"]

  - guid: m3n4o5p6q7r8s9t0
    noteType: "Basic"
    deck: "Corpus::Paediatrics::EPILEPSY"
    fields:
      Front: "What are the initial assessment steps for a first-time seizure (A, B, C)?"
      Back: "A, B, C assessment plus: Temperature, BP, Glucose. Check for life-threatening causes: meningitis, systemic sepsis, accidental/non-accidental head trauma, ingestion of drugs or toxins."
    tags: ["epilepsy", "first-seizure-evaluation", "assessment", "subject:paediatrics"]

  - guid: n4o5p6q7r8s9t0u1
    noteType: "Basic"
    deck: "Corpus::Paediatrics::EPILEPSY"
    fields:
      Front: "What history should be obtained for a first-time seizure?"
      Back: "Detailed description from eyewitness (ask to imitate); what child was doing before episode; what happened before, during, and after; aura/behavior preceding seizure (epigastric discomfort, pain, fear); posture, tongue biting, urine incontinence; post-ictal state (sleep or headache)."
    tags: ["epilepsy", "first-seizure-evaluation", "history", "subject:paediatrics"]

  - guid: o5p6q7r8s9t0u1v2
    noteType: "Basic"
    deck: "Corpus::Paediatrics::EPILEPSY"
    fields:
      Front: "What additional history elements are critical for first-time seizure evaluation?"
      Back: "State of consciousness during episode, duration of seizure, timing (awake/asleep/on awakening), triggering/precipitating factors."
    tags: ["epilepsy", "first-seizure-evaluation", "history", "subject:paediatrics"]

  - guid: p6q7r8s9t0u1v2w3
    noteType: "Basic"
    deck: "Corpus::Paediatrics::EPILEPSY"
    fields:
      Front: "What should physical examination focus on in first-time seizure?"
      Back: "Search for organic causes and complications: Height, weight, head circumference, general examination (dysmorphism, neurocutaneous lesions), neurological examination including retinal exam."
    tags: ["epilepsy", "first-seizure-evaluation", "examination", "subject:paediatrics"]

  - guid: q7r8s9t0u1v2w3x4
    noteType: "Basic"
    deck: "Corpus::Paediatrics::EPILEPSY"
    fields:
      Front: "What is benign sleep myoclonus?"
      Back: "A condition that mimics seizures: jerking movements that occur exclusively whilst asleep."
    tags: ["epilepsy", "mimics-of-seizures", "differential-diagnosis", "subject:paediatrics"]

  - guid: r8s9t0u1v2w3x4y5
    noteType: "Basic"
    deck: "Corpus::Paediatrics::EPILEPSY"
    fields:
      Front: "What is Sandifer syndrome?"
      Back: "A condition that mimics seizures: dystonia and stiffness of head and neck, often associated with cerebral palsy."
    tags: ["epilepsy", "mimics-of-seizures", "differential-diagnosis", "subject:paediatrics"]

  - guid: s9t0u1v2w3x4y5z6
    noteType: "Basic"
    deck: "Corpus::Paediatrics::EPILEPSY"
    fields:
      Front: "What are shuddering attacks?"
      Back: "A condition that mimics seizures: toddlers with distal flapping movements when becoming excited."
    tags: ["epilepsy", "mimics-of-seizures", "differential-diagnosis", "subject:paediatrics"]

  - guid: t0u1v2w3x4y5z6a7
    noteType: "Basic"
    deck: "Corpus::Paediatrics::EPILEPSY"
    fields:
      Front: "Describe reflex anoxic seizures."
      Back: "A condition that mimics seizures: noxious events like pain lead to vagally mediated bradycardia and asystole resulting in brief collapse."
    tags: ["epilepsy", "mimics-of-seizures", "differential-diagnosis", "subject:paediatrics"]

  - guid: u1v2w3x4y5z6a7b8
    noteType: "Basic"
    deck: "Corpus::Paediatrics::EPILEPSY"
    fields:
      Front: "What is cyanotic breath holding?"
      Back: "A condition that mimics seizures: a form of vasovagal syncope."
    tags: ["epilepsy", "mimics-of-seizures", "differential-diagnosis", "subject:paediatrics"]

  - guid: v2w3x4y5z6a7b8c9
    noteType: "Basic"
    deck: "Corpus::Paediatrics::EPILEPSY"
    fields:
      Front: "What is pseudoseizure?"
      Back: "A condition that mimics seizures: psychogenic seizure."
    tags: ["epilepsy", "mimics-of-seizures", "differential-diagnosis", "subject:paediatrics"]
