notes:
  - guid: 00facbb4282c3823
    noteType: Basic
    deck: "Corpus::Nephrology::Diabetic Kidney Disease"
    fields:
      Front: "What is the definition of diabetic kidney disease (DKD)?"
      Back: "Diabetic kidney disease is an encompassing term for kidney disease due to diabetes, including classical diabetic nephropathy (nodular glomerulosclerosis/chemistry of Wilson disease) and non-classical glomerular lesions, as well as severe tubular disease. It is a clinical diagnosis."
    tags: ["subject:nephrology"]
  - guid: 4b37ab742d692585
    noteType: Basic
    deck: "Corpus::Nephrology::Diabetic Kidney Disease"
    fields:
      Front: "What are the classification types of diabetes mellitus?"
      Back: "Type 1 (immunologically mediated), Type 2 (majority of diabetic patients), genetic disorders, and gestational diabetes."
    tags: ["subject:nephrology"]
  - guid: f233db34b98911eb
    noteType: Basic
    deck: "Corpus::Nephrology::Diabetic Kidney Disease"
    fields:
      Front: "What is the pathogenesis of diabetic nephropathy?"
      Back: "Caused by: (1) metabolic factors from high glucose levels leading to advanced glycation products, (2) hemodynamic changes in blood flow/pressure, (3) vasoactive hormones (angiotensin 2, endothelium) causing hemodynamic changes, (4) release of inflammatory cytokines (TGF-beta, FGF), leading to increased extracellular matrix and vascular permeability, manifesting as proteinuria."
    tags: ["subject:nephrology"]
  - guid: ca1c40ccc5c76254
    noteType: Basic
    deck: "Corpus::Nephrology::Diabetic Kidney Disease"
    fields:
      Front: "What are the microvascular complications of diabetes?"
      Back: "Eye complications (retinopathy), kidney complications (nephropathy), and nerve complications (neuropathies)."
    tags: ["subject:nephrology"]
  - guid: 8844a00f61a845a1
    noteType: Basic
    deck: "Corpus::Nephrology::Diabetic Kidney Disease"
    fields:
      Front: "What are the macrovascular complications of diabetes?"
      Back: "Brain complications (heart attacks, strokes), heart complications, and peripheral vascular disease affecting extremities."
    tags: ["subject:nephrology"]
  - guid: 22b2692b0c4702a0
    noteType: Basic
    deck: "Corpus::Nephrology::Diabetic Kidney Disease"
    fields:
      Front: "What is the characteristic pathological feature of classical diabetic nephropathy?"
      Back: "Nodular glomerulosclerosis (Chemistry of Wilson disease) - characterized by deposition of extracellular matrix within the glomerulus, surrounding the basement membrane of capillary loops."
    tags: ["subject:nephrology"]
  - guid: 841693f3bf7f939c
    noteType: Basic
    deck: "Corpus::Nephrology::Diabetic Kidney Disease"
    fields:
      Front: "What percentage of patients with Type 1 and Type 2 diabetes develop diabetic kidney disease?"
      Back: "Approximately 20-40% of patients with Type 1 and Type 2 diabetes develop diabetic kidney disease, with close to half of them developing this clinical syndrome."
    tags: ["subject:nephrology"]
  - guid: 1e9c38a38a9aa79c
    noteType: Basic
    deck: "Corpus::Nephrology::Diabetic Kidney Disease"
    fields:
      Front: "What defines overt diabetic nephropathy in terms of proteinuria and creatinine?"
      Back: "Clinical syndrome characterized by presence of more than 3.3 grams of proteinuria and raised creatinine levels."
    tags: ["subject:nephrology"]
  - guid: ad5fb914e2932268
    noteType: Basic
    deck: "Corpus::Nephrology::Diabetic Kidney Disease"
    fields:
      Front: "What is the natural history progression of diabetic kidney disease?"
      Back: "Stage 1: No symptoms with hyperfiltration (raised eGFR). Stage 2: Asymptomatic with microalbuminuria. Stage 3: Loss of protein excretion, proteinuria, puffiness. Stage 4: Pre-dialysis with more symptoms, blood in urine, acute breathlessness. Stage 5: Complete kidney failure."
    tags: ["subject:nephrology"]
  - guid: 64c5ab212764ec43
    noteType: Basic
    deck: "Corpus::Nephrology::Diabetic Kidney Disease"
    fields:
      Front: "How does eGFR change over the natural history of diabetic kidney disease?"
      Back: "Initially eGFR spikes (hyperfiltration), then with time tends to drop. After about 15 years of diabetes, eGFR drops precipitously."
    tags: ["subject:nephrology"]
  - guid: 2bf9dc5409819523
    noteType: Basic
    deck: "Corpus::Nephrology::Diabetic Kidney Disease"
    fields:
      Front: "What is the relationship between diabetic retinopathy and diabetic nephropathy?"
      Back: "The eye is the window to the kidney. Presence of proliferative diabetic retinopathy correlates with pathological features of diabetic kidney disease. If a patient has diabetic retinopathy, they more likely have or will develop diabetic nephropathy."
    tags: ["subject:nephrology"]
  - guid: 50aecd58fed27ddd
    noteType: Basic
    deck: "Corpus::Nephrology::Diabetic Kidney Disease"
    fields:
      Front: "What other causes of diabetes-related kidney disorders exist besides classical diabetic nephropathy?"
      Back: "Renal hypoperfusion/papillary necrosis, renal vascular disease (hardening of arteries around kidneys), urogenic bladder with diabetic neuropathy, urinary tract infections causing kidney damage, and contrast-induced acute kidney injury."
    tags: ["subject:nephrology"]
  - guid: c19cb8b4b262e416
    noteType: Basic
    deck: "Corpus::Nephrology::Diabetic Kidney Disease"
    fields:
      Front: "What are the lifestyle modifications for managing diabetic kidney disease?"
      Back: "Weight loss, stop smoking, improve diet, increase physical activity, protein restriction (less than 0.8 mg/day), and salt restriction (less than 5 grams per day)."
    tags: ["subject:nephrology"]
  - guid: 1680c2a8c37dfab9
    noteType: Basic
    deck: "Corpus::Nephrology::Diabetic Kidney Disease"
    fields:
      Front: "What is the first-line agent of choice for managing hypertension and proteinuria in diabetic kidney disease?"
      Back: "ACE inhibitor or ARB (Angiotensin Receptor Blocker). These agents are the agents of choice for reducing proteinuria and slowing progression of kidney disease."
    tags: ["subject:nephrology"]
  - guid: d0ab51503a2611d9
    noteType: Basic
    deck: "Corpus::Nephrology::Diabetic Kidney Disease"
    fields:
      Front: "What are the newer agents used to manage blood glucose in diabetic kidney disease?"
      Back: "SGLT2 inhibitors (sodium-glucose cotransporter-2 inhibitors) are the newer agents for the future of glucose management in diabetic kidney disease."
    tags: ["subject:nephrology"]
  - guid: f394bb7be2cfaa83
    noteType: Basic
    deck: "Corpus::Nephrology::Diabetic Kidney Disease"
    fields:
      Front: "What is the target HbA1c for patients with diabetic kidney disease not on insulin?"
      Back: "Less than 7.5%. On insulin, the target should be less than 6.5%."
    tags: ["subject:nephrology"]
  - guid: 6fac1bfbb95e40ea
    noteType: Basic
    deck: "Corpus::Nephrology::Diabetic Kidney Disease"
    fields:
      Front: "What is the target blood pressure for patients with diabetic kidney disease?"
      Back: "Generally 130/80 mmHg, should aim for at least less than 120 mmHg. Patients with proteinuria should have an even lower blood pressure target."
    tags: ["subject:nephrology"]
  - guid: 22219b02c530224f
    noteType: Basic
    deck: "Corpus::Nephrology::Diabetic Kidney Disease"
    fields:
      Front: "How does blood pressure control affect the decline in eGFR in overt diabetic nephropathy?"
      Back: "Without good blood pressure control: eGFR declines 12 ml/min per year. With good blood pressure control: eGFR declines 5 ml/min per year. With ACE inhibitor/ARB: eGFR declines less than 0.3 ml/min per year."
    tags: ["subject:nephrology"]
  - guid: 8e7cdfc62c8c53aa
    noteType: Basic
    deck: "Corpus::Nephrology::Diabetic Kidney Disease"
    fields:
      Front: "At what eGFR threshold should metformin be withdrawn in diabetic kidney disease?"
      Back: "When eGFR is less than 30, metformin should be withdrawn because it becomes nephrotoxic."
    tags: ["subject:nephrology"]
  - guid: 814039b58eb2b61a
    noteType: Basic
    deck: "Corpus::Nephrology::Diabetic Kidney Disease"
    fields:
      Front: "When should a patient with diabetic kidney disease be referred to nephrology?"
      Back: "Referral is indicated when: (1) eGFR less than 30, (2) high protein excretion, (3) rapid loss of kidney function, (4) resistant hypertension, or (5) evidence of inflammatory kidney disease (RBC casts, dysmorphia, RBCs in urine)."
    tags: ["subject:nephrology"]
  - guid: 8fa270a7d9866837
    noteType: Basic
    deck: "Corpus::Nephrology::Diabetic Kidney Disease"
    fields:
      Front: "What antihypertensive and antiproteinuric agents are used in diabetic kidney disease?"
      Back: "ACE inhibitor, ARB, non-dihydropyridine calcium channel blocker, glucagon-like peptide-1 (GLP-1) receptor agonists, beta blockers, and statins. All have some antiproteinuric actions to protect kidneys."
    tags: ["subject:nephrology"]
  - guid: 1004d39e0ed19962
    noteType: Basic
    deck: "Corpus::Nephrology::Diabetic Kidney Disease"
    fields:
      Front: "How does the approach to glycemic control differ based on comorbidities in diabetic kidney disease?"
      Back: "Aim for HbA1c less than 6.5% if few comorbidities (better control). Keep range 6.5-8% with moderate comorbidities. Increase HbA1c target if severe kidney disease, or if hypoglycemic awareness is impaired, or if expecting short life expectancy."
    tags: ["subject:nephrology"]
  - guid: 4a4cb2a2716f22a5
    noteType: Basic
    deck: "Corpus::Nephrology::Diabetic Kidney Disease"
    fields:
      Front: "What are the key history elements to assess in a patient with suspected diabetic kidney disease?"
      Back: "Type of diabetes (Type 1 vs Type 2), blood glucose control history (good vs poor), medication history for glucose control, presence of macro/microvascular complications, patient education received, glycemic episodes (hyperglycemic and hypoglycemic), and symptoms of complications (retinal, GI, musculoskeletal, infective, neuropsychiatric)."
    tags: ["subject:nephrology"]
