- id: gout-definition-immunoarthritis
  front: What is gout and what causes it?
  back: Gout is a form of immunoarthritis caused by the deposition of monosodium urate (MSU) crystals in joints and surrounding tissues. MSU shedding in a joint leads to recurring episodes of acute inflammatory arthritis.
  category: Definition

- id: gout-urate-solubility
  front: What is hyperuricemia and what does it mean?
  back: Hyperuricemia is a serum uric acid concentration above the saturation point (~6.8 mg/dL at body temperature). Clinical consequences include acute uric acid stones and nephropathies.
  category: Pathophysiology

- id: gout-causes-hyperuricemia
  front: What are the primary causes of hyperuricemia?
  back: Primary causes (genetic predisposition) or secondary causes - overproduction of uric acid or under-excretion of uric acid. Under-excretion is the main cause of hyperuricemia.
  category: Pathophysiology

- id: gout-epidemiology
  front: What is the male-to-female ratio and age of onset for gout?
  back: Gout is the most common form of immunoarthritis in men. Male-to-female ratio is 2-4:1 in Caucasians and 8:1 in Asians. Peak age is 40-50 years. Very rare in males below age 30 and in women.
  category: Epidemiology

- id: gout-asymptomatic-hyperuricemia
  front: Do all people with hyperuricemia develop gout?
  back: No. Not everyone with hyperuricemia develops gout. Many people remain asymptomatic despite elevated uric acid levels.
  category: Pathophysiology

- id: gout-uric-acid-source
  front: Where does uric acid come from in the body?
  back: Uric acid comes from protein-based diet. Nucleic acids (adenine, guanine) are converted to hypoxanthine and xanthine, then to uric acid via the enzyme xanthine oxidase.
  category: Biochemistry

- id: gout-uricase-mutation
  front: Why do humans accumulate uric acid compared to other primates?
  back: In humans and higher primates, uricase (a hepatic enzyme that converts uric acid to the more soluble allantoin) is inactive due to a non-sense mutation. This prevents conversion of uric acid to the more soluble form, so uric acid accumulates.
  category: Biochemistry

- id: gout-uric-acid-excretion
  front: How is uric acid eliminated from the body?
  back: Approximately 60-70% of daily uric acid is excreted by the kidneys. About 10% undergoes uricolysis in the gut. The amount of uric acid in the body is the natural result of production minus elimination.
  category: Biochemistry

- id: gout-overproduction-causes
  front: What conditions cause overproduction of uric acid?
  back: High-purine foods, myeloproliferative disorders, psoriasis, and cytotoxic drugs cause overproduction of uric acid.
  category: Etiology

- id: gout-underexcretion-causes
  front: What conditions and drugs cause under-excretion of uric acid?
  back: Alcohol, renal disease, hypertension, and drugs like diuretics, penicillamine, and thiazide diuretics cause under-excretion of uric acid.
  category: Etiology

- id: gout-metabolic-syndrome-link
  front: What is the relationship between uric acid and metabolic syndrome?
  back: There is an association between uric acid and metabolic syndrome (obesity, hypertension, hypertriglyceridemia, cholesterol disease, and diabetes). Reduction in uric acid clearance is associated with these conditions.
  category: Comorbidities

- id: gout-asymptomatic-consequences
  front: What are the consequences of asymptomatic hyperuricemia?
  back: A patient with asymptomatic hyperuricemia may remain asymptomatic, develop acute gout attacks, develop tophi, chronic tophaceous gout, or uric acid neuropathy. Only a small percentage develop gout. Risk of kidney stones and kidney damage is low. Monitoring is important.
  category: Natural History

- id: gout-acute-attack-onset
  front: What is the typical timing and presentation of an acute gout attack?
  back: Acute gout onset is sudden with acute inflammation. Maximum risk of pain within 12-24 hours. Patients present with signs of acute inflammation that usually resolve in 5-10 days of treatment.
  category: Clinical Presentation

- id: gout-joint-involvement
  front: Which joints are involved in gout attacks?
  back: Gout can be monoarticular or polyarticular. About 50% of first attacks involve the first metatarsophalangeal joint. Lower limbs are clearly affected. In 8% of patients in the first attack, other joints like the elbow can be involved.
  category: Clinical Presentation

- id: gout-polyarticular
  front: Who typically develops polyarticular gout?
  back: Polyarticular gout is often seen in older patients taking diuretics and in females.
  category: Clinical Presentation

- id: gout-uric-acid-during-attack
  front: Is uric acid level always elevated during an acute gout attack?
  back: No. Uric acid level may be normal during an acute gout attack. Therefore, diagnosis relies on history and examination. A normal uric acid level does not exclude gout or acute gout.
  category: Diagnosis

- id: gout-physical-signs
  front: What are the physical signs of acute gout?
  back: The affected joint is red, warm, and tender. Acute inflammation is evident. The ankle bones or knee to foot can also be affected. The attack is striking with pain and swelling.
  category: Clinical Presentation

- id: gout-chronic-tophaceous
  front: What is chronic tophaceous gout?
  back: Chronic tophaceous gout is widespread deposition of urate in joints, tendons, and cartilage. Tophi develop in about 10 years when hyperuricemia is undiagnosed, untreated, or inadequately managed. Can present in elderly women and may damage bones and joints.
  category: Complications

- id: gout-tophi-appearance
  front: What do tophi look like and where can they be found?
  back: Tophi contain white/chalky material. They can be seen in the ears, hands, and other joints. X-rays show destruction of bone. Material can discharge resembling chalky particles.
  category: Complications

- id: gout-nephroliths
  front: What is the relationship between gout and kidney stones?
  back: Patients may develop nephropathies, including uric acid nephrolithiasis (kidney stones). Risk is related to the level of uric acid and urinary uric acid. Factors favoring stone production include high uric acid, dehydration, reduced urine volume, and reduced pH.
  category: Complications

- id: gout-chronic-kidney-disease
  front: What types of kidney disease are associated with gout?
  back: Three types - (1) Uric acid nephrolithiasis (kidney stones), (2) Chronic uric acid nephropathy, (3) Acute uric acid nephropathy (tumor lysis syndrome) due to massive overproduction and chemotherapy.
  category: Complications

- id: gout-investigation-uric-acid
  front: What investigations should be done for suspected gout?
  back: Should measure serum uric acid, serum creatinine, and renal function. Check for uric acid in urine. Examine synovial fluid (arthrocentesis) to confirm crystals. Screen for associated conditions and measure blood pressure.
  category: Diagnosis

- id: gout-definitive-diagnosis
  front: What is the definitive diagnostic test for gout?
  back: Definitive diagnosis is made by demonstration of monosodium urate crystals (needle-shaped) in synovial fluid obtained by joint aspiration. Synovial fluid appearance varies but is often clear or slightly turbid.
  category: Diagnosis

- id: gout-synovial-fluid-characteristics
  front: What characteristics of synovial fluid suggest sepsis in gout?
  back: The more turbid the synovial fluid, the more likely actual sepsis is present. Most of the time the fluid is clear or slightly cloudy.
  category: Diagnosis

- id: gout-asymptomatic-hyperuricemia-management
  front: How should asymptomatic hyperuricemia be managed?
  back: For asymptomatic hyperuricemia - monitor patients seriously without treatment. No specific treatment is required unless hyperuricemia correction is possible. Management focuses on patient monitoring.
  category: Management

- id: gout-acute-management-nsaid
  front: What is the first-line acute management of gout?
  back: First-line is NSAIDs, but must be used with caution. Avoid in active ulcers and renal insufficiency. Alternative - Colchicine with starting dose of 1 mg, then 0.5 mg after 2 hours, then 0.5 mg twice daily until resolution.
  category: Management

- id: gout-colchicine-dosing
  front: What is the typical colchicine dosing regimen?
  back: Colchicine - 0.5-1 mg 2-3 times daily for 5-10 days if losing all medication, or 2.5 mg then 2-5 days for those not losing medication. Alternative - 0.5 mg 3-4 times daily then taper over 7-10 days.
  category: Management

- id: gout-intramuscular-corticosteroids
  front: When can intramuscular corticosteroids be used in acute gout?
  back: Intramuscular corticosteroids can be used in acute gout as an alternative to NSAIDs and colchicine, especially for patients who cannot tolerate NSAIDs or colchicine.
  category: Management

- id: gout-urate-lowering-acute
  front: Should urate-lowering therapy be started during an acute gout attack?
  back: Urate-lowering therapy should not be initiated during acute attack due to chemotaxis concerns or prolonged attack. If patient is already on urate-lowering therapy, it can be continued while avoiding sudden discontinuation.
  category: Management

- id: gout-long-term-management
  front: What are the components of long-term gout management?
  back: Long-term management includes - (1) Patient education, (2) Diet modification, (3) Obesity and alcohol reduction, (4) Long-term prophylactic therapies (NSAIDs, colchicine for 3-6 months), (5) Urate-lowering therapy.
  category: Management

- id: gout-prophylactic-therapy
  front: How long should prophylactic therapy be continued?
  back: NSAIDs or colchicine for 3-6 months or until uric acid levels normalize. Low-dose colchicine can continue for 6 months or until uric acid level returns to normal.
  category: Management

- id: gout-urate-lowering-indications
  front: What are the indications for long-term urate-lowering therapy?
  back: Indications - (1) Serum uric acid >8-9 mg/dL with symptoms, (2) More than two attacks of gout, (3) Presence of tophi, (4) Patient willing to continue therapy long-term.
  category: Management

- id: gout-urate-lowering-xanthine-oxidase
  front: What is allopurinol and how does it work?
  back: Allopurinol is a xanthine oxidase inhibitor that acts on the last pathway converting xanthine to uric acid. It prevents conversion of xanthine to uric acid to stop uric acid accumulation. Alternative - febuxostat (xanthine oxidase inhibitor).
  category: Pharmacotherapy

- id: gout-uric-acid-reuptake-inhibition
  front: How do uricosuric agents work?
  back: Uricosuric agents increase uric acid excretion by the kidneys. They work by blocking uric acid reuptake in kidney tubules, increasing urinary excretion of uric acid.
  category: Pharmacotherapy

- id: gout-uricosuric-indications
  front: What are the indications for uricosuric agents?
  back: Indications - (1) Normal uric acid excretion, (2) Creatinine clearance >60 mL/minute, (3) No history of uric acid stones, (4) Age below 60 years, (5) Patient does not develop attacks with low-dose therapy.
  category: Pharmacotherapy

- id: gout-xanthine-oxidase-indications
  front: What are the indications for xanthine oxidase inhibitors like allopurinol?
  back: Indications - (1) Increased uric acid excretion, (2) Renal insufficiency, (3) Nephrolithiasis, (4) Uricosuric agent intolerance, (5) Prophylaxis for tumor lysis syndrome.
  category: Pharmacotherapy
