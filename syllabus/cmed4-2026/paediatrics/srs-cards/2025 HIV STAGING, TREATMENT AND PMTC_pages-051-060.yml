    fields:
      Front: "Which ARV drug is most frequently associated with anemia?"
      Back: |
        Anemia is seen most frequently with zidovudine (AZT/ZDV).
    tags: ["zidovudine", "anemia", "hematologic-adverse-effect", "subject:paediatrics"]
  - guid: "g7h8i9j0k1l2m3n8"
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 HIV STAGING, TREATMENT AND PMTC"
    fields:
      Front: "What is the absolute neutrophil count threshold for neutropenia concern?"
      Back: |
        Neutropenia usually causes no complications unless absolute PMN (polymorphonuclear cell) count is less than 250 cells/μL.
    tags: ["neutropenia", "absolute-pmn-count", "hematologic-toxicity", "subject:paediatrics"]
  - guid: "h8i9j0k1l2m3n4o9"
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 HIV STAGING, TREATMENT AND PMTC"
    fields:
      Front: "Which drugs can cause neutropenia in HIV patients?"
      Back: |
        Non-ARV drugs causing neutropenia: TMP-SMX, ganciclovir, rifabutin, hydroxyurea. Zidovudine is the ARV most associated with neutropenia.
    tags: ["neutropenia-drugs", "drug-interactions", "adverse-effects", "subject:paediatrics"]
  - guid: "i9j0k1l2m3n4o5p0"
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 HIV STAGING, TREATMENT AND PMTC"
    fields:
      Front: "Is thrombocytopenia associated with ARVs?"
      Back: |
        Thrombocytopenia is usually associated with untreated HIV, not with ARVs.
    tags: ["thrombocytopenia", "hematologic-complications", "untreated-hiv", "subject:paediatrics"]
  - guid: "j0k1l2m3n4o5p6q1"
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 HIV STAGING, TREATMENT AND PMTC"
    fields:
      Front: "What long-term metabolic complications can develop from ART?"
      Back: |
        Long-term metabolic complications include: glucose disorders, insulin resistance, impaired glucose tolerance, hyperglycemia/diabetes mellitus, dyslipidemia (decreased HDL, increased triglycerides and cholesterol).
    tags: ["metabolic-toxicity", "long-term-complications", "endocrine-disorders", "subject:paediatrics"]
  - guid: "k1l2m3n4o5p6q7r2"
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 HIV STAGING, TREATMENT AND PMTC"
    fields:
      Front: "What morphologic changes can develop from long-term ART?"
      Back: |
        Morphologic changes include: fat accumulation, abdominal obesity, buffalo hump, gynecomastia (lipodystrophy syndrome).
    tags: ["lipodystrophy", "morphologic-changes", "fat-redistribution", "subject:paediatrics"]
