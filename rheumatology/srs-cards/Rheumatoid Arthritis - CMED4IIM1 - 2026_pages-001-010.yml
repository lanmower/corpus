# Rheumatoid Arthritis SRS Cards - CMED4IIM1
# Extracted from audio transcripts pages 001-010

- id: 1
  front: "What is rheumatoid arthritis (RA)?"
  back: "Rheumatoid arthritis is an autoimmune disorder characterized by chronic symmetrical inflammatory polyarthritis (inflammation of multiple joints) that may be associated with extraarticular manifestations."
  topics: ["definition", "pathophysiology"]

- id: 2
  front: "What is the global prevalence of rheumatoid arthritis?"
  back: "The global prevalence is around 1%, though it is lower in developing countries in Asia and Africa. In South Africa, it is approximately 0.9% in urban settings and 0.12% in rural settings."
  topics: ["epidemiology", "prevalence"]

- id: 3
  front: "What is the typical age of onset for rheumatoid arthritis?"
  back: "The peak age of onset is between 35 to 55 years."
  topics: ["epidemiology"]

- id: 4
  front: "What is the female to male ratio in rheumatoid arthritis?"
  back: "Rheumatoid arthritis is more common in women, with a female to male ratio of approximately 2-3 to 1."
  topics: ["epidemiology"]

- id: 5
  front: "Which joints are typically affected in rheumatoid arthritis?"
  back: "RA characteristically affects joints symmetrically, initially beginning in smaller joints and commonly affecting the wrist, hands (metacarpophalangeal and proximal interphalangeal joints), shoulders, knees, and ankles."
  topics: ["clinical", "anatomy"]

- id: 6
  front: "What are the main genetic factors associated with RA?"
  back: "The major genetic factors include HLA-DR4 (which shows the strongest association and is present in 70% of Caucasians with RA), HLA-DQ2, and other susceptibility genes. HLA-DR4 is found in about 25% of healthy Caucasian individuals."
  topics: ["genetics", "risk-factors"]

- id: 7
  front: "What are the main environmental risk factors for developing RA?"
  back: "Environmental risk factors include periodontal infections, smoking (associated with increased risk and greater disease severity), hormonal changes with increased prevalence in females and postpartum presentation, and dysbiosis of the gut microbiome."
  topics: ["risk-factors", "environment"]

- id: 8
  front: "How does smoking affect the risk of rheumatoid arthritis?"
  back: "Smoking is associated with both increased risk of developing RA and greater disease severity."
  topics: ["risk-factors", "lifestyle"]

- id: 9
  front: "What protective factors reduce the risk of RA?"
  back: "Alcohol consumption and later age at menarche have protective effects, though moderate alcohol consumption is still recommended due to potential liver metabolism issues with RA medications."
  topics: ["risk-factors", "prevention"]

- id: 10
  front: "What is synovitis in rheumatoid arthritis?"
  back: "Synovitis is inflammation of the synovial membrane, which becomes infiltrated with inflammatory cells including lymphocytes, plasma cells, dendritic cells, and macrophages. The synovial lining cells become hypertrophied and there is proliferation of fibroblast tissue with destruction of cartilage and bone erosion."
  topics: ["pathophysiology", "inflammation"]

- id: 11
  front: "What are rheumatoid nodules?"
  back: "Rheumatoid nodules are subcutaneous fibronecrotic or mobile masses found in subcutaneous tissue, typically on the extensor surface of the hands and elbows, though they can also be found on the lungs and heart."
  topics: ["extraarticular", "manifestations"]

- id: 12
  front: "What is the role of T cells in rheumatoid arthritis pathophysiology?"
  back: "T helper cells (Th1 and Th17) become activated and produce pro-inflammatory cytokines (TNF-alpha, IL-1, IL-6, RANKL). These helper T cells also activate B cells, leading to production of autoantibodies such as rheumatoid factor and anti-CCP (anti-cyclic citrullinated peptide) antibodies."
  topics: ["pathophysiology", "immunology"]

- id: 13
  front: "What is the role of B cells in rheumatoid arthritis?"
  back: "B cells, when activated by T helper cells, produce autoantibodies including rheumatoid factor and anti-cyclic citrullinated peptide (anti-CCP) antibodies, which form immune complexes that activate macrophages and the complement system, resulting in inflammation."
  topics: ["pathophysiology", "immunology"]

- id: 14
  front: "What cytokines are key in the pathophysiology of rheumatoid arthritis?"
  back: "The key pro-inflammatory cytokines are TNF-alpha, interleukin-1 (IL-1), interleukin-6 (IL-6), and RANKL (receptor activator of nuclear factor-kappa B ligand). These mediate inflammation and bone destruction."
  topics: ["pathophysiology", "immunology"]

- id: 15
  front: "What is the role of RANKL in bone destruction in RA?"
  back: "RANKL (receptor activator of nuclear factor-kappa B ligand), produced by fibroblasts, initiates differentiation of osteoclasts from macrophages. Together with fibroblasts that produce matrix metalloproteinases (MMPs), osteoclasts mediate inflammation-dependent cartilage and bone destruction."
  topics: ["pathophysiology", "bone-destruction"]

- id: 16
  front: "What are matrix metalloproteinases (MMPs) and what is their role in RA?"
  back: "MMPs are enzymes produced by synovial fibroblasts that are activated by pro-inflammatory cytokines. They are responsible for degradation of cartilage and bone in rheumatoid arthritis."
  topics: ["pathophysiology", "molecules"]

- id: 17
  front: "How long can the prodromal phase of RA last?"
  back: "The process of RA development from initial genetic and environmental interactions to symptom onset can take up to 50 years before a person develops symptoms."
  topics: ["pathophysiology", "timeline"]

- id: 18
  front: "What is the significance of synovitis lasting more than 6 weeks?"
  back: "Synovitis or arthritis lasting more than 6 weeks is a criterion used to diagnose established rheumatoid arthritis."
  topics: ["diagnosis", "criteria"]

- id: 19
  front: "What percentage of patients with early RA progress to established disease?"
  back: "Approximately 30% of patients with early/undifferentiated arthritis may progress to established RA, while others may remit spontaneously or develop other connective tissue diseases."
  topics: ["prognosis", "outcomes"]

- id: 20
  front: "What are the main symptoms of rheumatoid arthritis?"
  back: "Main symptoms include joint pain, swelling, and morning stiffness (worse in the morning, significantly improved with movement/activity). Constitutional symptoms include fatigue, fever, and weight loss. Weakness and joint deformities may also develop."
  topics: ["clinical", "symptoms"]

- id: 21
  front: "What is the typical duration of morning stiffness in RA?"
  back: "Morning stiffness in RA is significant and improves with activity/movement (unlike mechanical pain which worsens with movement)."
  topics: ["clinical", "symptoms"]

- id: 22
  front: "What clinical signs are found on examination of RA patients?"
  back: "Clinical signs include swelling of joints, joint tenderness, muscle wasting (related to chronic inflammation), joint deformity, and limitation of range of movement."
  topics: ["clinical", "examination"]

- id: 23
  front: "What is cervical subluxation in RA and what are its dangers?"
  back: "Cervical subluxation (typically at C1-C2 joint) occurs when RA causes erosion of the transverse ligament. This can lead to spinal instability and compression of the spinal cord (myelopathy), which is now less common due to disease-modifying therapy."
  topics: ["extraarticular", "complications"]

- id: 24
  front: "What symptoms suggest cervical myelopathy in RA?"
  back: "Symptoms include neck pain radiating to the occiput, pain radiating to shoulders and hands, numbness, loss of hand grip strength, exaggerated reflexes (or absent reflexes), and weakness depending on the level of cord compression."
  topics: ["extraarticular", "complications"]

- id: 25
  front: "What are the shoulder manifestations of RA?"
  back: "RA can cause rotator cuff tendinitis, adhesive capsulitis (frozen shoulder), and limitation of movements including abduction, external rotation, flexion, and extension."
  topics: ["clinical", "shoulder"]

- id: 26
  front: "What causes lateral epicondylitis and medial epicondylitis in RA?"
  back: "Lateral epicondylitis (tennis elbow) is caused by movement at the elbow during external rotation; medial epicondylitis (golfer's elbow) is caused by inward movement at the elbow."
  topics: ["clinical", "elbow"]

- id: 27
  front: "What is the piano key sign in RA?"
  back: "The piano key sign is a deformity of the distal radioulnar joint where the styloid process is prominent and can be compressed (like pressing a piano key), indicating erosion and instability of this joint."
  topics: ["clinical", "wrist", "examination"]

- id: 28
  front: "What hand deformities are characteristic of RA?"
  back: "Characteristic deformities include swan neck deformity (hyperextension of PIP with flexion of DIP joint), boutonniere deformity (flexion of PIP with hyperextension of DIP), subluxation of MCP joints with shortening of fingers, muscle atrophy of dorsal muscles, and swelling of wrist and hand joints."
  topics: ["clinical", "hands", "deformity"]

- id: 29
  front: "What is swan neck deformity and what causes it?"
  back: "Swan neck deformity shows hyperextension of the PIP (proximal interphalangeal) joint and flexion of the DIP (distal interphalangeal) joint, caused by relaxation of the PIP flexor and central slip tendon problems with lateral band migration."
  topics: ["clinical", "deformity", "hands"]

- id: 30
  front: "What is boutonniere deformity?"
  back: "Boutonniere deformity consists of flexion at the PIP (proximal interphalangeal) joint and hyperextension at the DIP (distal interphalangeal) joint, typically caused by central slip disruption."
  topics: ["clinical", "deformity", "hands"]

- id: 31
  front: "What hand and wrist complications can develop in RA?"
  back: "Complications include extensor tendon erosion and rupture (affecting ring and little fingers), flexor tenosynovitis causing carpal tunnel syndrome, wasting of intrinsic hand muscles, and loss of sensation in fingers if nerve compression occurs."
  topics: ["clinical", "hands", "complications"]

- id: 32
  front: "What is the Phalen test and what does it detect?"
  back: "The Phalen test involves flexing the wrist to vertical position for up to 60 seconds. A positive result (pain in the lateral fingers) suggests carpal tunnel syndrome, a complication of RA."
  topics: ["clinical", "examination", "carpal-tunnel"]

- id: 33
  front: "What is the Tinel test and what does it detect?"
  back: "The Tinel test involves tapping over the transverse carpal ligament. A positive result (pain in the median distribution) suggests carpal tunnel syndrome."
  topics: ["clinical", "examination", "carpal-tunnel"]

- id: 34
  front: "What hip involvement occurs in RA?"
  back: "Hip involvement in RA includes reduced movement (flexion, extension, internal/external rotation, abduction/adduction), hip pain, hip flexion deformities, quadriceps wasting, and ischial tuberosity tenderness."
  topics: ["clinical", "hip"]

- id: 35
  front: "What knee deformities can develop in RA?"
  back: "Knee deformities include varus (knock-knee) and valgus (bowlegged) deformities, flexion deformities, and instability. RA can cause popliteal cyst (Baker's cyst) which may rupture."
  topics: ["clinical", "knee", "deformity"]

- id: 36
  front: "What ankle and foot deformities are seen in RA?"
  back: "Ankle and foot deformities include valgus heel (inversion of the talus head), flat foot (pes planus), hammer toe (flexion of middle joint with extension at PIP and DIP), claw toe, mallet toe, and separation of toes."
  topics: ["clinical", "foot", "ankle", "deformity"]

- id: 37
  front: "What is subluxation of metatarsophalangeal joints?"
  back: "Subluxation of MTP joints leads to shortening and prominent dorsal prominence of the metatarsal heads, causing the forefoot to appear wider."
  topics: ["clinical", "foot", "deformity"]

- id: 38
  front: "What is hallux valgus in RA?"
  back: "Hallux valgus is a deformity of the great toe where there is lateral deviation/varus deformity at the first metatarsophalangeal joint."
  topics: ["clinical", "foot", "deformity"]

- id: 39
  front: "What is metatarsalgia in RA?"
  back: "Metatarsalgia is pain in the metatarsal area, commonly caused by subluxation of MTP joints. Patients describe it as walking on pebbles."
  topics: ["clinical", "foot", "symptoms"]

- id: 40
  front: "What is a popliteal cyst (Baker's cyst)?"
  back: "A popliteal cyst is an outpouching of synovial fluid in the posterior knee cavity. It can rupture and cause calf swelling and pain that mimics deep vein thrombosis."
  topics: ["clinical", "knee", "complications"]

- id: 41
  front: "What ocular manifestations can occur in RA?"
  back: "Ocular manifestations include scleritis (scleral inflammation), uveitis, anterior uveitis, dry eyes (which may indicate secondary Sjögren's syndrome), and keratoconjunctivitis sicca (dry eyes and dry mouth)."
  topics: ["extraarticular", "ocular"]

- id: 42
  front: "What systemic manifestations occur in RA?"
  back: "Systemic manifestations include constitutional symptoms (fever, weight loss), lymphadenopathy from radiation, though fever above 38.3°C should exclude infection. Some patients may have high fevers."
  topics: ["extraarticular", "systemic"]

- id: 43
  front: "What cardiac and pulmonary manifestations can occur in RA?"
  back: "Cardiac manifestations include pericarditis and cardiac involvement. Pulmonary manifestations include pulmonary fibrosis and broader lung involvement."
  topics: ["extraarticular", "cardiac", "pulmonary"]
