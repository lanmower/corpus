    deck: "Corpus::Paediatrics::Bleeding child"
    fields:
      Front: "What conditions present with signs affecting both platelets and coagulation factors?"
      Back: "DIC, Leukemia, Liver disease with portal hypertension (splenomegaly)"
    tags: ["DIC", "leukemia", "liver-disease", "subject:paediatrics"]
