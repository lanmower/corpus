    fields:
      Front: "What is the drug of first choice for seizure control when IV Phenobarbitone is available?"
      Back: "Phenobarbitone (phenobarbital) for continuing seizures after benzodiazepines"
    tags: ["second-line-anticonvulsant", "seizure-ladder", "subject:paediatrics"]
