    deck: "Corpus::Paediatrics::Bleeding child"
    fields:
      Front: "List immune causes of increased platelet destruction."
      Back: "ITP (Idiopathic thrombocytopenic purpura) - most common cause in children, Neonatal Allo-immune Thrombocytopenia (NAIT), Neonatal Autoimmune Thrombocytopenia, Autoimmune/Collagen vascular disorders, Viruses (e.g. HIV), Drug Induced"
    tags: ["ITP", "immune-thrombocytopenia", "platelet-destruction", "subject:paediatrics"]
