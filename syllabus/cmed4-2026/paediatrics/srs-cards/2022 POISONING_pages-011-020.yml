    deck: "Corpus::Paediatrics::2022 POISONING"
    fields:
      Front: "What is a cholinergic toxidrome?"
      Back: |
        Cholinergic toxidrome is a clinical syndrome resulting from excessive cholinergic stimulation, typically from organophosphates, carbamates, or muscarinic agents.
    tags: ["toxidromes", "cholinergic", "organophosphates", "subject:paediatrics"]

  - guid: b2g4f8d6c0e3h7i5
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 POISONING"
    fields:
      Front: "What is an anticholinergic toxidrome?"
      Back: |
        Anticholinergic toxidrome is a clinical syndrome from blockade of acetylcholine receptors, presenting with decreased parasympathetic activity.
    tags: ["toxidromes", "anticholinergic", "mechanisms", "subject:paediatrics"]

  - guid: c3h5g9e7d1f4i8j6
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 POISONING"
    fields:
      Front: "What is salicylism?"
      Back: |
        Salicylism is the toxidrome resulting from salicylate poisoning (aspirin and related compounds).
    tags: ["toxidromes", "salicylate", "aspirin", "subject:paediatrics"]

  - guid: d4i6h0f8e2g5j9k7
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 POISONING"
    fields:
      Front: "What is a sedative toxidrome?"
      Back: |
        Sedative toxidrome is a clinical syndrome from CNS depressant poisoning, resulting in decreased consciousness and respiratory depression.
    tags: ["toxidromes", "sedative", "cns-depression", "subject:paediatrics"]

  - guid: e5j7i1g9f3h6k0l8
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 POISONING"
    fields:
      Front: "What is a dystonic toxidrome?"
      Back: |
        Dystonic toxidrome presents with dystonia (abnormal muscle tone and posturing) from agents like antipsychotics or metoclopramide.
    tags: ["toxidromes", "dystonia", "mechanisms", "subject:paediatrics"]

  - guid: f6k8j2h0g4i7l1m9
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 POISONING"
    fields:
      Front: "What is a sympathomimetic toxidrome?"
      Back: |
        Sympathomimetic toxidrome results from sympathetic nervous system overstimulation, causing hypertension, tachycardia, and agitation.
    tags: ["toxidromes", "sympathomimetic", "mechanisms", "subject:paediatrics"]

  - guid: g7l9k3i1h5j8m2n0
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 POISONING"
    fields:
      Front: "What is organophosphate poisoning?"
      Back: |
        Organophosphate poisoning results from exposure to organophosphate compounds (pesticides), which irreversibly inhibit acetylcholinesterase leading to cholinergic toxidrome.
    tags: ["organophosphates", "poisoning", "toxidromes", "subject:paediatrics"]

  - guid: h8m0l4j2i6k9n3o1
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 POISONING"
    fields:
      Front: "What does SLUDGE stand for in cholinergic poisoning?"
      Back: |
        SLUDGE is a mnemonic for signs of cholinergic toxidrome: S = salivation, L = lacrimation, U = urination, D = diaphoresis, G = GIT upset, E = emesis.
    tags: ["organophosphates", "signs", "mnemonics", "subject:paediatrics"]

