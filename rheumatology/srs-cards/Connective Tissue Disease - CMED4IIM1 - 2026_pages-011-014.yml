# Anki canonical export — rheumatology / Connective Tissue Disease
# Generated by scripts/anki_migrate.js
deck: "Corpus::Rheumatology::Connective Tissue Disease"
notes:
  - guid: 40119fb3b2d85c23
    noteType: Basic
    deck: "Corpus::Rheumatology::Connective Tissue Disease"
    fields:
      Front: "What are the three obstetric manifestations included in the clinical criteria for antiphospholipid syndrome?"
      Back: "The three obstetric manifestations are fetal death at or beyond the 10th week of gestation, premature birth before the 34th week of gestation due to severe preeclampsia or placental insufficiency, and three or more consecutive miscarriages before the 10th week of gestation."
    tags: ["subject:rheumatology"]
  - guid: b9c688970c93c201
    noteType: Basic
    deck: "Corpus::Rheumatology::Connective Tissue Disease"
    fields:
      Front: "What are the three antibodies tested for antiphospholipid syndrome and what is the timing requirement?"
      Back: "The three antibodies are lupus anticoagulant, anticardiolipin, and beta-2 glycoprotein. All positive antibody tests must be repeated 12 weeks later. Diagnosis requires two positive antibody tests plus one clinical criterion."
    tags: ["subject:rheumatology"]
  - guid: d21fd7b294eb8b62
    noteType: Basic
    deck: "Corpus::Rheumatology::Connective Tissue Disease"
    fields:
      Front: "What is the prevalence of antiphospholipid syndrome in SLE patients?"
      Back: "Antiphospholipid syndrome occurs in about 30-50% of SLE patients."
    tags: ["subject:rheumatology"]
  - guid: a9ebfac205b7d6af
    noteType: Basic
    deck: "Corpus::Rheumatology::Connective Tissue Disease"
    fields:
      Front: "Can antiphospholipid syndrome be primary or secondary?"
      Back: "Yes, antiphospholipid syndrome may be primary or secondary. Secondary APS occurs in association with other autoimmune diseases like SLE."
    tags: ["subject:rheumatology"]
  - guid: 117284dbd7964069
    noteType: Basic
    deck: "Corpus::Rheumatology::Connective Tissue Disease"
    fields:
      Front: "What are the cardiovascular manifestations of antiphospholipid syndrome?"
      Back: "Cardiovascular manifestations include cerebrovascular accidents, sinus thrombosis, cardiac valve disease, and myocardial infarction."
    tags: ["subject:rheumatology"]
  - guid: 00b2e621b9119767
    noteType: Basic
    deck: "Corpus::Rheumatology::Connective Tissue Disease"
    fields:
      Front: "What is the pathognomonic dermatological manifestation of antiphospholipid syndrome?"
      Back: "Livedo reticularis is the pathognomonic dermatological manifestation - a net-like rash that may be present on the thighs or aspects of the arms."
    tags: ["subject:rheumatology"]
  - guid: 4177b9e11c232f48
    noteType: Basic
    deck: "Corpus::Rheumatology::Connective Tissue Disease"
    fields:
      Front: "What other skin manifestations can occur in antiphospholipid syndrome?"
      Back: "Patients may present with purpura, infarction, or ulceration involving the skin."
    tags: ["subject:rheumatology"]
  - guid: b649b405f088b7b0
    noteType: Basic
    deck: "Corpus::Rheumatology::Connective Tissue Disease"
    fields:
      Front: "What hematological manifestations are associated with antiphospholipid syndrome?"
      Back: "Common hematological manifestations include thrombocytopenia, hemolytic anemia, and arterial or venous thromboembolic disease."
    tags: ["subject:rheumatology"]
  - guid: cc5a7fd14b52a58c
    noteType: Basic
    deck: "Corpus::Rheumatology::Connective Tissue Disease"
    fields:
      Front: "What neurological manifestations can occur in antiphospholipid syndrome?"
      Back: "Neurological manifestations include stroke, TIAs, and cognitive dysfunction."
    tags: ["subject:rheumatology"]
  - guid: 603bdaa0863b8486
    noteType: Basic
    deck: "Corpus::Rheumatology::Connective Tissue Disease"
    fields:
      Front: "What respiratory manifestations can occur in antiphospholipid syndrome?"
      Back: "Patients may develop oculothrombosis, pulmonary embolus, and pulmonary hypertension."
    tags: ["subject:rheumatology"]
  - guid: a51f3c5dff0174ca
    noteType: Basic
    deck: "Corpus::Rheumatology::Connective Tissue Disease"
    fields:
      Front: "What is scleroderma and what is its female to male ratio?"
      Back: "Scleroderma is diffuse cutaneous systemic sclerosis. It has a high female preponderance with a female to male ratio of 4:1."
    tags: ["subject:rheumatology"]
  - guid: d2b2766f8aeeff2e
    noteType: Basic
    deck: "Corpus::Rheumatology::Connective Tissue Disease"
    fields:
      Front: "What are the etiological factors in scleroderma?"
      Back: "Etiology may be related to certain occupations, exposure to chemicals and chemical agents, and certain drugs. However, most cases are idiopathic with possible genetic predisposition."
    tags: ["subject:rheumatology"]
  - guid: 85899012315dd30b
    noteType: Basic
    deck: "Corpus::Rheumatology::Connective Tissue Disease"
    fields:
      Front: "What is the peak age of onset for scleroderma?"
      Back: "The peak age of onset for scleroderma is 35 to 64 years of age."
    tags: ["subject:rheumatology"]
  - guid: 947f852a46ed95ee
    noteType: Basic
    deck: "Corpus::Rheumatology::Connective Tissue Disease"
    fields:
      Front: "What is the incidence of scleroderma?"
      Back: "Scleroderma occurs at approximately 30 persons per million population per year, with an estimated 125,000 active cases in the United States."
    tags: ["subject:rheumatology"]
  - guid: 3bf2cc21ac88a28f
    noteType: Basic
    deck: "Corpus::Rheumatology::Connective Tissue Disease"
    fields:
      Front: "How does scleroderma differ between African-American and European-American women?"
      Back: "Scleroderma occurs at a younger age in African-American women compared to European-American women and is more likely to be diffuse cutaneous systemic sclerosis in African-Americans."
    tags: ["subject:rheumatology"]
  - guid: 75e9848e493a8dbe
    noteType: Basic
    deck: "Corpus::Rheumatology::Connective Tissue Disease"
    fields:
      Front: "Which population has the highest reported incidence of scleroderma?"
      Back: "The Choctaw Native Americans residing in Oklahoma have the highest reported disease incidence of scleroderma."
    tags: ["subject:rheumatology"]
  - guid: 969564093a358e6b
    noteType: Basic
    deck: "Corpus::Rheumatology::Connective Tissue Disease"
    fields:
      Front: "What are the key pathogenic processes involved in scleroderma?"
      Back: "Pathogenesis involves vascular endothelial dysfunction and fibrotic process. Etiological agents or genetic predisposition lead to endothelial cell abnormalities and vascular alterations, causing chronic inflammation, fibrocyte proliferation, myofibroblast activation, vascular dysfunction, and tissue fibrosis."
    tags: ["subject:rheumatology"]
  - guid: 149d4588035ff977
    noteType: Basic
    deck: "Corpus::Rheumatology::Connective Tissue Disease"
    fields:
      Front: "What are the key characteristics of scleroderma?"
      Back: "Key characteristics include skin thickening, Raynaud phenomenon, scleroderma and most patients have a positive antinuclear antibody test (>90%)."
    tags: ["subject:rheumatology"]
  - guid: 826239515ccb1588
    noteType: Basic
    deck: "Corpus::Rheumatology::Connective Tissue Disease"
    fields:
      Front: "How is scleroderma classified?"
      Back: "Scleroderma is classified into localized scleroderma (morphia, not associated with systemic manifestations) and diffuse scleroderma (associated with systemic manifestations and referred to as systemic sclerosis)."
    tags: ["subject:rheumatology"]
  - guid: f3c8cb837b86bdbb
    noteType: Basic
    deck: "Corpus::Rheumatology::Connective Tissue Disease"
    fields:
      Front: "What are the two types of systemic sclerosis?"
      Back: "Systemic sclerosis is divided into diffuse cutaneous systemic sclerosis and limited cutaneous systemic sclerosis. There is also a small percentage of patients with systemic sclerosis without scleroderma."
    tags: ["subject:rheumatology"]
  - guid: 16cd3dd0c8a912b6
    noteType: Basic
    deck: "Corpus::Rheumatology::Connective Tissue Disease"
    fields:
      Front: "How does skin involvement differ between limited and diffuse scleroderma?"
      Back: "In limited scleroderma, skin thickening is distal to elbows and knees. In diffuse, skin thickening is proximal to elbows and knees and may involve the trunk. Both may involve the face."
    tags: ["subject:rheumatology"]
  - guid: 526c686a72cbe37f
    noteType: Basic
    deck: "Corpus::Rheumatology::Connective Tissue Disease"
    fields:
      Front: "What are the three phases of skin changes in scleroderma?"
      Back: "The three phases are the edematous phase (early), the indurative phase (skin thickening), and the atrophic phase (contractures and loss of hair and skin appendages)."
    tags: ["subject:rheumatology"]
  - guid: c79ce06e13f794ff
    noteType: Basic
    deck: "Corpus::Rheumatology::Connective Tissue Disease"
    fields:
      Front: "What is sclerodactyl?"
      Back: "Sclerodactyl is tightening of the skin distal to the metacarpophalangeal joints."
    tags: ["subject:rheumatology"]
  - guid: cc60e81db885aaf0
    noteType: Basic
    deck: "Corpus::Rheumatology::Connective Tissue Disease"
    fields:
      Front: "What facial changes occur in scleroderma?"
      Back: "Due to skin tightening over the face, patients develop an expressionless face with pursed lips and reduced oral aperture (microstomia)."
    tags: ["subject:rheumatology"]
  - guid: dfda52d47f3cbb82
    noteType: Basic
    deck: "Corpus::Rheumatology::Connective Tissue Disease"
    fields:
      Front: "What is telangiectasia and where is it found in scleroderma?"
      Back: "Telangiectasia consists of spider-like vessels that are commonly found on the lips, buccomucosa, chest, and face."
    tags: ["subject:rheumatology"]
  - guid: d62f52d12e0381a5
    noteType: Basic
    deck: "Corpus::Rheumatology::Connective Tissue Disease"
    fields:
      Front: "What is calcinosis in scleroderma?"
      Back: "Calcinosis refers to calcific deposits found in subcutaneous tissues in patients with scleroderma."
    tags: ["subject:rheumatology"]
  - guid: a09f82d59c950e25
    noteType: Basic
    deck: "Corpus::Rheumatology::Connective Tissue Disease"
    fields:
      Front: "What hyperpigmentation features occur in scleroderma?"
      Back: "Hyper- or hyperpigmentation of the skin, salt-and-pepper rash can occur in scleroderma."
    tags: ["subject:rheumatology"]
  - guid: 78c3f68d500d8bd4
    noteType: Basic
    deck: "Corpus::Rheumatology::Connective Tissue Disease"
    fields:
      Front: "What is the difference between primary and secondary Raynaud phenomenon?"
      Back: "Primary Raynaud is not always pathological, affects 4-15% of population with female to male ratio 20:1, and is managed with conservative measures and vasodilators. Secondary Raynaud is associated with connective tissue disease, often with abnormal nailfold capillary changes and digital ulceration."
    tags: ["subject:rheumatology"]
  - guid: 937f3bdba589736d
    noteType: Basic
    deck: "Corpus::Rheumatology::Connective Tissue Disease"
    fields:
      Front: "What is the characteristic color response pattern in Raynaud phenomenon?"
      Back: "The tri-phasic color response consists of white (ischemia), blue/purple (deoxygenation), and red (reperfusion)."
    tags: ["subject:rheumatology"]
  - guid: 5b248c79cdcfaff7
    noteType: Basic
    deck: "Corpus::Rheumatology::Connective Tissue Disease"
    fields:
      Front: "When does secondary Raynaud phenomenon typically occur in relation to connective tissue disease?"
      Back: "Secondary Raynaud generally occurs within two years of onset of connective tissue disease."
    tags: ["subject:rheumatology"]
  - guid: df756e58c9488d2b
    noteType: Basic
    deck: "Corpus::Rheumatology::Connective Tissue Disease"
    fields:
      Front: "What is the prevalence of Raynaud phenomenon in limited versus diffuse scleroderma?"
      Back: "Raynaud is present in 100% of limited scleroderma patients and in 70-80% of diffuse scleroderma patients. In SLE, 20-45% may have Raynaud."
    tags: ["subject:rheumatology"]
  - guid: 03436d4c0f7e585d
    noteType: Basic
    deck: "Corpus::Rheumatology::Connective Tissue Disease"
    fields:
      Front: "What is the ACR/EULAR classification criteria cutoff for definite scleroderma?"
      Back: "A patient should have 9 or more points to be classified as having definite scleroderma. The sensitivity is 91% with 92% specificity."
    tags: ["subject:rheumatology"]
  - guid: 1d828e8dba6e71fc
    noteType: Basic
    deck: "Corpus::Rheumatology::Connective Tissue Disease"
    fields:
      Front: "What antibodies are associated with diffuse scleroderma?"
      Back: "Diffuse scleroderma is associated with positive SCL-70 antibodies and positive antinuclear antibody."
    tags: ["subject:rheumatology"]
  - guid: d124049cf2a95a59
    noteType: Basic
    deck: "Corpus::Rheumatology::Connective Tissue Disease"
    fields:
      Front: "What manifestations occur in the first 1-12 months of diffuse scleroderma?"
      Back: "In diffuse scleroderma, Raynaud phenomenon, progressive skin thickening, tendon friction rubs, gastrointestinal involvement, arthritis, and fatigue may occur within the first 1-12 months."
    tags: ["subject:rheumatology"]
  - guid: 22dc4acc6111eefc
    noteType: Basic
    deck: "Corpus::Rheumatology::Connective Tissue Disease"
    fields:
      Front: "What should be screened for in systemic sclerosis to detect internal organ involvement?"
      Back: "Screening should focus on pulmonary hypertension, lung fibrosis, renal involvement, cardiac disease, and gastrointestinal symptoms."
    tags: ["subject:rheumatology"]
  - guid: 706b7b56a17ea4ba
    noteType: Basic
    deck: "Corpus::Rheumatology::Connective Tissue Disease"
    fields:
      Front: "What conservative management is used for Raynaud phenomenon?"
      Back: "Management includes keeping warm using gloves or socks and stopping smoking."
    tags: ["subject:rheumatology"]
  - guid: 6aa486cc3fc7f059
    noteType: Basic
    deck: "Corpus::Rheumatology::Connective Tissue Disease"
    fields:
      Front: "What vasodilators are used for Raynaud phenomenon?"
      Back: "Calcium channel blockers such as nifedipine, diltiazem, and amlodipine are used. The dose is increased until desired effect is obtained or stopped if side effects occur."
    tags: ["subject:rheumatology"]
  - guid: c27f1d2295dd1ccf
    noteType: Basic
    deck: "Corpus::Rheumatology::Connective Tissue Disease"
    fields:
      Front: "What other medications are used for Raynaud phenomenon?"
      Back: "Anti-adrenergic agents (prazosin, doxazosin), ACE inhibitors, and ARBs (losartan, valsartan, bisartan) are used, though they are less effective than calcium channel blockers."
    tags: ["subject:rheumatology"]
  - guid: a7e66ea266a9afd3
    noteType: Basic
    deck: "Corpus::Rheumatology::Connective Tissue Disease"
    fields:
      Front: "How is topical nitroglycerin used in Raynaud phenomenon?"
      Back: "Topical nitroglycerin ointment may be applied sparingly over affected areas for 20 minutes three times a day for painful digital ulceration. Headaches may occur as a side effect."
    tags: ["subject:rheumatology"]
  - guid: 973f002000ddddb5
    noteType: Basic
    deck: "Corpus::Rheumatology::Connective Tissue Disease"
    fields:
      Front: "What role does aspirin play in Raynaud phenomenon management?"
      Back: "Half an aspirin per day may be beneficial to inhibit platelet activation and is often recommended in patients with Raynaud."
    tags: ["subject:rheumatology"]
  - guid: 5a324acd9cde5ff6
    noteType: Basic
    deck: "Corpus::Rheumatology::Connective Tissue Disease"
    fields:
      Front: "What is the annual incidence of idiopathic inflammatory myositis?"
      Back: "The annual incidence is 2-10 cases per million, making it a relatively rare disease."
    tags: ["subject:rheumatology"]
  - guid: c2ad263395ec2057
    noteType: Basic
    deck: "Corpus::Rheumatology::Connective Tissue Disease"
    fields:
      Front: "What is the bimodal age of onset for dermatomyositis and polymyositis?"
      Back: "Dermatomyositis has a bimodal distribution with peaks at 5-15 years and 45-65 years. Polymyositis is rare before age 15 with mean onset between 50-60 years."
    tags: ["subject:rheumatology"]
  - guid: e5f3b5cd4725a384
    noteType: Basic
    deck: "Corpus::Rheumatology::Connective Tissue Disease"
    fields:
      Front: "What is the female to male ratio for inflammatory myositis?"
      Back: "The female to male ratio is 2-3:1, with predominantly females affected."
    tags: ["subject:rheumatology"]
  - guid: 0b2ad3eb815f296e
    noteType: Basic
    deck: "Corpus::Rheumatology::Connective Tissue Disease"
    fields:
      Front: "How does incidence of myositis differ by race in the United States?"
      Back: "African Americans have a greater incidence of myositis compared to Caucasians."
    tags: ["subject:rheumatology"]
  - guid: 1fc1595d5715cba7
    noteType: Basic
    deck: "Corpus::Rheumatology::Connective Tissue Disease"
    fields:
      Front: "What is the typical clinical presentation of inflammatory myositis?"
      Back: "Patients present with proximal muscle weakness involving the shoulder and hip girdle, with difficulty standing, combing hair, rising from seated position, and walking upstairs. Neck flexion weakness may occur."
    tags: ["subject:rheumatology"]
  - guid: 264d277eab00cc2d
    noteType: Basic
    deck: "Corpus::Rheumatology::Connective Tissue Disease"
    fields:
      Front: "What percentage of myositis patients have muscle pain?"
      Back: "Muscle pain is present in about 50% of patients and may be associated with muscle edema or swelling."
    tags: ["subject:rheumatology"]
  - guid: 750ee41270b9333b
    noteType: Basic
    deck: "Corpus::Rheumatology::Connective Tissue Disease"
    fields:
      Front: "What is heliotrope rash and where does it occur in dermatomyositis?"
      Back: "Heliotrope rash is a violaceous rash that involves the peri-orbital area in patients with dermatomyositis."
    tags: ["subject:rheumatology"]
  - guid: defa060c43a1cee2
    noteType: Basic
    deck: "Corpus::Rheumatology::Connective Tissue Disease"
    fields:
      Front: "What are Gottron papules?"
      Back: "Gottron papules are scaly lesions found on the extensor surfaces of the joints, particularly on the PIP, MCP, and sometimes elbow joints."
    tags: ["subject:rheumatology"]
  - guid: da5174d34cb4b313
    noteType: Basic
    deck: "Corpus::Rheumatology::Connective Tissue Disease"
    fields:
      Front: "What is the V-sign in dermatomyositis?"
      Back: "The V-sign is a hyperpigmented photosensitive rash in the V of the neck."
    tags: ["subject:rheumatology"]
  - guid: 27950984a09058c6
    noteType: Basic
    deck: "Corpus::Rheumatology::Connective Tissue Disease"
    fields:
      Front: "What is the shawl sign in dermatomyositis?"
      Back: "The shawl sign is a rash involving the shoulders and proximal arms."
    tags: ["subject:rheumatology"]
  - guid: d1c3cefb6c1601e0
    noteType: Basic
    deck: "Corpus::Rheumatology::Connective Tissue Disease"
    fields:
      Front: "What is the holster sign in dermatomyositis?"
      Back: "The holster sign is a rash involving the lateral aspect of the thighs."
    tags: ["subject:rheumatology"]
  - guid: 909bacbaf1156a73
    noteType: Basic
    deck: "Corpus::Rheumatology::Connective Tissue Disease"
    fields:
      Front: "What are mechanic's hands in inflammatory myositis?"
      Back: "Mechanic's hands involve thickening, fissuring, and cracking of the skin of the finger pads, particularly on the radial side of the index finger. This is associated with anti-synthetase antibody positivity and anti-synthetase syndrome."
    tags: ["subject:rheumatology"]
  - guid: e092a0f279252c96
    noteType: Basic
    deck: "Corpus::Rheumatology::Connective Tissue Disease"
    fields:
      Front: "What nailfold abnormalities occur in inflammatory myositis?"
      Back: "Peri-ungual erythema and hypertrophy with dilated capillary loops may be seen in inflammatory myositis."
    tags: ["subject:rheumatology"]
  - guid: 2ac037ae1c382bbe
    noteType: Basic
    deck: "Corpus::Rheumatology::Connective Tissue Disease"
    fields:
      Front: "Where is subcutaneous calcification particularly seen in myositis?"
      Back: "Subcutaneous calcification is particularly seen in juvenile dermatomyositis."
    tags: ["subject:rheumatology"]
  - guid: 1c015344ccbbff8d
    noteType: Basic
    deck: "Corpus::Rheumatology::Connective Tissue Disease"
    fields:
      Front: "What are the classification subtypes of idiopathic inflammatory myositis?"
      Back: "Classification includes polymyositis, dermatomyositis, inclusion body myositis, myositis associated with connective tissue diseases, and myositis associated with malignancy."
    tags: ["subject:rheumatology"]
  - guid: ce0c7c73c5fcf8bf
    noteType: Basic
    deck: "Corpus::Rheumatology::Connective Tissue Disease"
    fields:
      Front: "What are the characteristic features of polymyositis?"
      Back: "Polymyositis is characterized by proximal muscle weakness in limb-girdle and neck flexor muscles, elevated creatinine kinase, muscle biopsy evidence of myositis, and abnormal EMG findings."
    tags: ["subject:rheumatology"]
  - guid: c403340e2685173d
    noteType: Basic
    deck: "Corpus::Rheumatology::Connective Tissue Disease"
    fields:
      Front: "Why is malignancy screening important in inflammatory myositis?"
      Back: "Always maintain high index of suspicion for underlying malignancies, particularly in older age individuals with dermatomyositis. Malignancy screening is important."
    tags: ["subject:rheumatology"]
  - guid: 63574d8b3ba0ee80
    noteType: Basic
    deck: "Corpus::Rheumatology::Connective Tissue Disease"
    fields:
      Front: "What extra-muscular manifestations may occur in inflammatory myositis?"
      Back: "Extra-muscular features include lung involvement with interstitial lung disease (associated with anti-synthetase syndrome or polymyositis overlap), and scleroderma dysmotility."
    tags: ["subject:rheumatology"]
  - guid: 7cefdc508dd43b4b
    noteType: Basic
    deck: "Corpus::Rheumatology::Connective Tissue Disease"
    fields:
      Front: "What other causes should be excluded in proximal muscle weakness?"
      Back: "Other causes to exclude include drug and toxin-induced myopathies, neuromuscular disorders, endocrine disorders, sarcoidosis, rheumatic disorders, infections, and metabolic myopathies (particularly hypokalemia)."
    tags: ["subject:rheumatology"]
  - guid: 5522903bb2419d7d
    noteType: Basic
    deck: "Corpus::Rheumatology::Connective Tissue Disease"
    fields:
      Front: "Why should potassium levels be checked in proximal muscle weakness?"
      Back: "Hypokalemia is a common metabolic abnormality causing proximal muscle weakness that can be easily replaced and rectified."
    tags: ["subject:rheumatology"]
  - guid: ef5ff713abe8f9aa
    noteType: Basic
    deck: "Corpus::Rheumatology::Connective Tissue Disease"
    fields:
      Front: "What variables are included in the 2017 EULAR/ACR diagnostic criteria for inflammatory myositis?"
      Back: "Variables include age of onset (bimodal: 18-40 and >40 years), clinical muscle variables (upper/lower extremity and neck flexor weakness), skin variables, laboratory variables (elevated CK, LDH, AST, ALT, positive antinuclear antibody), and muscle biopsy findings."
    tags: ["subject:rheumatology"]
  - guid: 969de2a817f65ec7
    noteType: Basic
    deck: "Corpus::Rheumatology::Connective Tissue Disease"
    fields:
      Front: "What are the characteristic muscle biopsy findings in inflammatory myositis?"
      Back: "Muscle biopsy may show endomysial infiltrate, perimysial infiltrate, perifascicular atrophy, and rimmed vacuoles in inclusion body myositis."
    tags: ["subject:rheumatology"]
  - guid: 7e9e17acc363904e
    noteType: Basic
    deck: "Corpus::Rheumatology::Connective Tissue Disease"
    fields:
      Front: "What is the Bohan and Peter classification criteria?"
      Back: "The Bohan and Peter classification criteria is a relatively simple classification criteria that assists in making a diagnosis of inflammatory myositis."
    tags: ["subject:rheumatology"]
  - guid: 4b810e5a5337e9be
    noteType: Basic
    deck: "Corpus::Rheumatology::Connective Tissue Disease"
    fields:
      Front: "What are the myositis subtypes in the new classification criteria?"
      Back: "New subtypes include idiopathic inflammatory myositis (now called juvenile dermatomyositis), polymyositis, inclusion body myositis, immune-mediated necrotizing myopathy, seronegative dermatomyositis, antisynthetase syndrome, overlap myositis, cancer-associated myositis, and juvenile dermatomyositis."
    tags: ["subject:rheumatology"]
  - guid: be8f6b1b10cce978
    noteType: Basic
    deck: "Corpus::Rheumatology::Connective Tissue Disease"
    fields:
      Front: "What myositis-specific antibody is most commonly found in juvenile dermatomyositis?"
      Back: "Anti-Mi2 antibody is most commonly found in juvenile dermatomyositis."
    tags: ["subject:rheumatology"]
  - guid: bb0a14350ebcf13d
    noteType: Basic
    deck: "Corpus::Rheumatology::Connective Tissue Disease"
    fields:
      Front: "What antibodies are associated with necrotizing myositis?"
      Back: "Anti-signal recognition peptide (SRP) antibody is associated with necrotizing myositis."
    tags: ["subject:rheumatology"]
  - guid: 64aae726fd19adfd
    noteType: Basic
    deck: "Corpus::Rheumatology::Connective Tissue Disease"
    fields:
      Front: "What antibody is associated with polymyositis and antisynthetase syndrome?"
      Back: "Anti-Jo-1 antibody is associated with polymyositis and antisynthetase syndrome."
    tags: ["subject:rheumatology"]
  - guid: 5bca8e2ac2d275ea
    noteType: Basic
    deck: "Corpus::Rheumatology::Connective Tissue Disease"
    fields:
      Front: "What is the inverted pyramid approach to treating inflammatory myositis?"
      Back: "The inverted pyramid consists of corticosteroids as the base, steroid-sparing agents as the next level, and treatment of refractory disease at the top. Most patients respond to corticosteroids alone, some require steroid-sparing agents, and fewer have refractory disease."
    tags: ["subject:rheumatology"]
  - guid: db12b70e598a0319
    noteType: Basic
    deck: "Corpus::Rheumatology::Connective Tissue Disease"
    fields:
      Front: "What is mixed connective tissue disease (MCTD)?"
      Back: "Mixed connective tissue disease is an autoimmune disease with its own set of criteria that combines features of multiple connective tissue diseases."
    tags: ["subject:rheumatology"]
  - guid: 49bb28b45dac8128
    noteType: Basic
    deck: "Corpus::Rheumatology::Connective Tissue Disease"
    fields:
      Front: "What are the Alarcon-Segovia diagnostic criteria for MCTD?"
      Back: "The criteria include serological criteria (anti-U1-RNP antibody positive in high titer) and clinical criteria (edema of hands, sinovitis, myositis, Raynaud phenomenon, acrosclerosis)."
    tags: ["subject:rheumatology"]
  - guid: 34421aba51efce4a
    noteType: Basic
    deck: "Corpus::Rheumatology::Connective Tissue Disease"
    fields:
      Front: "What is the significance of anti-U1-RNP antibody in MCTD diagnosis?"
      Back: "One must have anti-U1-RNP antibody positive in high titer together with the presence of clinical criteria to make the diagnosis. Presence of U1-RNP antibody alone without clinical criteria does not make the diagnosis of MCTD."
    tags: ["subject:rheumatology"]
  - guid: f5cba93381f3f009
    noteType: Basic
    deck: "Corpus::Rheumatology::Connective Tissue Disease"
    fields:
      Front: "What are the clinical features of MCTD?"
      Back: "Clinical features include edema of the hands, sinovitis (joint inflammation), myositis (muscle inflammation), Raynaud phenomenon, and acrosclerosis (skin tightening of the digits)."
    tags: ["subject:rheumatology"]
