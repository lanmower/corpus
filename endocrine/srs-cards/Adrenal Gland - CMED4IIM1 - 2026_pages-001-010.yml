  - guid: 5166f534f75f09d5
    noteType: Basic
    deck: "Corpus::Endocrine::Adrenal Gland"
    fields:
      Front: "What are the three zones of the adrenal cortex and what hormone does each produce?"
      Back: "Zona glomerulosa produces mineralocorticoids (aldosterone and deoxycorticosterone); zona fasciculata produces glucocorticoids (cortisol/hydrocortisone and corticosterone); zona reticularis produces androgens (DHEA), estrogens, and small amounts of progesterone."
    tags: ["adrenal-anatomy", "hormone-production", "cortex-zones", "subject:endocrine"]
  - guid: f0d2007cde5d95d9
    noteType: Basic
    deck: "Corpus::Endocrine::Adrenal Gland"
    fields:
      Front: "What are the main catecholamines produced by the adrenal medulla?"
      Back: "Epinephrine (adrenaline) and norepinephrine (noradrenaline)."
    tags: ["adrenal-medulla", "catecholamines", "hormone-production", "subject:endocrine"]
  - guid: 28b939aef903184f
    noteType: Basic
    deck: "Corpus::Endocrine::Adrenal Gland"
    fields:
      Front: "What is Addison's disease and is it primary or secondary adrenal insufficiency?"
      Back: "Addison's disease is primary adrenal insufficiency where there is destruction of the adrenal gland itself, resulting in compensatory increased ACTH levels as the pituitary attempts to stimulate the damaged glands."
    tags: ["Addison's-disease", "adrenal-insufficiency", "primary-disease", "subject:endocrine"]
  - guid: 2dd9de8c319d9137
    noteType: Basic
    deck: "Corpus::Endocrine::Adrenal Gland"
    fields:
      Front: "Name the main causes of primary adrenal insufficiency (Addison's disease)."
      Back: "Autoimmune atrophy, infections (tuberculosis, fungal, viral), infiltrations (amyloidosis, hemochromatosis), hemorrhage (meningococcal septicemia), anticoagulants, drugs (ketoconazole, metyrapone), enzyme inducers (rifampicin, phenytoin), cytotoxic agents (mitotane), and adrenalectomy."
    tags: ["Addison's-disease", "etiology", "causes", "subject:endocrine"]
  - guid: 6493f4ccce643314
    noteType: Basic
    deck: "Corpus::Endocrine::Adrenal Gland"
    fields:
      Front: "What is the difference between primary and secondary adrenal insufficiency in terms of ACTH levels?"
      Back: "In primary insufficiency (Addison's), ACTH is elevated as the pituitary tries to compensate; in secondary insufficiency (pituitary problem), ACTH is low because the pituitary cannot produce it."
    tags: ["adrenal-insufficiency", "ACTH", "differential-diagnosis", "subject:endocrine"]
  - guid: 06c0fb61f1b9bbaf
    noteType: Basic
    deck: "Corpus::Endocrine::Adrenal Gland"
    fields:
      Front: "What are the clinical features of Addison's disease?"
      Back: "Insidious onset of weight loss, malaise, anorexia, vomiting, dehydration, hyperpigmentation (over bony prominences, exposed areas, palmar creases, scars, nails), sparse axillary and pubic hair, postural hypotension, amenorrhea, infertility, hypoglycemia, susceptibility to infections, and psychiatric problems. In severe cases, Addisonian crisis with shock and coma."
    tags: ["Addison's-disease", "clinical-features", "symptoms", "subject:endocrine"]
  - guid: dcacddb6f2998765
    noteType: Basic
    deck: "Corpus::Endocrine::Adrenal Gland"
    fields:
      Front: "Why does hyperpigmentation occur specifically in primary adrenal insufficiency?"
      Back: "Because as ACTH increases to compensate for low cortisol, ACTH stimulates melanocytes via its melanocyte-stimulating hormone (MSH) activity. This does not occur in secondary insufficiency where ACTH levels are low."
    tags: ["Addison's-disease", "hyperpigmentation", "pathophysiology", "subject:endocrine"]
  - guid: e28f8cc2d6a32b35
    noteType: Basic
    deck: "Corpus::Endocrine::Adrenal Gland"
    fields:
      Front: "What is an Addisonian crisis and what are the precipitating factors?"
      Back: "A life-threatening acute exacerbation of adrenal insufficiency characterized by severe hypotension, tachycardia, vomiting, abdominal pain, and potentially coma. Precipitating factors include infection, stress, and drugs."
    tags: ["Addison's-disease", "Addisonian-crisis", "medical-emergency", "subject:endocrine"]
  - guid: 2e4a7cac79667693
    noteType: Basic
    deck: "Corpus::Endocrine::Adrenal Gland"
    fields:
      Front: "What are the key findings on basic investigations in a patient with Addison's disease?"
      Back: "Urea and electrolytes: low sodium, high potassium, increased urea (prerenal dysfunction). Full blood count: anemia with eosinophilia and elevated ESR. Hypoglycemia and hypocalcemia may be present."
    tags: ["Addison's-disease", "investigations", "lab-findings", "subject:endocrine"]
  - guid: 47ac215cbc12549d
    noteType: Basic
    deck: "Corpus::Endocrine::Adrenal Gland"
    fields:
      Front: "What is the definitive test to confirm adrenal insufficiency and how is it performed?"
      Back: "Serum cortisol measured in the morning (08:00-09:00) when cortisol is expected to be highest. If cortisol is low at this peak time, adrenal insufficiency is confirmed. ACTH level is then measured to distinguish primary from secondary."
    tags: ["adrenal-insufficiency", "diagnosis", "cortisol-test", "subject:endocrine"]
  - guid: 7ddffb43e8f88c2d
    noteType: Basic
    deck: "Corpus::Endocrine::Adrenal Gland"
    fields:
      Front: "Describe the short synacthen (ACTH) stimulation test."
      Back: "A 1 microgram dose of intravenous ACTH is given, with cortisol measured at baseline, 30 minutes, and 60 minutes. In normal individuals, cortisol rises above 550 nanomoles per liter. Failure to rise indicates adrenal insufficiency."
    tags: ["adrenal-insufficiency", "synacthen-test", "diagnostic-test", "subject:endocrine"]
  - guid: 0f7e92ac03e40521
    noteType: Basic
    deck: "Corpus::Endocrine::Adrenal Gland"
    fields:
      Front: "How does the long synacthen stimulation test differentiate between primary and secondary adrenal insufficiency?"
      Back: "With primary disease (destroyed adrenal), repeated ACTH stimulation produces no cortisol response over 4 days. With secondary disease (pituitary problem), continuous ACTH stimulation gradually kickstarts the gland, causing cortisol to rise by day 4 (>550 nanomoles per liter)."
    tags: ["adrenal-insufficiency", "synacthen-test", "differential-diagnosis", "subject:endocrine"]
  - guid: 87011496866db8eb
    noteType: Basic
    deck: "Corpus::Endocrine::Adrenal Gland"
    fields:
      Front: "What is the maintenance treatment for primary adrenal insufficiency?"
      Back: "Hydrocortisone 10mg in morning, 5mg at lunch and evening (or prednisone 3mg morning, 1.25mg evening as alternative). Plus mineralocorticoid replacement: fludrocortisone 0.05-0.1mg daily."
    tags: ["Addison's-disease", "treatment", "management", "subject:endocrine"]
  - guid: 7c31d23c7ed6a53f
    noteType: Basic
    deck: "Corpus::Endocrine::Adrenal Gland"
    fields:
      Front: "What is the treatment of an Addisonian crisis?"
      Back: "Intravenous fluids (normal saline or dextrose saline) and high-dose intravenous hydrocortisone 100mg stat, then 6-hourly for 24-48 hours. Empiric antibiotics for presumed infection if there is no clear history of non-compliance."
    tags: ["Addisonian-crisis", "emergency-treatment", "management", "subject:endocrine"]
  - guid: 384c900675346a04
    noteType: Basic
    deck: "Corpus::Endocrine::Adrenal Gland"
    fields:
      Front: "What is Cushing's syndrome and what is the main clinical feature that helps identify it?"
      Back: "Cushing's syndrome is excessive glucocorticoid secretion from the adrenal cortex. The most characteristic clinical finding is truncal obesity with thin arms and legs (disproportionate obesity or lemon on a matchstick appearance)."
    tags: ["Cushing's-syndrome", "hypercortisolism", "clinical-features", "subject:endocrine"]
  - guid: a800822d307c9f75
    noteType: Basic
    deck: "Corpus::Endocrine::Adrenal Gland"
    fields:
      Front: "What is the difference between Cushing's syndrome and Cushing's disease?"
      Back: "Cushing's syndrome is any cause of hypercortisolism. Cushing's disease specifically refers to secondary hypercortisolism caused by a pituitary adenoma producing excess ACTH."
    tags: ["Cushing's-syndrome", "Cushing's-disease", "terminology", "subject:endocrine"]
  - guid: 1a76f023280a0aff
    noteType: Basic
    deck: "Corpus::Endocrine::Adrenal Gland"
    fields:
      Front: "Name the main types of Cushing's syndrome based on etiology."
      Back: "Primary (20-25%): bilateral adrenal hyperplasia or unilateral adenoma/carcinoma. Secondary (75%): pituitary adenoma (Cushing's disease) or increased CRH from hypothalamus. Ectopic: ACTH or CRH from non-pituitary tumors (bronchial carcinoma, carcinoid, pancreatic carcinoma, ovarian tumors). Drugs: exogenous glucocorticoids. Pseudo-Cushing's: alcohol or depression."
    tags: ["Cushing's-syndrome", "classification", "etiology", "subject:endocrine"]
  - guid: 123be2af90101227
    noteType: Basic
    deck: "Corpus::Endocrine::Adrenal Gland"
    fields:
      Front: "What are the facial and trunk features of Cushing's syndrome?"
      Back: "Moon facies with plethora and telangiectasia, exophthalmos (fat deposits), hirsutism (upper lip and jaw), acne on face/chest/shoulders, and truncal obesity with thin limbs. Buffalo hump (interscapular fat), and purple stretch marks (striae) more than 1cm wide on flanks, hips, abdomen, and thighs."
    tags: ["Cushing's-syndrome", "physical-findings", "clinical-features", "subject:endocrine"]
  - guid: 45415037a649da0a
    noteType: Basic
    deck: "Corpus::Endocrine::Adrenal Gland"
    fields:
      Front: "What is proximal myopathy in Cushing's syndrome caused by and what is its significance?"
      Back: "It is caused by excessive protein catabolism due to glucocorticoid excess. Clinically, patients develop wasting of proximal muscles (shoulders, hips) which contrasts with the truncal obesity."
    tags: ["Cushing's-syndrome", "myopathy", "protein-metabolism", "subject:endocrine"]
  - guid: 647d5e3b3405ad45
    noteType: Basic
    deck: "Corpus::Endocrine::Adrenal Gland"
    fields:
      Front: "What metabolic complications of Cushing's syndrome are commonly seen?"
      Back: "Secondary hypertension (due to mineralocorticoid effects), dysglycemia (glucose intolerance, pre-diabetes, or diabetes), hypokalemic alkalosis, hypercalciuria, and hyperlipidemia."
    tags: ["Cushing's-syndrome", "metabolic-complications", "secondary-diseases", "subject:endocrine"]
  - guid: d618dc235c430922
    noteType: Basic
    deck: "Corpus::Endocrine::Adrenal Gland"
    fields:
      Front: "What psychiatric and neurological manifestations can occur in Cushing's syndrome?"
      Back: "Neurosis, psychosis, depression, paranoid psychosis. Benign intracranial hypertension causing papilledema. The difficulty is that depression is both a cause (pseudo-Cushing's from depression) and an effect of Cushing's syndrome."
    tags: ["Cushing's-syndrome", "psychiatric-features", "complications", "subject:endocrine"]
  - guid: 882f0927699eaf6a
    noteType: Basic
    deck: "Corpus::Endocrine::Adrenal Gland"
    fields:
      Front: "What is the primary biochemical test to diagnose hypercortisolism?"
      Back: "24-hour urine free cortisol, which is elevated. Other tests include midnight serum cortisol or salivary cortisol (both elevated due to loss of normal diurnal variation)."
    tags: ["Cushing's-syndrome", "diagnosis", "urine-cortisol", "subject:endocrine"]
  - guid: 1353bc1acf5f87d2
    noteType: Basic
    deck: "Corpus::Endocrine::Adrenal Gland"
    fields:
      Front: "Describe the low-dose dexamethasone suppression test (1mg overnight DST)."
      Back: "Dexamethasone 1mg is given at 11pm, and cortisol is measured between 8-9am the next day. In normal individuals, dexamethasone suppresses cortisol. In Cushing's syndrome, cortisol is NOT suppressed (remains elevated)."
    tags: ["Cushing's-syndrome", "dexamethasone-suppression-test", "diagnostic-test", "subject:endocrine"]
  - guid: 286410c7ea13ca63
    noteType: Basic
    deck: "Corpus::Endocrine::Adrenal Gland"
    fields:
      Front: "What is the standard low-dose dexamethasone suppression test protocol?"
      Back: "0.5mg dexamethasone given 6-hourly for 48 hours, with serum cortisol measured on day 3. In normal individuals, cortisol falls. In Cushing's syndrome, cortisol remains elevated."
    tags: ["Cushing's-syndrome", "dexamethasone-suppression-test", "diagnostic-test", "subject:endocrine"]
  - guid: 8da962f252cad49b
    noteType: Basic
    deck: "Corpus::Endocrine::Adrenal Gland"
    fields:
      Front: "How is serum ACTH measured used to determine the etiology of Cushing's syndrome?"
      Back: "Low ACTH indicates primary (adrenal) Cushing's. High ACTH indicates either secondary (pituitary) or ectopic ACTH secretion, requiring further testing to distinguish."
    tags: ["Cushing's-syndrome", "ACTH", "differential-diagnosis", "subject:endocrine"]
  - guid: ac2d7ee2b4cd0d1d
    noteType: Basic
    deck: "Corpus::Endocrine::Adrenal Gland"
    fields:
      Front: "Describe the high-dose dexamethasone suppression test and how it distinguishes pituitary from ectopic ACTH secretion."
      Back: "2mg dexamethasone 6-hourly for 48 hours. In pituitary Cushing's, there is suppression of urine free cortisol (>90% by day 3). In ectopic ACTH, there is NO suppression. In primary adrenal, ACTH is low so the distinction doesn't apply."
    tags: ["Cushing's-syndrome", "dexamethasone-suppression-test", "differential-diagnosis", "subject:endocrine"]
  - guid: 6a5b491ef71c8f26
    noteType: Basic
    deck: "Corpus::Endocrine::Adrenal Gland"
    fields:
      Front: "What other diagnostic tests are used for Cushing's syndrome when further differentiation is needed?"
      Back: "CRF/DDAVP test to assess ACTH and cortisol response. Inferior petrosal sinus sampling (IPSS) with and without corticotropin-releasing factor to localize a pituitary adenoma. Imaging with CT or MRI to identify adrenal or pituitary tumors."
    tags: ["Cushing's-syndrome", "diagnostic-tests", "localization", "subject:endocrine"]
  - guid: 66025ab50d3b83d3
    noteType: Basic
    deck: "Corpus::Endocrine::Adrenal Gland"
    fields:
      Front: "What are the ancillary investigations in Cushing's syndrome?"
      Back: "Urea and electrolytes: hypokalemic alkalosis. Full blood count: increased hemoglobin/RBC (polycythemia), decreased WBC (eosinopenia), low ESR. Chest X-ray for hypertension or mediastinal pathology (if ectopic source suspected). ECG for hypertension. Bone mineral density (DXA) for osteoporosis screening."
    tags: ["Cushing's-syndrome", "investigations", "ancillary-tests", "subject:endocrine"]
