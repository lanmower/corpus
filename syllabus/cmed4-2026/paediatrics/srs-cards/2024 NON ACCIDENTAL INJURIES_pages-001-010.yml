    deck: "Corpus::Paediatrics::2024 NON ACCIDENTAL INJURIES"
    fields:
      Front: "What are the 8 types of child abuse?"
      Back: "1. Physical abuse\n2. Sexual abuse\n3. Emotional/psychological abuse\n4. Medical neglect\n5. Nutritional neglect\n6. Intentional drugging\n7. Safety neglect\n8. Organised abuse"
    tags: ["types-of-abuse", "child-abuse", "classification", "subject:paediatrics"]
  - guid: "1f03218f70174c87"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2024 NON ACCIDENTAL INJURIES"
    fields:
      Front: "How is physical abuse determined clinically?"
      Back: "Physical abuse is determined by the pattern, age and distribution of injuries. Typical features include: delay in seeking help, discordance between history and injury, help sought from multiple/different healthcare professionals, inappropriate health seeking behaviour, and presenting to different facilities at different times (e.g., late at night)."
    tags: ["physical-abuse", "clinical-features", "red-flags", "subject:paediatrics"]
  - guid: "19b427109f214167"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2024 NON ACCIDENTAL INJURIES"
    fields:
      Front: "What are the red flags for physical abuse presentation?"
      Back: "Red flags include: delay in seeking help, discordance between the history and the injury, help being sought from multiple/different healthcare professionals (inappropriate health seeking behaviour), and presenting to different health facilities at different times (e.g., late at night)."
    tags: ["red-flags", "physical-abuse", "presentation", "subject:paediatrics"]
  - guid: "903ef1e9ff4b4678"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2024 NON ACCIDENTAL INJURIES"
    fields:
      Front: "List 7 causes and predisposing factors for physical abuse by caregivers."
      Back: "1. Parents/caretakers who were abused themselves as children\n2. Alcoholism and drug abuse\n3. Severe psychological problems (present in ~10% of abuse cases)\n4. Breakdown of family structures\n5. Social isolation\n6. Poverty (including wealthy families)\n7. Unemployment"
    tags: ["caregiver-risk-factors", "physical-abuse", "etiology", "subject:paediatrics"]
  - guid: "4208528c05214bb9"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2024 NON ACCIDENTAL INJURIES"
    fields:
      Front: "Which children are at highest risk of physical abuse?"
      Back: "Children at risk have: behavioural problems (ADHD, Conduct Disorder, Oppositional Defiant Disorder), learning difficulties, neurodevelopmental disorders (Autism Spectrum Disorder, speech/language delay, visual/hearing impairment), or chronic illnesses (neurological, liver, renal, cardiac)."
    tags: ["child-risk-factors", "vulnerable-populations", "physical-abuse", "subject:paediatrics"]
  - guid: "76a56e3c3568477a"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2024 NON ACCIDENTAL INJURIES"
    fields:
      Front: "What is the average age of a child being physically abused and the average age at fatality?"
      Back: "Average age of child being abused: approximately 7 years. Average age of fatality in physical abuse: 3 years."
    tags: ["epidemiology", "physical-abuse", "age-distribution", "subject:paediatrics"]
  - guid: "16c0f836be1a400e"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2024 NON ACCIDENTAL INJURIES"
    fields:
      Front: "Is physical abuse more common in males or females?"
      Back: "Males are more commonly abused than females (M > F)."
    tags: ["epidemiology", "physical-abuse", "gender-differences", "subject:paediatrics"]
  - guid: "1d8efb5c58a34e6e"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2024 NON ACCIDENTAL INJURIES"
    fields:
      Front: "What is the age distribution of physically abused children?"
      Back: "1/3 of abused children are < 6 months old, 1/3 are between 3 months and 3 years, and 1/3 are > 3 years of age."
    tags: ["epidemiology", "age-distribution", "physical-abuse", "subject:paediatrics"]
  - guid: "ba62454904fd4bf5"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2024 NON ACCIDENTAL INJURIES"
    fields:
      Front: "How does child age affect the risk of severe injury and death in physical abuse?"
      Back: "The smaller the child, the greater the risk of severe injury and death. Physical abuse is a common cause of child deaths."
    tags: ["physical-abuse", "age-dependent-severity", "prognosis", "subject:paediatrics"]
  - guid: "e103917c25b743c5"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2024 NON ACCIDENTAL INJURIES"
    fields:
      Front: "List 7 differential diagnoses to consider when evaluating for physical abuse."
      Back: "1. Birth trauma\n2. Congenital syphilis\n3. Osteogenesis imperfecta\n4. Rickets\n5. Scurvy (poor wound healing, bleeding gums)\n6. Bleeding disorders (haemophilia, meningococcaemia, ITP)\n7. Skin diseases (impetigo, chickenpox, Staphylococcal scalded skin syndrome)"
    tags: ["differential-diagnosis", "physical-abuse", "mimics", "subject:paediatrics"]
  - guid: "3a55112fb16e4184"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2024 NON ACCIDENTAL INJURIES"
    fields:
      Front: "Define non-accidental injury and contrast with accidental injury."
      Back: "Non-accidental injury: deliberate action by a perpetrator which intentionally threatens and inflicts physical harm to a child. Accidental injury: unforeseen events that cause external trauma (e.g., fall from height, run over by motor vehicle, hit by object, burnt by water or fire). Key difference: there should be NO discordance between history and injury in accidental cases."
    tags: ["definitions", "non-accidental-injury", "mechanisms", "subject:paediatrics"]
