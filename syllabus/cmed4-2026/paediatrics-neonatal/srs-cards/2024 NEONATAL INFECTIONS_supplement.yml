# Supplement — paediatrics / 2024 NEONATAL INFECTIONS
deck: "Corpus::Paediatrics-Neonatal::2024 NEONATAL INFECTIONS"
notes:
  - guid: "ne128maternal-undiag01"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 NEONATAL INFECTIONS"
    fields:
      Front: "Why are maternal infections often undiagnosed in neonatal sepsis risk assessment?"
      Back: "Due to lack of or very nonspecific signs in the mother."
    tags: ["risk-factors", "maternal-infection", "subject:paediatrics-neonatal", "supplement"]
  - guid: "ne129facility-poor-hw01"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 NEONATAL INFECTIONS"
    fields:
      Front: "List the facility-related risk factors for neonatal infection."
      Back: "Overcrowding; poor hand-washing facilities; understaffing."
    tags: ["risk-factors", "facility", "subject:paediatrics-neonatal", "supplement"]
  - guid: "ne130tb-inh05"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 NEONATAL INFECTIONS"
    fields:
      Front: "What is the dosing of isoniazid (INH) for TB prophylaxis in neonates with weight 11.0–13.9 kg?"
      Back: "2 tablets of 100 mg = ~10 mg/kg."
    tags: ["tb", "drug-dosing", "isoniazid", "subject:paediatrics-neonatal", "supplement"]
  - guid: "ne131tb-inh06"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 NEONATAL INFECTIONS"
    fields:
      Front: "What is the dosing of isoniazid (INH) for TB prophylaxis in neonates with weight 14.0–19.9 kg?"
      Back: "2½ tablets of 100 mg = ~10 mg/kg."
    tags: ["tb", "drug-dosing", "isoniazid", "subject:paediatrics-neonatal", "supplement"]
  - guid: "ne132tb-inh07"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 NEONATAL INFECTIONS"
    fields:
      Front: "What is the dosing of isoniazid (INH) for TB prophylaxis in neonates with weight 20.0–24.9 kg?"
      Back: "3 tablets of 100 mg = ~10 mg/kg."
    tags: ["tb", "drug-dosing", "isoniazid", "subject:paediatrics-neonatal", "supplement"]
  - guid: "ne133tb-bcg-defer01"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 NEONATAL INFECTIONS"
    fields:
      Front: "At what point in TB-exposed neonate follow-up should BCG vaccination be deferred?"
      Back: "BCG vaccination must be deferred at every visit until TB-exposure management is complete."
    tags: ["tb", "vaccination", "bcg", "subject:paediatrics-neonatal", "supplement"]
  - guid: "ne134tb-followup-symp01"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 NEONATAL INFECTIONS"
    fields:
      Front: "What should be done at follow-up visits if a TB-exposed neonate develops symptoms? If asymptomatic?"
      Back: "If symptoms develop: investigate for TB. If asymptomatic: continue INH prophylaxis to complete 6 months."
    tags: ["tb", "management", "follow-up", "subject:paediatrics-neonatal", "supplement"]
  - guid: "ne135tb-epi-cont01"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 NEONATAL INFECTIONS"
    fields:
      Front: "Should EPI vaccinations continue in TB-exposed neonates during TB prophylaxis?"
      Back: "Yes, continue with EPI vaccinations as per schedule."
    tags: ["tb", "vaccination", "epi", "subject:paediatrics-neonatal", "supplement"]
  - guid: "ne136tb-ipt-doc01"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 NEONATAL INFECTIONS"
    fields:
      Front: "What must be documented for TB-exposed neonates?"
      Back: "INH-prophylaxis (IPT) start date must be documented."
    tags: ["tb", "prophylaxis", "documentation", "subject:paediatrics-neonatal", "supplement"]
  - guid: "ne137tb-ipt-complete01"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 NEONATAL INFECTIONS"
    fields:
      Front: "What steps are taken after IPT is complete in TB-exposed neonates?"
      Back: "Obtain BCG vaccination. If TB is confirmed during follow-up, treat per pediatric TB guidelines."
    tags: ["tb", "prophylaxis", "vaccination", "subject:paediatrics-neonatal", "supplement"]
  - guid: "ne138tb-inh-delay01"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 NEONATAL INFECTIONS"
    fields:
      Front: "What should be done if INH prophylaxis is delayed due to other clinical complications?"
      Back: "Discuss with a TB/HIV expert. Look for evidence of TB disease before starting or restarting INH."
    tags: ["tb", "prophylaxis", "complications", "subject:paediatrics-neonatal", "supplement"]
  - guid: "ne139hiv-breastfeed-exclusive01"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 NEONATAL INFECTIONS"
    fields:
      Front: "What is the recommended breastfeeding duration in HIV-exposed neonates?"
      Back: "Exclusive breastfeeding for the first 6 months is recommended."
    tags: ["hiv", "breastfeeding", "neonatal-management", "subject:paediatrics-neonatal", "supplement"]
  - guid: "ne140hiv-maternal-late-diag01"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 NEONATAL INFECTIONS"
    fields:
      Front: "What should be done if the mother is diagnosed with HIV after delivery or during the breastfeeding period?"
      Back: "Refer to the Management algorithm for High Maternal VL or HIV Diagnosis after Delivery (page 24)."
    tags: ["hiv", "maternal-diagnosis", "neonatal-management", "subject:paediatrics-neonatal", "supplement"]
  - guid: "ne141hiv-art-timing01"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 NEONATAL INFECTIONS"
    fields:
      Front: "What is the timing target for ART initiation in HIV-infected neonates relative to feeding tolerance?"
      Back: "Start ART the same day when baby can tolerate enteral feeds."
    tags: ["hiv", "neonatal-treatment", "art-initiation", "subject:paediatrics-neonatal", "supplement"]
  - guid: "ne142cmv-igm-sensitivity01"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 NEONATAL INFECTIONS"
    fields:
      Front: "In infants <3 weeks old with confirmed congenital CMV, what diagnostic test is most sensitive?"
      Back: "IgM is most sensitive in infants less than 3 weeks of age."
    tags: ["cmv", "diagnostics", "igm", "subject:paediatrics-neonatal", "supplement"]
  - guid: "ne143rubella-pcr-sources01"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 NEONATAL INFECTIONS"
    fields:
      Front: "What specimens can be used for rubella PCR to detect virus in congenital rubella?"
      Back: "Urine, throat swab, blood, or cerebrospinal fluid (CSF). PCR can detect virus for 6 months."
    tags: ["rubella", "diagnostics", "pcr", "subject:paediatrics-neonatal", "supplement"]
  - guid: "ne144rubella-infectious-notx01"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 NEONATAL INFECTIONS"
    fields:
      Front: "What is important to remember about congenital rubella infection in neonates?"
      Back: "Babies are infectious, but there is no specific treatment for congenital rubella."
    tags: ["rubella", "neonatal-treatment", "infection-control", "subject:paediatrics-neonatal", "supplement"]
  - guid: "ne145malaria-misdiag01"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 NEONATAL INFECTIONS"
    fields:
      Front: "What is a critical risk with malaria in pregnancy?"
      Back: "Malaria can be misdiagnosed with severe consequences in pregnancy; high index of suspicion needed."
    tags: ["malaria", "diagnostics", "clinical-approach", "subject:paediatrics-neonatal", "supplement"]
