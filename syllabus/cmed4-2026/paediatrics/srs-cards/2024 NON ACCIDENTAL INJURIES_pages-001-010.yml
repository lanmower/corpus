    noteType: "Basic"
    deck: "Corpus::Paediatrics::2024 NON ACCIDENTAL INJURIES"
    fields:
      Front: "Describe the historical timeline of child abuse from antiquity to the 19th century."
      Back: "Antiquity (372 AD): Infanticide. 4th-13th Century: Abandonment. 13th-19th Century: Ambivalent & Intrusive period, Exploitation & abuse."
