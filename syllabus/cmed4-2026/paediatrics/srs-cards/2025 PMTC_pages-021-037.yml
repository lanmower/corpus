  - guid: "f5e3d8a2h1c6b9f4"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2025 PMTC"
    fields:
      Front: "List the maternal factors influencing perinatal HIV transmission."
      Back: |
        - HIV-1 RNA levels (viral load)
        - Low CD4 lymphocyte count
        - Other infections: Hepatitis C, CMV, bacterial vaginosis
        - Maternal drug use
        - Lack of AZT during pregnancy
        - Cigarette smoking
    tags: ["hiv", "transmission", "maternal-factors", "subject:paediatrics"]
  - guid: "g2a6c4f7h9d1e3b8"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2025 PMTC"
    fields:
      Front: "List the obstetrical factors influencing perinatal HIV transmission."
      Back: |
        - Length of ruptured membranes/chorioamnionitis
        - Vaginal delivery
        - Invasive procedures (scalp electrodes)
        - First born twin
    tags: ["hiv", "transmission", "obstetrical-factors", "subject:paediatrics"]
