    fields:
      Front: "What general signs indicate increased work of breathing?"
      Back: "Difficulty speaking/feeding, expiratory grunting, recession (tracheal tug, supraclavicular, intercostal, subcostal), and use of accessory muscles (nasal flaring, abdominal breathing, head bobbing)"
    tags:
