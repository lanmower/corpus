    fields:
      Front: "What does EMTCT stand for?"
      Back: "Preventing and ending mother to child transmission"
    tags: ["hiv", "pmtct", "abbreviation", "subject:paediatrics"]
  - guid: "b3e4f7c2a9d1e5h6"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2025 PMTC"
    fields:
      Front: "List the perinatal modes of HIV transmission to children."
      Back: |
        - Intrauterine
        - Intrapartum
        - Breastfeeding (still common in developing world)
    tags: ["hiv", "transmission", "perinatal", "subject:paediatrics"]
  - guid: "c1d8e3f5a7b2g9c4"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2025 PMTC"
    fields:
      Front: "What is the estimated risk of HIV transmission from contaminated blood product in the US?"
      Back: "1 in 2,000,000"
    tags: ["hiv", "transmission", "blood-product", "subject:paediatrics"]
  - guid: "d6a9b4c2e1f7h3d5"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2025 PMTC"
    fields:
      Front: "List the sexual modes of HIV transmission to children."
      Back: |
        - Heterosexual
        - Homosexual
        - Sexual abuse
    tags: ["hiv", "transmission", "sexual", "subject:paediatrics"]
  - guid: "e2f5g1c8d3a9h7b6"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2025 PMTC"
    fields:
      Front: "List parenteral modes of HIV transmission to children."
      Back: |
        - Illicit drugs (sharing contaminated needles)
        - Anabolic steroids (sharing contaminated needles)
    tags: ["hiv", "transmission", "parenteral", "subject:paediatrics"]
  - guid: "f4h7a3d1b9e2c5g8"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2025 PMTC"
    fields:
      Front: "What is iatrogenic HIV transmission in children?"
      Back: "Re-use of non-sterilized equipment"
    tags: ["hiv", "transmission", "iatrogenic", "subject:paediatrics"]
  - guid: "g9c3e5f2a8d1h4b7"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2025 PMTC"
    fields:
      Front: "What is mother to child transmission (MTCT) of HIV?"
      Back: "Transmission of HIV from a HIV-positive mother to her child during pregnancy, labour, delivery or breastfeeding"
    tags: ["hiv", "pmtct", "transmission", "subject:paediatrics"]
  - guid: "h5d2g8c4f1a9e3b6"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2025 PMTC"
    fields:
      Front: "What is the transmission rate of HIV from mother to child WITHOUT any intervention?"
      Back: "15% to 45%"
    tags: ["hiv", "pmtct", "transmission-rate", "subject:paediatrics"]
  - guid: "i1e6a3h2b9f7c4d8"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2025 PMTC"
    fields:
      Front: "To what percentage can mother to child transmission be reduced with effective interventions?"
      Back: "Below 5%"
    tags: ["hiv", "pmtct", "intervention", "subject:paediatrics"]
  - guid: "j8b4f1d7c2g5h9a3"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2025 PMTC"
    fields:
      Front: "When does most in utero HIV transmission occur?"
      Back: "Majority in 3rd trimester"
    tags: ["hiv", "transmission", "in-utero", "subject:paediatrics"]
  - guid: "k3a9c5e1f2d8h7b4"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2025 PMTC"
    fields:
      Front: "What is the mechanism of in utero HIV transmission?"
      Back: "Breakdown of placental integrity leading to micro transfusions of viraemic maternal blood across placenta to fetus"
    tags: ["hiv", "transmission", "mechanism", "subject:paediatrics"]
  - guid: "l7f3d9g4b1a8c5e2"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2025 PMTC"
    fields:
      Front: "What conditions increase HIV transmission in utero?"
      Back: |
        - Genital tract infections
        - Placental inflammation
    tags: ["hiv", "transmission", "risk-factors", "subject:paediatrics"]
  - guid: "m2h6a4e7c3f1d9b5"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2025 PMTC"
    fields:
      Front: "What is the mechanism of intrapartum HIV transmission?"
      Back: "Contact of infant mucosal membranes with HIV virus in blood and secretions during labour and delivery"
    tags: ["hiv", "transmission", "intrapartum", "subject:paediatrics"]
  - guid: "n5b1f3h9d2a7c8e4"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2025 PMTC"
    fields:
      Front: "What is the risk factor for intrapartum transmission if no ART is given?"
      Back: "Rupture of membranes >4 hours associated with increased risk"
    tags: ["hiv", "transmission", "intrapartum", "subject:paediatrics"]
  - guid: "o9d5a2c8f4g1h6b3"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2025 PMTC"
    fields:
      Front: "How do microtransfusions contribute to intrapartum HIV transmission?"
      Back: "Microtransfusions cross placenta during labour contractions"
    tags: ["hiv", "transmission", "intrapartum", "subject:paediatrics"]
  - guid: "p4g8e2b6d1a9f3c5"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2025 PMTC"
    fields:
      Front: "What are the main risk factors for mother to child transmission without ARV prevention?"
      Back: |
        - Maternal plasma and breastmilk viral load
        - Maternal immunologic status
        - Clinical stage
    tags: ["hiv", "pmtct", "risk-factors", "subject:paediatrics"]
  - guid: "q3c7f5h1a4d9b8e2"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2025 PMTC"
    fields:
      Front: "At birth, can clinical findings discriminate infected from uninfected infants?"
      Back: "No, at birth there are no definitive clinical findings that can discriminate between infected and uninfected"
    tags: ["hiv", "clinical", "infant", "subject:paediatrics"]
