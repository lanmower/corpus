    deck: "Corpus::Paediatrics::2025 MANAGEMENT OF SEIZURES"
    fields:
      Front: "List the components of a comprehensive history in a patient with seizures or epilepsy."
      Back: "Detailed seizure history including onset, frequency, trigger factors, duration, semiology, post-ictal features, and impact on daily function."
    tags: ["subject:paediatrics", "seizures", "management", "assessment"]
  - guid: b6e2i5j4f3h7k9l0
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 MANAGEMENT OF SEIZURES"
    fields:
      Front: "What is included in the physical examination of a patient with seizures or epilepsy?"
      Back: "General medical examination including vital signs, full neurological examination, assessment of neurodevelopmental status, and evaluation for stigmata of underlying syndromes."
    tags: ["subject:paediatrics", "seizures", "management", "assessment"]
  - guid: c7f3j6k5g4i8l0m1
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 MANAGEMENT OF SEIZURES"
    fields:
      Front: "List the bedside investigations for a patient with seizures or epilepsy."
      Back: "Bedside tests including fingerstick glucose, electrolytes assessment via simple bedside testing, and other point-of-care investigations as indicated."
    tags: ["subject:paediatrics", "seizures", "management", "assessment"]
  - guid: d8g4k7l6h5j9m1n2
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 MANAGEMENT OF SEIZURES"
    fields:
      Front: "What laboratory investigations should be performed in a patient with seizures or epilepsy?"
      Back: "Complete blood count, serum electrolytes, renal function, liver function tests, glucose, and other tests as clinically indicated based on seizure type and suspected etiology."
    tags: ["subject:paediatrics", "seizures", "management", "assessment"]
  - guid: e9h5l8m7i6k0n2o3
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 MANAGEMENT OF SEIZURES"
    fields:
      Front: "What imaging should be considered in a patient with seizures or epilepsy?"
      Back: "Neuroimaging including CT or MRI based on seizure type, age, clinical presentation, and suspected etiology to identify structural abnormalities."
    tags: ["subject:paediatrics", "seizures", "management", "assessment", "neuroimaging"]
  - guid: f0i6m9n8j7l1o3p4
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 MANAGEMENT OF SEIZURES"
    fields:
      Front: "What neurophysiology studies are relevant in a patient with seizures or epilepsy?"
      Back: "Electroencephalography (EEG) is essential for seizure classification, syndrome identification, and prognostic evaluation; may include routine, prolonged, or ambulatory EEG recordings."
    tags: ["subject:paediatrics", "seizures", "management", "assessment", "eeg"]
  - guid: g1j7n0o9k8m2p4q5
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 MANAGEMENT OF SEIZURES"
    fields:
      Front: "What is the ideal pathway for seizure treatment?"
      Back: "Monotherapy is the ideal pathway for the treatment of seizures."
    tags: ["subject:paediatrics", "seizures", "treatment", "principles"]
  - guid: h2k8o1p0l9n3q5r6
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 MANAGEMENT OF SEIZURES"
    fields:
      Front: "Define: Broad-spectrum anti-seizure medications."
      Back: "Anti-seizure medications with efficacy across multiple seizure types and epilepsy syndromes."
    tags: ["subject:paediatrics", "seizures", "medications", "classification"]
  - guid: i3l9p2q1m0o4r6s7
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 MANAGEMENT OF SEIZURES"
    fields:
      Front: "List broad-spectrum anti-seizure medications."
      Back: "Levetiracetam, lamotrigine, zonisamide, topiramate, valproic acid, clonazepam, perampanel, clobazam, and rufinamide."
    tags: ["subject:paediatrics", "seizures", "medications", "broad-spectrum"]
