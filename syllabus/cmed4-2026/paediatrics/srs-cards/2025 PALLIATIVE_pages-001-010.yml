- guid: 72271a1400422934
  noteType: Basic
  deck: |-
    Corpus::Paediatrics::2025 PALLIATIVE
  fields:
    Front: What key questions should be considered in Goals of Care?
    Back: What are you trying to achieve? (Cure? Rehab? Comfort?) How aggressive should
      we be? (ICU, blood transfusions, antibiotics?)
  tags:
  - goals-of-care
  - assessment
  - |-
    subject:paediatrics
- guid: b8320ce5d3edb20b
  noteType: Basic
  deck: |-
    Corpus::Paediatrics::2025 PALLIATIVE
  fields:
    Front: What should be considered in Advance Care Planning?
    Back: Goals of care, place of care, scenario sketching and 'what if' situations,
      resuscitation decisions (DNACPR and what it means), and medications required.
  tags:
  - advance-care-planning
  - planning
  - |-
    subject:paediatrics
- guid: 1600c33eb37a2641
  noteType: Basic
  deck: |-
    Corpus::Paediatrics::2025 PALLIATIVE
  fields:
    Front: What psychosocial support issues must be addressed in paediatric palliative
      care?
    Back: Emotional issues (fear, anxiety for mother and child), spiritual issues
      (guilt, meaning - using FICA tool), education access, play access and ability,
      financial issues (housing, food security), bereavement support, and legacy planning.
  tags:
  - psychosocial-support
  - support-issues
  - |-
    subject:paediatrics
