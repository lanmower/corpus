    noteType: Basic
    deck: "Corpus::Paediatrics::2025 CIRCULATION"
    fields:
      Front: "What must be taken during IV/IO access establishment in a shocked child?"
      Back: "Blood for emergency laboratory investigations (DEFG parameters)"
    tags: ["iv-access", "blood-investigation", "subject:paediatrics"]
  - guid: h1m7p3q9r2s6t4u8
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 CIRCULATION"
    fields:
      Front: "What procedural steps must accompany IV/IO line insertion?"
      Back: "1. Fix cannula firmly\n2. Immobilise extremity\n3. Sterile technique\n4. Safe needle disposal"
    tags: ["iv-procedure", "cannulation", "subject:paediatrics"]
