  - guid: y1z2a3b4c5d6e7f8
    noteType: "Basic"
    deck: "Corpus::Paediatrics::EPILEPSY"
    fields:
      Front: "What holistic approach should be taken for children with epilepsy?"
      Back: "Address associated behavioral problems and learning disability using educational psychology and occupational therapy services. Connect families with local support groups such as EPILEPSY SOUTH AFRICA."
    tags: ["epilepsy", "management", "holistic-approach", "subject:paediatrics"]

  - guid: z2a3b4c5d6e7f8g9
    noteType: "Basic"
    deck: "Corpus::Paediatrics::EPILEPSY"
    fields:
      Front: "What practical information should be given to children and caregivers?"
      Back: "Use patient information leaflet; address practicalities such as schooling and lunch-time doses; plan for high-risk activities such as swimming; make a seizure management plan with caregiver and child; emphasize treatment adherence and seizure diary use; warn about common and serious side effects of AEDs."
    tags: ["epilepsy", "management", "patient-education", "subject:paediatrics"]
