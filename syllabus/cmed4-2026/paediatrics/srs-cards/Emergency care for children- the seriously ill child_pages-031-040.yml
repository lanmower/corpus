    fields:
      Front: "Scenario 3: A one-year old had seizure at home, then again outside clinic. Now unconscious. Breathing wet and noisy, drooling. Looking blue. Triage as E/P/Q."
      Back: "E (Emergency) - Coma (unresponsive), airway compromise (wet breathing, drooling), cyanosis, and recurrent seizures all indicate immediate emergency treatment needed."
