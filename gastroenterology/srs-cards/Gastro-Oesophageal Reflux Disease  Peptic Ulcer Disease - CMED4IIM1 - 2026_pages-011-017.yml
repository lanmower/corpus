notes:
  - guid: d2a98f42f8cb85f8
    noteType: Basic
    deck: "Corpus::Gastroenterology::Gastro-Oesophageal Reflux Disease  Peptic Ulcer Disease"
    fields:
      Front: "What is Barrett's esophagus and what is its significance?"
      Back: "Barrett's esophagus is a condition where normal squamous epithelium of the esophagus undergoes metaplastic change to resemble the epithelium of the stomach. While sometimes a very short segment may be of little concern, these segments can extend high up into the esophagus and represent a complication of chronic GERD."
    tags: ["gerd", "peptic-ulcer-disease", "endoscopy", "h-pylori", "nsaids", "pharmacology", "difficulty:medium", "subject:gastroenterology"]
  - guid: 495a078f6bd93319
    noteType: Basic
    deck: "Corpus::Gastroenterology::Gastro-Oesophageal Reflux Disease  Peptic Ulcer Disease"
    fields:
      Front: "What are the two non-pharmacological treatments with evidence for GERD?"
      Back: "Elevation of the head of the bed (especially for nocturnal reflux) and weight loss of even 5% of body weight have clear evidence for reducing reflux symptoms. Weight loss is particularly important as it also benefits hypertension, diabetes, and cardiovascular risk."
    tags: ["gerd", "peptic-ulcer-disease", "endoscopy", "h-pylori", "nsaids", "pharmacology", "difficulty:medium", "subject:gastroenterology"]
  - guid: 9587e1f01543a6d2
    noteType: Basic
    deck: "Corpus::Gastroenterology::Gastro-Oesophageal Reflux Disease  Peptic Ulcer Disease"
    fields:
      Front: "How do alginates differ from proton pump inhibitors in terms of dosing and use?"
      Back: "Alginates are on-demand treatments that can be taken immediately after meals or when heartburn occurs. Unlike PPIs which must be taken 30 minutes to 1 hour before eating, alginates provide rapid onset of action."
    tags: ["gerd", "peptic-ulcer-disease", "endoscopy", "h-pylori", "nsaids", "pharmacology", "difficulty:medium", "subject:gastroenterology"]
  - guid: caa1950916a27abc
    noteType: Basic
    deck: "Corpus::Gastroenterology::Gastro-Oesophageal Reflux Disease  Peptic Ulcer Disease"
    fields:
      Front: "What are H2 receptor antagonists and when are they used?"
      Back: "H2 receptor antagonists are older drugs from the 1970s-80s that work before proton pump inhibitors were introduced. They have rapid onset of action and are still used on-demand for patients with acute episodes, especially in the evenings, compared to PPIs."
    tags: ["gerd", "peptic-ulcer-disease", "endoscopy", "h-pylori", "nsaids", "pharmacology", "difficulty:medium", "subject:gastroenterology"]
  - guid: fc91a9c728e42faa
    noteType: Basic
    deck: "Corpus::Gastroenterology::Gastro-Oesophageal Reflux Disease  Peptic Ulcer Disease"
    fields:
      Front: "What do proton pump inhibitors do and what is their appropriate timing?"
      Back: "PPIs markedly reduce acid secretion within the stomach. They must be taken 30 minutes to 1 hour before meals (typically before breakfast). Examples include omeprazole and pantoprazole. While generally safe, they have long-term safety concerns and must be used appropriately."
    tags: ["gerd", "peptic-ulcer-disease", "endoscopy", "h-pylori", "nsaids", "pharmacology", "difficulty:medium", "subject:gastroenterology"]
  - guid: 0e93e909b7cb43d0
    noteType: Basic
    deck: "Corpus::Gastroenterology::Gastro-Oesophageal Reflux Disease  Peptic Ulcer Disease"
    fields:
      Front: "How does anti-reflux surgery (fundoplication) alter the physiology of GERD?"
      Back: "Surgery actually corrects the underlying pathophysiology unlike medications. It targets the lower esophageal sphincter to stop frequent transient relaxations and augment the sphincter. A 360-degree fundoplication wraps the fundus of the stomach around the LES below the diaphragm."
    tags: ["gerd", "peptic-ulcer-disease", "endoscopy", "h-pylori", "nsaids", "pharmacology", "difficulty:medium", "subject:gastroenterology"]
  - guid: 6fb318d60b2de1e7
    noteType: Basic
    deck: "Corpus::Gastroenterology::Gastro-Oesophageal Reflux Disease  Peptic Ulcer Disease"
    fields:
      Front: "What are the potential complications of anti-reflux surgery?"
      Back: "If the LES is made too tight, patients may develop dysphagia. Some patients may experience excessive bloating and abdominal distension because they cannot adequately release air when eating. These patients must be carefully selected."
    tags: ["gerd", "peptic-ulcer-disease", "endoscopy", "h-pylori", "nsaids", "pharmacology", "difficulty:medium", "subject:gastroenterology"]
  - guid: 3f607b1bf62b15e3
    noteType: Basic
    deck: "Corpus::Gastroenterology::Gastro-Oesophageal Reflux Disease  Peptic Ulcer Disease"
    fields:
      Front: "Who are good candidates for anti-reflux surgery?"
      Back: "Healthy patients well-controlled on PPIs who want alternative therapy due to poor medication compliance or fear of side effects; patients with volume regurgitation, aspiration, or symptoms uncontrolled on PPIs. These are highly selected individuals."
    tags: ["gerd", "peptic-ulcer-disease", "endoscopy", "h-pylori", "nsaids", "pharmacology", "difficulty:medium", "subject:gastroenterology"]
  - guid: 69ccdf4883e39c99
    noteType: Basic
    deck: "Corpus::Gastroenterology::Gastro-Oesophageal Reflux Disease  Peptic Ulcer Disease"
    fields:
      Front: "What are potassium-competitive acid blockers (P-CABs) and their advantages?"
      Back: "P-CABs provide potent acid suppression with more flexibility than PPIs—they don't need to be taken 30 minutes before meals. They are emerging treatments for patients still experiencing significant symptoms on proton pump inhibitors, though not yet widely available."
    tags: ["gerd", "peptic-ulcer-disease", "endoscopy", "h-pylori", "nsaids", "pharmacology", "difficulty:medium", "subject:gastroenterology"]
  - guid: 8609ec3edbcaad8c
    noteType: Basic
    deck: "Corpus::Gastroenterology::Gastro-Oesophageal Reflux Disease  Peptic Ulcer Disease"
    fields:
      Front: "What is the definition of a peptic ulcer?"
      Back: "A peptic ulcer is defined as denudation of the mucosa exposed to gastric acid that must extend into the muscularis propria layer. If it doesn't extend into this layer, it is called an erosion, not a true ulcer."
    tags: ["gerd", "peptic-ulcer-disease", "endoscopy", "h-pylori", "nsaids", "pharmacology", "difficulty:medium", "subject:gastroenterology"]
  - guid: 920bf455a2279509
    noteType: Basic
    deck: "Corpus::Gastroenterology::Gastro-Oesophageal Reflux Disease  Peptic Ulcer Disease"
    fields:
      Front: "What are the common locations and mortality of peptic ulcer disease?"
      Back: "Peptic ulcers occur commonly in the gastric antrum and duodenum. Generally low mortality with uncomplicated ulcers, but mortality is associated with three key complications: hemorrhage, perforation, and obstruction."
    tags: ["gerd", "peptic-ulcer-disease", "endoscopy", "h-pylori", "nsaids", "pharmacology", "difficulty:medium", "subject:gastroenterology"]
  - guid: 06327f7853f56301
    noteType: Basic
    deck: "Corpus::Gastroenterology::Gastro-Oesophageal Reflux Disease  Peptic Ulcer Disease"
    fields:
      Front: "How are the three major complications of peptic ulcer disease managed?"
      Back: "Hemorrhage and obstruction can generally be managed endoscopically without immediate surgery. Most bleeding ulcers can now be controlled endoscopically. Perforation requires urgent surgical intervention. Obstruction may respond to endoscopic dilation but often requires surgical solution long-term."
    tags: ["gerd", "peptic-ulcer-disease", "endoscopy", "h-pylori", "nsaids", "pharmacology", "difficulty:medium", "subject:gastroenterology"]
  - guid: 9995db522e6aa815
    noteType: Basic
    deck: "Corpus::Gastroenterology::Gastro-Oesophageal Reflux Disease  Peptic Ulcer Disease"
    fields:
      Front: "What are the two most common causes of peptic ulcer disease worldwide?"
      Back: "Helicobacter pylori-associated peptic ulcer disease and non-steroidal anti-inflammatory drug (NSAID)-associated peptic ulcer disease. These two account for the vast majority of ulcers seen worldwide."
    tags: ["gerd", "peptic-ulcer-disease", "endoscopy", "h-pylori", "nsaids", "pharmacology", "difficulty:medium", "subject:gastroenterology"]
  - guid: 5643f2000531a413
    noteType: Basic
    deck: "Corpus::Gastroenterology::Gastro-Oesophageal Reflux Disease  Peptic Ulcer Disease"
    fields:
      Front: "What are other causes of peptic ulcers besides H. pylori and NSAIDs?"
      Back: "Stress ulcers (from severe pancreatitis, trauma, acute pancreatitis, extensive burns in ICU patients); Crohn's disease; tuberculosis (gastroduodenal); vascular insufficiency; and gastric cancer (which can mimic or present as an ulcer)."
    tags: ["gerd", "peptic-ulcer-disease", "endoscopy", "h-pylori", "nsaids", "pharmacology", "difficulty:medium", "subject:gastroenterology"]
  - guid: 7edb82285c7161b9
    noteType: Basic
    deck: "Corpus::Gastroenterology::Gastro-Oesophageal Reflux Disease  Peptic Ulcer Disease"
    fields:
      Front: "What is the pathophysiology of peptic ulcer disease?"
      Back: "An imbalance between protective factors (bile, prostaglandins, mucus layer) and harmful factors (H. pylori, pepsin, enzymes, bicarb deficiency, acid). Understanding this balance is key to treatment strategies."
    tags: ["gerd", "peptic-ulcer-disease", "endoscopy", "h-pylori", "nsaids", "pharmacology", "difficulty:medium", "subject:gastroenterology"]
  - guid: 456ade18e8934a9f
    noteType: Basic
    deck: "Corpus::Gastroenterology::Gastro-Oesophageal Reflux Disease  Peptic Ulcer Disease"
    fields:
      Front: "Why did Marshall and Warren win the Nobel Prize in 2005?"
      Back: "They demonstrated the link between Helicobacter pylori bacteria and peptic ulcer disease, fundamentally changing understanding and treatment of ulcers and eliminating the need for most ulcer surgeries."
    tags: ["gerd", "peptic-ulcer-disease", "endoscopy", "h-pylori", "nsaids", "pharmacology", "difficulty:medium", "subject:gastroenterology"]
  - guid: 405bcff377bd8b7a
    noteType: Basic
    deck: "Corpus::Gastroenterology::Gastro-Oesophageal Reflux Disease  Peptic Ulcer Disease"
    fields:
      Front: "What was the impact of discovering H. pylori on peptic ulcer treatment?"
      Back: "Before this discovery, patients received antacids and concoctions that provided temporary relief but ulcers recurred, often requiring partial gastrectomy surgery. Eradication of H. pylori eliminates ulcer recurrence, making ulcer surgery largely obsolete."
    tags: ["gerd", "peptic-ulcer-disease", "endoscopy", "h-pylori", "nsaids", "pharmacology", "difficulty:medium", "subject:gastroenterology"]
  - guid: 4b7c7d302716093c
    noteType: Basic
    deck: "Corpus::Gastroenterology::Gastro-Oesophageal Reflux Disease  Peptic Ulcer Disease"
    fields:
      Front: "What is H. pylori and how does it survive in acidic stomach?"
      Back: "H. pylori is a gram-negative bacillus that lives in the mucus layer overlying gastric epithelium, causing inflammation. It survives by creating an alkaline environment around itself using the enzyme urease, which breaks down urea into ammonia to neutralize acid."
    tags: ["gerd", "peptic-ulcer-disease", "endoscopy", "h-pylori", "nsaids", "pharmacology", "difficulty:medium", "subject:gastroenterology"]
  - guid: 74a067053e65d424
    noteType: Basic
    deck: "Corpus::Gastroenterology::Gastro-Oesophageal Reflux Disease  Peptic Ulcer Disease"
    fields:
      Front: "What is the association between H. pylori and gastric malignancy?"
      Back: "H. pylori is a risk factor for gastric adenocarcinoma and gastric lymphoma. The bacteria causes duodenal ulcers by infection of ectopic gastric mucosa in the duodenum."
    tags: ["gerd", "peptic-ulcer-disease", "endoscopy", "h-pylori", "nsaids", "pharmacology", "difficulty:medium", "subject:gastroenterology"]
  - guid: 74693153d3bee5f6
    noteType: Basic
    deck: "Corpus::Gastroenterology::Gastro-Oesophageal Reflux Disease  Peptic Ulcer Disease"
    fields:
      Front: "What diagnostic tests are most clinically useful for H. pylori detection?"
      Back: "The three most clinically useful tests are: (1) stool antigen testing (sensitive and specific for diagnosis and post-treatment confirmation at 8 weeks); (2) urease activity from gastric biopsy (shows pH change from urease); (3) histology of biopsy specimens. Urea breath test not readily available; serology not clinically helpful except for epidemiology."
    tags: ["gerd", "peptic-ulcer-disease", "endoscopy", "h-pylori", "nsaids", "pharmacology", "difficulty:medium", "subject:gastroenterology"]
  - guid: 5ab6ace3ad2f2664
    noteType: Basic
    deck: "Corpus::Gastroenterology::Gastro-Oesophageal Reflux Disease  Peptic Ulcer Disease"
    fields:
      Front: "When should stool antigen testing be used for H. pylori?"
      Back: "Use stool antigen for initial diagnosis and to confirm eradication at 8 weeks after completion of H. pylori eradication treatment. It is sensitive and specific and is probably underutilized clinically."
    tags: ["gerd", "peptic-ulcer-disease", "endoscopy", "h-pylori", "nsaids", "pharmacology", "difficulty:medium", "subject:gastroenterology"]
  - guid: 14666ffe471c0927
    noteType: Basic
    deck: "Corpus::Gastroenterology::Gastro-Oesophageal Reflux Disease  Peptic Ulcer Disease"
    fields:
      Front: "How do NSAIDs cause peptic ulcer disease?"
      Back: "NSAIDs inhibit cyclooxygenase enzyme, leading to suppression of prostaglandin synthesis. This reduces mucus production, decreases mucosal perfusion, and reduces epithelial proliferation—all protective factors for the gastric epithelium."
    tags: ["gerd", "peptic-ulcer-disease", "endoscopy", "h-pylori", "nsaids", "pharmacology", "difficulty:medium", "subject:gastroenterology"]
  - guid: b4898e10c111296c
    noteType: Basic
    deck: "Corpus::Gastroenterology::Gastro-Oesophageal Reflux Disease  Peptic Ulcer Disease"
    fields:
      Front: "What are the clinical presentations of peptic ulcer disease?"
      Back: "Classic symptoms include burning or epigastric pain that may improve with antacids or food, may occur at night (intermittent), and may be associated with nausea and vomiting. Notably, about 40% of patients present without abdominal pain, especially with NSAID-related ulcers, which may present as upper GI bleed with hematemesis or melena."
    tags: ["gerd", "peptic-ulcer-disease", "endoscopy", "h-pylori", "nsaids", "pharmacology", "difficulty:medium", "subject:gastroenterology"]
  - guid: 07710c696bfa96ef
    noteType: Basic
    deck: "Corpus::Gastroenterology::Gastro-Oesophageal Reflux Disease  Peptic Ulcer Disease"
    fields:
      Front: "How do NSAID-related ulcers differ in presentation from H. pylori-related ulcers?"
      Back: "NSAID-related ulcers are more likely to be painless because anti-inflammatory agents mask symptoms. They may present with upper GI bleed (hematemesis, melena) as the first presentation rather than with abdominal pain."
    tags: ["gerd", "peptic-ulcer-disease", "endoscopy", "h-pylori", "nsaids", "pharmacology", "difficulty:medium", "subject:gastroenterology"]
  - guid: 7ef4ff5d79b86a6e
    noteType: Basic
    deck: "Corpus::Gastroenterology::Gastro-Oesophageal Reflux Disease  Peptic Ulcer Disease"
    fields:
      Front: "What is the role of upper endoscopy in peptic ulcer disease?"
      Back: "Upper endoscopy (esophagogastroduodenoscopy) is essential for confirming diagnosis and providing endoscopic treatment. It allows visualization to rule out malignancy (especially important for gastric ulcers) and to treat bleeding with hemoclips, heater probes, or epinephrine-saline injection."
    tags: ["gerd", "peptic-ulcer-disease", "endoscopy", "h-pylori", "nsaids", "pharmacology", "difficulty:medium", "subject:gastroenterology"]
  - guid: 74868d8ab9b17069
    noteType: Basic
    deck: "Corpus::Gastroenterology::Gastro-Oesophageal Reflux Disease  Peptic Ulcer Disease"
    fields:
      Front: "What is the role of barium studies in evaluating peptic ulcer disease?"
      Back: "Very limited role. Barium studies may be useful only if there's concern about outlet obstruction and you want to assess stricture length when unable to pass an endoscope, but otherwise have no significant diagnostic role."
    tags: ["gerd", "peptic-ulcer-disease", "endoscopy", "h-pylori", "nsaids", "pharmacology", "difficulty:medium", "subject:gastroenterology"]
  - guid: 5b77ebe099abc6b7
    noteType: Basic
    deck: "Corpus::Gastroenterology::Gastro-Oesophageal Reflux Disease  Peptic Ulcer Disease"
    fields:
      Front: "What is the rule for gastric ulcer biopsy?"
      Back: "Gastric ulcers should always be biopsied during endoscopy to rule out malignancy/gastric cancer, even if the ulcer appears benign. Duodenal ulcers are not typically biopsied as they are usually benign. If patient is actively bleeding, biopsy can be deferred until patient is stabilized."
    tags: ["gerd", "peptic-ulcer-disease", "endoscopy", "h-pylori", "nsaids", "pharmacology", "difficulty:medium", "subject:gastroenterology"]
  - guid: f1d819533846e8d9
    noteType: Basic
    deck: "Corpus::Gastroenterology::Gastro-Oesophageal Reflux Disease  Peptic Ulcer Disease"
    fields:
      Front: "What are the high-risk ulcer features requiring endoscopic treatment?"
      Back: "High-risk features include: spurting arteries (Forrest Ia), visible blood vessels (Forrest IIa), and adherent blood clots (Forrest IIb). These require hemoclips or heater probes to prevent re-bleeding. Low-risk features like fibrin-based ulcers (Forrest III) don't require endoscopic treatment."
    tags: ["gerd", "peptic-ulcer-disease", "endoscopy", "h-pylori", "nsaids", "pharmacology", "difficulty:medium", "subject:gastroenterology"]
  - guid: b81763d12f7fecb4
    noteType: Basic
    deck: "Corpus::Gastroenterology::Gastro-Oesophageal Reflux Disease  Peptic Ulcer Disease"
    fields:
      Front: "When is IV proton pump inhibitor therapy indicated in peptic ulcer disease?"
      Back: "IV PPI is only used in patients actively having an upper GI bleed in the first 24 hours and may continue as infusion for up to 72 hours depending on the type of lesion seen. There is no place for long-term IV PPIs."
    tags: ["gerd", "peptic-ulcer-disease", "endoscopy", "h-pylori", "nsaids", "pharmacology", "difficulty:medium", "subject:gastroenterology"]
  - guid: 273773dac17dbf9c
    noteType: Basic
    deck: "Corpus::Gastroenterology::Gastro-Oesophageal Reflux Disease  Peptic Ulcer Disease"
    fields:
      Front: "What is the treatment regimen for H. pylori eradication?"
      Back: "Standard eradication requires at least two antibiotics plus a proton pump inhibitor for two weeks. The regimen is difficult to tolerate. Even with recommended regimens, eradication fails in 15-20% of cases, requiring second-line or third-line regimens."
    tags: ["gerd", "peptic-ulcer-disease", "endoscopy", "h-pylori", "nsaids", "pharmacology", "difficulty:medium", "subject:gastroenterology"]
  - guid: a48d3286d83bb09c
    noteType: Basic
    deck: "Corpus::Gastroenterology::Gastro-Oesophageal Reflux Disease  Peptic Ulcer Disease"
    fields:
      Front: "Who should be treated for H. pylori?"
      Back: "Strongly recommended in patients with duodenal or gastric ulcers, gastric lymphoma, atrophic gastritis, and patients with first-degree relatives with gastric cancer who have had gastric cancer resection. There is worldwide consideration for screening and treating all adults as a public health strategy to reduce gastric cancer risk."
    tags: ["gerd", "peptic-ulcer-disease", "endoscopy", "h-pylori", "nsaids", "pharmacology", "difficulty:medium", "subject:gastroenterology"]
  - guid: 7c9c197cfda5d9c6
    noteType: Basic
    deck: "Corpus::Gastroenterology::Gastro-Oesophageal Reflux Disease  Peptic Ulcer Disease"
    fields:
      Front: "What is the confirmation of H. pylori eradication?"
      Back: "Stool antigen test 8 weeks after completion of H. pylori eradication treatment. The eradication rate with appropriate treatment is very high."
    tags: ["gerd", "peptic-ulcer-disease", "endoscopy", "h-pylori", "nsaids", "pharmacology", "difficulty:medium", "subject:gastroenterology"]
  - guid: ac60b25654fd618c
    noteType: Basic
    deck: "Corpus::Gastroenterology::Gastro-Oesophageal Reflux Disease  Peptic Ulcer Disease"
    fields:
      Front: "What is Zollinger-Ellison syndrome?"
      Back: "A rare condition caused by a neuroendocrine tumor that secretes excessive gastrin without control, causing uninhibited acid secretion. Results in ulcers in unusual locations, poorly healing ulcers, and extensive erosions with no medical inhibition mechanism."
    tags: ["gerd", "peptic-ulcer-disease", "endoscopy", "h-pylori", "nsaids", "pharmacology", "difficulty:medium", "subject:gastroenterology"]
