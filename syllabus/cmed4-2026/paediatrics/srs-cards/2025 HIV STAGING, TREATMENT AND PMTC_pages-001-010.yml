    fields:
      Front: "What WHO classification system is used for paediatric HIV?"
      Back: "WHO uses a 4-stage system (stages 1-4) that classifies clinical status from asymptomatic to severely symptomatic, based on clinical or immunological criteria with lab-confirmed HIV infection."
    tags: ["hiv-staging", "who-classification", "paediatric-aids", "subject:paediatrics"]
  - guid: "b2d5f8a1c6e3h9k4"
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 HIV STAGING, TREATMENT AND PMTC"
    fields:
      Front: "How do CD4 counts in healthy infants compare to uninfected adults?"
      Back: |
        CD4 cell counts and %CD4+ in healthy uninfected infants are considerably higher than in uninfected adults, and slowly decline to adult values by age 6 years. Age must be taken into account when interpreting CD4 counts.
    tags: ["cd4-count", "infant-immunology", "age-related-values", "subject:paediatrics"]
  - guid: "c3e6g9b2d7f4h1j5"
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 HIV STAGING, TREATMENT AND PMTC"
    fields:
      Front: "Which CD4 parameter is more reliable in children younger than 5 years?"
      Back: |
        %CD4+ (percentage of CD4 cells) is more valuable and reliable than absolute CD4 count in children younger than 5 years, as absolute CD4 count varies more within individual children in this age group.
    tags: ["cd4-percentage", "pediatric-cd4", "age-five-years", "subject:paediatrics"]
  - guid: "d4f7h0c3e8g5i2k6"
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 HIV STAGING, TREATMENT AND PMTC"
    fields:
      Front: "What are common early clinical signs of HIV in infants during the first year of life?"
      Back: |
        Common early signs during the first year of life include: oral candidiasis, failure to thrive (FTT), and developmental delay. Lymphadenopathy frequently occurs with hepatosplenomegaly.
    tags: ["clinical-manifestations", "infant-hiv", "early-signs", "subject:paediatrics"]
  - guid: "e5g8i1d4f9h6j3l7"
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 HIV STAGING, TREATMENT AND PMTC"
    fields:
      Front: "What were the incidence rates of opportunistic infections before and after 1997 in HIV-infected children?"
      Back: |
        In a study of 364 HIV-infected children born 1986-1998 and monitored until 2004, the incidence rate of opportunistic infections decreased from 14.4 cases per 100 person-years before 1997 to 1.1 cases per 100 person-years after 1997, demonstrating the effect of combination ART.
    tags: ["opportunistic-infections", "oi-incidence", "art-effectiveness", "subject:paediatrics"]
  - guid: "f6h9j2e5g0i7k4m8"
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 HIV STAGING, TREATMENT AND PMTC"
    fields:
      Front: "Why is age-related CD4 interpretation important in paediatric HIV?"
      Back: |
        Age must be taken into account as a variable when considering absolute CD4 counts or %CD4+ because healthy infants have considerably higher CD4 counts than adults and these values decline gradually to adult levels by age 6 years.
    tags: ["cd4-interpretation", "age-adjusted", "pediatric-hiv", "subject:paediatrics"]
