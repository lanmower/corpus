    deck: "Corpus::Paediatrics::2024 RES CONDITIONS"
    fields:
      Front: "What are the clinical features of laryngomalacia?"
      Back: |
        Inspiratory stridor from birth, disappears in prone position, absent/softer when infant is asleep
