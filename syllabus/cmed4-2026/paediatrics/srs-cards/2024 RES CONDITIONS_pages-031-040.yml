    deck: "Corpus::Paediatrics::2024 RES CONDITIONS"
    fields:
      Front: "What is stridor and when does it occur?"
      Back: |
        High pitch sound. Starts during inspiration; as obstruction worsens, occurs during both inspiration and expiration. Indicates mostly extrathoracic airway obstruction.
