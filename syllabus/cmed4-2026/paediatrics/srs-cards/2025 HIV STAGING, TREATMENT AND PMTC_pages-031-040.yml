    noteType: Basic
    deck: "Corpus::Paediatrics::2025 HIV STAGING, TREATMENT AND PMTC"
    fields:
      Front: "What is the hemoglobin threshold for concern at ART initiation?"
      Back: |
        If hemoglobin is less than 8 g/dL at baseline, start ART and discuss with specialist regarding further management.
    tags: ["anemia", "hemoglobin-threshold", "baseline-assessment", "subject:paediatrics"]
