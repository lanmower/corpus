- front: "According to 2019 WHO statistics, what is the leading cause of global mortality, accounting for 18.5 million deaths annually?"
  back: "Cardiovascular disease."
  tags: []

- front: "Individually, what percentage of total global deaths is attributed to coronary artery disease (CAD)?"
  back: "16% of total deaths."
  tags: []

- front: "What term is now preferred for what was previously categorized as 'stable angina'?"
  back: "Chronic coronary syndrome."
  tags: []

- front: "At what age does the prevalence of coronary artery disease typically begin to increase significantly?"
  back: "After the age of 35 years."
  tags: []

- front: "What is the lifetime risk of a man developing CAD after the age of 40?"
  back: "49%."
  tags: []

- front: "What is the lifetime risk of a woman developing CAD after the age of 40?"
  back: "32%."
  tags: []

- front: "How does the risk of CAD in women change after menopause?"
  back: "The prevalence becomes equivalent to that of men."
  tags: []

- front: "What specific family history criteria define an additional risk factor for CAD in a male patient?"
  back: "A father or brother diagnosed with CAD before age 55."
  tags: []

- front: "What specific family history criteria define an additional risk factor for CAD in a female patient?"
  back: "A mother or sister diagnosed with CAD before age 65."
  tags: []

- front: "Compared to non-diabetics, how much does diabetes mellitus increase the rate of coronary artery disease?"
  back: "By more than 2.5 times."
  tags: []

- front: "Non-smokers exposed to secondhand smoke face a _____% to _____% increased risk of CAD."
  back: "25% to 30%."
  tags: []

- front: "What dietary intake is associated with a 22% higher risk of myocardial infarction?"
  back: "Added sugar (specifically soft drinks and sweetened beverages)."
  tags: []

- front: "Which inflammatory conditions are recognized as less common risk factors for CAD development?"
  back: "Systemic lupus erythematosus, rheumatoid arthritis, inflammatory bowel disease, and HIV."
  tags: []

- front: "What are the components used to calculate the Framingham 10-year risk assessment score?"
  back: "Age, total cholesterol, HDL-cholesterol, systolic blood pressure, and smoking status."
  tags: []

- front: "A patient with total cholesterol exceeding _____ $mmol/L$ or LDL exceeding _____ $mmol/L$ is automatically categorized as very high risk."
  back: "7.5 and 5.0."
  tags: []

- front: "What GFR threshold defines 'Stage 4' Chronic Kidney Disease, placing a patient at very high risk for CAD?"
  back: "A GFR less than 30 $ml/min/1.73m^2$."
  tags: []

- front: "What is the earliest pathological marking of coronary artery disease often seen in the teen years?"
  back: "The fatty streak."
  tags: []

- front: "Clinical manifestations of ischemic heart disease typically occur only once a coronary vessel is narrowed by what percentage?"
  back: "70%."
  tags: []

- front: "What is the defining pathological event that transitions stable CAD to an Acute Coronary Syndrome (ACS)?"
  back: "Plaque rupture followed by thrombus formation."
  tags: []

- front: "In Acute Coronary Syndrome, what distinguishes a STEMI from a Non-STEMI pathologically?"
  back: "STEMI involves total vessel occlusion by thrombus, whereas Non-STEMI involves non-total (subtotal) occlusion."
  tags: []

- front: "What is the definition of stable angina regarding the duration of symptom consistency?"
  back: "Symptom characteristics remain unchanged for the preceding 60 days."
  tags: []

- front: "What are the three criteria for 'Typical Angina'?"
  back: "Retrosternal discomfort, provoked by exertion/stress, and relieved by rest/nitrates within 5 minutes."
  tags: []

- front: "According to the Canadian Cardiovascular Society (CCS), what defines Grade III angina?"
  back: "Angina occurring with mild exertion."
  tags: []

- front: "What defines CCS Grade IV angina?"
  back: "Angina occurring at rest."
  tags: []

- front: "On an ECG, what measurement constitutes significant ST-segment depression in the limb leads?"
  back: "Any depression in excess of 1 mm (especially if horizontal)."
  tags: []

- front: "What ECG finding is characteristic of an ST-elevation myocardial infarction (STEMI) in the chest leads?"
  back: "More than 2 mm of concave ST-segment elevation."
  tags: []

- front: "What is indicated by the presence of 'pathological Q-waves' on an ECG?"
  back: "A part of the heart has completely infarcted (necrosed)."
  tags: []

- front: "Which ECG leads correspond to an 'Anterior' myocardial infarction?"
  back: "V1 to V4."
  tags: []

- front: "Which ECG leads correspond to an 'Inferior' myocardial infarction?"
  back: "II, III, and aVF."
  tags: []

- front: "What is the standard treadmill protocol used for exercise stress testing?"
  back: "The Bruce protocol."
  tags: []

- front: "What are the primary aims of managing chronic coronary syndrome?"
  back: "To prevent myocardial infarction, delay death, and improve quality of life/symptoms."
  tags: []

- front: "Which two anti-platelet drugs are commonly used in the setting of coronary artery disease?"
  back: "Aspirin and Clopidogrel."
  tags: []

- front: "What is the pharmacological mechanism of Clopidogrel?"
  back: "It is a P2Y12 (ADP) receptor antagonist."
  tags: []

- front: "What is the resting heart rate target for a patient on beta-blocker therapy for angina?"
  back: "Below 60 beats per minute (ideally in the 50s)."
  tags: []

- front: "What is the LDL cholesterol target for patients with established coronary artery disease?"
  back: "Less than 1.4 $mmol/L$."
  tags: []

- front: "For diabetic patients with CAD, what is the target $HbA_{1c}$ level?"
  back: "Less than 7%."
  tags: []

- front: "What are the recommended exercise guidelines for CAD lifestyle modification?"
  back: "30 minutes of endurance training 5 days a week, plus resistance training."
  tags: []

- front: "What is the 'total ischemic time' goal for a patient presenting with a STEMI?"
  back: "Less than 3 hours from symptom onset to vessel opening."
  tags: []

- front: "A diagnosis of STEMI in the acute setting is based on what two findings?"
  back: "Typical angina ongoing for $> 30$ minutes and ECG evidence of ST elevation."
  tags: []

- front: "Why is it critical not to wait for troponin results in a suspected STEMI case?"
  back: "Laboratory results take too long, and STEMI is a time-dependent emergency requiring immediate reperfusion."
  tags: []

- front: "Which fibrinolytic agent is preferred because it is administered as a single IV bolus?"
  back: "Tenecteplase."
  tags: []

- front: "What is the loading dose and duration for Clopidogrel in the treatment of a STEMI?"
  back: "300 mg loading dose followed by 75 mg daily for one year."
  tags: []

- front: "Which anticoagulant is generally preferred over heparin in STEMI management due to ease of administration?"
  back: "Enoxaparin (given subcutaneously)."
  tags: []

- front: "What is the standard high-dose statin therapy initiated in the acute setting of a myocardial infarction?"
  back: "Atorvastatin 80 mg."
  tags: []

- front: "What are three major absolute contraindications to fibrinolysis?"
  back: "Previous hemorrhagic stroke, active internal bleeding, and suspected aortic dissection."
  tags: []

- front: "What is the most common cause of sudden cardiac death during the early stages of a myocardial infarction?"
  back: "Ventricular tachycardia (VT) or ventricular fibrillation (VF)."
  tags: []

- front: "What defines the difference between a Non-STEMI (NSTEMI) and Unstable Angina?"
  back: "NSTEMI has elevated biomarkers of necrosis (Troponin positive), while Unstable Angina does not (Troponin negative)."
  tags: []

- front: "What heart rate defines sinus bradycardia?"
  back: "Less than 60 beats per minute."
  tags: []

- front: "What is the normal range for a PR interval on an ECG?"
  back: "120 to 200 milliseconds (0.12 to 0.2 seconds)."
  tags: []

- front: "What defines 'P-pulmonale' on an ECG?"
  back: "A tall P-wave ($> 2.5$ mm) indicating right atrial enlargement."
  tags: []

- front: "What defines 'P-mitrale' on an ECG?"
  back: "A wide, bifid P-wave ($> 120$ ms) indicating left atrial enlargement."
  tags: []

- front: "What ECG pattern is characteristic of a Right Bundle Branch Block (RBBB)?"
  back: "An M-pattern in lead V1 and a W-pattern in lead V6."
  tags: []

- front: "What ECG pattern is characteristic of a Left Bundle Branch Block (LBBB)?"
  back: "A W-pattern in lead V1 and an M-pattern in lead V6."
  tags: []

- front: "What is the pathognomonic ECG finding for pericarditis?"
  back: "Widespread concave (saddle-shaped) ST elevation and PR segment depression (except in aVR)."
  tags: []

- front: "What are the ECG signs of hyperkalemia?"
  back: "Tall peaked T-waves, flattened P-waves, and prolonged PR interval, eventually leading to broad QRS complexes."
  tags: []

- front: "What ECG feature is seen in hypothermia?"
  back: "An Osborne wave (J-wave) at the end of the QRS complex."
  tags: []

- front: "What defines a Second-Degree Mobitz Type I (Wenckebach) heart block?"
  back: "Progressive prolongation of the PR interval until a QRS complex is dropped."
  tags: []

- front: "What defines a Second-Degree Mobitz Type II heart block?"
  back: "A constant PR interval with intermittent, sudden dropped QRS complexes."
  tags: []

- front: "What are the two hallmarks of Atrial Fibrillation (AF) on an ECG?"
  back: "Absence of P-waves and an 'irregularly irregular' R-R interval."
  tags: []

- front: "What is the characteristic baseline pattern seen in Atrial Flutter?"
  back: "A 'sawtooth' pattern of flutter waves."
  tags: []

- front: "What are the two classic ECG features of Wolff-Parkinson-White (WPW) syndrome?"
  back: "A short PR interval and a Delta wave (slurred upstroke of the QRS)."
  tags: []

- front: "What is the causal agent of Rheumatic Fever?"
  back: "Group A beta-hemolytic streptococci."
  tags: []

- front: "What are the five 'Major' Jones Criteria for diagnosing Rheumatic Fever?"
  back: "Carditis, Polyarthritis, Sydenham's chorea, Erythema marginatum, and Subcutaneous nodules."
  tags: []

- front: "What is the treatment of choice for primary prevention (eradication) of streptococcal infection in rheumatic fever?"
  back: "Benzathine penicillin G (intramuscular)."
  tags: []

- front: "How long should secondary prophylaxis be continued for a patient with rheumatic fever and residual heart disease?"
  back: "At least 10 years since the last episode and until at least age 40 (sometimes lifelong)."
  tags: []

- front: "What is the characteristic apex beat finding in Mitral Stenosis?"
  back: "A tapping, non-displaced apex beat."
  tags: []

- front: "What is the classic auscultatory triad of Mitral Stenosis?"
  back: "Loud first heart sound ($S_1$), an opening snap, and a mid-diastolic rumbling murmur."
  tags: []

- front: "What valve area measurement indicates 'severe' Mitral Stenosis?"
  back: "Less than 1.0 $cm^2$."
  tags: []

- front: "What type of murmur is associated with Mitral Regurgitation?"
  back: "A blowing, high-pitched pansystolic murmur at the apex radiating to the axilla."
  tags: []

- front: "In Mitral Regurgitation, what end-systolic diameter (ESD) threshold on Echo suggests a need for surgery in asymptomatic patients?"
  back: "ESD $> 40$ mm (or $> 45$ mm according to textbook sections)."
  tags: []

- front: "What are the three cardinal symptoms of Aortic Stenosis?"
  back: "Angina, syncope, and dyspnea."
  tags: []

- front: "What is the characteristic pulse associated with Aortic Stenosis?"
  back: "Pulsus parvus et tardus (slow-rising and sustained pulse)."
  tags: []

- front: "What pressure gradient on Echo signifies 'severe' Aortic Stenosis?"
  back: "A mean gradient $> 40$ $mmHg$ (or peak gradient $> 64$ $mmHg$)."
  tags: []

- front: "What is the life expectancy of a patient with Aortic Stenosis once heart failure symptoms develop?"
  back: "Approximately 2 years."
  tags: []

- front: "What are the signs of 'severe' Aortic Regurgitation during physical exam?"
  back: "Widened pulse pressure, collapsing (water-hammer) pulse, and Corrigans pulse (visible carotid pulsations)."
  tags: []

- front: "What is an 'Austin Flint' murmur?"
  back: "A mid-diastolic rumble at the apex heard in severe aortic regurgitation due to rapid flow across the mitral valve."
  tags: []

- front: "What are the two most common pathogens in 'Acute' versus 'Subacute' Infective Endocarditis?"
  back: "Staphylococcus aureus (Acute) and Streptococcus viridans (Subacute)."
  tags: []

- front: "Which Infective Endocarditis pathogen is most commonly associated with colorectal carcinoma?"
  back: "Streptococcus bovis."
  tags: []

- front: "What are 'Osler's nodes' and 'Janeway lesions' in the context of Infective Endocarditis?"
  back: "Osler's nodes are painful nodules on digits; Janeway lesions are painless macules on palms/soles."
  tags: []

- front: "According to the Duke Criteria, what constitutes a 'Major' clinical criterion for IE?"
  back: "Positive blood cultures (typical organism) and evidence of endocardial involvement on Echo (vegetation/abscess)."
  tags: []

- front: "What are the three components of Beck’s Triad for cardiac tamponade?"
  back: "Hypotension, distended jugular veins, and muffled heart sounds."
  tags: []

- front: "What is 'Pulsus Paradoxus'?"
  back: "An exaggerated drop in systolic blood pressure ($> 10$ $mmHg$) during inspiration, seen in cardiac tamponade."
  tags: []

- front: "What is the definitive treatment for cardiac tamponade?"
  back: "Pericardiocentesis."
  tags: []

- front: "What is Kussmaul’s sign, often seen in constrictive pericarditis?"
  back: "A paradoxical rise in JVP during inspiration."
  tags: []

- front: "What heart sound is characteristic of constrictive pericarditis?"
  back: "A pericardial knock."
  tags: []

- front: "What is the definitive treatment for constrictive pericarditis?"
  back: "Surgical pericardiectomy."
  tags: []

- front: "What is the definition of Hypertension based on standard blood pressure readings?"
  back: "Usual blood pressure $> 140/90$ $mmHg$."
  tags: []

- front: "For high-risk patients (e.g., those with CAD or Diabetes), what is the threshold for initiating hypertension treatment?"
  back: "Blood pressure $> 130/80$ $mmHg$."
  tags: []

- front: "What constitutes 'Hypertensive Crisis' according to the textbook sections?"
  back: "A diastolic blood pressure $> 140$ $mmHg$."
  tags: []

- front: "In a patient with ACS, what is the 'loading dose' of Aspirin given initially?"
  back: "325 mg (stat dose to chew)."
  tags: []

- front: "What echocardiographic finding is used to evaluate for right ventricular infarction in the setting of inferior MI?"
  back: "ST elevation in the right-sided lead V4R."
  tags: []

- front: "How does the 're-entry circuit' in Atrial Flutter differ from that in Atrial Fibrillation?"
  back: "Flutter is a single organized circuit (usually right atrium), whereas AF involves multiple chaotic foci."
  tags: []

- front: "What common medication class should be avoided or used with caution in a patient with inferior MI and bradycardia?"
  back: "Beta-blockers."
  tags: []

- front: "What condition is suggested by a 'waterbottle' appearance of the cardiac shadow on chest X-ray?"
  back: "Pericardial effusion."
  tags: []

- front: "In Infective Endocarditis, what size of vegetation is considered a surgical indication if it persists after a major embolic event?"
  back: "Greater than 1 cm in diameter."
  tags: []
