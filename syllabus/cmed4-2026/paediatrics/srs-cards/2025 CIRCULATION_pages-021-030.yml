notes:
  - guid: a2d5f8h1j7k3m9n4
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 CIRCULATION"
    fields:
      Front: "What is an intraosseous line and what is its primary clinical use?"
      Back: "A sturdy needle placed through cortical bone into the medullary cavity to emergently infuse fluids and blood products into critically ill patients"
    tags: ["intraosseous-line", "io-access", "emergency-access", "subject:paediatrics"]
  - guid: b7e3g9j2k6m1n8o5
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 CIRCULATION"
    fields:
      Front: "When is an intraosseous line indicated?"
      Back: "Very sick child with difficult vascular access in emergency situations requiring immediate fluid or medication delivery"
    tags: ["io-indication", "emergency-access", "subject:paediatrics"]
  - guid: c4f1h8j5k2m7n3o9
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 CIRCULATION"
    fields:
      Front: "What is the preferred anatomical site for intraosseous line insertion?"
      Back: "Tibia 1 cm below and MEDIAL to the tibial tuberosity (tibial plateau)"
    tags: ["io-site", "tibial-io", "anatomy", "subject:paediatrics"]
  - guid: d6g2k8m4n1p9q5r3
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 CIRCULATION"
    fields:
      Front: "What needle size and type is used for intraosseous line insertion?"
      Back: "Pink short LP (lumbar puncture) needle 18 gauge"
    tags: ["io-needle", "needle-size", "equipment", "subject:paediatrics"]
  - guid: e1h7j3k9m5n2o8p4
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 CIRCULATION"
    fields:
      Front: "Describe the technique for intraosseous line insertion."
      Back: "Clean site with iodine, stabilise proximal tibia, insert needle at 90° angle with twisting and drilling motion, feel 'give', obtain flashback, aspirate"
    tags: ["io-technique", "insertion-procedure", "subject:paediatrics"]
  - guid: f5j1m9n4o7p2q6r1
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 CIRCULATION"
    fields:
      Front: "What are the key steps in intraosseous line care?"
      Back: "1. Sterile procedure with iodine\n2. Stabilise proximal tibia\n3. Obtain flashback and aspirate to confirm placement\n4. Secure and immobilise needle"
    tags: ["io-procedure", "sterile-technique", "subject:paediatrics"]
  - guid: g3k6p2q8r4s1t7u5
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 CIRCULATION"
    fields:
      Front: "What are the contraindications to intraosseous line insertion?"
      Back: "1. Acute or recent fracture of target bone\n2. Previous significant orthopaedic procedure at site\n3. Overlying skin infection\n4. Previous IO insertion at same site\n5. Osteoporosis and osteogenesis imperfecta"
    tags: ["io-contraindication", "safety", "subject:paediatrics"]
  - guid: h9m1n5o2p8q3r6s4
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 CIRCULATION"
    fields:
      Front: "List the acute complications of intraosseous line insertion."
      Back: "1. Failure to enter bone marrow (fluid extravasation)\n2. Through-and-through penetration of cortical bone\n3. Bleeding causing compartment syndrome\n4. Skin sloughing"
    tags: ["io-complications-acute", "extravasation", "subject:paediatrics"]
  - guid: i2o7p3q9r1s5t8u6
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 CIRCULATION"
    fields:
      Front: "What are the delayed complications of intraosseous line insertion?"
      Back: "1. Osteomyelitis (rare in short term, occurs in <2-3%)\n2. Physeal (growth plate) injury\n3. Local infection\n4. Compartment syndrome\n5. Fat embolism"
    tags: ["io-complications-delayed", "infection-risk", "subject:paediatrics"]
  - guid: j4q2r8s3t6u1v9w5
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 CIRCULATION"
    fields:
      Front: "What is the incidence of osteomyelitis as a complication of intraosseous line insertion?"
      Back: "Less than 2-3% (rare in short term)"
    tags: ["osteomyelitis-risk", "io-infection", "subject:paediatrics"]
  - guid: k7s1t9u5v2w8x3y6
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 CIRCULATION"
    fields:
      Front: "When is intraosseous access indicated as an alternative to venous catheterization?"
      Back: "When peripheral and central venous access are difficult in emergency situations (such as shock)"
    tags: ["io-indication-formal", "vascular-access", "emergency", "subject:paediatrics"]
  - guid: l5t3u8v4w1x7y2z9
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 CIRCULATION"
    fields:
      Front: "What are the main uses of an intraosseous line?"
      Back: "1. Immediate delivery of life-saving fluids\n2. Immediate delivery of life-saving medications\n3. When compromised IV access prevents timely resuscitation"
    tags: ["io-uses", "emergency-fluids", "subject:paediatrics"]
  - guid: m6u2v9w3x8y1z5a4
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 CIRCULATION"
    fields:
      Front: "Are intraosseous lines considered permanent or temporary vascular access?"
      Back: "Temporary alternative to venous catheterization"
    tags: ["io-temporary", "vascular-access", "subject:paediatrics"]
  - guid: n1v7w4x9y2z6a3b8
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 CIRCULATION"
    fields:
      Front: "What is the mechanism of fluid extravasation in failed intraosseous placement?"
      Back: "Needle fails to enter bone marrow, so infused fluid leaks into surrounding soft tissues instead of reaching the medullary cavity"
    tags: ["io-failure", "extravasation", "subject:paediatrics"]
  - guid: o3w8x1y7z2a6b4c9
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 CIRCULATION"
    fields:
      Front: "How can you confirm successful intraosseous needle placement?"
      Back: "Feel a distinct 'give' when penetrating cortex, obtain flashback of marrow, and ability to aspirate"
    tags: ["io-confirmation", "placement-verification", "subject:paediatrics"]
  - guid: p9x2y8z3a5b1c7d4
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 CIRCULATION"
    fields:
      Front: "What anatomical structures are at risk during intraosseous insertion?"
      Back: "1. Physeal (growth) plate - may cause growth disturbance\n2. Cortical bone - may penetrate through-and-through\n3. Medullary cavity - must be entered correctly"
    tags: ["io-anatomy-risk", "growth-plate", "subject:paediatrics"]
  - guid: q4y5z9a2b8c3d6e1
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 CIRCULATION"
    fields:
      Front: "Is bone fracture a contraindication to intraosseous line insertion?"
      Back: "Yes, both acute fracture and recent fracture of the target bone are contraindications"
    tags: ["io-fracture-contraindication", "safety", "subject:paediatrics"]
  - guid: r8z1a7b3c9d2e5f6
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 CIRCULATION"
    fields:
      Front: "In what clinical scenario is intraosseous access described as lifesaving?"
      Back: "In a critically ill child with shock when peripheral and central venous access are difficult, preventing timely delivery of resuscitation fluids and medications"
    tags: ["io-lifesaving", "shock-access", "emergency", "subject:paediatrics"]
  - guid: s2a6b4c8d1e7f3g9
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 CIRCULATION"
    fields:
      Front: "What should be done if skin infection is present over the intended intraosseous insertion site?"
      Back: "Intraosseous insertion is contraindicated due to risk of spreading infection into bone"
    tags: ["io-infection-contraindication", "skin-infection", "subject:paediatrics"]
