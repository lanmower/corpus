    deck: "Corpus::Paediatrics::2024 NON ACCIDENTAL INJURIES"
    fields:
      Front: "What are the behavioural indicators of sexual abuse in Child X?"
      Back: "Behavioural indicators: poor concentration, learning difficulties, poor social skills (unable to make friends), 'autistic features', bullied at school (grades 1-3), extremely anxious, American accent, high-pitched feminine voice, obese, attached to females, fearful of males and detached from father. Diagnosis: depression and generalised anxiety disorder. History: early maternal separation, intact family but both parents extremely busy professionals."
