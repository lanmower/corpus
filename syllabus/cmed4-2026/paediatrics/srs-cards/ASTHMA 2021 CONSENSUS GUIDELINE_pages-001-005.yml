  - guid: "a1f2e3d4c5b6a7f8"
    noteType: Basic
    deck: "Corpus::Paediatrics::ASTHMA 2021 CONSENSUS GUIDELINE"
    fields:
      Front: "How is asthma diagnosed in children?"
      Back: "Asthma is diagnosed in children who present with episodes of variable expiratory airflow limitation. It remains a largely clinical diagnosis, which should be supported by lung function testing in school-aged children. Symptoms may include episodic wheeze, shortness of breath, difficult or laboured breathing, chest tightness and reduced activity with or without cough."
    tags: ["asthma", "diagnosis", "subject:paediatrics"]
  - guid: "b2g3f4e5d6c7a8b9"
    noteType: Basic
    deck: "Corpus::Paediatrics::ASTHMA 2021 CONSENSUS GUIDELINE"
    fields:
      Front: "What symptoms improve asthma diagnosis?"
      Back: "Symptoms that improve after correct use of a rapid-acting inhaled bronchodilator support asthma diagnosis. Chronic airway inflammation and variable expiratory airflow limitation define asthma."
    tags: ["asthma", "bronchodilator", "diagnosis", "subject:paediatrics"]
  - guid: "c3h4g5f6e7d8a9c0"
    noteType: Basic
    deck: "Corpus::Paediatrics::ASTHMA 2021 CONSENSUS GUIDELINE"
    fields:
      Front: "Wheezing frequency supporting asthma?"
      Back: "Events that occur more frequently (>3 episodes per year) and that last longer (>10 days at a time) may indicate an asthma diagnosis."
    tags: ["asthma", "wheezing", "frequency", "subject:paediatrics"]
  - guid: "d4i5h6g7f8e9a0b1"
    noteType: Basic
    deck: "Corpus::Paediatrics::ASTHMA 2021 CONSENSUS GUIDELINE"
    fields:
      Front: "Temporal pattern supporting asthma diagnosis?"
      Back: "Wheeze that does not only occur during airway infections, but also in response to other triggers in-between infections supports an asthma diagnosis. Events that persist after 3 years of age, night-time worsening, and association with exercise or environmental change (e.g. cold air exposure) further support an asthma diagnosis."
    tags: ["asthma", "triggers", "temporal-pattern", "subject:paediatrics"]
  - guid: "e5j6i7h8g9f0a1b2"
    noteType: Basic
    deck: "Corpus::Paediatrics::ASTHMA 2021 CONSENSUS GUIDELINE"
    fields:
      Front: "Four diagnostic steps for asthma <6 years?"
      Back: "Step 1: History taking (most important). Step 2: Exclude an alternative reason for wheezing episodes. Step 3: Assess inflammation (therapeutic trial with ICS). Step 4: Seek objective evidence of variable expiratory airflow limitation."
    tags: ["asthma", "diagnosis", "steps", "under-6-years", "subject:paediatrics"]
  - guid: "f6k7j8i9h0g1a2b3"
    noteType: Basic
    deck: "Corpus::Paediatrics::ASTHMA 2021 CONSENSUS GUIDELINE"
    fields:
      Front: "Infective causes of wheezing?"
      Back: "Bronchiolitis, atypical infection, bacterial airway infection, laryngotracheobronchitis, protracted bacterial bronchitis."
    tags: ["asthma", "differential-diagnosis", "infective", "subject:paediatrics"]
  - guid: "g7l8k9j0i1h2a3b4"
    noteType: Basic
    deck: "Corpus::Paediatrics::ASTHMA 2021 CONSENSUS GUIDELINE"
    fields:
      Front: "Structural causes of wheezing?"
      Back: "Trachea/bronchomalacia, tracheal webs, tracheal/bronchial stenosis, lymphadenopathy, tumours, vascular compression (double aortic arch, innominate artery compression, left pulmonary artery sling, patent ductus arteriosus ligament, cardiac chamber/pulmonary artery enlargement), laryngeal clefts, retained foreign body, H-type tracheo-oesophageal fistula."
    tags: ["asthma", "differential-diagnosis", "structural", "subject:paediatrics"]
  - guid: "h8m9l0k1j2i3a4b5"
    noteType: Basic
    deck: "Corpus::Paediatrics::ASTHMA 2021 CONSENSUS GUIDELINE"
    fields:
      Front: "Functional causes of wheezing?"
      Back: "Wheezy phenotypes, primary ciliary dyskinesia, cystic fibrosis, gastro-oesophageal reflux disease, perceived tight chest, pulmonary oedema/cardiac disease, interstitial lung disease, bronchiolitis obliterans, bronchopulmonary dysplasia, bronchiectasis, immunodeficiency."
    tags: ["asthma", "differential-diagnosis", "functional", "subject:paediatrics"]
  - guid: "i9n0m1l2k3j4a5b6"
    noteType: Basic
    deck: "Corpus::Paediatrics::ASTHMA 2021 CONSENSUS GUIDELINE"
    fields:
      Front: "ICS response evaluation timeframe?"
      Back: "Treatment should be viewed as a therapeutic trial and the initial treatment response must be evaluated in 6-8 weeks."
    tags: ["asthma", "ics", "treatment-response", "subject:paediatrics"]
  - guid: "j0o1n2m3l4k5a6b7"
    noteType: Basic
    deck: "Corpus::Paediatrics::ASTHMA 2021 CONSENSUS GUIDELINE"
    fields:
      Front: "ICS benefit review interval?"
      Back: "An ongoing benefit of ICS treatment should be reviewed every 3 months and the ICS kept at the lowest possible dose for symptom control."
    tags: ["asthma", "ics", "monitoring", "subject:paediatrics"]
  - guid: "k1p2o3n4m5l6a7b8"
    noteType: Basic
    deck: "Corpus::Paediatrics::ASTHMA 2021 CONSENSUS GUIDELINE"
    fields:
      Front: "PEF variability diagnostic threshold?"
      Back: "PEF variability with an average daily diurnal variability >13% when documented twice daily for 2 weeks indicates variable expiratory airflow limitation."
    tags: ["asthma", "pef", "spirometry", "subject:paediatrics"]
  - guid: "l2q3p4o5n6m7a8b9"
    noteType: Basic
    deck: "Corpus::Paediatrics::ASTHMA 2021 CONSENSUS GUIDELINE"
    fields:
      Front: "Exercise challenge PEF decrease threshold?"
      Back: "Positive exercise challenge test with decrease in PEF >15% after reaching target heart rate (0.8 × 220 minus age in years) indicates variable airflow limitation."
    tags: ["asthma", "exercise-challenge", "pef", "subject:paediatrics"]
  - guid: "m3r4q5p6o7n8a9b0"
    noteType: Basic
    deck: "Corpus::Paediatrics::ASTHMA 2021 CONSENSUS GUIDELINE"
    fields:
      Front: "Excessive PEF variation criterion?"
      Back: "Excessive variation of PEF >15% between outpatient visits (using the same equipment) with or without airway infections indicates variable airflow limitation."
    tags: ["asthma", "pef", "variability", "subject:paediatrics"]
  - guid: "n4s5r6q7p8o9a0b1"
    noteType: Basic
    deck: "Corpus::Paediatrics::ASTHMA 2021 CONSENSUS GUIDELINE"
    fields:
      Front: "Normal FEV1/FVC ratio?"
      Back: "Normal FEV1/FVC ratio is >0.9. Decreased FEV1/FVC ratio due to decreased FEV1 indicates variable expiratory airflow limitation."
    tags: ["asthma", "spirometry", "fev1", "fvc", "subject:paediatrics"]
  - guid: "o5t6s7r8q9p0a1b2"
    noteType: Basic
    deck: "Corpus::Paediatrics::ASTHMA 2021 CONSENSUS GUIDELINE"
    fields:
      Front: "Bronchodilator reversibility FEV1 threshold?"
      Back: "Positive bronchodilator reversibility with increase in FEV1 >12% indicates variable airflow limitation."
    tags: ["asthma", "spirometry", "bronchodilator", "subject:paediatrics"]
  - guid: "p6u7t8s9r0q1a2b3"
    noteType: Basic
    deck: "Corpus::Paediatrics::ASTHMA 2021 CONSENSUS GUIDELINE"
    fields:
      Front: "Exercise challenge FEV1 threshold?"
      Back: "Positive exercise challenge test with decrease in FEV1 >12% after reaching target heart rate (0.8 × 220 minus age in years) indicates variable airflow limitation."
    tags: ["asthma", "exercise-challenge", "spirometry", "subject:paediatrics"]
  - guid: "q7v8u9t0s1r2a3b4"
    noteType: Basic
    deck: "Corpus::Paediatrics::ASTHMA 2021 CONSENSUS GUIDELINE"
    fields:
      Front: "Excessive FEV1 variation criterion?"
      Back: "Excessive variation of FEV1 >12% between outpatient visits (using the same equipment) with or without airway infections indicates variable airflow limitation."
    tags: ["asthma", "spirometry", "variation", "subject:paediatrics"]
  - guid: "r8w9v0u1t2s3a4b5"
    noteType: Basic
    deck: "Corpus::Paediatrics::ASTHMA 2021 CONSENSUS GUIDELINE"
    fields:
      Front: "Mild intermittent asthma symptoms?"
      Back: "Mild intermittent asthma: symptoms ≤2 per week, night-time symptoms ≤2 per month, PEF ≥80% predicted, PEFR variability <20%."
    tags: ["asthma", "severity", "mild-intermittent", "subject:paediatrics"]
  - guid: "s9x0w1v2u3t4a5b6"
    noteType: Basic
    deck: "Corpus::Paediatrics::ASTHMA 2021 CONSENSUS GUIDELINE"
    fields:
      Front: "Mild persistent asthma severity criteria?"
      Back: "Mild persistent asthma: symptoms >2 per week, night-time symptoms >2 per month, PEF ≥80% predicted, PEFR variability 20-30%."
    tags: ["asthma", "severity", "mild-persistent", "subject:paediatrics"]
  - guid: "t0y1x2w3v4u5a6b7"
    noteType: Basic
    deck: "Corpus::Paediatrics::ASTHMA 2021 CONSENSUS GUIDELINE"
    fields:
      Front: "Moderate persistent asthma criteria?"
      Back: "Moderate persistent asthma: daily symptoms, night-time symptoms >1 per week, PEF >60-≤80% predicted, PEFR variability >30%."
    tags: ["asthma", "severity", "moderate-persistent", "subject:paediatrics"]
  - guid: "u1z2y3x4w5v6a7b8"
    noteType: Basic
    deck: "Corpus::Paediatrics::ASTHMA 2021 CONSENSUS GUIDELINE"
    fields:
      Front: "Severe persistent asthma criteria?"
      Back: "Severe persistent asthma: continual symptoms, frequent night-time symptoms, PEF ≤60% predicted, PEFR variability >30%."
    tags: ["asthma", "severity", "severe-persistent", "subject:paediatrics"]
  - guid: "v2a3z4y5x6w7a8b9"
    noteType: Basic
    deck: "Corpus::Paediatrics::ASTHMA 2021 CONSENSUS GUIDELINE"
    fields:
      Front: "Children <5 years intermittent treatment?"
      Back: "Short-acting beta-2 agonist (SABA) and short course (7-10 days) of ICS at start of upper respiratory tract infection."
    tags: ["asthma", "treatment", "under-5-years", "intermittent", "subject:paediatrics"]
  - guid: "w3b4a5z6y7x8a9c0"
    noteType: Basic
    deck: "Corpus::Paediatrics::ASTHMA 2021 CONSENSUS GUIDELINE"
    fields:
      Front: "Children <5 years Step 1 persistent?"
      Back: "Daily low-dose ICS and SABA as needed."
    tags: ["asthma", "treatment", "under-5-years", "step-1", "subject:paediatrics"]
  - guid: "x4c5b6a7z8y9a0c1"
    noteType: Basic
    deck: "Corpus::Paediatrics::ASTHMA 2021 CONSENSUS GUIDELINE"
    fields:
      Front: "Children <5 years Step 2 treatment?"
      Back: "Medium-dose ICS, or in children >4 years of age, daily low-dose ICS/LABA and SABA as needed."
    tags: ["asthma", "treatment", "under-5-years", "step-2", "subject:paediatrics"]
  - guid: "y5d6c7b8a9z0a1c2"
    noteType: Basic
    deck: "Corpus::Paediatrics::ASTHMA 2021 CONSENSUS GUIDELINE"
    fields:
      Front: "Children <5 years Step 3 options?"
      Back: "Daily medium-dose ICS/LABA and SABA as needed, or medium-dose ICS plus leukotriene-receptor antagonist (LTRA)."
    tags: ["asthma", "treatment", "under-5-years", "step-3", "subject:paediatrics"]
  - guid: "z6e7d8c9b0a1a2c3"
    noteType: Basic
    deck: "Corpus::Paediatrics::ASTHMA 2021 CONSENSUS GUIDELINE"
    fields:
      Front: "Children 6-11 years Step 1 persistent?"
      Back: "Daily low-dose ICS and SABA as needed, or LTRA, or low-dose ICS when SABA is taken."
    tags: ["asthma", "treatment", "6-11-years", "step-1", "subject:paediatrics"]
  - guid: "a7f8e9d0c1b2a3c4"
    noteType: Basic
    deck: "Corpus::Paediatrics::ASTHMA 2021 CONSENSUS GUIDELINE"
    fields:
      Front: "Children 6-11 years Step 2 therapy?"
      Back: "Daily and as-needed low-dose ICS/LABA (formoterol) combination, or low-dose ICS/LTRA."
    tags: ["asthma", "treatment", "6-11-years", "step-2", "subject:paediatrics"]
  - guid: "b8g9f0e1d2c3a4c5"
    noteType: Basic
    deck: "Corpus::Paediatrics::ASTHMA 2021 CONSENSUS GUIDELINE"
    fields:
      Front: "Children 6-11 years Step 3 options?"
      Back: "Daily and as-needed medium-dose ICS/LABA (formoterol) combination, or high-dose ICS/LABA, or add LTRA or tiotropium."
    tags: ["asthma", "treatment", "6-11-years", "step-3", "subject:paediatrics"]
  - guid: "c9h0g1f2e3d4a5c6"
    noteType: Basic
    deck: "Corpus::Paediatrics::ASTHMA 2021 CONSENSUS GUIDELINE"
    fields:
      Front: "Children 6-11 years Step 4 treatment?"
      Back: "Refer for expert advice for assessment for anti-IgE therapy or other biologic therapy, or daily and as-needed high-dose ICS/LABA combination plus LTRA."
    tags: ["asthma", "treatment", "6-11-years", "step-4", "biologic", "subject:paediatrics"]
