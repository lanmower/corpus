    noteType: Basic
    deck: "Corpus::Paediatrics::Bleeding child"
    fields:
      Front: "What viral infections cause selective ineffective thrombopoiesis?"
      Back: "EBV, CMV, HIV"
    tags: ["viral-infection", "ineffective-thrombopoiesis", "HIV", "subject:paediatrics"]
