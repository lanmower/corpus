    noteType: Basic
    deck: "Corpus::Paediatrics::Bleeding child"
    fields:
      Front: "What are the three main mechanisms of thrombocytopenia?"
      Back: "Increased platelet destruction (immune, nonimmune), Decreased platelet production (congenital, acquired), Sequestration of platelets"
    tags: ["thrombocytopenia", "mechanism", "pathophysiology", "subject:paediatrics"]
