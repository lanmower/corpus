  - guid: "g7h8i9j0k1l2m3n7"
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 HIV STAGING, TREATMENT AND PMTC"
    fields:
      Front: "What is the effect of DTG on serum creatinine and tubular secretion?"
      Back: |
        DTG decreases tubular secretion of creatinine without affecting glomerular filtration. Serum creatinine levels increase early in treatment (by less than 15%), remain stable, and are not an indication to stop DTG unless creatinine keeps rising, which could indicate TDF toxicity or other pathology.
    tags: ["dolutegravir-monitoring", "creatinine-increase", "renal-function", "subject:paediatrics"]
