    deck: "Corpus::Paediatrics::Emergency care - the seriously ill child"
    fields:
      Front: "What are the four main components of emergency care for children?"
      Back: "1. Triage - Find the children who need emergency care\n2. Provision of emergency care - Resuscitation/Life support\n3. Provision of post resuscitation care\n4. Stabilisation and transport"
    tags: ["emergency", "components", "care-provision", "subject:paediatrics"]

