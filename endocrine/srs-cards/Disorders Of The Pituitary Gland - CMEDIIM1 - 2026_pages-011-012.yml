# Anki canonical export — endocrine / Disorders Of The Pituitary Gland - CMEDIIM1 - 2026
# Generated by scripts/anki_migrate.js
deck: "Corpus::Endocrine::Disorders Of The Pituitary Gland - CMEDIIM1 - 2026"
notes:
  - guid: f3349ca68718101a
    noteType: Basic
    deck: "Corpus::Endocrine::Disorders Of The Pituitary Gland - CMEDIIM1 - 2026"
    fields:
      Front: "What are the main causes of hypopituitarism (deficiency of pituitary hormones)?"
      Back: "Idiopathic (autoimmune), congenital (Simmons disease, Rathke's cyst), tumors (primary or secondary), vascular (Sheehan syndrome, pituitary apoplexy), inflammatory (granulomatous, tuberculosis, sarcoidosis, syphilis), infective (tuberculosis, fungal, parasitic, pneumocystis), traumatic, radiotherapy, depositional (hemochromatosis), and primary empty sella."
    tags: ["subject:endocrine"]
  - guid: 6da6d754abbb851d
    noteType: Basic
    deck: "Corpus::Endocrine::Disorders Of The Pituitary Gland - CMEDIIM1 - 2026"
    fields:
      Front: "What is Sheehan syndrome?"
      Back: "Postpartum necrosis of the pituitary gland occurring in the setting of hemorrhage with systemic hypotension, resulting in vasospasm and pituitary destruction. Occurs after severe postpartum bleeding."
    tags: ["subject:endocrine"]
  - guid: 200a40df2ef31c69
    noteType: Basic
    deck: "Corpus::Endocrine::Disorders Of The Pituitary Gland - CMEDIIM1 - 2026"
    fields:
      Front: "What is pituitary apoplexy?"
      Back: "Sudden infarction of the pituitary gland caused by interruption of blood supply to a large tumor or when the tumor outstrips its blood supply. Results in rapid pituitary necrosis."
    tags: ["subject:endocrine"]
  - guid: 56967babeda9de46
    noteType: Basic
    deck: "Corpus::Endocrine::Disorders Of The Pituitary Gland - CMEDIIM1 - 2026"
    fields:
      Front: "What specific hormone deficiencies occur in idiopathic hypopituitarism and what is the proposed mechanism?"
      Back: "Isolated growth hormone, gonadotropin, TSH, or ACTH deficiencies. The mechanism is thought to be autoimmune."
    tags: ["subject:endocrine"]
  - guid: 8b22f2f82fb2170a
    noteType: Basic
    deck: "Corpus::Endocrine::Disorders Of The Pituitary Gland - CMEDIIM1 - 2026"
    fields:
      Front: "What are the congenital causes of hypopituitarism?"
      Back: "Simmons disease (under or co-development of the pituitary gland) and persistence of Rathke's cyst."
    tags: ["subject:endocrine"]
  - guid: 3c8ad6c2b27edd0d
    noteType: Basic
    deck: "Corpus::Endocrine::Disorders Of The Pituitary Gland - CMEDIIM1 - 2026"
    fields:
      Front: "What primary hypothalamic and pituitary tumors can cause hypopituitarism?"
      Back: "Craniopharyngioma, chromophobe non-functioning adenomas, and functioning adenomas of the pituitary."
    tags: ["subject:endocrine"]
  - guid: 04f9b6456a60f8e7
    noteType: Basic
    deck: "Corpus::Endocrine::Disorders Of The Pituitary Gland - CMEDIIM1 - 2026"
    fields:
      Front: "What are examples of secondary tumors that can cause hypopituitarism?"
      Back: "Carcinomas from the lung (bronchus), breast, and other sites that metastasize to the pituitary."
    tags: ["subject:endocrine"]
  - guid: 4188c5eb99274e22
    noteType: Basic
    deck: "Corpus::Endocrine::Disorders Of The Pituitary Gland - CMEDIIM1 - 2026"
    fields:
      Front: "What is the typical order of hormone involvement in hypopituitarism, using Sheehan syndrome as the gold standard example?"
      Back: "Growth hormone first, then prolactin, then gonadotropins, followed many years later by TSH, and finally ACTH (least likely to be deficient)."
    tags: ["subject:endocrine"]
  - guid: 2e97a5f564494140
    noteType: Basic
    deck: "Corpus::Endocrine::Disorders Of The Pituitary Gland - CMEDIIM1 - 2026"
    fields:
      Front: "What are the clinical features of growth hormone deficiency in hypopituitarism in children?"
      Back: "Failure to grow and short stature due to growth hormone deficiency."
    tags: ["subject:endocrine"]
  - guid: fb2b48c04321f950
    noteType: Basic
    deck: "Corpus::Endocrine::Disorders Of The Pituitary Gland - CMEDIIM1 - 2026"
    fields:
      Front: "What are the clinical features of prolactin deficiency in postpartum hypopituitarism (Sheehan syndrome)?"
      Back: "Failure to lactate in the immediate postpartum period due to prolactin deficiency."
    tags: ["subject:endocrine"]
  - guid: 0fe8c23d8b404451
    noteType: Basic
    deck: "Corpus::Endocrine::Disorders Of The Pituitary Gland - CMEDIIM1 - 2026"
    fields:
      Front: "What are the signs of gonadotropin deficiency in women with hypopituitarism?"
      Back: "Amenorrhea and infertility (occurs a few months after hormone deficiency develops)."
    tags: ["subject:endocrine"]
  - guid: 4b133d59a0dd359b
    noteType: Basic
    deck: "Corpus::Endocrine::Disorders Of The Pituitary Gland - CMEDIIM1 - 2026"
    fields:
      Front: "What are the late manifestations of untreated hypopituitarism?"
      Back: "Patients may develop coma due to hypoglycemia (from growth hormone deficiency), ACTH deficiency (adrenal crisis), hypothermia (from diminished TSH), or hypo-adrenal state. ACTH deficiency is only glucocorticoid-related, not mineralocorticoid-related."
    tags: ["subject:endocrine"]
  - guid: 73f1e7f34729f363
    noteType: Basic
    deck: "Corpus::Endocrine::Disorders Of The Pituitary Gland - CMEDIIM1 - 2026"
    fields:
      Front: "What are the radiological investigations for hypopituitarism?"
      Back: "Plain X-ray of the skull and MRI of the pituitary to assess for tumors or anatomical abnormalities."
    tags: ["subject:endocrine"]
  - guid: 3a9af12d1bee7f1f
    noteType: Basic
    deck: "Corpus::Endocrine::Disorders Of The Pituitary Gland - CMEDIIM1 - 2026"
    fields:
      Front: "What basal biochemical tests are performed for anterior pituitary function in hypopituitarism?"
      Back: "Serum growth hormone, IGF-1, prolactin, LH, FSH, estradiol/testosterone, TSH, free T3, free T4, serum ACTH, and serum cortisol."
    tags: ["subject:endocrine"]
  - guid: 7156a79c300f6175
    noteType: Basic
    deck: "Corpus::Endocrine::Disorders Of The Pituitary Gland - CMEDIIM1 - 2026"
    fields:
      Front: "What basal biochemical tests assess posterior pituitary function?"
      Back: "Serum osmolality and urine osmolality to evaluate ADH (arginine vasopressin) function."
    tags: ["subject:endocrine"]
  - guid: 1793123f50f08200
    noteType: Basic
    deck: "Corpus::Endocrine::Disorders Of The Pituitary Gland - CMEDIIM1 - 2026"
    fields:
      Front: "What provocative tests are used for anterior pituitary assessment in hypopituitarism?"
      Back: "Insulin tolerance test (to assess cortisol, growth hormone, and prolactin response to hypoglycemia), GnRH test (for LH/FSH), TRH test (for TSH and prolactin), synacthen test (for cortisol), glucagon test (for cortisol and growth hormone), and L-dopa test (for growth hormone)."
    tags: ["subject:endocrine"]
  - guid: 6d9e91545c4fa071
    noteType: Basic
    deck: "Corpus::Endocrine::Disorders Of The Pituitary Gland - CMEDIIM1 - 2026"
    fields:
      Front: "What provocative test is used for posterior pituitary assessment in hypopituitarism?"
      Back: "Water deprivation test to evaluate ADH response and distinguish cranial diabetes insipidus from other causes of polyuria."
    tags: ["subject:endocrine"]
  - guid: 1dedae022763d0f2
    noteType: Basic
    deck: "Corpus::Endocrine::Disorders Of The Pituitary Gland - CMEDIIM1 - 2026"
    fields:
      Front: "What is the hormone replacement approach for growth hormone deficiency in hypopituitarism?"
      Back: "Somatotropin given daily subcutaneously."
    tags: ["subject:endocrine"]
  - guid: 7a74957eb12ee2fe
    noteType: Basic
    deck: "Corpus::Endocrine::Disorders Of The Pituitary Gland - CMEDIIM1 - 2026"
    fields:
      Front: "What is the hormone replacement for glucocorticoid deficiency in hypopituitarism?"
      Back: "Hydrocortisone."
    tags: ["subject:endocrine"]
  - guid: 6b5ab5a61c72e12b
    noteType: Basic
    deck: "Corpus::Endocrine::Disorders Of The Pituitary Gland - CMEDIIM1 - 2026"
    fields:
      Front: "What is the hormone replacement for thyroid deficiency in hypopituitarism and what is the critical caveat?"
      Back: "Levothyroxine 100-200 micrograms daily. CRITICAL: Never replace thyroxine without first giving cortisol, as thyroxine accelerates cortisol degradation and may precipitate a hypo-adrenal crisis."
    tags: ["subject:endocrine"]
  - guid: de3b7fc8e7cf4b59
    noteType: Basic
    deck: "Corpus::Endocrine::Disorders Of The Pituitary Gland - CMEDIIM1 - 2026"
    fields:
      Front: "How is hypogonadism managed in women with hypopituitarism?"
      Back: "In women with intact uterus: estrogen-progesterone combination. In women without uterus: estrogen only. For fertility, must use gonadotropins (HCG or gonadotropin-releasing hormone agonists)."
    tags: ["subject:endocrine"]
  - guid: db2ddb7a5e213e69
    noteType: Basic
    deck: "Corpus::Endocrine::Disorders Of The Pituitary Gland - CMEDIIM1 - 2026"
    fields:
      Front: "How is hypogonadism managed in men with hypopituitarism?"
      Back: "Testosterone esters given as transdermal patch or intramuscular injection. For fertility, gonadotropins required."
    tags: ["subject:endocrine"]
  - guid: 5e835feda05972ef
    noteType: Basic
    deck: "Corpus::Endocrine::Disorders Of The Pituitary Gland - CMEDIIM1 - 2026"
    fields:
      Front: "How is fertility achieved in hypopituitarism when sex hormone replacement alone is insufficient?"
      Back: "Use gonadotropins: HCG (human chorionic gonadotropin) given three times per week, or gonadotropin-releasing hormone (gonadotropin-releasing hormone) if the patient has hypothalamic dysfunction."
    tags: ["subject:endocrine"]
  - guid: 8c20977f8260e320
    noteType: Basic
    deck: "Corpus::Endocrine::Disorders Of The Pituitary Gland - CMEDIIM1 - 2026"
    fields:
      Front: "What is the typical presentation and management consideration for craniopharyngioma as a cause of hypopituitarism in children?"
      Back: "Most common cause of short stature due to pituitary-hypothalamic problems in children. Often presents with growth failure and requires growth hormone replacement after treatment."
    tags: ["subject:endocrine"]
  - guid: ad22640017316d51
    noteType: Basic
    deck: "Corpus::Endocrine::Disorders Of The Pituitary Gland - CMEDIIM1 - 2026"
    fields:
      Front: "What are the two components of posterior pituitary hormone deficiency affecting water balance?"
      Back: "Deficiency of anti-diuretic hormone (ADH), also called vasopressin or arginine vasopressin (AVD), which regulates water reabsorption in the kidneys."
    tags: ["subject:endocrine"]
  - guid: 1ef279ec75771f50
    noteType: Basic
    deck: "Corpus::Endocrine::Disorders Of The Pituitary Gland - CMEDIIM1 - 2026"
    fields:
      Front: "What is the current nomenclature for deficiency of ADH?"
      Back: "Previously called cranial diabetes insipidus; renamed in 2022 to arginine vasopressin deficiency (AVD). The term \"diabetes insipidus\" is still commonly used."
    tags: ["subject:endocrine"]
  - guid: dfa15b5bed5485d5
    noteType: Basic
    deck: "Corpus::Endocrine::Disorders Of The Pituitary Gland - CMEDIIM1 - 2026"
    fields:
      Front: "What is the anatomical basis of cranial diabetes insipidus?"
      Back: "ADH is produced in the hypothalamus (paraventricular and supraoptic nuclei), travels via the hypothalamic-pituitary tract, and is stored in the posterior pituitary before release. Damage at any of these sites (hypothalamus, tract, or posterior pituitary) can cause cranial diabetes insipidus."
    tags: ["subject:endocrine"]
  - guid: 82a4d1e07048cf0b
    noteType: Basic
    deck: "Corpus::Endocrine::Disorders Of The Pituitary Gland - CMEDIIM1 - 2026"
    fields:
      Front: "What is the \"rule of thirds\" for the etiology of cranial diabetes insipidus?"
      Back: "One-third due to tumors (hypothalamic or pituitary), one-third idiopathic, and one-third miscellaneous (infections, trauma, etc.)."
    tags: ["subject:endocrine"]
  - guid: 483944ec21546861
    noteType: Basic
    deck: "Corpus::Endocrine::Disorders Of The Pituitary Gland - CMEDIIM1 - 2026"
    fields:
      Front: "In which conditions does isolated ADH deficiency (without other anterior pituitary hormone abnormalities) occur?"
      Back: "Only two conditions: eosinophilic granuloma (osteocytosis X) and traumatic head injury (e.g., motor vehicle accident). Otherwise, ADH deficiency typically occurs with other anterior pituitary hormone deficiencies."
    tags: ["subject:endocrine"]
  - guid: 326119012af6e575
    noteType: Basic
    deck: "Corpus::Endocrine::Disorders Of The Pituitary Gland - CMEDIIM1 - 2026"
    fields:
      Front: "What are the primary hypothalamic and pituitary tumors that cause cranial diabetes insipidus?"
      Back: "Craniopharyngioma (most common hypothalamic tumor) and pituitary tumors; secondary tumors include those from breast, bronchus, and melanoma."
    tags: ["subject:endocrine"]
  - guid: fdda3f97838b43a0
    noteType: Basic
    deck: "Corpus::Endocrine::Disorders Of The Pituitary Gland - CMEDIIM1 - 2026"
    fields:
      Front: "What is the first symptom of cranial diabetes insipidus in children?"
      Back: "Polyuria (excessive urine output), typically 4-20 liters per day with dilute urine. In some cases, polydipsia (excessive thirst) occurs first in adults."
    tags: ["subject:endocrine"]
  - guid: d9088e85acb8e55d
    noteType: Basic
    deck: "Corpus::Endocrine::Disorders Of The Pituitary Gland - CMEDIIM1 - 2026"
    fields:
      Front: "What complications can result from untreated cranial diabetes insipidus?"
      Back: "Dehydration, weight loss, constipation, pyrexia (fever), and if ACTH is also deficient, these symptoms may be masked due to cortisol's role in water excretion. Polyuria may only manifest after cortisol replacement."
    tags: ["subject:endocrine"]
  - guid: 6011dd9d83f87491
    noteType: Basic
    deck: "Corpus::Endocrine::Disorders Of The Pituitary Gland - CMEDIIM1 - 2026"
    fields:
      Front: "What compressive symptoms can occur with tumors causing cranial diabetes insipidus?"
      Back: "Eye involvement (bitemporal hemianopia from optic chiasm compression) and cranial nerve palsies."
    tags: ["subject:endocrine"]
  - guid: a4b0bc70109824c4
    noteType: Basic
    deck: "Corpus::Endocrine::Disorders Of The Pituitary Gland - CMEDIIM1 - 2026"
    fields:
      Front: "How does concurrent ACTH deficiency affect the presentation of cranial diabetes insipidus?"
      Back: "Cortisol is important for excretion of water load. With ACTH deficiency (cortisol deficiency), the polyuria may be masked, and diabetes insipidus may only become evident after cortisol replacement with hydrocortisone."
    tags: ["subject:endocrine"]
  - guid: d5ffe2341b3f8e48
    noteType: Basic
    deck: "Corpus::Endocrine::Disorders Of The Pituitary Gland - CMEDIIM1 - 2026"
    fields:
      Front: "What basal investigations are performed for suspected cranial diabetes insipidus?"
      Back: "Serum osmolality (elevated), urine osmolality (low), and urine specific gravity (<1.005). Dipstick urinalysis shows low specific gravity."
    tags: ["subject:endocrine"]
  - guid: 306210401a0c7bea
    noteType: Basic
    deck: "Corpus::Endocrine::Disorders Of The Pituitary Gland - CMEDIIM1 - 2026"
    fields:
      Front: "What does the water deprivation test demonstrate in cranial diabetes insipidus?"
      Back: "In normal individuals, fluid restriction maintains serum osmolality at the expense of urine osmolality. In diabetes insipidus, serum osmolality remains very high despite fluid restriction and only normalizes with exogenous (intranasal) ADH (desmopressin)."
    tags: ["subject:endocrine"]
  - guid: 94baa8a95a89f83b
    noteType: Basic
    deck: "Corpus::Endocrine::Disorders Of The Pituitary Gland - CMEDIIM1 - 2026"
    fields:
      Front: "What are the differential diagnoses for cranial diabetes insipidus?"
      Back: "Arginine vasopressin deficiency (cranial diabetes insipidus) vs. arginine vasopressin resistance (nephrogenic diabetes insipidus, which may be congenital or acquired from renal disease)."
    tags: ["subject:endocrine"]
  - guid: 30c4398bcf9c5b15
    noteType: Basic
    deck: "Corpus::Endocrine::Disorders Of The Pituitary Gland - CMEDIIM1 - 2026"
    fields:
      Front: "What other conditions present with polyuria similar to diabetes insipidus?"
      Back: "Diabetes mellitus (urine specific gravity is high due to glucose), chronic renal failure, psychogenic polydipsia (compulsive water drinking), and electrolyte abnormalities (hypokalemia, hyperkalemia) including Conn syndrome or hyperparathyroidism."
    tags: ["subject:endocrine"]
  - guid: a73581ef2aa12d4e
    noteType: Basic
    deck: "Corpus::Endocrine::Disorders Of The Pituitary Gland - CMEDIIM1 - 2026"
    fields:
      Front: "What is the first-line treatment for cranial diabetes insipidus?"
      Back: "Desmopressin (DDAVP - synthetic ADH) given as intranasal spray, oral tablets, or in acute settings via subcutaneous or intravenous injection. Intranasal is no longer commonly used; oral tablets are standard."
    tags: ["subject:endocrine"]
  - guid: d91654bd03d1e02a
    noteType: Basic
    deck: "Corpus::Endocrine::Disorders Of The Pituitary Gland - CMEDIIM1 - 2026"
    fields:
      Front: "What are alternative agents that were historically used for diabetes insipidus when desmopressin was unavailable?"
      Back: "The \"four Cs\": chlorpropamide, carbamazepine, chlorothiazide, and proprietary ADH-enhancing drugs. With desmopressin now available, these are rarely used."
    tags: ["subject:endocrine"]
  - guid: 9dcb888c6407e1ed
    noteType: Basic
    deck: "Corpus::Endocrine::Disorders Of The Pituitary Gland - CMEDIIM1 - 2026"
    fields:
      Front: "What is syndrome of inappropriate ADH (SIADH)?"
      Back: "Characterized by hyponatremia (low serum sodium) without edema, due to inappropriately excessive secretion of ADH in the presence of low serum osmolality."
    tags: ["subject:endocrine"]
  - guid: 1eb21973badc4f0e
    noteType: Basic
    deck: "Corpus::Endocrine::Disorders Of The Pituitary Gland - CMEDIIM1 - 2026"
    fields:
      Front: "What tumors can cause SIADH?"
      Back: "Small cell lung carcinoma (most common), other bronchial carcinomas, duodenal/pancreatic carcinoma, gastric carcinoma, prostatic carcinoma, bronchial carcinoid, thymomas, and hematologic malignancies (lymphoma, leukemia, Hodgkin's disease)."
    tags: ["subject:endocrine"]
  - guid: abd9455684620f18
    noteType: Basic
    deck: "Corpus::Endocrine::Disorders Of The Pituitary Gland - CMEDIIM1 - 2026"
    fields:
      Front: "What drugs can cause SIADH?"
      Back: "Desmopressin (DDAVP), oxytocin, the \"four Cs\" (chlorpromidine, clofibrate, carbamazepine, chlorothiazide), antipsychotics (phenothiazines), tricyclic antidepressants, oncology drugs (vincristine, cyclophosphamide), and miscellaneous drugs (nicotine, NSAIDs)."
    tags: ["subject:endocrine"]
  - guid: 97357a300894dccd
    noteType: Basic
    deck: "Corpus::Endocrine::Disorders Of The Pituitary Gland - CMEDIIM1 - 2026"
    fields:
      Front: "What pulmonary conditions can cause SIADH?"
      Back: "Tuberculosis (most common non-malignant cause), lung abscess, pneumonia, empyema, and chronic obstructive pulmonary disease."
    tags: ["subject:endocrine"]
  - guid: 2063f179689a3e61
    noteType: Basic
    deck: "Corpus::Endocrine::Disorders Of The Pituitary Gland - CMEDIIM1 - 2026"
    fields:
      Front: "What neurological conditions can cause SIADH?"
      Back: "Head trauma, skull fractures, subdural hematoma, subarachnoid hemorrhage, cerebrovascular thrombosis, cerebral atrophy, acute meningitis, tuberculosis meningitis, pyogenic meningitis, Guillain-Barre syndrome, and lupus encephalitis."
    tags: ["subject:endocrine"]
  - guid: 199232c0025f4e53
    noteType: Basic
    deck: "Corpus::Endocrine::Disorders Of The Pituitary Gland - CMEDIIM1 - 2026"
    fields:
      Front: "What miscellaneous conditions can cause SIADH?"
      Back: "Hypothyroidism and positive pressure ventilation (mechanical ventilation)."
    tags: ["subject:endocrine"]
  - guid: d97c5a6b38c6c298
    noteType: Basic
    deck: "Corpus::Endocrine::Disorders Of The Pituitary Gland - CMEDIIM1 - 2026"
    fields:
      Front: "What are the clinical features of mild hyponatremia (serum sodium 130-135 mEq/L) in SIADH?"
      Back: "Patients may be asymptomatic or present with anorexia, nausea, vomiting, lethargy, and weight gain."
    tags: ["subject:endocrine"]
  - guid: 32eb79bdc669dbcd
    noteType: Basic
    deck: "Corpus::Endocrine::Disorders Of The Pituitary Gland - CMEDIIM1 - 2026"
    fields:
      Front: "What are the clinical features of severe acute hyponatremia (<120 mEq/L) in SIADH?"
      Back: "Worsening lethargy, weight gain, confusion, convulsions, coma, and death if untreated. Importantly, edema and hypertension are rare in SIADH."
    tags: ["subject:endocrine"]
  - guid: 476591f7617fb068
    noteType: Basic
    deck: "Corpus::Endocrine::Disorders Of The Pituitary Gland - CMEDIIM1 - 2026"
    fields:
      Front: "Why is the rate of sodium decline important in SIADH?"
      Back: "Rapid decline in serum sodium causes more severe symptoms than gradual decline at the same final sodium level."
    tags: ["subject:endocrine"]
  - guid: a3f4d8325e7d9d0a
    noteType: Basic
    deck: "Corpus::Endocrine::Disorders Of The Pituitary Gland - CMEDIIM1 - 2026"
    fields:
      Front: "What are the diagnostic criteria for SIADH?"
      Back: "Serum sodium <130 mEq/L, low serum osmolality with elevated urine osmolality, urine sodium elevated (>40 mEq/L), and absence of hypotension, edema, or dehydration. Elevated plasma ADH (if measurable) confirms diagnosis."
    tags: ["subject:endocrine"]
  - guid: 485894c298fdc964
    noteType: Basic
    deck: "Corpus::Endocrine::Disorders Of The Pituitary Gland - CMEDIIM1 - 2026"
    fields:
      Front: "What biochemical abnormalities are seen in SIADH?"
      Back: "Low serum urea, creatinine, and uric acid; low albumin; low bicarbonate and potassium; low serum osmolality; and elevated urine osmolality and urine sodium."
    tags: ["subject:endocrine"]
  - guid: 5cb96741bfd5b336
    noteType: Basic
    deck: "Corpus::Endocrine::Disorders Of The Pituitary Gland - CMEDIIM1 - 2026"
    fields:
      Front: "What are the three types of hyponatremia based on volume status?"
      Back: "Type 1 (hypervolemic): cardiac failure, liver disease, renal disease. Type 2 (hypovolemic): dehydration from diarrhea or vomiting. Type 3 (euvolemic): SIADH (no edema, no hypertension)."
    tags: ["subject:endocrine"]
  - guid: 435abc76e4934de9
    noteType: Basic
    deck: "Corpus::Endocrine::Disorders Of The Pituitary Gland - CMEDIIM1 - 2026"
    fields:
      Front: "What other causes of low serum sodium must be considered besides SIADH?"
      Back: "Primary polydipsia, hypotension, pseudo-hyponatremia (from hyperlipidemia or hyperproteinemia causing laboratory artifact), and hyperglycemia."
    tags: ["subject:endocrine"]
  - guid: 37f959f63b26b310
    noteType: Basic
    deck: "Corpus::Endocrine::Disorders Of The Pituitary Gland - CMEDIIM1 - 2026"
    fields:
      Front: "What is the management goal for SIADH?"
      Back: "Increase serum sodium toward normal (>135 mEq/L) slowly and identify the underlying cause."
    tags: ["subject:endocrine"]
  - guid: f97d1a7c3436002b
    noteType: Basic
    deck: "Corpus::Endocrine::Disorders Of The Pituitary Gland - CMEDIIM1 - 2026"
    fields:
      Front: "What is the fluid restriction for mild asymptomatic SIADH?"
      Back: "Restrict fluid to approximately 500 mL per day."
    tags: ["subject:endocrine"]
  - guid: 1cc78561aef4a0cf
    noteType: Basic
    deck: "Corpus::Endocrine::Disorders Of The Pituitary Gland - CMEDIIM1 - 2026"
    fields:
      Front: "What is the treatment for severe symptomatic SIADH?"
      Back: "Hypertonic saline (3-5% saline) given carefully, with other agents like tolvaptan (vasopressin antagonist), lithium, glucocorticoids, and demeclocycline available as alternatives."
    tags: ["subject:endocrine"]
  - guid: c2eaf22181e0198c
    noteType: Basic
    deck: "Corpus::Endocrine::Disorders Of The Pituitary Gland - CMEDIIM1 - 2026"
    fields:
      Front: "What is the critical safety consideration when correcting hyponatremia in SIADH?"
      Back: "Increase serum sodium slowly—no more than 12 mEq/L per day. Rapid correction can cause central pontine myelinolysis (CPM), a devastating neurological condition characterized by quadriplegia, ataxia, and abnormal eye movements with high mortality."
    tags: ["subject:endocrine"]
  - guid: 09feaba23cdbaf8a
    noteType: Basic
    deck: "Corpus::Endocrine::Disorders Of The Pituitary Gland - CMEDIIM1 - 2026"
    fields:
      Front: "What is central pontine myelinolysis (CPM)?"
      Back: "A serious neurological complication of too-rapid sodium correction in hyponatremia, characterized by quadriplegia, ataxia, extraocular muscle weakness, and abnormal ocular movements, with very high mortality."
    tags: ["subject:endocrine"]
