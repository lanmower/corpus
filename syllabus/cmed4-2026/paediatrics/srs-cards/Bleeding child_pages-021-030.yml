    noteType: Basic
    deck: "Corpus::Paediatrics::Bleeding child"
    fields:
      Front: "What congenital defects cause selective ineffective thrombopoiesis?"
      Back: "TAR syndrome, WAS (Wiskott-Aldrich syndrome), CAMT (Congenital Amegakaryocytic Thrombocytopenia), Bernard-Soulier syndrome"
    tags: ["congenital", "thrombocytopenia", "rare-syndromes", "subject:paediatrics"]
