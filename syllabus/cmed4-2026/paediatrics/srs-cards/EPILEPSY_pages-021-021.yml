    fields:
      Front: "What are the alternative routes for benzodiazepines if IV access is not available?"
      Back: "Rectal diazepam 0.5 mg/kg (max 20 mg), buccal midazolam 0.5 mg/kg, or lorazepam IM 0.1 mg/kg."
    tags: ["epilepsy", "status-epilepticus", "benzodiazepines", "alternative-routes", "subject:paediatrics"]

