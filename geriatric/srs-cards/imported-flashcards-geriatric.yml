# Anki canonical export — geriatric / geriatric
# Generated by scripts/anki_migrate.js
deck: "Corpus::Geriatric::geriatric"
notes:
  - guid: f6333f6c214fd06f
    noteType: Basic
    deck: "Corpus::Geriatric::geriatric"
    fields:
      Front: "What percentage of adults aged $65+$ years report falling in the previous year?"
      Back: "Over $30\\%$."
    tags: ["subject:geriatric"]
  - guid: 071771a432915325
    noteType: Basic
    deck: "Corpus::Geriatric::geriatric"
    fields:
      Front: "By age $75+$, what percentage of adults report falling within a two-year period?"
      Back: "Up to $75\\%$."
    tags: ["subject:geriatric"]
  - guid: 92f4c3505ea59eaa
    noteType: Basic
    deck: "Corpus::Geriatric::geriatric"
    fields:
      Front: "In old age homes, what is the annual incidence rate of falls?"
      Back: "$50\\%$ per year."
    tags: ["subject:geriatric"]
  - guid: d9dcedc14defeacb
    noteType: Basic
    deck: "Corpus::Geriatric::geriatric"
    fields:
      Front: "What proportion of falls in the elderly are associated with an acute illness?"
      Back: "$10\\%$."
    tags: ["subject:geriatric"]
  - guid: e6ddc666e70deb46
    noteType: Basic
    deck: "Corpus::Geriatric::geriatric"
    fields:
      Front: "What percentage of falls in geriatric patients result in fractures?"
      Back: "$5\\%$."
    tags: ["subject:geriatric"]
  - guid: 76cf500bb73289eb
    noteType: Basic
    deck: "Corpus::Geriatric::geriatric"
    fields:
      Front: "Regardless of injury, what proportion of elderly fallers report a 'fear of falling'?"
      Back: "Over one third."
    tags: ["subject:geriatric"]
  - guid: 26fa1a1bc6e22c0f
    noteType: Basic
    deck: "Corpus::Geriatric::geriatric"
    fields:
      Front: "What are the three categorical factors that contribute to falls in the elderly?"
      Back: "Extrinsic, intrinsic, and situational factors."
    tags: ["subject:geriatric"]
  - guid: 8bd4e3e6cbf9b306
    noteType: Basic
    deck: "Corpus::Geriatric::geriatric"
    fields:
      Front: "Which neurological structures are responsible for motor planning and focused attention in postural control?"
      Back: "The frontal lobe."
    tags: ["subject:geriatric"]
  - guid: df8267babc79444b
    noteType: Basic
    deck: "Corpus::Geriatric::geriatric"
    fields:
      Front: "Maintaining posture requires the integration of which three sensory inputs?"
      Back: "Visual, vestibular, and proprioception."
    tags: ["subject:geriatric"]
  - guid: b90388c3df16e205
    noteType: Basic
    deck: "Corpus::Geriatric::geriatric"
    fields:
      Front: "How does the central nervous system contribute to fall risk in patients with dementia or delirium?"
      Back: "It impairs both cognitive judgment and motor control."
    tags: ["subject:geriatric"]
  - guid: 73a3b9d18b0b30eb
    noteType: Basic
    deck: "Corpus::Geriatric::geriatric"
    fields:
      Front: "In the context of fall assessment, what does the term 'polypharmacy' or drug review specifically target?"
      Back: "Drugs causing sedation, dizziness, or confusion."
    tags: ["subject:geriatric"]
  - guid: 469e6597a8673810
    noteType: Basic
    deck: "Corpus::Geriatric::geriatric"
    fields:
      Front: "Which component of the Timed Up and Go (TUG) test specifically evaluates proximal muscle strength?"
      Back: "Standing up from the chair (primarily quadriceps strength)."
    tags: ["subject:geriatric"]
  - guid: 2345a6af3d5ea808
    noteType: Basic
    deck: "Corpus::Geriatric::geriatric"
    fields:
      Front: "During a gait assessment, taking more than how many steps to turn around indicates a high risk of falling?"
      Back: "More than $3$ steps."
    tags: ["subject:geriatric"]
  - guid: f9768e53b51c36db
    noteType: Basic
    deck: "Corpus::Geriatric::geriatric"
    fields:
      Front: "In the Timed Up and Go (TUG) test, what duration indicates a patient is 'freely mobile' with low fall risk?"
      Back: "Less than $10\\text{ seconds}$."
    tags: ["subject:geriatric"]
  - guid: 3dd606da5605af90
    noteType: Basic
    deck: "Corpus::Geriatric::geriatric"
    fields:
      Front: "A Timed Up and Go (TUG) result of more than how many seconds indicates severely impaired mobility and high fall risk?"
      Back: "More than $30\\text{ seconds}$."
    tags: ["subject:geriatric"]
  - guid: 61a42bdd46b78c1e
    noteType: Basic
    deck: "Corpus::Geriatric::geriatric"
    fields:
      Front: "Which two specific forms of exercise are highlighted for improving postural reflexes and muscle strength in fall prevention?"
      Back: "Tai Chi and Yoga (referred to as Rekhae)."
    tags: ["subject:geriatric"]
  - guid: 3b7a5c328915d60b
    noteType: Basic
    deck: "Corpus::Geriatric::geriatric"
    fields:
      Front: "Which geriatric patients meet the criteria for a Comprehensive Geriatric Assessment (CGA) regarding falls?"
      Back: "Those with an injury-related fall, recurrent falls in the past year, or one fall with an abnormal gait."
    tags: ["subject:geriatric"]
  - guid: aeca6baaab8eaeb9
    noteType: Basic
    deck: "Corpus::Geriatric::geriatric"
    fields:
      Front: "Which member of the multidisciplinary team is primarily responsible for modifying the home environment to prevent falls?"
      Back: "The occupational therapist."
    tags: ["subject:geriatric"]
  - guid: 7e37fffd1d805f2f
    noteType: Basic
    deck: "Corpus::Geriatric::geriatric"
    fields:
      Front: "At what age do body systems and organs typically reach their peak physiological function?"
      Back: "Age $35$."
    tags: ["subject:geriatric"]
  - guid: 075aa48379aa562b
    noteType: Basic
    deck: "Corpus::Geriatric::geriatric"
    fields:
      Front: "Define 'Frailty' in a geriatric context."
      Back: "The loss of ability to withstand minor environmental stresses due to reduced physiological reserve in multiple organ systems."
    tags: ["subject:geriatric"]
  - guid: 01fbc4412b2dd76d
    noteType: Basic
    deck: "Corpus::Geriatric::geriatric"
    fields:
      Front: "How does a 'robust' individual differ from a 'pre-frail' individual when responding to a stressor?"
      Back: "A robust individual recovers to baseline, while a pre-frail individual does not fully recover to baseline."
    tags: ["subject:geriatric"]
  - guid: 589f4b7b9904b78a
    noteType: Basic
    deck: "Corpus::Geriatric::geriatric"
    fields:
      Front: "What is the typical clinical outcome for a 'frail' individual following a major stressor like surgery or infection?"
      Back: "They hardly recover to baseline and often become dependent (requiring institutional care)."
    tags: ["subject:geriatric"]
  - guid: 2c720866c0406f56
    noteType: Basic
    deck: "Corpus::Geriatric::geriatric"
    fields:
      Front: "What is the definition of sarcopenia?"
      Back: "Reduced muscle strength."
    tags: ["subject:geriatric"]
  - guid: fff2ba12374d07d1
    noteType: Basic
    deck: "Corpus::Geriatric::geriatric"
    fields:
      Front: "List the five components of the Cardiovascular Health Study (Fried) frailty phenotype."
      Back: "Unintentional weight loss, weakness (grip strength), exhaustion, slowness (walk speed), and low physical activity."
    tags: ["subject:geriatric"]
  - guid: 254116d3c9be99dd
    noteType: Basic
    deck: "Corpus::Geriatric::geriatric"
    fields:
      Front: "According to the Fried frailty phenotype, how many criteria must be met to classify a patient as 'frail'?"
      Back: "$3$ or more out of $5$."
    tags: ["subject:geriatric"]
  - guid: 2fdb466509083c1f
    noteType: Basic
    deck: "Corpus::Geriatric::geriatric"
    fields:
      Front: "In the Fried frailty phenotype, meeting $1$ or $2$ criteria classifies a patient as _____."
      Back: "Pre-frail."
    tags: ["subject:geriatric"]
  - guid: 715c1b87e6a508d7
    noteType: Basic
    deck: "Corpus::Geriatric::geriatric"
    fields:
      Front: "The Osteoporotic Fracture (OF) Frailty Index considers weight loss of more than $5\\%$ over what time period?"
      Back: "A two-year period."
    tags: ["subject:geriatric"]
  - guid: b2eefcbc64aa7a36
    noteType: Basic
    deck: "Corpus::Geriatric::geriatric"
    fields:
      Front: "How many criteria must be met to be considered frail according to the Osteoporotic Fracture (OF) Frailty Index?"
      Back: "$2$ out of the $3$ criteria."
    tags: ["subject:geriatric"]
  - guid: b9af130a685127b9
    noteType: Basic
    deck: "Corpus::Geriatric::geriatric"
    fields:
      Front: "In the Frailty Index (Deficit Accumulation), how is the final score calculated?"
      Back: "Dividing the number of present health deficits by the total number of deficits assessed (usually $30$)."
    tags: ["subject:geriatric"]
  - guid: 702bc1e4741ccfcf
    noteType: Basic
    deck: "Corpus::Geriatric::geriatric"
    fields:
      Front: "What Frailty Index score is the threshold for a patient to be considered frail?"
      Back: "A score $\\ge 0.25$."
    tags: ["subject:geriatric"]
  - guid: 673dd6a4d64c36b8
    noteType: Basic
    deck: "Corpus::Geriatric::geriatric"
    fields:
      Front: "On the $9$-point Frailty Scale, what does a score of $5$ (mildly frail) signify?"
      Back: "The patient is slowing and needs help with instrumental activities of daily living (IADLs)."
    tags: ["subject:geriatric"]
  - guid: 2f095cccb578711a
    noteType: Basic
    deck: "Corpus::Geriatric::geriatric"
    fields:
      Front: "On the Frailty Scale, a score of $9$ is reserved for which patients?"
      Back: "Terminally ill patients with a life expectancy of less than $6$ months."
    tags: ["subject:geriatric"]
  - guid: aac8d823ace6da4d
    noteType: Basic
    deck: "Corpus::Geriatric::geriatric"
    fields:
      Front: "What is the primary biological driver believed to be behind the development of frailty?"
      Back: "Chronic inflammation."
    tags: ["subject:geriatric"]
  - guid: 05c79c2612208a28
    noteType: Basic
    deck: "Corpus::Geriatric::geriatric"
    fields:
      Front: "How does secondary frailty differ from primary frailty?"
      Back: "Secondary frailty is triggered by a clinical disease, whereas primary frailty is driven by intrinsic factors like genetics and aging."
    tags: ["subject:geriatric"]
  - guid: fb3579cafb0e6cf3
    noteType: Basic
    deck: "Corpus::Geriatric::geriatric"
    fields:
      Front: "At what stage of frailty does management shift from rehabilitation to palliation?"
      Back: "Once the frailty becomes irreversible."
    tags: ["subject:geriatric"]
  - guid: f0df78952f2ed06d
    noteType: Basic
    deck: "Corpus::Geriatric::geriatric"
    fields:
      Front: "Identify four major risk factors for the development of frailty."
      Back: "Age $> 80$ years, female gender, smoking, and being underweight."
    tags: ["subject:geriatric"]
  - guid: e6de9104ab28ca49
    noteType: Basic
    deck: "Corpus::Geriatric::geriatric"
    fields:
      Front: "Why is the risk for adverse drug events (ADEs) higher in patients with a low BMI?"
      Back: "Changes in drug distribution and a lower threshold for toxicity."
    tags: ["subject:geriatric"]
  - guid: 114d33494b43049d
    noteType: Basic
    deck: "Corpus::Geriatric::geriatric"
    fields:
      Front: "A creatinine clearance ($CrCl$) below what level is a major risk factor for adverse drug events in the elderly?"
      Back: "Less than $50\\text{ mL/min}$."
    tags: ["subject:geriatric"]
  - guid: c14cff2955947a78
    noteType: Basic
    deck: "Corpus::Geriatric::geriatric"
    fields:
      Front: "What specific number of medications is used to define the high-risk threshold for adverse drug reactions in iatrogenesis?"
      Back: "$9$ or more medications."
    tags: ["subject:geriatric"]
  - guid: dcc6abb3e1418d2f
    noteType: Basic
    deck: "Corpus::Geriatric::geriatric"
    fields:
      Front: "Define 'Polypharmacy' as used in the geriatric study guide."
      Back: "Being on $4$ or more medications."
    tags: ["subject:geriatric"]
  - guid: 36db8d599f271b63
    noteType: Basic
    deck: "Corpus::Geriatric::geriatric"
    fields:
      Front: "Which stage of pharmacokinetics (Absorption, Distribution, Metabolism, Excretion) remains largely unchanged with age?"
      Back: "Absorption."
    tags: ["subject:geriatric"]
  - guid: 1ea6af6ed6dbe1c8
    noteType: Basic
    deck: "Corpus::Geriatric::geriatric"
    fields:
      Front: "How does aging affect sensitivity to anticholinergic drugs?"
      Back: "Sensitivity increases, leading to more side effects in the brain, eyes, and bladder."
    tags: ["subject:geriatric"]
  - guid: 7f1c11e479dcf800
    noteType: Basic
    deck: "Corpus::Geriatric::geriatric"
    fields:
      Front: "How does the geriatric response to $\\beta$-blockers and $\\beta$-agonists change with age?"
      Back: "There is a decreased (blunted) sensitivity."
    tags: ["subject:geriatric"]
  - guid: 16c789eaf7636425
    noteType: Basic
    deck: "Corpus::Geriatric::geriatric"
    fields:
      Front: "Why are elderly patients more prone to orthostatic hypotension when taking blood pressure medication?"
      Back: "Age-related physiological changes (blunting) in the baroreceptors."
    tags: ["subject:geriatric"]
  - guid: cf1af15a09d04378
    noteType: Basic
    deck: "Corpus::Geriatric::geriatric"
    fields:
      Front: "How does meningeal permeability change with age, and what is the clinical consequence?"
      Back: "Permeability increases, raising sensitivity to opiates, barbiturates, and benzodiazepines."
    tags: ["subject:geriatric"]
  - guid: 3d98b76eb3aa0653
    noteType: Basic
    deck: "Corpus::Geriatric::geriatric"
    fields:
      Front: "What is the effect of NSAIDs on the efficacy of anti-hypertensive medications?"
      Back: "NSAIDs counteract and reduce the efficacy of anti-hypertensives."
    tags: ["subject:geriatric"]
  - guid: a7cec0c8a1ca6d2a
    noteType: Basic
    deck: "Corpus::Geriatric::geriatric"
    fields:
      Front: "What three major risks are associated with NSAID use in the elderly?"
      Back: "Uncontrolled hypertension, peptic ulcer disease (PUD), and renal function deterioration."
    tags: ["subject:geriatric"]
  - guid: 58f9363c55b4711b
    noteType: Basic
    deck: "Corpus::Geriatric::geriatric"
    fields:
      Front: "Differentiate between clinical iatrogenesis and functional iatrogenesis."
      Back: "Clinical iatrogenesis results from medical interventions (drugs/surgery), while functional iatrogenesis results from the 'process' of care (immobility/hospitalization)."
    tags: ["subject:geriatric"]
  - guid: d3ebfa52b07f02e7
    noteType: Basic
    deck: "Corpus::Geriatric::geriatric"
    fields:
      Front: "What percentage of patients over $70$ experience a decline in function during hospitalization unrelated to their admitting diagnosis?"
      Back: "More than $50\\%$."
    tags: ["subject:geriatric"]
  - guid: c9dad8d39fe465e3
    noteType: Basic
    deck: "Corpus::Geriatric::geriatric"
    fields:
      Front: "How does hospitalization increase the risk of anorexia in geriatric patients?"
      Back: "Due to illness-related loss of appetite and the poor taste of hospital food."
    tags: ["subject:geriatric"]
  - guid: 22c081f3f94c11a4
    noteType: Basic
    deck: "Corpus::Geriatric::geriatric"
    fields:
      Front: "What is the prevalence of urinary incontinence in community-dwelling women over age $60$?"
      Back: "$30\\%$."
    tags: ["subject:geriatric"]
  - guid: 9afa3966f02c6a70
    noteType: Basic
    deck: "Corpus::Geriatric::geriatric"
    fields:
      Front: "In nursing homes, what is the prevalence range for urinary incontinence?"
      Back: "$50\\%$ to $70\\%$."
    tags: ["subject:geriatric"]
  - guid: f4eff5a431f4715b
    noteType: Basic
    deck: "Corpus::Geriatric::geriatric"
    fields:
      Front: "What happens to the detrusor muscle as part of normal aging?"
      Back: "It becomes overactive, with an increase in involuntary contractions."
    tags: ["subject:geriatric"]
  - guid: 27fa1d8a8d50a83a
    noteType: Basic
    deck: "Corpus::Geriatric::geriatric"
    fields:
      Front: "What is a normal age-related increase in post-void residual (PVR) volume?"
      Back: "$50$ to $100\\text{ mL}$ (though it can reach $200\\text{ mL}$ in some males)."
    tags: ["subject:geriatric"]
  - guid: 89f4417b37dfbba7
    noteType: Basic
    deck: "Corpus::Geriatric::geriatric"
    fields:
      Front: "Why is nocturnal fluid excretion increased in the elderly?"
      Back: "Due to low nocturnal ADH secretion and inappropriate production of arterial natriuretic peptide."
    tags: ["subject:geriatric"]
  - guid: a2dd22dad4284b19
    noteType: Basic
    deck: "Corpus::Geriatric::geriatric"
    fields:
      Front: "How does detrusor contractility change with age, and what is the resulting symptom?"
      Back: "Contractility decreases, leading to an inability to sustain tension and increased residual urine."
    tags: ["subject:geriatric"]
  - guid: 8a5951fa312d1365
    noteType: Basic
    deck: "Corpus::Geriatric::geriatric"
    fields:
      Front: "Describe the mechanism of stress urinary incontinence."
      Back: "Weakening of pelvic floor muscles causes leakage when intra-abdominal pressure increases (coughing, sneezing)."
    tags: ["subject:geriatric"]
  - guid: af0bd3094367431e
    noteType: Basic
    deck: "Corpus::Geriatric::geriatric"
    fields:
      Front: "Describe the mechanism of urge urinary incontinence."
      Back: "An overactive bladder (detrusor instability) creates an overwhelming, frequent urge to void."
    tags: ["subject:geriatric"]
  - guid: 75d02e9aaf671585
    noteType: Basic
    deck: "Corpus::Geriatric::geriatric"
    fields:
      Front: "Describe the mechanism of overflow urinary incontinence."
      Back: "Urinary obstruction causes bladder distension until urine leaks past the blockage."
    tags: ["subject:geriatric"]
  - guid: ffc49dfc9fed575c
    noteType: Basic
    deck: "Corpus::Geriatric::geriatric"
    fields:
      Front: "What is functional urinary incontinence?"
      Back: "Leakage caused by external barriers (cognitive impairment or physical immobility) rather than urogenital pathology."
    tags: ["subject:geriatric"]
  - guid: ae060eebb1369115
    noteType: Basic
    deck: "Corpus::Geriatric::geriatric"
    fields:
      Front: "In the DRIP mnemonic for acute incontinence, what does 'D' represent?"
      Back: "Delirium."
    tags: ["subject:geriatric"]
  - guid: 838f9a00d9781bc8
    noteType: Basic
    deck: "Corpus::Geriatric::geriatric"
    fields:
      Front: "In the DRIP mnemonic for acute incontinence, what do the two 'R's represent?"
      Back: "Restricted mobility and Retention."
    tags: ["subject:geriatric"]
  - guid: 1fcd7953f611e255
    noteType: Basic
    deck: "Corpus::Geriatric::geriatric"
    fields:
      Front: "In the DRIP mnemonic for acute incontinence, what does 'I' represent?"
      Back: "Infection or Inflammation (e.g., atrophic vaginitis)."
    tags: ["subject:geriatric"]
  - guid: 95e707cb514af316
    noteType: Basic
    deck: "Corpus::Geriatric::geriatric"
    fields:
      Front: "In the DRIP mnemonic for acute incontinence, what are the three meanings of 'P'?"
      Back: "Polyuria, Pills (medications), and imperfection (fecal impaction)."
    tags: ["subject:geriatric"]
  - guid: 6d493764f6d94206
    noteType: Basic
    deck: "Corpus::Geriatric::geriatric"
    fields:
      Front: "Why is atrophic urethritis a cause of incontinence in postmenopausal women?"
      Back: "Estrogen deficiency leads to decreased urethral closing ability."
    tags: ["subject:geriatric"]
  - guid: b55bc94cee90421f
    noteType: Basic
    deck: "Corpus::Geriatric::geriatric"
    fields:
      Front: "What is 'prompted timed voiding'?"
      Back: "A management strategy where the patient goes to the bathroom at specific scheduled intervals to prevent leakage."
    tags: ["subject:geriatric"]
  - guid: a36237f69f2a80ec
    noteType: Basic
    deck: "Corpus::Geriatric::geriatric"
    fields:
      Front: "What class of medication is typically used for urge incontinence in men?"
      Back: "Alpha blockers."
    tags: ["subject:geriatric"]
  - guid: fba4e4f46dc5c16c
    noteType: Basic
    deck: "Corpus::Geriatric::geriatric"
    fields:
      Front: "List three indications for a chronic indwelling urinary catheter in a geriatric patient."
      Back: "Irrectable retention causing renal failure, contaminated perineal pressure ulcers, or terminal illness/caregiver preference."
    tags: ["subject:geriatric"]
  - guid: 767ebda6b646f361
    noteType: Basic
    deck: "Corpus::Geriatric::geriatric"
    fields:
      Front: "What is the primary musculoskeletal risk of obesity in relation to urinary health?"
      Back: "Increased intra-abdominal pressure leading to chronic urinary incontinence."
    tags: ["subject:geriatric"]
