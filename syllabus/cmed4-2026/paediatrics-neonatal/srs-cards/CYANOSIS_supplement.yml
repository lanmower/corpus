    tags: ["PALMS", "mnemonic", "central-cyanosis", "subject:paediatrics-neonatal", "supplement"]

  - guid: "cyanosis_palms_l"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::CYANOSIS"
    fields:
      Front: "PALMS mnemonic for central cyanosis: What does L stand for?"
