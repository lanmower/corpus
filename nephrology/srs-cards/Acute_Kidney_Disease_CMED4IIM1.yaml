  - guid: 52ef4577f50d237e
    noteType: Basic
    deck: "Corpus::Nephrology::Acute_Kidney_Disease_CMED4IIM1"
    fields:
      Front: "What is the definition of Acute Kidney Injury (AKI)?"
      Back: "A syndrome characterized by rapid fall of GFR (generally within hours to days), retention of nitrogenous and non-nitrogenous waste products, and disordered electrolytes, acid-base, and fluid homeostasis."
    tags: ["subject:nephrology"]
  - guid: 83242de1c9534258
    noteType: Basic
    deck: "Corpus::Nephrology::Acute_Kidney_Disease_CMED4IIM1"
    fields:
      Front: "What is the epidemiology of AKI?"
      Back: "AKI is responsible for 5-10% of general hospital admissions, 20-25% of sepsis patients develop AKI, 50% with septic shock develop AKI, and 50% of ICU admissions develop AKI. Mortality ranges from 20-60% in ICU."
    tags: ["subject:nephrology"]
  - guid: 9fd192ff11d6a911
    noteType: Basic
    deck: "Corpus::Nephrology::Acute_Kidney_Disease_CMED4IIM1"
    fields:
      Front: "What are the three stages of AKI classification?"
      Back: "Stage 1: Serum creatinine increases >26 μmol/L within 48h or 1.5-1.9x baseline, or urine output <0.5 mL/kg/hr for >6h. Stage 2: Serum creatinine 2-3x baseline or urine output <0.5 mL/kg/hr for >12h. Stage 3: Serum creatinine >3x baseline or >354 μmol/L, or urine output <0.3 mL/kg/hr for >24h."
    tags: ["subject:nephrology"]
  - guid: af5620b39097053b
    noteType: Basic
    deck: "Corpus::Nephrology::Acute_Kidney_Disease_CMED4IIM1"
    fields:
      Front: "What are the three main classifications of AKI?"
      Back: "Pre-renal AKI (reduced kidney blood flow), Intrinsic AKI (kidney parenchymal damage to vasculature, glomeruli, or tubules), and Post-renal AKI (obstruction of urinary flow)."
    tags: ["subject:nephrology"]
  - guid: 0159b3fd1f8f56f5
    noteType: Basic
    deck: "Corpus::Nephrology::Acute_Kidney_Disease_CMED4IIM1"
    fields:
      Front: "What causes Pre-renal AKI?"
      Back: "Acute hemorrhage, volume depletion, low cardiac output, sepsis, chronic congestive cardiac failure, cirrhosis, and vasomotor drugs (NSAIDs, ACE inhibitors, ARBs)."
    tags: ["subject:nephrology"]
  - guid: a683c26269242f42
    noteType: Basic
    deck: "Corpus::Nephrology::Acute_Kidney_Disease_CMED4IIM1"
    fields:
      Front: "What causes Intrinsic AKI?"
      Back: "Acute Tubular Necrosis (ATN) from ischemic or nephrotoxic injury (hemoglobin, myoglobin, myeloma casts, nephrotoxic drugs, contrast), tubulointerstitial nephritis, acute glomerulonephritis, and vascular causes (vasculitis, thrombosis, severe hypertension)."
    tags: ["subject:nephrology"]
  - guid: 95e83b5535b4d8ca
    noteType: Basic
    deck: "Corpus::Nephrology::Acute_Kidney_Disease_CMED4IIM1"
    fields:
      Front: "What causes Post-renal AKI?"
      Back: "Obstruction of urinary flow at any level - bladder outflow obstruction or ureteral obstruction. If untreated, leads to permanent structural and functional kidney damage."
    tags: ["subject:nephrology"]
  - guid: d99b23adf19aa110
    noteType: Basic
    deck: "Corpus::Nephrology::Acute_Kidney_Disease_CMED4IIM1"
    fields:
      Front: "What are the risk factors for developing AKI?"
      Back: "Increasing age, pre-existing chronic kidney disease, recent surgery, diabetes, volume depletion (vomiting, diarrhea, burns), RV dysfunction, cirrhosis, drugs causing vasomotor changes (NSAIDs, ACE inhibitors, ARBs), and systemic conditions (multiple myeloma)."
    tags: ["subject:nephrology"]
  - guid: 3a8bc990c948d96a
    noteType: Basic
    deck: "Corpus::Nephrology::Acute_Kidney_Disease_CMED4IIM1"
    fields:
      Front: "What nephrotoxic agents cause AKI?"
      Back: "NSAIDs, diuretics, ACE inhibitors, ARBs (especially in volume-depleted patients), aminoglycosides, vancomycin, amphotericin B, chemotherapy agents (cisplatin), and IV contrast."
    tags: ["subject:nephrology"]
  - guid: e5162104129b617e
    noteType: Basic
    deck: "Corpus::Nephrology::Acute_Kidney_Disease_CMED4IIM1"
    fields:
      Front: "How can perioperative AKI risk be reduced?"
      Back: "Adequate hydration, remove nephrotoxic drugs, review volume status and kidney function, optimize volume status preoperatively, monitor daily weights and intake/output, control glucose in diabetics, optimize nutrition, screen for obstruction, avoid surgery immediately after contrast, and reduce antihypertensives in early postoperative period."
    tags: ["subject:nephrology"]
  - guid: f58fa666b2ae569d
    noteType: Basic
    deck: "Corpus::Nephrology::Acute_Kidney_Disease_CMED4IIM1"
    fields:
      Front: "What are the presenting features of acute kidney injury?"
      Back: "Rise in serum urea and creatinine, reduced urine output (earliest change, precedes urea/creatinine rise), volume depletion or overload, pulmonary edema, hyperkalemia (risk for arrhythmia/cardiac arrest), and nonspecific illness."
    tags: ["subject:nephrology"]
  - guid: 1a68a158e077abbd
    noteType: Basic
    deck: "Corpus::Nephrology::Acute_Kidney_Disease_CMED4IIM1"
    fields:
      Front: "What clinical findings help diagnose AKI?"
      Back: "Falling urine output and urea, persistent nausea/vomiting, dizziness, impaired consciousness, signs of systemic sepsis, evidence of severe hypertension or hypotension, pulmonary edema (crackles), peripheral edema, and metabolic acidosis."
    tags: ["subject:nephrology"]
  - guid: b53c754c2894f4ce
    noteType: Basic
    deck: "Corpus::Nephrology::Acute_Kidney_Disease_CMED4IIM1"
    fields:
      Front: "How do you distinguish AKI from Chronic Kidney Disease?"
      Back: "Review previous kidney function tests. On ultrasound, chronic kidney disease shows shrunken kidneys (<9-10 cm), while AKI shows normal-sized kidneys. Exception: diabetics have normal kidney size even with reduced function. Laboratory findings (anemia, calcium-phosphate abnormalities) are often unhelpful."
    tags: ["subject:nephrology"]
  - guid: 818b81a75a9c103f
    noteType: Basic
    deck: "Corpus::Nephrology::Acute_Kidney_Disease_CMED4IIM1"
    fields:
      Front: "What are the priorities in managing AKI?"
      Back: "Make the patient safe (airway, breathing, circulation), manage hyperkalemia urgently, assess volume status, perform urine dipstick analysis, look for reversible causes, assess hemodynamic status, check for post-renal obstruction with ultrasound, and review drug charts to stop nephrotoxic agents."
    tags: ["subject:nephrology"]
  - guid: aa290c2a6ab7b189
    noteType: Basic
    deck: "Corpus::Nephrology::Acute_Kidney_Disease_CMED4IIM1"
    fields:
      Front: "What clinical clues suggest Pre-renal AKI?"
      Back: "History of reduced intravascular volume (dehydration), heart failure, or sepsis. Clinical signs: abnormal blood pressure, elevated heart rate, poor peripheral perfusion, abnormal jugular venous pressure, peripheral and pulmonary edema, and reduced urine output."
    tags: ["subject:nephrology"]
  - guid: d07726ccac96f54b
    noteType: Basic
    deck: "Corpus::Nephrology::Acute_Kidney_Disease_CMED4IIM1"
    fields:
      Front: "What clinical clues suggest Intrinsic kidney AKI?"
      Back: "History of cardiovascular disease, hypertension, diabetes, hypercholesterolemia, peripheral vascular disease, stroke, ischemic heart disease, recent invasive/endovascular procedures, stem cell therapy, or surgery. Signs: signs of atherosclerosis, missing pulses, large heart, glaucoma, pediatric aneurysms, or ischemic toes."
    tags: ["subject:nephrology"]
  - guid: b85f36d30ce09ea4
    noteType: Basic
    deck: "Corpus::Nephrology::Acute_Kidney_Disease_CMED4IIM1"
    fields:
      Front: "What investigations help identify intrinsic glomerular AKI?"
      Back: "History of throat/skin infections, fever, night sweats, systemic features. Examination: rash, elevated blood pressure, evidence of systemic involvement (uveitis, ulcers, connective tissue disease). Investigations: blood or protein in urine."
    tags: ["subject:nephrology"]
  - guid: 05b5baced621c976
    noteType: Basic
    deck: "Corpus::Nephrology::Acute_Kidney_Disease_CMED4IIM1"
    fields:
      Front: "What investigations help identify tubulointerstitial AKI?"
      Back: "History of drug use or systemic infections/diseases (sarcoid). Examination: secondary features (fever, rash, bruising). Typical clue: eosinophilia on urine microscopy or peripheral smear or in blood."
    tags: ["subject:nephrology"]
  - guid: 3f7236f962760792
    noteType: Basic
    deck: "Corpus::Nephrology::Acute_Kidney_Disease_CMED4IIM1"
    fields:
      Front: "What clinical clues suggest Post-renal AKI?"
      Back: "Lower urinary tract symptoms, evidence of prostatic disease in elderly males, presence of cancers, and hematuria. Essential investigation: early ultrasound to exclude obstruction."
    tags: ["subject:nephrology"]
  - guid: d4d84888ebadda6a
    noteType: Basic
    deck: "Corpus::Nephrology::Acute_Kidney_Disease_CMED4IIM1"
    fields:
      Front: "What findings on urine analysis help in AKI diagnosis?"
      Back: "Presence of blood, protein, or red blood cells suggests glomerular or intrinsic kidney disease. Positive urine culture indicates UTI which can cause severe dysfunction. Urine electrolytes and specific gravity are generally not helpful in AKI assessment."
    tags: ["subject:nephrology"]
  - guid: 5acf61eec8c91077
    noteType: Basic
    deck: "Corpus::Nephrology::Acute_Kidney_Disease_CMED4IIM1"
    fields:
      Front: "What blood test findings are important in AKI?"
      Back: "Reduced hemoglobin (hemolysis or bleeding), elevated white cell count (infection), eosinophilia (systemic arthritis), reduced white cell count (sepsis), reduced platelets (DIC or thrombotic microangiopathy). Peripheral smear shows fragmented RBCs in microangiopathy."
    tags: ["subject:nephrology"]
  - guid: 929db0a7b4d7fe5f
    noteType: Basic
    deck: "Corpus::Nephrology::Acute_Kidney_Disease_CMED4IIM1"
    fields:
      Front: "What biochemical findings are important in AKI?"
      Back: "Elevated potassium (hyperkalemia), reduced sodium (volume overload or excessive diuretics), reduced bicarbonate (metabolic acidosis). Urine and electrolytes are key for assessing AKI severity."
    tags: ["subject:nephrology"]
  - guid: 76f8c9976cb11f6c
    noteType: Basic
    deck: "Corpus::Nephrology::Acute_Kidney_Disease_CMED4IIM1"
    fields:
      Front: "What imaging findings help in AKI diagnosis?"
      Back: "Chest X-ray: excludes pulmonary edema, respiratory infections, assesses cardiac size, presence of lymph nodes, or cystic lesions. Kidney ultrasound: excludes obstruction (urgent if obstruction suspected). Kidney size <9 cm suggests chronic kidney disease; normal size suggests acute kidney injury."
    tags: ["subject:nephrology"]
  - guid: b43b085a0f5f657e
    noteType: Basic
    deck: "Corpus::Nephrology::Acute_Kidney_Disease_CMED4IIM1"
    fields:
      Front: "What is the role of volume replacement in Pre-renal AKI?"
      Back: "Prompt volume replacement early in pre-renal AKI improves outcomes. Must ensure patient not overloaded to avoid pulmonary edema. Fluids: crystalloid saline or crystalloids, with sodium bicarbonate. Assess adequacy by tachycardia, central venous pressure, and urine output."
    tags: ["subject:nephrology"]
  - guid: c68efead2f83038e
    noteType: Basic
    deck: "Corpus::Nephrology::Acute_Kidney_Disease_CMED4IIM1"
    fields:
      Front: "What are the ECG changes in hyperkalemia?"
      Back: "Progressive changes: peaked T waves, flattened P waves, prolonged PR interval, widened QRS complex, and sine wave (terminal event leading to ventricular fibrillation or asystolic cardiac arrest). Potassium >6 mmol/L requires close cardiac monitoring and ECG."
    tags: ["subject:nephrology"]
  - guid: eb300e458b77dfd2
    noteType: Basic
    deck: "Corpus::Nephrology::Acute_Kidney_Disease_CMED4IIM1"
    fields:
      Front: "How is hyperkalemia managed?"
      Back: "Calcium carbonate 10% solution over 2-5 minutes, insulin-glucose (monitor sugars after), sodium bicarbonate (15-60 minutes) if volume-depleted. If unresponsive to these three measures, consider dialysis, especially if kidney function not improving and potassium continues to rise."
    tags: ["subject:nephrology"]
  - guid: 27bdf64b52a17236
    noteType: Basic
    deck: "Corpus::Nephrology::Acute_Kidney_Disease_CMED4IIM1"
    fields:
      Front: "How is pulmonary edema managed in AKI?"
      Back: "Stop IV fluids, give oxygen, use diuretics, give opiates or morphine for mild relief, prop patient up. If unresponsive to diuretics, consider dialysis and ventilation."
    tags: ["subject:nephrology"]
  - guid: 62bbf0dd2f0ddc91
    noteType: Basic
    deck: "Corpus::Nephrology::Acute_Kidney_Disease_CMED4IIM1"
    fields:
      Front: "How is hyperphosphatemia managed in AKI?"
      Back: "Dietary phosphate restriction, oral phosphate binders, and dialysis if severe."
    tags: ["subject:nephrology"]
  - guid: 7c8dc62d4271f659
    noteType: Basic
    deck: "Corpus::Nephrology::Acute_Kidney_Disease_CMED4IIM1"
    fields:
      Front: "How is hypocalcemia managed in AKI?"
      Back: "Oral replacement of vitamin D and calcium supplementation."
    tags: ["subject:nephrology"]
  - guid: 4ce633114ebc006a
    noteType: Basic
    deck: "Corpus::Nephrology::Acute_Kidney_Disease_CMED4IIM1"
    fields:
      Front: "What is the relationship between hypomagnesemia and hypocalcemia?"
      Back: "Hypomagnesemia is associated with both hypercalcemia and hypocalcemia. Unless magnesium is corrected, calcium will not correct. Therefore, magnesium correction is necessary for successful calcium management."
    tags: ["subject:nephrology"]
  - guid: 0d5eb713ea71f74b
    noteType: Basic
    deck: "Corpus::Nephrology::Acute_Kidney_Disease_CMED4IIM1"
    fields:
      Front: "How is metabolic acidosis managed in severe AKI?"
      Back: "High-dose metabolic acidosis in AKI; if severe, consider dialysis. Consider other causes: lactic acidosis, salicylate poisoning, methanol, ethylene glycol poisoning. Dialysis is indicated if pH drops to 7.1 or less."
    tags: ["subject:nephrology"]
  - guid: 0850174621b82cd8
    noteType: Basic
    deck: "Corpus::Nephrology::Acute_Kidney_Disease_CMED4IIM1"
    fields:
      Front: "What are the general management strategies for AKI?"
      Back: "Treat anemia (consider bleeding or hemolysis as cause), treat infection, maintain adequate nutrition (patients are hypercatabolic), consider specific energy and protein requirements."
    tags: ["subject:nephrology"]
  - guid: ef2dfbdbcbbca55f
    noteType: Basic
    deck: "Corpus::Nephrology::Acute_Kidney_Disease_CMED4IIM1"
    fields:
      Front: "What are the indications for kidney replacement therapy (dialysis) in AKI?"
      Back: "Persistent hyperkalemia, pulmonary edema refractory to diuretics, intractable acidosis, oliguria with high urea, uremic pericarditis, or uremic encephalopathy."
    tags: ["subject:nephrology"]
  - guid: cbb4a380617fba27
    noteType: Basic
    deck: "Corpus::Nephrology::Acute_Kidney_Disease_CMED4IIM1"
    fields:
      Front: "What are the types of kidney replacement therapy available?"
      Back: "Hemodialysis and peritoneal dialysis are the main forms of acute kidney replacement therapy."
    tags: ["subject:nephrology"]
