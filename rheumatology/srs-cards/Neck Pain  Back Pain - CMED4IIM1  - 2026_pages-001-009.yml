- id: neck-pain-definition
  front: What is the lifetime prevalence and point prevalence of neck pain?
  back: Neck pain has a lifetime prevalence of approximately 71%. Point prevalence affects approximately 9.5% of males and 13.5% of females.
  category: Epidemiology

- id: neck-pain-occupational-risks
  front: What occupational and personal factors are associated with neck pain?
  back: Neck pain is associated with heavy workload, level of education, depression, older age, and the nature of occupation (manual workers vs sedentary occupations).
  category: Risk Factors

- id: neck-pain-referred-sources
  front: What structures can cause referred neck pain?
  back: Referred neck pain can originate from anterior neck structures such as the thyroid, pharynx, and larynx. It can also result from cervical structures including vertebrae, nerve compression, spinal cord, and surrounding musculature.
  category: Pathophysiology

- id: acute-neck-pain-definition
  front: What characterizes acute neck pain and what is its typical course?
  back: Acute neck pain has a short onset and is self-limiting, resolving within a short period of time with or without symptomatic treatment. It is often due to mechanical problems.
  category: Clinical Presentation

- id: torticollis-presentation
  front: What is torticollis (wry neck) and how does it present?
  back: Torticollis presents with severe pain and stiffness on awakening. X-rays are generally normal. It is often due to malalignment of the facet joints. Pain generally settles within a few days with analgesics, muscle relaxants, and botulinum toxin.
  category: Acute Conditions

- id: acute-disc-herniation-neck
  front: What causes acute cervical disc herniation and how does it present?
  back: Acute cervical disc herniation is caused by sudden twisting movement or whiplash injury, often associated with motor vehicle accidents. It presents with severe pain aggravated by head movements, stiff neck with muscle spasm, and may have referred pain to shoulder or arm.
  category: Acute Conditions

- id: cervical-disc-herniation-complications
  front: What complications can cervical disc herniation cause?
  back: Cervical disc herniation may cause muscle weakness, diminished reflexes, and with posterior cord compression, compressive myelopathy can develop. X-rays are usually normal.
  category: Complications

- id: acute-disc-herniation-management
  front: How is acute cervical disc herniation managed?
  back: Treatment involves analgesics, immobilization, and a soft collar.
  category: Management

- id: chronic-neck-pain-definition
  front: What defines chronic neck pain and what are the main causes?
  back: Chronic neck pain is neck pain continuing for more than six weeks. It is generally due to musculoskeletal issues or disc degeneration. However, serious pathologies such as disc abscesses and neoplasms of the cervical spine must be excluded.
  category: Chronic Conditions

- id: disc-abscess-causes
  front: What are the common causes of cervical disc abscesses?
  back: Pyogenic or tuberculosis infections are the most common causes of cervical disc abscesses.
  category: Infections

- id: disc-abscess-presentation
  front: How does a cervical disc abscess present clinically?
  back: Disc abscesses present with severe cervical pain, very stiff neck, pain on all ranges of movement, and may cause cifosis (kyphosis). Often fever, systemic upset, and bone tenderness are present with elevated inflammatory markers (ESR) and raised white cell count. X-rays may show destruction of the disc and adjacent bone.
  category: Infections

- id: cervical-neoplasm-presentation
  front: How do cervical neoplasms present?
  back: Cervical neoplasms present with fever and weight loss. Pain is usually greatest at night and when lying down. May have infiltration of the spinal cord and vertebral column, metastasis from primary carcinoma, extensive root signs, and lytic lesions on x-rays.
  category: Malignancy

- id: cervical-neoplasm-types
  front: Are all cervical spinal tumors malignant?
  back: No. Benign tumors such as neurofibromas can occur.
  category: Malignancy

- id: neck-pain-age-red-flags
  front: What age-related red flags should raise suspicion for serious neck pain?
  back: In older people, higher suspicion for malignancies and metastatic bone disease. In younger people, higher suspicion for inflammatory pathology such as spondyloarthropathies.
  category: Red Flags

- id: neck-pain-surgical-history
  front: Why is surgical history important in neck pain evaluation?
  back: If a patient has recently or previously had surgery, always consider infectious pathologies for neck pain, especially if it is non-mechanical in nature.
  category: Red Flags

- id: referred-neck-pain-sources
  front: What non-mechanical sources can cause referred neck pain?
  back: Pharyngitis, laryngitis, colitis, tracheitis, thyroiditis, lymphadenitis, carotid dissection, myocardial infarction, pericarditis, and diaphragmatic inflammation or infection can cause referred neck pain.
  category: Referred Pain

- id: polymyalgia-rheumatica-presentation
  front: What is polymyalgia rheumatica and who does it affect?
  back: Polymyalgia rheumatica is a rheumatic disease affecting women older than 60 years. Patients present with pain and stiffness in the proximal muscles of the shoulders and thighs, with immobility or morning stiffness on first rising.
  category: Rheumatic Conditions

- id: polymyositis-presentation
  front: How does polymyositis present?
  back: Polymyositis presents with widespread myalgia, specifically involving proximal muscles of the shoulder girdle and hip girdle. Associated with abnormal lab tests or elevated creatinine kinase levels.
  category: Rheumatic Conditions

- id: rheumatoid-arthritis-cervical
  front: How can rheumatoid arthritis affect the cervical spine?
  back: Rheumatoid arthritis may cause inflammatory neck pain. Associated findings include polyarthritis affecting other joints (hands, feet, knees). Flexion-extension view of C1-C2 can show subluxation of the joint if rheumatoid involvement of the cervical spine is present.
  category: Rheumatic Conditions

- id: ankylosing-spondylitis-cervical
  front: How is ankylosing spondylitis diagnosed if cervical x-rays are normal?
  back: If neck x-rays do not reveal syndesmophytes, a Ferguson view of the pelvis may be useful for sacroiliitis and can help with diagnosis of ankylosing spondylitis.
  category: Rheumatic Conditions

- id: fibromyalgia-diagnosis
  front: What are the clinical signs and diagnostic criteria for fibromyalgia?
  back: Fibromyalgia is diagnosed by tender points (localized pain on digital pressure). Patients benefit from aerobic exercise and antidepressants. Classification criteria include tender points and trigger points (radiation of muscle pain distal to area of pressure).
  category: Pain Syndromes

- id: myofascial-pain-management
  front: How is myofascial pain (trigger points) managed?
  back: Management involves injection of local anesthetic and corticosteroids.
  category: Management

- id: neck-trauma-flexion
  front: What are the mechanical effects of flexion trauma to the neck?
  back: Flexion trauma results in compressive forces to vertebral bodies and discs, and destructive forces on the posterior spinal elements and neck muscles.
  category: Trauma

- id: neck-trauma-extension
  front: What are the effects of extension injuries to the neck and their prognosis?
  back: Extension injuries compress posterior cervical structures and distract anterior components (disc, anterior longitudinal ligament). Extension injuries carry a worse prognosis for development of chronic pain.
  category: Trauma

- id: pain-quality-classification
  front: How should pain quality be classified in neck pain evaluation?
  back: Pain should be classified as mechanical (dull, deep aching), shooting (electrical type, indicating neural involvement), or deep unremitting (due to ongoing distention, deformity, or invasion of pain-sensitive structures).
  category: Clinical Assessment

- id: mechanical-pain-characteristics
  front: What characteristics define mechanical pain?
  back: Mechanical pain is experienced in episodes, related to movement and exertion, made worse by particular postures and exercise, and improved by rest and immobility.
  category: Clinical Assessment

- id: sinister-pain-characteristics
  front: What pain characteristics should alert to a sinister underlying cause?
  back: Pain that is not altered by movement and worsens spontaneously should alert one to a more sinister underlying cause.
  category: Red Flags

- id: neck-pain-radiation
  front: What is the significance of pain radiation in neck pain?
  back: Intrinsic neck pain radiates into the head and down onto the shoulders. Headache is common with upper cervical pathology (C3 and above). Pain from lower cervical areas radiates to shoulder girdle, arm, interscapular area, and chest wall.
  category: Clinical Assessment

- id: paresthesia-cervical-levels
  front: What cervical nerve roots cause different paresthesia patterns?
  back: Paresthesias that change with posture and affect head/trunk indicate C1-C3 nerve root involvement. Numbness of neck, shoulders, arm, forearm, and fingers indicate C5-C7 nerve root involvement.
  category: Neurological Signs

- id: root-disorder-signs
  front: What clinical signs indicate cervical nerve root disorders?
  back: Signs include loss of reflexes, dermatomal sensory loss, and myotomal motor weakness. Nerve conduction studies can confirm these findings.
  category: Diagnosis

- id: neck-exam-general
  front: What should general examination assess in neck pain?
  back: General examination should look for lymph nodes, examine other joints, perform abdominal and breast examination, and include neurological examination to exclude non-mechanical causes.
  category: Examination

- id: neck-exam-local
  front: What specific aspects should local examination of the neck address?
  back: Observe posture, neck movement, gait, spinal deformities, and muscle wasting. Palpate larynx, thyroid, lymph nodes, carotid arteries, trapezius, levator scapulae, and rhomboid muscles for tenderness.
  category: Examination

- id: cervical-range-motion
  front: What movements should be assessed at the cervical spine?
  back: Movements include flexion, extension, left lateral rotation, right lateral rotation, left lateral flexion, and right lateral flexion.
  category: Examination

- id: neck-pain-imaging-xray
  front: What do plain x-rays of the neck assess and what are the useful views?
  back: Plain x-rays are useful in trauma to detect fractures and subluxations. Useful views include lateral flexion, extension, and open mouth views. Also useful for excluding bone disorders (Paget disease, malignancy, osteomyelitis) and rheumatic disorders (DISH, ankylosing spondylitis).
  category: Imaging

- id: cervical-spondylosis-imaging
  front: What is the significance of degenerative changes on cervical x-rays?
  back: Cervical spondylosis can be diagnosed on x-ray, but the presence of degenerative changes does not always correlate with neck pain symptoms.
  category: Imaging

- id: neck-pain-ct-mri
  front: When is CT vs MRI preferred for neck pain evaluation?
  back: CT is valuable for assessing bone structures, especially foraminal stenosis. MRI is sensitive for disc herniation, intercord pathology, cord compression, and bone infection or inflammation (osteomyelitis). However, 20% of asymptomatic patients and 60% of older patients have abnormal MRI findings.
  category: Imaging

- id: bone-scan-imaging
  front: What is the role of bone scan in neck pain evaluation?
  back: Bone scan (isotope scan) is sensitive for bony pathology (metastasis, infection) especially where plain x-rays are normal. It may assist in differentiating inflammatory versus degenerative changes.
  category: Imaging

- id: lab-investigations-neck
  front: What laboratory investigations are useful in neck pain?
  back: No specific role for laboratory investigations in mechanical neck pain. However, if suspicious of tumors or infection, full blood count (elevated white cell count), elevated ESR, CRP, and raised alkaline phosphatase are useful.
  category: Diagnosis

- id: neck-pain-medication-simple
  front: What are first-line analgesics for neck pain?
  back: Simple analgesics such as paracetamol are safe over a long period of time.
  category: Management

- id: neck-pain-medication-opioids
  front: When are opioids indicated for neck pain and what are the cautions?
  back: Opioids such as propoxyphene and codeine are for severe refractory cases. However, they should be used with caution as they have high propensity for abuse and dependency.
  category: Management

- id: neck-pain-medication-antidepressants
  front: Why are antidepressants used in chronic neck pain?
  back: Tricyclic antidepressants such as amitriptyline are used at low doses for nocturnal sedation. Antidepressants are needed because chronic pain is often associated with depression.
  category: Management

- id: neck-pain-exercise-goals
  front: What are the goals of exercise in neck pain management?
  back: The two principal aims are to restore normal range of movement and strengthen neck musculature. Exercise helps prevent acute exacerbations.
  category: Management

- id: neck-pain-physical-therapy
  front: What physical therapy modalities are used for neck pain?
  back: Physical therapy includes heat or cold therapy, ultrasound, traction, and massage. These may have some limited benefit.
  category: Management

- id: neck-pain-manipulation
  front: What is the role of manipulation in neck pain?
  back: Manipulative or chiropractic manipulation aims to correct vertebral subluxation, stretch tight joint capsules, and mobilization through oscillatory movements may have small benefit.
  category: Management

- id: neck-pain-ergonomics
  front: What ergonomic interventions are helpful in neck pain?
  back: Interventions include posture correction, modification of workplace environment, ergonomic adjustments, and modification of seating devices to decrease extreme neck movements and time in fixed cervical posture.
  category: Management

- id: zygapophysial-injection
  front: What is the evidence for zygapophysial joint injections in neck pain?
  back: Injection of the zygapophysial joint with local anesthetic or steroid is generally of no benefit.
  category: Management

- id: cervical-nerve-compression-prognosis
  front: What is the natural history of cervical nerve root compression?
  back: The majority of cases resolve in a few weeks to months. However, less than 10% have persisting moderate or severe disability.
  category: Prognosis

- id: cervical-compression-treatment
  front: Is there a difference between cervical collar, physiotherapy, and surgery for nerve compression?
  back: No long-term difference exists between cervical collar, physiotherapy, or surgery. The choice hinges upon minimizing harm.
  category: Management

- id: cervical-traction-tens
  front: What role do traction and TENS play in cervical nerve compression?
  back: Cervical traction and transcutaneous electrical nerve stimulation (TENS) may be used as pain treatment modalities. Isometric exercises may also be beneficial.
  category: Management

- id: cervical-surgery-outcomes
  front: Does surgery improve long-term outcomes in cervical nerve compression?
  back: Surgery improves symptoms faster than conservative measures but has no long-term difference when compared to conservative treatment.
  category: Management

- id: low-back-pain-definition
  front: What is the definition of low back pain?
  back: Low back pain is pain localized below the line of the 12th rib and above the inferior gluteal folds, with or without leg pain.
  category: Back Pain - Definition

- id: low-back-pain-classification
  front: How is low back pain classified?
  back: Low back pain may be specific (identifiable pathological cause) or non-specific (no known disease or pathogenic mechanism; anatomical source obscure).
  category: Back Pain - Classification

- id: low-back-pain-prevalence
  front: What is the prevalence of low back pain?
  back: Lifetime prevalence is 75-85%. Yearly prevalence in USA is 15-20% and in Europe is 25-45%. In UK, 5.5-7.5% of GP consultations are for low back pain.
  category: Back Pain - Epidemiology

- id: back-pain-work-absence
  front: What is the natural history of work absence due to back pain?
  back: Only 50% of patients off work for more than six months return to work. Almost nobody returns to work after two years of absence.
  category: Back Pain - Prognosis

- id: back-pain-occupational-risks
  front: What are the occupational risk factors for back pain?
  back: Increased association with heavy physical work, static work posture, and psychosocial factors. Highest risk in nurses and drivers.
  category: Back Pain - Risk Factors

- id: back-pain-recurrence
  front: What is the recurrence rate of back pain?
  back: Lifetime recurrence is up to 85%. In Sweden, one-year recurrence was 44%. In Canada, one-year recurrence was 20% and three-year recurrence was 36%.
  category: Back Pain - Prognosis

- id: back-pain-work-loss
  front: What is the impact of back pain on work loss?
  back: Back pain is a major cause of sick leave. Average sick days in 1983-84 were 28.9 days, increasing to 105.8 days in 1993-94.
  category: Back Pain - Impact

- id: back-pain-psychiatric
  front: What is the relationship between chronic back pain and psychiatric symptoms?
  back: Chronic back pain is often associated with psychiatric symptoms (depression, substance abuse, anxiety, personality disorders) that often precede the onset of back pain.
  category: Back Pain - Comorbidities

- id: back-pain-epidemiological-facts
  front: What are key epidemiological facts about back pain?
  back: Back pain affects two-thirds of adults. It is second only to upper respiratory tract infection in frequency. Affects men and women equally. Most common between 30-50 years. It is an expensive cause of work-related disability.
  category: Back Pain - Epidemiology

- id: back-pain-mechanical-causes
  front: What percentage of back pain is mechanical and what are the causes?
  back: 90% of low back pain is mechanical and due to muscular ligamentous injuries, age-related degeneration of intervertebral discs and facet joints, spinal stenosis, disc herniation, osteoporotic compression fractures, spondylosis, and spondylolysis.
  category: Back Pain - Etiology

- id: back-pain-natural-history
  front: What is the natural history and spontaneous recovery rate of back pain?
  back: 50% are better after one week. More than 90% are better at 8 weeks. Only 7-10% of back pain persists beyond 6 months.
  category: Back Pain - Prognosis

- id: back-pain-medical-causes
  front: What are the medical causes of low back pain?
  back: Medical causes include spondyloarthropathies, spinal infections, osteoporosis, malignancy, and referred pain from pelvic structures, renal structures, aortic aneurysm, and pancreatitis.
  category: Back Pain - Etiology

- id: back-pain-clinical-questions
  front: What are the key clinical questions in back pain evaluation?
  back: Is systemic disease causing the pain? Is there neurological compromise requiring surgical evaluation? Is there social or psychological distress amplifying or prolonging pain?
  category: Back Pain - Assessment

- id: back-pain-management-general
  front: What is the general approach to back pain management?
  back: Management involves watchful waiting. Patient education is important. Spontaneous recovery is the rule. Those who remain active despite pain have less future chronic pain. Patients should rest for 2 days or less. Reassess if pain worsens or neurological symptoms develop.
  category: Back Pain - Management

- id: back-pain-exercise-prevention
  front: What is the role of exercise in back pain?
  back: Exercise has prevention power and helps prevent recurrences and treat chronic pain. However, exercise is not useful for the acute phase.
  category: Back Pain - Management

- id: back-pain-imaging-misleading
  front: Why should imaging studies be used cautiously in back pain?
  back: Imaging studies can be misleading. Many abnormalities are common in pain-free individuals. In people under 60, there is low yield for unexpected x-ray findings.
  category: Back Pain - Imaging

- id: back-pain-imaging-asymptomatic
  front: How common are abnormal disc findings in asymptomatic individuals?
  back: In asymptomatic individuals under 60: spondylosis in 1 of 2,500, bulging discs in 1 of 3 patients, herniated discs in 1 of 5 patients. Over 60: herniated discs in 1 of 3, bulging discs in 80%, disc and apophysial joint degeneration in all, spinal stenosis in 1 of 5 cases.
  category: Back Pain - Imaging

- id: back-pain-red-flags
  front: What are the red flags for serious back pain?
  back: Red flags include fever, weight loss, pain worse when lying down and worse at night, morning stiffness, pain lasting more than 6 weeks, age over 50 with new onset pain, abnormal neurological signs, and point tenderness.
  category: Back Pain - Red Flags

- id: back-pain-further-evaluation
  front: What is the goal of further evaluation in back pain and what studies are useful?
  back: Goal is to discriminate between benign causes and disorders requiring diagnostic studies. Diagnostic studies include x-rays, CT scans, and MRI. Useful lab tests include full blood count, ESR, calcium, alkaline phosphatase, and protein electrophoresis.
  category: Back Pain - Diagnosis

- id: back-pain-serious-conditions
  front: What serious conditions should be considered in back pain?
  back: Herniated disc, spinal stenosis, cauda equina syndrome, inflammatory spondyloarthropathy, spinal infection, vertebral fracture, malignancy, and referred visceral pain.
  category: Back Pain - Red Flags

- id: spinal-stenosis-definition
  front: What is spinal stenosis?
  back: Spinal stenosis shows on imaging (CT/MRI) as canal narrowing. CT myelogram shows canal occlusion with flexion due to spondylolisthesis.
  category: Back Pain - Pathology

- id: disc-herniation-imaging
  front: How does disc herniation appear on imaging?
  back: CT imaging shows a protruding disc compressing the thecal sac.
  category: Back Pain - Imaging

- id: ankylosing-spondylitis-imaging
  front: What are the imaging features of ankylosing spondylitis?
  back: Features include sacroiliitis (inflammation of sacroiliac joints) and vertebral syndesmophytes (bony bridging), which create a bamboo spine appearance.
  category: Back Pain - Imaging

- id: spinal-infection-imaging
  front: How does spinal infection appear on imaging?
  back: Imaging shows disc involvement with spinal infection and pelvic bone involvement in osteomyelitis.
  category: Back Pain - Imaging

- id: osteoporosis-fractures
  front: How do osteoporotic compression fractures appear on x-ray?
  back: X-rays show multiple wedge fractures with markedly reduced vertebral body density.
  category: Back Pain - Imaging

- id: spinal-malignancy-red-flags
  front: What are the red flags for spinal malignancy?
  back: Pain is worse at night, often associated with localized bone thinness. Blood count, ESR, and protein electrophoresis would be abnormal with elevated ESR. Abnormal x-ray findings should raise suspicion.
  category: Back Pain - Red Flags

- id: surgical-referral-sciatica
  front: When is surgical referral indicated for sciatica?
  back: Surgical referral is indicated for sciatica with probable herniated disc, progressive or severe neurological deficit, or persistent sciatica with consistent neurologic and clinical findings after 4-6 weeks of conservative treatment.
  category: Back Pain - Management

- id: surgical-referral-stenosis
  front: When is surgical referral indicated for spinal stenosis?
  back: Surgical referral is indicated if there is progressive or severe neurological deficit, persistent back and leg pain that improves with flexion and is associated with spinal stenosis on imaging.
  category: Back Pain - Management

- id: surgical-referral-spondylolisthesis
  front: When is surgical referral indicated for spondylolisthesis?
  back: Surgical referral is indicated if there is progressive or severe spondylolisthesis with severe neurological deficit, severe back pain and sciatica with functional impairment persisting more than one year.
  category: Back Pain - Management

- id: surgery-indicators
  front: What are the indicators for surgical intervention in back pain?
  back: Indicators include debility (inability to perform activities of daily living and functional impairment) and unbearable pain.
  category: Back Pain - Management

- id: back-pain-key-points
  front: What are the key clinical points about low back pain?
  back: 90% are due to mechanical causes and resolve spontaneously within 6 weeks to 6 months. Diagnostic workup is needed for red flags. ESR elevation warrants evaluation for malignancy or infection. Initial x-rays are beneficial in older patients. Rest is not recommended. Return to normal activities is most beneficial. Back exercises prevent recurrences and treat chronic pain. Surgery is appropriate for small proportion of patients.
  category: Back Pain - Summary

- id: cauda-equina-syndrome
  front: What is cauda equina syndrome and when is it a surgical emergency?
  back: Cauda equina syndrome is a serious neurological emergency requiring urgent surgical evaluation and intervention when there is progressive or severe neurological deficit.
  category: Back Pain - Emergencies
