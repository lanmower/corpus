    deck: "Corpus::Paediatrics::ETAT - Coma and Convulsions"
    fields:
      Front: "What is the first step in treating a child in coma?"
      Back: "Manage the airway and breathing - position child, protect cervical spine if trauma suspected, suction gently, perform jaw thrust, give oxygen via face mask"
    tags: ["coma-treatment", "airway", "etat", "subject:paediatrics"]
  - guid: d4b9f1a6c3e87251
    noteType: Basic
    deck: "Corpus::Paediatrics::ETAT - Coma and Convulsions"
    fields:
      Front: "What is the correct airway position for an infant in coma?"
      Back: "Neutral position - avoid hyperextension which can obstruct airway in infants"
    tags: ["airway", "infant", "etat", "subject:paediatrics"]
  - guid: a8e3f7c2b1d54968
    noteType: Basic
    deck: "Corpus::Paediatrics::ETAT - Coma and Convulsions"
    fields:
      Front: "What is the correct airway position for an older child in coma?"
      Back: "Sniffing position - mild extension of head at atlanto-occipital joint to optimize airway patency"
    tags: ["airway", "older-child", "etat", "subject:paediatrics"]
  - guid: c6f2a9d1b7e43518
    noteType: Basic
    deck: "Corpus::Paediatrics::ETAT - Coma and Convulsions"
    fields:
      Front: "What is jaw thrust and when is it used?"
      Back: "A manual airway maneuver used in coma management to open the airway without extending the neck, important for trauma cases where cervical spine injury is suspected"
    tags: ["jaw-thrust", "airway", "etat", "subject:paediatrics"]
  - guid: b3d8f4c7a2e91625
    noteType: Basic
    deck: "Corpus::Paediatrics::ETAT - Coma and Convulsions"
    fields:
      Front: "What is the recovery position used for in coma management?"
      Back: "Positioning an unconscious child on their side to prevent aspiration of vomitus and maintain airway patency"
    tags: ["recovery-position", "airway", "etat", "subject:paediatrics"]
  - guid: e1c5a8f3d6b29741
    noteType: Basic
    deck: "Corpus::Paediatrics::ETAT - Coma and Convulsions"
    fields:
      Front: "What does D-E-F-G stand for in ETAT resuscitation?"
      Back: "D = Dextrostix (check blood glucose), E = (implied), F = (implied), G = Glucose (never forget)"
    tags: ["defg", "resuscitation", "glucose", "etat", "subject:paediatrics"]
  - guid: f7b4c1e9a3d26857
    noteType: Basic
    deck: "Corpus::Paediatrics::ETAT - Coma and Convulsions"
    fields:
      Front: "What is hypoglycaemia?"
      Back: "Low blood glucose defined as blood glucose < 3 mmol/l (WHO definition)"
    tags: ["hypoglycaemia", "glucose", "etat", "subject:paediatrics"]
  - guid: a2e6f8c4b9d13572
    noteType: Basic
    deck: "Corpus::Paediatrics::ETAT - Coma and Convulsions"
    fields:
      Front: "What is the blood glucose threshold for hypoglycaemia in ETAT?"
      Back: "< 3 mmol/l (or < 55 mg/dl)"
    tags: ["hypoglycaemia", "glucose-threshold", "etat", "subject:paediatrics"]
  - guid: d9f3a7c2e1b64835
    noteType: Basic
    deck: "Corpus::Paediatrics::ETAT - Coma and Convulsions"
    fields:
      Front: "How do we check blood glucose in coma?"
      Back: "Use Dextrostix (rapid bedside glucose testing) - must never be forgotten as hypoglycaemia is treatable"
    tags: ["dextrostix", "glucose-check", "etat", "subject:paediatrics"]
  - guid: c1b7f5a9d2e34861
    noteType: Basic
    deck: "Corpus::Paediatrics::ETAT - Coma and Convulsions"
    fields:
      Front: "What is the treatment for hypoglycaemia in coma?"
      Back: "Give IV glucose immediately"
    tags: ["hypoglycaemia-treatment", "glucose", "etat", "subject:paediatrics"]
  - guid: e4a2f6d7b8c51932
    noteType: Basic
    deck: "Corpus::Paediatrics::ETAT - Coma and Convulsions"
    fields:
      Front: "What is the IV glucose dose for hypoglycaemia in children?"
      Back: "5 ml/kg of 10% glucose solution given rapidly by IV injection"
    tags: ["glucose-dose", "iv-therapy", "etat", "subject:paediatrics"]
  - guid: b6d1f3a8c7e92641
    noteType: Basic
    deck: "Corpus::Paediatrics::ETAT - Coma and Convulsions"
    fields:
      Front: "When should you give oxygen in coma management?"
      Back: "Give oxygen via face mask as part of airway and breathing management"
    tags: ["oxygen", "airway", "coma-treatment", "etat", "subject:paediatrics"]
  - guid: f8c3a1e5b9d46752
    noteType: Basic
    deck: "Corpus::Paediatrics::ETAT - Coma and Convulsions"
    fields:
      Front: "What should you do if cervical spine trauma is suspected in a comatose child?"
      Back: "Protect the cervical spine when positioning the child; use jaw thrust instead of head extension for airway management"
    tags: ["cervical-spine", "trauma", "airway", "etat", "subject:paediatrics"]
