- front: "What is rheumatic fever by definition?"
  back: "A systemic disease of childhood, often recurrent, that follows group A beta-hemolytic streptococcal infection. It is a diffuse inflammatory disease of connective tissue affecting the heart, blood vessels, joints, subcutaneous tissue, and central nervous system."
  tags: ["rheumatic-fever", "definition"]

- front: "What is the pathogenesis of rheumatic fever?"
  back: "Delayed immune response to infection with group A beta-hemolytic streptococcus. Typically has a latent period of 1-3 weeks, followed by antibody-induced immunological damage to heart valves, joints, subcutaneous tissue, and basal ganglia."
  tags: ["rheumatic-fever", "pathogenesis"]

- front: "What are the major criteria of the modified Jones criteria for rheumatic fever diagnosis?"
  back: "1. Carditis (pancarditis affecting pericardium, myocardium, endocardium)\n2. Polyarthritis (flitting arthritis affecting one joint then progressing to adjacent joints)\n3. Subcutaneous nodules\n4. Erythema marginatum\n5. Sydenham's chorea"
  tags: ["rheumatic-fever", "jones-criteria"]

- front: "What are the minor criteria of the modified Jones criteria for rheumatic fever?"
  back: "1. Fever\n2. Arthralgia\n3. Elevated ESR and C-reactive protein\n4. Leukocytosis\n5. Prolonged PR interval on ECG (may indicate possible aortic regurgitation)"
  tags: ["rheumatic-fever", "jones-criteria"]

- front: "What supporting evidence is used to confirm streptococcal infection in rheumatic fever?"
  back: "1. Increased titers of antistreptococcal antibodies (ASOT and anti-DNase B)\n2. Positive throat culture for group A streptococcal\n3. Recent history of scarlet fever"
  tags: ["rheumatic-fever", "diagnosis"]

- front: "What is the treatment of choice for primary prevention of rheumatic fever?"
  back: "Benzathine penicillin G 1.2 million units intramuscularly in a single dose, OR Penicillin V (pen VK) 500mg orally twice daily for 10 days. For penicillin-allergic patients: Erythromycin for 5-10 days."
  tags: ["rheumatic-fever", "treatment"]

- front: "What are the anti-inflammatory agents used in rheumatic fever treatment?"
  back: "For arthritis: Aspirin for rapid resolution of fever and arthralgia (but does not decrease incidence of rheumatic heart disease). For carditis: Prednisone 2-2.5 mg/kg twice daily for 2 weeks, then taper over 2 weeks while introducing aspirin. Reserved for acute severe carditis."
  tags: ["rheumatic-fever", "treatment"]

- front: "What is the duration of secondary prophylaxis for rheumatic fever with carditis and residual heart disease?"
  back: "Prophylaxis for at least 10 years since the last attack and at least until age 40. Sometimes lifelong prophylaxis is used. High-risk patients may benefit from administration every 3 weeks instead of every 4 weeks."
  tags: ["rheumatic-fever", "prophylaxis"]

- front: "What is the duration of secondary prophylaxis for rheumatic fever with carditis but no residual heart disease?"
  back: "Prophylaxis for 10 years or until age 21, whichever is longer."
  tags: ["rheumatic-fever", "prophylaxis"]

- front: "What is the duration of secondary prophylaxis for rheumatic fever without carditis?"
  back: "Prophylaxis for 5 years or until age 21, whichever is longer."
  tags: ["rheumatic-fever", "prophylaxis"]

- front: "What are the predominant symptoms of valvular heart disease?"
  back: "Dyspnea, paroxysmal nocturnal dyspnea (PND), orthopnea, palpitations, syncope, presyncope, cough, hemoptysis, and chest pain."
  tags: ["valvular-disease", "symptoms"]

- front: "What causes dyspnea in valvular heart disease?"
  back: "Pulmonary congestion due to heart failure, which causes interstitial and alveolar edema. This stimulates J receptors in the lungs, which stimulates respiration."
  tags: ["valvular-disease", "pathophysiology"]

- front: "What is the difference between central and peripheral cyanosis in valve disease?"
  back: "Central cyanosis: Due to reduced oxygenation from right-to-left shunting or impaired pulmonary function. Peripheral cyanosis: Due to cutaneous vasoconstriction or reduced cardiac output."
  tags: ["valvular-disease", "examination"]

- front: "What are the common causes of palpitations in valvular heart disease?"
  back: "Arrhythmias, heart block, ectopic beats, high output states, and sudden onset bradycardias."
  tags: ["valvular-disease", "symptoms"]

- front: "What are the common causes of bilateral lower limb edema?"
  back: "Bilateral edema most commonly indicates heart failure, but other causes include renal causes and hepatic causes."
  tags: ["valvular-disease", "examination"]

- front: "What are the physical examination findings to look for in valvular disease?"
  back: "General exam for anemia, clubbing, jaundice, splinter hemorrhages, and peripheral features of valvular heart disease."
  tags: ["valvular-disease", "examination"]

- front: "What are the common causes of valvular heart disease?"
  back: "In developing countries: Rheumatic heart disease (most common). Other causes: Congenital lesions, degeneration or calcification with age, infective endocarditis, connective tissue disease, collagen vascular disease, and drugs."
  tags: ["valvular-disease", "etiology"]

- front: "What are the goals of medical management in valvular heart disease?"
  back: "1. Improve hemodynamics\n2. Delay progression of valve disease\n3. Prevent infective endocarditis\n4. Improve survival and quality of life (surgical/percutaneous intervention may be needed)"
  tags: ["valvular-disease", "management"]

- front: "What is the most common cause of mitral stenosis?"
  back: "Rheumatic fever, which causes fusion of commissures, cusps, and chordae."
  tags: ["mitral-stenosis", "etiology"]

- front: "What are the rarer causes of mitral stenosis?"
  back: "Congenital, carcinoid syndrome, SLE, rheumatoid arthritis, and amyloid."
  tags: ["mitral-stenosis", "etiology"]

- front: "What is the typical presentation of mitral stenosis?"
  back: "Exertional dyspnea (due to reduced pulmonary compliance), palpitations (often from atrial fibrillation), hemoptysis, and hoarseness of voice."
  tags: ["mitral-stenosis", "symptoms"]

- front: "What is the character of the pulse in mitral stenosis?"
  back: "Small volume pulse. May be irregularly irregular if the patient has developed atrial fibrillation."
  tags: ["mitral-stenosis", "examination"]

- front: "What is the character of the apex beat in mitral stenosis?"
  back: "Tapping and non-displaced."
  tags: ["mitral-stenosis", "examination"]

- front: "What is a diastolic thrill in mitral stenosis?"
  back: "A palpable vibration at the apex during diastole due to turbulent flow across the stenosed mitral valve."
  tags: ["mitral-stenosis", "examination"]

- front: "What does a palpable P2 and loud P2 indicate in mitral stenosis?"
  back: "Features of pulmonary hypertension. P2 is found in the second left intercostal space."
  tags: ["mitral-stenosis", "examination"]

- front: "What does a parasternal heave indicate in mitral stenosis?"
  back: "Left atrial or right ventricular enlargement."
  tags: ["mitral-stenosis", "examination"]

- front: "What is the first heart sound in mitral stenosis?"
  back: "Usually loud due to the unopened, calcified valve. May be soft if the valve is heavily calcified."
  tags: ["mitral-stenosis", "examination"]

- front: "What is the pathophysiological basis for the loud first heart sound in mitral stenosis?"
  back: "The mitral valve is prevented from moving in its normal range, remaining in a more open position until ventricular systole occurs, causing the valve to slam shut with a loud sound."
  tags: ["mitral-stenosis", "examination"]