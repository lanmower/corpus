notes:
  - guid: bb7c167a10513c1e
    noteType: Basic
    deck: "Corpus::Gastroenterology::Gastro-Oesophageal Reflux Disease  Peptic Ulcer Disease"
    fields:
      Front: "What is gastro-esophageal reflux disease (GERD)?"
      Back: "A condition that results from failure of the normal anti-reflux mechanism to protect against frequent and abnormal amounts of gastro-esophageal reflux. GERD (United States terminology) or GORD (UK English) is one of the most common human diseases worldwide."
    tags: ["subject:gastroenterology"]
  - guid: fee34dec4893db26
    noteType: Basic
    deck: "Corpus::Gastroenterology::Gastro-Oesophageal Reflux Disease  Peptic Ulcer Disease"
    fields:
      Front: "What is the key difference between normal gastric reflux and GERD?"
      Back: "Occasional acid reflux is a normal physiological process (e.g., after large meals). GERD develops when reflux of gastric contents causes troublesome symptoms or complications that impact quality of life. It is patient-centered diagnosis based on symptom severity."
    tags: ["subject:gastroenterology"]
  - guid: a885a56210e22718
    noteType: Basic
    deck: "Corpus::Gastroenterology::Gastro-Oesophageal Reflux Disease  Peptic Ulcer Disease"
    fields:
      Front: "What are the defensive factors that prevent GERD?"
      Back: "The lower esophageal sphincter and diaphragm (internal and external sphincters coordinating similar to anal sphincters), esophageal acid clearance via peristalsis (coordinated contractions), and esophageal tissue resistance."
    tags: ["subject:gastroenterology"]
  - guid: 571ec9a4aa2f9f6a
    noteType: Basic
    deck: "Corpus::Gastroenterology::Gastro-Oesophageal Reflux Disease  Peptic Ulcer Disease"
    fields:
      Front: "What are the aggressive factors that promote GERD?"
      Back: "Gastric acidity, volume of gastric contents, and duodenal contents. Conditions like pregnancy (uterus pushing), scleroderma (esophageal dysmotility), Zollinger-Ellison syndrome (excessive acid), post-surgical disruption of lower esophageal sphincter, and prolonged nasogastric intubation increase reflux."
    tags: ["subject:gastroenterology"]
  - guid: 3773a5ee910c0ae8
    noteType: Basic
    deck: "Corpus::Gastroenterology::Gastro-Oesophageal Reflux Disease  Peptic Ulcer Disease"
    fields:
      Front: "What are the classic reflux symptoms?"
      Back: "Burning retrosternal pain (heartburn) and sensation of acid coming up into the throat. These are the most frequent presenting complaints in patients with GERD."
    tags: ["subject:gastroenterology"]
  - guid: ae562ca09db9cab8
    noteType: Basic
    deck: "Corpus::Gastroenterology::Gastro-Oesophageal Reflux Disease  Peptic Ulcer Disease"
    fields:
      Front: "What are atypical symptoms of GERD?"
      Back: "Water brash, odynophagia, and dysphagia. These symptoms have other important causes and if present should prompt further investigation beyond simple GERD diagnosis to rule out other pathology."
    tags: ["subject:gastroenterology"]
  - guid: 2fb0ca66a58f94d6
    noteType: Basic
    deck: "Corpus::Gastroenterology::Gastro-Oesophageal Reflux Disease  Peptic Ulcer Disease"
    fields:
      Front: "What is the Montreal Classification system?"
      Back: "A classification defining esophageal syndromes: (1) Symptomatic syndrome (heartburn, acid regurgitation), (2) Reflux chest pain syndrome, (3) Syndromes associated with esophageal injury (erosions, strictures, Barrett esophagus), and (4) Extra-esophageal syndromes (reflux asthma, laryngitis - though associations not well-validated)."
    tags: ["subject:gastroenterology"]
  - guid: 67836f3ee35b40a1
    noteType: Basic
    deck: "Corpus::Gastroenterology::Gastro-Oesophageal Reflux Disease  Peptic Ulcer Disease"
    fields:
      Front: "When does Barrett esophagus develop?"
      Back: "Long-standing, poorly treated GERD can cause the normal squamous epithelium of the esophagus to change to columnar epithelium. This is a pre-neoplastic lesion that increases risk for esophageal adenocarcinoma."
    tags: ["subject:gastroenterology"]
  - guid: c3d71b9fcfd83870
    noteType: Basic
    deck: "Corpus::Gastroenterology::Gastro-Oesophageal Reflux Disease  Peptic Ulcer Disease"
    fields:
      Front: "What is the 2006 definition of reflux disease?"
      Back: "Gastro-esophageal reflux disease develops when reflux of gastric contents causes troublesome symptoms or complications. This shifted diagnosis from physician-driven to patient-centered, based on symptoms affecting quality of life (work, home, leisure)."
    tags: ["subject:gastroenterology"]
  - guid: 3c8aec29b323b225
    noteType: Basic
    deck: "Corpus::Gastroenterology::Gastro-Oesophageal Reflux Disease  Peptic Ulcer Disease"
    fields:
      Front: "What is the 2018 Lyon Consensus view on GERD diagnosis?"
      Back: "History, structured questionnaires, and response to treatment are insufficient for conclusive GERD diagnosis. Symptoms warrant further investigation to confirm objective evidence of acid reflux or identify other diagnoses, though this is not always pragmatic in general practice."
    tags: ["subject:gastroenterology"]
  - guid: a2433942b85e2318
    noteType: Basic
    deck: "Corpus::Gastroenterology::Gastro-Oesophageal Reflux Disease  Peptic Ulcer Disease"
    fields:
      Front: "What is the diagnostic approach in general practice for suspected GERD?"
      Back: "In young patients with classical reflux symptoms and no alarm symptoms, empiric trial of acid suppression with PPI (e.g., omeprazole) is used. Symptoms should improve within 8-12 weeks of treatment."
    tags: ["subject:gastroenterology"]
  - guid: f97186ef56ce7d6a
    noteType: Basic
    deck: "Corpus::Gastroenterology::Gastro-Oesophageal Reflux Disease  Peptic Ulcer Disease"
    fields:
      Front: "What is the proper timing for taking a proton pump inhibitor?"
      Back: "PPIs should be taken 30-60 minutes before the first meal of the day to switch off the proton pumps before they become active, rather than immediately before eating."
    tags: ["subject:gastroenterology"]
  - guid: 75ffdafce69a5c9c
    noteType: Basic
    deck: "Corpus::Gastroenterology::Gastro-Oesophageal Reflux Disease  Peptic Ulcer Disease"
    fields:
      Front: "What are alarm symptoms requiring investigation in GERD?"
      Back: "Dysphagia, unintentional weight loss, occult or overt GI bleeding/anemia, symptoms for more than 5 years, and age >45 years. These patients should be referred for upper GI scope to rule out Barrett esophagus, strictures, or malignancy."
    tags: ["subject:gastroenterology"]
  - guid: 2b0338cb8a397b6b
    noteType: Basic
    deck: "Corpus::Gastroenterology::Gastro-Oesophageal Reflux Disease  Peptic Ulcer Disease"
    fields:
      Front: "What is the sensitivity and specificity of endoscopic erosions for GERD?"
      Back: "Erosions are highly specific (~95%) for GERD, but have poor sensitivity (~60% for untreated disease). Normal appearance does not exclude significant gastro-esophageal reflux."
    tags: ["subject:gastroenterology"]
  - guid: fa4f4565a39163f2
    noteType: Basic
    deck: "Corpus::Gastroenterology::Gastro-Oesophageal Reflux Disease  Peptic Ulcer Disease"
    fields:
      Front: "What is esophageal pH monitoring?"
      Back: "A pH probe is placed in the lower esophagus for 24-hour monitoring. It records pH readings and patient-triggered events. Acid exposure time >6% indicates GERD, <4% does not indicate reflux. 4-6% is equivocal and may need impedance monitoring."
    tags: ["subject:gastroenterology"]
  - guid: 687406f06afbedb3
    noteType: Basic
    deck: "Corpus::Gastroenterology::Gastro-Oesophageal Reflux Disease  Peptic Ulcer Disease"
    fields:
      Front: "What is the gold standard investigation for confirming GERD?"
      Back: "Esophageal pH studies (24-hour ambulatory pH monitoring) are regarded as the gold standard for objectively confirming gastro-esophageal reflux and relating symptoms to reflux events."
    tags: ["subject:gastroenterology"]
  - guid: b67ba015dc307f5e
    noteType: Basic
    deck: "Corpus::Gastroenterology::Gastro-Oesophageal Reflux Disease  Peptic Ulcer Disease"
    fields:
      Front: "What is esophageal manometry?"
      Back: "Measures esophageal contraction and lower esophageal sphincter function. Useful to exclude achalasia (failure of lower esophageal relaxation), assess esophageal motility, and evaluate candidates for anti-reflux surgery."
    tags: ["subject:gastroenterology"]
  - guid: 8489f15cf135f0de
    noteType: Basic
    deck: "Corpus::Gastroenterology::Gastro-Oesophageal Reflux Disease  Peptic Ulcer Disease"
    fields:
      Front: "What are radiological findings in GERD evaluation?"
      Back: "Water-soluble contrast studies are inexpensive and can identify esophageal strictures or hiatal hernias. Primarily used in dysphagia evaluation. Less commonly ordered in straightforward GERD unless assessing for strictures before endoscopy."
    tags: ["subject:gastroenterology"]
  - guid: b9567a384ed7ee8f
    noteType: Basic
    deck: "Corpus::Gastroenterology::Gastro-Oesophageal Reflux Disease  Peptic Ulcer Disease"
    fields:
      Front: "When should cardiac causes be excluded in reflux chest pain?"
      Back: "Always rule out coronary artery disease and myocardial infarction before attributing chest pain to GERD. Both reflux disease and cardiac disease are prevalent. Perform ECG before proceeding with esophageal investigations."
    tags: ["subject:gastroenterology"]
  - guid: ef07a3c24811eb2e
    noteType: Basic
    deck: "Corpus::Gastroenterology::Gastro-Oesophageal Reflux Disease  Peptic Ulcer Disease"
    fields:
      Front: "What are complications of GERD?"
      Back: "Hemorrhage and perforation are exceedingly rare with modern early treatment. Strictures (benign peptic strictures) still occur. Pre-neoplastic change to Barrett esophagus increases risk for adenocarcinoma, especially in aging populations."
    tags: ["subject:gastroenterology"]
  - guid: 36ffb9a4238c88bd
    noteType: Basic
    deck: "Corpus::Gastroenterology::Gastro-Oesophageal Reflux Disease  Peptic Ulcer Disease"
    fields:
      Front: "What is the pathological process of Barrett esophagus?"
      Back: "Intestinal metaplasia: normal squamous epithelium changes to columnar epithelium. Can progress to dysplasia (low-grade or high-grade). Dysplasia can eventually develop into adenocarcinoma if left untreated."
    tags: ["subject:gastroenterology"]
  - guid: 53b5b5f72eba7678
    noteType: Basic
    deck: "Corpus::Gastroenterology::Gastro-Oesophageal Reflux Disease  Peptic Ulcer Disease"
    fields:
      Front: "How can adenocarcinoma development be prevented in Barrett esophagus?"
      Back: "Endoscopic ablation (heat therapy) or mucosal resection can remove dysplastic tissue, preventing progression to adenocarcinoma. Early intervention avoids need for surgery, chemotherapy, and associated morbidity/mortality."
    tags: ["subject:gastroenterology"]
