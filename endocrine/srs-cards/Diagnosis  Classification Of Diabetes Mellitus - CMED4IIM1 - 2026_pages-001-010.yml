deck: "Corpus::Endocrine::Diagnosis  Classification Of Diabetes Mellitus"
notes:
  - guid: 6d0f9fb774988a3b
    noteType: Basic
    deck: "Corpus::Endocrine::Diagnosis  Classification Of Diabetes Mellitus"
    fields:
      Front: "What is diabetes mellitus in terms of metabolic state?"
      Back: "Diabetes is a state of chronic hyperglycemia associated with metabolic problems other than glucose metabolism, due to either a defect or abnormality of insulin secretion and/or action."
    tags: ["difficulty:medium", "subject:endocrine"]
  - guid: d78d31fe7ed45e29
    noteType: Basic
    deck: "Corpus::Endocrine::Diagnosis  Classification Of Diabetes Mellitus"
    fields:
      Front: "What is the mortality increase in type 1 and type 2 diabetes compared to general population?"
      Back: "Type 1 diabetes: 4-7 fold increased mortality. Type 2 diabetes: 2-3 fold increased mortality."
    tags: ["difficulty:medium", "subject:endocrine"]
  - guid: 2b84a17aed41cccf
    noteType: Basic
    deck: "Corpus::Endocrine::Diagnosis  Classification Of Diabetes Mellitus"
    fields:
      Front: "Name the three main microvascular complications of diabetes."
      Back: |
      1) Retinopathy (damage to blood vessels in the retina)
      2) Nephropathy (kidney disease)
      3) Neuropathy (nerve damage)
    tags: ["difficulty:medium", "subject:endocrine"]
  - guid: fab0326ce9175d92
    noteType: Basic
    deck: "Corpus::Endocrine::Diagnosis  Classification Of Diabetes Mellitus"
    fields:
      Front: "What is the management objective for diabetes control?"
      Back: "Achieve normal or near-normal glycemia with adequate control of blood pressure, lipids, and obesity using diet, exercise, oral anti-diabetic agents, insulin, and other newer injectables."
    tags: ["difficulty:medium", "subject:endocrine"]
  - guid: 5dc45a17e1d960a1
    noteType: Basic
    deck: "Corpus::Endocrine::Diagnosis  Classification Of Diabetes Mellitus"
    fields:
      Front: "What are the clinical stages of glycemia?"
      Back: |
      1) Normal glycemia (normal glucose regulation)
      2) Hyperglycemia (impaired glucose tolerance or impaired glucose regulation/pre-diabetes)
      3) Diabetes (not insulin requiring, insulin requiring for control, or insulin requiring for survival)
    tags: ["difficulty:medium", "subject:endocrine"]
  - guid: 713a858d8e9476d2
    noteType: Basic
    deck: "Corpus::Endocrine::Diagnosis  Classification Of Diabetes Mellitus"
    fields:
      Front: "What percentage of diabetes is type 1 vs type 2?"
      Back: "Type 1: 5-10% of all diabetes. Type 2: Over 90% of all diabetes."
    tags: ["difficulty:medium", "subject:endocrine"]
  - guid: ec68ab782e1bc5b8
    noteType: Basic
    deck: "Corpus::Endocrine::Diagnosis  Classification Of Diabetes Mellitus"
    fields:
      Front: "What is the typical pathogenesis of type 2 diabetes?"
      Back: "Starts with insulin resistance. Fasting hyperglycemia only becomes manifest when there is insulin secretory defect."
    tags: ["difficulty:medium", "subject:endocrine"]
  - guid: 20c2fed8dff720ed
    noteType: Basic
    deck: "Corpus::Endocrine::Diagnosis  Classification Of Diabetes Mellitus"
    fields:
      Front: "List the etiological types of diabetes recognized by 2019 WHO classification."
      Back: |
      1) Type 1 (autoimmune or idiopathic)
      2) Type 2
      3) Other specific types
      4) Hybrid form (LADA and ketosis-prone type 2)
      5) Unclassified
      6) Hyperglycemia during pregnancy
    tags: ["difficulty:medium", "subject:endocrine"]
  - guid: bbdc3cf07dbec8f8
    noteType: Basic
    deck: "Corpus::Endocrine::Diagnosis  Classification Of Diabetes Mellitus"
    fields:
      Front: "What is LADA?"
      Back: "LADA (Latent Autoimmune Diabetes in Adults) - a slowly evolving immune-mediated diabetes of adults; a hybrid form that presents as type 2 phenotype but has autoimmune features."
    tags: ["difficulty:medium", "subject:endocrine"]
  - guid: 416043db23882687
    noteType: Basic
    deck: "Corpus::Endocrine::Diagnosis  Classification Of Diabetes Mellitus"
    fields:
      Front: "Compare age of onset between type 1 and type 2 diabetes."
      Back: "Type 1: Occurs in younger individuals, typically before age 35. Type 2: Occurs in older individuals, typically after age 35."
    tags: ["difficulty:medium", "subject:endocrine"]
  - guid: 1c25aa5de323b95c
    noteType: Basic
    deck: "Corpus::Endocrine::Diagnosis  Classification Of Diabetes Mellitus"
    fields:
      Front: "How does body composition differ between type 1 and type 2 diabetes?"
      Back: "Type 1: Lean (due to lack of insulin for fat deposition). Type 2: Overweight (due to high insulin and insulin resistance, usually induced by overweight)."
    tags: ["difficulty:medium", "subject:endocrine"]
  - guid: b4717bc7e16bcd2a
    noteType: Basic
    deck: "Corpus::Endocrine::Diagnosis  Classification Of Diabetes Mellitus"
    fields:
      Front: "What is the HLA association in type 1 diabetes?"
      Back: "Type 1 diabetes is associated with HLA-DQA0-DQB (HLA-DR3-04). Type 2 diabetes has no HLA link."
    tags: ["difficulty:medium", "subject:endocrine"]
  - guid: 94126f14fcb1c42b
    noteType: Basic
    deck: "Corpus::Endocrine::Diagnosis  Classification Of Diabetes Mellitus"
    fields:
      Front: "What is the concordance rate for type 1 and type 2 diabetes in monozygotic twins?"
      Back: "Type 1: 30-35% concordance. Type 2: 90% concordance."
    tags: ["difficulty:medium", "subject:endocrine"]
  - guid: 058c22359a9982bb
    noteType: Basic
    deck: "Corpus::Endocrine::Diagnosis  Classification Of Diabetes Mellitus"
    fields:
      Front: "Name the autoimmune markers present in type 1 diabetes."
      Back: |
      1) Glutamic acid decarboxylase antibody (anti-GAD)
      2) ICA (islet cell antigen)
      3) IA2 antibody
      4) Insulin antibody
    tags: ["difficulty:medium", "subject:endocrine"]
  - guid: c4ddc606950f3970
    noteType: Basic
    deck: "Corpus::Endocrine::Diagnosis  Classification Of Diabetes Mellitus"
    fields:
      Front: "What is the acute crisis presentation for untreated type 1 vs type 2 diabetes?"
      Back: "Type 1: Rapidly progresses to diabetic ketoacidosis. Type 2: Usually presents as hyperosmolar hyperglycemic crisis (previously called hyperosmolar non-ketotic hyperglycemia)."
    tags: ["difficulty:medium", "subject:endocrine"]
  - guid: 77fe49453419e113
    noteType: Basic
    deck: "Corpus::Endocrine::Diagnosis  Classification Of Diabetes Mellitus"
    fields:
      Front: "Describe the normal fasting plasma glucose and 2-hour glucose on GTT according to WHO criteria."
      Back: "Normal: Fasting plasma glucose < 6.1 mmol/L AND 2-hour plasma glucose < 7.8 mmol/L on GTT."
    tags: ["difficulty:medium", "subject:endocrine"]
  - guid: 0cb3206d8fa193b5
    noteType: Basic
    deck: "Corpus::Endocrine::Diagnosis  Classification Of Diabetes Mellitus"
    fields:
      Front: "What defines impaired fasting glucose (IFG) according to WHO?"
      Back: "Fasting plasma glucose 6.1-7 mmol/L AND 2-hour plasma glucose < 7.8 mmol/L on GTT (only fasting glucose is abnormal)."
    tags: ["difficulty:medium", "subject:endocrine"]
  - guid: 17e019ff8ee5e8e6
    noteType: Basic
    deck: "Corpus::Endocrine::Diagnosis  Classification Of Diabetes Mellitus"
    fields:
      Front: "What defines impaired glucose tolerance (IGT) according to WHO?"
      Back: "Fasting plasma glucose < 7 mmol/L AND 2-hour plasma glucose 7.8-11.1 mmol/L on GTT."
    tags: ["difficulty:medium", "subject:endocrine"]
  - guid: 47f327cb372e553c
    noteType: Basic
    deck: "Corpus::Endocrine::Diagnosis  Classification Of Diabetes Mellitus"
    fields:
      Front: "What are the ADA diagnostic criteria for diabetes using fasting plasma glucose?"
      Back: "ADA normal: < 5.6 mmol/L. Impaired fasting glucose: 5.6-6.9 mmol/L. Diabetes: ≥ 7 mmol/L."
    tags: ["difficulty:medium", "subject:endocrine"]
  - guid: 2ce427c24f294fc2
    noteType: Basic
    deck: "Corpus::Endocrine::Diagnosis  Classification Of Diabetes Mellitus"
    fields:
      Front: "What is the diagnostic threshold for diabetes on 2-hour glucose during GTT?"
      Back: "Diabetes is diagnosed if 2-hour plasma glucose ≥ 11.1 mmol/L on GTT (both WHO and ADA)."
    tags: ["difficulty:medium", "subject:endocrine"]
  - guid: a26e651570537f5d
    noteType: Basic
    deck: "Corpus::Endocrine::Diagnosis  Classification Of Diabetes Mellitus"
    fields:
      Front: "What are the four diagnostic tests for diabetes according to ADA 2010-current?"
      Back: |
      1) Fasting plasma glucose ≥ 7 mmol/L
      2) 2-hour plasma glucose ≥ 11.1 mmol/L on GTT
      3) HbA1c ≥ 6.5%
      4) Random plasma glucose ≥ 11.1 mmol/L with classic symptoms or hypoglycemic crisis
    tags: ["difficulty:medium", "subject:endocrine"]
  - guid: faaace603b460092
    noteType: Basic
    deck: "Corpus::Endocrine::Diagnosis  Classification Of Diabetes Mellitus"
    fields:
      Front: "When must a diagnosis of diabetes be confirmed?"
      Back: "The diagnosis of diabetes must be confirmed by a repeat test on another day (can be same test or different test) in the absence of unequivocal hyperglycemia."
    tags: ["difficulty:medium", "subject:endocrine"]
  - guid: 858b47deb338a6f7
    noteType: Basic
    deck: "Corpus::Endocrine::Diagnosis  Classification Of Diabetes Mellitus"
    fields:
      Front: "What is the procedure for performing an oral glucose tolerance test (GTT)?"
      Back: "No caloric intake for 8 hours (fasting). Then 75 grams of anhydrous glucose dissolved in water (or 250 moles of glucose) is given orally. Blood glucose is measured at fasting and 2 hours."
    tags: ["difficulty:medium", "subject:endocrine"]
  - guid: 0b440dc3eb1e4049
    noteType: Basic
    deck: "Corpus::Endocrine::Diagnosis  Classification Of Diabetes Mellitus"
    fields:
      Front: "What standardization is required for HbA1c testing?"
      Back: "HbA1c must be done in a lab with a method certified by the National Glycohemoglobin Certification Program and standardized to the DCCT (Diabetes Control and Complications Trial) assay."
    tags: ["difficulty:medium", "subject:endocrine"]
  - guid: 8e8792fe7a2873b2
    noteType: Basic
    deck: "Corpus::Endocrine::Diagnosis  Classification Of Diabetes Mellitus"
    fields:
      Front: "What does ADA 2010 define as 'increased risk for diabetes'?"
      Back: "Impaired fasting glucose: 5.6-6.1 mmol/L, OR IGT (2-hour: 7.8-11 mmol/L), OR intermediate HbA1c: 5.7-6.4%"
    tags: ["difficulty:medium", "subject:endocrine"]
  - guid: 69aa9f1ee61be93e
    noteType: Basic
    deck: "Corpus::Endocrine::Diagnosis  Classification Of Diabetes Mellitus"
    fields:
      Front: "What are the screening recommendations for type 2 diabetes by age?"
      Back: "Age ≥ 45: All should be screened with any method, especially if BMI ≥ 25. Age < 45: Screen if overweight (BMI ≥ 25) PLUS one other risk factor."
    tags: ["difficulty:medium", "subject:endocrine"]
  - guid: a037154717af965d
    noteType: Basic
    deck: "Corpus::Endocrine::Diagnosis  Classification Of Diabetes Mellitus"
    fields:
      Front: "List risk factors for screening type 2 diabetes in people under 45."
      Back: "Physical inactivity, family history in first-degree relative, high-risk ethnicity (Pima Indians, Pacific Islanders, migrant Asian Indians), gestational diabetes, big babies (>4kg), IFG/IGT, hypertension, dyslipidemia, PCOS, vascular disease."
    tags: ["difficulty:medium", "subject:endocrine"]
  - guid: 4a13c551539a0689
    noteType: Basic
    deck: "Corpus::Endocrine::Diagnosis  Classification Of Diabetes Mellitus"
    fields:
      Front: "What is the global burden of diabetes as of 2021 (10th edition IDF)?"
      Back: "537 million people worldwide with diabetes in 2021, projected to increase 46% to 783 million by 2045. Greatest increase in Africa (134% from 24M to 55M)."
    tags: ["difficulty:medium", "subject:endocrine"]
  - guid: 6b24a736c3c7cfe8
    noteType: Basic
    deck: "Corpus::Endocrine::Diagnosis  Classification Of Diabetes Mellitus"
    fields:
      Front: "How does the burden of diabetes compare to other major diseases?"
      Back: "More people have diabetes than HIV, tuberculosis, and malaria combined."
    tags: ["difficulty:medium", "subject:endocrine"]
  - guid: b4dc8690d1791082
    noteType: Basic
    deck: "Corpus::Endocrine::Diagnosis  Classification Of Diabetes Mellitus"
    fields:
      Front: "What are the acute complications of diabetes?"
      Back: "Metabolic: hyper/hypoglycemia, diabetic ketoacidosis. Infections: acute (pneumonia, arthritis, UTI) or chronic (tuberculosis)."
    tags: ["difficulty:medium", "subject:endocrine"]
  - guid: 625560fc1b46f38f
    noteType: Basic
    deck: "Corpus::Endocrine::Diagnosis  Classification Of Diabetes Mellitus"
    fields:
      Front: "Name the major microvascular complications of diabetes."
      Back: |
      1) Retinopathy (90% of type 1, 20-90% of type 2)
      2) Nephropathy (⅓ of type 1, 3-15% of type 2)
      3) Neuropathy (10-100% of type 1 and 2)
    tags: ["difficulty:medium", "subject:endocrine"]
  - guid: 13d0acc64ef874db
    noteType: Basic
    deck: "Corpus::Endocrine::Diagnosis  Classification Of Diabetes Mellitus"
    fields:
      Front: "Name the major macrovascular (atherosclerotic) complications of diabetes."
      Back: |
      1) Coronary artery disease/cardiovascular disease (2-4 fold increased risk)
      2) Cerebrovascular disease/stroke (2-fold increased risk)
      3) Peripheral vascular disease
    tags: ["difficulty:medium", "subject:endocrine"]
  - guid: aabb590137e38f7e
    noteType: Basic
    deck: "Corpus::Endocrine::Diagnosis  Classification Of Diabetes Mellitus"
    fields:
      Front: "What other chronic complications of diabetes exist beyond micro/macrovascular?"
      Back: "Diabetic foot (combination of vascular, neuropathy, infection), cataracts, skin and connective tissue diseases, rheumatological disease."
    tags: ["difficulty:medium", "subject:endocrine"]
  - guid: 358f25feea8951f6
    noteType: Basic
    deck: "Corpus::Endocrine::Diagnosis  Classification Of Diabetes Mellitus"
    fields:
      Front: "What is the relationship between hyperglycemia and microvascular complications?"
      Back: "Microvascular complications are specific to diabetes and related to the duration and degree of hyperglycemia. Hyperglycemia is important for both initiation and progression of complications. Other factors (metabolic, genetic, vascular, environmental) contribute but hyperglycemia is the major determinant."
    tags: ["difficulty:medium", "subject:endocrine"]
  - guid: cf71a41d25c13250
    noteType: Basic
    deck: "Corpus::Endocrine::Diagnosis  Classification Of Diabetes Mellitus"
    fields:
      Front: "At what time do chronic complications develop in type 1 diabetes?"
      Back: "Chronic complications occur years after diagnosis of type 1 diabetes (diagnosed usually via DKA presentation)."
    tags: ["difficulty:medium", "subject:endocrine"]
  - guid: abf84557765ee1f0
    noteType: Basic
    deck: "Corpus::Endocrine::Diagnosis  Classification Of Diabetes Mellitus"
    fields:
      Front: "At what time do chronic complications develop in type 2 diabetes?"
      Back: "Chronic complications may occur years after diagnosis, but in many cases complications may be the mode of presentation (found at first detection of diabetes)."
    tags: ["difficulty:medium", "subject:endocrine"]
  - guid: bfefca660d63272f
    noteType: Basic
    deck: "Corpus::Endocrine::Diagnosis  Classification Of Diabetes Mellitus"
    fields:
      Front: "Define diabetic nephropathy."
      Back: "Diabetic nephropathy is characterized by: 1) Persistent proteinuria, 2) Progressive decline in renal function (GFR), 3) Arterial hypertension, 4) Associated retinopathy"
    tags: ["difficulty:medium", "subject:endocrine"]
  - guid: 6a9f8571d31c9935
    noteType: Basic
    deck: "Corpus::Endocrine::Diagnosis  Classification Of Diabetes Mellitus"
    fields:
      Front: "What is the prevalence of diabetic nephropathy in type 1 vs type 2?"
      Back: "Type 1: ⅓ (approximately 33%). Type 2: 15%."
    tags: ["difficulty:medium", "subject:endocrine"]
  - guid: 385f75b10f54ea11
    noteType: Basic
    deck: "Corpus::Endocrine::Diagnosis  Classification Of Diabetes Mellitus"
    fields:
      Front: "What is the most important factor for development of diabetic nephropathy?"
      Back: "Duration of diabetes is the most important factor. In type 1, incidence peaks at about 15 years. In type 2, it can peak earlier."
    tags: ["difficulty:medium", "subject:endocrine"]
