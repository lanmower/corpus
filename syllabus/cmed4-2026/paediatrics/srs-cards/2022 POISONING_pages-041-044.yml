  - guid: a3e8f2d6c0b4g7h1
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 POISONING"
    fields:
      Front: "What are caustic and corrosive agents?"
      Back: |
        Caustic and corrosive agents are chemical substances that destroy or damage organic tissue through direct chemical action. They include strong acids, strong alkalis, and other reactive chemicals.
    tags: ["caustic", "corrosive", "definition", "subject:paediatrics"]

  - guid: b4f9g3e7d1c5h8i2
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 POISONING"
    fields:
      Front: "What is the clinical significance of caustic ingestion in children?"
      Back: |
        Caustic ingestion in children is a serious emergency that can cause severe burns to the mouth, oesophagus, and stomach, potentially leading to perforation, mediastinitis, and death.
    tags: ["caustic", "corrosive", "clinical-significance", "subject:paediatrics"]

  - guid: c5g0h4f8e2d6i9j3
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 POISONING"
    fields:
      Front: "What complications can result from caustic ingestion?"
      Back: |
        Complications include oesophageal stricture formation, gastric perforation, mediastinitis, peritonitis, sepsis, and death if perforation occurs.
    tags: ["caustic", "corrosive", "complications", "subject:paediatrics"]

  - guid: d6h1i5g9f3e7j0k4
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 POISONING"
    fields:
      Front: "What is the management approach for caustic ingestion in the acute phase?"
      Back: |
        Acute management includes: (1) stop ingestion immediately, (2) do NOT induce vomiting or activated charcoal, (3) dilute with small sips of water or milk, (4) assess airway if burns involve mouth, (5) urgent endoscopy to assess depth of injury.
    tags: ["caustic", "corrosive", "management", "acute", "subject:paediatrics"]

  - guid: e7i2j6h0g4f8k1l5
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 POISONING"
    fields:
      Front: "Why is endoscopy essential in caustic ingestion?"
      Back: |
        Endoscopy is essential to determine the extent and depth of tissue damage (superficial vs deep burns), assess perforation risk, and guide decisions on steroids, antibiotics, and surgical intervention.
    tags: ["caustic", "corrosive", "diagnosis", "endoscopy", "subject:paediatrics"]

  - guid: f8j3k7i1h5g9l2m6
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 POISONING"
    fields:
      Front: "What is petrochemical poisoning?"
      Back: |
        Petrochemical poisoning results from ingestion or inhalation of petroleum-derived products such as petrol (gasoline), paraffin, kerosene, or other hydrocarbons.
    tags: ["petrochemical", "poisoning", "hydrocarbons", "subject:paediatrics"]

  - guid: g9k4l8j2i6h0m3n7
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 POISONING"
    fields:
      Front: "What is the most common route of petrochemical poisoning in children?"
      Back: |
        Ingestion is the most common route of petrochemical poisoning in children, often through accidental swallowing of petrol or paraffin.
    tags: ["petrochemical", "route", "epidemiology", "subject:paediatrics"]

  - guid: h0l5m9k3j7i1n4o8
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 POISONING"
    fields:
      Front: "What are the systemic effects of petrochemical (hydrocarbon) poisoning?"
      Back: |
        Systemic effects include gastrointestinal irritation (nausea, vomiting, diarrhoea), CNS depression (lethargy, ataxia, loss of consciousness), and potential aspiration pneumonitis if aspirated.
    tags: ["petrochemical", "hydrocarbons", "systemic-effects", "subject:paediatrics"]

  - guid: i1m6n0l4k8j2o5p9
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 POISONING"
    fields:
      Front: "What is aspiration pneumonitis in hydrocarbon poisoning?"
      Back: |
        Aspiration pneumonitis is a serious complication occurring when petroleum products are aspirated into the lungs, causing chemical pneumonitis with cough, dyspnoea, and potential respiratory failure.
    tags: ["petrochemical", "hydrocarbons", "pneumonitis", "subject:paediatrics"]

  - guid: j2n7o1m5l9k3p6q0
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 POISONING"
    fields:
      Front: "Why is vomiting particularly dangerous in petrochemical poisoning?"
      Back: |
        Vomiting is dangerous in petrochemical poisoning because it increases the risk of aspiration of hydrocarbons into the lungs, causing chemical pneumonitis.
    tags: ["petrochemical", "hydrocarbons", "vomiting-risk", "subject:paediatrics"]

  - guid: k3o8p2n6m0l4q7r1
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 POISONING"
    fields:
      Front: "What is the management approach for petrochemical ingestion?"
      Back: |
        Management includes: (1) do NOT induce vomiting, (2) do NOT use activated charcoal, (3) supportive care with airway protection, (4) monitor for aspiration pneumonitis, (5) oxygen and mechanical ventilation if respiratory symptoms develop.
    tags: ["petrochemical", "hydrocarbons", "management", "subject:paediatrics"]

  - guid: l4p9q3o7n1m5r8s2
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 POISONING"
    fields:
      Front: "What is the prognosis of aspiration pneumonitis from hydrocarbons?"
      Back: |
        Most cases of hydrocarbon aspiration pneumonitis resolve with supportive care, but severe cases can progress to respiratory failure, ARDS, and death.
    tags: ["petrochemical", "hydrocarbons", "prognosis", "subject:paediatrics"]

  - guid: m5q0r4p8o2n6s9t3
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 POISONING"
    fields:
      Front: "What monitoring is needed after petrochemical ingestion?"
      Back: |
        Monitoring includes observation for 6–12 hours for symptoms of aspiration (cough, dyspnoea, wheezing), chest X-ray to detect pneumonitis, and continuous pulse oximetry.
    tags: ["petrochemical", "hydrocarbons", "monitoring", "subject:paediatrics"]

  - guid: n6r1s5q9p3o7t0u4
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 POISONING"
    fields:
      Front: "What is the key principle in preventing accidental petrochemical poisoning?"
      Back: |
        Prevention includes proper storage of petrochemical products in child-resistant containers, away from food containers, and out of reach of children.
    tags: ["petrochemical", "prevention", "primary", "subject:paediatrics"]

  - guid: o7s2t6r0q4p8u1v5
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 POISONING"
    fields:
      Front: "What is the general approach to any suspected poisoning in children?"
      Back: |
        General approach includes: (1) ensure airway, breathing, circulation, (2) obtain detailed history of exposure, (3) identify the toxin, (4) assess toxidrome, (5) perform decontamination if appropriate, (6) administer antidotes if available, (7) supportive care, (8) monitor closely for complications.
    tags: ["poisoning", "management", "general-approach", "subject:paediatrics"]

  - guid: p8t3u7s1r5q9v2w6
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 POISONING"
    fields:
      Front: "What role do poison control centres play in managing poisoning?"
      Back: |
        Poison control centres provide expert consultation on the toxicity, management, and prognosis of poisonings. They offer guidance on specific antidotes, decontamination methods, and monitoring protocols.
    tags: ["poisoning", "management", "resources", "subject:paediatrics"]

  - guid: q9u4v8t2s6r0w3x7
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 POISONING"
    fields:
      Front: "What decontamination methods are used in poisoning management?"
      Back: |
        Decontamination methods include: (1) dilution (water/milk for caustic agents), (2) activated charcoal (for many toxins), (3) gastric lavage (for recent ingestions), (4) skin decontamination (washing with water), and (5) decontamination of eyes.
    tags: ["poisoning", "management", "decontamination", "subject:paediatrics"]

