- id: card-01
  front: "What is gastro-esophageal reflux disease (GERD)?"
  back: |
    A condition that results from failure of the normal anti-reflux mechanism to protect against frequent and abnormal amounts of gastro-esophageal reflux. GERD (United States terminology) or GORD (UK English) is one of the most common human diseases worldwide.

- id: card-02
  front: "What is the key difference between normal gastric reflux and GERD?"
  back: |
    Occasional acid reflux is a normal physiological process (e.g., after large meals). GERD develops when reflux of gastric contents causes troublesome symptoms or complications that impact quality of life. It is patient-centered diagnosis based on symptom severity.

- id: card-03
  front: "What are the defensive factors that prevent GERD?"
  back: |
    The lower esophageal sphincter and diaphragm (internal and external sphincters coordinating similar to anal sphincters), esophageal acid clearance via peristalsis (coordinated contractions), and esophageal tissue resistance.

- id: card-04
  front: "What are the aggressive factors that promote GERD?"
  back: |
    Gastric acidity, volume of gastric contents, and duodenal contents. Conditions like pregnancy (uterus pushing), scleroderma (esophageal dysmotility), Zollinger-Ellison syndrome (excessive acid), post-surgical disruption of lower esophageal sphincter, and prolonged nasogastric intubation increase reflux.

- id: card-05
  front: "What are the classic reflux symptoms?"
  back: |
    Burning retrosternal pain (heartburn) and sensation of acid coming up into the throat. These are the most frequent presenting complaints in patients with GERD.

- id: card-06
  front: "What are atypical symptoms of GERD?"
  back: |
    Water brash, odynophagia, and dysphagia. These symptoms have other important causes and if present should prompt further investigation beyond simple GERD diagnosis to rule out other pathology.

- id: card-07
  front: "What is the Montreal Classification system?"
  back: |
    A classification defining esophageal syndromes: (1) Symptomatic syndrome (heartburn, acid regurgitation), (2) Reflux chest pain syndrome, (3) Syndromes associated with esophageal injury (erosions, strictures, Barrett esophagus), and (4) Extra-esophageal syndromes (reflux asthma, laryngitis - though associations not well-validated).

- id: card-08
  front: "When does Barrett esophagus develop?"
  back: |
    Long-standing, poorly treated GERD can cause the normal squamous epithelium of the esophagus to change to columnar epithelium. This is a pre-neoplastic lesion that increases risk for esophageal adenocarcinoma.

- id: card-09
  front: "What is the 2006 definition of reflux disease?"
  back: |
    Gastro-esophageal reflux disease develops when reflux of gastric contents causes troublesome symptoms or complications. This shifted diagnosis from physician-driven to patient-centered, based on symptoms affecting quality of life (work, home, leisure).

- id: card-10
  front: "What is the 2018 Lyon Consensus view on GERD diagnosis?"
  back: |
    History, structured questionnaires, and response to treatment are insufficient for conclusive GERD diagnosis. Symptoms warrant further investigation to confirm objective evidence of acid reflux or identify other diagnoses, though this is not always pragmatic in general practice.

- id: card-11
  front: "What is the diagnostic approach in general practice for suspected GERD?"
  back: |
    In young patients with classical reflux symptoms and no alarm symptoms, empiric trial of acid suppression with PPI (e.g., omeprazole) is used. Symptoms should improve within 8-12 weeks of treatment.

- id: card-12
  front: "What is the proper timing for taking a proton pump inhibitor?"
  back: |
    PPIs should be taken 30-60 minutes before the first meal of the day to switch off the proton pumps before they become active, rather than immediately before eating.

- id: card-13
  front: "What are alarm symptoms requiring investigation in GERD?"
  back: |
    Dysphagia, unintentional weight loss, occult or overt GI bleeding/anemia, symptoms for more than 5 years, and age >45 years. These patients should be referred for upper GI scope to rule out Barrett esophagus, strictures, or malignancy.

- id: card-14
  front: "What is the sensitivity and specificity of endoscopic erosions for GERD?"
  back: |
    Erosions are highly specific (~95%) for GERD, but have poor sensitivity (~60% for untreated disease). Normal appearance does not exclude significant gastro-esophageal reflux.

- id: card-15
  front: "What is esophageal pH monitoring?"
  back: |
    A pH probe is placed in the lower esophagus for 24-hour monitoring. It records pH readings and patient-triggered events. Acid exposure time >6% indicates GERD, <4% does not indicate reflux. 4-6% is equivocal and may need impedance monitoring.

- id: card-16
  front: "What is the gold standard investigation for confirming GERD?"
  back: |
    Esophageal pH studies (24-hour ambulatory pH monitoring) are regarded as the gold standard for objectively confirming gastro-esophageal reflux and relating symptoms to reflux events.

- id: card-17
  front: "What is esophageal manometry?"
  back: |
    Measures esophageal contraction and lower esophageal sphincter function. Useful to exclude achalasia (failure of lower esophageal relaxation), assess esophageal motility, and evaluate candidates for anti-reflux surgery.

- id: card-18
  front: "What are radiological findings in GERD evaluation?"
  back: |
    Water-soluble contrast studies are inexpensive and can identify esophageal strictures or hiatal hernias. Primarily used in dysphagia evaluation. Less commonly ordered in straightforward GERD unless assessing for strictures before endoscopy.

- id: card-19
  front: "When should cardiac causes be excluded in reflux chest pain?"
  back: |
    Always rule out coronary artery disease and myocardial infarction before attributing chest pain to GERD. Both reflux disease and cardiac disease are prevalent. Perform ECG before proceeding with esophageal investigations.

- id: card-20
  front: "What are complications of GERD?"
  back: |
    Hemorrhage and perforation are exceedingly rare with modern early treatment. Strictures (benign peptic strictures) still occur. Pre-neoplastic change to Barrett esophagus increases risk for adenocarcinoma, especially in aging populations.

- id: card-21
  front: "What is the pathological process of Barrett esophagus?"
  back: |
    Intestinal metaplasia: normal squamous epithelium changes to columnar epithelium. Can progress to dysplasia (low-grade or high-grade). Dysplasia can eventually develop into adenocarcinoma if left untreated.

- id: card-22
  front: "How can adenocarcinoma development be prevented in Barrett esophagus?"
  back: |
    Endoscopic ablation (heat therapy) or mucosal resection can remove dysplastic tissue, preventing progression to adenocarcinoma. Early intervention avoids need for surgery, chemotherapy, and associated morbidity/mortality.

