    fields:
      Front: "What are Kempe's and Faller's definitions of child sexual abuse?"
      Back: "Kempe: Involvement of a child in sexual activity without consent, without understanding, contrary to norms of society. Faller: Sexual activity involving a child in which there is a power imbalance."
