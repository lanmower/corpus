    deck: "Corpus::Paediatrics::2021 AIRWAY AND BREATHING"
    fields:
      Front: "What is the first step in managing a choking child?"
      Back: "Determine if the child is actually choking. If choking is likely, assess the effectiveness of the child's cough."
    tags: ["choking-child", "airway-obstruction", "emergency-management", "subject:paediatrics"]
  - guid: "l8m9n0o1p2q3r4s5"
    noteType: Basic
    deck: "Corpus::Paediatrics::2021 AIRWAY AND BREATHING"
    fields:
      Front: "What are the key assessment components for a choking child?"
      Back: "1. Assess effectiveness of cough (effective vs ineffective)\n2. Assess consciousness (conscious vs unconscious)\n3. This determines the approach to choking management"
    tags: ["choking-child", "assessment", "emergency-management", "subject:paediatrics"]
  - guid: "m9n0o1p2q3r4s5t6"
    noteType: Basic
    deck: "Corpus::Paediatrics::2021 AIRWAY AND BREATHING"
    fields:
      Front: "What is the danger of a child with history of foreign body aspiration showing increasing respiratory distress?"
      Back: "A child with history of aspiration of foreign body who shows increasing respiratory distress is in immediate danger of completely obstructing the airway. Attempts to remove the foreign body must be made instantly, but attempts should not push the object further in."
    tags: ["foreign-body-aspiration", "respiratory-distress", "emergency", "subject:paediatrics"]
  - guid: "n0o1p2q3r4s5t6u7"
    noteType: Basic
    deck: "Corpus::Paediatrics::2021 AIRWAY AND BREATHING"
    fields:
      Front: "Why is spontaneous cough more effective than external maneuvers in relieving choking obstruction?"
      Back: "Spontaneous cough is more effective at relieving an obstruction than an externally imposed maneuver because the child's own muscle action is more effective. Therefore, encourage effective coughing and do not interrupt it with unnecessary interventions."
    tags: ["choking-child", "cough-effectiveness", "management-principles", "subject:paediatrics"]
  - guid: "o1p2q3r4s5t6u7v8"
    noteType: Basic
    deck: "Corpus::Paediatrics::2021 AIRWAY AND BREATHING"
    fields:
      Front: "What defines an effective cough in a choking child?"
      Back: "An effective cough is recognized by: Child's ability to speak, ability to cry, ability to take breaths between coughs. If child can speak, cry, and breathe between coughs, the cough is effective and no intervention should be made. Assess child continuously."
    tags: ["choking-child", "cough-assessment", "management-principles", "subject:paediatrics"]
  - guid: "p2q3r4s5t6u7v8w9"
    noteType: Basic
    deck: "Corpus::Paediatrics::2021 AIRWAY AND BREATHING"
    fields:
      Front: "When should intervention NOT be made in a choking child with effective cough?"
      Back: "No intervention should be made unless the cough becomes ineffective. Signs that cough is becoming ineffective: Cough becomes quieter and silent, child cannot cry, child cannot speak, child cannot take a breath, child becomes cyanosed, child starts to lose consciousness. Only then call for help and start intervention maneuvers."
    tags: ["choking-child", "cough-effectiveness", "when-to-intervene", "subject:paediatrics"]
  - guid: "q3r4s5t6u7v8w9x0"
    noteType: Basic
    deck: "Corpus::Paediatrics::2021 AIRWAY AND BREATHING"
    fields:
      Front: "What is the management approach for choking child with ineffective cough?"
      Back: "Cough is ineffective - action and intervention maneuvers are required immediately. Treatment depends on age of child. Specific maneuvers differ for infants vs older children (back blows, chest thrusts, abdominal thrusts/Heimlich)."
    tags: ["choking-child", "ineffective-cough", "intervention-maneuvers", "subject:paediatrics"]
  - guid: "r4s5t6u7v8w9x0y1"
    noteType: Basic
    deck: "Corpus::Paediatrics::2021 AIRWAY AND BREATHING"
    fields:
      Front: "What should be done if a choking child becomes unconscious during choking maneuvers?"
      Back: "If at any time the child becomes unconscious or stops breathing during choking maneuvers, discontinue the choking maneuvers immediately and commence ventilation with high-flow oxygen using bag and mask, plus perform cardiac compressions if no signs of circulation are present."
    tags: ["choking-child", "unconscious-child", "resuscitation", "subject:paediatrics"]
  - guid: "s5t6u7v8w9x0y1z2"
    noteType: Basic
    deck: "Corpus::Paediatrics::2021 AIRWAY AND BREATHING"
    fields:
      Front: "What is the 2-finger chest compression technique for choking infant?"
      Back: "2-finger compression location: 1 finger breadth above the xiphisternum. Compression depth: 1/3 of chest diameter. Hard enough to cause a compression wave in the airway. Position: head down. Sequence: perform 5 compressions, then repeat. This forces air out of the lungs to dislodge the foreign body."
    tags: ["infant-choking", "chest-thrust", "compression-technique", "subject:paediatrics"]
  - guid: "t6u7v8w9x0y1z2a3"
    noteType: Basic
    deck: "Corpus::Paediatrics::2021 AIRWAY AND BREATHING"
    fields:
      Front: "What is the back blow technique for older children with choking?"
      Back: "Back blow - performed in a bigger child to dislodge foreign body. Uses back blows directed at the back to force the diaphragm and create pressure to expel the object from the airway. Sequence: perform 5 back blows, then reassess."
    tags: ["choking-child", "back-blow", "intervention-maneuver", "subject:paediatrics"]
  - guid: "u7v8w9x0y1z2a3b4"
    noteType: Basic
    deck: "Corpus::Paediatrics::2021 AIRWAY AND BREATHING"
    fields:
      Front: "What is the abdominal thrust (Heimlich maneuver) technique for choking child?"
      Back: "Abdominal thrust (Heimlich maneuver) - pulls fist up and back to force the diaphragm up and cause a compression wave to expel the foreign body from airway. Direction of pull is upward into the abdomen. Sequence: perform 5 thrusts, then reassess. Used in older children."
    tags: ["choking-child", "heimlich-maneuver", "abdominal-thrust", "subject:paediatrics"]
