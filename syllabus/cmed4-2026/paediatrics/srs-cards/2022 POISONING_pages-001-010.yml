  - guid: o1l4p8q5n0m6t2u9
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 POISONING"
    fields:
      Front: "What are the four main primary prevention strategies for poisoning?"
      Back: |
        Primary prevention strategies are: (1) removing poisoning agent from environment, (2) replacing poisonous agent with lower toxicity alternative (e.g., paracetamol versus aspirin), (3) legislation for child-resistant packaging, and (4) reducing toxicity by packaging in non-lethal concentrations or doses.
    tags: ["prevention", "primary", "poisoning", "subject:paediatrics"]

