    deck: "Corpus::Paediatrics::DEHYDRATION"
    fields:
      Front: "What is Plan A for oral rehydration in severe dehydration?"
      Back: "Attempt Oral Rehydration with ORS 5 ml/kg via nasogastric tube OR ORAL every 15 minutes for 2 hours and reassess. If improving, continue for another 2 hours. If child vomits everything and shows no improvement after 2 hours, proceed to Plan B (IV fluids)."
    tags: ["dehydration", "fluids", "oral-rehydration", "dosing", "subject:paediatrics"]
  - guid: n4o5p6q7r8s9t0u1
    noteType: Basic
    deck: "Corpus::Paediatrics::DEHYDRATION"
    fields:
      Front: "What is Plan B for IV fluid therapy when oral rehydration fails?"
      Back: "Give IV dextrose-dextrose 10 ml/kg for 4 hours and reassess every 1-2 hours. Once dehydration has resolved, progressively slow down the IV rate while continuing to give oral fluids. Begin oral ORS as soon as the child is able to drink at 5 ml/kg/hr."
    tags: ["dehydration", "fluids", "iv-therapy", "dosing", "subject:paediatrics"]
  - guid: o5p6q7r8s9t0u1v2
    noteType: Basic
    deck: "Corpus::Paediatrics::DEHYDRATION"
    fields:
      Front: "What is the maintenance phase after rehydration in severe dehydration?"
      Back: "Once fully hydrated and on low IV rate, proceed to preventative ORS at 10 ml/kg after each stool and observe for 6 hours to ensure hydration is maintained. Can transition to maintenance fluids by oral route if possible, or IV if not tolerated."
    tags: ["dehydration", "fluids", "maintenance", "dosing", "subject:paediatrics"]
  - guid: p6q7r8s9t0u1v2w3
    noteType: Basic
    deck: "Corpus::Paediatrics::DEHYDRATION"
    fields:
      Front: "What alternative IV access methods exist when peripheral IV line cannot be established?"
      Back: "If unable to get peripheral IV access: (1) Intraosseous (IO) fluids: DD 10 ml/kg/hr x 4 hours, (2) Nasogastric fluids: ORS 20 ml/kg/hr x 6 hours (best given as continuous infusion or as 5 ml/kg every 15 minutes, NOT as 20 ml/kg bolus every hour)"
    tags: ["dehydration", "access", "fluids", "dosing", "subject:paediatrics"]
  - guid: q7r8s9t0u1v2w3x4
    noteType: Basic
    deck: "Corpus::Paediatrics::DEHYDRATION"
    fields:
      Front: "What is the difference between Standard and Rapid Rehydration in severe dehydration without malnutrition?"
      Back: "Standard Rehydration: 10 ml/kg/hr IV over 4 hours (replaces large fluid loss fairly rapidly). Rapid Rehydration without severe malnutrition: 20 ml/kg/hr DD IV over 4 hours. With severe malnutrition: use 10 ml/kg/hr over 8 hours (slower, safer rate)."
    tags: ["dehydration", "fluids", "rates", "dosing", "subject:paediatrics"]
  - guid: r8s9t0u1v2w3x4y5
    noteType: Basic
    deck: "Corpus::Paediatrics::DEHYDRATION"
    fields:
      Front: "What are the initial management steps for shock in severe dehydration?"
      Back: "Stop bleeding (if applicable), give oxygen, keep warm, obtain IV or IO access (take blood and DEFG cultures), fix cannula and immobilize extremity if applicable, consider antibiotics for suspected sepsis, then proceed to fluid bolus therapy."
    tags: ["dehydration", "shock", "management", "subject:paediatrics"]
  - guid: s9t0u1v2w3x4y5z6
    noteType: Basic
    deck: "Corpus::Paediatrics::DEHYDRATION"
    fields:
      Front: "What happens if a child with severe dehydration is not getting better after initial management?"
      Back: "Reassess for shock and treat if required. Consider giving fluid faster. Seek senior advice. Consider antibiotics if sepsis suspected. Check glucose level. Assess and treat severe malnutrition if present."
    tags: ["dehydration", "management", "reassessment", "subject:paediatrics"]
