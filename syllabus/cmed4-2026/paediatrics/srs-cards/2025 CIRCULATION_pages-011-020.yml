    fields:
      Front: "What is the indication for considering antibiotics in a shocked child?"
      Back: "Suspected sepsis (septic shock)"
    tags: ["antibiotics", "septic-shock", "infection-management", "subject:paediatrics"]
  - guid: j6p1q8r3s9t2u5v7
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 CIRCULATION"
    fields:
      Front: "What specific antibiotic is recommended for septic shock?"
      Back: "Ceftriaxone"
    tags: ["ceftriaxone", "septic-shock-antibiotic", "subject:paediatrics"]
  - guid: k4r7s2t6u1v8w3x5
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 CIRCULATION"
    fields:
      Front: "What blood product is indicated if haemoglobin is below what level in a shocked child?"
      Back: "Transfuse if Hb <5 g/dL (transfuse fresh blood - TF)"
    tags: ["transfusion", "haemoglobin-threshold", "blood-products", "subject:paediatrics"]
  - guid: l9s3t8u4v2w6x1y7
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 CIRCULATION"
    fields:
      Front: "What should be done if a shocked child develops signs of heart failure during bolus administration?"
      Back: "Stop bolus administration immediately. Give ½ DD @ 4 ml/hr. Seek help. Give glucose and antibiotics. Consider intubation, ventilation and inotropes"
    tags: ["heart-failure", "fluid-overload", "shock-complication", "subject:paediatrics"]
  - guid: m2u9v5w1x7y3z6a4
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 CIRCULATION"
    fields:
      Front: "What are the clinical signs of heart failure in a fluid-resuscitated child?"
      Back: "Increasing pulse rate, tachypnoea, enlarged liver (hepatomegaly), gallop rhythm, crepitations at base of lungs"
    tags: ["heart-failure-signs", "fluid-overload", "ccf-signs", "subject:paediatrics"]
  - guid: n7w2x9y4z1a5b2c8
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 CIRCULATION"
    fields:
      Front: "How often should a shocked child be reassessed during and after fluid therapy?"
      Back: "Reassess often and do not leave child unattended. Frequent reassessment is critical"
    tags: ["reassessment-frequency", "monitoring", "subject:paediatrics"]
  - guid: o5x1y6z2a8b3c7d4
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 CIRCULATION"
    fields:
      Front: "What parameters should be monitored during IV fluid administration in a shocked child?"
      Back: "1. Pulse rate\n2. Respiratory rate\n3. Signs of CCF (congestive cardiac failure)\n4. Consciousness level"
    tags: ["fluid-monitoring", "vital-signs", "subject:paediatrics"]
  - guid: p3y8z4a2b6c1d9e5
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 CIRCULATION"
    fields:
      Front: "Who is at higher risk for fluid overload complications during shock treatment?"
      Back: "Malnourished children (particularly those with severe acute malnutrition)"
    tags: ["malnutrition-risk", "fluid-overload", "subject:paediatrics"]
  - guid: q8z3a7b1c5d2e6f9
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 CIRCULATION"
    fields:
      Front: "What are the complications of rapid intravenous fluid administration?"
      Back: "1. Fluid overload (especially in malnourished)\n2. Pulmonary oedema (crepitations at lung bases)\n3. Hepatomegaly\n4. Heart failure"
    tags: ["iv-complications", "fluid-overload", "subject:paediatrics"]
