notes:
  - guid: f91f01fe940b70c5
    noteType: Basic
    deck: "Corpus::Cardiology::Coronary Artery Disease (CAD)"
    fields:
      Front: "What does ST segment depression of more than 1mm indicate, especially if horizontal?"
      Back: "Highly suggestive of underlying coronary obstruction."
    tags: ["ECG", "ST-depression", "CAD-diagnosis", "subject:cardiology"]
  - guid: b94daa8c7d7df559
    noteType: Basic
    deck: "Corpus::Cardiology::Coronary Artery Disease (CAD)"
    fields:
      Front: "What is the significance of ST elevation myocardial infarction (STEMI)?"
      Back: "A medical emergency where myocytes are under threat and begin to die after 5 minutes without blood supply and oxygen delivery."
    tags: ["STEMI", "myocardial-infarction", "emergency", "subject:cardiology"]
  - guid: 1e41f7811f9f5e8f
    noteType: Basic
    deck: "Corpus::Cardiology::Coronary Artery Disease (CAD)"
    fields:
      Front: "What are the diagnostic criteria for ST elevation in limb leads vs chest leads for STEMI?"
      Back: "Limb leads (I, II, III, aVR, aVL, aVF): require at least 1mm elevation. Chest leads (precordial): require at least 2mm elevation."
    tags: ["STEMI", "ECG-criteria", "diagnostic", "subject:cardiology"]
  - guid: f4ff2541f6cb5171
    noteType: Basic
    deck: "Corpus::Cardiology::Coronary Artery Disease (CAD)"
    fields:
      Front: "What does 'tombstone' pattern represent on ECG?"
      Back: "A pattern of convex ST elevation (often 5-15mm) seen in anterior STEMI, named for its appearance."
    tags: ["ECG", "STEMI", "anterior-infarction", "subject:cardiology"]
  - guid: bcb421a820439fb4
    noteType: Basic
    deck: "Corpus::Cardiology::Coronary Artery Disease (CAD)"
    fields:
      Front: "What is reciprocal ST depression in the context of myocardial infarction?"
      Back: "ST depression in leads opposite to those showing ST elevation; occurs when infarction affects one region and helps confirm the diagnosis."
    tags: ["ECG", "myocardial-infarction", "reciprocal-changes", "subject:cardiology"]
  - guid: 075e4cd23a42afd9
    noteType: Basic
    deck: "Corpus::Cardiology::Coronary Artery Disease (CAD)"
    fields:
      Front: "When is exercise stress testing contraindicated?"
      Back: "In very high-risk patients (with typical anginal symptoms and multiple risk factors) and very low-risk patients (young individuals with no risk factors), as it may provoke ischemic events or is unhelpful."
    tags: ["exercise-stress-test", "contraindications", "risk-assessment", "subject:cardiology"]
  - guid: 7affcb1d2ef08f96
    noteType: Basic
    deck: "Corpus::Cardiology::Coronary Artery Disease (CAD)"
    fields:
      Front: "What is the Brusport protocol for exercise stress testing?"
      Back: "Standard protocol where the treadmill increases speed and incline every 3 minutes; has 7 stages, with most individuals expected to complete at least stages 1 and 2 (6 minutes of exercise)."
    tags: ["exercise-stress-test", "protocol", "methodology", "subject:cardiology"]
  - guid: 4dad4adb8b02b138
    noteType: Basic
    deck: "Corpus::Cardiology::Coronary Artery Disease (CAD)"
    fields:
      Front: "What ECG changes during exercise stress testing warrant immediate cessation?"
      Back: "ST elevation (ominous), ST depression greater than 1.5-2mm, or inability to increase heart rate adequately."
    tags: ["exercise-stress-test", "ECG-changes", "stopping-criteria", "subject:cardiology"]
  - guid: 1aad2c4136812137
    noteType: Basic
    deck: "Corpus::Cardiology::Coronary Artery Disease (CAD)"
    fields:
      Front: "What are the two main classes of antiplatelet drugs used in coronary artery disease?"
      Back: "Aspirin and ADP receptor antagonists (P2Y12 inhibitors) such as clopidogrel."
    tags: ["pharmacotherapy", "antiplatelet-drugs", "coronary-artery-disease", "subject:cardiology"]
  - guid: c6f5f0c56e5321ed
    noteType: Basic
    deck: "Corpus::Cardiology::Coronary Artery Disease (CAD)"
    fields:
      Front: "Name the main classes of lipid-lowering agents used in CAD management, in order of escalation."
      Back: "Statins (first line), azetamide (if statin targets not reached), and PCSK9 inhibitors (if further reduction needed)."
    tags: ["pharmacotherapy", "lipid-lowering", "statins", "subject:cardiology"]
  - guid: 612d0bf693c703a1
    noteType: Basic
    deck: "Corpus::Cardiology::Coronary Artery Disease (CAD)"
    fields:
      Front: "When are beta-blockers particularly beneficial in coronary artery disease?"
      Back: "In patients with prior myocardial infarction and LV dysfunction (ejection fraction <40%), and in those with high heart rates or angina, as they reduce myocardial oxygen demand."
    tags: ["pharmacotherapy", "beta-blockers", "mechanism", "subject:cardiology"]
  - guid: 14e3c16e283abb7a
    noteType: Basic
    deck: "Corpus::Cardiology::Coronary Artery Disease (CAD)"
    fields:
      Front: "What are contemporary disease-modifying therapies in coronary artery disease beyond statins?"
      Back: "PCSK9 inhibitors, bempedoic acid, inclisiran (SGLT2 inhibitors and GLP-1 agonists for diabetic patients), inflammatory modulators (e.g., Ziltivekumab, Canakinumab), and renin-angiotensin-aldosterone inhibitors."
    tags: ["pharmacotherapy", "novel-agents", "disease-modification", "subject:cardiology"]
  - guid: 22776be5fcd736b7
    noteType: Basic
    deck: "Corpus::Cardiology::Coronary Artery Disease (CAD)"
    fields:
      Front: "What is the target resting heart rate for patients on beta-blockers with stable angina?"
      Back: "Below 60 bpm, ideally in the 50s."
    tags: ["beta-blockers", "therapeutic-target", "stable-angina", "subject:cardiology"]
  - guid: 5943410300bf1576
    noteType: Basic
    deck: "Corpus::Cardiology::Coronary Artery Disease (CAD)"
    fields:
      Front: "What non-dihydropyridine calcium antagonists are used when beta-blockers are contraindicated?"
      Back: "Diltiazem and verapamil, as they also reduce heart rate, blood pressure, and force of LV contractility."
    tags: ["pharmacotherapy", "calcium-antagonists", "alternative-therapy", "subject:cardiology"]
  - guid: c8e5e5aeda8ea418
    noteType: Basic
    deck: "Corpus::Cardiology::Coronary Artery Disease (CAD)"
    fields:
      Front: "What hemoglobin level should be maintained to ensure adequate myocardial oxygen delivery?"
      Back: "Hemoglobin should be kept above 8 g/dL; anemia compromises oxygen delivery to cardiac myocytes."
    tags: ["management", "anemia", "oxygen-delivery", "subject:cardiology"]
  - guid: fbaefbae35a4321f
    noteType: Basic
    deck: "Corpus::Cardiology::Coronary Artery Disease (CAD)"
    fields:
      Front: "What oxygen saturation target is recommended for patients with coronary artery disease?"
      Back: "Above 95%; supplemental oxygen should be given if saturation is lower."
    tags: ["oxygen-therapy", "saturation-target", "management", "subject:cardiology"]
  - guid: d35a097e4f1b4b8c
    noteType: Basic
    deck: "Corpus::Cardiology::Coronary Artery Disease (CAD)"
    fields:
      Front: "What are the key lifestyle modifications recommended for stable angina?"
      Back: "Stop smoking, blood pressure <130/80 (ideally), LDL <1 mmol/L, HbA1c <7%, BMI <25, endurance training 30 min 5x/week, and resistance training for muscle maintenance."
    tags: ["lifestyle-modification", "risk-factor-management", "stable-angina", "subject:cardiology"]
  - guid: 56bfd5246abeb19a
    noteType: Basic
    deck: "Corpus::Cardiology::Coronary Artery Disease (CAD)"
    fields:
      Front: "When should coronary angiography be performed in stable angina despite medical treatment?"
      Back: "When patients remain severely symptomatic (class III-IV angina) despite medical therapy, or when stress testing shows high-risk features (early ST changes before stage 2, drop in BP, marked ST depression), or if there is LV dysfunction."
    tags: ["coronary-angiography", "indications", "stable-angina", "subject:cardiology"]
  - guid: 6dcfa6ab9484d026
    noteType: Basic
    deck: "Corpus::Cardiology::Coronary Artery Disease (CAD)"
    fields:
      Front: "What is the definition of LV dysfunction in the context of angina management?"
      Back: "Ejection fraction below 40% is clearly LV dysfunction; EF >50-60% is considered normal."
    tags: ["LV-function", "ejection-fraction", "dysfunction", "subject:cardiology"]
  - guid: ef643b8ac0fb1c15
    noteType: Basic
    deck: "Corpus::Cardiology::Coronary Artery Disease (CAD)"
    fields:
      Front: "What are the two main revascularization strategies for CAD?"
      Back: "Percutaneous coronary intervention (angioplasty with or without stenting) or coronary artery bypass surgery in those unsuitable for PCI."
    tags: ["revascularization", "PCI", "CABG", "subject:cardiology"]
  - guid: 798b8478f07457f3
    noteType: Basic
    deck: "Corpus::Cardiology::Coronary Artery Disease (CAD)"
    fields:
      Front: "What is the difference between STEMI and non-STEMI acute coronary syndrome?"
      Back: "STEMI involves total vessel occlusion by thrombus (medical emergency), while non-STEMI has partial patency with blood still able to flow (urgent but not emergent)."
    tags: ["acute-coronary-syndrome", "STEMI", "non-STEMI", "subject:cardiology"]
  - guid: 328db3cf59dc3666
    noteType: Basic
    deck: "Corpus::Cardiology::Coronary Artery Disease (CAD)"
    fields:
      Front: "What is the critical 'total ischemic time' target for STEMI management?"
      Back: "Less than 3 hours from symptom onset to vessel opening; this is when maximum myocyte salvage occurs and lives are saved."
    tags: ["STEMI", "reperfusion", "time-critical", "subject:cardiology"]
  - guid: 565532e25bb7feea
    noteType: Basic
    deck: "Corpus::Cardiology::Coronary Artery Disease (CAD)"
    fields:
      Front: "How is the onset time for STEMI determined when pain is intermittent?"
      Back: "STEMI timing begins from the onset of the pain that is most severe and ongoing, persisting beyond 30 minutes; stuttering pain is timed from the continuous phase."
    tags: ["STEMI", "diagnosis", "symptom-timing", "subject:cardiology"]
  - guid: 4ca028ce0588a76a
    noteType: Basic
    deck: "Corpus::Cardiology::Coronary Artery Disease (CAD)"
    fields:
      Front: "What are the two essential diagnostic criteria for STEMI in the acute setting?"
      Back: "Typical ischemic chest pain ongoing for more than 30 minutes AND ST elevation on ECG (≥1mm in limb leads or ≥2mm in chest leads)."
    tags: ["STEMI", "diagnosis", "diagnostic-criteria", "subject:cardiology"]
  - guid: f3cfffef33846a67
    noteType: Basic
    deck: "Corpus::Cardiology::Coronary Artery Disease (CAD)"
    fields:
      Front: "When should troponin be awaited before diagnosing STEMI?"
      Back: "Never; do not wait for troponin results in STEMI as it may take hours or days. Diagnosis is based solely on symptoms and ECG changes to enable rapid reperfusion."
    tags: ["STEMI", "troponin", "diagnostic-approach", "subject:cardiology"]
  - guid: bb85d12b68c5061f
    noteType: Basic
    deck: "Corpus::Cardiology::Coronary Artery Disease (CAD)"
    fields:
      Front: "What should be done if ECG shows ST elevation is not clear when a patient presents early with chest pain?"
      Back: "Repeat the ECG every 10 minutes until clear ST elevation is demonstrated, then act immediately; this maximizes diagnostic accuracy while maintaining urgency."
    tags: ["STEMI", "ECG-interpretation", "early-presentation", "subject:cardiology"]
  - guid: 426c23fa232e9a4b
    noteType: Basic
    deck: "Corpus::Cardiology::Coronary Artery Disease (CAD)"
    fields:
      Front: "What is the gold standard for reperfusion in STEMI?"
      Back: "Primary percutaneous coronary intervention (angioplasty with stenting), which achieves 95% success rate in skilled hands."
    tags: ["STEMI", "reperfusion", "angioplasty", "subject:cardiology"]
  - guid: d9bbe7a369e29ad3
    noteType: Basic
    deck: "Corpus::Cardiology::Coronary Artery Disease (CAD)"
    fields:
      Front: "What is fibrinolysis and what is its time window in STEMI?"
      Back: "Fibrinolysis is thrombolytic therapy given when PCI is not timeously available; it can be given up to 12 hours from symptom onset, ideally within 3 hours."
    tags: ["STEMI", "fibrinolysis", "thrombolytic-therapy", "subject:cardiology"]
  - guid: c94ade90054f1af5
    noteType: Basic
    deck: "Corpus::Cardiology::Coronary Artery Disease (CAD)"
    fields:
      Front: "Name the three types of fibrinolytic agents used in STEMI."
      Back: "Streptokinase (cheapest, infused over 1 hour), alteplase (more potent than streptokinase), and tenectoplase (best fibrinolytic agent with superior properties)."
    tags: ["STEMI", "fibrinolysis", "thrombolytic-agents", "subject:cardiology"]
