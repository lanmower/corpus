    noteType: "Basic"
    deck: "Corpus::Paediatrics::Emergency care - the seriously ill child"
    fields:
      Front: "What age is considered a 'tiny baby' in triage?"
      Back: "Less than 3 months of age"
    tags: ["priority-signs", "tiny-baby", "age-cutoff", "subject:paediatrics"]

  - guid: "z6e1a4b9f3c7d2g5"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::Emergency care - the seriously ill child"
    fields:
      Front: "What is the temperature cutoff for 'Temperature' as a priority sign?"
      Back: "Temperature >38 degrees Celsius (hot to touch)"
    tags: ["priority-signs", "temperature", "vital-signs", "subject:paediatrics"]

  - guid: "a8f5c3d1b7g9a2h4"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::Emergency care - the seriously ill child"
    fields:
      Front: "How do you assess for severe pallor as a priority sign?"
      Back: "Compare the child's palm with the mother's palm. Severe pallor indicates severe anaemia."
    tags: ["priority-signs", "pallor", "anaemia", "subject:paediatrics"]

  - guid: "b3h7g1f5e4c9d6a2"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::Emergency care - the seriously ill child"
    fields:
      Front: "What is the assessment method for malnutrition as a priority sign?"
      Back: "Look rapidly at arms, legs, and chest for severe wasting (Marasmus)"
    tags: ["priority-signs", "malnutrition", "wasting", "subject:paediatrics"]

  - guid: "c5d2a8f3b1g7e9c4"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::Emergency care - the seriously ill child"
    fields:
      Front: "What is the clinical sign of oedema as a priority sign?"
      Back: "Oedema of BOTH feet, with or without hair and skin changes (suggesting Kwashiorkor). May indicate heart failure, kidney problems, or liver problems."
    tags: ["priority-signs", "oedema", "kwashiorkor", "subject:paediatrics"]

  - guid: "d7a4c6b2f9g5h1e3"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::Emergency care - the seriously ill child"
    fields:
      Front: "What are the three 'R' priority signs and their assessment?"
      Back: "1. Respiratory (NOT severe) - judgment/experience\n2. Restless - lethargy or irritability; 'V' on AVPU; continuously irritable, crying, inconsolable\n3. Referral - urgent referral"
    tags: ["priority-signs", "3r", "assessment", "subject:paediatrics"]

  - guid: "e9c1f4d8a3b6g2h5"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::Emergency care - the seriously ill child"
    fields:
      Front: "What does 'E' stand for in the EPQ triage action system?"
      Back: "E = Emergency. Take the child to the emergency treatment area."
    tags: ["triage-action", "emergency", "treatment", "subject:paediatrics"]

  - guid: "f2e6g3h9a5c1b7d4"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::Emergency care - the seriously ill child"
    fields:
      Front: "What does 'P' stand for in the EPQ triage action system?"
      Back: "P = Priority. Take the child to the front of the queue."
    tags: ["triage-action", "priority", "queue", "subject:paediatrics"]

  - guid: "g4h8a2d5c7f1b3e9"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::Emergency care - the seriously ill child"
    fields:
      Front: "What does 'Q' stand for in the EPQ triage action system?"
      Back: "Q = Queue. No emergency or priority signs present; non-urgent cases can wait their turn."
    tags: ["triage-action", "queue", "non-urgent", "subject:paediatrics"]

  - guid: "h6b3f7e1a9c2d5g4"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::Emergency care - the seriously ill child"
    fields:
      Front: "When should triage be performed and where?"
      Back: "Triage should be performed as soon as the child arrives, BEFORE reception/administration. Locations include: outpatients queue, emergency room, ward, or emergency treatment area (room/trolley with access to drugs and supplies)."
    tags: ["triage", "timing", "location", "subject:paediatrics"]

