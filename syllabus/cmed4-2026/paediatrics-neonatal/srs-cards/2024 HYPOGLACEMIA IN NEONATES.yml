deck: "Corpus::Paediatrics-Neonatal::2024 HYPOGLACEMIA IN NEONATES"
notes:
  - guid: "def-hypoglyc-neo1"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 HYPOGLACEMIA IN NEONATES"
    fields:
      Front: "What is the most widely used definition of neonatal hypoglycaemia?"
      Back: "Whole blood glucose concentration <2.6 mmol/ℓ"
    tags: ["definition", "hypoglycaemia", "subject:paediatrics-neonatal"]

  - guid: "def-severe-hypo2"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 HYPOGLACEMIA IN NEONATES"
    fields:
      Front: "Define severe neonatal hypoglycaemia."
      Back: "Whole blood glucose ≤1.7 mmol/ℓ OR any symptomatic baby with low blood glucose"
    tags: ["definition", "severe", "subject:paediatrics-neonatal"]

  - guid: "meas-bgm-lab3"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 HYPOGLACEMIA IN NEONATES"
    fields:
      Front: "What instruments measure whole blood glucose?"
      Back: "Blood glucometers with reagent strips and blood gas analyzers"
    tags: ["measurement", "diagnostics", "subject:paediatrics-neonatal"]

  - guid: "meas-confirm4"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 HYPOGLACEMIA IN NEONATES"
    fields:
      Front: "How should persistent hypoglycaemia be confirmed?"
      Back: "Confirm with a laboratory sample (serum glucose); however, abnormal whole blood readings must be acted on immediately without waiting"
    tags: ["measurement", "diagnostics", "subject:paediatrics-neonatal"]

  - guid: "meas-diff5"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 HYPOGLACEMIA IN NEONATES"
    fields:
      Front: "What is the typical difference between whole blood and serum glucose?"
      Back: "Whole blood glucose is usually 15% (0.5 mmol/ℓ) lower than serum glucose"
    tags: ["measurement", "physiology", "subject:paediatrics-neonatal"]

  - guid: "goal-manage6"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 HYPOGLACEMIA IN NEONATES"
    fields:
      Front: "List 5 goals of managing neonatal hypoglycaemia."
      Back: "1) Prevent/correct symptomatic hypoglycaemia in at-risk babies within first hour\n2) Avoid hypothermia\n3) Avoid unnecessary treatment of transitional low blood glucose\n4) Identify underlying hypoglycaemic disorder\n5) Prevent long-term neurologic sequelae"
    tags: ["management-principles", "subject:paediatrics-neonatal"]

  - guid: "screen-timing7"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 HYPOGLACEMIA IN NEONATES"
    fields:
      Front: "When should babies with hypoglycaemia risk factors have blood glucose screening?"
      Back: "During first 24 hours: after first feed, then before subsequent feeds or 6–8 hourly if not being fed"
    tags: ["screening", "monitoring", "subject:paediatrics-neonatal"]

  - guid: "risk-prematurity8"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 HYPOGLACEMIA IN NEONATES"
    fields:
      Front: "List major risk factors for neonatal hypoglycaemia."
      Back: "1) Prematurity\n2) Post-maturity\n3) Small/large for gestational age\n4) Intrauterine growth restriction\n5) Infants of diabetic mothers\n6) Perinatal stress (hypoxia, MAS, haemolytic disease, hypothermia, fluid restriction, polycythaemia)\n7) Family history of genetic hypoglycaemia\n8) Syndromes/midline brain abnormalities (e.g. Beckwith-Wiedemann, hypopituitarism)"
    tags: ["risk-factors", "subject:paediatrics-neonatal"]

  - guid: "risk-healthy9"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 HYPOGLACEMIA IN NEONATES"
    fields:
      Front: "Which healthy babies do NOT require blood glucose monitoring?"
      Back: "Term infants without risk factors who are breast feeding or formula feeding normally"
    tags: ["risk-factors", "screening", "subject:paediatrics-neonatal"]

  - guid: "symp-freq10"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 HYPOGLACEMIA IN NEONATES"
    fields:
      Front: "Are babies with hypoglycaemia usually symptomatic?"
      Back: "No; babies with hypoglycaemia are frequently asymptomatic and have non-specific signs when symptomatic"
    tags: ["clinical-features", "subject:paediatrics-neonatal"]

  - guid: "symp-list11"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 HYPOGLACEMIA IN NEONATES"
    fields:
      Front: "List clinical features of symptomatic neonatal hypoglycaemia."
      Back: "1) Jitteriness\n2) Sweating\n3) Tachypnoea\n4) Tachycardia\n5) Pallor\n6) Cyanosis\n7) Poor suck/feeding\n8) Weak or high-pitched cry/irritability\n9) Decreased level of consciousness\n10) Seizures\n11) Hypotonia\n12) Apnoeas"
    tags: ["clinical-features", "subject:paediatrics-neonatal"]

  - guid: "glucose-term12"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 HYPOGLACEMIA IN NEONATES"
    fields:
      Front: "What is the glucose requirement in term babies?"
      Back: "6–8 mg/kg/minute"
    tags: ["physiology", "glucose-requirement", "subject:paediatrics-neonatal"]

  - guid: "glucose-preterm13"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 HYPOGLACEMIA IN NEONATES"
    fields:
      Front: "What is the glucose requirement in preterm babies?"
      Back: "4–6 mg/kg/minute"
    tags: ["physiology", "glucose-requirement", "subject:paediatrics-neonatal"]

  - guid: "glucose-chronic14"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 HYPOGLACEMIA IN NEONATES"
    fields:
      Front: "Should symptomatic hypoglycaemia always be corrected?"
      Back: "Yes; persistent and prolonged hypoglycaemia is pathological and may cause brain injury"
    tags: ["management-principles", "subject:paediatrics-neonatal"]

  - guid: "glucose-transition15"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 HYPOGLACEMIA IN NEONATES"
    fields:
      Front: "Why is it important to differentiate transitional hypoglycaemia from pathological hypoglycaemia?"
      Back: "To avoid over-treatment; normal transitional response involves transient physiological drop in blood glucose after birth but resolves without intervention in most cases"
    tags: ["management-principles", "subject:paediatrics-neonatal"]

  - guid: "algo-asymp-range16"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 HYPOGLACEMIA IN NEONATES"
    fields:
      Front: "What is the blood glucose range for asymptomatic well babies managed with feeds and warmth?"
      Back: "1.8–2.5 mmol/ℓ"
    tags: ["algorithm", "management", "subject:paediatrics-neonatal"]

  - guid: "algo-asymp-step17"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 HYPOGLACEMIA IN NEONATES"
    fields:
      Front: "What is the first step in managing asymptomatic well babies (1.8–2.5 mmol/ℓ)?"
      Back: "1) Give milk feed immediately or start IV fluids if milk feeds contraindicated\n2) Keep baby warm - ensure normothermia\n3) Re-check blood glucose in 30 minutes"
    tags: ["algorithm", "management", "subject:paediatrics-neonatal"]

  - guid: "algo-asymp-recheck18"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 HYPOGLACEMIA IN NEONATES"
    fields:
      Front: "What action after 30-minute recheck if asymptomatic baby's glucose ≥2.6 mmol/ℓ?"
      Back: "Continue monitoring hourly for 3 hours, then 3-hourly for 24 hours"
    tags: ["algorithm", "monitoring", "subject:paediatrics-neonatal"]

  - guid: "algo-asymp-incr19"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 HYPOGLACEMIA IN NEONATES"
    fields:
      Front: "If asymptomatic baby's glucose is still <2.6 mmol/ℓ but increasing, what is the next step?"
      Back: "Re-check blood glucose in 30 minutes"
    tags: ["algorithm", "management", "subject:paediatrics-neonatal"]

  - guid: "algo-asymp-flat20"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 HYPOGLACEMIA IN NEONATES"
    fields:
      Front: "If asymptomatic baby's glucose is not increasing nor decreasing, what are the interventions?"
      Back: "1) Increase frequency of feeds to 2-hourly\n2) Increase daily volume of feeds by 20–30 ml/kg/day\n3) Re-check blood glucose in 30 minutes"
    tags: ["algorithm", "management", "subject:paediatrics-neonatal"]

  - guid: "algo-asymp-decr21"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 HYPOGLACEMIA IN NEONATES"
    fields:
      Front: "If asymptomatic baby's glucose is decreasing or still <2.6 mmol/ℓ, how is it managed?"
      Back: "Manage as per Severe Hypoglycaemia protocol"
    tags: ["algorithm", "management", "subject:paediatrics-neonatal"]

  - guid: "algo-severe-ng22"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 HYPOGLACEMIA IN NEONATES"
    fields:
      Front: "What is the blood glucose threshold for severe neonatal hypoglycaemia management protocol?"
      Back: "≤1.7 mmol/ℓ OR symptomatic"
    tags: ["algorithm", "management", "subject:paediatrics-neonatal"]

  - guid: "algo-severe-ng23"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 HYPOGLACEMIA IN NEONATES"
    fields:
      Front: "What is the first intervention for symptomatic/severe hypoglycaemia?"
      Back: "Give milk by nasogastric tube (if not fed within previous 2 hours) whilst preparing IV access, OR give 2–5 ml/kg 10% dextrose water IV as bolus"
    tags: ["algorithm", "management", "subject:paediatrics-neonatal"]

  - guid: "algo-severe-glu24"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 HYPOGLACEMIA IN NEONATES"
    fields:
      Front: "What is glucagon dosing and route for emergency severe hypoglycaemia if IV access delayed?"
      Back: "Glucagon: 0.2 mg/kg/dose IM; can repeat after 20 minutes; maximum dose 1 mg"
    tags: ["drug-treatment", "emergency", "subject:paediatrics-neonatal"]

  - guid: "algo-severe-uvc25"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 HYPOGLACEMIA IN NEONATES"
    fields:
      Front: "When should emergency umbilical venous catheter (UVC) be inserted?"
      Back: "If unable to establish peripheral IV access in severe/symptomatic hypoglycaemia"
    tags: ["procedure", "emergency", "subject:paediatrics-neonatal"]

  - guid: "algo-hydro26"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 HYPOGLACEMIA IN NEONATES"
    fields:
      Front: "What is hydrocortisone dosing for hypoglycaemia not responding to maximum IV glucose?"
      Back: "Hydrocortisone: 1–2 mg/kg/dose IV or PO 6-hourly"
    tags: ["drug-treatment", "management", "subject:paediatrics-neonatal"]

  - guid: "algo-iv-start27"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 HYPOGLACEMIA IN NEONATES"
    fields:
      Front: "What IV infusion is started once glucose >2.5 mmol/ℓ?"
      Back: "10% dextrose at 60–120 ml/kg/24 hours depending on gestational age and day of life; beware volumes >120 ml/kg/day on day 1"
    tags: ["iv-fluids", "management", "subject:paediatrics-neonatal"]

  - guid: "algo-persist28"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 HYPOGLACEMIA IN NEONATES"
    fields:
      Front: "If hypoglycaemia persists despite IV dextrose, what is the escalation?"
      Back: "Increase volume of IV infusion OR increase dextrose concentration sequentially to 12.5%, 15%, 20% if no improvement at each concentration"
    tags: ["iv-fluids", "escalation", "subject:paediatrics-neonatal"]

  - guid: "algo-high-conc29"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 HYPOGLACEMIA IN NEONATES"
    fields:
      Front: "How should glucose concentrations >12.5% be infused?"
      Back: "Via central line; emergency UVC can be used for short-term control during transfer until sterile UVC inserted at referral centre"
    tags: ["iv-fluids", "procedure", "subject:paediatrics-neonatal"]

  - guid: "algo-50pct30"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 HYPOGLACEMIA IN NEONATES"
    fields:
      Front: "Why must 50% glucose never be given IV or orally?"
      Back: "Due to its hypertonicity"
    tags: ["drug-safety", "management", "subject:paediatrics-neonatal"]

  - guid: "algo-recheck-freq31"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 HYPOGLACEMIA IN NEONATES"
    fields:
      Front: "What is the blood glucose recheck schedule after severe hypoglycaemia intervention?"
      Back: "Every 30 minutes after intervention until normal; then 2-hourly and/or before feeds until ≥2.6 mmol/ℓ for two consecutive readings"
    tags: ["monitoring", "management", "subject:paediatrics-neonatal"]

  - guid: "algo-feeds32"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 HYPOGLACEMIA IN NEONATES"
    fields:
      Front: "When should milk feeds be added in severe hypoglycaemia?"
      Back: "When glucose is normal and no clinical contraindications; gradually build up feeds while decreasing IV fluids provided blood glucose remains ≥2.6 mmol/ℓ"
    tags: ["nutrition", "management", "subject:paediatrics-neonatal"]

  - guid: "algo-dc-iv33"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 HYPOGLACEMIA IN NEONATES"
    fields:
      Front: "When should dextrose-containing IV fluids be discontinued?"
      Back: "Do not stop until feeds are well established"
    tags: ["iv-fluids", "management", "subject:paediatrics-neonatal"]

  - guid: "calc-dextrose34"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 HYPOGLACEMIA IN NEONATES"
    fields:
      Front: "What is the formula for dextrose delivery rate (mg/kg/minute)?"
      Back: "(ml/kg/24 hours) × (% dextrose) × 0.007"
    tags: ["calculation", "iv-fluids", "subject:paediatrics-neonatal"]

  - guid: "persist-define35"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 HYPOGLACEMIA IN NEONATES"
    fields:
      Front: "Define persistent neonatal hypoglycaemia."
      Back: "Persistently low blood glucose >48 hours of life OR requirement of parenteral glucose infusions >48 hours to treat hypoglycaemia"
    tags: ["definition", "management", "subject:paediatrics-neonatal"]

  - guid: "persist-action36"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 HYPOGLACEMIA IN NEONATES"
    fields:
      Front: "What should be done for all babies with persistent hypoglycaemia?"
      Back: "Discuss with referral centre for advice and admission if unable to be managed at place of birth"
    tags: ["management", "referral", "subject:paediatrics-neonatal"]

  - guid: "persist-sepsis37"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 HYPOGLACEMIA IN NEONATES"
    fields:
      Front: "What should be considered first in persistent hypoglycaemia workup?"
      Back: "Sepsis: take blood culture and start broad spectrum antibiotics appropriate for early or late onset sepsis"
    tags: ["workup", "sepsis", "subject:paediatrics-neonatal"]

  - guid: "persist-invst38"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 HYPOGLACEMIA IN NEONATES"
    fields:
      Front: "Who should guide further investigation in persistent hypoglycaemia?"
      Back: "Paediatrician, neonatologist, or paediatric endocrinologist"
    tags: ["workup", "referral", "subject:paediatrics-neonatal"]

  - guid: "persist-critical39"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 HYPOGLACEMIA IN NEONATES"
    fields:
      Front: "What is the critical sample for persistent hypoglycaemia and when is it drawn?"
      Back: "Blood drawn at time of hypoglycaemia for: serum glucose, insulin, and cortisol; always confirm hypoglycaemia with laboratory sample"
    tags: ["diagnostics", "workup", "subject:paediatrics-neonatal"]

  - guid: "hyins-common40"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 HYPOGLACEMIA IN NEONATES"
    fields:
      Front: "What is the commonest cause of persistent neonatal hypoglycaemia?"
      Back: "Hyperinsulinism (elevated insulin despite hypoglycaemia)"
    tags: ["aetiology", "hyperinsulinism", "subject:paediatrics-neonatal"]

  - guid: "hyins-assoc41"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 HYPOGLACEMIA IN NEONATES"
    fields:
      Front: "List associations with neonatal hyperinsulinism."
      Back: "1) Infants of diabetic mothers\n2) Intrauterine growth restriction\n3) Intrapartum stress"
    tags: ["aetiology", "hyperinsulinism", "subject:paediatrics-neonatal"]

  - guid: "hyins-course42"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 HYPOGLACEMIA IN NEONATES"
    fields:
      Front: "What is the typical course of hyperinsulinism in neonates?"
      Back: "Usually transient and typically resolves in first few weeks of life; persistent forms require specialist referral"
    tags: ["prognosis", "hyperinsulinism", "subject:paediatrics-neonatal"]

  - guid: "drug-hydro43"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 HYPOGLACEMIA IN NEONATES"
    fields:
      Front: "What is the drug and dosing for hypoglycaemia secondary to low cortisol?"
      Back: "Hydrocortisone: 1–2 mg/kg/dose IV or PO 6-hourly"
    tags: ["drug-treatment", "subject:paediatrics-neonatal"]

  - guid: "drug-diazox44"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 HYPOGLACEMIA IN NEONATES"
    fields:
      Front: "What is diazoxide dosing in hyperinsulinism?"
      Back: "Diazoxide: 2–6 mg/kg/day IV/PO 8-hourly"
    tags: ["drug-treatment", "hyperinsulinism", "subject:paediatrics-neonatal"]

  - guid: "drug-hctz45"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 HYPOGLACEMIA IN NEONATES"
    fields:
      Front: "What is hydrochlorothiazide dosing and role in hyperinsulinism?"
      Back: "Hydrochlorothiazide: 1–3 mg/kg/dose PO 6–12 hourly; potentiates the effect of diazoxide"
    tags: ["drug-treatment", "hyperinsulinism", "subject:paediatrics-neonatal"]

  - guid: "dc-criteria46"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 HYPOGLACEMIA IN NEONATES"
    fields:
      Front: "What are discharge criteria after neonatal hypoglycaemia?"
      Back: "Baby can maintain two normal pre-prandial blood glucose levels consecutively on full 8-hourly feeds"
    tags: ["discharge", "management", "subject:paediatrics-neonatal"]

  - guid: "fu-severe47"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 HYPOGLACEMIA IN NEONATES"
    fields:
      Front: "What neurodevelopmental follow-up is required after severe neonatal hypoglycaemia?"
      Back: "Follow-up at 20 weeks corrected gestational age; consider brain MRI for signs of brain injury; other follow-up dates depend on aetiology"
    tags: ["follow-up", "neurodevelopment", "subject:paediatrics-neonatal"]

  - guid: "def-hyper48"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 HYPOGLACEMIA IN NEONATES"
    fields:
      Front: "Define neonatal hyperglycaemia."
      Back: "Whole blood glucose >7.0 mmol/ℓ OR plasma (laboratory) glucose >8.3 mmol/ℓ"
    tags: ["definition", "hyperglycaemia", "subject:paediatrics-neonatal"]

  - guid: "hyper-freq49"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 HYPOGLACEMIA IN NEONATES"
    fields:
      Front: "Are hyperglycaemic levels in newborns always concerning?"
      Back: "No; elevated glucose frequently observed, especially in extreme preterm babies, and does not always require intervention"
    tags: ["hyperglycaemia", "management", "subject:paediatrics-neonatal"]

  - guid: "hyper-osmotic50"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 HYPOGLACEMIA IN NEONATES"
    fields:
      Front: "At what plasma glucose level can hyperglycaemia cause osmotic diuresis and polyuria?"
      Back: "When plasma glucose >11 mmol/ℓ"
    tags: ["hyperglycaemia", "physiology", "subject:paediatrics-neonatal"]

  - guid: "hyper-marker51"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 HYPOGLACEMIA IN NEONATES"
    fields:
      Front: "Is glycosuria a good marker for neonatal hyperglycaemia?"
      Back: "No; glycosuria is not a good marker for hyperglycaemia"
    tags: ["hyperglycaemia", "diagnostics", "subject:paediatrics-neonatal"]

  - guid: "hyper-monitor-freq52"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 HYPOGLACEMIA IN NEONATES"
    fields:
      Front: "How frequently should blood glucose be monitored in at-risk hyperglycaemic babies?"
      Back: "6–8 hourly in first 24–48 hours (and beyond or more frequently if abnormal)"
    tags: ["hyperglycaemia", "monitoring", "subject:paediatrics-neonatal"]

  - guid: "hyper-monitor-who53"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 HYPOGLACEMIA IN NEONATES"
    fields:
      Front: "Which babies require glucose monitoring for hyperglycaemia?"
      Back: "1) Babies receiving IV glucose infusions\n2) ELBW babies\n3) Septic babies\n4) Intubated babies\n5) Babies with intraventricular haemorrhages\n6) Babies receiving inotropes, steroids or insulin"
    tags: ["hyperglycaemia", "monitoring", "subject:paediatrics-neonatal"]

  - guid: "hyper-cause-iv54"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 HYPOGLACEMIA IN NEONATES"
    fields:
      Front: "List causes of neonatal hyperglycaemia."
      Back: "1) IV glucose administration\n2) ELBW/VLBW status\n3) Stress response (sepsis, illness, intubation, IVH, hypoxia)\n4) Drugs (corticosteroids, inotropes)\n5) Neonatal diabetes mellitus (rare)"
    tags: ["aetiology", "hyperglycaemia", "subject:paediatrics-neonatal"]

  - guid: "hyper-treat-thr55"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 HYPOGLACEMIA IN NEONATES"
    fields:
      Front: "What is the stepwise approach threshold for treating hyperglycaemia?"
      Back: "Stepwise approach in babies with hyperglycaemia >10 mmol/ℓ"
    tags: ["hyperglycaemia", "management", "subject:paediatrics-neonatal"]

  - guid: "hyper-treat-step56"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 HYPOGLACEMIA IN NEONATES"
    fields:
      Front: "What is the first step in treating hyperglycaemia >10 mmol/ℓ?"
      Back: "Decrease parenteral glucose infusion rate to 4–6 mg/kg/minute by reducing dextrose concentration from 10% to 5% (not below 5%) and/or volume"
    tags: ["hyperglycaemia", "management", "subject:paediatrics-neonatal"]

  - guid: "hyper-insulin-indic57"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 HYPOGLACEMIA IN NEONATES"
    fields:
      Front: "When should insulin therapy be considered in neonatal hyperglycaemia?"
      Back: "When persistent hyperglycaemia ≥12 mmol/ℓ despite reductions in glucose infusion rate (always confirm reading with laboratory or blood gas analyzer before starting)"
    tags: ["hyperglycaemia", "insulin-therapy", "subject:paediatrics-neonatal"]

  - guid: "hyper-insulin-safety58"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 HYPOGLACEMIA IN NEONATES"
    fields:
      Front: "Can insulin be given as a bolus in neonatal hyperglycaemia?"
      Back: "Never give insulin as a bolus; always discuss with specialist before starting and refer to neonatal unit per local pathways"
    tags: ["hyperglycaemia", "insulin-therapy", "subject:paediatrics-neonatal"]

  - guid: "hyper-invst59"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 HYPOGLACEMIA IN NEONATES"
    fields:
      Front: "What investigations are needed for hyperglycaemia >10 mmol/ℓ?"
      Back: "1) Investigate and treat underlying cause\n2) Septic screen and antibiotics\n3) Cranial ultrasound for IVH\n4) If neonatal diabetes suspected, discuss with endocrinologist"
    tags: ["hyperglycaemia", "workup", "subject:paediatrics-neonatal"]

  - guid: "insulin-prep60"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 HYPOGLACEMIA IN NEONATES"
    fields:
      Front: "Why must plastic tubing be primed with insulin before neonatal insulin infusion?"
      Back: "Insulin binds to tubing, resulting in decreased availability to the baby"
    tags: ["insulin-therapy", "procedure", "subject:paediatrics-neonatal"]

  - guid: "insulin-dose61"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 HYPOGLACEMIA IN NEONATES"
    fields:
      Front: "What is the dose range for neonatal insulin infusion?"
      Back: "0.02–0.5 units/kg/hour"
    tags: ["insulin-therapy", "drug-dosing", "subject:paediatrics-neonatal"]

  - guid: "insulin-prep-sol62"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 HYPOGLACEMIA IN NEONATES"
    fields:
      Front: "How is the neonatal insulin infusion solution prepared?"
      Back: "Add 2 ml (100 units) Actrapid to 10 ml normal saline. Then add 1 ml/kg (=10 units/kg) of this solution to 0.9% normal saline to make 50 ml total. Then 0.1 ml/hour = 0.02 units/kg/hour"
    tags: ["insulin-therapy", "procedure", "subject:paediatrics-neonatal"]

