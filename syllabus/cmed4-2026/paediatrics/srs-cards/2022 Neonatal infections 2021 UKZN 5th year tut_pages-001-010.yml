  - guid: d0e1f2a3b4cabcd9
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2022 Neonatal infections"
    fields:
      Front: "What are the main risk factors for neonatal infection?"
      Back: "Maternal infection (UTI, chorioamnionitis), preterm birth, immunological deficiencies, lack of IgM/IgA antibodies, skin barrier defects, prolonged healthcare facility stay, facility-related factors (overcrowding, poor hand-washing, understaffing)"
    tags: ["risk-factors", "infection", "subject:paediatrics"]
  - guid: e1f2a3b4c5dbcdea
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2022 Neonatal infections"
    fields:
      Front: "What specific maternal factors are early risk factors for neonatal sepsis?"
      Back: "Prematurity, Chorioamnionitis, PROM greater than 18 hours, Maternal colonization with Group B Streptococcus"
    tags: ["risk-factors", "early-onset", "subject:paediatrics"]
  - guid: f2a3b4c5d6ecdeffb
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2022 Neonatal infections"
    fields:
      Front: "What are late risk factors for neonatal sepsis?"
      Back: "Prematurity, Invasive procedures, Indwelling devices, Ventilators, VP shunts"
    tags: ["risk-factors", "late-onset", "subject:paediatrics"]
  - guid: a3b4c5d6e7fdfef0c
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2022 Neonatal infections"
    fields:
      Front: "Why are preterm neonates at higher risk for infection?"
      Back: "Less capable of responding to infection due to immunological deficiencies, lack of IgM and IgA antibodies, and passive antibody transfer occurs later"
    tags: ["risk-factors", "prematurity", "subject:paediatrics"]
  - guid: b4c5d6e7f80eff1d
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2022 Neonatal infections"
    fields:
      Front: "What clinical signs suggest neonatal sepsis?"
      Back: "Temperature instability, respiratory distress and apnoea, feeding problems and vomiting, lethargy and refusal to suckle, pallor, petechiae, mottling of skin, jaundice, poor perfusion, unstable blood glucose"
    tags: ["clinical-signs", "sepsis", "subject:paediatrics"]
