- id: card-01
  front: What is the definition of optimal use of antibiotics?
  back: |
    Cost-effective use of antimicrobial agents that maximizes clinical effect while minimizing drug-related toxicity and the development of antimicrobial resistance.
  review_count: 0
  difficulty: medium

- id: card-02
  front: What are the three forms of antimicrobial drug use?
  back: |
    1. Empirical therapy - based on clinical/laboratory information before culture results
2. Targeted therapy - based on identified pathogen from culture and susceptibility testing
3. Prophylaxis - prevention of infections (e.g., surgical procedures)
  review_count: 0
  difficulty: medium

- id: card-03
  front: What is empirical therapy?
  back: |
    Use of antibiotics based on best possible pathogen guesses from clinical and laboratory information available before culture identification and susceptibility results are known.
  review_count: 0
  difficulty: medium

- id: card-04
  front: What is targeted (directed) therapy?
  back: |
    Antibiotic therapy based on laboratory identification of the organism and its susceptibility pattern. Adjusts empirical therapy based on culture results.
  review_count: 0
  difficulty: medium

- id: card-05
  front: What factors determine empirical therapy choice in immunocompromised vs normal patients?
  back: |
    In normal immune patients: focus on common organisms. In immunocompromised patients: must consider broader range of organisms and Gram stain results early, as different pathogens are susceptible in immunocompromised states.
  review_count: 0
  difficulty: medium

- id: card-06
  front: What is the role of the microbiology laboratory in antibiotic selection?
  back: |
    Critical role: performs gram stain, culture, and susceptibility testing to identify organism name and determine antibiotic susceptibilities, guiding de-escalation or escalation from empirical therapy.
  review_count: 0
  difficulty: medium

- id: card-07
  front: What are the key characteristics of an ideal antimicrobial agent?
  back: |
    Proven efficacy against sensitive organisms for the clinical condition, Narrow spectrum of activity, Restricted distribution (only to affected tissues), Simple dosing schedule, Cost-effective
  review_count: 0
  difficulty: medium

- id: card-08
  front: Why is selecting narrow-spectrum antibiotics important?
  back: |
    To minimize side effects, tissue toxicity, and unnecessary disruption of normal flora. Unnecessary broad distribution causes preventable side effects.
  review_count: 0
  difficulty: medium

- id: card-09
  front: What are the goals of antimicrobial therapy?
  back: |
    1. Clinical and microbiological cure
2. Avoidance of side effects
3. Avoidance of developing antimicrobial resistance
  review_count: 0
  difficulty: medium

- id: card-10
  front: What clinical considerations must be taken before starting antibiotic therapy?
  back: |
    Is there evidence of infection? Is infection confirmed or likely? How urgent is treatment? Are there special features affecting prognosis? Is antimicrobial therapy relevant?
  review_count: 0
  difficulty: medium

- id: card-11
  front: What microbiological considerations guide antibiotic selection?
  back: |
    Likely pathogens based on clinical presentation. Epidemiological clues. Antibiotic susceptibility pattern. Local antibiotic policy recommendations.
  review_count: 0
  difficulty: medium

- id: card-12
  front: What pharmacological considerations affect antibiotic choice?
  back: |
    Will the antibiotic reach the site of infection? Monitoring requirements (e.g., vancomycin trough levels). Drug interactions. Dosing adjustments needed for renal/hepatic impairment.
  review_count: 0
  difficulty: medium

- id: card-13
  front: How does treatment duration differ among bacterial infections?
  back: |
    Varies by organism and infection type: UTI (3-5 days), TB (long duration), Staphylococcus bloodstream (14-21 days). Duration depends on organism, site of infection, and clinical response.
  review_count: 0
  difficulty: medium

- id: card-14
  front: What are hospital-acquired infections vs community-acquired infections?
  back: |
    Community-acquired: infection onset before or within 48 hours of hospitalization. Hospital-acquired: infection onset after 48 hours of hospitalization or regular healthcare system contact.
  review_count: 0
  difficulty: medium

- id: card-15
  front: What is the difference in antibiotic resistance patterns between community and hospital-acquired infections?
  back: |
    Community-acquired: mostly caused by sensitive organisms. Hospital-acquired: often include multi-drug resistant organisms (MDR, MRSA, ESBL). Patterns can overlap due to community-hospital transmission.
  review_count: 0
  difficulty: medium

- id: card-16
  front: What are the indications for combination antibiotic therapy?
  back: |
    1. Increase spectrum of coverage. 2. Achieve synergistic effect. 3. Reduce likelihood of resistance emergence. 4. Reduce dosage of potentially toxic antibiotics. 5. Treat polymicrobial infections.
  review_count: 0
  difficulty: medium

- id: card-17
  front: When is combination therapy preferred over monotherapy?
  back: |
    Preferred for: intra-abdominal and polymicrobial infections, tuberculosis (prevent resistance), endocarditis (synergy), severe infections requiring broader coverage. Single agent is preferred when adequate.
  review_count: 0
  difficulty: medium

- id: card-18
  front: What are important hospital-associated resistant bacteria?
  back: |
    MRSA, MDR Pseudomonas aeruginosa, ESBL-producing E. coli, Acinetobacter baumannii (carbapenem-resistant), Stenotrophomonas maltophilia (carbapenem-resistant), VRE
  review_count: 0
  difficulty: medium

- id: card-19
  front: Why is monitoring important for certain antibiotics like vancomycin?
  back: |
    Vancomycin and aminoglycosides require monitoring because: they have narrow therapeutic windows. Trough levels must be maintained within specific ranges. Periodic drug level checks ensure efficacy and prevent toxicity.
  review_count: 0
  difficulty: medium

- id: card-20
  front: How should you approach choosing empirical therapy for hospital-acquired infections?
  back: |
    Consider: local epidemiological resistance patterns, patient factors (immunocompromised, prior hospitalization), likely pathogens (commonly MDR organisms), coverage recommendations (typically amoxicillin-clavulanate, carbapenem, or fluoroquinolone), adjust based on culture results
  review_count: 0
  difficulty: medium

- id: card-21
  front: What are appropriate empirical antibiotics for different resistant pathogens?
  back: |
    MRSA: vancomycin, linezolid. Pseudomonas: antipseudomonal penicillin + aminoglycoside, fluoroquinolone, or carbapenem. Stenotrophomonas: co-trimoxazole, fluoroquinolone. ESBL: carbapenem. MDR Gram-negatives: carbapenem
  review_count: 0
  difficulty: medium
