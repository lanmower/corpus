    deck: "Corpus::Paediatrics::2024 NON ACCIDENTAL INJURIES"
    fields:
      Front: "What were the key findings in the case of AM, a 10-year-old male with dysmorphic features?"
      Back: "Social factors: marital conflict, deceased father (COVID-19) who was physically abusive, passive mother. Medical history: dysmorphic child, poor concentration, easily distracted, 'zoning out in class', known epileptic on KEPPRA and EPILIM. Admission findings: 24-hour EEG, labs (LFTs, ammonia, drug levels, FBC, U&E, creatinine). Diagnosis: breakthrough seizures and difficult-to-control epilepsy. Disclosure: child disclosed physical abuse from teacher (throwing books, hitting)."
