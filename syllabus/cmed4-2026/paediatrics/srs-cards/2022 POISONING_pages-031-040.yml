    noteType: Basic
    deck: "Corpus::Paediatrics::2022 POISONING"
    fields:
      Front: "What is the general toxicology of iron poisoning?"
      Back: |
        Iron poisoning causes systemic toxicity through cellular damage, particularly affecting the gastrointestinal tract, cardiovascular system, and multiple organs.
    tags: ["iron", "poisoning", "toxicology", "subject:paediatrics"]

  - guid: b7e3g0d5c9f2h6i4
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 POISONING"
    fields:
      Front: "Why is iron particularly toxic in overdose?"
      Back: |
        Iron is toxic in overdose because it causes direct corrosive injury to the gastrointestinal tract and generates free radicals that damage cellular structures.
    tags: ["iron", "mechanism", "toxicity", "subject:paediatrics"]

  - guid: c8f4h1e6d0g3i7j5
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 POISONING"
    fields:
      Front: "What are the main organ systems affected by iron poisoning?"
      Back: |
        Iron poisoning affects the gastrointestinal tract (primary injury site), cardiovascular system, central nervous system, kidneys, and liver.
    tags: ["iron", "organs", "systemic-effects", "subject:paediatrics"]

  - guid: d9g5i2f7e1h4j8k6
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 POISONING"
    fields:
      Front: "What are the gastrointestinal effects of iron poisoning?"
      Back: |
        Gastrointestinal effects of iron poisoning include vomiting (often with blood), abdominal pain, diarrhoea, and haemorrhage.
    tags: ["iron", "signs", "gastrointestinal", "subject:paediatrics"]

  - guid: e0h6j3g8f2i5k9l7
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 POISONING"
    fields:
      Front: "What does paracetamol poisoning cause?"
      Back: |
        Paracetamol (acetaminophen) poisoning causes hepatotoxicity leading to acute liver failure if not treated promptly.
    tags: ["paracetamol", "poisoning", "toxicity", "subject:paediatrics"]

  - guid: f1i7k4h9g3j6l0m8
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 POISONING"
    fields:
      Front: "What is the mechanism of paracetamol toxicity?"
      Back: |
        Paracetamol toxicity occurs when glutathione stores are depleted and the toxic metabolite N-acetyl-p-benzoquinoneimine (NAPQI) accumulates, causing hepatocyte necrosis.
    tags: ["paracetamol", "mechanism", "hepatotoxicity", "subject:paediatrics"]

  - guid: g2j8l5i0h4k7m1n9
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 POISONING"
    fields:
      Front: "What is the primary antidote for paracetamol poisoning?"
      Back: |
        N-acetylcysteine (NAC) is the primary antidote for paracetamol poisoning, replenishing glutathione stores and preventing hepatotoxicity.
    tags: ["paracetamol", "antidote", "NAC", "subject:paediatrics"]

  - guid: h3k9m6j1i5l8n2o0
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 POISONING"
    fields:
      Front: "What is the time window for NAC effectiveness in paracetamol poisoning?"
      Back: |
        NAC is most effective when given within the first 8–10 hours after paracetamol ingestion, but can still provide benefit up to 24 hours or beyond.
    tags: ["paracetamol", "antidote", "timing", "subject:paediatrics"]

  - guid: i4l0n7k2j6m9o3p1
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 POISONING"
    fields:
      Front: "What are the phases of paracetamol poisoning?"
      Back: |
        Phase 1 (0–24 hours): minimal symptoms. Phase 2 (24–72 hours): apparent improvement with hepatotoxicity developing. Phase 3 (72–96 hours): peak hepatotoxicity with jaundice, coagulopathy, and encephalopathy.
    tags: ["paracetamol", "phases", "natural-history", "subject:paediatrics"]

  - guid: j5m1o8l3k7n0p4q2
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 POISONING"
    fields:
      Front: "What laboratory test guides paracetamol poisoning management?"
      Back: |
        Serum paracetamol concentration is plotted on the Rumack-Matthew nomogram at specific times (4, 8, 12, 16, 20, 24 hours post-ingestion) to determine hepatotoxicity risk and NAC need.
    tags: ["paracetamol", "diagnosis", "investigations", "subject:paediatrics"]

  - guid: k6n2p9m4l8o1q5r3
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 POISONING"
    fields:
      Front: "What is the Rumack-Matthew nomogram used for?"
      Back: |
        The Rumack-Matthew nomogram is used to determine the risk of hepatotoxicity based on serum paracetamol concentration and time since ingestion, guiding treatment decisions in paracetamol poisoning.
    tags: ["paracetamol", "nomogram", "risk-assessment", "subject:paediatrics"]

  - guid: l7o3q0n5m9p2r6s4
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 POISONING"
    fields:
      Front: "What supportive care is needed in paracetamol poisoning?"
      Back: |
        Supportive care includes monitoring liver function tests, coagulation studies, and blood glucose; managing coagulopathy with fresh frozen plasma if needed; and monitoring for encephalopathy.
    tags: ["paracetamol", "management", "supportive-care", "subject:paediatrics"]

  - guid: m8p4r1o6n0q3s7t5
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 POISONING"
    fields:
      Front: "What is the definition of caustic agents?"
      Back: |
        Caustic agents are substances that cause chemical burns to tissues they contact, including strong acids and alkalis.
    tags: ["caustic", "corrosive", "definition", "subject:paediatrics"]

  - guid: n9q5s2p7o1r4t8u6
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 POISONING"
    fields:
      Front: "What is the definition of corrosive agents?"
      Back: |
        Corrosive agents are substances capable of corroding (destroying) organic tissue through chemical action, similar to caustic agents.
    tags: ["corrosive", "caustic", "definition", "subject:paediatrics"]

  - guid: o0r6t3q8p2s5u9v7
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 POISONING"
    fields:
      Front: "What are examples of caustic/corrosive agents?"
      Back: |
        Examples include strong acids (sulphuric acid, hydrochloric acid), strong alkalis (sodium hydroxide, potassium hydroxide), and other industrial chemicals.
    tags: ["caustic", "corrosive", "examples", "subject:paediatrics"]

  - guid: p1s7u4r9q3t6v0w8
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 POISONING"
    fields:
      Front: "What areas of the body are affected by caustic/corrosive ingestion?"
      Back: |
        Caustic/corrosive ingestion primarily affects the mouth, oesophagus, and stomach, with potential for full-thickness burns and perforation.
    tags: ["caustic", "corrosive", "pathology", "subject:paediatrics"]

  - guid: q2t8v5s0r4u7w1x9
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 POISONING"
    fields:
      Front: "What is the immediate management principle for caustic ingestion?"
      Back: |
        Immediate management includes dilution with water or milk (do not induce vomiting), assessment for perforation, and urgent endoscopy to evaluate extent of damage.
    tags: ["caustic", "corrosive", "management", "subject:paediatrics"]
