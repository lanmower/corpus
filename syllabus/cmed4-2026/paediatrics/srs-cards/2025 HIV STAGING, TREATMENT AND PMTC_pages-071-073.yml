    deck: "Corpus::Paediatrics::2025 HIV STAGING, TREATMENT AND PMTC"
    fields:
      Front: "What proportion of AIDS-defining conditions in the first year of life is PJP pneumonia?"
      Back: |
        PJP (Pneumocystis jirovecii pneumonia) accounts for approximately 50% of all AIDS-defining conditions in the first year of life, with median age of presentation at 5 months.
    tags: ["pjp-pneumonia", "aids-defining-condition", "opportunistic-infection", "subject:paediatrics"]
  - guid: "b2c3d4e5f6g7h8i5"
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 HIV STAGING, TREATMENT AND PMTC"
    fields:
      Front: "What are the clinical presentation features of PJP pneumonia in infants?"
      Back: |
        PJP presents with: low-grade fever, tachypnea, non-productive cough, shortness of breath. On examination, auscultation may be normal despite severe disease and hypoxemia.
    tags: ["pjp-pneumonia", "clinical-features", "respiratory-symptoms", "subject:paediatrics"]
  - guid: "c3d4e5f6g7h8i9j6"
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 HIV STAGING, TREATMENT AND PMTC"
    fields:
      Front: "What is the first-line treatment for PJP pneumonia?"
      Back: |
        First-line treatment is TMP-SMX (trimethoprim-sulfamethoxazole). Experts recommend including glucocorticoids in treatment.
    tags: ["pjp-treatment", "tmp-smx", "antibiotic-prophylaxis", "subject:paediatrics"]
  - guid: "d4e5f6g7h8i9j0k7"
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 HIV STAGING, TREATMENT AND PMTC"
    fields:
      Front: "What are the imaging findings in PJP pneumonia?"
      Back: |
        Chest X-ray findings may be normal. CT imaging might show extensive ground-glass opacities with patchy distribution affecting the central lung, sparing the lung periphery.
    tags: ["pjp-imaging", "chest-findings", "radiology", "subject:paediatrics"]
  - guid: "e5f6g7h8i9j0k1l8"
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 HIV STAGING, TREATMENT AND PMTC"
    fields:
      Front: "What is the definition of wasting syndrome in HIV?"
      Back: |
        Wasting syndrome is defined as: persistent weight loss greater than 10% of baseline OR downward crossing of 2 or more major percentile lines on the pediatric weight-for-age chart OR less than 5th percentile on weight-for-height chart on two consecutive measurements 30+ days apart, plus chronic diarrhea or documented fever.
    tags: ["wasting-syndrome", "failure-to-thrive", "nutritional-complications", "subject:paediatrics"]
  - guid: "f6g7h8i9j0k1l2m9"
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 HIV STAGING, TREATMENT AND PMTC"
    fields:
      Front: "What are the causes of wasting in HIV infection?"
      Back: |
        Wasting can result from: HIV infection itself, opportunistic infections (OI), and increased metabolic demands, leading to decreased and lean body mass.
    tags: ["wasting-pathophysiology", "body-composition", "metabolic-effects", "subject:paediatrics"]
  - guid: "g7h8i9j0k1l2m3n0"
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 HIV STAGING, TREATMENT AND PMTC"
    fields:
      Front: "What are the diagnostic criteria for HIV encephalopathy?"
      Back: |
        HIV encephalopathy is defined by: failure to attain developmental milestones or loss of cognitive ability AND impaired brain growth/acquired microcephaly/brain atrophy on CT/MRI AND acquired symmetric motor deficits (2+ of: paresis, pathologic reflexes, ataxia, gait disturbances).
    tags: ["hiv-encephalopathy", "cns-infection", "neurodevelopmental", "subject:paediatrics"]
  - guid: "h8i9j0k1l2m3n4o1"
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 HIV STAGING, TREATMENT AND PMTC"
    fields:
      Front: "What are possible presentations of CMV disease in HIV?"
      Back: |
        CMV disease presentations include: fever, pneumonia, colitis, encephalitis, or retinitis.
    tags: ["cmv-disease", "opportunistic-infection", "viral-complications", "subject:paediatrics"]
  - guid: "i9j0k1l2m3n4o5p2"
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 HIV STAGING, TREATMENT AND PMTC"
    fields:
      Front: "How is CMV transmitted?"
      Back: |
        CMV transmission occurs from mother to child (perinatally, through breastfeeding, and during pregnancy) and by person-to-person contact with secretions.
    tags: ["cmv-transmission", "vertical-transmission", "infection-control", "subject:paediatrics"]
  - guid: "j0k1l2m3n4o5p6q3"
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 HIV STAGING, TREATMENT AND PMTC"
    fields:
      Front: "What is immune reconstitution syndrome (IRIS) or HAART attacks?"
      Back: |
        IRIS is paradoxical clinical deterioration after starting ART, occurring usually in the first 6 weeks after ART initiation. It results from the improving immune system reacting more vigorously with existent antigens due to various infective and inflammatory causes.
    tags: ["iris", "immune-reconstitution", "art-initiation-complication", "subject:paediatrics"]
