- id: card-01
  front: "What is acute pancreatitis?"
  back: |
    An acute inflammatory process of the pancreas associated with severe upper abdominal pain, elevated blood levels of pancreatic enzymes. Divided into two categories: mild acute pancreatitis and necrotizing pancreatitis.

- id: card-02
  front: "What diagnostic evidence is required for acute pancreatitis?"
  back: |
    A combination of biochemical, radiological, and sometimes histological evidence. No single finding alone is diagnostic.

- id: card-03
  front: "What happens to endocrine and exocrine function during acute pancreatitis?"
  back: |
    There is transient endocrine and exocrine pancreatic dysfunction. Severity resolution is dependent on the severity of pancreatitis.

- id: card-04
  front: "What is the typical recovery timeline for acute pancreatitis?"
  back: |
    Usually complete recovery occurs within six months, but it may progress to chronic pancreatitis after repeated episodes.

- id: card-05
  front: "Why is diagnosis of acute pancreatitis difficult based on clinical presentation?"
  back: |
    Disease varies in severity and diagnosis is often missed at the extreme end of spectrum. Patients can have severe pancreatitis with only abdominal pain as the sole symptom.

- id: card-06
  front: "What are the main etiologies of acute pancreatitis?"
  back: |
    Gallstones and alcohol account for more than 98% of causes in adults. Other causes include hypertriglyceridemia, hypercalcemia, genetic mutations, drugs, toxins, autoimmune, trauma, and idiopathic.

- id: card-07
  front: "What is the gender difference in acute pancreatitis etiology?"
  back: |
    Acute gallstone pancreatitis occurs more in women, while alcoholic pancreatitis occurs more in men.

- id: card-08
  front: "What age presentation suggests a hereditary cause of acute pancreatitis?"
  back: |
    Onset in the first decade (before age 10) suggests a hereditary cause. Unusual causes to investigate include hyperlipidemia, hereditary chronic pancreatitis, and genetic mutations.

- id: card-09
  front: "What is the cardinal symptom of acute pancreatitis?"
  back: |
    Severe upper abdominal pain that is usually steady and located in the mid-epigastrium. Can radiate to the right upper quadrant or diffuse across abdomen.

- id: card-10
  front: "What is the typical timeline of pain in alcoholic pancreatitis?"
  back: |
    Usually occurs about 72 hours after finish or cessation of drinking. Pain lasts for days, unlike biliary colic which is short-lived (6-8 hours).

- id: card-11
  front: "How quickly does pain reach maximum intensity in acute pancreatitis?"
  back: |
    Maximum intensity usually reached within 10-20 minutes to one hour, with radiation to the back.

- id: card-12
  front: "What percentage of acute pancreatitis presents without pain?"
  back: |
    Painless disease is uncommon but occurs in 5-10% of patients. Sometimes diagnosis is only made at post-mortem examination.

- id: card-13
  front: "What are associated symptoms with acute pancreatitis pain?"
  back: |
    Nausea and vomiting. Patients are restless, agitated, and relief comes from bending forward. Severe cases may present with shock or coma.

- id: card-14
  front: "What physical examination findings are present in mild acute pancreatitis?"
  back: |
    Epigastrium may be minimally tender. Respiration is usually shallow due to irritation of diaphragm from inflammatory process.

- id: card-15
  front: "What physical examination findings are present in severe acute pancreatitis?"
  back: |
    Abdominal distension, abdominal guarding, and potential ischemic discoloration in flanks (Cullen's sign) or around navel (Grey Turner's sign) - occur in ~1% of patients.

- id: card-16
  front: "What laboratory marker rises first in acute pancreatitis?"
  back: |
    Amylase rises within 6-12 hours of onset of acute pancreatitis and is cleared fairly rapidly with a half-life of approximately 10 hours.

- id: card-17
  front: "How long is serum amylase typically elevated in uncomplicated acute pancreatitis?"
  back: |
    Usually elevated for about 3-5 days, then starts declining.

- id: card-18
  front: "What is the diagnostic threshold for serum amylase in acute pancreatitis?"
  back: |
    An increase of more than 3 times the upper limit of normal suggests pancreatic injury.

- id: card-19
  front: "Why is serum amylase non-specific for acute pancreatitis?"
  back: |
    Can be elevated in many conditions: cholecystitis, bowel obstruction, renal failure, diabetic ketoacidosis, pancreatitis, salpingitis.

- id: card-20
  front: "What is the amylase-creatinine clearance ratio in acute pancreatitis?"
  back: |
    Normally 3% of amylase is excreted in urine. In acute pancreatitis, this increases to about 10%, but does not add prognostic value over serum or urine amylase alone.

- id: card-21
  front: "How does lipase compare to amylase for diagnosing acute pancreatitis?"
  back: |
    Lipase is slightly more specific than serum amylase with better diagnostic accuracy on both day 1 and day 3.

- id: card-22
  front: "Does the level of pancreatic enzyme elevation correlate with disease severity?"
  back: |
    No. Enzyme levels do not correlate with severity. A patient with low lipase may have severe disease, while high enzyme levels are less predictive of severity.

- id: card-23
  front: "What inflammatory markers predict acute pancreatitis severity?"
  back: |
    C-reactive protein (CRP) of >150 mg/dL at 48 hours can discriminate severe from mild disease. Other markers include IL-6, IL-8, IL-10, TNF, neutrophil elastase.

- id: card-24
  front: "What are the radiological findings on chest X-ray in acute pancreatitis?"
  back: |
    Elevation of hemidiaphragm, pleural effusions, atelectasis, pulmonary infiltrates, ARDS features, and left/right/bilateral pleural effusions (usually indicate complications).

- id: card-25
  front: "What ultrasound findings are typical in acute pancreatitis?"
  back: |
    Pancreatic gland enlargement - diffusely enlarged gland with hypoechoic appearance. May also identify gallstones or dilated ducts suggesting etiology.

- id: card-26
  front: "Why is CT angiography most important for acute pancreatitis diagnosis?"
  back: |
    CTA is the most important test for diagnosis of acute pancreatitis and intra-abdominal complications. Assesses severity and if no improvement after conservative therapy, suggests complications or alternative diagnosis.

- id: card-27
  front: "What do the Ranson prognostic criteria assess?"
  back: |
    Ranson is the most widely used severity score. Criteria at admission: WBC >16, glucose >200 mg/L, age >55, AST >250. A second score at 48 hours gives good prediction of 28-day mortality.

- id: card-28
  front: "What other severity scores are used in acute pancreatitis?"
  back: |
    APACHE II, Marshall score, and PII subscores have all been validated for clinical practice to assess severity and guide ICU admission.

- id: card-29
  front: "What is a pseudocyst in acute pancreatitis?"
  back: |
    Localized amylase-rich fluid collection within or around the pancreas. Can be single or multiple, varying in size.

- id: card-30
  front: "What complications can occur with pancreatic pseudocysts?"
  back: |
    Hemorrhage into the cyst, infection, rupture, or pressure effects on adjacent structures like duodenal obstruction.

- id: card-31
  front: "What treatments are available for pancreatic pseudocysts?"
  back: |
    Percutaneous drainage, endoscopic drainage, or open surgical drainage. Only needed if complications present. Uncomplicated cysts can be observed for resolution.

- id: card-32
  front: "What local complications can occur in acute pancreatitis?"
  back: |
    Pseudocyst formation, necrotizing pancreatitis, abscess formation. Can have GI bleeding, bowel compression, fistula within bowel.

- id: card-33
  front: "What is the mortality rate of severe necrotizing pancreatitis?"
  back: |
    High mortality rate approaching 85%.

- id: card-34
  front: "What is the typical recovery timeline for mild acute pancreatitis?"
  back: |
    Most attacks are mild with recovery occurring within 5-7 days.

- id: card-35
  front: "What is the primary treatment approach for acute pancreatitis?"
  back: |
    Predominantly supportive care: pain control, intravenous fluids, correction of electrolyte abnormalities.

- id: card-36
  front: "What pain management approach is used in acute pancreatitis?"
  back: |
    Initial IV cure is sufficient. Once pain is settled, transition to oral therapies can be advised. Pain management is essential as abdominal pain is often dominant symptom.

- id: card-37
  front: "Why is nutrition important in acute pancreatitis management?"
  back: |
    Enteral nutrition or parenteral nutrition might be required depending on patient's mental state due to ongoing inflammatory process and auto-digestion.

- id: card-38
  front: "Why should antibiotics be initiated early in acute pancreatitis?"
  back: |
    Infection is a dire consequence of acute pancreatitis. Systemic antibiotics initiated early reduce mortality.

- id: card-39
  front: "What investigations are needed for severe acute pancreatitis?"
  back: |
    Patients should be assessed for need for percutaneous CT-guided aspiration or drainage of the gland.

- id: card-40
  front: "What is the importance of identifying the etiology of acute pancreatitis?"
  back: |
    Different etiologies require different therapeutic measures. Once the cause is eliminated, you can prevent further attacks or reduce morbidity.

- id: card-41
  front: "What happens to recurrent acute pancreatitis from gallstones if untreated?"
  back: |
    Up to 50% of acute gallstone pancreatitis without cholecystectomy will have recurrent attacks. Cholecystectomy at discharge is preventative.

