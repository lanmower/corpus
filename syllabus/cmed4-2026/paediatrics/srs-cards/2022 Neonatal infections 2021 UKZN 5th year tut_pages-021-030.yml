    noteType: "Basic"
    deck: "Corpus::Paediatrics::2022 Neonatal infections"
    fields:
      Front: "What are the key maternal factors in presenting congenital infections in the nursery?"
      Back: "Maternal history, exposure history, and disease state are key to recognizing congenital infections"
    tags: ["congenital-infection", "maternal-factors", "subject:paediatrics"]
