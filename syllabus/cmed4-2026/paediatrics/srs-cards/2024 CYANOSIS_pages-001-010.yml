    fields:
      Front: "What does the PALMS mnemonic represent for causes of central cyanosis?"
      Back: |
        P - Polycythaemia
        A - Altitude
        L - Lung
        M - Methaemoglobin / Metabolic disorders (hypoglycaemia)
        S - Shunt
    tags: ["palms-mnemonic", "central-cyanosis", "causes", "subject:paediatrics"]

