    fields:
      Front: "What is the critical concern with abacavir hypersensitivity reaction?"
      Back: |
        Abacavir hypersensitivity reaction can be fatal and presents with fever, rash, abdominal pain, pharyngitis, and dyspnea. Rechallenge is contraindicated after hypersensitivity reaction.
