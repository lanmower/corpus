  - id: sc20
    name: "SIDS prevention in preterm infant discharge: counseling on back sleeping, sleeping environment"
    description: |
      A preterm infant (34 weeks gestation, now 3 weeks corrected age) is approaching hospital discharge. You counsel the family on SIDS prevention. Discuss sleeping position (back, not side/prone), mattress firmness, avoiding pillows/blankets, room-sharing without bed-sharing, breastfeeding, pacifier use, and avoiding overheating. Why are preterm infants at higher risk for SIDS? What role does arousal reflex maturity play? When is the peak SIDS age?
    learning_objectives:
      - Know SIDS peak age: 2-4 months, rare after 6 months
      - Recognize preterm infants at 3× higher risk than term infants
      - Understand causative factors: immature arousal reflexes, chemoreceptor dysfunction, abnormal sleep architecture
      - Primary prevention: back sleeping position (not side/prone)
      - Sleep environment: firm mattress (no memory foam, pillows, blankets, bumpers)
      - Room-sharing without bed-sharing: prefer crib in parent's room
      - Promote breastfeeding: improves arousal, immune function
      - Encourage pacifier use: enhances arousal, maintains airway patency
      - Avoid overheating: appropriate room temperature, avoid excess bedding/clothing
      - Avoid: bed-sharing (high suffocation/entrapment risk), smoke/alcohol/drug exposure, loose blankets
      - Recommend: immunizations (reduce SIDS risk), consider home cardiorespiratory monitoring if indicated
      - Counsel on safe sleep from hospital discharge onward
