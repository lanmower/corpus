    noteType: "Basic"
    deck: "Corpus::Paediatrics::RESP EXAM BY DR HLOPHE"
    fields:
      Front: "Why should the striking finger be removed quickly during percussion?"
      Back: "To avoid muffling the resulting percussion note"
    tags:
      - "percussion"
      - "examination-technique"
      - "subject:paediatrics"
