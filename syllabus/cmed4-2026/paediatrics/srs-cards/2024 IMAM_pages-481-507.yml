deck: "Corpus::Paediatrics::2024 IMAM"
notes:
  - guid: adbc6844f05d5769
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 IMAM"
    fields:
      Front: "What is the definition of Severe Acute Malnutrition (SAM) in children?"
      Back: "SAM is defined by any of the following: Weight-for-height/length <-3 SD; MUAC <11.5cm (for >6 months); Bilateral pitting oedema"
    tags: ["malnutrition", "imam", "definition", "subject:paediatrics"]
  - guid: ab6822fce9a4df62
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 IMAM"
    fields:
      Front: "What is the hypoglycaemia threshold in SAM children?"
      Back: "Low blood glucose is defined as <3 mmol/l"
    tags: ["malnutrition", "imam", "hypoglycaemia", "stabilisation-phase", "subject:paediatrics"]
  - guid: e5d28726285b444f
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 IMAM"
    fields:
      Front: "How is asymptomatic hypoglycaemia (<3 mmol/l) treated orally in SAM?"
      Back: "Immediate feed with F75, or sugar solution oral 10ml/kg, or 50ml bolus of 10% dextrose. Check blood glucose after 30 mins; if normal continue feeding, monitor 3 hourly. If low, continue to check every 30 minutes until >3 mmol/l"
    tags: ["malnutrition", "imam", "hypoglycaemia", "treatment", "stabilisation-phase", "subject:paediatrics"]
  - guid: e9a3dd09bccea213
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 IMAM"
    fields:
      Front: "What is the IV dextrose dosing for symptomatic hypoglycaemia in SAM?"
      Back: "IV Dextrose 10%: 2 ml/kg over 2-3 mins. Check blood glucose after 30 mins; if normal continue feeding, monitor 3 hourly"
    tags: ["malnutrition", "imam", "hypoglycaemia", "treatment", "stabilisation-phase", "subject:paediatrics"]
  - guid: 6ff87d02cf0d3ab2
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 IMAM"
    fields:
      Front: "What is the normal axillary temperature range in children?"
      Back: "Normal temperature: 36.5-37.4Â°C. Temp <36.5Â°C indicates urgent need to warm child"
    tags: ["malnutrition", "imam", "hypothermia", "stabilisation-phase", "subject:paediatrics"]
  - guid: a8e90ec8a6528ca6
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 IMAM"
    fields:
      Front: "What are the prevention measures for hypothermia in SAM?"
      Back: "Keep covered, especially head, all the time. Avoid drafts. Keep dry, change wet napkins regularly. Avoid exposure during examination and bathing. Keep child in warm area (temp 25-30Â°C). Ensure regular correct feeding. Check axillary temperature 3-4 hourly"
    tags: ["malnutrition", "imam", "hypothermia", "prevention", "stabilisation-phase", "subject:paediatrics"]
  - guid: cd52ba2030ff3088
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 IMAM"
    fields:
      Front: "What active rewarming measures are used for hypothermia in SAM?"
      Back: "Skin-to-skin contact (Mother-Child). Wrap child with warm blanket. Place heater nearby. External warmer: heaters, hot-water bottle, bear huggers. During rewarming, monitor body temp every 30 mins. Temperature generally goes up 0.5-1Â°C per hour. Stop rewarming when body temp stabilized >36.5Â°C (prevent overheating)"
    tags: ["malnutrition", "imam", "hypothermia", "treatment", "stabilisation-phase", "subject:paediatrics"]
  - guid: 22833e9f1d02d227
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 IMAM"
    fields:
      Front: "What are the grades of dehydration in SAM?"
      Back: "No visible dehydration: normal presentation. Some dehydration: eyes sunken, slow skin pinch turgor (<2 sec), drinks eagerly, irritable/restless. Severe dehydration: eyes sunken, very slow skin pinch (>2 sec), drinks poorly"
    tags: ["malnutrition", "imam", "dehydration", "classification", "stabilisation-phase", "subject:paediatrics"]
  - guid: 87c8d19199e2df4d
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 IMAM"
    fields:
      Front: "How is diarrhoea without dehydration managed in SAM?"
      Back: "Show mother how to give ORS with cup and spoon. Give frequent small sips. Give 10ml/kg after each loose stool until diarrhoea resolves. Continue to feed (F75). Reassess for dehydration frequently"
    tags: ["malnutrition", "imam", "dehydration", "management", "stabilisation-phase", "subject:paediatrics"]
  - guid: 2f09d520454c0b97
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 IMAM"
    fields:
      Front: "How is diarrhoea with some or severe dehydration managed in SAM?"
      Back: "Give ORS 5ml/kg every 15 min (20 ml/kg/h) for 4 hours. Use frequent small sips. Continue to feed child. Reassess level of dehydration frequently. Review after 4 hours: general condition, capillary filling time, level of consciousness, skin turgor, sunken eyes, respiratory rate, abdomen, passing urine, number/quality of stools"
    tags: ["malnutrition", "imam", "dehydration", "management", "stabilisation-phase", "subject:paediatrics"]
  - guid: 932f7c68913f6295
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 IMAM"
    fields:
      Front: "What are the IV fluid rates for treating dehydration with IV Darrows half-strength with dextrose 5% in SAM?"
      Back: "2-10 kg: 10ml/kg/hr. 11-20 kg: 8ml/kg/hr. 21-50 kg: 6ml/kg/hr. Given in addition to oral feeds at normal feed volumes and times"
    tags: ["malnutrition", "imam", "dehydration", "IV-therapy", "stabilisation-phase", "subject:paediatrics"]
  - guid: 9f88302ebaa8e2e1
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 IMAM"
    fields:
      Front: "What signs indicate shock in SAM children?"
      Back: "Compensated shock: delayed capillary filling time >3 secs, increased pulse rate (>140-160 bpm), cool peripheries. Late (preterminal) shock: decreased level of consciousness (lethargic), decreased blood pressure, decreased pulse volume"
    tags: ["malnutrition", "imam", "shock", "stabilisation-phase", "subject:paediatrics"]
  - guid: 40bad443a5c6cd06
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 IMAM"
    fields:
      Front: "What is the fluid bolus dosing and administration for shock in SAM?"
      Back: "Resuscitate with fluid bolus: 0.9% NS or Ringers lactate. Volume: 10ml/kg. Given as a bolus over 20 mins. Monitor for response (watch for fluid overload). If shock resolved, proceed to manage dehydration. If no response, repeat fluid bolus up to 3 times. After 3x10ml/kg boluses (total 30ml/kg) with inadequate response, move patient to high care bed for CVP monitoring and inotropic support"
    tags: ["malnutrition", "imam", "shock", "treatment", "stabilisation-phase", "subject:paediatrics"]
  - guid: f7f5da0e8edf868f
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 IMAM"
    fields:
      Front: "What are the signs of fluid overload to monitor for during IV therapy in SAM?"
      Back: "Further tachycardia, gallop rhythm, breathing increased even faster, puffy eyelids, enlarging liver size"
    tags: ["malnutrition", "imam", "shock", "dehydration", "IV-therapy", "subject:paediatrics"]
  - guid: d65db6a68fa10213
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 IMAM"
    fields:
      Front: "What is the Hb threshold for Very Severe Anaemia in SAM?"
      Back: "Hb <4 g/dL"
    tags: ["malnutrition", "imam", "anaemia", "stabilisation-phase", "subject:paediatrics"]
  - guid: ef71c7d729a3debe
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 IMAM"
    fields:
      Front: "What is the Hb range for Severe Anaemia in SAM?"
      Back: "Hb 4-6 g/dL with respiratory distress"
    tags: ["malnutrition", "imam", "anaemia", "stabilisation-phase", "subject:paediatrics"]
  - guid: b26cc2bea6e85dc5
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 IMAM"
    fields:
      Front: "What is the blood transfusion dosing and timing in SAM?"
      Back: "Transfuse packed cells 5-10ml/kg slowly over 4 hours. Blood transfusions should only be given in the first 24 hours if a child has very severe anaemia or severe anaemia with respiratory distress"
    tags: ["malnutrition", "imam", "anaemia", "transfusion", "stabilisation-phase", "subject:paediatrics"]
  - guid: a594bc9bdee0adae
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 IMAM"
    fields:
      Front: "What is the furosemide dosing during blood transfusion in SAM?"
      Back: "Give furosemide 1mg/kg IV at the start and end of transfusion. Watch for signs of fluid overload"
    tags: ["malnutrition", "imam", "anaemia", "transfusion", "stabilisation-phase", "subject:paediatrics"]
  - guid: 4e2c04d73f1023cc
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 IMAM"
    fields:
      Front: "What electrolyte abnormalities are found in SAM?"
      Back: "All SAM children have excess body sodium even though plasma sodium may be low. Deficiency of potassium and magnesium. These can take up to 2 weeks to correct. Oedema partly due to these imbalances"
    tags: ["malnutrition", "imam", "electrolytes", "stabilisation-phase", "subject:paediatrics"]
  - guid: a87302be4bdd993f
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 IMAM"
    fields:
      Front: "What is the critical principle for managing oedema in SAM?"
      Back: "Do not treat oedema with a diuretic. Giving high sodium can kill"
    tags: ["malnutrition", "imam", "electrolytes", "oedema", "stabilisation-phase", "subject:paediatrics"]
  - guid: c4df2be81b3fc89e
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 IMAM"
    fields:
      Front: "What is the Gentamycin dosing regimen in SAM?"
      Back: "Gentamycin IV 6mg/kg once daily for 7 days. Start on the first day of admission"
    tags: ["malnutrition", "imam", "antibiotics", "gentamycin", "infection", "stabilisation-phase", "subject:paediatrics"]
  - guid: 3f6a50ec37cf53a5
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 IMAM"
    fields:
      Front: "What is the Amoxicillin dosing for SAM children with no danger signs?"
      Back: "Amoxicillin oral 30mg/kg/dose 8 hourly for 5 days. For children with no danger signs, alert and feeding well"
    tags: ["malnutrition", "imam", "antibiotics", "amoxicillin", "infection", "stabilisation-phase", "subject:paediatrics"]
  - guid: 53f4c036d3d946fa
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 IMAM"
    fields:
      Front: "What is the Ampicillin dosing for SAM children with danger signs?"
      Back: "Ampicillin IV/IM 50mg/kg 6 hourly for 7 days. For all other children not meeting low-risk criteria. Avoid IV infusions if possible. Use heparin lock to avoid fluid overload. Hang time: 1 hour"
    tags: ["malnutrition", "imam", "antibiotics", "ampicillin", "infection", "stabilisation-phase", "subject:paediatrics"]
  - guid: f58e3d24b01b21d1
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 IMAM"
    fields:
      Front: "What antibiotic is used for SAM children severely ill or failing to improve after 48 hours?"
      Back: "Third generation cephalosporin e.g. Ceftriaxone IV/IM 50mg/kg/dose once daily. If meningitis is suspected: 80-100mg/kg/dose"
    tags: ["malnutrition", "imam", "antibiotics", "ceftriaxone", "infection", "stabilisation-phase", "subject:paediatrics"]
  - guid: b86f004d5a935c5d
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 IMAM"
    fields:
      Front: "What is the Mebendazole dosing for children 1-2 years in SAM?"
      Back: "Mebendazole oral 100mg 12 hourly for 3 days. Given during rehabilitation phase"
    tags: ["malnutrition", "imam", "worms", "mebendazole", "infection", "rehabilitation-phase", "subject:paediatrics"]
  - guid: 38f36ae59c02a892
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 IMAM"
    fields:
      Front: "What is the Mebendazole dosing for children >2 years in SAM?"
      Back: "Mebendazole oral 500mg as a single dose immediately. Given during rehabilitation phase"
    tags: ["malnutrition", "imam", "worms", "mebendazole", "infection", "rehabilitation-phase", "subject:paediatrics"]
  - guid: 2f16d8086fb20106
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 IMAM"
    fields:
      Front: "What is the Folic Acid dosing in SAM?"
      Back: "Only give stat dose of 5mg folic acid on day 1. Do not give daily (already in F75, F100 and RUTF). If not on F75/F100 prescribe folic acid 2.5mg daily"
    tags: ["malnutrition", "imam", "micronutrients", "folic-acid", "stabilisation-phase", "subject:paediatrics"]
  - guid: 6b49fbe44bbc12fc
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 IMAM"
    fields:
      Front: "When is Iron supplementation started in SAM?"
      Back: "Only give iron after the stabilization phase is completed (rehab phase). Iron supplementation is only given once the child is gaining weight and the oedema has resolved, usually after 7 days"
    tags: ["malnutrition", "imam", "micronutrients", "iron", "rehabilitation-phase", "subject:paediatrics"]
  - guid: 5c4ec5bd4a4c3807
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 IMAM"
    fields:
      Front: "What is the Iron dosing in SAM during rehabilitation?"
      Back: "Give 2mg/kg elemental iron per dose 8 hourly with meals when the child is on F100. Stop iron when child is taking full prescribed amount of RUTF"
    tags: ["malnutrition", "imam", "micronutrients", "iron", "rehabilitation-phase", "subject:paediatrics"]
  - guid: 5a1e0347d2b87f49
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 IMAM"
    fields:
      Front: "What is the Vitamin A supplementation rule in SAM?"
      Back: "Give single age specific high dose Vitamin A capsule if the child has severe measles and/or clinical signs of vitamin A deficiency. For children without the above complications and who are receiving F75, F100 or RUTF, no high dose vitamin A supplementation required"
    tags: ["malnutrition", "imam", "micronutrients", "vitamin-a", "stabilisation-phase", "subject:paediatrics"]
  - guid: 2970105c2ae76696
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 IMAM"
    fields:
      Front: "What is the Zinc supplementation rule in SAM?"
      Back: "Children with SAM receiving Ready-To-Use F75, F100 or RUTF should not be given additional zinc supplements even if they have diarrhoea, as these therapeutic feeds contain the recommended amounts of zinc for diarrhoea"
    tags: ["malnutrition", "imam", "micronutrients", "zinc", "stabilisation-phase", "subject:paediatrics"]
  - guid: ec7f4700bd234bd2
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 IMAM"
    fields:
      Front: "What is the F75 (Starter Formula) volume for SAM children without oedema?"
      Back: "130ml/kg/day over 8 feeds"
    tags: ["malnutrition", "imam", "feeding", "F75", "stabilisation-phase", "subject:paediatrics"]
  - guid: 38497e5235c45e52
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 IMAM"
    fields:
      Front: "What is the F75 (Starter Formula) volume for SAM children with severe oedema?"
      Back: "100ml/kg/day over 8 feeds"
    tags: ["malnutrition", "imam", "feeding", "F75", "stabilisation-phase", "subject:paediatrics"]
  - guid: ad14cf8e80290453
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 IMAM"
    fields:
      Front: "What are the F75 nutritional specifications?"
      Back: "100 kcal/kg/day; Protein 0.9 g/kg/day. Low-lactose feed"
    tags: ["malnutrition", "imam", "feeding", "F75", "stabilisation-phase", "subject:paediatrics"]
  - guid: d92df11fbc6f8e24
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 IMAM"
    fields:
      Front: "What is RUTF and when is it introduced in SAM?"
      Back: "RUTF (Ready-To-Use Therapeutic Feed) is an energy-dense, vitamin and mineral-enriched therapeutic food that is equivalent to F100. It is a groundnut paste composed of vegetable fat, peanut butter, skimmed milk powder, lactoserum, maltodextrin, sugar and mineral and vitamin complex. Start once taking well orally in rehabilitation phase. Start increasing volume by 20ml per day until some feed remains unfinished or reaches 220mls/kg"
    tags: ["malnutrition", "imam", "feeding", "RUTF", "rehabilitation-phase", "subject:paediatrics"]
  - guid: d4ef6d21d8f5a7de
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 IMAM"
    fields:
      Front: "How is the transition from F75 to F100/Infatrini managed in SAM?"
      Back: "For the first day or two replace the stabilizing feed (F75) with rehabilitation feed (F100 or DF100) at the same volume. The transition phase should be gradual (2 days) to avoid the risk of heart failure"
    tags: ["malnutrition", "imam", "feeding", "transition", "rehabilitation-phase", "subject:paediatrics"]
  - guid: e96e0e94222ee1ae
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 IMAM"
    fields:
      Front: "What are the discharge criteria for SAM in children 0-6 months?"
      Back: "Established breastfeeding. Bilateral pitting oedema resolved. Child clinically well and alert. Medical complications resolved. Persistent and good weight gain (>5g/kg/day) over 5 days"
    tags: ["malnutrition", "imam", "discharge", "rehabilitation-phase", "subject:paediatrics"]
  - guid: e059e07545ce32f1
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 IMAM"
    fields:
      Front: "What are the discharge criteria for SAM in children 6-59 months?"
      Back: "Appetite returned, tolerating RUTF. Child clinically well and alert. Bilateral pitting oedema resolved. Medical complications resolved. Persistent and good weight gain (>10g/kg/day) over 5 days"
    tags: ["malnutrition", "imam", "discharge", "rehabilitation-phase", "subject:paediatrics"]
  - guid: 7f701e9e9d0b60fd
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 IMAM"
    fields:
      Front: "What investigations must be done before discharge in SAM?"
      Back: "Investigate for TB. Repeat tuberculin skin test and read it within 48 hours. Record findings. Ensure HIV counselling and testing was done. Record findings. Ensure information on family background and socio-economic status was obtained and seen by social worker"
    tags: ["malnutrition", "imam", "discharge", "tuberculosis", "HIV", "rehabilitation-phase", "subject:paediatrics"]
  - guid: a25467a80c0c2501
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 IMAM"
    fields:
      Front: "What follow-up schedule is recommended after SAM discharge?"
      Back: "Follow up at 2 weeks or one month after discharge at POPD (Place Of Primary care Discharge). Dietetics review until growing well. Maintain malnutrition register and nutrition care plans. Contact details and address of patients. Follow up defaulting patients. Prevent readmissions"
    tags: ["malnutrition", "imam", "follow-up", "discharge", "rehabilitation-phase", "subject:paediatrics"]
  - guid: 1c822c52b01496c6
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 IMAM"
    fields:
      Front: "What lactose intolerance diagnostic criteria are used in SAM?"
      Back: "Intolerance should be diagnosed only if copious watery diarrhoea occurs promptly after milk-based feeds are begun, the diarrhoea clearly improves when milk intake is reduced or stopped, and it recurs when milk is given again. Other signs include acidic faeces (pH <5.0) and the presence of increased levels of reducing substances in the faeces"
    tags: ["malnutrition", "imam", "feeding", "lactose-intolerance", "stabilisation-phase", "subject:paediatrics"]
  - guid: 5eaee01ccff9ad54
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 IMAM"
    fields:
      Front: "What is the management of lactose intolerance in SAM?"
      Back: "Substitute with an extensively hydrolyzed feed. Reintroduce milk feeds gradually in the rehabilitation phase"
    tags: ["malnutrition", "imam", "feeding", "lactose-intolerance", "stabilisation-phase", "subject:paediatrics"]
  - guid: 7c7743f2b4e953af
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 IMAM"
    fields:
      Front: "What monitoring parameters are required during F75 feeding in SAM?"
      Back: "Monitor and note: Amounts offered and leftover. Vomiting. Reoffer vomited amount. Frequency of watery stool. Daily body weight. During the stabilisation phase, diarrhoea should gradually diminish and oedematous children should lose weight"
    tags: ["malnutrition", "imam", "feeding", "monitoring", "stabilisation-phase", "subject:paediatrics"]
  - guid: a11a8ee95625646c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 IMAM"
    fields:
      Front: "What is the normal weight gain target during SAM rehabilitation?"
      Back: "Moderate weight gain: >1-2 g/kg/day. This indicates good positive weight gain"
    tags: ["malnutrition", "imam", "weight-gain", "rehabilitation-phase", "subject:paediatrics"]
  - guid: 2b5a1986cc212350
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 IMAM"
    fields:
      Front: "What breastfeeding guidance is given for exclusively breastfed SAM infants <6 months?"
      Back: "If an exclusively breastfed baby is admitted as SAM, there is probably a problem with breastfeeding (low breastmilk supply/incorrect suck/latching) or the breastmilk is not enough to meet increased nutritional requirements. For these babies add F75 in addition to breastmilk regardless of HIV status. Calculate F75 as per stabilisation volume guidelines and breastfeed in-between"
    tags: ["malnutrition", "imam", "breastfeeding", "feeding", "stabilisation-phase", "subject:paediatrics"]
  - guid: 4b3fcbc7654c347f
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 IMAM"
    fields:
      Front: "What are the absolute contraindications to defer feeding in SAM?"
      Back: "Defer feeding immediately in following cases: While shock is being corrected. Surgical abdominal emergency"
    tags: ["malnutrition", "imam", "feeding", "stabilisation-phase", "subject:paediatrics"]
  - guid: 9c137ccc7e116941
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 IMAM"
    fields:
      Front: "What organs are at risk in SAM and what feeding principles protect them?"
      Back: "Heart: avoid excess fluid. Give the correct volume of feed. Kidneys: avoid excess fluid and excess sodium. Give the correct volume of feed and give a low sodium feed. Liver: avoid excess protein and provide adequate glucose. Give low protein feed, give sugary feed, feed frequently. Gut: avoid large meals. Give small amounts, feed frequently"
    tags: ["malnutrition", "imam", "feeding", "physiology", "stabilisation-phase", "subject:paediatrics"]
  - guid: 1d69160ba8bccf7a
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 IMAM"
    fields:
      Front: "What is the TB diagnostic approach in SAM?"
      Back: "Actively investigate for TB as soon as possible. TB is difficult to diagnose and confirm. Ask about contacts and symptoms. Do Tuberculin Skin Test (TST) and chest x-ray. If TST negative, repeat just before discharge. If TB is clinically likely, presumptive TB treatment is reasonable, but once begun should be completed"
    tags: ["malnutrition", "imam", "tuberculosis", "infection", "stabilisation-phase", "subject:paediatrics"]
  - guid: 9185928c6bebeb80
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 IMAM"
    fields:
      Front: "What is the HIV management in SAM?"
      Back: "Counsel mother/caregiver and test for HIV. Once the child enters the rehabilitation phase, commence ART as per provincial guidelines. HIV infected children with SAM should be closely monitored in the first 6-8 weeks of initiation of ART"
    tags: ["malnutrition", "imam", "HIV", "infection", "rehabilitation-phase", "subject:paediatrics"]
  - guid: 381caac850a5ef94
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 IMAM"
    fields:
      Front: "What sensory stimulation and development is promoted during SAM rehabilitation?"
      Back: "Aspects of child development to be promoted: Cognitive skills, Language skills, Motor skills, Exploratory skills, Social skills. All SAM patients must be referred to occupational therapy and speech therapy in the rehabilitation phase. All SAM patients must be referred to a social worker"
    tags: ["malnutrition", "imam", "rehabilitation", "development", "rehabilitation-phase", "subject:paediatrics"]
  - guid: 88a6ad5942d69a07
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 IMAM"
    fields:
      Front: "What special cases require continued inpatient care after rehabilitation phase in SAM?"
      Back: "Children remaining due to another medical condition. Unable to eat RUTF and ward diet. Social cases"
    tags: ["malnutrition", "imam", "discharge", "rehabilitation-phase", "subject:paediatrics"]
  - guid: ae699e7a3f4f43ba
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 IMAM"
    fields:
      Front: "What is SAM malnutrition classification (6-59 months)?"
      Back: "MUAC <11.5cm OR weight-for-height <-3 SD OR bilateral pitting oedema"
    tags: ["malnutrition", "imam", "classification", "MUAC", "WHZ", "subject:paediatrics"]
  - guid: 645b8715afee6bec
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 IMAM"
    fields:
      Front: "What is Moderate Acute Malnutrition (MAM) classification?"
      Back: "Either of the following: Weight-for-height/length -2 and >-3 SD, OR MUAC between 11.6 and 12.5cm"
    tags: ["malnutrition", "imam", "classification", "MUAC", "WHZ", "subject:paediatrics"]
  - guid: 7e62dd8f09ce6c3e
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 IMAM"
    fields:
      Front: "What SAM danger signs require immediate intervention?"
      Back: "Hypoglycaemia, Hypothermia, Hypovolaemia, Septic shock (severe sepsis), Severe dehydration (not in shock), Severe anaemia, Eye signs of Vitamin A deficiency"
    tags: ["malnutrition", "imam", "danger-signs", "stabilisation-phase", "subject:paediatrics"]
