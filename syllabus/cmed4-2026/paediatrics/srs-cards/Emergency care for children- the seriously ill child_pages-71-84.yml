notes:
  - guid: "a5h4d1f6b3c9a2e7"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::Emergency care - the seriously ill child"
    fields:
      Front: "What is capillary refill and what does a value >2 seconds indicate?"
      Back: "Capillary refill is the time it takes for colour to return to a fingernail or toe after pressing. A capillary refill >2 seconds indicates poor circulation/shock."
    tags: ["circulation", "capillary-refill", "shock", "subject:paediatrics"]

  - guid: "b7c2a8g5f1d3h4e9"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::Emergency care - the seriously ill child"
    fields:
      Front: "How do you perform a 'skin pinch test' for dehydration and what does the duration indicate?"
      Back: "Pinch the skin and observe how long it takes to return to normal. If it takes >2 seconds to return, it indicates moderate to severe dehydration."
    tags: ["dehydration", "skin-turgor", "assessment", "subject:paediatrics"]

  - guid: "c4f9e2d7a1b5c3g6"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::Emergency care - the seriously ill child"
    fields:
      Front: "What clinical findings suggest severe dehydration in a child with diarrhoea?"
      Back: "Lethargy or unconsciousness, sunken eyes, skin pinch that takes >2 seconds to return, weak or absent pulses, cold hands."
    tags: ["dehydration", "severe", "clinical-signs", "subject:paediatrics"]

  - guid: "d8b1a4h7c2f5d6g3"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::Emergency care - the seriously ill child"
    fields:
      Front: "What does severe pallor indicate and how should you assess it?"
      Back: "Severe pallor indicates severe anaemia. Compare the child's palm with the mother's palm to assess pallor (child's palm much paler than mother's)."
    tags: ["pallor", "anaemia", "assessment", "subject:paediatrics"]

  - guid: "e6d3g8a4b2f1c9h5"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::Emergency care - the seriously ill child"
    fields:
      Front: "What is Marasmus and how do you identify it?"
      Back: "Marasmus is severe wasting (malnutrition). Identify it by quickly looking at the child's arms, legs, and chest - the child appears very thin with minimal subcutaneous fat."
    tags: ["malnutrition", "marasmus", "assessment", "subject:paediatrics"]

  - guid: "f2e7b4c1a5g3h6d9"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::Emergency care - the seriously ill child"
    fields:
      Front: "What is Kwashiorkor and what are its signs?"
      Back: "Kwashiorkor is protein malnutrition characterized by oedema of both feet, with or without hair and skin changes. The child may have a swollen face (moon face) and hair colour changes."
    tags: ["malnutrition", "kwashiorkor", "oedema", "subject:paediatrics"]

  - guid: "g9a3f5d2h1b4c7e8"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::Emergency care - the seriously ill child"
    fields:
      Front: "Why might oedema in both feet indicate serious systemic disease in a child?"
      Back: "Bilateral foot oedema can indicate heart failure (cardiac cause), kidney problems (nephrotic syndrome), liver problems (hepatic dysfunction), or nutritional deficiencies (Kwashiorkor)."
    tags: ["oedema", "systemic-disease", "assessment", "subject:paediatrics"]

  - guid: "h1c6e3a8f9d4b2g5"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::Emergency care - the seriously ill child"
    fields:
      Front: "What is stridor and what does it indicate?"
      Back: "Stridor is a high-pitched, musical breathing sound heard without a stethoscope, usually during inspiration. It indicates partial airway obstruction in the upper airway (e.g., croup, epiglottitis, foreign body)."
    tags: ["stridor", "airway-obstruction", "breathing", "subject:paediatrics"]

  - guid: "i5g2h9c4a1f7d3b8"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::Emergency care - the seriously ill child"
    fields:
      Front: "What is grunting and what physiologically causes it?"
      Back: "Grunting is a groaning sound heard at the end of expiration. It occurs as the child attempts to maintain positive end-expiratory pressure to keep alveoli open, indicating severe respiratory effort."
    tags: ["grunting", "respiratory-distress", "breathing", "subject:paediatrics"]

  - guid: "j7d5a2c8b9e1h3f4"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::Emergency care - the seriously ill child"
    fields:
      Front: "What is chest wall indrawing and why does it occur?"
      Back: "Chest wall indrawing (also called intercostal, substernal, or suprasternal indrawing) occurs when the chest wall is drawn in during inspiration. It indicates increased work of breathing due to airway obstruction or reduced lung compliance."
    tags: ["chest-indrawing", "respiratory-distress", "breathing", "subject:paediatrics"]

  - guid: "k4b8f1a6d3c5h2e9"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::Emergency care - the seriously ill child"
    fields:
      Front: "How do you assess if a child has cyanosis (blueness)?"
      Back: "Look for blue discoloration of the lips, tongue, and peripheral extremities. Central cyanosis (blueness at lips/tongue) indicates more serious oxygenation problems than peripheral cyanosis (fingers/toes only)."
    tags: ["cyanosis", "oxygenation", "assessment", "subject:paediatrics"]

  - guid: "l3a9e2f4g7c1b5d8"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::Emergency care - the seriously ill child"
    fields:
      Front: "What is the significance of a child being 'floppy' or hypotonic?"
      Back: "Floppiness (decreased muscle tone) in a seriously ill child indicates severe systemic illness, shock, severe infection, or neurological compromise. It is an emergency sign."
    tags: ["muscle-tone", "emergency-signs", "assessment", "subject:paediatrics"]

  - guid: "m6h3c5d1a4f8b2e7"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::Emergency care - the seriously ill child"
    fields:
      Front: "What emergency conditions should be considered in a child presenting with severe respiratory distress?"
      Back: "Pneumonia, bronchiolitis, asthma, croup, epiglottitis, foreign body aspiration, pulmonary oedema (heart failure), pneumothorax, or any condition causing airway obstruction or reduced lung compliance."
    tags: ["respiratory-distress", "differential-diagnosis", "emergency", "subject:paediatrics"]

  - guid: "n8f1e5a3g2d9c4h6"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::Emergency care - the seriously ill child"
    fields:
      Front: "What emergency conditions should be considered in a child presenting in shock?"
      Back: "Septic shock (infection/meningitis), hypovolaemic shock (diarrhoea, bleeding), cardiogenic shock (heart failure), anaphylactic shock, or fluid maldistribution conditions."
    tags: ["shock", "differential-diagnosis", "emergency", "subject:paediatrics"]

  - guid: "o2d7b4h5a1f3c9e6"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::Emergency care - the seriously ill child"
    fields:
      Front: "What clinical signs indicate a child is in compensated shock?"
      Back: "Cold hands, cold feet, delayed capillary refill (>2 seconds), weak pulses, pale skin, but still alert and perfusing vital organs adequately."
    tags: ["shock", "compensated", "assessment", "subject:paediatrics"]

  - guid: "p5c3f9a2e7b1d4g8"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::Emergency care - the seriously ill child"
    fields:
      Front: "What clinical signs indicate a child is in decompensated shock?"
      Back: "All signs of compensated shock PLUS altered consciousness (P or U on AVPU), severe hypotension, absent pulses, severe bradycardia, or cardiac arrest."
    tags: ["shock", "decompensated", "assessment", "subject:paediatrics"]

  - guid: "q4g8d2a6c1f5h3b9"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::Emergency care - the seriously ill child"
    fields:
      Front: "When should emergency treatment be initiated in a triaged child?"
      Back: "Emergency treatment should be initiated immediately if the child has ANY sign of ABCC-C-D (airway, breathing, circulation, coma, convulsion, dehydration) or other life-threatening conditions - do not wait."
    tags: ["emergency-treatment", "timing", "resuscitation", "subject:paediatrics"]

  - guid: "r9e1b7f3a5c2h4d6"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::Emergency care - the seriously ill child"
    fields:
      Front: "What are the essential actions immediately after identifying an emergency child?"
      Back: "1. Secure airway (open airway, position, clear secretions)\n2. Provide oxygen/ventilation\n3. Establish IV access and begin fluid resuscitation\n4. Monitor continuously\n5. Initiate specific emergency care (medications, etc.)\n6. Arrange transport to higher level care if needed"
    tags: ["emergency-treatment", "resuscitation", "management", "subject:paediatrics"]

  - guid: "s3f4a1h6d8c5b9e2"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::Emergency care - the seriously ill child"
    fields:
      Front: "What equipment and supplies should be immediately available in the emergency treatment area?"
      Back: "Oxygen delivery equipment, airway management equipment (oral airways, bag-mask ventilation), IV catheters and fluids, medications for resuscitation (adrenaline, glucose, antibiotics), monitoring equipment (pulse oximeter, blood pressure cuff), and emergency drugs."
    tags: ["equipment", "emergency-area", "resuscitation", "subject:paediatrics"]

  - guid: "t6b2c9a4g1f7d3e5"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::Emergency care - the seriously ill child"
    fields:
      Front: "What is the importance of rapid stabilisation and transport in emergency paediatric care?"
      Back: "Rapid stabilisation and transport to definitive care (secondary/tertiary hospital) reduces mortality and morbidity. Delays in transport lead to worse outcomes in seriously ill children."
    tags: ["transport", "stabilisation", "care-provision", "subject:paediatrics"]
