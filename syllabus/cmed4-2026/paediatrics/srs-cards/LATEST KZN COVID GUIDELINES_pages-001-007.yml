# Anki canonical export - paediatrics / LATEST KZN COVID GUIDELINES
# Generated by gm:textprocessing
deck: "Corpus::Paediatrics::LATEST KZN COVID GUIDELINES"
notes:
  - guid: a1b2c3d4e5f6g7h8
    noteType: Basic
    deck: "Corpus::Paediatrics::LATEST KZN COVID GUIDELINES"
    fields:
      Front: "What are the three principle changes to the management of paediatric COVID-19?"
      Back: "1. Screening - COVID-19 screening should be incorporated into general screening for TB, HIV, development and nutritional status. 2. Testing - Routine testing of all children requiring admission is NOT recommended; targeted testing of symptomatic children is required. 3. Ward layout - children's wards no longer need to be compartmentalised into non-COVID, COVID and PUI sections."
    tags: ["covid-19", "screening", "testing", "ward-management", "subject:paediatrics"]

  - guid: b2c3d4e5f6g7h8i9
    noteType: Basic
    deck: "Corpus::Paediatrics::LATEST KZN COVID GUIDELINES"
    fields:
      Front: "What isolation precautions are required for children with suspected COVID-19?"
      Back: "Isolate in a side ward, implement strict IPC (infection prevention and control) precautions. Staff require a mask for routine care but a N95 mask, apron and shield for aerosol generating procedures."
    tags: ["covid-19", "isolation", "infection-control", "subject:paediatrics"]

  - guid: c3d4e5f6g7h8i9j0
    noteType: Basic
    deck: "Corpus::Paediatrics::LATEST KZN COVID GUIDELINES"
    fields:
      Front: "What age group should receive a surgical mask and at which screening stage?"
      Back: "Children over 2 years old, plus their caregiver, should be given a surgical mask following a positive respiratory screen during triage."
    tags: ["covid-19", "screening", "triage", "personal-protective-equipment", "subject:paediatrics"]

  - guid: d4e5f6g7h8i9j0k1
    noteType: Basic
    deck: "Corpus::Paediatrics::LATEST KZN COVID GUIDELINES"
    fields:
      Front: "What social distancing distance is recommended for children with respiratory symptoms?"
      Back: "1-2 meters. Children should remain within their designated space."
    tags: ["covid-19", "infection-control", "triage", "subject:paediatrics"]

  - guid: e5f6g7h8i9j0k1l2
    noteType: Basic
    deck: "Corpus::Paediatrics::LATEST KZN COVID GUIDELINES"
    fields:
      Front: "What symptoms in the preceding 14 days warrant COVID-19 screening?"
      Back: "Fever/high temperature, cough, difficulty breathing, or sore throat."
    tags: ["covid-19", "screening", "symptoms", "subject:paediatrics"]

  - guid: f6g7h8i9j0k1l2m3
    noteType: Basic
    deck: "Corpus::Paediatrics::LATEST KZN COVID GUIDELINES"
    fields:
      Front: "Should routine SARS-CoV-2 testing be performed on asymptomatic patients?"
      Back: "No. Routine SARS-CoV-2 testing for asymptomatic patients is not recommended."
    tags: ["covid-19", "testing", "subject:paediatrics"]

  - guid: g7h8i9j0k1l2m3n4
    noteType: Basic
    deck: "Corpus::Paediatrics::LATEST KZN COVID GUIDELINES"
    fields:
      Front: "What are the indications for COVID-19 testing in children requiring admission?"
      Back: "Children with suspected COVID-19 who require admission and have severe pneumonia, MIS-C, or other suspected COVID-19 related disease."
    tags: ["covid-19", "testing", "admission", "subject:paediatrics"]

  - guid: h8i9j0k1l2m3n4o5
    noteType: Basic
    deck: "Corpus::Paediatrics::LATEST KZN COVID GUIDELINES"
    fields:
      Front: "What test is used for COVID-19 diagnosis?"
      Back: "SARS-CoV-2 PCR."
    tags: ["covid-19", "testing", "diagnostics", "subject:paediatrics"]

  - guid: i9j0k1l2m3n4o5p6
    noteType: Basic
    deck: "Corpus::Paediatrics::LATEST KZN COVID GUIDELINES"
    fields:
      Front: "How is a suspected COVID-19 case defined (acute duration)?"
      Back: "A suspected COVID-19 case includes any person presenting with an acute (≤14 days) respiratory tract infection or other clinical illness compatible with COVID-19, or an asymptomatic person who is a close contact to a confirmed case."
    tags: ["covid-19", "case-definition", "subject:paediatrics"]

  - guid: j0k1l2m3n4o5p6q7
    noteType: Basic
    deck: "Corpus::Paediatrics::LATEST KZN COVID GUIDELINES"
    fields:
      Front: "What key respiratory symptoms are included in the COVID-19 case definition?"
      Back: "Cough, sore throat, shortness of breath, anosmia (loss of smell) or dysgeusia (loss of taste), with or without other symptoms (which may include fever, weakness, myalgia, or diarrhoea)."
    tags: ["covid-19", "case-definition", "symptoms", "subject:paediatrics"]

  - guid: k1l2m3n4o5p6q7r8
    noteType: Basic
    deck: "Corpus::Paediatrics::LATEST KZN COVID GUIDELINES"
    fields:
      Front: "What is MIS-C also known as?"
      Back: "PIMS-TS or Kawasaki-like syndrome."
    tags: ["covid-19", "mis-c", "synonyms", "subject:paediatrics"]

  - guid: l2m3n4o5p6q7r8s9
    noteType: Basic
    deck: "Corpus::Paediatrics::LATEST KZN COVID GUIDELINES"
    fields:
      Front: "When does MIS-C typically occur in relation to acute COVID-19?"
      Back: "After resolution of acute COVID-19."
    tags: ["covid-19", "mis-c", "timing", "subject:paediatrics"]

  - guid: m3n4o5p6q7r8s9t0
    noteType: Basic
    deck: "Corpus::Paediatrics::LATEST KZN COVID GUIDELINES"
    fields:
      Front: "What is the age range for MIS-C according to WHO case definition?"
      Back: "0-19 years of age (children and adolescents)."
    tags: ["covid-19", "mis-c", "age-group", "subject:paediatrics"]

  - guid: n4o5p6q7r8s9t0u1
    noteType: Basic
    deck: "Corpus::Paediatrics::LATEST KZN COVID GUIDELINES"
    fields:
      Front: "What is the first criterion for MIS-C diagnosis?"
      Back: "Fever for more than three days."
    tags: ["covid-19", "mis-c", "diagnostic-criteria", "subject:paediatrics"]

  - guid: o5p6q7r8s9t0u1v2
    noteType: Basic
    deck: "Corpus::Paediatrics::LATEST KZN COVID GUIDELINES"
    fields:
      Front: "What are the systemic manifestations of MIS-C? (List TWO of the following required)"
      Back: "1. Rash or bilateral non-purulent conjunctivitis or muco-cutaneous inflammation signs (oral, hands or feet). 2. Hypotension or shock. 3. Features of myocardial dysfunction, pericarditis, valvulitis, or coronary abnormalities (echo findings or elevated Troponin). 4. Evidence of coagulopathy (abnormal PT, PTT, elevated d-Dimers). 5. Acute gastrointestinal problems (diarrhea, vomiting or abdominal pain)."
    tags: ["covid-19", "mis-c", "diagnostic-criteria", "subject:paediatrics"]

  - guid: p6q7r8s9t0u1v2w3
    noteType: Basic
    deck: "Corpus::Paediatrics::LATEST KZN COVID GUIDELINES"
    fields:
      Front: "What inflammatory markers must be elevated for MIS-C diagnosis?"
      Back: "ESR, C-reactive protein, or procalcitonin."
    tags: ["covid-19", "mis-c", "diagnostic-criteria", "inflammatory-markers", "subject:paediatrics"]

  - guid: q7r8s9t0u1v2w3x4
    noteType: Basic
    deck: "Corpus::Paediatrics::LATEST KZN COVID GUIDELINES"
    fields:
      Front: "What must be excluded to diagnose MIS-C?"
      Back: "No other obvious microbial cause for inflammation, including bacterial sepsis, staphylococcal or streptococcal shock syndromes."
    tags: ["covid-19", "mis-c", "differential-diagnosis", "subject:paediatrics"]

  - guid: r8s9t0u1v2w3x4y5
    noteType: Basic
    deck: "Corpus::Paediatrics::LATEST KZN COVID GUIDELINES"
    fields:
      Front: "What evidence of COVID is required for MIS-C diagnosis?"
      Back: "RT-PCR, antigen test or serology positive (when available), or likely patients with COVID."
    tags: ["covid-19", "mis-c", "diagnostic-criteria", "testing", "subject:paediatrics"]

  - guid: s9t0u1v2w3x4y5z6
    noteType: Basic
    deck: "Corpus::Paediatrics::LATEST KZN COVID GUIDELINES"
    fields:
      Front: "What is the recommended management for mild COVID-19 disease?"
      Back: "Provide symptomatic treatment at home/isolation facility. Provide caregiver with patient information pamphlet. Implement suitable infection prevention and control practices. Special investigations and imaging are not routinely indicated. There is limited evidence to support routine micronutrient or vitamin supplementation."
    tags: ["covid-19", "mild-disease", "management", "subject:paediatrics"]

  - guid: t0u1v2w3x4y5z6a7
    noteType: Basic
    deck: "Corpus::Paediatrics::LATEST KZN COVID GUIDELINES"
    fields:
      Front: "Are steroids recommended routinely for mild COVID-19 disease?"
      Back: "Routine use of steroids may be potentially harmful in children with mild disease, but should be considered if indicated for the management of non-COVID-19 disease (e.g., asthma or laryngotracheo-bronchitis)."
    tags: ["covid-19", "mild-disease", "steroids", "subject:paediatrics"]

  - guid: u1v2w3x4y5z6a7b8
    noteType: Basic
    deck: "Corpus::Paediatrics::LATEST KZN COVID GUIDELINES"
    fields:
      Front: "Where should children with moderate/severe COVID-19 be admitted?"
      Back: "Children's ward isolation cubicle/side ward for supportive in-patient care. Every hospital needs to establish an isolation cubicle for respiratory cases."
    tags: ["covid-19", "severe-disease", "admission", "isolation", "subject:paediatrics"]

  - guid: v2w3x4y5z6a7b8c9
    noteType: Basic
    deck: "Corpus::Paediatrics::LATEST KZN COVID GUIDELINES"
    fields:
      Front: "What is the target oxygen saturation for moderate/severe COVID-19?"
      Back: "Maintain oxygen saturation (SpO2) level > 92%."
    tags: ["covid-19", "severe-disease", "oxygen-therapy", "subject:paediatrics"]

  - guid: w3x4y5z6a7b8c9d0
    noteType: Basic
    deck: "Corpus::Paediatrics::LATEST KZN COVID GUIDELINES"
    fields:
      Front: "What is the oxygen therapy ladder for SpO2 management? Step 1"
      Back: "If unable to maintain SpO2 > 92% in room air, add nasal prong oxygen (NPO2) at 2 l/min."
    tags: ["covid-19", "severe-disease", "oxygen-therapy", "subject:paediatrics"]

  - guid: x4y5z6a7b8c9d0e1
    noteType: Basic
    deck: "Corpus::Paediatrics::LATEST KZN COVID GUIDELINES"
    fields:
      Front: "What is the oxygen therapy ladder for SpO2 management? Step 2"
      Back: "If unable to maintain SpO2 > 92% in NPO2 at 2 l/min, change to 40% face mask (pink) oxygen at 8 l/min."
    tags: ["covid-19", "severe-disease", "oxygen-therapy", "subject:paediatrics"]

  - guid: y5z6a7b8c9d0e1f2
    noteType: Basic
    deck: "Corpus::Paediatrics::LATEST KZN COVID GUIDELINES"
    fields:
      Front: "What is the oxygen therapy ladder for SpO2 management? Step 3"
      Back: "If unable to maintain SpO2 > 92% in 40% face mask (pink) oxygen at 8 l/min, change to 60% face mask (orange) at 10 l/min."
    tags: ["covid-19", "severe-disease", "oxygen-therapy", "subject:paediatrics"]

  - guid: z6a7b8c9d0e1f2g3
    noteType: Basic
    deck: "Corpus::Paediatrics::LATEST KZN COVID GUIDELINES"
    fields:
      Front: "What is the oxygen therapy ladder for SpO2 management? Step 4"
      Back: "If unable to maintain SpO2 > 92% in 60% face mask oxygen at 10 l/min, change to face mask oxygen with reservoir bag (non-rebreather face mask) at 15 l/min AND contact local regional hospital/PICU."
    tags: ["covid-19", "severe-disease", "oxygen-therapy", "subject:paediatrics"]

  - guid: a7b8c9d0e1f2g3h4
    noteType: Basic
    deck: "Corpus::Paediatrics::LATEST KZN COVID GUIDELINES"
    fields:
      Front: "What is the oxygen therapy ladder for SpO2 management? Step 5"
      Back: "If unable to maintain SpO2 > 92% in face mask oxygen with reservoir bag (non-rebreather face mask) at 15 l/min, consider high flow humidified nasal canula (HFNC) subject to appropriate facilities AND contact local regional hospital/PICU."
    tags: ["covid-19", "severe-disease", "oxygen-therapy", "hfnc", "subject:paediatrics"]

  - guid: b8c9d0e1f2g3h4i5
    noteType: Basic
    deck: "Corpus::Paediatrics::LATEST KZN COVID GUIDELINES"
    fields:
      Front: "What antibiotic is recommended for suspected co-infection in COVID-19?"
      Back: "Amoxicillin 45 mg/kg/dose 12 hourly per os for 5 days; OR Ampicillin 50 mg/kg/dose IVI 6 hourly; (AND Gentamicin 6 mg/kg IVI daily for 5-10 days if indicated)."
    tags: ["covid-19", "antibiotics", "co-infection", "subject:paediatrics"]

  - guid: c9d0e1f2g3h4i5j6
    noteType: Basic
    deck: "Corpus::Paediatrics::LATEST KZN COVID GUIDELINES"
    fields:
      Front: "Under what conditions should steroids be used in COVID-19?"
      Back: "Only in consultation with the local paediatrician/regional hospital. In children with confirmed COVID-19 positive who need nasal prong oxygen (NPO2)."
    tags: ["covid-19", "steroids", "subject:paediatrics"]

  - guid: d0e1f2g3h4i5j6k7
    noteType: Basic
    deck: "Corpus::Paediatrics::LATEST KZN COVID GUIDELINES"
    fields:
      Front: "What is the dose and duration for Dexamethasone in COVID-19?"
      Back: "0.15 mg/kg daily IVI for 10 days."
    tags: ["covid-19", "steroids", "dexamethasone", "dosing", "subject:paediatrics"]

  - guid: e1f2g3h4i5j6k7l8
    noteType: Basic
    deck: "Corpus::Paediatrics::LATEST KZN COVID GUIDELINES"
    fields:
      Front: "What is the dose and duration for Hydrocortisone in COVID-19?"
      Back: "1-2 mg/kg/dose 6 hourly IVI for 10 days."
    tags: ["covid-19", "steroids", "hydrocortisone", "dosing", "subject:paediatrics"]

  - guid: f2g3h4i5j6k7l8m9
    noteType: Basic
    deck: "Corpus::Paediatrics::LATEST KZN COVID GUIDELINES"
    fields:
      Front: "What is the dose and duration for Prednisone in COVID-19?"
      Back: "1 mg/kg daily per os for 10 days."
    tags: ["covid-19", "steroids", "prednisone", "dosing", "subject:paediatrics"]

  - guid: g3h4i5j6k7l8m9n0
    noteType: Basic
    deck: "Corpus::Paediatrics::LATEST KZN COVID GUIDELINES"
    fields:
      Front: "Is Remdesivir recommended for use in children with COVID-19?"
      Back: "No. Remdesivir is not for use in children until more information is available on its value at this age."
    tags: ["covid-19", "antiviral", "contraindication", "subject:paediatrics"]

  - guid: h4i5j6k7l8m9n0o1
    noteType: Basic
    deck: "Corpus::Paediatrics::LATEST KZN COVID GUIDELINES"
    fields:
      Front: "Should nebulisers be used in COVID-19? What is the alternative?"
      Back: "If nebulisers are necessary, use a metered-dose inhaler (MDI) with a spacer instead."
    tags: ["covid-19", "respiratory-management", "equipment", "subject:paediatrics"]

  - guid: i5j6k7l8m9n0o1p2
    noteType: Basic
    deck: "Corpus::Paediatrics::LATEST KZN COVID GUIDELINES"
    fields:
      Front: "What FBC findings are expected in COVID-19?"
      Back: "Neutrophils, lymphocytes and platelet count - normal or reduced. Reduced neutrophils/lymphocyte count. Reversal of neutrophil:lymphocyte ratio (age dependent)."
    tags: ["covid-19", "investigations", "fbc", "subject:paediatrics"]

  - guid: j6k7l8m9n0o1p2q3
    noteType: Basic
    deck: "Corpus::Paediatrics::LATEST KZN COVID GUIDELINES"
    fields:
      Front: "What are the CRP findings in COVID-19?"
      Back: "Normal or high in severe disease."
    tags: ["covid-19", "investigations", "inflammatory-markers", "subject:paediatrics"]

  - guid: k7l8m9n0o1p2q3r4
    noteType: Basic
    deck: "Corpus::Paediatrics::LATEST KZN COVID GUIDELINES"
    fields:
      Front: "What are the Procalcitonin (PCT) findings in COVID-19?"
      Back: "Normal or low. If high, consider bacterial co-infection."
    tags: ["covid-19", "investigations", "inflammatory-markers", "subject:paediatrics"]

  - guid: l8m9n0o1p2q3r4s5
    noteType: Basic
    deck: "Corpus::Paediatrics::LATEST KZN COVID GUIDELINES"
    fields:
      Front: "What are the LDH findings in COVID-19?"
      Back: "May be elevated in severe disease."
    tags: ["covid-19", "investigations", "liver-enzymes", "subject:paediatrics"]

  - guid: m9n0o1p2q3r4s5t6
    noteType: Basic
    deck: "Corpus::Paediatrics::LATEST KZN COVID GUIDELINES"
    fields:
      Front: "What are the coagulation profile findings in COVID-19?"
      Back: "INR/APTT - prolonged. D-dimers - increased in severe disease."
    tags: ["covid-19", "investigations", "coagulation", "subject:paediatrics"]

  - guid: n0o1p2q3r4s5t6u7
    noteType: Basic
    deck: "Corpus::Paediatrics::LATEST KZN COVID GUIDELINES"
    fields:
      Front: "What are the typical chest X-ray findings in COVID-19?"
      Back: "Bilateral patchy nodular/speckled ground glass opacities. Other patterns have been described."
    tags: ["covid-19", "investigations", "radiology", "subject:paediatrics"]

  - guid: o1p2q3r4s5t6u7v8
    noteType: Basic
    deck: "Corpus::Paediatrics::LATEST KZN COVID GUIDELINES"
    fields:
      Front: "What dilution of detergent/disinfectant solution is recommended for equipment decontamination?"
      Back: "1000 parts per million (ppm)."
    tags: ["covid-19", "infection-control", "decontamination", "subject:paediatrics"]

  - guid: p2q3r4s5t6u7v8w9
    noteType: Basic
    deck: "Corpus::Paediatrics::LATEST KZN COVID GUIDELINES"
    fields:
      Front: "What PPE should healthcare workers wear for routine care of COVID-19 patients?"
      Back: "Surgical masks, aprons and +/- visors."
    tags: ["covid-19", "infection-control", "ppe", "subject:paediatrics"]

  - guid: q3r4s5t6u7v8w9x0
    noteType: Basic
    deck: "Corpus::Paediatrics::LATEST KZN COVID GUIDELINES"
    fields:
      Front: "What PPE should healthcare workers wear for aerosol-generating procedures in COVID-19?"
      Back: "N95 mask and visor."
    tags: ["covid-19", "infection-control", "ppe", "aerosol-procedures", "subject:paediatrics"]

  - guid: r4s5t6u7v8w9x0y1
    noteType: Basic
    deck: "Corpus::Paediatrics::LATEST KZN COVID GUIDELINES"
    fields:
      Front: "What should be done before prescribing steroids for COVID-19?"
      Back: "The paediatric department of the local regional hospital must be consulted."
    tags: ["covid-19", "steroids", "referral", "subject:paediatrics"]

  - guid: s5t6u7v8w9x0y1z2
    noteType: Basic
    deck: "Corpus::Paediatrics::LATEST KZN COVID GUIDELINES"
    fields:
      Front: "When should a regional hospital be consulted regarding oxygen requirements?"
      Back: "When the child requires ≥40% oxygen to maintain SpO2 above 92%."
    tags: ["covid-19", "referral", "oxygen-therapy", "subject:paediatrics"]

  - guid: t6u7v8w9x0y1z2a3
    noteType: Basic
    deck: "Corpus::Paediatrics::LATEST KZN COVID GUIDELINES"
    fields:
      Front: "When should a regional hospital be consulted if the child's condition destabilizes?"
      Back: "Immediately. If the child's condition destabilizes, the paediatric department must be consulted."
    tags: ["covid-19", "referral", "subject:paediatrics"]

  - guid: u7v8w9x0y1z2a3b4
    noteType: Basic
    deck: "Corpus::Paediatrics::LATEST KZN COVID GUIDELINES"
    fields:
      Front: "When should a regional hospital be consulted regarding MIS-C?"
      Back: "If the child meets the criteria for Multi-system Inflammatory Syndrome in Children (MIS-C) associated with COVID-19."
    tags: ["covid-19", "referral", "mis-c", "subject:paediatrics"]

  - guid: v8w9x0y1z2a3b4c5
    noteType: Basic
    deck: "Corpus::Paediatrics::LATEST KZN COVID GUIDELINES"
    fields:
      Front: "What is the KZN Provincial Paediatric COVID-19 Hotline number?"
      Back: "0800 006603."
    tags: ["covid-19", "resources", "contact-information", "subject:paediatrics"]

  - guid: w9x0y1z2a3b4c5d6
    noteType: Basic
    deck: "Corpus::Paediatrics::LATEST KZN COVID GUIDELINES"
    fields:
      Front: "When can children be discharged from hospital with COVID-19?"
      Back: "Children can be discharged from hospital once they no longer require supplementary oxygen."
    tags: ["covid-19", "discharge", "subject:paediatrics"]

  - guid: x0y1z2a3b4c5d6e7
    noteType: Basic
    deck: "Corpus::Paediatrics::LATEST KZN COVID GUIDELINES"
    fields:
      Front: "When can children with mild COVID-19 be de-isolated?"
      Back: "7 days from onset of symptoms."
    tags: ["covid-19", "isolation", "discharge", "subject:paediatrics"]

  - guid: y1z2a3b4c5d6e7f8
    noteType: Basic
    deck: "Corpus::Paediatrics::LATEST KZN COVID GUIDELINES"
    fields:
      Front: "When can children with moderate/severe COVID-19 be de-isolated?"
      Back: "7 days after they are clinically stable (i.e., cessation of O2)."
    tags: ["covid-19", "isolation", "discharge", "subject:paediatrics"]

  - guid: z2a3b4c5d6e7f8g9
    noteType: Basic
    deck: "Corpus::Paediatrics::LATEST KZN COVID GUIDELINES"
    fields:
      Front: "What is the dominant SARS-CoV-2 variant in 2022 mentioned in guidelines?"
      Back: "Sub-variants of the Omicron (B.1.1.529)."
    tags: ["covid-19", "epidemiology", "variants", "subject:paediatrics"]

  - guid: a3b4c5d6e7f8g9h0
    noteType: Basic
    deck: "Corpus::Paediatrics::LATEST KZN COVID GUIDELINES"
    fields:
      Front: "What should be reviewed before discharging a child with COVID-19?"
      Back: "Ensure holistic care and review the immunization, nutritional, HIV and TB risk status of the child."
    tags: ["covid-19", "discharge", "assessment", "subject:paediatrics"]

  - guid: b4c5d6e7f8g9h0i1
    noteType: Basic
    deck: "Corpus::Paediatrics::LATEST KZN COVID GUIDELINES"
    fields:
      Front: "What is an important consideration regarding steroid use in children with other respiratory infections?"
      Back: "There is increased morbidity associated with steroid use in children with influenza and bronchiolitis."
    tags: ["covid-19", "steroids", "caution", "subject:paediatrics"]

  - guid: c5d6e7f8g9h0i1j2
    noteType: Basic
    deck: "Corpus::Paediatrics::LATEST KZN COVID GUIDELINES"
    fields:
      Front: "What should be done for patients with excessive cough and sputum production?"
      Back: "Patients with excessive cough and sputum production should be prioritized for placement in a single room and must don masks."
    tags: ["covid-19", "triage", "isolation", "subject:paediatrics"]

  - guid: d6e7f8g9h0i1j2k3
    noteType: Basic
    deck: "Corpus::Paediatrics::LATEST KZN COVID GUIDELINES"
    fields:
      Front: "What recommendations are made for cough hygiene?"
      Back: "Cover the nose and mouth with tissue or crook of the arm when sneezing, coughing, wiping and blowing of nose."
    tags: ["covid-19", "infection-control", "hygiene", "subject:paediatrics"]

  - guid: e7f8g9h0i1j2k3l4
    noteType: Basic
    deck: "Corpus::Paediatrics::LATEST KZN COVID GUIDELINES"
    fields:
      Front: "What hand hygiene measures are recommended?"
      Back: "Wash hands and keep contaminated hands away from eyes, nose and mouth."
    tags: ["covid-19", "infection-control", "hygiene", "subject:paediatrics"]
