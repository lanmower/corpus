    fields:
      Front: "What are the standards for writing the History section of a portfolio case?"
      Back: "Detailed history according to BASIC templates and guidelines. Not a fixed template (e.g., use SAM in neonates). Use own words. Include relevant information showing thought process. Note problems at time of seeing patient. Old/resolved problems noted briefly in 'previous medical history'. No long sentences."
    tags: ["history-section", "subject:paediatrics", "clinical-writing"]

