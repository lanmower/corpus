notes:
  - guid: j2m8q1r0l9n3o5p6
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 MANAGEMENT OF SEIZURES"
    fields:
      Front: "What seizure types does phenobarbital treat?"
      Back: "Phenobarbital is used for generalized and focal seizures."
    tags: ["subject:paediatrics", "seizures", "medications", "phenobarbital"]
  - guid: k3n9r2s1m0o4p6q7
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 MANAGEMENT OF SEIZURES"
    fields:
      Front: "Why is phenobarbital difficult to use in modern clinical practice?"
      Back: "Its sedating properties make it difficult to use in the modern clinical realm."
    tags: ["subject:paediatrics", "seizures", "medications", "phenobarbital", "adverse-effects"]
  - guid: l4o0s3t2n1p5q7r8
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 MANAGEMENT OF SEIZURES"
    fields:
      Front: "What is the mechanism of action of phenobarbital?"
      Back: "Phenobarbital is a barbiturate that binds to the GABA-A receptor, prolonging its open state to allow for more chloride influx and consequent cellular hyperpolarization."
    tags: ["subject:paediatrics", "seizures", "medications", "phenobarbital", "mechanism-of-action"]
  - guid: m5p1t4u3o2q6r8s9
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 MANAGEMENT OF SEIZURES"
    fields:
      Front: "What is a major clinical consequence of phenobarbital's CYP system interaction?"
      Back: "Phenobarbital is a potent inducer of the CYP system and thus can decrease serum levels of other drugs metabolized by this pathway."
    tags: ["subject:paediatrics", "seizures", "medications", "phenobarbital", "drug-interactions"]
  - guid: n6q2u5v4p3r7s9t0
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 MANAGEMENT OF SEIZURES"
    fields:
      Front: "What seizure types does carbamazepine (CBZ) treat?"
      Back: "Carbamazepine is used for focal and generalized seizures. It is also used for patients with bipolar disorder and trigeminal neuralgia."
    tags: ["subject:paediatrics", "seizures", "medications", "carbamazepine"]
  - guid: o7r3v6w5q4s8t0u1
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 MANAGEMENT OF SEIZURES"
    fields:
      Front: "What is the mechanism of action of carbamazepine?"
      Back: "Carbamazepine inhibits voltage-gated sodium channels, reducing neuronal firing."
    tags: ["subject:paediatrics", "seizures", "medications", "carbamazepine", "mechanism-of-action"]
  - guid: p8s4w7x6r5t9u1v2
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 MANAGEMENT OF SEIZURES"
    fields:
      Front: "How is carbamazepine metabolized and what is the clinical consequence?"
      Back: "Carbamazepine is metabolized by the cytochrome P450 system and is a strong inducer of these hepatic enzymes, leading to decreased levels of other drugs."
    tags: ["subject:paediatrics", "seizures", "medications", "carbamazepine", "drug-interactions"]
  - guid: q9t5x8y7s6u0v2w3
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 MANAGEMENT OF SEIZURES"
    fields:
      Front: "List common side effects of carbamazepine."
      Back: "Gastrointestinal upset, hyponatremia, rash, itch, drowsiness, dizziness, blurred vision, and headache."
    tags: ["subject:paediatrics", "seizures", "medications", "carbamazepine", "adverse-effects"]
  - guid: r0u6y9z8t7v1w3x4
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 MANAGEMENT OF SEIZURES"
    fields:
      Front: "List rare but dangerous side effects of carbamazepine."
      Back: "Stevens-Johnson syndrome, toxic epidermal necrolysis, leukopenia, and aplastic anemia (pancytopenia)."
    tags: ["subject:paediatrics", "seizures", "medications", "carbamazepine", "serious-adverse-effects"]
  - guid: s1v7z0a9u8w2x4y5
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 MANAGEMENT OF SEIZURES"
    fields:
      Front: "What seizure types does valproate (VPA) treat?"
      Back: "Valproate is a broad spectrum medication used to treat both focal and generalized seizures."
    tags: ["subject:paediatrics", "seizures", "medications", "valproate"]
  - guid: t2w8a1b0v9x3y5z6
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 MANAGEMENT OF SEIZURES"
    fields:
      Front: "List the three main mechanisms of action of valproate."
      Back: "Voltage-gated sodium channel inhibition, augmentation of GABA concentrations, and mild inhibition of T-type calcium currents (but not to the extent of ethosuximide)."
    tags: ["subject:paediatrics", "seizures", "medications", "valproate", "mechanism-of-action"]
  - guid: u3x9b2c1w0y4z6a7
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 MANAGEMENT OF SEIZURES"
    fields:
      Front: "How is valproate metabolized and what is the clinical consequence?"
      Back: "Valproate is metabolized by the liver and is an inhibitor of CYP enzymes, so it must be used with caution in hepatic insufficiency."
    tags: ["subject:paediatrics", "seizures", "medications", "valproate", "drug-interactions"]
  - guid: v4y0c3d2x1z5a7b8
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 MANAGEMENT OF SEIZURES"
    fields:
      Front: "Why should valproate be avoided in patients with urea cycle disorders?"
      Back: "Valproate should be avoided in patients with urea cycle disorders due to high risk of hyperammonemia."
    tags: ["subject:paediatrics", "seizures", "medications", "valproate", "contraindications"]
  - guid: w5z1d4e3y2a6b8c9
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 MANAGEMENT OF SEIZURES"
    fields:
      Front: "What is the consequence of combining topiramate and valproate?"
      Back: "Combining topiramate and valproate can lead to increased levels of ammonia."
    tags: ["subject:paediatrics", "seizures", "medications", "valproate", "drug-interactions"]
  - guid: x6a2e5f4z3b7c9d0
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 MANAGEMENT OF SEIZURES"
    fields:
      Front: "List general side effects of valproate (VPA)."
      Back: "Nausea/vomiting, tremor, easy bruising, weight gain/insulin resistance, metabolic syndrome, and subclinical hypothyroidism."
    tags: ["subject:paediatrics", "seizures", "medications", "valproate", "adverse-effects"]
  - guid: y7b3f6g5a4c8d0e1
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 MANAGEMENT OF SEIZURES"
    fields:
      Front: "What serious adverse effects can valproate cause and why is it contraindicated in pregnancy?"
      Back: "Valproate can cause acute hepato-cellular injury with jaundice or acute pancreatitis. It should be avoided during pregnancy, as teratogenic neurotoxicity has been observed."
    tags: ["subject:paediatrics", "seizures", "medications", "valproate", "serious-adverse-effects", "pregnancy"]
  - guid: z8c4g7h6b5d9e1f2
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 MANAGEMENT OF SEIZURES"
    fields:
      Front: "What seizure types does phenytoin treat?"
      Back: "Phenytoin is widely used for focal and generalized seizures, and is also administered for status epilepticus and as a second-line agent for patients with mixed seizure types (e.g., tonic-clonic and myoclonic)."
    tags: ["subject:paediatrics", "seizures", "medications", "phenytoin"]
  - guid: a9d5h8i7c6e0f2g3
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 MANAGEMENT OF SEIZURES"
    fields:
      Front: "What is the primary mechanism of action of phenytoin?"
      Back: "Phenytoin blocks voltage-gated sodium channels; other possible mechanisms involve decreased synaptic transmission, smaller changes in ionic gradients involving the sodium-potassium ATPase pump, and inhibition of calcium-calmodulin phosphorylation."
    tags: ["subject:paediatrics", "seizures", "medications", "phenytoin", "mechanism-of-action"]
  - guid: b0e6i9j8d7f1g3h4
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 MANAGEMENT OF SEIZURES"
    fields:
      Front: "How is phenytoin metabolized and what is the clinical consequence?"
      Back: "Phenytoin is a broad spectrum inducer of the CYP system, leading to decreased levels of other drugs metabolized by this pathway."
    tags: ["subject:paediatrics", "seizures", "medications", "phenytoin", "drug-interactions"]
  - guid: c1f7j0k9e8g2h4i5
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 MANAGEMENT OF SEIZURES"
    fields:
      Front: "List major adverse effects of phenytoin."
      Back: "Gingival hyperplasia, body hair increase, folic acid depletion, rash, and worsening bone density."
    tags: ["subject:paediatrics", "seizures", "medications", "phenytoin", "adverse-effects"]
  - guid: d2g8k1l0f9h3i5j6
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 MANAGEMENT OF SEIZURES"
    fields:
      Front: "What long-term side effects should patients on phenytoin be counselled about?"
      Back: "Patients should be counselled regarding the possible development of confusion, ataxia, double vision, and neuropathy with long-term usage."
    tags: ["subject:paediatrics", "seizures", "medications", "phenytoin", "adverse-effects"]
  - guid: e3h9l2m1g0i4j6k7
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 MANAGEMENT OF SEIZURES"
    fields:
      Front: "What is the mechanism of action of levetiracetam?"
      Back: "Levetiracetam's precise mechanism is not clear, but studies have linked its effectiveness to the binding of synaptic vesicle protein 2A (SV2A)."
    tags: ["subject:paediatrics", "seizures", "medications", "levetiracetam", "mechanism-of-action"]
  - guid: f4i0m3n2h1j5k7l8
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 MANAGEMENT OF SEIZURES"
    fields:
      Front: "What is the spectrum of levetiracetam efficacy and which seizure types does it treat?"
      Back: "Levetiracetam encompasses a very broad spectrum and is used as adjunctive therapy for focal-onset seizures in children and adults, myoclonic seizures in patients with juvenile myoclonic epilepsy (ages 12 and up), and primary generalized tonic-clonic seizures."
    tags: ["subject:paediatrics", "seizures", "medications", "levetiracetam"]
  - guid: g5j1n4o3i2k6l8m9
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 MANAGEMENT OF SEIZURES"
    fields:
      Front: "Why is levetiracetam advantageous regarding metabolism and drug interactions?"
      Back: "Levetiracetam is uniquely metabolized independent of the hepatic CYP system and does not induce CYP enzymes like phenytoin, phenobarbital, and carbamazepine."
    tags: ["subject:paediatrics", "seizures", "medications", "levetiracetam", "drug-interactions"]
  - guid: h6k2o5p4j3l7m9n0
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 MANAGEMENT OF SEIZURES"
    fields:
      Front: "Why does levetiracetam not require prolonged titration?"
      Back: "Levetiracetam does not necessitate a prolonged titration period like other drugs (e.g., lamotrigine with its risk of Stevens-Johnson syndrome)."
    tags: ["subject:paediatrics", "seizures", "medications", "levetiracetam", "treatment-advantages"]
  - guid: i7l3p6q5k4m8n0o1
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 MANAGEMENT OF SEIZURES"
    fields:
      Front: "Is levetiracetam well-tolerated and what are common side effects?"
      Back: "Levetiracetam is extremely well-tolerated, with common adverse effects revolving around behavioral disturbances, drowsiness, dizziness, and upper respiratory infections."
    tags: ["subject:paediatrics", "seizures", "medications", "levetiracetam", "adverse-effects"]
  - guid: j8m4q7r6l5n9o1p2
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 MANAGEMENT OF SEIZURES"
    fields:
      Front: "For which seizure type is ethosuximide specifically indicated?"
      Back: "Ethosuximide is an exception with its specific limited use with respect to absence seizures."
    tags: ["subject:paediatrics", "seizures", "medications", "ethosuximide"]
  - guid: k9n5r8s7m6o0p2q3
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 MANAGEMENT OF SEIZURES"
    fields:
      Front: "List the mechanisms of action of topiramate."
      Back: "Blockage of voltage-gated sodium channels, GABA transmission enhancement, NMDA receptor antagonization, and modest carbonic anhydrase inhibition."
    tags: ["subject:paediatrics", "seizures", "medications", "topiramate", "mechanism-of-action"]
  - guid: l0o6s9t8n7p1q3r4
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 MANAGEMENT OF SEIZURES"
    fields:
      Front: "What seizure types can topiramate be used as monotherapy?"
      Back: "Topiramate can be used as monotherapy in both pediatric and adult medicine for focal-onset and primary generalized tonic-clonic seizures (ages 10 and up)."
    tags: ["subject:paediatrics", "seizures", "medications", "topiramate"]
  - guid: m1p7t0u9o8q2r4s5
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 MANAGEMENT OF SEIZURES"
    fields:
      Front: "When can topiramate be used as adjunctive therapy?"
      Back: "Topiramate can be used as adjunctive therapy for focal seizures or in patients with Lennox-Gastaut syndrome (ages 2 and up)."
    tags: ["subject:paediatrics", "seizures", "medications", "topiramate", "lennox-gastaut"]
  - guid: n2q8u1v0p9r3s5t6
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 MANAGEMENT OF SEIZURES"
    fields:
      Front: "List common side effects of topiramate."
      Back: "Weight loss, impaired cognition, difficulties with expressive language, fatigue, depression, headache, and/or paresthesias."
    tags: ["subject:paediatrics", "seizures", "medications", "topiramate", "adverse-effects"]
  - guid: o3r9v2w1q0s4t6u7
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 MANAGEMENT OF SEIZURES"
    fields:
      Front: "What serious metabolic complications can topiramate cause?"
      Back: "Metabolic acidosis with tachypnea and/or calcium phosphate nephrolithiasis (kidney stones) may occur."
    tags: ["subject:paediatrics", "seizures", "medications", "topiramate", "serious-adverse-effects"]
