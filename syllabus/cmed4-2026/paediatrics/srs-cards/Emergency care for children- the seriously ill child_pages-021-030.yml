    noteType: "Basic"
    deck: "Corpus::Paediatrics::Emergency care - the seriously ill child"
    fields:
      Front: "Who can perform triage?"
      Back: "ALL STAFF can do triage: nurses, doctors, clerks, gatekeepers, and cleaners."
