    fields:
      Front: "What is the IV glucose dosing protocol per Chart 9?"
      Back: "5 ml/kg of 10% glucose solution, given rapidly by IV injection. Insert IV line and draw blood rapidly for emergency investigations. Check blood glucose — if low (< 3 mmol/L or 55 mg/dL) or if Dextrostix unavailable, give the glucose dose."
    tags: ["glucose-protocol", "iv-therapy", "subject:paediatrics"]
