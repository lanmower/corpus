notes:
  - guid: a8c1d6e3f9g2h7i4
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 CIRCULATION"
    fields:
      Front: "What are the three main circulatory shock signs that define SHOCK?"
      Back: "1. Cold hands\n2. Capillary refill time ≥3 seconds\n3. Weak and fast pulse"
    tags: ["shock-summary", "circulation-assessment", "subject:paediatrics"]
  - guid: b3e7f2g8h1j6k4m9
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 CIRCULATION"
    fields:
      Front: "What is the primary therapeutic intervention for shock in paediatric patients?"
      Back: "Fluid (IV bolus resuscitation)"
    tags: ["shock-primary-treatment", "fluid-therapy", "subject:paediatrics"]
  - guid: c5g1h9i3j7k2m6n4
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 CIRCULATION"
    fields:
      Front: "What is the standard fluid bolus volume for shock without severe malnutrition?"
      Back: "10 ml/kg administered rapidly over 15 minutes"
    tags: ["fluid-bolus-standard", "no-malnutrition", "subject:paediatrics"]
  - guid: d2h8j4k1m7n3o9p5
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 CIRCULATION"
    fields:
      Front: "What is the fluid bolus volume and infusion time for shock WITH severe malnutrition?"
      Back: "10 ml/kg administered cautiously over 30 minutes (first and second bolus) or 60 minutes (third bolus)"
    tags: ["fluid-bolus-malnutrition", "severe-malnutrition", "subject:paediatrics"]
  - guid: e6j2m8n5o1p7q3r9
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 CIRCULATION"
    fields:
      Front: "What fluid solutions are acceptable for shock resuscitation?"
      Back: "Balanced crystalloid: Normal Saline (N/S) OR Ringers Lactate (R/L)"
    tags: ["resuscitation-fluids", "crystalloid", "subject:paediatrics"]
  - guid: f4k6m1n9o4p2q8r5
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 CIRCULATION"
    fields:
      Front: "What is the maximum number of fluid boluses before escalation of care?"
      Back: "Three boluses. After third bolus = Beware (replaced approximately half circulation volume), seek help"
    tags: ["bolus-limit", "escalation-threshold", "subject:paediatrics"]
  - guid: g7m3n5o9p1q6r2s8
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 CIRCULATION"
    fields:
      Front: "What percentage of circulating volume is replaced by three 10 ml/kg boluses?"
      Back: "Approximately 50% (half of total circulating volume)"
    tags: ["bolus-volume-calc", "circulation-replacement", "subject:paediatrics"]
  - guid: h1n8o2p7q4r9s3t6
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 CIRCULATION"
    fields:
      Front: "What management steps are required after the third fluid bolus if shock persists?"
      Back: "Seek help from senior clinician or specialist. Give glucose and antibiotics. Consider intubation, ventilation, and inotropes"
    tags: ["third-bolus-action", "escalation", "advanced-support", "subject:paediatrics"]
  - guid: i5o3p8q1r7s2t9u4
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 CIRCULATION"
    fields:
      Front: "What advanced interventions should be considered if shock persists after three boluses?"
      Back: "1. Intubation (airway management)\n2. Ventilation (respiratory support)\n3. Inotropes (cardiac support)"
    tags: ["advanced-shock-support", "refractory-shock", "subject:paediatrics"]
  - guid: j2q9r4s6t1u8v3w7
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 CIRCULATION"
    fields:
      Front: "What is the outcome if a shocked child improves after fluid bolus?"
      Back: "Stop bolus administration and transition to maintenance fluids. If no dehydration: ½ DD @ 4 ml/kg/hr. If dehydration present: calculate deficit replacement"
    tags: ["improved-outcome", "post-bolus-management", "subject:paediatrics"]
  - guid: k8s2t7u3v9w1x5y6
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 CIRCULATION"
    fields:
      Front: "What is the outcome if a shocked child develops heart failure during fluid resuscitation?"
      Back: "Stop bolus immediately. Give ½ DD @ 4 ml/hr. Seek help. Give glucose and antibiotics. Consider intubation/ventilation/inotropes"
    tags: ["heart-failure-outcome", "fluid-overload", "shock-complication", "subject:paediatrics"]
  - guid: l4t1u6v2w8x3y9z5
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 CIRCULATION"
    fields:
      Front: "What is the maintenance IV fluid rate for a child without dehydration after shock?"
      Back: "½ DD (half daily dextrose/dextrose-saline) @ 4 ml/kg/hr"
    tags: ["maintenance-fluids", "post-shock", "no-dehydration", "subject:paediatrics"]
  - guid: m6u4v8w3x1y7z2a9
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 CIRCULATION"
    fields:
      Front: "How is the rehydration fluid volume calculated for dehydration?"
      Back: "Percentage deficit × 10 × weight in kilograms"
    tags: ["rehydration-calculation", "dehydration-management", "subject:paediatrics"]
  - guid: n3v9w1x6y2z8a4b7
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 CIRCULATION"
    fields:
      Front: "What is the key principle of reassessment in shocked children?"
      Back: "Reassess often and do not leave child unattended. Check for response to treatment and development of complications"
    tags: ["reassessment", "monitoring", "critical-care", "subject:paediatrics"]
  - guid: o7w2x8y3z9a1b5c6
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 CIRCULATION"
    fields:
      Front: "What specific glucose value requires treatment with dextrose?"
      Back: "Glucose <3 mmol/L (treat with 5 ml/kg 10% Dextrose)"
    tags: ["hypoglycaemia-threshold", "glucose-management", "subject:paediatrics"]
  - guid: p1x7y4z1a8b3c6d2
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 CIRCULATION"
    fields:
      Front: "What is the concentration and volume of dextrose used to treat hypoglycaemia?"
      Back: "5 ml/kg of 10% Dextrose intravenously"
    tags: ["dextrose-dose", "hypoglycaemia-treatment", "subject:paediatrics"]
  - guid: q5y2z7a3b9c1d5e8
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 CIRCULATION"
    fields:
      Front: "What is the special consideration for blood transfusion in shocked children?"
      Back: "Transfuse fresh blood (TF) if haemoglobin <5 g/dL"
    tags: ["blood-transfusion", "haemoglobin", "resuscitation", "subject:paediatrics"]
  - guid: r3z8a4b2c7d1e6f9
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 CIRCULATION"
    fields:
      Front: "Why is malnutrition a critical factor in shock management?"
      Back: "Malnourished children have reduced cardiac and renal reserve, making them more susceptible to fluid overload and heart failure complications"
    tags: ["malnutrition-consideration", "cardiac-reserve", "subject:paediatrics"]
  - guid: s9a1b6c3d8e2f5g7
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 CIRCULATION"
    fields:
      Front: "What is the key difference in fluid administration between malnourished and non-malnourished shocked children?"
      Back: "Non-malnourished: 10 ml/kg rapid over 15 minutes\nMalnourished: 10 ml/kg cautious over 30-60 minutes (slower infusion)"
    tags: ["malnutrition-management", "fluid-rate", "subject:paediatrics"]
  - guid: t2b8c4d9e1f7g3h6
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 CIRCULATION"
    fields:
      Front: "What are the key indicators to reassess after each fluid bolus?"
      Back: "Signs of shock (cold hands, CRT, weak fast pulse), signs of heart failure (increased pulse, tachypnoea, hepatomegaly, gallop, crepitations), consciousness level"
    tags: ["bolus-reassessment", "monitoring-parameters", "subject:paediatrics"]
