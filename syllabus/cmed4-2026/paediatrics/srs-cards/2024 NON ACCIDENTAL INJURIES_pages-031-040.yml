    deck: "Corpus::Paediatrics::2024 NON ACCIDENTAL INJURIES"
    fields:
      Front: "What are the members of the multidisciplinary team managing child sexual abuse?"
      Back: "The multidisciplinary team includes: Social worker, Psychologist, Medical doctor, Nurse, Police officers (Child protection unit), Victim assistant officers, Counsellors, School authorities (teachers/principals), Court representatives."
    tags: ["sexual-abuse", "multidisciplinary-team", "management", "subject:paediatrics"]
  - guid: "7d9fda90a56b446b"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2024 NON ACCIDENTAL INJURIES"
    fields:
      Front: "What are the four main roles of healthcare workers in managing child abuse?"
      Back: "1. Recognise abuse\n2. Accurately document extent of clinical findings (physical, psychological)\n3. Provide appropriate treatment\n4. Report case to relevant authorities"
