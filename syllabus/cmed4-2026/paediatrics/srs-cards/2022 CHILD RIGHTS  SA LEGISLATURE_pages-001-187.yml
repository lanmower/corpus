    noteType: Basic
    deck: "Corpus::Paediatrics::2022 CHILD RIGHTS SA LEGISLATURE"
    fields:
      Front: "What are the benefits of the Child Support Grant?"
      Back: "Annual revision; All biological children but maximum of 6 non-biological children"
    tags: ["legislation", "rsa-law", "grants", "child-support-grant", "benefits", "subject:paediatrics"]
  - guid: f2c5b3e6d8a7f0b2
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 CHILD RIGHTS SA LEGISLATURE"
    fields:
      Front: "What are the requirements to apply for Child Support Grant?"
      Back: "Proof of income, Marriage/divorce certificate, Proof of guardianship"
    tags: ["legislation", "rsa-law", "grants", "child-support-grant", "requirements", "subject:paediatrics"]
  - guid: a3d6c4f7e9b8a1c3
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 CHILD RIGHTS SA LEGISLATURE"
    fields:
      Front: "How does one apply for the Child Support Grant in South Africa?"
      Back: "Apply through local DoW (Department of Welfare) office"
    tags: ["legislation", "rsa-law", "grants", "child-support-grant", "process", "subject:paediatrics"]
  - guid: b4e7d5a8f0c9b2d4
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 CHILD RIGHTS SA LEGISLATURE"
    fields:
      Front: "When does the Child Support Grant terminate?"
      Back: "When child turns 18; Death of child or primary caretaker; If primary caretaker ceases to care for child"
    tags: ["legislation", "rsa-law", "grants", "child-support-grant", "termination", "subject:paediatrics"]
  - guid: c5f8e6b9a1d0c3e5
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 CHILD RIGHTS SA LEGISLATURE"
    fields:
      Front: "What is the purpose of the Foster Care Grant?"
      Back: "Ensure appropriate alternative care for children not cared for by their biological parents"
    tags: ["legislation", "rsa-law", "grants", "foster-care-grant", "subject:paediatrics"]
  - guid: d6a9f7c0b2e1d4f6
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 CHILD RIGHTS SA LEGISLATURE"
    fields:
      Front: "What are the eligibility criteria for the Foster Care Grant?"
      Back: "Applicant and child must be resident in South Africa; court order indicating foster care status; foster parent must be SA citizen, permanent resident or refugee; child must remain in care of foster parent(s)"
    tags: ["legislation", "rsa-law", "grants", "foster-care-grant", "eligibility", "subject:paediatrics"]
  - guid: e7b0a8d1c3f2e5a7
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 CHILD RIGHTS SA LEGISLATURE"
    fields:
      Front: "What is the value of the Foster Care Grant?"
      Back: "R1040"
    tags: ["legislation", "rsa-law", "grants", "foster-care-grant", "amount", "subject:paediatrics"]
  - guid: f8c1b9e2d4a3f6b8
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 CHILD RIGHTS SA LEGISLATURE"
    fields:
      Front: "What is the purpose of the Care Dependency Grant?"
      Back: "Support parents limited in ability to work due to caring for child with severe disability"
    tags: ["legislation", "rsa-law", "grants", "care-dependency-grant", "subject:paediatrics"]
  - guid: a9d2c0f3e5b4a7c9
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 CHILD RIGHTS SA LEGISLATURE"
    fields:
      Front: "What is the age requirement for the Care Dependency Grant?"
      Back: "Child must be under 18 years"
    tags: ["legislation", "rsa-law", "grants", "care-dependency-grant", "age", "subject:paediatrics"]
  - guid: b0e3d1a4f6c5b8da
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 CHILD RIGHTS SA LEGISLATURE"
    fields:
      Front: "What are the citizenship requirements for Care Dependency Grant applicants?"
      Back: "Applicant must be SA citizen, permanent resident or refugee, and resident in South Africa"
    tags: ["legislation", "rsa-law", "grants", "care-dependency-grant", "eligibility", "subject:paediatrics"]
  - guid: c1f4e2b5a7d6c9e1
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 CHILD RIGHTS SA LEGISLATURE"
    fields:
      Front: "What are the income limits for the Care Dependency Grant?"
      Back: "Single Parent earn < R202,800; Family < R405,600"
    tags: ["legislation", "rsa-law", "grants", "care-dependency-grant", "income-limits", "subject:paediatrics"]
  - guid: d2a5f3c6b8e7d0f2
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 CHILD RIGHTS SA LEGISLATURE"
    fields:
      Front: "What is the value of the Care Dependency Grant?"
      Back: "R1860"
    tags: ["legislation", "rsa-law", "grants", "care-dependency-grant", "amount", "subject:paediatrics"]
  - guid: e3b6a4d7c9f8e1a3
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 CHILD RIGHTS SA LEGISLATURE"
    fields:
      Front: "What are the aims of the Children's Act in South Africa?"
      Back: "Support families to enable them to ensure their children's well-being; Prevent abuse and neglect of children; Ensure children in need of care and protection are provided appropriate care"
    tags: ["legislation", "rsa-law", "childrens-act", "subject:paediatrics"]
  - guid: f4c7b5e8d0a9f2b4
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 CHILD RIGHTS SA LEGISLATURE"
    fields:
      Front: "Why is the Children's Act important for health professionals?"
      Back: "It is a one-stop-shop for child consent, medical treatment, surgical operations, HIV testing and disclosure, consent when child lacks legal capacity, age child can access contraceptives, mandatory reporting in abuse and neglect, definitions of child in need of care and protection, and definitions of caregiver"
    tags: ["legislation", "rsa-law", "childrens-act", "health-professionals", "subject:paediatrics"]
  - guid: a5d8c6f9e1b0a3c5
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 CHILD RIGHTS SA LEGISLATURE"
    fields:
      Front: "What is the concept of progressive realisation in children's rights?"
      Back: "Obligation to move as expeditiously & effectively as possible, with plans including goals, timeframes, responsible parties & funds, and criteria for assessment through reasonableness test"
    tags: ["child-rights", "progressive-realisation", "legislation", "subject:paediatrics"]
  - guid: b6e9d7a0f2c1b4d6
    noteType: Basic
    deck: "Corpus::Paediatrics::2022 CHILD RIGHTS SA LEGISLATURE"
    fields:
      Front: "What are the key components of the Reasonableness Test in assessing state's law, policy or programme for children's rights?"
      Back: "Conceptualisation (design must support realisation), Comprehensive & coherent & coordinated, Appropriate financial & human resource allocation, Reasonably implemented, Transparent & known, Balanced & flexible to meet short, medium & long-term needs"
    tags: ["child-rights", "reasonableness-test", "legislation", "subject:paediatrics"]
