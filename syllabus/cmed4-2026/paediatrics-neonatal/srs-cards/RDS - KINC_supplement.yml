deck: "Corpus::Paediatrics-Neonatal::RDS - KINC"
notes:
  - guid: "hmd-bilateral-equal"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::RDS - KINC"
    fields:
      Front: "Which lungs are affected in Hyaline Membrane Disease and are they equally involved?"
      Back: "HMD affects both lungs equally (bilateral involvement)"
    tags: ["hmd", "pathophysiology", "subject:paediatrics-neonatal", "supplement"]

  - guid: "hmd-micro-collapse-mechanism"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::RDS - KINC"
    fields:
      Front: "Why does HMD produce a ground glass appearance rather than a collapsed lung appearance on X-ray?"
      Back: "Lack of surfactant causes alveolar micro-collapse (not complete lung collapse), resulting in a ground glass appearance rather than a white-out collapsed lung"
    tags: ["hmd", "pathophysiology", "radiology", "subject:paediatrics-neonatal", "supplement"]

  - guid: "hmd-lung-volumes"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::RDS - KINC"
    fields:
      Front: "What happens to lung volumes in Hyaline Membrane Disease?"
      Back: "Small lung volumes result from alveolar micro-collapse due to surfactant deficiency"
    tags: ["hmd", "pathophysiology", "subject:paediatrics-neonatal", "supplement"]

  - guid: "air-bronchogram-mechanism"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::RDS - KINC"
    fields:
      Front: "Explain the visual mechanism of air bronchograms in HMD X-rays."
      Back: "Air bronchograms appear because air in patent airways looks black against a white background of collapsed alveolar tissue. More severe HMD with more alveolar collapse makes bronchograms more visible."
    tags: ["hmd", "radiology", "subject:paediatrics-neonatal", "supplement"]

  - guid: "hmd-cpap-failure-referral"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::RDS - KINC"
    fields:
      Front: "What is the appropriate action if a baby with HMD is not coping with CPAP?"
      Back: "Contact the referral hospital immediately if baby is not coping with CPAP"
    tags: ["hmd", "management", "cpap", "subject:paediatrics-neonatal", "supplement"]

  - guid: "surfactant-supervision-requirement"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::RDS - KINC"
    fields:
      Front: "What is required before surfactant can be initiated in a district hospital?"
      Back: "Surfactant administration requires training and supervision before it can be initiated in the district hospital"
    tags: ["hmd", "treatment", "subject:paediatrics-neonatal", "supplement"]

  - guid: "mas-stress-response"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::RDS - KINC"
    fields:
      Front: "Why is meconium production in utero significant clinically?"
      Back: "Meconium production is a fetal stress response indicating something is wrong in utero and usually means the baby needs urgent delivery"
    tags: ["mas", "pathophysiology", "subject:paediatrics-neonatal", "supplement"]

  - guid: "mas-gestational-age-pattern"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::RDS - KINC"
    fields:
      Front: "In which gestational age group is meconium aspiration more common?"
      Back: "Meconium is usually produced in term babies and is rare in preterm babies"
    tags: ["mas", "epidemiology", "subject:paediatrics-neonatal", "supplement"]

  - guid: "mas-chemical-pneumonitis"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::RDS - KINC"
    fields:
      Front: "What type of lung injury does sterile meconium cause and what is a similar clinical condition?"
      Back: "Meconium causes chemical pneumonitis (similar to lung injury seen in paraffin ingestion). Antibiotics are used because the damaged lung is susceptible to secondary bacterial infection."
    tags: ["mas", "pathophysiology", "subject:paediatrics-neonatal", "supplement"]

  - guid: "mas-ball-valve-mechanism"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::RDS - KINC"
    fields:
      Front: "Describe the ball-valve mechanism of meconium in the airways."
      Back: "Meconium acts as a one-way valve: it allows air in during inspiration but prevents air from leaving during expiration, causing air trapping and hyperinflation"
    tags: ["mas", "pathophysiology", "subject:paediatrics-neonatal", "supplement"]

  - guid: "mas-active-vigorous-baby"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::RDS - KINC"
    fields:
      Front: "When should suctioning below the cords be avoided in meconium-stained deliveries?"
      Back: "Do NOT suction below the cords if the baby is active, crying, and vigorous"
    tags: ["mas", "management", "subject:paediatrics-neonatal", "supplement"]

  - guid: "mas-hyperinflation-admission"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::RDS - KINC"
    fields:
      Front: "What is the admission criterion for MAS based on chest appearance?"
      Back: "If patient's chest is hyperinflated and the baby is distressed, admit immediately"
    tags: ["mas", "management", "subject:paediatrics-neonatal", "supplement"]

  - guid: "pneumothorax-xray-findings"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::RDS - KINC"
    fields:
      Front: "What are the specific X-ray findings that indicate pneumothorax with mediastinal shift?"
      Back: "Free air in pleural space, mediastinal shift away from the pneumothorax side, collapsed lung, and often an intercostal drain visible"
    tags: ["complications", "radiology", "subject:paediatrics-neonatal", "supplement"]

  - guid: "ttn-post-csection"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::RDS - KINC"
    fields:
      Front: "What is the specific timing and cause of Transient Tachypnea of the Newborn?"
      Back: "TTN occurs in babies after C-section delivery due to increased fluid in the lungs"
    tags: ["ttn", "etiology", "subject:paediatrics-neonatal", "supplement"]

  - guid: "ttn-non-resolution"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::RDS - KINC"
    fields:
      Front: "What alternative diagnoses should be considered if TTN does not resolve?"
      Back: "If TTN does not resolve, treat as per KINC booklet and consider pneumonia or sepsis requiring admission and treatment"
    tags: ["ttn", "differential-diagnosis", "subject:paediatrics-neonatal", "supplement"]

  - guid: "pneumonia-maternal-risk-factors"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::RDS - KINC"
    fields:
      Front: "Why should maternal risk factors be assessed in suspected neonatal pneumonia?"
      Back: "Maternal history may indicate chorioamnionitis and allows assessment of the mother to identify the causative organism (e.g., TB)"
    tags: ["pneumonia", "diagnosis", "subject:paediatrics-neonatal", "supplement"]

  - guid: "cardiac-unstable-management"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::RDS - KINC"
    fields:
      Front: "What is the immediate management priority for cyanotic cardiac disease in the newborn?"
      Back: "Cyanotic disease in trouble requires stabilization and transfer to a tertiary center"
    tags: ["cardiac", "management", "subject:paediatrics-neonatal", "supplement"]

  - guid: "cardiac-stable-acyanotic-education"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::RDS - KINC"
    fields:
      Front: "What specific clinical signs should parents be educated to recognize in a stable acyanotic cardiac baby at home?"
      Back: "Parents should return to hospital if there is any change in baby's condition, especially POOR FEEDING"
    tags: ["cardiac", "management", "parent-education", "subject:paediatrics-neonatal", "supplement"]

  - guid: "cardiomegaly-threshold"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::RDS - KINC"
    fields:
      Front: "What is the radiological definition of cardiomegaly on chest X-ray?"
      Back: "Heart shadow greater than 60% of the chest width, often with increased vascular markings in lung fields"
    tags: ["cardiac", "radiology", "subject:paediatrics-neonatal", "supplement"]

  - guid: "diaphragmatic-hernia-pathophysiology"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::RDS - KINC"
    fields:
      Front: "How does bowel in the thorax affect lung development in diaphragmatic hernia?"
      Back: "Bowel protruding into the chest hinders lung development, resulting in hypoplastic (underdeveloped) lungs that cause respiratory distress"
    tags: ["diaphragmatic-hernia", "pathophysiology", "subject:paediatrics-neonatal", "supplement"]

  - guid: "metabolic-acidosis-co2-mechanism"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::RDS - KINC"
    fields:
      Front: "What is the specific mechanism by which metabolic acidosis causes respiratory distress?"
      Back: "The body compensates for metabolic acidosis by increasing ventilation to blow off CO2 (hyperventilation), causing tachypnea"
    tags: ["metabolic-acidosis", "physiology", "subject:paediatrics-neonatal", "supplement"]

  - guid: "metabolic-acidosis-hypoxia-hypothermia"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::RDS - KINC"
    fields:
      Front: "What is the relationship between hypoxia, hypothermia, and metabolic acidosis in the newborn?"
      Back: "Both hypoxia and hypothermia can cause metabolic acidosis, which in turn causes compensatory tachypnea (respiratory distress)"
    tags: ["metabolic-acidosis", "etiology", "subject:paediatrics-neonatal", "supplement"]
