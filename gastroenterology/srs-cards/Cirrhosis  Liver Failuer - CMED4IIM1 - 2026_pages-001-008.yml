# SRS Cards - Cirrhosis and Liver Failure
# Source: Cirrhosis and Liver Failure - CMED4IIM1 - 2026_pages-001-008.txt
# Generated from audio transcript

cards:
  - id: 1
    front: "How is cirrhosis defined histologically?"
    back: "Cirrhosis is defined by three key histological features: disordered liver architecture, fibrosis, and regenerative nodules on biopsy."

  - id: 2
    front: "What is the relationship between chronic liver disease and cirrhosis?"
    back: "While cirrhosis is a chronic liver disease, not all chronic liver diseases are cirrhosis. For example, chronic autoimmune hepatitis is a chronic liver disease but may not progress to cirrhosis."

  - id: 3
    front: "Name the major etiologies of cirrhosis."
    back: "Major causes include: alcohol, chronic viral hepatitis (B and C), metabolic-associated steatotic liver disease (MASLD), Wilson's disease, hemochromatosis, autoimmune hepatitis, primary biliary cholangitis, primary sclerosing cholangitis, cardiac cirrhosis, and alpha-1 antitrypsin deficiency."

  - id: 4
    front: "What is MASLD and how does it differ from NAFLD?"
    back: "MASLD (metabolic-associated steatotic liver disease) is the updated umbrella term replacing NAFLD (non-alcoholic fatty liver disease). MASLD includes patients with metabolic syndrome features (diabetes, high cholesterol, hypertension) and excludes only significant alcohol use."

  - id: 5
    front: "What is schistosomiasis and how does it cause cirrhosis?"
    back: "Schistosomiasis is caused by parasitic eggs in portal veins leading to peri-portal fibrosis and portal hypertension. It typically preserves hepatocellular function and is an important cause of portal hypertension in sub-Saharan Africa and Egypt."

  - id: 6
    front: "Can cirrhosis be clinically silent?"
    back: "Yes, cirrhosis can be clinically silent. Many patients have cirrhosis without awareness of it, with symptoms being insidious in onset. Early presentations may include weight loss, sarcopenia, easy bruising, weakness, and fatigue."

  - id: 7
    front: "What are the signs of hepatic decompensation in cirrhosis?"
    back: "Signs include jaundice, elevated creatinine, increased bilirubin, low albumin, and increased INR. These indicate the patient has progressed from compensated to decompensated cirrhosis."

  - id: 8
    front: "What is the distinction between hypersplenism and splenic sequestration?"
    back: "The spleen is not actually hyperactive (hypersplenism) in portal hypertension. Rather, it undergoes splenic sequestration—the organ enlarges and pools more platelets and red blood cells, explaining declining platelet counts in progressive cirrhosis."

  - id: 9
    front: "What is the significance of a declining platelet count in chronic liver disease?"
    back: "A gradual decline in platelet count may indicate progression toward cirrhosis and development of portal hypertension that may not yet be clinically apparent."

  - id: 10
    front: "What characterizes ascites in portal hypertension?"
    back: "Ascites in portal hypertension is typically a high gradient serum-ascites albumin gradient (SAAG), reflecting the high pressure gradient between portal and systemic circulation."

  - id: 11
    front: "What are the three categories of portal hypertension based on location?"
    back: "Pre-hepatic (obstruction before the liver, e.g., splenic vein thrombosis, schistosomiasis), intra-hepatic (within the liver, e.g., cirrhosis), and post-hepatic (obstruction after the liver, e.g., constrictive pericarditis, IVC obstruction, Budd-Chiari syndrome)."

  - id: 12
    front: "What percentage of hepatic blood supply comes from the portal vein vs hepatic artery?"
    back: "The portal vein provides 75-80% of the hepatic blood supply, while the hepatic artery provides 20-25%."

  - id: 13
    front: "What are the major complications of advanced cirrhosis?"
    back: "Major complications include esophageal varices with bleeding, hepatic encephalopathy, spontaneous bacterial peritonitis, hepatorenal syndrome, hepatopulmonary syndrome, and portal pulmonary hypertension."

  - id: 14
    front: "What are the major causes of mortality in cirrhosis?"
    back: "The major causes are variceal bleeds (esophageal varices) and infections, particularly spontaneous bacterial peritonitis (SBP), which can precipitate hepatic encephalopathy."

  - id: 15
    front: "What is the endoscopic treatment for esophageal varices?"
    back: "Esophageal varices are treated with variceal rubber band ligation (VRBL). The varices are suctioned into the endoscope hood and a rubber band is deployed around them. Patients should also receive non-selective beta-blockers (e.g., carvedilol)."

  - id: 16
    front: "What is the clinical significance of hepatic encephalopathy in cirrhosis?"
    back: "Hepatic encephalopathy in an already-decompensated cirrhotic patient is associated with significant mortality. It requires counseling of family members as there is substantial risk of death on each hospital admission."

  - id: 17
    front: "What are the key precipitants of hepatic encephalopathy that must be actively sought?"
    back: "Key precipitants include infections (especially SBP), variceal bleeds, dehydration, electrolyte abnormalities, hepatotoxic drugs (including sedatives), alcohol consumption, and renal failure."

  - id: 18
    front: "What is the diagnostic threshold for spontaneous bacterial peritonitis?"
    back: "SBP is diagnosed when the ascitic fluid has >250 PMN (polymorphonuclear neutrophils) per mm3. This criterion is sensitive, and antibiotics with gram-negative coverage should be initiated empirically. Blood cultures can increase specificity."

  - id: 19
    front: "How should vitamin K be managed in cirrhotic patients with elevated INR?"
    back: "While an initial IV dose of vitamin K may be given if INR is elevated, repeated doses over several days are of no benefit due to impaired synthesis of coagulation factors. An elevated INR in cirrhosis reflects synthetic dysfunction and is not corrected by vitamin K alone."

  - id: 20
    front: "What is the relationship between hepatitis B and hepatocellular carcinoma?"
    back: "Hepatitis B virus is directly oncogenic and can cause HCC even in the absence of cirrhosis, though most patients with hepatitis B-associated HCC have underlying cirrhosis. Hepatitis B vaccination can prevent this scenario."

  - id: 21
    front: "How does hepatitis C cause hepatocellular carcinoma?"
    back: "Unlike hepatitis B, hepatitis C virus is not directly oncogenic. It causes HCC indirectly by causing cirrhosis. HCV patients at risk for HCC do so because of cirrhosis development."

  - id: 22
    front: "Where can varices develop in cirrhosis?"
    back: "While esophageal varices are the most common and clinically important, varices can develop anywhere in the GI tract including the duodenum, stomach (gastric varices are rare), and rectum (anorectal varices)."

  - id: 23
    front: "What does a very high AFP (alpha-fetoprotein) suggest in the context of cirrhosis?"
    back: "A very high AFP is a tumor marker for hepatocellular carcinoma and can be quite specific and sensitive for HCC, especially when elevated substantially. It indicates the need for HCC screening and evaluation."

  - id: 24
    front: "What are the general management principles for a cirrhotic patient in hepatic encephalopathy?"
    back: "Management includes treating the precipitant (infection, bleed, dehydration), correcting electrolyte abnormalities, monitoring glucose (cirrhotic patients are prone to hypoglycemia), using lactulose and antibiotics, and in selected cases using albumin infusions."

  - id: 25
    front: "What is the final consideration for patients with advanced cirrhosis?"
    back: "Patients with cirrhosis should ultimately be evaluated for liver transplantation, which may be the definitive treatment for advanced disease."

