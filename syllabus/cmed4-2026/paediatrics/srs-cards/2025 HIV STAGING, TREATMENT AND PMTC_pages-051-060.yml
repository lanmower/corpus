    fields:
      Front: "What are the main side effects of lopinavir/ritonavir (Kaletra/Aluvia)?"
      Back: |
        Lopinavir/ritonavir side effects include: strange and strong taste, increased triglycerides and cholesterol, hepatitis, pancreatitis, lipodystrophy, and numerous drug interactions.
    tags: ["lopinavir-ritonavir", "protease-inhibitor", "side-effects", "subject:paediatrics"]
  - guid: "d4e5f6g7h8i9j0k5"
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 HIV STAGING, TREATMENT AND PMTC"
    fields:
      Front: "What are the adverse effects of zidovudine (AZT)?"
      Back: |
        Zidovudine adverse effects include: risk of anemia, neutropenia, headache, myalgia. Capsules are insoluble, and syrup must be kept in a brown bottle.
    tags: ["zidovudine", "nrti-drug", "hematologic-toxicity", "subject:paediatrics"]
