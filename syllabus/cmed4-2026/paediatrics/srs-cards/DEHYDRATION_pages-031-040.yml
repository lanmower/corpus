    deck: "Corpus::Paediatrics::DEHYDRATION"
    fields:
      Front: "What is the purpose of the Nasogastric (NG) tube in dehydration management?"
      Back: "NG tubes allow administration of oral fluids (ORS) when children cannot drink sufficient volumes orally. Provides non-invasive fluid access when IV access is difficult, allowing continued oral route for fluid replacement."
    tags: ["dehydration", "administration", "nasogastric", "subject:paediatrics"]
