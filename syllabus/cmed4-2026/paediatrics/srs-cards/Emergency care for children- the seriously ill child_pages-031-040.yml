    fields:
      Front: "Define the AVPU scale for rapid assessment of conscious level."
      Back: "A = Alert, V = Responds to Voice, P = Responds to Pain, U = Unresponsive. Responds only to Pain or Unresponsive indicates coma."
    tags: ["consciousness", "avpu", "coma", "subject:paediatrics"]

