- id: card-001
  front: "What is the gross anatomical framework for approaching jaundice?"
  back: "Start with intrahepatic bile ducts (coalesce to form common hepatic duct), add cystic duct (forms common bile duct), and CBD runs through head of pancreas. This framework helps identify if the problem is structural, intrahepatic, or within the liver itself."
  category: Jaundice
  difficulty: medium
  source: Jaundice - CMED4IIM1 - 2026_pages-001-010

- id: card-002
  front: "What are the causes of jaundice related to increased hemolysis?"
  back: "Increased intravascular hemolysis from RBC breakdown causes mild jaundice via elevated unconjugated bilirubin. Examples: leptospirosis, malaria."
  category: Jaundice
  difficulty: medium
  source: Jaundice - CMED4IIM1 - 2026_pages-001-010

- id: card-003
  front: "What is Gilbert syndrome?"
  back: "A condition with abnormal transport of unconjugated bilirubin from blood into hepatocytes due to defective transporter proteins. Causes mild unconjugated hyperbilirubinemia; not a major concern in normal individuals."
  category: Jaundice
  difficulty: medium
  source: Jaundice - CMED4IIM1 - 2026_pages-001-010

- id: card-004
  front: "What is the pathway of bilirubin conjugation and excretion?"
  back: "Unconjugated bilirubin → transported into hepatocyte → converted to soluble conjugated bilirubin → transported out via transporter proteins (MRP2, MDR3, BSEP) into bile ducts → small intestine → bacterial proteases convert to urobilinogen → partially reabsorbed (enterohepatic circulation) → mostly excreted in stool."
  category: Jaundice
  difficulty: medium
  source: Jaundice - CMED4IIM1 - 2026_pages-001-010

- id: card-005
  front: "What are the three main categories in the framework for jaundice?"
  back: "Pre-hepatic (hemolysis), Hepatic (problem within liver itself like acute viral hepatitis or decompensated cirrhosis), and Cholestatic (failure of bile formation/transport, can be intrahepatic or extrahepatic)."
  category: Jaundice
  difficulty: medium
  source: Jaundice - CMED4IIM1 - 2026_pages-001-010

- id: card-006
  front: "What is the difference between intrahepatic and extrahepatic cholestasis?"
  back: "Intrahepatic cholestasis: problem within intrahepatic bile ducts (e.g., primary sclerosing cholangitis). Extrahepatic cholestasis: problem in larger tubes and pipes (common bile duct, hepatic duct) - the plumbing (e.g., stones, tumors causing obstruction)."
  category: Jaundice
  difficulty: medium
  source: Jaundice - CMED4IIM1 - 2026_pages-001-010

- id: card-007
  front: "What are key history points in jaundice assessment?"
  back: "Duration of jaundice, previous episodes (suggests viral or autoimmune), flu-like symptoms, unintentional weight loss (concerning for malignancy), fever and RUQ pain (suggests cholangitis), alcohol and drug history (including supplements), recent surgeries (risk of iatrogenic CBD injury), travel history (malaria), blood transfusions, pregnancy status, and family history."
  category: Jaundice
  difficulty: medium
  source: Jaundice - CMED4IIM1 - 2026_pages-001-010

- id: card-008
  front: "What are the classic symptoms of ascending cholangitis?"
  back: "Fever, jaundice, and right upper quadrant pain. These patients need rapid imaging, blood cultures, and urgent referral to gastroenterology for ERCP to decompress the infected biliary system."
  category: Jaundice
  difficulty: medium
  source: Jaundice - CMED4IIM1 - 2026_pages-001-010

- id: card-009
  front: "What is the significance of pale stools and dark urine in jaundice?"
  back: "Indicates cholestasis - the conjugated bilirubin cannot be excreted into bile ducts, reducing bile reaching the intestine (pale stools), while conjugated bilirubin backs up into bloodstream and is excreted in urine (dark urine)."
  category: Jaundice
  difficulty: medium
  source: Jaundice - CMED4IIM1 - 2026_pages-001-010

- id: card-010
  front: "What early signs of hepatic encephalopathy should be recognized?"
  back: "Construction apraxia, cognitive impairment, disturbance in sleep patterns. As it progresses: asterixis (flapping tremor), confusion, coma, and fetal hepaticus (sickly sweet smell)."
  category: Jaundice
  difficulty: medium
  source: Jaundice - CMED4IIM1 - 2026_pages-001-010

- id: card-011
  front: "What are the signs of cirrhosis you should examine for?"
  back: "Gynecomastia, spider angiomas, palmar erythema, leuconychia, hair loss in axilla and legs, Dupuytren contracture. Important: one sign alone does not confirm cirrhosis; must consider context and risk factors."
  category: Jaundice
  difficulty: medium
  source: Jaundice - CMED4IIM1 - 2026_pages-001-010

- id: card-012
  front: "What is the relationship between cirrhosis and portal hypertension?"
  back: "While cirrhosis is the most common cause of portal hypertension worldwide, not all portal hypertension is due to cirrhosis. Non-cirrhotic causes of portal hypertension exist. Signs of portal hypertension: caput medusae, splenomegaly, ascites, varices."
  category: Jaundice
  difficulty: medium
  source: Jaundice - CMED4IIM1 - 2026_pages-001-010

- id: card-013
  front: "What transporter proteins are involved in conjugated bilirubin excretion?"
  back: "MRP2 (multidrug resistance protein 2), MDR3, and BSEP (bile salt export pump). Genetic abnormalities in these proteins cause inherited cholestasis. Drug-induced liver injury can also affect these transporters."
  category: Jaundice
  difficulty: medium
  source: Jaundice - CMED4IIM1 - 2026_pages-001-010

- id: card-014
  front: "What is progressive familial intrahepatic cholestasis (PFIC)?"
  back: "An inherited genetic disorder with abnormal exporter-like proteins responsible for transporting conjugated bilirubin from hepatocytes into bile ducts. Results in chronic cholestasis."
  category: Jaundice
  difficulty: medium
  source: Jaundice - CMED4IIM1 - 2026_pages-001-010

- id: card-015
  front: "What are the signs of liver failure vs cirrhosis vs portal hypertension?"
  back: "Cirrhosis: spider angiomas, palmar erythema, gynecomastia, leuconychia. Portal hypertension: caput medusae, splenomegaly, ascites, varices. Liver failure: hepatic encephalopathy (asterixis, confusion, fetal hepaticus), coagulopathy."
  category: Jaundice
  difficulty: medium
  source: Jaundice - CMED4IIM1 - 2026_pages-001-010

- id: card-016
  front: "What laboratory tests should be ordered for jaundice evaluation?"
  back: "Liver function tests (LFTs), INR (international normalized ratio), bilirubin fractionation (unconjugated vs conjugated). Elevated unconjugated suggests pre-hepatic or Gilbert; elevated conjugated suggests hepatic or post-hepatic problem."
  category: Jaundice
  difficulty: medium
  source: Jaundice - CMED4IIM1 - 2026_pages-001-010

- id: card-017
  front: "What are common iatrogenic causes of CBD injury?"
  back: "Cholecystectomy (gallbladder removal) can result in inadvertent injury to the common bile duct, causing jaundice postoperatively. Always inquire about recent abdominal surgeries."
  category: Jaundice
  difficulty: medium
  source: Jaundice - CMED4IIM1 - 2026_pages-001-010

- id: card-018
  front: "What is the difference between hemolysis and hepatic jaundice in terms of bilirubin?"
  back: "Hemolysis: primarily unconjugated bilirubin elevation (pre-hepatic). Hepatic jaundice: the liver cannot process or transport bilirubin adequately. Cholestatic: conjugated bilirubin cannot be excreted (post-hepatic or intrahepatic obstruction)."
  category: Jaundice
  difficulty: medium
  source: Jaundice - CMED4IIM1 - 2026_pages-001-010

- id: card-019
  front: "What clinical red flags suggest malignancy in jaundice presentation?"
  back: "Unintentional weight loss, jaundice in older individuals, painless jaundice. Concerning for: cholangiocarcinoma (bile duct tumor), pancreatic head tumor, or chronic pancreatitis causing duct obstruction."
  category: Jaundice
  difficulty: medium
  source: Jaundice - CMED4IIM1 - 2026_pages-001-010

