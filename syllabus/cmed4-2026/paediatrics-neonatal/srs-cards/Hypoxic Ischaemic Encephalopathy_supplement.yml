deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
notes:
  - guid: "hypx0057diagph"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "Diagnostic criteria: What umbilical artery blood pH threshold indicates perinatal asphyxia?"
      Back: "pH < 7.2"
    tags: ["diagnosis", "diagnostic-criteria", "blood-gas", "supplement", "subject:paediatrics-neonatal"]
  - guid: "hypx0058diagbe"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "Diagnostic criteria: What base excess (BE) threshold indicates perinatal asphyxia?"
      Back: "BE > 15 (or BE < -15 mmol/L)"
    tags: ["diagnosis", "diagnostic-criteria", "blood-gas", "supplement", "subject:paediatrics-neonatal"]
  - guid: "hypx0059thompsummary"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "Thompson's Score: What is the maximum total score and clinical significance?"
      Back: "Maximum total score is 34 points. Higher scores indicate more severe encephalopathy"
    tags: ["thompson-score", "clinical-scoring", "supplement", "subject:paediatrics-neonatal"]
  - guid: "hypx0060sarnouthyper"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "Sarnat staging: What percentage of mild HIE infants have severe handicap or death?"
      Back: "Less than 1% (essentially excellent prognosis)"
    tags: ["sarnat-staging", "outcomes", "prognosis", "supplement", "subject:paediatrics-neonatal"]
  - guid: "hypx0061sarnout25"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "Sarnat staging: What percentage of moderate HIE infants have severe handicap or death?"
      Back: "25%"
    tags: ["sarnat-staging", "outcomes", "prognosis", "supplement", "subject:paediatrics-neonatal"]
  - guid: "hypx0062sarnout50"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "Sarnat staging: What percentage of moderate-to-severe HIE infants have severe handicap?"
      Back: "50%"
    tags: ["sarnat-staging", "outcomes", "prognosis", "supplement", "subject:paediatrics-neonatal"]
  - guid: "hypx0063sarnout75"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "Sarnat staging: What percentage of severe HIE infants have severe handicap or death?"
      Back: "75%"
    tags: ["sarnat-staging", "outcomes", "prognosis", "supplement", "subject:paediatrics-neonatal"]
  - guid: "hypx0064labelsio"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "Laboratory findings in HIE: Why do serum electrolytes become markedly abnormal?"
      Back: "In presence of reduced urine flow and excessive weight gain, may indicate acute tubular necrosis (ATN) or SIADH secretion, particularly during initial 2–3 days of life"
    tags: ["diagnosis", "laboratory", "organ-injury", "supplement", "subject:paediatrics-neonatal"]
  - guid: "hypx0065seizdose1"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "Anticonvulsant dosing: Complete phenobarbitone regimen for uncontrolled seizures"
      Back: "Initial: 20 mg/kg IV over 20 minutes. If no response: two additional doses of 10 mg/kg IV each, given 15 minutes apart (total possible: 20 + 10 + 10 = 40 mg/kg)"
    tags: ["seizures", "anticonvulsant-dosing", "supplement", "subject:paediatrics-neonatal"]
  - guid: "hypx0066seizorderdrug"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "Anticonvulsant drug sequence in HIE seizure management"
      Back: "First-line: Phenobarbitone (20 + 10 + 10 mg/kg). Second-line: Phenytoin (20 mg/kg). Third-line: Lorazepam (0.05-0.1 mg/kg transiently) or Midazolam infusion (if status epilepticus unresponsive)"
    tags: ["seizures", "anticonvulsant-therapy", "management-algorithm", "supplement", "subject:paediatrics-neonatal"]
  - guid: "hypx0067hypotrialev"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "Hypothermia therapy: What are the evidence-based trials supporting its use?"
      Back: "Cool Cap trial and NICHD (National Institute of Child Health and Human Development) Neonatal Research Network trial"
    tags: ["hypothermia", "neuroprotection", "evidence", "supplement", "subject:paediatrics-neonatal"]
  - guid: "hypx0068hypomecall"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "Hypothermia mechanism of action: Complete list of neuroprotective effects"
      Back: "Reduces cerebral metabolism and prevents oedema; decreases energy utilisation; reduces/suppresses cytotoxic amino acid accumulation and nitric oxide; inhibits platelet-activating factor and inflammatory cascade; suppresses free radical activity; attenuates secondary neuronal damage; inhibits cell death; reduces extent of brain damage"
    tags: ["hypothermia", "mechanism", "neuroprotection", "supplement", "subject:paediatrics-neonatal"]
  - guid: "hypx0069pathpridef"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "Pathophysiology: Define primary/acute phase of HIE"
      Back: "Occurs within minutes of hypoxic insult; characterized by depletion of energy metabolites, anaerobic metabolism, rapid progressive depolarisation of cells, cytotoxic oedema, increased intracellular calcium, sodium overload, increased extracellular glutamate, and progressive acidosis leading to cell injury +/− necrosis"
    tags: ["pathophysiology", "mechanism", "supplement", "subject:paediatrics-neonatal"]
  - guid: "hypx0070pathsecdef"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "Pathophysiology: Define secondary/latent phase of HIE"
      Back: "Occurs several hours to days after hypoxic insult; characterized by secondary cytotoxic oedema with increased cell death, inflammatory response (increased IL-1, IL-6, TNFα), cerebral oedema and seizures, increased free radical release, calcium overload, accumulation of excitatory amino acids (EAA) with increased uptake, leading to neuronal cell death and apoptosis"
    tags: ["pathophysiology", "mechanism", "supplement", "subject:paediatrics-neonatal"]
  - guid: "hypx0071gainjuryheterotopia"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "Gestational age and CNS injury: What brain lesion occurs with insult before 20 weeks gestation?"
      Back: "Neuronal heterotopia or polymicrogyria (abnormal neuronal migration)"
    tags: ["pathophysiology", "gestational-age", "supplement", "subject:paediatrics-neonatal"]
  - guid: "hypx0072gainjurypvl"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "Gestational age and CNS injury: What brain lesion occurs with insult between 26-36 weeks gestation?"
      Back: "Periventricular leukomalacia (PVL) — white matter damage"
    tags: ["pathophysiology", "gestational-age", "supplement", "subject:paediatrics-neonatal"]
  - guid: "hypx0073gainjuryterm"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "Gestational age and CNS injury: What brain tissue is primarily affected at term gestation?"
      Back: "Grey matter (basal ganglia, thalamus, cortex)"
    tags: ["pathophysiology", "gestational-age", "supplement", "subject:paediatrics-neonatal"]
  - guid: "hypx0074aetmatcard"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "Maternal aetiology of HIE: Cardiac-related causes"
      Back: "Cardiac arrest"
    tags: ["aetiology", "maternal", "supplement", "subject:paediatrics-neonatal"]
  - guid: "hypx0075aetmatasphyx"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "Maternal aetiology of HIE: Respiratory-related causes"
      Back: "Asphyxiation (e.g. airway obstruction, aspiration)"
    tags: ["aetiology", "maternal", "supplement", "subject:paediatrics-neonatal"]
  - guid: "hypx0076aetmatanap"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "Maternal aetiology of HIE: Allergic/immune causes"
      Back: "Severe anaphylaxis"
    tags: ["aetiology", "maternal", "supplement", "subject:paediatrics-neonatal"]
  - guid: "hypx0077aetmatsz"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "Maternal aetiology of HIE: Neurological causes"
      Back: "Status epilepticus"
    tags: ["aetiology", "maternal", "supplement", "subject:paediatrics-neonatal"]
  - guid: "hypx0078aetmatshock"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "Maternal aetiology of HIE: Shock/perfusion causes"
      Back: "Hypovolaemic shock"
    tags: ["aetiology", "maternal", "supplement", "subject:paediatrics-neonatal"]
  - guid: "hypx0079aetuplabruption"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "Uteroplacental aetiology of HIE: Placental separation"
      Back: "Placental abruption"
    tags: ["aetiology", "uteroplacental", "supplement", "subject:paediatrics-neonatal"]
  - guid: "hypx0080aetuplcord"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "Uteroplacental aetiology of HIE: Umbilical cord complications"
      Back: "Cord prolapse"
    tags: ["aetiology", "uteroplacental", "supplement", "subject:paediatrics-neonatal"]
  - guid: "hypx0081aetuplerupture"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "Uteroplacental aetiology of HIE: Uterine complications"
      Back: "Uterine rupture"
    tags: ["aetiology", "uteroplacental", "supplement", "subject:paediatrics-neonatal"]
  - guid: "hypx0082aetuploverstim"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "Uteroplacental aetiology of HIE: Oxytocin-related complications"
      Back: "Hyperstimulation with oxytocic agents (e.g. pitocin, ergot alkaloids)"
    tags: ["aetiology", "uteroplacental", "supplement", "subject:paediatrics-neonatal"]
  - guid: "hypx0083aetfethemorrhage"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "Fetal aetiology of HIE: Blood loss causes"
      Back: "Fetomaternal haemorrhage (fetal blood loss into maternal circulation)"
    tags: ["aetiology", "fetal", "supplement", "subject:paediatrics-neonatal"]
  - guid: "hypx0084aetfettwin"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "Fetal aetiology of HIE: Twin pregnancy complications"
      Back: "Twin-to-twin transfusion syndrome (TTTS)"
    tags: ["aetiology", "fetal", "supplement", "subject:paediatrics-neonatal"]
  - guid: "hypx0085aetfethemolytic"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "Fetal aetiology of HIE: Hemolytic disease causes"
      Back: "Severe isoimmune haemolytic disease (e.g. Rh incompatibility, ABO incompatibility)"
    tags: ["aetiology", "fetal", "supplement", "subject:paediatrics-neonatal"]
  - guid: "hypx0086aetfetarrhythmia"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "Fetal aetiology of HIE: Cardiac causes"
      Back: "Cardiac arrhythmia (e.g. complete heart block, supraventricular tachycardia)"
    tags: ["aetiology", "fetal", "supplement", "subject:paediatrics-neonatal"]
  - guid: "hypx0087labstudiestable"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "Laboratory studies for HIE diagnosis: Which tests assess multi-organ injury?"
      Back: "Serum electrolytes (renal dysfunction); renal function (creatinine, clearance, BUN); cardiac and liver enzymes (organ injury); coagulation studies (PT, PTT, fibrinogen); ABG (acid-base and oxygenation status)"
    tags: ["diagnosis", "laboratory", "multi-organ-assessment", "supplement", "subject:paediatrics-neonatal"]
  - guid: "hypx0088immatbrresistance"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "Why does the immature brain show relative resistance to hypoxic-ischaemic events?"
      Back: "Three mechanisms: (1) Lower cerebral metabolic rate requiring less oxygen, (2) Immaturity of neurotransmitter balance allowing more tolerance, (3) Greater plasticity of immature CNS allowing functional reorganisation"
    tags: ["pathophysiology", "age-related", "neuroprotection", "supplement", "subject:paediatrics-neonatal"]
  - guid: "hypx0089therwindowdef"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "Define the therapeutic window in HIE and its significance"
      Back: "Window within 6 hours of hypoxic insult representing optimal time frame for intervention. During this period cerebral blood flow (CBF) reperfusion begins and slow recovery of cerebral oxidative metabolism and acidosis resolution occurs — critical opportunity for hypothermia or other neuroprotective strategies"
    tags: ["pathophysiology", "treatment-window", "supplement", "subject:paediatrics-neonatal"]
  - guid: "hypx0090seizdoselor"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "What is lorazepam used for in HIE seizure management and how is it dosed?"
      Back: "Lorazepam is a benzodiazepine used transiently for acute seizure control. Dose: 0.05 to 0.1 mg/kg/dose intravenously"
    tags: ["seizures", "anticonvulsant-dosing", "supplement", "subject:paediatrics-neonatal"]
  - guid: "hypx0091seizmidazpurpose"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "When is midazolam infusion indicated in HIE seizure management?"
      Back: "When status epilepticus is not responding to phenobarbitone and phenytoin; used as continuous infusion for refractory seizures"
    tags: ["seizures", "anticonvulsant-therapy", "status-epilepticus", "supplement", "subject:paediatrics-neonatal"]
  - guid: "hypx0092hypomethod"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "What methods of cooling are available for hypothermia therapy in HIE?"
      Back: "Whole-body cooling and selective head-cooling (Cool Cap technique)"
    tags: ["hypothermia", "neuroprotection", "treatment-method", "supplement", "subject:paediatrics-neonatal"]
  - guid: "hypx0093hypotharget"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "What is the target core temperature and duration for hypothermia therapy in HIE?"
      Back: "Core (rectal) temperature: 33–35°C maintained for 72 hours"
    tags: ["hypothermia", "neuroprotection", "treatment-parameters", "supplement", "subject:paediatrics-neonatal"]
  - guid: "hypx0094followupindication"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "Which neonates with asphyxia require follow-up in High Risk Clinic?"
      Back: "Neonates with moderate and severe asphyxia, especially those with Sarnat stage II and III HIE (requiring specialized neurological monitoring)"
    tags: ["follow-up", "management", "supplement", "subject:paediatrics-neonatal"]
  - guid: "hypx0095followupassess"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "What components of follow-up care are needed for moderate-severe HIE neonates?"
      Back: "Complete neurological assessment at regular intervals; early intervention if developmental delays or neurological abnormalities detected"
    tags: ["follow-up", "developmental-assessment", "supplement", "subject:paediatrics-neonatal"]
  - guid: "hypx0096followuppsychomet"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::Hypoxic Ischaemic Encephalopathy"
    fields:
      Front: "When should formal psychometric assessment be performed in neonates with moderate-severe HIE and why?"
      Back: "At 18 months of age to formally assess neurodevelopmental outcomes, cognitive development, and motor function as indicators of long-term disability"
    tags: ["follow-up", "developmental-assessment", "outcomes", "supplement", "subject:paediatrics-neonatal"]
