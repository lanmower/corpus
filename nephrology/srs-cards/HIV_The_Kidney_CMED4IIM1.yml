- front: "What is the prevalence of kidney disease in HIV patients?"
  back: |
    Kidney disease occurs in up to 5-10% of the approximately 7.92 million people living with HIV in South Africa (14% national prevalence).
  tags:
    - epidemiology
    - HIV
    - kidney-disease

- front: "What are the three most important types of HIV-associated kidney disease?"
  back: |
    1. HIV-associated nephropathy (HIVAN) - prevalence 40-80%
    2. HIV-associated immune complex disease
    3. HIV-associated thrombotic microangiopathy
  tags:
    - pathology
    - HIVAN
    - kidney-disease

- front: "What causes HIV-associated thrombotic microangiopathy?"
  back: |
    The virus damages endothelial cells (lining of blood vessels), activates platelets, and deposits within renal microvascular tissue. Presents with acute renal failure, proteinuria, hematuria, microangiopathic hemolytic anemia, and thrombocytopenia (TTP or HUS picture). Poor prognosis unless treated early and aggressively.
  tags:
    - pathophysiology
    - thrombotic-microangiopathy
    - acute-kidney-injury

- front: "What is the mechanism of tenofovir-associated kidney dysfunction?"
  back: |
    Tenofovir causes proximal renal tubular acidosis (RTA) due to mitochondrial toxicity of proximal tubular cells. Characterized by proximal tubular dysfunction manifested by failure to reabsorb glucose, bicarbonate, and phosphates, resulting in hypokalemic metabolic acidosis, hypophosphatemia, and glucosuria.
  tags:
    - drug-toxicity
    - tenofovir
    - RTA

- front: "Which antiretroviral drugs commonly cause kidney injury?"
  back: |
    Nucleoside reverse transcriptase inhibitors (e.g., tenofovir): acute kidney failure, Fanconi syndrome, nephrogenic diabetes insipidus, lactic acidosis. Nucleotide RTIs: acute kidney failure, Fanconi syndrome, nephrogenic diabetes insipidus. Non-nucleoside RTIs (e.g., nevirapine): kidney stones. Protease inhibitors: interstitial crystallization, kidney stones, acute interstitial nephritis, papillary necrosis.
  tags:
    - antiretroviral
    - drug-toxicity
    - nephrotoxicity

- front: "What drugs commonly cause acute interstitial nephritis in HIV patients?"
  back: |
    Beta-lactams, sulfonamides, non-steroidal anti-inflammatory drugs (NSAIDs), proton pump inhibitors, allopurinol, and over-the-counter medications. Develops 1-2 weeks after drug introduction. Characterized by pyuria and peripheral eosinophilia on urine dipstick; presents with flank pain, fever, and rash.
  tags:
    - acute-interstitial-nephritis
    - drug-induced
    - kidney-injury

- front: "What is HIV-associated nephropathy (HIVAN) and its key characteristics?"
  back: |
    High-grade proteinuria (>10 g/day) occurring in 30-80% of HIV patients. Associated with rapid progression of kidney dysfunction, especially in patients of African descent with APOL-1 gene variants. Often associated with detectable/unsuppressed viral load. Large, echogenic kidneys on ultrasound. Pathophysiology: HIV infects podocytes, causes loss of differentiation markers and foot processes, immature collagen expression, capillary loop collapse, tubular degeneration, and podocyte apoptosis.
  tags:
    - HIVAN
    - proteinuria
    - pathophysiology

- front: "What are the poor prognostic features in HIV-associated kidney disease?"
  back: |
    Presence of hypertension, very low serum albumin, high protein excretion, high serum creatinine, low CD4 count, detectable viral load, and low hemoglobin.
  tags:
    - prognosis
    - HIVAN
    - clinical-features

- front: "What electrolyte and acid-base disorders occur in HIV?"
  back: |
    Electrolyte disorders: hyponatremia (from gastroenteritis, SIADH, adrenal insufficiency), hypokalemia and hyperkalemia (from adrenal insufficiency or gastroenteritis). Acid-base disorders: high anion gap metabolic acidosis (common in CKD/ESRD), non-anion gap metabolic acidosis (from gastroenteritis), respiratory alkalosis or acidosis (from lung infections), tubular acidosis (from adrenal disorders), lactic acidosis (type A or type B).
  tags:
    - electrolyte-disorders
    - acid-base-disorders
    - HIV-complications

- front: "What are the risk factors for acute kidney injury in HIV patients?"
  back: |
    HIV-related: starting/being on ART, defining illnesses, low CD4 count, high viral load, hepatitis B/C co-infection. HIV-independent: older age, diabetes, pre-existing CKD, acute or chronic liver disease.
  tags:
    - acute-kidney-injury
    - risk-factors
    - HIV

- front: "How is acute interstitial nephritis managed in HIV?"
  back: |
    Immediately withdraw the offending drug and treat with glucocorticoids for at least 7-10 days. Early diagnosis is crucial to avoid permanent kidney damage. Diagnosis is based on clinical grounds; if not apparent, kidney biopsy may be performed.
  tags:
    - acute-interstitial-nephritis
    - management
    - treatment

- front: "What is the relationship between APOL-1 gene and HIV-associated nephropathy?"
  back: |
    Patients of African descent with APOL-1 gene variants have accelerated progression of kidney dysfunction in HIVAN.
  tags:
    - HIVAN
    - genetics
    - African-descent

- front: "What causes acute kidney injury in HIV patients?"
  back: |
    Multiple causes: pre-renal (volume depletion, dehydration, hypovolemia, heart failure, cirrhosis), intrinsic (acute tubular necrosis from ischemia/toxins/sepsis, interstitial nephritis), post-renal (obstruction from crystal urea, tumor lysis syndrome, tumor, prosthetic material). Also thrombotic microangiopathy, drug-induced kidney dysfunction, and indirect causes (opportunistic infections, sepsis, heart failure).
  tags:
    - acute-kidney-injury
    - etiology
    - pathophysiology

- front: "What are the pathological features of HIVAN?"
  back: |
    Complete collapse of the glomerular capillary loops, prominent tubular dilatation, and interstitial inflammation.
  tags:
    - HIVAN
    - pathology
    - renal-biopsy

- front: "What is the clinical presentation of HIVAN?"
  back: |
    Often nonspecific: fatigue, malaise, anorexia, pruritus. Most patients have advanced HIV with high viral loads and low CD4 counts. May present as acute or chronic kidney failure. Uncommon features: peripheral edema and hypertension. Diagnostic features: black patients, late-onset disease, >1 g/day proteinuria, rising serum creatinine, enlarged echogenic kidneys on ultrasound, no red blood cell casts.
  tags:
    - HIVAN
    - clinical-presentation
    - diagnosis

- front: "What is the role of antiretroviral therapy (ART) in HIV-associated kidney disease?"
  back: |
    ART is essential therapy. Immediate or early initiation leads to improvement of kidney function and reduction in morbidity and mortality. Patients without ART progress rapidly to end-stage kidney disease. Three-drug regimen (RTI + protease inhibitor) has transformed outcomes. Continuous therapy is important for maximal benefit; treatment interruption or poor compliance leads to high incidence of ESRD.
  tags:
    - ART
    - management
    - treatment
    - HIVAN

- front: "What additional treatments improve prognosis in HIVAN besides ART?"
  back: |
    ACE inhibitors or ARBs reduce proteinuria and improve prognosis. Corticosteroids have also been shown to improve outcomes in HIVAN.
  tags:
    - management
    - HIVAN
    - renin-angiotensin-system-inhibitors

- front: "What are the effects of ART on kidney function in HIV-associated nephropathy?"
  back: |
    ART produces: introduction or increase of proteinuria initially with full or partial remission of nephrotic syndrome, delayed progression of kidney impairment, potential recovery of kidney function, and dialysis independence (patients do not become dialysis-requiring).
  tags:
    - ART
    - treatment-response
    - HIVAN

- front: "What are the components of kidney disease risk assessment in HIV?"
  back: |
    Race/ethnicity, family history of kidney disease, CD4 count, viral load, nephrotoxic medications, recreational drug use, smoking status, comorbidities (diabetes, hypertension, hepatitis B/C co-infection), atherosclerotic vascular disease.
  tags:
    - risk-assessment
    - kidney-disease
    - HIV

- front: "When should HIVAN be considered an indication to start ART?"
  back: |
    HIVAN diagnosis is a clear indication to start ART regardless of the CD4 count.
  tags:
    - HIVAN
    - ART
    - treatment-indication
