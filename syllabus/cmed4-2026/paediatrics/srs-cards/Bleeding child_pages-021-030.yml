    noteType: Basic
    deck: "Corpus::Paediatrics::Bleeding child"
    fields:
      Front: "What immunological abnormalities are noted in ITP?"
      Back: "Abnormalities in T-cells, B-cells and cytokines; exact mechanism of immune dysfunction not fully known"
    tags: ["ITP", "immunology", "T-cells", "subject:paediatrics"]
