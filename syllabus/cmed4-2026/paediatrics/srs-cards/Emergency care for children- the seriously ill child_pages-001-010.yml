    noteType: "Basic"
    deck: "Corpus::Paediatrics::Emergency care - the seriously ill child"
    fields:
      Front: "List the six final pathways to death in children."
      Back: "1. Respiratory obstruction\n2. Respiratory depression\n3. Alveolar or chest wall failure\n4. Fluid loss\n5. Fluid maldistribution\n6. Heart failure"
    tags: ["pathways-to-death", "emergency", "mortality", "subject:paediatrics"]

