deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
notes:
  - guid: 3f7c1a9e5b2d4a8c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What is urine LAM testing?"
      Back: "Detection of LAM (lipoarabinomannan) levels in the urine. LAM is a heat-stable glycolipid of the outer cell wall of Mycobacterium sp. released by metabolically active bacilli and can be used to detect TB."
    tags: ["diagnosis", "antigen-detection", "subject:paediatrics"]
  - guid: 7d4a2e1f9c5b3a8c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "How does urine LAM sensitivity and specificity compare in TB diagnosis?"
      Back: "Urine LAM sensitivity increases among children with severe immunosuppression, but specificity is lower than that of GXP (Gene Xpert)."
    tags: ["diagnosis", "antigen-detection", "subject:paediatrics"]
  - guid: 1a8f3c5b9e2d4a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "Who is at high risk for extrapulmonary TB?"
      Back: "Children <2 years of age with immature cellular immune response are at high risk for extrapulmonary TB."
    tags: ["eptb", "risk-factors", "age-groups", "subject:paediatrics"]
  - guid: 4c1e9a3f8b5d2a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "When does extrapulmonary TB typically develop?"
      Back: "EPTB occurs in the first few months after TB infection, or may develop years later (e.g., osteoarticular, renal) following reactivation of organism that was subclinically disseminated during primary infection."
    tags: ["eptb", "timing", "subject:paediatrics"]
  - guid: 8a5b1f3e9c2d4a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What are the characteristics of TB lymphadenitis?"
      Back: "Enlarged cervical lymph nodes that are painless (unless secondarily infected), firm, and matted. They may become fluctuant prior to spontaneous drainage and sinus formation (scrofula)."
    tags: ["eptb", "lymphadenitis", "clinical-signs", "subject:paediatrics"]
  - guid: 2f9c4a1e8b5d3a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "Where can TB lymphadenitis occur besides the neck?"
      Back: "TB lymphadenitis may involve sites other than the neck."
    tags: ["eptb", "lymphadenitis", "sites", "subject:paediatrics"]
  - guid: 6d2a8f1c9e5b3a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "List other causes of enlarged lymph nodes that can mimic TB lymphadenitis."
      Back: "Persistent generalized lymphadenopathy (PGL), lymphoma, Kaposi sarcoma, sarcoidosis, and carcinomatous metastases."
    tags: ["eptb", "lymphadenitis", "differential-diagnosis", "subject:paediatrics"]
  - guid: 5a7e1f3c9b2d4a8c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "In what serous cavities can inflammatory tuberculous effusions occur?"
      Back: "Pleural, pericardial, and peritoneal cavities."
    tags: ["eptb", "effusions", "serositis", "subject:paediatrics"]
  - guid: 9c1a4d3f8e2b5a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What is the typical age for TB pleural effusion?"
      Back: "Usually in children >3 years, particularly in older children and adolescents."
    tags: ["eptb", "pleural-effusion", "age-groups", "subject:paediatrics"]
  - guid: 3e8f2c1a9b5d4a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What are the clinical presentations of TB pleural effusion?"
      Back: "Intermittent fever, unilateral chest pain, breathlessness, and rarely haemoptysis (which may occur in cavitatory disease)."
    tags: ["eptb", "pleural-effusion", "symptoms", "subject:paediatrics"]
  - guid: 7a2f5c1e9c3b4a8c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What are the physical signs of TB pleural effusion?"
      Back: "Decreased chest movement and stony dullness on percussion."
    tags: ["eptb", "pleural-effusion", "physical-signs", "subject:paediatrics"]
  - guid: 1f4a9b3e8c5d2a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What chest X-ray findings indicate TB pleural effusion?"
      Back: "Tracheal/mediastinal shift away from side of effusion, and unilateral or bilateral uniform white opacity with a concave upper border."
    tags: ["eptb", "pleural-effusion", "imaging", "subject:paediatrics"]
  - guid: 4c3a1f8e9b5d2a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What are the characteristics of pleural aspirate in TB?"
      Back: "Exudate, straw colored, high protein, high WCC (white cell count), and raised adenosine deaminase (ADA)."
    tags: ["eptb", "pleural-effusion", "investigation", "subject:paediatrics"]
  - guid: 8d2f4a1c9e5b3a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What additional investigation can be done on pleural fluid for TB?"
      Back: "Pleural biopsy can be performed for Xpert (Gene Xpert) testing."
    tags: ["eptb", "pleural-effusion", "investigation", "subject:paediatrics"]
  - guid: 2a9e1f3c8b5d4a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What age group can develop TB bone and joint disease?"
      Back: "Occasionally in infants, but more commonly in older children."
    tags: ["eptb", "osteoarticular-tb", "age-groups", "subject:paediatrics"]
  - guid: 5c1a8f3e9b2d4a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What are the clinical symptoms of TB osteoarticular disease?"
      Back: "Painful limbs and joints, and limp."
    tags: ["eptb", "osteoarticular-tb", "symptoms", "subject:paediatrics"]
  - guid: 9a4b2f1e8c5d3a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What percentage of osteoarticular TB is spinal TB?"
      Back: "50% of osteoarticular TB is spinal TB (TB spine)."
    tags: ["eptb", "spinal-tb", "subject:paediatrics"]
  - guid: 3f7a1c5b9e2d4a8c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What are the symptoms of spinal TB?"
      Back: "Back pain lasting a few weeks, and acute spinal cord compression (lower limb weakness, bladder and bowel neurology) which is an emergency."
    tags: ["eptb", "spinal-tb", "symptoms", "subject:paediatrics"]
  - guid: 7e2c4a1f9a5d3b8c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What are the clinical signs of TB pericarditis?"
      Back: "Congestive heart failure (CCF) or pericardial constriction, raised jugular venous pressure (JVP), palpable pulsus paradoxus, and pericardial friction rub."
    tags: ["eptb", "pericarditis", "cardiac", "subject:paediatrics"]
  - guid: 1a6f3d5c9e2b4a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What are the complications of TB abdominal disease?"
      Back: "Malnutrition with protein-losing enteropathy, abdominal distension (ascites or bowel distension), peritonitis, and biliary or lymphatic obstruction due to massive compressive abdominal lymph nodes."
    tags: ["eptb", "abdominal-tb", "subject:paediatrics"]
  - guid: 4d8a2f1c9b5e3a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What is miliary TB?"
      Back: "A complication of primary TB in young children resulting from widespread blood-borne dissemination of TB bacilli."
    tags: ["eptb", "miliary-tb", "disseminated-tb", "subject:paediatrics"]
  - guid: 8c1e5a3f9b2d4a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What are the physical signs of miliary TB?"
      Back: "Lymphadenopathy, hepatosplenomegaly, fever, tachypnea, cyanosis, respiratory distress, and other signs including papular lesions on skin or choroidal tubercles in retina."
    tags: ["eptb", "miliary-tb", "physical-signs", "subject:paediatrics"]
  - guid: 2f9b4c1e8a5d3a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What is the chest X-ray appearance of miliary TB?"
      Back: "Diffuse, uniformly distributed, small miliary shadows with a 'millet seed' appearance."
    tags: ["eptb", "miliary-tb", "imaging", "subject:paediatrics"]
  - guid: 5a1c8f3e9b2d4a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What are the blood and biopsy findings in miliary TB?"
      Back: "Full blood count shows pancytopenia, liver function tests are abnormal, and biopsy shows tubercles on histology."
    tags: ["eptb", "miliary-tb", "investigation", "subject:paediatrics"]
  - guid: 9e2a5f1c8b3d4a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "Where can MTB be isolated in miliary TB?"
      Back: "MTB can be isolated from CSF (cerebrospinal fluid), bone marrow, and sputum in miliary TB."
    tags: ["eptb", "miliary-tb", "culture", "subject:paediatrics"]
  - guid: 3c7d1a9f5b2e4a8c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What is the typical history and symptoms of TB meningitis?"
      Back: "TB contact, lethargy, headache (especially with early morning vomiting), irritability, drowsiness, convulsions, and weight loss."
    tags: ["eptb", "tb-meningitis", "symptoms", "subject:paediatrics"]
  - guid: 7a4e1f3c8b5d9a2c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What are the physical signs of TB meningitis?"
      Back: "Neck pain and resistance to neck flexion due to meningeal irritation (Kernig's sign), cranial nerve palsies, and altered level of consciousness."
    tags: ["eptb", "tb-meningitis", "physical-signs", "subject:paediatrics"]
  - guid: 1f6a3c5e9b2d4a8c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What are the CSF findings in TB meningitis?"
      Back: "Raised protein, low glucose, low chloride, predominantly lymphocytes; gram stain is negative and AFB (acid-fast bacilli) are seldom found."
    tags: ["eptb", "tb-meningitis", "csf", "subject:paediatrics"]
  - guid: 4c9b2a1f8e5d3a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What test can be performed on cerebrospinal fluid in TB meningitis?"
      Back: "Xpert (Gene Xpert) can be performed on CSF for MTB detection and rifampicin susceptibility testing."
    tags: ["eptb", "tb-meningitis", "investigation", "subject:paediatrics"]
  - guid: 8d3f4a1c9e5b2a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "Can the TST be negative in TB meningitis?"
      Back: "Yes, TST can be negative in TB meningitis."
    tags: ["eptb", "tb-meningitis", "tst", "subject:paediatrics"]
  - guid: 2a8e1f3c9b5d4a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "Can chest X-ray be normal in TB meningitis?"
      Back: "Yes, chest X-ray may be normal in children with TBM (TB meningitis)."
    tags: ["eptb", "tb-meningitis", "imaging", "subject:paediatrics"]
  - guid: 5c1a9f3e8b2d4a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "When should TB meningitis be considered in diagnosis?"
      Back: "TB meningitis should always be considered in children diagnosed with meningitis and not responding to treatment."
    tags: ["eptb", "tb-meningitis", "diagnosis", "subject:paediatrics"]
  - guid: 9a2c5b1f8e3d4a7c
    noteType: Basic
    deck: "Corpus::Paediatrics::2024 TUBERCULOSIS"
    fields:
      Front: "What are the complications of TB meningitis?"
      Back: "Hydrocephalus (obstruction to CSF flow), SIADH (syndrome of inappropriate antidiuretic hormone), hemi- or quadriplegia, convulsions, deafness, blindness, and neurodevelopmental delay."
    tags: ["eptb", "tb-meningitis", "complications", "subject:paediatrics"]
