    deck: "Corpus::Paediatrics::ETAT - Coma and Convulsions"
    fields:
      Front: "What is the second-line anticonvulsant if initial benzodiazepines fail?"
      Back: "Phenobarbitone - it is THE drug of next choice after Lorazepam, Midazolam, or Diazepam have failed"
    tags: ["anticonvulsant", "phenobarbitone", "second-line", "etat", "subject:paediatrics"]
  - guid: d7b4f1a9c2e36851
    noteType: Basic
    deck: "Corpus::Paediatrics::ETAT - Coma and Convulsions"
    fields:
      Front: "What is the alternative to Phenobarbitone if it is unavailable?"
      Back: "Phenytoin can be used as an alternative second-line anticonvulsant"
    tags: ["anticonvulsant", "phenytoin", "etat", "subject:paediatrics"]
  - guid: a3e6f7c1b8d24592
    noteType: Basic
    deck: "Corpus::Paediatrics::ETAT - Coma and Convulsions"
    fields:
      Front: "How should Phenytoin be administered in children with convulsions?"
      Back: "Must be given as an IV infusion over 30 minutes"
    tags: ["phenytoin", "administration", "anticonvulsant", "etat", "subject:paediatrics"]
  - guid: c5d2f9a7b1e63481
    noteType: Basic
    deck: "Corpus::Paediatrics::ETAT - Coma and Convulsions"
    fields:
      Front: "What should you do if arrhythmia, bradycardia, or hypotension occurs during Phenytoin infusion?"
      Back: "STOP Phenytoin immediately. Once the patient is settled, resume infusion over 1 hour instead of 30 minutes"
    tags: ["phenytoin", "safety", "anticonvulsant", "etat", "subject:paediatrics"]
