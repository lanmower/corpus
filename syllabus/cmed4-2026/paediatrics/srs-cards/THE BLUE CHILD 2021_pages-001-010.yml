notes:
  - guid: a7f3c2e9b4d1f6e5
    noteType: Basic
    deck: "Corpus::Paediatrics::THE BLUE CHILD 2021"
    fields:
      Front: "What is cyanosis?"
      Back: "Bluish discoloration, especially of the skin and mucous membranes, due to excessive concentration of deoxyhemoglobin in the blood"
    tags: ["cyanosis", "definition", "subject:paediatrics", "blue-child"]
  - guid: b8g4d3f0c5e2a9h1
    noteType: Basic
    deck: "Corpus::Paediatrics::THE BLUE CHILD 2021"
    fields:
      Front: "Name the two mechanisms that result in cyanosis"
      Back: "Systemic arterial oxygen desaturation and increased oxygen extraction by the tissues"
    tags: ["cyanosis", "pathophysiology", "subject:paediatrics"]
  - guid: c9h5e4g1d6f3b0i2
    noteType: Basic
    deck: "Corpus::Paediatrics::THE BLUE CHILD 2021"
    fields:
      Front: "What hemoglobin concentration in capillaries is required for central cyanosis?"
      Back: "5 g/dL of reduced (deoxygenated) hemoglobin in capillaries, which translates to 3.4 g/dL in arterial blood"
    tags: ["central-cyanosis", "hemoglobin", "subject:paediatrics"]
  - guid: d0i6f5h2e7g4c1j3
    noteType: Basic
    deck: "Corpus::Paediatrics::THE BLUE CHILD 2021"
    fields:
      Front: "Define central cyanosis"
      Back: "Bluish discoloration of the skin and mucous membranes in core areas (lips, tongue) due to systemic arterial oxygen desaturation"
    tags: ["central-cyanosis", "definition", "subject:paediatrics"]
  - guid: e1j7g6i3f8h5d2k4
    noteType: Basic
    deck: "Corpus::Paediatrics::THE BLUE CHILD 2021"
    fields:
      Front: "Define peripheral cyanosis"
      Back: "Bluish discoloration only of extremities or fingers, caused by increased oxygen extraction from sluggish blood movement through capillaries"
    tags: ["peripheral-cyanosis", "definition", "subject:paediatrics"]
  - guid: f2k8h7j4g9i6e3l5
    noteType: Basic
    deck: "Corpus::Paediatrics::THE BLUE CHILD 2021"
    fields:
      Front: "List respiratory system causes of central cyanosis"
      Back: "Pneumonia, Bronchiolitis, Bronchospasm (asthma), Pulmonary hypertension, Pulmonary embolism, Hypoventilation"
    tags: ["cyanosis", "respiratory-causes", "subject:paediatrics"]
  - guid: g3l9i8k5h0j7f4m6
    noteType: Basic
    deck: "Corpus::Paediatrics::THE BLUE CHILD 2021"
    fields:
      Front: "List cardiovascular causes of central cyanosis"
      Back: "Cyanotic heart disease, Congenital heart disease, Heart failure, Valvar heart disease"
    tags: ["cyanosis", "cardiac-causes", "subject:paediatrics", "congenital-heart-disease"]
  - guid: h4m0j9l6i1k8g5n7
    noteType: Basic
    deck: "Corpus::Paediatrics::THE BLUE CHILD 2021"
    fields:
      Front: "List CNS causes of central cyanosis"
      Back: "Intracranial hemorrhage, Drug overdose (heroin), Tonic-clonic seizures, Seizures"
    tags: ["cyanosis", "cns-causes", "subject:paediatrics"]
  - guid: i5n1k0m7j2l9h6o8
    noteType: Basic
    deck: "Corpus::Paediatrics::THE BLUE CHILD 2021"
    fields:
      Front: "List blood disorders causing central cyanosis"
      Back: "Methemoglobinemia, Polycythemia, Hemoglobinopathies, CO2 intoxication"
    tags: ["cyanosis", "blood-disorders", "subject:paediatrics"]
  - guid: j6o2l1n8k3m0i7p9
    noteType: Basic
    deck: "Corpus::Paediatrics::THE BLUE CHILD 2021"
    fields:
      Front: "List other causes of central cyanosis"
      Back: "High altitude >2400 m, Hypothermia, Obstructive sleep apnea"
    tags: ["cyanosis", "other-causes", "subject:paediatrics"]
  - guid: k7p3m2o9l4n1j8q0
    noteType: Basic
    deck: "Corpus::Paediatrics::THE BLUE CHILD 2021"
    fields:
      Front: "What is the chemical form of normal hemoglobin unbound to oxygen?"
      Back: "Reduced hemoglobin, symbolized HbFe+2"
    tags: ["hemoglobin", "biochemistry", "subject:paediatrics"]
  - guid: l8q4n3p0m5o2k9r1
    noteType: Basic
    deck: "Corpus::Paediatrics::THE BLUE CHILD 2021"
    fields:
      Front: "What is methemoglobin and its chemical form?"
      Back: "The oxidized form of hemoglobin, symbolized HbFe+3. MetHb imparts an intense bluish tinge to the skin"
    tags: ["methemoglobin", "biochemistry", "subject:paediatrics"]
  - guid: m9r5o4q1n6p3l0s2
    noteType: Basic
    deck: "Corpus::Paediatrics::THE BLUE CHILD 2021"
    fields:
      Front: "What percentage of hemoglobin is normally in the form of methemoglobin?"
      Back: "Normally about 2% of hemoglobin is in the form of metHb"
    tags: ["methemoglobin", "normal-values", "subject:paediatrics"]
  - guid: n0s6p5r2o7q4m1t3
    noteType: Basic
    deck: "Corpus::Paediatrics::THE BLUE CHILD 2021"
    fields:
      Front: "List drug causes of methemoglobinemia"
      Back: "Nitrite and nitrate compounds (e.g. nitroglycerin), topical anesthetics, benzocaine, dapsone"
    tags: ["methemoglobinemia", "drug-causes", "subject:paediatrics"]
  - guid: o1t7q6s3p8r5n2u4
    noteType: Basic
    deck: "Corpus::Paediatrics::THE BLUE CHILD 2021"
    fields:
      Front: "Explain the mechanism of peripheral cyanosis"
      Back: "Normal systemic arterial oxygen saturation, but increased oxygen extraction results in wide arteriovenous oxygen difference and increased deoxygenated blood on venous side of capillary beds"
    tags: ["peripheral-cyanosis", "mechanism", "subject:paediatrics"]
  - guid: p2u8r7t4q9s6o3v5
    noteType: Basic
    deck: "Corpus::Paediatrics::THE BLUE CHILD 2021"
    fields:
      Front: "List causes of peripheral cyanosis due to reduced cardiac output"
      Back: "Heart failure, hypovolemia"
    tags: ["peripheral-cyanosis", "cardiac-causes", "subject:paediatrics"]
  - guid: q3v9s8u5r0t7p4w6
    noteType: Basic
    deck: "Corpus::Paediatrics::THE BLUE CHILD 2021"
    fields:
      Front: "List vascular causes of peripheral cyanosis"
      Back: "Arterial obstruction (peripheral vascular disease, Raynaud phenomenon), venous obstruction (deep vein thrombosis)"
    tags: ["peripheral-cyanosis", "vascular-causes", "subject:paediatrics"]
  - guid: r4w0t9v6s1u8q5x7
    noteType: Basic
    deck: "Corpus::Paediatrics::THE BLUE CHILD 2021"
    fields:
      Front: "List non-cardiac causes of peripheral cyanosis"
      Back: "Cold exposure, sepsis"
    tags: ["peripheral-cyanosis", "causes", "subject:paediatrics"]
  - guid: s5x1u0w7t2v9r6y8
    noteType: Basic
    deck: "Corpus::Paediatrics::THE BLUE CHILD 2021"
    fields:
      Front: "What are the steps of respiratory gas exchange?"
      Back: "Ventilation (exchange of gas between atmosphere and alveoli), Diffusion across alveolar-capillary membrane, Transport of gases in blood, Diffusion from capillaries to cells, Use of oxygen and production of carbon dioxide in cells"
    tags: ["respiration", "gas-exchange", "subject:paediatrics"]
  - guid: t6y2v1x8u3w0s7z9
    noteType: Basic
    deck: "Corpus::Paediatrics::THE BLUE CHILD 2021"
    fields:
      Front: "Explain the principle of pulse oximetry"
      Back: "Based on pulsatile absorbance: deoxygenated blood absorbs more red light, oxygenated blood absorbs more infrared light. Two wavelengths are passed through an arterial bed, and the ratio of infrared and red light transmitted to the photodetector is determined"
    tags: ["pulse-oximetry", "investigation", "subject:paediatrics"]
  - guid: u7z3w2y9v4x1t8a0
    noteType: Basic
    deck: "Corpus::Paediatrics::THE BLUE CHILD 2021"
    fields:
      Front: "What is the cardiothoracic ratio threshold for cardiomegaly on X-ray?"
      Back: "Greater than 50% on a PA view indicates cardiomegaly"
    tags: ["cardiomegaly", "x-ray", "subject:paediatrics"]
  - guid: v8a4x3z0w5y2u9b1
    noteType: Basic
    deck: "Corpus::Paediatrics::THE BLUE CHILD 2021"
    fields:
      Front: "List components of clinical approach to cyanosis"
      Back: "History and clinical assessment, Auscultation for murmurs, Palpation of femoral artery pulses, Blood pressure in 4 limbs, Oxygen test, X-ray for cardiomegaly"
    tags: ["cyanosis", "clinical-approach", "subject:paediatrics"]
  - guid: w9b5y4a1x6z3v0c2
    noteType: Basic
    deck: "Corpus::Paediatrics::THE BLUE CHILD 2021"
    fields:
      Front: "What features suggest congenital heart disease in a cyanotic infant?"
      Back: "Cyanosis with minimal or no respiratory distress (blue but comfortable), Cardiorespiratory failure, Infant desaturated or hypoxemic in 100% oxygen, murmur absent"
    tags: ["congenital-heart-disease", "diagnosis", "subject:paediatrics"]
  - guid: x0c6z5b2y7a4w1d3
    noteType: Basic
    deck: "Corpus::Paediatrics::THE BLUE CHILD 2021"
    fields:
      Front: "What features suggest pulmonary disease in a cyanotic infant?"
      Back: "Cyanosis with respiratory distress (blue and uncomfortable), Infant saturations improve on 100% oxygen, respiratory failure"
    tags: ["pulmonary-cyanosis", "diagnosis", "subject:paediatrics"]
  - guid: y1d7a6c3z8b5x2e4
    noteType: Basic
    deck: "Corpus::Paediatrics::THE BLUE CHILD 2021"
    fields:
      Front: "What mixed presentation may be confused with infection in cyanotic infants?"
      Back: "Cyanotic with signs of respiratory distress (tachypnea, retractions). May be confused with sepsis, pneumonia, meconium aspiration, or RDS"
    tags: ["cyanosis", "differential-diagnosis", "subject:paediatrics"]
  - guid: z2e8b7d4a9c6y3f5
    noteType: Basic
    deck: "Corpus::Paediatrics::THE BLUE CHILD 2021"
    fields:
      Front: "What is the initial management for suspected pulmonary disease?"
      Back: "Supply oxygen (nasal prongs, face mask, CPAP). Start antibiotics"
    tags: ["pulmonary-disease", "management", "subject:paediatrics"]
  - guid: a3f9c8e5b0d7z4g6
    noteType: Basic
    deck: "Corpus::Paediatrics::THE BLUE CHILD 2021"
    fields:
      Front: "Describe the case presentation of Tetralogy of Fallot"
      Back: "3 month old with fast breathing, blue since birth, loud murmur, warm periphery, spell-like attacks with respiratory distress, normal growth"
    tags: ["tetralogy-of-fallot", "case-scenario", "subject:paediatrics", "congenital-heart-disease"]
  - guid: b4g0d9f6c1e8a5h7
    noteType: Basic
    deck: "Corpus::Paediatrics::THE BLUE CHILD 2021"
    fields:
      Front: "What diagnostic tests are used to confirm Tetralogy of Fallot?"
      Back: "History and physical examination, Oxygen test, X-ray, blood gas, lactate, CRP (C-reactive protein), FBC (full blood count)"
    tags: ["tetralogy-of-fallot", "investigations", "subject:paediatrics"]
  - guid: c5h1e0g7d2f9b6i8
    noteType: Basic
    deck: "Corpus::Paediatrics::THE BLUE CHILD 2021"
    fields:
      Front: "What is the clinical adage for managing cyanotic heart disease in doubt?"
      Back: "In doubt give prostin AND antibiotics. This is a lifesaving intervention"
    tags: ["cardiac-management", "treatment", "subject:paediatrics", "prostin"]
  - guid: d6i2f1h8e3g0c7j9
    noteType: Basic
    deck: "Corpus::Paediatrics::THE BLUE CHILD 2021"
    fields:
      Front: "What is the significance of maintaining ductal patency in cyanotic heart disease?"
      Back: "Opening and maintaining ductal patency is the only medical intervention that can restore adequate systemic cardiac output in ductal-dependent lesions"
    tags: ["ductus-arteriosus", "cardiac-physiology", "subject:paediatrics"]
  - guid: e7j3g2i9f4h1d8k0
    noteType: Basic
    deck: "Corpus::Paediatrics::THE BLUE CHILD 2021"
    fields:
      Front: "What is the dose of Prostaglandin E1 (PGE1) for ductal-dependent cardiac lesions?"
      Back: "0.05 to 0.1 mcg/kg/min infused intravenously. Infused emergently until cardiac echocardiogram can be obtained"
    tags: ["pge1", "drug-dosage", "subject:paediatrics", "congenital-heart-disease"]
  - guid: f8k4h3j0g5i2e9l1
    noteType: Basic
    deck: "Corpus::Paediatrics::THE BLUE CHILD 2021"
    fields:
      Front: "In which patient population should PGE1 be considered emergently?"
      Back: "Neonates presenting in shock within the first 2 weeks of life with suspected ductal-dependent systemic output"
    tags: ["pge1", "neonatal-emergency", "subject:paediatrics"]
