deck: "Corpus::Gastroenterology::Chronic Pancreatitis"
notes:
  - guid: 84e3c695cfd76c32
    noteType: Basic
    deck: "Corpus::Gastroenterology::Chronic Pancreatitis"
    fields:
      Front: "What is chronic pancreatitis and what does it result in?"
      Back: "Chronic pancreatitis involves progressing inflammatory changes in the pancreas that result in permanent structural damage, leading to impairment of both exocrine and endocrine function."
    tags: ["subject:gastroenterology"]
  - guid: 2e2c441fac211159
    noteType: Basic
    deck: "Corpus::Gastroenterology::Chronic Pancreatitis"
    fields:
      Front: "How does the pathogenesis of chronic pancreatitis differ from acute pancreatitis?"
      Back: "Chronic pancreatitis results from recurrent episodes of acute pancreatitis over a period of time, whereas acute pancreatitis is usually a single, painful episode. Chronic pancreatitis may be asymptomatic for long periods."
    tags: ["subject:gastroenterology"]
  - guid: 78385d84c1db608c
    noteType: Basic
    deck: "Corpus::Gastroenterology::Chronic Pancreatitis"
    fields:
      Front: "What is a key distinguishing feature of chronic vs acute pancreatitis in terms of symptoms?"
      Back: "Acute pancreatitis is almost always painful in its acute presentation, while chronic pancreatitis may be asymptomatic over long periods, or present with pancreatic insufficiency symptoms initially without pain."
    tags: ["subject:gastroenterology"]
  - guid: 1c0076072e21b196
    noteType: Basic
    deck: "Corpus::Gastroenterology::Chronic Pancreatitis"
    fields:
      Front: "What is the distribution pattern of chronic pancreatitis?"
      Back: "Chronic pancreatitis usually involves a diffuse, large portion of the entire pancreas rather than being localized or focal disease."
    tags: ["subject:gastroenterology"]
  - guid: bf367441eac612bb
    noteType: Basic
    deck: "Corpus::Gastroenterology::Chronic Pancreatitis"
    fields:
      Front: "What are the pancreatic enzyme levels in chronic vs acute pancreatitis?"
      Back: "Pancreatic enzymes such as amylase and lipase are usually normal in the chronic phase but are almost always elevated in acute pancreatitis."
    tags: ["subject:gastroenterology"]
  - guid: f9f6055523c57af7
    noteType: Basic
    deck: "Corpus::Gastroenterology::Chronic Pancreatitis"
    fields:
      Front: "What is the most common etiology of chronic pancreatitis?"
      Back: "Alcohol is the most common etiology of chronic pancreatitis."
    tags: ["subject:gastroenterology"]
  - guid: 6c6944fb3840fff9
    noteType: Basic
    deck: "Corpus::Gastroenterology::Chronic Pancreatitis"
    fields:
      Front: "List the genetic causes of chronic pancreatitis mentioned."
      Back: "Genetic causes include mutations in the cystic fibrosis gene and allergic pancreatitis."
    tags: ["subject:gastroenterology"]
  - guid: 2d79fc0259b0757d
    noteType: Basic
    deck: "Corpus::Gastroenterology::Chronic Pancreatitis"
    fields:
      Front: "What other etiologies of chronic pancreatitis are mentioned?"
      Back: "Other etiologies include: autoimmune pancreatitis, ductal obstruction, tumors, pancreatic divisum, recurrent stone disease, tropical pancreatitis, and involvement in systemic diseases such as systemic lupus erythematosus."
    tags: ["subject:gastroenterology"]
  - guid: 4c2499d8cfa7ac77
    noteType: Basic
    deck: "Corpus::Gastroenterology::Chronic Pancreatitis"
    fields:
      Front: "What systemic diseases can involve the pancreas leading to chronic pancreatitis?"
      Back: "Systemic lupus erythematosus and hyperparathyroidism are examples of systemic diseases that can involve the pancreas."
    tags: ["subject:gastroenterology"]
  - guid: 920631ac6a5877ac
    noteType: Basic
    deck: "Corpus::Gastroenterology::Chronic Pancreatitis"
    fields:
      Front: "What is the relationship between alcohol consumption and chronic pancreatitis development?"
      Back: "Only 5-10% of alcoholics develop chronic pancreatitis, yet alcohol accounts for 45% of all cases. There is individual variation in sensitivity to alcohol toxicity."
    tags: ["subject:gastroenterology"]
  - guid: cb5fb9c57b2cc865
    noteType: Basic
    deck: "Corpus::Gastroenterology::Chronic Pancreatitis"
    fields:
      Front: "What is the role of cigarette smoking in chronic pancreatitis?"
      Back: "Cigarette smoking is an independent risk factor for chronic pancreatitis development. When combined with alcohol use, it increases the risk further."
    tags: ["subject:gastroenterology"]
  - guid: 99eca10ebd2d8545
    noteType: Basic
    deck: "Corpus::Gastroenterology::Chronic Pancreatitis"
    fields:
      Front: "Describe the typical abdominal pain in chronic pancreatitis."
      Back: "Pain is usually epigastric, radiating to the back with nausea and vomiting. Patients lean upright or slightly forward. Pain typically worsens 15-30 minutes after eating and can progress from discrete attacks to continuous pain throughout the day."
    tags: ["subject:gastroenterology"]
  - guid: 2e9919402791f1c9
    noteType: Basic
    deck: "Corpus::Gastroenterology::Chronic Pancreatitis"
    fields:
      Front: "What percentage of pancreatic function must be lost before clinically significant pancreatic insufficiency occurs?"
      Back: "Clinically significant protein and fat deficiencies do not occur until more than 90% of pancreatic function is lost."
    tags: ["subject:gastroenterology"]
  - guid: 482aa81440e2b87d
    noteType: Basic
    deck: "Corpus::Gastroenterology::Chronic Pancreatitis"
    fields:
      Front: "What is steatorrhea and how does it present?"
      Back: "Steatorrhea is fat malabsorption, clinically presenting as loose, greasy bowel stools that are difficult to flush away."
    tags: ["subject:gastroenterology"]
  - guid: fa591b25a14de78c
    noteType: Basic
    deck: "Corpus::Gastroenterology::Chronic Pancreatitis"
    fields:
      Front: "Which fat-soluble vitamins may be malabsorbed in chronic pancreatitis?"
      Back: "Fat-soluble vitamins A, D, E, K, and B12 may be malabsorbed, leading to vitamin deficiency symptoms."
    tags: ["subject:gastroenterology"]
  - guid: 38e10534d447d3f5
    noteType: Basic
    deck: "Corpus::Gastroenterology::Chronic Pancreatitis"
    fields:
      Front: "What is pancreatic diabetes and when does it typically develop?"
      Back: "Pancreatic diabetes is glucose intolerance resulting from destruction of pancreatic endocrine tissue. Diabetes mellitus usually occurs quite late in the disease course and requires insulin therapy."
    tags: ["subject:gastroenterology"]
  - guid: 64d3e6c3a88a65ca
    noteType: Basic
    deck: "Corpus::Gastroenterology::Chronic Pancreatitis"
    fields:
      Front: "Why is managing diabetes in chronic pancreatitis patients challenging?"
      Back: "Patients have absolute reduction in both insulin and glucagon secretion, creating a very narrow therapeutic window. They have increased risk of hypoglycemia and standard hypoglycemic agents often do not work."
    tags: ["subject:gastroenterology"]
  - guid: 4ef4a8721227b766
    noteType: Basic
    deck: "Corpus::Gastroenterology::Chronic Pancreatitis"
    fields:
      Front: "What is the diagnostic challenge in chronic pancreatitis?"
      Back: "Diagnosis is challenging because no single laboratory or imaging study is 100% diagnostic. All tests can be normal even in patients with clinical features of chronic pancreatitis."
    tags: ["subject:gastroenterology"]
  - guid: f9ac393afc2dda6c
    noteType: Basic
    deck: "Corpus::Gastroenterology::Chronic Pancreatitis"
    fields:
      Front: "What are the classic diagnostic findings of advanced chronic pancreatitis?"
      Back: "The classic triad includes: pancreatic calcifications, steatorrhea, and development of diabetes mellitus. However, these findings are only seen very late and in advanced disease."
    tags: ["subject:gastroenterology"]
  - guid: 8f95ddcfe030e816
    noteType: Basic
    deck: "Corpus::Gastroenterology::Chronic Pancreatitis"
    fields:
      Front: "What are the two categories of tests for pancreatic function?"
      Back: "Direct tests stimulate the pancreas (e.g., secretin or cholecystokinin stimulation test) and measure pancreatic secretions. Indirect tests measure pancreatic products in serum or feces (e.g., 72-hour fecal fat, fecal chymotrypsin, serum trypsinogen)."
    tags: ["subject:gastroenterology"]
  - guid: 83fa0f623c3907c5
    noteType: Basic
    deck: "Corpus::Gastroenterology::Chronic Pancreatitis"
    fields:
      Front: "Why is the direct secretin stimulation test not commonly used clinically?"
      Back: "The direct secretin stimulation test is time-consuming and is only performed in specific research settings, not in routine clinical practice."
    tags: ["subject:gastroenterology"]
  - guid: f438823e0ef782b3
    noteType: Basic
    deck: "Corpus::Gastroenterology::Chronic Pancreatitis"
    fields:
      Front: "What is the clinical status of the 72-hour fecal fat test?"
      Back: "The 72-hour fecal fat test is no longer performed in clinical practice, though laboratory fasting is needed before samples are collected."
    tags: ["subject:gastroenterology"]
  - guid: e03a48d6053ce11e
    noteType: Basic
    deck: "Corpus::Gastroenterology::Chronic Pancreatitis"
    fields:
      Front: "What imaging findings are characteristic of chronic pancreatitis?"
      Back: "Imaging shows pancreatic ductal dilation across the entire length to the tail, multiple calculi in a dilated main pancreatic duct, and distortion of pancreatic tissue architecture."
    tags: ["subject:gastroenterology"]
  - guid: 63bfae0bcceaea8b
    noteType: Basic
    deck: "Corpus::Gastroenterology::Chronic Pancreatitis"
    fields:
      Front: "What diagnostic findings on ERCP/pancreatography are typical of chronic pancreatitis?"
      Back: "An abnormal pancreatogram showing dilatation of the main pancreatic duct with stricturing of the side branches is typically diagnostic on ERCP."
    tags: ["subject:gastroenterology"]
  - guid: dbf58aecce071b1e
    noteType: Basic
    deck: "Corpus::Gastroenterology::Chronic Pancreatitis"
    fields:
      Front: "What are the main treatment approaches for chronic pancreatitis pain?"
      Back: "Pain management is the mainstay of treatment using analgesic therapy. Patients must be counseled on alcohol cessation, smoking cessation, and consumption of small meals. Pancreatic enzyme supplements are usually required."
    tags: ["subject:gastroenterology"]
  - guid: 697feea7a96236f1
    noteType: Basic
    deck: "Corpus::Gastroenterology::Chronic Pancreatitis"
    fields:
      Front: "What advanced pain management options are available for refractory pain?"
      Back: "Antioxidant therapy can be considered in patients not responding to conventional analgesia. Selective nerve blocks can be offered. Endoscopic therapy includes pancreatic lithotripsy or pancreatic duct sphincterotomy."
    tags: ["subject:gastroenterology"]
  - guid: 35d283330a35c9e2
    noteType: Basic
    deck: "Corpus::Gastroenterology::Chronic Pancreatitis"
    fields:
      Front: "What surgical options exist for chronic pancreatitis?"
      Back: "Surgery may be offered for decompression, distal gland resection, or denervation procedures, though these are rarely used in current clinical practice."
    tags: ["subject:gastroenterology"]
  - guid: 88e165c90bf73b92
    noteType: Basic
    deck: "Corpus::Gastroenterology::Chronic Pancreatitis"
    fields:
      Front: "How is steatorrhea managed in chronic pancreatitis?"
      Back: "Management includes dietary modification, pancreatic enzyme replacement (which usually resolves steatorrhea), vitamin supplementation, and use of medium-chain triglycerides or MCT oil to avoid chylomicron absorption issues."
    tags: ["subject:gastroenterology"]
  - guid: 395d55af42a86189
    noteType: Basic
    deck: "Corpus::Gastroenterology::Chronic Pancreatitis"
    fields:
      Front: "Why are medium-chain triglycerides used in chronic pancreatitis management?"
      Back: "Medium-chain triglycerides bypass the need for normal fat absorption and are absorbed directly from the intestinal lumen, avoiding the chylomicron absorption pathway that is impaired in pancreatic insufficiency."
    tags: ["subject:gastroenterology"]
  - guid: 07a623eae7ea6021
    noteType: Basic
    deck: "Corpus::Gastroenterology::Chronic Pancreatitis"
    fields:
      Front: "What is the treatment of diabetes mellitus in chronic pancreatitis?"
      Back: "Insulin therapy is the mainstay of treatment. Hypoglycemic agents provide no benefit in these patients due to the absolute reduction in both insulin and glucagon."
    tags: ["subject:gastroenterology"]
  - guid: 9841287c6a8f8176
    noteType: Basic
    deck: "Corpus::Gastroenterology::Chronic Pancreatitis"
    fields:
      Front: "What complications can pseudocysts undergo in chronic pancreatitis?"
      Back: "Pseudocysts can become infected, rupture, or hemorrhage internally. If infection develops, it can lead to sepsis and complicated pancreatitis."
    tags: ["subject:gastroenterology"]
  - guid: e69438e82a1507ed
    noteType: Basic
    deck: "Corpus::Gastroenterology::Chronic Pancreatitis"
    fields:
      Front: "What compression-related complications can occur with chronic pancreatitis?"
      Back: "The inflammatory mass or pseudocysts can cause compression of the duodenum, biliary system, and stomach lumen, potentially requiring intervention."
    tags: ["subject:gastroenterology"]
  - guid: d6914f1095408215
    noteType: Basic
    deck: "Corpus::Gastroenterology::Chronic Pancreatitis"
    fields:
      Front: "What vascular complications can occur in chronic pancreatitis?"
      Back: "Pancreatic fistulas, splenic venous thrombosis, and splenic artery aneurysms can occur. Splenic vein thrombosis runs across the pancreas and may cause esophageal varices."
    tags: ["subject:gastroenterology"]
  - guid: 9e860fa0e078b55e
    noteType: Basic
    deck: "Corpus::Gastroenterology::Chronic Pancreatitis"
    fields:
      Front: "What is the relationship between chronic pancreatitis and pancreatic cancer?"
      Back: "Chronic pancreatitis is associated with an increased risk of developing pancreatic cancer, particularly in patients with a smoking history. However, it can be difficult to differentiate chronic pancreatitis from pancreatic adenocarcinoma."
    tags: ["subject:gastroenterology"]
  - guid: 3640c83e120e67c1
    noteType: Basic
    deck: "Corpus::Gastroenterology::Chronic Pancreatitis"
    fields:
      Front: "What other acute complications can occur in chronic pancreatitis?"
      Back: "Patients can present with recurrent episodes of acute pancreatitis, which is usually due to the underlying chronic pancreatitis condition."
    tags: ["subject:gastroenterology"]
