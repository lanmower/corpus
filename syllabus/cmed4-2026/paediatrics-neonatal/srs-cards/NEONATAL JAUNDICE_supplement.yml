deck: "Corpus::Paediatrics-Neonatal::NEONATAL JAUNDICE"
notes:
  - guid: "bileox001sup"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::NEONATAL JAUNDICE"
    fields:
      Front: "What enzyme inhibitor blocks heme oxygenase in bilirubin synthesis?"
      Back: "Metalloporphyrins inhibit heme oxygenase"
    tags: ["bilirubin-biochemistry", "enzyme-inhibition", "supplement", "subject:paediatrics-neonatal"]
  - guid: "fluid_loss_mech001"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::NEONATAL JAUNDICE"
    fields:
      Front: "What causes increased fluid loss in open incubators?"
      Back: "Osmotic diuresis"
    tags: ["fluid-management", "insensible-loss", "supplement", "subject:paediatrics-neonatal"]
  - guid: "fluid_loss_photo001"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::NEONATAL JAUNDICE"
    fields:
      Front: "What is the mechanism of fluid loss under phototherapy lights?"
      Back: "Direct insensible water loss from skin surface exposed to light"
    tags: ["fluid-management", "phototherapy", "supplement", "subject:paediatrics-neonatal"]
  - guid: "hypoca_dose001"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::NEONATAL JAUNDICE"
    fields:
      Front: "What is the exact dose of 10% calcium gluconate to add to neonatal feeds?"
      Back: "3 ml of 10% calcium gluconate per 100 ml neonatal normal saline"
    tags: ["hypocalcaemia-management", "dosing", "supplement", "subject:paediatrics-neonatal"]
  - guid: "hypoca_iv_dose002"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::NEONATAL JAUNDICE"
    fields:
      Front: "What is the IV dose of 10% calcium gluconate for symptomatic hypocalcaemia?"
      Back: "2 ml/kg IV, diluted and given slowly"
    tags: ["hypocalcaemia-management", "dosing", "supplement", "subject:paediatrics-neonatal"]
  - guid: "magn_treatment_exact"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::NEONATAL JAUNDICE"
    fields:
      Front: "What is the exact dose and schedule for hypomagnesaemia treatment?"
      Back: "0.1 ml of MgSO₄ 50% IV/IM, repeated 12-hourly for 3 doses"
    tags: ["hypomagnesaemia-management", "dosing", "supplement", "subject:paediatrics-neonatal"]
  - guid: "hyperna_treatment_protocol"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::NEONATAL JAUNDICE"
    fields:
      Front: "How should hypernatraemia correction be timed to prevent cerebral complications?"
      Back: "Serum sodium must be lowered over 24–48 hours to avoid cerebral oedema"
    tags: ["hypernatraemia-management", "treatment", "supplement", "subject:paediatrics-neonatal"]
  - guid: "hyponatrem_treatment001"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::NEONATAL JAUNDICE"
    fields:
      Front: "What is the treatment for hyponatraemia?"
      Back: "Fluid restriction; treatment depends on severity and rate of onset"
    tags: ["hyponatraemia-management", "treatment", "supplement", "subject:paediatrics-neonatal"]
  - guid: "hyperka_insulin_prep"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::NEONATAL JAUNDICE"
    fields:
      Front: "What is the exact insulin preparation for hyperkalaemia management?"
      Back: "Mix 2 iu Actrapid in 20 ml of half-saline solution"
    tags: ["hyperkalaemia-management", "pharmacology", "supplement", "subject:paediatrics-neonatal"]
  - guid: "hyperka_insulin_dose"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::NEONATAL JAUNDICE"
    fields:
      Front: "What is the insulin dosing regimen for hyperkalaemia?"
      Back: "Give 0.05 iu/kg stat, then commence continuous infusion at 0.05 iu/kg"
    tags: ["hyperkalaemia-management", "dosing", "supplement", "subject:paediatrics-neonatal"]
  - guid: "hyperka_sodabic_dose"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::NEONATAL JAUNDICE"
    fields:
      Front: "What is the dose of sodium bicarbonate (Sodabic) for hyperkalaemia?"
      Back: "2 mmol/kg intravenously to correct acidosis"
    tags: ["hyperkalaemia-management", "pharmacology", "supplement", "subject:paediatrics-neonatal"]
  - guid: "hyperka_salbutamol_dose"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::NEONATAL JAUNDICE"
    fields:
      Front: "What is the dose of salbutamol for acute hyperkalaemia management?"
      Back: "4 mcg/kg IV bolus"
    tags: ["hyperkalaemia-management", "dosing", "supplement", "subject:paediatrics-neonatal"]
  - guid: "hyperka_kayexalate_exact"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::NEONATAL JAUNDICE"
    fields:
      Front: "What is the exact dose and route of kayexalate for hyperkalaemia?"
      Back: "1 g/kg/day orally or per rectum (po/pr)"
    tags: ["hyperkalaemia-management", "pharmacology", "supplement", "subject:paediatrics-neonatal"]
  - guid: "idm_preconception_control"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::NEONATAL JAUNDICE"
    fields:
      Front: "How does preconceptual glycaemic control affect IDM outcomes?"
      Back: "Preconceptual control is essential to reduce malformation incidence; pregnancy control reduces most complications but NOT malformations"
    tags: ["idm", "prevention", "supplement", "subject:paediatrics-neonatal"]
  - guid: "idm_feto_bleed_causes"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::NEONATAL JAUNDICE"
    fields:
      Front: "What feto-maternal bleeding events increase Rh sensitisation?"
      Back: "Abortion, amniocentesis, external cephalic version (ECV)"
    tags: ["rh-disease", "prevention", "supplement", "subject:paediatrics-neonatal"]
  - guid: "bilirubin_conjugation_cofactor"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::NEONATAL JAUNDICE"
    fields:
      Front: "What is the role of glucuronic acid in bilirubin metabolism?"
      Back: "Bilirubin is conjugated with glucuronic acid in the liver to become water-soluble"
    tags: ["bilirubin-metabolism", "biochemistry", "supplement", "subject:paediatrics-neonatal"]
  - guid: "enterohepatic_circ_detail"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::NEONATAL JAUNDICE"
    fields:
      Front: "What role does enterohepatic circulation play in neonatal jaundice?"
      Back: "Unconjugated bilirubin is reabsorbed from the intestine and recirculated to the liver, prolonging jaundice"
    tags: ["bilirubin-metabolism", "intestine", "supplement", "subject:paediatrics-neonatal"]
  - guid: "hypogly_monitoring_freq"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::NEONATAL JAUNDICE"
    fields:
      Front: "What is the monitoring protocol for neonatal hypoglycaemia screening?"
      Back: "Check glucose meter within 1 hour of birth in at-risk infants; then hourly until glucose >3 mmol/ℓ"
    tags: ["hypoglycaemia-monitoring", "protocol", "supplement", "subject:paediatrics-neonatal"]
  - guid: "hypergl_dextrose_cocktail"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::NEONATAL JAUNDICE"
    fields:
      Front: "What is the composition and use of a 5% dextrose cocktail in hyperglycaemia?"
      Back: "5% dextrose solution used when switching from higher concentration to prevent hyperglycaemia; monitor glucosuria"
    tags: ["hyperglycaemia-management", "pharmacology", "supplement", "subject:paediatrics-neonatal"]
  - guid: "hypergl_glucose_threshold_weaning"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::NEONATAL JAUNDICE"
    fields:
      Front: "At what glucose threshold should insulin be weaned in hyperglycaemia?"
      Back: "When glucose <10 mmol/ℓ: wean insulin and change to neonatal normal saline"
    tags: ["hyperglycaemia-management", "treatment-goals", "supplement", "subject:paediatrics-neonatal"]
  - guid: "albumin_bilirubin_binding"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::NEONATAL JAUNDICE"
    fields:
      Front: "How does albumin administration affect bilirubin management?"
      Back: "20% albumin enhances bilirubin binding to prevent free bilirubin toxicity; dose 5 ml/kg IV"
    tags: ["jaundice-management", "pharmacology", "supplement", "subject:paediatrics-neonatal"]
  - guid: "hypoca_timing_idm"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::NEONATAL JAUNDICE"
    fields:
      Front: "When does hypocalcaemia occur most commonly in preterm infants?"
      Back: "Within the first 3 days of life due to calcium deficiency; about 1/3 of LBWI and 50% of IDM affected"
    tags: ["hypocalcaemia", "epidemiology", "supplement", "subject:paediatrics-neonatal"]
  - guid: "fluid_assess_frequency"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::NEONATAL JAUNDICE"
    fields:
      Front: "How frequently should neonatal fluid status be assessed?"
      Back: "Every 6–12 hours depending on clinical state"
    tags: ["fluid-management", "monitoring", "supplement", "subject:paediatrics-neonatal"]
  - guid: "kernicterus_bbb_crossing"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::NEONATAL JAUNDICE"
    fields:
      Front: "Why does bilirubin cross the blood-brain barrier in kernicterus?"
      Back: "High free bilirubin crosses the BBB in areas with high blood flow and high metabolic rates, causing neurotoxicity"
    tags: ["kernicterus", "pathophysiology", "supplement", "subject:paediatrics-neonatal"]
  - guid: "phototherapy_ngt_feeds"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::NEONATAL JAUNDICE"
    fields:
      Front: "How should feeding be managed during phototherapy for severe jaundice?"
      Back: "Encourage nasogastric tube feeds or feeds under phototherapy light to maximize exposure and minimize breastfeeding interruption"
    tags: ["jaundice-management", "phototherapy", "supplement", "subject:paediatrics-neonatal"]
  - guid: "rh_sens_anti_d_mechanism"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::NEONATAL JAUNDICE"
    fields:
      Front: "What is the mechanism of action of anti-D in Rh sensitisation prevention?"
      Back: "Anti-D binds to fetal RBCs carrying D antigen, facilitating their rapid removal from maternal circulation before sensitisation occurs"
    tags: ["rh-disease", "prevention", "mechanism", "supplement", "subject:paediatrics-neonatal"]
  - guid: "abo_coombs_neg"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::NEONATAL JAUNDICE"
    fields:
      Front: "Why is the Coombs test often negative in ABO incompatibility?"
      Back: "Natural anti-A and anti-B antibodies are IgM (do not cross placenta efficiently) or weakly reactive; direct Coombs may be negative despite haemolysis"
    tags: ["abo-incompatibility", "immunology", "supplement", "subject:paediatrics-neonatal"]
  - guid: "hyponatrem_vlbw_mechanism"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::NEONATAL JAUNDICE"
    fields:
      Front: "Why are VLBW infants <32 weeks prone to hyponatraemia?"
      Back: "Unable to conserve sodium efficiently; high urinary sodium losses lead to hyponatraemia"
    tags: ["hyponatraemia", "pathophysiology", "supplement", "subject:paediatrics-neonatal"]
  - guid: "hyponatrem_siadh_mechanism"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::NEONATAL JAUNDICE"
    fields:
      Front: "How does RDS combined with asphyxia lead to hyponatraemia?"
      Back: "RDS + asphyxia → SIADH (syndrome of inappropriate antidiuretic hormone) → sodium loss in urine, water intoxication, diarrhoea"
    tags: ["hyponatraemia", "pathophysiology", "supplement", "subject:paediatrics-neonatal"]
  - guid: "hyperna_brain_mech"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::NEONATAL JAUNDICE"
    fields:
      Front: "What is the mechanism of brain damage in hypernatraemia?"
      Back: "Water shift from brain tissue causes brain cell shrinkage, pressure differences → capillary dilatation and rupture → cerebral venous thrombosis and haemorrhage"
    tags: ["hypernatraemia", "pathophysiology", "supplement", "subject:paediatrics-neonatal"]
  - guid: "phototherapy_insensible_loss"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::NEONATAL JAUNDICE"
    fields:
      Front: "What causes excessive insensible water loss in phototherapy and radiant heaters?"
      Back: "Phototherapy lights and radiant heaters increase insensible water loss, predisposing to dehydration and hypernatraemia"
    tags: ["fluid-management", "phototherapy", "supplement", "subject:paediatrics-neonatal"]
  - guid: "fluid_overload_nec_mechanism"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::NEONATAL JAUNDICE"
    fields:
      Front: "How does fluid overload contribute to necrotizing enterocolitis (NEC)?"
      Back: "Excessive fluid administration can lead to bowel distension, vascular compromise, and NEC development"
    tags: ["fluid-management", "complications", "supplement", "subject:paediatrics-neonatal"]
