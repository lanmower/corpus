    noteType: "Basic"
    deck: "Corpus::Paediatrics::EPILEPSY"
    fields:
      Front: "What is the common drug interaction of Carbamazepine?"
      Back: "Certain antibiotics like erythromycin and anti-retroviral drugs interact with Carbamazepine."
    tags: ["epilepsy", "antiepileptic-drugs", "carbamazepine", "drug-interactions", "subject:paediatrics"]

