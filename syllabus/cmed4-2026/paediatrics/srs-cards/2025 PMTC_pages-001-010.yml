    noteType: "Basic"
    deck: "Corpus::Paediatrics::2025 PMTC"
    fields:
      Front: "What is the typical timing for life-threatening opportunistic infection like PCP in perinatal HIV?"
      Back: "4-6 months"
    tags: ["hiv", "clinical", "opportunistic-infection", "subject:paediatrics"]
