# Spaced Repetition System (SRS) Cards
# Topic: Glomerular Disease
# Source: Glomerular Disease - CMED4IIM1 - 2026_pages-001-007.txt

- front: "What is the epidemiology of glomerular disease in Africa?"
  back: "Glomerular disease is responsible for between 5-10% of kidney disease cases in Africa. It is often poorly diagnosed and poorly managed, but can be successfully managed if diagnosed early and appropriately."
  tags: ["glomerular-disease","epidemiology","Africa","diagnosis"]

- front: "What is the classification of glomerular disease?"
  back: "Glomerular disease is classified into primary renal disease (limited to the kidney) and secondary kidney disease (systemic disease involving the kidney). These may present as nephrotic or nephritic syndrome."
  tags: ["glomerular-disease","classification","primary","secondary"]

- front: "What are the primary causes of nephrotic syndrome?"
  back: "Primary causes include minimal change disease, focal segmental glomerular sclerosis (FSGS), and membranous nephropathy. Secondary causes include diabetes (most common), infections (especially HIV), and autoimmune diseases (like lupus)."
  tags: ["nephrotic-syndrome","causes","minimal-change","FSGS","membranous"]

- front: "How is nephrotic syndrome defined?"
  back: "Nephrotic syndrome is defined as urine protein excretion >3.5 g/24 hours per 1.73 m2, associated with hypoalbuminemia, peripheral or pulmonary edema, hyperlipidemia, lipiduria, and increased susceptibility to infections and hypercoagulation."
  tags: ["nephrotic-syndrome","definition","proteinuria","hypoalbuminemia"]

- front: "What is the pathophysiology of nephrotic syndrome?"
  back: "In nephrotic syndrome, damage to podocytes causes foot processes to become effaced and detached. This allows protein leakage into the tubules, where it becomes toxic to the kidney. Loss of protein from the bloodstream results in hypoalbuminemia and secondary manifestations."
  tags: ["nephrotic-syndrome","pathophysiology","podocytes","proteinuria"]

- front: "What are the key differences between nephrotic and nephritic syndrome?"
  back: "Nephrotic syndrome presents insidiously over time with normal early kidney function, mainly proteinuria >3.5 g/day, hypoalbuminemia, and late hypertension. Nephritic syndrome presents acutely with impaired kidney function, mainly hematuria with subnephrotic proteinuria, and early hypertension."
  tags: ["nephrotic-syndrome","nephritic-syndrome","comparison","clinical-presentation"]

- front: "What is the critical diagnostic test for glomerular disease?"
  back: "The urine dipstick is vital for diagnosis. It should show presence of protein (3+ indicates possible nephrotic syndrome) and/or blood. Failure to perform a urine dipstick can result in completely missing the diagnosis."
  tags: ["glomerular-disease","diagnosis","urine-dipstick","investigation"]

- front: "What investigations are required for nephrotic syndrome?"
  back: "Investigations include: urine dipstick and microscopy, albumin and protein-creatinine ratio quantification, eGFR and kidney function, liver function tests, bone profile (calcium, phosphate, magnesium), fasting lipid profile, and kidney ultrasound. Kidney biopsy if diagnosis remains unknown."
  tags: ["nephrotic-syndrome","investigation","urine-microscopy","eGFR"]

- front: "What is the management approach for nephrotic syndrome?"
  back: "Management includes: salt restriction (<5 g/day), diuretics for edema with weight loss target 0.5-1 kg/day, ACE inhibitors or ARBs for proteinuria reduction, target BP 120/75 mmHg, protein restriction to 0.8 mg/kg/day, anticoagulation if high proteinuria, vaccinations for infections, and statins for dyslipidemia."
  tags: ["nephrotic-syndrome","management","salt-restriction","ACE-inhibitors"]

- front: "How is hypercoagulability managed in nephrotic syndrome?"
  back: "Hypercoagulability in nephrotic syndrome occurs due to increased hepatic procoagulant synthesis and loss of anticoagulants. Patients require anticoagulation with low-molecular-weight heparin or warfarin (maintaining INR 2-3), especially with high proteinuria. Risk of deep vein thrombosis and pulmonary embolism is significant."
  tags: ["nephrotic-syndrome","hypercoagulability","anticoagulation","thrombosis"]

- front: "What immunosuppressive agents are used for primary nephrotic syndrome?"
  back: "Based on kidney biopsy histology, agents used include: prednisone, ciclosporin, tacrolimus, mycophenolate mofetil, azathioprine, and cyclophosphamide. The specific agent depends on the underlying pathological diagnosis."
  tags: ["nephrotic-syndrome","immunosuppression","treatment","kidney-biopsy"]

- front: "What are the non-proliferative causes of glomerulonephritis?"
  back: "Non-proliferative causes include minimal change disease, membranous nephropathy, and focal segmental glomerulosclerosis (FSGS). These typically present with nephrotic syndrome."
  tags: ["glomerulonephritis","non-proliferative","minimal-change","membranous"]

- front: "What is acute nephritic syndrome?"
  back: "Acute nephritic syndrome is caused by glomerular inflammation presenting with impaired kidney function, hematuria (often with dysmorphic RBCs and RBC casts), variable proteinuria, edema, hypertension, and sometimes systemic symptoms. It can progress to rapidly progressive glomerulonephritis or end-stage kidney disease if untreated."
  tags: ["nephritic-syndrome","acute","hematuria","glomerulonephritis"]

- front: "What are the clinical manifestations of glomerular disease?"
  back: "Glomerular disease can present with: blood in urine (hematuria), protein in urine (proteinuria), edema (peripheral or pulmonary), hypertension, and impaired kidney function. Systemic features may include rashes, arthritis, fever, and multi-organ involvement (eyes, cardiovascular, pulmonary, GI, neurological, skin)."
  tags: ["glomerular-disease","clinical-manifestations","symptoms","signs"]

- front: "What serological tests are used to diagnose secondary glomerulonephritis?"
  back: "Serological tests include: complement levels and ASOT for post-infectious GN, anti-DNA antibodies for lupus, ANCA antibodies for vasculitis, and HIV/Hepatitis B and C serology. ANA screen helps identify lupus as secondary cause."
  tags: ["glomerulonephritis","serological-tests","diagnosis","secondary-causes"]

- front: "What is the diagnostic algorithm for glomerular disease?"
  back: "Step 1: Perform urine dipstick to detect protein and/or blood. Step 2: Determine if nephrotic or nephritic syndrome is present. Step 3: Assess for multi-system disease features. Step 4: Consider primary vs secondary causes. Step 5: Perform kidney biopsy for definitive diagnosis and guide treatment."
  tags: ["glomerular-disease","diagnosis","algorithm","clinical-approach"]

- front: "How does pregnancy affect presentation in case scenarios?"
  back: "The typical presentation of acute glomerulonephritis occurs 3 weeks after severe infection or ear injury. A classic case presents with dark urine (hematuria), generalized swelling (edema), acute kidney injury, elevated blood pressure (180/120), and systemic signs of infection."
  tags: ["glomerulonephritis","acute","post-infectious","clinical-case"]

- front: "What findings on urinalysis indicate nephritic syndrome?"
  back: "Key urinalysis findings in nephritic syndrome include: active sediment with 2-3+ blood, dysmorphic red blood cells, and red blood cell casts. Protein may be present but typically <1 g/day. These findings indicate glomerular inflammation and damage."
  tags: ["nephritic-syndrome","urinalysis","hematuria","RBC-casts"]

- front: "What is the role of kidney ultrasound in glomerular disease?"
  back: "Kidney ultrasound shows hyperechoic kidneys with echogenicity similar to the liver in acute nephritic syndrome. Ultrasound helps assess kidney size, cortical thickness, and excludes obstruction or structural abnormalities. It is part of the standard imaging workup."
  tags: ["glomerular-disease","imaging","ultrasound","investigation"]

- front: "What is the definitive diagnostic test for glomerular disease?"
  back: "Kidney biopsy is the definitive diagnostic test when the cause of glomerular disease is unknown. It provides histological diagnosis showing the type and severity of glomerular damage, guiding specific immunosuppressive or targeted therapy."
  tags: ["glomerular-disease","kidney-biopsy","diagnosis","histology"]

- front: "How is volume status managed in acute nephritic syndrome?"
  back: "Management includes salt and water restriction, limiting fluid intake to previous day's urine output plus 500 mL, diuretics for fluid overload, daily weight monitoring, and treatment of infections. Blood pressure control targets 130/80 mmHg using ACE inhibitors or ARBs."
  tags: ["nephritic-syndrome","volume-management","salt-restriction","fluid-balance"]

- front: "When is dialysis indicated in acute nephritic syndrome?"
  back: "Dialysis is indicated for: encephalopathy, severe fluid overload unresponsive to diuretics, persistent hyperkalemia, or uremic pericarditis."
  tags: ["nephritic-syndrome","dialysis","indications","acute-kidney-injury"]

- front: "What differential diagnosis should be considered for hematuria and proteinuria?"
  back: "The differential includes: determining if nephrotic vs nephritic syndrome, assessing quantitative levels of protein and blood, evaluating for systemic disease features, considering primary vs secondary glomerular disease, and determining eGFR level."
  tags: ["differential-diagnosis","hematuria","proteinuria","glomerular-disease"]

- front: "What is the summary approach to glomerular disease management?"
  back: "Glomerular disease management includes: detailed history and examination, urine dipstick and microscopy, quantified proteinuria assessment, kidney function testing, relevant serology, kidney imaging, kidney biopsy for definitive diagnosis, and histology-guided treatment tailored to the specific pathological type."
  tags: ["glomerular-disease","management","clinical-approach","diagnosis"]

- front: "What systemic features suggest secondary glomerular disease?"
  back: "Systemic features indicating secondary glomerular disease include: fever, chills, weight loss, night sweats, fatigue, eye involvement (retinitis, uveitis), epistaxis, sinusitis, oral ulcers, murmurs, pericarditis, chest pain, heart failure, pulmonary infiltrates, nodules, colitis, pancreatitis, seizures, neuropathy, digital ischemia, and skin rashes."
  tags: ["secondary-glomerular-disease","systemic-features","diagnosis","multi-system"]
