      Front: "Practice Scenario 1 (Answers): A 3-year old with hot child, cold hands, cap refill 1.5s, diarrhoea 4x/day, skin pinch 3s. Why is this Priority?"
      Back: "Moderate dehydration signs (cold hands, prolonged capillary refill, slow skin turgor) indicate priority assessment is needed but not emergency-level shock."
    tags: ["scenario", "dehydration", "assessment", "subject:paediatrics"]

