  - guid: "a1b2c3d4e5f6g7h8"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 KMC"
    fields:
      Front: "Define kangaroo care according to WHO"
      Back: "Skin-to-skin contact between a mother and her baby along with exclusive breastfeeding. If the mother is unable to provide care, any other family member or caregiver can step into that role."
    tags: ["kmc-definition", "who-guidelines", "subject:paediatrics-neonatal"]
  - guid: "b2c3d4e5f6g7h8i9"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 KMC"
    fields:
      Front: "When should kangaroo care contact begin?"
      Back: "As early as possible after birth and for as many hours as possible per day."
    tags: ["kmc-timing", "early-care", "subject:paediatrics-neonatal"]
  - guid: "c3d4e5f6g7h8i9j0"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 KMC"
    fields:
      Front: "What is the ideal duration of kangaroo care daily for preterm and low birth weight babies?"
      Back: "8 to 24 hours daily"
    tags: ["kmc-duration", "optimal-care", "subject:paediatrics-neonatal"]
  - guid: "d4e5f6g7h8i9j0k1"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 KMC"
    fields:
      Front: "Describe intermittent kangaroo care"
      Back: "KMC for infants not on full oral feeds, still requiring oxygen therapy. Ranges from few hours a day to once every few days. Duration dependent on baby's condition and mother's availability. Encourages mother to participate in care while baby is in nursery."
    tags: ["kmc-types", "intermittent-care", "subject:paediatrics-neonatal"]
  - guid: "e5f6g7h8i9j0k1l2"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 KMC"
    fields:
      Front: "Describe continuous kangaroo care"
      Back: "KMC provided day and night, interrupted only when mother attends to personal needs. Can be practiced in hospital or at home. Ideal for low birth weight infants."
    tags: ["kmc-types", "continuous-care", "subject:paediatrics-neonatal"]
  - guid: "f6g7h8i9j0k1l2m3"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 KMC"
    fields:
      Front: "What are the three main components of kangaroo care?"
      Back: "1. Kangaroo position\n2. Kangaroo nutrition\n3. Kangaroo discharge and follow-up"
    tags: ["kmc-components", "core-pillars", "subject:paediatrics-neonatal"]
  - guid: "g7h8i9j0k1l2m3n4"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 KMC"
    fields:
      Front: "Describe the correct kangaroo position"
      Back: "Baby placed in upright position against the chest. Neck turned to the side and slightly extended. Nappy and woolen cap worn. Mother/caregiver covered together with baby using clothing/sheet/wrap/blanket."
    tags: ["kmc-position", "positioning-technique", "subject:paediatrics-neonatal"]
  - guid: "h8i9j0k1l2m3n4o5"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 KMC"
    fields:
      Front: "What does kangaroo nutrition involve?"
      Back: "1. Exclusive breastmilk\n2. Colostrum\n3. Tube feeding initially\n4. Rooting reflex improves as baby matures\n5. Non-nutritive sucking"
    tags: ["kmc-nutrition", "feeding-methods", "subject:paediatrics-neonatal"]
  - guid: "i9j0k1l2m3n4o5p6"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 KMC"
    fields:
      Front: "What support do healthcare workers provide in kangaroo care?"
      Back: "1. Emotional support\n2. Education\n3. Empowerment of mother to perform care\n4. Follow-up post-discharge"
    tags: ["kmc-support", "healthcare-role", "subject:paediatrics-neonatal"]
  - guid: "j0k1l2m3n4o5p6q7"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 KMC"
    fields:
      Front: "What role does family play in kangaroo care?"
      Back: "1. Assist to continue practice at home\n2. Step in when mother is unable to provide care"
    tags: ["kmc-support", "family-involvement", "subject:paediatrics-neonatal"]
  - guid: "k1l2m3n4o5p6q7r8"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 KMC"
    fields:
      Front: "What are the discharge criteria for a baby in kangaroo care?"
      Back: "Baby must be: well, breastfeeding, and gaining weight steadily. Continued until baby chooses not to be in that position again or once weight exceeds 2500 g."
    tags: ["kmc-discharge", "discharge-criteria", "subject:paediatrics-neonatal"]
  - guid: "l2m3n4o5p6q7r8s9"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 KMC"
    fields:
      Front: "What are the maternal discharge criteria for kangaroo care?"
      Back: "Mother must be: confident in handling and caring for baby and have support to continue KMC at home."
    tags: ["kmc-discharge", "maternal-criteria", "subject:paediatrics-neonatal"]
  - guid: "m3n4o5p6q7r8s9t0"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 KMC"
    fields:
      Front: "List the benefits of kangaroo care for the mother"
      Back: "1. Empowers mothers to be primary care provider\n2. Builds confidence in caring for baby\n3. Strengthens attachment and bonding\n4. 24% lower risk of moderate to severe post-partum depression"
    tags: ["kmc-benefits", "maternal-benefits", "subject:paediatrics-neonatal"]
  - guid: "n4o5p6q7r8s9t0u1"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 KMC"
    fields:
      Front: "List the benefits of kangaroo care for the healthcare facility"
      Back: "1. Significant cost saving through decreased hospital stay\n2. Better survival through decreased overcrowding and infection"
    tags: ["kmc-benefits", "facility-benefits", "subject:paediatrics-neonatal"]
  - guid: "o5p6q7r8s9t0u1v2"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 KMC"
    fields:
      Front: "List the immediate benefits of kangaroo care to the infant"
      Back: "1. Decreased hypothermia\n2. Increased breastmilk production promoting exclusive breastfeeding\n3. Decreased hypoglycaemic episodes\n4. Enhances immune function through protective microbiota from mother's skin\n5. Stimulates oxytocin secretion"
    tags: ["kmc-benefits", "infant-benefits", "subject:paediatrics-neonatal"]
  - guid: "p6q7r8s9t0u1v2w3"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 KMC"
    fields:
      Front: "What are the effects of oxytocin in kangaroo care?"
      Back: "1. Cardiovascular stability\n2. Weight gain\n3. Better sleep\n4. Fetal/maternal bonding\n5. Brain and cognitive strength"
    tags: ["oxytocin-effects", "physiological-benefits", "subject:paediatrics-neonatal"]
  - guid: "q7r8s9t0u1v2w3x4"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 KMC"
    fields:
      Front: "Name four interventions to decrease complications of prematurity"
      Back: "1. Antenatal steroids\n2. CPAP\n3. Surfactant\n4. Kangaroo care"
    tags: ["prematurity-management", "interventions", "subject:paediatrics-neonatal"]
  - guid: "r8s9t0u1v2w3x4y5"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::2024 KMC"
    fields:
      Front: "What is the new vision for maternal newborn care in kangaroo care?"
      Back: "Mothers, newborns, parents and families form an inseparable centre around which the entire maternal-newborn service delivery is organized, with close collaboration between health care providers."
    tags: ["kmc-vision", "service-delivery", "subject:paediatrics-neonatal"]
