    fields:
      Front: "What are the risk factors and presentation in the case of QM, an 8-year-old female with secondary nocturnal enuresis?"
      Back: "Risk factors: chronically unwell parent (Steven Johnson Syndrome with visual impairment, verbally abusive), marital problems with ongoing parental conflict, father alcoholic and physically abusive, social disadvantage (renting one room with other occupants). Presentation: secondary nocturnal enuresis, learning difficulties, symptoms of depression. Child disclosed physical abuse from both parents."
