    fields:
      Front: "What are nonspecific investigations for neonatal sepsis?"
      Back: "Full Blood Count (FBC), Platelet count assessment, White cell count (normal 5-20), Immature to total (IT) neutrophil ratio greater than 0.2 is predictive, C Reactive protein"
    tags: ["investigations", "diagnostic", "subject:paediatrics"]
  - guid: d6e7f8a9b02eff3f
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2022 Neonatal infections"
    fields:
      Front: "What are specific culture investigations for neonatal sepsis?"
      Back: "Blood, cerebrospinal fluid (CSF), urine, and superficial swabs"
    tags: ["investigations", "culture", "subject:paediatrics"]
