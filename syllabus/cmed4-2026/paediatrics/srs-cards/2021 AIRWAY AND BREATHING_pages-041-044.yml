      Front: "What is the iterative approach for managing the choking child?"
      Back: "The choking child management approach follows a repeating cycle: assess effectiveness of cough and consciousness level, then apply appropriate maneuvers based on findings. Reassess after each round of maneuvers. The approach repeats until the object is dislodged, child can cough effectively, or resuscitation becomes necessary."
