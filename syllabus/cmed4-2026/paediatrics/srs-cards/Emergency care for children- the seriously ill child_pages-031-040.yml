    fields:
      Front: "How do you detect convulsions in a child?"
      Back: "Look for generalised convulsions (easy to see) or subtle signs especially in neonates: eye flickering or deviation, hand or foot movements, mouth movements, repetitive movements, or apnoea."
    tags: ["convulsion", "seizure", "assessment", "subject:paediatrics"]

