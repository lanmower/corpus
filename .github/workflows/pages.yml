name: Deploy site to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false
      - name: Pull LFS files (best-effort; budget may be exceeded)
        run: git lfs pull || echo "LFS pull failed — building without media"
        continue-on-error: true
      - name: Build data shards (copies videos into site/data/videos/)
        run: node scripts/build_data.js
      - name: Inject build version (commit SHA) into sw.js + html
        run: |
          SHA="${GITHUB_SHA::8}"
          echo "Injecting build version: $SHA"
          sed -i "s/__BUILD_VERSION__/${SHA}/g" site/sw.js site/index.html site/triage-live.html
          grep -n "corpus-" site/sw.js | head -3 || true
          grep -n "?v=" site/index.html site/triage-live.html || true
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./site
      - id: deployment
        uses: actions/deploy-pages@v4
