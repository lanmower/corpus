    noteType: "Basic"
    deck: "Corpus::Paediatrics::PORTFOLIO AND SCIENTIFIC WRITING"
    fields:
      Front: "What should a portfolio encompass in terms of patient selection?"
      Back: "Information about patients clerked and managed in the ward, using patients clerked on intake or newly admitted to the ward"
    tags: ["portfolio-structure", "subject:paediatrics", "patient-selection"]

