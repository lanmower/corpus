    fields:
      Front: "What is the definition of diarrheal illness with dehydration?"
      Back: "Abnormal fluid loss through the gastrointestinal tract requiring classification into non-severe, severe, or shock categories based on clinical assessment."
    tags: ["dehydration", "diarrhea", "classification", "subject:paediatrics"]
  - guid: e5f6g7h8i9j0k1l2
    noteType: Basic
    deck: "Corpus::Paediatrics::DEHYDRATION"
    fields:
      Front: "What is the basic approach to treatment decisions in severe dehydration?"
      Back: "Assess for shock. Determine if oral fluids will be tolerated or IV fluids needed. Choose appropriate fluid type (ORS vs dextrose water vs dextrose saline). Determine infusion rate and duration based on severity and malnutrition status."
    tags: ["dehydration", "fluids", "treatment", "subject:paediatrics"]
  - guid: f6g7h8i9j0k1l2m3
    noteType: Basic
    deck: "Corpus::Paediatrics::DEHYDRATION"
    fields:
      Front: "What does diarrheal loss equivalent mean vs plasma equivalent loss?"
      Back: "Diarrheal loss is stool loss (hypotonic). Plasma equivalent loss refers to other fluid losses (vomiting, NG drainage, bleeding) which may be more electrolyte-rich and require different replacement considerations than pure diarrheal loss."
    tags: ["dehydration", "electrolytes", "pathophysiology", "subject:paediatrics"]
