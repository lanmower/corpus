# Spaced Repetition System (SRS) Cards
# Topic: Geriatric Medicine - Iatrogenesis
# Source: Geriatric - latrogenesis - CMED4IIM1 - 2026_pages-001-004.txt
# Generated: 2026-05-03T22:52:35.802Z

cards:
- id: srs-geriatric-latrogenesis-001
  front: "Define iatrogenesis in geriatric patients"
  back: "Iatrogenesis is adverse events caused by medical and nursing care, including side effects from drugs, procedures, diagnostic interventions, and therapeutic interventions, as well as functional adverse events from hospitalization itself."
  category: geriatric-medicine
  topic: iatrogenesis
  difficulty: intermediate

- id: srs-geriatric-latrogenesis-002
  front: "What are the risk factors for adverse drug events in older patients?"
  back: "Age ≥85 years, low BMI/weight, ≥6 chronic conditions, eGFR <50 mL/min, ≥9 medications, ≥12 medication doses/day, prior adverse drug reaction, physiological changes affecting pharmacokinetics/pharmacodynamics, loss of homeostasis, polypharmacy, and drug interactions."
  category: geriatric-medicine
  topic: iatrogenesis
  difficulty: intermediate

- id: srs-geriatric-latrogenesis-003
  front: "Explain pharmacokinetics changes with aging"
  back: "Absorption does not change with age. Distribution, metabolism, and excretion all change with age, affecting drug levels in the body."
  category: geriatric-medicine
  topic: iatrogenesis
  difficulty: intermediate

- id: srs-geriatric-latrogenesis-004
  front: "What are pharmacodynamics changes in older patients?"
  back: "Increased sensitivity to anticholinergics (urinary, ocular, cerebral side effects), decreased sensitivity to beta-blockers and beta-agonists, blunted response to drugs, and altered drug-receptor and drug-organ interactions."
  category: geriatric-medicine
  topic: iatrogenesis
  difficulty: intermediate

- id: srs-geriatric-latrogenesis-005
  front: "How does loss of homeostasis affect older patients?"
  back: "Physiological changes include: loss of baroreceptor control (orthostatic hypotension), altered thermal regulation, abnormal test/volume regulation, electrolyte/glucose dysregulation (tendency toward hyponatremia, volume depletion, dehydration with diuretics)."
  category: geriatric-medicine
  topic: iatrogenesis
  difficulty: intermediate

- id: srs-geriatric-latrogenesis-006
  front: "What CNS effects increase with aging?"
  back: "Increased meningeal permeability increases sensitivity to opioids, barbiturates, phenothiazines, and benzodiazepines; increased risk of sedation and delirium."
  category: geriatric-medicine
  topic: iatrogenesis
  difficulty: intermediate

- id: srs-geriatric-latrogenesis-007
  front: "How do anticholinergic drugs affect older men?"
  back: "Anticholinergics worsen benign prostatic hyperplasia in men and worsen cognitive function/dementia in all older patients."
  category: geriatric-medicine
  topic: iatrogenesis
  difficulty: intermediate

- id: srs-geriatric-latrogenesis-008
  front: "What are the effects of NSAIDs in older patients?"
  back: "NSAIDs counteract efficacy of antihypertensives, antianginal drugs, and anticardiac failure drugs; increase risk of peptic ulcer disease; impair renal function."
  category: geriatric-medicine
  topic: iatrogenesis
  difficulty: intermediate

- id: srs-geriatric-latrogenesis-009
  front: "Define polypharmacy"
  back: "Taking 4 or more medications; increases risk of drug-to-drug interactions exponentially."
  category: geriatric-medicine
  topic: iatrogenesis
  difficulty: intermediate

- id: srs-geriatric-latrogenesis-010
  front: "What are the causes of poor medication compliance in older patients?"
  back: "Poor instructions, complex regimens (multiple doses daily), adverse drug reactions, inconvenient timing, differing perception about need, poor eyesight, arthritis difficulty opening containers, cognitive impairment/forgetfulness."
  category: geriatric-medicine
  topic: iatrogenesis
  difficulty: intermediate

- id: srs-geriatric-latrogenesis-011
  front: "What strategies improve medication compliance in older patients?"
  back: "Adequate clinical assessment and accurate diagnosis, assess necessity of each drug, use simple regimens, start low and increase slowly, avoid polypharmacy, consider non-pharmacological therapy, check for drug interactions, provide clear instructions (verbal and written), review medications regularly including OTC and supplements."
  category: geriatric-medicine
  topic: iatrogenesis
  difficulty: intermediate

- id: srs-geriatric-latrogenesis-012
  front: "Distinguish clinical iatrogenesis from functional iatrogenesis"
  back: "Clinical iatrogenesis: side effects from medical interventions (drugs, procedures, diagnostics, chemotherapy). Functional iatrogenesis: adverse events from the hospitalization process itself (bed rest, immobility, falls, delirium)."
  category: geriatric-medicine
  topic: iatrogenesis
  difficulty: intermediate

- id: srs-geriatric-latrogenesis-013
  front: "What functional adverse events occur from hospitalization in older patients?"
  back: "Excess bed rest, immobility, increased falls, incontinence, delirium, anorexia, cognitive confusion, pressure ulcers, venous thromboembolism, aspiration pneumonia, hospital-acquired infections, urinary tract infections (from catheters), depression, disruptive behavior."
  category: geriatric-medicine
  topic: iatrogenesis
  difficulty: intermediate

- id: srs-geriatric-latrogenesis-014
  front: "What percentage of hospitalized patients >70 years experience functional decline?"
  back: "More than 50% of patients over 70 years experience decline in physical and cognitive function unrelated to their admitting diagnosis."
  category: geriatric-medicine
  topic: iatrogenesis
  difficulty: intermediate

- id: srs-geriatric-latrogenesis-015
  front: "What additional complications result from prolonged bed rest in hospitalized elderly?"
  back: "Pressure ulcers, delirium, agitation, deep vein thrombosis, pulmonary embolism, aspiration pneumonia, urinary tract infections (from catheters), and hospital-acquired infections."
  category: geriatric-medicine
  topic: iatrogenesis
  difficulty: intermediate

- id: srs-geriatric-latrogenesis-016
  front: "Analyze the case: 86-year-old woman with hypertension, diabetes, dyslipidemia, IHD on multiple medications develops epigastric pain, elevated BP despite treatment, and renal dysfunction"
  back: "The culprit is diclofenac (NSAID). NSAIDs: counteract antihypertensive efficacy (explaining elevated BP despite therapy), cause peptic ulcer disease (explaining epigastric pain), and impair renal function (explaining renal dysfunction). It should be discontinued."
  category: geriatric-medicine
  topic: iatrogenesis
  difficulty: intermediate
