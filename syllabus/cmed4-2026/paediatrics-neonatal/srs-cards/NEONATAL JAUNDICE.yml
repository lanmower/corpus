  - guid: "hypoca001abc"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::NEONATAL JAUNDICE"
    fields:
      Front: "Define hypocalcaemia in term infants"
      Back: "Serum calcium <2 mmol/ℓ (Normal: 2.1–2.7 mmol/ℓ)"
    tags: ["hypocalcaemia", "calcium", "subject:paediatrics-neonatal"]
  - guid: "hypoca002abc"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::NEONATAL JAUNDICE"
    fields:
      Front: "Define hypocalcaemia in preterm infants"
      Back: "Serum calcium <1.8 mmol/ℓ (Normal: 1.9–2.8 mmol/ℓ)"
    tags: ["hypocalcaemia", "calcium", "subject:paediatrics-neonatal"]
  - guid: "hypoca003abc"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::NEONATAL JAUNDICE"
    fields:
      Front: "What is the incidence of hypocalcaemia in neonates?"
      Back: "About 1/3 of low birth weight infants (LBWI) and 50% of IDM within 3 days of life"
    tags: ["hypocalcaemia", "epidemiology", "subject:paediatrics-neonatal"]
  - guid: "hypoca004abc"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::NEONATAL JAUNDICE"
    fields:
      Front: "When does hypocalcaemia occur in the first week vs after first week?"
      Back: "First week: prems calcium deficient; After 1st week: formula-fed infants with high phosphate"
    tags: ["hypocalcaemia", "timing", "subject:paediatrics-neonatal"]
  - guid: "hypoca005abc"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::NEONATAL JAUNDICE"
    fields:
      Front: "Hypocalcaemia cause (1)"
      Back: "Relative hypoparathyroidism (suppression of fetal parathyroid by transferred maternal parathyroid hormone; improves within days after birth)"
    tags: ["hypocalcaemia", "etiology", "subject:paediatrics-neonatal"]
  - guid: "hypoca006abc"
