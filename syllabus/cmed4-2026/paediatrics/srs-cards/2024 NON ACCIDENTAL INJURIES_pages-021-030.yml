    deck: "Corpus::Paediatrics::2024 NON ACCIDENTAL INJURIES"
    fields:
      Front: "List the physical symptoms and signs of child sexual abuse."
      Back: "Symptoms: Recurrent abdominal pain, Difficulty walking or sitting, Painful micturition and recurrent UTIs, Secondary enuresis, faecal soiling or retention. Signs: Discharge from penis or vagina, Abnormal dilatation of vagina or anus, Genital laceration/bruising, Vaginal bleeding, Signs of STIs."
