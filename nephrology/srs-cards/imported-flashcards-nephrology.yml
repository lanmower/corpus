# Anki canonical export — nephrology / nephrology
# Generated by scripts/anki_migrate.js
deck: "Corpus::Nephrology::nephrology"
notes:
  - guid: 7c7c8d6b07029216
    noteType: Basic
    deck: "Corpus::Nephrology::nephrology"
    fields:
      Front: "Between which vertebral levels are the kidneys typically located in the retroperitoneum?"
      Back: "Between $T12$ and $L3$."
    tags: ["subject:nephrology"]
  - guid: 2e057614fcceb34e
    noteType: Basic
    deck: "Corpus::Nephrology::nephrology"
    fields:
      Front: "What is the typical size range of a normal adult kidney in centimeters?"
      Back: "10 to 12 centimeters."
    tags: ["subject:nephrology"]
  - guid: a3eccff8376e4078
    noteType: Basic
    deck: "Corpus::Nephrology::nephrology"
    fields:
      Front: "Why is the right kidney generally positioned slightly lower than the left kidney?"
      Back: "Because of the space occupied by the liver."
    tags: ["subject:nephrology"]
  - guid: 01cfa0355ad12fd6
    noteType: Basic
    deck: "Corpus::Nephrology::nephrology"
    fields:
      Front: "What percentage of the total cardiac output do the kidneys receive?"
      Back: "Approximately 20%."
    tags: ["subject:nephrology"]
  - guid: cb7caffde96b23ed
    noteType: Basic
    deck: "Corpus::Nephrology::nephrology"
    fields:
      Front: "The functional unit of the kidney, consisting of a glomerulus and a tubule, is called the _____."
      Back: "Nephron"
    tags: ["subject:nephrology"]
  - guid: 02eba8ec26d5f9c8
    noteType: Basic
    deck: "Corpus::Nephrology::nephrology"
    fields:
      Front: "Approximately how many nephrons are found in each kidney of a normal adult?"
      Back: "About one million."
    tags: ["subject:nephrology"]
  - guid: efeccd9e3e9233e6
    noteType: Basic
    deck: "Corpus::Nephrology::nephrology"
    fields:
      Front: "Which specific kidney structure monitors sodium chloride concentration and triggers renin release?"
      Back: "Macula densa"
    tags: ["subject:nephrology"]
  - guid: 8977a40f43b86dbf
    noteType: Basic
    deck: "Corpus::Nephrology::nephrology"
    fields:
      Front: "How does adenosine affect the afferent arteriole in the presence of hyperosmolar urine?"
      Back: "It causes vasoconstriction to reduce the Glomerular Filtration Rate (GFR)."
    tags: ["subject:nephrology"]
  - guid: 26ff67e7cb840477
    noteType: Basic
    deck: "Corpus::Nephrology::nephrology"
    fields:
      Front: "Acute Kidney Injury (AKI) is clinically defined by a rapid fall in GFR over what timeframe?"
      Back: "Hours to days."
    tags: ["subject:nephrology"]
  - guid: 78b33cdd4cd73c3a
    noteType: Basic
    deck: "Corpus::Nephrology::nephrology"
    fields:
      Front: "In the KDIGO staging for AKI, what serum creatinine increase defines Stage 1?"
      Back: "An increase of $\\ge 26$ $\\mu mol/L$ within 48 hours or a 1.5 to 1.9 times increase from baseline."
    tags: ["subject:nephrology"]
  - guid: c1070398aa2e65f1
    noteType: Basic
    deck: "Corpus::Nephrology::nephrology"
    fields:
      Front: "What urine output threshold defines Stage 2 AKI?"
      Back: "Less than 0.5 $mL/kg/hr$ for more than 12 hours."
    tags: ["subject:nephrology"]
  - guid: 860b82bd65eabcfd
    noteType: Basic
    deck: "Corpus::Nephrology::nephrology"
    fields:
      Front: "Which AKI stage is characterized by a serum creatinine increase of 3 times the baseline or $\\ge 354$ $\\mu mol/L$?"
      Back: "Stage 3"
    tags: ["subject:nephrology"]
  - guid: f68ba3bdc0a01bfa
    noteType: Basic
    deck: "Corpus::Nephrology::nephrology"
    fields:
      Front: "What defines the urine output criteria for Stage 3 AKI?"
      Back: "Less than 0.3 $mL/kg/hr$ for $\\ge 24$ hours or anuria for $\\ge 12$ hours."
    tags: ["subject:nephrology"]
  - guid: 4409e3d3d7050f17
    noteType: Basic
    deck: "Corpus::Nephrology::nephrology"
    fields:
      Front: "Pre-renal AKI is primarily caused by a reduction in _____."
      Back: "Kidney blood flow (perfusion)."
    tags: ["subject:nephrology"]
  - guid: b857ad1ba32dafbd
    noteType: Basic
    deck: "Corpus::Nephrology::nephrology"
    fields:
      Front: "What is the most common type of intrinsic AKI, often caused by ischemic or nephrotoxic injury?"
      Back: "Acute Tubular Necrosis (ATN)."
    tags: ["subject:nephrology"]
  - guid: 05c18a292efc6e02
    noteType: Basic
    deck: "Corpus::Nephrology::nephrology"
    fields:
      Front: "Post-renal AKI is characterized by the _____ of urinary flow at any level of the urinary tract."
      Back: "Obstruction"
    tags: ["subject:nephrology"]
  - guid: 196897cc11e8875c
    noteType: Basic
    deck: "Corpus::Nephrology::nephrology"
    fields:
      Front: "Which ultrasound finding is the most reliable indicator of chronic kidney disease (CKD) over AKI?"
      Back: "Kidney size less than 9 to 10 centimeters."
    tags: ["subject:nephrology"]
  - guid: 5b65729a073756f4
    noteType: Basic
    deck: "Corpus::Nephrology::nephrology"
    fields:
      Front: "What is the primary purpose of administering 10% Calcium Gluconate (or Carbonate) in hyperkalemia?"
      Back: "To provide cardiac membrane stabilization against arrhythmias."
    tags: ["subject:nephrology"]
  - guid: 103965c8cc4c6307
    noteType: Basic
    deck: "Corpus::Nephrology::nephrology"
    fields:
      Front: "Which pharmacological combination is used to shift potassium from the extracellular to the intracellular space during AKI?"
      Back: "Insulin and Glucose."
    tags: ["subject:nephrology"]
  - guid: 33fa906ce66363e3
    noteType: Basic
    deck: "Corpus::Nephrology::nephrology"
    fields:
      Front: "What pH level in metabolic acidosis is a standard indication for initiating acute dialysis?"
      Back: "7.1 or less."
    tags: ["subject:nephrology"]
  - guid: 2001ae8522373017
    noteType: Basic
    deck: "Corpus::Nephrology::nephrology"
    fields:
      Front: "Chronic Kidney Disease (CKD) is defined by abnormalities of kidney structure or function persisting for more than _____."
      Back: "Three months"
    tags: ["subject:nephrology"]
  - guid: 1891f085b9154390
    noteType: Basic
    deck: "Corpus::Nephrology::nephrology"
    fields:
      Front: "What GFR threshold defines an abnormality of function in the diagnosis of CKD?"
      Back: "Less than 60 $mL/min$."
    tags: ["subject:nephrology"]
  - guid: dbc2e78efa4583a6
    noteType: Basic
    deck: "Corpus::Nephrology::nephrology"
    fields:
      Front: "What are the three most common causes of CKD in South Africa?"
      Back: "Hypertension, Diabetes Mellitus, and HIV."
    tags: ["subject:nephrology"]
  - guid: 9355ca43761597a4
    noteType: Basic
    deck: "Corpus::Nephrology::nephrology"
    fields:
      Front: "In CKD staging, what GFR range corresponds to Grade 3b?"
      Back: "30 to 44 $mL/min$."
    tags: ["subject:nephrology"]
  - guid: 9d409052ddeb8a85
    noteType: Basic
    deck: "Corpus::Nephrology::nephrology"
    fields:
      Front: "Which CKD stage is defined as 'Kidney Failure' with a GFR less than 15 $mL/min$?"
      Back: "Stage 5"
    tags: ["subject:nephrology"]
  - guid: 469ea31fd97409c7
    noteType: Basic
    deck: "Corpus::Nephrology::nephrology"
    fields:
      Front: "Why is proteinuria quantification essential in CKD management?"
      Back: "It is a marker of disease progression and cardiovascular risk."
    tags: ["subject:nephrology"]
  - guid: a29804c4bfc490f6
    noteType: Basic
    deck: "Corpus::Nephrology::nephrology"
    fields:
      Front: "What is the target blood pressure for a CKD patient with significant proteinuria (>150 mg/day)?"
      Back: "125/75 $mmHg$."
    tags: ["subject:nephrology"]
  - guid: f9f5dd8a575b6d60
    noteType: Basic
    deck: "Corpus::Nephrology::nephrology"
    fields:
      Front: "Which drug class is preferred in CKD to reduce integrated pressure, fibrosis, and proteinuria?"
      Back: "ACE inhibitors or Angiotensin Receptor Blockers (ARBs)."
    tags: ["subject:nephrology"]
  - guid: c7126d8be40a1a9b
    noteType: Basic
    deck: "Corpus::Nephrology::nephrology"
    fields:
      Front: "At what GFR level should Metformin be discontinued in diabetic patients?"
      Back: "Less than 30 $mL/min$."
    tags: ["subject:nephrology"]
  - guid: 86d78ffc8f3a0dce
    noteType: Basic
    deck: "Corpus::Nephrology::nephrology"
    fields:
      Front: "What is the recommended dietary protein restriction to slow CKD progression?"
      Back: "0.8 to 1.0 $g/kg/day$."
    tags: ["subject:nephrology"]
  - guid: 088c2d4ae14b779d
    noteType: Basic
    deck: "Corpus::Nephrology::nephrology"
    fields:
      Front: "The characteristic nodular glomerulosclerosis found in diabetic nephropathy is also known as _____."
      Back: "Kimmelstiel-Wilson disease"
    tags: ["subject:nephrology"]
  - guid: 78bd0bd696b3fbfd
    noteType: Basic
    deck: "Corpus::Nephrology::nephrology"
    fields:
      Front: "Which microvascular complication of diabetes is considered the 'window to the kidney' because it correlates with nephropathy?"
      Back: "Diabetic Retinopathy"
    tags: ["subject:nephrology"]
  - guid: 630bb82cc663e56a
    noteType: Basic
    deck: "Corpus::Nephrology::nephrology"
    fields:
      Front: "What is the target $HbA1c$ range for patients with severe kidney disease or multiple comorbidities?"
      Back: "Between 7.5% and 8.0%."
    tags: ["subject:nephrology"]
  - guid: 12bef696b4ed07db
    noteType: Basic
    deck: "Corpus::Nephrology::nephrology"
    fields:
      Front: "How do aminoglycosides like Gentamicin induce nephrotoxicity?"
      Back: "By accumulating in proximal tubules and disrupting cellular metabolism and protein synthesis."
    tags: ["subject:nephrology"]
  - guid: 11ac28d72da6c226
    noteType: Basic
    deck: "Corpus::Nephrology::nephrology"
    fields:
      Front: "What mechanism explains NSAID-induced AKI in volume-depleted patients?"
      Back: "Inhibition of prostaglandin synthesis, leading to reduced renal blood flow."
    tags: ["subject:nephrology"]
  - guid: 5de6be205759afef
    noteType: Basic
    deck: "Corpus::Nephrology::nephrology"
    fields:
      Front: "Nephrotic syndrome is defined by a 24-hour urine protein excretion greater than _____."
      Back: "3500 $mg$ (3.5 $g$)."
    tags: ["subject:nephrology"]
  - guid: 61cc74090cb962b8
    noteType: Basic
    deck: "Corpus::Nephrology::nephrology"
    fields:
      Front: "List the four clinical hallmarks of Nephrotic Syndrome."
      Back: "Heavy proteinuria, hypoalbuminemia, edema, and hyperlipidemia."
    tags: ["subject:nephrology"]
  - guid: f8a61b509b69ffbf
    noteType: Basic
    deck: "Corpus::Nephrology::nephrology"
    fields:
      Front: "Which primary glomerular disease is the most common cause of Nephrotic Syndrome in middle-aged adults?"
      Back: "Membranous nephropathy"
    tags: ["subject:nephrology"]
  - guid: f6d9d66883d871b2
    noteType: Basic
    deck: "Corpus::Nephrology::nephrology"
    fields:
      Front: "What urinary sediment finding is pathognomonic for Acute Nephritic Syndrome (Glomerulonephritis)?"
      Back: "Red blood cell (RBC) casts."
    tags: ["subject:nephrology"]
  - guid: 28b6d6a1c8325715
    noteType: Basic
    deck: "Corpus::Nephrology::nephrology"
    fields:
      Front: "In Nephritic Syndrome, why do red blood cells appear 'dysmorphic' in the urine?"
      Back: "They are physically distorted as they squeeze through damaged glomerular basement membranes."
    tags: ["subject:nephrology"]
  - guid: bde9e1a086090ca8
    noteType: Basic
    deck: "Corpus::Nephrology::nephrology"
    fields:
      Front: "What is the target INR for CKD patients with nephrotic range proteinuria requiring warfarin anticoagulation?"
      Back: "Between 2.0 and 3.0."
    tags: ["subject:nephrology"]
  - guid: b5de1b6c7922d7d6
    noteType: Basic
    deck: "Corpus::Nephrology::nephrology"
    fields:
      Front: "HIV-Associated Nephropathy (HIVAN) typically presents with what kidney appearance on ultrasound?"
      Back: "Enlarged, echogenic kidneys."
    tags: ["subject:nephrology"]
  - guid: 555adc0f71e188f1
    noteType: Basic
    deck: "Corpus::Nephrology::nephrology"
    fields:
      Front: "What is the pathophysiology of HIVAN regarding the podocytes?"
      Back: "The virus infects podocytes, causing loss of differentiation markers and capillary loop collapse."
    tags: ["subject:nephrology"]
  - guid: 3daff9d3f49e9f3d
    noteType: Basic
    deck: "Corpus::Nephrology::nephrology"
    fields:
      Front: "Which antiretroviral drug is notoriously associated with Fanconi syndrome and mitochondrial toxicity in the proximal tubules?"
      Back: "Tenofovir"
    tags: ["subject:nephrology"]
  - guid: 149bc5310c1c61a3
    noteType: Basic
    deck: "Corpus::Nephrology::nephrology"
    fields:
      Front: "Fanconi syndrome is characterized by the failure to reabsorb which three substances in the proximal tubule?"
      Back: "Glucose, bicarbonate, and phosphates."
    tags: ["subject:nephrology"]
  - guid: c249256940407f5f
    noteType: Basic
    deck: "Corpus::Nephrology::nephrology"
    fields:
      Front: "What is the definitive treatment to stop the progression of HIVAN to end-stage kidney disease?"
      Back: "Initiation of HAART (Highly Active Antiretroviral Therapy)."
    tags: ["subject:nephrology"]
  - guid: 43f27c6af6282638
    noteType: Basic
    deck: "Corpus::Nephrology::nephrology"
    fields:
      Front: "Which HIV-related condition presents with microangiopathic hemolytic anemia, thrombocytopenia, and acute renal failure?"
      Back: "Thrombotic Microangiopathy (TTP/HUS picture)."
    tags: ["subject:nephrology"]
  - guid: 38918dd644d06939
    noteType: Basic
    deck: "Corpus::Nephrology::nephrology"
    fields:
      Front: "What is the clinical triad of Acute Interstitial Nephritis (AIN)?"
      Back: "Fever, rash, and flank pain."
    tags: ["subject:nephrology"]
  - guid: e8a5dbbe2660ce9e
    noteType: Basic
    deck: "Corpus::Nephrology::nephrology"
    fields:
      Front: "Which urinary finding suggests AIN rather than ATN?"
      Back: "Eosinophiluria (eosinophils in the urine)."
    tags: ["subject:nephrology"]
  - guid: a7fa83da22d80b21
    noteType: Basic
    deck: "Corpus::Nephrology::nephrology"
    fields:
      Front: "Hypertensive nephropathy is characterized by slow progression and what level of proteinuria?"
      Back: "Mild to moderate (non-nephrotic)."
    tags: ["subject:nephrology"]
  - guid: a7a791cd397b12ba
    noteType: Basic
    deck: "Corpus::Nephrology::nephrology"
    fields:
      Front: "What fundoscopic finding indicates Stage 4 hypertensive retinopathy?"
      Back: "Papilledema"
    tags: ["subject:nephrology"]
  - guid: aba72374c1dd5611
    noteType: Basic
    deck: "Corpus::Nephrology::nephrology"
    fields:
      Front: "How much salt (in teaspoons) is recommended as the daily limit for hypertensive patients?"
      Back: "Not more than one teaspoon (approximately 5-6 grams)."
    tags: ["subject:nephrology"]
  - guid: 88e61db7b15f24f2
    noteType: Basic
    deck: "Corpus::Nephrology::nephrology"
    fields:
      Front: "What is the principle of solute removal in Hemodialysis?"
      Back: "Diffusion across a semi-permeable membrane in a counter-current flow."
    tags: ["subject:nephrology"]
  - guid: 7363058293c6d26d
    noteType: Basic
    deck: "Corpus::Nephrology::nephrology"
    fields:
      Front: "List three absolute indications for urgent dialysis in AKI (The 'AEIOU' rule)."
      Back: "Acidosis, Electrolyte abnormalities (Hyperkalemia), Ingestions (Toxins), Overload (Fluid), and Uremia."
    tags: ["subject:nephrology"]
  - guid: 3365747729270a0b
    noteType: Basic
    deck: "Corpus::Nephrology::nephrology"
    fields:
      Front: "What is the primary advantage of Peritoneal Dialysis over Hemodialysis regarding residual kidney function?"
      Back: "It preserves residual kidney function and urine output for a longer period."
    tags: ["subject:nephrology"]
  - guid: 133fb7346962256e
    noteType: Basic
    deck: "Corpus::Nephrology::nephrology"
    fields:
      Front: "What is the most effective form of Kidney Replacement Therapy in terms of survival and quality of life?"
      Back: "Kidney Transplantation"
    tags: ["subject:nephrology"]
  - guid: 4d602e002696dea8
    noteType: Basic
    deck: "Corpus::Nephrology::nephrology"
    fields:
      Front: "How does lower urinary tract infection (cystitis) differ from upper urinary tract infection (pyelonephritis) in clinical presentation?"
      Back: "Pyelonephritis presents with systemic symptoms like fever, chills, and flank pain."
    tags: ["subject:nephrology"]
  - guid: 6d982da5580171e8
    noteType: Basic
    deck: "Corpus::Nephrology::nephrology"
    fields:
      Front: "What is the most common bacterial organism responsible for Urinary Tract Infections (UTIs)?"
      Back: "$\\textit{Escherichia coli}$ ($E. coli$)."
    tags: ["subject:nephrology"]
  - guid: f2a6ada60d7965e9
    noteType: Basic
    deck: "Corpus::Nephrology::nephrology"
    fields:
      Front: "What defines a 'relapse' UTI compared to a 'reinfection'?"
      Back: "Relapse is caused by the same organism that was not cleared; reinfection occurs after initial clearance."
    tags: ["subject:nephrology"]
  - guid: 4ba8b339f0e330e5
    noteType: Basic
    deck: "Corpus::Nephrology::nephrology"
    fields:
      Front: "In a symptomatic female, what colony-forming unit (CFU) threshold on urine culture indicates significant bacteriuria?"
      Back: "More than $1,000$ $CFU/mL$."
    tags: ["subject:nephrology"]
  - guid: 7ed2fa12de12448a
    noteType: Basic
    deck: "Corpus::Nephrology::nephrology"
    fields:
      Front: "Which diagnostic test for UTI has the highest specificity on a urine dipstick?"
      Back: "Nitrite test"
    tags: ["subject:nephrology"]
  - guid: 56dc84ebb0f83454
    noteType: Basic
    deck: "Corpus::Nephrology::nephrology"
    fields:
      Front: "At what potassium level do ECG changes like peaked T-waves typically begin to appear?"
      Back: "More than 6.0 $mmol/L$."
    tags: ["subject:nephrology"]
  - guid: b5e940fdf5b1e122
    noteType: Basic
    deck: "Corpus::Nephrology::nephrology"
    fields:
      Front: "What is the recommended fluid for volume replacement in pre-renal AKI caused by dehydration?"
      Back: "Isotonic saline (Crystalloids)."
    tags: ["subject:nephrology"]
  - guid: e8fc6fbb0c3a0abb
    noteType: Basic
    deck: "Corpus::Nephrology::nephrology"
    fields:
      Front: "Define 'Anuria' as used in AKI staging criteria."
      Back: "The total absence of urine output for more than 12 hours."
    tags: ["subject:nephrology"]
  - guid: 3b9d70686ae85c2b
    noteType: Basic
    deck: "Corpus::Nephrology::nephrology"
    fields:
      Front: "What metabolic bone disorder is a common complication of advanced CKD?"
      Back: "Renal Osteodystrophy"
    tags: ["subject:nephrology"]
  - guid: 5497cd426c88df39
    noteType: Basic
    deck: "Corpus::Nephrology::nephrology"
    fields:
      Front: "Which CKD stage requires preparation for Kidney Replacement Therapy (KRT)?"
      Back: "Stage 4 (GFR 15 to 29 $mL/min$)."
    tags: ["subject:nephrology"]
  - guid: 91acb0735090c3a6
    noteType: Basic
    deck: "Corpus::Nephrology::nephrology"
    fields:
      Front: "What is the standard blood pressure target for a non-proteinuric hypertensive patient?"
      Back: "130/80 $mmHg$ or lower."
    tags: ["subject:nephrology"]
  - guid: 757551e5c01a270d
    noteType: Basic
    deck: "Corpus::Nephrology::nephrology"
    fields:
      Front: "How do SGLT2 inhibitors assist in diabetic kidney disease management?"
      Back: "They reduce glucose levels and provide cardiovascular and renal protection."
    tags: ["subject:nephrology"]
  - guid: fc3e7b82a8ff364c
    noteType: Basic
    deck: "Corpus::Nephrology::nephrology"
    fields:
      Front: "Which drug is the preferred first-line agent for treating hypertension in a diabetic patient?"
      Back: "ACE inhibitor"
    tags: ["subject:nephrology"]
  - guid: a8bf398fb87cc863
    noteType: Basic
    deck: "Corpus::Nephrology::nephrology"
    fields:
      Front: "In the 'Approach to CKD', what does a granular surface on a shrunken kidney indicate pathologically?"
      Back: "Chronic ischemic damage and fibrosis."
    tags: ["subject:nephrology"]
  - guid: 6a7f463fbf87bb85
    noteType: Basic
    deck: "Corpus::Nephrology::nephrology"
    fields:
      Front: "What is the clinical significance of an S4 gallop in a hypertensive patient?"
      Back: "It indicates Left Ventricular Hypertrophy (LVH)."
    tags: ["subject:nephrology"]
  - guid: 54d68d4eb147a053
    noteType: Basic
    deck: "Corpus::Nephrology::nephrology"
    fields:
      Front: "Which type of dialysis access involves a surgical connection between an artery and a vein?"
      Back: "Arteriovenous (AV) Fistula"
    tags: ["subject:nephrology"]
  - guid: bd50b0c04e348b5b
    noteType: Basic
    deck: "Corpus::Nephrology::nephrology"
    fields:
      Front: "What is the major complication risk of Nephrotic Syndrome related to blood clotting?"
      Back: "Hypercoagulability leading to DVT or pulmonary embolism."
    tags: ["subject:nephrology"]
  - guid: 94ba47f81bd481fd
    noteType: Basic
    deck: "Corpus::Nephrology::nephrology"
    fields:
      Front: "Which glomerular condition is associated with a 'bland' urinary sediment despite heavy proteinuria?"
      Back: "Nephrotic Syndrome"
    tags: ["subject:nephrology"]
  - guid: 712d7b3d5f501f70
    noteType: Basic
    deck: "Corpus::Nephrology::nephrology"
    fields:
      Front: "What electrolyte imbalance is commonly associated with a 'Sine Wave' on ECG?"
      Back: "Severe Hyperkalemia"
    tags: ["subject:nephrology"]
  - guid: 6324f213a1a974de
    noteType: Basic
    deck: "Corpus::Nephrology::nephrology"
    fields:
      Front: "How does the 'Dash' diet assist in nephrology management?"
      Back: "It lowers blood pressure through specific dietary patterns rich in fruits, vegetables, and low-fat dairy."
    tags: ["subject:nephrology"]
  - guid: 693866f5bea9df8c
    noteType: Basic
    deck: "Corpus::Nephrology::nephrology"
    fields:
      Front: "Which imaging modality is the gold standard for excluding urinary tract obstruction (Post-renal AKI)?"
      Back: "Kidney Ultrasound"
    tags: ["subject:nephrology"]
  - guid: c25724c5720e6802
    noteType: Basic
    deck: "Corpus::Nephrology::nephrology"
    fields:
      Front: "What is the target $HbA1c$ for a young, otherwise healthy type 2 diabetic patient?"
      Back: "Less than 6.5%."
    tags: ["subject:nephrology"]
  - guid: b8494e596907a273
    noteType: Basic
    deck: "Corpus::Nephrology::nephrology"
    fields:
      Front: "What specific protein is lost in the urine of Nephrotic Syndrome patients, predisposing them to infection?"
      Back: "Immunoglobulin G (IgG)."
    tags: ["subject:nephrology"]
  - guid: 1d30f7e61cc06e99
    noteType: Basic
    deck: "Corpus::Nephrology::nephrology"
    fields:
      Front: "Which immune complex glomerular disease is commonly triggered by a throat or skin infection?"
      Back: "Post-streptococcal Glomerulonephritis"
    tags: ["subject:nephrology"]
  - guid: 9c2b31a583044b94
    noteType: Basic
    deck: "Corpus::Nephrology::nephrology"
    fields:
      Front: "What defines 'Uremic Encephalopathy'?"
      Back: "Confusion, seizures, or impaired consciousness due to the accumulation of nitrogenous waste."
    tags: ["subject:nephrology"]
  - guid: b2fababb8040c2d3
    noteType: Basic
    deck: "Corpus::Nephrology::nephrology"
    fields:
      Front: "Why is the use of IV contrast contraindicated in patients with a GFR <30 $mL/min$?"
      Back: "It causes acute vasoconstriction and direct tubular toxicity, leading to AKI."
    tags: ["subject:nephrology"]
  - guid: 0b5321310d33a6c0
    noteType: Basic
    deck: "Corpus::Nephrology::nephrology"
    fields:
      Front: "What is 'Supportive Care' in the context of end-stage kidney disease?"
      Back: "Management of symptoms and complications in patients not eligible for dialysis or transplant."
    tags: ["subject:nephrology"]
  - guid: a7a1e2acf1198103
    noteType: Basic
    deck: "Corpus::Nephrology::nephrology"
    fields:
