  - guid: 1301556d3c26cb07
    noteType: Basic
    deck: "Corpus::Nephrology::Drug  The Kidney"
    fields:
      Front: "What is the primary role of the kidney in maintaining patient health?"
      Back: "The kidney filters waste products and regulates fluid balance, playing a crucial role in maintaining overall health."
    tags: ["difficulty:medium", "subject:nephrology"]
  - guid: 8f273f83a120e443
    noteType: Basic
    deck: "Corpus::Nephrology::Drug  The Kidney"
    fields:
      Front: "What is nephrotoxicity?"
      Back: "A condition in which certain medications adversely affect kidney function, causing damage and impairing kidney health."
    tags: ["difficulty:medium", "subject:nephrology"]
  - guid: eb0a9a9b1e77f068
    noteType: Basic
    deck: "Corpus::Nephrology::Drug  The Kidney"
    fields:
      Front: "Which antibiotics are known to be nephrotoxic and how do they cause damage?"
      Back: "Aminoglycosides (e.g., gentamicin) accumulate in the proximal tubules, interfere with protein synthesis, disrupt cellular metabolism, damage tubular cells, impair electrolyte balance, and reduce GFR."
    tags: ["difficulty:medium", "subject:nephrology"]
  - guid: 1c37f398c1c47d64
    noteType: Basic
    deck: "Corpus::Nephrology::Drug  The Kidney"
    fields:
      Front: "What is the mechanism by which contrast agents cause acute kidney injury (AKI)?"
      Back: "Contrast agents cause vasoconstriction of renal blood vessels, reducing blood flow to the kidneys, leading to hypoxia and impaired tubular function, potentially causing acute kidney injury."
    tags: ["difficulty:medium", "subject:nephrology"]
  - guid: 16986526e2feee43
    noteType: Basic
    deck: "Corpus::Nephrology::Drug  The Kidney"
    fields:
      Front: "How do NSAIDs (nonsteroidal anti-inflammatory drugs) cause nephrotoxicity?"
      Back: "NSAIDs inhibit prostaglandin synthesis, which normally maintains renal blood flow and sodium excretion. This inhibition causes reduced kidney blood flow, salt retention, and acute kidney injury."
    tags: ["difficulty:medium", "subject:nephrology"]
  - guid: ddf3eb1404078e35
    noteType: Basic
    deck: "Corpus::Nephrology::Drug  The Kidney"
    fields:
      Front: "What is the mechanism of nephrotoxicity associated with ACE inhibitors?"
      Back: "ACE inhibitors reduce kidney blood flow and glomerular filtration, potentially causing irreversible kidney dysfunction. This effect is more pronounced in patients with preexisting kidney disease or taking other medications affecting kidney blood flow."
    tags: ["difficulty:medium", "subject:nephrology"]
  - guid: 4e0f50b988e31f2f
    noteType: Basic
    deck: "Corpus::Nephrology::Drug  The Kidney"
    fields:
      Front: "How do diuretics contribute to drug-induced acute kidney injury?"
      Back: "Excessive diuresis leads to dehydration, which reduces blood flow further and impairs drug elimination. Additionally, electrolyte imbalances from diuretics can disrupt kidney function and contribute to AKI."
    tags: ["difficulty:medium", "subject:nephrology"]
  - guid: 29cda764ce99ec7c
    noteType: Basic
    deck: "Corpus::Nephrology::Drug  The Kidney"
    fields:
      Front: "What are the major risk factors for nephrotoxic drug-induced AKI?"
      Back: "Preexisting kidney disease (GFR <60 mL/min), advanced age, volume depletion/dehydration, concurrent nephrotoxic medications, and underlying medical conditions such as diabetes or heart failure."
    tags: ["difficulty:medium", "subject:nephrology"]
  - guid: e853e44ec880d8ef
    noteType: Basic
    deck: "Corpus::Nephrology::Drug  The Kidney"
    fields:
      Front: "What is the significance of preexisting kidney disease in nephrotoxic drug-induced AKI?"
      Back: "Patients with GFR <60 mL/min have reduced compensatory capacity and are at increased risk of AKI from nephrotoxic drugs."
    tags: ["difficulty:medium", "subject:nephrology"]
  - guid: 5e37e3dfb82301c3
    noteType: Basic
    deck: "Corpus::Nephrology::Drug  The Kidney"
    fields:
      Front: "Why are older adults more susceptible to nephrotoxic drug effects?"
      Back: "Age-related changes and altered pharmacokinetics make older adults more susceptible to nephrotoxic effects of medications."
    tags: ["difficulty:medium", "subject:nephrology"]
  - guid: 4a17f0d3cc62de30
    noteType: Basic
    deck: "Corpus::Nephrology::Drug  The Kidney"
    fields:
      Front: "How does volume depletion increase nephrotoxic drug risk?"
      Back: "Volume depletion potentiates the effects of nephrotoxic drugs by reducing kidney blood flow and impairing drug elimination."
    tags: ["difficulty:medium", "subject:nephrology"]
  - guid: c3396ac4eae0b2e5
    noteType: Basic
    deck: "Corpus::Nephrology::Drug  The Kidney"
    fields:
      Front: "What is the strategy of individualizing drug doses to prevent nephrotoxicity?"
      Back: "Adjust doses based on kidney function and patient characteristics (comorbidities) to prevent excessive drug exposure and minimize nephrotoxicity."
    tags: ["difficulty:medium", "subject:nephrology"]
  - guid: 1f19e2ec4892bb14
    noteType: Basic
    deck: "Corpus::Nephrology::Drug  The Kidney"
    fields:
      Front: "What kidney function parameters should be monitored to detect early nephrotoxicity?"
      Back: "Serum creatinine and GFR should be regularly monitored, especially in high-risk patients, to allow early detection of nephrotoxicity and timely intervention."
    tags: ["difficulty:medium", "subject:nephrology"]
  - guid: a500726daaa3b682
    noteType: Basic
    deck: "Corpus::Nephrology::Drug  The Kidney"
    fields:
      Front: "How does adequate hydration help prevent drug-induced AKI?"
      Back: "Adequate fluid intake maintains kidney blood flow and reduces the risk of drug-induced acute kidney injury."
    tags: ["difficulty:medium", "subject:nephrology"]
  - guid: de74406b79891909
    noteType: Basic
    deck: "Corpus::Nephrology::Drug  The Kidney"
    fields:
      Front: "What is the strategy of avoiding concurrent nephrotoxic drug use?"
      Back: "When possible, alternate medications, reduce dosages, or avoid using nephrotoxic agents altogether to minimize cumulative nephrotoxic effects."
    tags: ["difficulty:medium", "subject:nephrology"]
  - guid: 54e25cddeac242f5
    noteType: Basic
    deck: "Corpus::Nephrology::Drug  The Kidney"
    fields:
      Front: "In the case of a 45-year-old diabetic patient on NSAIDs, ACE inhibitor, and two diuretics undergoing coronary angiography, what is the primary risk?"
      Back: "The combination of NSAIDs, ACE inhibitor, two diuretics, and contrast exposure in a dehydrated diabetic patient creates a high-risk scenario for nephrotoxic acute kidney injury."
    tags: ["difficulty:medium", "subject:nephrology"]
  - guid: 6cebfc4d231477e2
    noteType: Basic
    deck: "Corpus::Nephrology::Drug  The Kidney"
    fields:
      Front: "What are the five main strategies to minimize nephrotoxic drug-induced AKI?"
      Back: "1) Patient education about potential nephrotoxic effects; 2) Individualize doses based on kidney function; 3) Monitor kidney function regularly (serum creatinine, GFR); 4) Maintain adequate hydration; 5) Avoid concurrent nephrotoxic medications."
    tags: ["difficulty:medium", "subject:nephrology"]
