# Anki canonical export — rheumatology / rheumatology
# Generated by scripts/anki_migrate.js
deck: "Corpus::Rheumatology::rheumatology"
notes:
  - guid: db6ddb080fdf9bab
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "What four clinical adjectives define the standard presentation of Rheumatoid Arthritis (RA)?"
      Back: "Chronic, symmetrical, inflammatory, and erosive polyarthritis."
    tags: ["subject:rheumatology"]
  - guid: 4442ac3f4180f666
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "In Rheumatoid Arthritis, what is the 'formula' for determining joint destruction?"
      Back: "$\\text{Inflammation} \\times \\text{Time} = \\text{Joint Destruction}$."
    tags: ["subject:rheumatology"]
  - guid: 1832332ac87a4ef9
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "Which specific MHC class II gene shows the strongest association with Rheumatoid Arthritis in most populations?"
      Back: "$HLA-DR4$."
    tags: ["subject:rheumatology"]
  - guid: 8c987830a920f07c
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "What environmental factor is most significantly associated with both increased risk and greater disease severity in Rheumatoid Arthritis?"
      Back: "Smoking."
    tags: ["subject:rheumatology"]
  - guid: 4c78f5a90e61c7c9
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "What is the typical duration of morning stiffness in a patient with Rheumatoid Arthritis?"
      Back: "More than 30 minutes."
    tags: ["subject:rheumatology"]
  - guid: 6779d2c0ff6270d0
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "Which three pro-inflammatory cytokines are primarily produced by activated synovial macrophages in RA?"
      Back: "$TNF$, $IL-1$, and $IL-6$."
    tags: ["subject:rheumatology"]
  - guid: 2ab51ee627587a75
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "In Rheumatoid Arthritis, what is the effect of $RANKL$ on bone?"
      Back: "It activates osteoclasts, leading to bone destruction."
    tags: ["subject:rheumatology"]
  - guid: ba8f34f400882740
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "Identify the characteristic hand deformity in RA involving hyperextension of the PIP joint and flexion of the DIP joint."
      Back: "Swan neck deformity."
    tags: ["subject:rheumatology"]
  - guid: 6a23e5c773a4518b
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "Identify the characteristic hand deformity in RA involving flexion of the PIP joint and hyperextension of the DIP joint."
      Back: "Boutonniere deformity."
    tags: ["subject:rheumatology"]
  - guid: 2455e1721fbf3155
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "Under the 2010 ACR/EULAR classification criteria, what is the minimum score required to diagnose definite Rheumatoid Arthritis?"
      Back: "A score of $\\ge 6$."
    tags: ["subject:rheumatology"]
  - guid: 59eed20951c1ba15
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "What are the four clinical domains assessed in the ACR/EULAR 2010 criteria for RA?"
      Back: "Joint involvement, Serology, Duration of synovitis, and Acute-phase reactants."
    tags: ["subject:rheumatology"]
  - guid: e59e9f449576676d
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "In the context of RA, what does the 'Piano key sign' indicate regarding the wrist?"
      Back: "Instability or subluxation of the ulnar styloid."
    tags: ["subject:rheumatology"]
  - guid: d056a6b023cc5d69
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "Which ocular manifestation of RA involves severe thinning of the sclera that may lead to perforation?"
      Back: "Scleromalacia perforans."
    tags: ["subject:rheumatology"]
  - guid: 227829a746dfb896
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "What are the three components of Felty Syndrome?"
      Back: "Rheumatoid arthritis, splenomegaly, and neutropenia (uropinea)."
    tags: ["subject:rheumatology"]
  - guid: 99894cc78c1ad63e
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "What is the primary objective of using 'bridging therapy' with steroids in Rheumatoid Arthritis?"
      Back: "To control inflammation rapidly while waiting for DMARDs to become effective."
    tags: ["subject:rheumatology"]
  - guid: f446896d81e4f3b4
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "According to the EULAR Disease Activity Score, what score range indicates 'Remission'?"
      Back: "A score $< 2.6$."
    tags: ["subject:rheumatology"]
  - guid: 47969b90dbf09ce2
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "Which class of drugs includes Revellex and Etanercept in the treatment of RA?"
      Back: "Tumor necrosis factor-alpha ($TNF$-$\\alpha$) blocking drugs (Biologic DMARDs)."
    tags: ["subject:rheumatology"]
  - guid: 738e5624baf012ac
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "What is the most critical screening requirement before initiating biologic DMARD therapy?"
      Back: "Screening for latent or active infections, particularly Tuberculosis (TB)."
    tags: ["subject:rheumatology"]
  - guid: e0a34d68f36620db
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "How does the pattern of joint involvement in Spondyloarthropathy (SpA) typically differ from Rheumatoid Arthritis?"
      Back: "SpA typically involves the axial skeleton and presents as asymmetrical arthritis of large lower limb joints."
    tags: ["subject:rheumatology"]
  - guid: 6455d6cc2d4ecdfc
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "Define 'enthesitis', a prominent feature of Spondyloarthropathies."
      Back: "Inflammation at the site of insertion of a tendon, ligament, or articular capsule into bone."
    tags: ["subject:rheumatology"]
  - guid: 76350270ee1b8965
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "Which genetic antigen is highly associated with the Spondyloarthropathy group of diseases?"
      Back: "$HLA-B27$."
    tags: ["subject:rheumatology"]
  - guid: fb8356364a5f963c
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "List the five main subtypes of Spondyloarthritis (SpA)."
      Back: "Ankylosing spondylitis, Psoriatic arthritis, Reactive arthritis, Enteropathic arthritis, and Juvenile ankylosing spondylitis."
    tags: ["subject:rheumatology"]
  - guid: b0552e94999ced49
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "What is the classic clinical triad associated with Reactive Arthritis (formerly Reiter’s Syndrome)?"
      Back: "Conjunctivitis, Arthritis, and Urethritis."
    tags: ["subject:rheumatology"]
  - guid: 6b444cffca017950
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "Which urogenital pathogen is a common trigger for Reactive Arthritis?"
      Back: "Chlamydia trachomatis."
    tags: ["subject:rheumatology"]
  - guid: 045532a337ffc591
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "What is 'Keratoderma blenorrhagicum'?"
      Back: "A papulosquamous rash on the palms and soles associated with Reactive Arthritis."
    tags: ["subject:rheumatology"]
  - guid: 1e365630fe04735f
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "In Spondyloarthritis, what does the term 'Dactylitis' refer to?"
      Back: "Diffuse swelling of a whole finger or toe ('sausage digit')."
    tags: ["subject:rheumatology"]
  - guid: 36ecf281b324d2c4
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "Which specific radiographic finding in the spine is characteristic of advanced Ankylosing Spondylitis?"
      Back: "Bamboo spine (due to syndesmophytes)."
    tags: ["subject:rheumatology"]
  - guid: 74f0d0d66647cbc8
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "What is the primary site of disease in Osteoarthritis (OA)?"
      Back: "Hyaline articular cartilage."
    tags: ["subject:rheumatology"]
  - guid: bdf9f90c8e544a51
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "Define the pathology of Osteoarthritis regarding cartilage and bone."
      Back: "Focal softening and disintegration of cartilage accompanied by proliferation of new bone (osteophytes)."
    tags: ["subject:rheumatology"]
  - guid: d74affd4b1478277
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "List three cardinal radiographic features of Osteoarthritis."
      Back: "Joint space narrowing, subchondral sclerosis, and marginal osteophytes."
    tags: ["subject:rheumatology"]
  - guid: 05dc76ecb552af44
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "In hand Osteoarthritis, what is the name for nodes located at the Distal Interphalangeal (DIP) joints?"
      Back: "Heberden's nodes."
    tags: ["subject:rheumatology"]
  - guid: 346a9da2370ff52a
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "In hand Osteoarthritis, what is the name for nodes located at the Proximal Interphalangeal (PIP) joints?"
      Back: "Bouchard’s nodes."
    tags: ["subject:rheumatology"]
  - guid: 05a19365cb60c574
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "What mechanical factor increases the risk of knee OA four-fold when the $BMI$ is $> 30$?"
      Back: "Obesity."
    tags: ["subject:rheumatology"]
  - guid: 35d403114f01c177
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "Gout results from the deposition of which specific type of crystals?"
      Back: "Monosodium urate monohydrate crystals."
    tags: ["subject:rheumatology"]
  - guid: 3cd0b3f597985651
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "At what serum uric acid concentration threshold does the risk of crystal formation significantly increase?"
      Back: "$> 0.4 \\text{ mmol/L}$."
    tags: ["subject:rheumatology"]
  - guid: 54cd46c9739cc000
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "What is the most common cause of hyperuricaemia: overproduction or underexcretion of uric acid?"
      Back: "Underexcretion (accounts for 80% of cases)."
    tags: ["subject:rheumatology"]
  - guid: eb31c7ada15ccfef
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "What is the peak age range for the onset of Gout in males?"
      Back: "40 to 50 years."
    tags: ["subject:rheumatology"]
  - guid: 03b60fc894bfe3a0
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "Why is Gout rare in premenopausal women?"
      Back: "The uricosuric effects of oestrogen help maintain lower uric acid levels."
    tags: ["subject:rheumatology"]
  - guid: 86260df21abaaee6
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "Which joint is involved in 50% of first-time acute gout attacks?"
      Back: "The first metatarsophalangeal (1st MTP) joint (Podagra)."
    tags: ["subject:rheumatology"]
  - guid: 2c2dfd73cc096624
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "Define 'Tophi' in the context of chronic Gout."
      Back: "Accumulations of urate crystals in cartilage, tendons, bursae, and bones."
    tags: ["subject:rheumatology"]
  - guid: 011788f219c2e20b
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "What is the gold standard investigation for a definitive diagnosis of Gout?"
      Back: "Demonstration of uric acid crystals in synovial fluid or tophaceous material."
    tags: ["subject:rheumatology"]
  - guid: f3f676ac86eaded0
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "What is the mechanism of action for Allopurinol in treating Gout?"
      Back: "It is a xanthine oxidase inhibitor that reduces the production of uric acid."
    tags: ["subject:rheumatology"]
  - guid: e39b56160310ba0c
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "Name a uricosuric agent used for long-term management of Gout."
      Back: "Probenecid (or Lesinurad)."
    tags: ["subject:rheumatology"]
  - guid: 3dd4f62d54b26272
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "What acute renal complication can occur during chemotherapy due to massive uric acid excretion?"
      Back: "Acute uric acid nephropathy (Tumour Lysis Syndrome)."
    tags: ["subject:rheumatology"]
  - guid: e09401c503aa287c
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "Which autoantibody test is the primary screening tool for Systemic Lupus Erythematosus (SLE)?"
      Back: "Antinuclear factor (ANF) or Antinuclear antibody (ANA)."
    tags: ["subject:rheumatology"]
  - guid: 2c03dcb3674be74d
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "What is considered a clinically significant positive titre for an ANA test?"
      Back: "$1:160$."
    tags: ["subject:rheumatology"]
  - guid: 9df8c41a373f855c
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "Identify the characteristic 'triphasic color response' seen in Raynaud's Phenomenon."
      Back: "White (ischaemia), Blue (hypoxia), and Red (reperfusion)."
    tags: ["subject:rheumatology"]
  - guid: 1b8776e32422ba30
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "In Systemic Sclerosis (Scleroderma), what are the three sequential phases of skin changes?"
      Back: "Oedematous phase, Indurable (thickening) phase, and Atrophic phase."
    tags: ["subject:rheumatology"]
  - guid: eea0c203495e15e4
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "What are the two hallmark skin rashes associated with Dermatomyositis?"
      Back: "Heliotrope rash (eyelids) and Gottron’s papules/patches (knuckles)."
    tags: ["subject:rheumatology"]
  - guid: 44ad25ec0c7db4f7
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "Which condition is characterized by a bimodal age of onset (5–15 and 45–65 years) and proximal muscle weakness?"
      Back: "Dermatomyositis."
    tags: ["subject:rheumatology"]
  - guid: f479584344df1b6a
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "List the clinical features used in the Alarcon-Segovia diagnostic criteria for Mixed Connective Tissue Disease (MCTD)."
      Back: "Raynaud's, swollen hands, sclerodactyly, myositis, and synovitis (with high titre anti-RNP)."
    tags: ["subject:rheumatology"]
  - guid: 8fc38a12bfb470b2
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "What is the defining clinical feature of 'Mechanic’s hands' in inflammatory myositis?"
      Back: "Cracking and fissuring of the skin of the finger pads."
    tags: ["subject:rheumatology"]
  - guid: 55323d46348e17fc
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "In the approach to arthritis, how is 'polyarthritis' defined by the number of joints involved?"
      Back: "Involvement of 5 or more joints."
    tags: ["subject:rheumatology"]
  - guid: e0de3e093ef83255
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "Which pattern of arthritis is typically associated with Osteoarthritis: Symmetrical or Asymmetrical?"
      Back: "Asymmetrical (though it can be generalized, it lacks the 'true' symmetry of RA)."
    tags: ["subject:rheumatology"]
  - guid: 3dc6c9ad809b5793
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "Which inflammatory markers are typically elevated in Rheumatoid Arthritis but normal in Osteoarthritis?"
      Back: "ESR (Erythrocyte Sedimentation Rate) and CRP (C-reactive protein)."
    tags: ["subject:rheumatology"]
  - guid: 3e6fb2fd59de4a05
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "What diagnostic maneuver is used to assess lumbar spine flexion in Spondyloarthritis?"
      Back: "Modified Schober test."
    tags: ["subject:rheumatology"]
  - guid: db71258f0eb3ed65
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "What is 'Circinate balanitis'?"
      Back: "Shallow, painless ulcers on the glans penis associated with Reactive Arthritis."
    tags: ["subject:rheumatology"]
  - guid: e874581b38896fb3
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "In the context of back pain, what structures constitute the 'vertebral arch'?"
      Back: "Pedicles, laminae, facet joints, transverse processes, and spinous processes."
    tags: ["subject:rheumatology"]
  - guid: 5afdcf2723c54863
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "What is the significance of $C3$ and $C4$ complement levels in SLE management?"
      Back: "Low levels typically indicate active disease (consumption due to immune complexes)."
    tags: ["subject:rheumatology"]
  - guid: 817e411a33ee98e8
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "Which medication is considered the 'gold standard' anchor DMARD for Rheumatoid Arthritis?"
      Back: "Methotrexate."
    tags: ["subject:rheumatology"]
  - guid: cd8034aa6ddbd2df
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "In Scleroderma, what does the term 'Microstomia' describe?"
      Back: "Reduction in the size of the mouth opening due to skin tightening."
    tags: ["subject:rheumatology"]
  - guid: fcc53dada44b26e8
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "Which connective tissue disease is associated with recurrent miscarriages and venous/arterial thrombosis?"
      Back: "Antiphospholipid antibody syndrome (APLS)."
    tags: ["subject:rheumatology"]
  - guid: 4c2e232f5459c42a
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "Identify the pattern: A 25-year-old male with acute onset of swollen knee, conjunctivitis, and recent diarrhea."
      Back: "Reactive Arthritis."
    tags: ["subject:rheumatology"]
  - guid: 909fdb5bd5a8dd88
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "In Gout, what are 'Interval Phase' periods?"
      Back: "Asymptomatic periods between acute gouty attacks."
    tags: ["subject:rheumatology"]
  - guid: 66b26b396c4fd54e
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "What is the primary cause of joint pain in Osteoarthritis?"
      Back: "Mechanical stress, inflammation of the synovium, and subchondral bone micro-fractures."
    tags: ["subject:rheumatology"]
  - guid: cefc8c772f2d31f3
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "How does 'inflammatory' spinal pain typically respond to exercise versus rest?"
      Back: "It improves with exercise and worsens with rest (unlike mechanical pain)."
    tags: ["subject:rheumatology"]
  - guid: 588ef84b9d1b5c86
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "Which drug is used for patients with SLE specifically to prevent flares and manage skin/joint symptoms?"
      Back: "Chloroquine (or Hydroxychloroquine)."
    tags: ["subject:rheumatology"]
  - guid: faefc7cee03173e3
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "Which immunosuppressant is preferred for managing renal disease (Lupus Nephritis) in SLE?"
      Back: "Mycophenolate mofetil (MMF) or Cyclophosphamide."
    tags: ["subject:rheumatology"]
  - guid: 4ffdf017c3e733da
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "What is the 'Shawl-sign' in Dermatomyositis?"
      Back: "A rash distributed over the shoulders and proximal arms."
    tags: ["subject:rheumatology"]
  - guid: 225d7fb6b8c31b27
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "What is the 'Holster-sign' in Dermatomyositis?"
      Back: "A rash on the lateral aspect of the proximal thighs."
    tags: ["subject:rheumatology"]
  - guid: 2baf8fed75c77ece
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "In the EULAR criteria for RA, how many points are awarded for involvement of $> 10$ joints (with at least 1 small joint)?"
      Back: "5 points."
    tags: ["subject:rheumatology"]
  - guid: 2e1fa76fa54087cf
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "What is the effect of $TNF$ and $IL-1$ on chondrocytes in the RA joint?"
      Back: "They stimulate chondrocytes to destroy cartilage."
    tags: ["subject:rheumatology"]
  - guid: 122568fd843c973a
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "Which class of drugs includes Chloroquine, Sulphasalazine, Methotrexate, and Leflunomide?"
      Back: "Conventional Synthetic DMARDs (csDMARDs)."
    tags: ["subject:rheumatology"]
  - guid: aa0c29a0fe5eeb1b
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "What is 'Adhesive capsulitis' in the context of shoulder pain?"
      Back: "A condition (Frozen Shoulder) causing pain and global limitation of shoulder movement."
    tags: ["subject:rheumatology"]
  - guid: 426aa554da2dfc7f
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "In Spondyloarthritis, what is the 'Occiput to wall' test used to measure?"
      Back: "Cervical spine mobility and forward stoop (kyphosis)."
    tags: ["subject:rheumatology"]
  - guid: 68fec2d8e981a293
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "Which subtype of SpA is most likely to present with 'pitting of the nails'?"
      Back: "Psoriatic Arthritis."
    tags: ["subject:rheumatology"]
  - guid: a151e8df9436b0d0
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "What is 'secondary' Osteoarthritis?"
      Back: "OA that occurs due to a preceding cause such as trauma, metabolic disease, or joint deformity."
    tags: ["subject:rheumatology"]
  - guid: 161c40a0cdbcbd25
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "Which medication is used to treat Chlamydia-induced Reactive Arthritis to reduce relapses?"
      Back: "Tetracyclines (e.g., Lymecycline)."
    tags: ["subject:rheumatology"]
  - guid: 38d5a540f7b4e27b
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "In Gout, what are the two main 'Secondary' causes of urate overproduction?"
      Back: "Malignancies (high cell turnover) and haemolytic anaemia."
    tags: ["subject:rheumatology"]
  - guid: c2b6ef788b85e0d1
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "Why is 'asymptomatic hyperuricaemia' generally not treated with urate-lowering drugs?"
      Back: "The risk of developing gout or renal insufficiency is low for most individuals."
    tags: ["subject:rheumatology"]
  - guid: 31cc5da0e9575199
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "Identify the ANA staining pattern most specific for Systemic Lupus Erythematosus."
      Back: "Peripheral or rim pattern."
    tags: ["subject:rheumatology"]
  - guid: 47118053b84813ed
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "In Scleroderma management, which class of drugs is used to treat Raynaud's phenomenon?"
      Back: "Calcium channel blockers (e.g., Nifedipine or Amlodipine)."
    tags: ["subject:rheumatology"]
  - guid: 567ab1b1fd347a7b
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "Which inflammatory myopathy is characterized by 'Inclusion bodies' and is often resistant to therapy?"
      Back: "Inclusion Body Myositis (IBM)."
    tags: ["subject:rheumatology"]
  - guid: 6dadf56e70efa3b9
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "What is the typical ratio of females to males affected by Rheumatoid Arthritis?"
      Back: "$3:1$."
    tags: ["subject:rheumatology"]
  - guid: 2fc3a4a45556672d
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "What are the three clinical stages of Scleroderma skin involvement?"
      Back: "Oedematous, Indurated, and Atrophic."
    tags: ["subject:rheumatology"]
  - guid: 7e98d711fe0815ea
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "List three risk factors for the development of 'Secondary' Raynaud's."
      Back: "Connective tissue disease, positive ANF, and abnormal nail fold capillary microscopy."
    tags: ["subject:rheumatology"]
  - guid: 1a49ea9b387829b6
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "What is the role of Occupational Therapy in RA management?"
      Back: "Patient education, splinting, joint protection techniques, and preserving ADL function."
    tags: ["subject:rheumatology"]
  - guid: 7a6b931f3a325493
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "In Gout, which drug class can precipitate an attack by causing 'under-excretion' of uric acid?"
      Back: "Diuretics (e.g., Thiazides)."
    tags: ["subject:rheumatology"]
  - guid: 578a50a9f8f28c5b
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "Name the specific JAK kinase inhibitor mentioned for the treatment of SpA."
      Back: "Tofacitinib."
    tags: ["subject:rheumatology"]
  - guid: e1b2346285df6354
    noteType: Basic
    deck: "Corpus::Rheumatology::rheumatology"
    fields:
      Front: "What is 'atlanto-axial subluxation' in RA?"
      Back: "Instability between the C1 and C2 vertebrae, a potentially serious cervical spine complication."
    tags: ["subject:rheumatology"]
