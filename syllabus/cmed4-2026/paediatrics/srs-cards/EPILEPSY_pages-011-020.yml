  - guid: w3x4y5z6a7b8c9d0
    noteType: "Basic"
    deck: "Corpus::Paediatrics::EPILEPSY"
    fields:
      Front: "What investigations are required for a first-time seizure?"
      Back: "U&E, CPM, glucose, HIV, FBC, blood culture and/or urine culture, toxicology screening, lumbar puncture, CT scan."
    tags: ["epilepsy", "first-seizure-evaluation", "investigations", "subject:paediatrics"]

  - guid: x4y5z6a7b8c9d0e1
    noteType: "Basic"
    deck: "Corpus::Paediatrics::EPILEPSY"
    fields:
      Front: "When should antimicrobials be given in first-time seizure evaluation?"
      Back: "Always consider infection (meningitis/encephalitis): give antimicrobials to all <18 months with fever and all <6 months irrespective of fever; all >18 months who are unwell or persistently altered mental state."
    tags: ["epilepsy", "first-seizure-management", "infection", "subject:paediatrics"]

  - guid: y5z6a7b8c9d0e1f2
    noteType: "Basic"
    deck: "Corpus::Paediatrics::EPILEPSY"
    fields:
      Front: "What is the relationship between seizure abortion and SE management?"
      Back: "Aborting a seizure is managed using the same approach as status epilepticus management."
    tags: ["epilepsy", "first-seizure-management", "status-epilepticus", "subject:paediatrics"]

  - guid: z6a7b8c9d0e1f2g3
    noteType: "Basic"
    deck: "Corpus::Paediatrics::EPILEPSY"
    fields:
      Front: "When should CT be performed if LP is contraindicated?"
      Back: "An urgent CT should be performed if lumbar puncture is contraindicated."
    tags: ["epilepsy", "first-seizure-management", "imaging", "subject:paediatrics"]

  - guid: a7b8c9d0e1f2g3h4
    noteType: "Basic"
    deck: "Corpus::Paediatrics::EPILEPSY"
    fields:
      Front: "What metabolic disorder should be considered in young children with seizures?"
      Back: "Always consider the possibility of an underlying metabolic disorder, especially when <18 months old, presenting with myoclonic seizure and delayed development."
    tags: ["epilepsy", "first-seizure-management", "metabolic-disorder", "subject:paediatrics"]

  - guid: b8c9d0e1f2g3h4i5
    noteType: "Basic"
    deck: "Corpus::Paediatrics::EPILEPSY"
    fields:
      Front: "What are the three key classification questions for a child with epilepsy?"
      Back: "What is the cause of epilepsy (idiopathic/symptomatic/cryptogenic)? Where is the brain affected (generalized/focal)? Which seizure types are present (generalized/focal)?"
    tags: ["epilepsy", "classification", "approach", "subject:paediatrics"]

  - guid: c9d0e1f2g3h4i5j6
    noteType: "Basic"
    deck: "Corpus::Paediatrics::EPILEPSY"
    fields:
      Front: "Give an example of correct epilepsy classification."
      Back: "Idiopathic generalized epilepsy with tonic-clonic seizures; Remote symptomatic epilepsy with focal motor seizures secondary to previous TB meningitis."
    tags: ["epilepsy", "classification", "examples", "subject:paediatrics"]

  - guid: d0e1f2g3h4i5j6k7
    noteType: "Basic"
    deck: "Corpus::Paediatrics::EPILEPSY"
    fields:
      Front: "Describe Infantile Spasm (West Syndrome)."
      Back: "Usually starts in infancy but some cases later. Brief jerks of head/trunk flexion for 1-2 seconds whilst limbs flex or extend, usually followed by crying. EEG shows hypsarrhythmia. Needs urgent referral as delayed treatment has worse neurological outcome."
    tags: ["epilepsy", "syndromes", "infantile-spasm", "west-syndrome", "subject:paediatrics"]

  - guid: e1f2g3h4i5j6k7l8
    noteType: "Basic"
    deck: "Corpus::Paediatrics::EPILEPSY"
    fields:
      Front: "What is the prevalence and trigger for Childhood Absence Epilepsy?"
      Back: "Accounts for 5-10% of all epilepsy in children. Precipitated by hyperventilation."
    tags: ["epilepsy", "syndromes", "childhood-absence-epilepsy", "subject:paediatrics"]

  - guid: f2g3h4i5j6k7l8m9
    noteType: "Basic"
    deck: "Corpus::Paediatrics::EPILEPSY"
    fields:
      Front: "Describe Rolandic Epilepsy."
      Back: "Age 3-13 years. Seizure starts during or soon after sleep with facial twitching or grimacing whilst child is conscious, but can then secondarily generalize with tonic-clonic seizure. Sleep EEG shows bilateral centrotemporal spikes."
    tags: ["epilepsy", "syndromes", "rolandic-epilepsy", "subject:paediatrics"]

  - guid: g3h4i5j6k7l8m9n0
    noteType: "Basic"
    deck: "Corpus::Paediatrics::EPILEPSY"
    fields:
      Front: "What is Juvenile Myoclonic Epilepsy?"
      Back: "An epilepsy syndrome with age range 10-16 years."
    tags: ["epilepsy", "syndromes", "juvenile-myoclonic-epilepsy", "subject:paediatrics"]

  - guid: h4i5j6k7l8m9n0o1
    noteType: "Basic"
    deck: "Corpus::Paediatrics::EPILEPSY"
    fields:
      Front: "When should anticonvulsant therapy be started?"
      Back: "Consider anticonvulsant drugs after 2 or more seizures and after consideration of the diagnosis. Always consider risk of side effects before deciding to treat."
    tags: ["epilepsy", "antiepileptic-drugs", "treatment-decision", "subject:paediatrics"]

  - guid: i5j6k7l8m9n0o1p2
    noteType: "Basic"
    deck: "Corpus::Paediatrics::EPILEPSY"
    fields:
      Front: "What proportion of children with epilepsy can be controlled with monotherapy?"
      Back: "80% of children with epilepsy can be controlled with one drug."
    tags: ["epilepsy", "antiepileptic-drugs", "treatment-outcomes", "subject:paediatrics"]

  - guid: j6k7l8m9n0o1p2q3
    noteType: "Basic"
    deck: "Corpus::Paediatrics::EPILEPSY"
    fields:
      Front: "What monitoring should be done in children with epilepsy?"
      Back: "Use a seizure diary; perform thorough neurodevelopmental assessment; assess growth and nutritional status."
    tags: ["epilepsy", "antiepileptic-drugs", "monitoring", "subject:paediatrics"]

  - guid: k7l8m9n0o1p2q3r4
    noteType: "Basic"
    deck: "Corpus::Paediatrics::EPILEPSY"
    fields:
      Front: "What is the main side effect concern of AEDs regarding bone health?"
      Back: "Most AEDs increase risk of osteoporosis."
    tags: ["epilepsy", "antiepileptic-drugs", "side-effects", "subject:paediatrics"]

  - guid: l8m9n0o1p2q3r4s5
    noteType: "Basic"
    deck: "Corpus::Paediatrics::EPILEPSY"
    fields:
      Front: "What is the START LOW, GO SLOW principle?"
      Back: "A principle for prescribing anticonvulsant drugs: start with low doses and increase gradually to minimize side effects."
    tags: ["epilepsy", "antiepileptic-drugs", "prescribing-principle", "subject:paediatrics"]

  - guid: m9n0o1p2q3r4s5t6
    noteType: "Basic"
    deck: "Corpus::Paediatrics::EPILEPSY"
    fields:
      Front: "What is Sodium Valproate indicated for?"
      Back: "1st line for generalized epilepsy."
    tags: ["epilepsy", "antiepileptic-drugs", "sodium-valproate", "subject:paediatrics"]

  - guid: n0o1p2q3r4s5t6u7
    noteType: "Basic"
    deck: "Corpus::Paediatrics::EPILEPSY"
    fields:
      Front: "What are the contraindications for Sodium Valproate?"
      Back: "Childhood absence epilepsy and Juvenile myoclonic epilepsy."
    tags: ["epilepsy", "antiepileptic-drugs", "sodium-valproate", "contraindications", "subject:paediatrics"]

  - guid: o1p2q3r4s5t6u7v8
    noteType: "Basic"
    deck: "Corpus::Paediatrics::EPILEPSY"
    fields:
      Front: "When should Sodium Valproate be avoided?"
      Back: "Avoid if possible in hepatic impairment, inborn error of metabolism, or concomitant anti-retroviral therapy."
    tags: ["epilepsy", "antiepileptic-drugs", "sodium-valproate", "contraindications", "subject:paediatrics"]

  - guid: p2q3r4s5t6u7v8w9
    noteType: "Basic"
    deck: "Corpus::Paediatrics::EPILEPSY"
    fields:
      Front: "What is the common drug interaction of Sodium Valproate with antiretrovirals?"
      Back: "Raises blood level of AZT and interacts with EFV."
    tags: ["epilepsy", "antiepileptic-drugs", "sodium-valproate", "drug-interactions", "subject:paediatrics"]

  - guid: q3r4s5t6u7v8w9x0
    noteType: "Basic"
    deck: "Corpus::Paediatrics::EPILEPSY"
    fields:
      Front: "What is the starting dose of Sodium Valproate?"
      Back: "10 mg/kg/day in 3 divided doses for syrup or 2 divided doses for tablets."
    tags: ["epilepsy", "antiepileptic-drugs", "sodium-valproate", "dosing", "subject:paediatrics"]

  - guid: r4s5t6u7v8w9x0y1
    noteType: "Basic"
    deck: "Corpus::Paediatrics::EPILEPSY"
    fields:
      Front: "What is the therapeutic dose of Sodium Valproate?"
      Back: "25-40 mg/kg/day."
    tags: ["epilepsy", "antiepileptic-drugs", "sodium-valproate", "dosing", "subject:paediatrics"]

  - guid: s5t6u7v8w9x0y1z2
    noteType: "Basic"
    deck: "Corpus::Paediatrics::EPILEPSY"
    fields:
      Front: "List the side effects of Sodium Valproate."
      Back: "Increased appetite and weight gain, tremor, ataxia, hepatotoxicity, thrombocytopenia, teratogenicity (neural tube defects)."
    tags: ["epilepsy", "antiepileptic-drugs", "sodium-valproate", "side-effects", "subject:paediatrics"]

