deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
notes:
  - guid: "x1mtct01intut"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What is the 1st mode of HIV transmission to children (perinatal)?"
      Back: "Perinatal transmission occurs through: intrauterine, intrapartum, and breastfeeding."
    tags: ["transmission-modes", "mtct", "subject:paediatrics-neonatal"]

  - guid: "x2mtct02blood"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What is the estimated risk of HIV transmission via contaminated blood product in the US?"
      Back: "1 in 2,000,000"
    tags: ["transmission-modes", "blood-products", "subject:paediatrics-neonatal"]

  - guid: "x3mtct03sexual"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "List 3 types of sexual activity that can transmit HIV to children."
      Back: "Heterosexual, homosexual, and sexual abuse."
    tags: ["transmission-modes", "sexual", "subject:paediatrics-neonatal"]

  - guid: "x4mtct04parental"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What are 2 settings for parenteral transmission of HIV?"
      Back: "Sharing contaminated needles (illicit drugs, anabolic steroids) and iatrogenic (re-use of non-sterilized equipment)."
    tags: ["transmission-modes", "parenteral", "subject:paediatrics-neonatal"]

  - guid: "x5mtct05ratesno"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What is the MTCT transmission rate WITHOUT any intervention?"
      Back: "15% to 45%"
    tags: ["transmission-rates", "mtct", "subject:paediatrics-neonatal"]

  - guid: "x6mtct06rateswith"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What is the MTCT transmission rate WITH effective interventions?"
      Back: "Below 5%"
    tags: ["transmission-rates", "mtct", "subject:paediatrics-neonatal"]

  - guid: "x7mech01utero"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What is the mechanism of in utero HIV transmission - timing and mechanism?"
      Back: "Majority occurs in 3rd trimester via breakdown of placental integrity leading to microtransfusions of viraemic maternal blood across placenta to fetus."
    tags: ["mechanism", "in-utero", "subject:paediatrics-neonatal"]

  - guid: "x8mech02utero-risk"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What conditions increase in utero HIV transmission risk?"
      Back: "Genital tract infections and placental inflammation."
    tags: ["mechanism", "in-utero", "risk-factors", "subject:paediatrics-neonatal"]

  - guid: "x9mech03intra"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What is the mechanism of intrapartum HIV transmission?"
      Back: "Contact of infant mucosal membranes with HIV virus in maternal blood and secretions, with microtransfusions crossing placenta during labour contractions."
    tags: ["mechanism", "intrapartum", "subject:paediatrics-neonatal"]

  - guid: "x10mech04intra-risk"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What is the effect of ruptured membranes >4 hours on intrapartum HIV transmission?"
      Back: "Associated increased risk of transmission."
    tags: ["mechanism", "intrapartum", "risk-factors", "subject:paediatrics-neonatal"]

  - guid: "x11risk01vl"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What is the primary maternal risk factor for MTCT?"
      Back: "Maternal plasma and breastmilk viral load."
    tags: ["risk-factors", "mtct", "viral-load", "subject:paediatrics-neonatal"]

  - guid: "x12risk02immune"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What are 2 additional maternal risk factors for MTCT (besides viral load)?"
      Back: "Maternal immunologic status and clinical stage."
    tags: ["risk-factors", "mtct", "subject:paediatrics-neonatal"]

  - guid: "x13clin01birth"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "Can clinical findings discriminate infected from uninfected infants at birth?"
      Back: "No. At birth, there are no definitive clinical findings that discriminate between infected and uninfected infants."
    tags: ["clinical-manifestations", "diagnosis", "subject:paediatrics-neonatal"]

  - guid: "x14clin02slow"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "List 4 slow progression signs/symptoms of perinatal HIV infection in infants."
      Back: "Oral thrush, diffuse lymphadenopathy, hepatomegaly, splenomegaly, recurrent diarrhea."
    tags: ["clinical-manifestations", "slow-progression", "subject:paediatrics-neonatal"]

  - guid: "x15clin03threat"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What is a life-threatening OI in perinatally infected infants and at what age?"
      Back: "PCP (Pneumocystis jirovecii pneumonia) at 4-6 months."
    tags: ["clinical-manifestations", "oi", "subject:paediatrics-neonatal"]

  - guid: "x16clin04obscure"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "List 4 obscure presentations of perinatal HIV infection."
      Back: "Thrombocytopenia, encephalopathy, nephrotic syndrome, heart failure, failure to thrive."
    tags: ["clinical-manifestations", "obscure", "subject:paediatrics-neonatal"]

  - guid: "x17clin05early"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What 2 serious complications can occur early in perinatal HIV infection?"
      Back: "Growth failure and CNS disease."
    tags: ["clinical-manifestations", "early", "subject:paediatrics-neonatal"]

  - guid: "x18clin06life"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What is the post-HAART life expectancy for perinatally infected children?"
      Back: "Greater than 95% living at 16 years of age."
    tags: ["clinical-manifestations", "prognosis", "subject:paediatrics-neonatal"]

  - guid: "x19aids01pcp"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What is the most commonly reported AIDS-defining condition in children <13 years and its percentage?"
      Back: "Pneumocystis jirovecii pneumonia at 35%."
    tags: ["aids-defining", "epidemiology", "subject:paediatrics-neonatal"]

  - guid: "x20aids02lip"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What is the 2nd most common AIDS-defining condition in children <13 years and its percentage?"
      Back: "Lymphoid interstitial pneumonitis at 23%."
    tags: ["aids-defining", "epidemiology", "subject:paediatrics-neonatal"]

  - guid: "x21aids03bact"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What is the 3rd most common AIDS-defining condition in children <13 years and its percentage?"
      Back: "Recurrent bacterial infections at 21%."
    tags: ["aids-defining", "epidemiology", "subject:paediatrics-neonatal"]

  - guid: "x22aids04wast"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What is the 4th most common AIDS-defining condition in children <13 years and its percentage?"
      Back: "HIV wasting syndrome at 19%."
    tags: ["aids-defining", "epidemiology", "subject:paediatrics-neonatal"]

  - guid: "x23aids05ence"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What is the 5th most common AIDS-defining condition in children <13 years and its percentage?"
      Back: "HIV encephalopathy at 17%."
    tags: ["aids-defining", "epidemiology", "subject:paediatrics-neonatal"]

  - guid: "x24lab01antib"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What 2 methods are used for HIV antibody testing?"
      Back: "ELISA and Western Blot."
    tags: ["laboratory-tests", "diagnosis", "subject:paediatrics-neonatal"]

  - guid: "x25lab02dna"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What does 'D' stand for in HIV DNA PCR in neonatal diagnosis?"
      Back: "D for 'Diagnosis' - used for diagnosis in neonates."
    tags: ["laboratory-tests", "diagnosis", "pcr", "subject:paediatrics-neonatal"]

  - guid: "x26lab03rna"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What does HIV RNA quantitation (viral load) indicate?"
      Back: "Prognosis and response to therapy."
    tags: ["laboratory-tests", "viral-load", "subject:paediatrics-neonatal"]

  - guid: "x27lab04resis"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What are 2 methods to assess HIV antiretroviral resistance?"
      Back: "Genotype (mutations seen in resistant strains) and phenotype (in vitro sensitivity)."
    tags: ["laboratory-tests", "resistance", "subject:paediatrics-neonatal"]

  - guid: "x28lab05tdm"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What additional laboratory test can monitor ARV therapy?"
      Back: "Therapeutic drug monitoring."
    tags: ["laboratory-tests", "arv", "subject:paediatrics-neonatal"]

  - guid: "x29limit01antib"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "Why are antibody assays unreliable in infants and young children?"
      Back: "Due to persistence of transplacentally acquired maternal antibodies."
    tags: ["testing-limitations", "antibody", "subject:paediatrics-neonatal"]

  - guid: "x30limit02false"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "When may antibody tests be false negative?"
      Back: "In the first weeks after acute infection."
    tags: ["testing-limitations", "antibody", "subject:paediatrics-neonatal"]

  - guid: "x31pcr01detect"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What does qualitative HIV-1 DNA PCR detect?"
      Back: "HIV proviral DNA within peripheral blood mononuclear cells."
    tags: ["pcr", "dna-pcr", "subject:paediatrics-neonatal"]

  - guid: "x32pcr02sample"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What 2 sample types can be used for HIV DNA PCR?"
      Back: "Whole blood or dried blood samples."
    tags: ["pcr", "dna-pcr", "subject:paediatrics-neonatal"]

  - guid: "x33pcr03art"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "Will HIV DNA PCR be positive even if the patient is on ART?"
      Back: "Yes. Test positive even if on ART."
    tags: ["pcr", "dna-pcr", "art", "subject:paediatrics-neonatal"]

  - guid: "x34pcr04recent"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "Why might DNA PCR not detect very recent infection?"
      Back: "Because 2/3 of MTCT occurs perinatally and DNA PCR will not detect very recent infection."
    tags: ["pcr", "dna-pcr", "timing", "subject:paediatrics-neonatal"]

  - guid: "x35pcr05birth"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What is the sensitivity of HIV DNA PCR at birth?"
      Back: "55%"
    tags: ["pcr", "dna-pcr", "sensitivity", "subject:paediatrics-neonatal"]

  - guid: "x36pcr062w4w"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What is the sensitivity of HIV DNA PCR at 2-4 weeks of age?"
      Back: "Greater than 90%"
    tags: ["pcr", "dna-pcr", "sensitivity", "subject:paediatrics-neonatal"]

  - guid: "x37pcr07136m"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What is the sensitivity of HIV DNA PCR at 1, 3, and 6 months of age?"
      Back: "100%"
    tags: ["pcr", "dna-pcr", "sensitivity", "subject:paediatrics-neonatal"]

  - guid: "x38emtct01scope"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What time period does EMTCT (Elimination of MTCT) services cover?"
      Back: "From preconception to 18 months of age or 6 weeks post cessation of breastfeeding if continued beyond 18 months."
    tags: ["emtct", "definition", "subject:paediatrics-neonatal"]

  - guid: "x39emtct02services"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "List 6 settings where EMTCT services should be provided."
      Back: "Family planning, antenatal care, delivery, post-natal care, EPI visits, and IMCI visits."
    tags: ["emtct", "services", "subject:paediatrics-neonatal"]

  - guid: "x40test2015a"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What was the 2015 guideline for HIV testing in pregnant mothers?"
      Back: "At first visit and every 3 months."
    tags: ["mother-testing", "2015-guideline", "subject:paediatrics-neonatal"]

  - guid: "x41test2019a"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What is the 2019 guideline for HIV testing in pregnant mothers?"
      Back: "At first visit and each routine basic antenatal care plus visit (8 visits in all)."
    tags: ["mother-testing", "2019-guideline", "subject:paediatrics-neonatal"]

  - guid: "x42test2019b"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What additional guidance was added in 2019 for ART initiation in pregnant mothers?"
      Back: "Guidance on adherence, considerations for adolescents, and use of dolutegravir (DTG) in child bearing age."
    tags: ["mother-testing", "2019-guideline", "art", "subject:paediatrics-neonatal"]

  - guid: "x43vl01timing"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "When should viral load testing be done in the mother?"
      Back: "At delivery."
    tags: ["viral-load-testing", "mother", "subject:paediatrics-neonatal"]

  - guid: "x44vl02pp"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "When should viral load testing be done postpartum?"
      Back: "At 6 months postpartum."
    tags: ["viral-load-testing", "mother", "postpartum", "subject:paediatrics-neonatal"]

  - guid: "x45vl03bf"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What is the frequency of viral load testing if breastfeeding?"
      Back: "6-monthly if breastfeeding."
    tags: ["viral-load-testing", "mother", "breastfeeding", "subject:paediatrics-neonatal"]

  - guid: "x46inftest2015a"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What was the 2015 guideline for infant HIV testing - timing?"
      Back: "HIV PCR at birth and 10 weeks; 14 weeks PCR for high-risk infants; testing 6 weeks post cessation of breastfeeding; 18 months rapid with a second rapid for confirmation."
    tags: ["infant-testing", "2015-guideline", "subject:paediatrics-neonatal"]

  - guid: "x47inftest2019a"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What changed in 2019 regarding the 14-week PCR test?"
      Back: "NO 14 WEEK TEST in 2019 guideline (removed from 2015)."
    tags: ["infant-testing", "2019-guideline", "subject:paediatrics-neonatal"]

  - guid: "x48inftest2019b"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What new test was added in 2019 infant HIV testing?"
      Back: "6 month PCR for all exposed infants."
    tags: ["infant-testing", "2019-guideline", "subject:paediatrics-neonatal"]

  - guid: "x49inftest2019c"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What changed at 18 months in the 2019 infant testing guideline?"
      Back: "Universal HIV testing at 18 months if exposed uninfected (changed from rapid with confirmation)."
    tags: ["infant-testing", "2019-guideline", "subject:paediatrics-neonatal"]

  - guid: "x50inftest2019d"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What is the confirmatory test up to 2 years in 2019 guideline?"
      Back: "PCR used as confirmatory test up to 2 years of age (changed from rapid)."
    tags: ["infant-testing", "2019-guideline", "confirmatory", "subject:paediatrics-neonatal"]

  - guid: "x51highrisk2015a"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What was the 2015 definition of 'high risk' infant at birth (maternal VL)?"
      Back: "Maternal VL >1000 c/ml."
    tags: ["high-risk-definition", "2015-guideline", "viral-load", "subject:paediatrics-neonatal"]

  - guid: "x52highrisk2015b"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What was the 2015 definition of 'high risk' infant at birth (maternal ART)?"
      Back: "Maternal ART <4 weeks prior to delivery."
    tags: ["high-risk-definition", "2015-guideline", "art", "subject:paediatrics-neonatal"]

  - guid: "x53highrisk2019a"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What is the 2019 definition of 'high risk' infant (maternal VL at delivery)?"
      Back: "Mother VL >1000 c/ml at delivery or most recent viral load taken during the last 12 weeks of ANC."
    tags: ["high-risk-definition", "2019-guideline", "viral-load", "subject:paediatrics-neonatal"]

  - guid: "x54highrisk2019b"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What is the 2019 definition of 'high risk' infant (maternal VL unknown)?"
      Back: "Mother with no VL in the last 12 weeks of ANC."
    tags: ["high-risk-definition", "2019-guideline", "viral-load", "subject:paediatrics-neonatal"]

  - guid: "x55pep2015"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What was the 2015 PEP regimen for high-risk infants?"
      Back: "AZT for 6 weeks and NVP for 12 weeks."
    tags: ["pep", "prophylaxis", "2015-guideline", "subject:paediatrics-neonatal"]

  - guid: "x56pep2019a"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What is the 2019 PEP regimen for high-risk infants?"
      Back: "High risk: AZT for 6 weeks and NVP for a minimum of 12 weeks."
    tags: ["pep", "prophylaxis", "2019-guideline", "subject:paediatrics-neonatal"]

  - guid: "x57pep2019b"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What is the 2019 rule for stopping NVP in high-risk infants?"
      Back: "Stop NVP if mothers VL <1000 c/ml or until 1 week after she stops breastfeeding."
    tags: ["pep", "prophylaxis", "2019-guideline", "nvp", "subject:paediatrics-neonatal"]

  - guid: "x58breastfeed01"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What is the ART duration recommended for breastfeeding mothers with HIV?"
      Back: "24 months or longer, in line with recommendation for general population."
    tags: ["breastfeeding", "art", "subject:paediatrics-neonatal"]

  - guid: "x59early01"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What should be done for HIV exposed infant at 3-6 days after birth?"
      Back: "Follow up PCR and start ARVs."
    tags: ["early-care", "exposed-infant", "subject:paediatrics-neonatal"]

  - guid: "x60early02"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What should be done for HIV exposed infant at 6 weeks?"
      Back: "Ensure birth PCR and mother's VL checked."
    tags: ["early-care", "exposed-infant", "subject:paediatrics-neonatal"]

  - guid: "x61early03"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What should be done for HIV exposed infant at 10 weeks?"
      Back: "PCR for all previously negative infants."
    tags: ["early-care", "exposed-infant", "subject:paediatrics-neonatal"]

  - guid: "x62later01"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What should be done for HIV exposed infant at 6 months?"
      Back: "PCR for exposed uninfected; establish HIV status of unexposed via test of mother or rapid on child if no mother available."
    tags: ["later-care", "exposed-infant", "subject:paediatrics-neonatal"]

  - guid: "x63later02"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What should be done for HIV exposed infant at 18 months?"
      Back: "Universal HIV rapid for all infants unless known to be infected."
    tags: ["later-care", "exposed-infant", "subject:paediatrics-neonatal"]

  - guid: "x64later03"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "When should age-appropriate testing be done post breastfeeding?"
      Back: "6 weeks post cessation of breastfeeding."
    tags: ["later-care", "exposed-infant", "subject:paediatrics-neonatal"]

  - guid: "x65confirm01"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What is the confirmatory test rule if patient <2 years and positive PCR or rapid?"
      Back: "CONFIRM with a HIV PCR test on a new sample."
    tags: ["confirmatory-test", "algorithm", "subject:paediatrics-neonatal"]

  - guid: "x66confirm02"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "Should you wait for confirmatory result before starting ART?"
      Back: "No. Do not wait for confirmatory result to initiate therapy."
    tags: ["confirmatory-test", "art", "subject:paediatrics-neonatal"]

  - guid: "x67confirm03"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What is the screening and confirmatory test algorithm for age <18/12?"
      Back: "Screening: PCR; Confirmation: PCR."
    tags: ["confirmatory-test", "algorithm", "age-based", "subject:paediatrics-neonatal"]

  - guid: "x68confirm04"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What is the screening and confirmatory test algorithm for age 18/12–2 years?"
      Back: "Screening: Rapid; Confirmation: PCR."
    tags: ["confirmatory-test", "algorithm", "age-based", "subject:paediatrics-neonatal"]

  - guid: "x69confirm05"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What is the screening and confirmatory test algorithm for age >2 years?"
      Back: "Screening: Rapid; Confirmation: Rapid."
    tags: ["confirmatory-test", "algorithm", "age-based", "subject:paediatrics-neonatal"]

  - guid: "x70elvl01check"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What should you do at every maternal visit if VL elevates?"
      Back: "Check results of mother's most recent viral load."
    tags: ["elevated-vl", "mother", "subject:paediatrics-neonatal"]

  - guid: "x71elvl02pep"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What is the regimen if mother's VL is elevated?"
      Back: "Restart high risk prophylaxis for infant with AZT 12 hourly (6 weeks) and NVP daily (min 12 weeks)."
    tags: ["elevated-vl", "pep", "regimen", "subject:paediatrics-neonatal"]

  - guid: "x72elvl03dose"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What adjustment must be made when restarting PEP for elevated maternal VL?"
      Back: "Remember to adjust dosages according to infant weight."
    tags: ["elevated-vl", "pep", "dosing", "subject:paediatrics-neonatal"]

  - guid: "x73stop01nvp"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "When can NVP be stopped in exposed infant?"
      Back: "Stop only if mother's VL <1000 c/ml after >12 weeks."
    tags: ["stop-pep", "nvp", "subject:paediatrics-neonatal"]

  - guid: "x74stop02nvp-cont"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "When must NVP be continued in exposed infant?"
      Back: "Continue if VL >1000 c/ml until one week after breastfeeding."
    tags: ["stop-pep", "nvp", "subject:paediatrics-neonatal"]

  - guid: "x75stop03ctp"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "When can cotrimoxazole (CTP) be stopped?"
      Back: "Stop until infant is confirmed HIV negative six weeks post cessation of breastfeeding."
    tags: ["stop-pep", "cotrimoxazole", "subject:paediatrics-neonatal"]

  - guid: "x76stop04ctp-alt"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "When can CTP be stopped if not breastfeeding?"
      Back: "If 10 week PCR negative and no breastfeeding can stop CTP."
    tags: ["stop-pep", "cotrimoxazole", "subject:paediatrics-neonatal"]

  - guid: "x77aband01"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What is the management approach for abandoned infants with unknown HIV exposure?"
      Back: "Treat as high risk infant - do PCR and start high risk prophylaxis."
    tags: ["abandoned-infants", "management", "subject:paediatrics-neonatal"]

  - guid: "x78aband02pos"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What is the management if abandoned infant's PCR is positive?"
      Back: "Do confirm viral load and start ARV, stop NVP and AZT."
    tags: ["abandoned-infants", "management", "positive", "subject:paediatrics-neonatal"]

  - guid: "x79aband03neg"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What is the management if abandoned infant's PCR is negative?"
      Back: "Do PCR at ten weeks of age."
    tags: ["abandoned-infants", "management", "negative", "subject:paediatrics-neonatal"]

  - guid: "x80indeter01"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What is the first step in managing an indeterminate PCR result?"
      Back: "Check prior PCR and VL."
    tags: ["indeterminate-pcr", "algorithm", "subject:paediatrics-neonatal"]

  - guid: "x81indeter02"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What action if PCR is pos/indeterminate but VL is detectable?"
      Back: "Treat as infected and start ARVs."
    tags: ["indeterminate-pcr", "algorithm", "subject:paediatrics-neonatal"]

  - guid: "x82indeter03"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What action if PCR is neg/indeterminate, VL undetectable, and no prior PCR/VL?"
      Back: "Repeat PCR and VL urgently."
    tags: ["indeterminate-pcr", "algorithm", "subject:paediatrics-neonatal"]

  - guid: "x83indeter04"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What action if repeat PCR and VL are negative?"
      Back: "Follow testing algorithm for the exposed infant."
    tags: ["indeterminate-pcr", "algorithm", "subject:paediatrics-neonatal"]

  - guid: "x84nvp01timing"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "When should the first dose of NVP be given to exposed infant?"
      Back: "As soon as possible after birth."
    tags: ["nvp-dosing", "timing", "subject:paediatrics-neonatal"]

  - guid: "x85nvp02pcr"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "Should birth PCR be done before or after infant NVP administration?"
      Back: "Ideally before, but any delay in testing should not delay the NVP administration."
    tags: ["nvp-dosing", "pcr", "subject:paediatrics-neonatal"]

  - guid: "x86nvp03freq"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What is the frequency and repeat rule for NVP dosing?"
      Back: "Only one dose per 24-hour period; repeat dose once only if baby vomits."
    tags: ["nvp-dosing", "frequency", "subject:paediatrics-neonatal"]

  - guid: "x87nvp04pos"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What should be done if infant HIV PCR is positive while on NVP?"
      Back: "Stop NVP, confirm with second HIV PCR test and initiate ART while awaiting the second PCR test result."
    tags: ["nvp-dosing", "positive-pcr", "subject:paediatrics-neonatal"]

  - guid: "x88nvp05bf"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "Should breastfeeding continue while on NVP?"
      Back: "Yes. Continue breastfeeding."
    tags: ["nvp-dosing", "breastfeeding", "subject:paediatrics-neonatal"]

  - guid: "x89tb01assess"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What is the initial management if neonate is TB exposed?"
      Back: "Do a thorough clinical examination."
    tags: ["tb-prophylaxis", "assessment", "subject:paediatrics-neonatal"]

  - guid: "x90tb02asympt"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What is the TB prophylaxis regimen if neonate is asymptomatic?"
      Back: "INH 10 mg/kg for 6 months and DO NOT GIVE BCG."
    tags: ["tb-prophylaxis", "inh", "regimen", "subject:paediatrics-neonatal"]

  - guid: "x91tb03bcg"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "When should BCG be given after INH prophylaxis completion?"
      Back: "Give BCG 2 weeks after completion of INH prophylaxis."
    tags: ["tb-prophylaxis", "bcg", "timing", "subject:paediatrics-neonatal"]

  - guid: "x92tb04suspect"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What action if clinical suspicion of TB in infant?"
      Back: "Refer for TB evaluation."
    tags: ["tb-prophylaxis", "assessment", "subject:paediatrics-neonatal"]

  - guid: "x93trans01cum"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What is the cumulative MTCT risk without preventative interventions?"
      Back: "13% to 39%"
    tags: ["transmission-without-intervention", "cumulative", "subject:paediatrics-neonatal"]

  - guid: "x94trans02ut"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What is the intrauterine MTCT risk without intervention?"
      Back: "5%"
    tags: ["transmission-without-intervention", "in-utero", "subject:paediatrics-neonatal"]

  - guid: "x95trans03pp"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What is the peripartum MTCT risk without intervention?"
      Back: "13% to 18%"
    tags: ["transmission-without-intervention", "peripartum", "subject:paediatrics-neonatal"]

  - guid: "x96trans04bf"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What is the breastfeeding MTCT risk without intervention?"
      Back: "5% to 28%"
    tags: ["transmission-without-intervention", "breastfeeding", "subject:paediatrics-neonatal"]

  - guid: "x97timing01ut"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What percentage of perinatal HIV transmission occurs in utero?"
      Back: "25% to 40%"
    tags: ["timing-transmission", "in-utero", "subject:paediatrics-neonatal"]

  - guid: "x98timing02ip"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What percentage of perinatal HIV transmission occurs intrapartum?"
      Back: "60% to 75%"
    tags: ["timing-transmission", "intrapartum", "subject:paediatrics-neonatal"]

  - guid: "x99timing03bf-est"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What is the breastfeeding transmission risk with established maternal infection?"
      Back: "14%"
    tags: ["timing-transmission", "breastfeeding", "established", "subject:paediatrics-neonatal"]

  - guid: "x100timing04bf-pri"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What is the breastfeeding transmission risk with primary maternal infection?"
      Back: "29%"
    tags: ["timing-transmission", "breastfeeding", "primary", "subject:paediatrics-neonatal"]

  - guid: "x101factors01rna"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What is the primary maternal factor influencing perinatal transmission?"
      Back: "HIV-1 RNA levels (viral load)."
    tags: ["transmission-factors", "maternal", "viral-load", "subject:paediatrics-neonatal"]

  - guid: "x102factors02cd4"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What maternal immunologic factor influences perinatal transmission?"
      Back: "Low CD4 lymphocyte count."
    tags: ["transmission-factors", "maternal", "immune", "subject:paediatrics-neonatal"]

  - guid: "x103factors03hep"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What 2 viral co-infections increase perinatal transmission?"
      Back: "Hepatitis C and CMV."
    tags: ["transmission-factors", "maternal", "coinfections", "subject:paediatrics-neonatal"]

  - guid: "x104factors04bv"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What bacterial condition increases perinatal transmission?"
      Back: "Bacterial vaginosis."
    tags: ["transmission-factors", "maternal", "subject:paediatrics-neonatal"]

  - guid: "x105factors05drug"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What maternal substance use increases perinatal transmission?"
      Back: "Maternal drug use."
    tags: ["transmission-factors", "maternal", "subject:paediatrics-neonatal"]

  - guid: "x106factors06azt"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What prophylaxis lack increases perinatal transmission?"
      Back: "Lack of AZT during pregnancy."
    tags: ["transmission-factors", "maternal", "art", "subject:paediatrics-neonatal"]

  - guid: "x107factors07smoke"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What maternal habit increases perinatal transmission?"
      Back: "Cigarette smoking."
    tags: ["transmission-factors", "maternal", "subject:paediatrics-neonatal"]

  - guid: "x108factors08rom"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What obstetrical complication increases perinatal transmission?"
      Back: "Length of ruptured membranes/chorioamnionitis."
    tags: ["transmission-factors", "obstetrical", "subject:paediatrics-neonatal"]

  - guid: "x109factors09mode"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What obstetrical delivery mode increases perinatal transmission?"
      Back: "Vaginal delivery."
    tags: ["transmission-factors", "obstetrical", "subject:paediatrics-neonatal"]

  - guid: "x110factors10proc"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What obstetrical invasive procedure increases perinatal transmission?"
      Back: "Scalp electrodes."
    tags: ["transmission-factors", "obstetrical", "subject:paediatrics-neonatal"]

  - guid: "x111factors11twin"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What obstetrical condition about twins increases perinatal transmission?"
      Back: "First born twin."
    tags: ["transmission-factors", "obstetrical", "subject:paediatrics-neonatal"]

  - guid: "x112factors12prem"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What infant factor increases perinatal transmission?"
      Back: "Prematurity."
    tags: ["transmission-factors", "infant", "subject:paediatrics-neonatal"]

  - guid: "x113vl-trans01"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What is the HIV transmission rate (95% CI) with VL <400 copies/ml?"
      Back: "0% (95% CI: 0–11.0%)"
    tags: ["viral-load-transmission", "vl-class", "subject:paediatrics-neonatal"]

  - guid: "x114vl-trans02"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What is the HIV transmission rate (95% CI) with VL 400–3500 copies/ml?"
      Back: "8.6% (95% CI: 2.0–11.2%)"
    tags: ["viral-load-transmission", "vl-class", "subject:paediatrics-neonatal"]

  - guid: "x115vl-trans03"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What is the HIV transmission rate (95% CI) with VL 3500–10,000 copies/ml?"
      Back: "19.4% (95% CI: 10.3–28.5%)"
    tags: ["viral-load-transmission", "vl-class", "subject:paediatrics-neonatal"]

  - guid: "x116vl-trans04"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What is the HIV transmission rate (95% CI) with VL 10,000–30,000 copies/ml?"
      Back: "18.8% (95% CI: 10.3–27.4%)"
    tags: ["viral-load-transmission", "vl-class", "subject:paediatrics-neonatal"]

  - guid: "x117vl-trans05"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What is the HIV transmission rate (95% CI) with VL >30,000 copies/ml?"
      Back: "34.8% (95% CI: 29.5–40.1%)"
    tags: ["viral-load-transmission", "vl-class", "subject:paediatrics-neonatal"]

  - guid: "x118vlrole01"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "Is perinatal transmission possible at all maternal viral load levels?"
      Back: "Yes. Perinatal transmission can potentially occur at all levels of maternal viral load."
    tags: ["viral-load-role", "transmission", "subject:paediatrics-neonatal"]

  - guid: "x119vlrole02"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "How does transmission risk correlate with maternal viral load?"
      Back: "Risk of transmission increases with increasing maternal viral load."
    tags: ["viral-load-role", "transmission", "subject:paediatrics-neonatal"]

  - guid: "x120vlrole03"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "Do maternal plasma and cervico-vaginal secretion viral loads always correlate?"
      Back: "No. Maternal plasma and cervico-vaginal secretion viral loads do not always correlate."
    tags: ["viral-load-role", "transmission", "subject:paediatrics-neonatal"]

  - guid: "x121arv-safe01"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What is known about ZDV (AZT) safety in neonatal prophylaxis?"
      Back: "ZDV generally safe, may cause transient anemia."
    tags: ["arv-safety", "nrti", "subject:paediatrics-neonatal"]

  - guid: "x122arv-safe02"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What is the risk of 3TC + ZDV combination in infants?"
      Back: "May increase hematologic toxicity."
    tags: ["arv-safety", "nrti", "subject:paediatrics-neonatal"]

  - guid: "x123arv-safe03"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What are rare severe side effects of NVP in infants?"
      Back: "Severe rash and hepatotoxicity; resistance may occur in infants who become HIV infected."
    tags: ["arv-safety", "nvp", "subject:paediatrics-neonatal"]

  - guid: "x124arv-safe04"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "Why are protease inhibitors not recommended for neonates?"
      Back: "No PK data for most; LPV/r: possible cardiac and other toxicity."
    tags: ["arv-safety", "pi", "subject:paediatrics-neonatal"]

  - guid: "x125bf-trans01"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "By how much does breastfeeding increase HIV transmission?"
      Back: "Increases HIV transmission by 5–28%."
    tags: ["breastfeeding-transmission", "risk", "subject:paediatrics-neonatal"]

  - guid: "x126bf-trans02"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "Is exclusive breastfeeding lower risk than mixed feeding?"
      Back: "Yes. Exclusive breastfeeding is lower risk than mixed breastfeeding."
    tags: ["breastfeeding-transmission", "risk", "subject:paediatrics-neonatal"]

  - guid: "x127bf-trans03"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What is the transmission risk difference between seroconversion after vs before delivery?"
      Back: "Women who seroconvert after delivery have a higher rate of transmission than women infected prior to delivery."
    tags: ["breastfeeding-transmission", "seroconversion", "subject:paediatrics-neonatal"]

  - guid: "x128bf-trans04"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "How does mastitis affect breastfeeding transmission?"
      Back: "Mastitis has been associated with increased breast milk HIV RNA levels and increased breast milk transmission."
    tags: ["breastfeeding-transmission", "mastitis", "subject:paediatrics-neonatal"]

  - guid: "x129hct01preg"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "How often should HIV counselling and testing be done during pregnancy?"
      Back: "Every 3 months throughout pregnancy."
    tags: ["hct", "pregnancy", "subject:paediatrics-neonatal"]

  - guid: "x130hct02ld"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "When should HCT be done during delivery?"
      Back: "At labour/delivery."
    tags: ["hct", "delivery", "subject:paediatrics-neonatal"]

  - guid: "x131hct036w"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "When should HCT be done in the postpartum period?"
      Back: "At the 6 week EPI visit."
    tags: ["hct", "postpartum", "subject:paediatrics-neonatal"]

  - guid: "x132hct04bf"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "How often should HCT be done throughout breastfeeding?"
      Back: "Every 6 months throughout breastfeeding."
    tags: ["hct", "breastfeeding", "subject:paediatrics-neonatal"]

  - guid: "x133cycle01free"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What is step 1 of the HIV life cycle?"
      Back: "Free Virus."
    tags: ["hiv-lifecycle", "step-1", "subject:paediatrics-neonatal"]

  - guid: "x134cycle02bf"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What is step 2 of the HIV life cycle (Binding and Fusion)?"
      Back: "Virus binds to a CD4 molecule and one of two coreceptors (CCR5 or CXCR4). Receptor molecules are common on the cell surface. The virus then fuses with the cell."
    tags: ["hiv-lifecycle", "step-2", "subject:paediatrics-neonatal"]

  - guid: "x135cycle03inf"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What is step 3 of the HIV life cycle (Infection)?"
      Back: "Virus penetrates cell. Contents emptied into cell."
    tags: ["hiv-lifecycle", "step-3", "subject:paediatrics-neonatal"]

  - guid: "x136cycle04rt"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What is step 4 of the HIV life cycle (Reverse Transcription)?"
      Back: "Single strands of viral RNA are converted into double-stranded DNA by the reverse transcriptase enzyme."
    tags: ["hiv-lifecycle", "step-4", "subject:paediatrics-neonatal"]

  - guid: "x137cycle05int"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What is step 5 of the HIV life cycle (Integration)?"
      Back: "Viral DNA is combined with the cell's own DNA by the integrase enzyme."
    tags: ["hiv-lifecycle", "step-5", "subject:paediatrics-neonatal"]

  - guid: "x138cycle06trans"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What is step 6 of the HIV life cycle (Transcription)?"
      Back: "When the infected cell divides, the viral DNA is 'read' and long chains of proteins are made."
    tags: ["hiv-lifecycle", "step-6", "subject:paediatrics-neonatal"]

  - guid: "x139cycle07assem"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What is step 7 of the HIV life cycle (Assembly)?"
      Back: "Sets of viral protein chains come together."
    tags: ["hiv-lifecycle", "step-7", "subject:paediatrics-neonatal"]

  - guid: "x140cycle08bud"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What is step 8 of the HIV life cycle (Budding)?"
      Back: "Immature virus pushes out of the cell, taking some cell membrane with it. The protease enzyme starts processing the proteins in the newly forming virus."
    tags: ["hiv-lifecycle", "step-8", "subject:paediatrics-neonatal"]

  - guid: "x141cycle09immature"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What is step 9 of the HIV life cycle?"
      Back: "Immature virus breaks free of the infected cell."
    tags: ["hiv-lifecycle", "step-9", "subject:paediatrics-neonatal"]

  - guid: "x142cycle10matur"
    noteType: Basic
    deck: "Corpus::Paediatrics-Neonatal::PMTCT updated 2020"
    fields:
      Front: "What is step 10 of the HIV life cycle (Maturation)?"
      Back: "The protease enzyme finishes cutting HIV protein chains into individual proteins that combine to make a new working virus."
    tags: ["hiv-lifecycle", "step-10", "subject:paediatrics-neonatal"]
