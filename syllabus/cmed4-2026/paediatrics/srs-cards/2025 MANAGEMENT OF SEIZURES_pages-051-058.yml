    deck: "Corpus::Paediatrics::2025 MANAGEMENT OF SEIZURES"
    fields:
      Front: "What factors should be considered when choosing anti-epileptic agents?"
      Back: "Age of the patient, seizure semiology, and clinical setting/contraindications."
    tags: ["subject:paediatrics", "seizures", "medications", "treatment-selection"]
  - guid: m7p3t6u5q4s8v0w1
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 MANAGEMENT OF SEIZURES"
    fields:
      Front: "What is lamotrigine and what special consideration applies to its use?"
      Back: "Lamotrigine is a broad-spectrum anti-seizure medication that requires prolonged careful titration due to its risk of Stevens-Johnson syndrome (SJS), particularly at the initiation of therapy or with rapid dose increases."
    tags: ["subject:paediatrics", "seizures", "medications", "lamotrigine", "serious-adverse-effects"]
