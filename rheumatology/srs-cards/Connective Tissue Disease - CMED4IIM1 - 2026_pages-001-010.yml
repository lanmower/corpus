# Connective Tissue Disease SRS Cards - CMED4IIM1
# Extracted from audio transcripts pages 001-010

- id: 1
  front: "What is systemic lupus erythematosus (SLE)?"
  back: "A connective tissue disease that is the most well-known and pathonomonic of connective tissue diseases, relatively more common than other forms."

- id: 2
  front: "What is the sex ratio of systemic lupus erythematosus?"
  back: "SLE is 3:1 more common in women than men."

- id: 3
  front: "What is the worldwide incidence of SLE?"
  back: "Approximately 1 per 1,000 to 1 per 10,000 people."

- id: 4
  front: "What is the age of onset for SLE?"
  back: "Generally between 15 to 45 years, affecting younger adults."

- id: 5
  front: "What populations have higher prevalence of SLE?"
  back: "African-American and Hispanic populations have greater prevalence compared to Asians and Caucasians."

- id: 6
  front: "What are the main characteristics of autoimmune connective tissue diseases?"
  back: "Multi-system involvement, more common in women (estrogen plays a role), positive family history, characteristic autoantibodies, respond to immunosuppressive therapy, and high morbidity/mortality if undiagnosed or untreated."

- id: 7
  front: "What are the rare forms of connective tissue disease?"
  back: "Systemic sclerosis (scleroderma), idiopathic inflammatory myositis, mixed connective tissue disease, overlap syndrome, and undifferentiated connective tissue disease."

- id: 8
  front: "What is an overlap syndrome in connective tissue diseases?"
  back: "When two or more connective tissue diseases coexist in the same individual, such as SLE with scleroderma and rheumatoid arthritis."

- id: 9
  front: "What is undifferentiated connective tissue disease (UCTD)?"
  back: "A term used for connective tissue diseases that do not fulfill any established criteria set."

- id: 10
  front: "What are the constitutional symptoms of SLE?"
  back: "Severe constitutional illness involving fatigue, fever, arthralgia, and weight changes."

- id: 11
  front: "What is Raynaud's phenomenon?"
  back: "Bluish discoloration of the tips of the fingers in response to stress or cold weather, seen in SLE patients."

- id: 12
  front: "What is Sjögren's syndrome in SLE?"
  back: "A secondary condition causing dry eyes and dry mouth (sicca symptoms) associated with SLE."

- id: 13
  front: "What are the musculoskeletal manifestations of SLE?"
  back: "Arthralgia, arthropathy (including arthritis), myalgia, myositis, and frank arthritis."

- id: 14
  front: "What is the pathonomonic dermatological feature of SLE?"
  back: "A butterfly or malar rash, though only about 40% of SLE patients present with this sign."

- id: 15
  front: "What dermatological manifestations are associated with SLE?"
  back: "Butterfly/malar rash, photosensitivity, discoid lupus rash, and alopecia (generally non-scarring)."

- id: 16
  front: "What are the renal manifestations of SLE?"
  back: "Nephrotic syndrome, nephritic syndrome, edema, urinary sediment changes, and hypertension."

- id: 17
  front: "What are the neuropsychiatric manifestations of SLE?"
  back: "Headaches, seizures, psychosis, and mood changes."

- id: 18
  front: "What are the pulmonary and cardiovascular manifestations of SLE?"
  back: "Dyspnea and pulmonary edema."

- id: 19
  front: "What gastrointestinal manifestations occur in SLE?"
  back: "Nausea, dyspepsia, and abdominal pain."

- id: 20
  front: "What hematological abnormalities are associated with SLE?"
  back: "Bruising related to low platelet counts, recurrent infections due to low white cell count, fatigue due to anemia, and thrombosis related to abnormal phospholipid proteins."

- id: 21
  front: "How does SLE affect obstetric history?"
  back: "It may affect parity and cause miscarriages. Oral contraception and hormone replacement therapy may predispose patients to thrombosis."

- id: 22
  front: "What role does family history play in autoimmune diseases?"
  back: "Patients with a family member with autoimmune disease are likely to have the same or a different type of autoimmune disease."

- id: 23
  front: "What is the anti-nuclear antibody (ANA) test in SLE?"
  back: "An indirect immunofluorescence test using HEp-2 cells that is positive in more than 98% of SLE patients; reported as a titer (1:80, 1:160, 1:320, etc.)."

- id: 24
  front: "What is considered a positive ANA titer?"
  back: "A titer of 1:160 or higher is considered positive, as more than 10% of the general population can have lower titers without having SLE."

- id: 25
  front: "What is the diagnostic specificity of double-stranded DNA (dsDNA) antibodies?"
  back: "Double-stranded DNA antibodies have high diagnostic specificity for SLE, correlate with disease activity especially lupus nephritis activity, and occur in 50-70% of SLE patients."

- id: 26
  front: "What are anti-histone antibodies associated with?"
  back: "Anti-histone antibodies are present in patients with drug-induced lupus."

- id: 27
  front: "What is anti-smooth muscle antibody associated with?"
  back: "Anti-smooth muscle antibodies have high diagnostic specificity for SLE."

- id: 28
  front: "What autoantibodies are positive in mixed connective tissue disease?"
  back: "U1RNP (anti-U1 ribonucleoprotein) antibodies."

- id: 29
  front: "What autoantibodies are associated with neonatal lupus?"
  back: "Ro, SSA, Na, and SSB antibodies."

- id: 30
  front: "What autoantibodies are positive in Sjögren syndrome?"
  back: "SSA and SSB antibodies."

- id: 31
  front: "What are ribosomal P antibodies associated with?"
  back: "Individuals with psychiatric disease or neurolupus."

- id: 32
  front: "What are anti-phospholipid antibodies associated with?"
  back: "Patients with secondary anti-phospholipid syndrome associated with lupus."

- id: 33
  front: "What are the requirements for SLE diagnosis using SLICC criteria?"
  back: "At least four criteria (at least one clinical and one laboratory) OR biopsy-proven lupus nephritis with positive ANA or positive anti-DNA."

- id: 34
  front: "What are the clinical criteria in SLICC criteria for SLE?"
  back: "Cutaneous lesions, arthritis, serositis, renal involvement, neurological manifestations, and hematological abnormalities."

- id: 35
  front: "What are the immunological criteria in SLICC criteria for SLE?"
  back: "ANA, anti-DNA, anti-Smith, anti-phospholipid antibodies, low C3/C4 complement, and positive direct Coombs test."

- id: 36
  front: "What is the serum ANA titer requirement in ACR/EULAR criteria for SLE?"
  back: "A serum titer of ANA at least 1:80 on HEp-2 cells is required."

- id: 37
  front: "How are points weighted in ACR/EULAR SLE classification criteria?"
  back: "Points are weighted according to the degree of severity or specificity for SLE; patients need 10 or more total points for classification."

- id: 38
  front: "How many points are awarded for acute cutaneous lupus in ACR/EULAR criteria?"
  back: "Acute cutaneous lupus is awarded 6 points in the cutaneous domain."

- id: 39
  front: "How many points are awarded for arthritis in ACR/EULAR criteria?"
  back: "Arthritis is awarded 6 points."

- id: 40
  front: "What neurological symptoms earn points in ACR/EULAR criteria?"
  back: "Seizures, psychosis, and delirium earn points in the neurological domain."

- id: 41
  front: "Which autoantibodies have the highest point values in ACR/EULAR immunological criteria?"
  back: "Double-stranded DNA and anti-Smith antibodies, each awarded 6 points in the immunological domain."

- id: 42
  front: "What investigations are essential for diagnosing SLE?"
  back: "Blood investigations (ANA, anti-DNA, complement levels, full blood count), urine examination (dipstick, microscopy, protein quantification), and radiological investigations (X-rays, ultrasound, CT scan as needed)."

- id: 43
  front: "Why is urine dipstick important in SLE evaluation?"
  back: "Urine dipstick is important to look for active urinary sediment, which would indicate need for testing for lupus nephritis."

- id: 44
  front: "What does an active urinary sediment in SLE indicate?"
  back: "It indicates need for investigation and testing for lupus nephritis."

- id: 45
  front: "What full blood count findings are important in SLE?"
  back: "Hemoglobin (for anemia), white cell count differential (looking for lymphopenia and neutropenia, which are very common), and platelet count (thrombocytopenia can be severe)."

- id: 46
  front: "Why is liver function testing important in SLE?"
  back: "To look for autoimmune hepatitis and to establish baseline liver function before starting toxic medications (immunosuppressants)."

- id: 47
  front: "What does renal impairment testing involve in SLE?"
  back: "UN (urea and nitrogen) measurement, and if protein is positive on dipstick, spot urine sample or urine protein creatinine ratio to quantify protein."

- id: 48
  front: "What should be done if infection is suspected in SLE?"
  back: "Send off a urine culture and sensitivity (MC&S) to exclude and treat infection."

- id: 49
  front: "What type of arthritis does SLE typically cause?"
  back: "SLE generally results in non-erosive arthritis, showing no erosions on X-rays but possibly some gestational arthritic loss."

- id: 50
  front: "When is renal ultrasound important in SLE?"
  back: "Renal ultrasound is important when planning a biopsy and to exclude obstructive causes of renal pathology."

- id: 51
  front: "When is high-resolution CT of the chest indicated in SLE?"
  back: "When there is suspicion of interstitial lung disease."

- id: 52
  front: "What investigations are needed for hemolytic anemia in SLE?"
  back: "Coombs test, LDH, blood smear examination, and iron studies."

- id: 53
  front: "What role do complement levels play in SLE?"
  back: "C3 and C4 are important activity markers; low levels at times of lupus flare help diagnose a flare."

- id: 54
  front: "What are the three anti-phospholipid antibody tests?"
  back: "1) Anti-cardiolipin (ACA), 2) Lupus anticoagulant (LA), 3) Beta-2 glycoprotein (BGP1) antibodies."

- id: 55
  front: "Why is thyroid function testing important in SLE patients?"
  back: "Autoimmune thyroiditis often occurs in patients with lupus."

- id: 56
  front: "What additional autoimmune screening should be done in SLE?"
  back: "Rheumatoid factor and anti-CCP antibodies (for rheumatoid arthritis), vasculitis screening for ANCA-associated vasculitis."

- id: 57
  front: "Why should viral screening and RPR be done in SLE?"
  back: "To screen for coexisting viral infections and syphilis which may have similar serological findings."

- id: 58
  front: "Why are lipid studies and HbA1c important baselines in SLE?"
  back: "Patients have a risk of accelerated atherosclerosis and earlier onset cardiovascular disease, and corticosteroids increase risk of diabetes."

- id: 59
  front: "What is the overall management approach for SLE?"
  back: "Depends on disease severity and organ involvement; requires multi-disciplinary approach including physiotherapy and social work."

- id: 60
  front: "What is initial SLE treatment?"
  back: "Glucocorticoids and specific immunosuppressant drugs as indicated by organ involvement."

- id: 61
  front: "Which immunosuppressant should be given to almost all SLE patients?"
  back: "Hydroxychloroquine, provided there are no side effects and no predisposing factors preventing its use."

- id: 62
  front: "What other immunosuppressants are used in SLE?"
  back: "Mycophenolate mofetil, cyclophosphamide, and azathioprine, depending on disease manifestations and organ involvement."

- id: 63
  front: "What is the most important comorbidity in SLE?"
  back: "Infection, as differentiating a flare from infection and treating infection during a lupus flare can be challenging."

- id: 64
  front: "Why are patients with SLE at increased risk of infection?"
  back: "Due to impaired immune system, disease activity, use of corticosteroids, and immunosuppressive medications."

- id: 65
  front: "What preventative therapy is recommended for infections in SLE?"
  back: "Pneumococcal vaccine (five-year immunization) and influenza vaccine yearly, plus vigilance by patient and healthcare team."

- id: 66
  front: "Why should TB always be considered in SLE with respiratory symptoms?"
  back: "Because most SLE patients are on corticosteroids which suppress the immune system, making them susceptible to TB reactivation."

- id: 67
  front: "Why is cardiovascular disease screening important in SLE?"
  back: "To look for and treat accelerated atherosclerosis and hypertension (related to corticosteroids and nephritis) and dyslipidemia."

- id: 68
  front: "What is corticosteroid-induced diabetes mellitus in SLE?"
  back: "A common complication; corticosteroids should be used as bridging therapy and reduced/stopped as soon as possible to prevent diabetes development."

- id: 69
  front: "Why is osteoporosis a concern in SLE?"
  back: "It may be related to corticosteroid use."

- id: 70
  front: "What is avascular necrosis in SLE?"
  back: "A complication sometimes associated with the autoimmune disease itself, but more commonly secondary to corticosteroid use and phospholipid antibodies; often requires hip replacement surgery."

- id: 71
  front: "Why is cervical cancer screening important in SLE?"
  back: "There is increased risk related to cyclophosphamide use; female patients should receive HPV vaccines and have annual pap smears."

- id: 72
  front: "What is the risk of lymphoma in SLE?"
  back: "There is a threefold increase in lymphoma risk in SLE; high clinical suspicion is needed if signs/symptoms suggest lymphoma."

- id: 73
  front: "What is anti-phospholipid antibody syndrome (APLS)?"
  back: "A connective tissue disease that may occur secondary to SLE or as a primary condition, characterized by thrombosis, obstetric complications, thrombocytopenia, and skin manifestations like livedo reticularis."

- id: 74
  front: "What are the clinical features of anti-phospholipid antibody syndrome?"
  back: "Venous thrombosis, arterial thrombosis, poor obstetric history (recurrent miscarriages), thrombocytopenia, and skin manifestations such as livedo reticularis."

