    deck: "Corpus::Paediatrics::2025 HIV STAGING, TREATMENT AND PMTC"
    fields:
      Front: "What are the clinical indicators to suspect TB in an HIV-infected child?"
      Back: |
        Suspect TB if 2 or more of the following are present: cough (any duration), sputum production (possibly blood-stained), fever, drenching night sweats, unexplained weight loss, loss of appetite/malaise/tiredness, shortness of breath/chest pains, new palpable lymphadenopathy.
    tags: ["tb-diagnosis", "hiv-tb-coinfection", "clinical-indicators", "subject:paediatrics"]
  - guid: "f6g7h8i9j0k1l2m8"
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 HIV STAGING, TREATMENT AND PMTC"
    fields:
      Front: "When should ART be initiated in a child with TB diagnosed BEFORE ART initiation?"
      Back: |
        Complete 2 to 8 weeks of TB therapy before commencing ART. However, initiate as soon as possible if CD4 < 50 cells/mm3. Initiate ART as soon as the patient is tolerating TB therapy.
    tags: ["tb-art-timing", "cd4-threshold", "tb-hiv-coinfection", "subject:paediatrics"]
  - guid: "g7h8i9j0k1l2m3n9"
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 HIV STAGING, TREATMENT AND PMTC"
    fields:
      Front: "Which ARV regimen is preferred in children with active TB?"
      Back: |
        EFV-based regimens are generally preferred in patients with active TB.
    tags: ["efavirenz", "tb-treatment", "arv-choice", "subject:paediatrics"]
  - guid: "h8i9j0k1l2m3n4o0"
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 HIV STAGING, TREATMENT AND PMTC"
    fields:
      Front: "What dose adjustment is needed for LPV/r in TB-HIV coinfection?"
      Back: |
        Patients on LPV/r will need dose adjustment: ritonavir should be doubled in patients with active TB.
    tags: ["lopinavir-ritonavir", "tb-interaction", "dose-adjustment", "subject:paediatrics"]
  - guid: "i9j0k1l2m3n4o5p1"
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 HIV STAGING, TREATMENT AND PMTC"
    fields:
      Front: "When should ART be initiated if TB is diagnosed AFTER ART initiation?"
      Back: |
        ART should be continued throughout TB treatment if TB is diagnosed after ART initiation.
    tags: ["tb-diagnosed-post-art", "tb-hiv-coinfection", "continuity-of-care", "subject:paediatrics"]
  - guid: "j0k1l2m3n4o5p6q2"
    noteType: Basic
    deck: "Corpus::Paediatrics::2025 HIV STAGING, TREATMENT AND PMTC"
    fields:
      Front: "What is the recommendation for isoniazid preventive therapy (IPT) in HIV-infected children?"
      Back: |
        POST-EXPOSURE IPT (10 mg/kg/day) for 6 months is recommended for HIV-infected children irrespective of age or ART status. Pre-exposure IPT is not recommended in any HIV-infected or HIV-uninfected child.
    tags: ["ipt", "tb-prevention", "isoniazid-prophylaxis", "subject:paediatrics"]
