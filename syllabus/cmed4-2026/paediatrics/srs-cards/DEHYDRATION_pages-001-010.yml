    deck: "Corpus::Paediatrics::DEHYDRATION"
    fields:
      Front: "When should assessment for severe dehydration be performed in a child with diarrhea?"
      Back: "After assessment for Circulation/Coma/Convulsions (shock signs). If no diarrhea present, proceed to priority assessment (3TPR-MOB) instead."
