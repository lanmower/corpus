    fields:
      Front: "Why is it important to observe behavioural changes closely in abused children?"
      Back: "Any abused child is likely to have behavioural problems. Behaviours should be observed closely by experienced people. Asking about behavioural problems in the history is essential as behaviour often reveals important clues about the nature of the child abuse."
    tags: ["sexual-abuse", "behavioural", "assessment", "subject:paediatrics"]
  - guid: "3ab6c01fdd034288"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2024 NON ACCIDENTAL INJURIES"
    fields:
      Front: "What are the prevention and treatment approaches for post-traumatic stress disorder in sexually abused children?"
      Back: "Prevention: Debriefing via social worker for disclosure and psychologist for counselling—the earlier the better. Treatment: Recognize signs (sleep disturbance, change in appetite, separation anxiety, school performance deterioration, general behavioural changes including hypervigilance, mood lability, sexualized behaviour) and provide appropriate intervention."
    tags: ["sexual-abuse", "ptsd", "management", "psychosocial", "subject:paediatrics"]
  - guid: "7b6ff1b4473047a3"
    noteType: "Basic"
    deck: "Corpus::Paediatrics::2024 NON ACCIDENTAL INJURIES"
    fields:
      Front: "What are the six stages of child abuse accommodation syndrome?"
      Back: "1. Helplessness\n2. Coercion to secrecy\n3. Entrapment\n4. Accommodative behaviour\n5. Disclosure (delayed and unconvincing)\n6. Recantation"
    tags: ["sexual-abuse", "accommodation-syndrome", "psychological-response", "subject:paediatrics"]
  - guid: "a84df72ccfbe4826"
