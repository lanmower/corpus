    fields:
      Front: "Case 5: Child 10 kg with severe dehydration, no malnutrition, cannot get IV access, not getting better - requires NG infusion. What is the dose and rates?"
      Back: "Plan: 20 ml/kg/hour x 6 hours via NG tube = 20 x 10 = 200 ml/hr (weight band 240 ml/hr). Using 60 drops/ml dropper: 200-240 drops per minute. Using 15 drops/ml dropper: 50-60 drops per minute."
    tags: ["dehydration", "nasogastric", "drip-rate", "calculation", "case-study", "subject:paediatrics"]
  - guid: z6a7b8c9d0e1f2g3
    noteType: Basic
    deck: "Corpus::Paediatrics::DEHYDRATION"
    fields:
      Front: "What are important cautions when using manual infusion controllers and rollers for drip rates?"
      Back: "Manually set roller controllers tend to slow down progressively. Dial flows rate depends on height above infusion site. Both are affected by position of limb/drip site if this occludes or alters vascular resistance. You cannot reliably set and walk off as they do not alarm when going too fast or too slow. Must maintain constant vigilance and use protection to prevent catastrophic infusion of sudden large amounts of fluid."
    tags: ["dehydration", "iv-administration", "safety", "subject:paediatrics"]
  - guid: a7b8c9d0e1f2g3h4
    noteType: Basic
    deck: "Corpus::Paediatrics::DEHYDRATION"
    fields:
      Front: "What is the formula for calculating drip rates from ml/hr if using 60 drops/ml dropper?"
      Back: "If 60 drops per ml dropper: Volume per hour in ml = drops per minute (1:1 ratio). Example: 100 ml/hr = 100 drops per minute."
    tags: ["dehydration", "drip-rate", "calculation", "subject:paediatrics"]
  - guid: b8c9d0e1f2g3h4i5
    noteType: Basic
    deck: "Corpus::Paediatrics::DEHYDRATION"
    fields:
      Front: "What is the formula for calculating drip rates from ml/hr if using 15 drops/ml dropper?"
      Back: "If 15 drops per ml dropper: Volume per hour in ml = drops per minute divided by 4. Example: 100 ml/hr = 100 ÷ 4 = 25 drops per minute."
    tags: ["dehydration", "drip-rate", "calculation", "subject:paediatrics"]
