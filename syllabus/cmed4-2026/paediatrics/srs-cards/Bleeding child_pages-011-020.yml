    noteType: Basic
    deck: "Corpus::Paediatrics::Bleeding child"
    fields:
      Front: "How many platelets does each megakaryocyte produce?"
      Back: "Each megakaryocyte produces about 4000 platelets"
    tags: ["megakaryocyte", "platelet-production", "count", "subject:paediatrics"]
  - guid: o5p6q7r8s9t0o5p6
    noteType: Basic
    deck: "Corpus::Paediatrics::Bleeding child"
    fields:
      Front: "What is the half-life of platelets?"
      Back: "7-10 days"
    tags: ["platelets", "half-life", "lifespan", "subject:paediatrics"]
  - guid: p6q7r8s9t0u1p6q7
    noteType: Basic
    deck: "Corpus::Paediatrics::Bleeding child"
    fields:
      Front: "What platelet count level impairs primary hemostasis?"
      Back: "Platelet count < 75 x 10⁹/L impairs primary hemostasis, seen after major surgery or trauma"
    tags: ["thrombocytopenia", "hemostasis", "bleeding-risk", "subject:paediatrics"]
  - guid: q7r8s9t0u1v2q7r8
    noteType: Basic
    deck: "Corpus::Paediatrics::Bleeding child"
    fields:
      Front: "At what platelet count does spontaneous bleeding mostly occur?"
      Back: "Platelet count < 50 x 10⁹/L; spontaneous bleeding, mostly seen in skin (petechiae, purpura)"
    tags: ["thrombocytopenia", "spontaneous-bleeding", "petechiae", "subject:paediatrics"]
  - guid: r8s9t0u1v2w3r8s9
    noteType: Basic
    deck: "Corpus::Paediatrics::Bleeding child"
    fields:
      Front: "At what platelet count is noticeable hemorrhage seen in skin and mucosa?"
      Back: "Platelet count < 20 x 10⁹/L; noticeable hemorrhage seen in skin and mucosa (epistaxis, gingival bleeding)"
    tags: ["thrombocytopenia", "hemorrhage", "epistaxis", "subject:paediatrics"]
  - guid: s9t0u1v2w3x4s9t0
    noteType: Basic
    deck: "Corpus::Paediatrics::Bleeding child"
    fields:
      Front: "At what platelet count is life-threatening hemorrhage possible?"
      Back: "Platelet count < 10 x 10⁹/L; possible life-threatening hemorrhage and CNS complications (acute GI hemorrhage, intracranial hemorrhage)"
    tags: ["thrombocytopenia", "critical", "intracranial-hemorrhage", "subject:paediatrics"]
