    noteType: Basic
    deck: "Corpus::Paediatrics::ETAT - Coma and Convulsions"
    fields:
      Front: "What is the first-choice anticonvulsant for neonates with convulsions?"
      Back: "Phenobarbitone - the drug of choice for neonates (infants < 4 weeks of age)"
    tags: ["phenobarbitone", "neonatal", "anticonvulsant", "etat", "subject:paediatrics"]
  - guid: b6c1f5d3a9e27461
    noteType: Basic
    deck: "Corpus::Paediatrics::ETAT - Coma and Convulsions"
    fields:
      Front: "Why are benzodiazepines used cautiously in neonates?"
      Back: "High risk of apnoea - benzodiazepines should not be used in neonates without ventilatory support"
    tags: ["benzodiazepine", "neonatal", "apnoea", "etat", "subject:paediatrics"]
  - guid: f8d3a2c7b4e51936
    noteType: Basic
    deck: "Corpus::Paediatrics::ETAT - Coma and Convulsions"
    fields:
      Front: "What is the age cutoff for defining a neonate in seizure management?"
      Back: "Infants < 4 weeks of age are classified as neonates"
    tags: ["neonatal", "age-definition", "etat", "subject:paediatrics"]
  - guid: a5f1d9c4b2e38657
    noteType: Basic
    deck: "Corpus::Paediatrics::ETAT - Coma and Convulsions"
    fields:
      Front: "What are the steps to take after a child's seizure has stopped?"
      Back: "1. Recheck A-B-C (airway, breathing, circulation). 2. Monitor for further seizures. 3. Treat for infection. 4. Recheck blood glucose. 5. Provide after-care"
    tags: ["post-seizure", "management", "etat", "subject:paediatrics"]
  - guid: d2b7f3a1c8e46952
    noteType: Basic
    deck: "Corpus::Paediatrics::ETAT - Coma and Convulsions"
    fields:
      Front: "What should be rechecked after a seizure has stopped?"
      Back: "A-B-C (airway, breathing, circulation), blood glucose, and monitor for further seizures"
    tags: ["post-seizure", "monitoring", "etat", "subject:paediatrics"]
  - guid: c4e5f8d6b9a21734
    noteType: Basic
    deck: "Corpus::Paediatrics::ETAT - Coma and Convulsions"
    fields:
      Front: "What does DEFG stand for in ETAT emergency management?"
      Back: "D = Dextrostix (check glucose), E = (?), F = (?), G = Glucose - the mnemonic means 'don't ever forget glucose'"
    tags: ["defg", "mnemonic", "glucose", "etat", "subject:paediatrics"]
  - guid: e7a3f2d1b6c94581
    noteType: Basic
    deck: "Corpus::Paediatrics::ETAT - Coma and Convulsions"
    fields:
      Front: "What are the key assessment objectives in ETAT Coma and Convulsions management?"
      Back: "After assessing A and B, assess C (circulation). Assess consciousness using AVPU score. Identify coma (unconsciousness). Identify convulsions. Treat coma and convulsions. Never forget glucose."
    tags: ["objectives", "assessment", "etat", "subject:paediatrics"]
  - guid: b1d6f4a3c9e27851
    noteType: Basic
    deck: "Corpus::Paediatrics::ETAT - Coma and Convulsions"
    fields:
      Front: "Why is treating infection important after seizure cessation?"
      Back: "Infection (especially meningitis) is a common cause of convulsions in children and must be treated to prevent recurrence"
    tags: ["post-seizure", "infection", "etat", "subject:paediatrics"]
  - guid: f3c2a8d5b7e14962
    noteType: Basic
