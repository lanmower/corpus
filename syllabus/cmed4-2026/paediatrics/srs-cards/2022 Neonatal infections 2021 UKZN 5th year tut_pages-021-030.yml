    noteType: "Basic"
    deck: "Corpus::Paediatrics::2022 Neonatal infections"
    fields:
      Front: "What are the key components of the DOH 4-Pillar approach to HIV prevention?"
      Back: "Pillar 1+2: Testing, couples counselling and partner testing, safe sex education (dual contraception), PEP (Post-Exposure Prophylaxis), PrEP (Pre-Exposure Prophylaxis), VMMC (Voluntary Medical Male Circumcision), management of discordant couples"
    tags: ["hiv", "prevention", "south-africa", "subject:paediatrics"]
