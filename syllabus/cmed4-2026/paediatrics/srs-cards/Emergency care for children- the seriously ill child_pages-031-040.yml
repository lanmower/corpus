    fields:
      Front: "Scenario 2: A four-year old male was rushed in. Convulsed 1 hour ago. Fast breathing, no cyanosis, no respiratory distress. Very hot, responds quickly to questions. No diarrhoea or vomiting. Triage as E/P/Q."
      Back: "P (Priority) - Recent seizure with fever (possible febrile convulsion) warrants priority but not emergency given current alertness and normal breathing."
    tags: ["scenario", "triage", "fever", "subject:paediatrics"]

