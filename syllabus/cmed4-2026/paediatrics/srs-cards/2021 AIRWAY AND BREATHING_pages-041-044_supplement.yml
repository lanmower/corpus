    fields:
      Front: "What is the complete management algorithm for a choking child?"
      Back: "1. Determine if choking is likely\n2. Assess effectiveness of cough (effective vs ineffective) and consciousness level\n3. If EFFECTIVE COUGH: observe, do not intervene, reassess continuously\n4. If INEFFECTIVE COUGH: call for help and begin intervention maneuvers immediately\n5. Age-specific maneuvers: infants (back blows + chest thrusts), older children (back blows + abdominal thrusts)\n6. If child becomes unconscious: discontinue choking maneuvers and begin bag-mask ventilation + chest compressions if no signs of circulation\n7. Repeat cycle of maneuvers (5 per technique) until object expelled or resuscitation becomes necessary"
